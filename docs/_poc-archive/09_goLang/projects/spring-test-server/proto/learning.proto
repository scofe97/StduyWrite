syntax = "proto3";

package learning.v1;

option go_package = "github.com/runners-high/go-learning/09-spring-test-server/pb;pb";
option java_package = "com.runnershigh.poc.grpc.learning";
option java_outer_classname = "LearningProto";
option java_multiple_files = true;

// =============================================================================
// 학습용 gRPC 서비스 - 4가지 RPC 패턴 모두 포함
// =============================================================================

service LearningService {
  // =========================================================================
  // 1. Unary RPC - 단순 요청/응답 (가장 기본)
  // =========================================================================

  // 간단한 인사 - 가장 기본적인 패턴
  rpc SayHello(HelloRequest) returns (HelloResponse);

  // 계산기 - 비즈니스 로직 예제
  rpc Calculate(CalculateRequest) returns (CalculateResponse);

  // 에러 테스트 - 다양한 gRPC 상태 코드 반환
  rpc TestError(ErrorRequest) returns (ErrorResponse);

  // 지연 테스트 - Deadline/Timeout 테스트용
  rpc TestDelay(DelayRequest) returns (DelayResponse);

  // =========================================================================
  // 2. Server Streaming - 서버가 여러 응답을 스트리밍
  // =========================================================================

  // 숫자 스트리밍 - 1부터 N까지 순차 전송
  rpc StreamNumbers(NumberRequest) returns (stream NumberResponse);

  // 로그 스트리밍 - 실시간 로그 전송 시뮬레이션
  rpc StreamLogs(LogRequest) returns (stream LogResponse);

  // 파일 다운로드 - 청크 단위 데이터 전송
  rpc DownloadFile(FileRequest) returns (stream FileChunk);

  // =========================================================================
  // 3. Client Streaming - 클라이언트가 여러 요청을 스트리밍
  // =========================================================================

  // 숫자 합계 - 여러 숫자를 받아서 합계 반환
  rpc SumNumbers(stream NumberValue) returns (SumResponse);

  // 파일 업로드 - 청크 단위로 받아서 저장
  rpc UploadFile(stream FileChunk) returns (UploadResponse);

  // =========================================================================
  // 4. Bidirectional Streaming - 양방향 스트리밍
  // =========================================================================

  // 채팅 - 실시간 양방향 메시지
  rpc Chat(stream ChatMessage) returns (stream ChatMessage);

  // 에코 - 받은 메시지를 대문자로 변환하여 즉시 응답
  rpc Echo(stream EchoRequest) returns (stream EchoResponse);
}

// =============================================================================
// 1. Unary RPC 메시지
// =============================================================================

message HelloRequest {
  string name = 1;
  string language = 2;  // "ko", "en", "ja"
}

message HelloResponse {
  string message = 1;
  string timestamp = 2;
}

message CalculateRequest {
  double a = 1;
  double b = 2;
  Operation operation = 3;
}

enum Operation {
  OPERATION_UNSPECIFIED = 0;
  OPERATION_ADD = 1;
  OPERATION_SUBTRACT = 2;
  OPERATION_MULTIPLY = 3;
  OPERATION_DIVIDE = 4;
}

message CalculateResponse {
  double result = 1;
  string expression = 2;  // "10 + 5 = 15"
}

message ErrorRequest {
  ErrorType error_type = 1;
}

enum ErrorType {
  ERROR_TYPE_NONE = 0;
  ERROR_TYPE_NOT_FOUND = 1;       // codes.NotFound
  ERROR_TYPE_INVALID = 2;         // codes.InvalidArgument
  ERROR_TYPE_PERMISSION = 3;      // codes.PermissionDenied
  ERROR_TYPE_INTERNAL = 4;        // codes.Internal
  ERROR_TYPE_UNAVAILABLE = 5;     // codes.Unavailable
  ERROR_TYPE_DEADLINE = 6;        // codes.DeadlineExceeded
}

message ErrorResponse {
  string message = 1;
}

message DelayRequest {
  int32 delay_ms = 1;  // 지연 시간 (밀리초)
}

message DelayResponse {
  string message = 1;
  int64 actual_delay_ms = 2;
}

// =============================================================================
// 2. Server Streaming 메시지
// =============================================================================

message NumberRequest {
  int32 start = 1;
  int32 end = 2;
  int32 delay_ms = 3;  // 각 응답 사이 지연
}

message NumberResponse {
  int32 value = 1;
  int32 index = 2;
  int32 total = 3;
}

message LogRequest {
  string service_name = 1;
  LogLevel min_level = 2;
  int32 count = 3;  // 생성할 로그 수
}

enum LogLevel {
  LOG_LEVEL_DEBUG = 0;
  LOG_LEVEL_INFO = 1;
  LOG_LEVEL_WARN = 2;
  LOG_LEVEL_ERROR = 3;
}

message LogResponse {
  string timestamp = 1;
  LogLevel level = 2;
  string message = 3;
  string service = 4;
}

message FileRequest {
  string filename = 1;
  int32 chunk_size = 2;  // 청크 크기 (bytes)
}

message FileChunk {
  bytes data = 1;
  int32 chunk_number = 2;
  int32 total_chunks = 3;
  string filename = 4;
}

// =============================================================================
// 3. Client Streaming 메시지
// =============================================================================

message NumberValue {
  double value = 1;
}

message SumResponse {
  double sum = 1;
  int32 count = 2;
  double average = 3;
}

message UploadResponse {
  string filename = 1;
  int64 total_bytes = 2;
  int32 chunks_received = 3;
  bool success = 4;
}

// =============================================================================
// 4. Bidirectional Streaming 메시지
// =============================================================================

message ChatMessage {
  string user = 1;
  string content = 2;
  string timestamp = 3;
  MessageType type = 4;
}

enum MessageType {
  MESSAGE_TYPE_TEXT = 0;
  MESSAGE_TYPE_JOIN = 1;
  MESSAGE_TYPE_LEAVE = 2;
  MESSAGE_TYPE_SYSTEM = 3;
}

message EchoRequest {
  string message = 1;
  int32 repeat = 2;  // 반복 횟수
}

message EchoResponse {
  string original = 1;
  string transformed = 2;  // 대문자 변환
  int32 sequence = 3;
}
