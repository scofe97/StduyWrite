spring:
  application:
    name: redpanda-spring-boot
  profiles:
    active: local

---
# Local: docker-compose (localhost:19092)
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:15432/saga
    username: saga
    password: saga
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: localhost:19092

    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      # I2: Producer 성능 튜닝
      batch-size: 16384           # 16KB — 배치 크기 (처리량 ↑, 지연 ↑)
      compression-type: lz4       # 압축 (네트워크 ↓, CPU ↑)
      buffer-memory: 33554432     # 32MB — 전송 대기 버퍼
      properties:
        schema.registry.url: http://localhost:18081
        auto.register.schemas: true
        interceptor.classes: com.study.redpanda.ch02.interceptor.CommonHeaderInterceptor
        # P7: Idempotent Producer — PID+시퀀스로 브로커 레벨 중복 방지
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        # I2: linger.ms — 배치가 안 찼어도 이 시간 후 전송
        linger.ms: 10

    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      # I2: Consumer 성능 튜닝
      max-poll-records: 500       # 한 번 poll()로 가져올 최대 레코드 수
      fetch-min-size: 1           # 최소 fetch 크기 (바이트)
      fetch-max-wait: 500         # 최대 fetch 대기 시간 (ms)
      properties:
        schema.registry.url: http://localhost:18081
        specific.avro.reader: true

    listener:
      ack-mode: manual
      # I2: concurrency — 동시 Consumer 스레드 수 (파티션 수 이하)
      concurrency: 3

---
# Staging/Prod: CI/CD에서 스키마 사전 등록, 앱은 Read-only
# I4: Schema Registry 등록 전략 — 프로덕션 프로파일 예시
spring:
  config:
    activate:
      on-profile: staging
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      properties:
        schema.registry.url: ${SCHEMA_REGISTRY_URL}
        auto.register.schemas: false    # 자동 등록 비활성화 — CI/CD에서만 등록
        use.latest.version: true        # 이미 등록된 최신 버전 사용
        interceptor.classes: com.study.redpanda.ch02.interceptor.CommonHeaderInterceptor
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        schema.registry.url: ${SCHEMA_REGISTRY_URL}
        specific.avro.reader: true
    listener:
      ack-mode: manual
      concurrency: 3

---
# Dev: K8s 클러스터
spring:
  config:
    activate:
      on-profile: dev
  kafka:
    bootstrap-servers: 10.255.17.176:31092
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        schema.registry.url: http://10.255.17.176:30081
        specific.avro.reader: true
    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      properties:
        schema.registry.url: http://10.255.17.176:30081
        auto.register.schemas: true
        interceptor.classes: com.study.redpanda.ch02.interceptor.CommonHeaderInterceptor
        # P7: Idempotent Producer
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    listener:
      ack-mode: manual
