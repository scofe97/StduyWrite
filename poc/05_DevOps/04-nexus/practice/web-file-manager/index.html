<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Web File Manager</title>
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <h1>Nexus Web File Manager</h1>

  <div id="message" class="message"></div>

  <div class="controls">
    <input type="text" id="nexusUrl" placeholder="Nexus URL" value="http://localhost:8081">
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="connect()">Connect</button>
  </div>

  <div class="controls">
    <select id="repoSelect" onchange="loadComponents(false)">
      <option value="">-- 리포지토리 선택 --</option>
    </select>
  </div>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="검색어 입력..." onkeydown="if(event.key==='Enter') searchComponents()">
    <button onclick="searchComponents()">Search</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>이름</th>
        <th>크기</th>
        <th>수정일</th>
        <th>작업</th>
      </tr>
    </thead>
    <tbody id="fileList"></tbody>
  </table>

  <div id="loadMore">
    <button onclick="loadComponents(true)">더 보기</button>
  </div>

  <div class="upload-area">
    <h3>파일 업로드</h3>
    <div class="controls">
      <input type="text" id="uploadDir" placeholder="디렉토리 경로 (예: /reports/2024)" value="/">
      <input type="file" id="fileInput">
      <button onclick="uploadFile()">Upload</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
