<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ch12 — Pipeline Resume과 Durability</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d0d;
    color: #e8e4df;
    font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
    min-height: 100vh;
    padding: 32px 16px;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: #e8e4df;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }

  .subtitle {
    font-size: 0.9rem;
    color: rgb(138, 133, 128);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  /* Scenario Selector */
  .scenario-selector {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .scenario-pill {
    padding: 8px 18px;
    border-radius: 20px;
    border: 1px solid rgb(42, 37, 32);
    background: rgb(26, 26, 26);
    color: rgb(138, 133, 128);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
  }

  .scenario-pill:hover {
    border-color: rgba(212, 168, 83, 0.4);
    color: #e8e4df;
  }

  .scenario-pill.active {
    background: rgba(212, 168, 83, 0.2);
    border-color: rgb(212, 168, 83);
    color: rgb(212, 168, 83);
    font-weight: 600;
  }

  /* Pipeline Flow */
  .pipeline-section {
    margin-bottom: 24px;
  }

  .pipeline-label {
    font-size: 0.75rem;
    color: rgb(138, 133, 128);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
  }

  .pipeline-flow {
    display: flex;
    align-items: center;
    gap: 0;
    overflow-x: auto;
    padding: 8px 4px 12px;
    scrollbar-width: thin;
    scrollbar-color: rgb(42, 37, 32) transparent;
  }

  .pipeline-flow::-webkit-scrollbar { height: 4px; }
  .pipeline-flow::-webkit-scrollbar-track { background: transparent; }
  .pipeline-flow::-webkit-scrollbar-thumb { background: rgb(42, 37, 32); border-radius: 2px; }

  .pipeline-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .node-circle {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid rgb(42, 37, 32);
    background: rgb(26, 26, 26);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    color: rgb(138, 133, 128);
    transition: all 0.25s ease;
    position: relative;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
  }

  .node-label {
    font-size: 0.7rem;
    color: rgb(138, 133, 128);
    text-align: center;
    max-width: 64px;
    line-height: 1.3;
    transition: color 0.25s ease;
    white-space: nowrap;
  }

  .pipeline-connector {
    width: 28px;
    height: 2px;
    background: rgb(42, 37, 32);
    flex-shrink: 0;
    margin-bottom: 22px;
    transition: background 0.25s ease;
  }

  /* Node states */
  .pipeline-node.visited .node-circle {
    border-color: rgba(212, 168, 83, 0.4);
    background: rgba(212, 168, 83, 0.08);
    color: rgb(212, 168, 83);
  }
  .pipeline-node.visited .node-label { color: rgba(212, 168, 83, 0.7); }
  .pipeline-node.visited + .pipeline-connector { background: rgba(212, 168, 83, 0.3); }

  .pipeline-node.active .node-circle {
    border-color: rgb(212, 168, 83);
    background: rgba(212, 168, 83, 0.2);
    color: rgb(212, 168, 83);
    animation: node-glow 1.5s ease-in-out infinite;
  }
  .pipeline-node.active .node-label { color: rgb(212, 168, 83); font-weight: 600; }

  .pipeline-node.success .node-circle {
    border-color: #66bb6a;
    background: rgba(46, 125, 50, 0.2);
    color: #66bb6a;
  }
  .pipeline-node.success .node-label { color: #66bb6a; }

  .pipeline-node.fail .node-circle {
    border-color: #f44336;
    background: rgba(244, 67, 54, 0.15);
    color: #f44336;
  }
  .pipeline-node.fail .node-label { color: #f44336; }

  .pipeline-node.warn .node-circle {
    border-color: #ff9800;
    background: rgba(255, 152, 0, 0.15);
    color: #ff9800;
  }
  .pipeline-node.warn .node-label { color: #ff9800; }

  @keyframes node-glow {
    0%   { box-shadow: 0 0 4px rgba(212, 168, 83, 0.2); }
    50%  { box-shadow: 0 0 12px rgba(212, 168, 83, 0.6); }
    100% { box-shadow: 0 0 4px rgba(212, 168, 83, 0.2); }
  }

  /* Start Overlay */
  .start-overlay {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 0 32px;
  }

  .start-btn {
    padding: 14px 36px;
    border-radius: 8px;
    border: 1px solid rgb(212, 168, 83);
    background: rgba(212, 168, 83, 0.12);
    color: rgb(212, 168, 83);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s ease;
    letter-spacing: 0.02em;
  }

  .start-btn:hover {
    background: rgba(212, 168, 83, 0.22);
    box-shadow: 0 0 16px rgba(212, 168, 83, 0.25);
  }

  /* Controls Bar */
  .controls-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border: 1px solid rgb(42, 37, 32);
    border-radius: 8px;
    background: rgb(15, 14, 13);
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .ctrl-btn {
    width: 34px;
    height: 34px;
    border-radius: 6px;
    border: 1px solid rgb(42, 37, 32);
    background: rgb(26, 26, 26);
    color: #e8e4df;
    font-size: 0.95rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    font-family: inherit;
  }

  .ctrl-btn:hover {
    border-color: rgba(212, 168, 83, 0.5);
    background: rgba(212, 168, 83, 0.1);
    color: rgb(212, 168, 83);
  }

  .ctrl-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .ctrl-btn:disabled:hover {
    border-color: rgb(42, 37, 32);
    background: rgb(26, 26, 26);
    color: #e8e4df;
  }

  .play-btn {
    width: 38px;
    height: 38px;
    border-color: rgba(212, 168, 83, 0.4);
    font-size: 1rem;
  }
  .play-btn.playing {
    border-color: rgb(212, 168, 83);
    background: rgba(212, 168, 83, 0.15);
    color: rgb(212, 168, 83);
  }

  .speed-select {
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid rgb(42, 37, 32);
    background: rgb(26, 26, 26);
    color: rgb(138, 133, 128);
    font-size: 0.8rem;
    cursor: pointer;
    font-family: inherit;
  }

  .speed-select:focus { outline: none; border-color: rgba(212, 168, 83, 0.4); }

  .step-counter {
    font-size: 0.8rem;
    color: rgb(138, 133, 128);
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    margin-left: auto;
  }

  .step-counter span {
    color: rgb(212, 168, 83);
    font-weight: 600;
  }

  /* Panels */
  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  @media (max-width: 640px) {
    .panels { grid-template-columns: 1fr; }
  }

  .panel {
    border: 1px solid rgb(42, 37, 32);
    border-radius: 8px;
    padding: 16px;
    background: rgb(15, 14, 13);
  }

  .panel-title {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgb(138, 133, 128);
    margin-bottom: 12px;
    border-bottom: 1px solid rgb(42, 37, 32);
    padding-bottom: 8px;
  }

  /* Narration Panel */
  .narration-panel {
    min-height: 120px;
  }

  .narration-step-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: rgb(212, 168, 83);
    margin-bottom: 8px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
  }

  .narration-text {
    font-size: 0.88rem;
    color: #e8e4df;
    line-height: 1.7;
  }

  /* State Panel */
  .state-panel {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
  }

  .state-row {
    font-size: 0.78rem;
    color: rgb(138, 133, 128);
    margin-bottom: 9px;
    line-height: 1.4;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .state-row:last-child { margin-bottom: 0; }

  .state-row span {
    color: #e8e4df;
    transition: color 0.3s ease, text-shadow 0.3s ease;
  }

  .state-row span.changed {
    color: rgb(212, 168, 83);
    text-shadow: 0 0 8px rgba(212, 168, 83, 0.5);
    animation: value-flash 0.4s ease;
  }

  @keyframes value-flash {
    0%   { background: rgba(212, 168, 83, 0.3); border-radius: 3px; }
    100% { background: transparent; }
  }

  /* Hidden states */
  .hidden { display: none !important; }

  /* Separator label in state */
  .state-key {
    color: rgb(138, 133, 128);
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="container">

  <h1>Ch11 — Pipeline Resume과 Durability</h1>
  <p class="subtitle">Jenkins controller 장애 시 파이프라인 재개 동작을 시나리오별로 확인합니다</p>

  <!-- Scenario Selector -->
  <div class="scenario-selector">
    <button class="scenario-pill active" onclick="switchScenario(0)">케이스 1: 정상 Resume (sh step)</button>
    <button class="scenario-pill" onclick="switchScenario(1)">케이스 2: Nonresumable 실패 (checkout step)</button>
    <button class="scenario-pill" onclick="switchScenario(2)">케이스 3: disableResume()</button>
    <button class="scenario-pill" onclick="switchScenario(3)">케이스 4: Agent 사망</button>
    <button class="scenario-pill" onclick="switchScenario(4)">케이스 5: 인프라 전체 장애</button>
  </div>

  <!-- Pipeline Flow -->
  <div class="pipeline-section">
    <div class="pipeline-label">파이프라인 흐름</div>
    <div class="pipeline-flow" id="pipelineFlow"></div>
  </div>

  <!-- Start Overlay -->
  <div class="start-overlay" id="startOverlay">
    <button class="start-btn" onclick="startSimulation()">시뮬레이션 시작 ▶</button>
  </div>

  <!-- Controls Bar (hidden until started) -->
  <div class="controls-bar hidden" id="controlsBar">
    <button class="ctrl-btn" id="prevBtn" onclick="goToStep(currentStep - 1)" title="이전">&#8249;</button>
    <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()" title="재생/일시정지">&#9654;</button>
    <button class="ctrl-btn" id="nextBtn" onclick="goToStep(currentStep + 1)" title="다음">&#8250;</button>
    <select class="speed-select" id="speedSelect" onchange="setSpeed(this.value)">
      <option value="2000">0.5x</option>
      <option value="1000" selected>1x</option>
      <option value="500">2x</option>
    </select>
    <div class="step-counter">스텝 <span id="stepCurrent">1</span> / <span id="stepTotal">8</span></div>
  </div>

  <!-- Panels -->
  <div class="panels hidden" id="panelsContainer">
    <!-- Narration -->
    <div class="panel narration-panel">
      <div class="panel-title">내레이션</div>
      <div class="narration-step-name" id="narrationStepName">—</div>
      <div class="narration-text" id="narrationText">시뮬레이션을 시작하면 각 스텝의 설명이 여기에 표시됩니다.</div>
    </div>

    <!-- State Panel -->
    <div class="panel state-panel" id="statePanel">
      <div class="panel-title">Jenkins 내부 상태</div>
      <div class="state-row"><span class="state-key">Pipeline:</span> <span id="sPipeline">—</span></div>
      <div class="state-row"><span class="state-key">Step:</span> <span id="sStep">—</span></div>
      <div class="state-row"><span class="state-key">Durability:</span> <span id="sDurability">—</span></div>
      <div class="state-row"><span class="state-key">FlowNode:</span> <span id="sFlowNode">—</span></div>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// Scenario Data
// ─────────────────────────────────────────────

const scenarios = [
  // Case 1: 정상 Resume
  {
    title: '케이스 1: 정상 Resume (sh step)',
    nodes: [
      { label: 'Init', type: 'normal' },
      { label: 'CPS\nSave', type: 'normal' },
      { label: 'Crash', type: 'fail' },
      { label: 'Restart', type: 'normal' },
      { label: 'Deserialize', type: 'normal' },
      { label: 'Reconnect', type: 'normal' },
      { label: 'Resume', type: 'success' },
      { label: 'Complete', type: 'success' },
    ],
    steps: [
      {
        name: '1. Init — Pipeline 시작',
        narration: 'Pipeline이 시작되고 sh step이 실행된다. CPS(Continuation-Passing Style) Engine이 현재 실행 상태를 FlowNode로 직렬화하기 시작한다.',
        state: { pipeline: 'RUNNING', step: 'sh (durable-task)', durability: 'MAX_SURVIVABILITY', flowNode: 'serialized' },
        nodeClass: 'active',
      },
      {
        name: '2. CPS Save — 상태 디스크 저장',
        narration: 'MAX_SURVIVABILITY 설정이므로 매 step마다 상태가 디스크에 기록된다. 이 직렬화 덕분에 crash 이후 복원이 가능하다.',
        state: { pipeline: 'RUNNING', step: 'sh (running)', durability: 'MAX_SURVIVABILITY', flowNode: '✓ persisted' },
        nodeClass: 'active',
      },
      {
        name: '3. Crash — Controller 종료',
        narration: 'Jenkins controller 프로세스가 예기치 않게 종료되었다. 하지만 agent 위에서 실행 중인 sh 프로세스는 여전히 살아 있을 수 있다.',
        state: { pipeline: 'UNKNOWN', step: 'sh (orphaned)', durability: 'MAX_SURVIVABILITY', flowNode: 'on disk' },
        nodeClass: 'fail',
      },
      {
        name: '4. Restart — Controller 재시작',
        narration: 'Jenkins가 재시작되면 디스크에 저장된 FlowNode 목록을 탐색한다. 실행 중이었던 Pipeline의 흔적을 찾아 복원을 준비한다.',
        state: { pipeline: 'PAUSED', step: 'sh (pending reconnect)', durability: 'MAX_SURVIVABILITY', flowNode: 'loading...' },
        nodeClass: 'active',
      },
      {
        name: '5. Deserialize — FlowNode 역직렬화',
        narration: '저장된 continuation 지점을 복원한다. "as if it were never interrupted"에 가깝게 재개를 시도한다. CPS Engine이 중단 직전의 실행 컨텍스트를 재구성한다.',
        state: { pipeline: 'RESUMING', step: 'sh (reconnecting)', durability: 'MAX_SURVIVABILITY', flowNode: 'deserialized' },
        nodeClass: 'active',
      },
      {
        name: '6. Agent Reconnect — Agent 재연결',
        narration: 'durable-task 플러그인이 agent에서 실행 중이던 프로세스를 찾아 재연결한다. sh 프로세스의 PID를 추적하고 stdout/stderr 스트림을 다시 연결한다.',
        state: { pipeline: 'RESUMING', step: 'sh (reconnected)', durability: 'MAX_SURVIVABILITY', flowNode: 'active' },
        nodeClass: 'active',
      },
      {
        name: '7. Resume — Pipeline 흐름 재개',
        narration: 'sh step이 완료되면 다음 step으로 자연스럽게 진행한다. 마치 중단이 없었던 것처럼 보인다. 이것이 MAX_SURVIVABILITY + durable-task 조합의 핵심 가치다.',
        state: { pipeline: 'RUNNING', step: 'sh (completed)', durability: 'MAX_SURVIVABILITY', flowNode: 'active' },
        nodeClass: 'success',
      },
      {
        name: '8. Complete — 정상 완료',
        narration: 'Resume 성공. Pipeline이 중간 흐름에서 재개되어 정상 완료되었다. 개발자가 재실행할 필요 없이 자동으로 복구되었다.',
        state: { pipeline: 'SUCCESS', step: 'all done', durability: 'MAX_SURVIVABILITY', flowNode: 'archived' },
        nodeClass: 'success',
      },
    ],
  },

  // Case 2: Nonresumable 실패
  {
    title: '케이스 2: Nonresumable 실패 (checkout step)',
    nodes: [
      { label: 'Init', type: 'normal' },
      { label: 'Checkout', type: 'normal' },
      { label: 'Crash', type: 'fail' },
      { label: 'Restart', type: 'normal' },
      { label: 'Resume\nTry', type: 'warn' },
      { label: 'Step\nError', type: 'fail' },
      { label: 'Retry', type: 'warn' },
      { label: 'Recovered', type: 'success' },
    ],
    steps: [
      {
        name: '1. Init — Pipeline 시작',
        narration: 'Pipeline이 시작되고 checkout step에 진입한다. checkout은 nonresumable step으로 분류된다 — restart를 견디도록 설계되어 있지 않다.',
        state: { pipeline: 'RUNNING', step: 'checkout (nonresumable)', durability: 'MAX_SURVIVABILITY', flowNode: 'serialized' },
        nodeClass: 'active',
      },
      {
        name: '2. Checkout — Git 클론 진행',
        narration: 'checkout scm이 실행 중이다. Git 저장소를 클론하는 I/O 집약적 작업이 진행된다. 이 순간 FlowNode는 디스크에 기록되어 있다.',
        state: { pipeline: 'RUNNING', step: 'checkout (cloning...)', durability: 'MAX_SURVIVABILITY', flowNode: '✓ persisted' },
        nodeClass: 'active',
      },
      {
        name: '3. Crash — Controller 종료',
        narration: 'checkout은 nonresumable step이다. FlowNode는 디스크에 있지만, checkout 자체가 restart를 견디지 못한다. 부분적으로 클론된 workspace가 오염된 상태로 남을 수 있다.',
        state: { pipeline: 'UNKNOWN', step: 'checkout (interrupted)', durability: 'MAX_SURVIVABILITY', flowNode: 'on disk' },
        nodeClass: 'fail',
      },
      {
        name: '4. Restart — Controller 재시작',
        narration: 'Jenkins가 재시작되어 FlowNode를 발견했다. 복원을 시도하지만, checkout step의 상태가 문제다.',
        state: { pipeline: 'PAUSED', step: 'checkout (pending)', durability: 'MAX_SURVIVABILITY', flowNode: 'loading...' },
        nodeClass: 'active',
      },
      {
        name: '5. Resume Try — Resume 시도',
        narration: 'FlowNode는 복원되었지만, checkout step 자체가 restart를 견디지 못한다. durable-task와 달리 checkout은 중단 지점에서 재개하는 메커니즘이 없다.',
        state: { pipeline: 'RESUMING', step: 'checkout (cannot resume)', durability: 'MAX_SURVIVABILITY', flowNode: 'deserialized' },
        nodeClass: 'warn',
      },
      {
        name: '6. Step Error — 에러 발생',
        narration: 'nonresumable step이므로 해당 지점에서 에러가 발생한다. retry로 감싸지 않았다면 Pipeline이 실패 상태로 종료된다.',
        state: { pipeline: 'FAILING', step: 'checkout (ERROR)', durability: 'MAX_SURVIVABILITY', flowNode: 'error' },
        nodeClass: 'fail',
      },
      {
        name: '7. Retry — 재실행 시도',
        narration: 'retry(3) { checkout scm }으로 감싸두었다면 처음부터 다시 checkout을 시도한다. nonresumable step을 보호하는 실무 권장 패턴이다.',
        state: { pipeline: 'RUNNING', step: 'checkout (retry 1/3)', durability: 'MAX_SURVIVABILITY', flowNode: 'new' },
        nodeClass: 'warn',
      },
      {
        name: '8. Recovered — 복구 성공',
        narration: '두 번째 시도에서 checkout 성공. nonresumable step은 retry로 보호하는 것이 실무 권장 패턴이다. Pipeline이 정상 흐름으로 복귀했다.',
        state: { pipeline: 'RUNNING', step: 'checkout (success)', durability: 'MAX_SURVIVABILITY', flowNode: 'active' },
        nodeClass: 'success',
      },
    ],
  },

  // Case 3: disableResume()
  {
    title: '케이스 3: disableResume()',
    nodes: [
      { label: 'Init', type: 'normal' },
      { label: 'Running', type: 'normal' },
      { label: 'Crash', type: 'fail' },
      { label: 'Restart', type: 'normal' },
      { label: 'No\nResume', type: 'fail' },
      { label: 'Manual', type: 'warn' },
      { label: 'New\nBuild', type: 'success' },
    ],

    steps: [
      {
        name: '1. Init — disableResume() 선언됨',

// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────

let currentScenario = 0;
let currentStep = -1; // -1 = not started
let isPlaying = false;
let playTimer = null;
let playInterval = 1000;
let prevState = {};

// ─────────────────────────────────────────────
// Render Pipeline Nodes
// ─────────────────────────────────────────────

function renderPipeline() {
  const flow = document.getElementById('pipelineFlow');
  const scenario = scenarios[currentScenario];
  flow.innerHTML = '';

  scenario.nodes.forEach((node, i) => {
    const nodeEl = document.createElement('div');
    nodeEl.className = 'pipeline-node';
    nodeEl.id = 'node-' + i;
    nodeEl.onclick = () => {
      if (currentStep >= 0) goToStep(i);
    };
    nodeEl.title = 'Step ' + (i + 1);

    const circle = document.createElement('div');
    circle.className = 'node-circle';
    circle.textContent = i + 1;

    const label = document.createElement('div');
    label.className = 'node-label';
    label.textContent = node.label;

    nodeEl.appendChild(circle);
    nodeEl.appendChild(label);
    flow.appendChild(nodeEl);

    if (i < scenario.nodes.length - 1) {
      const connector = document.createElement('div');
      connector.className = 'pipeline-connector';
      connector.id = 'connector-' + i;
      flow.appendChild(connector);
    }
  });

  document.getElementById('stepTotal').textContent = scenario.nodes.length;
}

// ─────────────────────────────────────────────
// Update Node Visual
// ─────────────────────────────────────────────

function updateNodes(targetStep) {
  const scenario = scenarios[currentScenario];
  scenario.nodes.forEach((node, i) => {
    const el = document.getElementById('node-' + i);
    if (!el) return;

    el.className = 'pipeline-node';

    const step = scenario.steps[i];

    if (i < targetStep) {
      // Visited: use step's terminal state class
      el.classList.add(step.nodeClass === 'fail' ? 'fail' : step.nodeClass === 'success' ? 'success' : step.nodeClass === 'warn' ? 'warn' : 'visited');
    } else if (i === targetStep) {
      el.classList.add(step.nodeClass);
    }
    // else: inactive (default)
  });
}

// ─────────────────────────────────────────────
// Update State Panel
// ─────────────────────────────────────────────

function updateStatePanel(state) {
  const fields = [
    { id: 'sPipeline', key: 'pipeline' },
    { id: 'sStep', key: 'step' },
    { id: 'sDurability', key: 'durability' },
    { id: 'sFlowNode', key: 'flowNode' },
  ];

  fields.forEach(({ id, key }) => {
    const el = document.getElementById(id);
    if (!el) return;
    const newVal = state[key] || '—';
    el.textContent = newVal;

    if (prevState[key] !== newVal) {
      el.classList.remove('changed');
      void el.offsetWidth; // reflow to restart animation
      el.classList.add('changed');
    } else {
      el.classList.remove('changed');
    }
  });

  prevState = { ...state };
}

// ─────────────────────────────────────────────
// Go To Step
// ─────────────────────────────────────────────

function goToStep(stepIndex) {
  const scenario = scenarios[currentScenario];
  if (stepIndex < 0 || stepIndex >= scenario.steps.length) {
    if (stepIndex >= scenario.steps.length && isPlaying) {
      stopPlay();
    }
    return;
  }

  currentStep = stepIndex;
  const step = scenario.steps[stepIndex];

  // Update nodes
  updateNodes(stepIndex);

  // Update narration
  document.getElementById('narrationStepName').textContent = step.name;
  document.getElementById('narrationText').textContent = step.narration;

  // Update state panel
  updateStatePanel(step.state);

  // Update counter
  document.getElementById('stepCurrent').textContent = stepIndex + 1;

  // Update buttons
  document.getElementById('prevBtn').disabled = (stepIndex === 0);
  document.getElementById('nextBtn').disabled = (stepIndex === scenario.steps.length - 1);
}

// ─────────────────────────────────────────────
// Playback
// ─────────────────────────────────────────────

function startSimulation() {
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('controlsBar').classList.remove('hidden');
  document.getElementById('panelsContainer').classList.remove('hidden');

  prevState = {};
  goToStep(0);
  startPlay();
}

function startPlay() {
  isPlaying = true;
  document.getElementById('playBtn').classList.add('playing');
  document.getElementById('playBtn').textContent = '⏸';

  playTimer = setInterval(() => {
    const scenario = scenarios[currentScenario];
    if (currentStep < scenario.steps.length - 1) {
      goToStep(currentStep + 1);
    } else {
      stopPlay();
    }
  }, playInterval);
}

function stopPlay() {
  isPlaying = false;
  clearInterval(playTimer);
  playTimer = null;
  document.getElementById('playBtn').classList.remove('playing');
  document.getElementById('playBtn').textContent = '▶';
}

function togglePlay() {
  if (isPlaying) {
    stopPlay();
  } else {
    const scenario = scenarios[currentScenario];
    if (currentStep >= scenario.steps.length - 1) {
      // Restart from beginning
      prevState = {};
      goToStep(0);
    }
    startPlay();
  }
}

function setSpeed(val) {
  playInterval = parseInt(val);
  if (isPlaying) {
    stopPlay();
    startPlay();
  }
}

// ─────────────────────────────────────────────
// Scenario Switch
// ─────────────────────────────────────────────

function switchScenario(index) {
  if (index === currentScenario) return;

  stopPlay();
  currentScenario = index;
  currentStep = -1;
  prevState = {};

  // Update pills
  document.querySelectorAll('.scenario-pill').forEach((pill, i) => {
    pill.classList.toggle('active', i === index);
  });

  // Re-render pipeline
  renderPipeline();

  // Show start overlay if we've started before
  const controlsBar = document.getElementById('controlsBar');
  const panelsContainer = document.getElementById('panelsContainer');
  const startOverlay = document.getElementById('startOverlay');

  if (!controlsBar.classList.contains('hidden')) {
    // Already started — auto-start new scenario
    prevState = {};
    goToStep(0);
    startPlay();
  }
}

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────

renderPipeline();
</script>
