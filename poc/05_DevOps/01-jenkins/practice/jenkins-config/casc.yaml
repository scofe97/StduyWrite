# Jenkins Configuration as Code (CasC)
# 참고: https://github.com/jenkinsci/configuration-as-code-plugin

jenkins:
  # 시스템 기본 설정
  systemMessage: "Jenkins CI/CD - Configuration as Code로 관리됨"
  numExecutors: 0  # Controller에서 직접 빌드 실행 금지 (Agent에 위임)

  # 보안 설정: 인증 (Authentication)
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "admin"
          name: "Administrator"

  # 보안 설정: 인가 (Authorization)
  authorizationStrategy:
    globalMatrix:
      permissions:
        - "Overall/Administer:admin"
        - "Overall/Read:authenticated"
        - "Job/Build:authenticated"
        - "Job/Read:authenticated"
        - "Job/Workspace:authenticated"

  # Agent 연결 설정
  remotingSecurity:
    enabled: true
  agentPort: 50000

  # Agent 노드 구성
  nodes:
    - permanent:
        name: "docker-agent"
        remoteFS: "/home/jenkins"
        numExecutors: 2
        labelString: "docker linux"
        mode: NORMAL
        launcher:
          ssh:
            host: "jenkins-agent"
            port: 22
            credentialsId: "agent-ssh-key"
            sshHostKeyVerificationStrategy:
              manuallyTrustedKeyVerificationStrategy:
                requireInitialManualTrust: false

# 도구 설치 설정
tool:
  jdk:
    installations:
      - name: "JDK17"
        properties:
          - installSource:
              installers:
                - temurinInstaller:
                    id: "jdk-17.0.13+11"

  maven:
    installations:
      - name: "Maven3"
        properties:
          - installSource:
              installers:
                - maven:
                    id: "3.9.6"

  nodejs:
    installations:
      - name: "NodeJS22"
        properties:
          - installSource:
              installers:
                - nodeJSInstaller:
                    id: "22.12.0"
                    npmPackagesRefreshHours: 72

# Credentials 설정
credentials:
  system:
    domainCredentials:
      - credentials:
          - basicSSHUserPrivateKey:
              scope: GLOBAL
              id: "agent-ssh-key"
              username: "jenkins"
              description: "SSH key for Jenkins Agent"
              privateKeySource:
                directEntry:
                  privateKey: "${AGENT_SSH_PRIVATE_KEY:-placeholder}"

# 보안 추가 설정
security:
  scriptApproval:
    approvedSignatures: []
  globalJobDslSecurityConfiguration:
    useScriptSecurity: true

# 공유 라이브러리 없는 상태로 시작 (Ch05에서 추가)
unclassified:
  location:
    url: "http://localhost:8080/"
