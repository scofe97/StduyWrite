# OpenTelemetry Collector 설정
# Tail-based Sampling 구현

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # 배치 처리 (IO 최적화)
  batch:
    timeout: 1s
    send_batch_size: 1024

  # Tail-based Sampling 설정
  tail_sampling:
    # 샘플링 결정까지 대기 시간 (Trace 완료 대기)
    decision_wait: 5s
    # 결정 후 추가 Span 대기 시간
    num_traces: 100
    expected_new_traces_per_sec: 10
    
    policies:
      # 정책 1: 에러가 있으면 항상 수집 (최우선)
      - name: error-policy
        type: status_code
        status_code:
          status_codes:
            - ERROR
      
      # 정책 2: 지연 시간 > 500ms 면 수집
      - name: latency-policy
        type: latency
        latency:
          threshold_ms: 500
      
      # 정책 3: 디버깅용 100% 샘플링 (테스트 후 10%로 변경)
      - name: probabilistic-policy
        type: probabilistic
        probabilistic:
          sampling_percentage: 100

exporters:
  # Jaeger로 전송
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  
  # 디버깅용 콘솔 출력
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [tail_sampling, batch]
      exporters: [otlp/jaeger, debug]
