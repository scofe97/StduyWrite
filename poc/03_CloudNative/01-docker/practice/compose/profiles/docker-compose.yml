# Docker Compose Profiles - 환경별 구성
version: '3.8'

services:
  # 기본 서비스 (항상 실행)
  app:
    image: nginx:alpine
    container_name: profile-app
    ports:
      - "8080:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
    networks:
      - profile-net

  # dev 프로파일: 개발 환경
  redis:
    image: redis:alpine
    container_name: profile-redis
    ports:
      - "6379:6379"
    profiles:
      - dev
    networks:
      - profile-net

  # debug 프로파일: 디버깅 도구
  adminer:
    image: adminer:latest
    container_name: profile-adminer
    ports:
      - "8081:8080"
    profiles:
      - debug
    networks:
      - profile-net

  # debug 프로파일: PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: profile-postgres
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DB=testdb
    ports:
      - "5432:5432"
    profiles:
      - debug
    networks:
      - profile-net

networks:
  profile-net:
    driver: bridge
