<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Compose Profiles</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 50px auto;
            padding: 20px;
            background: #2c3e50;
            color: white;
        }
        .container {
            background: #34495e;
            padding: 30px;
            border-radius: 10px;
        }
        h1 { color: #3498db; }
        .profile {
            background: #1a252f;
            padding: 15px;
            margin: 15px 0;
            border-left: 4px solid #3498db;
        }
        code {
            background: #000;
            padding: 2px 6px;
            border-radius: 3px;
            color: #2ecc71;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Docker Compose Profiles Demo</h1>

        <div class="profile">
            <h3>Default (프로파일 없음)</h3>
            <p><code>docker compose up -d</code></p>
            <p>서비스: app (nginx)</p>
        </div>

        <div class="profile">
            <h3>Dev Profile</h3>
            <p><code>docker compose --profile dev up -d</code></p>
            <p>서비스: app + redis</p>
        </div>

        <div class="profile">
            <h3>Debug Profile</h3>
            <p><code>docker compose --profile debug up -d</code></p>
            <p>서비스: app + postgres + adminer</p>
            <p>Adminer: <a href="http://localhost:8081" style="color: #3498db;">http://localhost:8081</a></p>
        </div>
    </div>
</body>
</html>
