# 기본 Docker Compose 스택 (nginx + redis)
version: '3.8'

services:
  web:
    image: nginx:alpine
    container_name: basic-web
    ports:
      - "8080:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    depends_on:
      - cache
    networks:
      - basic-net

  cache:
    image: redis:alpine
    container_name: basic-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - basic-net

networks:
  basic-net:
    driver: bridge

volumes:
  redis-data:
    driver: local
