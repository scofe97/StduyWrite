# kube-prometheus-stack Helm Chart Values Override
# Minikube 환경에 최적화된 설정

# Prometheus Operator 설정
prometheusOperator:
  # 리소스 제한
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Prometheus 설정
prometheus:
  enabled: true

  # Service 설정
  service:
    type: ClusterIP
    port: 9090

  # Ingress 설정 (선택 사항)
  ingress:
    enabled: false
    # className: nginx
    # hosts:
    #   - prometheus.local

  # Prometheus 인스턴스 설정
  prometheusSpec:
    # 복제본 수 (Minikube: 1개)
    replicas: 1

    # 리소스 제한
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # 데이터 보관 기간
    retention: 2h
    retentionSize: 1GB

    # 스토리지 설정
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi
          # storageClassName: standard

    # Service Monitor 선택자
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # 추가 Scrape 설정 (선택 사항)
    # additionalScrapeConfigs:
    #   - job_name: 'custom-app'
    #     static_configs:
    #       - targets: ['app.default.svc.cluster.local:8080']

# Alertmanager 설정
alertmanager:
  enabled: true

  # Service 설정
  service:
    type: ClusterIP
    port: 9093

  # Alertmanager 인스턴스 설정
  alertmanagerSpec:
    # 복제본 수
    replicas: 1

    # 리소스 제한
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

    # 스토리지 설정
    storage:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi

  # Alertmanager 설정
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'null'
      routes:
        - match:
            alertname: Watchdog
          receiver: 'null'
    receivers:
      - name: 'null'
    # Slack 알림 예시:
    # receivers:
    #   - name: 'slack'
    #     slack_configs:
    #       - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
    #         channel: '#alerts'
    #         title: '{{ .GroupLabels.alertname }}'
    #         text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

# Grafana 설정
grafana:
  enabled: true

  # 관리자 설정
  adminPassword: prom-operator

  # Service 설정
  service:
    type: ClusterIP
    port: 80

  # Ingress 설정 (선택 사항)
  ingress:
    enabled: false
    # className: nginx
    # hosts:
    #   - grafana.local

  # 리소스 제한
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

  # 영속성 설정
  persistence:
    enabled: true
    size: 1Gi
    # storageClassName: standard

  # Grafana 설정
  grafana.ini:
    server:
      root_url: http://localhost:3000
    analytics:
      check_for_updates: false
    security:
      admin_user: admin
      admin_password: prom-operator

  # 데이터 소스 (자동 구성)
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://kube-prometheus-stack-prometheus.ch15-monitoring.svc.cluster.local:9090
          access: proxy
          isDefault: true

  # 대시보드 자동 import
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  # 기본 대시보드
  dashboards:
    default:
      # Kubernetes Cluster 대시보드
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      # Node Exporter 대시보드
      node-exporter:
        gnetId: 1860
        revision: 27
        datasource: Prometheus

# Node Exporter 설정 (각 노드의 메트릭 수집)
nodeExporter:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Kube State Metrics 설정 (Kubernetes 리소스 메트릭)
kubeStateMetrics:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# Default Rules 설정 (알림 규칙)
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false  # Minikube: etcd 메트릭 비활성화
    kubeApiserver: true
    kubeApiserverAvailability: true
    kubeApiserverSlos: true
    kubelet: true
    kubeProxy: false  # Minikube: kube-proxy 메트릭 비활성화
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeScheduler: false  # Minikube: scheduler 메트릭 비활성화
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true

# Service Monitor 설정
kubeControllerManager:
  enabled: false  # Minikube: controller-manager 메트릭 비활성화

kubeScheduler:
  enabled: false  # Minikube: scheduler 메트릭 비활성화

kubeEtcd:
  enabled: false  # Minikube: etcd 메트릭 비활성화

---
# 사용 가이드:
#
# 1. Monitoring Stack 설치:
#    helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#      -n ch15-monitoring -f monitoring/values.yaml
#
# 2. Grafana 접속 (Port Forward):
#    kubectl port-forward svc/kube-prometheus-stack-grafana 3000:80 -n ch15-monitoring
#    http://localhost:3000
#    Username: admin
#    Password: prom-operator
#
# 3. Prometheus 접속 (Port Forward):
#    kubectl port-forward svc/kube-prometheus-stack-prometheus 9090:9090 -n ch15-monitoring
#    http://localhost:9090
#
# 4. Alertmanager 접속 (Port Forward):
#    kubectl port-forward svc/kube-prometheus-stack-alertmanager 9093:9093 -n ch15-monitoring
#    http://localhost:9093
#
# 5. Prometheus 쿼리 예시:
#    # CPU 사용률
#    rate(container_cpu_usage_seconds_total[5m])
#
#    # 메모리 사용량
#    container_memory_usage_bytes
#
#    # Pod 상태
#    kube_pod_status_phase{namespace="default"}
#
# 6. ServiceMonitor 생성 (커스텀 앱 모니터링):
#    apiVersion: monitoring.coreos.com/v1
#    kind: ServiceMonitor
#    metadata:
#      name: my-app
#      namespace: ch15-monitoring
#    spec:
#      selector:
#        matchLabels:
#          app: my-app
#      endpoints:
#      - port: metrics
#        interval: 30s
#
# 7. PrometheusRule 생성 (커스텀 알림):
#    apiVersion: monitoring.coreos.com/v1
#    kind: PrometheusRule
#    metadata:
#      name: my-app-alerts
#      namespace: ch15-monitoring
#    spec:
#      groups:
#      - name: my-app
#        interval: 30s
#        rules:
#        - alert: HighErrorRate
#          expr: rate(http_requests_total{status="500"}[5m]) > 0.05
#          for: 5m
#          labels:
#            severity: warning
#          annotations:
#            summary: "High error rate detected"
#
# 주의사항:
# - 초기 부팅 시 수 분 소요 (Prometheus 데이터 수집 시작)
# - Minikube 환경에서는 일부 컴포넌트 메트릭이 비활성화됨
# - 리소스 제한을 낮춰 8GB 메모리 내에서 실행 가능하도록 설정
