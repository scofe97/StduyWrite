# SonarQube Helm Chart Values Override
# Minikube 환경에 최적화된 설정

# SonarQube 이미지
image:
  repository: sonarqube
  tag: "10.3.0-community"
  pullPolicy: IfNotPresent

# Edition (Community, Developer, Enterprise, DataCenter)
edition: "community"

# 리소스 제한 (Minikube 환경)
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Java 옵션
sonarProperties:
  sonar.web.javaOpts: "-Xmx512m -Xms128m"
  sonar.ce.javaOpts: "-Xmx256m -Xms128m"
  sonar.search.javaOpts: "-Xmx256m -Xms256m"

# ElasticSearch 설정 (내장)
elasticsearch:
  # Bootstrap 검사 비활성화 (Minikube 환경)
  bootstrapChecks: false

# 데이터베이스 설정 (내장 H2 사용 - 개발용)
# 프로덕션 환경에서는 PostgreSQL 사용 권장
postgresql:
  enabled: false
  # PostgreSQL 사용 시:
  # enabled: true
  # postgresqlUsername: sonarUser
  # postgresqlPassword: sonarPass
  # postgresqlDatabase: sonarDB
  # resources:
  #   requests:
  #     memory: 256Mi
  #     cpu: 250m
  #   limits:
  #     memory: 512Mi
  #     cpu: 500m

# JDBC 설정 (외부 DB 사용 시)
jdbcOverwrite:
  enable: false
  # PostgreSQL 예시:
  # enable: true
  # jdbcUrl: "jdbc:postgresql://postgres.default.svc.cluster.local:5432/sonarDB"
  # jdbcUsername: "sonarUser"
  # jdbcSecretName: "sonar-postgres-secret"
  # jdbcSecretPasswordKey: "password"

# 영속성 설정
persistence:
  enabled: true
  size: 2Gi
  # storageClass: standard

# Service 설정
service:
  type: ClusterIP
  externalPort: 9000
  internalPort: 9000

# Ingress 설정 (선택 사항)
ingress:
  enabled: false
  # className: nginx
  # hosts:
  #   - name: sonarqube.local
  #     path: /
  # annotations:
  #   nginx.ingress.kubernetes.io/proxy-body-size: "8m"

# Init 컨테이너 설정 (sysctl 설정)
initSysctl:
  enabled: true
  # vm.max_map_count 설정 (ElasticSearch 요구사항)
  sysctlVmMaxMapCount: 262144
  # fs.file-max 설정
  fsFileMax: 65536

# Init 컨테이너 리소스
initResources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

# 플러그인 자동 설치 (선택 사항)
plugins:
  install: []
  # 예시:
  # install:
  #   - "https://github.com/checkstyle/sonar-checkstyle/releases/download/10.12.0/checkstyle-sonar-plugin-10.12.0.jar"
  #   - "https://github.com/spotbugs/sonar-findbugs/releases/download/4.2.3/sonar-findbugs-plugin-4.2.3.jar"

# 관리자 설정
account:
  adminPassword: admin
  currentAdminPassword: admin
  # 초기 설치 후 비밀번호 변경 필요

# Security Context
securityContext:
  fsGroup: 0

# Pod 어노테이션
podAnnotations: {}

# Node Selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Service Account
serviceAccount:
  create: true
  name: sonarqube

# Monitoring (Prometheus)
prometheusExporter:
  enabled: false
  # config:
  #   rules:
  #     - pattern: ".*"

# 추가 환경 변수
env: []
# 예시:
# env:
#   - name: SONAR_WEB_CONTEXT
#     value: "/sonarqube"

---
# 사용 가이드:
#
# 1. SonarQube 설치:
#    helm install sonarqube sonarqube/sonarqube -n ch13-sonarqube -f devtools/sonarqube/values.yaml
#
# 2. 초기 관리자 계정:
#    Username: admin
#    Password: admin
#    (초기 접속 후 비밀번호 변경 필요)
#
# 3. SonarQube 접속 (Port Forward):
#    kubectl port-forward svc/sonarqube-sonarqube 9000:9000 -n ch13-sonarqube
#    http://localhost:9000
#
# 4. 토큰 생성:
#    Administration → Security → Users → Tokens
#
# 5. 프로젝트 분석 예시 (Maven):
#    mvn sonar:sonar \
#      -Dsonar.host.url=http://localhost:9000 \
#      -Dsonar.login=<your-token>
#
# 6. 프로젝트 분석 예시 (Gradle):
#    ./gradlew sonarqube \
#      -Dsonar.host.url=http://localhost:9000 \
#      -Dsonar.login=<your-token>
#
# 7. Jenkins 연동:
#    - Jenkins에서 SonarQube Scanner 플러그인 설치
#    - Manage Jenkins → Configure System → SonarQube servers 추가
#    - Pipeline에서 withSonarQubeEnv 사용
#
# 주의사항:
# - 내장 H2 데이터베이스는 개발/테스트 전용
# - 프로덕션 환경에서는 반드시 PostgreSQL 사용
# - 초기 부팅 시 수 분 소요될 수 있음 (ElasticSearch 초기화)
