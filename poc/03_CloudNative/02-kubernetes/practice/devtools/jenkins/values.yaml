# Jenkins Helm Chart Values Override
# Minikube 환경에 최적화된 설정

# Jenkins Controller 설정
controller:
  # Jenkins 이미지
  image:
    repository: jenkins/jenkins
    tag: "2.426.1-lts"
    pullPolicy: IfNotPresent

  # 리소스 제한 (Minikube 환경)
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  # Java 옵션
  javaOpts: "-Xms256m -Xmx512m"

  # Service 설정
  serviceType: ClusterIP
  servicePort: 8080

  # Ingress 설정 (선택 사항)
  ingress:
    enabled: false
    # className: nginx
    # hostName: jenkins.local
    # annotations:
    #   nginx.ingress.kubernetes.io/ssl-redirect: "false"

  # 관리자 설정
  adminUser: admin
  # adminPassword는 자동 생성됨 (Secret에서 확인)

  # 플러그인 자동 설치
  installPlugins:
    - kubernetes:4029.v5712230ccb_f8
    - workflow-aggregator:596.v8c21c963d92d
    - git:5.2.0
    - configuration-as-code:1670.v564dc8b_982d0
    - docker-workflow:563.vd5d2e5c4007f
    - pipeline-stage-view:2.34
    - blueocean:1.27.9
    - credentials-binding:648.va_5e83543490d
    - github-branch-source:1763.v7e7e0ea_e649e

  # JCasC (Jenkins Configuration as Code)
  JCasC:
    enabled: true
    defaultConfig: true
    configScripts:
      welcome-message: |
        jenkins:
          systemMessage: "Welcome to Jenkins on Kubernetes (Minikube)!"
          numExecutors: 2
          mode: NORMAL

        # Security 설정
        security:
          queueItemAuthenticator:
            authenticators:
            - global:
                strategy: triggeringUsersAuthorizationStrategy

      # Kubernetes Cloud 설정
      kubernetes-cloud: |
        jenkins:
          clouds:
          - kubernetes:
              name: "kubernetes"
              serverUrl: "https://kubernetes.default"
              namespace: "ch12-jenkins"
              jenkinsUrl: "http://jenkins.ch12-jenkins.svc.cluster.local:8080"
              jenkinsTunnel: "jenkins-agent.ch12-jenkins.svc.cluster.local:50000"
              connectTimeout: 0
              readTimeout: 0
              containerCapStr: "10"
              maxRequestsPerHostStr: "32"
              templates:
              - name: "default"
                namespace: "ch12-jenkins"
                label: "jenkins-agent"
                nodeUsageMode: NORMAL
                containers:
                - name: "jnlp"
                  image: "jenkins/inbound-agent:latest"
                  alwaysPullImage: false
                  workingDir: "/home/jenkins/agent"
                  ttyEnabled: true
                  resourceRequestCpu: "100m"
                  resourceRequestMemory: "128Mi"
                  resourceLimitCpu: "200m"
                  resourceLimitMemory: "256Mi"

  # 영속성 설정 (Minikube: 간단히 비활성화 가능)
  persistence:
    enabled: true
    size: 2Gi
    # storageClass: standard

# Agent 설정
agent:
  # Agent 사용 여부
  enabled: true

  # Agent 리소스 제한
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

  # Agent 이미지
  image:
    repository: jenkins/inbound-agent
    tag: "latest"

# RBAC 설정
rbac:
  create: true
  readSecrets: true

# ServiceAccount 설정
serviceAccount:
  create: true
  name: jenkins

# 백업 설정 (선택 사항)
backup:
  enabled: false
  # schedule: "0 2 * * *"  # 매일 새벽 2시
  # destination: "s3://jenkins-backups"

# 모니터링 설정
prometheus:
  enabled: false
  # serviceMonitor:
  #   enabled: true
  #   namespace: ch15-monitoring

# 추가 환경 변수 (선택 사항)
# controller:
#   containerEnv:
#     - name: JAVA_OPTS
#       value: "-Djenkins.install.runSetupWizard=false"

# NetworkPolicy (선택 사항)
networkPolicy:
  enabled: false

---
# 사용 가이드:
#
# 1. Jenkins 설치:
#    helm install jenkins jenkins/jenkins -n ch12-jenkins -f devtools/jenkins/values.yaml
#
# 2. 관리자 비밀번호 확인:
#    kubectl get secret jenkins -n ch12-jenkins -o jsonpath='{.data.jenkins-admin-password}' | base64 -d
#
# 3. Jenkins 접속 (Port Forward):
