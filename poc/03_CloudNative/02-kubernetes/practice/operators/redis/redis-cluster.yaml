apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: RedisCluster
metadata:
  name: redis-cluster
  namespace: ch10-redis
spec:
  # 클러스터 크기 (Leader 노드 수)
  # Follower는 각 Leader에 대해 자동 생성됨 (1:1 비율)
  clusterSize: 3

  # Redis 버전 (컨테이너 이미지)
  kubernetesConfig:
    image: "quay.io/opstree/redis:v7.0.12"
    imagePullPolicy: IfNotPresent

  # Redis 설정
  redisExporter:
    enabled: true  # Prometheus 메트릭 exporter 활성화
    image: "quay.io/opstree/redis-exporter:v1.44.0"
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  # Redis 리소스 제한 (Minikube 환경)
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  # 스토리지 설정
  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi  # Minikube: 작은 용량
        # storageClassName: standard  # Minikube 기본 StorageClass

  # Redis 설정 파일 (redis.conf 오버라이드)
  redisConfig:
    # 추가 설정 (선택 사항)
    additionalRedisConfig: |
      maxmemory 200mb
      maxmemory-policy allkeys-lru
      tcp-keepalive 300
      timeout 300

  # Pod Security Context
  securityContext:
    runAsUser: 1000
    fsGroup: 1000

  # Pod 우선순위 클래스 (선택 사항)
  # priorityClassName: high-priority

  # Node Selector (선택 사항)
  # nodeSelector:
  #   workload: redis

  # Affinity 설정 (Pod를 다른 노드에 분산)
  # affinity:
  #   podAntiAffinity:
  #     preferredDuringSchedulingIgnoredDuringExecution:
  #     - weight: 100
  #       podAffinityTerm:
  #         labelSelector:
  #           matchExpressions:
  #           - key: app
  #             operator: In
  #             values:
  #             - redis-cluster
  #         topologyKey: kubernetes.io/hostname

  # TLS 설정 (선택 사항)
  # TLS:
  #   ca: ca-cert-secret
  #   cert: cert-secret
  #   key: key-secret
  #   secret:
  #     secretName: redis-tls-secret

  # 영속성 설정
  persistence:
    enabled: true
    # RDB 스냅샷 설정
    # rdbConfig:
    #   - "save 900 1"     # 900초 동안 1개 이상 변경 시 저장
    #   - "save 300 10"    # 300초 동안 10개 이상 변경 시 저장
    #   - "save 60 10000"  # 60초 동안 10000개 이상 변경 시 저장

  # Service 설정
  redisClusterConfig:
    # Cluster 모드 설정
    clusterNodeTimeout: "5000"
    clusterReplicas: "1"  # 각 Leader당 1개의 Follower

---
# 접속 정보:
# - Service 이름: redis-cluster.ch10-redis.svc.cluster.local
# - 포트: 6379
#
# 접속 예시 (클러스터 모드):
#   redis-cli -c -h redis-cluster.ch10-redis.svc.cluster.local -p 6379
#
# 클러스터 정보 확인:
#   redis-cli -c -h redis-cluster.ch10-redis.svc.cluster.local -p 6379 CLUSTER NODES
#   redis-cli -c -h redis-cluster.ch10-redis.svc.cluster.local -p 6379 CLUSTER INFO
#
# 비밀번호가 설정된 경우:
#   kubectl get secret redis-cluster-secret -n ch10-redis -o jsonpath='{.data.password}' | base64 -d
