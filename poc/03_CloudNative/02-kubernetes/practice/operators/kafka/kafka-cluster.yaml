apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: kafka-cluster
  namespace: ch11-kafka
spec:
  # Kafka 브로커 설정
  kafka:
    # Kafka 버전
    version: 3.6.0

    # 브로커 수 (Minikube: 1개로 제한)
    replicas: 1

    # 리스너 설정 (클라이언트 접속 방식)
    listeners:
      # 클러스터 내부 접속 (다른 Pod에서 접속)
      - name: plain
        port: 9092
        type: internal
        tls: false
      # 클러스터 내부 접속 (TLS)
      # - name: tls
      #   port: 9093
      #   type: internal
      #   tls: true

    # Kafka 설정 (server.properties 오버라이드)
    config:
      # Replication factor (1 broker이므로 1로 설정)
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1

      # 로그 보관 설정
      log.retention.hours: 24
      log.segment.bytes: 1073741824  # 1GB

      # 압축 설정
      compression.type: producer

      # 자동 토픽 생성 허용
      auto.create.topics.enable: true

    # 스토리지 설정 (Ephemeral: 재시작 시 데이터 삭제)
    storage:
      type: ephemeral
      # 영구 저장소 사용 시 (개발 환경에서는 ephemeral 권장)
      # type: persistent-claim
      # size: 5Gi
      # deleteClaim: false
      # class: standard

    # 리소스 제한 (Minikube 환경)
    resources:
      requests:
        memory: 256Mi
        cpu: 250m
      limits:
        memory: 512Mi
        cpu: 500m

  # ZooKeeper 설정 (Kafka 3.x는 ZooKeeper 필요)
  zookeeper:
    # ZooKeeper 노드 수 (Minikube: 1개)
    replicas: 1

    # 스토리지 설정
    storage:
      type: ephemeral
      # type: persistent-claim
      # size: 2Gi
      # deleteClaim: false
      # class: standard

    # 리소스 제한
    resources:
      requests:
        memory: 128Mi
        cpu: 100m
      limits:
        memory: 256Mi
        cpu: 250m

  # Entity Operator (Topic/User 관리)
  entityOperator:
    # Topic Operator (KafkaTopic CR 관리)
    topicOperator:
      resources:
        requests:
          memory: 64Mi
          cpu: 50m
        limits:
          memory: 128Mi
          cpu: 100m

    # User Operator (KafkaUser CR 관리)
    userOperator:
      resources:
        requests:
          memory: 64Mi
          cpu: 50m
        limits:
          memory: 128Mi
          cpu: 100m

  # Kafka Exporter (Prometheus 메트릭)
  kafkaExporter:
    topicRegex: ".*"
    groupRegex: ".*"
    resources:
      requests:
        memory: 64Mi
        cpu: 50m
      limits:
        memory: 128Mi
        cpu: 100m

---
# 접속 정보:
# - Bootstrap 서버: kafka-cluster-kafka-bootstrap.ch11-kafka.svc.cluster.local:9092
#
# 접속 예시:
#   kubectl run kafka-consumer -ti --image=quay.io/strimzi/kafka:latest-kafka-3.6.0 --rm=true --restart=Never \
#     -- bin/kafka-console-consumer.sh --bootstrap-server kafka-cluster-kafka-bootstrap.ch11-kafka.svc.cluster.local:9092 \
#     --topic sample-topic --from-beginning
#
# Producer 예시:
#   kubectl run kafka-producer -ti --image=quay.io/strimzi/kafka:latest-kafka-3.6.0 --rm=true --restart=Never \
#     -- bin/kafka-console-producer.sh --bootstrap-server kafka-cluster-kafka-bootstrap.ch11-kafka.svc.cluster.local:9092 \
#     --topic sample-topic
