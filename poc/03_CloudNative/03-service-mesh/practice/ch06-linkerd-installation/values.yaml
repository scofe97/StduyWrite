# Linkerd Control Plane - Local Development Values
# Usage: helm install linkerd-control-plane linkerd/linkerd-control-plane -f values.yaml

# Identity (trust anchor) - MUST replace for production
identityTrustAnchorsPEM: |
  # Generate with: step certificate create root.linkerd.cluster.local ca.crt ca.key --profile root-ca --no-password --insecure
  # Then paste ca.crt contents here

identity:
  issuer:
    scheme: kubernetes.io/tls
    # For production: use cert-manager
    # For local: linkerd install --identity-trust-anchors-file ca.crt --identity-issuer-certificate-file issuer.crt --identity-issuer-key-file issuer.key

# Proxy resources for local development (reduced)
proxy:
  resources:
    cpu:
      request: 10m
      limit: 100m
    memory:
      request: 20Mi
      limit: 50Mi

# Control plane resources (reduced for Kind)
controllerResources: &controller_resources
  cpu:
    request: 10m
    limit: 100m
  memory:
    request: 50Mi
    limit: 250Mi

destinationResources: *controller_resources
identityResources: *controller_resources
proxyInjectorResources: *controller_resources
