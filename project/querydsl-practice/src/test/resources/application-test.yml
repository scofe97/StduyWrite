spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        show_sql: false
        default_batch_fetch_size: 100

decorator:
  datasource:
    datasource-proxy:
      logging: slf4j
      query:
        enable-logging: false
      slow-query:
        enable-logging: false

logging:
  level:
    root: warn
    org.hibernate.SQL: debug
    org.hibernate.tool.schema: warn
    org.hibernate.orm.jdbc.bind: trace
    com.runnershigh: info
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level %logger{0} - %msg%n"
