# My Assistant Configuration
telegram:
  token: "${TELEGRAM_BOT_TOKEN}"

anthropic:
  api_key: "${ANTHROPIC_API_KEY}"
  model: "claude-sonnet-4-5-20250929"
  max_tokens: 4096

agent:
  max_iterations: 10
  system_prompt: |
    당신은 개인 AI 비서입니다. 사용자의 일상을 도와주세요.
    메모 저장, 리마인더 설정, 웹 검색, 날씨 조회 등의 도구를 사용할 수 있습니다.
    한국어로 자연스럽게 대화하세요.

  conversation_limit: 50  # 대화 이력 유지 개수

database:
  path: "data/assistant.db"

weather:
  api_key: "${OPENWEATHER_API_KEY}"  # OpenWeatherMap API key (optional)
