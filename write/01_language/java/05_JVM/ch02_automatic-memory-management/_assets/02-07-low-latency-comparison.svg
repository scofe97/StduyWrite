<svg viewBox="0 0 900 640" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>Shenandoah와 ZGC 비교 — 최신 위치 정보를 어디에 두는가</title>
  <desc>Shenandoah는 객체 쪽 forwarding pointer로 최신 위치를 찾고, ZGC는 포인터 쪽 colored bits로 최신 여부를 판단한다. 둘 다 pause를 줄이는 대신 barrier 비용을 만든다.</desc>
  <defs>
    <style>
      .title{font-size:18px;font-weight:800;fill:#e8e4df}.sub{font-size:11px;fill:rgb(138,133,128)}.head{font-size:13px;font-weight:800;fill:rgb(212,168,83)}.label{font-size:11px;font-weight:750;fill:#e8e4df}.body{font-size:10px;fill:rgb(180,175,170)}.note{font-size:9.5px;fill:rgb(138,133,128)}.code{font-size:10px;font-weight:700;fill:rgb(212,168,83);font-family:'JetBrains Mono',monospace}.bad{font-size:10px;font-weight:750;fill:#e57373}.ok{font-size:10px;font-weight:750;fill:#81c784}
    </style>
  </defs>
  <rect x="0" y="0" width="900" height="640" fill="#0d0d0d"/>
  <text x="26" y="36" class="title">Shenandoah vs ZGC — 같은 목표, 다른 저장 위치</text>
  <text x="26" y="56" class="sub">둘 다 객체 이동 중 접근을 허용하지만, 최신 위치 판단 정보를 어디에 두는지가 다르다.</text>

  <rect x="24" y="84" width="414" height="362" rx="8" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="48" y="114" class="head">① Shenandoah</text>
  <rect x="58" y="144" width="328" height="70" rx="6" fill="#1e3a4a" stroke="#4a8ab0"/>
  <text x="222" y="170" class="label" text-anchor="middle">객체 쪽에 정보 저장</text>
  <text x="222" y="190" class="code" text-anchor="middle">object.fwd → self/new</text>
  <rect x="58" y="238" width="328" height="156" rx="6" fill="#111" stroke="#333"/>
  <text x="82" y="266" class="code">확인 대상</text><text x="178" y="266" class="body">forwarding pointer</text>
  <text x="82" y="294" class="code">읽기 흐름</text><text x="178" y="294" class="body">객체 도착 후 fwd를 따라감</text>
  <text x="82" y="322" class="code">비용</text><text x="178" y="322" class="body">객체당 추가 워드 + Read Barrier</text>
  <text x="82" y="350" class="code">의미</text><text x="178" y="350" class="body">어떤 참조로 와도 객체가 최신 위치를 안내</text>

  <rect x="462" y="84" width="414" height="362" rx="8" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="486" y="114" class="head">② ZGC</text>
  <rect x="496" y="144" width="328" height="70" rx="6" fill="#2a2a1a" stroke="rgb(212,168,83)"/>
  <text x="660" y="170" class="label" text-anchor="middle">포인터 쪽에 정보 저장</text>
  <text x="660" y="190" class="code" text-anchor="middle">colored pointer = bits + address</text>
  <rect x="496" y="238" width="328" height="156" rx="6" fill="#111" stroke="#333"/>
  <text x="520" y="266" class="code">확인 대상</text><text x="616" y="266" class="body">포인터의 상태 비트</text>
  <text x="520" y="294" class="code">읽기 흐름</text><text x="616" y="294" class="body">참조 로드 순간 stale 여부 검사</text>
  <text x="520" y="322" class="code">비용</text><text x="616" y="322" class="body">주소 비트 전제 + Load Barrier</text>
  <text x="520" y="350" class="code">의미</text><text x="616" y="350" class="body">포인터 자체가 현재 단계 기준 최신성 표현</text>

  <rect x="24" y="476" width="852" height="108" rx="8" fill="#111" stroke="#333"/>
  <text x="48" y="506" class="head">③ 선택 기준</text>
  <text x="68" y="532" class="body">저지연 GC는 "최악 pause를 낮추는 것"이 목표다. 웹 API·거래성 서비스처럼 p99/p999 응답 시간이 중요한 곳에 맞다.</text>
  <text x="68" y="552" class="body">배치·대량 처리처럼 전체 완료 시간이 더 중요하고 pause 요구가 느슨하면, barrier 비용 때문에 Parallel이나 G1이 더 나을 수 있다.</text>
  <text x="68" y="572" class="note">결론: 항상 좋은 GC가 아니라, pause 목표가 강한 워크로드를 위한 선택지다.</text>
</svg>
