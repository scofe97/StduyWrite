<svg viewBox="0 0 920 640" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>CMS — 마크-스윕을 메모리 위에서: 객체를 안 옮겨 빈칸이 흩어진다(단편화)</title>
  <desc>CMS는 Old 영역의 객체를 표시(mark)하고 죽은 것을 쓸어냄(sweep)으로 회수하되, 살아있는 객체를 옮기지 않는다. 그래서 회수 후 빈 공간이 죽은 객체가 있던 자리마다 듬성듬성 생긴다(외부 단편화). 큰 객체가 들어올 연속 빈칸이 모자라면 Concurrent Mode Failure가 나서 Serial Old의 STW Full GC로 떨어진다. 네 단계 중 긴 두 단계(동시 마크·동시 스윕)는 앱과 동시에 돌아 STW가 초기 마크·재마크 둘로 짧다.</desc>
  <defs>
    <style>
      .title { font-size: 16px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11px; fill: rgb(138,133,128); }
      .shead { font-size: 13px; font-weight: 800; fill: rgb(212,168,83); }
      .lbl   { font-size: 11px; font-weight: 700; fill: #e8e4df; }
      .note  { font-size: 10px; fill: rgb(160,155,150); }
      .tag   { font-size: 10px; font-weight: 700; }
      .stw   { font-size: 9.5px; font-weight: 800; }
    </style>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="rgb(212,168,83)"/></marker>
  </defs>
  <rect x="0" y="0" width="920" height="640" fill="#0d0d0d"/>
  <text x="24" y="32" class="title">CMS — 마크-스윕을 메모리 위에서 보기</text>
  <text x="24" y="52" class="sub">객체를 *옮기지 않고* 죽은 것만 쓸어낸다 → 빈칸이 자리마다 흩어진다(단편화). 그게 CMS의 약점.</text>

  <!-- 단계 타임라인 (STW vs 동시) -->
  <text x="24" y="86" class="shead">① 네 단계 — 긴 두 단계(마크·스윕)는 앱과 동시, STW는 짧은 둘뿐</text>
  <g transform="translate(24,98)">
    <rect x="0" y="0" width="180" height="46" rx="5" fill="#2a1414" stroke="#e57373"/>
    <text x="90" y="20" class="lbl" text-anchor="middle" fill="#f5b0b0">1. 초기 마크</text>
    <text x="90" y="37" class="stw" text-anchor="middle" fill="#e57373">STW (짧음) · Root만</text>
    <rect x="196" y="0" width="220" height="46" rx="5" fill="#15300f" stroke="#66bb6a"/>
    <text x="306" y="20" class="lbl" text-anchor="middle" fill="#81c784">2. 동시 마크</text>
    <text x="306" y="37" class="stw" text-anchor="middle" fill="#81c784">앱과 동시 (긺) · 그래프 탐색</text>
    <rect x="428" y="0" width="180" height="46" rx="5" fill="#2a1414" stroke="#e57373"/>
    <text x="518" y="20" class="lbl" text-anchor="middle" fill="#f5b0b0">3. 재마크</text>
    <text x="518" y="37" class="stw" text-anchor="middle" fill="#e57373">STW (짧음) · 증분 갱신 보정</text>
    <rect x="620" y="0" width="252" height="46" rx="5" fill="#15300f" stroke="#66bb6a"/>
    <text x="746" y="20" class="lbl" text-anchor="middle" fill="#81c784">4. 동시 스윕</text>
    <text x="746" y="37" class="stw" text-anchor="middle" fill="#81c784">앱과 동시 (긺) · 죽은 객체 쓸어냄</text>
  </g>

  <!-- 메모리: 스윕 전 -->
  <text x="24" y="186" class="shead">② Old 영역 메모리 — 스윕 전후 (■살아있음 · ▨죽음 · ☐빈칸)</text>
  <text x="24" y="212" class="note">스윕 전 — 살아있는 객체와 죽은 객체가 섞여 빽빽</text>
  <g transform="translate(24,222)" font-size="11">
    <rect x="0" y="0" width="848" height="44" rx="4" fill="#0d0d0d" stroke="#5a5a5a"/>
    <!-- live -->
    <rect x="6" y="6" width="64" height="32" fill="#5b9bd5" stroke="#3a6a90"/><text x="38" y="26" text-anchor="middle" fill="#0d1a26" font-weight="700">A</text>
    <rect x="74" y="6" width="48" height="32" fill="#7a2828" stroke="#e57373"/><text x="98" y="26" text-anchor="middle" fill="#f5b0b0">×</text>
    <rect x="126" y="6" width="90" height="32" fill="#5b9bd5" stroke="#3a6a90"/><text x="171" y="26" text-anchor="middle" fill="#0d1a26" font-weight="700">B</text>
    <rect x="220" y="6" width="56" height="32" fill="#7a2828" stroke="#e57373"/><text x="248" y="26" text-anchor="middle" fill="#f5b0b0">×</text>
    <rect x="280" y="6" width="60" height="32" fill="#5b9bd5" stroke="#3a6a90"/><text x="310" y="26" text-anchor="middle" fill="#0d1a26" font-weight="700">C</text>
    <rect x="344" y="6" width="72" height="32" fill="#7a2828" stroke="#e57373"/><text x="380" y="26" text-anchor="middle" fill="#f5b0b0">×</text>
    <rect x="420" y="6" width="80" height="32" fill="#5b9bd5" stroke="#3a6a90"/><text x="460" y="26" text-anchor="middle" fill="#0d1a26" font-weight="700">D</text>
    <rect x="504" y="6" width="50" height="32" fill="#7a2828" stroke="#e57373"/><text x="529" y="26" text-anchor="middle" fill="#f5b0b0">×</text>
    <rect x="558" y="6" width="70" height="32" fill="#5b9bd5" stroke="#3a6a90"/><text x="593" y="26" text-anchor="middle" fill="#0d1a26" font-weight="700">E</text>
    <rect x="632" y="6" width="60" height="32" fill="#7a2828" stroke="#e57373"/><text x="662" y="26" text-anchor="middle" fill="#f5b0b0">×</text>
    <rect x="696" y="6" width="88" height="32" fill="#5b9bd5" stroke="#3a6a90"/><text x="740" y="26" text-anchor="middle" fill="#0d1a26" font-weight="700">F</text>
    <rect x="788" y="6" width="54" height="32" fill="#7a2828" stroke="#e57373"/><text x="815" y="26" text-anchor="middle" fill="#f5b0b0">×</text>
  </g>

  <text x="436" y="290" text-anchor="middle" fill="rgb(212,168,83)" font-size="16">↓ 스윕: 죽은(×) 것만 쓸어냄 — 살아있는 건 *그 자리 그대로*</text>

  <text x="24" y="318" class="note">스윕 후 — 죽은 자리가 빈칸이 됐지만 살아있는 건 안 움직임 → 빈칸이 *흩어짐*</text>
  <g transform="translate(24,328)" font-size="11">
    <rect x="0" y="0" width="848" height="44" rx="4" fill="#0d0d0d" stroke="#5a5a5a"/>
    <rect x="6" y="6" width="64" height="32" fill="#5b9bd5" stroke="#3a6a90"/><text x="38" y="26" text-anchor="middle" fill="#0d1a26" font-weight="700">A</text>
    <rect x="74" y="6" width="48" height="32" fill="#161616" stroke="#444" stroke-dasharray="3,2"/>
    <rect x="126" y="6" width="90" height="32" fill="#5b9bd5" stroke="#3a6a90"/><text x="171" y="26" text-anchor="middle" fill="#0d1a26" font-weight="700">B</text>
    <rect x="220" y="6" width="56" height="32" fill="#161616" stroke="#444" stroke-dasharray="3,2"/>
    <rect x="280" y="6" width="60" height="32" fill="#5b9bd5" stroke="#3a6a90"/><text x="310" y="26" text-anchor="middle" fill="#0d1a26" font-weight="700">C</text>
    <rect x="344" y="6" width="72" height="32" fill="#161616" stroke="#444" stroke-dasharray="3,2"/>
    <rect x="420" y="6" width="80" height="32" fill="#5b9bd5" stroke="#3a6a90"/><text x="460" y="26" text-anchor="middle" fill="#0d1a26" font-weight="700">D</text>
    <rect x="504" y="6" width="50" height="32" fill="#161616" stroke="#444" stroke-dasharray="3,2"/>
    <rect x="558" y="6" width="70" height="32" fill="#5b9bd5" stroke="#3a6a90"/><text x="593" y="26" text-anchor="middle" fill="#0d1a26" font-weight="700">E</text>
    <rect x="632" y="6" width="60" height="32" fill="#161616" stroke="#444" stroke-dasharray="3,2"/>
    <rect x="696" y="6" width="88" height="32" fill="#5b9bd5" stroke="#3a6a90"/><text x="740" y="26" text-anchor="middle" fill="#0d1a26" font-weight="700">F</text>
    <rect x="788" y="6" width="54" height="32" fill="#161616" stroke="#444" stroke-dasharray="3,2"/>
  </g>
  <text x="24" y="392" class="note">→ 빈칸(☐)이 작은 조각으로 흩어졌다. 총 빈 공간은 넉넉해도 *연속된* 큰 빈칸이 없다 = <tspan fill="#e57373" font-weight="700">외부 단편화</tspan></text>

  <!-- Concurrent Mode Failure -->
  <text x="24" y="430" class="shead">③ 그래서 — 큰 객체가 들어올 연속 빈칸이 없으면 Concurrent Mode Failure</text>
  <g transform="translate(24,442)">
    <rect x="0" y="0" width="300" height="58" rx="6" fill="#2a1414" stroke="#e57373"/>
    <text x="150" y="24" class="lbl" text-anchor="middle" fill="#f5b0b0">큰 객체 G 할당 요청</text>
    <text x="150" y="44" class="note" text-anchor="middle">흩어진 작은 빈칸엔 못 들어감</text>
    <line x1="300" y1="29" x2="344" y2="29" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ar)"/>
    <rect x="346" y="0" width="240" height="58" rx="6" fill="#2a1f0a" stroke="#d4a853"/>
    <text x="466" y="24" class="lbl" text-anchor="middle" fill="#f5d76e">Concurrent Mode Failure</text>
    <text x="466" y="44" class="note" text-anchor="middle">CMS가 동시 회수를 포기</text>
    <line x1="586" y1="29" x2="630" y2="29" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ar)"/>
    <rect x="632" y="0" width="216" height="58" rx="6" fill="#2a1414" stroke="#e57373"/>
    <text x="740" y="24" class="lbl" text-anchor="middle" fill="#f5b0b0">Serial Old로 폴백</text>
    <text x="740" y="44" class="note" text-anchor="middle">단일 스레드 STW Full GC(수 초)</text>
  </g>

  <!-- 핵심 -->
  <rect x="24" y="520" width="872" height="96" rx="8" fill="#141414" stroke="#2a2520"/>
  <text x="42" y="546" class="lbl" fill="rgb(212,168,83)">핵심 — 왜 마크-스윕인가, 그 대가는</text>
  <text x="42" y="570" class="note">• 객체를 *안 옮기니까* 동시 스윕이 쉽다(이동하면 참조 주소가 바뀌어 앱과 동시 수행이 어렵다). 그래서 CMS가 동시화를 해냈다.</text>
  <text x="42" y="590" class="note">• 대가는 단편화 — 빈칸이 흩어져 연속 공간이 모자라면 Concurrent Mode Failure로 STW Full GC가 한꺼번에 터진다.</text>
  <text x="42" y="610" class="note">• 이 "안 옮겨서 생기는 단편화"를 G1이 *Region 복사(evacuation)* 로 푼다 → 다음 그림.</text>
</svg>
