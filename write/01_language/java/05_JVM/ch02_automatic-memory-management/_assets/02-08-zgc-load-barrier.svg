<svg viewBox="0 0 920 640" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>ZGC — colored pointer를 메모리 위에서: 상태를 객체가 아니라 포인터 비트에 담는다</title>
  <desc>ZGC는 객체 헤더를 건드리지 않는다. 대신 64비트 포인터에서 안 쓰이는 상위 비트에 marked·remapped 같은 GC 상태를 인코딩한다. 이것이 colored pointer다. 앱이 참조를 로드할 때 Load Barrier가 포인터의 컬러 비트만 비교 한 번으로 검사한다. 비트가 현재 GC 단계와 맞으면 그대로 통과하는 fast path이고, 낡았을 때만 remap해서 주소를 고치고 비트를 갱신하는 slow path다. 대부분의 읽기가 fast path라 throughput 비용이 약 5퍼센트로 작고, 객체 헤더에 forwarding pointer를 추가하지 않으니 메모리 오버헤드도 거의 없다.</desc>
  <defs>
    <style>
      .title { font-size: 16px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11px; fill: rgb(138,133,128); }
      .shead { font-size: 13px; font-weight: 800; fill: rgb(212,168,83); }
      .lbl   { font-size: 11px; font-weight: 700; fill: #e8e4df; }
      .note  { font-size: 10px; fill: rgb(160,155,150); }
      .cell  { font-size: 11px; font-weight: 700; }
      .mono  { font-size: 10px; font-family: 'SFMono-Regular', ui-monospace, monospace; }
    </style>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="rgb(212,168,83)"/></marker>
    <marker id="arB" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#5b9bd5"/></marker>
    <marker id="arG" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#66bb6a"/></marker>
    <marker id="arR" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#e57373"/></marker>
  </defs>
  <rect x="0" y="0" width="920" height="640" fill="#0d0d0d"/>
  <text x="24" y="32" class="title">ZGC — colored pointer를 메모리 위에서 보기</text>
  <text x="24" y="52" class="sub">상태를 *객체가 아니라 포인터 비트*에 담는다. 앱은 읽을 때 비트만 보고 *대부분 그냥 통과*, 낡았을 때만 고친다.</text>

  <!-- ① 포인터 비트 구조 -->
  <text x="24" y="86" class="shead">① colored pointer — 64비트 포인터의 안 쓰는 상위 비트에 GC 상태를 인코딩 (객체 헤더는 그대로)</text>
  <g transform="translate(24,100)">
    <rect x="0" y="0" width="848" height="48" rx="5" fill="#0d0d0d" stroke="#5a5a5a"/>
    <rect x="6" y="6" width="70" height="36" fill="#3a2f10" stroke="#d4a853"/><text x="41" y="22" class="mono" text-anchor="middle" fill="#f5d76e">unused</text><text x="41" y="35" class="note" text-anchor="middle">예약</text>
    <rect x="80" y="6" width="80" height="36" fill="#2a1f0a" stroke="#d4a853"/><text x="120" y="22" class="mono" text-anchor="middle" fill="#f5d76e">finaliz.</text>
    <rect x="164" y="6" width="80" height="36" fill="#2a1f0a" stroke="#d4a853"/><text x="204" y="22" class="mono" text-anchor="middle" fill="#f5d76e">remapped</text>
    <rect x="248" y="6" width="70" height="36" fill="#2a1f0a" stroke="#d4a853"/><text x="283" y="22" class="mono" text-anchor="middle" fill="#f5d76e">marked1</text>
    <rect x="322" y="6" width="70" height="36" fill="#2a1f0a" stroke="#d4a853"/><text x="357" y="22" class="mono" text-anchor="middle" fill="#f5d76e">marked0</text>
    <rect x="396" y="6" width="446" height="36" fill="#2a3550" stroke="#5b9bd5"/><text x="619" y="26" class="cell" text-anchor="middle" fill="#9ec9e8">address (실제 객체 주소, 42비트)</text>
  </g>
  <text x="24" y="168" class="note">↑ <tspan fill="#f5d76e" font-weight="700">상태 비트(marked·remapped)</tspan> + <tspan fill="#9ec9e8" font-weight="700">주소</tspan>가 *포인터 한 워드*에. "마크됐나·이동됐나·최신인가"를 포인터만 보고 안다.</text>
  <text x="24" y="188" class="note">↔ Shenandoah와 대비: Shenandoah는 이 정보를 *객체 헤더(fwd 워드)*에 뒀다. ZGC는 *포인터*에 둬서 <tspan fill="#81c784" font-weight="700">객체 헤더를 안 건드린다 → 메모리 오버헤드 거의 0</tspan>.</text>

  <!-- ② Load Barrier 분기 -->
  <text x="24" y="226" class="shead">② Load Barrier — 참조를 읽을 때 비트만 검사(비교 1회). 맞으면 통과(fast), 낡았을 때만 고침(slow)</text>
  <g transform="translate(24,240)">
    <rect x="0" y="24" width="180" height="50" rx="6" fill="#101820" stroke="#5b9bd5"/>
    <text x="90" y="46" class="lbl" text-anchor="middle" fill="#9ec9e8">앱: 참조 로드</text>
    <text x="90" y="64" class="note" text-anchor="middle">obj = field</text>
    <line x1="180" y1="49" x2="224" y2="49" stroke="#5b9bd5" stroke-width="2" marker-end="url(#arB)"/>
    <!-- 검사 다이아몬드 대체: 박스 -->
    <rect x="226" y="20" width="180" height="58" rx="6" fill="#1a1a1a" stroke="#d4a853"/>
    <text x="316" y="44" class="lbl" text-anchor="middle" fill="#f5d76e">비트가 현재 단계와</text>
    <text x="316" y="62" class="lbl" text-anchor="middle" fill="#f5d76e">일치하는가? (비교 1회)</text>
    <!-- fast path -->
    <line x1="406" y1="38" x2="470" y2="26" stroke="#66bb6a" stroke-width="2" marker-end="url(#arG)"/>
    <text x="438" y="20" class="note" fill="#81c784" text-anchor="middle">예 (대부분)</text>
    <rect x="474" y="0" width="374" height="42" rx="6" fill="#15300f" stroke="#66bb6a"/>
    <text x="661" y="18" class="lbl" text-anchor="middle" fill="#81c784">fast path — 그대로 통과, 우회 없음</text>
    <text x="661" y="34" class="note" text-anchor="middle">비용 = 비교+분기 1회. 대부분 여기로 → throughput ~5%만 손해</text>
    <!-- slow path -->
    <line x1="406" y1="60" x2="470" y2="72" stroke="#e57373" stroke-width="2" marker-end="url(#arR)"/>
    <text x="438" y="86" class="note" fill="#f5b0b0" text-anchor="middle">낡음 (드묾)</text>
    <rect x="474" y="56" width="374" height="42" rx="6" fill="#2a1414" stroke="#e57373"/>
    <text x="661" y="74" class="lbl" text-anchor="middle" fill="#f5b0b0">slow path — remap: 새 주소로 고치고 비트 갱신</text>
    <text x="661" y="90" class="note" text-anchor="middle">self-healing: 한 번 고치면 다음 읽기는 fast path</text>
  </g>
  <text x="24" y="360" class="note">→ 핵심은 <tspan fill="#81c784" font-weight="700">"항상 우회"가 아니라 "대부분 통과"</tspan>. Shenandoah가 매 읽기에 fwd를 따라간 것과 달리, ZGC는 비트만 보고 필요할 때만 움직인다.</text>

  <!-- ③ ZGC 단계 -->
  <text x="24" y="398" class="shead">③ 전체 단계 — 마크·재배치 모두 동시, STW는 ms 미만</text>
  <g transform="translate(24,410)" font-size="9.5" font-weight="800">
    <rect x="0" y="0" width="170" height="30" rx="4" fill="#2a1414" stroke="#e57373"/><text x="85" y="19" text-anchor="middle" fill="#f5b0b0">마크 시작 STW (ms 미만)</text>
    <rect x="176" y="0" width="240" height="30" rx="4" fill="#15300f" stroke="#66bb6a"/><text x="296" y="19" text-anchor="middle" fill="#81c784">동시 마크 / 재배치 결정</text>
    <rect x="422" y="0" width="176" height="30" rx="4" fill="#2a1414" stroke="#e57373"/><text x="510" y="19" text-anchor="middle" fill="#f5b0b0">재배치 시작 STW (ms 미만)</text>
    <rect x="604" y="0" width="244" height="30" rx="4" fill="#15300f" stroke="#66bb6a"/><text x="726" y="19" text-anchor="middle" fill="#81c784">동시 재배치 (객체 이동)</text>
  </g>
  <text x="24" y="462" class="note">→ 일시 정지가 *언제나 1ms 이하*. 16TB 힙까지 지원 — 가장 큰 힙을 가장 짧은 정지로 다룬다.</text>

  <!-- 핵심 -->
  <rect x="24" y="486" width="872" height="130" rx="8" fill="#141414" stroke="#2a2520"/>
  <text x="42" y="512" class="lbl" fill="rgb(212,168,83)">핵심 — colored pointer가 무엇을 바꾸는가</text>
  <text x="42" y="536" class="note">• 상태를 *포인터 비트*에 담아, 앱이 참조를 읽는 순간 *비교 한 번*으로 최신 여부를 판정한다.</text>
  <text x="42" y="556" class="note">• fast path(대부분) = 우회 없이 통과 → throughput ~5%.  slow path(드묾) = remap 후 self-healing.</text>
  <text x="42" y="576" class="note">• 객체 헤더에 fwd 워드를 안 붙이니 <tspan fill="#81c784" font-weight="700">메모리 오버헤드 거의 0</tspan> (Shenandoah와 갈리는 지점).</text>
  <text x="42" y="596" class="note">• 대가: 포인터 비트를 쓰는 트릭이라 구현이 복잡하고, 주소 공간 일부를 상태 비트에 내준다.</text>
  <text x="42" y="612" class="note">• 두 컬렉터의 저장 위치·비용을 한 표로 비교 → 다음 그림.</text>
</svg>
