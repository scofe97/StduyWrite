<svg viewBox="0 0 900 680" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>G1 — Region 단위로 회수 가치가 큰 영역을 고르고 살아 있는 객체만 복사</title>
  <desc>G1은 힙을 여러 Region으로 나누고 각 Region에 Eden, Survivor, Old, Humongous 역할을 배치한다. 회수 가치가 큰 Region을 먼저 고른 뒤 살아 있는 객체를 다른 Region으로 복사하고 기존 Region을 통째로 비워 단편화를 줄인다. Region마다 Remembered Set을 유지하는 비용이 있다.</desc>
  <defs><style>.title{font-size:17px;font-weight:800;fill:#e8e4df}.sub{font-size:11px;fill:rgb(138,133,128)}.head{font-size:13px;font-weight:800;fill:rgb(212,168,83)}.label{font-size:11px;font-weight:750;fill:#e8e4df}.body{font-size:10px;fill:rgb(180,175,170)}.note{font-size:9.5px;fill:rgb(138,133,128)}.code{font-size:10px;font-weight:700;fill:rgb(212,168,83);font-family:'JetBrains Mono',monospace}.ok{font-size:10px;font-weight:750;fill:#81c784}.bad{font-size:10px;font-weight:750;fill:#e57373}</style><marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="rgb(212,168,83)"/></marker><marker id="arr-red" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#e57373"/></marker></defs>
  <rect x="0" y="0" width="900" height="680" fill="#0d0d0d"/>
  <text x="26" y="36" class="title">G1 — Region 기반 Garbage First</text>
  <text x="26" y="55" class="sub">세대 역할은 유지하되, 연속 공간 대신 여러 Region에 Eden·Survivor·Old·Humongous 역할을 배치한다</text>
  <rect x="24" y="84" width="852" height="160" rx="8" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="46" y="112" class="head">① Region 기반 힙</text>
  <g transform="translate(58,142)">
    <rect x="0" y="0" width="62" height="48" rx="5" fill="#1e3a4a" stroke="#4a8ab0"/><text x="31" y="21" class="label" text-anchor="middle">E</text><text x="31" y="37" class="note" text-anchor="middle">Eden</text>
    <rect x="72" y="0" width="62" height="48" rx="5" fill="#1e3a4a" stroke="#4a8ab0"/><text x="103" y="21" class="label" text-anchor="middle">E</text><text x="103" y="37" class="note" text-anchor="middle">Eden</text>
    <rect x="144" y="0" width="62" height="48" rx="5" fill="#2a2a1a" stroke="rgb(212,168,83)"/><text x="175" y="21" class="label" text-anchor="middle">S</text><text x="175" y="37" class="note" text-anchor="middle">Survivor</text>
    <rect x="216" y="0" width="62" height="48" rx="5" fill="#1e1a2a" stroke="#8a70c0"/><text x="247" y="21" class="label" text-anchor="middle">O</text><text x="247" y="37" class="note" text-anchor="middle">Old</text>
    <rect x="288" y="0" width="62" height="48" rx="5" fill="#1e1a2a" stroke="#8a70c0"/><text x="319" y="21" class="label" text-anchor="middle">O</text><text x="319" y="37" class="note" text-anchor="middle">Old</text>
    <rect x="360" y="0" width="62" height="48" rx="5" fill="#2a1414" stroke="#e57373"/><text x="391" y="21" class="label" text-anchor="middle">H</text><text x="391" y="37" class="note" text-anchor="middle">Humongous</text>
    <rect x="432" y="0" width="62" height="48" rx="5" fill="#111" stroke="#555" stroke-dasharray="4 3"/><text x="463" y="29" class="note" text-anchor="middle">Free</text>
    <rect x="504" y="0" width="62" height="48" rx="5" fill="#1e1a2a" stroke="#8a70c0"/><text x="535" y="21" class="label" text-anchor="middle">O</text><text x="535" y="37" class="note" text-anchor="middle">Old</text>
    <rect x="576" y="0" width="62" height="48" rx="5" fill="#111" stroke="#555" stroke-dasharray="4 3"/><text x="607" y="29" class="note" text-anchor="middle">Free</text>
  </g>
  <text x="58" y="222" class="body">역할은 Region 단위로 흩어져 있지만, Young/Old 세대 개념이 사라진 것은 아니다.</text>
  <rect x="24" y="274" width="852" height="172" rx="8" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="46" y="302" class="head">② Garbage First와 단편화 감소</text>
  <rect x="58" y="332" width="210" height="62" rx="6" fill="#2a1414" stroke="#e57373"/><text x="163" y="356" class="bad" text-anchor="middle">회수 가치 큰 Region</text><text x="163" y="375" class="body" text-anchor="middle">죽은 객체가 많아 이득 큼</text>
  <line x1="268" y1="363" x2="344" y2="363" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="346" y="332" width="210" height="62" rx="6" fill="#1e2a1e" stroke="#4ab080"/><text x="451" y="356" class="ok" text-anchor="middle">생존 객체만 복사</text><text x="451" y="375" class="body" text-anchor="middle">다른 Free Region으로 이동</text>
  <line x1="556" y1="363" x2="632" y2="363" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="634" y="332" width="190" height="62" rx="6" fill="#111" stroke="#555" stroke-dasharray="4 3"/><text x="729" y="356" class="label" text-anchor="middle">기존 Region 반환</text><text x="729" y="375" class="body" text-anchor="middle">통째로 Free 처리</text>
  <text x="58" y="422" class="body">CMS처럼 빈칸이 듬성듬성 남는 것이 아니라, Region 단위로 깨끗한 빈 공간을 되찾는다.</text>
  <rect x="24" y="476" width="852" height="122" rx="8" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="46" y="504" class="head">③ 비용 — Region마다 Remembered Set 필요</text>
  <rect x="58" y="532" width="200" height="42" rx="6" fill="#1e1a2a" stroke="#8a70c0"/><text x="158" y="558" class="label" text-anchor="middle">Region A 회수 대상</text>
  <line x1="330" y1="553" x2="258" y2="553" stroke="#e57373" stroke-width="2" marker-end="url(#arr-red)"/>
  <rect x="332" y="532" width="200" height="42" rx="6" fill="#1e1a2a" stroke="#8a70c0"/><text x="432" y="558" class="body" text-anchor="middle">Region B/C가 A 참조</text>
  <line x1="532" y1="553" x2="604" y2="553" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="606" y="532" width="220" height="42" rx="6" fill="#111" stroke="#333"/><text x="716" y="558" class="code" text-anchor="middle">Remembered Set 유지</text>
  <text x="58" y="624" class="note">일부 Region만 회수하려면 외부 참조를 알아야 하므로, 메모리·CPU·쓰기 장벽 비용이 늘어난다.</text>
</svg>
