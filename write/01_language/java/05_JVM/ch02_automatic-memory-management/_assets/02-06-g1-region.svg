<svg viewBox="0 0 920 760" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>G1 전체 흐름 — Root(힙 밖)에서 Region 격자를 마킹하고, 회수 가치 큰 Region을 복사로 비운다</title>
  <desc>GC Root(스택 지역변수·static·JNI)는 힙 바깥에 있고, 힙 안 여러 Region에 흩어진 객체를 가리킨다. Root는 Region에 속하지 않는다. 마킹은 Root에서 출발해 도달 가능한 객체를 살리고, 각 Region의 생존 비율을 집계한다. 생존 비율이 낮아 회수 가치가 큰 Region을 골라, 그 안의 살아있는 객체만 빈 Region으로 복사(evacuation)하고 원래 Region을 통째로 비운다. 회수가 곧 압축이라 단편화가 쌓이지 않는다.</desc>
  <defs>
    <style>
      .title{font-size:16px;font-weight:800;fill:#e8e4df;}
      .sub{font-size:11px;fill:rgb(138,133,128);}
      .shead{font-size:12.5px;font-weight:800;fill:rgb(212,168,83);}
      .lbl{font-size:11px;font-weight:700;fill:#e8e4df;}
      .note{font-size:9.5px;fill:rgb(160,155,150);}
      .rl{font-size:12px;font-weight:800;}
      .rt{font-size:8px;}
      .obj{font-size:10px;font-weight:700;}
      .rootl{font-size:10px;font-weight:700;}
    </style>
    <marker id="aRoot" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#5b9bd5"/></marker>
    <marker id="aG" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#81c784"/></marker>
  </defs>
  <rect x="0" y="0" width="920" height="760" fill="#0d0d0d"/>
  <text x="24" y="30" class="title">G1 전체 흐름 — Root(힙 밖)가 Region 안 객체를 가리키고, 마킹 → 복사 회수</text>
  <text x="24" y="50" class="sub">GC Root는 *힙 바깥*(스택·static·JNI)에 있다. Region에 속하지 않고, 여러 Region에 흩어진 객체를 가리킨다.</text>

  <!-- ===== GC Root 패널 (힙 밖) ===== -->
  <text x="24" y="82" class="shead">① GC Root — 힙 바깥의 닻 (Region 소속 아님)</text>
  <rect x="24" y="92" width="200" height="120" rx="8" fill="#10243a" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="124" y="112" class="lbl" text-anchor="middle" fill="#9cc4dc">GC Root (힙 밖)</text>
  <rect x="40" y="124" width="168" height="24" rx="4" fill="#1a2e3e" stroke="#3a6a90"/><text x="50" y="140" class="rootl" fill="#dceaf7">스택 지역변수 ●</text>
  <rect x="40" y="152" width="168" height="24" rx="4" fill="#1a2e3e" stroke="#3a6a90"/><text x="50" y="168" class="rootl" fill="#dceaf7">static 필드 ●</text>
  <rect x="40" y="180" width="168" height="24" rx="4" fill="#1a2e3e" stroke="#3a6a90"/><text x="50" y="196" class="rootl" fill="#dceaf7">JNI 참조 ●</text>

  <!-- 힙 경계 박스 -->
  <rect x="244" y="92" width="652" height="120" rx="8" fill="none" stroke="#5a5a5a" stroke-width="1.4" stroke-dasharray="2,0"/>
  <text x="260" y="108" class="note" fill="#8a8580">힙 (Region 격자)</text>
  <!-- regions row (마킹 전 초기 상태) -->
  <g>
    <rect x="262" y="120" width="74" height="74" rx="5" fill="#1e3a4a" stroke="#4a8ab0"/><text x="299" y="142" class="rl" text-anchor="middle" fill="#9cc4dc">E</text><text x="299" y="156" class="rt" text-anchor="middle" fill="#6a8aa0">Eden</text>
    <rect x="344" y="120" width="74" height="74" rx="5" fill="#241e30" stroke="#8a70c0"/><text x="381" y="140" class="rl" text-anchor="middle" fill="#b8a0e0">O</text><circle cx="368" cy="160" r="9" fill="#5b9bd5"/><text x="368" y="164" class="obj" text-anchor="middle" fill="#0d1a26">A</text><circle cx="394" cy="160" r="9" fill="#7a2828"/><text x="394" y="164" class="obj" text-anchor="middle" fill="#f5b0b0">×</text>
    <rect x="426" y="120" width="74" height="74" rx="5" fill="#2a2410" stroke="#d4a853"/><text x="463" y="142" class="rl" text-anchor="middle" fill="#f5d76e">S</text><text x="463" y="156" class="rt" text-anchor="middle" fill="#a08a50">Surv</text>
    <rect x="508" y="120" width="74" height="74" rx="5" fill="#241e30" stroke="#8a70c0"/><text x="545" y="140" class="rl" text-anchor="middle" fill="#b8a0e0">O</text><circle cx="532" cy="160" r="9" fill="#5b9bd5"/><text x="532" y="164" class="obj" text-anchor="middle" fill="#0d1a26">B</text><circle cx="558" cy="160" r="9" fill="#5b9bd5"/><text x="558" y="164" class="obj" text-anchor="middle" fill="#0d1a26">C</text>
    <rect x="590" y="120" width="74" height="74" rx="5" fill="#141414" stroke="#555" stroke-dasharray="3,2"/><text x="627" y="160" class="rt" text-anchor="middle" fill="#888">Free</text>
    <rect x="672" y="120" width="74" height="74" rx="5" fill="#241e30" stroke="#8a70c0"/><text x="709" y="140" class="rl" text-anchor="middle" fill="#b8a0e0">O</text><circle cx="696" cy="160" r="9" fill="#7a2828"/><text x="696" y="164" class="obj" text-anchor="middle" fill="#f5b0b0">×</text><circle cx="722" cy="160" r="9" fill="#7a2828"/><text x="722" y="164" class="obj" text-anchor="middle" fill="#f5b0b0">×</text>
    <rect x="754" y="120" width="74" height="74" rx="5" fill="#141414" stroke="#555" stroke-dasharray="3,2"/><text x="791" y="160" class="rt" text-anchor="middle" fill="#888">Free</text>
  </g>
  <!-- Root → 객체 참조선 (여러 Region으로) -->
  <line x1="208" y1="136" x2="360" y2="158" stroke="#5b9bd5" stroke-width="1.6" marker-end="url(#aRoot)" opacity="0.85"/>
  <line x1="208" y1="164" x2="524" y2="158" stroke="#5b9bd5" stroke-width="1.6" marker-end="url(#aRoot)" opacity="0.85"/>
  <text x="240" y="206" class="note" fill="#9cc4dc">↑ Root가 Region을 가리지 않고, *여러 Region 속 객체*(A·B)를 직접 가리킨다</text>

  <!-- ===== ② 마킹 ===== -->
  <text x="24" y="252" class="shead">② 마킹 — Root에서 도달 가능한 객체를 살리고, Region별 생존 비율 집계</text>
  <rect x="24" y="262" width="872" height="92" rx="8" fill="#141414" stroke="#2a2520"/>
  <g transform="translate(0,0)">
    <rect x="40" y="278" width="120" height="60" rx="5" fill="#241e30" stroke="#8a70c0"/><text x="100" y="296" class="note" text-anchor="middle" fill="#b8a0e0">Old #1</text><circle cx="78" cy="316" r="10" fill="#1a1a1a" stroke="#e8e4df"/><text x="78" y="320" class="obj" text-anchor="middle" fill="#e8e4df">A</text><circle cx="108" cy="316" r="10" fill="#7a2828"/><text x="108" y="320" class="obj" text-anchor="middle" fill="#f5b0b0">×</text><text x="138" y="320" class="obj" fill="#f5a0a0">생존20%</text>
    <rect x="176" y="278" width="120" height="60" rx="5" fill="#241e30" stroke="#8a70c0"/><text x="236" y="296" class="note" text-anchor="middle" fill="#b8a0e0">Old #2</text><circle cx="214" cy="316" r="10" fill="#1a1a1a" stroke="#e8e4df"/><text x="214" y="320" class="obj" text-anchor="middle" fill="#e8e4df">B</text><circle cx="244" cy="316" r="10" fill="#1a1a1a" stroke="#e8e4df"/><text x="244" y="320" class="obj" text-anchor="middle" fill="#e8e4df">C</text><text x="274" y="320" class="obj" fill="#81c784">90%</text>
    <rect x="312" y="278" width="120" height="60" rx="5" fill="#241e30" stroke="#8a70c0"/><text x="372" y="296" class="note" text-anchor="middle" fill="#b8a0e0">Old #3</text><circle cx="350" cy="316" r="10" fill="#7a2828"/><text x="350" y="320" class="obj" text-anchor="middle" fill="#f5b0b0">×</text><circle cx="380" cy="316" r="10" fill="#7a2828"/><text x="380" y="320" class="obj" text-anchor="middle" fill="#f5b0b0">×</text><text x="404" y="320" class="obj" fill="#f5a0a0">15%</text>
    <text x="470" y="304" class="lbl" fill="#e8e4df">검정=생존 확정, ×=죽음.</text>
    <text x="470" y="324" class="note">각 Region의 *생존 비율*을 계산 — 낮을수록 회수 이득이 크다(Garbage First).</text>
  </g>

  <!-- ===== ③ 회수 대상 선별 ===== -->
  <text x="24" y="392" class="shead">③ 선별 — 생존 비율 낮은 Region을 회수 대상으로 (Old #1·#3)</text>
  <rect x="24" y="402" width="872" height="80" rx="8" fill="#1a1010" stroke="#5a3a3a"/>
  <rect x="40" y="416" width="120" height="52" rx="5" fill="#2a1414" stroke="#e57373" stroke-width="2"/><text x="100" y="436" class="note" text-anchor="middle" fill="#f5b0b0">Old #1 (20%)</text><text x="100" y="456" class="note" text-anchor="middle" fill="#e57373">회수 대상</text>
  <rect x="176" y="416" width="120" height="52" rx="5" fill="#241e30" stroke="#8a70c0"/><text x="236" y="436" class="note" text-anchor="middle" fill="#b8a0e0">Old #2 (90%)</text><text x="236" y="456" class="note" text-anchor="middle" fill="#999">유지(이득 적음)</text>
  <rect x="312" y="416" width="120" height="52" rx="5" fill="#2a1414" stroke="#e57373" stroke-width="2"/><text x="372" y="436" class="note" text-anchor="middle" fill="#f5b0b0">Old #3 (15%)</text><text x="372" y="456" class="note" text-anchor="middle" fill="#e57373">회수 대상</text>
  <text x="470" y="436" class="lbl" fill="#f5b0b0">생존 적은 #1·#3만 고른다(CSet).</text>
  <text x="470" y="456" class="note">한 번에 비울 Region 수를 조절해 일시 정지 시간을 예측 가능하게 만든다.</text>

  <!-- ===== ④ evacuation ===== -->
  <text x="24" y="520" class="shead">④ 복사 회수(evacuation) — 생존 객체만 빈 Region으로 옮기고, 원래 Region 통째 Free</text>
  <rect x="24" y="530" width="872" height="120" rx="8" fill="#101a10" stroke="#3a5a3a"/>
  <!-- 회수 대상 (A from#1) -->
  <rect x="44" y="548" width="150" height="56" rx="5" fill="#2a1414" stroke="#e57373"/><text x="119" y="566" class="note" text-anchor="middle" fill="#f5b0b0">Old #1 회수</text><circle cx="90" cy="586" r="11" fill="#1a1a1a" stroke="#e8e4df"/><text x="90" y="590" class="obj" text-anchor="middle" fill="#e8e4df">A</text><circle cx="120" cy="586" r="11" fill="#7a2828"/><text x="120" y="590" class="obj" text-anchor="middle" fill="#f5b0b0">×</text>
  <rect x="44" y="612" width="150" height="30" rx="5" fill="#141414" stroke="#555" stroke-dasharray="4,3"/><text x="119" y="631" class="note" text-anchor="middle" fill="#888">→ 통째 Free (□)</text>
  <!-- 화살표 복사 -->
  <line x1="200" y1="586" x2="280" y2="586" stroke="#81c784" stroke-width="2.4" marker-end="url(#aG)"/>
  <text x="240" y="576" class="note" text-anchor="middle" fill="#81c784">생존 A만 복사</text>
  <!-- 새 Region -->
  <rect x="288" y="548" width="150" height="56" rx="5" fill="#15300f" stroke="#66bb6a" stroke-width="2"/><text x="363" y="566" class="note" text-anchor="middle" fill="#81c784">빈 Region → 채움</text><circle cx="330" cy="586" r="11" fill="#1a1a1a" stroke="#e8e4df"/><text x="330" y="590" class="obj" text-anchor="middle" fill="#e8e4df">A</text>
  <!-- #3 동일 -->
  <rect x="468" y="548" width="150" height="56" rx="5" fill="#2a1414" stroke="#e57373"/><text x="543" y="566" class="note" text-anchor="middle" fill="#f5b0b0">Old #3 회수</text><circle cx="543" cy="586" r="11" fill="#7a2828"/><text x="543" y="590" class="obj" text-anchor="middle" fill="#f5b0b0">×</text>
  <rect x="468" y="612" width="150" height="30" rx="5" fill="#141414" stroke="#555" stroke-dasharray="4,3"/><text x="543" y="631" class="note" text-anchor="middle" fill="#888">→ 통째 Free (□)</text>
  <text x="650" y="576" class="lbl" fill="#81c784">회수 = 복사 = 압축</text>
  <text x="650" y="598" class="note">생존 객체가 새 Region에 *빽빽이* 모여, 빈칸이 흩어지지 않는다.</text>
  <text x="650" y="618" class="note">→ CMS의 단편화(스윕 후 빈칸 흩어짐)가 구조적으로 사라진다.</text>

  <!-- 핵심 -->
  <rect x="24" y="666" width="872" height="78" rx="8" fill="#141414" stroke="#2a2520"/>
  <text x="42" y="690" class="lbl" fill="rgb(212,168,83)">핵심 — 전체 흐름 한 줄</text>
  <text x="42" y="712" class="note">Root(힙 밖)에서 마킹 → Region별 생존 비율 집계 → 생존 낮은 Region 선별(CSet) → 그 안 생존 객체만 빈 Region으로 복사 → 원래 Region 통째 Free.</text>
  <text x="42" y="732" class="note">Root는 Region에 속하지 않는다. 회수 단위가 "세대 전체"가 아니라 "고른 Region"이라, 비울 양을 조절해 일시 정지를 예측 가능하게 만드는 게 G1의 본질이다.</text>
</svg>
