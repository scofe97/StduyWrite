<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" width="640" height="380"
     font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">

  <!-- 배경 -->
  <rect width="640" height="380" fill="#0d0d0d"/>

  <!-- 제목 -->
  <text x="320" y="28" text-anchor="middle" fill="rgb(212,168,83)" font-size="14" font-weight="bold">3장 GC 지식 계층 구조</text>

  <!-- Layer 1: 도달성 판정 -->
  <rect x="160" y="46" width="320" height="48" rx="4" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="320" y="67" text-anchor="middle" fill="rgb(212,168,83)" font-size="12" font-weight="bold">§3.2 도달성 판정</text>
  <text x="320" y="84" text-anchor="middle" fill="rgb(138,133,128)" font-size="10">GC Root · 약한 참조 4단계 · finalize()</text>

  <!-- 화살표 1→2 -->
  <line x1="320" y1="94" x2="320" y2="110" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Layer 2: 세 알고리즘 -->
  <rect x="100" y="110" width="440" height="48" rx="4" fill="rgba(42,37,32,0.8)" stroke="rgb(42,37,32)" stroke-width="1.5"/>
  <text x="320" y="131" text-anchor="middle" fill="#e8e4df" font-size="12" font-weight="bold">§3.3 가비지 컬렉션 알고리즘</text>
  <text x="320" y="148" text-anchor="middle" fill="rgb(138,133,128)" font-size="10">마크-스윕 · 카피 · 마크-컴팩트 · 약한 세대 가설</text>

  <!-- 화살표 2→3 -->
  <line x1="320" y1="158" x2="320" y2="174" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Layer 3: HotSpot 구현 -->
  <rect x="60" y="174" width="520" height="48" rx="4" fill="rgba(42,37,32,0.8)" stroke="rgb(42,37,32)" stroke-width="1.5"/>
  <text x="320" y="195" text-anchor="middle" fill="#e8e4df" font-size="12" font-weight="bold">§3.4 HotSpot 구현 상세</text>
  <text x="320" y="212" text-anchor="middle" fill="rgb(138,133,128)" font-size="10">OopMap · Safepoint · Safe Region · 카드 테이블 · 쓰기 장벽 · 3색 마킹</text>

  <!-- 화살표 3→4 -->
  <line x1="320" y1="222" x2="320" y2="238" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Layer 4: 컬렉터 스펙트럼 -->
  <rect x="20" y="238" width="600" height="56" rx="4" fill="rgba(42,37,32,0.8)" stroke="rgb(42,37,32)" stroke-width="1.5"/>
  <text x="320" y="258" text-anchor="middle" fill="#e8e4df" font-size="12" font-weight="bold">§3.5~§3.6 컬렉터 스펙트럼</text>
  <rect x="40" y="264" width="560" height="16" rx="3" fill="none" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="50" y="276" fill="#66bb6a" font-size="9">Parallel (처리량 ↑)</text>
  <text x="210" y="276" fill="#e8e4df" font-size="9">CMS</text>
  <text x="290" y="276" fill="rgb(212,168,83)" font-size="9">G1 (균형)</text>
  <text x="430" y="276" fill="#f44336" font-size="9">ZGC / Shenandoah (지연 ↓)</text>

  <!-- 화살표 4→5 -->
  <line x1="320" y1="294" x2="320" y2="312" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Layer 5: 4장 모니터링 -->
  <rect x="80" y="312" width="480" height="48" rx="4" fill="rgba(102,187,106,0.1)" stroke="#66bb6a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="320" y="333" text-anchor="middle" fill="#66bb6a" font-size="12" font-weight="bold">→ 4장 모니터링 도구</text>
  <text x="320" y="350" text-anchor="middle" fill="rgb(138,133,128)" font-size="10">jstat · jmap · JFR · SafepointStats · 힙 덤프 분석</text>

  <!-- 화살표 마커 정의 -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="rgb(138,133,128)"/>
    </marker>
  </defs>
</svg>
