<svg viewBox="0 0 920 470" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>false sharing — 서로 다른 카드인데 같은 캐시 라인이라 서로를 무효화</title>
  <desc>CPU는 메모리를 64바이트 캐시 라인 단위로 캐시에 올린다. 카드 테이블의 인접 카드 64개가 한 라인에 같이 올라가므로, 코어 A가 카드0을, 코어 B가 카드5를 써도 둘은 같은 라인을 공유한다. 한 코어가 그 라인에 쓰면 다른 코어 캐시의 그 라인 전체가 무효화돼, 안 겹치는 데이터인데 캐시가 서로를 계속 깨뜨린다. 이것이 false sharing이다.</desc>
  <defs>
    <style>
      .title { font-size: 16px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11px; fill: rgb(138,133,128); }
      .shead { font-size: 12.5px; font-weight: 800; }
      .step  { font-size: 11.5px; font-weight: 700; }
      .note  { font-size: 10px; fill: rgb(160,155,150); }
      .lbl   { font-size: 10.5px; fill: rgb(180,175,170); }
      .mono  { font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    </style>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#e57373"/></marker>
  </defs>
  <rect x="0" y="0" width="920" height="470" fill="#0d0d0d"/>
  <text x="24" y="32" class="title">false sharing — 다른 카드인데 같은 캐시 라인이라 서로를 깨뜨린다</text>
  <text x="24" y="52" class="sub">CPU는 메모리를 64바이트 "캐시 라인" 단위로 올린다. 인접 카드 64개가 한 라인에 같이 들어간다.</text>

  <!-- 캐시 라인 (가운데, 카드 8칸) -->
  <text x="24" y="92" class="lbl">하나의 캐시 라인 (64바이트) — 카드 8칸이 한 덩어리로 캐시에 올라감</text>
  <g font-family="'JetBrains Mono', monospace" font-size="12" font-weight="700">
    <rect x="200" y="104" width="520" height="52" rx="6" fill="none" stroke="#8a8580" stroke-width="2" stroke-dasharray="5,3"/>
    <rect x="208" y="110" width="60" height="40" rx="3" fill="#2a1a1a" stroke="#e57373" stroke-width="2"/><text x="238" y="135" text-anchor="middle" fill="#f5d76e">카드0</text>
    <rect x="272" y="110" width="60" height="40" rx="3" fill="#1e1a2a" stroke="#555"/><text x="302" y="135" text-anchor="middle" fill="#8a8580">카드1</text>
    <rect x="336" y="110" width="60" height="40" rx="3" fill="#1e1a2a" stroke="#555"/><text x="366" y="135" text-anchor="middle" fill="#8a8580">카드2</text>
    <rect x="400" y="110" width="60" height="40" rx="3" fill="#1e1a2a" stroke="#555"/><text x="430" y="135" text-anchor="middle" fill="#8a8580">카드3</text>
    <rect x="464" y="110" width="60" height="40" rx="3" fill="#1e1a2a" stroke="#555"/><text x="494" y="135" text-anchor="middle" fill="#8a8580">카드4</text>
    <rect x="528" y="110" width="60" height="40" rx="3" fill="#2a1a1a" stroke="#e57373" stroke-width="2"/><text x="558" y="135" text-anchor="middle" fill="#f5d76e">카드5</text>
    <rect x="592" y="110" width="60" height="40" rx="3" fill="#1e1a2a" stroke="#555"/><text x="622" y="135" text-anchor="middle" fill="#8a8580">카드6</text>
    <rect x="656" y="110" width="60" height="40" rx="3" fill="#1e1a2a" stroke="#555"/><text x="686" y="135" text-anchor="middle" fill="#8a8580">카드7</text>
  </g>

  <!-- 코어 A -->
  <rect x="40" y="220" width="200" height="78" rx="8" fill="#1e3a4a" stroke="#4a8ab0" stroke-width="1.4"/>
  <text x="140" y="248" class="step" text-anchor="middle" fill="#dceaf7">코어 A</text>
  <text x="140" y="270" class="mono" text-anchor="middle" fill="#b8d4e8">카드0 = DIRTY</text>
  <text x="140" y="288" class="note" text-anchor="middle">(신세대 참조 대입)</text>
  <line x1="200" y1="220" x2="238" y2="156" stroke="#e57373" stroke-width="2" marker-end="url(#ar)"/>

  <!-- 코어 B -->
  <rect x="680" y="220" width="200" height="78" rx="8" fill="#1e3a4a" stroke="#4a8ab0" stroke-width="1.4"/>
  <text x="780" y="248" class="step" text-anchor="middle" fill="#dceaf7">코어 B</text>
  <text x="780" y="270" class="mono" text-anchor="middle" fill="#b8d4e8">카드5 = DIRTY</text>
  <text x="780" y="288" class="note" text-anchor="middle">(다른 객체, 다른 카드)</text>
  <line x1="700" y1="220" x2="558" y2="156" stroke="#e57373" stroke-width="2" marker-end="url(#ar)"/>

  <!-- 충돌 표시 -->
  <rect x="296" y="222" width="328" height="74" rx="8" fill="#2a1414" stroke="#e57373" stroke-width="1.6"/>
  <text x="460" y="248" class="shead" text-anchor="middle" fill="#e57373">⚡ 충돌 — 같은 라인이라</text>
  <text x="460" y="270" class="note" text-anchor="middle" fill="#f5b0b0">A가 라인에 쓰면 → B의 캐시에서 그 라인 전체 무효화</text>
  <text x="460" y="286" class="note" text-anchor="middle" fill="#f5b0b0">B가 쓰면 → A의 라인 무효화 (핑퐁 반복)</text>

  <!-- 핵심 비유 -->
  <rect x="24" y="324" width="872" height="56" rx="8" fill="#141414" stroke="#3a3a3a"/>
  <text x="42" y="348" class="lbl"><tspan font-weight="800" fill="#f5d76e">false(거짓) sharing</tspan> — 두 코어가 *서로 다른 데이터*(카드0·카드5)를 만지는데, 우연히 같은 캐시 라인에 들어 있어</text>
  <text x="42" y="368" class="lbl">마치 *같은 데이터를 공유하는 것처럼* 캐시가 서로를 계속 무효화한다. 실제 공유는 아닌데(거짓) 공유처럼 동작 → 성능 저하.</text>

  <!-- 무조건 쓰기가 악화 -->
  <rect x="24" y="396" width="872" height="58" rx="8" fill="#2a1f0a" stroke="#d4a853" stroke-width="1.4"/>
  <text x="42" y="420" class="shead" fill="#f5d76e">왜 핫스팟 기본 쓰기 장벽이 이걸 악화시키나</text>
  <text x="42" y="440" class="lbl">기본 장벽은 "이미 dirty여도 무조건 또 쓴다" → 값이 안 바뀌어도 그 라인에 *쓰기*가 발생 → 매번 다른 코어 캐시를 무효화. 불필요한 쓰기가 핑퐁을 늘린다.</text>
</svg>
