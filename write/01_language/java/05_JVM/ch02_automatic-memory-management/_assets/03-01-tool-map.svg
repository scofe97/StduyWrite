<svg viewBox="0 0 900 470" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>JDK 명령줄 진단 도구 지도 — jps에서 뻗는 도구들</title>
  <desc>진단은 jps로 프로세스(LVMID)를 식별하는 데서 시작한다. 거기서 jstat(GC·힙 통계 추세), jinfo(VM 플래그 조회·변경), jmap(힙 스냅숏 .hprof), jstack(스레드 스냅숏)으로 갈라진다. jmap의 덤프는 jhat 또는 MAT로 분석하고, jstat로 누수가 의심되면 jmap 덤프로 넘어간다. jcmd는 이 기능 다수를 단일 명령으로 통합한다.</desc>
  <defs>
    <style>
      .title{font-size:18px;font-weight:800;fill:#e8e4df}.sub{font-size:11px;fill:rgb(138,133,128)}.tool{font-size:13px;font-weight:800;fill:#0d0d0d}.desc{font-size:10px;fill:#0d0d0d}.edge{font-size:9.5px;fill:rgb(138,133,128)}.note{font-size:9.5px;fill:rgb(138,133,128)}
    </style>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="rgb(150,145,140)"/></marker>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#e57373"/></marker>
  </defs>
  <rect x="0" y="0" width="900" height="470" fill="#0d0d0d"/>
  <text x="26" y="36" class="title">JDK 명령줄 진단 도구 지도</text>
  <text x="26" y="56" class="sub">진단은 jps로 시작해 네 갈래로 뻗는다. 데이터 종류(추세·플래그·힙·스레드)가 곧 도구다.</text>

  <!-- edges (먼저 그려 노드 뒤로) -->
  <!-- jps -> 4갈래 -->
  <line x1="180" y1="170" x2="300" y2="120" stroke="rgb(150,145,140)" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="180" y1="185" x2="300" y2="190" stroke="rgb(150,145,140)" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="180" y1="200" x2="300" y2="262" stroke="rgb(150,145,140)" stroke-width="1.6" marker-end="url(#a)"/>
  <line x1="180" y1="212" x2="300" y2="332" stroke="rgb(150,145,140)" stroke-width="1.6" marker-end="url(#a)"/>
  <!-- jmap -> jhat/MAT -->
  <line x1="540" y1="262" x2="660" y2="262" stroke="rgb(150,145,140)" stroke-width="1.6" marker-end="url(#a)"/>
  <!-- jstat ⇢ jmap (누수 의심) -->
  <path d="M420 220 C 440 245, 440 240, 420 256" fill="none" stroke="#e57373" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="448" y="244" class="edge" fill="#e57373">누수 의심</text>

  <!-- jps 중심 -->
  <rect x="40" y="160" width="140" height="62" rx="10" fill="#FFE4B5" stroke="#333"/>
  <text x="110" y="186" class="tool" text-anchor="middle">jps</text>
  <text x="110" y="206" class="desc" text-anchor="middle">프로세스(LVMID) 식별</text>

  <!-- jstat -->
  <rect x="300" y="92" width="240" height="56" rx="10" fill="#ADD8E6" stroke="#333"/>
  <text x="320" y="116" class="tool">jstat</text>
  <text x="320" y="136" class="desc">GC·힙 통계 추세 (추세로 누수 의심)</text>

  <!-- jinfo -->
  <rect x="300" y="162" width="240" height="56" rx="10" fill="#ADD8E6" stroke="#333"/>
  <text x="320" y="186" class="tool">jinfo</text>
  <text x="320" y="206" class="desc">VM 플래그 조회·변경 (manageable)</text>

  <!-- jmap -->
  <rect x="300" y="234" width="240" height="56" rx="10" fill="#FFD0A0" stroke="#333"/>
  <text x="320" y="258" class="tool">jmap</text>
  <text x="320" y="278" class="desc">힙 스냅숏 .hprof (STW 정지)</text>

  <!-- jstack -->
  <rect x="300" y="306" width="240" height="56" rx="10" fill="#FFD0A0" stroke="#333"/>
  <text x="320" y="330" class="tool">jstack</text>
  <text x="320" y="350" class="desc">스레드 스냅숏 (데드락 탐지)</text>

  <!-- jhat / MAT -->
  <rect x="660" y="234" width="200" height="56" rx="10" fill="#90EE90" stroke="#333"/>
  <text x="760" y="258" class="tool" text-anchor="middle">jhat / MAT</text>
  <text x="760" y="278" class="desc" text-anchor="middle">덤프 분석 (별도 장비)</text>

  <!-- jcmd 통합 -->
  <rect x="40" y="392" width="820" height="44" rx="10" fill="#E0E0E0" stroke="#333"/>
  <text x="60" y="419" class="tool">jcmd</text>
  <text x="120" y="419" class="desc">— 위 jstat·jinfo·jmap·jstack 기능 다수를 단일 명령으로 통합 (Thread.print / GC.heap_dump / VM.flags …)</text>

  <text x="40" y="462" class="note">색은 데이터 종류 구분 — 노랑 jps(식별) · 파랑 jstat·jinfo(상태 조회) · 주황 jmap·jstack(스냅숏) · 초록 분석 · 회색 통합.</text>
</svg>
