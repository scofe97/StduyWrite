<svg viewBox="0 0 920 470" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>무조건 쓰기 vs UseCondCardMark — 분기 비용과 false sharing의 트레이드오프</title>
  <desc>핫스팟 기본 쓰기 장벽은 이미 dirty인지 확인하지 않고 무조건 카드에 쓴다. 분기가 없어 CPU 분기 예측 실패가 없으므로 단일 스레드에서 빠르다. 그러나 값이 안 바뀌어도 매번 쓰기가 발생해 멀티코어에서 false sharing을 악화시킨다. UseCondCardMark는 이미 dirty면 쓰지 않는 조건을 붙여, 분기 비용을 감수하는 대신 불필요한 쓰기를 없애 false sharing을 줄인다.</desc>
  <defs>
    <style>
      .title { font-size: 16px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11px; fill: rgb(138,133,128); }
      .shead { font-size: 13px; font-weight: 800; }
      .step  { font-size: 11.5px; font-weight: 700; }
      .note  { font-size: 10px; fill: rgb(160,155,150); }
      .lbl   { font-size: 10.5px; fill: rgb(180,175,170); }
      .mono  { font-size: 11.5px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    </style>
    <marker id="ag" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#81c784"/></marker>
    <marker id="aw" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#d4a853"/></marker>
  </defs>
  <rect x="0" y="0" width="920" height="470" fill="#0d0d0d"/>
  <text x="24" y="32" class="title">무조건 쓰기 vs UseCondCardMark — 분기냐 false sharing이냐</text>
  <text x="24" y="52" class="sub">같은 목적(카드 dirty 마크)을 두 방식으로. 어느 쪽이 빠른지는 단일 스레드냐 멀티코어냐에 달렸다.</text>

  <!-- 왼쪽: 무조건 쓰기 (기본) -->
  <text x="240" y="92" class="shead" fill="#81c784" text-anchor="middle">기본 — 무조건 쓰기 (분기 없음)</text>
  <rect x="40" y="104" width="400" height="120" rx="8" fill="#15300f" stroke="#66bb6a" stroke-width="1.4"/>
  <text x="60" y="134" class="mono" font-size="12.5" fill="#cdeccf">oldObj.field = youngObj;</text>
  <text x="60" y="160" class="mono" font-size="12.5" fill="#f5d76e">CARD_TABLE[i] = DIRTY;</text>
  <text x="60" y="182" class="note" fill="#9fcfa0">← 이미 dirty여도 확인 안 하고 그냥 씀</text>
  <text x="60" y="204" class="note" fill="#9fcfa0">분기(if)가 없으니 CPU 분기 예측 실패 0</text>

  <rect x="40" y="236" width="400" height="44" rx="6" fill="#1e3a4a" stroke="#4a8ab0"/>
  <text x="240" y="256" class="step" text-anchor="middle" fill="#dceaf7">✓ 단일 스레드 빠름 (항상 일정 비용)</text>
  <text x="240" y="272" class="note" text-anchor="middle" fill="#e57373">✗ 멀티코어: 불필요한 쓰기 → false sharing 악화</text>

  <!-- 오른쪽: UseCondCardMark -->
  <text x="680" y="92" class="shead" fill="rgb(212,168,83)" text-anchor="middle">-XX:+UseCondCardMark (조건부)</text>
  <rect x="480" y="104" width="400" height="120" rx="8" fill="#2a1f0a" stroke="#d4a853" stroke-width="1.4"/>
  <text x="500" y="134" class="mono" font-size="12.5" fill="#e8e4df">oldObj.field = youngObj;</text>
  <text x="500" y="160" class="mono" font-size="12px" fill="#f5d76e">if (CARD_TABLE[i] != DIRTY)</text>
  <text x="516" y="180" class="mono" font-size="12px" fill="#f5d76e">CARD_TABLE[i] = DIRTY;</text>
  <text x="500" y="204" class="note" fill="#d4b87a">← 이미 dirty면 안 씀 = 그 캐시 라인 안 건드림</text>

  <rect x="480" y="236" width="400" height="44" rx="6" fill="#1e3a4a" stroke="#4a8ab0"/>
  <text x="680" y="256" class="step" text-anchor="middle" fill="#dceaf7">✓ 멀티코어: 불필요한 쓰기 제거 → false sharing↓</text>
  <text x="680" y="272" class="note" text-anchor="middle" fill="#e57373">✗ 분기(if) 비용 추가 (분기 예측 실패 가능)</text>

  <!-- 가운데 vs -->
  <circle cx="460" cy="170" r="20" fill="#1a1a1a" stroke="#8a8580"/>
  <text x="460" y="176" font-size="14" font-weight="800" text-anchor="middle" fill="#e8e4df">vs</text>

  <!-- 트레이드오프 축 -->
  <rect x="24" y="304" width="872" height="68" rx="8" fill="#141414" stroke="#3a3a3a"/>
  <text x="42" y="328" class="shead" font-size="12.5" fill="#f5d76e">트레이드오프 — 무엇을 더 두려워하는가</text>
  <text x="42" y="350" class="lbl">• <tspan font-weight="700" fill="#81c784">분기 비용</tspan>이 더 무섭다(단일/소수 스레드, 쓰기 잦음) → <tspan font-weight="700">무조건 쓰기(기본)</tspan>. 항상 쓰기 1번, 예측 실패 없음.</text>
  <text x="42" y="370" class="lbl">• <tspan font-weight="700" fill="#d4a853">false sharing</tspan>이 더 무섭다(다코어, 같은 라인 경쟁) → <tspan font-weight="700">UseCondCardMark</tspan>. 분기를 감수하고 재기록을 막는다.</text>

  <!-- 핵심 한 줄 -->
  <rect x="24" y="388" width="872" height="64" rx="8" fill="#10243a" stroke="#5b9bd5" stroke-width="1.3"/>
  <text x="42" y="412" class="step" fill="#dceaf7">핵심 — 둘 다 "카드를 dirty로 만든다"는 목적은 같다.</text>
  <text x="42" y="434" class="lbl" fill="#c5dcef">차이는 *조건 분기를 둘 것인가*뿐. 기본은 분기를 없애 단일 스레드를 빠르게, UseCondCardMark는 분기를 넣어 멀티코어 false sharing을 줄인다. 워크로드가 결정한다.</text>
</svg>
