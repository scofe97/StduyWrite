<svg viewBox="0 0 920 480" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>SATB(Snapshot At The Beginning, G1) — 조건 ②를 깬다</title>
  <desc>SATB는 마킹 시작 시점의 스냅샷을 기준으로 삼는다. 참조가 끊기기 직전, 쓰기 장벽이 끊기는 옛 대상 Y를 SATB 큐에 기록한다. 그래서 회색 경로가 끊겨도(조건2) Y는 큐에 남아 이번 마킹에서 살아남는다. 끊기는 옛 참조를 보존해 조건2를 깬다. G1이 이 방식이다. 마킹 시작 후 진짜로 죽은 객체도 살려두는 floating garbage가 생기지만 다음 GC에서 회수한다.</desc>
  <defs>
    <style>
      .title { font-size: 16px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11px; fill: rgb(138,133,128); }
      .shead { font-size: 12.5px; font-weight: 800; }
      .gen   { font-size: 11.5px; font-weight: 800; fill: #9a958f; }
      .step  { font-size: 11.5px; font-weight: 700; }
      .note  { font-size: 10px; fill: rgb(160,155,150); }
      .lbl   { font-size: 10.5px; fill: rgb(180,175,170); }
      .code  { font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    </style>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,4.5 L0,9 z" fill="#8a8580"/></marker>
    <marker id="aok" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,4.5 L0,9 z" fill="#81c784"/></marker>
    <marker id="aw" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,4.5 L0,9 z" fill="#d4a853"/></marker>
  </defs>
  <rect x="0" y="0" width="920" height="480" fill="#0d0d0d"/>
  <text x="24" y="32" class="title">SATB (Snapshot At The Beginning · G1) — 조건 ②를 깬다</text>
  <text x="24" y="52" class="sub">"참조가 끊기기 직전, 끊기는 옛 대상 Y를 큐에 기록해 둔다 → 끊겨도 Y를 살려둔다"</text>

  <!-- step 1: 끊기기 직전 -->
  <text x="24" y="86" class="shead" fill="#f5d76e">① 회색 G가 흰 Y를 가리키는 중 — 앱이 G.ref=null로 끊으려 함</text>
  <rect x="36" y="98" width="848" height="86" rx="8" fill="none" stroke="#5a5a5a" stroke-width="1.3"/>
  <text x="52" y="118" class="note" fill="#8a8580">Heap</text>
  <rect x="448" y="124" width="420" height="52" rx="6" fill="#161616" stroke="#4a4a4a"/>
  <text x="462" y="140" class="gen">Young Gen</text>
  <circle cx="540" cy="153" r="20" fill="#8a8580" stroke="#e8e4df" stroke-width="1.4"/>
  <text x="540" y="158" class="step" text-anchor="middle" fill="#0d0d0d">G</text>
  <circle cx="760" cy="153" r="20" fill="#f0f0f0" stroke="#e8e4df" stroke-width="1.4"/>
  <text x="760" y="158" class="step" text-anchor="middle" fill="#0d0d0d">Y</text>
  <line x1="562" y1="153" x2="736" y2="153" stroke="#e57373" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="649" y="143" class="code" text-anchor="middle" fill="#e57373">G.ref = null (끊김)</text>
  <text x="62" y="150" class="lbl">마킹은 *시작 시점의 스냅샷*을</text>
  <text x="62" y="168" class="lbl">기준으로 본다 (Snapshot At Beginning).</text>

  <!-- step 2: pre-write barrier가 옛 참조를 큐에 -->
  <text x="24" y="216" class="shead" fill="#d4a853">② pre-write 장벽: 끊기기 *직전* 옛 대상 Y를 SATB 큐에 기록</text>
  <rect x="36" y="228" width="848" height="84" rx="8" fill="#2a1f0a" stroke="#d4a853" stroke-width="1.2"/>
  <circle cx="120" cy="270" r="20" fill="#f0f0f0" stroke="#e8e4df" stroke-width="1.4"/>
  <text x="120" y="275" class="step" text-anchor="middle" fill="#0d0d0d">Y</text>
  <text x="120" y="300" class="note" text-anchor="middle">끊기는 옛 대상</text>
  <line x1="148" y1="270" x2="250" y2="270" stroke="#d4a853" stroke-width="2.4" marker-end="url(#aw)"/>
  <text x="199" y="260" class="note" text-anchor="middle" fill="#f5d76e">기록</text>
  <!-- SATB 큐 -->
  <rect x="262" y="248" width="180" height="44" rx="6" fill="#dceaf7" stroke="#5b9bd5"/>
  <text x="352" y="268" class="code" text-anchor="middle" fill="#0d1a26">SATB queue</text>
  <text x="352" y="284" class="note" text-anchor="middle" fill="#3a5a70">[ Y ]  ← 살려둘 목록</text>
  <text x="470" y="262" class="lbl">참조를 *지우기 전에* 옛 값(Y)을 큐에 남긴다.</text>
  <text x="470" y="280" class="lbl">"마킹 시작 때 살아있었으니 이번엔 살려둔다"는 약속.</text>
  <text x="470" y="298" class="lbl">post-write(카드)와 달리 *대입 전*에 동작 = pre-write barrier.</text>

  <!-- step 3: 마킹 끝 -->
  <text x="24" y="344" class="shead" fill="#81c784">③ 마킹 끝 — 큐에 있던 Y를 살아있다고 표시 → 회수 안 됨</text>
  <rect x="36" y="356" width="848" height="62" rx="8" fill="#101a10" stroke="#4ab080" stroke-width="1.2"/>
  <rect x="56" y="372" width="160" height="32" rx="5" fill="#dceaf7" stroke="#5b9bd5"/>
  <text x="136" y="393" class="code" text-anchor="middle" fill="#0d1a26">SATB queue [Y]</text>
  <line x1="220" y1="388" x2="300" y2="388" stroke="#81c784" stroke-width="2.2" marker-end="url(#aok)"/>
  <text x="260" y="379" class="note" text-anchor="middle" fill="#81c784">처리</text>
  <circle cx="332" cy="388" r="18" fill="#8a8580" stroke="#e8e4df" stroke-width="1.4"/>
  <text x="332" y="393" class="step" text-anchor="middle" fill="#0d0d0d">Y</text>
  <text x="332" y="414" class="note" text-anchor="middle" fill="#81c784">살아남음</text>
  <text x="420" y="384" class="lbl">G→Y가 끊겼어도(조건②) Y는 큐에 있어 회수되지 않는다.</text>
  <text x="420" y="402" class="lbl">조건 ②(회색 경로 모두 끊김)가 깨졌다.</text>

  <!-- 핵심 + floating garbage -->
  <rect x="24" y="432" width="872" height="40" rx="6" fill="#10243a" stroke="#5b9bd5" stroke-width="1.2"/>
  <text x="42" y="452" class="lbl" fill="#c5dcef"><tspan class="step" fill="#dceaf7">핵심</tspan> — SATB는 *끊기는 옛 참조*를 보존해 시작 시점 스냅샷을 지킨다. 부작용: 마킹 시작 후 진짜 죽은 객체도 살려둠(floating garbage)</text>
  <text x="42" y="467" class="lbl" fill="#c5dcef">→ 이번 GC엔 못 죽이고 *다음 GC*로 미룬다. 대신 안전하고 빠르다. G1이 이 방식을 택했다.</text>
</svg>
