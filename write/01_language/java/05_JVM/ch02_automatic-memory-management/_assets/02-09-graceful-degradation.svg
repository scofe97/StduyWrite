<svg viewBox="0 0 920 660" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>losing the race와 graceful degradation — 할당이 회수를 앞지를 때 JVM이 무너지지 않는 두 갈래</title>
  <desc>concurrent GC는 앱이 객체를 할당하는 그 와중에 회수를 진행한다. 앱의 할당 속도가 GC의 회수 속도를 앞지르면 회수가 끝나기 전에 힙이 차버린다. 이것이 losing the race다. 이때 JVM은 크래시나 OutOfMemoryError로 직행하지 않고 두 갈래로 우아하게 성능만 양보한다. 하나는 STW 폴백으로, 앱을 잠깐 멈춰 세우고 확실히 공간을 회수한다. 다른 하나는 allocation stall로, 새 할당을 요청한 앱 스레드를 잠깐씩 멈춰 세워 할당 속도 자체를 늦추고 GC가 따라잡을 시간을 번다. 어느 쪽이든 정합성은 지키되 pause가 길어지거나 처리량이 잠깐 떨어질 뿐이다.</desc>
  <defs>
    <style>
      .title { font-size: 16px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11px; fill: rgb(138,133,128); }
      .shead { font-size: 13px; font-weight: 800; fill: rgb(212,168,83); }
      .lbl   { font-size: 11px; font-weight: 700; fill: #e8e4df; }
      .note  { font-size: 10px; fill: rgb(160,155,150); }
      .stw   { font-size: 9.5px; font-weight: 800; }
      .big   { font-size: 12px; font-weight: 800; }
    </style>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#e57373"/></marker>
    <marker id="arg" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#66bb6a"/></marker>
  </defs>
  <rect x="0" y="0" width="920" height="660" fill="#0d0d0d"/>
  <text x="24" y="32" class="title">losing the race — 할당이 회수를 앞지르는 순간, 그리고 두 갈래 완충</text>
  <text x="24" y="52" class="sub">concurrent GC의 전제는 "청소 속도 ≥ 더럽히는 속도". 이 부등호가 뒤집히면 힙이 차버린다.</text>

  <!-- 상단: 경주 -->
  <text x="24" y="86" class="shead">① 두 속도의 경주 — 할당 곡선이 회수 곡선을 앞지르면 힙이 100%에 닿는다</text>
  <g transform="translate(24,98)">
    <rect x="0" y="0" width="872" height="120" rx="6" fill="#0d0d0d" stroke="#5a5a5a"/>
    <!-- 힙 상한선 -->
    <line x1="20" y1="18" x2="852" y2="18" stroke="#e57373" stroke-dasharray="5,3"/>
    <text x="852" y="14" class="note" text-anchor="end" fill="#f5b0b0">힙 100% (꽉 참)</text>
    <!-- 할당 곡선 (앱): 가파르게 상승 -->
    <path d="M20,100 L300,70 L560,35 L720,18" fill="none" stroke="#5b9bd5" stroke-width="2.5"/>
    <text x="360" y="58" class="note" fill="#9ec9e8">할당(앱) — 빠르게 힙을 채움</text>
    <!-- 회수 곡선 (GC): 완만 -->
    <path d="M20,100 L300,88 L560,74 L852,64" fill="none" stroke="#66bb6a" stroke-width="2.5"/>
    <text x="600" y="88" class="note" fill="#81c784">회수(GC) — 못 따라감</text>
    <!-- 교차/한계 지점 -->
    <circle cx="720" cy="18" r="6" fill="#e57373"/>
    <text x="720" y="38" class="stw" text-anchor="middle" fill="#f5b0b0">★ losing the race</text>
    <text x="20" y="115" class="note">t0 — 여유 있음</text>
  </g>

  <!-- 갈림길 -->
  <text x="24" y="252" class="shead">② 이 순간 JVM은 크래시하지 않는다 — 두 갈래로 "우아하게" 성능만 양보 (graceful degradation)</text>

  <!-- 왼쪽: STW 폴백 -->
  <g transform="translate(24,266)">
    <rect x="0" y="0" width="424" height="200" rx="8" fill="#141414" stroke="#e57373"/>
    <text x="18" y="26" class="big" fill="#f5b0b0">갈래 A — STW 폴백 (fall back to STW)</text>
    <text x="18" y="46" class="note">"저지연 포기, 앱을 멈춰 세우고 확실히 회수"</text>
    <!-- 스레드 흐름 -->
    <text x="18" y="74" class="note">앱 스레드</text>
    <rect x="90" y="64" width="70" height="14" rx="2" fill="#15300f" stroke="#66bb6a"/><text x="125" y="75" class="note" text-anchor="middle" fill="#81c784">실행</text>
    <rect x="160" y="64" width="150" height="14" rx="2" fill="#2a1414" stroke="#e57373"/><text x="235" y="75" class="stw" text-anchor="middle" fill="#f5b0b0">전부 멈춤 (STW)</text>
    <rect x="310" y="64" width="60" height="14" rx="2" fill="#15300f" stroke="#66bb6a"/><text x="340" y="75" class="note" text-anchor="middle" fill="#81c784">재개</text>
    <text x="18" y="98" class="note">GC 스레드</text>
    <line x1="90" y1="104" x2="160" y2="104" stroke="#3a3a3a" stroke-dasharray="4,3"/>
    <rect x="160" y="97" width="150" height="14" rx="2" fill="#5b9bd5" stroke="#3a6a90"/><text x="235" y="108" class="note" text-anchor="middle" fill="#e8e4df">전력 회수 (parallel 총동원)</text>
    <text x="18" y="140" class="note" fill="rgb(160,155,150)">• 이건 *계획된* STW가 아니라 공간이 없어</text>
    <text x="18" y="156" class="note" fill="rgb(160,155,150)">  어쩔 수 없이 세운 <tspan fill="#f5b0b0" font-weight="700">응급 STW</tspan>다.</text>
    <text x="18" y="180" class="note">대가 → 그 순간 pause가 길어짐 (수십~수백 ms)</text>
  </g>

  <!-- 오른쪽: allocation stall -->
  <g transform="translate(472,266)">
    <rect x="0" y="0" width="424" height="200" rx="8" fill="#141414" stroke="#5b9bd5"/>
    <text x="18" y="26" class="big" fill="#9ec9e8">갈래 B — allocation stall (할당 지연)</text>
    <text x="18" y="46" class="note">"할당하려는 스레드만 잠깐씩 세워 속도를 늦춤"</text>
    <text x="18" y="74" class="note">앱 스레드</text>
    <rect x="90" y="64" width="50" height="14" rx="2" fill="#15300f" stroke="#66bb6a"/><text x="115" y="75" class="note" text-anchor="middle" fill="#81c784">실행</text>
    <rect x="140" y="64" width="26" height="14" rx="2" fill="#2a1414" stroke="#e57373"/>
    <rect x="166" y="64" width="44" height="14" rx="2" fill="#15300f" stroke="#66bb6a"/>
    <rect x="210" y="64" width="26" height="14" rx="2" fill="#2a1414" stroke="#e57373"/>
    <rect x="236" y="64" width="44" height="14" rx="2" fill="#15300f" stroke="#66bb6a"/>
    <rect x="280" y="64" width="26" height="14" rx="2" fill="#2a1414" stroke="#e57373"/>
    <rect x="306" y="64" width="60" height="14" rx="2" fill="#15300f" stroke="#66bb6a"/>
    <text x="18" y="98" class="note">GC 스레드</text>
    <rect x="90" y="91" width="276" height="14" rx="2" fill="#66bb6a" stroke="#2f7d34"/><text x="228" y="102" class="note" text-anchor="middle" fill="#0d1a0d">계속 돌며 따라잡음 (앱은 안 멈춤)</text>
    <text x="18" y="140" class="note" fill="rgb(160,155,150)">• 새 할당을 요청한 스레드를 <tspan fill="#f5b0b0" font-weight="700">짧게 여러 번</tspan></text>
    <text x="18" y="156" class="note" fill="rgb(160,155,150)">  멈춰(위 빨간 조각) 할당 속도를 눌러준다.</text>
    <text x="18" y="180" class="note">대가 → 앱 처리량이 잠깐 떨어짐 (긴 한 방 대신 분산)</text>
  </g>

  <!-- 핵심 -->
  <rect x="24" y="482" width="872" height="158" rx="8" fill="#141414" stroke="#2a2520"/>
  <text x="42" y="508" class="lbl" fill="rgb(212,168,83)">핵심 — "graceful(우아한)"이란 무엇인가</text>
  <text x="42" y="534" class="note">• losing the race가 곧바로 <tspan fill="#f5b0b0" font-weight="700">OutOfMemoryError·크래시로 직행하지 않는다</tspan>. 잠깐 멈추거나(A) 잠깐 느려질(B) 뿐 정합성은 지킨다.</text>
  <text x="42" y="558" class="note">• "완전히 무너지느냐 vs 잠깐 성능만 양보하느냐"의 갈림길에서 <tspan fill="#81c784" font-weight="700">후자를 택하도록 설계</tspan>된 것이 graceful degradation.</text>
  <text x="42" y="582" class="note">• ZGC·Shenandoah는 allocation stall을 <tspan fill="#9ec9e8" font-weight="700">짧게 여러 번</tspan> 나눠 걸어 "긴 한 방 STW" 대신 "짧은 여러 번의 미세 지연"으로 분산한다.</text>
  <text x="42" y="606" class="note">• 그래서 스레드 수 튜닝은 *losing the race의 빈도*를 조절하는 일이고, graceful degradation은 *그 순간이 와도 안 무너지게* 하는 마지막 방어선.</text>
  <text x="42" y="630" class="note">• concurrent 스레드를 너무 적게 주면 → losing the race 빈도↑ → A/B가 자주 발동 → 결국 응답성·처리량이 함께 나빠진다.</text>
</svg>
