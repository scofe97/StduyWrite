<svg viewBox="0 0 920 640" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>Shenandoah — forwarding pointer를 메모리 위에서: 객체 헤더에 "새 위치" 이정표를 둔다</title>
  <desc>Shenandoah는 객체마다 헤더에 forwarding pointer라는 추가 워드를 둔다. 평소엔 자기 자신을 가리키고, GC가 객체를 옮기는 중에는 새 위치를 가리킨다. 앱이 객체를 읽을 때마다 Read Barrier가 이 forwarding pointer를 무조건 한 번 따라가므로, 객체가 옮겨졌든 아니든 항상 최신 위치의 데이터를 본다. 대가는 두 가지다. 객체당 1워드의 메모리 오버헤드, 그리고 모든 읽기에 우회 한 단계가 붙는 throughput 비용 약 5에서 15퍼센트다.</desc>
  <defs>
    <style>
      .title { font-size: 16px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11px; fill: rgb(138,133,128); }
      .shead { font-size: 13px; font-weight: 800; fill: rgb(212,168,83); }
      .lbl   { font-size: 11px; font-weight: 700; fill: #e8e4df; }
      .note  { font-size: 10px; fill: rgb(160,155,150); }
      .cell  { font-size: 11px; font-weight: 700; }
      .mono  { font-size: 10px; font-family: 'SFMono-Regular', ui-monospace, monospace; }
    </style>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="rgb(212,168,83)"/></marker>
    <marker id="arB" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#5b9bd5"/></marker>
    <marker id="arF" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#d4a853"/></marker>
  </defs>
  <rect x="0" y="0" width="920" height="640" fill="#0d0d0d"/>
  <text x="24" y="32" class="title">Shenandoah — forwarding pointer를 메모리 위에서 보기</text>
  <text x="24" y="52" class="sub">객체 헤더에 "새 위치 이정표"(fwd)를 둔다. 앱은 읽을 때마다 *무조건 이 이정표를 한 번 거쳐* 최신 위치로 간다.</text>

  <!-- ① 객체 메모리 구조: 평소 vs 이동 중 -->
  <text x="24" y="86" class="shead">① 객체 메모리 구조 — 헤더에 fwd 워드 1개가 붙는다 (이게 메모리 오버헤드)</text>

  <text x="24" y="112" class="note">평소 (이동 안 됨) — fwd는 *자기 자신*을 가리킨다</text>
  <g transform="translate(24,120)">
    <rect x="0" y="0" width="300" height="52" rx="5" fill="#0d0d0d" stroke="#5a5a5a"/>
    <rect x="6" y="6" width="70" height="40" fill="#3a3f4a" stroke="#7a8290"/><text x="41" y="22" class="cell" text-anchor="middle" fill="#dfe4ea">헤더</text><text x="41" y="37" class="note" text-anchor="middle">mark</text>
    <rect x="78" y="6" width="86" height="40" fill="#2a3550" stroke="#5b9bd5"/><text x="121" y="22" class="cell" text-anchor="middle" fill="#9ec9e8">fwd</text><text x="121" y="37" class="mono" text-anchor="middle" fill="#9ec9e8">→ self</text>
    <rect x="166" y="6" width="128" height="40" fill="#5b9bd5" stroke="#3a6a90"/><text x="230" y="30" class="cell" text-anchor="middle" fill="#0d1a26">A 필드들</text>
    <!-- self loop -->
    <path d="M121,52 q0,18 40,18 q40,0 40,-18" fill="none" stroke="#5b9bd5" stroke-width="1.5" marker-end="url(#arB)"/>
  </g>
  <text x="340" y="150" class="note" fill="#9ec9e8">→ fwd가 자기 객체를 가리키니, 읽으면 곧장 A 필드에 닿는다.</text>

  <text x="24" y="200" class="note">이동 중 — GC가 A를 새 위치로 복사하고, 옛 자리의 fwd를 *새 위치*로 바꿔 둔다 (이정표만 남김)</text>
  <g transform="translate(24,208)">
    <!-- old -->
    <rect x="0" y="0" width="300" height="52" rx="5" fill="#0d0d0d" stroke="#5a5a5a"/>
    <rect x="6" y="6" width="70" height="40" fill="#2a2a2a" stroke="#555"/><text x="41" y="22" class="note" text-anchor="middle">헤더(옛)</text>
    <rect x="78" y="6" width="86" height="40" fill="#3a2f10" stroke="#d4a853"/><text x="121" y="22" class="cell" text-anchor="middle" fill="#f5d76e">fwd</text><text x="121" y="37" class="mono" text-anchor="middle" fill="#f5d76e">→ new</text>
    <rect x="166" y="6" width="128" height="40" fill="#1a1a1a" stroke="#444" stroke-dasharray="3,2"/><text x="230" y="30" class="note" text-anchor="middle">옛 필드(버려짐)</text>
    <!-- new -->
    <rect x="470" y="0" width="300" height="52" rx="5" fill="#0d0d0d" stroke="#5a5a5a"/>
    <rect x="476" y="6" width="70" height="40" fill="#3a3f4a" stroke="#7a8290"/><text x="511" y="30" class="cell" text-anchor="middle" fill="#dfe4ea">헤더</text>
    <rect x="548" y="6" width="86" height="40" fill="#2a3550" stroke="#5b9bd5"/><text x="591" y="22" class="cell" text-anchor="middle" fill="#9ec9e8">fwd</text><text x="591" y="37" class="mono" text-anchor="middle" fill="#9ec9e8">→ self</text>
    <rect x="636" y="6" width="128" height="40" fill="#5b9bd5" stroke="#3a6a90"/><text x="700" y="30" class="cell" text-anchor="middle" fill="#0d1a26">A 필드들</text>
    <!-- old fwd → new -->
    <line x1="164" y1="26" x2="468" y2="26" stroke="#d4a853" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arF)"/>
    <text x="316" y="18" class="note" fill="#f5d76e" text-anchor="middle">fwd가 새 위치를 가리킴</text>
  </g>
  <text x="24" y="288" class="note">→ 옛 자리엔 <tspan fill="#f5d76e" font-weight="700">이정표(fwd→new)만</tspan> 남는다. 앱이 옛 참조로 와도 이 이정표를 따라가면 새 A에 닿는다.</text>

  <!-- ② Read Barrier 동작 -->
  <text x="24" y="326" class="shead">② Read Barrier — 앱이 객체를 읽을 때마다 *무조건* fwd를 한 번 따라간다 (이동 여부와 무관)</text>
  <g transform="translate(24,340)">
    <rect x="0" y="0" width="200" height="50" rx="6" fill="#101820" stroke="#5b9bd5"/>
    <text x="100" y="22" class="lbl" text-anchor="middle" fill="#9ec9e8">앱: obj.field 읽기</text>
    <text x="100" y="40" class="note" text-anchor="middle">낡은 참조일 수도</text>
    <line x1="200" y1="25" x2="248" y2="25" stroke="#5b9bd5" stroke-width="2" marker-end="url(#arB)"/>
    <rect x="250" y="0" width="230" height="50" rx="6" fill="#101820" stroke="#5b9bd5"/>
    <text x="365" y="22" class="lbl" text-anchor="middle" fill="#9ec9e8">Read Barrier: fwd 따라감</text>
    <text x="365" y="40" class="note" text-anchor="middle">항상 1회 우회 (self든 new든)</text>
    <line x1="480" y1="25" x2="528" y2="25" stroke="#5b9bd5" stroke-width="2" marker-end="url(#arB)"/>
    <rect x="530" y="0" width="318" height="50" rx="6" fill="#15300f" stroke="#66bb6a"/>
    <text x="689" y="22" class="lbl" text-anchor="middle" fill="#81c784">최신 위치의 A를 읽음</text>
    <text x="689" y="40" class="note" text-anchor="middle">이동 중에도 옛 데이터를 볼 일이 없다</text>
  </g>
  <text x="24" y="410" class="note">→ 평소(fwd→self)에도 우회가 일어난다. "이동했나?" 분기 없이 *늘* 한 단계 거치는 게 Shenandoah 방식이다.</text>

  <!-- ③ Shenandoah 단계 -->
  <text x="24" y="448" class="shead">③ 전체 단계 — 마킹·이동·참조 갱신 모두 STW는 짧고 나머지는 동시</text>
  <g transform="translate(24,460)" font-size="9.5" font-weight="800">
    <rect x="0" y="0" width="120" height="30" rx="4" fill="#2a1414" stroke="#e57373"/><text x="60" y="19" text-anchor="middle" fill="#f5b0b0">초기 마크 STW</text>
    <rect x="126" y="0" width="150" height="30" rx="4" fill="#15300f" stroke="#66bb6a"/><text x="201" y="19" text-anchor="middle" fill="#81c784">동시 마크</text>
    <rect x="282" y="0" width="130" height="30" rx="4" fill="#2a1414" stroke="#e57373"/><text x="347" y="19" text-anchor="middle" fill="#f5b0b0">최종 마크 STW</text>
    <rect x="418" y="0" width="160" height="30" rx="4" fill="#15300f" stroke="#66bb6a"/><text x="498" y="19" text-anchor="middle" fill="#81c784">동시 정리(이동)</text>
    <rect x="584" y="0" width="264" height="30" rx="4" fill="#15300f" stroke="#66bb6a"/><text x="716" y="19" text-anchor="middle" fill="#81c784">동시 참조 갱신 (+짧은 STW 마무리)</text>
  </g>
  <text x="24" y="512" class="note">→ 큰 힙(수십 GB)에서도 일시 정지가 *10ms 이하*에 머문다. 무거운 이동·갱신을 전부 동시 구간으로 뺐기 때문.</text>

  <!-- 핵심 -->
  <rect x="24" y="536" width="872" height="96" rx="8" fill="#141414" stroke="#2a2520"/>
  <text x="42" y="562" class="lbl" fill="rgb(212,168,83)">핵심 — forwarding pointer의 이득과 대가</text>
  <text x="42" y="586" class="note">• 이득: 객체가 옮겨져도 옛 자리의 *fwd 이정표*가 새 위치로 안내 → 이동을 앱과 동시에 할 수 있다.</text>
  <text x="42" y="606" class="note">• 대가 1 (메모리): 객체마다 fwd 워드 1개 추가 → 힙 오버헤드.  대가 2 (속도): *모든 읽기*에 우회 1단계 → throughput ~5-15% ↓.</text>
  <text x="42" y="626" class="note">• ZGC는 같은 목표를 fwd 워드 *없이* 포인터 비트로 푼다(우회를 대부분 생략) → 다음 그림.</text>
</svg>
