<svg viewBox="0 0 900 470" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>OOM Killer(SIGKILL) vs OutOfMemoryError — 두 종류의 죽음</title>
  <desc>왼쪽은 JVM이 힙·Metaspace 부족으로 던지는 자바 예외로 스택 트레이스와 힙 덤프가 남는다. 오른쪽은 cgroup RSS 초과로 커널이 SIGKILL하는 것으로 자바 예외도 힙 덤프도 없이 exit 137과 OOMKilled만 남는다.</desc>
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11.5px; fill: rgb(138,133,128); }
      .head  { font-size: 14px; font-weight: 800; }
      .nm    { font-size: 12px; font-weight: 700; fill: #e8e4df; }
      .mt    { font-size: 10.5px; fill: rgb(138,133,128); }
      .code  { font-size: 10.5px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
      .good  { font-size: 11px; font-weight: 700; fill: #66bb6a; }
      .bad   { font-size: 11px; font-weight: 700; fill: #f44336; }
    </style>
    <marker id="arrowD" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="rgb(138,133,128)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="470" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">두 종류의 죽음 — 로그를 보면 어느 쪽인지 갈린다</text>
  <text x="28" y="58" class="sub">OutOfMemoryError = JVM이 던지는 예외 · OOM Killer = 커널이 SIGKILL · 진단 갈림길은 "로그에 예외가 있나"</text>

  <!-- ===== 왼쪽: OutOfMemoryError ===== -->
  <rect x="40" y="82" width="390" height="352" rx="10" fill="rgba(96,165,224,0.08)" stroke="#5b9bd5" stroke-width="2"/>
  <text x="60" y="112" class="head" style="fill:#5b9bd5">OutOfMemoryError (자바 예외)</text>

  <rect x="60" y="130" width="350" height="48" rx="7" fill="rgb(26,26,26)" stroke="#5b9bd5"/>
  <text x="80" y="151" class="nm">누가 던지나</text>
  <text x="80" y="169" class="mt">JVM — 힙·Metaspace 등 자기 관리 영역 부족</text>

  <rect x="60" y="188" width="350" height="66" rx="7" fill="rgb(26,26,26)" stroke="#5b9bd5"/>
  <text x="80" y="209" class="nm">무엇이 남나</text>
  <text x="80" y="228" class="code" fill="#f44336">java.lang.OutOfMemoryError: Java heap space</text>
  <text x="80" y="246" class="mt">스택 트레이스 + 힙 덤프(.hprof)</text>

  <rect x="60" y="264" width="350" height="48" rx="7" fill="rgb(26,26,26)" stroke="#5b9bd5"/>
  <text x="80" y="285" class="nm">기회가 주어지나</text>
  <text x="80" y="303" class="good">✔ finally · 종료 훅 · 로그 실행됨</text>

  <rect x="60" y="322" width="350" height="94" rx="7" fill="rgba(102,187,106,0.10)" stroke="#66bb6a"/>
  <text x="80" y="343" class="nm">진단 경로</text>
  <text x="80" y="363" class="mt">→ 01-03 영역별 OOM 재현</text>
  <text x="80" y="382" class="mt">→ 힙 덤프를 MAT·VisualVM으로 분석</text>
  <text x="80" y="404" class="good">힙·Metaspace 문제로 좁혀진다</text>

  <!-- ===== 오른쪽: OOM Killer ===== -->
  <rect x="470" y="82" width="390" height="352" rx="10" fill="rgba(244,67,54,0.08)" stroke="#f44336" stroke-width="2"/>
  <text x="490" y="112" class="head" style="fill:#f44336">OOM Killer (커널 SIGKILL)</text>

  <rect x="490" y="130" width="350" height="48" rx="7" fill="rgb(26,26,26)" stroke="#f44336"/>
  <text x="510" y="151" class="nm">누가 죽이나</text>
  <text x="510" y="169" class="mt">커널 — cgroup RSS가 memory.max 초과</text>

  <rect x="490" y="188" width="350" height="66" rx="7" fill="rgb(26,26,26)" stroke="#f44336"/>
  <text x="510" y="209" class="nm">무엇이 남나</text>
  <text x="510" y="228" class="code" fill="#f44336">exit 137 · State: OOMKilled</text>
  <text x="510" y="246" class="mt">자바 예외 없음 · 힙 덤프 없음 · 로그 없음</text>

  <rect x="490" y="264" width="350" height="48" rx="7" fill="rgb(26,26,26)" stroke="#f44336"/>
  <text x="510" y="285" class="nm">기회가 주어지나</text>
  <text x="510" y="303" class="bad">✕ finally · 종료 훅 실행 못 함 (즉시 SIGKILL)</text>

  <rect x="490" y="322" width="350" height="94" rx="7" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)"/>
  <text x="510" y="343" class="nm">진단 경로</text>
  <text x="510" y="363" class="mt">→ 이 노트 §3 NMT로 좁히기</text>
  <text x="510" y="382" class="mt">→ §5 jemalloc + async-profiler</text>
  <text x="510" y="404" class="code" fill="rgb(212,168,83)">힙 밖 네이티브가 RSS 초과</text>

  <!-- 가운데 갈림길 라벨 -->
  <line x1="435" y1="255" x2="465" y2="255" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#arrowD)"/>
  <text x="450" y="240" class="mt" text-anchor="middle">↕</text>
</svg>
