<svg viewBox="0 0 920 440" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>폴링 페이지 — 페이지 한 장을 막아 모든 스레드를 멈추는 트릭</title>
  <desc>JIT는 각 안전 지점에 특별한 메모리 페이지(safepoint polling page) 한 장을 읽는 명령을 박아 둔다. 평소엔 그냥 읽혀 통과하지만, GC가 그 페이지를 접근 불가로 막으면 스레드가 읽는 순간 SIGSEGV 트랩에 빠져 그 안전 지점에서 멈춘다. 페이지 한 장만 막으면 모든 스레드가 알아서 걸려 멈춘다.</desc>
  <defs>
    <style>
      .title  { font-size: 16px; font-weight: 800; fill: #e8e4df; }
      .sub    { font-size: 11px; fill: rgb(138,133,128); }
      .shead  { font-size: 13px; font-weight: 800; }
      .mono   { font-size: 11.5px; font-weight: 700; font-family: 'JetBrains Mono', monospace; fill: #e8e4df; }
      .step   { font-size: 11.5px; font-weight: 700; }
      .note   { font-size: 10px; fill: rgb(160,155,150); }
      .lbl    { font-size: 10.5px; fill: rgb(180,175,170); }
    </style>
    <marker id="ag" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#81c784"/></marker>
    <marker id="ax" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 z" fill="#e57373"/></marker>
  </defs>
  <rect x="0" y="0" width="920" height="440" fill="#0d0d0d"/>
  <text x="24" y="32" class="title">폴링 페이지 — 한 장을 막아 모든 스레드를 멈추는 트릭</text>
  <text x="24" y="52" class="sub">JIT가 각 안전 지점에 "이 페이지를 읽어라" 명령을 박아 둔다. GC는 스레드를 직접 안 멈추고, 그 페이지 한 장만 건드린다.</text>

  <!-- 가운데 폴링 페이지 -->
  <rect x="396" y="150" width="128" height="92" rx="8" fill="#1a1a1a" stroke="#8a8580" stroke-width="1.5"/>
  <text x="460" y="178" class="step" text-anchor="middle" fill="#e8e4df">폴링 페이지</text>
  <text x="460" y="196" class="note" text-anchor="middle">safepoint</text>
  <text x="460" y="210" class="note" text-anchor="middle">polling page</text>
  <text x="460" y="230" class="note" text-anchor="middle">(OS 메모리 한 장)</text>

  <!-- ===== 평소 (왼쪽) ===== -->
  <text x="180" y="96" class="shead" fill="#81c784" text-anchor="middle">평소 — GC 없음</text>
  <rect x="60" y="116" width="240" height="64" rx="8" fill="#1e3a4a" stroke="#4a8ab0"/>
  <text x="180" y="142" class="step" text-anchor="middle" fill="#dceaf7">스레드: 안전 지점 도달</text>
  <text x="180" y="162" class="mono" font-size="11" text-anchor="middle" fill="#b8d4e8">read(폴링 페이지)</text>
  <!-- 페이지 상태: 읽기 가능 -->
  <rect x="60" y="196" width="240" height="44" rx="6" fill="#15300f" stroke="#66bb6a"/>
  <text x="180" y="222" class="step" text-anchor="middle" fill="#81c784">✓ 그냥 읽힘 → 통과 (거의 공짜)</text>
  <!-- 화살표 평소 -->
  <line x1="300" y1="170" x2="392" y2="186" stroke="#81c784" stroke-width="2" marker-end="url(#ag)"/>
  <text x="346" y="166" class="note" text-anchor="middle" fill="#81c784">읽기 OK</text>

  <!-- ===== GC 시작 (오른쪽) ===== -->
  <text x="740" y="96" class="shead" fill="#e57373" text-anchor="middle">GC 시작 — 페이지를 막음</text>
  <!-- GC가 페이지 막기 -->
  <rect x="620" y="116" width="240" height="44" rx="6" fill="#2a1414" stroke="#e57373" stroke-width="1.6"/>
  <text x="740" y="142" class="step" text-anchor="middle" fill="#e57373">① GC가 페이지를 접근 불가로</text>
  <line x1="618" y1="138" x2="528" y2="170" stroke="#e57373" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#ax)"/>
  <text x="572" y="150" class="note" text-anchor="middle" fill="#e57373">protect</text>
  <!-- 스레드가 읽다 트랩 -->
  <rect x="620" y="172" width="240" height="64" rx="8" fill="#2a1f0a" stroke="#d4a853" stroke-width="1.6"/>
  <text x="740" y="196" class="step" text-anchor="middle" fill="#f5d76e">② 스레드: read(페이지) 시도</text>
  <text x="740" y="214" class="note" text-anchor="middle">→ 접근 위반 → SIGSEGV 트랩</text>
  <text x="740" y="228" class="note" text-anchor="middle">→ 트랩 핸들러가 그 안전 지점서 정지</text>
  <line x1="524" y1="200" x2="616" y2="200" stroke="#d4a853" stroke-width="2" marker-end="url(#ax)"/>
  <text x="570" y="190" class="note" text-anchor="middle" fill="#d4a853">읽기 막힘</text>

  <!-- 하단: 여러 스레드 일괄 정지 -->
  <text x="24" y="290" class="shead" fill="rgb(212,168,83)" font-size="12.5">한 장만 막으면 — 모든 스레드가 각자 다음 안전 지점에서 알아서 트랩에 걸려 멈춘다</text>
  <g>
    <rect x="60" y="304" width="150" height="40" rx="6" fill="#2a1f0a" stroke="#d4a853"/>
    <text x="135" y="329" class="step" text-anchor="middle" fill="#f5d76e">스레드 A ⏸ 정지</text>
    <rect x="230" y="304" width="150" height="40" rx="6" fill="#2a1f0a" stroke="#d4a853"/>
    <text x="305" y="329" class="step" text-anchor="middle" fill="#f5d76e">스레드 B ⏸ 정지</text>
    <rect x="400" y="304" width="150" height="40" rx="6" fill="#2a1f0a" stroke="#d4a853"/>
    <text x="475" y="329" class="step" text-anchor="middle" fill="#f5d76e">스레드 C ⏸ 정지</text>
    <rect x="570" y="304" width="290" height="40" rx="6" fill="#5b9bd5" stroke="#3a6a90"/>
    <text x="715" y="329" class="step" text-anchor="middle" fill="#0d1a26">→ 모두 멈춤(STW) → GC 안전하게 수행</text>
  </g>

  <!-- 하단 핵심 -->
  <rect x="24" y="364" width="872" height="60" rx="8" fill="#141414" stroke="#3a3a3a"/>
  <text x="42" y="388" class="lbl"><tspan font-weight="800" fill="#f5d76e">핵심</tspan> — GC는 스레드를 하나하나 멈추라 명령하지 않는다. <tspan font-weight="700" fill="#e57373">페이지 한 장</tspan>만 접근 불가로 막으면,</text>
  <text x="42" y="408" class="lbl">실행 중 모든 스레드가 다음 안전 지점에서 그 페이지를 읽다 트랩에 걸려 *스스로* 멈춘다. 폴링 = "멈춰야 하나"를 안전 지점마다 묻는 행위.</text>
</svg>
