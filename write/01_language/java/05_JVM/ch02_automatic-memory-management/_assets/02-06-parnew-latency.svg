<svg viewBox="0 0 900 520" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>ParNew — CMS와 짝을 맞추는 latency 우선 신세대 병렬 컬렉터</title>
  <desc>ParNew는 Serial의 신세대 마크-카피 알고리즘을 여러 GC 스레드로 병렬화한 컬렉터다. CMS가 구세대에서 일시 정지를 줄이는 latency 우선 컬렉터였기 때문에, ParNew는 CMS의 신세대 짝으로 주로 사용되었다.</desc>
  <defs><style>.title{font-size:17px;font-weight:800;fill:#e8e4df}.sub{font-size:11px;fill:rgb(138,133,128)}.head{font-size:13px;font-weight:800;fill:rgb(212,168,83)}.label{font-size:11px;font-weight:750;fill:#e8e4df}.body{font-size:10px;fill:rgb(180,175,170)}.note{font-size:9.5px;fill:rgb(138,133,128)}.code{font-size:10px;font-weight:700;fill:rgb(212,168,83);font-family:'JetBrains Mono',monospace}.ok{font-size:10px;font-weight:750;fill:#81c784}.bad{font-size:10px;font-weight:750;fill:#e57373}</style><marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="rgb(212,168,83)"/></marker></defs>
  <rect x="0" y="0" width="900" height="520" fill="#0d0d0d"/>
  <text x="26" y="36" class="title">ParNew — CMS와 짝을 맞추는 latency 우선 신세대 병렬 컬렉터</text>
  <text x="26" y="55" class="sub">알고리즘은 Serial과 같지만, 여러 GC 스레드로 Young GC의 STW 시간을 줄이는 쪽에 맞춰졌다</text>
  <rect x="24" y="84" width="852" height="170" rx="8" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="46" y="112" class="head">① 같은 알고리즘, 다른 실행 방식</text>
  <rect x="58" y="142" width="220" height="64" rx="6" fill="#1e3a4a" stroke="#4a8ab0"/><text x="168" y="166" class="label" text-anchor="middle">Serial Young GC</text><text x="168" y="185" class="body" text-anchor="middle">마크-카피 · 단일 GC 스레드</text>
  <line x1="278" y1="174" x2="338" y2="174" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="340" y="142" width="220" height="64" rx="6" fill="#1e3a4a" stroke="#4a8ab0"/><text x="450" y="166" class="label" text-anchor="middle">ParNew</text><text x="450" y="185" class="body" text-anchor="middle">마크-카피 · 다중 GC 스레드</text>
  <line x1="560" y1="174" x2="620" y2="174" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="622" y="142" width="200" height="64" rx="6" fill="#1e2a1e" stroke="#4ab080"/><text x="722" y="166" class="ok" text-anchor="middle">Young STW 단축</text><text x="722" y="185" class="body" text-anchor="middle">멀티코어로 병렬 처리</text>
  <rect x="24" y="284" width="852" height="138" rx="8" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="46" y="312" class="head">② 왜 CMS와 짝이었나</text>
  <rect x="58" y="342" width="246" height="54" rx="6" fill="#2a2a1a" stroke="rgb(212,168,83)"/><text x="181" y="364" class="label" text-anchor="middle">CMS</text><text x="181" y="382" class="body" text-anchor="middle">구세대 latency 우선 · 동시 마크-스윕</text>
  <line x1="304" y1="369" x2="374" y2="369" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="376" y="342" width="246" height="54" rx="6" fill="#1e3a4a" stroke="#4a8ab0"/><text x="499" y="364" class="label" text-anchor="middle">ParNew</text><text x="499" y="382" class="body" text-anchor="middle">신세대 latency 우선 짝</text>
  <line x1="622" y1="369" x2="692" y2="369" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="694" y="342" width="150" height="54" rx="6" fill="#111" stroke="#333"/><text x="769" y="364" class="code" text-anchor="middle">ParNew + CMS</text><text x="769" y="382" class="body" text-anchor="middle">pause 단축 지향</text>
  <rect x="24" y="450" width="852" height="42" rx="6" fill="#111" stroke="#333"/>
  <text x="46" y="476" class="code">주의</text><text x="98" y="476" class="body">ParNew는 JDK 9에서 deprecated, JDK 14에서 CMS와 함께 제거됐다. Parallel Scavenge와 헷갈리면 목표 함수부터 본다.</text>
</svg>
