<svg viewBox="0 0 900 420" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>G1 pause histogram — 한 marking 사이클의 pause 흐름</title>
  <desc>G1은 young GC를 반복하다 IHOP를 넘으면 marking 사이클(initial-mark → concurrent mark → remark → cleanup)을 끼우고, 그 뒤 7번의 mixed GC로 old region을 점진 회수한다. 마지막 mixed pause가 SLO(100ms)를 넘는 게 튜닝의 출발점이다. pause 막대 높이는 상대적 길이를 나타낸다.</desc>
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11.5px; fill: rgb(138,133,128); }
      .lbl   { font-size: 10px; font-weight: 700; fill: #0d0d0d; }
      .lblw  { font-size: 10px; font-weight: 700; fill: #e8e4df; }
      .phase { font-size: 11px; font-weight: 800; fill: #e8e4df; }
      .note  { font-size: 10.5px; fill: rgb(138,133,128); }
      .tick  { font-size: 10px; font-weight: 700; fill: rgb(212,168,83); }
      .mono  { font-family: 'JetBrains Mono', monospace; }
      .slo   { font-size: 10.5px; font-weight: 700; fill: #ff8787; }
    </style>
  </defs>

  <rect x="0" y="0" width="900" height="420" fill="#0d0d0d"/>
  <text x="30" y="38" class="title">G1 pause histogram — 한 marking 사이클의 흐름</text>
  <text x="30" y="58" class="sub">young GC 반복 → IHOP 초과 시 marking 끼움 → mixed GC 7회로 old 점진 회수. 막대 높이 = pause 상대 길이.</text>

  <!-- baseline -->
  <line x1="30" y1="300" x2="870" y2="300" stroke="rgb(80,76,72)" stroke-width="1.5"/>
  <text x="30" y="318" class="note">시간 →</text>

  <!-- SLO line at y=210 (pause = 100ms threshold) -->
  <line x1="30" y1="210" x2="870" y2="210" stroke="#ff8787" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="792" y="205" class="slo">SLO 100ms</text>

  <!-- bars: x, width=34, gap. baseline y=300. heights vary -->
  <!-- 4 young (short, blue) -->
  <g>
    <rect x="40"  y="252" width="34" height="48" fill="#5b9bd5"/>
    <rect x="80"  y="252" width="34" height="48" fill="#5b9bd5"/>
    <rect x="120" y="252" width="34" height="48" fill="#5b9bd5"/>
    <rect x="160" y="252" width="34" height="48" fill="#5b9bd5"/>
    <text x="117" y="338" class="phase" text-anchor="middle">young ×4</text>
  </g>

  <!-- initial-mark (amber, taller) -->
  <rect x="206" y="228" width="34" height="72" fill="rgb(212,168,83)"/>
  <text x="223" y="270" class="lbl mono" text-anchor="middle" transform="rotate(-90 223 270)">init-mark</text>

  <!-- 1 young during concurrent mark -->
  <rect x="252" y="252" width="34" height="48" fill="#5b9bd5"/>
  <text x="269" y="338" class="phase" text-anchor="middle">young</text>
  <text x="269" y="225" class="note" text-anchor="middle">conc mark</text>

  <!-- remark + cleanup (amber) -->
  <rect x="298" y="234" width="34" height="66" fill="rgb(212,168,83)"/>
  <text x="315" y="272" class="lbl mono" text-anchor="middle" transform="rotate(-90 315 272)">remark</text>
  <rect x="338" y="246" width="34" height="54" fill="rgb(212,168,83)"/>
  <text x="355" y="276" class="lbl mono" text-anchor="middle" transform="rotate(-90 355 276)">cleanup</text>

  <!-- 1 young -->
  <rect x="384" y="252" width="34" height="48" fill="#5b9bd5"/>
  <text x="401" y="338" class="phase" text-anchor="middle">young</text>

  <!-- 7 mixed (green, growing; last one over SLO -> red) -->
  <g>
    <rect x="430" y="240" width="34" height="60" fill="#66bb6a"/>
    <rect x="470" y="234" width="34" height="66" fill="#66bb6a"/>
    <rect x="510" y="228" width="34" height="72" fill="#66bb6a"/>
    <rect x="550" y="222" width="34" height="78" fill="#66bb6a"/>
    <rect x="590" y="216" width="34" height="84" fill="#66bb6a"/>
    <rect x="630" y="210" width="34" height="90" fill="#66bb6a"/>
    <rect x="670" y="188" width="34" height="112" fill="#e85d5d"/>
    <text x="550" y="338" class="phase" text-anchor="middle">mixed ×7</text>
    <text x="687" y="180" class="slo" text-anchor="middle">SLO 초과!</text>
  </g>

  <!-- tuning callout box (bright, dark text) -->
  <rect x="430" y="356" width="440" height="48" rx="6" fill="#f5edda" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="444" y="374" class="lbl">마지막 mixed가 SLO를 넘으면 →</text>
  <text x="444" y="392" class="lbl mono">G1OldCSetRegionThresholdPercent↓ · abortable mixed (JDK 12+)</text>
</svg>
