<svg viewBox="0 0 920 480" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>G1이 푼 것 — 처리량이 아니라 지연시간의 예측 가능성</title>
  <desc>Region 분할이 해결한 것은 처리량이 아니라 지연시간의 예측 가능성이다. CMS는 평소 짧은 정지를 주다가 단편화가 누적되면 Concurrent Mode Failure로 수 초 STW가 터져 최악이 예측 불가능했다. G1은 회수 범위가 조절 변수가 되어, 한 번의 정지에서 선택한 Region 집합만 회수하므로 Region 수를 줄이면 정지가 짧아진다. 일시 정지 예측 모델이 MaxGCPauseMillis 목표 안에 몇 개를 회수할지 역산하고, 회수가 곧 evacuation이라 단편화를 조금씩 해소한다. 그래서 정지 시간이 힙 크기의 함수에서 회수할 Region 수의 함수로 바뀐다. 단 soft goal이라 할당 패턴이 급변하면 빗나간다.</desc>
  <defs>
    <style>
      .title{font-size:16px;font-weight:800;fill:#e8e4df;}
      .sub{font-size:11px;fill:rgb(138,133,128);}
      .shead{font-size:12.5px;font-weight:800;}
      .note{font-size:10px;fill:rgb(160,155,150);}
      .lbl{font-size:10.5px;fill:rgb(180,175,170);}
      .axis{font-size:9px;fill:#8a8580;}
    </style>
  </defs>
  <rect x="0" y="0" width="920" height="480" fill="#0d0d0d"/>
  <text x="24" y="32" class="title">G1이 푼 것 — 처리량이 아니라 *지연시간의 예측 가능성*</text>
  <text x="24" y="52" class="sub">"한 번의 정지에 얼마나 걸릴지"를 목표 안에 묶는 것. 평균이 아니라 *최악*이 예측 가능해진다.</text>

  <!-- 두 그래프 비교: 시간축 정지 막대 -->
  <!-- CMS -->
  <text x="24" y="86" class="shead" fill="#f5b0b0">CMS — 평소엔 짧지만, 단편화 누적 시 *최악이 예측 불가*</text>
  <rect x="24" y="98" width="430" height="150" rx="6" fill="#1a1010" stroke="#5a3a3a"/>
  <!-- 목표선 (없음 - CMS는 정지 목표 옵션이 약함) -->
  <line x1="44" y1="210" x2="434" y2="210" stroke="#444" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="40" y="120" class="axis">정지 시간 ↑</text>
  <!-- 막대들: 대부분 짧다가 하나 폭발 -->
  <g>
    <rect x="60"  y="196" width="22" height="14" fill="#66bb6a"/>
    <rect x="100" y="190" width="22" height="20" fill="#66bb6a"/>
    <rect x="140" y="198" width="22" height="12" fill="#66bb6a"/>
    <rect x="180" y="186" width="22" height="24" fill="#66bb6a"/>
    <rect x="220" y="194" width="22" height="16" fill="#66bb6a"/>
    <!-- 폭발 -->
    <rect x="260" y="120" width="22" height="90" fill="#e57373"/>
    <text x="271" y="114" class="note" text-anchor="middle" fill="#e57373">수 초!</text>
    <rect x="300" y="192" width="22" height="18" fill="#66bb6a"/>
    <rect x="340" y="196" width="22" height="14" fill="#66bb6a"/>
    <rect x="380" y="188" width="22" height="22" fill="#66bb6a"/>
  </g>
  <text x="271" y="232" class="note" text-anchor="middle" fill="#e57373">↑ Concurrent Mode Failure → Serial Old 폴백 STW</text>
  <text x="44" y="244" class="axis">시간 →</text>

  <!-- G1 -->
  <text x="490" y="86" class="shead" fill="#81c784">G1 — 회수 범위를 조절해 *목표선 아래*에 정지를 묶는다</text>
  <rect x="466" y="98" width="430" height="150" rx="6" fill="#101a10" stroke="#3a5a3a"/>
  <!-- 목표선 MaxGCPauseMillis -->
  <line x1="486" y1="160" x2="876" y2="160" stroke="#d4a853" stroke-width="1.6" stroke-dasharray="5,3"/>
  <text x="880" y="158" class="axis" text-anchor="end" fill="#f5d76e">MaxGCPauseMillis 목표(200ms)</text>
  <text x="482" y="120" class="axis">정지 시간 ↑</text>
  <g>
    <rect x="502" y="172" width="22" height="22" fill="#66bb6a"/>
    <rect x="542" y="176" width="22" height="18" fill="#66bb6a"/>
    <rect x="582" y="170" width="22" height="24" fill="#66bb6a"/>
    <rect x="622" y="178" width="22" height="16" fill="#66bb6a"/>
    <rect x="662" y="172" width="22" height="22" fill="#66bb6a"/>
    <rect x="702" y="174" width="22" height="20" fill="#66bb6a"/>
    <rect x="742" y="176" width="22" height="18" fill="#66bb6a"/>
    <rect x="782" y="170" width="22" height="24" fill="#66bb6a"/>
    <rect x="822" y="174" width="22" height="20" fill="#66bb6a"/>
  </g>
  <text x="681" y="232" class="note" text-anchor="middle" fill="#81c784">모든 정지가 목표선 아래에 — Region 수를 조절해 맞춤</text>
  <text x="486" y="244" class="axis">시간 →</text>

  <!-- G1이 그걸 가능케 한 3 메커니즘 -->
  <text x="24" y="288" class="shead" fill="rgb(212,168,83)">G1이 정지를 목표에 묶는 3가지 메커니즘</text>
  <rect x="24" y="300" width="282" height="92" rx="8" fill="#141414" stroke="#2a2520"/>
  <text x="40" y="324" class="lbl"><tspan font-weight="700" fill="#f5d76e">① 회수 범위가 조절 변수</tspan></text>
  <text x="40" y="344" class="note">한 정지에서 *고른 Region 집합(CSet)만*</text>
  <text x="40" y="360" class="note">회수. Region 수를 줄이면 정지가 짧아진다.</text>
  <text x="40" y="380" class="note">(기존: 정지 = 세대 전체 크기의 함수)</text>

  <rect x="318" y="300" width="282" height="92" rx="8" fill="#141414" stroke="#2a2520"/>
  <text x="334" y="324" class="lbl"><tspan font-weight="700" fill="#f5d76e">② 일시 정지 예측 모델</tspan></text>
  <text x="334" y="344" class="note">이전 회수 통계로 Region 하나 회수 비용을</text>
  <text x="334" y="360" class="note">추정 → 목표 안에 몇 개 회수할지 역산해</text>
  <text x="334" y="380" class="note">CSet 크기를 정한다.</text>

  <rect x="612" y="300" width="284" height="92" rx="8" fill="#141414" stroke="#2a2520"/>
  <text x="628" y="324" class="lbl"><tspan font-weight="700" fill="#f5d76e">③ 증분 컴팩션</tspan></text>
  <text x="628" y="344" class="note">회수=evacuation(복사)이라 매 GC가</text>
  <text x="628" y="360" class="note">단편화를 조금씩 해소. CMS(컴팩션 없음)와</text>
  <text x="628" y="380" class="note">Parallel Old(전체 컴팩션=긴 정지)의 절충.</text>

  <!-- 핵심 한 줄 -->
  <rect x="24" y="404" width="872" height="62" rx="8" fill="#10243a" stroke="#5b9bd5" stroke-width="1.2"/>
  <text x="42" y="428" class="lbl" fill="#c5dcef"><tspan font-weight="800" fill="#dceaf7">한 줄 답</tspan> — Region은 *처리량을 올린 장치가 아니다*. 정지 시간을 <tspan font-weight="700" fill="#f5b0b0">"힙 크기의 함수"</tspan>에서 <tspan font-weight="700" fill="#81c784">"회수할 Region 수의 함수"</tspan>로 바꿔,</text>
  <text x="42" y="448" class="lbl" fill="#c5dcef">지연시간을 *사용자 목표에 묶을 수 있게* 만든 장치다. 단 soft goal — 할당 패턴이 급변하면 목표를 빗나갈 수 있다(real-time 아님).</text>
</svg>
