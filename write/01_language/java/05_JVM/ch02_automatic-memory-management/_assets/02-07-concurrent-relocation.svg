<svg viewBox="0 0 900 620" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>G1의 STW 이동과 저지연 GC의 동시 이동 비교</title>
  <desc>G1은 선별 회수에서 애플리케이션을 멈추고 객체 복사와 참조 갱신을 처리한다. 저지연 GC는 객체 이동과 참조 갱신을 장벽으로 보호하면서 애플리케이션과 동시에 진행한다.</desc>
  <defs>
    <style>
      .title{font-size:18px;font-weight:800;fill:#e8e4df}.sub{font-size:11px;fill:rgb(138,133,128)}.head{font-size:13px;font-weight:800;fill:rgb(212,168,83)}.label{font-size:11px;font-weight:750;fill:#e8e4df}.body{font-size:10px;fill:rgb(180,175,170)}.note{font-size:9.5px;fill:rgb(138,133,128)}.code{font-size:10px;font-weight:700;fill:rgb(212,168,83);font-family:'JetBrains Mono',monospace}.bad{font-size:10px;font-weight:750;fill:#e57373}.ok{font-size:10px;font-weight:750;fill:#81c784}
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="rgb(212,168,83)"/></marker>
  </defs>
  <rect x="0" y="0" width="900" height="620" fill="#0d0d0d"/>
  <text x="26" y="36" class="title">왜 저지연 GC는 동시 이동이 필요한가</text>
  <text x="26" y="56" class="sub">마킹만 동시로 해서는 부족하다. 살아 있는 객체를 옮기고 참조를 고치는 구간이 길면 pause가 다시 커진다.</text>

  <rect x="24" y="84" width="852" height="214" rx="8" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="48" y="112" class="head">① G1 스타일 — 이동 구간은 STW 영향</text>
  <rect x="54" y="142" width="160" height="70" rx="6" fill="#2a1414" stroke="#e57373"/>
  <text x="134" y="166" class="bad" text-anchor="middle">STW 시작</text>
  <text x="134" y="185" class="body" text-anchor="middle">앱 스레드 정지</text>
  <line x1="214" y1="177" x2="284" y2="177" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="286" y="142" width="170" height="70" rx="6" fill="#2a2a1a" stroke="rgb(212,168,83)"/>
  <text x="371" y="166" class="label" text-anchor="middle">객체 복사</text>
  <text x="371" y="185" class="body" text-anchor="middle">live object evacuation</text>
  <line x1="456" y1="177" x2="526" y2="177" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="528" y="142" width="170" height="70" rx="6" fill="#2a2a1a" stroke="rgb(212,168,83)"/>
  <text x="613" y="166" class="label" text-anchor="middle">참조 갱신</text>
  <text x="613" y="185" class="body" text-anchor="middle">old address → new address</text>
  <line x1="698" y1="177" x2="748" y2="177" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="750" y="142" width="96" height="70" rx="6" fill="#1e2a1e" stroke="#4ab080"/>
  <text x="798" y="166" class="ok" text-anchor="middle">재개</text>
  <text x="798" y="185" class="body" text-anchor="middle">앱 실행</text>
  <rect x="54" y="236" width="792" height="36" rx="6" fill="#2a1414" stroke="#e57373" opacity="0.9"/>
  <text x="450" y="259" class="bad" text-anchor="middle">객체가 많거나 대상 Region이 많으면 이 STW 구간이 길어진다</text>

  <rect x="24" y="326" width="852" height="238" rx="8" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="48" y="354" class="head">② 저지연 GC — 이동과 참조 갱신을 앱과 함께 진행</text>
  <rect x="54" y="384" width="150" height="64" rx="6" fill="#2a1414" stroke="#e57373"/>
  <text x="129" y="408" class="bad" text-anchor="middle">짧은 STW</text>
  <text x="129" y="426" class="body" text-anchor="middle">Root 기준점 확보</text>
  <line x1="204" y1="416" x2="274" y2="416" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="276" y="384" width="170" height="64" rx="6" fill="#1e2a1e" stroke="#4ab080"/>
  <text x="361" y="408" class="ok" text-anchor="middle">동시 이동</text>
  <text x="361" y="426" class="body" text-anchor="middle">객체를 새 위치로 복사</text>
  <line x1="446" y1="416" x2="516" y2="416" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="518" y="384" width="170" height="64" rx="6" fill="#1e2a1e" stroke="#4ab080"/>
  <text x="603" y="408" class="ok" text-anchor="middle">Barrier 보호</text>
  <text x="603" y="426" class="body" text-anchor="middle">old ref도 최신 위치로 우회</text>
  <line x1="688" y1="416" x2="748" y2="416" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="750" y="384" width="96" height="64" rx="6" fill="#1e2a1e" stroke="#4ab080"/>
  <text x="798" y="408" class="ok" text-anchor="middle">동시 갱신</text>
  <text x="798" y="426" class="body" text-anchor="middle">참조 점진 정리</text>
  <rect x="54" y="474" width="792" height="62" rx="6" fill="#111" stroke="#333"/>
  <text x="76" y="499" class="code">pause ↓</text>
  <text x="164" y="499" class="body">긴 복사·갱신 작업을 STW 밖으로 밀어낸다.</text>
  <text x="76" y="520" class="code">throughput ↓</text>
  <text x="164" y="520" class="body">대신 앱 실행 경로에 barrier 검사와 GC 스레드 CPU 경쟁 비용이 붙는다.</text>
</svg>
