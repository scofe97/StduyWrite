<svg viewBox="0 0 920 660" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>동시 이동 — G1은 옮기는 동안 STW, 저지연 GC는 옮기면서도 앱을 안 멈춘다</title>
  <desc>G1은 객체를 새 Region으로 옮기는 evacuation 단계를 STW 안에서 하며, 그 STW는 회수할 Region 수에 비례해 큰 힙에서 길어진다. 저지연 GC는 이동과 참조 갱신을 분리해, 객체는 앱과 동시에 옮기고 낡은 참조는 앱이 그 참조를 읽는 순간 barrier가 최신 위치로 안내한다. 그래서 이동 STW가 사라진다. 메모리 위에서 보면, G1은 STW 구간에 A·B·C를 한꺼번에 옮기고 참조를 모두 고친 뒤 앱을 재개하지만, 저지연 GC는 앱이 도는 중에 A를 옮기고 낡은 참조는 barrier가 우회시키다가 나중에 천천히 갱신한다.</desc>
  <defs>
    <style>
      .title { font-size: 16px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11px; fill: rgb(138,133,128); }
      .shead { font-size: 13px; font-weight: 800; fill: rgb(212,168,83); }
      .lbl   { font-size: 11px; font-weight: 700; fill: #e8e4df; }
      .note  { font-size: 10px; fill: rgb(160,155,150); }
      .stw   { font-size: 9.5px; font-weight: 800; }
      .cell  { font-size: 11px; font-weight: 700; }
    </style>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="rgb(212,168,83)"/></marker>
    <marker id="arB" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#5b9bd5"/></marker>
  </defs>
  <rect x="0" y="0" width="920" height="660" fill="#0d0d0d"/>
  <text x="24" y="32" class="title">동시 이동 — G1은 옮기는 동안 멈추고, 저지연 GC는 옮기면서도 안 멈춘다</text>
  <text x="24" y="52" class="sub">둘 다 객체를 옮긴다. 차이는 *옮기는 동안 앱을 멈추느냐* — 그리고 그 STW가 힙이 커질수록 어떻게 되느냐.</text>

  <!-- ① G1 타임라인 -->
  <text x="24" y="86" class="shead">① G1 — 마킹은 동시, 그러나 *이동은 STW*. 이 STW가 회수 Region 수에 비례해 커진다</text>
  <g transform="translate(24,98)">
    <rect x="0" y="0" width="150" height="46" rx="5" fill="#2a1414" stroke="#e57373"/>
    <text x="75" y="20" class="lbl" text-anchor="middle" fill="#f5b0b0">초기 마크</text>
    <text x="75" y="37" class="stw" text-anchor="middle" fill="#e57373">STW (짧음) · Root</text>
    <rect x="166" y="0" width="240" height="46" rx="5" fill="#15300f" stroke="#66bb6a"/>
    <text x="286" y="20" class="lbl" text-anchor="middle" fill="#81c784">동시 마크</text>
    <text x="286" y="37" class="stw" text-anchor="middle" fill="#81c784">앱과 동시 (긺) · 무거운 그래프 탐색</text>
    <rect x="418" y="0" width="130" height="46" rx="5" fill="#2a1414" stroke="#e57373"/>
    <text x="483" y="20" class="lbl" text-anchor="middle" fill="#f5b0b0">재마크</text>
    <text x="483" y="37" class="stw" text-anchor="middle" fill="#e57373">STW (짧음)</text>
    <rect x="560" y="0" width="312" height="46" rx="5" fill="#3a1414" stroke="#ff8a80" stroke-width="2"/>
    <text x="716" y="20" class="lbl" text-anchor="middle" fill="#ff8a80">선별 회수 = 이동(evacuation)</text>
    <text x="716" y="37" class="stw" text-anchor="middle" fill="#ff8a80">★ STW — 회수 Region 수 ∝ 정지 길이 (큰 힙에서 ↑)</text>
  </g>

  <!-- ① G1 메모리 -->
  <text x="24" y="180" class="note">STW 구간 메모리 — 앱이 멈춘 사이 A·B·C를 새 Region으로 한꺼번에 옮기고 참조도 전부 고친다 (원자적)</text>
  <g transform="translate(24,190)">
    <text x="0" y="24" class="note">From</text>
    <rect x="40" y="4" width="360" height="40" rx="4" fill="#0d0d0d" stroke="#5a5a5a"/>
    <rect x="48" y="10" width="60" height="28" fill="#5b9bd5" stroke="#3a6a90"/><text x="78" y="29" class="cell" text-anchor="middle" fill="#0d1a26">A</text>
    <rect x="116" y="10" width="60" height="28" fill="#5b9bd5" stroke="#3a6a90"/><text x="146" y="29" class="cell" text-anchor="middle" fill="#0d1a26">B</text>
    <rect x="184" y="10" width="60" height="28" fill="#5b9bd5" stroke="#3a6a90"/><text x="214" y="29" class="cell" text-anchor="middle" fill="#0d1a26">C</text>
    <rect x="252" y="10" width="140" height="28" fill="#161616" stroke="#444" stroke-dasharray="3,2"/><text x="322" y="29" class="note" text-anchor="middle">쓰레기</text>
    <text x="418" y="24" fill="rgb(212,168,83)" font-size="18" text-anchor="middle">→</text>
    <text x="440" y="24" class="note">To</text>
    <rect x="474" y="4" width="360" height="40" rx="4" fill="#0d0d0d" stroke="#5a5a5a"/>
    <rect x="482" y="10" width="60" height="28" fill="#5b9bd5" stroke="#3a6a90"/><text x="512" y="29" class="cell" text-anchor="middle" fill="#0d1a26">A</text>
    <rect x="550" y="10" width="60" height="28" fill="#5b9bd5" stroke="#3a6a90"/><text x="580" y="29" class="cell" text-anchor="middle" fill="#0d1a26">B</text>
    <rect x="618" y="10" width="60" height="28" fill="#5b9bd5" stroke="#3a6a90"/><text x="648" y="29" class="cell" text-anchor="middle" fill="#0d1a26">C</text>
    <text x="756" y="29" class="note" text-anchor="middle" fill="#81c784">빽빽이 압축</text>
  </g>
  <text x="24" y="250" class="note">→ 옮기는 동안 앱이 멈춰 있으니 <tspan fill="#f5b0b0" font-weight="700">참조 깨질 걱정이 없다</tspan>. 대신 옮길 객체가 많으면(큰 힙) 이 STW가 길어진다.</text>

  <!-- ② 저지연 타임라인 -->
  <text x="24" y="292" class="shead">② 저지연 GC — 이동도 *앱과 동시*. 참조 갱신은 barrier로 미뤄 lazy하게 → 이동 STW가 사라진다</text>
  <g transform="translate(24,304)">
    <rect x="0" y="0" width="130" height="46" rx="5" fill="#2a1414" stroke="#e57373"/>
    <text x="65" y="20" class="lbl" text-anchor="middle" fill="#f5b0b0">초기 마크</text>
    <text x="65" y="37" class="stw" text-anchor="middle" fill="#e57373">STW (짧음)</text>
    <rect x="146" y="0" width="230" height="46" rx="5" fill="#15300f" stroke="#66bb6a"/>
    <text x="261" y="20" class="lbl" text-anchor="middle" fill="#81c784">동시 마크</text>
    <text x="261" y="37" class="stw" text-anchor="middle" fill="#81c784">앱과 동시</text>
    <rect x="388" y="0" width="230" height="46" rx="5" fill="#15300f" stroke="#66bb6a" stroke-width="2"/>
    <text x="503" y="20" class="lbl" text-anchor="middle" fill="#81c784">동시 이동(relocation)</text>
    <text x="503" y="37" class="stw" text-anchor="middle" fill="#81c784">★ 앱과 동시 — STW 없음</text>
    <rect x="630" y="0" width="242" height="46" rx="5" fill="#15300f" stroke="#66bb6a" stroke-width="2"/>
    <text x="751" y="20" class="lbl" text-anchor="middle" fill="#81c784">동시 참조 갱신(remap)</text>
    <text x="751" y="37" class="stw" text-anchor="middle" fill="#81c784">★ 앱이 읽을 때마다 lazy하게</text>
  </g>

  <!-- ② 저지연 메모리 + barrier -->
  <text x="24" y="386" class="note">앱이 도는 중 — A를 새 위치로 옮긴다. 그런데 앱의 낡은 참조는 아직 옛 주소를 가리킨다 (참조는 나중에 고침)</text>
  <g transform="translate(24,396)">
    <rect x="40" y="4" width="360" height="40" rx="4" fill="#0d0d0d" stroke="#5a5a5a"/>
    <rect x="48" y="10" width="60" height="28" fill="#2a2a2a" stroke="#666" stroke-dasharray="3,2"/><text x="78" y="29" class="note" text-anchor="middle">A(옛)</text>
    <rect x="116" y="10" width="60" height="28" fill="#5b9bd5" stroke="#3a6a90"/><text x="146" y="29" class="cell" text-anchor="middle" fill="#0d1a26">B</text>
    <rect x="184" y="10" width="60" height="28" fill="#5b9bd5" stroke="#3a6a90"/><text x="214" y="29" class="cell" text-anchor="middle" fill="#0d1a26">C</text>
    <text x="418" y="24" fill="#81c784" font-size="18" text-anchor="middle">→</text>
    <rect x="474" y="4" width="360" height="40" rx="4" fill="#0d0d0d" stroke="#5a5a5a"/>
    <rect x="482" y="10" width="60" height="28" fill="#5b9bd5" stroke="#3a6a90"/><text x="512" y="29" class="cell" text-anchor="middle" fill="#0d1a26">A</text>
    <text x="600" y="29" class="note">A는 이미 여기로 옮겨짐 (새 위치)</text>
  </g>
  <g transform="translate(24,446)">
    <rect x="0" y="0" width="848" height="46" rx="6" fill="#101820" stroke="#5b9bd5"/>
    <text x="16" y="20" class="lbl" fill="#9ec9e8">앱: "A를 읽자" (낡은 참조로 접근)</text>
    <line x1="250" y1="15" x2="300" y2="15" stroke="#5b9bd5" stroke-width="2" marker-end="url(#arB)"/>
    <text x="316" y="20" class="lbl" fill="#9ec9e8">barrier: "A 옮겨졌나?" → 예 → 새 위치로 우회</text>
    <line x1="700" y1="15" x2="750" y2="15" stroke="#5b9bd5" stroke-width="2" marker-end="url(#arB)"/>
    <text x="766" y="20" class="lbl" fill="#81c784">최신 A 읽음</text>
    <text x="16" y="38" class="note">→ 앱은 멈추지 않고, 낡은 참조로 접근해도 항상 최신 A를 본다. 참조 자체는 나중에 remap 단계가 천천히 고친다.</text>
  </g>

  <!-- 핵심 -->
  <rect x="24" y="512" width="872" height="128" rx="8" fill="#141414" stroke="#2a2520"/>
  <text x="42" y="538" class="lbl" fill="rgb(212,168,83)">핵심 — 같은 "이동"인데 무엇이 다른가</text>
  <text x="42" y="562" class="note">• <tspan fill="#ff8a80" font-weight="700">G1</tspan>: 이동 + 참조 갱신을 *한 STW에 묶어* 원자적으로. 앱이 멈춰 있어 안전하지만, 옮길 게 많으면(큰 힙) STW가 길어진다.</text>
  <text x="42" y="584" class="note">• <tspan fill="#81c784" font-weight="700">저지연 GC</tspan>: 이동과 참조 갱신을 *분리*. 이동은 앱과 동시에, 참조는 앱이 읽는 순간 barrier가 최신 위치로 안내(lazy).</text>
  <text x="42" y="606" class="note">• 그래서 저지연 GC엔 "옮기는 동안 멈추는" STW가 없다. 이동 STW를 없앤 대가는 *모든 읽기에 barrier 검사 비용*(→ throughput 소폭 ↓).</text>
  <text x="42" y="628" class="note">• barrier가 "옮겨졌나·어디로"를 알아내는 방법이 Shenandoah(forwarding pointer)와 ZGC(colored pointer)로 갈린다 → 다음 그림.</text>
</svg>
