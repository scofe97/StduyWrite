<svg viewBox="0 0 900 560" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>Java 성능 측정 도구 지도 — 무엇을 측정하느냐로 도구가 갈린다</title>
  <desc>성능은 지연·처리량·메모리·CPU의 합성이고, 무엇을 측정하느냐에 따라 도구가 갈린다. 메서드 단위 비교는 JMH, 메모리는 jstat(추세)와 jmap 힙 덤프(객체), CPU는 async-profiler(샘플링 플레임그래프), 전체는 JFR(통합 기록)이다. JMH만 코드를 격리해 재고 나머지는 실행 중 JVM에 PID로 붙어 Spring 앱에도 그대로 쓴다. 모든 측정은 측정 먼저 추측 금지라는 한 원칙으로 수렴한다.</desc>
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11.5px; fill: rgb(138,133,128); }
      .axis  { font-size: 13px; font-weight: 800; fill: #e8e4df; }
      .tool  { font-size: 12px; font-weight: 800; fill: #e8e4df; }
      .mt    { font-size: 10px; fill: rgb(138,133,128); }
      .tick  { font-size: 9.5px; fill: rgb(212,168,83); font-weight: 700; }
      .mono  { font-family: 'JetBrains Mono', monospace; }
      .mn    { font-size: 10px; fill: #e8e4df; font-weight: 700; }
    </style>
    <marker id="m" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="560" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">Java 성능 측정 도구 지도 — 무엇을 측정하느냐로 갈린다</text>
  <text x="28" y="58" class="sub">성능 = 지연 · 처리량 · 메모리 · CPU 의 합성 · 측정 대상과 제약(오버헤드·격리)이 도구를 정한다</text>

  <!-- ===== 축 1: 메서드 단위 비교 (JMH) ===== -->
  <rect x="28" y="80" width="844" height="92" rx="10" fill="rgba(96,165,224,0.08)" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="44" y="106" class="axis">메서드 단위 비교 — 코드 A vs B</text>
  <rect x="44" y="118" width="200" height="40" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="144" y="135" class="tool mono" text-anchor="middle">JMH</text>
  <text x="144" y="151" class="mt" text-anchor="middle">마이크로벤치마크</text>
  <text x="262" y="130" class="mt">워밍업·OS 노이즈·Dead Code 제거를 통제해 정확히 잰다</text>
  <text x="262" y="148" class="tick">@Warmup · @Fork · Blackhole — 단, Spring 빈엔 부적합(격리 깨짐)</text>

  <!-- ===== 축 2: 실행 중 JVM 관측 ===== -->
  <rect x="28" y="184" width="844" height="248" rx="10" fill="rgba(102,187,106,0.07)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="44" y="210" class="axis">실행 중 JVM 관측 — PID만 있으면 Spring 앱에도 그대로 붙는다</text>

  <!-- 메모리 열 -->
  <text x="44" y="238" class="mn" fill="rgb(212,168,83)">▌메모리</text>
  <rect x="44" y="248" width="384" height="56" rx="6" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="58" y="268" class="tool mono">jstat -gcutil</text>
  <text x="58" y="285" class="mt">세대별 점유율·GC 횟수를 실시간 추세로</text>
  <text x="58" y="299" class="tick">Old 점유율이 계속 우상향 → 누수 의심</text>
  <rect x="44" y="310" width="384" height="56" rx="6" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="58" y="330" class="tool mono">jmap 힙 덤프 → MAT</text>
  <text x="58" y="347" class="mt">무엇이 메모리를 점유하나 — 객체 단위 스냅샷</text>
  <text x="58" y="361" class="tick">GC Root까지 참조 체인 추적 (Spring 빈·세션·캐시)</text>

  <!-- CPU/전체 열 -->
  <text x="452" y="238" class="mn" fill="rgb(212,168,83)">▌CPU · 전체</text>
  <rect x="452" y="248" width="404" height="56" rx="6" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="466" y="268" class="tool mono">async-profiler</text>
  <text x="466" y="285" class="mt">어느 메서드가 CPU를 먹나 — 플레임 그래프</text>
  <text x="466" y="299" class="tick">샘플링(≈1% 오버헤드) → 프로덕션 가능</text>
  <rect x="452" y="310" width="404" height="56" rx="6" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="466" y="330" class="tool mono">JFR (JVM 내장)</text>
  <text x="466" y="347" class="mt">CPU·GC·락·I/O를 한 번에 통합 기록 → JMC</text>
  <text x="466" y="361" class="tick">설치 불필요(Java 11+) · 샘플링이라 가벼움</text>

  <!-- 샘플링 vs 계측 메모 -->
  <rect x="44" y="378" width="812" height="42" rx="6" fill="rgba(96,165,224,0.08)" stroke="#5b9bd5"/>
  <text x="58" y="396" class="mn">왜 프로덕션에서 쓸 수 있나 — 샘플링</text>
  <text x="58" y="412" class="mt">계측(모든 호출 기록)은 앱을 몇 배 느리게 한다. 샘플링은 주기마다 스냅샷만 찍어 ≈1% — 통계로 충분히 정확하다.</text>

  <!-- 화살표: 축 → 결론 -->
  <line x1="450" y1="432" x2="450" y2="466" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#m)"/>

  <!-- ===== 결론: 한 원칙 ===== -->
  <rect x="28" y="474" width="844" height="68" rx="10" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="450" y="500" class="axis" text-anchor="middle">🔑 측정 먼저, 추측 금지</text>
  <text x="450" y="522" class="mt" text-anchor="middle">직감은 병목을 거의 틀린다 → 측정으로 열고(JMH·프로파일러) · 한 번에 하나씩 바꾸고 · 재측정으로 닫는다</text>
</svg>
