<svg viewBox="0 0 680 340" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>단순 데드락 vs 복합 데드락 — 둘이 서로 막음 vs 셋 이상이 고리로 막음 (원문 Figure 8.9 개념도)</title>
  <desc>원문 Figure 8.9 의 개념을 도식으로 옮긴 것입니다. 두 스레드만 서로를 막으면 단순 데드락이라 부릅니다. 데드락은 여러 스레드가 서로를 막아 생길 수도 있는데, 스레드가 많을수록 복잡해집니다. 그래서 둘보다 많은 스레드가 얽히면 복합 데드락이라 부릅니다. 예컨대 스레드 A 가 B 를 막고 B 가 C 를 막고 C 가 A 를 막는 식의 고리입니다. 서로를 막는 스레드의 사슬이 길수록 데드락을 찾고 이해하고 푸는 게 어려워집니다.</desc>
  <rect x="0" y="0" width="680" height="340" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="16" font-weight="bold">단순 데드락 vs 복합 데드락</text>
  <text x="20" y="55" fill="rgb(138,133,128)" font-size="11">원문 Figure 8.9 개념도 — 얽힌 스레드가 많을수록 복잡</text>

  <!-- 단순 -->
  <rect x="20" y="80" width="300" height="230" fill="rgba(102,187,106,0.05)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="34" y="102" fill="#66bb6a" font-size="13" font-weight="bold">단순 데드락 — 둘이 서로 막음</text>

  <rect x="60" y="140" width="100" height="44" fill="rgba(127,168,201,0.15)" stroke="#7fa8c9"/>
  <text x="110" y="167" fill="#9cc3df" font-size="13" font-weight="bold" text-anchor="middle">A</text>
  <rect x="180" y="220" width="100" height="44" fill="rgba(102,187,106,0.15)" stroke="#66bb6a"/>
  <text x="230" y="247" fill="#66bb6a" font-size="13" font-weight="bold" text-anchor="middle">B</text>

  <line x1="160" y1="162" x2="226" y2="218" stroke="#f47f72" stroke-width="1.5"/>
  <polygon points="226,218 217,219 222,212" fill="#f47f72"/>
  <line x1="180" y1="244" x2="115" y2="186" stroke="#f47f72" stroke-width="1.5"/>
  <polygon points="115,186 124,185 119,192" fill="#f47f72"/>
  <text x="170" y="290" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">A ⇄ B (da-ch8-ex1)</text>

  <!-- 복합 -->
  <rect x="348" y="80" width="312" height="230" fill="rgba(244,127,114,0.05)" stroke="#f47f72" stroke-width="1.5"/>
  <text x="362" y="102" fill="#f47f72" font-size="13" font-weight="bold">복합 데드락 — 셋 이상이 고리</text>

  <rect x="454" y="128" width="86" height="38" fill="rgba(127,168,201,0.15)" stroke="#7fa8c9"/>
  <text x="497" y="152" fill="#9cc3df" font-size="12" font-weight="bold" text-anchor="middle">A</text>
  <rect x="560" y="220" width="86" height="38" fill="rgba(102,187,106,0.15)" stroke="#66bb6a"/>
  <text x="603" y="244" fill="#66bb6a" font-size="12" font-weight="bold" text-anchor="middle">B</text>
  <rect x="372" y="220" width="86" height="38" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="415" y="244" fill="rgb(212,168,83)" font-size="12" font-weight="bold" text-anchor="middle">C</text>

  <line x1="528" y1="166" x2="588" y2="218" stroke="#f47f72" stroke-width="1.5"/>
  <polygon points="588,218 579,218 584,211" fill="#f47f72"/>
  <line x1="560" y1="245" x2="458" y2="245" stroke="#f47f72" stroke-width="1.5"/>
  <polygon points="458,245 467,241 467,249" fill="#f47f72"/>
  <line x1="420" y1="218" x2="472" y2="166" stroke="#f47f72" stroke-width="1.5"/>
  <polygon points="472,166 463,168 468,175" fill="#f47f72"/>
  <text x="503" y="290" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">A→B→C→A (사슬 길수록 어려움)</text>
</svg>
