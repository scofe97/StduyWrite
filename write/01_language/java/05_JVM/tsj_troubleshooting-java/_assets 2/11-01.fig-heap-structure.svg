<svg viewBox="0 0 680 360" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>힙 구조 — Eden·Survivor·Old 옷장 비유와 객체 승격 (원문 그림 개념도)</title>
  <desc>원문 힙 구조 그림의 개념을 도식으로 옮긴 것입니다. JVM 힙은 데이터가 머무는 기간에 따라 구역이 나뉜 옷장과 같습니다. 새 객체는 Eden 즉 새 옷 구역에서 시작합니다. Eden 의 객체가 GC 사이클을 몇 번 살아남으면 Survivor 즉 아직 쓰는 구역으로 옮겨지며 Survivor 에는 작은 영역 둘이 있어 그 사이를 오갑니다. Survivor 에서 충분히 오래 살아남은 객체는 Old generation 즉 오래 간직하는 즐겨 입는 옷 구역으로 승격됩니다. 객체의 나이는 살아남은 GC 사이클 수로 정해집니다. Eden 은 새 게 많이 드나들어 자주 청소되고 Survivor 는 덜 자주 Old 는 중요한 걸 담아 드물게 청소됩니다.</desc>
  <rect x="0" y="0" width="680" height="360" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="16" font-weight="bold">힙 구조 — 옷장으로 보는 Eden·Survivor·Old</text>
  <text x="20" y="55" fill="rgb(138,133,128)" font-size="11">원문 개념도 — 나이(살아남은 GC 사이클)에 따라 승격</text>

  <!-- Eden -->
  <rect x="20" y="90" width="190" height="150" fill="rgba(102,187,106,0.06)" stroke="#66bb6a" stroke-width="2"/>
  <text x="115" y="114" fill="#66bb6a" font-size="13" font-weight="bold" text-anchor="middle">Eden</text>
  <text x="115" y="132" fill="rgb(138,133,128)" font-size="9.5" text-anchor="middle">새 옷 구역</text>
  <g fill="rgba(102,187,106,0.35)" stroke="#66bb6a">
    <rect x="38" y="146" width="22" height="22"/><rect x="66" y="146" width="22" height="22"/><rect x="94" y="146" width="22" height="22"/><rect x="122" y="146" width="22" height="22"/><rect x="150" y="146" width="22" height="22"/><rect x="178" y="146" width="22" height="22"/>
    <rect x="38" y="174" width="22" height="22"/><rect x="66" y="174" width="22" height="22"/><rect x="94" y="174" width="22" height="22"/><rect x="122" y="174" width="22" height="22"/>
  </g>
  <text x="115" y="218" fill="#e8e4df" font-size="10" text-anchor="middle">새 객체 시작</text>
  <text x="115" y="232" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">자주 청소</text>

  <!-- 화살표 -->
  <line x1="210" y1="165" x2="244" y2="165" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <polygon points="244,165 236,161 236,169" fill="rgb(212,168,83)"/>
  <text x="227" y="155" fill="rgb(212,168,83)" font-size="9" text-anchor="middle">승격</text>

  <!-- Survivor -->
  <rect x="246" y="90" width="190" height="150" fill="rgba(127,168,201,0.06)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="341" y="114" fill="#9cc3df" font-size="13" font-weight="bold" text-anchor="middle">Survivor</text>
  <text x="341" y="132" fill="rgb(138,133,128)" font-size="9.5" text-anchor="middle">아직 쓰는 구역 (영역 둘)</text>
  <rect x="262" y="146" width="76" height="60" fill="rgba(127,168,201,0.12)" stroke="#7fa8c9"/>
  <text x="300" y="180" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">S0</text>
  <rect x="344" y="146" width="76" height="60" fill="rgba(127,168,201,0.12)" stroke="#7fa8c9"/>
  <text x="382" y="180" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">S1</text>
  <text x="341" y="220" fill="#e8e4df" font-size="10" text-anchor="middle">GC 살아남은 것</text>
  <text x="341" y="234" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">둘 사이를 오감 · 덜 자주 청소</text>

  <!-- 화살표 -->
  <line x1="436" y1="165" x2="470" y2="165" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <polygon points="470,165 462,161 462,169" fill="rgb(212,168,83)"/>
  <text x="453" y="155" fill="rgb(212,168,83)" font-size="9" text-anchor="middle">승격</text>

  <!-- Old -->
  <rect x="472" y="90" width="188" height="150" fill="rgba(212,168,83,0.06)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="566" y="114" fill="rgb(212,168,83)" font-size="13" font-weight="bold" text-anchor="middle">Old generation</text>
  <text x="566" y="132" fill="rgb(138,133,128)" font-size="9.5" text-anchor="middle">즐겨 입는 옷 (클래식)</text>
  <rect x="490" y="146" width="152" height="60" fill="rgba(212,168,83,0.18)" stroke="rgb(212,168,83)"/>
  <text x="566" y="180" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">장기 보관 객체</text>
  <text x="566" y="220" fill="#e8e4df" font-size="10" text-anchor="middle">오래 살아남아 승격</text>
  <text x="566" y="234" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">드물게 청소</text>

  <!-- 하단 -->
  <rect x="20" y="262" width="640" height="82" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="34" y="284" fill="#e8e4df" font-size="12" font-weight="bold">GC = 옷장 비우기</text>
  <text x="34" y="306" fill="#e8e4df" font-size="10.5">객체 나이 = 살아남은 GC 사이클 수 → 충분히 살아남으면 다음 구역으로 승격</text>
  <text x="34" y="328" fill="rgb(138,133,128)" font-size="10">Eden 자주 · Survivor 덜 자주 · Old 드물게 청소 → 로그의 Eden 4-&gt;0, Survivor 0-&gt;1 이 이 이동</text>
</svg>
