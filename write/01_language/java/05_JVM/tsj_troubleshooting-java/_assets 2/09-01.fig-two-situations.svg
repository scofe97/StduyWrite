<svg viewBox="0 0 680 340" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>메모리를 차지하는 두 상황 — 다수의 소형 인스턴스 vs 소수의 대형 인스턴스 (개념도)</title>
  <desc>이 편의 개념을 도식으로 옮긴 것입니다. 메모리를 가장 많이 차지하는 것은 보통 두 상황 중 하나입니다. 첫째 특정 타입의 인스턴스가 다수 생성돼 메모리를 채우는 경우로 da-ch9-ex1 의 Product 백만 개가 이에 해당합니다. 둘째 인스턴스 수는 많지 않은데 각 인스턴스가 덩치로 메모리를 차지하는 경우로 큰 비디오 파일을 두세 개만 로드해도 메모리를 채우는 식입니다. 후자라면 전체가 아니라 조각만 메모리에 두는 최적화를 검토할 수 있습니다. 조사 시작 때는 어느 상황인지 모르므로 차지한 메모리 Live Bytes 와 인스턴스 수 Live Objects 로 각각 내림차순 정렬해 가려냅니다.</desc>
  <rect x="0" y="0" width="680" height="340" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="16" font-weight="bold">메모리를 차지하는 두 상황</text>
  <text x="20" y="55" fill="rgb(138,133,128)" font-size="11">개념도 — 시작 땐 어느 쪽인지 모름 → 두 기준으로 정렬해 가림</text>

  <!-- 상황 1 -->
  <rect x="20" y="80" width="312" height="220" fill="rgba(127,168,201,0.05)" stroke="#7fa8c9" stroke-width="1.5"/>
  <text x="34" y="102" fill="#9cc3df" font-size="13" font-weight="bold">① 다수의 소형 인스턴스</text>
  <!-- 작은 박스 격자 -->
  <g fill="rgba(127,168,201,0.4)" stroke="#7fa8c9">
    <rect x="40" y="118" width="18" height="18"/><rect x="64" y="118" width="18" height="18"/><rect x="88" y="118" width="18" height="18"/><rect x="112" y="118" width="18" height="18"/><rect x="136" y="118" width="18" height="18"/><rect x="160" y="118" width="18" height="18"/><rect x="184" y="118" width="18" height="18"/><rect x="208" y="118" width="18" height="18"/><rect x="232" y="118" width="18" height="18"/><rect x="256" y="118" width="18" height="18"/><rect x="280" y="118" width="18" height="18"/>
    <rect x="40" y="142" width="18" height="18"/><rect x="64" y="142" width="18" height="18"/><rect x="88" y="142" width="18" height="18"/><rect x="112" y="142" width="18" height="18"/><rect x="136" y="142" width="18" height="18"/><rect x="160" y="142" width="18" height="18"/><rect x="184" y="142" width="18" height="18"/><rect x="208" y="142" width="18" height="18"/><rect x="232" y="142" width="18" height="18"/><rect x="256" y="142" width="18" height="18"/><rect x="280" y="142" width="18" height="18"/>
    <rect x="40" y="166" width="18" height="18"/><rect x="64" y="166" width="18" height="18"/><rect x="88" y="166" width="18" height="18"/><rect x="112" y="166" width="18" height="18"/><rect x="136" y="166" width="18" height="18"/><rect x="160" y="166" width="18" height="18"/><rect x="184" y="166" width="18" height="18"/><rect x="208" y="166" width="18" height="18"/><rect x="232" y="166" width="18" height="18"/><rect x="256" y="166" width="18" height="18"/><rect x="280" y="166" width="18" height="18"/>
  </g>
  <text x="34" y="218" fill="#e8e4df" font-size="11">특정 타입이 많이 생성돼 채움</text>
  <text x="34" y="244" fill="#9cc3df" font-size="11" font-weight="bold">→ da-ch9-ex1: Product 백만 개</text>
  <text x="34" y="270" fill="rgb(138,133,128)" font-size="10">Live Objects(인스턴스 수)가 크게 나옴</text>
  <text x="34" y="290" fill="rgb(138,133,128)" font-size="10">이 시나리오가 해당</text>

  <!-- 상황 2 -->
  <rect x="348" y="80" width="312" height="220" fill="rgba(212,168,83,0.05)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="362" y="102" fill="rgb(212,168,83)" font-size="13" font-weight="bold">② 소수의 대형 인스턴스</text>
  <!-- 큰 박스 두세 개 -->
  <rect x="368" y="118" width="80" height="80" fill="rgba(212,168,83,0.35)" stroke="rgb(212,168,83)"/>
  <rect x="456" y="118" width="80" height="80" fill="rgba(212,168,83,0.35)" stroke="rgb(212,168,83)"/>
  <rect x="544" y="118" width="80" height="80" fill="rgba(212,168,83,0.35)" stroke="rgb(212,168,83)"/>
  <text x="362" y="218" fill="#e8e4df" font-size="11">수는 적은데 각각 덩치가 큼</text>
  <text x="362" y="244" fill="rgb(212,168,83)" font-size="11" font-weight="bold">→ 예: 큰 비디오 파일 2~3개</text>
  <text x="362" y="270" fill="rgb(138,133,128)" font-size="10">Live Bytes(차지 메모리)가 크게 나옴</text>
  <text x="362" y="290" fill="rgb(138,133,128)" font-size="10">조각만 로드하는 최적화 검토 가능</text>
</svg>
