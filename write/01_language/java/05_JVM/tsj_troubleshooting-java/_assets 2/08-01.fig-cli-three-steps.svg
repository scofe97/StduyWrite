<svg viewBox="0 0 680 320" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>명령줄 3단계 — jps로 PID, jstack으로 덤프, 프로파일러에 Load (원문 Figure 8.4 개념도)</title>
  <desc>원문 Figure 8.4 의 개념을 도식으로 옮긴 것입니다. 명령줄로 스레드 덤프를 얻는 세 단계입니다. 첫째 덤프를 원하는 프로세스의 ID 를 찾습니다. JDK 의 jps -l 도구로 실행 중인 자바 프로세스의 PID 와 메인 클래스명을 얻습니다. 둘째 JDK 의 jstack 도구에 그 PID 를 인자로 줘 덤프를 텍스트로 생성하고 파일로 저장합니다. 셋째 저장한 덤프 파일을 프로파일러에 불러와 읽기 좋게 만듭니다. VisualVM 에서는 File Load 메뉴로 엽니다.</desc>
  <rect x="0" y="0" width="680" height="320" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="16" font-weight="bold">명령줄로 덤프 얻기 — 3단계</text>
  <text x="20" y="55" fill="rgb(138,133,128)" font-size="11">원문 Figure 8.4 개념도 — 원격 환경에서 유용 (명령줄만 접근 가능할 때)</text>

  <!-- step 1 -->
  <rect x="20" y="84" width="200" height="150" fill="rgb(20,20,20)" stroke="rgb(60,55,50)" stroke-width="1.5"/>
  <circle cx="44" cy="110" r="13" fill="rgba(212,168,83,0.2)" stroke="rgb(212,168,83)"/>
  <text x="44" y="115" fill="rgb(212,168,83)" font-size="13" font-weight="bold" text-anchor="middle">1</text>
  <text x="66" y="115" fill="#e8e4df" font-size="12" font-weight="bold">PID 찾기</text>
  <rect x="34" y="132" width="172" height="30" fill="rgb(30,30,30)" stroke="rgb(60,55,50)"/>
  <text x="44" y="152" fill="#9cc3df" font-size="12" font-family="monospace">jps -l</text>
  <text x="34" y="184" fill="rgb(138,133,128)" font-size="10">JDK 도구로 PID +</text>
  <text x="34" y="200" fill="rgb(138,133,128)" font-size="10">메인 클래스명 조회</text>
  <text x="34" y="220" fill="rgb(138,133,128)" font-size="10">첫 열=PID, 둘째 열=클래스</text>

  <!-- arrow -->
  <line x1="220" y1="159" x2="244" y2="159" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <polygon points="244,159 236,155 236,163" fill="rgb(212,168,83)"/>

  <!-- step 2 -->
  <rect x="246" y="84" width="200" height="150" fill="rgb(20,20,20)" stroke="rgb(60,55,50)" stroke-width="1.5"/>
  <circle cx="270" cy="110" r="13" fill="rgba(212,168,83,0.2)" stroke="rgb(212,168,83)"/>
  <text x="270" y="115" fill="rgb(212,168,83)" font-size="13" font-weight="bold" text-anchor="middle">2</text>
  <text x="292" y="115" fill="#e8e4df" font-size="12" font-weight="bold">덤프 수집</text>
  <rect x="260" y="132" width="172" height="30" fill="rgb(30,30,30)" stroke="rgb(60,55,50)"/>
  <text x="270" y="152" fill="#9cc3df" font-size="11" font-family="monospace">jstack 14208</text>
  <text x="260" y="184" fill="rgb(138,133,128)" font-size="10">PID 만 인자로 줌</text>
  <text x="260" y="200" fill="rgb(138,133,128)" font-size="10">평문(raw) 덤프 생성</text>
  <text x="260" y="220" fill="rgb(138,133,128)" font-size="10" font-family="monospace">&gt; dump.txt 로 저장</text>

  <!-- arrow -->
  <line x1="446" y1="159" x2="470" y2="159" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <polygon points="470,159 462,155 462,163" fill="rgb(212,168,83)"/>

  <!-- step 3 -->
  <rect x="472" y="84" width="188" height="150" fill="rgb(20,20,20)" stroke="rgb(60,55,50)" stroke-width="1.5"/>
  <circle cx="496" cy="110" r="13" fill="rgba(212,168,83,0.2)" stroke="rgb(212,168,83)"/>
  <text x="496" y="115" fill="rgb(212,168,83)" font-size="13" font-weight="bold" text-anchor="middle">3</text>
  <text x="518" y="115" fill="#e8e4df" font-size="12" font-weight="bold">불러오기</text>
  <rect x="486" y="132" width="160" height="30" fill="rgb(30,30,30)" stroke="rgb(60,55,50)"/>
  <text x="496" y="152" fill="#9cc3df" font-size="11">File &gt; Load</text>
  <text x="486" y="184" fill="rgb(138,133,128)" font-size="10">프로파일러에 import</text>
  <text x="486" y="200" fill="rgb(138,133,128)" font-size="10">읽기 좋게 시각화</text>
  <text x="486" y="220" fill="rgb(138,133,128)" font-size="10">(VisualVM 등)</text>

  <!-- 하단 -->
  <rect x="20" y="252" width="640" height="50" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="34" y="274" fill="#e8e4df" font-size="11" font-weight="bold">핵심</text>
  <text x="34" y="294" fill="rgb(138,133,128)" font-size="10.5">jps·jstack 은 JDK 기본 제공 도구. 콘솔만 있으면 원격 컨테이너에서도 덤프를 떠 옮길 수 있다.</text>
</svg>
