<svg viewBox="0 0 680 340" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>consumer를 빈 리스트에서 대기시키는 시나리오 — 경찰관이 소비할 값 없는 consumer를 멈춤 (원문 Figure 7.15 개념도)</title>
  <desc>원문 Figure 7.15 의 개념을 도식으로 옮긴 것입니다. 일부 차는 consumer 스레드이고 일부는 producer 스레드입니다. 경찰관은 리스트에 소비할 값이 없으면 consumer 에게 기다리라고 명령해 producer 들이 일하며 값을 더하게 합니다. 리스트에 소비 가능한 값이 최소 하나 생기면 경찰관은 기다리던 consumer 에게 실행을 계속하라고 명령합니다. 발상은 consumer 가 빈 리스트에서 헛돌지 않게 하고 값이 있을 때만 돌리면 더 효율적이지 않겠냐는 것입니다.</desc>
  <rect x="0" y="0" width="680" height="340" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="16" font-weight="bold">시나리오 — 빈 리스트면 consumer 를 대기시키자</text>
  <text x="20" y="55" fill="rgb(138,133,128)" font-size="11">원문 Figure 7.15 개념도 — 경찰관(모니터)이 소비할 값 없는 consumer 를 멈춤</text>

  <!-- 리스트 상태 -->
  <rect x="20" y="80" width="200" height="220" fill="rgb(20,20,20)" stroke="rgb(60,55,50)" stroke-width="1.5"/>
  <text x="120" y="102" fill="#e8e4df" font-size="12" font-weight="bold" text-anchor="middle">공유 리스트</text>
  <text x="120" y="124" fill="#f47f72" font-size="11" text-anchor="middle">(비어 있음)</text>
  <rect x="50" y="140" width="140" height="30" fill="rgb(30,30,30)" stroke="rgb(60,55,50)" stroke-dasharray="3 3"/>
  <text x="120" y="160" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">소비할 값 없음</text>
  <text x="120" y="210" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">값이 ≥1 생기면</text>
  <text x="120" y="230" fill="#66bb6a" font-size="10" text-anchor="middle">경찰관이 consumer 깨움</text>

  <!-- consumer 대기 -->
  <rect x="260" y="90" width="180" height="90" fill="rgba(102,187,106,0.06)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="350" y="112" fill="#66bb6a" font-size="12" font-weight="bold" text-anchor="middle">_Consumer</text>
  <text x="350" y="136" fill="#f47f72" font-size="11" text-anchor="middle">대기 (wait)</text>
  <text x="350" y="158" fill="rgb(138,133,128)" font-size="9.5" text-anchor="middle">소비할 값 없어 멈춤</text>
  <text x="350" y="174" fill="rgb(138,133,128)" font-size="9.5" text-anchor="middle">notify 받아야 깨어남</text>

  <!-- producer 실행 -->
  <rect x="260" y="200" width="180" height="90" fill="rgba(127,168,201,0.10)" stroke="#7fa8c9" stroke-width="1.5"/>
  <text x="350" y="222" fill="#9cc3df" font-size="12" font-weight="bold" text-anchor="middle">_Producer</text>
  <text x="350" y="246" fill="#66bb6a" font-size="11" text-anchor="middle">실행 (값 추가)</text>
  <text x="350" y="268" fill="rgb(138,133,128)" font-size="9.5" text-anchor="middle">consumer 가 비켜 일할 수 있음</text>

  <!-- 경찰관 -->
  <rect x="478" y="120" width="182" height="140" fill="rgba(212,168,83,0.06)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="569" y="146" fill="rgb(212,168,83)" font-size="12" font-weight="bold" text-anchor="middle">경찰관 = 모니터</text>
  <text x="569" y="172" fill="#e8e4df" font-size="10" text-anchor="middle">값 없으면 consumer 대기</text>
  <text x="569" y="192" fill="#e8e4df" font-size="10" text-anchor="middle">producer 일하게 둠</text>
  <text x="569" y="218" fill="#e8e4df" font-size="10" text-anchor="middle">값 생기면 consumer 깨움</text>
  <text x="569" y="244" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">producer 도 가득 차면 대기</text>

  <!-- 화살표 -->
  <line x1="440" y1="135" x2="476" y2="150" stroke="rgb(212,168,83)" stroke-width="1.2" stroke-dasharray="3 3"/>
  <line x1="440" y1="245" x2="476" y2="220" stroke="rgb(212,168,83)" stroke-width="1.2" stroke-dasharray="3 3"/>

  <!-- 하단 발상 -->
  <rect x="20" y="306" width="640" height="0" fill="none"/>
  <text x="20" y="324" fill="rgb(138,133,128)" font-size="10.5">발상: consumer 가 빈 리스트에서 헛돌지 않게 값이 있을 때만 돌리면 더 효율적? → 측정해 보면 오히려 느려짐(07-03 §4)</text>
</svg>
