<svg viewBox="0 0 680 320" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>GC 로그 레벨 선택 흐름 — 운영은 error/warning, 기본 info, 깊은 조사는 staging에서 debug/trace (개념도)</title>
  <desc>이 편의 개념을 도식으로 옮긴 것입니다. GC 로그 레벨은 무엇을 조사하느냐에 따라 고릅니다. 운영 환경에서는 늘 error 와 warning 만 켭니다. 운영은 성능에 민감해 과도한 GC 로깅이 오버헤드를 주기 때문입니다. 기본 레벨인 info 는 모니터링과 기본 트러블슈팅에 대개 충분합니다. info 로 문제는 알았지만 단서가 부족하면 운영을 verbose 로그로 채우지 말고 staging 환경에서 재현한 뒤 debug 와 trace 로 파고듭니다. debug 는 GC 동작과 멈춤 시간과 최적화 통찰을 주고 trace 는 모든 세부를 주는 다 줘 모드입니다. 너무 적게 로깅하면 깜깜이로 날고 너무 많이 하면 데이터의 바다에 빠지므로 상세함과 성능의 균형이 핵심입니다.</desc>
  <rect x="0" y="0" width="680" height="320" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="16" font-weight="bold">어느 레벨을 켤까 — 환경별 결정 흐름</text>
  <text x="20" y="55" fill="rgb(138,133,128)" font-size="11">개념도 — 상세함과 성능의 균형</text>

  <!-- 운영 -->
  <rect x="20" y="84" width="200" height="150" fill="rgba(244,127,114,0.06)" stroke="#f47f72" stroke-width="2"/>
  <text x="120" y="108" fill="#f47f72" font-size="13" font-weight="bold" text-anchor="middle">운영 (production)</text>
  <rect x="40" y="124" width="160" height="30" fill="rgba(244,127,114,0.15)" stroke="#f47f72"/>
  <text x="120" y="144" fill="#f47f72" font-size="11" font-weight="bold" text-anchor="middle">error · warning 만</text>
  <text x="120" y="178" fill="#e8e4df" font-size="10" text-anchor="middle">성능 민감</text>
  <text x="120" y="196" fill="rgb(138,133,128)" font-size="9.5" text-anchor="middle">verbose 로깅 = 오버헤드</text>
  <text x="120" y="216" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">기본 info 로 우선 모니터링</text>

  <!-- 화살표 -->
  <line x1="220" y1="159" x2="252" y2="159" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <polygon points="252,159 244,155 244,163" fill="rgb(212,168,83)"/>
  <text x="236" y="149" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">단서 부족</text>

  <!-- staging -->
  <rect x="254" y="84" width="200" height="150" fill="rgba(127,168,201,0.06)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="354" y="108" fill="#9cc3df" font-size="13" font-weight="bold" text-anchor="middle">staging (재현)</text>
  <rect x="274" y="124" width="160" height="30" fill="rgba(127,168,201,0.15)" stroke="#7fa8c9"/>
  <text x="354" y="144" fill="#9cc3df" font-size="11" font-weight="bold" text-anchor="middle">문제 재현</text>
  <text x="354" y="178" fill="#e8e4df" font-size="10" text-anchor="middle">운영을 채우지 말고</text>
  <text x="354" y="196" fill="#e8e4df" font-size="10" text-anchor="middle">여기서 verbose</text>
  <text x="354" y="216" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">info → 더 파야 하면 ↓</text>

  <!-- 화살표 -->
  <line x1="454" y1="159" x2="486" y2="159" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <polygon points="486,159 478,155 478,163" fill="rgb(212,168,83)"/>

  <!-- 개발 -->
  <rect x="488" y="84" width="172" height="150" fill="rgba(212,168,83,0.06)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="574" y="108" fill="rgb(212,168,83)" font-size="13" font-weight="bold" text-anchor="middle">개발 (튜닝)</text>
  <rect x="502" y="124" width="144" height="30" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="574" y="144" fill="rgb(212,168,83)" font-size="11" font-weight="bold" text-anchor="middle">debug · trace</text>
  <text x="574" y="178" fill="#e8e4df" font-size="9.5" text-anchor="middle">debug=동작·멈춤·최적화</text>
  <text x="574" y="196" fill="#e8e4df" font-size="9.5" text-anchor="middle">trace="다 줘" 모드</text>
  <text x="574" y="216" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">GC 성능 미세 조정</text>

  <!-- 하단 -->
  <rect x="20" y="252" width="640" height="50" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="34" y="274" fill="#e8e4df" font-size="11" font-weight="bold">균형</text>
  <text x="34" y="294" fill="rgb(138,133,128)" font-size="10.5">너무 적게 = 깜깜이로 날기 · 너무 많이 = 데이터의 바다 → 필요한 만큼만, 오버헤드 없이</text>
</svg>
