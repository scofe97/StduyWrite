<svg viewBox="0 0 680 380" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>이벤트 드리븐과 재생 — 브로커가 메시지를 중계하고 consumer group offset이 잘못되면 미소비, 재생으로 검증 (원문 Figure 13.5·13.6 개념도)</title>
  <desc>원문 Figure 13.5 와 13.6 의 개념을 도식으로 옮긴 것입니다. 이벤트 드리븐 설계에서 서비스는 서로를 직접 호출하지 않고 메시지 브로커가 여러 서비스가 교환하는 메시지를 관리합니다. 생산자 서비스가 UserRegistered 이벤트를 user-events 토픽에 발행하면 소비자 서비스들이 consumer group 으로 그 토픽을 읽고 각자 offset 으로 어디까지 처리했는지 책갈피를 둡니다. Ahmed 사건에서 이메일 서비스는 최근 배포 중 잘못된 토픽을 듣도록 잘못 설정돼 이벤트를 전혀 본 적이 없어 메시지가 잃은 게 아니라 미소비 상태로 남았습니다. offset 이 갱신 안 되면 재처리하고 너무 앞서면 앞 메시지를 놓치고 완전히 틀리면 아무것도 못 봅니다. 재생은 이벤트 로그에 기록된 메시지를 스테이징이나 로컬 환경에 다시 흘려보내 워크플로를 재트리거하는 것으로 실제 사용자나 데이터를 건드리지 않고 가정을 검증하고 실패 시나리오를 격리합니다. Ahmed 는 kafka-console-consumer 와 kafka-console-producer 로 놓친 이벤트를 재생해 이메일 서비스가 올바르게 소비함을 확인했습니다.</desc>
  <rect x="0" y="0" width="680" height="380" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="16" font-weight="bold">이벤트 드리븐과 재생 — 잘못된 토픽, 미소비된 메시지</text>
  <text x="20" y="55" fill="rgb(138,133,128)" font-size="11">원문 Figure 13.5·13.6 개념도 — 메시지는 잃은 게 아니라 안 들렸다</text>

  <!-- 생산자 -->
  <rect x="20" y="86" width="130" height="56" fill="rgba(127,168,201,0.1)" stroke="#7fa8c9"/>
  <text x="85" y="110" fill="#9cc3df" font-size="11" font-weight="bold" text-anchor="middle">생산자 서비스</text>
  <text x="85" y="130" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">UserRegistered 발행</text>

  <line x1="150" y1="114" x2="198" y2="114" stroke="#66bb6a" stroke-width="2"/>
  <polygon points="198,114 190,110 190,118" fill="#66bb6a"/>

  <!-- 브로커 -->
  <rect x="200" y="80" width="180" height="120" fill="rgb(20,20,20)" stroke="rgb(60,55,50)" stroke-width="1.5"/>
  <text x="290" y="102" fill="rgb(212,168,83)" font-size="12" font-weight="bold" text-anchor="middle">메시지 브로커 (Kafka)</text>
  <rect x="216" y="116" width="148" height="26" fill="rgba(102,187,106,0.15)" stroke="#66bb6a"/>
  <text x="290" y="133" fill="#66bb6a" font-size="10" text-anchor="middle">topic: user-events ✓</text>
  <rect x="216" y="150" width="148" height="26" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="290" y="167" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">topic: other-events</text>
  <text x="290" y="192" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">파티션 내 순서·내구성·확장</text>

  <!-- 소비자 정상 -->
  <line x1="380" y1="129" x2="428" y2="120" stroke="#66bb6a" stroke-width="1.5"/>
  <polygon points="428,120 419,119 422,127" fill="#66bb6a"/>
  <rect x="430" y="96" width="150" height="44" fill="rgba(102,187,106,0.08)" stroke="#66bb6a"/>
  <text x="505" y="116" fill="#66bb6a" font-size="10.5" font-weight="bold" text-anchor="middle">올바른 소비자</text>
  <text x="505" y="132" fill="rgb(138,133,128)" font-size="8.5" text-anchor="middle">offset = user-events</text>

  <!-- 소비자 오설정 (이메일) -->
  <line x1="380" y1="163" x2="428" y2="172" stroke="#f47f72" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="428,172 419,173 422,165" fill="#f47f72"/>
  <rect x="430" y="150" width="230" height="50" fill="rgba(244,127,114,0.08)" stroke="#f47f72"/>
  <text x="445" y="170" fill="#f47f72" font-size="10.5" font-weight="bold">이메일 서비스 — 잘못된 토픽 듣기</text>
  <text x="445" y="187" fill="rgb(138,133,128)" font-size="8.5">★ 배포 중 오설정 → 이벤트 본 적 없음(미소비)</text>

  <!-- offset 설명 -->
  <rect x="20" y="218" width="640" height="62" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="34" y="240" fill="#9cc3df" font-size="11" font-weight="bold">consumer group offset = "어디까지 처리했나" 책갈피</text>
  <text x="34" y="260" fill="#e8e4df" font-size="9.5">갱신 안 됨 → 재처리(득실) · 너무 앞섬 → 앞 메시지 놓침 · 완전히 틀림(다른 토픽) → 아무것도 못 봄</text>
  <text x="34" y="276" fill="rgb(138,133,128)" font-size="9">Ahmed: "완전히 틀림"에 해당 → 메시지는 큐에 그대로, 단지 소비 안 됨</text>

  <!-- 재생 -->
  <rect x="20" y="296" width="640" height="68" fill="rgba(212,168,83,0.06)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="34" y="318" fill="rgb(212,168,83)" font-size="12" font-weight="bold">이벤트 재생 — 안전하게 검증</text>
  <text x="34" y="338" fill="#e8e4df" font-size="10.5">기록된 메시지를 스테이징/로컬에 다시 흘려보냄(실데이터 안 건드림) → 가정 검증·실패 격리</text>
  <text x="34" y="356" fill="#66bb6a" font-size="10">kafka-console-consumer / kafka-console-producer 로 재생 → 이메일 서비스가 올바르게 소비 확인</text>
</svg>
