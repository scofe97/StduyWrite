<svg viewBox="0 0 680 620" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Troubleshooting Java 2판 — 트러블슈팅의 본질과 책 구성</title>
  <desc>이 책은 개발자가 코드를 쓰는 시간보다 시스템을 조사하는 시간이 더 길다는 문제의식에서 출발합니다. 조사를 빠르게 만드는 기술이 곧 트러블슈팅이며, 디버깅·프로파일링·로그 분석으로 JVM 안에서 무슨 일이 일어나는지를 알아냅니다. 도구는 무료 도구를 중심으로 다루며, IntelliJ Community Edition 디버거와 VisualVM이 주된 수단입니다. 책은 세 부와 마무리로 구성됩니다. 1부는 디버깅과 로그로, 조건부 중단점과 비중단 중단점 같은 기본을 넘어서는 디버거 기법을 다룹니다. 2부는 리소스 소비로, VisualVM·CPU 샘플링·instrumentation·Hibernate SQL 외부 의존성·락 트러블슈팅을 다룹니다. 3부는 메모리로, 누수 추적·힙 덤프·OQL·GC 로그를 다룹니다. 마무리는 분산 추적과 이종 시스템 분산 트랜잭션으로 시야를 넓힙니다. 2판은 AI를 새 동반자로 들였습니다. AI는 로그 분석·가설 제안·의심 코드 경로 지목으로 조사를 앞당기지만, 증거를 해석하고 결정하는 주체는 여전히 개발자입니다. 탐정이 조수를 쓰되 사건은 스스로 풀듯이 말입니다. 대상 독자는 입문자에게도 친절하지만, 숙련 엔지니어의 직관과 경험을 현대 도구로 보강하려는 사람에게도 맞습니다.</desc>
  <rect x="0" y="0" width="680" height="620" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">Troubleshooting Java 2판 — 트러블슈팅의 본질과 책 구성</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">코드를 쓰는 시간보다 조사하는 시간이 깁니다 (Laurențiu Spilcă, Manning)</text>

  <!-- 핵심 명제 -->
  <rect x="20" y="74" width="640" height="64" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="98" fill="#e8e4df" font-size="13" font-weight="bold">개발의 본질은 조사입니다 — 디버깅 · 프로파일링 · 로그 분석</text>
  <text x="38" y="118" fill="rgb(138,133,128)" font-size="11">코드 작성은 결과물일 뿐, 대부분의 시간은 "지금 JVM 안에서 무슨 일이 일어나는가"를 알아내는 데 씁니다</text>
  <text x="38" y="134" fill="rgb(212,168,83)" font-size="10">어떤 기술을 언제 적용할지 아는 것만으로 막대한 시간을 아낍니다</text>

  <!-- 무료 도구 -->
  <rect x="20" y="154" width="315" height="58" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="38" y="176" fill="rgb(212,168,83)" font-size="12" font-weight="bold">무료 도구로 충분합니다</text>
  <text x="38" y="196" fill="#e8e4df" font-size="11">IntelliJ CE 디버거 · VisualVM</text>
  <rect x="345" y="154" width="315" height="58" fill="rgba(127,168,201,0.08)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="363" y="176" fill="#9cc3df" font-size="12" font-weight="bold">능력과 한계를 함께 봅니다</text>
  <text x="363" y="196" fill="rgb(138,133,128)" font-size="10">잘못되는 사례를 시연해 경험을 쌓습니다</text>

  <!-- 3부 구성 -->
  <text x="20" y="238" fill="#e8e4df" font-size="13" font-weight="bold">책의 구성 — 3부 + 마무리</text>

  <rect x="20" y="250" width="206" height="116" fill="rgba(127,168,201,0.10)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="38" y="272" fill="#9cc3df" font-size="12" font-weight="bold">1부 디버깅과 로그</text>
  <text x="38" y="292" fill="#e8e4df" font-size="10">디버거의 능력과 한계</text>
  <text x="38" y="310" fill="rgb(138,133,128)" font-size="10">조건부 중단점</text>
  <text x="38" y="328" fill="rgb(138,133,128)" font-size="10">비중단 중단점</text>
  <text x="38" y="346" fill="rgb(138,133,128)" font-size="10">로그 기반 트러블슈팅</text>
  <text x="38" y="362" fill="rgb(138,133,128)" font-size="9">IntelliJ CE 디버거</text>

  <rect x="237" y="250" width="206" height="116" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="255" y="272" fill="rgb(212,168,83)" font-size="12" font-weight="bold">2부 리소스 소비</text>
  <text x="255" y="292" fill="#e8e4df" font-size="10">VisualVM이 주된 수단</text>
  <text x="255" y="310" fill="rgb(138,133,128)" font-size="10">CPU 샘플링 · instrumentation</text>
  <text x="255" y="328" fill="rgb(138,133,128)" font-size="10">Hibernate SQL 외부 의존성</text>
  <text x="255" y="346" fill="rgb(138,133,128)" font-size="10">멀티스레드 락 트러블슈팅</text>
  <text x="255" y="362" fill="rgb(138,133,128)" font-size="9">CPU 프로파일링에서 이어짐</text>

  <rect x="454" y="250" width="206" height="116" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="2"/>
  <text x="472" y="272" fill="#66bb6a" font-size="12" font-weight="bold">3부 메모리</text>
  <text x="472" y="292" fill="#e8e4df" font-size="10">메모리 누수 추적</text>
  <text x="472" y="310" fill="rgb(138,133,128)" font-size="10">힙 덤프 생성·탐색</text>
  <text x="472" y="328" fill="rgb(138,133,128)" font-size="10">JDK 타입 필터·live objects</text>
  <text x="472" y="346" fill="rgb(138,133,128)" font-size="10">OQL로 힙 질의</text>
  <text x="472" y="362" fill="rgb(138,133,128)" font-size="9">마지막 장은 GC 로그</text>

  <!-- 마무리 -->
  <rect x="20" y="378" width="640" height="44" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="400" fill="#e8e4df" font-size="12" font-weight="bold">마무리 — 더 큰 규모의 시스템</text>
  <text x="38" y="416" fill="rgb(138,133,128)" font-size="10">분산 추적(distributed tracing) → 이종 시스템에 걸친 분산 트랜잭션</text>

  <!-- AI -->
  <rect x="20" y="434" width="640" height="78" fill="rgba(244,127,114,0.07)" stroke="#f47f72" stroke-width="2"/>
  <text x="38" y="456" fill="#f47f72" font-size="13" font-weight="bold">2판의 새 동반자 — AI, 그러나 판단은 사람의 몫</text>
  <text x="38" y="476" fill="#e8e4df" font-size="11">AI는 로그 분석·가설 제안·의심 코드 경로 지목으로 조사를 앞당깁니다</text>
  <text x="38" y="495" fill="rgb(138,133,128)" font-size="11">탐정이 조수를 쓰되 사건은 스스로 풀듯, 증거를 해석하고 결정하는 주체는 개발자입니다</text>
  <text x="38" y="508" fill="rgb(212,168,83)" font-size="9">만능 해결책은 없습니다 — 의존하지 않으면서 잘 쓰는 법까지가 오늘의 효율입니다</text>

  <!-- 대상 독자 -->
  <rect x="20" y="524" width="640" height="76" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="546" fill="#e8e4df" font-size="12" font-weight="bold">누구를 위한 책인가</text>
  <rect x="38" y="556" width="200" height="24" fill="rgba(102,187,106,0.13)" stroke="#66bb6a"/><text x="138" y="572" fill="#66bb6a" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle">입문자에게도 친절</text>
  <rect x="244" y="556" width="280" height="24" fill="rgba(212,168,83,0.13)" stroke="rgb(212,168,83)"/><text x="384" y="572" fill="rgb(212,168,83)" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle">숙련 엔지니어 생산성도 높임</text>
  <text x="38" y="594" fill="rgb(138,133,128)" font-size="10">목표는 일관됩니다 — 근본 원인을 빠르게 찾고, 계속 배우며, 까다로운 문제도 자신 있게 풉니다</text>
</svg>
