<svg viewBox="0 0 680 360" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>누락된 주문 시나리오 — checkout(REST)에서 order에서 Kafka에서 fulfillment, 끊긴 지점 (원문 Figure 12.1·12.2 개념도)</title>
  <desc>원문 Figure 12.1 과 12.2 의 개념을 도식으로 옮긴 것입니다. checkout 서비스가 REST 로 order 서비스를 호출하고 order 서비스가 Kafka 의 orders.created 토픽에 이벤트를 비동기로 발행하며 fulfillment 서비스가 그 토픽에서 소비해 데이터베이스에 주문을 저장합니다. checkout 과 order 로그는 모두 정상이고 trace ID 가 두 서비스를 따라다니며 찍힙니다. 그런데 fulfillment 가 Kafka 메시지를 역직렬화하지 못해 이벤트가 토픽에 소비 안 된 채 앉아 있고 그래서 주문이 데이터베이스에 저장되지 않아 관리자 대시보드에 안 보입니다. trace ID 가 요청을 따라다니므로 어느 경계에서 사슬이 끊겼는지 추적할 수 있습니다.</desc>
  <rect x="0" y="0" width="680" height="360" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="16" font-weight="bold">누락된 주문 — trace ID 가 끊긴 지점을 가리킨다</text>
  <text x="20" y="55" fill="rgb(138,133,128)" font-size="11">원문 Figure 12.1·12.2 개념도 — trace ID 가 경계마다 찍힘</text>

  <!-- checkout -->
  <rect x="20" y="100" width="140" height="70" fill="rgba(102,187,106,0.1)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="90" y="128" fill="#66bb6a" font-size="12" font-weight="bold" text-anchor="middle">checkout</text>
  <text x="90" y="148" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">REST · 200 OK</text>
  <text x="90" y="162" fill="#66bb6a" font-size="8" text-anchor="middle">trace ID ✓</text>

  <line x1="160" y1="135" x2="196" y2="135" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <polygon points="196,135 188,131 188,139" fill="rgb(212,168,83)"/>
  <text x="178" y="126" fill="rgb(138,133,128)" font-size="8" text-anchor="middle">REST</text>

  <!-- order -->
  <rect x="198" y="100" width="140" height="70" fill="rgba(102,187,106,0.1)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="268" y="128" fill="#66bb6a" font-size="12" font-weight="bold" text-anchor="middle">order</text>
  <text x="268" y="148" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">주문 생성·발행</text>
  <text x="268" y="162" fill="#66bb6a" font-size="8" text-anchor="middle">trace ID ✓</text>

  <line x1="338" y1="135" x2="374" y2="135" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <polygon points="374,135 366,131 366,139" fill="rgb(212,168,83)"/>
  <text x="356" y="126" fill="rgb(138,133,128)" font-size="8" text-anchor="middle">발행</text>

  <!-- Kafka -->
  <rect x="376" y="100" width="140" height="70" fill="rgba(212,168,83,0.1)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="446" y="124" fill="rgb(212,168,83)" font-size="12" font-weight="bold" text-anchor="middle">Kafka</text>
  <text x="446" y="142" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">orders.created</text>
  <text x="446" y="160" fill="#f47f72" font-size="9" text-anchor="middle">이벤트 앉아 있음</text>

  <!-- 끊긴 화살표 -->
  <line x1="516" y1="135" x2="552" y2="135" stroke="#f47f72" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="552,135 544,131 544,139" fill="#f47f72"/>
  <text x="534" y="126" fill="#f47f72" font-size="8" text-anchor="middle">✗ 소비 실패</text>

  <!-- fulfillment -->
  <rect x="554" y="100" width="106" height="70" fill="rgba(244,127,114,0.08)" stroke="#f47f72" stroke-width="2"/>
  <text x="607" y="128" fill="#f47f72" font-size="11" font-weight="bold" text-anchor="middle">fulfillment</text>
  <text x="607" y="148" fill="rgb(138,133,128)" font-size="8.5" text-anchor="middle">역직렬화 실패</text>
  <text x="607" y="162" fill="#f47f72" font-size="8" text-anchor="middle">주문 흔적 없음</text>

  <!-- 끊긴 지점 강조 -->
  <rect x="20" y="200" width="640" height="64" fill="rgba(244,127,114,0.06)" stroke="#f47f72" stroke-width="1.5"/>
  <text x="34" y="222" fill="#f47f72" font-size="12" font-weight="bold">끊긴 지점 — fulfillment 가 메시지를 소비하지 못함</text>
  <text x="34" y="244" fill="#e8e4df" font-size="10.5">로그는 checkout·order 모두 정상 → trace tree 에 fulfillment span 만 없음</text>
  <text x="34" y="260" fill="rgb(138,133,128)" font-size="9.5">[WARN] Failed to deserialize ... Unknown enum value: SHIPPING_METHOD_DRONE</text>

  <!-- 하단 -->
  <rect x="20" y="276" width="640" height="68" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="34" y="298" fill="#e8e4df" font-size="11" font-weight="bold">trace ID = 여권</text>
  <text x="34" y="320" fill="rgb(138,133,128)" font-size="10">요청이 HTTP·Kafka 로 흐를 때 각 서비스가 같은 trace ID 로 태깅 → 경계 너머로 이야기를 꿰맞춤</text>
  <text x="34" y="338" fill="rgb(138,133,128)" font-size="10">한 서비스라도 trace ID 떨구면 사슬 끊김 (traceparent · x-b3-traceid 헤더로 전파)</text>
</svg>
