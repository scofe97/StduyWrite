<svg viewBox="0 0 680 560" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>코드 조사와 트러블슈팅 — 정의와 기법의 지형 (Ch.1 §1.1)</title>
  <desc>개발자는 코드를 쓰는 시간보다 읽는 시간이 10배 넘게 길어서, 조사를 잘하는 것이 생산성을 가장 크게 끌어올립니다. 코드 조사는 어떤 소프트웨어 기능의 동작을 분석하는 과정으로 정의되며, de-bug는 bug를 빼낸다는 뜻이지만 오늘날에는 문제를 찾는 것을 넘어 동작을 이해하는 일까지 포함합니다. 코드를 조사하는 이유는 문제 찾기, 기능 이해와 개선, 정확성 검토, 기술 학습, 성능 최적화, 보안 강화, 유지보수성 향상으로 일곱 가지입니다. 트러블슈팅은 시스템의 실제 동작을 이해하고 기대 동작과 비교해 무엇이 다른지 찾아내는 일이며, 구문 오류 고치기와 달리 무엇이 틀렸는지 모르는 지점에서 시작합니다. 디버깅은 조사 기법의 통칭이고 디버거는 그중 도구 하나일 뿐이므로, 둘을 같다고 보는 것은 흔한 오해입니다. 조사는 살아 있는 앱을 실시간으로 따라가는 경우와, 크래시해 죽은 앱의 흔적만 보는 사후 조사로 갈립니다. 사후 조사는 출력, 로그, 힙 덤프, 스레드 덤프 같은 데이터에 의존하며 더 어렵습니다.</desc>
  <rect x="0" y="0" width="680" height="560" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">코드 조사와 트러블슈팅 — 정의의 지형</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">읽기:쓰기 &gt; 10:1 — 조사를 잘하는 것이 생산성의 힘 증폭기입니다 (Ch.1 §1.1)</text>

  <!-- 코드 조사 정의 -->
  <rect x="20" y="74" width="315" height="92" fill="rgba(127,168,201,0.10)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="38" y="96" fill="#9cc3df" font-size="13" font-weight="bold">코드 조사 (investigation)</text>
  <text x="38" y="116" fill="#e8e4df" font-size="11">어떤 기능의 동작을 분석하는 과정</text>
  <rect x="38" y="126" width="279" height="22" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/>
  <text x="48" y="141" fill="rgb(212,168,83)" font-family="'JetBrains Mono',monospace" font-size="10">de-bug = bug를 빼낸다 = 오류 제거</text>
  <text x="38" y="161" fill="rgb(138,133,128)" font-size="10">오늘날엔 "문제 찾기"를 넘어 "이해"까지</text>

  <!-- 트러블슈팅 정의 -->
  <rect x="345" y="74" width="315" height="92" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="363" y="96" fill="rgb(212,168,83)" font-size="13" font-weight="bold">트러블슈팅 (troubleshooting)</text>
  <text x="363" y="116" fill="#e8e4df" font-size="11">실제 동작을 이해 → 기대 동작과 비교</text>
  <text x="363" y="134" fill="#e8e4df" font-size="11">→ 무엇이 다른가를 찾는다</text>
  <text x="363" y="154" fill="#f47f72" font-size="10">무엇이 틀렸는지 "모르는 지점"에서 시작</text>

  <!-- 조사 7가지 이유 -->
  <rect x="20" y="178" width="640" height="74" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="200" fill="#e8e4df" font-size="12" font-weight="bold">코드를 조사하는 일곱 가지 이유</text>
  <text x="38" y="220" fill="rgb(138,133,128)" font-size="10">① 문제 찾기   ② 기능 이해·개선   ③ 정확성 검토   ④ 기술·라이브러리 학습</text>
  <text x="38" y="240" fill="rgb(138,133,128)" font-size="10">⑤ 성능 최적화   ⑥ 취약점 제거·보안   ⑦ 유지보수성 향상</text>

  <!-- 디버깅 != 디버거 -->
  <rect x="20" y="264" width="640" height="48" fill="rgba(244,127,114,0.07)" stroke="#f47f72" stroke-width="2"/>
  <text x="38" y="286" fill="#f47f72" font-size="12" font-weight="bold">흔한 오해 — 디버깅 ≠ 디버거</text>
  <text x="38" y="304" fill="rgb(138,133,128)" font-size="10">디버깅 = 동작 분석 기법의 통칭 / 디버거 = 실행을 멈추고 한 줄씩 따라가는 도구 하나</text>

  <!-- live vs postmortem -->
  <text x="20" y="340" fill="#e8e4df" font-size="13" font-weight="bold">조사는 둘로 갈립니다 — 살아 있는 앱 vs 죽은 앱</text>

  <rect x="20" y="352" width="315" height="186" fill="rgba(102,187,106,0.08)" stroke="#66bb6a" stroke-width="2"/>
  <text x="38" y="374" fill="#66bb6a" font-size="12" font-weight="bold">live — 실행 중 조사</text>
  <text x="38" y="394" fill="#e8e4df" font-size="11">앱이 돌고 있을 때 실시간으로 따라감</text>
  <text x="38" y="416" fill="rgb(138,133,128)" font-size="10">디버거 — 멈추고 한 줄씩 (2~3장)</text>
  <text x="38" y="436" fill="rgb(138,133,128)" font-size="10">프로파일러 — 실행 코드·시간 (5~8장)</text>
  <text x="38" y="456" fill="rgb(138,133,128)" font-size="10">로그 — 활동 기록 (4장)</text>
  <text x="38" y="480" fill="rgb(138,133,128)" font-size="10">읽기로 안 될 때: 추상화 계층 깊은</text>
  <text x="38" y="496" fill="rgb(138,133,128)" font-size="10">프레임워크·라이브러리 → 프로파일러로</text>
  <text x="38" y="512" fill="rgb(138,133,128)" font-size="10">시작점부터 찾는다</text>
  <text x="38" y="530" fill="#66bb6a" font-size="9">기법 선택의 여지가 넓다</text>

  <rect x="345" y="352" width="315" height="186" fill="rgba(212,168,83,0.08)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="363" y="374" fill="rgb(212,168,83)" font-size="12" font-weight="bold">postmortem — 사후 조사</text>
  <text x="363" y="394" fill="#e8e4df" font-size="11">크래시해 더 이상 안 도는 앱의 흔적</text>
  <text x="363" y="416" fill="rgb(138,133,128)" font-size="10">Output — 실행 후 산출물 (있다면)</text>
  <text x="363" y="436" fill="rgb(138,133,128)" font-size="10">Logs — 실패 직전까지의 활동</text>
  <text x="363" y="456" fill="rgb(138,133,128)" font-size="10">Heap dump — 메모리 스냅샷 (10장)</text>
  <text x="363" y="476" fill="rgb(138,133,128)" font-size="10">Thread dump — 스레드 상태 (8장)</text>
  <text x="363" y="500" fill="#f47f72" font-size="10">쓸 수 있는 기법의 일부만 남는다</text>
  <text x="363" y="520" fill="#f47f72" font-size="10">→ 대체로 더 어렵다 (8~11장)</text>
</svg>
