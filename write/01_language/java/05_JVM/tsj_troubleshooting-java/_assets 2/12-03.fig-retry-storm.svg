<svg viewBox="0 0 680 340" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Retry storm — 백오프 없는 재시도가 부하를 증폭하는 피드백 루프 (원문 Figure 12.6·12.7 개념도)</title>
  <desc>원문 Figure 12.6 과 12.7 의 개념을 도식으로 옮긴 것입니다. 재시도는 일시적 실패에서 복원을 돕지만 백오프나 조율 없이 여러 클라이언트가 실패한 요청을 동시에 재시도하면 이미 힘들어하는 서비스를 압도합니다. 이것이 retry storm 으로 복원력을 높이려던 장치가 전면 장애를 일으키는 피드백 루프입니다. 하류 서비스가 무응답이면 상류가 과하게 재시도하고 그게 시스템 전역 부하를 증폭해 자원을 고갈시켜 국소 장애를 광범위 장애로 키웁니다. 신호는 사용자 트래픽 증가 없이 CPU 와 요청량과 지연이 급증하는 것과 동일 페이로드가 짧은 간격으로 반복되는 로그와 같은 부모 같은 작업을 반복 호출하는 짧고 촘촘한 재시도 span 입니다.</desc>
  <rect x="0" y="0" width="680" height="340" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="16" font-weight="bold">Retry storm — 회복 장치가 부하를 증폭한다</text>
  <text x="20" y="55" fill="rgb(138,133,128)" font-size="11">원문 Figure 12.6·12.7 개념도 — 피드백 루프</text>

  <!-- 피드백 루프 -->
  <rect x="40" y="90" width="160" height="60" fill="rgba(127,168,201,0.1)" stroke="#7fa8c9"/>
  <text x="120" y="116" fill="#9cc3df" font-size="12" font-weight="bold" text-anchor="middle">상류 서비스</text>
  <text x="120" y="136" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">실패 → 재시도(백오프 X)</text>

  <rect x="480" y="90" width="160" height="60" fill="rgba(244,127,114,0.1)" stroke="#f47f72"/>
  <text x="560" y="116" fill="#f47f72" font-size="12" font-weight="bold" text-anchor="middle">하류 서비스</text>
  <text x="560" y="136" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">무응답·이미 힘듦</text>

  <!-- 화살표 오른쪽(재시도 폭주) -->
  <line x1="200" y1="108" x2="478" y2="108" stroke="#f47f72" stroke-width="2"/>
  <polygon points="478,108 470,104 470,112" fill="#f47f72"/>
  <text x="340" y="100" fill="#f47f72" font-size="10" text-anchor="middle" font-weight="bold">재시도 ×N (부하 증폭)</text>

  <!-- 화살표 왼쪽(더 느려짐) -->
  <line x1="480" y1="132" x2="202" y2="132" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <polygon points="202,132 210,128 210,136" fill="rgb(212,168,83)"/>
  <text x="340" y="148" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">더 느려짐/실패 → 또 재시도 (루프)</text>

  <!-- 신호 3 -->
  <rect x="20" y="170" width="640" height="100" fill="rgb(20,20,20)" stroke="rgb(60,55,50)" stroke-width="1.5"/>
  <text x="34" y="192" fill="#e8e4df" font-size="12" font-weight="bold">신호 — 눈앞에 숨어 있다</text>
  <text x="34" y="214" fill="#f47f72" font-size="10.5">① 트래픽 증가 없는 부하 급증 (사용자 트래픽 그대로인데 CPU·요청량·지연 ↑)</text>
  <text x="34" y="236" fill="#e8e4df" font-size="10.5">② 반복 로그: "Timeout calling PaymentService. Retrying attempt 1... 2..."</text>
  <text x="34" y="258" fill="#9cc3df" font-size="10.5">③ 짧고 촘촘한 재시도 span: 같은 부모·같은 작업 반복 (attempt 1/2/3)</text>

  <!-- 하단 -->
  <rect x="20" y="282" width="640" height="44" fill="rgba(244,127,114,0.06)" stroke="#f47f72"/>
  <text x="34" y="304" fill="#f47f72" font-size="11" font-weight="bold">cascading 과 결합</text>
  <text x="34" y="320" fill="rgb(138,133,128)" font-size="10">무응답 하류 → 과한 재시도 → 전역 부하 증폭 → 자원 고갈 → 국소 장애가 광범위 장애로</text>
</svg>
