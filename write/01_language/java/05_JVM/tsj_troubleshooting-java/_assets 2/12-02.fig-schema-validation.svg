<svg viewBox="0 0 680 340" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>스키마 검증 파이프라인 — CI에서 현재 vs 이전 스키마 비교(Buf), 런타임 레지스트리 검증 (개념도)</title>
  <desc>이 편의 개념을 도식으로 옮긴 것입니다. 스키마 검증은 두 지점에서 계약을 강제합니다. CI 파이프라인에서는 현재 스키마인 .proto 나 Avro 나 JSON Schema 를 main 브랜치나 공유 레지스트리의 이전 버전과 비교합니다. Buf 나 avro-tools 같은 도구로 호환성을 검사해 optional 필드 추가는 통과시키고 필드 이름 변경이나 제거나 타입 변경은 깨는 변경으로 표시해 CI 잡을 실패시켜 일찍 알립니다. 런타임에서는 스키마를 Confluent Schema Registry 같은 중앙 레지스트리에 등록하고 메시지 발행이나 소비 때마다 검증합니다. 약간의 지연과 복잡도가 따르지만 버전 어긋남으로 인한 직렬화 문제를 잡습니다. 두 경우 모두 서비스 간 계약을 강제해 진화하면서도 예측 가능한 통신을 보장합니다.</desc>
  <rect x="0" y="0" width="680" height="340" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="16" font-weight="bold">스키마 검증 — 두 지점에서 계약을 강제</text>
  <text x="20" y="55" fill="rgb(138,133,128)" font-size="11">개념도 — CI(배포 전) + 런타임 레지스트리</text>

  <!-- CI -->
  <rect x="20" y="80" width="312" height="190" fill="rgba(212,168,83,0.06)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="34" y="102" fill="rgb(212,168,83)" font-size="13" font-weight="bold">① CI 파이프라인 (배포 전)</text>
  <rect x="34" y="114" width="130" height="36" fill="rgb(30,30,30)" stroke="rgb(60,55,50)"/>
  <text x="99" y="136" fill="#e8e4df" font-size="10" text-anchor="middle">현재 스키마</text>
  <text x="170" y="135" fill="rgb(138,133,128)" font-size="14">vs</text>
  <rect x="192" y="114" width="130" height="36" fill="rgb(30,30,30)" stroke="rgb(60,55,50)"/>
  <text x="257" y="130" fill="#e8e4df" font-size="10" text-anchor="middle">이전 버전</text>
  <text x="257" y="144" fill="rgb(138,133,128)" font-size="8" text-anchor="middle">(main·레지스트리)</text>
  <text x="34" y="172" fill="#9cc3df" font-size="10.5">Buf(.proto) · avro-tools(Avro) 로 호환 검사</text>
  <rect x="34" y="182" width="288" height="24" fill="rgba(102,187,106,0.1)" stroke="#66bb6a"/>
  <text x="44" y="198" fill="#66bb6a" font-size="10">optional 추가 → 통과</text>
  <rect x="34" y="210" width="288" height="24" fill="rgba(244,127,114,0.1)" stroke="#f47f72"/>
  <text x="44" y="226" fill="#f47f72" font-size="10">이름 변경·제거·타입 변경 → 잡 실패(일찍 알림)</text>
  <text x="34" y="254" fill="rgb(138,133,128)" font-size="9.5">목표: 후방·전방 호환 강제</text>

  <!-- 런타임 -->
  <rect x="348" y="80" width="312" height="190" fill="rgba(127,168,201,0.06)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="362" y="102" fill="#9cc3df" font-size="13" font-weight="bold">② 런타임 (선택)</text>
  <rect x="402" y="120" width="204" height="40" fill="rgba(127,168,201,0.12)" stroke="#7fa8c9"/>
  <text x="504" y="138" fill="#9cc3df" font-size="11" font-weight="bold" text-anchor="middle">중앙 스키마 레지스트리</text>
  <text x="504" y="154" fill="rgb(138,133,128)" font-size="8.5" text-anchor="middle">Confluent Schema Registry</text>
  <text x="362" y="184" fill="#e8e4df" font-size="10.5">발행/소비 때마다 각 메시지 검증</text>
  <text x="362" y="206" fill="#e8e4df" font-size="10.5">버전 어긋남 직렬화 문제를 잡음</text>
  <text x="362" y="228" fill="rgb(138,133,128)" font-size="9.5">비용: 약간의 지연·복잡도</text>
  <text x="362" y="254" fill="rgb(138,133,128)" font-size="9.5">검사 도구: protoc · grpcurl · jq</text>

  <!-- 하단 -->
  <rect x="20" y="288" width="640" height="38" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="34" y="312" fill="#e8e4df" font-size="11">두 경우 모두 서비스 간 계약 강제 → 진화하면서도 예측 가능한 통신 보장 (크래시 방지 그 이상)</text>
</svg>
