<svg viewBox="0 0 680 400" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>criteria query의 cross join — from() 두 번 호출이 product와 자기 자신을 cross join, 수정 전후 (원문 Figure 6.17·6.18 개념도)</title>
  <desc>원문 Figure 6.17 과 6.18 의 개념을 도식으로 옮긴 것입니다. da-ch6-ex4 의 criteria query 는 CriteriaQuery 의 from 메서드를 두 번 호출합니다. 첫 호출로 product Root 를 만들고, where 조건을 만들 때 다시 from 을 불러 product 테이블을 또 추가합니다. 그 결과 프로파일러가 가로챈 SQL 에는 product 테이블과 자기 자신 사이의 불필요한 cross join 이 들어갑니다. 레코드가 10개뿐이면 티가 안 나지만 실제 앱에서는 큰 지연과 중복 행을 만듭니다. 수정은 두 번째 from 대신 이미 만든 product Root 를 재사용하는 것이며, 그러면 cross join 이 사라집니다. 다만 같은 쿼리를 여러 번 실행하는 문제는 그대로 남아 알고리즘을 한 쿼리로 리팩토링해야 합니다.</desc>
  <rect x="0" y="0" width="680" height="400" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="16" font-weight="bold">criteria query 의 cross join — 수정 전후</text>
  <text x="20" y="55" fill="rgb(138,133,128)" font-size="11">원문 Figure 6.17·6.18 개념도 — from() 호출 횟수가 결과 SQL 을 가른다 (da-ch6-ex4)</text>

  <!-- 수정 전 -->
  <rect x="20" y="78" width="312" height="290" fill="rgba(244,127,114,0.06)" stroke="#f47f72" stroke-width="2"/>
  <text x="34" y="100" fill="#f47f72" font-size="13" font-weight="bold">수정 전 — from() 두 번 (listing 6.7)</text>

  <rect x="34" y="112" width="284" height="64" fill="rgb(20,20,20)" stroke="rgb(60,55,50)"/>
  <text x="46" y="132" fill="#e8e4df" font-size="9.5" font-family="monospace">Root&lt;Product&gt; product = cq.from(Product.class);</text>
  <text x="46" y="150" fill="#f47f72" font-size="9.5" font-family="monospace">cb.equal(cq.from(Product.class)</text>
  <text x="46" y="166" fill="#f47f72" font-size="9.5" font-family="monospace">  .get("id"), id);  ← from() 또 호출</text>

  <text x="34" y="202" fill="#e8e4df" font-size="11" font-weight="bold">결과 SQL (가로챈 것)</text>
  <rect x="34" y="212" width="284" height="50" fill="rgba(244,127,114,0.10)" stroke="#f47f72"/>
  <text x="46" y="232" fill="#f47f72" font-size="10" font-family="monospace">product CROSS JOIN product</text>
  <text x="46" y="250" fill="rgb(138,133,128)" font-size="9">product 와 자기 자신을 곱집합</text>

  <rect x="34" y="276" width="284" height="78" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="46" y="296" fill="#e8e4df" font-size="10" font-weight="bold">영향</text>
  <text x="46" y="316" fill="rgb(138,133,128)" font-size="9.5">레코드 10개면 티 안 남</text>
  <text x="46" y="333" fill="#f47f72" font-size="9.5">실제 앱: 큰 지연 + 중복 행(잘못된 출력)</text>
  <text x="46" y="349" fill="rgb(138,133,128)" font-size="9">VisualVM 으로 쿼리 읽기만 해도 짚임</text>

  <!-- 화살표 -->
  <text x="346" y="225" fill="rgb(212,168,83)" font-size="22" text-anchor="middle">→</text>

  <!-- 수정 후 -->
  <rect x="360" y="78" width="300" height="290" fill="rgba(102,187,106,0.06)" stroke="#66bb6a" stroke-width="2"/>
  <text x="374" y="100" fill="#66bb6a" font-size="13" font-weight="bold">수정 후 — Root 재사용 (listing 6.8)</text>

  <rect x="374" y="112" width="272" height="64" fill="rgb(20,20,20)" stroke="rgb(60,55,50)"/>
  <text x="386" y="132" fill="#e8e4df" font-size="9.5" font-family="monospace">Root&lt;Product&gt; product = cq.from(...);</text>
  <text x="386" y="150" fill="#66bb6a" font-size="9.5" font-family="monospace">cb.equal(product.get("id"), id);</text>
  <text x="386" y="166" fill="#66bb6a" font-size="9.5" font-family="monospace">  ← 이미 만든 Root 재사용</text>

  <text x="374" y="202" fill="#e8e4df" font-size="11" font-weight="bold">결과 SQL</text>
  <rect x="374" y="212" width="272" height="50" fill="rgba(102,187,106,0.10)" stroke="#66bb6a"/>
  <text x="386" y="232" fill="#66bb6a" font-size="10" font-family="monospace">from product where id = ?</text>
  <text x="386" y="250" fill="rgb(138,133,128)" font-size="9">cross join 사라짐</text>

  <rect x="374" y="276" width="272" height="78" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="386" y="296" fill="rgb(212,168,83)" font-size="10" font-weight="bold">그래도 남는 문제 (별건)</text>
  <text x="386" y="316" fill="#e8e4df" font-size="9.5">같은 쿼리를 여러 번 실행 → 최적 아님</text>
  <text x="386" y="333" fill="#e8e4df" font-size="9.5">알고리즘을 한 쿼리로 리팩토링 필요</text>
  <text x="386" y="349" fill="rgb(138,133,128)" font-size="9">(listing 6.3 와 같은 방향)</text>
</svg>
