<svg viewBox="0 0 680 600" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>VisualVM 설치와 CPU·스레드 관찰 (Ch.5 §5.2.1~§5.2.2)</title>
  <desc>VisualVM 설치는 OS 별 배포본을 받아 etc visualvm.config 의 visualvm_jdkhome 에 JDK 경로를 지정하고 샵 주석을 푸는 것입니다. Java 8 이상에서 돌고 bin 의 실행 파일로 켭니다. 로컬 프로세스에 못 붙으면 앱 시작 시 VM 인자 minus D java.rmi.server.hostname=localhost 를 더하고 그래도 안 되면 JVM 배포판이 지원 목록에 드는지 확인합니다. producer-consumer 예제 da-ch5-ex1 은 두 producer 가 리스트에 값을 넣고 두 consumer 가 빼는데 ArrayList 가 동시성 컬렉션이 아니라 동기화 없이 동시 접근하면 race condition 에 빠집니다. 비정상 앱 진단은 세 신호로 합니다. CPU 약 50 퍼센트로 살아는 있는데 GC 가 0 퍼센트로 메모리 정리도 안 하고 메모리가 거의 0 으로 아무것도 안 담으면 자원은 태우면서 일은 안 하는 좀비 스레드 신호입니다. Threads 탭은 스레드와 상태를 보여 주고 일부는 ArrayIndexOutOfBounds 예외로 사망할 수 있습니다. da-ch5-ex2 는 list 인스턴스를 모니터로 삼아 synchronized 블록으로 접근을 동기화해 race condition 을 없앴고 정상 앱은 CPU 가 낮고 메모리를 일부 쓰며 GC 활동 곧 valleys 가 보입니다. 다만 while 조건은 블록 밖이라 여전히 동시처럼 보일 수 있습니다.</desc>
  <rect x="0" y="0" width="680" height="600" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">VisualVM 설치와 CPU·스레드 관찰</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">Monitor·Threads 탭으로 정상 vs 동시성 문제 앱 가려내기 (Ch.5 §5.2)</text>

  <!-- 설치 3스텝 -->
  <text x="20" y="84" fill="#e8e4df" font-size="13" font-weight="bold">① 설치·설정 (JDK 경로 한 줄)</text>
  <rect x="20" y="94" width="210" height="66" fill="rgba(102,187,106,0.09)" stroke="#66bb6a" stroke-width="2"/>
  <text x="38" y="116" fill="#66bb6a" font-size="12" font-weight="bold">1. JDK 경로</text>
  <text x="38" y="135" fill="#e8e4df" font-size="10">etc/visualvm.config</text>
  <text x="38" y="151" fill="rgb(138,133,128)" font-size="10">visualvm_jdkhome + 주석 풀기</text>

  <rect x="236" y="94" width="210" height="66" fill="rgba(127,168,201,0.10)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="254" y="116" fill="#9cc3df" font-size="12" font-weight="bold">2. 실행</text>
  <text x="254" y="135" fill="#e8e4df" font-size="10">bin 의 실행 파일 (Java 8+)</text>
  <text x="254" y="151" fill="rgb(138,133,128)" font-size="10">왼쪽에 프로세스 목록</text>

  <rect x="452" y="94" width="208" height="66" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="470" y="116" fill="rgb(212,168,83)" font-size="12" font-weight="bold">3. 연결 안 되면</text>
  <text x="470" y="135" fill="#e8e4df" font-size="9">-Djava.rmi.server</text>
  <text x="470" y="148" fill="#e8e4df" font-size="9">.hostname=localhost</text>
  <text x="470" y="156" fill="rgb(138,133,128)" font-size="8">+ 지원 JVM 확인</text>

  <!-- 예제 -->
  <rect x="20" y="172" width="640" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="192" fill="#e8e4df" font-size="12" font-weight="bold">예제 — producer-consumer (2 producer + 2 consumer, 공유 ArrayList)</text>
  <text x="38" y="206" fill="#f47f72" font-size="10">ArrayList 는 동시성 컬렉션 아님 → 동기화 없으면 race condition</text>

  <!-- 비정상 vs 정상 -->
  <text x="20" y="240" fill="#e8e4df" font-size="13" font-weight="bold">② 비정상 vs 정상 — VisualVM 신호 대비</text>

  <!-- 비정상 -->
  <rect x="20" y="252" width="312" height="200" fill="rgba(244,127,114,0.07)" stroke="#f47f72" stroke-width="2"/>
  <text x="38" y="274" fill="#f47f72" font-size="12" font-weight="bold">비정상 — da-ch5-ex1 (동기화 없음)</text>
  <rect x="38" y="284" width="276" height="30" fill="rgba(244,127,114,0.12)" stroke="#f47f72"/>
  <text x="50" y="304" fill="#e8e4df" font-size="11">CPU 약 50% — 살아만 있음</text>
  <rect x="38" y="318" width="276" height="30" fill="rgba(244,127,114,0.12)" stroke="#f47f72"/>
  <text x="50" y="338" fill="#e8e4df" font-size="11">GC 0% — 메모리 정리 안 함</text>
  <rect x="38" y="352" width="276" height="30" fill="rgba(244,127,114,0.12)" stroke="#f47f72"/>
  <text x="50" y="372" fill="#e8e4df" font-size="11">메모리 거의 0 — 안 담음</text>
  <text x="38" y="404" fill="rgb(212,168,83)" font-size="11" font-weight="bold">→ 좀비 스레드 신호</text>
  <text x="38" y="422" fill="rgb(138,133,128)" font-size="10">자원은 태우면서 일은 안 함</text>
  <text x="38" y="440" fill="rgb(138,133,128)" font-size="10">일부 스레드 예외 사망 · 콘솔 곧 멈춤</text>

  <!-- 정상 -->
  <rect x="344" y="252" width="316" height="200" fill="rgba(102,187,106,0.08)" stroke="#66bb6a" stroke-width="2"/>
  <text x="362" y="274" fill="#66bb6a" font-size="12" font-weight="bold">정상 — da-ch5-ex2 (synchronized)</text>
  <rect x="362" y="284" width="280" height="30" fill="rgba(102,187,106,0.12)" stroke="#66bb6a"/>
  <text x="374" y="304" fill="#e8e4df" font-size="11">CPU 더 낮음</text>
  <rect x="362" y="318" width="280" height="30" fill="rgba(102,187,106,0.12)" stroke="#66bb6a"/>
  <text x="374" y="338" fill="#e8e4df" font-size="11">GC 활동 있음 (valleys)</text>
  <rect x="362" y="352" width="280" height="30" fill="rgba(102,187,106,0.12)" stroke="#66bb6a"/>
  <text x="374" y="372" fill="#e8e4df" font-size="11">메모리 일부 사용</text>
  <text x="362" y="404" fill="#9cc3df" font-size="11" font-weight="bold">list 모니터로 접근 직렬화</text>
  <text x="362" y="422" fill="rgb(138,133,128)" font-size="10">모니터가 한 번에 한 스레드만 통과</text>
  <text x="362" y="440" fill="rgb(138,133,128)" font-size="10">콘솔 로그 계속 출력</text>

  <!-- 진단 3단계 + Note -->
  <rect x="20" y="464" width="640" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="484" fill="#e8e4df" font-size="11" font-weight="bold">진단 3단계</text>
  <text x="120" y="484" fill="rgb(138,133,128)" font-size="10">① CPU 사용률 → ② 메모리 사용량 → ③ Threads 탭 시각 조사</text>
  <text x="38" y="498" fill="rgb(138,133,128)" font-size="9">정확한 원인은 스레드 덤프(8장) — 이 편은 리소스 소비 문제 발견에 집중</text>

  <rect x="20" y="516" width="640" height="64" fill="rgba(212,168,83,0.08)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="38" y="538" fill="rgb(212,168,83)" font-size="12" font-weight="bold">Note — synchronized 로도 while 조건은 블록 밖</text>
  <text x="38" y="558" fill="rgb(138,133,128)" font-size="10">동기화 블록을 더해도 while 조건 같은 코드는 여전히 블록 밖에 있어,</text>
  <text x="38" y="574" fill="rgb(138,133,128)" font-size="10">스레드가 여전히 동시에 도는 것처럼 보일 수 있음</text>
</svg>
