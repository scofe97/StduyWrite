<svg viewBox="0 0 680 600" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>메모리 누수와 metaspace, AI 활용 (Ch.5 §5.2.3~§5.3)</title>
  <desc>메모리 누수는 더는 필요 없는 객체의 참조를 앱이 계속 붙들어 GC 가 치우지 못하는 상태이고 데이터가 쌓여 힙이 가득 차면 OutOfMemoryError 로 죽습니다. 메모리 그래프 읽는 법은 정상과 누수가 다릅니다. 정상 앱은 할당으로 차오르는 peaks 와 GC 가 비우는 valleys 가 번갈아 나오는 톱니이고 누수 앱은 GC 가 충분히 못 비워 계속 차올라 끝내 OOM 에 닿습니다. OOM 스택 위치는 근본 원인이 아닙니다. 힙은 하나라 문제를 일으킨 스레드가 아니라 마지막에 메모리를 쓰려던 스레드가 에러를 받을 수 있어 근본 원인은 힙 덤프 곧 10장으로 짚습니다. 임시방편과 근본해결을 구분합니다. minus Xmx 로 힙을 키우면 시간을 벌 뿐 누수가 남으면 다시 차고 근본해결은 안 쓰는 참조를 없애는 것입니다. metaspace 는 JVM 이 클래스 메타데이터를 담는 힙과 별개 영역이고 reflection 과 동적 프록시에 기대는 프레임워크를 오용하면 예를 들어 Hibernate 로 레코드를 대량 로드하면 여기서도 OOM 이 나며 minus minus colon MaxMetaspaceSize 도 임시방편입니다. AI 는 위젯 스크린샷을 받아 다음 단계와 원인 단서를 제안하지만 컨텍스트가 부족해 늘 정확하진 않으므로 아이디어 생성과 결론 보강용으로만 쓰고 독립적으로 검증합니다.</desc>
  <rect x="0" y="0" width="680" height="600" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">메모리 누수와 metaspace</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">참조를 못 버리면 GC 가 무력 — 그래프가 톱니인지 계속 차오르는지로 가른다 (Ch.5 §5.2.3)</text>

  <!-- 누수 정의 -->
  <text x="20" y="84" fill="#e8e4df" font-size="13" font-weight="bold">① 메모리 누수 — 안 쓰는 참조를 못 버림</text>
  <rect x="20" y="94" width="640" height="44" fill="rgba(244,127,114,0.07)" stroke="#f47f72" stroke-width="2"/>
  <text x="38" y="116" fill="#e8e4df" font-size="11">객체가 필요 없어졌는데 참조 잔존 → GC 회수 불가 → 데이터 누적</text>
  <text x="38" y="132" fill="#f47f72" font-size="11">→ 힙 가득 차면 OutOfMemoryError 로 죽음 (listing 5.7: Cat 무한 add)</text>

  <!-- 그래프 비교 -->
  <text x="20" y="162" fill="#e8e4df" font-size="13" font-weight="bold">② 메모리 그래프 — 정상 vs 누수</text>
  <rect x="20" y="172" width="312" height="120" fill="rgba(102,187,106,0.08)" stroke="#66bb6a" stroke-width="2"/>
  <text x="38" y="192" fill="#66bb6a" font-size="12" font-weight="bold">정상 — 톱니 (peaks/valleys)</text>
  <polyline points="38,270 70,238 70,258 102,226 102,250 134,218 134,244 166,212 166,240 198,210 230,236 262,214 294,240 314,222" fill="none" stroke="#66bb6a" stroke-width="2"/>
  <text x="38" y="286" fill="rgb(138,133,128)" font-size="9">할당(peaks) ↔ GC 회수(valleys) 반복</text>

  <rect x="344" y="172" width="316" height="120" fill="rgba(244,127,114,0.07)" stroke="#f47f72" stroke-width="2"/>
  <text x="362" y="192" fill="#f47f72" font-size="12" font-weight="bold">누수 — 계속 차오름 → OOM</text>
  <polyline points="362,278 400,268 400,272 440,256 440,260 480,242 480,246 520,224 520,228 560,206 560,210 600,190 640,184" fill="none" stroke="#f47f72" stroke-width="2"/>
  <line x1="362" y1="200" x2="640" y2="200" stroke="rgb(212,168,83)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="568" y="214" fill="rgb(212,168,83)" font-size="9">OOM 한계</text>

  <!-- OOM 위치 -->
  <rect x="20" y="304" width="640" height="44" fill="rgba(212,168,83,0.08)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="38" y="326" fill="rgb(212,168,83)" font-size="12" font-weight="bold">OOM 스택 위치 ≠ 근본 원인</text>
  <text x="38" y="342" fill="rgb(138,133,128)" font-size="10">힙은 하나 → 마지막에 메모리 쓰려던 스레드가 에러 받음 → 근본 원인은 힙 덤프(10장)</text>

  <!-- 임시방편 vs 근본 -->
  <text x="20" y="372" fill="#e8e4df" font-size="13" font-weight="bold">③ 임시방편 vs 근본해결</text>
  <rect x="20" y="382" width="312" height="80" fill="rgba(127,168,201,0.10)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="38" y="404" fill="#9cc3df" font-size="12" font-weight="bold">임시방편 — 시간 벌기</text>
  <text x="38" y="424" fill="#e8e4df" font-size="10">-Xmx (최대 힙) · -Xms (최소 힙)</text>
  <text x="38" y="442" fill="#e8e4df" font-size="10">-XX:MaxMetaspaceSize</text>
  <text x="38" y="458" fill="#f47f72" font-size="9">누수 남으면 다시 참</text>

  <rect x="344" y="382" width="316" height="80" fill="rgba(102,187,106,0.08)" stroke="#66bb6a" stroke-width="2"/>
  <text x="362" y="404" fill="#66bb6a" font-size="12" font-weight="bold">근본해결</text>
  <text x="362" y="424" fill="#e8e4df" font-size="10">안 쓰는 참조 제거 → GC 가 회수</text>
  <text x="362" y="442" fill="#e8e4df" font-size="10">대량 로드는 리팩토링 (한 번에 적게)</text>
  <text x="362" y="458" fill="rgb(138,133,128)" font-size="9">필요 시 대안 영속화 기술</text>

  <!-- metaspace -->
  <rect x="20" y="474" width="640" height="62" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="496" fill="#e8e4df" font-size="12" font-weight="bold">④ metaspace — 클래스 메타데이터 영역 (힙과 별개)</text>
  <text x="38" y="516" fill="rgb(138,133,128)" font-size="10">Metaspace 탭에서 관찰 · reflection/동적 프록시 프레임워크 오용 시 넘침</text>
  <text x="38" y="532" fill="rgb(212,168,83)" font-size="10">사례 — Hibernate 로 레코드 대량 로드 (버그 아닌 오용 → JDBC 권장)</text>

  <!-- AI -->
  <rect x="20" y="548" width="640" height="44" fill="rgba(212,168,83,0.08)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="38" y="570" fill="rgb(212,168,83)" font-size="12" font-weight="bold">⑤ AI 활용 (§5.3)</text>
  <text x="38" y="586" fill="rgb(138,133,128)" font-size="10">위젯 스크린샷 → 다음 단계·원인 단서. 컨텍스트 부족 가능 → 아이디어·보강용, 독립 검증 필수</text>
</svg>
