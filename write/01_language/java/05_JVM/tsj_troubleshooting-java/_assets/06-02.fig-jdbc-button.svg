<svg viewBox="0 0 680 320" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Profiler 탭에서 CPU 대신 JDBC 버튼 선택 (원문 Figure 6.12 개념도)</title>
  <desc>원문 Figure 6.12 의 개념을 도식으로 옮긴 것입니다. VisualVM Profiler 탭에서 CPU 버튼은 메서드별 실행과 호출 횟수를 계측하고, JDBC 버튼은 앱이 DBMS 에 보내는 SQL 쿼리를 가로채 프로파일링합니다. SQL 쿼리를 조사하려면 CPU 대신 JDBC 를 선택합니다. JDBC 프로파일링은 각 쿼리의 텍스트와 실행 횟수, 그리고 그 쿼리를 보낸 코드 지점을 가리키는 스택 트레이스를 함께 보여 줍니다.</desc>
  <rect x="0" y="0" width="680" height="320" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="16" font-weight="bold">CPU 대신 JDBC 버튼 — 무엇을 계측할지 고른다</text>
  <text x="20" y="55" fill="rgb(138,133,128)" font-size="11">원문 Figure 6.12 개념도 — Profiler 탭의 두 모드</text>

  <!-- CPU 버튼 -->
  <rect x="20" y="80" width="312" height="150" fill="rgb(20,20,20)" stroke="rgb(60,55,50)" stroke-width="1.5"/>
  <rect x="34" y="94" width="120" height="34" fill="rgba(127,168,201,0.12)" stroke="#7fa8c9" stroke-width="1.5"/>
  <text x="94" y="116" fill="#9cc3df" font-size="13" font-weight="bold" text-anchor="middle">CPU</text>
  <text x="34" y="156" fill="#e8e4df" font-size="11">메서드별 실행을 계측</text>
  <text x="34" y="178" fill="#e8e4df" font-size="11">+ 호출 횟수 (샘플링이 못 줌)</text>
  <text x="34" y="200" fill="rgb(138,133,128)" font-size="10">패키지 필터로 좁혀서 사용</text>
  <text x="34" y="220" fill="rgb(138,133,128)" font-size="10">→ da-ch6-ex1 의 5초 메서드 1회</text>

  <!-- JDBC 버튼 -->
  <rect x="348" y="80" width="312" height="150" fill="rgba(212,168,83,0.06)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <rect x="362" y="94" width="120" height="34" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="422" y="116" fill="rgb(212,168,83)" font-size="13" font-weight="bold" text-anchor="middle">JDBC</text>
  <text x="362" y="156" fill="#e8e4df" font-size="11">DBMS 로 가는 SQL 쿼리 가로채기</text>
  <text x="362" y="178" fill="#e8e4df" font-size="11">+ 쿼리 텍스트 · 실행 횟수</text>
  <text x="362" y="200" fill="#e8e4df" font-size="11">+ 쿼리별 스택 트레이스</text>
  <text x="362" y="220" fill="rgb(138,133,128)" font-size="10">→ da-ch6-ex2 첫 쿼리 10회</text>

  <!-- 하단 안내 -->
  <rect x="20" y="244" width="640" height="60" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="34" y="266" fill="#e8e4df" font-size="11" font-weight="bold">선택 기준</text>
  <text x="34" y="288" fill="rgb(138,133,128)" font-size="10.5">메서드 동작·호출 횟수를 볼 땐 CPU, DB 와의 통신(SQL)을 볼 땐 JDBC. 실제 조사는 늘 샘플링부터 시작한다.</text>
</svg>
