<svg viewBox="0 0 680 340" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>JDBC 가로채기 — 앱이 JDBC 드라이버로 DBMS에 보내는 쿼리를 프로파일러가 직전에 복사 (원문 Figure 6.13 개념도)</title>
  <desc>원문 Figure 6.13 의 개념을 도식으로 옮긴 것입니다. Java 앱에서 관계형 DBMS 와의 통신은 JDBC 드라이버를 통해 이뤄집니다. 프로파일러는 JDBC 드라이버의 메서드 호출을 포함한 모든 호출을 가로챌 수 있어, 앱이 DBMS 에 보내는 SQL 쿼리를 드라이버가 보내기 직전에 복사합니다. 그 결과 쿼리를 그대로 DB 클라이언트에 붙여 넣어 실행하거나 실행 계획을 조사할 수 있고, 쿼리가 몇 번 보내졌는지도 알 수 있습니다. da-ch6-ex2 에서는 첫 쿼리가 10번 보내졌습니다.</desc>
  <rect x="0" y="0" width="680" height="340" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="16" font-weight="bold">프로파일러가 JDBC 드라이버를 가로챈다</text>
  <text x="20" y="55" fill="rgb(138,133,128)" font-size="11">원문 Figure 6.13 개념도 — 쿼리는 드라이버가 보내기 직전에 복사된다</text>

  <!-- 앱 -->
  <rect x="20" y="110" width="150" height="70" fill="rgba(127,168,201,0.10)" stroke="#7fa8c9" stroke-width="1.5"/>
  <text x="95" y="140" fill="#9cc3df" font-size="12" font-weight="bold" text-anchor="middle">Java 앱</text>
  <text x="95" y="162" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">SQL 쿼리 생성</text>

  <!-- 화살표 1 -->
  <line x1="170" y1="145" x2="258" y2="145" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <polygon points="258,145 250,141 250,149" fill="rgb(212,168,83)"/>
  <text x="214" y="136" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">SQL 전달</text>

  <!-- JDBC 드라이버 -->
  <rect x="260" y="110" width="160" height="70" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="340" y="140" fill="rgb(212,168,83)" font-size="12" font-weight="bold" text-anchor="middle">JDBC 드라이버</text>
  <text x="340" y="162" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">DBMS 와의 통신 통로</text>

  <!-- 화살표 2 -->
  <line x1="420" y1="145" x2="508" y2="145" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <polygon points="508,145 500,141 500,149" fill="rgb(212,168,83)"/>
  <text x="464" y="136" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">전송</text>

  <!-- DBMS -->
  <rect x="510" y="110" width="150" height="70" fill="rgba(127,168,201,0.10)" stroke="#7fa8c9" stroke-width="1.5"/>
  <text x="585" y="140" fill="#9cc3df" font-size="12" font-weight="bold" text-anchor="middle">DBMS</text>
  <text x="585" y="162" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">관계형 DB</text>

  <!-- 프로파일러 가로채기 -->
  <line x1="340" y1="110" x2="340" y2="76" stroke="#f47f72" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="340,110 336,102 344,102" fill="#f47f72"/>
  <rect x="220" y="44" width="240" height="32" fill="rgba(244,127,114,0.10)" stroke="#f47f72" stroke-width="1.5"/>
  <text x="340" y="65" fill="#f47f72" font-size="11" font-weight="bold" text-anchor="middle">프로파일러 — 보내기 직전 쿼리 복사</text>

  <!-- 결과 -->
  <rect x="20" y="208" width="640" height="112" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="34" y="230" fill="#e8e4df" font-size="12" font-weight="bold">가로챈 쿼리로 얻는 것</text>
  <text x="34" y="254" fill="#e8e4df" font-size="11">• 쿼리 텍스트를 그대로 복붙 → DB 클라이언트에서 실행·실행 계획 조사</text>
  <text x="34" y="276" fill="#e8e4df" font-size="11">• 쿼리가 몇 번 보내졌는지 → da-ch6-ex2 첫 쿼리 <tspan fill="#f47f72" font-weight="bold">10회</tspan> (반복 = 설계 문제)</text>
  <text x="34" y="298" fill="#e8e4df" font-size="11">• 쿼리별 스택 트레이스 → 그 쿼리를 보낸 앱 코드 첫 메서드를 역추적</text>
  <text x="34" y="315" fill="rgb(138,133,128)" font-size="9.5">native(JdbcTemplate)든 프레임워크 생성이든, 기술과 무관하게 드라이버 직전에서 잡힌다</text>
</svg>
