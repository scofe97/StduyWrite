<svg viewBox="0 0 680 320" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>덤프 분석 워크플로 — raw 토대 위에 fastThread 시각화와 AI 보조를 얹는다 (개념도)</title>
  <desc>이 편의 개념을 도식으로 옮긴 것입니다. 덤프 분석은 세 층으로 볼 수 있습니다. 맨 아래 토대는 raw 평문 덤프를 손으로 읽는 능력으로, 도구가 없거나 환경 밖으로 덤프를 빼낼 수 없을 때도 콘솔만 있으면 됩니다. 그 위에 fastThread 가 덤프 raw 파일을 받아 데드락 감지와 의존성 그래프, 플레임 그래프로 시각화합니다. 가장 위에 AI 비서가 막힌 스레드와 문제 락, 다음 단계를 단서로 제안합니다. 위 두 층은 편의이고 토대는 raw 읽기입니다. 도구가 늘 맞지도 늘 있지도 않으므로 토대를 갖춰 두어야 합니다.</desc>
  <rect x="0" y="0" width="680" height="320" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="16" font-weight="bold">덤프 분석의 세 층 — 토대는 raw 읽기</text>
  <text x="20" y="55" fill="rgb(138,133,128)" font-size="11">개념도 — 위 두 층은 편의, 맨 아래가 토대</text>

  <!-- AI (위) -->
  <rect x="120" y="78" width="440" height="50" fill="rgba(212,168,83,0.1)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="340" y="100" fill="rgb(212,168,83)" font-size="12" font-weight="bold" text-anchor="middle">③ AI 비서 (편의)</text>
  <text x="340" y="119" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">막힌 스레드·문제 락·다음 단계 제안 (단서) · 전용 GPT 더 나음</text>

  <!-- fastThread (중간) -->
  <rect x="90" y="142" width="500" height="50" fill="rgba(127,168,201,0.1)" stroke="#7fa8c9" stroke-width="1.5"/>
  <text x="340" y="164" fill="#9cc3df" font-size="12" font-weight="bold" text-anchor="middle">② fastThread 시각화 (편의)</text>
  <text x="340" y="183" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">데드락 감지·의존성 그래프·스택 트레이스·자원 소비·플레임 그래프</text>

  <!-- raw (토대) -->
  <rect x="40" y="206" width="600" height="62" fill="rgba(244,127,114,0.08)" stroke="#f47f72" stroke-width="2"/>
  <text x="340" y="230" fill="#f47f72" font-size="13" font-weight="bold" text-anchor="middle">① raw 평문 덤프 읽기 (토대 · 08-02)</text>
  <text x="340" y="251" fill="#e8e4df" font-size="10.5" text-anchor="middle">콘솔만 있으면 됨 · 도구가 없거나 덤프를 환경 밖으로 못 빼낼 때도 가능</text>
  <text x="340" y="264" fill="rgb(138,133,128)" font-size="9.5" text-anchor="middle">락 ID 따라가기 → 데드락 3단계 추적</text>

  <!-- 화살표 (아래→위 의존) -->
  <line x1="660" y1="237" x2="660" y2="103" stroke="rgb(60,55,50)" stroke-width="1" stroke-dasharray="3 3"/>

  <text x="20" y="294" fill="rgb(138,133,128)" font-size="10.5">도구가 늘 정확하지도 늘 환경에 있지도 않으므로, 위 편의 층을 얹기 전에 토대(raw 읽기)를 갖춰 둔다.</text>
</svg>
