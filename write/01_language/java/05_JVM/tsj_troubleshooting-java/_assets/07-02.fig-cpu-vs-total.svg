<svg viewBox="0 0 680 300" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>총 CPU 시간 &lt; 총 실행 시간 = 무언가를 기다린다 (원문 Figure 7.5 개념도)</title>
  <desc>원문 Figure 7.5 의 개념을 도식으로 옮긴 것입니다. 앱 실행을 샘플링해 실행 시간을 보면 총 실행 시간이 총 CPU 시간보다 깁니다. 6장에서 본 것과 같은 상황이며, 이렇게 되면 앱이 무언가를 기다린다는 뜻입니다. 우리는 앱이 무엇을 기다리는지, 그 시간을 최적화할 수 있는지 알아내려 합니다.</desc>
  <rect x="0" y="0" width="680" height="300" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="16" font-weight="bold">총 CPU 시간 &lt; 총 실행 시간 → 기다리는 중</text>
  <text x="20" y="55" fill="rgb(138,133,128)" font-size="11">원문 Figure 7.5 개념도 — 샘플링이 보여 주는 첫 단서 (da-ch7-ex1)</text>

  <!-- 총 실행 시간 막대 -->
  <text x="34" y="106" fill="#e8e4df" font-size="11">총 실행 시간</text>
  <rect x="180" y="92" width="460" height="28" fill="rgba(244,127,114,0.18)" stroke="#f47f72" stroke-width="1.5"/>
  <text x="410" y="111" fill="#f47f72" font-size="12" font-weight="bold" text-anchor="middle">길다 (대기 포함)</text>

  <!-- 총 CPU 시간 막대 -->
  <text x="34" y="160" fill="#e8e4df" font-size="11">총 CPU 시간</text>
  <rect x="180" y="146" width="150" height="28" fill="rgba(102,187,106,0.35)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="255" y="165" fill="#e8e4df" font-size="12" font-weight="bold" text-anchor="middle">짧다 (실제 일)</text>

  <!-- 차이 표시 -->
  <line x1="330" y1="134" x2="330" y2="186" stroke="rgb(138,133,128)" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="640" y1="134" x2="640" y2="186" stroke="rgb(138,133,128)" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="485" y="202" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">이 차이 = 기다린 시간</text>

  <!-- 해석 -->
  <rect x="20" y="222" width="640" height="62" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="34" y="244" fill="#e8e4df" font-size="11" font-weight="bold">해석 (6장과 같음)</text>
  <text x="34" y="266" fill="rgb(138,133,128)" font-size="10.5">CPU 시간이 실행 시간보다 짧으면 앱이 무언가를 기다린다 → 무엇을 기다리는지, 줄일 수 있는지 조사</text>
</svg>
