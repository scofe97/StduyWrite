<svg viewBox="0 0 900 620" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>대상이 죽었는가 — 도달성 분석과 참조 4단계 핵심 요약</title>
  <desc>자바는 인용 카운팅 대신 도달성 분석으로 객체의 죽음을 판정한다. GC Root에서 출발해 탐색하는 동안 애플리케이션 스레드는 멈춘다(STW). 도달 가능한 객체는 살고, 도달 불가능한 객체는 회수된다. 살아 있는 정도는 강한·소프트·약한·팬텀 참조 4단계로 세분화되며, finalize는 단 한 번의 부활 기회를 주지만 실무에서 쓰지 않는다.</desc>
  <defs>
    <style>
      .title  { font-size: 17px; font-weight: 800; fill: #e8e4df; }
      .sub    { font-size: 11px; fill: rgb(138,133,128); }
      .hd     { font-size: 12px; font-weight: 800; fill: #e8e4df; }
      .body   { font-size: 10.5px; fill: rgb(180,175,170); }
      .tick   { font-size: 9.5px; fill: rgb(212,168,83); font-weight: 700; }
      .mono   { font-family: 'JetBrains Mono', 'Fira Mono', monospace; font-size: 10px; fill: rgb(212,168,83); }
      .label  { font-size: 10px; font-weight: 700; fill: #e8e4df; }
      .dim    { font-size: 9.5px; fill: rgb(138,133,128); }
    </style>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="rgb(212,168,83)"/>
    </marker>
    <marker id="arr-red" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#e07070"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect x="0" y="0" width="900" height="620" fill="#0d0d0d"/>

  <!-- 타이틀 -->
  <text x="28" y="38" class="title">대상이 죽었는가 — 도달성 분석 · STW · 참조 4단계</text>
  <text x="28" y="56" class="sub">자바의 죽음 판정은 GC Root 도달성 분석 한 갈래로 통일됐다. 탐색 중 스레드는 멈추고(STW), 살아 있는 정도는 4단계로 세분화된다.</text>

  <!-- ══════════════════════════════════════════
       섹션 A: 두 판정 전략 비교
  ══════════════════════════════════════════ -->
  <rect x="28" y="72" width="410" height="148" rx="8" fill="rgba(96,165,224,0.07)" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="44" y="94" class="hd">① 인용 카운팅 — 자바가 버린 이유</text>
  <text x="44" y="112" class="body">객체마다 참조 카운터를 두어 0 되면 즉시 회수</text>
  <text x="44" y="128" class="tick">✓ 즉시 회수 · 판정 비용 O(1)</text>
  <text x="44" y="144" class="tick">✗ 순환 참조 — 외부 참조 끊겨도 카운터 ≥ 1 고착</text>
  <!-- 순환 참조 미니 다이어그램 -->
  <rect x="44" y="154" width="52" height="24" rx="4" fill="rgb(42,32,32)" stroke="#e07070"/>
  <text x="70" y="171" class="label" text-anchor="middle">A</text>
  <rect x="130" y="154" width="52" height="24" rx="4" fill="rgb(42,32,32)" stroke="#e07070"/>
  <text x="156" y="171" class="label" text-anchor="middle">B</text>
  <line x1="96" y1="162" x2="130" y2="162" stroke="#e07070" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <line x1="130" y1="170" x2="96" y2="170" stroke="#e07070" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="200" y="168" class="dim">카운터 1 고착 → 회수 불가</text>

  <rect x="452" y="72" width="420" height="148" rx="8" fill="rgba(102,187,106,0.07)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="468" y="94" class="hd">② 도달성 분석 — 자바의 선택</text>
  <text x="468" y="112" class="body">GC Root 집합에서 출발, 그래프 탐색 → 표시 안 된 객체 회수</text>
  <text x="468" y="128" class="tick">✓ 순환 참조 자연 해결 · 루트와 연결만 보면 됨</text>
  <text x="468" y="144" class="tick">✗ 탐색 중 STW 필수 — 이게 GC 최적화의 핵심 문제</text>
  <!-- STW 강조 박스 -->
  <rect x="468" y="152" width="386" height="56" rx="4" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="1"/>
  <text x="661" y="172" class="hd" text-anchor="middle" fill="rgb(212,168,83)">STW (Stop-The-World)</text>
  <text x="661" y="188" class="body" text-anchor="middle">탐색 중 객체 그래프가 바뀌면 살아 있는 객체를 놓치거나</text>
  <text x="661" y="202" class="body" text-anchor="middle">죽은 객체를 살아 있다고 잘못 판단 → 전 스레드 일시 정지</text>

  <!-- ══════════════════════════════════════════
       섹션 B: GC Root 7종
  ══════════════════════════════════════════ -->
  <rect x="28" y="236" width="844" height="110" rx="8" fill="rgba(180,130,255,0.07)" stroke="#9b7fd4" stroke-width="1.5"/>
  <text x="44" y="258" class="hd">③ GC Root 7종 — 도달성 탐색의 출발점</text>

  <!-- Root 칩 7개 -->
  <rect x="44"  y="268" width="138" height="32" rx="5" fill="rgba(96,165,224,0.15)" stroke="#5b9bd5"/>
  <text x="113" y="289" class="label" text-anchor="middle">스택 지역변수/인자</text>

  <rect x="190" y="268" width="108" height="32" rx="5" fill="rgba(96,165,224,0.15)" stroke="#5b9bd5"/>
  <text x="244" y="289" class="label" text-anchor="middle">클래스 정적변수</text>

  <rect x="306" y="268" width="120" height="32" rx="5" fill="rgba(96,165,224,0.15)" stroke="#5b9bd5"/>
  <text x="366" y="289" class="label" text-anchor="middle">런타임 상수풀 참조</text>

  <rect x="434" y="268" width="88" height="32" rx="5" fill="rgba(96,165,224,0.15)" stroke="#5b9bd5"/>
  <text x="478" y="289" class="label" text-anchor="middle">JNI 참조</text>

  <rect x="530" y="268" width="108" height="32" rx="5" fill="rgba(96,165,224,0.15)" stroke="#5b9bd5"/>
  <text x="584" y="289" class="label" text-anchor="middle">JVM 내부 참조</text>

  <rect x="646" y="268" width="108" height="32" rx="5" fill="rgba(96,165,224,0.15)" stroke="#5b9bd5"/>
  <text x="700" y="289" class="label" text-anchor="middle">동기화 락 객체</text>

  <rect x="762" y="268" width="98" height="32" rx="5" fill="rgba(96,165,224,0.15)" stroke="#5b9bd5"/>
  <text x="811" y="289" class="label" text-anchor="middle">JMX/JVMTI</text>

  <text x="44" y="328" class="tick">핵심: 메서드가 return 하면 스택 프레임 소멸 → 지역변수 참조 끊김 → 객체 GC 대상. 가장 흔한 객체 사망 경로.</text>

  <!-- ══════════════════════════════════════════
       섹션 C: 참조 4단계
  ══════════════════════════════════════════ -->
  <rect x="28" y="362" width="844" height="156" rx="8" fill="rgba(255,200,80,0.05)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="44" y="384" class="hd">④ 참조 4단계 — 살아 있는 정도의 스펙트럼</text>

  <!-- Strong -->
  <rect x="44"  y="394" width="194" height="112" rx="6" fill="rgba(102,187,106,0.12)" stroke="#66bb6a"/>
  <text x="141" y="414" class="hd" text-anchor="middle" fill="#66bb6a">강한 참조</text>
  <text x="141" y="430" class="mono" text-anchor="middle">Foo f = new Foo()</text>
  <text x="141" y="446" class="body" text-anchor="middle">GC가 절대 회수 안 함</text>
  <text x="141" y="462" class="dim" text-anchor="middle">도달 가능하면 살아 있음</text>
  <text x="141" y="494" class="tick" text-anchor="middle">캐시로 쓰면 OOM 위험</text>

  <!-- Soft -->
  <rect x="246" y="394" width="194" height="112" rx="6" fill="rgba(255,230,130,0.12)" stroke="#d4a853"/>
  <text x="343" y="414" class="hd" text-anchor="middle" fill="#d4a853">소프트 참조</text>
  <text x="343" y="430" class="mono" text-anchor="middle">SoftReference&lt;Foo&gt;</text>
  <text x="343" y="446" class="body" text-anchor="middle">메모리 부족 시만 회수</text>
  <text x="343" y="462" class="dim" text-anchor="middle">OOM 직전까지 유지</text>
  <text x="343" y="494" class="tick" text-anchor="middle">캐시에 적합 — 압박 시 비워짐</text>

  <!-- Weak -->
  <rect x="448" y="394" width="194" height="112" rx="6" fill="rgba(255,160,80,0.12)" stroke="#d47a40"/>
  <text x="545" y="414" class="hd" text-anchor="middle" fill="#d47a40">약한 참조</text>
  <text x="545" y="430" class="mono" text-anchor="middle">WeakReference&lt;Foo&gt;</text>
  <text x="545" y="446" class="body" text-anchor="middle">다음 GC 때마다 회수</text>
  <text x="545" y="462" class="dim" text-anchor="middle">키 수명 = 매핑 수명</text>
  <text x="545" y="494" class="tick" text-anchor="middle">WeakHashMap · Spring 내부 캐시</text>

  <!-- Phantom -->
  <rect x="650" y="394" width="210" height="112" rx="6" fill="rgba(220,100,100,0.12)" stroke="#d47070"/>
  <text x="755" y="414" class="hd" text-anchor="middle" fill="#d47070">팬텀 참조</text>
  <text x="755" y="430" class="mono" text-anchor="middle">PhantomReference&lt;Foo&gt;</text>
  <text x="755" y="446" class="body" text-anchor="middle">회수 직전 큐로 통지</text>
  <text x="755" y="462" class="dim" text-anchor="middle">get() 은 항상 null</text>
  <text x="755" y="494" class="tick" text-anchor="middle">finalize 대체 · Cleaner</text>

  <!-- 강도 화살표 -->
  <line x1="238" y1="450" x2="246" y2="450" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="450" x2="448" y2="450" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="642" y1="450" x2="650" y2="450" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════
       섹션 D: finalize + 결론
  ══════════════════════════════════════════ -->
  <rect x="28" y="534" width="410" height="72" rx="8" fill="rgba(220,100,100,0.07)" stroke="#d47070" stroke-width="1.5"/>
  <text x="44" y="554" class="hd">⑤ finalize() — 단 한 번의 부활, 실무 금지</text>
  <text x="44" y="570" class="body">회수 대상 → F-Queue → Finalizer 스레드 실행 → 2차 도달성 검사</text>
  <text x="44" y="586" class="tick">한 번만 · 실행 시점 불확정 · 예외 묻힘 → try-with-resources / Cleaner 로 대체</text>
  <text x="44" y="600" class="dim">Java 9 deprecated · JDK 18 제거 예정</text>

  <rect x="452" y="534" width="420" height="72" rx="8" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="662" y="554" class="hd" text-anchor="middle">핵심 한 줄</text>
  <text x="662" y="572" class="body" text-anchor="middle">자바의 죽음 판정 = 도달성 분석 (GC Root 탐색)</text>
  <text x="662" y="588" class="tick" text-anchor="middle">STW 를 줄이는 것이 ZGC·Shenandoah 의 존재 이유</text>
  <text x="662" y="604" class="dim" text-anchor="middle">참조 4단계는 살아 있는 정도를 캐시 정책으로 표현한 도구</text>
</svg>
