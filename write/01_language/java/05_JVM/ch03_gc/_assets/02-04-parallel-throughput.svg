<svg viewBox="0 0 900 560" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>Parallel ScavengeмҷҖ Parallel Old вҖ” throughput мҡ°м„ мңјлЎң Youngкіј OldлҘј лӘЁл‘җ лі‘л ¬нҷ”</title>
  <desc>Parallel ScavengeлҠ” мӢ м„ёлҢҖ л§ҲнҒ¬-м№ҙн”јлҘј лі‘л ¬нҷ”н•ҳкі , Parallel OldлҠ” кө¬м„ёлҢҖ л§ҲнҒ¬-м»ҙнҢ©нҠёлҘј лі‘л ¬нҷ”н•ңлӢӨ. лӘ©н‘ңлҠ” н•ң лІҲмқҳ мқјмӢң м •м§Җ мөңмҶҢнҷ”к°Җ м•„лӢҲлқј м „мІҙ мӢӨн–ү мӢңк°„ мӨ‘ GC мӢңк°„ л№„мңЁмқ„ лӮ®м¶”кі  мІҳлҰ¬лҹүмқ„ лҶ’мқҙлҠ” кІғмқҙлӢӨ.</desc>
  <defs><style>.title{font-size:17px;font-weight:800;fill:#e8e4df}.sub{font-size:11px;fill:rgb(138,133,128)}.head{font-size:13px;font-weight:800;fill:rgb(212,168,83)}.label{font-size:11px;font-weight:750;fill:#e8e4df}.body{font-size:10px;fill:rgb(180,175,170)}.note{font-size:9.5px;fill:rgb(138,133,128)}.code{font-size:10px;font-weight:700;fill:rgb(212,168,83);font-family:'JetBrains Mono',monospace}.ok{font-size:10px;font-weight:750;fill:#81c784}.bad{font-size:10px;font-weight:750;fill:#e57373}</style><marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="rgb(212,168,83)"/></marker></defs>
  <rect x="0" y="0" width="900" height="560" fill="#0d0d0d"/>
  <text x="26" y="36" class="title">Parallel Scavenge / Parallel Old вҖ” throughput мҡ°м„  мЎ°н•©</text>
  <text x="26" y="55" class="sub">pause н•ҳлӮҳлҘј к°ҖмһҘ м§§кІҢ л§Ңл“ңлҠ” кІғліҙлӢӨ, м „мІҙ мӢңк°„ мӨ‘ GC л№„мңЁмқ„ лӮ®м¶° м• н”ҢлҰ¬мјҖмқҙм…ҳ мІҳлҰ¬лҹүмқ„ лҶ’мқҙлҠ” кІғмқҙ лӘ©н‘ңлӢӨ</text>
  <rect x="24" y="84" width="852" height="170" rx="8" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="46" y="112" class="head">в‘  Youngкіј OldлҘј лӘЁл‘җ лі‘л ¬нҷ”</text>
  <rect x="58" y="142" width="230" height="64" rx="6" fill="#1e3a4a" stroke="#4a8ab0"/><text x="173" y="166" class="label" text-anchor="middle">Parallel Scavenge</text><text x="173" y="185" class="body" text-anchor="middle">Young В· лі‘л ¬ л§ҲнҒ¬-м№ҙн”ј</text>
  <line x1="288" y1="174" x2="348" y2="174" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="350" y="142" width="230" height="64" rx="6" fill="#2a2a1a" stroke="rgb(212,168,83)"/><text x="465" y="166" class="label" text-anchor="middle">Parallel Old</text><text x="465" y="185" class="body" text-anchor="middle">Old В· лі‘л ¬ л§ҲнҒ¬-м»ҙнҢ©нҠё</text>
  <line x1="580" y1="174" x2="640" y2="174" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="642" y="142" width="180" height="64" rx="6" fill="#1e2a1e" stroke="#4ab080"/><text x="732" y="166" class="ok" text-anchor="middle">throughput нҷ•ліҙ</text><text x="732" y="185" class="body" text-anchor="middle">мҙқ GC мӢңк°„ л№„мңЁмқ„ лӮ®м¶Ө</text>
  <rect x="24" y="284" width="408" height="150" rx="8" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="46" y="312" class="head">в‘Ў лӘ©н‘ң н•ЁмҲҳ</text>
  <text x="58" y="344" class="code">-XX:GCTimeRatio=99</text><text x="220" y="344" class="body">GC мӢңк°„мқ„ м „мІҙмқҳ м•Ҫ 1% мқҙн•ҳлЎң мң лҸ„</text>
  <text x="58" y="374" class="code">UseAdaptiveSizePolicy</text><text x="220" y="374" class="body">Eden/Survivor нҒ¬кё°мҷҖ л№„мңЁ мһҗлҸҷ мЎ°м •</text>
  <text x="58" y="404" class="note">GC л№ҲлҸ„л§Ң мӨ„мқҙлҠ” кІғмқҙ м•„лӢҲлқј, мҙқ мӢӨн–ү мӢңк°„ лҢҖл№„ GC л№„мҡ©мқ„ лӮ®м¶”лҠ” мІ н•ҷмқҙлӢӨ.</text>
  <rect x="468" y="284" width="408" height="150" rx="8" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="490" y="312" class="head">в‘ў ParNewмҷҖ лӢӨлҘё м җ</text>
  <text x="502" y="344" class="body">ParNewлҠ” CMSмҷҖ л§һм¶ҳ latency мҡ°м„  мӢ м„ёлҢҖ м§қмқҙлӢӨ.</text>
  <text x="502" y="374" class="body">Parallel ScavengeлҠ” pause к°ңлі„ мөңлӢЁліҙлӢӨ throughputмқ„ ліёлӢӨ.</text>
  <text x="502" y="404" class="body">к·ёлһҳм„ң кө¬м„ёлҢҖлҸ„ к°ҷмқҖ мІ н•ҷмқҳ Parallel OldмҷҖ л¬¶мқёлӢӨ.</text>
  <rect x="24" y="464" width="852" height="44" rx="6" fill="#111" stroke="#333"/>
  <text x="46" y="490" class="code">н•ң мӨ„</text><text x="98" y="490" class="body">Parallel кі„м—ҙмқҖ вҖңлҚ” л§ҺмқҖ GC мҠӨл Ҳл“ңлЎң Young/OldлҘј лӘЁл‘җ лі‘л ¬ мІҳлҰ¬н•ҙ м „мІҙ мІҳлҰ¬лҹүмқ„ лҶ’мқҙлҠ”вҖқ мЎ°н•©мқҙлӢӨ.</text>
</svg>
