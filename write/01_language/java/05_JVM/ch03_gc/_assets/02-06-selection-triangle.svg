<svg viewBox="0 0 900 600" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>GC 선택의 세 축</title>
  <desc>GC 선택은 처리량, 지연시간, 풋프린트 세 지표 사이의 트레이드오프다. Parallel은 처리량, ZGC와 Shenandoah는 지연시간, Serial은 풋프린트, G1은 처리량과 지연시간의 균형에 가깝다.</desc>
  <defs>
    <style>
      .title{font-size:18px;font-weight:800;fill:#e8e4df}.sub{font-size:11px;fill:rgb(138,133,128)}.head{font-size:13px;font-weight:800;fill:rgb(212,168,83)}.label{font-size:11px;font-weight:750;fill:#e8e4df}.body{font-size:10px;fill:rgb(180,175,170)}.note{font-size:9.5px;fill:rgb(138,133,128)}.code{font-size:10px;font-weight:700;fill:rgb(212,168,83);font-family:'JetBrains Mono',monospace}.ok{font-size:10px;font-weight:750;fill:#81c784}.bad{font-size:10px;font-weight:750;fill:#e57373}
    </style>
  </defs>
  <rect x="0" y="0" width="900" height="600" fill="#0d0d0d"/>
  <text x="26" y="36" class="title">GC 선택의 세 축 — 무엇을 먼저 지킬 것인가</text>
  <text x="26" y="56" class="sub">한 컬렉터가 처리량, 지연시간, 풋프린트를 모두 최대로 만족시키기는 어렵다.</text>

  <polygon points="450,112 170,430 730,430" fill="#121212" stroke="rgb(212,168,83)" stroke-width="1.4"/>
  <circle cx="450" cy="112" r="58" fill="#1e2a1e" stroke="#4ab080"/>
  <text x="450" y="103" class="ok" text-anchor="middle">Throughput</text>
  <text x="450" y="122" class="body" text-anchor="middle">총 GC 시간 비율 최소</text>
  <text x="450" y="140" class="code" text-anchor="middle">Parallel</text>

  <circle cx="170" cy="430" r="58" fill="#1e3a4a" stroke="#4a8ab0"/>
  <text x="170" y="421" class="label" text-anchor="middle">Latency</text>
  <text x="170" y="440" class="body" text-anchor="middle">최악 pause 제한</text>
  <text x="170" y="458" class="code" text-anchor="middle">ZGC / Shenandoah</text>

  <circle cx="730" cy="430" r="58" fill="#2a2a1a" stroke="rgb(212,168,83)"/>
  <text x="730" y="421" class="label" text-anchor="middle">Footprint</text>
  <text x="730" y="440" class="body" text-anchor="middle">메모리 사용량 최소</text>
  <text x="730" y="458" class="code" text-anchor="middle">Serial</text>

  <rect x="354" y="294" width="192" height="76" rx="8" fill="#2a1414" stroke="#e57373"/>
  <text x="450" y="321" class="label" text-anchor="middle">G1</text>
  <text x="450" y="341" class="body" text-anchor="middle">처리량과 지연시간의 균형</text>
  <text x="450" y="359" class="note" text-anchor="middle">JDK 9+ 서버 기본 선택</text>

  <rect x="58" y="504" width="784" height="54" rx="8" fill="#111" stroke="#333"/>
  <text x="80" y="528" class="code">실무 기준</text>
  <text x="168" y="528" class="body">기본은 G1로 시작하고, 측정 결과가 특정 축을 강하게 요구할 때 Parallel/ZGC/Serial로 이동한다.</text>
  <text x="168" y="548" class="note">G1이 보편적인 이유는 "가장 빠름"이 아니라, 기본 서버 워크로드에서 위험한 극단을 피하는 균형점이기 때문이다.</text>
</svg>
