<svg viewBox="0 0 900 640" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>GC 변경 전 측정 흐름</title>
  <desc>GC 컬렉터를 바꾸기 전에 GC 로그와 JFR로 pause time, GC time ratio, allocation rate, Full GC 여부를 확인해 원인을 분리하는 흐름이다.</desc>
  <defs>
    <style>
      .title{font-size:18px;font-weight:800;fill:#e8e4df}.sub{font-size:11px;fill:rgb(138,133,128)}.head{font-size:13px;font-weight:800;fill:rgb(212,168,83)}.label{font-size:11px;font-weight:750;fill:#e8e4df}.body{font-size:10px;fill:rgb(180,175,170)}.note{font-size:9.5px;fill:rgb(138,133,128)}.code{font-size:10px;font-weight:700;fill:rgb(212,168,83);font-family:'JetBrains Mono',monospace}.ok{font-size:10px;font-weight:750;fill:#81c784}.bad{font-size:10px;font-weight:750;fill:#e57373}
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="rgb(212,168,83)"/></marker>
  </defs>
  <rect x="0" y="0" width="900" height="640" fill="#0d0d0d"/>
  <text x="26" y="36" class="title">컬렉터 변경 전 측정 흐름</text>
  <text x="26" y="56" class="sub">느리다고 바로 ZGC로 바꾸지 않는다. GC 문제인지, 할당 문제인지, 메모리 부족인지 먼저 분리한다.</text>

  <rect x="48" y="92" width="180" height="64" rx="8" fill="#2a1414" stroke="#e57373"/>
  <text x="138" y="116" class="label" text-anchor="middle">증상</text>
  <text x="138" y="136" class="body" text-anchor="middle">응답 지연 / 처리량 저하</text>
  <line x1="228" y1="124" x2="298" y2="124" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="300" y="92" width="260" height="64" rx="8" fill="#1a1a1a" stroke="rgb(212,168,83)"/>
  <text x="430" y="116" class="label" text-anchor="middle">자료 수집</text>
  <text x="430" y="136" class="code" text-anchor="middle">GC log + JFR</text>
  <line x1="560" y1="124" x2="630" y2="124" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="632" y="92" width="220" height="64" rx="8" fill="#1e3a4a" stroke="#4a8ab0"/>
  <text x="742" y="116" class="label" text-anchor="middle">원인 분리</text>
  <text x="742" y="136" class="body" text-anchor="middle">pause / 총 GC / 할당 / Full GC</text>

  <rect x="48" y="206" width="804" height="250" rx="8" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="72" y="236" class="head">측정 지표별 판단</text>
  <rect x="76" y="266" width="176" height="136" rx="6" fill="#111" stroke="#333"/>
  <text x="164" y="292" class="code" text-anchor="middle">pause time</text>
  <text x="164" y="318" class="body" text-anchor="middle">p99/p999 또는 최대 pause가</text>
  <text x="164" y="336" class="body" text-anchor="middle">SLO를 깨는지 확인</text>
  <text x="164" y="368" class="ok" text-anchor="middle">깨면 ZGC/G1 튜닝 후보</text>

  <rect x="268" y="266" width="176" height="136" rx="6" fill="#111" stroke="#333"/>
  <text x="356" y="292" class="code" text-anchor="middle">GC time ratio</text>
  <text x="356" y="318" class="body" text-anchor="middle">전체 시간 중 GC 비율이</text>
  <text x="356" y="336" class="body" text-anchor="middle">과도한지 확인</text>
  <text x="356" y="368" class="ok" text-anchor="middle">높으면 throughput 문제</text>

  <rect x="460" y="266" width="176" height="136" rx="6" fill="#111" stroke="#333"/>
  <text x="548" y="292" class="code" text-anchor="middle">allocation rate</text>
  <text x="548" y="318" class="body" text-anchor="middle">초당 객체 생성량이</text>
  <text x="548" y="336" class="body" text-anchor="middle">비정상적으로 높은지 확인</text>
  <text x="548" y="368" class="ok" text-anchor="middle">높으면 코드/할당 패턴 점검</text>

  <rect x="652" y="266" width="176" height="136" rx="6" fill="#111" stroke="#333"/>
  <text x="740" y="292" class="code" text-anchor="middle">Full GC</text>
  <text x="740" y="318" class="body" text-anchor="middle">반복 발생, promotion 실패,</text>
  <text x="740" y="336" class="body" text-anchor="middle">heap pressure 확인</text>
  <text x="740" y="368" class="ok" text-anchor="middle">누수/힙 부족 의심</text>

  <rect x="48" y="494" width="804" height="84" rx="8" fill="#111" stroke="#333"/>
  <text x="72" y="524" class="head">JFR은 무엇인가</text>
  <text x="92" y="548" class="body">Java Flight Recorder는 JVM 내부 이벤트를 낮은 오버헤드로 기록하는 진단 도구다. GC pause, allocation, 스레드, 메서드 샘플 등을 함께 본다.</text>
  <text x="92" y="568" class="note">GC 로그는 GC 사건을 자세히 보고, JFR은 GC가 애플리케이션 실행과 어떻게 맞물리는지 함께 보는 데 유리하다.</text>
</svg>
