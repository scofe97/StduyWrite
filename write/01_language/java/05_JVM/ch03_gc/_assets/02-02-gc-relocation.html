<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>01-01 — GC 시점 메모리 레이아웃 재배치</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #e8e4df; font-family: 'Pretendard', -apple-system, system-ui, sans-serif; }
    .container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: rgb(138, 133, 128); font-size: 14px; margin-bottom: 28px; }

    /* 시나리오 선택기 */
    .scenario-selector { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .scenario-pill { background: rgb(26, 26, 26); border: 1px solid rgb(42, 37, 32); border-radius: 20px; color: rgb(138, 133, 128); padding: 6px 16px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .scenario-pill.active { background: rgba(212, 168, 83, 0.15); border-color: rgb(212, 168, 83); color: rgb(212, 168, 83); }

    /* 파이프라인 */
    .pipeline { display: flex; align-items: center; justify-content: center; padding: 24px 0; overflow-x: auto; }
    .pipeline-step { display: flex; flex-direction: column; align-items: center; cursor: pointer; min-width: 64px; }
    .step-circle { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgb(26, 26, 26); border: 2px solid rgb(42, 37, 32); color: rgb(138, 133, 128); font-size: 14px; font-weight: 600; transition: all 0.3s; }
    .step-label { margin-top: 6px; font-size: 11px; color: rgb(138, 133, 128); white-space: nowrap; transition: color 0.3s; }
    .pipeline-step.active .step-circle { background: rgba(212, 168, 83, 0.2); border-color: rgb(212, 168, 83); color: rgb(212, 168, 83); box-shadow: 0 0 8px rgba(212, 168, 83, 0.4); animation: node-glow 2s ease-in-out infinite; }
    .pipeline-step.active .step-label { color: rgb(212, 168, 83); }
    .pipeline-step.completed .step-circle { background: rgba(212, 168, 83, 0.1); border-color: rgb(212, 168, 83); color: rgb(212, 168, 83); }
    .pipeline-step.completed .step-label { color: rgb(212, 168, 83); }
    .pipeline-connector { width: 32px; height: 2px; background: rgb(42, 37, 32); margin-bottom: 22px; transition: background 0.5s; }
    .pipeline-connector.filled { background: rgb(212, 168, 83); }

    /* 패널 공통 */
    .panel { background: #0d0d0d; border: 1px solid rgb(42, 37, 32); border-radius: 8px; padding: 24px; margin-bottom: 16px; }

    /* 시작 오버레이 */
    .start-overlay { text-align: center; padding: 32px; }
    .btn-start { background: rgba(212, 168, 83, 0.15); border: 1px solid rgb(212, 168, 83); border-radius: 8px; color: rgb(212, 168, 83); padding: 12px 32px; font-size: 16px; cursor: pointer; transition: all 0.2s; }
    .btn-start:hover { background: rgba(212, 168, 83, 0.25); }
    .start-hint { color: rgb(138, 133, 128); font-size: 13px; margin-top: 8px; }

    /* 컨트롤 */
    .controls { display: flex; align-items: center; gap: 16px; padding: 12px 0; border-top: 1px solid rgb(42, 37, 32); margin-top: 16px; }
    .controls-nav { display: flex; gap: 8px; }
    .btn-ctrl { background: rgb(26, 26, 26); border: 1px solid rgb(42, 37, 32); border-radius: 6px; color: #e8e4df; padding: 6px 14px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .btn-ctrl:hover { border-color: rgb(212, 168, 83); color: rgb(212, 168, 83); }
    .btn-play { min-width: 72px; }
    .speed-group { display: flex; gap: 4px; margin-left: auto; }
    .speed-btn { background: transparent; border: 1px solid transparent; border-radius: 4px; color: rgb(138, 133, 128); padding: 4px 10px; font-size: 12px; cursor: pointer; }
    .speed-btn.active { border-color: rgb(42, 37, 32); color: #e8e4df; }
    .step-counter { color: rgb(138, 133, 128); font-size: 13px; font-variant-numeric: tabular-nums; min-width: 48px; text-align: right; }

    /* 내레이션 */
    .narration-step-title { font-size: 11px; font-weight: 600; color: rgb(212, 168, 83); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
    .narration-body { font-size: 14px; line-height: 1.7; }
    .hl { color: rgb(212, 168, 83); font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.9em; }
    .ok { color: #66bb6a; }
    .warn { color: rgb(212, 168, 83); }
    .fail { color: #f44336; }
    .bf { color: #ce93d8; font-weight: 600; }

    /* DB(메모리 통계) 패널 */
    .db-panel { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; line-height: 1.4; }
    .db-table { width: 100%; border-collapse: collapse; }
    .db-table td { padding: 6px 10px; border-bottom: 1px solid rgb(32, 28, 24); }
    .db-table tr:last-child td { border-bottom: none; }
    .db-key { color: rgb(138, 133, 128); white-space: nowrap; width: 1%; padding-right: 16px; }
    .db-val { color: #e8e4df; }
    .changed { color: rgb(212, 168, 83); font-weight: 600; text-shadow: 0 0 6px rgba(212, 168, 83, 0.3); }
    .db-note { color: rgb(138, 133, 128); font-size: 11px; margin-top: 8px; font-family: 'Pretendard', sans-serif; }

    /* === 시각화 영역 (힙 메모리 레이아웃) === */
    .viz-area { min-height: 230px; margin-bottom: 8px; }
    .heap { display: flex; gap: 14px; flex-wrap: wrap; }
    .region { flex: 1; min-width: 150px; border: 1px solid rgb(42, 37, 32); border-radius: 8px; padding: 12px; transition: all 0.3s; }
    .region.scan { border-color: rgb(212, 168, 83); box-shadow: 0 0 10px rgba(212, 168, 83, 0.25); }
    .region-name { font-size: 12px; font-weight: 700; color: #e8e4df; margin-bottom: 2px; }
    .region-cap { font-size: 10px; color: rgb(138, 133, 128); margin-bottom: 10px; font-family: 'JetBrains Mono', monospace; }
    .slots { display: flex; flex-wrap: wrap; gap: 5px; min-height: 30px; }
    .cell { width: 22px; height: 22px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; border: 1px solid transparent; transition: all 0.4s; }
    .cell.empty { background: transparent; border: 1px dashed rgb(60, 55, 48); }
    .cell.live { background: #2e5e34; border-color: #66bb6a; color: #cfeccf; }
    .cell.dead { background: #5a2730; border-color: #f44336; color: #ffd5d9; }
    .cell.moving { background: rgba(212, 168, 83, 0.25); border-color: rgb(212, 168, 83); color: rgb(212, 168, 83); box-shadow: 0 0 8px rgba(212, 168, 83, 0.4); }
    .cell.promoted { background: #2e7d32; border-color: #66bb6a; color: #fff; }
    .legend { display: flex; gap: 14px; margin-top: 14px; font-size: 11px; color: rgb(138, 133, 128); flex-wrap: wrap; }
    .legend span { display: inline-flex; align-items: center; gap: 5px; }
    .swatch { width: 12px; height: 12px; border-radius: 3px; border: 1px solid transparent; }

    @keyframes node-glow {
      0%   { box-shadow: 0 0 4px rgba(212, 168, 83, 0.2); }
      50%  { box-shadow: 0 0 12px rgba(212, 168, 83, 0.6); }
      100% { box-shadow: 0 0 4px rgba(212, 168, 83, 0.2); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>GC 시점에 힙 레이아웃이 재배치되는 흐름</h1>
    <p class="subtitle">살아 있는 객체(초록)는 옮겨져 모이고, 죽은 객체(빨강)는 회수되며, 빈칸은 끝으로 밀려 연속 공간이 된다 · 마크-카피·마크-컴팩트가 메모리를 바꾸는 모습</p>

    <div class="scenario-selector">
      <button class="scenario-pill active" onclick="switchScenario(0)">케이스 1: Minor GC (마크-카피)</button>
      <button class="scenario-pill" onclick="switchScenario(1)">케이스 2: 승격 (Survivor→Old)</button>
      <button class="scenario-pill" onclick="switchScenario(2)">케이스 3: Major GC (마크-컴팩트)</button>
    </div>

    <div class="pipeline" id="pipeline"></div>

    <div class="start-overlay" id="startOverlay">
      <button class="btn-start" onclick="startSimulation()">시뮬레이션 시작 ▶</button>
      <p class="start-hint">파이프라인 노드를 클릭하거나 재생으로 단계별 흐름을 확인합니다</p>
    </div>

    <div id="contentPanel" style="display: none;">
      <div class="panel">
        <div class="viz-area" id="vizArea"></div>
        <div class="legend">
          <span><span class="swatch" style="background:#2e5e34;border-color:#66bb6a"></span>생존 객체</span>
          <span><span class="swatch" style="background:#5a2730;border-color:#f44336"></span>회수 대상(죽음)</span>
          <span><span class="swatch" style="background:rgba(212,168,83,0.25);border-color:rgb(212,168,83)"></span>이동 중</span>
          <span><span class="swatch" style="border:1px dashed rgb(60,55,48)"></span>빈칸</span>
        </div>
      </div>

      <div class="panel narration" id="narration"></div>
      <div class="panel db-panel" id="dbPanel"></div>

      <div class="controls" id="controlBar">
        <div class="controls-nav">
          <button class="btn-ctrl" onclick="prevStep()">◀ 이전</button>
          <button class="btn-ctrl btn-play" onclick="togglePlay()" id="playBtn">▶ 재생</button>
          <button class="btn-ctrl" onclick="nextStep()">다음 ▶</button>
        </div>
        <div class="speed-group">
          <button class="speed-btn" onclick="setSpeed(0.5)">0.5x</button>
          <button class="speed-btn active" onclick="setSpeed(1)">1x</button>
          <button class="speed-btn" onclick="setSpeed(2)">2x</button>
        </div>
        <span class="step-counter" id="stepCounter">0 / 0</span>
      </div>
    </div>
  </div>

  <script>
    let currentStep = -1;
    let currentScenario = 0;
    let isPlaying = false;
    let playSpeed = 1;
    let timer = null;

    // ===== 헬퍼: 힙 영역 박스 렌더 =====
    // regions: [{ name, cap, scan(bool), cells:[{t:'live|dead|empty|moving|promoted', label}] }]
    function heap(regions) {
      let html = '<div class="heap">';
      regions.forEach(r => {
        html += '<div class="region' + (r.scan ? ' scan' : '') + '">';
        html += '<div class="region-name">' + r.name + '</div>';
        html += '<div class="region-cap">' + r.cap + '</div>';
        html += '<div class="slots">';
        r.cells.forEach(c => {
          html += '<div class="cell ' + c.t + '">' + (c.label || '') + '</div>';
        });
        html += '</div></div>';
      });
      html += '</div>';
      return html;
    }

    // ===== 헬퍼: 메모리 통계 테이블 =====
    function db(rows, opts) {
      let html = '<table class="db-table">';
      rows.forEach(r => {
        html += '<tr><td class="db-key">' + r[0] + '</td><td class="db-val">' + r[1] + '</td></tr>';
      });
      html += '</table>';
      if (opts && opts.note) html += '<div class="db-note">' + opts.note + '</div>';
      return html;
    }

    // cell 빌더 단축
    const live = (n) => ({ t: 'live', label: n || '' });
    const dead = (n) => ({ t: 'dead', label: n || '✕' });
    const mv   = (n) => ({ t: 'moving', label: n || '' });
    const empty = () => ({ t: 'empty', label: '' });
    const promoted = (n) => ({ t: 'promoted', label: n || '' });
    const rep = (fn, k) => Array.from({ length: k }, () => fn());

    const scenarios = {
      // ============================================================
      // 케이스 1: Minor GC — 마크-카피 (Eden + 사용중 Survivor → 빈 Survivor)
      // ============================================================
      0: {
        title: '케이스 1: Minor GC',
        nodes: [
          {
            label: '할당',
            viz: () => heap([
              { name: 'Eden', cap: '신세대 80%', cells: [...rep(() => live(), 3), ...rep(() => dead(), 3), empty(), empty()] },
              { name: 'Survivor S0', cap: '신세대 10% (사용 중)', cells: [live('1'), empty(), empty()] },
              { name: 'Survivor S1', cap: '신세대 10% (비어 있음)', cells: [empty(), empty(), empty()] }
            ]),
            narration: '새 객체는 거의 모두 <span class="hl">Eden</span>에 만들어진다(TLAB이 있으면 그 안에서). Eden이 차오르고, 이전 Minor GC를 한 번 넘긴 객체 하나가 <span class="hl">S0</span>에 age=1로 들어 있다.',
            db: () => db([
              ['Eden 사용', '3 live + 3 dead / 8'],
              ['S0 (age=1)', '1 live'],
              ['S1', '<span class="db-val">비어 있음</span>']
            ], { note: 'Eden이 가득 차면 Minor GC가 트리거된다.' })
          },
          {
            label: 'Eden 가득 → 트리거',
            viz: () => heap([
              { name: 'Eden', cap: '신세대 80%', scan: true, cells: [live(), live(), live(), dead(), dead(), dead(), live(), live()] },
              { name: 'Survivor S0', cap: '신세대 10% (사용 중)', scan: true, cells: [live('1'), empty(), empty()] },
              { name: 'Survivor S1', cap: '신세대 10% (비어 있음)', cells: [empty(), empty(), empty()] }
            ]),
            narration: 'Eden이 가득 찼다. <span class="warn">Minor GC 발생</span> — GC가 <span class="hl">Eden + 사용 중인 S0</span>를 함께 스캔 대상으로 잡는다. S1(비어 있는 쪽)이 복사 도착지다.',
            db: () => db([
              ['트리거', '<span class="changed">Eden 가득 참</span>'],
              ['스캔 범위', '<span class="changed">Eden + S0</span>'],
              ['도착지', 'S1 (빈 Survivor)']
            ])
          },
          {
            label: '마크',
            viz: () => heap([
              { name: 'Eden', cap: '신세대 80%', scan: true, cells: [live(), live(), live(), dead(), dead(), dead(), live(), live()] },
              { name: 'Survivor S0', cap: '신세대 10% (사용 중)', scan: true, cells: [live('1'), empty(), empty()] },
              { name: 'Survivor S1', cap: '신세대 10% (비어 있음)', cells: [empty(), empty(), empty()] }
            ]),
            narration: '도달성 분석으로 <span class="ok">살아 있는 객체(초록)</span>와 <span class="fail">죽은 객체(빨강)</span>를 표시한다. 신세대는 생존율이 낮아 대부분이 죽음 — 이 관찰이 마크-카피를 정당화한다.',
            db: () => db([
              ['Eden live', '<span class="ok">5</span>'],
              ['Eden dead', '<span class="fail">3</span>'],
              ['S0 live', '<span class="ok">1</span>'],
              ['생존율', '약 10~20% (낮음)']
            ], { note: '생존율이 낮으므로 "살아 있는 것만 복사"가 싸다.' })
          },
          {
            label: '복사 (마크-카피)',
            viz: () => heap([
              { name: 'Eden', cap: '신세대 80%', cells: [mv(), mv(), mv(), empty(), empty(), empty(), mv(), mv()] },
              { name: 'Survivor S0', cap: '신세대 10%', cells: [mv('1'), empty(), empty()] },
              { name: 'Survivor S1', cap: '신세대 10% (복사 도착)', scan: true, cells: [live('1'), live('1'), live('1'), live('1'), live('1'), live('2')] }
            ]),
            narration: '<span class="warn">살아 있는 객체만 S1로 복사</span>한다. 복사된 객체는 age가 +1 된다(Eden 출신은 age=1, S0 출신은 age=2). 죽은 객체는 그냥 버려진다 — 따로 지우는 비용이 없다.',
            db: () => db([
              ['복사 대상', '<span class="changed">live 6개 → S1</span>'],
              ['age 갱신', '<span class="changed">+1</span> (Eden→1, S0→2)'],
              ['S1 사용', '6 live'],
              ['죽은 객체', '회수(복사 안 함)']
            ], { note: 'S1에 순서대로 채우므로 빈칸이 끝에 모인다 = 단편화 없음.' })
          },
          {
            label: 'Eden·S0 비움',
            viz: () => heap([
              { name: 'Eden', cap: '신세대 80% (통째로 비움)', cells: [empty(), empty(), empty(), empty(), empty(), empty(), empty(), empty()] },
              { name: 'Survivor S0', cap: '신세대 10% (통째로 비움)', cells: [empty(), empty(), empty()] },
              { name: 'Survivor S1', cap: '신세대 10% (현재 사용)', cells: [live('1'), live('1'), live('1'), live('1'), live('1'), live('2')] }
            ]),
            narration: '<span class="ok">Eden과 S0는 통째로 비워진다</span>. 다음 할당은 빈 Eden 끝에 포인터를 미는 것(<span class="hl">bump-the-pointer</span>)으로 끝난다. S0와 S1은 다음 Minor GC 때 역할을 바꾼다.',
            db: () => db([
              ['Eden', '<span class="changed">비움</span> (다시 할당 가능)'],
              ['S0', '<span class="changed">비움</span>'],
              ['S1 (현재)', '6 live'],
              ['다음 할당', 'bump-the-pointer (싸다)']
            ], { note: 'Eden 80% + Survivor 10%×2 구조로 메모리 사용률을 약 90%까지 끌어올린다.' })
          }
        ]
      },

      // ============================================================
      // 케이스 2: 승격 — age 임계 초과 시 Old로
      // ============================================================
      1: {
        title: '케이스 2: 승격',
        nodes: [
          {
            label: 'age 누적',
            viz: () => heap([
              { name: 'Survivor', cap: 'Minor GC마다 age += 1', cells: [live('13'), live('13'), live('14'), empty()] },
              { name: '구세대(Old)', cap: '살아남은 객체가 모이는 곳', cells: [live(), live(), empty(), empty(), empty(), empty()] }
            ]),
            narration: '객체는 Minor GC를 넘길 때마다 S0↔S1을 오가며 <span class="hl">age</span>가 1씩 오른다. 약한 세대 가설 — <span class="bf">오래 산 객체는 더 오래 살 가능성이 크다</span>.',
            db: () => db([
              ['Survivor 객체', 'age 13, 13, 14'],
              ['임계값', '-XX:MaxTenuringThreshold = 15 (기본)'],
              ['Old', '기존 2 live']
            ])
          },
          {
            label: 'age 15 도달',
            viz: () => heap([
              { name: 'Survivor', cap: 'Minor GC마다 age += 1', scan: true, cells: [live('15'), live('15'), mv('15'), empty()] },
              { name: '구세대(Old)', cap: '살아남은 객체가 모이는 곳', cells: [live(), live(), empty(), empty(), empty(), empty()] }
            ]),
            narration: '다음 Minor GC에서 age가 <span class="warn">15(임계값)</span>에 도달했다. 이 객체들은 더 이상 Survivor를 왕복하지 않고 <span class="warn">구세대로 승격</span> 대상이 된다.',
            db: () => db([
              ['도달 객체', '<span class="changed">age = 15</span>'],
              ['판정', '<span class="changed">임계 도달 → 승격</span>'],
              ['예외 규칙', '동적 age — Survivor 절반 이상이 같은 age면 그 이상 즉시 승격']
            ], { note: 'MaxTenuringThreshold는 기본 15. 동적 age 규칙이 이를 앞당길 수 있다.' })
          },
          {
            label: '구세대로 이동',
            viz: () => heap([
              { name: 'Survivor', cap: '승격분이 빠져 비워짐', cells: [empty(), empty(), empty(), empty()] },
              { name: '구세대(Old)', cap: '승격 도착', scan: true, cells: [live(), live(), promoted('15'), promoted('15'), promoted('15'), empty()] }
            ]),
            narration: '<span class="ok">age 15 객체가 구세대로 이사</span>했다. 구세대는 살아남은 객체가 모이는 곳이라 생존율이 높고, 그래서 마크-카피(50% 낭비)가 아니라 마크-컴팩트를 쓴다(케이스 3).',
            db: () => db([
              ['Survivor', '<span class="changed">승격분 제거</span>'],
              ['Old', '<span class="changed">2 → 5 live</span>'],
              ['Old 알고리즘', '마크-컴팩트 (생존율 높음)']
            ])
          },
          {
            label: '큰 객체 직행',
            viz: () => heap([
              { name: 'Eden', cap: '신세대 80%', cells: [live(), live(), empty(), empty()] },
              { name: '구세대(Old)', cap: '큰 객체는 곧장 여기', scan: true, cells: [live(), live(), promoted('15'), promoted('15'), promoted('15'), promoted('big')] }
            ]),
            narration: '큰 배열·문자열은 <span class="warn">Eden을 거치지 않고 곧장 구세대</span>에 만들어진다(<span class="hl">-XX:PretenureSizeThreshold</span> 초과 시). 큰 객체를 Eden↔Survivor로 복사하는 비용이 복사 자체보다 크기 때문이다.',
            db: () => db([
              ['큰 객체', '<span class="changed">Eden 우회 → Old 직행</span>'],
              ['옵션', '-XX:PretenureSizeThreshold'],
              ['이유', '복사 비용 > 직접 할당 비용']
            ], { note: '임계값 기본은 GC 종류마다 다르다.' })
          }
        ]
      },

      // ============================================================
      // 케이스 3: Major GC — 마크-컴팩트 (단편화된 Old 압축)
      // ============================================================
      2: {
        title: '케이스 3: Major GC',
        nodes: [
          {
            label: '단편화',
            viz: () => heap([
              { name: '구세대(Old)', cap: '죽은 객체 회수 후 — 빈칸이 듬성듬성', cells: [live(), empty(), live(), empty(), empty(), live(), empty(), live(), empty()] }
            ]),
            narration: '구세대에서 죽은 객체를 회수하고 나면 빈칸이 <span class="warn">듬성듬성</span> 흩어진다. 합치면 공간이 충분해도, <span class="fail">연속된 빈 공간</span>이 없어 큰 객체 할당이 실패할 수 있다.',
            db: () => db([
              ['Old 전체', '9칸'],
              ['live', '<span class="ok">4</span>'],
              ['빈칸(분산)', '<span class="fail">5 (흩어짐)</span>'],
              ['최대 연속 빈칸', '<span class="fail">1칸</span>']
            ], { note: '빈칸 총합은 크지만 연속이 아니라 큰 객체를 못 담는다.' })
          },
          {
            label: '마크',
            viz: () => heap([
              { name: '구세대(Old)', cap: '도달성 분석으로 생존 표시', scan: true, cells: [live(), empty(), live(), empty(), empty(), live(), empty(), live(), empty()] }
            ]),
            narration: '마크-컴팩트도 <span class="hl">마크 단계</span>를 공유한다. 도달성 분석으로 살아 있는 객체를 표시한다. 구세대는 생존율이 높아 대부분이 살아 있음으로 표시된다.',
            db: () => db([
              ['표시된 live', '<span class="ok">4</span>'],
              ['생존율', '높음 (구세대 특성)'],
              ['다음', '한쪽 끝으로 압축']
            ], { note: '생존율이 높아 마크-카피의 50% 낭비를 감당할 수 없다 → 컴팩트 선택.' })
          },
          {
            label: '컴팩트 (압축)',
            viz: () => heap([
              { name: '구세대(Old)', cap: '생존 객체를 한쪽 끝으로 압축', scan: true, cells: [mv(), mv(), mv(), mv(), empty(), empty(), empty(), empty(), empty()] }
            ]),
            narration: '<span class="warn">살아 있는 객체를 모두 한 방향으로 밀어</span> 왼쪽 끝에 모은다. 마크-스윕과 달리 객체를 실제로 옮기므로 <span class="hl">이동 비용</span>이 든다 — 그래서 Major GC는 드물게, 길게 돈다.',
            db: () => db([
              ['이동', '<span class="changed">live 4개를 끝으로 압축</span>'],
              ['비용', '마크 시간 + 이동 시간'],
              ['빈도', '드물게(Major/Full GC)']
            ], { note: 'Serial Old · Parallel Old가 이 마크-컴팩트를 채택. CMS는 예외(마크-스윕 + 지연 컴팩트).' })
          },
          {
            label: '연속 공간 확보',
            viz: () => heap([
              { name: '구세대(Old)', cap: '압축 완료 — 빈칸이 끝에 연속', cells: [live(), live(), live(), live(), empty(), empty(), empty(), empty(), empty()] }
            ]),
            narration: '<span class="ok">빈칸이 끝에 연속으로 모였다</span>. 이제 큰 객체도 담을 수 있고, 다음 할당은 다시 <span class="hl">bump-the-pointer</span>로 싸진다. 단편화 없음 + 메모리 낭비 없음 — 대신 이동 비용을 치른 결과다.',
            db: () => db([
              ['live', '<span class="ok">4 (왼쪽 정렬)</span>'],
              ['연속 빈 공간', '<span class="changed">5칸 (끝에 모임)</span>'],
              ['다음 할당', 'bump-the-pointer'],
              ['결과', '단편화 0 · 낭비 0']
            ], { note: '한 줄 정리: 세 알고리즘 중 어느 하나도 단독으로 우수하지 않아, 신세대(마크-카피) + 구세대(마크-컴팩트)로 나눠 섞어 쓴다.' })
          }
        ]
      }
    };

    function renderPipeline() {
      const pipeline = document.getElementById('pipeline');
      const nodes = scenarios[currentScenario].nodes;
      pipeline.innerHTML = '';
      nodes.forEach((node, i) => {
        if (i > 0) {
          const conn = document.createElement('div');
          conn.className = 'pipeline-connector' + (i <= currentStep ? ' filled' : '');
          pipeline.appendChild(conn);
        }
        const el = document.createElement('div');
        el.className = 'pipeline-step'
          + (i === currentStep ? ' active' : '')
          + (i < currentStep ? ' completed' : '');
        el.onclick = () => goToStep(i);
        el.innerHTML = '<div class="step-circle">' + (i + 1) + '</div>'
          + '<div class="step-label">' + node.label + '</div>';
        pipeline.appendChild(el);
      });
    }

    function goToStep(n) {
      const nodes = scenarios[currentScenario].nodes;
      if (n < 0 || n >= nodes.length) return;
      currentStep = n;
      const node = nodes[n];
      document.getElementById('vizArea').innerHTML = node.viz();
      updateNarration(node.narration);
      document.getElementById('dbPanel').innerHTML = node.db();
      document.getElementById('stepCounter').textContent = (currentStep + 1) + ' / ' + nodes.length;
      renderPipeline();
    }

    function updateNarration(html) {
      const nodes = scenarios[currentScenario].nodes;
      document.getElementById('narration').innerHTML
        = '<div class="narration-step-title">Step ' + (currentStep + 1)
        + ': ' + nodes[currentStep].label + '</div>'
        + '<div class="narration-body">' + html + '</div>';
    }

    function nextStep() { goToStep(currentStep + 1); }
    function prevStep() { goToStep(currentStep - 1); }

    function switchScenario(index) {
      currentScenario = index;
      currentStep = -1;
      stopPlay();
      document.querySelectorAll('.scenario-pill').forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });
      // 시나리오 전환 시 첫 단계로 바로 진입
      if (document.getElementById('contentPanel').style.display !== 'none') {
        goToStep(0);
      } else {
        renderPipeline();
        document.getElementById('stepCounter').textContent = '0 / ' + scenarios[index].nodes.length;
      }
    }

    function startSimulation() {
      document.getElementById('startOverlay').style.display = 'none';
      document.getElementById('contentPanel').style.display = 'block';
      goToStep(0);
    }

    function togglePlay() {
      if (isPlaying) { stopPlay(); return; }
      if (currentStep === -1) goToStep(0);
      isPlaying = true;
      document.getElementById('playBtn').textContent = '⏸ 정지';
      timer = setInterval(() => {
        const nodes = scenarios[currentScenario].nodes;
        if (currentStep >= nodes.length - 1) { stopPlay(); return; }
        nextStep();
      }, 2600 / playSpeed);
    }

    function stopPlay() {
      isPlaying = false;
      if (timer) { clearInterval(timer); timer = null; }
      document.getElementById('playBtn').textContent = '▶ 재생';
    }

    function setSpeed(speed) {
      playSpeed = speed;
      document.querySelectorAll('.speed-btn').forEach(el => {
        el.classList.toggle('active', parseFloat(el.textContent) === speed);
      });
      if (isPlaying) { stopPlay(); togglePlay(); }
    }

    document.addEventListener('DOMContentLoaded', () => { renderPipeline(); });
  </script>
</body>
