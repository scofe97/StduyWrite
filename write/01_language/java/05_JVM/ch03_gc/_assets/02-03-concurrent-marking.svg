<svg viewBox="0 0 900 660" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>동시 마킹과 3색 마킹 — 위험과 보정 전략</title>
  <desc>STW 마킹은 애플리케이션 스레드를 멈춘 뒤 정지된 객체 그래프를 탐색한다. 동시 마킹은 애플리케이션 스레드와 GC 스레드가 함께 실행되므로 참조 변경을 놓칠 수 있다. 검은 객체가 흰 객체를 새로 참조하는 위험을 증분 갱신은 검은 객체를 회색으로 되돌려 막고, SATB는 지워지는 옛 참조를 기록해 막는다.</desc>
  <defs>
    <style>
      .title { font-size: 17px; font-weight: 800; fill: #e8e4df; }
      .sub { font-size: 11px; fill: rgb(138,133,128); }
      .head { font-size: 13px; font-weight: 800; fill: rgb(212,168,83); }
      .label { font-size: 11px; font-weight: 750; fill: #e8e4df; }
      .body { font-size: 10px; fill: rgb(180,175,170); }
      .note { font-size: 9.5px; fill: rgb(138,133,128); }
      .code { font-size: 10px; font-weight: 700; fill: rgb(212,168,83); font-family: 'JetBrains Mono', monospace; }
      .bad { font-size: 10px; font-weight: 750; fill: #e57373; }
      .ok { font-size: 10px; font-weight: 750; fill: #81c784; }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 z" fill="rgb(212,168,83)"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 z" fill="#e57373"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="660" fill="#0d0d0d"/>
  <text x="26" y="36" class="title">동시 마킹과 3색 마킹 — 위험과 보정 전략</text>
  <text x="26" y="55" class="sub">STW를 줄이려면 GC가 앱과 동시에 그래프를 탐색해야 하고, 그 순간 참조 변경 추적이 필요해진다</text>

  <rect x="22" y="78" width="856" height="150" rx="8" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="42" y="104" class="head">① 왜 동시 마킹이 필요한가</text>

  <rect x="50" y="128" width="236" height="68" rx="6" fill="#2a1414" stroke="#e57373"/>
  <text x="168" y="153" class="bad" text-anchor="middle">STW 마킹</text>
  <text x="168" y="172" class="body" text-anchor="middle">애플리케이션 스레드 모두 정지</text>
  <text x="168" y="188" class="body" text-anchor="middle">정지된 그래프를 안전하게 탐색</text>

  <line x1="286" y1="162" x2="358" y2="162" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <text x="322" y="150" class="note" text-anchor="middle">pause 증가</text>

  <rect x="360" y="128" width="180" height="68" rx="6" fill="#111" stroke="#333"/>
  <text x="450" y="153" class="label" text-anchor="middle">힙이 커질수록</text>
  <text x="450" y="172" class="body" text-anchor="middle">마크 시간이 응답 지연으로 보임</text>

  <line x1="540" y1="162" x2="612" y2="162" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <text x="576" y="150" class="note" text-anchor="middle">해결 방향</text>

  <rect x="614" y="128" width="236" height="68" rx="6" fill="#1e2a1e" stroke="#4ab080"/>
  <text x="732" y="153" class="ok" text-anchor="middle">동시 마킹</text>
  <text x="732" y="172" class="body" text-anchor="middle">앱 스레드와 GC 스레드가 함께 실행</text>
  <text x="732" y="188" class="body" text-anchor="middle">pause는 줄고 추적 비용이 생김</text>

  <rect x="22" y="250" width="856" height="170" rx="8" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="42" y="276" class="head">② 3색 마킹의 위험 — 검은 객체가 흰 객체를 새로 참조</text>
  <text x="42" y="294" class="body">검은 객체는 이미 자식까지 다 봤다고 간주되어 다시 스캔하지 않을 수 있다</text>

  <circle cx="176" cy="344" r="32" fill="#111" stroke="#e8e4df" stroke-width="1.5"/>
  <text x="176" y="340" class="label" text-anchor="middle">A</text>
  <text x="176" y="359" class="note" text-anchor="middle">검은 객체</text>
  <text x="176" y="392" class="body" text-anchor="middle">이미 다 봄</text>

  <line x1="208" y1="344" x2="332" y2="344" stroke="#e57373" stroke-width="2.5" marker-end="url(#arr-red)"/>
  <text x="270" y="330" class="bad" text-anchor="middle">A.field = B</text>
  <text x="270" y="366" class="note" text-anchor="middle">애플리케이션이 새 참조 추가</text>

  <circle cx="372" cy="344" r="32" fill="#f5f5f5" stroke="#e8e4df" stroke-width="1.5"/>
  <text x="372" y="340" fill="#0d0d0d" font-size="11" font-weight="800" text-anchor="middle">B</text>
  <text x="372" y="359" fill="#0d0d0d" font-size="9.5" text-anchor="middle">흰 객체</text>
  <text x="372" y="392" class="body" text-anchor="middle">아직 안 봄</text>

  <rect x="520" y="314" width="304" height="70" rx="6" fill="#2a1414" stroke="#e57373"/>
  <text x="672" y="341" class="bad" text-anchor="middle">위험</text>
  <text x="672" y="361" class="body" text-anchor="middle">GC가 A를 다시 보지 않으면 B를 놓칠 수 있다</text>
  <text x="672" y="378" class="body" text-anchor="middle">살아 있는 객체를 회수 후보로 남기는 치명적 오류</text>

  <rect x="22" y="442" width="414" height="170" rx="8" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="42" y="468" class="head">③ 증분 갱신 — 새 참조를 따라가게 만들기</text>
  <text x="42" y="486" class="body">검은 객체에 새 참조가 생기면 그 객체를 다시 회색으로 되돌린다</text>

  <circle cx="102" cy="540" r="30" fill="#111" stroke="#e8e4df" stroke-width="1.4"/>
  <text x="102" y="536" class="label" text-anchor="middle">A</text>
  <text x="102" y="554" class="note" text-anchor="middle">검은색</text>
  <line x1="132" y1="540" x2="198" y2="540" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <text x="165" y="526" class="note" text-anchor="middle">다시 스캔</text>
  <circle cx="236" cy="540" r="30" fill="rgb(138,133,128)" stroke="#e8e4df" stroke-width="1.4"/>
  <text x="236" y="536" class="label" text-anchor="middle">A</text>
  <text x="236" y="554" class="note" text-anchor="middle">회색으로 복귀</text>
  <rect x="286" y="512" width="118" height="56" rx="6" fill="#111" stroke="#333"/>
  <text x="345" y="535" class="code" text-anchor="middle">new ref</text>
  <text x="345" y="553" class="body" text-anchor="middle">A의 자식 재확인</text>

  <rect x="464" y="442" width="414" height="170" rx="8" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="484" y="468" class="head">④ SATB — 사라진 옛 참조를 기록하기</text>
  <text x="484" y="486" class="body">참조를 지우기 전에 마크 시작 시점의 옛 대상을 큐에 남긴다</text>

  <circle cx="544" cy="540" r="30" fill="rgb(138,133,128)" stroke="#e8e4df" stroke-width="1.4"/>
  <text x="544" y="536" class="label" text-anchor="middle">A</text>
  <text x="544" y="554" class="note" text-anchor="middle">회색/검은색</text>
  <line x1="574" y1="540" x2="640" y2="540" stroke="#e57373" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arr-red)"/>
  <text x="607" y="526" class="bad" text-anchor="middle">A.field = null</text>
  <circle cx="678" cy="540" r="30" fill="#f5f5f5" stroke="#e8e4df" stroke-width="1.4"/>
  <text x="678" y="536" fill="#0d0d0d" font-size="11" font-weight="800" text-anchor="middle">B</text>
  <text x="678" y="554" fill="#0d0d0d" font-size="9.5" text-anchor="middle">옛 참조</text>
  <rect x="732" y="512" width="118" height="56" rx="6" fill="#111" stroke="#333"/>
  <text x="791" y="535" class="code" text-anchor="middle">SATB queue</text>
  <text x="791" y="553" class="body" text-anchor="middle">B를 기록</text>

  <rect x="22" y="626" width="856" height="20" rx="4" fill="#111" stroke="#333"/>
  <text x="42" y="640" class="note">한 줄: 증분 갱신은 새 참조를, SATB는 사라지는 옛 참조를 기록한다. 둘 다 살아 있는 객체를 놓치지 않기 위한 쓰기 장벽 기반 보정이다.</text>
</svg>
