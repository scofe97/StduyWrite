<svg viewBox="0 0 900 1070" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>가비지 컬렉션 알고리즘 — 핵심 요약</title>
  <desc>네 섹션으로 구성. ① 세 가지 기본 알고리즘(마크-스윕·마크-카피·마크-컴팩트) 비교. ② JVM 힙 레이아웃 — Young(Eden+S0+S1)과 Old의 분리 구조. ③ 객체 승격 경로 — Eden→Survivor→Old, Promotion Failure 포함. ④ 카드 테이블 — 구세대→신세대 참조를 dirty 카드로 추적하는 구조.</desc>
  <defs>
    <style>
      .title   { font-size: 17px; font-weight: 800; fill: #e8e4df; }
      .sub     { font-size: 11px; fill: rgb(138,133,128); }
      .shead   { font-size: 13px; font-weight: 800; fill: rgb(212,168,83); }
      .slabel  { font-size: 11px; font-weight: 700; fill: #e8e4df; }
      .sdesc   { font-size: 10px; fill: rgb(180,175,170); }
      .scode   { font-size: 10px; font-weight: 700; fill: rgb(212,168,83); font-family: 'JetBrains Mono', monospace; }
      .chip    { font-size: 9.5px; font-weight: 700; fill: #0d0d0d; }
      .note    { font-size: 9.5px; fill: rgb(138,133,128); }
      .bad     { font-size: 9.5px; font-weight: 700; fill: #e57373; }
      .good    { font-size: 9.5px; font-weight: 700; fill: #81c784; }
      .region  { font-size: 11px; font-weight: 800; fill: #e8e4df; }
      .rlabel  { font-size: 9.5px; fill: rgb(180,175,170); }
      .arrow   { font-size: 9.5px; fill: rgb(212,168,83); }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 z" fill="rgb(212,168,83)"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 z" fill="#e57373"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect x="0" y="0" width="900" height="1070" fill="#0d0d0d"/>

  <!-- 제목 -->
  <text x="26" y="36" class="title">가비지 컬렉션 알고리즘 — 핵심 요약</text>
  <text x="26" y="55" class="sub">세 기본 알고리즘 · JVM 힙 구조(Young/Old) · 객체 승격 경로 · 카드 테이블</text>

  <!-- ══════════════════════════════════════════════
       섹션 A — 세 가지 기본 알고리즘 비교
       y=72 ~ 310, height=238
  ══════════════════════════════════════════════ -->
  <rect x="18" y="72" width="864" height="238" rx="8" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="32" y="94" class="shead">① 세 가지 기본 알고리즘</text>
  <text x="32" y="110" class="sdesc">마크 단계(도달성 분석)는 공유 — 이후 어떻게 빈 공간을 만드는지에서 갈라진다</text>

  <!-- 마크-스윕 카드 -->
  <rect x="32" y="120" width="268" height="174" rx="6" fill="#141414" stroke="#3a3a3a" stroke-width="1"/>
  <text x="48" y="142" class="slabel">마크-스윕 (Mark-Sweep)</text>
  <!-- 블록 시각화 -->
  <rect x="48"  y="152" width="26" height="18" rx="3" fill="#81c784"/><text x="55"  y="165" class="chip">A</text>
  <rect x="78"  y="152" width="26" height="18" rx="3" fill="#81c784"/><text x="85"  y="165" class="chip">B</text>
  <rect x="108" y="152" width="26" height="18" rx="3" fill="#e57373" stroke="#e57373" stroke-width="1"/><text x="115" y="165" class="chip">C</text>
  <rect x="138" y="152" width="26" height="18" rx="3" fill="#81c784"/><text x="145" y="165" class="chip">D</text>
  <rect x="168" y="152" width="26" height="18" rx="3" fill="#e57373"/><text x="175" y="165" class="chip">E</text>
  <rect x="198" y="152" width="26" height="18" rx="3" fill="#81c784"/><text x="205" y="165" class="chip">F</text>
  <!-- 화살표 -->
  <text x="115" y="186" class="arrow">↓ 스윕</text>
  <!-- after -->
  <rect x="48"  y="194" width="26" height="18" rx="3" fill="#81c784"/><text x="55"  y="207" class="chip">A</text>
  <rect x="78"  y="194" width="26" height="18" rx="3" fill="#81c784"/><text x="85"  y="207" class="chip">B</text>
  <rect x="108" y="194" width="26" height="18" rx="3" fill="#1a1a1a" stroke="#555" stroke-dasharray="3,2"/><text x="115" y="207" class="note">_</text>
  <rect x="138" y="194" width="26" height="18" rx="3" fill="#81c784"/><text x="145" y="207" class="chip">D</text>
  <rect x="168" y="194" width="26" height="18" rx="3" fill="#1a1a1a" stroke="#555" stroke-dasharray="3,2"/><text x="175" y="207" class="note">_</text>
  <rect x="198" y="194" width="26" height="18" rx="3" fill="#81c784"/><text x="205" y="207" class="chip">F</text>
  <!-- 평가 -->
  <text x="48" y="232" class="good">✓ 단순, 이동 없음</text>
  <text x="48" y="248" class="bad">✗ 단편화 누적</text>
  <text x="48" y="264" class="bad">✗ free list 탐색 → 할당 느림</text>
  <text x="48" y="280" class="note">→ 신세대 부적합</text>

  <!-- 마크-카피 카드 -->
  <rect x="314" y="120" width="268" height="174" rx="6" fill="#141414" stroke="#3a3a3a" stroke-width="1"/>
  <text x="330" y="142" class="slabel">마크-카피 (Mark-Copying)</text>
  <!-- from side -->
  <rect x="330" y="152" width="26" height="18" rx="3" fill="#81c784"/><text x="337" y="165" class="chip">A</text>
  <rect x="360" y="152" width="26" height="18" rx="3" fill="#81c784"/><text x="367" y="165" class="chip">B</text>
  <rect x="390" y="152" width="26" height="18" rx="3" fill="#e57373"/><text x="397" y="165" class="chip">C</text>
  <rect x="420" y="152" width="26" height="18" rx="3" fill="#81c784"/><text x="427" y="165" class="chip">D</text>
  <!-- to side (empty) -->
  <rect x="460" y="152" width="112" height="18" rx="3" fill="#1a1a1a" stroke="#555" stroke-dasharray="3,2"/>
  <text x="492" y="165" class="note">비어 있음</text>
  <!-- 화살표 -->
  <text x="378" y="186" class="arrow">↓ 복사 후 역할 교환</text>
  <!-- after -->
  <rect x="330" y="194" width="112" height="18" rx="3" fill="#1a1a1a" stroke="#555" stroke-dasharray="3,2"/>
  <text x="362" y="207" class="note">비어 있음</text>
  <rect x="460" y="194" width="26" height="18" rx="3" fill="#81c784"/><text x="467" y="207" class="chip">A</text>
  <rect x="490" y="194" width="26" height="18" rx="3" fill="#81c784"/><text x="497" y="207" class="chip">B</text>
  <rect x="520" y="194" width="26" height="18" rx="3" fill="#81c784"/><text x="527" y="207" class="chip">D</text>
  <rect x="550" y="194" width="22" height="18" rx="3" fill="#1a1a1a" stroke="#555" stroke-dasharray="3,2"/>
  <!-- 평가 -->
  <text x="330" y="232" class="good">✓ 단편화 없음</text>
  <text x="330" y="248" class="good">✓ Bump-the-pointer → 할당 빠름</text>
  <text x="330" y="264" class="bad">✗ 메모리 50% 낭비</text>
  <text x="330" y="280" class="note">→ 신세대(저생존율)에 적합</text>

  <!-- 마크-컴팩트 카드 -->
  <rect x="596" y="120" width="268" height="174" rx="6" fill="#141414" stroke="#3a3a3a" stroke-width="1"/>
  <text x="612" y="142" class="slabel">마크-컴팩트 (Mark-Compact)</text>
  <!-- before -->
  <rect x="612" y="152" width="26" height="18" rx="3" fill="#81c784"/><text x="619" y="165" class="chip">A</text>
  <rect x="642" y="152" width="26" height="18" rx="3" fill="#81c784"/><text x="649" y="165" class="chip">B</text>
  <rect x="672" y="152" width="26" height="18" rx="3" fill="#e57373"/><text x="679" y="165" class="chip">C</text>
  <rect x="702" y="152" width="26" height="18" rx="3" fill="#81c784"/><text x="709" y="165" class="chip">D</text>
  <rect x="732" y="152" width="26" height="18" rx="3" fill="#e57373"/><text x="739" y="165" class="chip">E</text>
  <rect x="762" y="152" width="26" height="18" rx="3" fill="#81c784"/><text x="769" y="165" class="chip">F</text>
  <!-- 화살표 -->
  <text x="688" y="186" class="arrow">↓ 한쪽으로 압축</text>
  <!-- after -->
  <rect x="612" y="194" width="26" height="18" rx="3" fill="#81c784"/><text x="619" y="207" class="chip">A</text>
  <rect x="642" y="194" width="26" height="18" rx="3" fill="#81c784"/><text x="649" y="207" class="chip">B</text>
  <rect x="672" y="194" width="26" height="18" rx="3" fill="#81c784"/><text x="679" y="207" class="chip">D</text>
  <rect x="702" y="194" width="26" height="18" rx="3" fill="#81c784"/><text x="709" y="207" class="chip">F</text>
  <rect x="732" y="194" width="56" height="18" rx="3" fill="#1a1a1a" stroke="#555" stroke-dasharray="3,2"/>
  <!-- 평가 -->
  <text x="612" y="232" class="good">✓ 단편화 없음, 낭비 없음</text>
  <text x="612" y="248" class="good">✓ Bump-the-pointer 가능</text>
  <text x="612" y="264" class="bad">✗ 이동 비용 큼 (참조 전부 갱신)</text>
  <text x="612" y="280" class="note">→ 구세대에 적합</text>

  <!-- ══════════════════════════════════════════════
       섹션 B — JVM 힙 레이아웃
       y=328 ~ 534, height=206
  ══════════════════════════════════════════════ -->
  <rect x="18" y="328" width="864" height="206" rx="8" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="32" y="350" class="shead">② JVM 힙 레이아웃 — Young과 Old의 분리</text>
  <text x="32" y="366" class="sdesc">같은 힙 메모리를 논리적으로 나눠 영역마다 다른 알고리즘·다른 빈도로 GC를 수행한다</text>

  <!-- 힙 전체 테두리 -->
  <text x="400" y="384" class="rlabel" text-anchor="middle">JVM 힙 (예: -Xmx4g, NewRatio=2 → Young 1/3 · Old 2/3)</text>
  <rect x="32" y="392" width="836" height="112" rx="6" fill="#111" stroke="#444" stroke-width="1.5"/>

  <!-- Young 영역 -->
  <rect x="36" y="396" width="360" height="104" rx="4" fill="#1a2a3a" stroke="#4a8ab0" stroke-width="1.2"/>
  <text x="216" y="412" class="region" text-anchor="middle">Young Generation (~1/3)</text>
  <text x="216" y="426" class="rlabel" text-anchor="middle">Minor GC · 자주 · 빠름 · 마크-카피</text>

  <!-- Eden -->
  <rect x="44"  y="432" width="192" height="56" rx="3" fill="#1e3a4a" stroke="#4a8ab0" stroke-width="1"/>
  <text x="140" y="451" class="slabel" text-anchor="middle">Eden</text>
  <text x="140" y="466" class="scode" text-anchor="middle">80%</text>
  <text x="140" y="480" class="rlabel" text-anchor="middle">새 객체 할당 (TLAB)</text>

  <!-- S0 -->
  <rect x="244" y="432" width="68" height="56" rx="3" fill="#0f2a1a" stroke="#4ab080" stroke-width="1"/>
  <text x="278" y="451" class="slabel" text-anchor="middle">S0</text>
  <text x="278" y="466" class="scode" text-anchor="middle">10%</text>
  <text x="278" y="480" class="rlabel" text-anchor="middle">비어 있음</text>

  <!-- S1 -->
  <rect x="320" y="432" width="68" height="56" rx="3" fill="#2a1f0a" stroke="rgb(212,168,83)" stroke-width="1"/>
  <text x="354" y="451" class="slabel" text-anchor="middle">S1</text>
  <text x="354" y="466" class="scode" text-anchor="middle">10%</text>
  <text x="354" y="480" class="rlabel" text-anchor="middle">사용 중 (age 1~)</text>

  <!-- Old 영역 -->
  <rect x="404" y="396" width="460" height="104" rx="4" fill="#1e1a2a" stroke="#8a70c0" stroke-width="1.2"/>
  <text x="634" y="412" class="region" text-anchor="middle">Old Generation (~2/3)</text>
  <text x="634" y="426" class="rlabel" text-anchor="middle">Full GC · 드물게 · 무거움 · 마크-컴팩트</text>

  <!-- Old 내부 객체 표현 -->
  <rect x="416" y="432" width="436" height="62" rx="3" fill="#161224" stroke="#8a70c0" stroke-width="1"/>
  <text x="444" y="451" class="slabel">오래 산 객체들</text>
  <text x="444" y="470" class="rlabel">age ≥ MaxTenuringThreshold(기본 15) 도달 또는 Survivor 오버플로 승격</text>
  <text x="444" y="487" class="rlabel">CMS는 마크-스윕만 적용(동시 수행) → 단편화 누적 → Full GC로 지연 컴팩트</text>

  <!-- NewRatio 레이블 -->
  <line x1="396" y1="392" x2="396" y2="504" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="396" y="520" class="scode" text-anchor="middle">-XX:NewRatio=2</text>

  <g transform="translate(0, 24)">
  <!-- ══════════════════════════════════════════════
       섹션 C — 객체 승격 경로
       y=528 ~ 700, height=172
  ══════════════════════════════════════════════ -->
  <rect x="18" y="528" width="864" height="172" rx="8" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="32" y="550" class="shead">③ 객체 승격 경로 — Eden → Survivor → Old</text>
  <text x="32" y="566" class="sdesc">Minor GC를 넘길 때마다 age가 오르고 임계값에 달하면 구세대로 승격된다</text>

  <!-- 흐름 박스들 -->
  <!-- new 객체 -->
  <rect x="36"  y="578" width="100" height="44" rx="5" fill="#1e2a1e" stroke="#4ab080" stroke-width="1.2"/>
  <text x="86"  y="596" class="slabel" text-anchor="middle">new 객체</text>
  <text x="86"  y="612" class="rlabel" text-anchor="middle">생성</text>

  <!-- 화살표 -->
  <line x1="136" y1="600" x2="168" y2="600" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Eden -->
  <rect x="170" y="578" width="100" height="44" rx="5" fill="#1e3a4a" stroke="#4a8ab0" stroke-width="1.2"/>
  <text x="220" y="596" class="slabel" text-anchor="middle">Eden</text>
  <text x="220" y="612" class="rlabel" text-anchor="middle">TLAB 할당</text>

  <!-- Minor GC 생존 화살표 -->
  <line x1="270" y1="600" x2="302" y2="600" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="286" y="594" class="note" text-anchor="middle">생존</text>

  <!-- Survivor age=1 -->
  <rect x="304" y="578" width="110" height="44" rx="5" fill="#2a2a1a" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="359" y="596" class="slabel" text-anchor="middle">Survivor</text>
  <text x="359" y="612" class="scode" text-anchor="middle">age = 1</text>

  <!-- age++ 화살표 -->
  <line x1="414" y1="600" x2="446" y2="600" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="430" y="594" class="note" text-anchor="middle">+1</text>

  <!-- Survivor age++ -->
  <rect x="448" y="578" width="110" height="44" rx="5" fill="#2a2a1a" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="503" y="596" class="slabel" text-anchor="middle">Survivor</text>
  <text x="503" y="612" class="scode" text-anchor="middle">age++</text>

  <!-- age 임계 화살표 -->
  <line x1="558" y1="600" x2="590" y2="600" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="574" y="590" class="note" text-anchor="middle">≥ 15</text>

  <!-- Old -->
  <rect x="592" y="578" width="110" height="44" rx="5" fill="#1e1a2a" stroke="#8a70c0" stroke-width="1.2"/>
  <text x="647" y="596" class="slabel" text-anchor="middle">Old</text>
  <text x="647" y="612" class="rlabel" text-anchor="middle">구세대 승격</text>

  <!-- 큰 객체 직행 화살표 -->
  <line x1="647" y1="622" x2="647" y2="648" stroke="#e57373" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- Promotion Failure 박스 -->
  <rect x="448" y="640" width="270" height="48" rx="5" fill="#2a1414" stroke="#e57373" stroke-width="1.2"/>
  <text x="583" y="658" class="bad" text-anchor="middle">⚠ Promotion Failure</text>
  <text x="583" y="673" class="rlabel" text-anchor="middle">Survivor 부족 → age 미달이어도 Old 강제 승격</text>
  <text x="583" y="685" class="rlabel" text-anchor="middle">Old마저 가득 차면 Full GC 유발</text>

  <!-- 큰 객체 박스 -->
  <rect x="36" y="640" width="190" height="36" rx="5" fill="#1e1218" stroke="#e57373" stroke-width="1"/>
  <text x="131" y="655" class="slabel" text-anchor="middle">큰 객체 (배열·문자열)</text>
  <text x="131" y="669" class="rlabel" text-anchor="middle">PretenureSizeThreshold 초과 → Old 직행</text>

  <!-- ══════════════════════════════════════════════
       섹션 D — 카드 테이블
       y=718 ~ 1002, height=284
  ══════════════════════════════════════════════ -->
  <rect x="18" y="718" width="864" height="284" rx="8" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="32" y="740" class="shead">④ 카드 테이블 — 세대 간 참조 추적</text>
  <text x="32" y="756" class="sdesc">구세대 객체가 신세대를 참조할 때 Minor GC가 그 신세대 객체를 살아 있다고 판정하려면 구세대도 봐야 한다</text>
  <text x="32" y="774" class="sdesc">구세대 전체를 매번 스캔하면 Minor GC가 무거워지므로, 핫스팟은 512바이트 단위 카드로 쪼개 dirty 카드만 스캔한다</text>

  <!-- 구세대 카드 시각화 -->
  <text x="32" y="806" class="slabel">구세대 (512B 단위 카드로 분할)</text>

  <!-- 카드 블록들 -->
  <rect x="32"  y="818" width="72" height="40" rx="3" fill="#1e1a2a" stroke="#555" stroke-width="1"/>
  <text x="68"  y="834" class="rlabel" text-anchor="middle">카드 0</text>
  <text x="68"  y="850" class="note" text-anchor="middle">clean</text>

  <rect x="112" y="818" width="72" height="40" rx="3" fill="#2a1a1a" stroke="#e57373" stroke-width="1.5"/>
  <text x="148" y="834" class="rlabel" text-anchor="middle">카드 1</text>
  <text x="148" y="850" class="bad" text-anchor="middle">dirty ★</text>

  <rect x="192" y="818" width="72" height="40" rx="3" fill="#1e1a2a" stroke="#555" stroke-width="1"/>
  <text x="228" y="834" class="rlabel" text-anchor="middle">카드 2</text>
  <text x="228" y="850" class="note" text-anchor="middle">clean</text>

  <rect x="272" y="818" width="72" height="40" rx="3" fill="#1e1a2a" stroke="#555" stroke-width="1"/>
