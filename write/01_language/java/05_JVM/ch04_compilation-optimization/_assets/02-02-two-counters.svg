<svg viewBox="0 0 900 460" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>두 카운터가 핫함을 판정하는 흐름 — 호출 카운터와 백에지 카운터</title>
  <desc>JIT는 두 종류의 카운터로 핫 코드를 판정한다. 호출 카운터는 메서드가 호출된 횟수를 세어 임곗값을 넘으면 핫 메서드로 판정해 컴파일한다. 백에지 카운터는 루프가 뒤로 점프한 횟수, 곧 반복 횟수를 세어 임곗값을 넘으면 핫 루프로 판정한다. 핫 루프는 메서드가 도는 도중이라 OSR로 스택 위에서 컴파일된 코드로 갈아끼운다. 메서드 호출 없이 연산만 하는 루프는 호출 카운터가 오르지 않으므로 백에지 카운터라야 잡힌다.</desc>
  <defs>
    <style>
      .title { font-size: 17px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11.5px; fill: rgb(138,133,128); }
      .box   { font-size: 12.5px; font-weight: 800; fill: #0d0d0d; }
      .desc  { font-size: 10.5px; fill: #0d0d0d; }
      .note  { font-size: 9.5px; fill: rgb(138,133,128); }
      .elbl  { font-size: 10px; font-weight: 700; fill: #e8e4df; }
    </style>
    <marker id="c1" markerWidth="11" markerHeight="11" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="460" fill="#0d0d0d"/>
  <text x="28" y="36" class="title">두 카운터가 핫함을 판정한다</text>
  <text x="28" y="56" class="sub" style="fill:#e8e4df">호출 카운터 = 메서드가 몇 번 불렸나 · 백에지 카운터 = 루프가 몇 바퀴 돌았나 — 서로 다른 핫함을 잡는다</text>

  <!-- 시작 -->
  <rect x="28" y="92" width="150" height="64" rx="9" fill="#5b9bd5"/>
  <text x="103" y="120" class="elbl" text-anchor="middle" style="fill:#e8e4df">바이트코드 실행</text>
  <text x="103" y="140" class="note" text-anchor="middle" style="fill:#e8e4df">(0단계 인터프리터)</text>

  <!-- 위 경로: 호출 카운터 -->
  <rect x="240" y="74" width="250" height="64" rx="9" fill="rgb(212,168,83)"/>
  <text x="256" y="98" class="box">호출 카운터 ++</text>
  <text x="256" y="118" class="desc">메서드가 호출될 때마다</text>
  <text x="256" y="132" class="note" style="fill:#3a2c0a">메서드 진입 시점에 셈</text>

  <rect x="548" y="74" width="150" height="64" rx="9" fill="#66bb6a"/>
  <text x="623" y="100" class="box" text-anchor="middle">핫 메서드</text>
  <text x="623" y="122" class="note" text-anchor="middle" style="fill:#14521d">다음 호출 때 컴파일본 실행</text>

  <!-- 아래 경로: 백에지 카운터 -->
  <rect x="240" y="158" width="250" height="64" rx="9" fill="rgb(212,168,83)"/>
  <text x="256" y="182" class="box">백에지 카운터 ++</text>
  <text x="256" y="202" class="desc">루프가 뒤로 점프할 때마다</text>
  <text x="256" y="216" class="note" style="fill:#3a2c0a">한 바퀴 = 백에지 1회 (goto)</text>

  <rect x="548" y="158" width="150" height="64" rx="9" fill="#66bb6a"/>
  <text x="623" y="184" class="box" text-anchor="middle">핫 루프</text>
  <text x="623" y="206" class="note" text-anchor="middle" style="fill:#14521d">OSR — 도는 도중 갈아끼움</text>

  <!-- 화살표 -->
  <line x1="178" y1="116" x2="238" y2="106" stroke="rgb(212,168,83)" stroke-width="2.2" marker-end="url(#c1)"/>
  <line x1="178" y1="132" x2="238" y2="190" stroke="rgb(212,168,83)" stroke-width="2.2" marker-end="url(#c1)"/>
  <line x1="490" y1="106" x2="546" y2="106" stroke="rgb(212,168,83)" stroke-width="2.2" marker-end="url(#c1)"/>
  <text x="518" y="98" class="note" text-anchor="middle" style="fill:#e8e4df">임곗값 ↑</text>
  <line x1="490" y1="190" x2="546" y2="190" stroke="rgb(212,168,83)" stroke-width="2.2" marker-end="url(#c1)"/>
  <text x="518" y="182" class="note" text-anchor="middle" style="fill:#e8e4df">임곗값 ↑</text>

  <!-- 하단 핵심 -->
  <rect x="28" y="250" width="844" height="186" rx="10" fill="rgba(91,155,213,0.07)" stroke="#5b9bd5" stroke-width="1.2"/>
  <text x="48" y="276" class="sub" font-weight="800" style="fill:#e8e4df">핵심 — 왜 카운터가 둘인가</text>
  <text x="48" y="302" class="note" style="fill:#e8e4df">· 호출 카운터만 있으면 "1번 호출됐지만 안에서 1억 번 도는 메서드"를 놓친다 — 호출 카운터는 1뿐이라.</text>
  <text x="48" y="326" class="note" style="fill:#e8e4df">· 특히 루프 안이 메서드 호출 없이 연산만 하면(sum += i*2) 호출 카운터가 전혀 안 오른다.</text>
  <text x="48" y="350" class="note" style="fill:#e8e4df">· 그래서 백에지 카운터가 반복 횟수를 따로 세어 그런 핫 루프를 잡는다.</text>
  <text x="48" y="374" class="note" style="fill:#e8e4df">· 핫 메서드는 보통 다음 호출 때 컴파일본으로 바뀌지만, 핫 루프는 메서드가 도는 중이라 다음 호출을 못 기다린다.</text>
  <text x="48" y="398" class="note" style="fill:#e8e4df">· 그래서 OSR(On-Stack Replacement)로 스택 위에서 실행 중인 메서드를 컴파일본으로 갈아끼운다.</text>
  <text x="48" y="422" class="note" style="fill:#e8e4df">· 두 카운터는 호출 빈도와 반복 빈도라는 서로 다른 핫함을 잡으므로, 하나로는 부족하다.</text>
</svg>
