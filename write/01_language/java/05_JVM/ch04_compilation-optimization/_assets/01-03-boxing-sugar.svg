<svg viewBox="0 0 900 580" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>자동 박싱의 Integer 캐시 함정과 구문 설탕 펼치기</title>
  <desc>자동 박싱은 Integer.valueOf 로 펼쳐지는데, valueOf 는 -128부터 127까지의 값을 캐시해 같은 객체를 돌려준다. 그래서 Integer 100 == 100 은 같은 캐시 객체라 true 지만, 200 == 200 은 캐시 범위 밖이라 새 객체가 둘 생겨 false 다. 향상된 for 는 Iterator 호출로 펼쳐지고, 조건 컴파일은 if(true) 같은 상수 조건의 분기를 컴파일 시점에 제거한다.</desc>
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11.5px; fill: rgb(138,133,128); }
      .h     { font-size: 12px; font-weight: 800; fill: #0d0d0d; }
      .note  { font-size: 9.5px; fill: rgb(138,133,128); }
      .mono  { font-size: 9.5px; font-family: 'JetBrains Mono', monospace; fill: rgba(13,13,13,0.82); font-weight: 700; }
      .monoy { font-size: 9.5px; font-family: 'JetBrains Mono', monospace; fill: rgb(212,168,83); font-weight: 700; }
    </style>
  </defs>

  <rect x="0" y="0" width="900" height="580" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">자동 박싱의 Integer 캐시 함정 · 구문 설탕 펼치기</text>
  <text x="28" y="58" class="sub" style="fill:#e8e4df">valueOf 는 -128~127 캐시 → == 비교가 100은 true, 200은 false · for·조건 컴파일도 설탕</text>

  <!-- Integer 캐시 함정 -->
  <rect x="28" y="84" width="844" height="232" rx="11" fill="rgba(244,67,54,0.07)" stroke="#f44336" stroke-width="1.5"/>
  <text x="48" y="110" class="sub" font-weight="800" style="fill:#e8e4df">함정 — Integer 캐시와 == 비교</text>

  <rect x="44" y="124" width="400" height="100" rx="7" fill="#0d0d0d"/>
  <text x="56" y="146" class="monoy">Integer a = 100, b = 100;</text>
  <text x="56" y="166" class="monoy">Integer c = 200, d = 200;</text>
  <text x="56" y="190" class="mono" style="fill:#66bb6a">a == b  →  true   (100: 캐시 범위 안)</text>
  <text x="56" y="210" class="mono" style="fill:#f44336">c == d  →  false  (200: 캐시 범위 밖)</text>

  <rect x="460" y="124" width="396" height="100" rx="7" fill="#0d0d0d"/>
  <text x="472" y="146" class="note" style="fill:#e8e4df">자동 박싱은 Integer.valueOf(int) 로 펼쳐짐</text>
  <text x="472" y="168" class="monoy">valueOf(-128..127) → 캐시 객체 재사용</text>
  <text x="472" y="188" class="monoy">valueOf(그 밖)      → new Integer 생성</text>
  <text x="472" y="210" class="note" style="fill:#e8e4df">== 는 참조 비교라 캐시 여부가 결과를 가름</text>

  <text x="44" y="250" class="note" style="fill:#e8e4df">100 은 -128~127 안 → a·b 가 *같은 캐시 객체* → == 가 true.</text>
  <text x="44" y="270" class="note" style="fill:#e8e4df">200 은 범위 밖 → c·d 가 *각각 새 객체* → == 가 false. 값 비교는 항상 .equals() 또는 언박싱으로.</text>
  <text x="44" y="296" class="note" style="fill:#e8e4df">교훈: 래퍼 타입은 == 로 비교하지 않는다. 캐시 범위에 따라 결과가 달라지는 미묘한 버그가 된다.</text>

  <!-- 향상된 for -->
  <rect x="28" y="332" width="412" height="220" rx="11" fill="rgba(91,155,213,0.08)" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="48" y="358" class="sub" font-weight="800" style="fill:#e8e4df">향상된 for — Iterator 로 펼침</text>
  <rect x="44" y="372" width="380" height="58" rx="6" fill="#5b9bd5"/>
  <text x="56" y="392" class="h" style="fill:#e8e4df">설탕 (소스)</text>
  <text x="56" y="414" class="mono" style="fill:#e8e4df">for (Integer i : list) { sum += i; }</text>
  <text x="220" y="452" class="sub" text-anchor="middle" style="fill:#e8e4df">↓ 펼침</text>
  <rect x="44" y="464" width="380" height="74" rx="6" fill="rgb(212,168,83)"/>
  <text x="56" y="484" class="h">펼친 결과 (바이트코드)</text>
  <text x="56" y="504" class="mono" style="fill:#0d0d0d">Iterator it = list.iterator();</text>
  <text x="56" y="522" class="mono" style="fill:#0d0d0d">while (it.hasNext()) { sum += it.next(); }</text>

  <!-- 조건 컴파일 -->
  <rect x="460" y="332" width="412" height="220" rx="11" fill="rgba(102,187,106,0.08)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="480" y="358" class="sub" font-weight="800" style="fill:#e8e4df">조건 컴파일 — 상수 분기 제거</text>
  <rect x="476" y="372" width="380" height="58" rx="6" fill="#66bb6a"/>
  <text x="488" y="392" class="h">설탕 (소스)</text>
  <text x="488" y="414" class="mono" style="fill:#0d0d0d">if (true) { A(); } else { B(); }</text>
  <text x="652" y="452" class="sub" text-anchor="middle" style="fill:#e8e4df">↓ 펼침</text>
  <rect x="476" y="464" width="380" height="74" rx="6" fill="rgb(212,168,83)"/>
  <text x="488" y="484" class="h">펼친 결과 (바이트코드)</text>
  <text x="488" y="504" class="mono" style="fill:#0d0d0d">A();   // else 가지 통째로 제거됨</text>
  <text x="488" y="524" class="note" style="fill:#0d0d0d">상수 조건이면 분기 자체를 컴파일 때 삭제 (C #ifdef 대체)</text>
</svg>
