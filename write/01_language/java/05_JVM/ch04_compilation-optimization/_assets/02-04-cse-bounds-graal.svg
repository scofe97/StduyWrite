<svg viewBox="0 0 900 560" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>공통 하위 표현식 제거, 배열 경계 검사 제거, Graal 컴파일러</title>
  <desc>공통 하위 표현식 제거는 b 곱하기 c 같은 같은 부분식이 두 번 나오고 그 사이 변수가 바뀌지 않으면 한 번만 계산해 재사용한다. 배열 경계 검사 제거는 for 루프 범위가 배열 길이와 묶여 인덱스가 항상 0 이상 length 미만임을 증명할 때 매 접근의 경계 검사를 생략한다. 두 최적화 모두 증명할 수 있을 때만 안전하게 지운다. Graal은 C++로 짠 C2를 대체하려는, 자바로 작성된 차세대 JIT 컴파일러로 JVMCI로 HotSpot에 끼어들고 GraalVM의 토대가 된다.</desc>
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11.5px; fill: rgb(138,133,128); }
      .h     { font-size: 12px; font-weight: 800; fill: #0d0d0d; }
      .note  { font-size: 9.5px; fill: rgb(138,133,128); }
      .mono  { font-size: 9px; font-family: 'JetBrains Mono', monospace; fill: rgba(13,13,13,0.82); font-weight: 700; }
      .monoy { font-size: 9px; font-family: 'JetBrains Mono', monospace; fill: rgb(212,168,83); }
    </style>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="560" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">공통식 제거 · 경계 검사 제거 · Graal</text>
  <text x="28" y="58" class="sub" style="fill:#e8e4df">둘 다 “증명할 수 있을 때만” 안전하게 지운다 · 컴파일러 자신도 진화 (C2 → Graal)</text>

  <!-- 공통 하위 표현식 제거 -->
  <rect x="28" y="84" width="412" height="190" rx="11" fill="rgba(91,155,213,0.08)" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="48" y="110" class="sub" font-weight="800" style="fill:#e8e4df">① 공통 하위 표현식 제거</text>
  <rect x="44" y="124" width="380" height="48" rx="6" fill="#5b9bd5"/>
  <text x="56" y="144" class="h" style="fill:#e8e4df">전</text>
  <text x="56" y="164" class="mono" style="fill:#e8e4df">int d = (c*b)*12 + a + (a + b*c);</text>
  <rect x="44" y="186" width="380" height="58" rx="6" fill="rgb(212,168,83)"/>
  <text x="56" y="206" class="h">후 — b*c 를 한 번만 계산해 재사용</text>
  <text x="56" y="224" class="mono" style="fill:#0d0d0d">int E = b*c;</text>
  <text x="56" y="240" class="mono" style="fill:#0d0d0d">int d = E*12 + a + (a + E);</text>
  <text x="48" y="266" class="note" style="fill:#e8e4df">조건: 두 사용 사이 b·c 가 바뀌지 않아야 안전.</text>

  <!-- 배열 경계 검사 제거 -->
  <rect x="460" y="84" width="412" height="190" rx="11" fill="rgba(102,187,106,0.08)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="480" y="110" class="sub" font-weight="800" style="fill:#e8e4df">② 배열 경계 검사 제거</text>
  <text x="480" y="134" class="note" style="fill:#e8e4df">자바는 arr[i] 마다 0 &lt;= i &lt; arr.length 검사</text>
  <text x="480" y="152" class="note" style="fill:#e8e4df">(벗어나면 ArrayIndexOutOfBoundsException).</text>
  <rect x="476" y="162" width="380" height="58" rx="6" fill="#66bb6a"/>
  <text x="488" y="182" class="h">루프 범위가 길이와 묶이면</text>
  <text x="488" y="200" class="mono" style="fill:#0d0d0d">for (int i=0; i &lt; arr.length; i++)</text>
  <text x="488" y="216" class="mono" style="fill:#0d0d0d">  sum += arr[i];  // i 항상 안전</text>
  <text x="480" y="244" class="note" style="fill:#e8e4df">→ i 가 언제나 범위 안임을 증명 →</text>
  <text x="480" y="262" class="note" style="fill:#e8e4df">  매 반복의 경계 검사 통째로 생략</text>

  <!-- 공통 원리 -->
  <rect x="28" y="298" width="844" height="44" rx="9" fill="rgba(212,168,83,0.1)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="450" y="326" class="sub" text-anchor="middle" font-weight="800" style="fill:#e8e4df">공통 원리 — 지운 뒤에도 의미가 정확히 같음을 *증명*할 수 있을 때만 지운다</text>

  <!-- Graal -->
  <rect x="28" y="366" width="844" height="170" rx="11" fill="rgba(244,67,54,0.05)" stroke="#f44336" stroke-width="1.5"/>
  <text x="48" y="392" class="sub" font-weight="800" style="fill:#e8e4df">③ Graal — 자바로 짠 차세대 컴파일러 (실전, §11.5)</text>

  <rect x="48" y="408" width="360" height="108" rx="8" fill="#0d0d0d"/>
  <text x="64" y="430" class="note" style="fill:#e8e4df">C2 (서버 컴파일러)</text>
  <text x="64" y="452" class="monoy">C++ 로 작성</text>
  <text x="64" y="474" class="note" style="fill:#e8e4df">오래 HotSpot 최고 성능 담당</text>
  <text x="64" y="496" class="note" style="fill:#e8e4df">한계: 복잡 · 새 최적화 추가 어려움</text>

  <rect x="492" y="408" width="360" height="108" rx="8" fill="rgb(212,168,83)"/>
  <text x="508" y="430" class="h">Graal</text>
  <text x="508" y="452" class="mono" style="fill:#0d0d0d">자바 로 작성 → 읽고 고치기 쉬움</text>
  <text x="508" y="474" class="mono" style="fill:#0d0d0d">JVMCI 로 HotSpot 에 끼어들어 C2 대체</text>
  <text x="508" y="496" class="note" style="fill:#0d0d0d">GraalVM(네이티브 이미지)의 토대</text>

  <line x1="408" y1="462" x2="490" y2="462" stroke="#f44336" stroke-width="2.5" marker-end="url(#a1)"/>
  <text x="449" y="454" class="note" text-anchor="middle" style="fill:#e8e4df">대체</text>
</svg>
