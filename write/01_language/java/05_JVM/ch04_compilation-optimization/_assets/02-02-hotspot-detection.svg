<svg viewBox="0 0 900 580" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>컴파일 대상 두 종류와 카운터 기반 핫스폿 탐지, OSR</title>
  <desc>JIT 컴파일 대상은 여러 번 호출되는 핫 메서드와 여러 번 도는 핫 루프 두 종류다. 호출 카운터는 메서드 호출 횟수를, 백에지 카운터는 루프가 뒤로 점프하는 횟수를 센다. 둘 중 하나가 CompileThreshold 임곗값을 넘으면 백그라운드 스레드가 비동기로 컴파일한다. 핫 루프는 메서드가 끝나길 기다릴 수 없어, OSR 스택 위 교체로 실행 중인 인터프리터 프레임을 그 자리에서 컴파일된 코드로 갈아끼운다.</desc>
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11.5px; fill: rgb(138,133,128); }
      .h     { font-size: 12px; font-weight: 800; fill: #0d0d0d; }
      .note  { font-size: 9.5px; fill: rgb(138,133,128); }
      .mono  { font-size: 9.5px; font-family: 'JetBrains Mono', monospace; fill: rgb(212,168,83); }
    </style>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="580" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">컴파일 대상과 핫스폿 탐지</text>
  <text x="28" y="58" class="sub" style="fill:#e8e4df">호출 카운터 + 백에지 카운터 → 임곗값(-XX:CompileThreshold) 초과 시 백그라운드 비동기 컴파일</text>

  <!-- 두 대상 -->
  <rect x="28" y="84" width="412" height="186" rx="11" fill="rgba(91,155,213,0.08)" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="48" y="110" class="sub" font-weight="800" style="fill:#e8e4df">① 핫 메서드 — 여러 번 호출되는 메서드</text>
  <rect x="44" y="124" width="380" height="60" rx="6" fill="#0d0d0d"/>
  <text x="56" y="146" class="mono">호출 카운터 (invocation counter)</text>
  <text x="56" y="166" class="note" style="fill:#e8e4df">메서드가 불릴 때마다 +1</text>
  <text x="48" y="206" class="note" style="fill:#e8e4df">자주 불리는 메서드 전체를 컴파일 대상으로.</text>
  <text x="48" y="226" class="note" style="fill:#e8e4df">반감기(decay) 있음 → 절대 횟수 아닌 *빈도*.</text>
  <text x="48" y="250" class="note" style="fill:#e8e4df">최근 집중 호출된 메서드를 핫으로 판정.</text>

  <rect x="460" y="84" width="412" height="186" rx="11" fill="rgba(102,187,106,0.08)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="480" y="110" class="sub" font-weight="800" style="fill:#e8e4df">② 핫 루프 — 여러 번 도는 루프 본문</text>
  <rect x="476" y="124" width="380" height="60" rx="6" fill="#0d0d0d"/>
  <text x="488" y="146" class="mono">백에지 카운터 (back edge counter)</text>
  <text x="488" y="166" class="note" style="fill:#e8e4df">루프가 뒤로 점프할 때마다 +1</text>
  <text x="480" y="206" class="note" style="fill:#e8e4df">메서드는 한 번 호출돼도 루프가 수만 번 돌면</text>
  <text x="480" y="226" class="note" style="fill:#e8e4df">그 루프 본문이 핫스폿. (예: main 안 거대 for)</text>
  <text x="480" y="250" class="note" style="fill:#e8e4df">백에지 = 루프 끝→처음 돌아가는 간선.</text>

  <!-- 임곗값 판정 -->
  <rect x="28" y="298" width="844" height="58" rx="9" fill="rgba(212,168,83,0.1)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="450" y="324" class="sub" text-anchor="middle" font-weight="800" style="fill:#e8e4df">카운터 &gt; -XX:CompileThreshold  →  컴파일 요청</text>
  <text x="450" y="344" class="note" text-anchor="middle" style="fill:#e8e4df">JIT 컴파일은 백그라운드 스레드에서 *비동기* — 기다리는 동안 인터프리터가 계속 실행</text>

  <!-- OSR -->
  <rect x="28" y="382" width="844" height="178" rx="11" fill="rgba(244,67,54,0.06)" stroke="#f44336" stroke-width="1.5"/>
  <text x="48" y="408" class="sub" font-weight="800" style="fill:#e8e4df">OSR — 스택 위 교체 (On-Stack Replacement)</text>
  <text x="48" y="432" class="note" style="fill:#e8e4df">문제: 한 번 호출되고 그 안에서 거대한 루프를 도는 메서드는 "다음 호출부터 컴파일본"이 통하지 않음 (다음 호출 없음).</text>

  <rect x="48" y="448" width="360" height="92" rx="8" fill="#5b9bd5"/>
  <text x="228" y="472" class="h" text-anchor="middle" style="fill:#e8e4df">실행 중 (인터프리터 프레임)</text>
  <text x="64" y="496" class="note" style="fill:#e8e4df">루프가 도는 도중 핫스폿 판정</text>
  <text x="64" y="518" class="note" style="fill:#e8e4df">메서드는 아직 실행 중</text>

  <rect x="492" y="448" width="360" height="92" rx="8" fill="rgb(212,168,83)"/>
  <text x="672" y="472" class="h" text-anchor="middle">그 자리에서 교체 (컴파일본)</text>
  <text x="508" y="496" class="note" style="fill:#0d0d0d">루프 돌던 지점 이어받아</text>
  <text x="508" y="518" class="note" style="fill:#0d0d0d">컴파일된 코드로 계속 실행</text>

  <line x1="408" y1="494" x2="490" y2="494" stroke="#f44336" stroke-width="2.5" marker-end="url(#a1)"/>
  <text x="449" y="486" class="note" text-anchor="middle" style="fill:#e8e4df">OSR</text>
</svg>
