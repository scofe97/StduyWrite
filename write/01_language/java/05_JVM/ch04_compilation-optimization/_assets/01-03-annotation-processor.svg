<svg viewBox="0 0 900 580" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>플러그인 애너테이션 처리기 — 컴파일 시점에 코드를 검사하고 생성</title>
  <desc>JSR-269 플러그인 애너테이션 처리 API는 컴파일 과정에 끼어들어 추상 구문 트리를 읽고 검사하거나 새 코드를 생성한다. NameCheckProcessor는 AbstractProcessor를 상속해 모든 애너테이션 타입을 처리 대상으로 잡고, NameChecker가 ElementScanner로 구문 트리를 순회하며 자바 명명 규약 위반을 컴파일 시점 경고로 낸다. 처리기가 새 코드를 생성하면 컴파일이 라운드를 반복한다.</desc>
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11.5px; fill: rgb(138,133,128); }
      .h     { font-size: 12px; font-weight: 800; fill: #0d0d0d; }
      .note  { font-size: 9.5px; fill: rgb(138,133,128); }
      .mono  { font-size: 9px; font-family: 'JetBrains Mono', monospace; fill: rgb(212,168,83); }
    </style>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="580" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">플러그인 애너테이션 처리기 (JSR-269)</text>
  <text x="28" y="58" class="sub" style="fill:#e8e4df">컴파일 과정에 끼어들어 AST 를 읽고 검사·생성 · NameChecker 가 명명 규약 위반을 컴파일 경고로</text>

  <!-- 동작 흐름 -->
  <rect x="28" y="84" width="180" height="120" rx="9" fill="#5b9bd5"/>
  <text x="118" y="108" class="h" text-anchor="middle" style="fill:#e8e4df">① 컴파일 시작</text>
  <text x="44" y="132" class="note" style="fill:#e8e4df">파싱 → AST 생성</text>
  <text x="44" y="152" class="note" style="fill:#e8e4df">(01-01 의 ① 단계)</text>
  <text x="44" y="176" class="note" style="fill:#e8e4df">처리기 등록되면</text>
  <text x="44" y="192" class="note" style="fill:#e8e4df">② 단계로 진입</text>

  <rect x="238" y="84" width="200" height="120" rx="9" fill="#66bb6a"/>
  <text x="338" y="108" class="h" text-anchor="middle">② NameCheckProcessor</text>
  <text x="254" y="132" class="note" style="fill:#0d0d0d">AbstractProcessor 상속</text>
  <text x="254" y="152" class="mono" style="fill:#0d0d0d">@SupportedAnnotation</text>
  <text x="254" y="168" class="mono" style="fill:#0d0d0d">  Types("*")  ← 전부</text>
  <text x="254" y="190" class="note" style="fill:#0d0d0d">process() 가 진입점</text>

  <rect x="468" y="84" width="200" height="120" rx="9" fill="rgb(212,168,83)"/>
  <text x="568" y="108" class="h" text-anchor="middle">③ NameChecker</text>
  <text x="484" y="132" class="note" style="fill:#0d0d0d">ElementScanner 로</text>
  <text x="484" y="152" class="note" style="fill:#0d0d0d">구문 트리 순회</text>
  <text x="484" y="172" class="note" style="fill:#0d0d0d">클래스·메서드·변수</text>
  <text x="484" y="192" class="note" style="fill:#0d0d0d">이름을 하나씩 검사</text>

  <rect x="698" y="84" width="174" height="120" rx="9" fill="rgba(244,67,54,0.1)" stroke="#f44336" stroke-width="1.2"/>
  <text x="785" y="108" class="h" text-anchor="middle" style="fill:#e8e4df">④ 컴파일 경고</text>
  <text x="714" y="132" class="note" style="fill:#e8e4df">규약 위반 발견 시</text>
  <text x="714" y="152" class="note" style="fill:#e8e4df">Messager 로 WARNING</text>
  <text x="714" y="172" class="note" style="fill:#e8e4df">출력 (컴파일은 계속)</text>
  <text x="714" y="192" class="note" style="fill:#e8e4df">생성하면 라운드 반복</text>

  <line x1="208" y1="144" x2="236" y2="144" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#a1)"/>
  <line x1="438" y1="144" x2="466" y2="144" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#a1)"/>
  <line x1="668" y1="144" x2="696" y2="144" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#a1)"/>

  <!-- 명명 규약 검사 표 -->
  <rect x="28" y="224" width="500" height="240" rx="11" fill="rgba(91,155,213,0.08)" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="48" y="250" class="sub" font-weight="800" style="fill:#e8e4df">NameChecker 가 보는 자바 명명 규약</text>
  <rect x="44" y="264" width="468" height="36" rx="5" fill="#0d0d0d"/>
  <text x="56" y="287" class="note" style="fill:#e8e4df">대상</text>
  <text x="220" y="287" class="note" style="fill:#e8e4df">규약</text>
  <text x="380" y="287" class="mono">예 (올바름)</text>
  <text x="56" y="324" class="note" style="fill:#e8e4df">클래스·인터페이스</text>
  <text x="220" y="324" class="note" style="fill:#e8e4df">UpperCamelCase</text>
  <text x="380" y="324" class="mono">NameChecker</text>
  <text x="56" y="352" class="note" style="fill:#e8e4df">메서드·필드·변수</text>
  <text x="220" y="352" class="note" style="fill:#e8e4df">lowerCamelCase</text>
  <text x="380" y="352" class="mono">checkClassName</text>
  <text x="56" y="380" class="note" style="fill:#e8e4df">상수(static final)</text>
  <text x="220" y="380" class="note" style="fill:#e8e4df">ALL_CAPS_SNAKE</text>
  <text x="380" y="380" class="mono">BADLY_NAMED_CODE</text>
  <text x="48" y="416" class="note" style="fill:#e8e4df">위반 예: enum 상수 red/green 이 소문자 → "ALL_CAPS 가 아님" 경고.</text>
  <text x="48" y="438" class="note" style="fill:#e8e4df">클래스 nowarning 이 소문자 시작 → "UpperCamelCase 가 아님" 경고.</text>
  <text x="48" y="458" class="note" style="fill:#e8e4df">컴파일을 막지 않고 *경고* 만 — 코드 규약 자동 검사 도구로 동작.</text>

  <!-- 의의 -->
  <rect x="548" y="224" width="324" height="240" rx="11" fill="rgba(102,187,106,0.08)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="568" y="250" class="sub" font-weight="800" style="fill:#e8e4df">의의 — 컴파일 시점 확장 지점</text>
  <text x="564" y="276" class="note" style="fill:#e8e4df">· 애너테이션 처리기는 javac 파이프라인에</text>
  <text x="564" y="294" class="note" style="fill:#e8e4df">  개발자가 끼어들 수 있는 유일한 지점</text>
  <text x="564" y="316" class="note" style="fill:#e8e4df">· 검사(NameChecker)뿐 아니라 *코드 생성* 도</text>
  <text x="564" y="334" class="note" style="fill:#e8e4df">  가능 — Lombok·MapStruct·Dagger 가 이 위에</text>
  <text x="564" y="356" class="note" style="fill:#e8e4df">· Element(요소) 모델로 AST 를 추상화 —</text>
  <text x="564" y="374" class="note" style="fill:#e8e4df">  PACKAGE·CLASS·METHOD·FIELD 등</text>
  <text x="564" y="396" class="note" style="fill:#e8e4df">· ElementScanner 의 visitor 패턴으로 순회</text>
  <text x="564" y="424" class="note" style="fill:#e8e4df">실무: 컴파일 시점 코드 생성·검증의 토대.</text>
  <text x="564" y="444" class="note" style="fill:#e8e4df">런타임 리플렉션보다 빠르고 안전하다.</text>
</svg>
