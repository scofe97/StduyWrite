<svg viewBox="0 0 680 360" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>da-ch10-ex1 누수 기제 — static 리스트가 Product를 붙들어 GC 회수 불가에서 OOM에서 자동 덤프 (원문 listing 10.1 개념도)</title>
  <desc>원문 listing 10.1 의 개념을 도식으로 옮긴 것입니다. da-ch10-ex1 의 Main 은 static 리스트 products 를 두고 무한 루프에서 Product 인스턴스를 만들어 계속 더합니다. static 리스트가 모든 Product 의 참조를 붙들고 있으므로 GC 는 그것들을 회수할 수 없습니다. 참조가 풀리지 않은 객체는 GC 가 아직 쓰인다고 보기 때문입니다. -Xmx100m 으로 힙을 100MB 로 제한하면 몇 초 만에 힙이 가득 차 OutOfMemoryError 가 나고, -XX:+HeapDumpOnOutOfMemoryError 설정 덕분에 그 순간 heapdump.bin 이 자동으로 생성됩니다.</desc>
  <rect x="0" y="0" width="680" height="360" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="16" font-weight="bold">누수 기제 — static 리스트가 GC 를 막는다</text>
  <text x="20" y="55" fill="rgb(138,133,128)" font-size="11">원문 listing 10.1 개념도 — da-ch10-ex1 (-Xmx100m)</text>

  <!-- static 리스트 -->
  <rect x="20" y="84" width="180" height="150" fill="rgba(244,127,114,0.08)" stroke="#f47f72" stroke-width="2"/>
  <text x="110" y="106" fill="#f47f72" font-size="12" font-weight="bold" text-anchor="middle">static products</text>
  <text x="110" y="124" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">Main 의 static 리스트</text>
  <!-- 참조 격자 -->
  <g fill="rgba(244,127,114,0.4)" stroke="#f47f72">
    <rect x="36" y="138" width="20" height="20"/><rect x="62" y="138" width="20" height="20"/><rect x="88" y="138" width="20" height="20"/><rect x="114" y="138" width="20" height="20"/><rect x="140" y="138" width="20" height="20"/><rect x="166" y="138" width="20" height="20"/>
    <rect x="36" y="164" width="20" height="20"/><rect x="62" y="164" width="20" height="20"/><rect x="88" y="164" width="20" height="20"/><rect x="114" y="164" width="20" height="20"/><rect x="140" y="164" width="20" height="20"/><rect x="166" y="164" width="20" height="20"/>
    <rect x="36" y="190" width="20" height="20"/><rect x="62" y="190" width="20" height="20"/><rect x="88" y="190" width="20" height="20"/><rect x="114" y="190" width="20" height="20"/><rect x="140" y="190" width="20" height="20"/><rect x="166" y="190" width="20" height="20"/>
  </g>
  <text x="110" y="226" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">Product 100만+ 참조 보유</text>

  <!-- while(true) 화살표 -->
  <text x="240" y="120" fill="#9cc3df" font-size="11" font-weight="bold" text-anchor="middle">while(true)</text>
  <text x="240" y="138" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">products.add(</text>
  <text x="240" y="152" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">new Product())</text>
  <line x1="200" y1="170" x2="290" y2="170" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <polygon points="290,170 282,166 282,174" fill="rgb(212,168,83)"/>

  <!-- GC 차단 -->
  <rect x="296" y="100" width="170" height="120" fill="rgb(20,20,20)" stroke="rgb(60,55,50)" stroke-width="1.5"/>
  <text x="381" y="124" fill="#66bb6a" font-size="12" font-weight="bold" text-anchor="middle">GC</text>
  <text x="381" y="150" fill="#e8e4df" font-size="10" text-anchor="middle">참조가 있는 객체는</text>
  <text x="381" y="168" fill="#e8e4df" font-size="10" text-anchor="middle">아직 쓰인다고 봄</text>
  <text x="381" y="194" fill="#f47f72" font-size="11" font-weight="bold" text-anchor="middle">→ 회수 불가</text>
  <text x="381" y="212" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">(static 이 붙들어서)</text>

  <!-- OOM 화살표 -->
  <line x1="466" y1="160" x2="510" y2="160" stroke="#f47f72" stroke-width="1.5"/>
  <polygon points="510,160 502,156 502,164" fill="#f47f72"/>

  <!-- OOM + 자동덤프 -->
  <rect x="512" y="100" width="148" height="120" fill="rgba(244,127,114,0.08)" stroke="#f47f72" stroke-width="2"/>
  <text x="586" y="126" fill="#f47f72" font-size="12" font-weight="bold" text-anchor="middle">힙 가득 참</text>
  <text x="586" y="150" fill="#f47f72" font-size="11" text-anchor="middle">OutOfMemoryError</text>
  <text x="586" y="172" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">(100MB 몇 초 만에)</text>
  <line x1="528" y1="182" x2="644" y2="182" stroke="rgb(60,55,50)"/>
  <text x="586" y="200" fill="rgb(212,168,83)" font-size="11" font-weight="bold" text-anchor="middle">→ heapdump.bin</text>
  <text x="586" y="214" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">자동 생성</text>

  <!-- 하단 -->
  <rect x="20" y="252" width="640" height="92" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="34" y="274" fill="#e8e4df" font-size="12" font-weight="bold">핵심</text>
  <text x="34" y="296" fill="#e8e4df" font-size="10.5">GC 는 참조가 없는 객체만 회수 → static 리스트가 모든 Product 를 붙들면 영원히 못 치움</text>
  <text x="34" y="318" fill="#e8e4df" font-size="10.5">이름에 난수를 붙인 건 10-02 에서 덤프를 읽을 때 쓰기 위함</text>
  <text x="34" y="338" fill="rgb(138,133,128)" font-size="9.5">-XX:+HeapDumpOnOutOfMemoryError 가 OOM 순간을 얼려 붙든다</text>
</svg>
