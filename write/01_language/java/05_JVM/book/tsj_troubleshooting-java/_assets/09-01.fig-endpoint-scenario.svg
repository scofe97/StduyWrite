<svg viewBox="0 0 680 320" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>da-ch9-ex1 시나리오 — /products/1000000 호출이 백만 인스턴스를 만들어 메모리를 채움 (원문 Figure 9.2 개념도)</title>
  <desc>원문 Figure 9.2 의 개념을 도식으로 옮긴 것입니다. da-ch9-ex1 이 노출하는 엔드포인트를 호출하면 앱이 많은 인스턴스를 만들어 앱 메모리의 상당 부분을 소비합니다. 호출 시 숫자를 주면 그만큼 객체를 만드는데 백만 개를 요청하면 Product 인스턴스 백만 개가 힙을 채웁니다. 이는 실제 앱에서 어떤 기능이 앱 메모리 자원의 큰 몫을 잡아먹는 상황을 흉내 낸 것이고 우리는 이 시나리오를 프로파일러로 분석합니다.</desc>
  <rect x="0" y="0" width="680" height="320" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="16" font-weight="bold">엔드포인트 호출이 메모리를 채운다</text>
  <text x="20" y="55" fill="rgb(138,133,128)" font-size="11">원문 Figure 9.2 개념도 — da-ch9-ex1 /products/1000000</text>

  <!-- 호출자 -->
  <rect x="20" y="110" width="140" height="70" fill="rgb(20,20,20)" stroke="rgb(60,55,50)" stroke-width="1.5"/>
  <text x="90" y="140" fill="#e8e4df" font-size="12" font-weight="bold" text-anchor="middle">호출자</text>
  <text x="90" y="162" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">cURL · Postman</text>

  <!-- 화살표 -->
  <line x1="160" y1="145" x2="230" y2="145" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <polygon points="230,145 222,141 222,149" fill="rgb(212,168,83)"/>
  <text x="195" y="136" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">GET /products/1000000</text>

  <!-- 앱 -->
  <rect x="232" y="110" width="150" height="70" fill="rgba(212,168,83,0.08)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="307" y="140" fill="rgb(212,168,83)" font-size="12" font-weight="bold" text-anchor="middle">da-ch9-ex1</text>
  <text x="307" y="162" fill="#e8e4df" font-size="10" text-anchor="middle">숫자만큼 객체 생성</text>

  <!-- 화살표 -->
  <line x1="382" y1="145" x2="452" y2="145" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <polygon points="452,145 444,141 444,149" fill="rgb(212,168,83)"/>
  <text x="417" y="136" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">1,000,000 개</text>

  <!-- 힙 -->
  <rect x="454" y="92" width="206" height="106" fill="rgba(244,127,114,0.08)" stroke="#f47f72" stroke-width="2"/>
  <text x="557" y="114" fill="#f47f72" font-size="12" font-weight="bold" text-anchor="middle">힙 메모리</text>
  <!-- 작은 박스들로 채워진 모습 -->
  <rect x="468" y="126" width="16" height="16" fill="rgba(244,127,114,0.4)" stroke="#f47f72"/>
  <rect x="488" y="126" width="16" height="16" fill="rgba(244,127,114,0.4)" stroke="#f47f72"/>
  <rect x="508" y="126" width="16" height="16" fill="rgba(244,127,114,0.4)" stroke="#f47f72"/>
  <rect x="528" y="126" width="16" height="16" fill="rgba(244,127,114,0.4)" stroke="#f47f72"/>
  <rect x="548" y="126" width="16" height="16" fill="rgba(244,127,114,0.4)" stroke="#f47f72"/>
  <rect x="568" y="126" width="16" height="16" fill="rgba(244,127,114,0.4)" stroke="#f47f72"/>
  <rect x="588" y="126" width="16" height="16" fill="rgba(244,127,114,0.4)" stroke="#f47f72"/>
  <rect x="608" y="126" width="16" height="16" fill="rgba(244,127,114,0.4)" stroke="#f47f72"/>
  <rect x="628" y="126" width="16" height="16" fill="rgba(244,127,114,0.4)" stroke="#f47f72"/>
  <rect x="468" y="146" width="16" height="16" fill="rgba(244,127,114,0.4)" stroke="#f47f72"/>
  <rect x="488" y="146" width="16" height="16" fill="rgba(244,127,114,0.4)" stroke="#f47f72"/>
  <rect x="508" y="146" width="16" height="16" fill="rgba(244,127,114,0.4)" stroke="#f47f72"/>
  <rect x="528" y="146" width="16" height="16" fill="rgba(244,127,114,0.4)" stroke="#f47f72"/>
  <text x="557" y="185" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">Product 인스턴스로 가득 참</text>

  <!-- 하단 -->
  <rect x="20" y="222" width="640" height="80" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="34" y="244" fill="#e8e4df" font-size="11" font-weight="bold">무엇을 흉내 내나</text>
  <text x="34" y="266" fill="#e8e4df" font-size="10.5">실제 앱에서 어떤 기능이 앱 메모리 자원의 큰 몫을 잡아먹는 상황</text>
  <text x="34" y="288" fill="rgb(138,133,128)" font-size="10">→ 이 시나리오를 프로파일러(샘플링 먼저)로 분석한다</text>
</svg>
