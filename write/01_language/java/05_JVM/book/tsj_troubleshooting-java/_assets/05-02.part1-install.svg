<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" font-family="-apple-system, 'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <rect x="0" y="0" width="900" height="300" fill="#0d0d0d"/>

  <text x="30" y="40" font-size="19" font-weight="700" style="fill:#e8e4df">① VisualVM 설치·설정 — JDK 경로 한 줄</text>
  <text x="30" y="64" font-size="13" style="fill:#8a8580">받아서 → JDK 경로 잡고 → 켜면 끝. 못 붙으면 호스트명 인자로 해결</text>

  <!-- 스텝 1 -->
  <rect x="30" y="92" width="260" height="150" rx="10" fill="#dceaf7" stroke="#4a78a0" stroke-width="1.5"/>
  <text x="50" y="124" font-size="15" font-weight="700" style="fill:#10243a">1. JDK 경로 지정</text>
  <text x="50" y="152" font-size="12.5" style="fill:#1a1a1a">etc/visualvm.config 파일에서</text>
  <text x="50" y="174" font-size="12.5" style="fill:#1a1a1a">visualvm_jdkhome 변수에</text>
  <text x="50" y="196" font-size="12.5" style="fill:#1a1a1a">JDK 경로를 적고</text>
  <text x="50" y="218" font-size="12.5" font-weight="700" style="fill:#10243a">앞의 # 주석을 푼다</text>

  <!-- 화살표 -->
  <line x1="296" y1="167" x2="324" y2="167" stroke="#8a8580" stroke-width="2" marker-end="url(#a1)"/>

  <!-- 스텝 2 -->
  <rect x="330" y="92" width="260" height="150" rx="10" fill="#cdeccf" stroke="#3f7a43" stroke-width="1.5"/>
  <text x="350" y="124" font-size="15" font-weight="700" style="fill:#14401a">2. 실행 (Java 8+)</text>
  <text x="350" y="152" font-size="12.5" style="fill:#1a1a1a">bin 폴더의 실행 파일로 켠다</text>
  <text x="350" y="174" font-size="12.5" style="fill:#1a1a1a">왼쪽에 로컬 프로세스 목록이</text>
  <text x="350" y="196" font-size="12.5" style="fill:#1a1a1a">뜨고, 더블클릭하면 그 프로세스</text>
  <text x="350" y="218" font-size="12.5" style="fill:#1a1a1a">조사 탭이 열린다</text>

  <!-- 화살표 -->
  <line x1="596" y1="167" x2="624" y2="167" stroke="#8a8580" stroke-width="2" marker-end="url(#a1)"/>

  <!-- 스텝 3 -->
  <rect x="630" y="92" width="240" height="150" rx="10" fill="#f5edda" stroke="#9a7320" stroke-width="1.5"/>
  <text x="650" y="124" font-size="15" font-weight="700" style="fill:#5a3d0a">3. 연결 안 되면</text>
  <text x="650" y="152" font-size="11.5" style="fill:#1a1a1a">앱 시작 시 VM 인자 추가:</text>
  <text x="650" y="174" font-size="11" font-weight="700" style="fill:#5a3d0a">-Djava.rmi.server</text>
  <text x="650" y="190" font-size="11" font-weight="700" style="fill:#5a3d0a">.hostname=localhost</text>
  <text x="650" y="216" font-size="11.5" style="fill:#1a1a1a">그래도 안 되면 지원 JVM</text>
  <text x="650" y="232" font-size="11.5" style="fill:#1a1a1a">목록에 드는지 확인</text>

  <text x="30" y="278" font-size="12" style="fill:#8a8580">macOS는 brew install --cask visualvm 으로 설치하면 JDK 경로가 자동으로 잡혀 1번을 건너뛸 수 있다.</text>

  <defs>
    <marker id="a1" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a8580"/>
    </marker>
  </defs>
</svg>
