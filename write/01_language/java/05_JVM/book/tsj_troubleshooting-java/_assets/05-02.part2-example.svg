<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" font-family="-apple-system, 'Helvetica Neue', 'Noto Sans KR', sans-serif">
  <rect x="0" y="0" width="900" height="320" fill="#0d0d0d"/>

  <text x="30" y="40" font-size="19" font-weight="700" style="fill:#e8e4df">② 예제 — producer-consumer (2 + 2, 공유 ArrayList)</text>
  <text x="30" y="64" font-size="13" style="fill:#8a8580">두 producer가 넣고 두 consumer가 빼는데, ArrayList는 동시성 컬렉션이 아니다</text>

  <!-- Producer 2개 -->
  <rect x="30" y="92" width="230" height="64" rx="10" fill="#dceaf7" stroke="#4a78a0" stroke-width="1.5"/>
  <text x="50" y="120" font-size="14" font-weight="700" style="fill:#10243a">Producer × 2</text>
  <text x="50" y="142" font-size="12.5" style="fill:#1a1a1a">while(true) { list.add(x) }</text>

  <!-- Consumer 2개 -->
  <rect x="30" y="168" width="230" height="64" rx="10" fill="#f5edda" stroke="#9a7320" stroke-width="1.5"/>
  <text x="50" y="196" font-size="14" font-weight="700" style="fill:#5a3d0a">Consumer × 2</text>
  <text x="50" y="218" font-size="12.5" style="fill:#1a1a1a">while(true) { list.remove(0) }</text>

  <!-- 화살표 → 공유 리스트 -->
  <line x1="262" y1="124" x2="358" y2="150" stroke="#8a8580" stroke-width="2" marker-end="url(#a2)"/>
  <line x1="262" y1="200" x2="358" y2="174" stroke="#8a8580" stroke-width="2" marker-end="url(#a2)"/>
  <text x="285" y="128" font-size="11" style="fill:#8a8580">동시 접근</text>
  <text x="285" y="210" font-size="11" style="fill:#8a8580">동시 접근</text>

  <!-- 공유 ArrayList -->
  <rect x="364" y="128" width="210" height="68" rx="10" fill="#e8e4df" stroke="#8a8580" stroke-width="1.5"/>
  <text x="384" y="156" font-size="14" font-weight="700" style="fill:#1a1a1a">공유 ArrayList</text>
  <text x="384" y="178" font-size="11.5" style="fill:#1a1a1a">동기화 없음 · size 변수 공유</text>

  <!-- 화살표 → race -->
  <line x1="578" y1="162" x2="624" y2="162" stroke="#a04038" stroke-width="2" marker-end="url(#a2r)"/>

  <!-- race condition 결과 -->
  <rect x="630" y="100" width="240" height="58" rx="10" fill="#f5c6c0" stroke="#a04038" stroke-width="1.5"/>
  <text x="650" y="126" font-size="13.5" font-weight="700" style="fill:#5a1410">일부 스레드 → 예외로 사망</text>
  <text x="650" y="146" font-size="11.5" style="fill:#1a1a1a">ArrayIndexOutOfBounds</text>

  <rect x="630" y="166" width="240" height="58" rx="10" fill="#fce0b8" stroke="#9a7320" stroke-width="1.5"/>
  <text x="650" y="192" font-size="13.5" font-weight="700" style="fill:#5a3d0a">나머지 → 좀비 스레드</text>
  <text x="650" y="212" font-size="11.5" style="fill:#1a1a1a">자원만 소비, 일은 0</text>

  <text x="30" y="282" font-size="13" font-weight="700" style="fill:#e8e4df">race condition</text>
  <text x="135" y="282" font-size="12.5" style="fill:#8a8580">여러 스레드가 같은 자원을 향해 경주 — 동기화가 없으면 내부 size가 깨진다</text>
  <text x="30" y="304" font-size="12" style="fill:#8a8580">클래스 셋뿐이라 코드만 읽어도 보이지만, 실제 앱은 복잡해 도구 없이는 짚기 어렵다(그래서 프로파일러).</text>

  <defs>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a8580"/>
    </marker>
    <marker id="a2r" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#a04038"/>
    </marker>
  </defs>
</svg>
