<svg viewBox="0 0 680 540" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>디버거가 부족한 다섯 가지 상황 (Ch.2 §2.3)</title>
  <desc>디버거는 실행 중인 코드를 한 줄씩 누비는 도구라 다섯 상황에서 통하지 않거나 부족합니다. 첫째 시작점을 모르는 출력 문제는 breakpoint를 어디 찍을지 모르므로 프로파일링이나 stub로 시작점부터 찾아야 합니다. 둘째 성능 문제는 느리거나 멈추는 것을 전체로 조망해야 해서 프로파일링과 로깅으로 풀고 완전히 막히면 스레드 덤프가 가장 직선적입니다. 셋째 크래시는 실행이 멈춰 관찰할 대상이 없으므로 로그와 스레드 덤프와 힙 덤프 같은 사후 데이터로 거슬러 올라갑니다. 넷째 멀티스레드는 디버거의 간섭이 동작을 바꾸는 Heisenberg 효과 탓에 스레드를 하나로 격리하거나 디버깅과 모킹과 프로파일링을 묶어 써야 합니다. 다섯째 시간 민감 연산은 디버거로 멈춰 생각하는 동안 액세스 토큰이나 타이머나 짧은 세션이 만료되어 동작이 달라지므로 로깅이나 시뮬레이션 같은 다른 전략이나 멈춤 최소화가 필요합니다. 공통점은 실행 중인 코드를 한 줄씩 누비는 디버거의 전제가 깨진다는 점입니다.</desc>
  <rect x="0" y="0" width="680" height="540" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">디버거가 부족한 다섯 가지 상황</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">디버거 = 실행 중 코드를 한 줄씩 누비는 도구 → 이 전제가 깨지면 갈아탄다 (Ch.2 §2.3)</text>

  <!-- 5 상황 행 -->
  <rect x="20" y="74" width="640" height="58" fill="rgba(127,168,201,0.10)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="38" y="96" fill="#9cc3df" font-size="12" font-weight="bold">① 시작점 모르는 출력 문제</text>
  <text x="38" y="114" fill="rgb(138,133,128)" font-size="10">왜: breakpoint 위치를 모름</text>
  <rect x="430" y="86" width="214" height="34" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/>
  <text x="440" y="107" fill="rgb(212,168,83)" font-family="'JetBrains Mono',monospace" font-size="10">→ 프로파일링·stub (5~8장)</text>

  <rect x="20" y="140" width="640" height="58" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="38" y="162" fill="rgb(212,168,83)" font-size="12" font-weight="bold">② 성능 문제 (느림·멈춤)</text>
  <text x="38" y="180" fill="rgb(138,133,128)" font-size="10">왜: 전체 조망이 안 됨</text>
  <rect x="380" y="152" width="264" height="34" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/>
  <text x="390" y="173" fill="rgb(212,168,83)" font-family="'JetBrains Mono',monospace" font-size="10">→ 프로파일링·로깅, 멈춤=스레드 덤프</text>

  <rect x="20" y="206" width="640" height="58" fill="rgba(244,127,114,0.07)" stroke="#f47f72" stroke-width="2"/>
  <text x="38" y="228" fill="#f47f72" font-size="12" font-weight="bold">③ 크래시 (실행 정지)</text>
  <text x="38" y="246" fill="rgb(138,133,128)" font-size="10">왜: 관찰할 실행이 없음 (postmortem)</text>
  <rect x="380" y="218" width="264" height="34" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/>
  <text x="390" y="239" fill="#f47f72" font-family="'JetBrains Mono',monospace" font-size="10">→ 로그(4)·스레드 덤프(8)·힙 덤프(10)</text>

  <rect x="20" y="272" width="640" height="58" fill="rgba(102,187,106,0.08)" stroke="#66bb6a" stroke-width="2"/>
  <text x="38" y="294" fill="#66bb6a" font-size="12" font-weight="bold">④ 멀티스레드</text>
  <text x="38" y="312" fill="rgb(138,133,128)" font-size="10">왜: 디버거 간섭 = Heisenberg 효과</text>
  <rect x="380" y="284" width="264" height="34" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/>
  <text x="390" y="305" fill="#66bb6a" font-family="'JetBrains Mono',monospace" font-size="10">→ 단일 스레드 격리 / 복합 기법</text>

  <rect x="20" y="338" width="640" height="58" fill="rgba(127,168,201,0.10)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="38" y="360" fill="#9cc3df" font-size="12" font-weight="bold">⑤ 시간 민감 연산</text>
  <text x="38" y="378" fill="rgb(138,133,128)" font-size="10">왜: 멈추면 토큰·타이머·세션 만료</text>
  <rect x="380" y="350" width="264" height="34" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/>
  <text x="390" y="371" fill="rgb(212,168,83)" font-family="'JetBrains Mono',monospace" font-size="10">→ 로깅·시뮬레이션 / 멈춤 최소화</text>

  <!-- 핵심 메시지 -->
  <rect x="20" y="404" width="640" height="50" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="426" fill="#e8e4df" font-size="12" font-weight="bold">공통 원리</text>
  <text x="38" y="444" fill="rgb(138,133,128)" font-size="11">다섯 상황 모두 "실행 중인 코드를 한 줄씩 누빈다"는 디버거의 전제가 깨진다 → 헛심 쓰기 전에 갈아탄다</text>

  <!-- live vs postmortem 연결 -->
  <rect x="20" y="462" width="640" height="62" fill="rgba(244,127,114,0.07)" stroke="#f47f72" stroke-width="2"/>
  <text x="38" y="484" fill="#f47f72" font-size="12" font-weight="bold">live 조사 vs postmortem (1장과 연결)</text>
  <text x="38" y="504" fill="rgb(138,133,128)" font-size="10">디버거·프로파일러 = live(실행 중) / 로그·스레드 덤프·힙 덤프 = postmortem(크래시 이후)</text>
  <text x="38" y="520" fill="rgb(138,133,128)" font-size="10">시간 민감·멀티스레드는 live이되 간섭 자체가 문제 → 비침습 기법(로깅)으로 우회</text>
</svg>
