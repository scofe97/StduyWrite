<svg viewBox="0 0 680 340" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>메모리 프로파일링 FQN 표현식 — 엄격한 타입, 한 패키지(별표), 서브패키지 포함(별표 둘) (개념도)</title>
  <desc>이 편의 개념을 도식으로 옮긴 것입니다. 메모리 프로파일링에서는 어느 부분을 프로파일할지 표현식으로 지정합니다. 자주 쓰는 표현식은 셋입니다. 첫째 엄격한 타입의 완전한 이름 FQN 으로 그 특정 타입만 검색합니다. 예를 들어 com.example.model.Product 입니다. 둘째 한 패키지의 타입으로 별표 하나를 쓰면 그 패키지에 선언된 타입만 검색하고 서브패키지는 제외합니다. 예를 들어 com.example.model 별표입니다. 셋째 별표 둘을 쓰면 그 패키지와 모든 서브패키지를 검색합니다. 예를 들어 com.example 별표 둘입니다. da-ch9-ex1 에서는 Product 타입만 좁혀 프로파일합니다.</desc>
  <rect x="0" y="0" width="680" height="340" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="16" font-weight="bold">메모리 프로파일링 — FQN 표현식으로 좁히기</text>
  <text x="20" y="55" fill="rgb(138,133,128)" font-size="11">개념도 — Memory 설정란에 입력 (6장 CPU 프로파일링과 같은 문법)</text>

  <!-- 1 엄격한 타입 -->
  <rect x="20" y="78" width="640" height="62" fill="rgba(244,127,114,0.06)" stroke="#f47f72" stroke-width="1.5"/>
  <text x="34" y="100" fill="#f47f72" font-size="12" font-weight="bold">① 엄격한 타입 (FQN)</text>
  <rect x="34" y="108" width="290" height="24" fill="rgb(30,30,30)" stroke="rgb(60,55,50)"/>
  <text x="44" y="125" fill="#9cc3df" font-size="11" font-family="monospace">com.example.model.Product</text>
  <text x="338" y="125" fill="rgb(138,133,128)" font-size="10.5">그 특정 타입만 검색 (da-ch9-ex1 적용)</text>

  <!-- 2 한 패키지 -->
  <rect x="20" y="150" width="640" height="62" fill="rgba(127,168,201,0.06)" stroke="#7fa8c9" stroke-width="1.5"/>
  <text x="34" y="172" fill="#9cc3df" font-size="12" font-weight="bold">② 한 패키지 (별표 하나)</text>
  <rect x="34" y="180" width="290" height="24" fill="rgb(30,30,30)" stroke="rgb(60,55,50)"/>
  <text x="44" y="197" fill="#9cc3df" font-size="11" font-family="monospace">com.example.model.*</text>
  <text x="338" y="197" fill="rgb(138,133,128)" font-size="10.5">그 패키지의 타입만 · 서브패키지 제외</text>

  <!-- 3 서브패키지 -->
  <rect x="20" y="222" width="640" height="62" fill="rgba(212,168,83,0.06)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="34" y="244" fill="rgb(212,168,83)" font-size="12" font-weight="bold">③ 패키지 + 서브패키지 (별표 둘)</text>
  <rect x="34" y="252" width="290" height="24" fill="rgb(30,30,30)" stroke="rgb(60,55,50)"/>
  <text x="44" y="269" fill="rgb(212,168,83)" font-size="11" font-family="monospace">com.example.**</text>
  <text x="338" y="269" fill="rgb(138,133,128)" font-size="10.5">그 패키지와 모든 서브패키지 검색</text>

  <!-- 하단 -->
  <rect x="20" y="294" width="640" height="34" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="34" y="315" fill="rgb(138,133,128)" font-size="10.5">여러 타입·패키지 동시 지정 가능 · 좁힐수록 가벼움 (무엇을 프로파일할지 알기 전엔 프로파일하지 않는다)</text>
</svg>
