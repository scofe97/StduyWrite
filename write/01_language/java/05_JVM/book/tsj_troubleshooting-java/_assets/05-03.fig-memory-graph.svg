<svg viewBox="0 0 680 420" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>정상 vs 누수 메모리 그래프 (원문 Figure 5.11·5.12 개념도)</title>
  <desc>원문 Figure 5.11 과 5.12 의 개념을 도식으로 옮긴 것입니다. 정상 앱의 메모리 그래프는 봉우리 peaks 와 골짜기 valleys 가 번갈아 나옵니다. 앱이 메모리를 할당해 채우면 peaks 가 되고 이따금 GC 가 더는 필요 없는 데이터를 치우면 valleys 가 됩니다. 이 밀물과 썰물은 누수에 걸리지 않았다는 좋은 신호입니다. 메모리 누수 앱은 사용 메모리가 계속 증가합니다. GC 가 비우려 하지만 너무 조금만 제거해 그래프가 톱니를 이루지 못하고 계속 차오릅니다. 메모리가 완전히 차는 순간 OutOfMemoryError 가 나고 앱이 멈춥니다. 많은 경우 누수는 GC 활동도 격화시켜 CPU 위젯에서 GC 가 CPU 를 많이 쓰는 것으로도 나타납니다.</desc>
  <rect x="0" y="0" width="680" height="420" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="16" font-weight="bold">정상 vs 누수 — 메모리 그래프 읽는 법</text>
  <text x="20" y="55" fill="rgb(138,133,128)" font-size="11">원문 Figure 5.11·5.12 개념도 — 톱니면 정상, 계속 차오르면 누수</text>

  <!-- 정상 그래프 -->
  <rect x="20" y="74" width="312" height="240" fill="rgba(102,187,106,0.06)" stroke="#66bb6a" stroke-width="2"/>
  <text x="36" y="96" fill="#66bb6a" font-size="13" font-weight="bold">정상 앱 — peaks / valleys</text>
  <!-- 축 -->
  <line x1="50" y1="110" x2="50" y2="280" stroke="rgb(80,75,70)" stroke-width="1.5"/>
  <line x1="50" y1="280" x2="316" y2="280" stroke="rgb(80,75,70)" stroke-width="1.5"/>
  <text x="34" y="116" fill="rgb(138,133,128)" font-size="9" transform="rotate(-90 34 116)">메모리</text>
  <!-- 톱니 그래프: 차오르고(peak) GC가 비움(valley) -->
  <polyline points="50,270 78,200 78,250 106,185 106,238 134,172 134,228 162,160 162,220 190,150 190,214 218,158 218,222 246,150 246,216 274,156 274,224 302,152" fill="none" stroke="#66bb6a" stroke-width="2.5"/>
  <text x="150" y="262" fill="#66bb6a" font-size="10">peak = 할당</text>
  <text x="150" y="300" fill="#66bb6a" font-size="10">valley = GC 회수</text>
  <text x="36" y="308" fill="rgb(138,133,128)" font-size="9">밀물·썰물 = 누수 아님 (좋은 신호)</text>

  <!-- 누수 그래프 -->
  <rect x="344" y="74" width="316" height="240" fill="rgba(244,127,114,0.06)" stroke="#f47f72" stroke-width="2"/>
  <text x="360" y="96" fill="#f47f72" font-size="13" font-weight="bold">누수 앱 — 계속 차오름 → OOM</text>
  <line x1="376" y1="110" x2="376" y2="280" stroke="rgb(80,75,70)" stroke-width="1.5"/>
  <line x1="376" y1="280" x2="644" y2="280" stroke="rgb(80,75,70)" stroke-width="1.5"/>
  <text x="360" y="116" fill="rgb(138,133,128)" font-size="9" transform="rotate(-90 360 116)">메모리</text>
  <!-- OOM 한계선 -->
  <line x1="376" y1="130" x2="644" y2="130" stroke="rgb(212,168,83)" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="560" y="126" fill="rgb(212,168,83)" font-size="10">OOM 한계</text>
  <!-- 계속 상승(작은 톱니지만 못 비워 우상향) -->
  <polyline points="376,272 410,262 410,266 444,248 444,252 478,230 478,234 512,208 512,212 546,182 546,186 580,156 580,160 614,134 630,131" fill="none" stroke="#f47f72" stroke-width="2.5"/>
  <circle cx="630" cy="131" r="5" fill="#f47f72"/>
  <text x="500" y="300" fill="#f47f72" font-size="10">GC 가 너무 조금만 비움 → 우상향</text>
  <text x="360" y="308" fill="rgb(138,133,128)" font-size="9">한계 닿는 순간 OutOfMemoryError</text>

  <!-- 하단 핵심 -->
  <rect x="20" y="326" width="640" height="76" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="36" y="348" fill="#e8e4df" font-size="12" font-weight="bold">핵심 — 그래프 모양이 진단</text>
  <text x="36" y="370" fill="#66bb6a" font-size="11">톱니(peaks/valleys 반복) → 정상, 조사 기능 누수 아님</text>
  <text x="36" y="390" fill="#f47f72" font-size="11">계속 차오름 + GC 못 비움 → 누수 의심 → 힙 덤프(10장)로 근본 원인. GC CPU 격화 동반 가능</text>
</svg>
