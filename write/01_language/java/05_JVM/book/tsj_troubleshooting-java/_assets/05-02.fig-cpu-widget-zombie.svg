<svg viewBox="0 0 680 360" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Monitor 탭 CPU 위젯으로 좀비 스레드 읽기 (원문 Figure 5.4 개념도)</title>
  <desc>원문 Figure 5.4 의 개념을 도식으로 옮긴 것입니다. VisualVM Monitor 탭의 CPU 위젯은 프로세스가 쓰는 CPU 양과 그중 GC 가 일으킨 양을 함께 보여 줍니다. da-ch5-ex1 비정상 앱은 프로세스 CPU 가 약 50 퍼센트인데 GC 는 이 값에 전혀 기여하지 않습니다. 두 신호를 함께 읽으면 결론이 나옵니다. CPU 50 퍼센트는 프로세스가 살아 있고 처리 능력을 쓴다는 뜻이고, GC 0 퍼센트는 메모리를 정리하지도 않는다는 뜻입니다. 곧 자원은 태우면서 아무것도 처리하지 않는 상태이고 이는 동시성 문제에서 흔한 좀비 스레드 신호입니다. 반대로 GC 가 CPU 를 많이 쓰면 메모리 누수를 의심합니다.</desc>
  <rect x="0" y="0" width="680" height="360" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="16" font-weight="bold">Monitor 탭 CPU 위젯으로 좀비 스레드 읽기</text>
  <text x="20" y="55" fill="rgb(138,133,128)" font-size="11">원문 Figure 5.4 개념도 — CPU 와 GC 두 값을 함께 읽는다 (da-ch5-ex1)</text>

  <!-- CPU 위젯 모사 (개념) -->
  <rect x="20" y="74" width="300" height="160" fill="rgb(20,20,20)" stroke="rgb(60,55,50)" stroke-width="1.5"/>
  <text x="34" y="96" fill="#e8e4df" font-size="12" font-weight="bold">CPU 위젯 (개념)</text>

  <!-- 프로세스 CPU 막대 50% -->
  <text x="34" y="122" fill="rgb(138,133,128)" font-size="10">프로세스 CPU</text>
  <rect x="34" y="128" width="272" height="22" fill="rgba(244,127,114,0.12)" stroke="rgb(60,55,50)"/>
  <rect x="34" y="128" width="136" height="22" fill="rgba(244,127,114,0.45)" stroke="#f47f72"/>
  <text x="44" y="144" fill="#e8e4df" font-size="11" font-weight="bold">약 50%</text>
  <text x="280" y="144" fill="rgb(138,133,128)" font-size="10">100%</text>

  <!-- GC CPU 막대 0% -->
  <text x="34" y="174" fill="rgb(138,133,128)" font-size="10">GC CPU</text>
  <rect x="34" y="180" width="272" height="22" fill="rgba(102,187,106,0.08)" stroke="rgb(60,55,50)"/>
  <text x="44" y="196" fill="#66bb6a" font-size="11" font-weight="bold">0%</text>
  <text x="34" y="224" fill="rgb(138,133,128)" font-size="9">메모리 위젯도 거의 0 (아무것도 안 담음)</text>

  <!-- 화살표 -->
  <text x="338" y="160" fill="rgb(138,133,128)" font-size="22">→</text>

  <!-- 해석 -->
  <rect x="372" y="74" width="288" height="160" fill="rgba(212,168,83,0.08)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="388" y="96" fill="rgb(212,168,83)" font-size="12" font-weight="bold">두 신호를 함께 읽기</text>
  <text x="388" y="122" fill="#e8e4df" font-size="11">CPU 50% → 살아 있고 자원 씀</text>
  <text x="388" y="144" fill="#e8e4df" font-size="11">GC 0% → 메모리 정리도 안 함</text>
  <line x1="388" y1="158" x2="644" y2="158" stroke="rgb(60,55,50)" stroke-width="1"/>
  <text x="388" y="180" fill="#f47f72" font-size="12" font-weight="bold">= 자원은 태우는데 일은 안 함</text>
  <text x="388" y="202" fill="#f47f72" font-size="12" font-weight="bold">→ 좀비 스레드 신호</text>
  <text x="388" y="224" fill="rgb(138,133,128)" font-size="9">(동시성 문제의 흔한 결과)</text>

  <!-- 대비 규칙 -->
  <rect x="20" y="252" width="640" height="92" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="34" y="274" fill="#e8e4df" font-size="12" font-weight="bold">GC CPU 값으로 가르는 두 방향</text>
  <rect x="34" y="284" width="306" height="48" fill="rgba(127,168,201,0.10)" stroke="#7fa8c9"/>
  <text x="48" y="304" fill="#9cc3df" font-size="11" font-weight="bold">GC 가 CPU 0% + 메모리 0</text>
  <text x="48" y="324" fill="rgb(138,133,128)" font-size="10">→ 아무것도 안 함 → 좀비 스레드 의심</text>
  <rect x="354" y="284" width="306" height="48" fill="rgba(244,127,114,0.08)" stroke="#f47f72"/>
  <text x="368" y="304" fill="#f47f72" font-size="11" font-weight="bold">GC 가 CPU 많이 씀</text>
  <text x="368" y="324" fill="rgb(138,133,128)" font-size="10">→ 메모리 할당 문제 → 메모리 누수 의심</text>
</svg>
