<svg viewBox="0 0 680 340" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Cascading failure — 느린 하류가 상류 스레드를 막아 스레드 풀 포화로 번짐 (원문 Figure 12.5·12.7 개념도)</title>
  <desc>원문 Figure 12.5 와 12.7 의 개념을 도식으로 옮긴 것입니다. 한 서비스가 느려지거나 무응답이면 그 서비스에 기대는 상류 서비스가 막힌 스레드를 쌓고 연결 풀을 채우다 끝내 크래시합니다. 망가져서가 아니라 기다려서입니다. 예를 들어 결제 게이트웨이가 느리면 checkout 서비스의 여러 스레드가 그 응답을 기다리며 WAITING 상태로 막히고 스레드 풀이 포화됩니다. 그러면 checkout 자체도 새 요청을 처리하지 못해 실패하기 시작하는데 근본 문제는 하류인 결제 게이트웨이입니다. 에러를 던지는 서비스는 대개 전령일 뿐이고 처음 쓰러진 도미노를 찾을 때까지 사슬을 따라가야 합니다.</desc>
  <rect x="0" y="0" width="680" height="340" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="16" font-weight="bold">Cascading failure — 기다리다 무너지는 도미노</text>
  <text x="20" y="55" fill="rgb(138,133,128)" font-size="11">원문 Figure 12.5·12.7 개념도 — 근본은 하류, 실패는 상류</text>

  <!-- checkout (상류) -->
  <rect x="20" y="90" width="240" height="150" fill="rgba(244,127,114,0.06)" stroke="#f47f72" stroke-width="2"/>
  <text x="140" y="112" fill="#f47f72" font-size="13" font-weight="bold" text-anchor="middle">checkout (상류)</text>
  <text x="140" y="130" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">스레드 풀</text>
  <!-- 막힌 스레드들 -->
  <g>
    <rect x="36" y="140" width="48" height="16" fill="rgba(244,127,114,0.4)" stroke="#f47f72"/><text x="60" y="152" fill="#f47f72" font-size="7" text-anchor="middle">WAITING</text>
    <rect x="96" y="140" width="48" height="16" fill="rgba(244,127,114,0.4)" stroke="#f47f72"/><text x="120" y="152" fill="#f47f72" font-size="7" text-anchor="middle">WAITING</text>
    <rect x="156" y="140" width="48" height="16" fill="rgba(244,127,114,0.4)" stroke="#f47f72"/><text x="180" y="152" fill="#f47f72" font-size="7" text-anchor="middle">WAITING</text>
    <rect x="36" y="160" width="48" height="16" fill="rgba(244,127,114,0.4)" stroke="#f47f72"/><text x="60" y="172" fill="#f47f72" font-size="7" text-anchor="middle">WAITING</text>
    <rect x="96" y="160" width="48" height="16" fill="rgba(244,127,114,0.4)" stroke="#f47f72"/><text x="120" y="172" fill="#f47f72" font-size="7" text-anchor="middle">WAITING</text>
    <rect x="156" y="160" width="48" height="16" fill="rgba(244,127,114,0.4)" stroke="#f47f72"/><text x="180" y="172" fill="#f47f72" font-size="7" text-anchor="middle">WAITING</text>
  </g>
  <text x="140" y="198" fill="#f47f72" font-size="10" text-anchor="middle" font-weight="bold">풀 포화 → 새 요청 실패</text>
  <text x="140" y="222" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">모두 callPaymentGateway() 대기</text>

  <!-- 화살표 -->
  <line x1="260" y1="165" x2="330" y2="165" stroke="#f47f72" stroke-width="1.5"/>
  <polygon points="330,165 322,161 322,169" fill="#f47f72"/>
  <text x="295" y="156" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">HTTP 대기</text>

  <!-- payment (하류·느림) -->
  <rect x="332" y="90" width="200" height="150" fill="rgb(20,20,20)" stroke="rgb(60,55,50)" stroke-width="1.5"/>
  <text x="432" y="120" fill="rgb(212,168,83)" font-size="13" font-weight="bold" text-anchor="middle">결제 게이트웨이</text>
  <text x="432" y="142" fill="rgb(212,168,83)" font-size="11" text-anchor="middle">(느림·하류)</text>
  <text x="432" y="170" fill="#f47f72" font-size="11" font-weight="bold" text-anchor="middle">★ 근본 원인</text>
  <text x="432" y="196" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">응답이 안 옴</text>

  <!-- 처음 쓰러진 도미노 -->
  <rect x="552" y="90" width="108" height="150" fill="rgba(127,168,201,0.06)" stroke="#7fa8c9"/>
  <text x="606" y="120" fill="#9cc3df" font-size="11" font-weight="bold" text-anchor="middle">CPU?</text>
  <text x="606" y="144" fill="#9cc3df" font-size="11" font-weight="bold" text-anchor="middle">DB 연결?</text>
  <text x="606" y="168" fill="#9cc3df" font-size="11" font-weight="bold" text-anchor="middle">API 한도?</text>
  <text x="606" y="206" fill="rgb(138,133,128)" font-size="8.5" text-anchor="middle">처음 쓰러진</text>
  <text x="606" y="220" fill="rgb(138,133,128)" font-size="8.5" text-anchor="middle">도미노 찾기</text>

  <!-- 하단 -->
  <rect x="20" y="256" width="640" height="70" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="34" y="278" fill="#e8e4df" font-size="11" font-weight="bold">에러 던지는 서비스 = 전령</text>
  <text x="34" y="300" fill="rgb(138,133,128)" font-size="10">진짜 문제는 더 하류 → 사슬을 따라 처음 쓰러진 도미노까지 (10장 OutOfMemoryError 던지는 스레드와 비슷)</text>
  <text x="34" y="318" fill="rgb(138,133,128)" font-size="10">감지: 스레드 덤프(동일 스택 WAITING) · 메트릭(풀 100%·에러율) · 추적(느린 서비스 대기) · Sentry</text>
</svg>
