<svg viewBox="0 0 680 600" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>OutOfMemoryError 진단 — 네 가지 원인과 자동 덤프</title>
  <desc>OutOfMemoryError는 네 가지 이유로 던져진다. 힙이 문제라고 자동으로 결론내면 안 되고 예외 메시지의 이유를 봐야 한다. 첫째 native 메모리 부족은 unable to create new native thread 같은 메시지로, 힙 튜닝이 답이 아니다. 32비트는 4GB 한계, 스레드 수 OS 제한도 같은 에러를 던진다. 둘째 metaspace 부족은 OutOfMemoryError Metaspace로, classloader 누수가 흔한 원인이라 metaspace 최대 크기 설정을 고려한다. 셋째 Java heap space는 힙 부족 또는 메모리 누수다. 덤프를 시간차로 떠서 비교한다. 넷째 GC overhead limit exceeded는 네 조건이 모두 충족될 때다. full GC 시간이 GCTimeLimit 98%를 넘고, 해제 메모리가 GCHeapFreeLimit 2% 미만이며, 다섯 사이클 연속이고, UseGCOverheadLimit이 켜져 있을 때다. 자동 덤프는 HeapDumpOnOutOfMemoryError로 켠다. OOM이 마지막 비데몬 스레드를 죽일 때만 JVM이 종료되므로 서버는 보통 살아남는다.</desc>
  <rect x="0" y="0" width="680" height="600" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">OutOfMemoryError — 네 가지 원인</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">힙이 문제라고 단정하지 말고, 반드시 예외 메시지의 이유를 먼저 읽습니다</text>

  <!-- 4 causes -->
  <rect x="20" y="74" width="320" height="92" fill="rgba(244,127,114,0.08)" stroke="#f47f72" stroke-width="2"/>
  <text x="38" y="96" fill="#f47f72" font-size="12" font-weight="bold">① native 메모리 부족</text>
  <text x="38" y="116" fill="rgb(138,133,128)" font-size="10">unable to create new native thread</text>
  <text x="38" y="134" fill="rgb(138,133,128)" font-size="10">32비트 4GB 한계 / OS 스레드 수 제한</text>
  <text x="38" y="154" fill="#f47f72" font-size="9">힙 튜닝이 답이 아님 (8장 참조)</text>

  <rect x="350" y="74" width="312" height="92" fill="rgba(244,127,114,0.08)" stroke="#f47f72" stroke-width="2"/>
  <text x="368" y="96" fill="#f47f72" font-size="12" font-weight="bold">② metaspace 부족</text>
  <text x="368" y="116" fill="rgb(138,133,128)" font-size="10">OutOfMemoryError: Metaspace</text>
  <text x="368" y="134" fill="rgb(138,133,128)" font-size="10">classloader 누수가 흔한 원인</text>
  <text x="368" y="154" fill="#f47f72" font-size="9">최대 크기 설정으로 머신 잠식 차단</text>

  <rect x="20" y="174" width="320" height="92" fill="rgba(212,168,83,0.08)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="38" y="196" fill="rgb(212,168,83)" font-size="12" font-weight="bold">③ Java heap space</text>
  <text x="38" y="216" fill="rgb(138,133,128)" font-size="10">힙 부족 또는 메모리 누수</text>
  <text x="38" y="234" fill="rgb(138,133,128)" font-size="10">덤프를 시간차로 떠서 비교</text>
  <text x="38" y="254" fill="rgb(212,168,83)" font-size="9">누수면 힙 키워도 지연뿐</text>

  <rect x="350" y="174" width="312" height="92" fill="rgba(212,168,83,0.08)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="368" y="196" fill="rgb(212,168,83)" font-size="12" font-weight="bold">④ GC overhead limit</text>
  <text x="368" y="216" fill="rgb(138,133,128)" font-size="10">GC에 시간을 너무 많이 씀</text>
  <text x="368" y="234" fill="rgb(138,133,128)" font-size="10">네 조건 AND로 충족 시</text>
  <text x="368" y="254" fill="rgb(212,168,83)" font-size="9">5번째 전 soft ref 전부 해제(최후)</text>

  <!-- 4 conditions -->
  <rect x="20" y="274" width="642" height="110" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="296" fill="#e8e4df" font-size="13" font-weight="bold">GC overhead limit exceeded — 네 조건 (모두 AND)</text>
  <text x="38" y="318" fill="rgb(138,133,128)" font-size="11">① full GC 시간 &gt; GCTimeLimit (기본 98%)</text>
  <text x="38" y="338" fill="rgb(138,133,128)" font-size="11">② 해제된 메모리 &lt; GCHeapFreeLimit (기본 2%)</text>
  <text x="38" y="358" fill="rgb(138,133,128)" font-size="11">③ ①②가 5 사이클 연속 (튜닝 불가)</text>
  <text x="38" y="378" fill="rgb(138,133,128)" font-size="11">④ UseGCOverheadLimit = true (기본)</text>

  <!-- auto dump flags -->
  <rect x="20" y="392" width="642" height="100" fill="rgba(127,168,201,0.06)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="38" y="414" fill="#9cc3df" font-size="13" font-weight="bold">자동 힙 덤프 플래그 (OOM 시점 포착)</text>
  <text x="38" y="436" fill="rgb(138,133,128)" font-size="11">-XX:+HeapDumpOnOutOfMemoryError (기본 false) — OOM마다 덤프 생성</text>
  <text x="38" y="456" fill="rgb(138,133,128)" font-size="11">-XX:HeapDumpPath=&lt;path&gt; — 위치 지정(기본 java_pid&lt;pid&gt;.hprof)</text>
  <text x="38" y="476" fill="rgb(138,133,128)" font-size="11">-XX:+HeapDumpBeforeFullGC / +HeapDumpAfterFullGC</text>

  <!-- survive note -->
  <rect x="20" y="500" width="642" height="82" fill="rgba(102,187,106,0.05)" stroke="#66bb6a" stroke-width="2"/>
  <text x="38" y="524" fill="#66bb6a" font-size="13" font-weight="bold">OOM이 던져져도 JVM은 보통 안 죽는다</text>
  <text x="38" y="546" fill="#e8e4df" font-size="11">한 스레드만 영향받아 그 스레드가 종료되고, 그 객체들은 다음 GC에서 회수 가능</text>
  <text x="38" y="568" fill="rgb(138,133,128)" font-size="10">마지막 비데몬 스레드를 죽일 때만 치명적. 즉시 종료하려면 -XX:+ExitOnOutOfMemoryError</text>
</svg>
