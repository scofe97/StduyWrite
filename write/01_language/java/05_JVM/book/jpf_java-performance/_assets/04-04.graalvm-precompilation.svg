<svg viewBox="0 0 680 600" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>GraalVM과 precompilation — AOT·native image</title>
  <desc>GraalVM은 새 가상 머신으로 Java만이 아니라 JavaScript, Python, Ruby 등 여러 언어를 돌린다. JVM 성능에 두 기여를 한다. 첫째 fully native 바이너리를 만들 수 있다. 둘째 Java로 작성된 새 C2 컴파일러 구현으로 일반 JVM처럼 돌 수 있다. JVM 안에서 GraalVM 컴파일러를 쓰려면 UnlockExperimentalVMOptions, EnableJVMCI, UseJVMCICompiler 플래그가 필요하다. JIT는 워밍업 기간이 필요해, 임베디드 시스템이나 워밍업 전에 끝나는 프로그램에는 전통 컴파일 모델이 나을 수 있다. AOT(ahead-of-time) 컴파일은 JDK 11의 실험 기능으로, 애플리케이션 일부를 미리 컴파일해 공유 라이브러리로 만들고 JVM이 시작 시 로드한다. 시작 시간은 라이브러리 크기에 좌우되어, Hello world 같은 작은 앱은 빨라지지 않고 REST 서버처럼 시작이 긴 앱에 유리하다. jaotc 도구로 만들고 compile-for-tiered 옵션으로 C2 재컴파일 자격을 유지한다. GraalVM native image는 JVM 없이 도는 완전 네이티브 실행 파일로 짧게 사는 프로그램에 이상적이다. 시작이 빠르고 메모리가 작지만, 오래 돌면 C2가 이긴다. 동적 클래스 로딩, finalizer, 리플렉션 등에 제약이 있다.</desc>
  <rect x="0" y="0" width="680" height="600" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">GraalVM과 precompilation — AOT·native image</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">워밍업이 부담인 환경을 위한 미리 컴파일 — 실험 기능입니다</text>

  <!-- GraalVM -->
  <rect x="20" y="74" width="642" height="96" fill="rgba(212,168,83,0.06)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="38" y="96" fill="rgb(212,168,83)" font-size="14" font-weight="bold">GraalVM — 두 가지 기여</text>
  <text x="38" y="116" fill="#e8e4df" font-size="11">여러 언어(JS·Python·Ruby·R + JVM 바이트코드)를 돌리는 범용 VM, CE/EE 에디션</text>
  <rect x="38" y="126" width="300" height="36" fill="rgba(102,187,106,0.10)" stroke="#66bb6a"/>
  <text x="50" y="144" fill="#66bb6a" font-size="10" font-weight="bold">① fully native 바이너리 생성</text>
  <text x="50" y="157" fill="rgb(138,133,128)" font-size="9">native image (다음)</text>
  <rect x="350" y="126" width="312" height="36" fill="rgba(127,168,201,0.10)" stroke="#7fa8c9"/>
  <text x="362" y="144" fill="#9cc3df" font-size="10" font-weight="bold">② Java로 쓴 새 C2 컴파일러</text>
  <text x="362" y="157" fill="rgb(138,133,128)" font-size="9">JVMCI 플래그로 활성(실험)</text>

  <!-- AOT -->
  <rect x="20" y="182" width="642" height="178" fill="rgba(127,168,201,0.06)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="38" y="204" fill="#9cc3df" font-size="14" font-weight="bold">AOT (ahead-of-time) 컴파일 — JDK 11 실험 기능</text>
  <text x="38" y="224" fill="#e8e4df" font-size="11">앱 일부를 미리 컴파일 → 공유 라이브러리(.so) → JVM이 시작 시 로드</text>
  <rect x="38" y="234" width="150" height="40" fill="rgba(212,168,83,0.13)" stroke="rgb(212,168,83)"/><text x="113" y="252" fill="rgb(212,168,83)" font-size="10" text-anchor="middle">jaotc로 빌드</text><text x="113" y="268" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">java.base 모듈만</text>
  <text x="196" y="258" fill="rgb(138,133,128)" font-size="16">→</text>
  <rect x="218" y="234" width="170" height="40" fill="rgba(127,168,201,0.13)" stroke="#7fa8c9"/><text x="303" y="252" fill="#9cc3df" font-size="10" text-anchor="middle">공유 라이브러리(.so)</text><text x="303" y="268" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">compile-for-tiered</text>
  <text x="396" y="258" fill="rgb(138,133,128)" font-size="16">→</text>
  <rect x="418" y="234" width="244" height="40" fill="rgba(102,187,106,0.13)" stroke="#66bb6a"/><text x="540" y="252" fill="#66bb6a" font-size="10" text-anchor="middle">AOTLibrary로 JVM 시작</text><text x="540" y="268" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">초기엔 C1 수준, 이후 C2 재컴파일</text>
  <text x="38" y="294" fill="#f47f72" font-size="11">시작 시간이 라이브러리 크기에 좌우됨 → Hello world는 안 빨라짐(되레 느림)</text>
  <text x="38" y="312" fill="#66bb6a" font-size="11">REST 서버처럼 시작이 긴 앱에 유리 → 로드 시간이 긴 시작에 상쇄됨</text>
  <text x="38" y="330" fill="rgb(138,133,128)" font-size="10">compile-for-tiered: AOT 메서드도 C2 컴파일 자격 유지 → not entrant 되며 JIT가 교체</text>
  <text x="38" y="348" fill="rgb(138,133,128)" font-size="10">전부 말고 일부만(java.base) 미리 컴파일하는 게 성능에 더 나음 · PrintAOT로 확인</text>

  <!-- native image -->
  <rect x="20" y="372" width="320" height="118" fill="rgba(102,187,106,0.08)" stroke="#66bb6a" stroke-width="2"/>
  <text x="38" y="394" fill="#66bb6a" font-size="13" font-weight="bold">GraalVM native image</text>
  <text x="38" y="414" fill="#e8e4df" font-size="11">JVM 없이 도는 완전 네이티브 실행 파일</text>
  <text x="38" y="432" fill="#66bb6a" font-size="10">짧게 사는 프로그램에 이상적</text>
  <text x="38" y="450" fill="rgb(138,133,128)" font-size="10">시작 빠름 + 메모리 작게 시작</text>
  <text x="38" y="468" fill="#f47f72" font-size="10">오래 돌면 C2가 이김(실행 중 C2 미사용)</text>
  <text x="38" y="484" fill="rgb(138,133,128)" font-size="9">힙 확장 후엔 메모리 이점도 사라짐</text>

  <!-- native 제약 -->
  <rect x="350" y="372" width="312" height="118" fill="rgba(244,127,114,0.08)" stroke="#f47f72" stroke-width="2"/>
  <text x="368" y="394" fill="#f47f72" font-size="13" font-weight="bold">native image 제약</text>
  <text x="368" y="413" fill="rgb(138,133,128)" font-size="10">동적 클래스 로딩(Class.forName)</text>
  <text x="368" y="430" fill="rgb(138,133,128)" font-size="10">finalizer · Security Manager</text>
  <text x="368" y="447" fill="rgb(138,133,128)" font-size="10">JMX · JVMTI(프로파일링 포함)</text>
  <text x="368" y="464" fill="rgb(138,133,128)" font-size="10">리플렉션·동적 프록시·JNI는 특별 설정</text>
  <text x="368" y="482" fill="rgb(138,133,128)" font-size="9">파일 카운트: 적으면 native 빠름, 많으면 JIT 승</text>

  <!-- 정리 -->
  <rect x="20" y="502" width="642" height="82" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="524" fill="#e8e4df" font-size="13" font-weight="bold">정리 — 워밍업이 부담일 때의 선택지</text>
  <text x="38" y="544" fill="rgb(138,133,128)" font-size="11">긴 시작의 서버 → AOT(JVM이 .so 로드, C2 재컴파일 가능) · 짧게 사는 프로그램 → native image(JVM 없음)</text>
  <text x="38" y="564" fill="rgb(212,168,83)" font-size="11">단 둘 다 실험/Early Adopter 단계 — 충분히 오래 도는 앱은 전통 JVM이 결국 이깁니다</text>
  <text x="38" y="580" fill="rgb(138,133,128)" font-size="10">각주: AOT보다 application class data sharing(AppCDS)이 지금은 시작 성능에 더 나은 이점 + 완전 지원</text>
</svg>
