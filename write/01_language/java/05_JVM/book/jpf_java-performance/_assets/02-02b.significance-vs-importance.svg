<svg viewBox="0 0 680 560" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>통계적 유의성 vs 중요성 — 무엇을 먼저 조사할까</title>
  <desc>통계적 유의성과 중요성은 서로 다른 질문에 답한다. 유의성(p-value가 답함)은 "차이가 진짜로 존재하느냐"를, 중요성(차이 크기가 답함)은 "그 차이가 신경 쓸 만큼 크냐"를 말한다. p-value가 낮으면 차이가 존재한다는 확신은 크지만, 차이 자체가 얼마나 큰지는 전혀 말하지 않는다. 네 칸으로 보면, 차이가 크고 확신도 높은 칸은 최우선 조사 대상이고, 차이가 작고 확신만 높은 칸(예 1% 차이에 p=0.01)은 확실해도 고칠 가치가 작다. 차이가 크지만 확신이 낮은 칸(예 10% 차이에 p=0.2)은 표본을 더 모아 확신을 키우면 큰 성과로 이어질 수 있어 조사 가치가 있다. 차이도 작고 확신도 낮은 칸은 무시한다. 성능 엔지니어의 가장 귀한 자원은 시간이므로, 확실한 1% 차이보다 덜 확실해도 영향이 큰 10% 차이를 좇는 것이 시간 대비 이득이 크다. p-value가 낮다고 더 중요한 문제인 것은 아니다.</desc>
  <rect x="0" y="0" width="680" height="560" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">통계적 유의성 ≠ 중요성 — 무엇을 먼저 조사할까</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">유의성(p-value)은 "차이가 있느냐", 중요성(차이 크기)은 "차이가 크냐" — 다른 질문입니다</text>

  <!-- 축 설명 -->
  <text x="20" y="86" fill="#9cc3df" font-size="11">세로축 ↑ 차이 크기(중요성): 고칠 가치</text>
  <text x="360" y="86" fill="rgb(212,168,83)" font-size="11">가로축 → 확신(유의성): p-value 낮을수록 오른쪽</text>

  <!-- 2x2 그리드 -->
  <!-- 좌상: 큰 차이 + 낮은 확신 -->
  <rect x="60" y="100" width="290" height="170" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="78" y="124" fill="rgb(212,168,83)" font-size="13" font-weight="bold">차이 큼 · 확신 낮음</text>
  <text x="78" y="148" fill="#e8e4df" font-size="12">예) 10% 차이, p = 0.2</text>
  <text x="78" y="170" fill="#e8e4df" font-size="11">"10%나 느려진 것 같은데</text>
  <text x="78" y="187" fill="#e8e4df" font-size="11">확신은 80%야"</text>
  <text x="78" y="212" fill="rgb(212,168,83)" font-size="12" font-weight="bold">→ 조사 가치 있음</text>
  <text x="78" y="234" fill="rgb(138,133,128)" font-size="10">진짜면 큰 성과. 확신이 낮으면</text>
  <text x="78" y="250" fill="rgb(138,133,128)" font-size="10">표본을 더 모아 p-value를 낮춘다</text>

  <!-- 우상: 큰 차이 + 높은 확신 -->
  <rect x="360" y="100" width="290" height="170" fill="rgba(102,187,106,0.12)" stroke="#66bb6a" stroke-width="2"/>
  <text x="378" y="124" fill="#66bb6a" font-size="13" font-weight="bold">차이 큼 · 확신 높음</text>
  <text x="378" y="148" fill="#e8e4df" font-size="12">예) 10% 차이, p = 0.01</text>
  <text x="378" y="170" fill="#e8e4df" font-size="11">"10% 느려진 게 확실해"</text>
  <text x="378" y="212" fill="#66bb6a" font-size="12" font-weight="bold">→ 최우선 조사</text>
  <text x="378" y="234" fill="rgb(138,133,128)" font-size="10">크고 확실함. 망설일 이유 없음</text>

  <!-- 좌하: 작은 차이 + 낮은 확신 -->
  <rect x="60" y="280" width="290" height="160" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" stroke-width="2"/>
  <text x="78" y="304" fill="rgb(138,133,128)" font-size="13" font-weight="bold">차이 작음 · 확신 낮음</text>
  <text x="78" y="328" fill="#e8e4df" font-size="12">예) 1% 차이, p = 0.3</text>
  <text x="78" y="350" fill="#e8e4df" font-size="11">"1% 정도? 그것도 확실치 않아"</text>
  <text x="78" y="392" fill="rgb(138,133,128)" font-size="12" font-weight="bold">→ 무시</text>
  <text x="78" y="414" fill="rgb(138,133,128)" font-size="10">작고 불확실. 시간 낭비</text>

  <!-- 우하: 작은 차이 + 높은 확신 (함정) -->
  <rect x="360" y="280" width="290" height="160" fill="rgba(244,127,114,0.10)" stroke="#f47f72" stroke-width="2"/>
  <text x="378" y="304" fill="#f47f72" font-size="13" font-weight="bold">차이 작음 · 확신 높음 (함정)</text>
  <text x="378" y="328" fill="#e8e4df" font-size="12">예) 1% 차이, p = 0.01</text>
  <text x="378" y="350" fill="#e8e4df" font-size="11">"느려진 건 99% 확실한데</text>
  <text x="378" y="367" fill="#e8e4df" font-size="11">딱 1% 느려졌어"</text>
  <text x="378" y="392" fill="#f47f72" font-size="12" font-weight="bold">→ 후순위 (확실해도 가치 작음)</text>
  <text x="378" y="414" fill="rgb(138,133,128)" font-size="10">p-value가 낮다고 중요한 게 아니다</text>

  <!-- 결론 -->
  <rect x="20" y="458" width="642" height="82" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="480" fill="#e8e4df" font-size="12" font-weight="bold">핵심 — 시간은 영향이 큰 쪽에 쓴다</text>
  <text x="38" y="502" fill="rgb(212,168,83)" font-size="11">확실한 1%(우하) 보다 덜 확실한 10%(좌상)를 좇는 게 시간 대비 이득이 큽니다</text>
  <text x="38" y="522" fill="rgb(138,133,128)" font-size="10">유의성(p-value) = 차이가 "있느냐" / 중요성(차이 크기) = 차이가 "크냐" — 둘은 별개입니다</text>
</svg>
