<svg viewBox="0 0 680 580" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Java Performance 2판 — 책의 범위와 2판 변경점</title>
  <desc>이 책은 JVM과 Java API의 동작 원리를 깊이 이해해 성능을 끌어내는 것을 목표로 한다. 다루는 축은 셋이다. 첫째 JVM 튜닝(GC·JIT 컴파일러·수백 개 플래그), 둘째 Java API 모범 사용, 셋째 측정 방법론(jmh). 대상 독자는 성능 엔지니어와 개발자이며, 월요일 출시를 앞둔 일요일 밤의 빠른 처방을 찾는 사람에게는 맞지 않는다. 성능 작업의 본질은 성숙한 애플리케이션일수록 큰 개선이 드물어진다는 것이다. JIT 도입으로 8배 빨라지던 시절은 다시 오지 않고, 이제는 점진적 개선이 대부분이다. 컴퓨팅 환경은 둘로 갈라졌다(bifurcation). 한쪽은 거대한 힙을 돌리는 대형 머신으로 G1 GC가 대응하고, 다른 한쪽은 클라우드의 단일 CPU 가상 머신으로 작은 메모리를 정확히 관리하는 것이 중요해졌다. 2판은 Java 8과 Java 11을 다루며 G1 대규모 업데이트, JFR, 컨테이너 동작, jmh, AppCDS, compact string을 새로 담았다.</desc>
  <rect x="0" y="0" width="680" height="580" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">Java Performance 2판 — 책의 범위와 목표</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">JVM·API 동작 원리를 깊이 알아야 성능이 보입니다 (Scott Oaks, O'Reilly 2020)</text>

  <!-- 세 축 -->
  <rect x="20" y="74" width="206" height="104" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="38" y="96" fill="rgb(212,168,83)" font-size="13" font-weight="bold">① JVM 튜닝</text>
  <text x="38" y="116" fill="#e8e4df" font-size="11">코드 없이 동작을 바꿈</text>
  <text x="38" y="134" fill="rgb(138,133,128)" font-size="10">GC · JIT 컴파일러</text>
  <text x="38" y="151" fill="rgb(138,133,128)" font-size="10">수백 개 튜닝 플래그</text>
  <text x="38" y="170" fill="#f47f72" font-size="9">맹목적 시도 금지 — 원리 이해</text>

  <rect x="237" y="74" width="206" height="104" fill="rgba(127,168,201,0.10)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="255" y="96" fill="#9cc3df" font-size="13" font-weight="bold">② API 모범 사용</text>
  <text x="255" y="116" fill="#e8e4df" font-size="11">언어 기능·라이브러리 활용</text>
  <text x="255" y="134" fill="rgb(138,133,128)" font-size="10">생산성과 성능을 함께</text>
  <text x="255" y="151" fill="rgb(138,133,128)" font-size="10">예: JSON vs 독자 프로토콜</text>
  <text x="255" y="170" fill="#66bb6a" font-size="9">최소한 본전, 잘하면 둘 다 이득</text>

  <rect x="454" y="74" width="206" height="104" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="2"/>
  <text x="472" y="96" fill="#66bb6a" font-size="13" font-weight="bold">③ 측정 방법론</text>
  <text x="472" y="116" fill="#e8e4df" font-size="11">추측 대신 데이터</text>
  <text x="472" y="134" fill="rgb(138,133,128)" font-size="10">jmh 마이크로벤치마크</text>
  <text x="472" y="151" fill="rgb(138,133,128)" font-size="10">JFR · 성능 도구</text>
  <text x="472" y="170" fill="rgb(138,133,128)" font-size="9">왜 느린지 알면 고치기 쉬움</text>

  <!-- 성능 작업의 본질 -->
  <rect x="20" y="194" width="640" height="98" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="216" fill="#e8e4df" font-size="13" font-weight="bold">성능 작업의 본질 — 성숙할수록 큰 개선은 드물어집니다</text>
  <text x="38" y="238" fill="rgb(138,133,128)" font-size="11">초기 앱: 아키텍처 변경·버그 수정으로 큰 개선이 쉬움</text>
  <text x="38" y="258" fill="rgb(138,133,128)" font-size="11">성숙한 앱(JVM 포함): 그런 개선은 희귀 → 점진적 개선이 대부분</text>
  <text x="38" y="280" fill="rgb(212,168,83)" font-size="11">JIT 도입 8배 향상(Java 1.0→1.1.8) 같은 도약은 다시 오지 않습니다</text>

  <!-- bifurcation -->
  <rect x="20" y="308" width="315" height="118" fill="rgba(127,168,201,0.08)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="38" y="330" fill="#9cc3df" font-size="12" font-weight="bold">환경 분기 (A) 대형 머신</text>
  <text x="38" y="350" fill="#e8e4df" font-size="11">매우 큰 힙을 돌리는 큰 머신이 일상화</text>
  <text x="38" y="370" fill="rgb(138,133,128)" font-size="10">신기술 G1 GC가 대응</text>
  <text x="38" y="388" fill="rgb(138,133,128)" font-size="10">전통 컬렉터보다 손튜닝이 더 필요</text>
  <text x="38" y="410" fill="rgb(138,133,128)" font-size="9">heap 수십~수백 GB 영역</text>

  <rect x="345" y="308" width="315" height="118" fill="rgba(212,168,83,0.08)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="363" y="330" fill="rgb(212,168,83)" font-size="12" font-weight="bold">환경 분기 (B) 단일 CPU</text>
  <text x="363" y="350" fill="#e8e4df" font-size="11">클라우드가 작은 단일 CPU 머신을 부활</text>
  <text x="363" y="370" fill="rgb(138,133,128)" font-size="10">큰 머신 위 가상 OS, CPU 1개 제한</text>
  <text x="363" y="388" fill="rgb(138,133,128)" font-size="10">JVM 입장에선 단일 CPU 머신과 같음</text>
  <text x="363" y="410" fill="#f47f72" font-size="9">작은 메모리의 정확한 관리가 핵심</text>

  <!-- 2판 신규 -->
  <rect x="20" y="442" width="640" height="120" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="464" fill="#e8e4df" font-size="13" font-weight="bold">2판 무엇이 새로운가 — 대상: Java 8 + Java 11 (LTS)</text>
  <rect x="38" y="476" width="148" height="24" fill="rgba(212,168,83,0.13)" stroke="rgb(212,168,83)"/><text x="112" y="492" fill="rgb(212,168,83)" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle">G1 GC 대규모 업데이트</text>
  <rect x="192" y="476" width="120" height="24" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/><text x="252" y="492" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle">Java Flight Recorder</text>
  <rect x="318" y="476" width="120" height="24" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/><text x="378" y="492" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle">컨테이너 환경 동작</text>
  <rect x="444" y="476" width="100" height="24" fill="rgba(102,187,106,0.13)" stroke="#66bb6a"/><text x="494" y="492" fill="#66bb6a" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle">jmh harness</text>
  <rect x="550" y="476" width="110" height="24" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/><text x="605" y="492" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle">신규 JIT 컴파일러</text>
  <rect x="38" y="504" width="120" height="24" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/><text x="98" y="520" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle">AppCDS (class 공유)</text>
  <rect x="164" y="504" width="148" height="24" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/><text x="238" y="520" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle">compact string (Java 11)</text>
  <rect x="318" y="504" width="160" height="24" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/><text x="398" y="520" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="9" text-anchor="middle">string concatenation 개선</text>
  <text x="38" y="548" fill="rgb(138,133,128)" font-size="10">대상 독자: 성능 엔지니어·개발자 / 일요일 밤 급한 처방을 찾는다면 이 책은 맞지 않습니다</text>
</svg>
