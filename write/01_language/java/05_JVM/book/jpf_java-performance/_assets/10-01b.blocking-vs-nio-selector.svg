<svg viewBox="0 0 680 600" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>blocking I/O 1:1 모델 vs NIO selector 모델</title>
  <desc>원문 Figure 10-1과 10-2의 재현이다. 위는 blocking I/O로 각 client가 자기 server 스레드에 1대1로 묶여, N client에 N 스레드가 필요하다. 아래는 NIO로 모든 client socket이 selector에 등록되고, OS가 데이터 가용 이벤트를 selector에 주면 selector가 worker 스레드 풀의 한 스레드에 알린다. N client를 M(더 적은) 스레드로 처리한다.</desc>
  <rect x="0" y="0" width="680" height="600" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">blocking 1:1 vs NIO selector (Figure 10-1·10-2 재현)</text>

  <!-- 상단: blocking 1:1 -->
  <text x="20" y="64" fill="#f47f72" font-size="14" font-weight="bold">① blocking I/O — client ↔ 스레드 1:1</text>

  <!-- clients -->
  <rect x="30" y="80" width="90" height="34" fill="rgba(127,168,201,0.12)" stroke="#7fa8c9"/>
  <text x="75" y="102" fill="#9cc3df" font-size="12" text-anchor="middle">Client 1</text>
  <rect x="30" y="124" width="90" height="34" fill="rgba(127,168,201,0.12)" stroke="#7fa8c9"/>
  <text x="75" y="146" fill="#9cc3df" font-size="12" text-anchor="middle">Client 2</text>
  <rect x="30" y="168" width="90" height="34" fill="rgba(127,168,201,0.12)" stroke="#7fa8c9"/>
  <text x="75" y="190" fill="#9cc3df" font-size="12" text-anchor="middle">Client N</text>

  <!-- arrows 1:1 -->
  <line x1="120" y1="97" x2="270" y2="97" stroke="#f47f72" stroke-width="2"/>
  <polygon points="270,97 262,93 262,101" fill="#f47f72"/>
  <line x1="120" y1="141" x2="270" y2="141" stroke="#f47f72" stroke-width="2"/>
  <polygon points="270,141 262,137 262,145" fill="#f47f72"/>
  <line x1="120" y1="185" x2="270" y2="185" stroke="#f47f72" stroke-width="2"/>
  <polygon points="270,185 262,181 262,189" fill="#f47f72"/>
  <text x="195" y="90" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">block</text>

  <!-- threads -->
  <rect x="270" y="80" width="110" height="34" fill="rgba(244,127,114,0.12)" stroke="#f47f72"/>
  <text x="325" y="102" fill="#f47f72" font-size="12" text-anchor="middle">Thread 1</text>
  <rect x="270" y="124" width="110" height="34" fill="rgba(244,127,114,0.12)" stroke="#f47f72"/>
  <text x="325" y="146" fill="#f47f72" font-size="12" text-anchor="middle">Thread 2</text>
  <rect x="270" y="168" width="110" height="34" fill="rgba(244,127,114,0.12)" stroke="#f47f72"/>
  <text x="325" y="190" fill="#f47f72" font-size="12" text-anchor="middle">Thread N</text>

  <text x="400" y="120" fill="rgb(138,133,128)" font-size="11">N client →</text>
  <text x="400" y="142" fill="#f47f72" font-size="11">N 스레드 필요</text>
  <text x="400" y="164" fill="rgb(138,133,128)" font-size="10">동시 진행은 2개 미만</text>
  <text x="400" y="182" fill="rgb(138,133,128)" font-size="10">이어도 비효율</text>

  <line x1="20" y1="226" x2="660" y2="226" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 하단: NIO selector -->
  <text x="20" y="256" fill="#66bb6a" font-size="14" font-weight="bold">② NIO — selector 이벤트 통지</text>

  <!-- clients -->
  <rect x="30" y="278" width="90" height="30" fill="rgba(127,168,201,0.12)" stroke="#7fa8c9"/>
  <text x="75" y="298" fill="#9cc3df" font-size="11" text-anchor="middle">Client 1</text>
  <rect x="30" y="316" width="90" height="30" fill="rgba(127,168,201,0.12)" stroke="#7fa8c9"/>
  <text x="75" y="336" fill="#9cc3df" font-size="11" text-anchor="middle">Client 2</text>
  <rect x="30" y="354" width="90" height="30" fill="rgba(127,168,201,0.12)" stroke="#7fa8c9"/>
  <text x="75" y="374" fill="#9cc3df" font-size="11" text-anchor="middle">Client N</text>

  <!-- arrows to selector -->
  <line x1="120" y1="293" x2="250" y2="328" stroke="#7fa8c9" stroke-width="1.5"/>
  <line x1="120" y1="331" x2="250" y2="331" stroke="#7fa8c9" stroke-width="1.5"/>
  <line x1="120" y1="369" x2="250" y2="334" stroke="#7fa8c9" stroke-width="1.5"/>

  <!-- selector -->
  <rect x="250" y="300" width="120" height="64" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="310" y="326" fill="rgb(212,168,83)" font-size="12" font-weight="bold" text-anchor="middle">Selector</text>
  <text x="310" y="346" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">OS 이벤트 수신</text>
  <text x="310" y="358" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">select()</text>

  <!-- arrow selector to worker pool -->
  <line x1="370" y1="332" x2="450" y2="332" stroke="rgb(212,168,83)" stroke-width="2"/>
  <polygon points="450,332 442,328 442,336" fill="rgb(212,168,83)"/>
  <text x="410" y="324" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">통지</text>

  <!-- worker pool -->
  <rect x="450" y="296" width="200" height="72" fill="rgba(102,187,106,0.08)" stroke="#66bb6a" stroke-width="2"/>
  <text x="550" y="316" fill="#66bb6a" font-size="12" font-weight="bold" text-anchor="middle">worker 풀 (M 스레드)</text>
  <rect x="464" y="326" width="50" height="28" fill="rgba(102,187,106,0.15)" stroke="#66bb6a"/>
  <text x="489" y="344" fill="#66bb6a" font-size="10" text-anchor="middle">T1</text>
  <rect x="524" y="326" width="50" height="28" fill="rgba(102,187,106,0.15)" stroke="#66bb6a"/>
  <text x="549" y="344" fill="#66bb6a" font-size="10" text-anchor="middle">T2</text>
  <rect x="584" y="326" width="50" height="28" fill="rgba(102,187,106,0.15)" stroke="#66bb6a"/>
  <text x="609" y="344" fill="#66bb6a" font-size="10" text-anchor="middle">T3</text>

  <!-- 설명 박스 -->
  <rect x="20" y="402" width="640" height="180" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="426" fill="#e8e4df" font-size="13" font-weight="bold">동작</text>
  <text x="38" y="450" fill="rgb(138,133,128)" font-size="11">① 각 client socket이 server의 Selector에 등록됨</text>
  <text x="38" y="472" fill="rgb(138,133,128)" font-size="11">② client가 요청을 보내면 OS가 selector에 이벤트를 줌 (어느 socket에 데이터가 있는지)</text>
  <text x="38" y="494" fill="rgb(138,133,128)" font-size="11">③ selector가 worker 풀의 한 스레드에 "이 client에 읽을 I/O가 있다" 통지</text>
  <text x="38" y="516" fill="rgb(138,133,128)" font-size="11">④ 그 스레드가 데이터 읽기 → 요청 처리 → 응답 → 다음 요청 대기로 복귀</text>
  <text x="38" y="542" fill="#66bb6a" font-size="11">client가 특정 스레드에 묶이지 않아, 풀을 동시 요청 수에 맞춰 튜닝 가능</text>
  <text x="38" y="566" fill="rgb(212,168,83)" font-size="10">100 client(think 30초) → worker 2개로 충분, 비균일 도착이면 5~6개</text>
</svg>
