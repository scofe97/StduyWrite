<svg viewBox="0 0 680 600" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>변동성 이해 — t-test와 p-value, 그리고 일찍 자주 테스트</title>
  <desc>셋째 원칙은 결과의 변동을 이해하는 것이다. 같은 데이터를 처리해도 매번 다른 값이 나오므로, 두 실행의 차이가 진짜 회귀인지 무작위 변동인지 가려야 한다. 회귀 테스트에서 원래 코드는 baseline, 새 코드는 specimen이다. 평균만 비교하면 안 되고 Student t-test로 분석한다. t-test는 p-value를 내는데, 이는 귀무가설(두 테스트 성능이 같다)이 참일 확률이다. p-value 0.43이면 두 결과가 같을 확률 43%, 다를 확률 57%다. 다를 확률 57%는 25% 개선을 57% 확신한다는 뜻이 아니라 단지 다르다는 확신이 57%라는 뜻이다. 변동이 클수록 차이가 진짜인지 판단하기 어렵다. α-value는 통계적 유의성의 기준점으로 보통 0.1(90%)이며, p-value가 1−α보다 크면 유의하다고 본다. 표본을 3개에서 6개로 늘리면 p-value가 0.43에서 0.11로 떨어진다. 통계적 유의성은 통계적 중요성과 다르다. 1% 차이가 p=0.01로 유의해도, 10% 차이가 p=0.2로 비유의해도, 시간을 쓸 가치는 후자에 있다. 넷째 원칙은 일찍 자주 테스트하는 것이다. 모두 자동화하고, 모든 것을 측정하고, 타깃 시스템에서 돌린다.</desc>
  <rect x="0" y="0" width="680" height="600" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">변동성과 통계 · 일찍 자주 테스트</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">차이가 진짜 회귀인지 무작위 변동인지 t-test로 가립니다</text>

  <!-- baseline vs specimen -->
  <rect x="20" y="74" width="320" height="78" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="96" fill="#e8e4df" font-size="13" font-weight="bold">회귀 테스트 용어</text>
  <text x="38" y="116" fill="#9cc3df" font-size="11">baseline = 원래 코드</text>
  <text x="38" y="134" fill="rgb(212,168,83)" font-size="11">specimen = 새 코드</text>
  <text x="200" y="125" fill="rgb(138,133,128)" font-size="10">평균만 비교 금지</text>

  <!-- 귀무가설 -->
  <rect x="350" y="74" width="312" height="78" fill="rgba(127,168,201,0.10)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="368" y="96" fill="#9cc3df" font-size="13" font-weight="bold">귀무가설(null hypothesis)</text>
  <text x="368" y="116" fill="#e8e4df" font-size="11">"두 테스트 성능이 같다"</text>
  <text x="368" y="134" fill="rgb(138,133,128)" font-size="10">t-test가 이 가설이 참일 확률 = p-value 산출</text>

  <!-- t-test/p-value -->
  <rect x="20" y="162" width="642" height="110" fill="rgba(212,168,83,0.06)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="38" y="184" fill="rgb(212,168,83)" font-size="13" font-weight="bold">Student t-test → p-value 해석</text>
  <text x="38" y="204" fill="#e8e4df" font-size="11">p-value 0.43 → 두 결과가 같을 확률 43%, 다를 확률 57%</text>
  <text x="38" y="222" fill="#f47f72" font-size="11">주의: "다를 확률 57%"는 25% 개선을 57% 확신한다는 뜻이 아님 — 단지 다르다는 확신</text>
  <text x="38" y="242" fill="rgb(138,133,128)" font-size="10">α-value: 유의성 기준점(보통 0.1=90%) · p-value &gt; 1−α 이면 통계적 유의</text>
  <text x="38" y="260" fill="#66bb6a" font-size="10">표본 3개 → 6개로 늘리면 p-value 0.43 → 0.11 (같은 평균, 더 높은 확신)</text>

  <!-- 유의성 != 중요성 -->
  <rect x="20" y="282" width="642" height="70" fill="rgba(244,67,54,0.08)" stroke="#f44336" stroke-width="2"/>
  <text x="38" y="304" fill="#f44336" font-size="13" font-weight="bold">통계적 유의성 ≠ 통계적 중요성</text>
  <text x="38" y="324" fill="#e8e4df" font-size="11">1% 차이가 p=0.01로 유의 vs 10% 차이가 p=0.2로 비유의</text>
  <text x="38" y="342" fill="rgb(212,168,83)" font-size="11">→ 더 가치 있는 조사 대상은 10% 쪽. 확률이 높다고 더 중요한 건 아닙니다</text>

  <!-- 일찍 자주 3원칙 -->
  <text x="20" y="378" fill="#e8e4df" font-size="13" font-weight="bold">넷째 원칙 — 일찍, 자주 테스트 (개발주기와 트레이드오프)</text>

  <rect x="20" y="390" width="206" height="120" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="2"/>
  <text x="38" y="412" fill="#66bb6a" font-size="12" font-weight="bold">모두 자동화</text>
  <text x="38" y="432" fill="#e8e4df" font-size="11">설치·구성·실행을</text>
  <text x="38" y="448" fill="#e8e4df" font-size="11">스크립트로</text>
  <text x="38" y="466" fill="rgb(138,133,128)" font-size="10">여러 번 실행 후</text>
  <text x="38" y="481" fill="rgb(138,133,128)" font-size="10">t-test 분석·보고</text>
  <text x="38" y="500" fill="rgb(138,133,128)" font-size="9">머신을 알려진 상태로</text>

  <rect x="237" y="390" width="206" height="120" fill="rgba(127,168,201,0.10)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="255" y="412" fill="#9cc3df" font-size="12" font-weight="bold">모든 것을 측정</text>
  <text x="255" y="432" fill="#e8e4df" font-size="11">CPU·디스크·네트워크</text>
  <text x="255" y="448" fill="#e8e4df" font-size="11">메모리·GC 로그</text>
  <text x="255" y="466" fill="rgb(138,133,128)" font-size="10">JFR·스레드 스택·힙</text>
  <text x="255" y="481" fill="rgb(138,133,128)" font-size="10">DB 통계까지</text>
  <text x="255" y="500" fill="rgb(138,133,128)" font-size="9">단서가 많을수록 추적 쉬움</text>

  <rect x="454" y="390" width="208" height="120" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="472" y="412" fill="rgb(212,168,83)" font-size="12" font-weight="bold">타깃 시스템에서</text>
  <text x="472" y="432" fill="#e8e4df" font-size="11">1코어 노트북 ≠ 72코어</text>
  <text x="472" y="448" fill="rgb(138,133,128)" font-size="10">스레딩·동기화 병목 다름</text>
  <text x="472" y="466" fill="rgb(138,133,128)" font-size="10">기본 플래그가 HW 기반</text>
  <text x="472" y="481" fill="rgb(138,133,128)" font-size="10">컴파일·캐시도 다름</text>
  <text x="472" y="500" fill="#f47f72" font-size="9">외삽은 예측일 뿐</text>

  <!-- 결론 띠 -->
  <rect x="20" y="520" width="642" height="64" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="542" fill="#e8e4df" font-size="12" font-weight="bold">핵심</text>
  <text x="90" y="542" fill="rgb(138,133,128)" font-size="11">평균만 보고 판단 금지 — t-test로 확률을 이해하고, 어디에 시간 쓸지 정합니다</text>
  <text x="90" y="562" fill="rgb(138,133,128)" font-size="11">비유의 = 무의미가 아니라 inconclusive(표본 부족). 회귀 테스트는 흑백이 아닙니다</text>
  <text x="90" y="578" fill="rgb(212,168,83)" font-size="10">"science가 길을 이끌지만 art가 끼어든다"</text>
</svg>
