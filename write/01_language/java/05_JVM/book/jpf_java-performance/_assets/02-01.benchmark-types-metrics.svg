<svg viewBox="0 0 680 600" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>벤치마크 3종과 성능 지표 3종</title>
  <desc>성능 테스트의 첫 두 원칙은 무엇을 어떤 지표로 측정하느냐다. 테스트할 코드는 세 종류다. 마이크로벤치마크는 작은 단위(스레드 생성 vs 스레드 풀 등)를 재지만 JIT와 GC 때문에 올바로 쓰기 어렵다. 함정 넷은 결과를 반드시 읽어야 하고(안 읽으면 컴파일러가 계산을 생략, volatile 인스턴스 변수로 해결), 입력 범위를 넓혀야 하고(미리 계산해 둘 것), 올바른 입력을 재야 하고(실제 안 쓰는 범위는 왜곡), 프로덕션에서 다르게 동작한다(프로파일 피드백·GC 프로파일 차이). 매크로벤치마크는 외부 자원을 포함한 실제 애플리케이션 전체로, 가장 좋은 측정이다. 메소벤치마크는 그 중간으로 실제 일을 하지만 전체 앱은 아니다. 지표도 셋이다. 배치(경과 시간)는 시작부터 끝까지 걸린 시간이다. 처리량(throughput, OPS/RPS/TPS)은 think time 없이 단위 시간당 작업량으로, warm-up 후 측정한다. 응답 시간(response time)은 요청과 응답 사이 시간으로 think time을 둔다. 응답 시간은 평균과 백분위(90th%)로 보며, 이상치(GC 일시정지 등)는 평균을 크게 흔든다.</desc>
  <rect x="0" y="0" width="680" height="600" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">벤치마크 3종과 성능 지표 3종</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">무엇을(벤치마크 종류) 어떤 지표로(batch·throughput·response) 측정할지 정합니다</text>

  <!-- 벤치마크 3종 -->
  <rect x="20" y="74" width="206" height="150" fill="rgba(244,127,114,0.08)" stroke="#f47f72" stroke-width="2"/>
  <text x="38" y="96" fill="#f47f72" font-size="13" font-weight="bold">micro 벤치마크</text>
  <text x="38" y="116" fill="#e8e4df" font-size="11">작은 단위 측정</text>
  <text x="38" y="134" fill="rgb(138,133,128)" font-size="10">JIT·GC 탓에 쓰기 어려움</text>
  <text x="38" y="152" fill="rgb(138,133,128)" font-size="10">함정 4종:</text>
  <text x="38" y="169" fill="rgb(138,133,128)" font-size="9">① 결과 읽기(volatile)</text>
  <text x="38" y="184" fill="rgb(138,133,128)" font-size="9">② 입력 범위 넓게</text>
  <text x="38" y="199" fill="rgb(138,133,128)" font-size="9">③ 올바른 입력</text>
  <text x="38" y="214" fill="rgb(138,133,128)" font-size="9">④ 프로덕션과 다름</text>

  <rect x="237" y="74" width="206" height="150" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="2"/>
  <text x="255" y="96" fill="#66bb6a" font-size="13" font-weight="bold">macro 벤치마크</text>
  <text x="255" y="116" fill="#e8e4df" font-size="11">앱 전체 + 외부 자원</text>
  <text x="255" y="134" fill="#66bb6a" font-size="10">가장 좋은 측정</text>
  <text x="255" y="152" fill="rgb(138,133,128)" font-size="10">DB·LDAP·네트워크 포함</text>
  <text x="255" y="170" fill="rgb(138,133,128)" font-size="10">전체는 부분의 합 이상</text>
  <text x="255" y="190" fill="rgb(138,133,128)" font-size="10">자원 배분 우선순위가</text>
  <text x="255" y="205" fill="rgb(138,133,128)" font-size="10">병목 위치를 알려줌</text>

  <rect x="454" y="74" width="208" height="150" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="472" y="96" fill="rgb(212,168,83)" font-size="13" font-weight="bold">meso 벤치마크</text>
  <text x="472" y="116" fill="#e8e4df" font-size="11">micro와 macro 중간</text>
  <text x="472" y="134" fill="rgb(138,133,128)" font-size="10">실제 일은 하나 전체 앱 아님</text>
  <text x="472" y="152" fill="rgb(138,133,128)" font-size="10">예: 단순 REST 호출</text>
  <text x="472" y="170" fill="#66bb6a" font-size="10">함정 적고 다루기 쉬움</text>
  <text x="472" y="190" fill="rgb(138,133,128)" font-size="10">자동화 테스트에 적합</text>
  <text x="472" y="208" fill="#f47f72" font-size="9">단, 전체 앱 대체는 아님</text>

  <!-- warm-up 띠 -->
  <rect x="20" y="234" width="642" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="252" fill="#e8e4df" font-size="12" font-weight="bold">warm-up</text>
  <text x="120" y="252" fill="rgb(138,133,128)" font-size="11">Java 코드는 오래 돌수록 빨라짐(JIT) → warm-up 없으면 컴파일 성능을 재게 됨</text>
  <text x="120" y="268" fill="rgb(138,133,128)" font-size="10">JPA 캐시·OS page cache 등도 warm 효과. 단 시작~끝 전체가 중요한 배치도 많음</text>

  <!-- 지표 3종 -->
  <text x="20" y="298" fill="#e8e4df" font-size="13" font-weight="bold">성능 지표 — 셋은 서로 연관됩니다</text>

  <rect x="20" y="308" width="206" height="96" fill="rgba(127,168,201,0.10)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="38" y="330" fill="#9cc3df" font-size="12" font-weight="bold">배치(경과 시간)</text>
  <text x="38" y="350" fill="#e8e4df" font-size="11">작업 시작~끝 걸린 시간</text>
  <text x="38" y="368" fill="rgb(138,133,128)" font-size="10">가장 단순한 측정</text>
  <text x="38" y="386" fill="rgb(138,133,128)" font-size="10">warm-up 없이도 유효</text>
  <text x="38" y="400" fill="rgb(138,133,128)" font-size="9">초기 성능도 사용자에겐 중요</text>

  <rect x="237" y="308" width="206" height="96" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="2"/>
  <text x="255" y="330" fill="#66bb6a" font-size="12" font-weight="bold">처리량(throughput)</text>
  <text x="255" y="350" fill="#e8e4df" font-size="11">단위 시간당 작업량</text>
  <text x="255" y="368" fill="rgb(138,133,128)" font-size="10">OPS·RPS·TPS · think time 0</text>
  <text x="255" y="386" fill="rgb(138,133,128)" font-size="10">warm-up 후 측정</text>
  <text x="255" y="400" fill="rgb(138,133,128)" font-size="9">클라가 병목 안 되게 주의</text>

  <rect x="454" y="308" width="208" height="96" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="472" y="330" fill="rgb(212,168,83)" font-size="12" font-weight="bold">응답 시간</text>
  <text x="472" y="350" fill="#e8e4df" font-size="11">요청~응답 사이 시간</text>
  <text x="472" y="368" fill="rgb(138,133,128)" font-size="10">think time 둠 → 처리량 고정</text>
  <text x="472" y="386" fill="rgb(138,133,128)" font-size="10">평균 vs 백분위(90th%)</text>
  <text x="472" y="400" fill="#f47f72" font-size="9">이상치가 평균을 크게 흔듦</text>

  <!-- think vs cycle, 평균 vs 백분위 -->
  <rect x="20" y="414" width="642" height="80" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="436" fill="#e8e4df" font-size="12" font-weight="bold">think time vs cycle time · 평균 vs 백분위</text>
  <text x="38" y="456" fill="rgb(138,133,128)" font-size="10">think time: 요청 사이 고정 수면 → 처리량이 응답시간에 약간 의존</text>
  <text x="38" y="473" fill="rgb(138,133,128)" font-size="10">cycle time: 요청 간 총시간 고정(수면 = 30s − 응답시간) → 처리량 고정</text>
  <text x="38" y="488" fill="rgb(212,168,83)" font-size="10">평균과 백분위를 함께 볼 것 — 큰 이상치를 놓치지 않으려면</text>

  <!-- 이상치 -->
  <rect x="20" y="504" width="642" height="80" fill="rgba(244,67,54,0.08)" stroke="#f44336" stroke-width="2"/>
  <text x="38" y="526" fill="#f44336" font-size="12" font-weight="bold">이상치(outlier) — 평균과 백분위가 뒤집힐 수 있음</text>
  <text x="38" y="546" fill="#e8e4df" font-size="11">정상: 평균 2.35s, 90th% 4s (평균 &lt; 백분위)</text>
  <text x="38" y="564" fill="#f47f72" font-size="11">100s 이상치 1건: 평균 5.95s, 90th% 1.0s (역전!) → 이상치 줄이는 데 집중</text>
  <text x="38" y="580" fill="rgb(138,133,128)" font-size="9">Java는 GC 일시정지로 이상치가 더 쉽게 발생합니다</text>
</svg>
