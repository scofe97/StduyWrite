<svg viewBox="0 0 680 600" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>완전한 성능 이야기 — JVM 밖의 영향과 원칙들</title>
  <desc>JVM 튜닝은 전체 성능의 작은 일부다. 그 밖의 영향이 적어도 그만큼 중요하다. 첫째 더 나은 알고리즘을 써라. -XX:+RunReallyFast 같은 마법 옵션은 없고, 선형 탐색을 hash map으로 바꾸는 것이 어떤 JVM 최적화보다 크다. 둘째 코드를 덜 써라. 작고 잘 쓴 프로그램이 크고 잘 쓴 프로그램보다 빠르다. 작은 기능이 쌓여 천 번의 베임으로 죽는다(death by 1000 cuts). 셋째 결국 우리는 진다. 릴리스가 거듭되며 기능이 늘어 프로그램은 커지고 느려진다. 우리는 전투(마이너 릴리스 최적화)는 이길 수 있다. 넷째 섣부른 최적화도 하라. Knuth의 격언은 깔끔한 코드를 위한 것이지 성능에 나쁜 줄 아는 구문을 피하지 말라는 뜻이 아니다. 로깅에서 isLoggable 가드로 불필요한 문자열 연결과 메서드 호출을 피하는 선택이 그 예다. 다섯째 다른 곳을 보라. 데이터베이스가 늘 병목이다. 분산 환경에서 Java 서버는 가장 작은 문제일 수 있다. 여섯째 흔한 경우를 최적화하라. 프로파일에서 시간을 많이 쓰는 연산에 집중하고, Occam의 면도날로 가장 단순한 원인부터 의심하라.</desc>
  <rect x="0" y="0" width="680" height="600" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">완전한 성능 이야기 — JVM 밖의 원칙들</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">JVM 튜닝은 전체 성능의 작은 일부, 이 영향들이 적어도 그만큼 중요합니다</text>

  <!-- 1 알고리즘 -->
  <rect x="20" y="74" width="320" height="78" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="2"/>
  <text x="38" y="96" fill="#66bb6a" font-size="13" font-weight="bold">① 더 나은 알고리즘을 써라</text>
  <text x="38" y="116" fill="#e8e4df" font-size="11">-XX:+RunReallyFast 같은 마법은 없습니다</text>
  <text x="38" y="134" fill="rgb(138,133,128)" font-size="10">선형 탐색 → hash map 이 어떤 JVM 최적화보다 큼</text>

  <!-- 2 코드 적게 -->
  <rect x="350" y="74" width="312" height="78" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="368" y="96" fill="rgb(212,168,83)" font-size="13" font-weight="bold">② 코드를 덜 써라</text>
  <text x="368" y="116" fill="#e8e4df" font-size="11">작고 잘 쓴 프로그램이 더 빠릅니다</text>
  <text x="368" y="134" fill="#f47f72" font-size="10">작은 기능이 쌓임 = death by 1,000 cuts</text>

  <!-- 3 진다 -->
  <rect x="20" y="164" width="320" height="78" fill="rgba(244,127,114,0.08)" stroke="#f47f72" stroke-width="2"/>
  <text x="38" y="186" fill="#f47f72" font-size="13" font-weight="bold">③ 결국 우리는 진다</text>
  <text x="38" y="206" fill="#e8e4df" font-size="11">릴리스마다 기능 늘어 커지고 느려짐</text>
  <text x="38" y="224" fill="#66bb6a" font-size="10">단, 마이너 릴리스 최적화 전투는 이길 수 있음</text>

  <!-- 4 섣부른 최적화 -->
  <rect x="350" y="164" width="312" height="78" fill="rgba(127,168,201,0.10)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="368" y="186" fill="#9cc3df" font-size="13" font-weight="bold">④ 섣부른 최적화도 하라</text>
  <text x="368" y="206" fill="#e8e4df" font-size="11">Knuth 격언은 깔끔한 코드를 위한 것</text>
  <text x="368" y="224" fill="rgb(138,133,128)" font-size="10">나쁜 줄 아는 구문은 피하라 (logging 가드)</text>

  <!-- logging 예제 -->
  <rect x="20" y="252" width="642" height="92" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="274" fill="#e8e4df" font-size="12" font-weight="bold">예: 로깅 — 같은 깔끔함, 불필요한 연결·호출 제거</text>
  <rect x="38" y="284" width="300" height="48" fill="rgba(244,67,54,0.08)" stroke="#f44336"/>
  <text x="48" y="302" fill="#f47f72" font-family="'JetBrains Mono',monospace" font-size="9">log.log(FINE, "X=" + calcX() ...)</text>
  <text x="48" y="320" fill="rgb(138,133,128)" font-size="9">미출력이어도 문자열 연결·calcX/Y() 호출</text>
  <rect x="350" y="284" width="312" height="48" fill="rgba(102,187,106,0.08)" stroke="#66bb6a"/>
  <text x="362" y="302" fill="#66bb6a" font-family="'JetBrains Mono',monospace" font-size="9">if (log.isLoggable(FINE)) { ... }</text>
  <text x="362" y="320" fill="rgb(138,133,128)" font-size="9">가드로 연결·호출·배열 할당 자체를 회피</text>

  <!-- 5 DB -->
  <rect x="20" y="356" width="320" height="84" fill="rgba(212,168,83,0.08)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="38" y="378" fill="rgb(212,168,83)" font-size="13" font-weight="bold">⑤ 다른 곳을 보라 — DB가 늘 병목</text>
  <text x="38" y="398" fill="#e8e4df" font-size="11">분산 환경에선 Java 서버가 가장 작은 문제일 수도</text>
  <text x="38" y="416" fill="#f47f72" font-size="10">과부하 시스템에 부하 추가 = 전체 더 느려짐</text>
  <text x="38" y="432" fill="rgb(138,133,128)" font-size="10">버그·병목은 JVM에 국한되지 않음 (JMeter 일화)</text>

  <!-- 6 공통 경우 -->
  <rect x="350" y="356" width="312" height="84" fill="rgba(127,168,201,0.08)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="368" y="378" fill="#9cc3df" font-size="13" font-weight="bold">⑥ 흔한 경우를 최적화하라</text>
  <text x="368" y="398" fill="#e8e4df" font-size="11">프로파일에서 시간 많이 쓰는 연산에 집중</text>
  <text x="368" y="416" fill="rgb(138,133,128)" font-size="10">Occam의 면도날: 가장 단순한 원인부터 의심</text>
  <text x="368" y="432" fill="rgb(138,133,128)" font-size="10">흔한 작업에 단순한 알고리즘을</text>

  <!-- 결론 -->
  <rect x="20" y="452" width="642" height="128" fill="rgba(102,187,106,0.06)" stroke="#66bb6a" stroke-width="2"/>
  <text x="38" y="474" fill="#66bb6a" font-size="13" font-weight="bold">요약 — JVM은 전체 그림의 작은 조각</text>
  <text x="38" y="496" fill="#e8e4df" font-size="11">이 책은 JVM·플랫폼 API를 가장 잘 쓰는 법에 집중합니다</text>
  <text x="38" y="516" fill="rgb(138,133,128)" font-size="11">그러나 DB·백엔드의 성능이 JVM만큼 중요한 시스템 차원의 접근이 필요합니다</text>
  <text x="38" y="536" fill="rgb(138,133,128)" font-size="11">전제: Java 컴포넌트가 진짜 병목임을 사전 분석으로 확인했다고 가정합니다</text>
  <text x="38" y="558" fill="rgb(212,168,83)" font-size="11">JVM과 시스템의 상호작용(DB 호출 방식·native 메모리)도 이 책이 다룹니다</text>
</svg>
