<svg viewBox="0 0 680 600" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>JPA 캐시와 Spring Data</title>
  <desc>JPA는 두 캐시가 있다. 각 entity manager는 자기 캐시로 트랜잭션 중 데이터를 로컬 캐시한다. 이게 L1이다. commit 시 로컬 캐시가 전역 캐시로 병합된다. 이게 L2다. L1은 튜닝할 게 적고 항상 켜진다. L2는 구현마다 다르고 Hibernate는 기본 꺼짐, EclipseLink는 켜짐이다. L2는 primary key로 접근한 entity만 캐시한다. find나 관계 로드다. 쿼리로 가져온 entity는 L2에 안 들어간다. 그래서 lazy는 첫 실행 22.7초 후속 1.1초다. 후속이 빠른 건 관계 entity가 L2에 있어서다. JOIN fetch는 9.0초지만 후속도 5.6초다. 쿼리 결과가 L2에 없어 매번 SQL이 든다. 쿼리 캐시가 있으면 후속이 1ms다. 쿼리를 아예 피하면 find로 L2만 써 후속이 0.28초다. 캐시는 메모리를 써 GC 압박이 되니 크기나 soft weak ref로 튜닝한다. Spring Data는 JDBC JPA NoSQL R2DBC 네 모듈이고 각각 이 장의 성능 고려가 적용된다.</desc>
  <rect x="0" y="0" width="680" height="600" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">JPA 캐시와 Spring Data</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">L2는 쿼리 결과를 캐시 안 해 — 장기적으로 쿼리를 피하는 게 이로울 수 있습니다</text>

  <!-- L1 / L2 -->
  <rect x="20" y="74" width="320" height="100" fill="rgba(127,168,201,0.08)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="38" y="96" fill="#9cc3df" font-size="12" font-weight="bold">L1 (entity manager)</text>
  <text x="38" y="116" fill="rgb(138,133,128)" font-size="10">트랜잭션 중 로컬 캐시</text>
  <text x="38" y="134" fill="rgb(138,133,128)" font-size="10">commit 시 DB로 전송</text>
  <text x="38" y="152" fill="#66bb6a" font-size="10">튜닝할 것 적음 · 항상 켜짐</text>
  <text x="38" y="168" fill="rgb(138,133,128)" font-size="9">서버 주입 entity manager는 별개 인스턴스</text>

  <rect x="350" y="74" width="312" height="100" fill="rgba(212,168,83,0.08)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="368" y="96" fill="rgb(212,168,83)" font-size="12" font-weight="bold">L2 (전역·공유)</text>
  <text x="368" y="116" fill="rgb(138,133,128)" font-size="10">commit 시 L1이 병합</text>
  <text x="368" y="134" fill="rgb(138,133,128)" font-size="10">primary key 접근 entity만(find·관계)</text>
  <text x="368" y="152" fill="#f47f72" font-size="10">쿼리로 가져온 entity는 미적재</text>
  <text x="368" y="168" fill="rgb(138,133,128)" font-size="9">Hibernate 기본 OFF · EclipseLink ON</text>

  <!-- 캐시 표 -->
  <rect x="20" y="182" width="642" height="160" fill="rgba(102,187,106,0.06)" stroke="#66bb6a" stroke-width="2"/>
  <text x="38" y="204" fill="#66bb6a" font-size="13" font-weight="bold">256 stock 읽기 — 첫 실행 / 후속 (SQL 호출)</text>
  <text x="38" y="226" fill="rgb(138,133,128)" font-size="11">lazy 관계</text>
  <text x="300" y="226" fill="rgb(138,133,128)" font-size="11">22.7초 (66,817) / 1.1초 (1)</text>
  <text x="38" y="246" fill="rgb(138,133,128)" font-size="11">eager 관계</text>
  <text x="300" y="246" fill="rgb(138,133,128)" font-size="11">23초 (66,817) / 1.0초 (1)</text>
  <text x="38" y="266" fill="rgb(212,168,83)" font-size="11">JOIN fetch</text>
  <text x="300" y="266" fill="rgb(212,168,83)" font-size="11">9.0초 (1) / 5.6초 (1)</text>
  <text x="38" y="286" fill="#66bb6a" font-size="11">JOIN fetch + query cache</text>
  <text x="300" y="286" fill="#66bb6a" font-size="11">5.8초 (1) / 0.001초 (0)</text>
  <text x="38" y="306" fill="#9cc3df" font-size="11">쿼리 회피(find만)</text>
  <text x="300" y="306" fill="#9cc3df" font-size="11">35초 (133,632) / 0.28초 (0)</text>
  <text x="38" y="330" fill="#f47f72" font-size="10">JOIN fetch는 첫 실행 빠르나 후속도 SQL 필요(L2 우회) — query cache 없으면 역효과 잦음</text>

  <!-- 사이징 -->
  <rect x="20" y="350" width="642" height="74" fill="rgba(244,127,114,0.06)" stroke="#f47f72" stroke-width="2"/>
  <text x="38" y="372" fill="#f47f72" font-size="13" font-weight="bold">L2 캐시 사이징 — GC 압박 주의</text>
  <text x="38" y="394" fill="rgb(138,133,128)" font-size="11">캐시가 메모리를 너무 쓰면 GC 압박 → 크기(전역/entity별)나 soft/weak ref로 튜닝</text>
  <text x="38" y="414" fill="#f47f72" font-size="11">단 weak ref는 GC를 못 견뎌 캐시로 의심스러움(7장). 큰 L2면 heap 튜닝이 중요</text>

  <!-- Spring Data -->
  <rect x="20" y="432" width="642" height="150" fill="rgba(127,168,201,0.06)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="38" y="454" fill="#9cc3df" font-size="13" font-weight="bold">Spring Data — 네 모듈</text>
  <text x="38" y="476" fill="rgb(138,133,128)" font-size="11">Spring Data JDBC — JPA의 단순 대안(캐시·lazy·dirty tracking 없음), JDBC 위 → 이 장 그대로 적용</text>
  <text x="38" y="498" fill="rgb(138,133,128)" font-size="11">Spring Data JPA — 표준 JPA 래퍼(보일러플레이트↓), JPA 성능 고려 모두 적용</text>
  <text x="38" y="520" fill="rgb(138,133,128)" font-size="11">Spring Data NoSQL — MongoDB·Cassandra·Couchbase·Redis 커넥터</text>
  <text x="38" y="542" fill="rgb(138,133,128)" font-size="11">Spring Data R2DBC — 비동기 JDBC(Postgres·H2·MS SQL), JPA 기능 없는 단순 entity</text>
  <text x="38" y="566" fill="rgb(212,168,83)" font-size="10">11장 요약: batch · SQL 최적화(L2 고려) · 락 최소화 · statement/connection pool · 적절한 트랜잭션 범위</text>
</svg>
