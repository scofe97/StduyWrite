<svg viewBox="0 0 680 600" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Java Flight Recorder와 Java Mission Control</title>
  <desc>Java Flight Recorder(JFR)는 JVM에 내장된 경량 성능 분석 기능이다. JVM의 이벤트 이력을 기록해 과거 성능과 동작을 진단한다. 원래 BEA의 JRockit 기능이었고 HotSpot으로 들어왔다. JDK 8에서는 Oracle JVM만, JDK 11에서는 오픈소스 JVM에서도 쓸 수 있다. 동작 원리는 선택된 이벤트가 발생할 때마다 데이터를 circular buffer에 저장하고, 최근 이벤트만 남는다. Java Mission Control(jmc)로 그 이벤트를 표시한다. 기본 설정에서 오버헤드는 1% 미만이다. JFR은 JVM에 내장됐기에 다른 어떤 도구도 못 주는 수준의 가시성을 준다. Java 11에서 약 131개 이벤트 타입을 모니터할 수 있다. 클래스로딩, 스레드 통계, throwable, TLAB 할당, 파일·소켓 I/O, monitor blocked, code cache, 코드 컴파일, GC, 프로파일링 등이다. 활성화는 -XX:+FlightRecorder 플래그로 기능을 켜고, 녹화는 jmc GUI나 명령행으로 시작한다. 고정 시간 녹화는 proactive 분석에, 연속 녹화(circular buffer)는 reactive 분석에 쓴다. jcmd로 JFR.start, JFR.dump, JFR.check, JFR.stop을 실행한다. 이벤트는 템플릿으로 정의하며 default 템플릿은 오버헤드 1% 미만, profile 템플릿은 약 2%다.</desc>
  <rect x="0" y="0" width="680" height="600" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">Java Flight Recorder와 Mission Control</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">JVM 내장이라 다른 도구가 못 주는 가시성을 1% 미만 오버헤드로 줍니다</text>

  <!-- 동작 흐름 -->
  <rect x="20" y="74" width="642" height="92" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="96" fill="#e8e4df" font-size="13" font-weight="bold">동작 — 이벤트 → circular buffer → JMC</text>
  <rect x="38" y="108" width="150" height="44" fill="rgba(212,168,83,0.13)" stroke="rgb(212,168,83)"/><text x="113" y="128" fill="rgb(212,168,83)" font-size="10" text-anchor="middle">이벤트 발생</text><text x="113" y="144" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">락 대기·I/O 등</text>
  <text x="196" y="135" fill="rgb(138,133,128)" font-size="18">→</text>
  <rect x="218" y="108" width="170" height="44" fill="rgba(127,168,201,0.13)" stroke="#7fa8c9"/><text x="303" y="128" fill="#9cc3df" font-size="10" text-anchor="middle">circular buffer</text><text x="303" y="144" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">최근 이벤트만(메모리·파일)</text>
  <text x="396" y="135" fill="rgb(138,133,128)" font-size="18">→</text>
  <rect x="418" y="108" width="244" height="44" fill="rgba(102,187,106,0.13)" stroke="#66bb6a"/><text x="540" y="128" fill="#66bb6a" font-size="10" text-anchor="middle">Java Mission Control (jmc)</text><text x="540" y="144" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">라이브 또는 저장 파일에서 분석</text>

  <!-- 버전 가용성 -->
  <rect x="20" y="176" width="642" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="200" fill="rgb(138,133,128)" font-size="11">출신: JRockit → HotSpot · JDK 8은 Oracle JVM만(상용 라이선스) · JDK 11은 오픈소스 JVM에서도 사용 가능</text>

  <!-- 주요 이벤트 -->
  <rect x="20" y="226" width="642" height="124" fill="rgba(212,168,83,0.06)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="38" y="248" fill="rgb(212,168,83)" font-size="13" font-weight="bold">주요 이벤트 타입 (Java 11 약 131종)</text>
  <text x="38" y="268" fill="#e8e4df" font-size="10">classloading · thread statistics · throwables · TLAB allocation · file/socket I/O</text>
  <text x="38" y="286" fill="#e8e4df" font-size="10">monitor blocked · code cache · code compilation · garbage collection · profiling</text>
  <text x="38" y="308" fill="#66bb6a" font-size="10">JFR만의 가치: 특정 락에 블록된 스레드, 특정 객체 할당 스택, 어느 파일/소켓이 느린지</text>
  <text x="38" y="326" fill="rgb(138,133,128)" font-size="10">→ JVM이 직접 주는 데이터라 외부 도구로는 얻기 어려운 가시성</text>
  <text x="38" y="344" fill="rgb(138,133,128)" font-size="9">확장 가능: 앱이 자체 이벤트 정의(WebLogic의 JDBC·HTTP 이벤트 등)</text>

  <!-- 활성화 -->
  <rect x="20" y="360" width="320" height="130" fill="rgba(127,168,201,0.08)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="38" y="382" fill="#9cc3df" font-size="13" font-weight="bold">활성화</text>
  <text x="38" y="402" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="9">-XX:+FlightRecorder</text>
  <text x="38" y="418" fill="rgb(138,133,128)" font-size="10">기능을 켬 (녹화는 별도 시작)</text>
  <text x="38" y="436" fill="rgb(138,133,128)" font-size="10">JDK 8 Oracle: +UnlockCommercialFeatures</text>
  <text x="38" y="456" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="9">jcmd: JFR.start/dump/check/stop</text>
  <text x="38" y="474" fill="rgb(138,133,128)" font-size="10">또는 jmc GUI · -XX:+StartFlightRecording</text>

  <!-- proactive vs reactive -->
  <rect x="350" y="360" width="312" height="130" fill="rgba(102,187,106,0.08)" stroke="#66bb6a" stroke-width="2"/>
  <text x="368" y="382" fill="#66bb6a" font-size="13" font-weight="bold">녹화 2모드</text>
  <text x="368" y="402" fill="#e8e4df" font-size="11">고정 시간 → proactive 분석</text>
  <text x="368" y="420" fill="rgb(138,133,128)" font-size="10">부하 실험 중 시작, JVM 반응 파악</text>
  <text x="368" y="440" fill="#e8e4df" font-size="11">연속(circular buffer) → reactive 분석</text>
  <text x="368" y="458" fill="rgb(138,133,128)" font-size="10">최근 이벤트 유지, 이벤트 발생 시 덤프</text>
  <text x="368" y="478" fill="rgb(138,133,128)" font-size="10">예: 5분 초과 요청 시 자동 덤프</text>

  <!-- 템플릿 -->
  <rect x="20" y="500" width="642" height="84" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="522" fill="#e8e4df" font-size="13" font-weight="bold">이벤트 선택 — 템플릿과 오버헤드</text>
  <text x="38" y="542" fill="#66bb6a" font-size="11">default 템플릿: 비싼 6개 이벤트 제외, threshold 높음 → 오버헤드 1% 미만</text>
  <text x="38" y="560" fill="rgb(212,168,83)" font-size="11">profile 템플릿: threshold 이벤트 대부분 10ms마다 → 오버헤드 약 2%</text>
  <text x="38" y="578" fill="rgb(138,133,128)" font-size="10">템플릿은 XML 파일 · 스택 트레이스 수집은 오버헤드를 키워 선택 옵션 · 프로덕션 장애 분석에도 유용</text>
</svg>
