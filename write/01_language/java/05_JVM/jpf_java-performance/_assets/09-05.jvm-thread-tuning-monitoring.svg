<svg viewBox="0 0 680 600" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>JVM 스레드 튜닝과 모니터링</title>
  <desc>JVM은 스레드 성능에 영향을 주는 몇 튜닝이 있지만 효과는 작다. 각 스레드는 native stack을 가지고 기본 1MB다. 64비트에선 메모리가 빠듯하지 않으면 바꿀 이유가 없지만 Docker 컨테이너처럼 제한적이면 256KB로 줄인다. 너무 작으면 StackOverflowError가 난다. native 메모리 부족 OOM은 세 원인이 있다. 32비트 4GB 한계, 가상 메모리 고갈, Unix 사용자 프로세스 수 한계다. biased locking은 최근 락을 쓴 스레드에 우선권을 준다. 그러나 스레드 풀은 여러 스레드가 동등하게 접근해 오히려 나쁘다. UseBiasedLocking을 끄면 약간 개선된다. thread priority는 OS가 마지막 실행 후 경과 시간 등을 함께 봐 의존할 수 없다. 모니터링은 두 가지를 본다. 스레드 수와 락 대기 시간이다. jconsole로 스레드 수를 실시간으로 보고, JFR로 block 이벤트를 histogram에서 본다. jstack은 safepoint에서 스레드 상태를 덤프하며 Running Blocked Waiting I/O로 집계한다.</desc>
  <rect x="0" y="0" width="680" height="600" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">JVM 스레드 튜닝과 모니터링</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">튜닝 효과는 작고, 모니터링은 스레드 수와 락 대기 시간 두 가지를 봅니다</text>

  <!-- stack size -->
  <rect x="20" y="74" width="320" height="110" fill="rgba(127,168,201,0.08)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="38" y="96" fill="#9cc3df" font-size="12" font-weight="bold">thread stack 크기</text>
  <text x="38" y="116" fill="rgb(138,133,128)" font-size="10">기본 1MB (32비트 Windows 320KB)</text>
  <text x="38" y="134" fill="rgb(138,133,128)" font-size="10">-Xss=256k 로 축소</text>
  <text x="38" y="152" fill="rgb(138,133,128)" font-size="10">Docker 메모리 제한 시 유용</text>
  <text x="38" y="172" fill="#f47f72" font-size="10">너무 작으면 StackOverflowError</text>

  <rect x="350" y="74" width="312" height="110" fill="rgba(244,127,114,0.08)" stroke="#f47f72" stroke-width="2"/>
  <text x="368" y="96" fill="#f47f72" font-size="12" font-weight="bold">native OOM 세 원인</text>
  <text x="368" y="116" fill="rgb(138,133,128)" font-size="10">① 32비트 4GB 한계</text>
  <text x="368" y="134" fill="rgb(138,133,128)" font-size="10">② 가상 메모리 고갈</text>
  <text x="368" y="152" fill="rgb(138,133,128)" font-size="10">③ Unix 사용자 프로세스 수 한계</text>
  <text x="368" y="172" fill="#f47f72" font-size="10">stack 축소는 ①②만 해결(③ 무관)</text>

  <!-- biased locking / priority -->
  <rect x="20" y="192" width="320" height="92" fill="rgba(212,168,83,0.06)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="38" y="214" fill="rgb(212,168,83)" font-size="12" font-weight="bold">biased locking</text>
  <text x="38" y="234" fill="rgb(138,133,128)" font-size="10">최근 락 쓴 스레드에 우선권(cache 적중↑)</text>
  <text x="38" y="252" fill="#f47f72" font-size="10">스레드 풀은 오히려 나쁨(동등 접근)</text>
  <text x="38" y="272" fill="rgb(138,133,128)" font-size="10">-XX:-UseBiasedLocking 으로 끄면 개선</text>

  <rect x="350" y="192" width="312" height="92" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="368" y="214" fill="#e8e4df" font-size="12" font-weight="bold">thread priority</text>
  <text x="368" y="234" fill="rgb(138,133,128)" font-size="10">OS가 마지막 실행 후 경과 시간도 봄</text>
  <text x="368" y="252" fill="rgb(138,133,128)" font-size="10">어떤 스레드도 starve 안 함</text>
  <text x="368" y="272" fill="#f47f72" font-size="10">실행 빈도를 priority에 의존 불가 → 앱 로직으로</text>

  <!-- 모니터링 -->
  <rect x="20" y="292" width="642" height="110" fill="rgba(102,187,106,0.06)" stroke="#66bb6a" stroke-width="2"/>
  <text x="38" y="314" fill="#66bb6a" font-size="13" font-weight="bold">모니터링 — 도구 3종</text>
  <text x="38" y="336" fill="rgb(138,133,128)" font-size="11">jconsole: 스레드 수 실시간 그래프 + 개별 스택(높은 수준 그림)</text>
  <text x="38" y="356" fill="#66bb6a" font-size="11">JFR: block 이벤트를 histogram에서 — monitor 대기·긴 socket read (JVM 통합으로 최선)</text>
  <text x="38" y="376" fill="rgb(138,133,128)" font-size="11">jstack: safepoint에서 모든 스레드 상태 덤프 (락·I/O 대기 식별)</text>
  <text x="38" y="394" fill="#f47f72" font-size="10">jstack 주의: safepoint에서만·한 번에 하나씩 → 모순된 정보 가능(빠른 프로파일러 대용 부적합)</text>

  <!-- jstack 상태별 -->
  <rect x="20" y="410" width="642" height="172" fill="rgba(127,168,201,0.06)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="38" y="432" fill="#9cc3df" font-size="13" font-weight="bold">jstack 상태별 집계 — 무엇이 막혔나</text>
  <rect x="38" y="444" width="290" height="60" fill="rgba(244,127,114,0.08)" stroke="#f47f72"/>
  <text x="50" y="464" fill="#f47f72" font-size="11" font-weight="bold">Blocked by Locks</text>
  <text x="50" y="482" fill="rgb(138,133,128)" font-size="10">다수면 그 락에 심한 경쟁</text>
  <text x="50" y="498" fill="rgb(138,133,128)" font-size="10">예: SAX 파서 JAR 락 → 설정으로 회피</text>
  <rect x="336" y="444" width="318" height="60" fill="rgba(212,168,83,0.08)" stroke="rgb(212,168,83)"/>
  <text x="348" y="464" fill="rgb(212,168,83)" font-size="11" font-weight="bold">Waiting for I/O read</text>
  <text x="348" y="482" fill="rgb(138,133,128)" font-size="10">socketRead0 — backend 대기</text>
  <text x="348" y="498" fill="rgb(138,133,128)" font-size="10">DB·외부 자원 튜닝 신호</text>
  <text x="38" y="524" fill="rgb(138,133,128)" font-size="11">Running: 실행 중 / Waiting for notify: 풀에서 작업 대기(정상일 수 있음)</text>
  <text x="38" y="546" fill="#e8e4df" font-size="11">핵심: block된 스레드가 많으면 성능 저하 — 원인 불문 설정·앱 변경으로 해소</text>
  <text x="38" y="568" fill="rgb(138,133,128)" font-size="10">스레드 성능은 튜닝보다 best-practice(스레드 수 관리·동기화 최소화)가 핵심</text>
</svg>
