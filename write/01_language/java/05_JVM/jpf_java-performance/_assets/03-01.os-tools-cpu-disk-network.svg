<svg viewBox="0 0 680 600" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>OS 레벨 도구 — CPU·디스크·네트워크 모니터링</title>
  <desc>성능 분석은 가시성이 전부이고 가시성은 도구가 전부다. 분석의 출발점은 Java가 아니라 OS 모니터링 도구다. Unix는 vmstat·iostat·netstat, Windows는 typeperf를 쓴다. CPU 사용률은 user time(애플리케이션 코드 실행)과 system time(커널 코드 실행)으로 나뉜다. 성능의 목표는 CPU를 가능한 짧은 시간 동안 가능한 높게 쓰는 것이다. CPU가 100%가 아니면 그만큼 놀고 있다는 뜻이고, 더 빠르게 끝낼 여지가 있다는 뜻이다. CPU가 idle한 이유는 셋이다. 락 같은 동기화 기본 요소에 블록됐거나, DB 응답 같은 무언가를 기다리거나, 할 일이 없는 것이다. 앞 둘은 고칠 수 있는 신호다. run queue(Unix)는 실행 중이거나 실행 가능한 스레드 수로, Unix는 CPU 수 이하, Windows의 processor queue는 0이어야 한다. 디스크는 iostat로 보며, 비효율적 쓰기(처리량 너무 낮음)나 과다 쓰기(처리량 너무 높음) 양쪽이 병목이 된다. swapping이 일어나면 성능이 크게 나빠지므로 절대 일어나지 않게 설정한다. 네트워크는 nicstat로 이용률을 보며, 로컬 이더넷은 지속 40% 초과면 포화로 본다. bps와 Bps를 혼동하지 않는다.</desc>
  <rect x="0" y="0" width="680" height="600" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">OS 레벨 도구 — CPU·디스크·네트워크</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">분석의 출발점은 Java가 아니라 OS 모니터링입니다 (vmstat·iostat·nicstat)</text>

  <!-- CPU -->
  <rect x="20" y="74" width="642" height="150" fill="rgba(212,168,83,0.06)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="38" y="96" fill="rgb(212,168,83)" font-size="14" font-weight="bold">CPU 사용률 — 짧게, 높게</text>
  <text x="38" y="116" fill="#e8e4df" font-size="11">user time(앱 코드) + system time(커널 코드, I/O 등) · 구간 평균값</text>
  <text x="38" y="134" fill="#66bb6a" font-size="11">목표: 가능한 짧은 시간 동안 100%로 → 높을수록 좋음(효율적으로 쓰는 중)</text>
  <text x="38" y="156" fill="#e8e4df" font-size="12" font-weight="bold">CPU가 idle한 3가지 이유</text>
  <rect x="38" y="166" width="200" height="46" fill="rgba(244,127,114,0.10)" stroke="#f47f72"/>
  <text x="48" y="184" fill="#f47f72" font-size="10" font-weight="bold">① 락에 블록</text>
  <text x="48" y="202" fill="rgb(138,133,128)" font-size="9">동기화 경합 → 고칠 수 있음</text>
  <rect x="246" y="166" width="200" height="46" fill="rgba(244,127,114,0.10)" stroke="#f47f72"/>
  <text x="256" y="184" fill="#f47f72" font-size="10" font-weight="bold">② 무언가 대기</text>
  <text x="256" y="202" fill="rgb(138,133,128)" font-size="9">DB 응답 등 → 고칠 수 있음</text>
  <rect x="454" y="166" width="208" height="46" fill="rgba(102,187,106,0.10)" stroke="#66bb6a"/>
  <text x="464" y="184" fill="#66bb6a" font-size="10" font-weight="bold">③ 할 일 없음</text>
  <text x="464" y="202" fill="rgb(138,133,128)" font-size="9">서버가 요청 대기 = 정상</text>

  <!-- run queue -->
  <rect x="20" y="234" width="642" height="58" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="256" fill="#e8e4df" font-size="12" font-weight="bold">run queue / processor queue — 실행 가능 스레드 수</text>
  <text x="38" y="276" fill="rgb(138,133,128)" font-size="10">Unix run queue: 실행 중+실행 가능 스레드, CPU 수 이하 권장 · Windows processor queue: 실행 중 제외, 0 권장</text>

  <!-- 디스크 -->
  <rect x="20" y="302" width="320" height="140" fill="rgba(127,168,201,0.08)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="38" y="324" fill="#9cc3df" font-size="13" font-weight="bold">디스크 — iostat</text>
  <text x="38" y="344" fill="#e8e4df" font-size="11">병목은 양방향으로 옵니다</text>
  <text x="38" y="362" fill="#f47f72" font-size="10">① 비효율 쓰기 → 처리량 너무 낮음</text>
  <text x="38" y="380" fill="#f47f72" font-size="10">② 과다 쓰기 → 처리량 너무 높음</text>
  <text x="38" y="400" fill="rgb(138,133,128)" font-size="10">단서: system time 높음·잦은 write</text>
  <text x="38" y="418" fill="rgb(212,168,83)" font-size="10">swapping 감시(si/so 컬럼)</text>
  <text x="38" y="436" fill="#f44336" font-size="9">swap 발생 시 성능 급락 → 절대 금지</text>

  <!-- 네트워크 -->
  <rect x="350" y="302" width="312" height="140" fill="rgba(102,187,106,0.08)" stroke="#66bb6a" stroke-width="2"/>
  <text x="368" y="324" fill="#66bb6a" font-size="13" font-weight="bold">네트워크 — nicstat</text>
  <text x="368" y="344" fill="#e8e4df" font-size="11">표준 도구는 이용률을 안 줌(패킷·바이트만)</text>
  <text x="368" y="362" fill="rgb(138,133,128)" font-size="10">nicstat: 인터페이스 이용률 자동 계산</text>
  <text x="368" y="382" fill="#f47f72" font-size="10">로컬 이더넷 지속 40% 초과 = 포화</text>
  <text x="368" y="400" fill="rgb(138,133,128)" font-size="10">100% 이용률은 지속 불가</text>
  <text x="368" y="420" fill="rgb(212,168,83)" font-size="10">bps(비트) vs Bps(바이트) 혼동 주의</text>
  <text x="368" y="438" fill="rgb(138,133,128)" font-size="9">1,000Mb = 125MB/s</text>

  <!-- 원칙 띠 -->
  <rect x="20" y="452" width="642" height="132" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="474" fill="#e8e4df" font-size="13" font-weight="bold">핵심 원칙</text>
  <text x="38" y="496" fill="rgb(138,133,128)" font-size="11">① 성능 테스트 때 CPU·메모리·디스크(·네트워크) OS 데이터를 자동 수집합니다</text>
  <text x="38" y="516" fill="rgb(138,133,128)" font-size="11">② 코드 최적화의 목표는 CPU를 낮추는 게 아니라 짧은 시간 높이는 것</text>
  <text x="38" y="536" fill="rgb(138,133,128)" font-size="11">③ idle이 낮은 이유를 먼저 이해하고 튜닝합니다 — 락? 외부 자원? 스레드 풀 부족?</text>
  <text x="38" y="558" fill="rgb(212,168,83)" font-size="11">예외: 고정 부하 + 외부 자원 비제약일 때만 CPU 낮추기가 의미 있음(요청당 시간 단축)</text>
  <text x="38" y="578" fill="rgb(138,133,128)" font-size="10">GUI 그래프를 눈으로 보지 말고 명령행 도구로 출력을 캡처해 나중에 분석합니다</text>
</svg>
