<svg viewBox="0 0 680 600" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>G1 GC 동작 — 4 연산과 5가지 full GC 실패</title>
  <desc>G1 GC는 힙을 region(기본 약 2048개)으로 나눈다. 각 region은 old나 young에 속하고 연속일 필요가 없다. 백그라운드 스레드가 garbage 많은 region을 찾아 먼저 비우는 것이 garbage first라는 이름의 유래다. G1은 네 논리 연산을 한다. young collection은 eden이 차면 모든 스레드를 멈추고 살아있는 객체를 survivor·old로 옮긴다. concurrent marking cycle은 백그라운드로 old의 free 객체를 표시한다. initial-mark(concurrent start)는 young collection과 함께 스레드를 멈추고, root region scan은 young collection에 막힐 수 있고, concurrent mark는 백그라운드, remark·cleanup은 짧게 멈춘다. cycle은 garbage 많은 region을 식별만 하고 거의 안 비운다. mixed collection은 young을 비우며 표시된 old region도 일부 수집하고 region 간 복사로 compaction한다. 필요하면 full GC를 한다. full GC를 부르는 다섯 실패가 있다. concurrent mode failure는 marking 중 old가 참, promotion failure는 mixed로 비우기 전 승격이 넘침, evacuation failure는 survivor·old에 자리 부족, humongous allocation failure는 큰 객체, metadata GC threshold는 metaspace가 참이다. 잘 튜닝된 G1은 young·mixed·concurrent만 본다.</desc>
  <rect x="0" y="0" width="680" height="600" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">G1 GC 동작 — 4 연산과 5 full GC 실패</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">힙을 region으로 나눠 garbage 많은 곳을 먼저 비웁니다 (garbage first)</text>

  <!-- region -->
  <rect x="20" y="74" width="642" height="44" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="96" fill="#e8e4df" font-size="12" font-weight="bold">region</text>
  <text x="100" y="96" fill="rgb(138,133,128)" font-size="11">기본 약 2048개, 각각 old/young 소속(연속 불필요) · 빈 region은 임의 세대로 씀</text>
  <text x="100" y="112" fill="rgb(138,133,128)" font-size="10">young은 전체가 비워지거나 승격 · old는 garbage 많은 region을 골라 처리 (이름의 유래)</text>

  <!-- 4 연산 -->
  <rect x="20" y="126" width="642" height="130" fill="rgba(212,168,83,0.06)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="38" y="148" fill="rgb(212,168,83)" font-size="13" font-weight="bold">4 논리 연산</text>
  <rect x="38" y="160" width="150" height="46" fill="rgba(102,187,106,0.13)" stroke="#66bb6a"/>
  <text x="113" y="178" fill="#66bb6a" font-size="11" text-anchor="middle">① young</text>
  <text x="113" y="195" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">STW, eden→survivor·old</text>
  <rect x="196" y="160" width="150" height="46" fill="rgba(127,168,201,0.13)" stroke="#7fa8c9"/>
  <text x="271" y="178" fill="#9cc3df" font-size="11" text-anchor="middle">② concurrent marking</text>
  <text x="271" y="195" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">백그라운드, old 표시</text>
  <rect x="354" y="160" width="150" height="46" fill="rgba(212,168,83,0.13)" stroke="rgb(212,168,83)"/>
  <text x="429" y="178" fill="rgb(212,168,83)" font-size="11" text-anchor="middle">③ mixed</text>
  <text x="429" y="195" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">young+표시 old region</text>
  <rect x="512" y="160" width="150" height="46" fill="rgba(244,127,114,0.13)" stroke="#f47f72"/>
  <text x="587" y="178" fill="#f47f72" font-size="11" text-anchor="middle">④ full GC</text>
  <text x="587" y="195" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">필요 시 (피해야 함)</text>
  <text x="38" y="226" fill="rgb(138,133,128)" font-size="10">concurrent cycle은 garbage 많은 region을 식별만 함(X 표시) — 실제 해제는 mixed에서</text>
  <text x="38" y="244" fill="#66bb6a" font-size="10">잘 튜닝된 G1은 young·mixed·concurrent만 봅니다 (full GC 없음)</text>

  <!-- concurrent cycle phases -->
  <rect x="20" y="264" width="642" height="96" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="286" fill="#e8e4df" font-size="13" font-weight="bold">concurrent cycle 단계 (일부만 STW)</text>
  <text x="38" y="306" fill="#f47f72" font-size="10">initial-mark / concurrent start — STW (young collection과 함께)</text>
  <text x="38" y="324" fill="rgb(212,168,83)" font-size="10">root region scan — 백그라운드, 단 young collection에 막힐 수 있음(긴 pause)</text>
  <text x="38" y="342" fill="#9cc3df" font-size="10">concurrent mark — 백그라운드(중단 가능) → remark·cleanup — 짧은 STW</text>

  <!-- 5 실패 -->
  <rect x="20" y="368" width="642" height="216" fill="rgba(244,67,54,0.06)" stroke="#f44336" stroke-width="2"/>
  <text x="38" y="390" fill="#f44336" font-size="14" font-weight="bold">full GC를 부르는 5가지 실패</text>
  <rect x="38" y="400" width="300" height="50" fill="rgba(244,127,114,0.10)" stroke="#f47f72"/>
  <text x="50" y="418" fill="#f47f72" font-size="11" font-weight="bold">concurrent mode failure</text>
  <text x="50" y="436" fill="rgb(138,133,128)" font-size="9">marking 중 old가 참 → cycle abort. 힙↑·백그라운드 빨리</text>
  <rect x="350" y="400" width="312" height="50" fill="rgba(244,127,114,0.10)" stroke="#f47f72"/>
  <text x="362" y="418" fill="#f47f72" font-size="11" font-weight="bold">promotion failure</text>
  <text x="362" y="436" fill="rgb(138,133,128)" font-size="9">mixed로 비우기 전 승격 넘침. mixed를 더 빨리</text>
  <rect x="38" y="456" width="300" height="50" fill="rgba(244,127,114,0.10)" stroke="#f47f72"/>
  <text x="50" y="474" fill="#f47f72" font-size="11" font-weight="bold">evacuation failure</text>
  <text x="50" y="492" fill="rgb(138,133,128)" font-size="9">survivor·old 자리 부족(to-space 넘침). 힙 꽉 참/단편화</text>
  <rect x="350" y="456" width="312" height="50" fill="rgba(244,127,114,0.10)" stroke="#f47f72"/>
  <text x="362" y="474" fill="#f47f72" font-size="11" font-weight="bold">humongous allocation failure</text>
  <text x="362" y="492" fill="rgb(138,133,128)" font-size="9">큰 객체(region 절반 초과). region 크기 키우기 (06-04)</text>
  <rect x="38" y="512" width="624" height="48" fill="rgba(244,127,114,0.10)" stroke="#f47f72"/>
  <text x="50" y="530" fill="#f47f72" font-size="11" font-weight="bold">metadata GC threshold</text>
  <text x="50" y="548" fill="rgb(138,133,128)" font-size="9">metaspace가 참 → JDK 8은 full GC(young+full). JDK 11은 full GC 없이 metaspace 수집·리사이즈</text>
  <text x="38" y="576" fill="rgb(212,168,83)" font-size="10">JDK 8 full GC는 단일 스레드(긴 pause), JDK 11은 멀티 스레드 → JDK 11 권장</text>
</svg>
