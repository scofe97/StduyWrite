<svg viewBox="0 0 900 620" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>톰캣의 클래스 로더 아키텍처 — 격리와 공유를 동시에</title>
  <desc>톰캣은 여러 웹 애플리케이션을 한 JVM에서 돌리며 서로 격리해야 하고, 공통 라이브러리는 공유해야 한다. 부트스트랩·시스템·공통(Common) 로더 아래에 Catalina 로더와 Shared 로더를 두고, 각 웹앱마다 WebApp 로더를 둔다. WebApp 로더는 격리를 위해 부모 위임을 일부 깨고 자기 WEB-INF를 먼저 뒤진다. 같은 클래스도 웹앱마다 다른 WebApp 로더가 로딩해 서로 다른 타입으로 격리된다.</desc>
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11.5px; fill: rgb(138,133,128); }
      .ldr   { font-size: 12px; font-weight: 800; fill: #0d0d0d; }
      .ldrsub{ font-size: 9px; fill: rgba(13,13,13,0.72); }
      .note  { font-size: 9.5px; fill: rgb(138,133,128); }
      .lab   { font-size: 10.5px; font-weight: 700; fill: rgb(212,168,83); }
    </style>
    <marker id="t1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#66bb6a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="620" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">톰캣의 클래스 로더 — 웹앱 격리 + 공통 공유</text>
  <text x="28" y="58" class="sub">공통 라이브러리는 위에서 공유 · 웹앱끼리는 WebApp 로더로 격리 · 같은 클래스도 웹앱 다르면 다른 타입</text>

  <!-- 상위 공유 계층 -->
  <rect x="290" y="84" width="320" height="50" rx="9" fill="#f44336"/>
  <text x="450" y="106" class="ldr" text-anchor="middle">부트스트랩 + 시스템 클래스 로더</text>
  <text x="450" y="124" class="ldrsub" text-anchor="middle">JVM 기본 — java.* · CLASSPATH</text>

  <rect x="290" y="158" width="320" height="56" rx="9" fill="rgb(212,168,83)"/>
  <text x="450" y="182" class="ldr" text-anchor="middle">Common 클래스 로더</text>
  <text x="450" y="200" class="ldrsub" text-anchor="middle">lib/ — 톰캣·웹앱 모두가 공유하는 공통 클래스</text>

  <!-- 중간 2갈래: Catalina, Shared -->
  <rect x="150" y="244" width="280" height="56" rx="9" fill="#5b9bd5"/>
  <text x="290" y="268" class="ldr" text-anchor="middle">Catalina 로더 (server)</text>
  <text x="290" y="286" class="ldrsub" text-anchor="middle">톰캣 자신만 — 웹앱에 안 보임</text>

  <rect x="470" y="244" width="280" height="56" rx="9" fill="#5b9bd5"/>
  <text x="610" y="268" class="ldr" text-anchor="middle">Shared 로더</text>
  <text x="610" y="286" class="ldrsub" text-anchor="middle">모든 웹앱이 공유 — 톰캣엔 안 보임</text>

  <!-- 하위 WebApp 로더 2개 -->
  <rect x="120" y="340" width="300" height="160" rx="10" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="270" y="364" class="lab" text-anchor="middle" style="fill:#66bb6a">WebApp 로더 A</text>
  <rect x="140" y="376" width="260" height="44" rx="6" fill="#66bb6a"/>
  <text x="270" y="396" class="ldr" text-anchor="middle">webappA / WEB-INF</text>
  <text x="270" y="412" class="ldrsub" text-anchor="middle">classes + lib — A 전용</text>
  <text x="136" y="444" class="note">JSP 로더(JasperLoader)가 JSP별로 또 분리</text>
  <text x="136" y="464" class="note">→ JSP 핫스왑: 로더 통째 교체</text>
  <text x="136" y="486" class="note">부모 위임 일부 깸: 자기 WEB-INF 먼저</text>

  <rect x="480" y="340" width="300" height="160" rx="10" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="630" y="364" class="lab" text-anchor="middle" style="fill:#66bb6a">WebApp 로더 B</text>
  <rect x="500" y="376" width="260" height="44" rx="6" fill="#66bb6a"/>
  <text x="630" y="396" class="ldr" text-anchor="middle">webappB / WEB-INF</text>
  <text x="630" y="412" class="ldrsub" text-anchor="middle">classes + lib — B 전용</text>
  <text x="496" y="444" class="note">A 와 B 가 같은 Foo.class 를 써도</text>
  <text x="496" y="464" class="note">서로 다른 로더라 다른 타입</text>
  <text x="496" y="486" class="note">→ 웹앱 간 클래스 충돌·간섭 차단</text>

  <!-- 위임 화살표 -->
  <line x1="270" y1="340" x2="270" y2="302" stroke="#66bb6a" stroke-width="2" marker-end="url(#t1)"/>
  <line x1="630" y1="340" x2="630" y2="302" stroke="#66bb6a" stroke-width="2" marker-end="url(#t1)"/>
  <line x1="290" y1="244" x2="380" y2="216" stroke="#66bb6a" stroke-width="2" marker-end="url(#t1)"/>
  <line x1="610" y1="244" x2="520" y2="216" stroke="#66bb6a" stroke-width="2" marker-end="url(#t1)"/>
  <line x1="450" y1="158" x2="450" y2="136" stroke="#66bb6a" stroke-width="2" marker-end="url(#t1)"/>

  <text x="28" y="528" class="sub">설계 원리: 공유할 것은 위 계층(Common/Shared)에, 격리할 것은 아래 계층(WebApp)에 — 부모 위임의 응용</text>
  <text x="28" y="550" class="sub">격리 핵심: "클래스 동일성 = 이름 + 로더"(02-04) 를 그대로 활용 — 웹앱마다 로더가 다르니 타입이 갈림</text>
</svg>
