<svg viewBox="0 0 920 420" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>피연산자 스택 — iconst_1, iconst_2, iadd 의 4단계 계산</title>
  <desc>1 + 2 를 계산하는 바이트코드 iconst_1·iconst_2·iadd 가 피연산자 스택을 [빈] → [1] → [2,1] → [3] 으로 바꾼다. iconst_1 이 1 을 밀어 넣고, iconst_2 가 2 를 그 위에 쌓고, iadd 가 위 두 값을 꺼내 더한 3 을 다시 얹는다. 스택 기반 머신은 레지스터 없이 이렇게 값을 밀고 당겨 계산한다.</desc>
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 12px; fill: rgb(138,133,128); }
      .step  { font-size: 12px; font-weight: 700; fill: rgb(212,168,83); }
      .slot  { font-size: 15px; font-weight: 800; fill: #0d0d0d; }
      .op    { font-size: 12.5px; fill: rgb(138,133,128); }
      .opnow { font-size: 12.5px; font-weight: 800; fill: rgb(212,168,83); }
      .cap   { font-size: 11.5px; fill: rgb(138,133,128); }
      .top   { font-size: 10px; fill: #66bb6a; font-weight: 700; }
    </style>
    <marker id="ar2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="420" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">피연산자 스택으로 1 + 2 를 계산하기</text>
  <text x="28" y="60" class="sub">레지스터가 아니라 스택을 밀고 당긴다 · 명령어가 값을 push 하고 iadd 가 두 값을 꺼내 더해 다시 push 한다</text>

  <!-- ===== 단계 1: 시작 (빈 스택) ===== -->
  <text x="100" y="100" class="step" text-anchor="middle">① 시작</text>
  <!-- 빈 스택 틀: 슬롯 2칸 외곽선만 -->
  <rect x="50" y="120" width="100" height="40" rx="5" fill="#0d0d0d" stroke="rgb(90,90,90)" stroke-width="1.4" stroke-dasharray="4 4"/>
  <rect x="50" y="160" width="100" height="40" rx="5" fill="#0d0d0d" stroke="rgb(90,90,90)" stroke-width="1.4" stroke-dasharray="4 4"/>
  <text x="100" y="186" class="cap" text-anchor="middle">(빈 스택)</text>
  <text x="100" y="250" class="op" text-anchor="middle">iconst_1</text>
  <text x="100" y="270" class="op" text-anchor="middle">iconst_2</text>
  <text x="100" y="290" class="op" text-anchor="middle">iadd</text>

  <line x1="170" y1="160" x2="210" y2="160" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ar2)"/>

  <!-- ===== 단계 2: iconst_1 → [1] ===== -->
  <text x="290" y="100" class="step" text-anchor="middle">② iconst_1</text>
  <rect x="240" y="120" width="100" height="40" rx="5" fill="#0d0d0d" stroke="rgb(90,90,90)" stroke-width="1.4" stroke-dasharray="4 4"/>
  <rect x="240" y="160" width="100" height="40" rx="5" fill="#5b9bd5"/>
  <text x="290" y="187" class="slot" text-anchor="middle">1</text>
  <text x="290" y="250" class="opnow" text-anchor="middle">iconst_1</text>
  <text x="290" y="270" class="op" text-anchor="middle">iconst_2</text>
  <text x="290" y="290" class="op" text-anchor="middle">iadd</text>
  <text x="290" y="218" class="cap" text-anchor="middle">1 을 push</text>

  <line x1="360" y1="160" x2="400" y2="160" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ar2)"/>

  <!-- ===== 단계 3: iconst_2 → [2(top),1] ===== -->
  <text x="480" y="100" class="step" text-anchor="middle">③ iconst_2</text>
  <rect x="430" y="120" width="100" height="40" rx="5" fill="#5b9bd5"/>
  <text x="480" y="147" class="slot" text-anchor="middle">2</text>
  <text x="538" y="135" class="top" text-anchor="start">← top</text>
  <rect x="430" y="160" width="100" height="40" rx="5" fill="#5b9bd5"/>
  <text x="480" y="187" class="slot" text-anchor="middle">1</text>
  <text x="480" y="250" class="op" text-anchor="middle">iconst_1</text>
  <text x="480" y="270" class="opnow" text-anchor="middle">iconst_2</text>
  <text x="480" y="290" class="op" text-anchor="middle">iadd</text>
  <text x="480" y="228" class="cap" text-anchor="middle">2 를 1 위에 쌓음</text>

  <line x1="550" y1="160" x2="590" y2="160" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ar2)"/>

  <!-- ===== 단계 4: iadd → [3] ===== -->
  <text x="690" y="100" class="step" text-anchor="middle">④ iadd</text>
  <rect x="640" y="120" width="100" height="40" rx="5" fill="#0d0d0d" stroke="rgb(90,90,90)" stroke-width="1.4" stroke-dasharray="4 4"/>
  <rect x="640" y="160" width="100" height="40" rx="5" fill="#66bb6a"/>
  <text x="690" y="187" class="slot" text-anchor="middle">3</text>
  <text x="690" y="250" class="op" text-anchor="middle">iconst_1</text>
  <text x="690" y="270" class="op" text-anchor="middle">iconst_2</text>
  <text x="690" y="290" class="opnow" text-anchor="middle">iadd</text>
  <text x="690" y="228" class="cap" text-anchor="middle">2 와 1 을 꺼내 더한 3 을 push</text>

  <!-- 우측 결론 박스 -->
  <rect x="772" y="120" width="120" height="80" rx="9" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="1.4"/>
  <text x="832" y="150" class="step" fill="#66bb6a" text-anchor="middle">결과</text>
  <text x="832" y="174" class="slot" fill="#66bb6a" text-anchor="middle" style="fill:#66bb6a">3</text>
  <text x="832" y="194" class="cap" text-anchor="middle">스택에 하나 남음</text>

  <!-- 하단 캡션 -->
  <text x="28" y="338" class="cap">iadd 는 피연산자를 명령어에 적지 않습니다. "스택 맨 위 두 값을 꺼내 더하라"가 전부라서, 어떤 값을 더할지는 스택 상태가 정합니다.</text>
  <text x="28" y="360" class="cap">그래서 같은 덧셈도 int 는 iadd, long 은 ladd 로 옵코드가 갈립니다 — 옵코드 자체가 타입을 못박아 런타임 타입 검사를 없앱니다.</text>
</svg>
