<svg viewBox="0 0 900 660" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>검증 상세 — 네 단계가 각각 거르는 위협</title>
  <desc>검증은 네 단계다. 파일 형식 검증은 매직넘버 0xCAFEBABE와 버전·상수 풀 형식을 보고 통과해야 메서드 영역에 적재된다. 메타데이터 검증은 final 상속 금지 등 자바 언어 명세 위반을 본다. 바이트코드 검증은 데이터·제어 흐름을 분석해 점프가 메서드 밖으로 튀지 않는지 스택 타입이 맞는지 보는데 가장 복잡하고 StackMapTable로 가속한다. 심볼 참조 검증은 검증 단계가 아니라 해석 단계에 일어나며 참조 대상의 존재와 접근 권한을 확인한다.</desc>
  <defs>
    <style>
      .title{font-size:18px;font-weight:800;fill:#e8e4df}
      .sub{font-size:11.5px;fill:rgb(138,133,128)}
      .step{font-size:13.5px;font-weight:800;fill:#0d0d0d}
      .stepsub{font-size:10.5px;fill:#241c08}
      .threat{font-size:10px;font-weight:700;fill:#5a3210}
      .mono{font-size:11px;font-family:'JetBrains Mono',monospace;fill:#0d0d0d;font-weight:800}
      .body{font-size:10.5px;fill:rgb(196,191,186)}
      .head{font-size:12.5px;font-weight:800;fill:#b39ddb}
      .note{font-size:10px;fill:rgb(150,145,140)}
      .num{font-size:13px;font-weight:800;fill:#0d0d0d}
      .chipmono{font-size:11px;font-family:'JetBrains Mono',monospace;fill:#ffd47a;font-weight:800}
    </style>
  </defs>
  <rect x="0" y="0" width="900" height="660" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">검증 상세 — 네 거름망이 각각 막는 것</text>
  <text x="28" y="60" class="sub">막으려는 건 "예외"가 아니라 JVM의 메모리·타입 안전 붕괴 · 단계마다 거르는 위협이 다르다</text>

  <!-- 1 파일 형식 -->
  <circle cx="46" cy="108" r="14" fill="rgb(212,168,83)"/><text x="46" y="113" class="num" text-anchor="middle">1</text>
  <rect x="74" y="84" width="798" height="92" rx="10" fill="rgb(212,168,83)"/>
  <text x="94" y="112" class="step">파일 형식 검증</text>
  <rect x="320" y="96" width="230" height="24" rx="5" fill="#141414"/>
  <text x="332" y="113" class="chipmono">magic == 0xCAFEBABE</text>
  <text x="94" y="140" class="stepsub">주·부 버전이 이 JVM 범위인지 · 상수 풀 타입이 올바른지 · 통과해야 메서드 영역에 적재</text>
  <text x="94" y="162" class="threat">거르는 위협 — 애초에 클래스 파일이 아닌 것, 처리 못 하는 버전 (이 단계만 바이트 스트림 대상)</text>

  <!-- 2 메타데이터 -->
  <circle cx="46" cy="232" r="14" fill="rgb(212,168,83)"/><text x="46" y="237" class="num" text-anchor="middle">2</text>
  <rect x="74" y="208" width="798" height="92" rx="10" fill="rgb(212,168,83)"/>
  <text x="94" y="236" class="step">메타데이터 검증</text>
  <text x="94" y="262" class="stepsub">의미 분석으로 자바 언어 명세 위반을 거른다 — Object 외엔 부모가 있는지 ·</text>
  <text x="94" y="282" class="stepsub">final 클래스를 상속하지 않았는지 · 추상이 아닌데 구현이 빠지지 않았는지</text>
  <text x="568" y="236" class="threat">거르는 위협</text>
  <text x="568" y="256" class="threat">문법은 맞지만</text>
  <text x="568" y="274" class="threat">언어 규칙을 깨는 구조</text>

  <!-- 3 바이트코드 (가장 복잡) -->
  <circle cx="46" cy="392" r="14" fill="#e57373"/><text x="46" y="397" class="num" text-anchor="middle">3</text>
  <rect x="74" y="332" width="798" height="152" rx="10" fill="rgb(212,168,83)"/>
  <text x="94" y="360" class="step">바이트코드 검증 — 가장 복잡</text>
  <text x="94" y="386" class="stepsub">데이터 흐름 + 제어 흐름 분석. 점프가 메서드 밖으로 튀지 않는지 · 타입 변환이 유효한지 ·</text>
  <text x="94" y="408" class="stepsub">피연산자 스택 자료형이 명령어와 맞는지 — 모든 실행 경로에서 스택 타입을 추적한다.</text>
  <rect x="94" y="424" width="758" height="48" rx="7" fill="#141414"/>
  <text x="110" y="446" class="chipmono">StackMapTable</text>
  <text x="270" y="446" class="body">javac가 각 분기점의 기대 타입을 미리 적어둠 (JDK 6+)</text>
  <text x="110" y="464" class="note">→ JVM은 처음부터 추론하는 대신 적힌 것과 대조만 → 한 번의 선형 통과로 끝남</text>

  <!-- 4 심볼 참조 (해석 단계) -->
  <circle cx="46" cy="572" r="14" fill="#9575cd"/><text x="46" y="577" class="num" text-anchor="middle" fill="#fff">4</text>
  <rect x="74" y="516" width="798" height="112" rx="10" fill="#1a1626" stroke="#9575cd" stroke-width="1.5"/>
  <text x="94" y="544" class="head">심볼 참조 검증 — 검증의 4단계지만 실행은 *해석* 단계에서</text>
  <text x="94" y="568" class="body">상수 풀의 심볼 참조(이름 "java/lang/String")를 직접 참조(실제 주소)로 *번역*할 때 같이 일어난다.</text>
  <text x="94" y="588" class="body">번역하려면 먼저 확인해야 한다 — 참조 대상이 실제 존재하는가? 접근 권한이 있는가(private·protected)?</text>
  <text x="94" y="612" class="note">번역(해석)과 확인(심볼 검증)이 한 몸이라, 논리적으론 검증 4단계지만 타이밍은 해석 단계 (다음 글에서 이어짐)</text>

  <text x="28" y="650" class="sub">1~3은 검증 단계에서, 4는 뒤의 해석 단계에서 · 3은 비싸서 StackMapTable로 "추론을 대조로" 바꿔 가속</text>
</svg>
