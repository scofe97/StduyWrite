<svg viewBox="0 0 920 360" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>.class 에서 Live type 까지 — 로딩·링킹·초기화</title>
  <desc>디스크의 .class 파일이 로딩으로 메모리에 읽히고, 링킹(검증·준비·해석)으로 연결되며, 초기화로 static 초기화 코드가 실행되어, 메모리 안에서 동작하는 Live type 이 된다. 링킹은 검증·준비·해석 세 하위 단계를 묶은 이름이다.</desc>
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 12px; fill: rgb(138,133,128); }
      .stage { font-size: 14px; font-weight: 800; fill: #0d0d0d; }
      .ssub  { font-size: 10px; fill: rgba(13,13,13,0.72); }
      .grp   { font-size: 12px; font-weight: 700; fill: rgb(212,168,83); }
      .lnk   { font-size: 12.5px; font-weight: 800; fill: #0d0d0d; }
      .note  { font-size: 11px; fill: rgb(138,133,128); }
      .bin   { font-size: 12px; font-weight: 700; fill: #66bb6a; font-family: 'SFMono-Regular', Consolas, monospace; }
    </style>
    <marker id="ar3" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="360" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">.class 한 장이 살아 움직이는 타입이 되기까지</text>
  <text x="28" y="60" class="sub">로딩 → 링킹(검증·준비·해석) → 초기화 → Live type · 링킹은 세 하위 단계를 묶은 이름</text>

  <!-- .class 타원 -->
  <ellipse cx="90" cy="180" rx="56" ry="34" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-width="1.6"/>
  <text x="90" y="178" class="grp" text-anchor="middle">.class</text>
  <text x="90" y="196" class="note" text-anchor="middle" style="fill:rgb(138,133,128)">디스크 파일</text>

  <line x1="148" y1="180" x2="188" y2="180" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ar3)"/>

  <!-- 로딩 -->
  <rect x="192" y="146" width="104" height="68" rx="9" fill="#5b9bd5"/>
  <text x="244" y="178" class="stage" text-anchor="middle">로딩</text>
  <text x="244" y="196" class="ssub" text-anchor="middle">디스크에서 읽기</text>

  <line x1="296" y1="180" x2="332" y2="180" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ar3)"/>

  <!-- 링킹 묶음 프레임 -->
  <rect x="338" y="118" width="176" height="142" rx="11" fill="none" stroke="rgb(212,168,83)" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="426" y="138" class="grp" text-anchor="middle">링킹 (Linking)</text>
  <!-- 검증 -->
  <rect x="352" y="148" width="148" height="32" rx="6" fill="rgb(212,168,83)"/>
  <text x="426" y="169" class="lnk" text-anchor="middle">검증 Verification</text>
  <!-- 준비 -->
  <rect x="352" y="186" width="148" height="32" rx="6" fill="rgb(212,168,83)"/>
  <text x="426" y="207" class="lnk" text-anchor="middle">준비 Preparation</text>
  <!-- 해석 -->
  <rect x="352" y="224" width="148" height="32" rx="6" fill="rgb(212,168,83)"/>
  <text x="426" y="245" class="lnk" text-anchor="middle">해석 Resolution</text>

  <line x1="514" y1="180" x2="550" y2="180" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ar3)"/>

  <!-- 초기화 -->
  <rect x="554" y="146" width="116" height="68" rx="9" fill="#66bb6a"/>
  <text x="612" y="174" class="stage" text-anchor="middle">초기화</text>
  <text x="612" y="192" class="ssub" text-anchor="middle">&lt;clinit&gt;() 실행</text>
  <text x="612" y="206" class="ssub" text-anchor="middle">static 초기화</text>

  <line x1="670" y1="180" x2="706" y2="180" stroke="#66bb6a" stroke-width="2" marker-end="url(#ar3)"/>

  <!-- Live type 산출물 -->
  <rect x="710" y="140" width="176" height="80" rx="9" fill="#1a1a1a" stroke="#66bb6a" stroke-width="1.6"/>
  <text x="798" y="166" class="grp" fill="#66bb6a" text-anchor="middle" style="fill:#66bb6a">Live type</text>
  <text x="724" y="190" class="bin" style="fill:#66bb6a">10011100</text>
  <text x="724" y="208" class="bin" style="fill:#66bb6a">1010001…</text>

  <!-- 하단 캡션 -->
  <text x="28" y="306" class="note">로딩은 바이트를 메모리에 올려 Class 객체를 만들고, 링킹은 그 클래스를 JVM 규칙에 맞게 연결하며, 초기화는 static 변수·블록을 실제로 실행합니다.</text>
  <text x="28" y="328" class="note">해석(Resolution)만은 런타임 바인딩을 위해 초기화 뒤로 미뤄질 수 있습니다 — 그래서 링킹 안에서도 해석은 별도로 다룹니다.</text>
</svg>
