<svg viewBox="0 0 900 580" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>초기화 — &lt;clinit&gt;() 메서드의 정체와 스레드 안전성</title>
  <desc>초기화는 컴파일러가 모은 static 변수 대입과 static 블록을 <clinit>() 메서드로 실행하는 단계다. 컴파일러는 소스에 나타난 순서대로 수집하고, 부모 클래스의 <clinit>이 자식보다 먼저 실행되도록 보장한다. 여러 스레드가 동시에 같은 클래스를 초기화하려 하면 JVM이 락으로 한 스레드만 <clinit>을 실행하고 나머지는 대기시킨다.</desc>
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11.5px; fill: rgb(138,133,128); }
      .h     { font-size: 13px; font-weight: 800; fill: rgb(212,168,83); }
      .item  { font-size: 10.5px; fill: #e8e4df; }
      .note  { font-size: 9.5px; fill: rgb(138,133,128); }
      .mono  { font-size: 10px; font-family: 'JetBrains Mono', monospace; fill: #66bb6a; }
      .nm    { font-size: 11px; font-weight: 700; fill: #0d0d0d; }
    </style>
    <marker id="ar3" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="580" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">초기화 — &lt;clinit&gt;() 의 정체와 스레드 안전성</text>
  <text x="28" y="58" class="sub">컴파일러가 static 대입+static 블록을 소스 순서대로 수집 · 부모 먼저 · 동시 초기화는 락으로 한 스레드만</text>

  <!-- 왼쪽: clinit 수집 -->
  <rect x="28" y="84" width="410" height="220" rx="11" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="48" y="110" class="h">&lt;clinit&gt;() 에 무엇이 모이나</text>
  <rect x="44" y="124" width="378" height="74" rx="7" fill="#1a1a1a"/>
  <text x="56" y="144" class="mono">static int a = 1;        // 수집됨</text>
  <text x="56" y="162" class="mono">static { b = 2; }        // 수집됨</text>
  <text x="56" y="180" class="mono">int c = 3;               // 인스턴스 — 제외</text>
  <text x="48" y="220" class="item">· static 변수 대입 + static 초기화 블록만 수집</text>
  <text x="48" y="240" class="item">· 소스에 나타난 순서 그대로 (앞 블록은 뒤 변수 대입 가능,</text>
  <text x="66" y="256" class="note">단 뒤에 정의된 변수는 앞에서 "읽기" 불가 — 직접 참조 제약)</text>
  <text x="48" y="278" class="item">· 부모 &lt;clinit&gt;() 이 자식보다 먼저 실행 (JVM 보장)</text>
  <text x="48" y="296" class="note">→ 부모 static 블록이 자식 static 블록보다 항상 앞</text>

  <!-- 오른쪽: 부모 우선 -->
  <rect x="458" y="84" width="414" height="220" rx="11" fill="rgba(91,155,213,0.10)" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="478" y="110" class="h" fill="#5b9bd5">부모 우선 실행 — 예제</text>
  <rect x="474" y="124" width="382" height="92" rx="7" fill="#1a1a1a"/>
  <text x="486" y="144" class="mono">class Parent { static int A = 1;</text>
  <text x="486" y="162" class="mono">  static { A = 2; } }</text>
  <text x="486" y="182" class="mono">class Sub extends Parent {</text>
  <text x="486" y="200" class="mono">  static int B = A; }   // B = ?</text>
  <rect x="474" y="226" width="382" height="58" rx="7" fill="rgba(102,187,106,0.14)"/>
  <text x="486" y="248" class="item">Sub.B 를 읽으면 → Parent &lt;clinit&gt; 먼저 (A=2)</text>
  <text x="486" y="268" class="item">→ 그 다음 Sub &lt;clinit&gt; (B = A = 2)</text>
  <text x="478" y="300" class="note">부모가 자식보다 먼저라 B 는 1 이 아니라 2</text>

  <!-- 하단: 스레드 안전 -->
  <rect x="28" y="324" width="844" height="220" rx="11" fill="rgba(244,67,54,0.07)" stroke="#f44336" stroke-width="1.5"/>
  <text x="48" y="350" class="h" fill="#f44336">스레드 안전 — JVM 이 락으로 &lt;clinit&gt; 한 번만 보장</text>

  <!-- 스레드 A -->
  <rect x="60" y="370" width="240" height="150" rx="9" fill="#66bb6a"/>
  <text x="180" y="396" class="nm" text-anchor="middle">스레드 A (먼저 도착)</text>
  <text x="76" y="422" class="note" fill="rgba(13,13,13,0.72)">초기화 락 획득</text>
  <text x="76" y="444" class="note" fill="rgba(13,13,13,0.72)">&lt;clinit&gt;() 실행</text>
  <text x="76" y="466" class="note" fill="rgba(13,13,13,0.72)">만약 &lt;clinit&gt; 안에서 무한 루프면?</text>
  <text x="76" y="488" class="note" fill="rgba(13,13,13,0.72)">→ 락 안 놓음 → B 영원히 대기</text>
  <text x="76" y="510" class="note" fill="rgba(13,13,13,0.72)">(DeadLoopClass 데드락 함정)</text>

  <line x1="304" y1="445" x2="356" y2="445" stroke="#f44336" stroke-width="2.5" marker-end="url(#ar3)"/>
  <text x="330" y="436" class="note" text-anchor="middle" fill="#f44336">락 점유</text>

  <!-- 스레드 B -->
  <rect x="362" y="370" width="240" height="150" rx="9" fill="#1a1a1a" stroke="#f44336" stroke-width="1.5"/>
  <text x="482" y="396" class="item" text-anchor="middle" font-weight="700">스레드 B (나중 도착)</text>
  <text x="378" y="422" class="note">락 획득 실패 → 블록(대기)</text>
  <text x="378" y="444" class="note">A 가 &lt;clinit&gt; 끝낼 때까지 멈춤</text>
  <text x="378" y="466" class="note">A 완료 후 깨어나도</text>
  <text x="378" y="488" class="note">&lt;clinit&gt; 재실행 안 함</text>
  <text x="378" y="510" class="note">(클래스당 단 한 번 보장)</text>

  <!-- 결론 -->
  <rect x="630" y="370" width="220" height="150" rx="9" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="648" y="396" class="item" font-weight="700" fill="rgb(212,168,83)">핵심</text>
  <text x="648" y="420" class="note">&lt;clinit&gt;() 은 클래스당</text>
  <text x="648" y="436" class="note">한 번만, 한 스레드만 실행</text>
  <text x="648" y="460" class="note">→ static 싱글턴이</text>
  <text x="648" y="476" class="note">스레드 안전한 근거</text>
  <text x="648" y="500" class="note">단, &lt;clinit&gt; 안 무한 루프는</text>
  <text x="648" y="516" class="note">데드락 — 발견 어려움</text>
</svg>
