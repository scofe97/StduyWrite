<svg viewBox="0 0 900 560" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>클래스의 생명주기 7단계 — 로딩부터 언로딩까지</title>
  <desc>클래스는 로딩·검증·준비·해석·초기화·사용·언로딩 7단계를 거친다. 로딩·검증·준비·초기화는 시작 순서가 정해져 있으나 해석은 런타임 바인딩을 위해 초기화 뒤로 미뤄질 수 있다. 검증·준비·해석을 묶어 연결(linking)이라 부른다. 초기화는 6가지 능동 참조가 있을 때만 즉시 시작된다.</desc>
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11.5px; fill: rgb(138,133,128); }
      .stage { font-size: 13.5px; font-weight: 800; fill: #0d0d0d; }
      .stagesub { font-size: 9.5px; fill: rgba(13,13,13,0.72); }
      .grp   { font-size: 11px; font-weight: 700; fill: rgb(212,168,83); }
      .note  { font-size: 10.5px; fill: rgb(138,133,128); }
      .nm    { font-size: 11px; font-weight: 700; fill: #e8e4df; }
    </style>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="560" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">클래스의 생명주기 — 7단계</text>
  <text x="28" y="58" class="sub">로딩·검증·준비·초기화는 시작 순서 고정 · 해석만 런타임 바인딩 위해 뒤로 미룰 수 있음 · 검증+준비+해석 = 연결(linking)</text>

  <!-- 연결(linking) 묶음 프레임 -->
  <rect x="183" y="92" width="402" height="150" rx="12" fill="none" stroke="rgb(212,168,83)" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="384" y="110" class="grp" text-anchor="middle">연결 (Linking)</text>

  <!-- 단계 박스: 7개 -->
  <!-- 1 로딩 -->
  <rect x="40" y="130" width="120" height="86" rx="9" fill="#5b9bd5"/>
  <text x="100" y="166" class="stage" text-anchor="middle">로딩</text>
  <text x="100" y="184" class="stagesub" text-anchor="middle">Loading</text>
  <text x="100" y="200" class="stagesub" text-anchor="middle">바이너리→Class</text>
  <!-- 2 검증 -->
  <rect x="195" y="130" width="118" height="86" rx="9" fill="rgb(212,168,83)"/>
  <text x="254" y="166" class="stage" text-anchor="middle">검증</text>
  <text x="254" y="184" class="stagesub" text-anchor="middle">Verification</text>
  <text x="254" y="200" class="stagesub" text-anchor="middle">4종 검사</text>
  <!-- 3 준비 -->
  <rect x="325" y="130" width="118" height="86" rx="9" fill="rgb(212,168,83)"/>
  <text x="384" y="166" class="stage" text-anchor="middle">준비</text>
  <text x="384" y="184" class="stagesub" text-anchor="middle">Preparation</text>
  <text x="384" y="200" class="stagesub" text-anchor="middle">static 기본값</text>
  <!-- 4 해석 -->
  <rect x="455" y="130" width="118" height="86" rx="9" fill="rgb(212,168,83)"/>
  <text x="514" y="160" class="stage" text-anchor="middle">해석</text>
  <text x="514" y="178" class="stagesub" text-anchor="middle">Resolution</text>
  <text x="514" y="196" class="stagesub" text-anchor="middle">심볼→직접 참조</text>
  <text x="514" y="210" class="stagesub" text-anchor="middle">(미룰 수 있음)</text>
  <!-- 5 초기화 -->
  <rect x="600" y="130" width="120" height="86" rx="9" fill="#66bb6a"/>
  <text x="660" y="166" class="stage" text-anchor="middle">초기화</text>
  <text x="660" y="184" class="stagesub" text-anchor="middle">Initialization</text>
  <text x="660" y="200" class="stagesub" text-anchor="middle">&lt;clinit&gt;() 실행</text>
  <!-- 6 사용 -->
  <rect x="600" y="300" width="120" height="64" rx="9" fill="#1a1a1a" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="660" y="330" class="nm" text-anchor="middle">사용</text>
  <text x="660" y="350" class="stagesub" text-anchor="middle" fill="rgb(138,133,128)">Using</text>
  <!-- 7 언로딩 -->
  <rect x="600" y="404" width="120" height="64" rx="9" fill="#1a1a1a" stroke="#f44336" stroke-width="1.5"/>
  <text x="660" y="434" class="nm" text-anchor="middle">언로딩</text>
  <text x="660" y="454" class="stagesub" text-anchor="middle" fill="rgb(138,133,128)">Unloading</text>

  <!-- 화살표 가로 -->
  <line x1="160" y1="173" x2="193" y2="173" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="313" y1="173" x2="323" y2="173" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="443" y1="173" x2="453" y2="173" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="573" y1="173" x2="598" y2="173" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ar)"/>
  <!-- 화살표 세로 -->
  <line x1="660" y1="216" x2="660" y2="298" stroke="#66bb6a" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="660" y1="364" x2="660" y2="402" stroke="#f44336" stroke-width="2" marker-end="url(#ar)"/>

  <!-- 능동 참조 게이트 -->
  <rect x="40" y="300" width="520" height="168" rx="11" fill="rgba(102,187,106,0.08)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="60" y="326" class="grp" fill="#66bb6a">초기화를 즉시 트리거하는 6가지 능동 참조</text>
  <text x="60" y="350" class="note">① new · getstatic · putstatic · invokestatic 바이트코드 (static 필드·메서드 접근, 객체 생성)</text>
  <text x="60" y="372" class="note">② 리플렉션 호출 (java.lang.reflect 로 클래스에 처음 접근)</text>
  <text x="60" y="394" class="note">③ 부모 클래스가 아직 초기화 안 됐으면 부모 먼저 초기화</text>
  <text x="60" y="416" class="note">④ 가상 머신 기동 시 main() 을 담은 시작 클래스</text>
  <text x="60" y="438" class="note">⑤ MethodHandle 의 REF_getStatic 등 해석 결과가 클래스에 처음 닿을 때</text>
  <text x="60" y="460" class="note">⑥ 인터페이스의 디폴트 메서드를 구현 클래스가 초기화할 때</text>
</svg>
