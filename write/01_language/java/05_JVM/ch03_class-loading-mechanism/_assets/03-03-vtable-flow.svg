<svg viewBox="0 0 900 560" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>vtable 호출 흐름 — 매번 탐색 대신 고정 인덱스로 한 번에 점프</title>
  <desc>invokevirtual sound() 호출 흐름. 수신자 객체의 실제 타입을 얻고, 그 클래스의 vtable을 메서드 영역에서 꺼낸 뒤, 고정 인덱스로 한 번에 구현으로 점프한다. vtable은 클래스 로딩의 연결 단계에 만들어지며, 자식은 부모 vtable을 복제하고 오버라이드한 칸의 구현만 바꾸므로 같은 메서드는 어느 클래스에서든 같은 인덱스를 가진다. 그래서 매번 자식→부모로 탐색하지 않고 인덱스 한 번으로 닿는다.</desc>
  <defs>
    <style>
      .title{font-size:18px;font-weight:800;fill:#e8e4df}
      .sub{font-size:11px;fill:#b4b0ab}
      .lane{font-size:11px;font-weight:800;fill:rgb(212,168,83)}
      .node{font-size:10px;font-weight:700;fill:#10243a;font-family:'JetBrains Mono',monospace}
      .nd2{font-size:8.5px;font-weight:700;fill:#10243a;font-family:'JetBrains Mono',monospace}
      .idx{font-size:9px;font-weight:800;fill:#0d0d0d;font-family:'JetBrains Mono',monospace}
      .note{font-size:9px;fill:#c8ccd0}
      .foot{font-size:10.5px;font-weight:800;fill:#0d0d0d}
    </style>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#d4a853"/></marker>
  </defs>
  <rect x="0" y="0" width="900" height="560" fill="#0d0d0d"/>
  <text x="28" y="34" class="title">vtable 호출 흐름 — 탐색 대신 고정 인덱스로 한 번에</text>
  <text x="28" y="56" class="sub">animal.sound() 한 번에 닿는 길 · vtable은 클래스 로딩 때 미리 만들어둔 메서드→구현 표</text>

  <!-- 메인 흐름 체인 -->
  <rect x="28" y="84" width="156" height="56" rx="6" fill="#dceaf7"/>
  <text x="106" y="106" class="node" text-anchor="middle">animal.sound()</text>
  <text x="106" y="124" class="nd2" text-anchor="middle">invokevirtual</text>

  <line x1="184" y1="112" x2="222" y2="112" stroke="#d4a853" stroke-width="2.5" marker-end="url(#ar)"/>

  <rect x="224" y="84" width="170" height="56" rx="6" fill="#f3d9a0"/>
  <text x="309" y="106" class="node" text-anchor="middle">① 수신자 실제 타입</text>
  <text x="309" y="124" class="idx" text-anchor="middle">= Man (런타임에 정해짐)</text>

  <line x1="394" y1="112" x2="432" y2="112" stroke="#d4a853" stroke-width="2.5" marker-end="url(#ar)"/>

  <rect x="434" y="84" width="180" height="56" rx="6" fill="#f3d9a0"/>
  <text x="524" y="106" class="node" text-anchor="middle">② Man 의 vtable 꺼냄</text>
  <text x="524" y="124" class="nd2" text-anchor="middle">(메서드 영역에서)</text>

  <line x1="614" y1="112" x2="652" y2="112" stroke="#d4a853" stroke-width="2.5" marker-end="url(#ar)"/>

  <rect x="654" y="84" width="218" height="56" rx="6" fill="#f3d9a0"/>
  <text x="763" y="106" class="node" text-anchor="middle">③ 고정 인덱스 [2] 점프</text>
  <text x="763" y="124" class="nd2" text-anchor="middle">탐색 없이 한 번에</text>

  <!-- 아래로: 결과 -->
  <line x1="763" y1="140" x2="763" y2="170" stroke="#d4a853" stroke-width="2.5" marker-end="url(#ar)"/>
  <rect x="654" y="172" width="218" height="40" rx="6" fill="rgb(212,168,83)"/>
  <rect x="666" y="180" width="194" height="22" rx="3" fill="#fdf3df"/>
  <text x="763" y="195" class="idx" text-anchor="middle">Man.sound() 실행</text>

  <!-- vtable 구조 (왜 인덱스가 같나) -->
  <text x="28" y="250" class="lane">왜 인덱스 [2] 가 고정인가 — 자식은 부모 vtable 을 복제한다</text>

  <!-- Human vtable -->
  <rect x="28" y="266" width="360" height="150" rx="8" fill="#0d0d0d" stroke="#66bb6a" stroke-width="1.4"/>
  <rect x="42" y="276" width="116" height="18" rx="3" fill="#cdeccf"/>
  <text x="48" y="289" class="node" fill="#14521d" font-size="11">Human vtable</text>
  <rect x="44" y="298" width="328" height="24" rx="3" fill="#dceaf7"/>
  <text x="56" y="314" class="idx">[0] eat    → Human.eat</text>
  <rect x="44" y="326" width="328" height="24" rx="3" fill="#dceaf7"/>
  <text x="56" y="342" class="idx">[1] sleep  → Human.sleep</text>
  <rect x="44" y="354" width="328" height="24" rx="3" fill="#f3d9a0"/>
  <text x="56" y="370" class="idx">[2] sound  → Human.sound</text>
  <text x="48" y="400" class="note">상속 순서대로 인덱스 부여</text>

  <!-- 복제 화살표 -->
  <line x1="388" y1="341" x2="440" y2="341" stroke="#d4a853" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="414" y="333" class="note" text-anchor="middle">복제</text>

  <!-- Man vtable -->
  <rect x="442" y="266" width="430" height="150" rx="8" fill="#0d0d0d" stroke="#66bb6a" stroke-width="1.4"/>
  <rect x="456" y="276" width="270" height="18" rx="3" fill="#cdeccf"/>
  <text x="462" y="289" class="node" fill="#14521d" font-size="11">Man vtable  (Human 복제 + 수정)</text>
  <rect x="458" y="298" width="398" height="24" rx="3" fill="#dceaf7"/>
  <text x="470" y="314" class="idx">[0] eat    → Human.eat        (그대로)</text>
  <rect x="458" y="326" width="398" height="24" rx="3" fill="#dceaf7"/>
  <text x="470" y="342" class="idx">[1] sleep  → Human.sleep      (그대로)</text>
  <rect x="458" y="354" width="398" height="24" rx="3" fill="#f3d9a0"/>
  <text x="470" y="370" class="idx">[2] sound  → Man.sound        ← 구현만 교체</text>
  <text x="462" y="400" class="note">[2] 칸 번호는 그대로, 가리키는 구현만 Man.sound 로 바뀜</text>

  <!-- 하단 -->
  <rect x="28" y="436" width="844" height="40" rx="8" fill="#f5edda"/>
  <text x="450" y="461" class="foot" text-anchor="middle">인덱스는 부모와 같고(복제) 구현만 다르다 → invokevirtual 은 객체 타입 무관하게 "[2] 꺼내" 한 번이면 끝</text>

  <text x="28" y="502" class="note">vtable 은 클래스 로딩의 *연결* 단계에 초기화된다. 호출 후 캐시가 아니라, 로딩 때 미리 만들어둔 표다.</text>
</svg>
