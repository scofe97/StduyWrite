<svg viewBox="0 0 900 380" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>디스패치 2축 분류 — 자바는 정적 다중 + 동적 단일</title>
  <desc>디스패치는 두 축으로 나뉜다. 종량 축은 언제 고르냐(정적=컴파일 때 / 동적=실행 중), 종수 축은 몇 개의 타입을 보냐(단일=하나 / 다중=둘 이상). 자바의 정적 디스패치(오버로딩)는 수신자와 인자 타입 둘 다 보므로 정적 다중이고, 동적 디스패치(오버라이딩)는 수신자 실제 타입 하나만 보므로 동적 단일이다. 정적 단일과 동적 다중 칸은 자바에 해당이 없다. 그래서 자바는 정적 다중 + 동적 단일 디스패치 언어다.</desc>
  <defs>
    <style>
      .title{font-size:18px;font-weight:800;fill:#e8e4df}
      .sub{font-size:11px;fill:#b4b0ab}
      .colh{font-size:12px;font-weight:800;fill:#e8e4df}
      .rowh{font-size:13px;font-weight:800;fill:#e8e4df}
      .on{font-size:12.5px;font-weight:800;fill:#0d0d0d}
      .det{font-size:9.5px;font-weight:700;fill:#0d0d0d}
      .off{font-size:10px;fill:#8a857f}
      .foot{font-size:10.5px;font-weight:800;fill:#0d0d0d}
    </style>
  </defs>
  <rect x="0" y="0" width="900" height="380" fill="#0d0d0d"/>
  <text x="28" y="34" class="title">디스패치 2축 분류 — 자바 = 정적 다중 + 동적 단일</text>
  <text x="28" y="56" class="sub">종량(언제: 정적 컴파일때 / 동적 실행중) × 종수(몇 개 타입: 단일 하나 / 다중 둘 이상)</text>

  <!-- 열 헤더 -->
  <text x="370" y="98" class="colh" text-anchor="middle">단일 — 타입 하나</text>
  <text x="640" y="98" class="colh" text-anchor="middle">다중 — 타입 둘 이상</text>

  <!-- 정적 행 -->
  <text x="130" y="146" class="rowh" text-anchor="middle">정적</text>
  <text x="130" y="164" class="off" text-anchor="middle">컴파일 때</text>
  <!-- 정적·단일 = 빈 (배경색 + 점선) -->
  <rect x="240" y="116" width="260" height="64" rx="8" fill="#0d0d0d" stroke="#5a554f" stroke-dasharray="4 3"/>
  <text x="370" y="153" class="off" text-anchor="middle">— (해당 없음)</text>
  <!-- 정적·다중 = 오버로딩 (파랑) -->
  <rect x="510" y="116" width="280" height="64" rx="8" fill="#5b9bd5"/>
  <text x="650" y="142" class="on" text-anchor="middle">오버로딩 ✔</text>
  <text x="650" y="162" class="det" text-anchor="middle">수신자 + 인자 타입 둘 다 본다</text>

  <!-- 동적 행 -->
  <text x="130" y="232" class="rowh" text-anchor="middle">동적</text>
  <text x="130" y="250" class="off" text-anchor="middle">실행 중</text>
  <!-- 동적·단일 = 오버라이딩 (앰버) -->
  <rect x="240" y="202" width="260" height="64" rx="8" fill="rgb(212,168,83)"/>
  <text x="370" y="228" class="on" text-anchor="middle">오버라이딩 ✔</text>
  <text x="370" y="248" class="det" text-anchor="middle">수신자 실제 타입 하나만 본다</text>
  <!-- 동적·다중 = 빈 -->
  <rect x="510" y="202" width="280" height="64" rx="8" fill="#0d0d0d" stroke="#5a554f" stroke-dasharray="4 3"/>
  <text x="650" y="239" class="off" text-anchor="middle">— 자바엔 없음</text>

  <!-- 하단 -->
  <rect x="28" y="304" width="844" height="44" rx="8" fill="#f5edda"/>
  <text x="450" y="324" class="foot" text-anchor="middle">자바는 정적일 때 인자 타입까지(다중), 동적일 때 수신자 타입만(단일) 본다</text>
  <text x="450" y="341" class="det" text-anchor="middle">→ "정적 다중 디스패치 + 동적 단일 디스패치" 언어</text>
</svg>
