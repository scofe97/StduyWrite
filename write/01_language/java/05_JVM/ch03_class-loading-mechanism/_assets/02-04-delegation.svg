<svg viewBox="0 0 900 620" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>부모 위임 모델 — 3계층 클래스 로더와 위임 흐름</title>
  <desc>클래스 로더는 부트스트랩·확장(플랫폼)·애플리케이션 3계층을 이룬다. 로딩 요청이 오면 먼저 부모에게 위임하고 부모가 처리 못 할 때만 자식이 직접 로딩한다. 이 위임이 java.lang.Object 같은 핵심 클래스가 어느 로더로 요청되든 항상 부트스트랩 한 곳에서 로딩되도록 보장해 클래스의 유일성과 안전을 지킨다.</desc>
  <defs>
    <style>
      .title{font-size:18px;font-weight:800;fill:#e8e4df}
      .sub{font-size:11.5px;fill:rgb(150,145,140)}
      .ldr{font-size:13px;font-weight:800;fill:#0d0d0d}
      .ldrsub{font-size:10px;fill:#241c08}
      .lab{font-size:11px;font-weight:800;fill:rgb(212,168,83)}
      .note{font-size:10px;fill:rgb(196,191,186)}
      .head{font-size:12px;font-weight:800;fill:rgb(212,168,83)}
    </style>
    <marker id="up" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 z" fill="#66bb6a"/></marker>
    <marker id="dn" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 z" fill="#5b9bd5"/></marker>
  </defs>

  <rect x="0" y="0" width="900" height="620" fill="#0d0d0d"/>
  <text x="28" y="40" class="title">부모 위임 모델 — 요청은 위로, 로딩은 아래로</text>
  <text x="28" y="64" class="sub">요청이 오면 먼저 부모에게 위임 · 부모가 못 찾을 때만 자식이 직접 로딩</text>

  <!-- 3계층 박스 (간격 넓힘: 100px 단차) -->
  <!-- 부트스트랩 -->
  <rect x="270" y="96" width="320" height="84" rx="10" fill="#f44336"/>
  <text x="430" y="128" class="ldr" text-anchor="middle">부트스트랩 클래스 로더</text>
  <text x="430" y="150" class="ldrsub" text-anchor="middle" fill="#2a0e0a">Bootstrap · C++ 구현 · null 로 표현</text>
  <text x="430" y="168" font-size="9.5" font-family="'JetBrains Mono',monospace" fill="#2a0e0a" text-anchor="middle">&lt;JAVA_HOME&gt;/lib · java.* 핵심</text>

  <!-- 확장/플랫폼 -->
  <rect x="270" y="256" width="320" height="84" rx="10" fill="rgb(212,168,83)"/>
  <text x="430" y="288" class="ldr" text-anchor="middle">확장(플랫폼) 클래스 로더</text>
  <text x="430" y="310" class="ldrsub" text-anchor="middle">Extension/Platform · 자바 구현</text>
  <text x="430" y="328" font-size="9.5" font-family="'JetBrains Mono',monospace" fill="#241c08" text-anchor="middle">lib/ext (JDK9+ 모듈)</text>

  <!-- 애플리케이션 -->
  <rect x="270" y="416" width="320" height="84" rx="10" fill="#5b9bd5"/>
  <text x="430" y="448" class="ldr" text-anchor="middle">애플리케이션 클래스 로더</text>
  <text x="430" y="470" class="ldrsub" text-anchor="middle" fill="#0c1f30">Application/System · 기본 로더</text>
  <text x="430" y="488" font-size="9.5" font-family="'JetBrains Mono',monospace" fill="#0c1f30" text-anchor="middle">classpath · 우리가 짠 클래스</text>

  <!-- 사용자 정의 -->
  <rect x="270" y="536" width="320" height="64" rx="10" fill="#16202a" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="430" y="564" class="lab" text-anchor="middle" fill="#7fb6e0">사용자 정의 클래스 로더</text>
  <text x="430" y="585" class="note" text-anchor="middle">네트워크·DB·동적 생성</text>

  <!-- 위임 화살표 (위로, 초록) — 왼쪽 라인 -->
  <line x1="320" y1="416" x2="320" y2="342" stroke="#66bb6a" stroke-width="2.5" marker-end="url(#up)"/>
  <line x1="320" y1="256" x2="320" y2="182" stroke="#66bb6a" stroke-width="2.5" marker-end="url(#up)"/>
  <line x1="320" y1="536" x2="320" y2="502" stroke="#66bb6a" stroke-width="2.5" marker-end="url(#up)"/>
  <text x="150" y="350" class="lab" fill="#66bb6a">① 위임 (위로)</text>
  <text x="150" y="370" class="note">부모에게 먼저 요청</text>

  <!-- 로딩 화살표 (아래로, 파랑) — 오른쪽 라인 -->
  <line x1="540" y1="180" x2="540" y2="254" stroke="#5b9bd5" stroke-width="2.5" stroke-dasharray="5 4" marker-end="url(#dn)"/>
  <line x1="540" y1="340" x2="540" y2="414" stroke="#5b9bd5" stroke-width="2.5" stroke-dasharray="5 4" marker-end="url(#dn)"/>
  <line x1="540" y1="500" x2="540" y2="534" stroke="#5b9bd5" stroke-width="2.5" stroke-dasharray="5 4" marker-end="url(#dn)"/>
  <text x="628" y="350" class="lab" fill="#5b9bd5">② 못 찾으면</text>
  <text x="628" y="370" class="note">아래가 직접 로딩</text>

  <!-- 우측 설명 -->
  <rect x="648" y="96" width="224" height="404" rx="10" fill="#1c1810" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="668" y="124" class="head">왜 위임하는가</text>
  <text x="668" y="150" class="note">같은 java.lang.Object 를</text>
  <text x="668" y="168" class="note">여러 로더가 각자 로딩하면</text>
  <text x="668" y="186" class="note">서로 다른 Object 가 됨</text>
  <text x="668" y="208" class="note" fill="#e57373">→ 타입 체계가 무너짐</text>
  <text x="668" y="246" class="head">위임의 효과</text>
  <text x="668" y="272" class="note">어느 로더로 요청하든</text>
  <text x="668" y="290" class="note">핵심 클래스는 항상</text>
  <text x="668" y="308" class="note">부트스트랩 한 곳에서</text>
  <text x="668" y="330" class="note" fill="#81c784">→ 클래스 유일성 보장</text>
  <text x="668" y="352" class="note" fill="#81c784">→ java.lang.* 위조 차단</text>
  <text x="668" y="390" class="head">구현 위치</text>
  <rect x="666" y="404" width="190" height="26" rx="5" fill="#2a2208"/>
  <text x="680" y="422" font-size="10" font-family="'JetBrains Mono',monospace" font-weight="700" fill="#e6c878">loadClass()</text>
  <text x="668" y="450" class="note">부모 먼저 시도 →</text>
  <text x="668" y="468" class="note">실패 시 findClass()</text>

  <text x="28" y="610" class="sub">위임은 강제가 아닌 권장 — SPI·OSGi 는 이 모델을 의도적으로 깨뜨림 (본문 §4)</text>
</svg>
