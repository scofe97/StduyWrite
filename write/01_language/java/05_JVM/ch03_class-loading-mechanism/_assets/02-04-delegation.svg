<svg viewBox="0 0 900 600" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>부모 위임 모델 — 3계층 클래스 로더와 위임 흐름</title>
  <desc>클래스 로더는 부트스트랩·확장(플랫폼)·애플리케이션 3계층을 이룬다. 로딩 요청이 오면 먼저 부모에게 위임하고, 부모가 처리 못 할 때만 자식이 직접 로딩한다. 이 위임이 java.lang.Object 같은 핵심 클래스가 어느 로더로 요청되든 항상 부트스트랩 한 곳에서 로딩되도록 보장해, 클래스의 유일성과 안전을 지킨다.</desc>
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11.5px; fill: rgb(138,133,128); }
      .ldr   { font-size: 13px; font-weight: 800; fill: #0d0d0d; }
      .ldrsub{ font-size: 9.5px; fill: rgba(13,13,13,0.7); }
      .lab   { font-size: 10.5px; font-weight: 700; fill: rgb(212,168,83); }
      .note  { font-size: 10px; fill: rgb(138,133,128); }
      .mono  { font-size: 9.5px; font-family: 'JetBrains Mono', monospace; fill: rgba(13,13,13,0.8); }
    </style>
    <marker id="up" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#66bb6a"/>
    </marker>
    <marker id="dn" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#5b9bd5"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="600" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">부모 위임 모델 — 요청은 위로, 로딩은 아래로</text>
  <text x="28" y="58" class="sub">요청이 오면 먼저 부모에게 위임 · 부모가 못 찾을 때만 자식이 직접 로딩 · Object 가 어디서 요청되든 부트스트랩 한 곳에서</text>

  <!-- 3계층 박스 (위에서 아래) -->
  <!-- 부트스트랩 -->
  <rect x="300" y="92" width="300" height="78" rx="10" fill="#f44336"/>
  <text x="450" y="124" class="ldr" text-anchor="middle">부트스트랩 클래스 로더</text>
  <text x="450" y="144" class="ldrsub" text-anchor="middle">Bootstrap · C++ 구현 · null 로 표현</text>
  <text x="450" y="159" class="mono" text-anchor="middle">&lt;JAVA_HOME&gt;/lib · java.* 핵심</text>

  <!-- 확장/플랫폼 -->
  <rect x="300" y="232" width="300" height="78" rx="10" fill="rgb(212,168,83)"/>
  <text x="450" y="264" class="ldr" text-anchor="middle">확장(플랫폼) 클래스 로더</text>
  <text x="450" y="284" class="ldrsub" text-anchor="middle">Extension/Platform · 자바 구현</text>
  <text x="450" y="299" class="mono" text-anchor="middle">lib/ext (JDK9+ 모듈)</text>

  <!-- 애플리케이션 -->
  <rect x="300" y="372" width="300" height="78" rx="10" fill="#5b9bd5"/>
  <text x="450" y="404" class="ldr" text-anchor="middle">애플리케이션 클래스 로더</text>
  <text x="450" y="424" class="ldrsub" text-anchor="middle">Application/System · 기본 로더</text>
  <text x="450" y="439" class="mono" text-anchor="middle">classpath · 우리가 짠 클래스</text>

  <!-- 사용자 정의 -->
  <rect x="300" y="500" width="300" height="64" rx="10" fill="#1a1a1a" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="450" y="528" class="lab" text-anchor="middle" fill="#5b9bd5">사용자 정의 클래스 로더</text>
  <text x="450" y="548" class="note" text-anchor="middle">네트워크·DB·동적 생성</text>

  <!-- 위임 화살표 (위로, 초록) -->
  <line x1="345" y1="372" x2="345" y2="312" stroke="#66bb6a" stroke-width="2.5" marker-end="url(#up)"/>
  <line x1="345" y1="232" x2="345" y2="172" stroke="#66bb6a" stroke-width="2.5" marker-end="url(#up)"/>
  <line x1="345" y1="500" x2="345" y2="452" stroke="#66bb6a" stroke-width="2.5" marker-end="url(#up)"/>
  <text x="250" y="345" class="lab" fill="#66bb6a">① 위임</text>
  <text x="250" y="365" class="note">(위로)</text>

  <!-- 로딩 화살표 (아래로, 파랑) -->
  <line x1="555" y1="170" x2="555" y2="230" stroke="#5b9bd5" stroke-width="2.5" stroke-dasharray="5 4" marker-end="url(#dn)"/>
  <line x1="555" y1="310" x2="555" y2="370" stroke="#5b9bd5" stroke-width="2.5" stroke-dasharray="5 4" marker-end="url(#dn)"/>
  <line x1="555" y1="450" x2="555" y2="498" stroke="#5b9bd5" stroke-width="2.5" stroke-dasharray="5 4" marker-end="url(#dn)"/>
  <text x="615" y="345" class="lab" fill="#5b9bd5">② 못 찾으면</text>
  <text x="615" y="365" class="note">아래가 로딩</text>

  <!-- 우측 설명 -->
  <rect x="648" y="92" width="224" height="358" rx="10" fill="rgba(212,168,83,0.08)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="666" y="118" class="lab">왜 위임하는가</text>
  <text x="666" y="142" class="note">같은 java.lang.Object 를</text>
  <text x="666" y="158" class="note">여러 로더가 각자 로딩하면</text>
  <text x="666" y="174" class="note">서로 다른 Object 가 됨</text>
  <text x="666" y="198" class="note">→ 타입 체계가 무너짐</text>
  <text x="666" y="232" class="lab">위임의 효과</text>
  <text x="666" y="256" class="note">어느 로더로 요청하든</text>
  <text x="666" y="272" class="note">핵심 클래스는 항상</text>
  <text x="666" y="288" class="note">부트스트랩 한 곳에서</text>
  <text x="666" y="312" class="note">→ 클래스 유일성 보장</text>
  <text x="666" y="336" class="note">→ 악의적 java.lang.* 위조</text>
  <text x="666" y="352" class="note">차단 (안전)</text>
  <text x="666" y="388" class="lab">구현 위치</text>
  <text x="666" y="412" class="mono" fill="rgb(212,168,83)">loadClass()</text>
  <text x="666" y="430" class="note">— 부모 먼저 시도 후</text>
  <text x="666" y="446" class="note">실패 시 findClass()</text>

  <text x="28" y="586" class="sub">위임은 강제가 아닌 권장 — SPI·OSGi 는 이 모델을 의도적으로 깨뜨림 (본문 §4)</text>
</svg>
