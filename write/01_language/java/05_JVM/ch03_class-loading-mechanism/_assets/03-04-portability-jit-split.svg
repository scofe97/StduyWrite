<svg viewBox="0 0 900 460" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>이식성과 성능을 단계로 나눈다 — 비종속 바이트코드 → CPU별 JIT</title>
  <desc>자바는 이식성과 성능을 한 표현에 욱여넣지 않고 컴파일 시점과 런타임으로 나눈다. javac가 만드는 바이트코드는 스택 기반이라 레지스터를 지정하지 않아 플랫폼 비종속이다(배포물은 하나). 실행 시 각 플랫폼의 JIT가 그 CPU의 레지스터 기반 기계어로 번역한다 — x86 위에서는 x86 기계어로, ARM 위에서는 ARM 기계어로. 비종속의 책임은 바이트코드가, 플랫폼별 최적 성능의 책임은 각 JIT가 진다.</desc>
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11.5px; fill: rgb(138,133,128); }
      .h     { font-size: 12.5px; font-weight: 800; fill: #0d0d0d; }
      .hl    { font-size: 12.5px; font-weight: 800; fill: #e8e4df; }
      .lbl   { font-size: 10.5px; fill: #0d0d0d; }
      .mono  { font-size: 10px; font-family: 'JetBrains Mono', monospace; fill: #0d0d0d; font-weight: 700; }
      .note  { font-size: 10px; fill: rgb(138,133,128); }
      .stage { font-size: 11px; font-weight: 800; fill: rgb(212,168,83); }
      .edge  { font-size: 10.5px; fill: #e8e4df; font-weight: 600; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="460" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">이식성과 성능을 단계로 나눈다</text>
  <text x="28" y="58" class="sub">하나의 바이트코드(비종속) → 각 CPU의 JIT가 그 CPU 기계어(종속)로 · 트레이드오프가 단계 분리로 양립</text>

  <!-- 단계 라벨 -->
  <text x="150" y="92" class="stage" text-anchor="middle">① 컴파일 시점 (CPU 비종속)</text>
  <text x="660" y="92" class="stage" text-anchor="middle">② 런타임 (CPU 별 종속)</text>
  <line x1="430" y1="80" x2="430" y2="430" stroke="rgb(70,66,62)" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- 소스 -->
  <rect x="40" y="112" width="120" height="56" rx="9" fill="#dceaf7"/>
  <text x="100" y="138" class="h" text-anchor="middle">.java</text>
  <text x="100" y="156" class="lbl" text-anchor="middle">소스 코드</text>

  <!-- javac 화살표 -->
  <line x1="160" y1="140" x2="208" y2="140" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <text x="184" y="130" class="edge" text-anchor="middle">javac</text>

  <!-- 바이트코드 (하나, 비종속) -->
  <rect x="210" y="104" width="170" height="120" rx="10" fill="rgb(212,168,83)"/>
  <text x="295" y="130" class="h" text-anchor="middle">바이트코드 (.class)</text>
  <rect x="232" y="142" width="126" height="22" rx="3" fill="#fdf3df"/>
  <text x="295" y="158" class="mono" text-anchor="middle">iadd · imul</text>
  <text x="295" y="184" class="lbl" text-anchor="middle">스택 기반 · 레지스터</text>
  <text x="295" y="200" class="lbl" text-anchor="middle">번호 없음 → 어디서나 동일</text>
  <text x="295" y="216" class="lbl" text-anchor="middle" font-weight="800">배포물은 하나</text>

  <!-- 갈래 화살표: 바이트코드 → 두 JIT -->
  <line x1="380" y1="150" x2="470" y2="135" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="380" y1="178" x2="470" y2="300" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <text x="430" y="120" class="edge" text-anchor="middle">같은 바이트코드</text>

  <!-- x86 트랙 -->
  <rect x="472" y="112" width="150" height="58" rx="9" fill="#66bb6a"/>
  <text x="547" y="136" class="h" text-anchor="middle">x86 JVM · JIT</text>
  <text x="547" y="156" class="lbl" text-anchor="middle">→ x86 기계어</text>
  <line x1="622" y1="141" x2="668" y2="141" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="670" y="116" width="200" height="50" rx="8" fill="#cdeccf"/>
  <text x="770" y="138" class="mono" text-anchor="middle">mov eax / add eax</text>
  <text x="770" y="155" class="lbl" text-anchor="middle">x86 레지스터 직접 사용</text>

  <!-- ARM 트랙 -->
  <rect x="472" y="276" width="150" height="58" rx="9" fill="#66bb6a"/>
  <text x="547" y="300" class="h" text-anchor="middle">ARM JVM · JIT</text>
  <text x="547" y="320" class="lbl" text-anchor="middle">→ ARM 기계어</text>
  <line x1="622" y1="305" x2="668" y2="305" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="670" y="280" width="200" height="50" rx="8" fill="#cdeccf"/>
  <text x="770" y="302" class="mono" text-anchor="middle">add w0 / mul w0</text>
  <text x="770" y="319" class="lbl" text-anchor="middle">ARM 레지스터 직접 사용</text>

  <!-- 책임 분리 요약 띠 -->
  <rect x="40" y="376" width="820" height="56" rx="10" fill="#0d0d0d" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="56" y="400" class="hl">책임 분리</text>
  <text x="56" y="420" class="note">비종속의 책임은 <tspan fill="rgb(212,168,83)" font-weight="800">바이트코드</tspan>가 · 플랫폼별 최적 성능의 책임은 <tspan fill="#66bb6a" font-weight="800">각 CPU의 JIT</tspan>가 진다 — 개발자는 CPU를 신경 쓰지 않고 하나만 배포한다.</text>
</svg>
