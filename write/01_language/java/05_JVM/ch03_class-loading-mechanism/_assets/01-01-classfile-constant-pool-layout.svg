<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">ClassFile 상수 풀 중심 구조</title>
  <desc id="desc">ClassFile 바이트 스트림은 magic, version, constant_pool, access_flags, fields, methods, attributes 순서로 이어진다. fields, methods, Code 속성의 바이트코드는 문자열을 직접 반복하지 않고 상수 풀의 인덱스를 참조한다.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D08A00"/>
    </marker>
    <style>
      .bg { fill: #0F172A; }
      .panel { fill: #111827; stroke: #334155; stroke-width: 1.5; }
      .slot { fill: #1F2937; stroke: #64748B; stroke-width: 1.2; }
      .cp { fill: #164E63; stroke: #38BDF8; stroke-width: 1.6; }
      .accent { fill: #78350F; stroke: #F59E0B; stroke-width: 1.4; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F8FAFC; }
      .sub { font-size: 15px; fill: #CBD5E1; }
      .label { font-size: 16px; font-weight: 700; }
      .small { font-size: 13px; fill: #CBD5E1; }
      .mono { font-family: "SFMono-Regular", Consolas, monospace; font-size: 14px; fill: #F8FAFC; }
      .arrow { stroke: #D08A00; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="960" height="560"/>
  <text x="36" y="42" class="text label">ClassFile: 상수 풀을 먼저 읽어야 뒤쪽 참조가 의미를 갖습니다</text>
  <text x="36" y="68" class="text sub">문자열과 심벌을 반복 저장하지 않고, 필드·메서드·바이트코드가 constant_pool의 #index를 참조합니다.</text>

  <rect x="36" y="104" width="340" height="394" rx="8" class="panel"/>
  <text x="60" y="136" class="text label">ClassFile byte stream</text>
  <text x="60" y="160" class="text small">위에서 아래로 정해진 순서대로 파싱</text>

  <rect x="64" y="184" width="284" height="38" rx="6" class="slot"/>
  <text x="82" y="208" class="mono">magic: 0xCAFEBABE</text>
  <rect x="64" y="232" width="284" height="38" rx="6" class="slot"/>
  <text x="82" y="256" class="mono">minor_version / major_version</text>
  <rect x="64" y="280" width="284" height="58" rx="6" class="cp"/>
  <text x="82" y="305" class="mono">constant_pool</text>
  <text x="82" y="325" class="text small">리터럴·심벌 참조 테이블</text>
  <rect x="64" y="348" width="284" height="38" rx="6" class="slot"/>
  <text x="82" y="372" class="mono">access_flags / this / super</text>
  <rect x="64" y="396" width="284" height="38" rx="6" class="slot"/>
  <text x="82" y="420" class="mono">fields[]</text>
  <rect x="64" y="444" width="284" height="38" rx="6" class="slot"/>
  <text x="82" y="468" class="mono">methods[] + Code</text>

  <rect x="492" y="104" width="428" height="394" rx="8" class="panel"/>
  <text x="520" y="136" class="text label">constant_pool 확대</text>
  <text x="520" y="160" class="text small">실제 이름·타입·참조는 한 곳에 모이고, 뒤쪽은 번호만 들고 있습니다.</text>

  <rect x="520" y="192" width="352" height="38" rx="6" class="cp"/>
  <text x="538" y="216" class="mono">#7  Fieldref TestClass.m:I</text>
  <rect x="520" y="242" width="352" height="38" rx="6" class="cp"/>
  <text x="538" y="266" class="mono">#13 Fieldref TestClass.n:I</text>
  <rect x="520" y="292" width="352" height="38" rx="6" class="cp"/>
  <text x="538" y="316" class="mono">#16 Utf8 Code</text>
  <rect x="520" y="342" width="352" height="38" rx="6" class="cp"/>
  <text x="538" y="366" class="mono">#21 Utf8 inc</text>

  <rect x="520" y="412" width="352" height="48" rx="6" class="accent"/>
  <text x="538" y="435" class="text small">Code 속성의 바이트코드도 #index로 상수 풀을 참조합니다.</text>
  <text x="538" y="453" class="mono">getfield #7 · getstatic #13</text>

  <path d="M 348 310 C 410 310 432 214 512 214" class="arrow"/>
  <path d="M 348 414 C 430 414 430 264 512 264" class="arrow"/>
  <path d="M 348 464 C 428 464 430 436 512 436" class="arrow"/>

  <text x="386" y="288" class="text small">먼저 해석</text>
  <text x="388" y="392" class="text small">이름·타입 참조</text>
  <text x="392" y="454" class="text small">바이트코드 참조</text>
</svg>
