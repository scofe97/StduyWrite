<svg viewBox="0 0 900 500" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>WebApp 로더의 조회 순서 — 위임 깨기와 java.* 예외</title>
  <desc>표준 부모 위임은 무조건 부모에게 먼저 묻지만, 톰캣의 WebApp 로더는 순서를 뒤집어 자기 WEB-INF를 먼저 뒤진다. 클래스 로딩 요청이 들어오면 먼저 java.* 같은 핵심 클래스인지 판정한다. 핵심 클래스이면 위임을 깨지 않고 부모(부트스트랩)에게 위임해 가짜 핵심 클래스를 막는다. 핵심 클래스가 아니면 자기 WEB-INF/classes·WEB-INF/lib를 먼저 뒤진다. 거기 있으면 WebApp 로더가 직접 로딩해 다른 웹앱과 격리되고, 없으면 그제야 부모에게 위임해 공통 클래스를 공유한다.</desc>
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11.5px; fill: rgb(138,133,128); }
      .q     { font-size: 12px; font-weight: 800; fill: #0d0d0d; }
      .qs    { font-size: 9.5px; fill: rgba(13,13,13,0.78); }
      .res   { font-size: 12px; font-weight: 800; fill: #0d0d0d; }
      .ressub{ font-size: 9.5px; fill: rgba(13,13,13,0.78); }
      .start { font-size: 12.5px; font-weight: 800; fill: #e8e4df; }
      .edge  { font-size: 10.5px; font-weight: 700; fill: #e8e4df; }
      .note  { font-size: 10px; fill: rgb(138,133,128); }
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="500" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">WebApp 로더의 조회 순서</text>
  <text x="28" y="58" class="sub">표준은 "부모 먼저", WebApp 로더는 뒤집어 "WEB-INF 먼저" · 단 java.* 핵심 클래스만은 예외로 부모 먼저</text>

  <!-- 시작: 로딩 요청 -->
  <rect x="40" y="90" width="180" height="48" rx="9" fill="#0d0d0d" stroke="rgb(212,168,83)" stroke-width="1.6"/>
  <text x="130" y="119" class="start" text-anchor="middle">클래스 로딩 요청</text>

  <!-- 판정1: java.* 인가 -->
  <line x1="220" y1="114" x2="266" y2="114" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#a)"/>
  <rect x="268" y="80" width="200" height="68" rx="10" fill="#5b9bd5"/>
  <text x="368" y="108" class="q" text-anchor="middle">java.* 핵심 클래스?</text>
  <text x="368" y="128" class="qs" text-anchor="middle">java.lang.Object 등</text>

  <!-- 판정1 Yes → 부모 위임 (위쪽) -->
  <line x1="368" y1="80" x2="368" y2="40" stroke="rgb(212,168,83)" stroke-width="2"/>
  <line x1="368" y1="40" x2="636" y2="40" stroke="rgb(212,168,83)" stroke-width="2"/>
  <line x1="636" y1="40" x2="636" y2="92" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#a)"/>
  <text x="500" y="32" class="edge" text-anchor="middle">예 — 위임 안 깸</text>

  <!-- 판정1 No → 판정2 (아래로) -->
  <line x1="368" y1="148" x2="368" y2="196" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#a)"/>
  <text x="392" y="176" class="edge">아니오</text>

  <!-- 판정2: WEB-INF 에 있나 -->
  <rect x="268" y="198" width="200" height="68" rx="10" fill="#5b9bd5"/>
  <text x="368" y="226" class="q" text-anchor="middle">WEB-INF 에 있나?</text>
  <text x="368" y="246" class="qs" text-anchor="middle">classes / lib 먼저 뒤짐</text>

  <!-- 판정2 Yes → 자기 로딩(격리) 아래 -->
  <line x1="368" y1="266" x2="368" y2="320" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#a)"/>
  <text x="392" y="298" class="edge">예</text>

  <!-- 판정2 No → 부모 위임(공유) 오른쪽 -->
  <line x1="468" y1="232" x2="560" y2="232" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#a)"/>
  <text x="514" y="222" class="edge" text-anchor="middle">아니오</text>

  <!-- 결과 A: 부모 위임 (java.* / 위) -->
  <rect x="536" y="92" width="320" height="74" rx="10" fill="#66bb6a"/>
  <text x="696" y="120" class="res" text-anchor="middle">부모(부트스트랩)에게 위임</text>
  <text x="696" y="142" class="ressub" text-anchor="middle">핵심 클래스 유일성 보호 — 웹앱이 가짜</text>
  <text x="696" y="156" class="ressub" text-anchor="middle">java.lang.Object 를 심지 못하게 막음</text>

  <!-- 결과 B: 부모 위임 = 공유 (없을 때) -->
  <rect x="536" y="198" width="320" height="68" rx="10" fill="#66bb6a"/>
  <text x="696" y="226" class="res" text-anchor="middle">부모에게 위임 → 공유</text>
  <text x="696" y="248" class="ressub" text-anchor="middle">Common/Shared 의 공통 클래스를 모든 웹앱이 같이 씀</text>

  <!-- 결과 C: 자기 로딩 = 격리 -->
  <rect x="208" y="322" width="320" height="74" rx="10" fill="rgb(212,168,83)"/>
  <text x="368" y="350" class="res" text-anchor="middle">WebApp 로더가 직접 로딩 → 격리</text>
  <text x="368" y="372" class="ressub" text-anchor="middle">웹앱마다 다른 로더 = "이름 + 로더" 가 달라</text>
  <text x="368" y="386" class="ressub" text-anchor="middle">같은 Foo 도 웹앱끼리 다른 타입 (버전 충돌 없음)</text>

  <!-- 하단 요약 띠 -->
  <rect x="40" y="424" width="816" height="56" rx="10" fill="#0d0d0d" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="56" y="448" class="edge">한 줄</text>
  <text x="56" y="468" class="note">WebApp 로더는 <tspan fill="rgb(212,168,83)" font-weight="800">WEB-INF 를 먼저</tspan> 봐 웹앱 독립성을 얻되, <tspan fill="#5b9bd5" font-weight="800">java.*</tspan> 만은 부모 먼저로 두어 핵심 클래스를 지킨다 — "위임 깨기"의 경계가 바로 java.* 다.</text>
</svg>
