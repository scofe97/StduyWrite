<svg viewBox="0 0 900 470" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>오버라이딩 구현은 언제 정해지나 — 심볼은 컴파일 때, 실제 구현은 실행 중</title>
  <desc>두 트랙을 시간축 위에 평행하게 둔다. 위 트랙(심볼 참조)은 컴파일 때 invokevirtual showMeMoney 시그니처로 일찍 잠긴다. 아래 트랙(실제 구현)은 컴파일·로딩 단계 내내 미확정으로 흐르다가, 실행 순간 invokevirtual이 this의 실제 타입을 보고 비로소 잠긴다. 그래서 같은 호출이 this=Son이면 Son.showMeMoney로, this가 다른 타입이면 그 구현으로 갈린다. 해석(로딩)과 디스패치(실행)는 다른 단계다.</desc>
  <defs>
    <style>
      .title{font-size:18px;font-weight:800;fill:#e8e4df}
      .sub{font-size:11px;fill:#b4b0ab}
      .axis{font-size:10.5px;font-weight:800;fill:#c8ccd0}
      .track{font-size:11px;font-weight:800;fill:#0d0d0d}
      .mono{font-size:9.5px;font-weight:700;fill:#10243a;font-family:'JetBrains Mono',monospace}
      .monoK{font-size:9.5px;font-weight:800;fill:#0d0d0d;font-family:'JetBrains Mono',monospace}
      .lbl{font-size:9.5px;font-weight:700;fill:#e8e4df}
      .lblD{font-size:9.5px;font-weight:700;fill:#10243a}
      .note{font-size:9px;fill:#d8d4cf}
      .foot{font-size:10.5px;font-weight:800;fill:#0d0d0d}
    </style>
    <marker id="arr" markerWidth="11" markerHeight="11" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#d4a853"/></marker>
    <marker id="arrG" markerWidth="11" markerHeight="11" refX="6.5" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#66bb6a"/></marker>
  </defs>
  <rect x="0" y="0" width="900" height="470" fill="#0d0d0d"/>
  <text x="28" y="34" class="title">오버라이딩 구현은 "언제" 잠기나 — 심볼은 일찍, 실제 구현은 실행 순간</text>
  <text x="28" y="55" class="sub">같은 invokevirtual 한 줄에서 "시그니처"와 "실제 구현"이 잠기는 시점이 다르다</text>

  <!-- 단계 헤더 (시간축 구간) -->
  <text x="155" y="92" class="axis" text-anchor="middle">[1] 컴파일 (javac)</text>
  <text x="450" y="92" class="axis" text-anchor="middle">[2] 클래스 로딩 — 해석</text>
  <text x="735" y="92" class="axis" text-anchor="middle">[3] 실행 중 — 디스패치 ★</text>
  <line x1="300" y1="78" x2="300" y2="392" stroke="#3a3733" stroke-width="1" stroke-dasharray="3 4"/>
  <line x1="600" y1="78" x2="600" y2="392" stroke="#3a3733" stroke-width="1" stroke-dasharray="3 4"/>

  <!-- ===== 위 트랙: 심볼 참조 (컴파일 때 잠김) ===== -->
  <text x="36" y="135" class="lbl">심볼 참조</text>
  <text x="36" y="149" class="note">(시그니처)</text>
  <rect x="116" y="118" width="184" height="44" rx="8" fill="#dceaf7"/>
  <text x="208" y="135" class="monoK" text-anchor="middle">invokevirtual</text>
  <text x="208" y="151" class="monoK" text-anchor="middle">showMeMoney [잠김]</text>
  <line x1="300" y1="140" x2="856" y2="140" stroke="#5b9bd5" stroke-width="3"/>
  <text x="600" y="131" class="lbl" text-anchor="middle" fill="#9ac3e8">컴파일 때 고정 — 이후 안 바뀜</text>

  <!-- ===== 아래 트랙: 실제 구현 (실행 중 잠김) ===== -->
  <text x="36" y="245" class="lbl">실제 구현</text>
  <text x="36" y="259" class="note">(Son? Father?)</text>
  <line x1="116" y1="250" x2="642" y2="250" stroke="#d4a853" stroke-width="3" stroke-dasharray="7 5" marker-end="url(#arr)"/>
  <rect x="150" y="230" width="138" height="22" rx="11" fill="#0d0d0d" stroke="#d4a853" stroke-width="1.3"/>
  <text x="219" y="245" class="lbl" text-anchor="middle" fill="#e8c98a">미확정 (열림)</text>
  <rect x="392" y="230" width="188" height="22" rx="11" fill="#0d0d0d" stroke="#d4a853" stroke-width="1.3"/>
  <text x="486" y="245" class="lbl" text-anchor="middle" fill="#e8c98a">후보만 연결, 아직 안 잠김</text>

  <!-- 실행 순간: this 실제 타입을 보고 잠김 -->
  <rect x="648" y="208" width="214" height="84" rx="10" fill="rgb(212,168,83)"/>
  <text x="755" y="230" class="track" text-anchor="middle" font-size="12">★ invokevirtual 이 this 봄</text>
  <rect x="662" y="240" width="186" height="20" rx="3" fill="#fdf3df"/>
  <text x="755" y="254" class="monoK" text-anchor="middle">this=Son → Son.showMeMoney</text>
  <rect x="676" y="269" width="158" height="17" rx="3" fill="#fdf3df"/>
  <text x="755" y="281" class="lblD" text-anchor="middle" font-weight="800">여기서 비로소 잠김 (매 호출)</text>

  <!-- 분기: 같은 호출이 객체 따라 갈림 -->
  <line x1="700" y1="290" x2="690" y2="336" stroke="#66bb6a" stroke-width="2.2" marker-end="url(#arrG)"/>
  <line x1="812" y1="290" x2="836" y2="336" stroke="#66bb6a" stroke-width="2.2" marker-end="url(#arrG)"/>
  <rect x="600" y="340" width="180" height="42" rx="7" fill="#cdeccf"/>
  <text x="690" y="358" class="mono" fill="#14521d" text-anchor="middle">this = Son</text>
  <text x="690" y="374" class="mono" fill="#14521d" text-anchor="middle">→ Son.showMeMoney</text>
  <rect x="792" y="340" width="100" height="42" rx="7" fill="#cdeccf"/>
  <text x="842" y="358" class="mono" fill="#14521d" text-anchor="middle">this = 다른</text>
  <text x="842" y="374" class="mono" fill="#14521d" text-anchor="middle">→ 그 구현</text>

  <!-- 대조 띠: 생성자는 정적 -->
  <rect x="116" y="306" width="460" height="30" rx="7" fill="#0d0d0d" stroke="#5b9bd5" stroke-width="1.2"/>
  <text x="134" y="325" class="lbl" fill="#9ac3e8">대조 · 생성자(invokespecial)는 [1] 컴파일 때 잠김(정적). 그 안의 일반 메서드만 동적.</text>

  <!-- 하단 한 줄 결론 -->
  <rect x="116" y="408" width="668" height="34" rx="8" fill="#f5edda"/>
  <text x="450" y="429" class="foot" text-anchor="middle">심볼은 컴파일·로딩 때 잠기고, 실제 구현은 실행 중 디스패치에서 잠긴다</text>
</svg>
