<svg viewBox="0 0 900 560" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>해석 — 심볼 참조(이름)를 직접 참조(주소)로</title>
  <desc>상수 풀에는 다른 클래스·메서드가 이름 문자열(심볼 참조)로만 적혀 있다. 컴파일 시점에는 대상이 메모리 어디에 로딩될지 알 수 없어 이름으로만 적기 때문이다. 해석은 런타임에 이 이름을 실제 메모리 위치(직접 참조)로 바꾸며, 대상이 로딩된 뒤에야 주소가 정해진다. 해석 대상은 클래스·필드·메서드·인터페이스 메서드 네 종류이고, 참조 대상의 존재와 접근 권한 확인(심볼 참조 검증)이 이때 한 몸으로 일어나 대상이 없으면 NoSuchMethodError, 권한이 없으면 IllegalAccessError가 난다.</desc>
  <defs>
    <style>
      .title{font-size:18px;font-weight:800;fill:#e8e4df}
      .sub{font-size:11.5px;fill:rgb(138,133,128)}
      .head{font-size:12.5px;font-weight:800;fill:rgb(212,168,83)}
      .nm{font-size:12px;font-weight:800;fill:#e8e4df}
      .body{font-size:10.5px;fill:rgb(196,191,186)}
      .note{font-size:9.5px;fill:rgb(150,145,140)}
      .symmono{font-size:11px;font-family:'JetBrains Mono',monospace;fill:#0d0d0d;font-weight:800}
      .dirmono{font-size:11px;font-family:'JetBrains Mono',monospace;fill:#0d0d0d;font-weight:800}
      .stage{font-size:10.5px;font-weight:700;fill:#0d0d0d}
      .err{font-size:10px;font-family:'JetBrains Mono',monospace;fill:#e57373;font-weight:700}
    </style>
    <marker id="arz" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 z" fill="rgb(212,168,83)"/></marker>
  </defs>
  <rect x="0" y="0" width="900" height="560" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">해석 — 이름(심볼 참조)을 주소(직접 참조)로 번역</text>
  <text x="28" y="58" class="sub">컴파일 땐 대상 주소를 몰라 이름만 적음 · 런타임에 대상이 로딩된 뒤 주소로 변환 · 존재·권한 확인이 한 몸</text>

  <!-- 심볼 참조 (왼쪽) -->
  <rect x="40" y="92" width="320" height="150" rx="11" fill="#5b9bd5"/>
  <text x="60" y="120" class="stage">심볼 참조 (Symbolic Reference)</text>
  <rect x="56" y="134" width="288" height="32" rx="6" fill="#dceaf7"/>
  <text x="70" y="155" class="symmono" fill="#10243a">"java/lang/String"</text>
  <rect x="56" y="174" width="288" height="32" rx="6" fill="#dceaf7"/>
  <text x="70" y="195" class="symmono" fill="#10243a">"Foo.bar:()V"</text>
  <text x="60" y="228" class="stage">대상이 메모리에 있든 없든 이름으로 존재 가능</text>

  <!-- 변환 화살표 -->
  <line x1="372" y1="167" x2="468" y2="167" stroke="rgb(212,168,83)" stroke-width="2.5" marker-end="url(#arz)"/>
  <text x="420" y="156" class="head" text-anchor="middle">해석</text>
  <text x="420" y="186" class="note" text-anchor="middle">(런타임)</text>

  <!-- 직접 참조 (오른쪽) -->
  <rect x="480" y="92" width="320" height="150" rx="11" fill="#66bb6a"/>
  <text x="500" y="120" class="stage">직접 참조 (Direct Reference)</text>
  <rect x="496" y="134" width="288" height="32" rx="6" fill="#dcf2de"/>
  <text x="510" y="155" class="dirmono" fill="#134a1a">0x7f3c... (포인터)</text>
  <rect x="496" y="174" width="288" height="32" rx="6" fill="#dcf2de"/>
  <text x="510" y="195" class="dirmono" fill="#134a1a">메서드 영역 오프셋</text>
  <text x="500" y="228" class="stage">실제 메모리에 존재하는 대상만 가리킴</text>

  <!-- 왜 2단계 -->
  <rect x="40" y="262" width="760" height="58" rx="9" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-dasharray="6 5"/>
  <text x="60" y="286" class="head">왜 둘로 나눴나 — 컴파일과 로딩의 분리</text>
  <text x="60" y="307" class="body">컴파일 땐 대상이 메모리 어디 앉을지 모름 → 이름만 적음. 실제 쓸 때 주소로 변환 → 동적 로딩·다형성의 토대 (C/C++는 링크 때 주소 확정)</text>

  <!-- 해석 대상 4종 -->
  <text x="40" y="352" class="head">해석 대상 4종 — 대상을 찾는 순서가 조금씩 다르다</text>
  <rect x="40" y="364" width="184" height="78" rx="9" fill="#141414" stroke="#5b9bd5"/>
  <text x="56" y="388" class="nm">① 클래스·인터페이스</text>
  <text x="56" y="410" class="body">미로딩이면 먼저 로딩</text>
  <text x="56" y="428" class="note">배열은 원소 타입 로딩</text>
  <rect x="234" y="364" width="184" height="78" rx="9" fill="#141414" stroke="#5b9bd5"/>
  <text x="250" y="388" class="nm">② 필드</text>
  <text x="250" y="410" class="body">자신 → 부모 인터페이스</text>
  <text x="250" y="428" class="body">→ 부모 클래스 순</text>
  <rect x="428" y="364" width="184" height="78" rx="9" fill="#141414" stroke="#5b9bd5"/>
  <text x="444" y="388" class="nm">③ 메서드</text>
  <text x="444" y="410" class="body">자신 → 부모 클래스</text>
  <text x="444" y="428" class="body">→ 구현 인터페이스 순</text>
  <rect x="622" y="364" width="178" height="78" rx="9" fill="#141414" stroke="#5b9bd5"/>
  <text x="638" y="388" class="nm">④ 인터페이스 메서드</text>
  <text x="638" y="410" class="body">자신 → 부모</text>
  <text x="638" y="428" class="body">인터페이스 순</text>

  <!-- 검증 한 몸 + 오류 -->
  <rect x="40" y="458" width="760" height="74" rx="9" fill="#1a1626" stroke="#9575cd" stroke-width="1.5"/>
  <text x="60" y="482" class="head" fill="#b39ddb">심볼 참조 검증과 한 몸 — 번역하려면 존재·권한을 먼저 확인</text>
  <text x="60" y="504" class="body">대상이 실제 존재하는가? 접근 권한이 있는가? 이 확인이 곧 검증 4단계의 심볼 참조 검증이다.</text>
  <text x="60" y="524" class="err">대상 없음 → NoSuchFieldError / NoSuchMethodError    권한 없음 → IllegalAccessError</text>

  <text x="28" y="552" class="sub">이 오류들이 컴파일이 아니라 *실행 중*에 터지는 이유 — 주소 확정(해석)이 런타임 작업이라 그때 대상 부재를 발견</text>
</svg>
