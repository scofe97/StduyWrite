<svg viewBox="0 0 900 470" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>왜 두 단계로 — 컴파일 때는 주소를 모른다</title>
  <desc>컴파일 시점에는 참조 대상이 메모리 어디에 로딩될지 알 수 없다. 자바는 클래스를 런타임에 게으르게 로딩하기 때문이다. 그래서 컴파일러는 일단 이름(심볼 참조)으로 적어 두고, 실제 그 참조를 처음 쓰는 런타임에 대상을 로딩해 주소를 확정한 뒤 직접 참조로 바꾼다. 이 분리 덕분에 컴파일 때 대상이 없어도 되고 나중에 구현을 바꿔 끼울 수도 있다. C/C++는 링크 때 주소를 모두 확정하는 반대 선택이다.</desc>
  <defs>
    <style>
      .title{font-size:18px;font-weight:800;fill:#e8e4df}
      .sub{font-size:11.5px;fill:rgb(138,133,128)}
      .stage{font-size:14px;font-weight:800;fill:#0d0d0d}
      .stagesub{font-size:10px;fill:#1a1a1a}
      .body{font-size:10.5px;fill:rgb(196,191,186)}
      .head{font-size:12.5px;font-weight:800;fill:rgb(212,168,83)}
      .note{font-size:9.5px;fill:rgb(150,145,140)}
      .know{font-size:11px;font-weight:700;fill:#0d0d0d}
      .codechip{font-size:10.5px;font-family:'JetBrains Mono',monospace;fill:#10243a;font-weight:800}
      .codechip2{font-size:10.5px;font-family:'JetBrains Mono',monospace;fill:#134a1a;font-weight:800}
    </style>
    <marker id="aw" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto"><path d="M0,0 L8,3.5 L0,7 z" fill="rgb(212,168,83)"/></marker>
  </defs>
  <rect x="0" y="0" width="900" height="470" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">왜 두 단계로 나눴나 — 컴파일 때는 대상 주소를 모른다</text>
  <text x="28" y="58" class="sub">자바는 클래스를 런타임에 게으르게 로딩 → 컴파일 시점엔 Foo 가 메모리 어디 앉을지 알 수 없음</text>

  <!-- 컴파일 시점 -->
  <rect x="40" y="84" width="360" height="200" rx="12" fill="rgb(212,168,83)"/>
  <text x="60" y="112" class="stage">컴파일 시점 (javac)</text>
  <text x="60" y="134" class="stagesub">Foo 가 메모리 어디 로딩될지 아직 모름</text>
  <rect x="60" y="148" width="320" height="40" rx="6" fill="#dceaf7"/>
  <text x="74" y="173" class="codechip">"Foo.bar:()V"  ← 이름만 적는다 (심볼)</text>
  <rect x="60" y="198" width="156" height="56" rx="7" fill="#cdeccf"/>
  <text x="76" y="220" class="know" fill="#14521d">아는 것</text>
  <text x="76" y="240" class="note" fill="#1f5226">대상의 이름·시그니처</text>
  <rect x="224" y="198" width="156" height="56" rx="7" fill="#f2d4d4"/>
  <text x="240" y="220" class="know" fill="#7a1f1f">모르는 것</text>
  <text x="240" y="240" class="note" fill="#7a2a2a">대상의 실제 주소</text>

  <!-- 화살표 -->
  <line x1="408" y1="184" x2="492" y2="184" stroke="rgb(212,168,83)" stroke-width="2.5" marker-end="url(#aw)"/>
  <text x="450" y="174" class="head" text-anchor="middle">해석</text>
  <text x="450" y="204" class="note" text-anchor="middle">처음 쓸 때</text>

  <!-- 런타임 시점 -->
  <rect x="504" y="84" width="360" height="200" rx="12" fill="#66bb6a"/>
  <text x="524" y="112" class="stage">런타임 시점 (해석)</text>
  <text x="524" y="134" class="stagesub">대상을 로딩 → 주소가 정해짐 → 변환</text>
  <rect x="524" y="148" width="320" height="40" rx="6" fill="#dcf2de"/>
  <text x="538" y="173" class="codechip2">0x7f3c8a... ← 주소로 바꾼다 (직접)</text>
  <rect x="524" y="198" width="320" height="56" rx="7" fill="#cdeccf"/>
  <text x="540" y="220" class="know" fill="#14521d">이제 아는 것</text>
  <text x="540" y="240" class="note" fill="#1f5226">대상이 로딩돼 실제 메모리 위치가 확정됨</text>

  <!-- 이점 -->
  <rect x="40" y="304" width="824" height="76" rx="10" fill="#1a1a1a" stroke="rgb(212,168,83)" stroke-dasharray="6 5"/>
  <text x="60" y="328" class="head">이 분리가 주는 것</text>
  <text x="60" y="350" class="body">· 컴파일 때 대상이 아직 없어도 됨 (인터페이스만 두고 구현은 나중에)</text>
  <text x="60" y="370" class="body">· 나중에 구현을 바꿔 끼울 수 있음 → 동적 로딩·다형성이 이 위에 선다</text>

  <!-- 대조 -->
  <rect x="40" y="396" width="824" height="50" rx="10" fill="#161616" stroke="#5b9bd5" stroke-width="1.2"/>
  <text x="60" y="426" class="body" fill="#9ecbf0">대조 — C/C++는 링크 때 주소를 모두 확정한다. 빠르지만 "실행 중 새 타입을 끼워 넣기"가 안 된다. 자바는 그 자유를 택해 시동을 조금 양보했다.</text>
</svg>
