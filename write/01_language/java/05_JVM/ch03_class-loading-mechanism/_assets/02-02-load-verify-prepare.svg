<svg viewBox="0 0 900 600" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>로딩·검증·준비 — 바이트 스트림이 Class 객체가 되기까지</title>
  <desc>로딩은 바이너리 스트림 획득·메서드 영역 변환·Class 객체 생성 세 작업을 한다. 검증은 파일 형식(매직넘버 0xCAFEBABE)·메타데이터·바이트코드·심볼 참조 네 단계를 거른다. 준비는 static 변수에 자료형 기본값을 메서드 영역에 할당하되, ConstantValue가 붙은 상수만 즉시 실제 값을 넣는다.</desc>
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11.5px; fill: rgb(138,133,128); }
      .ph    { font-size: 14px; font-weight: 800; fill: #0d0d0d; }
      .grp   { font-size: 12.5px; font-weight: 800; fill: #e8e4df; }
      .item  { font-size: 10.5px; fill: #e8e4df; }
      .note  { font-size: 9.5px; fill: rgb(138,133,128); }
      .mono  { font-size: 10px; font-family: 'JetBrains Mono', monospace; fill: rgb(212,168,83); font-weight: 700; }
    </style>
    <marker id="ar2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="600" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">로딩 · 검증 · 준비 — Class 객체가 만들어지기까지</text>
  <text x="28" y="58" class="sub">로딩=바이트 획득 후 변환 · 검증=4단 거름망 · 준비=static 변수 기본값 할당 (상수만 즉시 실제 값)</text>

  <!-- 로딩 -->
  <rect x="28" y="86" width="270" height="200" rx="11" fill="#5b9bd5"/>
  <text x="48" y="114" class="ph">① 로딩 (Loading)</text>
  <rect x="44" y="128" width="238" height="44" rx="7" fill="#141414"/>
  <text x="56" y="146" class="item" fill="#e8e4df" font-weight="700">a. 바이너리 스트림 획득</text>
  <text x="56" y="163" class="note" fill="#b0aba5">jar·네트워크·동적 생성 등 출처 자유</text>
  <rect x="44" y="178" width="238" height="44" rx="7" fill="#141414"/>
  <text x="56" y="196" class="item" fill="#e8e4df" font-weight="700">b. 메서드 영역 자료구조로 변환</text>
  <text x="56" y="213" class="note" fill="#b0aba5">런타임 표현으로 옮김</text>
  <rect x="44" y="228" width="238" height="44" rx="7" fill="#141414"/>
  <text x="56" y="246" class="item" fill="#e8e4df" font-weight="700">c. java.lang.Class 객체 생성</text>
  <text x="56" y="263" class="note" fill="#b0aba5">힙에 — 메서드 영역 접근 입구</text>

  <!-- 검증 -->
  <rect x="328" y="86" width="270" height="380" rx="11" fill="rgb(212,168,83)"/>
  <text x="348" y="114" class="ph">② 검증 (Verification)</text>
  <rect x="344" y="128" width="238" height="74" rx="7" fill="#141414"/>
  <text x="356" y="148" class="item" fill="#e8e4df" font-weight="700">a. 파일 형식 검증</text>
  <text x="356" y="166" class="mono" fill="rgb(212,168,83)">magic = 0xCAFEBABE</text>
  <text x="356" y="184" class="note" fill="#b0aba5">버전·상수 풀 형식 — 통과해야 메서드 영역 적재</text>
  <rect x="344" y="208" width="238" height="60" rx="7" fill="#141414"/>
  <text x="356" y="228" class="item" fill="#e8e4df" font-weight="700">b. 메타데이터 검증</text>
  <text x="356" y="246" class="note" fill="#b0aba5">의미 분석 — final 상속 금지 등</text>
  <text x="356" y="261" class="note" fill="#b0aba5">자바 언어 명세 위반 여부</text>
  <rect x="344" y="274" width="238" height="60" rx="7" fill="#141414"/>
  <text x="356" y="294" class="item" fill="#e8e4df" font-weight="700">c. 바이트코드 검증 (가장 복잡)</text>
  <text x="356" y="312" class="note" fill="#b0aba5">데이터 흐름·제어 흐름 분석</text>
  <text x="356" y="327" class="note" fill="#b0aba5">StackMapTable 로 가속</text>
  <rect x="344" y="340" width="238" height="60" rx="7" fill="#141414"/>
  <text x="356" y="360" class="item" fill="#e8e4df" font-weight="700">d. 심볼 참조 검증</text>
  <text x="356" y="378" class="note" fill="#b0aba5">해석 단계에 발생 — 참조 대상 존재·</text>
  <text x="356" y="393" class="note" fill="#b0aba5">접근 권한 확인</text>

  <!-- 준비 -->
  <rect x="628" y="86" width="244" height="380" rx="11" fill="rgb(212,168,83)"/>
  <text x="648" y="114" class="ph">③ 준비 (Preparation)</text>
  <rect x="644" y="128" width="212" height="120" rx="7" fill="#141414"/>
  <text x="656" y="150" class="item" fill="#e8e4df" font-weight="700">static 변수에 기본값</text>
  <text x="656" y="170" class="note" fill="#b0aba5">메서드 영역에 메모리 할당</text>
  <text x="656" y="190" class="mono" fill="rgb(212,168,83)">int → 0</text>
  <text x="656" y="208" class="mono" fill="rgb(212,168,83)">long → 0L</text>
  <text x="656" y="226" class="mono" fill="rgb(212,168,83)">boolean → false</text>
  <text x="656" y="244" class="mono" fill="rgb(212,168,83)">reference → null</text>
  <rect x="644" y="256" width="212" height="92" rx="7" fill="#16301a"/>
  <text x="656" y="278" class="item" fill="#e8e4df" font-weight="700">예외 — ConstantValue</text>
  <text x="656" y="297" class="note" fill="#b0aba5">static final 상수는 준비 때</text>
  <text x="656" y="312" class="note" fill="#b0aba5">곧바로 실제 값으로 초기화</text>
  <text x="656" y="332" class="mono" fill="rgb(212,168,83)">static final int V = 123</text>
  <text x="656" y="346" class="note" fill="#b0aba5">→ 준비 직후 123 (0 아님)</text>
  <text x="648" y="380" class="note" fill="#2a2110">일반 static int v = 123 은</text>
  <text x="648" y="396" class="note" fill="#2a2110">준비 때 0, 초기화 때 비로소 123</text>

  <!-- 화살표 -->
  <line x1="298" y1="186" x2="326" y2="186" stroke="rgb(212,168,83)" stroke-width="2.5" marker-end="url(#ar2)"/>
  <line x1="598" y1="186" x2="626" y2="186" stroke="rgb(212,168,83)" stroke-width="2.5" marker-end="url(#ar2)"/>

  <text x="28" y="496" class="sub">검증 d(심볼 참조)는 실제로는 다음 글의 해석 단계에 발생 — 검증의 논리적 일부지만 타이밍이 뒤임</text>
  <text x="28" y="516" class="sub">준비의 핵심 함정: 일반 static 변수는 이 단계에서 0/null, 대입은 초기화(&lt;clinit&gt;) 때 — 상수만 예외</text>
</svg>
