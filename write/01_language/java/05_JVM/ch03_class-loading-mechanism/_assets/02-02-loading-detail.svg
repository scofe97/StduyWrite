<svg viewBox="0 0 900 470" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>로딩 상세 — 바이트 스트림이 Class 객체가 되는 세 작업</title>
  <desc>로딩은 세 작업이다. 첫째 정규화된 이름으로 바이너리 바이트 스트림을 얻는데 출처는 jar·네트워크·런타임 동적 생성 등 자유다. 둘째 그 정적 저장 구조를 메서드 영역의 런타임 자료구조로 변환한다. 셋째 힙에 java.lang.Class 객체를 만드는데, 이 객체가 메서드 영역의 클래스 데이터에 접근하는 입구가 된다. 출처가 자유라 사용자 정의 클래스 로더가 가능하다.</desc>
  <defs>
    <style>
      .title{font-size:18px;font-weight:800;fill:#e8e4df}
      .sub{font-size:11.5px;fill:rgb(138,133,128)}
      .ph{font-size:14px;font-weight:800;fill:#0d0d0d}
      .head{font-size:12px;font-weight:800;fill:rgb(212,168,83)}
      .nm{font-size:11.5px;font-weight:700;fill:#e8e4df}
      .body{font-size:10px;fill:rgb(190,185,180)}
      .mono{font-size:9.5px;font-family:'JetBrains Mono',monospace;fill:rgb(212,168,83)}
      .note{font-size:9.5px;fill:rgb(138,133,128)}
      .ondark{font-size:10px;fill:#0d0d0d;font-weight:700}
      .ondarksub{font-size:9px;fill:#1a1a1a}
    </style>
    <marker id="al" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="rgb(212,168,83)"/></marker>
  </defs>
  <rect x="0" y="0" width="900" height="470" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">로딩 상세 — 바이트가 Class 객체가 되는 세 작업</text>
  <text x="28" y="58" class="sub">출처는 자유(jar·네트워크·동적 생성) → 메서드 영역으로 변환 → 힙에 Class 객체 생성(접근 입구)</text>

  <!-- a. 바이트 스트림 획득 -->
  <text x="28" y="92" class="head">a. 바이너리 바이트 스트림 획득 — 출처는 명세가 강제하지 않음</text>
  <rect x="28" y="104" width="190" height="48" rx="8" fill="#1a1a1a" stroke="#5b9bd5"/>
  <text x="123" y="126" class="nm" text-anchor="middle">jar / 클래스패스</text>
  <text x="123" y="143" class="note" text-anchor="middle">가장 흔한 경로</text>
  <rect x="232" y="104" width="190" height="48" rx="8" fill="#1a1a1a" stroke="#5b9bd5"/>
  <text x="327" y="126" class="nm" text-anchor="middle">네트워크</text>
  <text x="327" y="143" class="note" text-anchor="middle">애플릿 등 원격 로드</text>
  <rect x="436" y="104" width="200" height="48" rx="8" fill="#1a1a1a" stroke="#5b9bd5"/>
  <text x="536" y="126" class="nm" text-anchor="middle">런타임 동적 생성</text>
  <text x="536" y="143" class="note" text-anchor="middle">동적 프록시·CGLib</text>
  <rect x="650" y="104" width="222" height="48" rx="8" fill="rgba(91,155,213,0.12)" stroke="#5b9bd5" stroke-dasharray="5 4"/>
  <text x="761" y="125" class="body" text-anchor="middle">이 자유가 사용자 정의</text>
  <text x="761" y="141" class="body" text-anchor="middle">클래스 로더의 토대</text>

  <!-- 화살표 아래로 -->
  <line x1="450" y1="160" x2="450" y2="190" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#al)"/>

  <!-- b. 메서드 영역 변환 + c. Class 객체 -->
  <text x="28" y="214" class="head">b·c. 메서드 영역으로 변환하고, 힙에 Class 객체를 만든다</text>

  <!-- 메서드 영역 박스 -->
  <rect x="28" y="228" width="380" height="190" rx="11" fill="rgb(212,168,83)"/>
  <text x="48" y="256" class="ph">메서드 영역 (Method Area)</text>
  <rect x="46" y="270" width="344" height="56" rx="7" fill="rgba(13,13,13,0.16)"/>
  <text x="60" y="291" class="ondark">b. 런타임 자료구조로 변환</text>
  <text x="60" y="309" class="ondarksub">.class 의 정적 저장 구조 → JVM 내부 표현</text>
  <rect x="46" y="334" width="344" height="66" rx="7" fill="rgba(13,13,13,0.16)"/>
  <text x="60" y="356" class="ondark">클래스 메타데이터·상수 풀·메서드 바이트코드</text>
  <text x="60" y="374" class="ondarksub">필드·메서드 정의, static 변수 자리(준비 단계에서 채움)</text>
  <text x="60" y="390" class="ondarksub">여기 적재되려면 파일 형식 검증을 통과해야 함</text>

  <!-- 힙 Class 객체 -->
  <rect x="452" y="228" width="420" height="190" rx="11" fill="#66bb6a"/>
  <text x="472" y="256" class="ph">힙 (Heap)</text>
  <rect x="470" y="270" width="384" height="130" rx="7" fill="rgba(13,13,13,0.14)"/>
  <text x="484" y="294" class="ondark">c. java.lang.Class 객체</text>
  <text x="484" y="316" class="ondarksub">메서드 영역의 클래스 데이터에 접근하는 *입구*</text>
  <text x="484" y="338" class="ondarksub">리플렉션(getClass·.class)이 이 객체를 가리킨다</text>
  <text x="484" y="362" class="ondarksub">개발자가 만지는 "클래스"의 실체 — 메서드 영역 데이터를</text>
  <text x="484" y="378" class="ondarksub">직접 보지 않고 이 Class 객체를 통해 본다</text>

  <!-- 메서드영역 → Class 화살표 -->
  <line x1="408" y1="323" x2="450" y2="323" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#al)"/>
  <text x="429" y="316" class="note" text-anchor="middle">입구</text>

  <text x="28" y="448" class="sub">비배열 클래스는 클래스 로더로 로딩, 배열 클래스는 JVM이 직접 생성(단 원소 타입은 결국 로더로 로딩)</text>
</svg>
