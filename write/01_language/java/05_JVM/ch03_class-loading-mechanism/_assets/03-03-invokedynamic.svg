<svg viewBox="0 0 900 620" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>동적 타입 언어 지원 — MethodHandle vs Reflection, invokedynamic 흐름</title>
  <desc>자바는 정적 타입 언어라 동적 언어를 JVM 위에 올리려면 동적 호출 메커니즘이 필요했다. MethodHandle은 바이트코드 수준에서 메서드를 가리키는 핸들로, Reflection이 메서드 메타데이터 전체를 다루는 것과 달리 호출 동작만 모사한다. invokedynamic은 다섯 번째 호출 명령으로, 부트스트랩 메서드를 통해 CallSite를 만들고 그 호출 대상을 사용자 코드가 결정하게 한다.</desc>
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11.5px; fill: rgb(138,133,128); }
      .h     { font-size: 12.5px; font-weight: 800; fill: #0d0d0d; }
      .item  { font-size: 10px; fill: #e8e4df; }
      .note  { font-size: 9.5px; fill: rgb(138,133,128); }
      .mono  { font-size: 9px; font-family: 'JetBrains Mono', monospace; fill: rgb(212,168,83); }
    </style>
    <marker id="i4" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="620" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">동적 타입 언어 지원 — MethodHandle · invokedynamic</text>
  <text x="28" y="58" class="sub">정적 타입 언어 JVM 위에 동적 언어를 올리는 두 도구 · 호출 대상을 컴파일러가 아니라 사용자 코드가 결정</text>

  <!-- 상단: MethodHandle vs Reflection -->
  <rect x="28" y="84" width="412" height="240" rx="11" fill="rgba(91,155,213,0.08)" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="48" y="110" class="sub" font-weight="800" style="fill:#5b9bd5">MethodHandle vs Reflection — 무엇이 다른가</text>

  <rect x="44" y="124" width="190" height="180" rx="8" fill="#5b9bd5"/>
  <text x="139" y="146" class="h" text-anchor="middle">MethodHandle</text>
  <text x="56" y="170" class="item" style="fill:#0d0d0d">바이트코드 수준 모사</text>
  <text x="56" y="190" class="note" style="fill:#1a1a1a">invoke* 명령 자체를</text>
  <text x="56" y="205" class="note" style="fill:#1a1a1a">흉내내는 핸들</text>
  <text x="56" y="228" class="item" style="fill:#0d0d0d">호출 *동작* 만 담음</text>
  <text x="56" y="248" class="note" style="fill:#1a1a1a">언어 무관 — Java 외</text>
  <text x="56" y="263" class="note" style="fill:#1a1a1a">언어도 사용 가능</text>
  <text x="56" y="286" class="mono" style="fill:#0d0d0d">findVirtual / invoke</text>

  <rect x="244" y="124" width="190" height="180" rx="8" fill="#1a1a1a" stroke="rgb(138,133,128)" stroke-width="1"/>
  <text x="339" y="146" class="h" text-anchor="middle" style="fill:#e8e4df">Reflection</text>
  <text x="256" y="170" class="item">메서드 메타데이터 전체</text>
  <text x="256" y="190" class="note">Method 객체 = 이름·반환·</text>
  <text x="256" y="205" class="note">파라미터·예외·수식어 다 담음</text>
  <text x="256" y="228" class="item">무겁고 Java 전용</text>
  <text x="256" y="248" class="note">언어 수준 메서드 표현</text>
  <text x="256" y="286" class="mono">getMethod / invoke</text>

  <!-- 우측: invokedynamic 구성 -->
  <rect x="456" y="84" width="416" height="240" rx="11" fill="rgba(212,168,83,0.08)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="476" y="110" class="sub" font-weight="800" style="fill:rgb(212,168,83)">invokedynamic — 다섯 번째 호출 명령</text>
  <text x="476" y="134" class="item">앞 4개(static·special·virtual·interface)는</text>
  <text x="476" y="152" class="item">호출 대상이 *JVM 에 고정*. invokedynamic 은</text>
  <text x="476" y="170" class="item">대상 결정을 *사용자 코드* 에 넘김</text>
  <rect x="472" y="184" width="384" height="124" rx="7" fill="#1a1a1a" stroke="rgb(138,133,128)" stroke-width="0.8"/>
  <text x="484" y="206" class="mono">CONSTANT_InvokeDynamic_info</text>
  <text x="484" y="224" class="note">  ├ 부트스트랩 메서드 (BootstrapMethods 속성)</text>
  <text x="484" y="242" class="note">  └ 메서드 이름·타입 (NameAndType)</text>
  <text x="484" y="266" class="mono">java.lang.invoke.CallSite</text>
  <text x="484" y="284" class="note">  └ MethodHandle 을 담아 실제 호출 대상 지정</text>

  <!-- 하단: invokedynamic 실행 흐름 -->
  <rect x="28" y="340" width="844" height="240" rx="11" fill="rgba(102,187,106,0.06)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="48" y="366" class="sub" font-weight="800" style="fill:#66bb6a">invokedynamic 첫 실행 흐름 — 한 번만 부트스트랩, 이후 CallSite 재사용</text>

  <rect x="48" y="384" width="176" height="160" rx="8" fill="rgb(212,168,83)"/>
  <text x="136" y="408" class="h" text-anchor="middle">① invokedynamic</text>
  <text x="60" y="432" class="note" style="fill:#1a1a1a">바이트코드 실행</text>
  <text x="60" y="452" class="note" style="fill:#1a1a1a">→ 아직 호출 대상</text>
  <text x="60" y="467" class="note" style="fill:#1a1a1a">  미정 상태</text>
  <text x="60" y="492" class="note" style="fill:#1a1a1a">상수 풀의</text>
  <text x="60" y="507" class="note" style="fill:#1a1a1a">InvokeDynamic_info</text>
  <text x="60" y="522" class="note" style="fill:#1a1a1a">참조</text>

  <rect x="262" y="384" width="176" height="160" rx="8" fill="#5b9bd5"/>
  <text x="350" y="408" class="h" text-anchor="middle">② 부트스트랩</text>
  <text x="274" y="432" class="note" style="fill:#1a1a1a">BootstrapMethods 의</text>
  <text x="274" y="452" class="note" style="fill:#1a1a1a">메서드 1회 호출</text>
  <text x="274" y="476" class="note" style="fill:#1a1a1a">사용자(언어 구현)가</text>
  <text x="274" y="491" class="note" style="fill:#1a1a1a">호출 대상 결정 로직</text>
  <text x="274" y="506" class="note" style="fill:#1a1a1a">제공</text>

  <rect x="476" y="384" width="176" height="160" rx="8" fill="#66bb6a"/>
  <text x="564" y="408" class="h" text-anchor="middle">③ CallSite 생성</text>
  <text x="488" y="432" class="note" style="fill:#1a1a1a">부트스트랩이 반환한</text>
  <text x="488" y="452" class="note" style="fill:#1a1a1a">CallSite 가 실제</text>
  <text x="488" y="467" class="note" style="fill:#1a1a1a">MethodHandle 보유</text>
  <text x="488" y="492" class="note" style="fill:#1a1a1a">→ 그 핸들이 가리키는</text>
  <text x="488" y="507" class="note" style="fill:#1a1a1a">  메서드 호출</text>

  <rect x="690" y="384" width="160" height="160" rx="8" fill="rgba(102,187,106,0.12)" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="770" y="408" class="h" text-anchor="middle" style="fill:#66bb6a">④ 이후 재사용</text>
  <text x="702" y="432" class="note">같은 호출 지점은</text>
  <text x="702" y="452" class="note">CallSite 가 캐시됨</text>
  <text x="702" y="472" class="note">부트스트랩 재실행</text>
  <text x="702" y="487" class="note">없이 바로 호출</text>

  <line x1="224" y1="464" x2="260" y2="464" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#i4)"/>
  <line x1="438" y1="464" x2="474" y2="464" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#i4)"/>
  <line x1="652" y1="464" x2="688" y2="464" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#i4)"/>

  <text x="28" y="602" class="sub">람다·동적 언어가 이 위에 섭니다 — 자바 8 람다도 invokedynamic 으로 컴파일됩니다</text>
</svg>
