<svg viewBox="0 0 900 560" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>원격 실행 기능 설계 — 외부에서 받은 바이트코드를 실행</title>
  <desc>외부에서 전송된 자바 클래스를 서버에서 실행하는 기능을 만든다. 문제는 클래스가 System.out 같은 표준 출력을 쓰면 결과가 서버 콘솔로 나가 클라이언트에 안 돌아간다는 것이다. 해결책은 클래스 파일의 상수 풀에서 System 참조를 가로채 HackSystem 으로 바꾸고, HackSystem 의 출력을 버퍼에 모아 호출자에게 돌려주는 것이다. HotSwapClassLoader 가 매번 새 클래스로 적재해 같은 이름 클래스를 반복 실행할 수 있게 한다.</desc>
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11.5px; fill: rgb(138,133,128); }
      .h     { font-size: 12px; font-weight: 800; fill: #0d0d0d; }
      .note  { font-size: 9.5px; fill: rgb(138,133,128); }
      .mono  { font-size: 9px; font-family: 'JetBrains Mono', monospace; fill: rgb(212,168,83); }
    </style>
    <marker id="r1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="560" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">실전 — 원격 실행 기능 설계</text>
  <text x="28" y="58" class="sub">외부 .class 를 서버에서 실행 · 문제: System.out 결과가 서버 콘솔로 샘 · 해법: 상수 풀 치환 + 출력 가로채기</text>

  <!-- 문제 -->
  <rect x="28" y="84" width="844" height="96" rx="10" fill="rgba(244,67,54,0.07)" stroke="#f44336" stroke-width="1.5"/>
  <text x="48" y="110" class="sub" fill="#f44336" font-weight="800">문제 상황</text>
  <text x="48" y="134" class="note">클라이언트가 보낸 클래스가 System.out.println(...) 을 호출하면 → 결과가 *서버* 콘솔로 출력됨</text>
  <text x="48" y="154" class="note">→ 클라이언트는 결과를 못 받음. System 은 java.lang 핵심 클래스라 부모 위임으로 바꿀 수 없음</text>
  <text x="48" y="172" class="note">→ 클래스 메서드 호출 자체를 바꿀 수 없으니, *바이트코드 수준* 에서 System 참조를 갈아끼워야 함</text>

  <!-- 5 컴포넌트 흐름 -->
  <text x="48" y="210" class="sub" fill="rgb(212,168,83)" font-weight="800">설계 — 4개 컴포넌트의 협력</text>

  <rect x="28" y="226" width="200" height="150" rx="9" fill="#5b9bd5"/>
  <text x="128" y="250" class="h" text-anchor="middle">① ClassModifier</text>
  <text x="44" y="274" class="note" fill="rgba(13,13,13,0.72)">클래스 byte[] 의</text>
  <text x="44" y="292" class="note" fill="rgba(13,13,13,0.72)">상수 풀을 훑어</text>
  <text x="44" y="310" class="mono" fill="#0d0d0d">"java/lang/System"</text>
  <text x="44" y="326" class="note" fill="rgba(13,13,13,0.72)">상수를 찾아</text>
  <text x="44" y="344" class="mono" fill="#0d0d0d">"HackSystem" 으로</text>
  <text x="44" y="362" class="note" fill="rgba(13,13,13,0.72)">치환 (ByteUtils 사용)</text>

  <rect x="248" y="226" width="200" height="150" rx="9" fill="rgb(212,168,83)"/>
  <text x="348" y="250" class="h" text-anchor="middle">② HackSystem</text>
  <text x="264" y="274" class="note" fill="rgba(13,13,13,0.72)">System 을 본뜬 대체</text>
  <text x="264" y="292" class="note" fill="rgba(13,13,13,0.72)">클래스. out/err 을</text>
  <text x="264" y="310" class="note" fill="rgba(13,13,13,0.72)">서버 콘솔이 아니라</text>
  <text x="264" y="328" class="mono" fill="#0d0d0d">ByteArrayOutputStream</text>
  <text x="264" y="346" class="note" fill="rgba(13,13,13,0.72)">버퍼로 보냄</text>
  <text x="264" y="364" class="note" fill="rgba(13,13,13,0.72)">→ 결과를 가로챔</text>

  <rect x="468" y="226" width="200" height="150" rx="9" fill="#66bb6a"/>
  <text x="568" y="250" class="h" text-anchor="middle">③ HotSwapClassLoader</text>
  <text x="484" y="274" class="note" fill="rgba(13,13,13,0.72)">치환된 byte[] 를</text>
  <text x="484" y="292" class="mono" fill="#0d0d0d">defineClass 로 적재</text>
  <text x="484" y="312" class="note" fill="rgba(13,13,13,0.72)">매번 새 로더 인스턴스</text>
  <text x="484" y="330" class="note" fill="rgba(13,13,13,0.72)">→ 같은 이름 클래스를</text>
  <text x="484" y="348" class="note" fill="rgba(13,13,13,0.72)">반복 실행 가능</text>
  <text x="484" y="366" class="note" fill="rgba(13,13,13,0.72)">(핫스왑)</text>

  <rect x="688" y="226" width="184" height="150" rx="9" fill="rgba(102,187,106,0.12)" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="780" y="250" class="h" text-anchor="middle" fill="#66bb6a">④ JavaClassExecuter</text>
  <text x="704" y="274" class="note">①②③ 을 묶는 입구</text>
  <text x="704" y="294" class="note">execute(byte[])</text>
  <text x="704" y="314" class="note">→ 치환·적재·실행</text>
  <text x="704" y="334" class="note">→ HackSystem 버퍼의</text>
  <text x="704" y="352" class="note">  문자열을 반환</text>

  <line x1="228" y1="301" x2="246" y2="301" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#r1)"/>
  <line x1="448" y1="301" x2="466" y2="301" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#r1)"/>
  <line x1="668" y1="301" x2="686" y2="301" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#r1)"/>

  <text x="28" y="410" class="sub" fill="#66bb6a" font-weight="800">핵심 아이디어</text>
  <text x="28" y="434" class="note">바꿀 수 없는 것(System 의 동작)을, 바이트코드의 *상수 풀 문자열* 한 곳을 갈아끼워 우회한다.</text>
  <text x="28" y="454" class="note">"java/lang/System"(16자) → "HackSystem"(10자) 길이가 다르므로 빈 자리는 패딩으로 채운다.</text>
  <text x="28" y="474" class="note">상수 풀의 길이·인덱스 구조를 정확히 알아야 안전하게 치환 가능 → 06장 클래스 파일 구조 지식이 토대.</text>
  <text x="28" y="498" class="note">7·8장의 클래스 로더·바이트코드 조작·동적 적재가 한 실습에 모두 동원되는 종합 예제.</text>
  <text x="28" y="522" class="note">구체적 바이트 조작(ByteUtils)과 실행(JavaClassExecuter·JSP)은 다음 글(04-04)에서.</text>
</svg>
