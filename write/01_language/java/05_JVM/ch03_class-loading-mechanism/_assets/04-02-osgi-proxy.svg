<svg viewBox="0 0 900 600" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>OSGi 망형 클래스 로더와 동적 프록시 바이트코드 생성</title>
  <desc>OSGi는 번들마다 자기 클래스 로더를 가지며, 트리가 아니라 평등한 망(網) 구조로 서로 위임한다. 한 번들이 패키지를 export 하면 그것을 import 한 번들의 로더가 그 export 한 로더에게 위임한다. 그래서 부모-자식이 아니라 의존 관계를 따라 위임이 흐른다. 동적 프록시는 런타임에 인터페이스 구현 클래스의 바이트코드를 생성해 클래스 로더로 적재하는 기술로, 프록시 클래스를 코드 없이 만들어 낸다.</desc>
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11.5px; fill: rgb(138,133,128); }
      .h     { font-size: 12.5px; font-weight: 800; fill: #0d0d0d; }
      .note  { font-size: 9.5px; fill: rgb(138,133,128); }
      .bn    { font-size: 11px; font-weight: 800; fill: #0d0d0d; }
      .mono  { font-size: 9px; font-family: 'JetBrains Mono', monospace; fill: rgb(212,168,83); }
    </style>
    <marker id="o1" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="600" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">OSGi 망형 위임 · 동적 프록시 바이트코드 생성</text>
  <text x="28" y="58" class="sub">번들마다 로더 · 트리가 아닌 망(網) · import↔export 의존을 따라 위임 · 프록시는 런타임 바이트코드 생성</text>

  <!-- 왼쪽: OSGi 망형 -->
  <rect x="28" y="84" width="430" height="496" rx="11" fill="rgba(91,155,213,0.08)" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="48" y="110" class="sub" fill="#5b9bd5" font-weight="800">OSGi — 평등한 망형 위임 (vs 톰캣 트리)</text>

  <!-- 번들 A -->
  <rect x="60" y="130" width="160" height="92" rx="9" fill="rgb(212,168,83)"/>
  <text x="140" y="154" class="bn" text-anchor="middle">번들 A</text>
  <text x="140" y="174" class="note" text-anchor="middle" fill="rgba(13,13,13,0.72)">exports com.x.api</text>
  <text x="140" y="192" class="note" text-anchor="middle" fill="rgba(13,13,13,0.72)">자기 로더 보유</text>
  <text x="140" y="210" class="note" text-anchor="middle" fill="rgba(13,13,13,0.72)">(공급자)</text>

  <!-- 번들 B -->
  <rect x="266" y="130" width="160" height="92" rx="9" fill="#5b9bd5"/>
  <text x="346" y="154" class="bn" text-anchor="middle">번들 B</text>
  <text x="346" y="174" class="note" text-anchor="middle" fill="rgba(13,13,13,0.72)">imports com.x.api</text>
  <text x="346" y="192" class="note" text-anchor="middle" fill="rgba(13,13,13,0.72)">자기 로더 보유</text>
  <text x="346" y="210" class="note" text-anchor="middle" fill="rgba(13,13,13,0.72)">(소비자)</text>

  <!-- 번들 C -->
  <rect x="160" y="260" width="160" height="92" rx="9" fill="#5b9bd5"/>
  <text x="240" y="284" class="bn" text-anchor="middle">번들 C</text>
  <text x="240" y="304" class="note" text-anchor="middle" fill="rgba(13,13,13,0.72)">imports com.x.api</text>
  <text x="240" y="322" class="note" text-anchor="middle" fill="rgba(13,13,13,0.72)">+ exports com.y</text>
  <text x="240" y="340" class="note" text-anchor="middle" fill="rgba(13,13,13,0.72)">(공급+소비 동시)</text>

  <line x1="266" y1="176" x2="222" y2="176" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#o1)"/>
  <text x="244" y="168" class="note" text-anchor="middle">위임</text>
  <line x1="240" y1="260" x2="160" y2="222" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#o1)"/>

  <text x="48" y="386" class="note">· 부모-자식 트리가 아니라 *의존 관계* 를 따라 위임</text>
  <text x="48" y="406" class="note">· B 가 com.x.api 를 찾으면 → A 의 로더에게 위임</text>
  <text x="48" y="426" class="note">· 자기 클래스는 자기 로더, import 한 것은 공급 번들 로더</text>
  <text x="48" y="450" class="h" fill="#5b9bd5">핫 디플로이</text>
  <text x="48" y="470" class="note">번들 단위로 로더 통째 교체 → 무중단 업데이트</text>
  <text x="48" y="490" class="note">(톰캣 JSP 로더 교체의 더 일반화된 형태)</text>
  <text x="48" y="514" class="note">대가: 위임이 복잡해 데드락·버전 충돌 디버깅 어려움</text>
  <text x="48" y="538" class="note">→ "유연함 ↔ 복잡도" 트레이드오프</text>
  <text x="48" y="562" class="note">7장 §위임 깨기에서 본 OSGi 의 구체적 모습</text>

  <!-- 오른쪽: 동적 프록시 -->
  <rect x="478" y="84" width="394" height="496" rx="11" fill="rgba(102,187,106,0.07)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="498" y="110" class="sub" fill="#66bb6a" font-weight="800">동적 프록시 — 런타임 바이트코드 생성</text>
  <text x="498" y="134" class="note">소스 코드 없이 인터페이스 구현 클래스를 *실행 중에* 만든다</text>

  <rect x="498" y="150" width="354" height="60" rx="7" fill="#66bb6a"/>
  <text x="510" y="172" class="h">① 인터페이스 + InvocationHandler</text>
  <text x="510" y="192" class="note" fill="rgba(13,13,13,0.72)">개발자가 호출 가로채기 로직만 작성</text>

  <rect x="498" y="222" width="354" height="64" rx="7" fill="#1a1a1a" stroke="#66bb6a" stroke-width="1"/>
  <text x="510" y="244" class="h" fill="#e8e4df">② Proxy.newProxyInstance</text>
  <text x="510" y="264" class="mono">generateProxyClass → byte[]</text>
  <text x="510" y="280" class="note">프록시 클래스 *바이트코드* 를 런타임 생성</text>

  <rect x="498" y="298" width="354" height="64" rx="7" fill="#1a1a1a" stroke="#66bb6a" stroke-width="1"/>
  <text x="510" y="320" class="h" fill="#e8e4df">③ 클래스 로더가 적재</text>
  <text x="510" y="340" class="mono">defineClass(byte[]) → Class</text>
  <text x="510" y="356" class="note">생성한 바이트를 로더가 메모리에 올림</text>

  <rect x="498" y="374" width="354" height="60" rx="7" fill="rgba(102,187,106,0.16)"/>
  <text x="510" y="396" class="h">④ 프록시 인스턴스 반환</text>
  <text x="510" y="416" class="note">메서드 호출 → InvocationHandler.invoke 로 위임</text>

  <text x="498" y="462" class="note">핵심: "바이트코드 생성" 은 컴파일러만의 일이 아니다.</text>
  <text x="498" y="482" class="note">CGLib·ASM·javac·동적 프록시가 모두 런타임에</text>
  <text x="498" y="502" class="note">byte[] 를 만들어 클래스 로더로 적재한다.</text>
  <text x="498" y="524" class="note">→ AOP·ORM·Mock 프레임워크의 토대</text>
  <text x="498" y="548" class="note">JDK 동적 프록시는 *인터페이스* 만, CGLib 은</text>
  <text x="498" y="566" class="note">상속으로 *클래스* 도 프록시 가능</text>
</svg>
