<svg viewBox="0 0 900 560" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>모듈 선언 다섯 키워드 — requires·exports·opens·uses·provides</title>
  <desc>모듈은 module-info.java에서 무엇을 쓰고 무엇을 공개할지 선언한다. requires는 의존 모듈, exports는 공개 패키지(일반 접근), opens는 리플렉션 접근 개방, uses는 소비하는 서비스, provides는 제공하는 서비스 구현이다. exports와 opens는 to로 특정 모듈에만 한정할 수 있고, 모듈 선언 앞에 open을 붙이면 모든 패키지가 리플렉션에 열린다. uses와 provides는 02-04의 SPI를 모듈로 흡수한 소비자-공급자 짝이다.</desc>
  <defs>
    <style>
      .title{font-size:18px;font-weight:800;fill:#e8e4df}
      .sub{font-size:11.5px;fill:rgb(150,145,140)}
      .kw{font-size:13px;font-weight:800;fill:#0d0d0d;font-family:'JetBrains Mono',monospace}
      .desc{font-size:10.5px;fill:#1a1a1a}
      .note{font-size:9.5px;fill:rgb(196,191,186)}
      .head{font-size:12px;font-weight:800;fill:rgb(212,168,83)}
    </style>
  </defs>
  <rect x="0" y="0" width="900" height="560" fill="#0d0d0d"/>
  <text x="28" y="40" class="title">모듈 선언 다섯 키워드 — module-info.java</text>
  <text x="28" y="64" class="sub">무엇을 쓰고(requires) 무엇을 공개할지(exports) 선언 · 선언 안 한 패키지는 모듈 안에 갇힘</text>

  <!-- requires -->
  <rect x="40" y="92" width="400" height="68" rx="9" fill="#5b9bd5"/>
  <text x="60" y="120" class="kw">requires</text>
  <text x="60" y="142" class="desc" fill="#0c1f30">의존하는 다른 모듈 선언 — 선언한 모듈만 사용 가능</text>

  <!-- exports -->
  <rect x="40" y="172" width="400" height="86" rx="9" fill="rgb(212,168,83)"/>
  <text x="60" y="200" class="kw">exports</text>
  <text x="60" y="222" class="desc">공개 패키지 — 일반(컴파일·런타임) 접근 허용</text>
  <text x="60" y="244" class="desc">exports com.foo to 모듈A  →  특정 모듈에만 한정 공개</text>

  <!-- opens -->
  <rect x="40" y="270" width="400" height="86" rx="9" fill="rgb(212,168,83)"/>
  <text x="60" y="298" class="kw">opens</text>
  <text x="60" y="320" class="desc">리플렉션 접근만 개방 — Spring·Hibernate가 private 필드에</text>
  <text x="60" y="342" class="desc">open module ... { }  →  모듈 전체 패키지를 리플렉션 개방</text>

  <!-- uses / provides -->
  <rect x="40" y="368" width="400" height="100" rx="9" fill="#66bb6a"/>
  <text x="60" y="396" class="kw">uses / provides</text>
  <text x="60" y="418" class="desc" fill="#0e3014">uses X      — X 규격을 소비 (SPI 소비자)</text>
  <text x="60" y="440" class="desc" fill="#0e3014">provides X with Y — X를 Y로 구현 제공 (SPI 공급자)</text>
  <text x="60" y="460" class="desc" fill="#0e3014">02-04의 SPI를 모듈이 흡수한 소비자-공급자 짝</text>

  <!-- 예시 코드 -->
  <rect x="468" y="92" width="404" height="376" rx="10" fill="#141414" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="488" y="118" class="head">module-info.java</text>
  <text x="488" y="148" font-size="11" font-family="'JetBrains Mono',monospace" fill="#e6c878">module com.example.app {</text>
  <text x="508" y="172" font-size="11" font-family="'JetBrains Mono',monospace" fill="#9ecbf0">requires java.sql;</text>
  <text x="508" y="196" font-size="11" font-family="'JetBrains Mono',monospace" fill="#e6c878">exports com.example.api;</text>
  <text x="508" y="220" font-size="11" font-family="'JetBrains Mono',monospace" fill="#e6c878">opens com.example.entity;</text>
  <text x="508" y="244" font-size="11" font-family="'JetBrains Mono',monospace" fill="#a6e0aa">uses ...spi.Plugin;</text>
  <text x="508" y="268" font-size="11" font-family="'JetBrains Mono',monospace" fill="#a6e0aa">provides ...Plugin</text>
  <text x="528" y="290" font-size="11" font-family="'JetBrains Mono',monospace" fill="#a6e0aa">with ...DefaultPlugin;</text>
  <text x="488" y="314" font-size="11" font-family="'JetBrains Mono',monospace" fill="#e6c878">}</text>
  <line x1="488" y1="334" x2="852" y2="334" stroke="#333" stroke-width="1"/>
  <text x="488" y="358" class="note">· requires = 무엇을 쓰나</text>
  <text x="488" y="380" class="note">· exports = 일반 공개  ·  opens = 리플렉션만</text>
  <text x="488" y="402" class="note">· to 로 특정 모듈 한정  ·  open module 로 전체 개방</text>
  <text x="488" y="424" class="note">· uses/provides = SPI 소비자/공급자</text>
  <text x="488" y="450" class="note">선언 안 한 패키지는 모듈 밖에서 보이지 않음 (강한 캡슐화)</text>

  <text x="28" y="494" class="sub">exports = 코드로 직접 호출 / opens = 리플렉션 접근만 — Spring이 엔티티 private 필드 다루려면 opens 필요</text>
  <text x="28" y="518" class="sub">uses/provides 는 클래스패스 시대 META-INF/services 파일을 모듈 선언으로 끌어올린 것</text>
</svg>
