<svg viewBox="0 0 900 520" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>자바 스레드의 여섯 가지 상태와 전이</title>
  <desc>자바 스레드는 여섯 상태를 오간다. NEW에서 start()로 RUNNABLE이 된다. RUNNABLE에서 synchronized 락을 못 얻으면 BLOCKED, 락을 얻으면 RUNNABLE로 돌아온다. wait()·join()·park()로 WAITING이 되고 notify()·unpark()로 깨어나 RUNNABLE로 돌아온다. sleep(ms)·wait(ms)·join(ms)로 TIMED_WAITING이 되고 시간이 차면 RUNNABLE로 돌아온다. run()이 끝나면 TERMINATED가 된다. BLOCKED·WAITING·TIMED_WAITING에서 깨어난 스레드는 즉시 실행되는 것이 아니라 RUNNABLE로 돌아가 다시 CPU를 기다린다.</desc>
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11.5px; fill: #c9c4be; }
      .st    { font-size: 13px; font-weight: 800; fill: #0d0d0d; }
      .stk   { font-size: 9.5px; fill: rgba(13,13,13,0.78); }
      .edge  { font-size: 10px; font-weight: 700; fill: #e8e4df; }
      .mono  { font-size: 9px; font-family: 'JetBrains Mono', monospace; fill: rgb(212,168,83); }
    </style>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="520" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">자바 스레드의 여섯 가지 상태와 전이</text>
  <text x="28" y="58" class="sub">깨어난 스레드는 곧장 실행되지 않고 RUNNABLE로 돌아가 다시 CPU를 기다린다</text>

  <!-- NEW -->
  <rect x="40" y="230" width="120" height="62" rx="9" fill="#5b9bd5"/>
  <text x="100" y="258" class="st" text-anchor="middle">NEW</text>
  <text x="100" y="278" class="stk" text-anchor="middle">객체 생성, start() 전</text>

  <!-- RUNNABLE (중앙) -->
  <rect x="360" y="225" width="160" height="72" rx="10" fill="rgb(212,168,83)"/>
  <text x="440" y="255" class="st" text-anchor="middle">RUNNABLE</text>
  <text x="440" y="275" class="stk" text-anchor="middle">실행 중 / 실행 대기</text>

  <!-- TERMINATED -->
  <rect x="730" y="230" width="130" height="62" rx="9" fill="#9e9e9e"/>
  <text x="795" y="258" class="st" text-anchor="middle">TERMINATED</text>
  <text x="795" y="278" class="stk" text-anchor="middle">run() 종료</text>

  <!-- BLOCKED (위) -->
  <rect x="350" y="92" width="180" height="62" rx="9" fill="#ef9a9a"/>
  <text x="440" y="118" class="st" text-anchor="middle">BLOCKED</text>
  <text x="440" y="138" class="stk" text-anchor="middle">모니터 락 대기</text>

  <!-- WAITING (아래 왼) -->
  <rect x="250" y="378" width="180" height="62" rx="9" fill="#66bb6a"/>
  <text x="340" y="404" class="st" text-anchor="middle">WAITING</text>
  <text x="340" y="424" class="stk" text-anchor="middle">깨움 대기 (무기한)</text>

  <!-- TIMED_WAITING (아래 오른) -->
  <rect x="460" y="378" width="200" height="62" rx="9" fill="#a5d6a7"/>
  <text x="560" y="404" class="st" text-anchor="middle">TIMED_WAITING</text>
  <text x="560" y="424" class="stk" text-anchor="middle">시간 제한 대기</text>

  <!-- NEW -> RUNNABLE -->
  <line x1="160" y1="261" x2="360" y2="261" stroke="rgb(212,168,83)" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="260" y="252" class="edge" text-anchor="middle">start()</text>

  <!-- RUNNABLE -> TERMINATED -->
  <line x1="520" y1="261" x2="730" y2="261" stroke="rgb(212,168,83)" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="625" y="252" class="edge" text-anchor="middle">run() 종료</text>

  <!-- RUNNABLE <-> BLOCKED -->
  <line x1="420" y1="225" x2="420" y2="154" stroke="rgb(212,168,83)" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="332" y="190" class="mono" text-anchor="end">락 못 얻음</text>
  <line x1="465" y1="154" x2="465" y2="225" stroke="rgb(212,168,83)" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="548" y="190" class="mono" text-anchor="start">락 획득</text>

  <!-- RUNNABLE <-> WAITING -->
  <line x1="410" y1="297" x2="360" y2="378" stroke="rgb(212,168,83)" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="300" y="338" class="mono" text-anchor="end">wait()/join()/park()</text>
  <line x1="392" y1="378" x2="442" y2="297" stroke="rgb(212,168,83)" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="398" y="368" class="mono" text-anchor="end">notify()/unpark()</text>

  <!-- RUNNABLE <-> TIMED_WAITING -->
  <line x1="490" y1="297" x2="540" y2="378" stroke="rgb(212,168,83)" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="640" y="332" class="mono" text-anchor="start">sleep(ms)/wait(ms)</text>
  <line x1="600" y1="378" x2="525" y2="297" stroke="rgb(212,168,83)" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="640" y="350" class="mono" text-anchor="start">시간 만료</text>
</svg>
