<svg viewBox="0 0 900 430" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>ThreadPoolExecutor 작업 처리 4단계 — 코어 스레드 → 큐 → 초과 스레드 → 거절</title>
  <desc>ThreadPoolExecutor는 작업이 들어오면 먼저 코어 스레드 수까지 스레드를 만들고, 코어가 다 차면 작업 큐에 쌓고, 큐도 가득 차면 최대 스레드 수까지 초과(임시) 스레드를 만들고, 최대 스레드까지 다 찼으면 RejectedExecutionException으로 거절한다. 각 단계가 가득 찼을 때만 다음 단계로 넘어가는 순서가 핵심이다.</desc>
  <rect x="0" y="0" width="900" height="430" fill="#0d0d0d"/>

  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e4df">ThreadPoolExecutor — 작업이 채워지는 4단계 순서</text>
  <text x="450" y="54" text-anchor="middle" font-size="12.5" fill="#c9c4be">각 칸이 "가득 차면" 다음 칸으로 넘어간다 — 코어 → 큐 → 초과 → 거절</text>

  <!-- 작업 요청 -->
  <rect x="40" y="120" width="110" height="60" rx="10" fill="#dceaf7"/>
  <text x="95" y="148" text-anchor="middle" font-size="12.5" font-weight="700" fill="#10243a">작업 요청</text>
  <text x="95" y="167" text-anchor="middle" font-size="11" fill="#10243a">execute()</text>
  <line x1="150" y1="150" x2="186" y2="150" stroke="#8a857f" stroke-width="2"/>
  <polygon points="192,150 182,145 182,155" fill="#8a857f"/>

  <!-- ① 코어 스레드 -->
  <rect x="194" y="108" width="150" height="84" rx="10" fill="#0d0d0d" stroke="#66bb6a" stroke-width="1.8"/>
  <text x="269" y="130" text-anchor="middle" font-size="12.5" font-weight="700" fill="#66bb6a">① 코어 스레드</text>
  <rect x="210" y="142" width="40" height="34" rx="6" fill="#cdeccf"/><text x="230" y="164" text-anchor="middle" font-size="11" font-weight="700" fill="#14521d">T</text>
  <rect x="256" y="142" width="40" height="34" rx="6" fill="#cdeccf"/><text x="276" y="164" text-anchor="middle" font-size="11" font-weight="700" fill="#14521d">T</text>
  <text x="313" y="164" text-anchor="middle" font-size="11" fill="#c9c4be">…</text>

  <!-- 차면 다음 -->
  <line x1="344" y1="150" x2="380" y2="150" stroke="#d4a853" stroke-width="2"/>
  <polygon points="386,150 376,145 376,155" fill="#d4a853"/>
  <text x="365" y="142" text-anchor="middle" font-size="9.5" fill="#d4a853">다 참</text>

  <!-- ② 큐 -->
  <rect x="388" y="108" width="150" height="84" rx="10" fill="#0d0d0d" stroke="#5b9bd5" stroke-width="1.8"/>
  <text x="463" y="130" text-anchor="middle" font-size="12.5" font-weight="700" fill="#5b9bd5">② 작업 큐</text>
  <rect x="404" y="142" width="118" height="34" rx="6" fill="#dceaf7"/>
  <text x="463" y="164" text-anchor="middle" font-size="10.5" font-weight="700" fill="#10243a">대기 작업 쌓기</text>

  <!-- 차면 다음 -->
  <line x1="538" y1="150" x2="574" y2="150" stroke="#d4a853" stroke-width="2"/>
  <polygon points="580,150 570,145 570,155" fill="#d4a853"/>
  <text x="559" y="142" text-anchor="middle" font-size="9.5" fill="#d4a853">다 참</text>

  <!-- ③ 초과 스레드 -->
  <rect x="582" y="108" width="150" height="84" rx="10" fill="#0d0d0d" stroke="#d4a853" stroke-width="1.8"/>
  <text x="657" y="130" text-anchor="middle" font-size="12.5" font-weight="700" fill="#d4a853">③ 초과 스레드</text>
  <rect x="598" y="142" width="40" height="34" rx="6" fill="#fdf3df"/><text x="618" y="164" text-anchor="middle" font-size="11" font-weight="700" fill="#5a3d0a">T</text>
  <rect x="644" y="142" width="40" height="34" rx="6" fill="#fdf3df"/><text x="664" y="164" text-anchor="middle" font-size="11" font-weight="700" fill="#5a3d0a">T</text>
  <text x="701" y="164" text-anchor="middle" font-size="10" fill="#c9c4be">~max</text>

  <!-- 차면 거절 -->
  <line x1="732" y1="150" x2="768" y2="150" stroke="#c0504d" stroke-width="2"/>
  <polygon points="774,150 764,145 764,155" fill="#c0504d"/>
  <text x="753" y="142" text-anchor="middle" font-size="9.5" fill="#e08a87">다 참</text>

  <!-- ④ 거절 -->
  <rect x="776" y="116" width="96" height="68" rx="10" fill="#f2d4d4"/>
  <text x="824" y="143" text-anchor="middle" font-size="12" font-weight="700" fill="#7a1f1f">④ 거절</text>
  <text x="824" y="162" text-anchor="middle" font-size="9.5" fill="#7a1f1f">Rejected</text>
  <text x="824" y="174" text-anchor="middle" font-size="9.5" fill="#7a1f1f">Exception</text>

  <!-- 단계 라벨 (하단 정렬) -->
  <text x="269" y="210" text-anchor="middle" font-size="10.5" fill="#c9c4be">corePoolSize 까지 생성</text>
  <text x="463" y="210" text-anchor="middle" font-size="10.5" fill="#c9c4be">코어가 다 차면 큐에</text>
  <text x="657" y="210" text-anchor="middle" font-size="10.5" fill="#c9c4be">큐도 차면 maximumPoolSize 까지</text>

  <!-- 하단: 핵심 / 거절 정책 -->
  <rect x="40" y="248" width="400" height="150" rx="10" fill="#0d0d0d" stroke="#66bb6a" stroke-width="1.6"/>
  <text x="58" y="274" font-size="12.5" font-weight="700" fill="#66bb6a">순서가 핵심 — 큐가 먼저, 초과 스레드는 나중</text>
  <text x="58" y="298" font-size="11.5" fill="#c9c4be">흔한 오해: "바쁘면 최대 스레드까지 바로 늘겠지".</text>
  <text x="58" y="317" font-size="11.5" fill="#c9c4be">실제론 코어가 차면 *큐부터* 채우고, 큐가</text>
  <text x="58" y="336" font-size="11.5" fill="#c9c4be">가득 차야 비로소 초과 스레드를 만든다.</text>
  <text x="58" y="362" font-size="11.5" fill="#e8e4df">→ 큐가 크면(무제한 등) 초과 스레드는</text>
  <text x="58" y="381" font-size="11.5" fill="#e8e4df">   영영 안 생길 수 있다 (max 무의미).</text>

  <rect x="460" y="248" width="412" height="150" rx="10" fill="#0d0d0d" stroke="#c0504d" stroke-width="1.6"/>
  <text x="478" y="274" font-size="12.5" font-weight="700" fill="#e08a87">④ 거절 정책 (setRejectedExecutionHandler)</text>
  <text x="478" y="300" font-size="11.5" fill="#c9c4be">· AbortPolicy (기본) — 예외 던짐</text>
  <text x="478" y="322" font-size="11.5" fill="#c9c4be">· DiscardPolicy — 조용히 버림</text>
  <text x="478" y="344" font-size="11.5" fill="#c9c4be">· CallerRunsPolicy — 호출 스레드가 직접 실행</text>
  <text x="478" y="372" font-size="11" fill="#c9c4be">CallerRuns는 호출자를 느리게 해 유입을 늦추는</text>
  <text x="478" y="389" font-size="11" fill="#c9c4be">자연적 역압(back-pressure) 효과가 있다.</text>
</svg>
