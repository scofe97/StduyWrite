<svg viewBox="0 0 900 430" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>mount/unmount 비용 — 커널을 거치는 OS 전환 vs 사용자 공간 JVM 전환</title>
  <desc>플랫폼 스레드의 컨텍스트 스위치는 OS 커널이 수행하며 사용자 모드와 커널 모드를 오가는 시스템 콜이 필요해 무겁다. 가상 스레드의 mount/unmount는 JVM이 사용자 공간에서 힙에 보관된 Continuation만 갈아끼우므로 커널을 거치지 않아 가볍다. 그래서 자주 전환해도 감당된다.</desc>
  <rect x="0" y="0" width="900" height="430" fill="#0d0d0d"/>

  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e4df">전환이 싼 이유 — 커널을 거치느냐 아니냐</text>
  <text x="450" y="56" text-anchor="middle" font-size="13" fill="#8a857f">블로킹마다 자주 일어나도 감당되는 비용적 근거</text>

  <!-- 경계선: 사용자 공간 vs 커널 -->
  <!-- ===== 플랫폼 스레드 (왼쪽, 커널 거침) ===== -->
  <rect x="30" y="84" width="400" height="300" rx="12" fill="#0d0d0d" stroke="#c0504d" stroke-width="2"/>
  <text x="230" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#e08a87">플랫폼 스레드 전환</text>
  <text x="230" y="132" text-anchor="middle" font-size="12.5" fill="#8a857f">OS 커널이 수행 — 무겁다</text>

  <!-- 사용자 공간 -->
  <rect x="58" y="150" width="344" height="50" rx="7" fill="#dceaf7"/>
  <text x="230" y="172" text-anchor="middle" font-size="12.5" fill="#10243a">사용자 모드 — 스레드 A 실행 중</text>
  <text x="230" y="190" text-anchor="middle" font-size="11" fill="#10243a">전환하려면 ↓ 커널로 내려가야 함</text>

  <!-- 커널 경계 -->
  <rect x="58" y="210" width="344" height="60" rx="7" fill="#c0504d"/>
  <text x="230" y="232" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0d0d0d">⚡ 커널 모드 진입 (시스템 콜)</text>
  <text x="230" y="251" text-anchor="middle" font-size="11" fill="#0d0d0d">레지스터 저장·복원, 캐시 처리,</text>
  <text x="230" y="265" text-anchor="middle" font-size="11" fill="#0d0d0d">모드 전환 비용</text>

  <rect x="58" y="280" width="344" height="44" rx="7" fill="#e6f7e7"/>
  <text x="230" y="307" text-anchor="middle" font-size="12.5" fill="#14521d">사용자 모드 복귀 — 스레드 B 실행</text>

  <text x="230" y="352" text-anchor="middle" font-size="12.5" font-weight="700" fill="#e08a87">사용자 ↔ 커널 왕복이 비용의 핵심</text>

  <!-- ===== 가상 스레드 (오른쪽, 커널 안 거침) ===== -->
  <rect x="470" y="84" width="400" height="300" rx="12" fill="#0d0d0d" stroke="#66bb6a" stroke-width="2"/>
  <text x="670" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#66bb6a">가상 스레드 mount/unmount</text>
  <text x="670" y="132" text-anchor="middle" font-size="12.5" fill="#8a857f">JVM이 사용자 공간에서 수행 — 가볍다</text>

  <rect x="498" y="150" width="344" height="50" rx="7" fill="#dceaf7"/>
  <text x="670" y="172" text-anchor="middle" font-size="12.5" fill="#10243a">사용자 공간 — VT-A 실행 중</text>
  <text x="670" y="190" text-anchor="middle" font-size="11" fill="#10243a">블로킹 → unmount (커널 안 내려감)</text>

  <!-- 힙 교체 -->
  <rect x="498" y="210" width="344" height="60" rx="7" fill="#e6f7e7"/>
  <text x="670" y="232" text-anchor="middle" font-size="12.5" font-weight="700" fill="#14521d">힙의 Continuation 갈아끼움</text>
  <text x="670" y="251" text-anchor="middle" font-size="11" fill="#14521d">VT-A 상태를 힙에 저장 →</text>
  <text x="670" y="265" text-anchor="middle" font-size="11" fill="#14521d">VT-B 상태를 힙에서 복원</text>

  <rect x="498" y="280" width="344" height="44" rx="7" fill="#cdeccf"/>
  <text x="670" y="307" text-anchor="middle" font-size="12.5" fill="#14521d">같은 사용자 공간에서 VT-B 실행</text>

  <text x="670" y="352" text-anchor="middle" font-size="12.5" font-weight="700" fill="#66bb6a">커널 진입 없음 = 힙 복사 수준</text>

  <!-- 하단 못박기 -->
  <rect x="30" y="396" width="840" height="0" fill="none"/>
  <text x="450" y="410" text-anchor="middle" font-size="12.5" fill="#c9c4be">앞 편 §1 "1:1 커널 스레드가 무거운 까닭 = 사용자↔커널 시스템 콜" — mount/unmount엔 그 시스템 콜이 없다</text>
</svg>
