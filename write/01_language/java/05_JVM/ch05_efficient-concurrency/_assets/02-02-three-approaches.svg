<svg viewBox="0 0 900 380" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>안전성 구현 세 갈래 — 비관적·낙관적·무공유</title>
  <desc>스레드 안전성을 구현하는 세 갈래는 충돌을 대하는 방식으로 갈린다. 상호 배제는 미리 막는 비관적 방식, 논블로킹은 부딪히면 다시 하는 낙관적 방식, 무동기화는 아예 공유를 없애 부딪힐 일을 만들지 않는다.</desc>
  <rect x="0" y="0" width="900" height="380" fill="#0d0d0d"/>

  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e4df">안전성 구현 세 갈래 — "충돌을 어떻게 대하나"</text>

  <!-- 1 상호 배제 -->
  <rect x="30" y="64" width="270" height="280" rx="12" fill="#0d0d0d" stroke="#5b9bd5" stroke-width="2"/>
  <text x="165" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#5b9bd5">상호 배제 (비관적)</text>
  <text x="165" y="114" text-anchor="middle" font-size="12" fill="#8a857f">충돌날까 봐 미리 막는다</text>
  <rect x="56" y="130" width="218" height="40" rx="7" fill="#dceaf7"/>
  <text x="165" y="155" text-anchor="middle" font-size="12.5" fill="#10243a">한 번에 한 스레드만 진입</text>
  <rect x="56" y="178" width="218" height="40" rx="7" fill="#dceaf7"/>
  <text x="165" y="203" text-anchor="middle" font-size="12.5" fill="#10243a">나머지는 멈춰 대기(블로킹)</text>
  <text x="165" y="248" text-anchor="middle" font-size="12.5" font-weight="700" fill="#5b9bd5">synchronized</text>
  <text x="165" y="268" text-anchor="middle" font-size="12.5" font-weight="700" fill="#5b9bd5">ReentrantLock</text>
  <rect x="56" y="290" width="218" height="36" rx="6" fill="#0d0d0d" stroke="#5b9bd5" stroke-width="1"/>
  <text x="165" y="313" text-anchor="middle" font-size="11.5" fill="#c9c4be">비용: 커널 블로킹</text>

  <!-- 2 논블로킹 -->
  <rect x="315" y="64" width="270" height="280" rx="12" fill="#0d0d0d" stroke="#d4a853" stroke-width="2"/>
  <text x="450" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#d4a853">논블로킹 (낙관적)</text>
  <text x="450" y="114" text-anchor="middle" font-size="12" fill="#8a857f">일단 하고 부딪히면 다시</text>
  <rect x="341" y="130" width="218" height="40" rx="7" fill="#fdf3df"/>
  <text x="450" y="155" text-anchor="middle" font-size="12.5" fill="#5a3d0a">안 멈추고 시도 → 실패 시 재시도</text>
  <rect x="341" y="178" width="218" height="40" rx="7" fill="#fdf3df"/>
  <text x="450" y="203" text-anchor="middle" font-size="12.5" fill="#5a3d0a">바탕은 CAS (CPU 명령)</text>
  <text x="450" y="248" text-anchor="middle" font-size="12.5" font-weight="700" fill="#d4a853">AtomicInteger</text>
  <text x="450" y="268" text-anchor="middle" font-size="12.5" font-weight="700" fill="#d4a853">CAS 기반 클래스</text>
  <rect x="341" y="290" width="218" height="36" rx="6" fill="#0d0d0d" stroke="#d4a853" stroke-width="1"/>
  <text x="450" y="313" text-anchor="middle" font-size="11.5" fill="#c9c4be">비용: 스핀 재시도 (커널 X)</text>

  <!-- 3 무동기화 -->
  <rect x="600" y="64" width="270" height="280" rx="12" fill="#0d0d0d" stroke="#66bb6a" stroke-width="2"/>
  <text x="735" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#66bb6a">무동기화 (무공유)</text>
  <text x="735" y="114" text-anchor="middle" font-size="12" fill="#8a857f">부딪힐 일을 안 만든다</text>
  <rect x="626" y="130" width="218" height="40" rx="7" fill="#e6f7e7"/>
  <text x="735" y="155" text-anchor="middle" font-size="12.5" fill="#14521d">공유 상태 자체가 없음</text>
  <rect x="626" y="178" width="218" height="40" rx="7" fill="#e6f7e7"/>
  <text x="735" y="203" text-anchor="middle" font-size="12.5" fill="#14521d">안전성을 따질 일이 없음</text>
  <text x="735" y="248" text-anchor="middle" font-size="12.5" font-weight="700" fill="#66bb6a">재진입 코드(순수 함수)</text>
  <text x="735" y="268" text-anchor="middle" font-size="12.5" font-weight="700" fill="#66bb6a">ThreadLocal</text>
  <rect x="626" y="290" width="218" height="36" rx="6" fill="#0d0d0d" stroke="#66bb6a" stroke-width="1"/>
  <text x="735" y="313" text-anchor="middle" font-size="11.5" fill="#c9c4be">비용: 없음 (가장 깔끔)</text>
</svg>
