<svg viewBox="0 0 900 560" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>재정렬 버그와 volatile 펜스 — 깃발이 데이터보다 먼저 오를 때</title>
  <rect x="0" y="0" width="900" height="560" fill="#0d0d0d"/>

  <text x="450" y="36" text-anchor="middle" font-size="21" font-weight="700" fill="#e8e4df">재정렬 버그와 volatile 펜스</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#8a857f">(1) config = 42  ·  (2) initialized = true  — 둘은 서로 의존이 없다</text>

  <!-- ============ 위: volatile 없음 (버그) ============ -->
  <rect x="24" y="80" width="852" height="210" rx="12" fill="#0d0d0d" stroke="#c0504d" stroke-width="2"/>
  <text x="44" y="108" font-size="16" font-weight="700" fill="#e08a87">volatile 없음 — 재정렬 허용 → 버그</text>

  <!-- 코드 순서 (왼쪽) -->
  <text x="150" y="138" text-anchor="middle" font-size="12.5" fill="#8a857f">코드가 적은 순서</text>
  <rect x="60" y="150" width="180" height="40" rx="7" fill="#dceaf7"/>
  <text x="150" y="175" text-anchor="middle" font-size="13" fill="#10243a">(1) config = 42</text>
  <rect x="60" y="200" width="180" height="40" rx="7" fill="#e6f7e7"/>
  <text x="150" y="225" text-anchor="middle" font-size="13" fill="#14521d">(2) initialized = true</text>

  <!-- 화살표 재정렬 -->
  <text x="330" y="190" text-anchor="middle" font-size="12.5" fill="#e08a87">재정렬</text>
  <line x1="270" y1="200" x2="392" y2="200" stroke="#c0504d" stroke-width="2.5"/>
  <polygon points="398,200 388,195 388,205" fill="#c0504d"/>

  <!-- 메모리 도달 순서 (오른쪽) -->
  <text x="540" y="138" text-anchor="middle" font-size="12.5" fill="#8a857f">실제 메모리 도달 순서</text>
  <rect x="450" y="150" width="180" height="40" rx="7" fill="#f2d4d4"/>
  <text x="540" y="175" text-anchor="middle" font-size="13" font-weight="700" fill="#7a1f1f">initialized = true 먼저!</text>
  <rect x="450" y="200" width="180" height="40" rx="7" fill="#dceaf7"/>
  <text x="540" y="225" text-anchor="middle" font-size="13" fill="#10243a">config = 42 나중</text>

  <!-- 사용 스레드 끼어듦 -->
  <line x1="660" y1="170" x2="700" y2="170" stroke="#8a857f" stroke-width="1.8" stroke-dasharray="4 3"/>
  <polygon points="706,170 696,165 696,175" fill="#8a857f"/>
  <rect x="712" y="146" width="160" height="98" rx="7" fill="#c0504d"/>
  <text x="792" y="172" text-anchor="middle" font-size="12.5" fill="#0d0d0d">사용 스레드가 이 틈에</text>
  <text x="792" y="190" text-anchor="middle" font-size="12.5" fill="#0d0d0d">깃발 true 를 봄</text>
  <text x="792" y="214" text-anchor="middle" font-size="13" font-weight="700" fill="#0d0d0d">config 는 아직 0</text>
  <text x="792" y="232" text-anchor="middle" font-size="12.5" fill="#0d0d0d">→ 빈 값 사용 (버그)</text>

  <text x="44" y="276" font-size="12.5" fill="#8a857f">깃발이 데이터보다 먼저 올라가, 깃발만 믿은 소비자가 준비 안 된 상자를 연다.</text>

  <!-- ============ 아래: volatile 있음 (펜스) ============ -->
  <rect x="24" y="308" width="852" height="226" rx="12" fill="#0d0d0d" stroke="#66bb6a" stroke-width="2"/>
  <text x="44" y="336" font-size="16" font-weight="700" fill="#66bb6a">volatile 있음 — StoreStore 펜스가 재정렬을 막음</text>

  <!-- 코드 순서 -->
  <rect x="60" y="358" width="200" height="40" rx="7" fill="#dceaf7"/>
  <text x="160" y="383" text-anchor="middle" font-size="13" fill="#10243a">(1) config = 42</text>

  <!-- 펜스 -->
  <line x1="60" y1="412" x2="260" y2="412" stroke="#d4a853" stroke-width="4" stroke-dasharray="2 0"/>
  <text x="160" y="430" text-anchor="middle" font-size="12.5" font-weight="700" fill="#d4a853">▲ StoreStore 펜스 — 위 쓰기를 아래로 못 넘김</text>

  <rect x="60" y="442" width="200" height="40" rx="7" fill="#e6f7e7"/>
  <text x="160" y="467" text-anchor="middle" font-size="13" fill="#14521d">(2) initialized = true</text>

  <!-- 화살표 -->
  <line x1="290" y1="420" x2="392" y2="420" stroke="#66bb6a" stroke-width="2.5"/>
  <polygon points="398,420 388,415 388,425" fill="#66bb6a"/>
  <text x="344" y="410" text-anchor="middle" font-size="12.5" fill="#66bb6a">순서 보존</text>

  <!-- 메모리 도달 순서 (보장) -->
  <rect x="450" y="358" width="200" height="40" rx="7" fill="#dceaf7"/>
  <text x="550" y="383" text-anchor="middle" font-size="13" fill="#10243a">config = 42 먼저</text>
  <rect x="450" y="442" width="200" height="40" rx="7" fill="#cdeccf"/>
  <text x="550" y="467" text-anchor="middle" font-size="13" font-weight="700" fill="#14521d">initialized = true 나중</text>

  <!-- 사용 스레드 정상 -->
  <line x1="670" y1="462" x2="706" y2="462" stroke="#8a857f" stroke-width="1.8" stroke-dasharray="4 3"/>
  <polygon points="712,462 702,457 702,467" fill="#8a857f"/>
  <rect x="718" y="416" width="154" height="92" rx="7" fill="#66bb6a"/>
  <text x="795" y="442" text-anchor="middle" font-size="12.5" fill="#0d0d0d">깃발 true 를 보면</text>
  <text x="795" y="462" text-anchor="middle" font-size="13" font-weight="700" fill="#0d0d0d">config 는 반드시 42</text>
  <text x="795" y="484" text-anchor="middle" font-size="12.5" fill="#0d0d0d">→ 안전</text>

  <text x="44" y="520" font-size="12.5" fill="#8a857f">펜스가 깃발을 데이터 뒤에 묶어 둔다: "깃발이 보이면 데이터는 이미 완성" 이 보장된다.</text>
</svg>
