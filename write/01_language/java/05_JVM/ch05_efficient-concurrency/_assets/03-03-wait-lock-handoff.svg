<svg viewBox="0 0 900 470" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>wait()는 잠들면서 락을 반납한다 — 안 그러면 데드락</title>
  <desc>생산자가 synchronized 안에서 버퍼가 가득 찬 것을 보고 wait()를 호출하면, 들고 있던 모니터 락을 반납하면서 WAITING 상태로 대기 집합에 들어간다. 그 덕분에 소비자가 같은 락을 잡고 버퍼를 비운 뒤 notify()로 생산자를 깨운다. 만약 wait()가 락을 반납하지 않으면 소비자가 락을 못 잡아 버퍼를 못 비우고, 생산자는 영원히 못 깨어나 데드락이 된다. 시간축 위에서 락의 주인이 생산자→소비자→생산자로 넘어가는 것을 보여준다.</desc>
  <rect x="0" y="0" width="900" height="470" fill="#0d0d0d"/>

  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e4df">wait()는 잠들면서 락을 내려놓는다</text>
  <text x="450" y="54" text-anchor="middle" font-size="12.5" fill="#c9c4be">시간 →   생산자·소비자는 같은 객체의 같은 모니터 락을 두고 경쟁한다</text>

  <!-- 시간 축 -->
  <line x1="150" y1="300" x2="850" y2="300" stroke="#8a857f" stroke-width="1.5"/>
  <polygon points="856,300 846,295 846,305" fill="#8a857f"/>

  <!-- 4개 모먼트 세로 점선 -->
  <line x1="250" y1="80" x2="250" y2="308" stroke="#8a857f" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="420" y1="80" x2="420" y2="308" stroke="#d4a853" stroke-width="2" stroke-dasharray="5 4"/>
  <line x1="600" y1="80" x2="600" y2="308" stroke="#8a857f" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="730" y1="80" x2="730" y2="308" stroke="#66bb6a" stroke-width="2" stroke-dasharray="5 4"/>

  <text x="250" y="326" text-anchor="middle" font-size="11" fill="#c9c4be">① put 진입</text>
  <text x="420" y="326" text-anchor="middle" font-size="11" font-weight="700" fill="#d4a853">② wait() — 락 반납</text>
  <text x="600" y="326" text-anchor="middle" font-size="11" fill="#c9c4be">③ take()+notify()</text>
  <text x="730" y="326" text-anchor="middle" font-size="11" font-weight="700" fill="#66bb6a">④ 깨어나 락 재획득</text>

  <!-- ===== 생산자 레인 ===== -->
  <text x="140" y="118" text-anchor="end" font-size="12.5" font-weight="700" fill="#dceaf7">생산자</text>
  <!-- 락 보유 구간 1: 진입~wait -->
  <rect x="250" y="100" width="170" height="34" rx="7" fill="#dceaf7"/>
  <text x="335" y="122" text-anchor="middle" font-size="11.5" font-weight="700" fill="#10243a">락 보유 · "가득 찼네"</text>
  <!-- WAITING 구간 (락 없음) -->
  <rect x="420" y="100" width="310" height="34" rx="7" fill="#0d0d0d" stroke="#d4a853" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="575" y="122" text-anchor="middle" font-size="11.5" font-weight="700" fill="#d4a853">WAITING (락 없이 대기 집합에서 잠)</text>
  <!-- 락 재획득 후 진행 -->
  <rect x="730" y="100" width="115" height="34" rx="7" fill="#cdeccf"/>
  <text x="787" y="122" text-anchor="middle" font-size="11" font-weight="700" fill="#14521d">락 재획득·진행</text>

  <!-- ===== 소비자 레인 ===== -->
  <text x="140" y="186" text-anchor="end" font-size="12.5" font-weight="700" fill="#f5edda">소비자</text>
  <!-- 진입 못 함 (락 대기) — wait 전까지 -->
  <rect x="250" y="168" width="170" height="34" rx="7" fill="#0d0d0d" stroke="#8a857f" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="335" y="190" text-anchor="middle" font-size="11" fill="#c9c4be">락 못 잡음 (생산자가 쥠)</text>
  <!-- 생산자가 wait로 락 놓자 진입 -->
  <rect x="420" y="168" width="310" height="34" rx="7" fill="#f5edda"/>
  <text x="575" y="190" text-anchor="middle" font-size="11.5" font-weight="700" fill="#5a3d0a">락 잡음 → take()로 버퍼 비움 → notify()</text>

  <!-- 락 반납 화살표 (생산자 wait → 소비자) -->
  <line x1="420" y1="138" x2="420" y2="164" stroke="#d4a853" stroke-width="2"/>
  <polygon points="420,166 415,156 425,156" fill="#d4a853"/>
  <text x="432" y="156" font-size="10.5" fill="#d4a853">락 넘어감</text>

  <!-- notify 화살표 (소비자 → 생산자 깨움) -->
  <line x1="660" y1="168" x2="730" y2="136" stroke="#66bb6a" stroke-width="2"/>
  <polygon points="734,134 723,134 729,143" fill="#66bb6a"/>
  <text x="668" y="158" font-size="10.5" fill="#66bb6a">notify로 깨움</text>

  <!-- 하단 대비: 락 반납 O vs X -->
  <rect x="40" y="356" width="400" height="92" rx="10" fill="#0d0d0d" stroke="#66bb6a" stroke-width="1.6"/>
  <text x="58" y="382" font-size="12.5" font-weight="700" fill="#66bb6a">락을 반납하니까 — 협력이 된다</text>
  <text x="58" y="404" font-size="11.5" fill="#c9c4be">생산자가 비켜준 락을 소비자가 잡아</text>
  <text x="58" y="423" font-size="11.5" fill="#c9c4be">버퍼를 비우고 notify로 깨운다.</text>
  <text x="58" y="442" font-size="11.5" fill="#c9c4be">wait() 한 줄 = [반납→대기→깨움→재획득].</text>

  <rect x="460" y="356" width="400" height="92" rx="10" fill="#0d0d0d" stroke="#c0504d" stroke-width="1.6"/>
  <text x="478" y="382" font-size="12.5" font-weight="700" fill="#e08a87">반납 안 하면 — 데드락</text>
  <text x="478" y="404" font-size="11.5" fill="#c9c4be">소비자는 락을 못 잡아 버퍼를 못 비우고,</text>
  <text x="478" y="423" font-size="11.5" fill="#c9c4be">생산자는 비울 사람이 없어 못 깨어난다.</text>
  <text x="478" y="442" font-size="11.5" fill="#c9c4be">→ 둘 다 영원히 멈춤.</text>
</svg>
