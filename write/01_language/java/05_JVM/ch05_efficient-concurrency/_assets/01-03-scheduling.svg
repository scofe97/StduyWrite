<svg viewBox="0 0 900 480" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>협력적 vs 선점적 스케줄링 — 누가 CPU를 내려놓는가</title>
  <desc>스케줄링을 가르는 축은 우선순위가 아니라 "누가 CPU를 내려놓는가"이다. 협력적 스케줄링은 스레드가 스스로 양보하므로 양보하지 않으면(무한 루프) 시스템 전체가 멈춘다. 선점적 스케줄링은 OS가 시간이 다 되면 강제로 CPU를 빼앗으므로 한 스레드가 폭주해도 전체가 멈추지 않는다. 자바는 선점적을 쓴다.</desc>
  <rect x="0" y="0" width="900" height="480" fill="#0d0d0d"/>

  <text x="450" y="36" text-anchor="middle" font-size="21" font-weight="700" fill="#e8e4df">협력적 vs 선점적 — 가르는 축은 "누가 CPU를 내려놓는가"</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#8a857f">우선순위가 아니다. 스레드가 스스로 양보 vs OS가 강제로 빼앗음</text>

  <!-- ===== 협력적 (왼쪽) ===== -->
  <rect x="30" y="84" width="400" height="360" rx="12" fill="#0d0d0d" stroke="#c0504d" stroke-width="2"/>
  <text x="230" y="114" text-anchor="middle" font-size="17" font-weight="700" fill="#e08a87">협력적 (Cooperative)</text>
  <text x="230" y="136" text-anchor="middle" font-size="12.5" fill="#8a857f">스레드가 스스로 CPU를 넘긴다</text>

  <!-- 정상 흐름 -->
  <rect x="58" y="156" width="160" height="40" rx="7" fill="#dceaf7"/>
  <text x="138" y="181" text-anchor="middle" font-size="12.5" fill="#10243a">스레드 A 일 마침</text>
  <line x1="218" y1="176" x2="252" y2="176" stroke="#66bb6a" stroke-width="2.5"/>
  <polygon points="258,176 248,171 248,181" fill="#66bb6a"/>
  <rect x="260" y="156" width="150" height="40" rx="7" fill="#e6f7e7"/>
  <text x="335" y="181" text-anchor="middle" font-size="12.5" fill="#14521d">스스로 B에게 양보</text>

  <text x="58" y="226" font-size="12.5" font-weight="700" fill="#66bb6a">장점</text>
  <text x="74" y="246" font-size="12" fill="#c9c4be">구현 간단 · 전환 시점 예측 가능</text>

  <!-- 치명적 약점 -->
  <text x="58" y="280" font-size="12.5" font-weight="700" fill="#e08a87">치명적 약점</text>
  <rect x="58" y="294" width="160" height="40" rx="7" fill="#f2d4d4"/>
  <text x="138" y="319" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7a1f1f">A가 무한 루프</text>
  <line x1="218" y1="314" x2="252" y2="314" stroke="#c0504d" stroke-width="2.5"/>
  <polygon points="258,314 248,309 248,319" fill="#c0504d"/>
  <rect x="260" y="294" width="150" height="40" rx="7" fill="#c0504d"/>
  <text x="335" y="313" text-anchor="middle" font-size="12" fill="#0d0d0d">양보 안 함 →</text>
  <text x="335" y="328" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0d0d0d">전체 멈춤</text>

  <text x="230" y="388" text-anchor="middle" font-size="12.5" fill="#8a857f">한 스레드가 협조 안 하면 시스템이 통째로 정지</text>
  <rect x="58" y="404" width="352" height="26" rx="6" fill="#0d0d0d" stroke="#8a857f" stroke-width="1"/>
  <text x="230" y="422" text-anchor="middle" font-size="11.5" fill="#c9c4be">예: 옛 협력적 멀티태스킹 OS</text>

  <!-- ===== 선점적 (오른쪽) ===== -->
  <rect x="470" y="84" width="400" height="360" rx="12" fill="#0d0d0d" stroke="#66bb6a" stroke-width="2"/>
  <text x="670" y="114" text-anchor="middle" font-size="17" font-weight="700" fill="#66bb6a">선점적 (Preemptive)</text>
  <text x="670" y="136" text-anchor="middle" font-size="12.5" fill="#8a857f">OS가 강제로 CPU를 빼앗는다</text>

  <!-- 정상 흐름 -->
  <rect x="498" y="156" width="150" height="40" rx="7" fill="#dceaf7"/>
  <text x="573" y="181" text-anchor="middle" font-size="12.5" fill="#10243a">A에 시간 배정</text>
  <line x1="648" y1="176" x2="682" y2="176" stroke="#66bb6a" stroke-width="2.5"/>
  <polygon points="688,176 678,171 678,181" fill="#66bb6a"/>
  <rect x="690" y="156" width="160" height="40" rx="7" fill="#e6f7e7"/>
  <text x="770" y="176" text-anchor="middle" font-size="12" fill="#14521d">시간 만료 → OS가</text>
  <text x="770" y="190" text-anchor="middle" font-size="12" fill="#14521d">빼앗아 B에 줌</text>

  <text x="498" y="226" font-size="12.5" font-weight="700" fill="#66bb6a">장점</text>
  <text x="514" y="246" font-size="12" fill="#c9c4be">한 스레드 폭주해도 전체는 안 멈춤</text>

  <!-- 폭주해도 안전 -->
  <text x="498" y="280" font-size="12.5" font-weight="700" fill="#66bb6a">A가 무한 루프여도</text>
  <rect x="498" y="294" width="150" height="40" rx="7" fill="#f2d4d4"/>
  <text x="573" y="319" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7a1f1f">A가 폭주</text>
  <line x1="648" y1="314" x2="682" y2="314" stroke="#66bb6a" stroke-width="2.5"/>
  <polygon points="688,314 678,309 678,319" fill="#66bb6a"/>
  <rect x="690" y="294" width="160" height="40" rx="7" fill="#66bb6a"/>
  <text x="770" y="313" text-anchor="middle" font-size="12" fill="#0d0d0d">OS가 강제 회수 →</text>
  <text x="770" y="328" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0d0d0d">B는 계속 돈다</text>

  <text x="670" y="388" text-anchor="middle" font-size="12.5" fill="#8a857f">자바가 쓰는 방식 — 전환 시점은 프로그램이 통제 못 함</text>
  <rect x="498" y="404" width="352" height="26" rx="6" fill="#0d0d0d" stroke="#66bb6a" stroke-width="1"/>
  <text x="670" y="422" text-anchor="middle" font-size="11.5" fill="#c9c4be">우선순위는 이 안에서의 "힌트"일 뿐 — 결정은 OS</text>
</svg>
