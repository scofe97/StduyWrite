<svg viewBox="0 0 900 440" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>스레드 안전성 다섯 등급 — 책임이 객체에서 호출자로</title>
  <desc>스레드 안전성은 다섯 등급으로 나뉜다. 위로 갈수록 객체가 안전을 책임지고, 아래로 갈수록 호출자가 책임진다. 불변과 절대적 안전은 객체가 책임지고, 상대적 안전은 단건은 객체 복합은 호출자, 스레드 호환은 호출자가 모두, 스레드 대립은 누가 해도 불가능하다.</desc>
  <rect x="0" y="0" width="900" height="440" fill="#0d0d0d"/>

  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e4df">스레드 안전성 다섯 등급 — 책임이 객체 → 호출자로</text>
  <text x="450" y="56" text-anchor="middle" font-size="13" fill="#8a857f">위로 갈수록 객체가 안전, 아래로 갈수록 호출자 몫, 맨 아래는 불가능</text>

  <!-- 왼쪽 책임 축 라벨 -->
  <text x="36" y="100" font-size="11.5" fill="#66bb6a">객체가</text>
  <text x="36" y="116" font-size="11.5" fill="#66bb6a">책임</text>
  <text x="36" y="372" font-size="11.5" fill="#e08a87">불가능</text>

  <!-- 1 불변 -->
  <rect x="120" y="80" width="700" height="56" rx="9" fill="#66bb6a"/>
  <text x="140" y="104" font-size="14" font-weight="700" fill="#0d0d0d">1. 불변 (Immutable)</text>
  <text x="140" y="124" font-size="12" fill="#0d0d0d">상태가 안 바뀜 → 책임 자체가 없음.  예: String, Integer, BigDecimal</text>

  <!-- 2 절대적 -->
  <rect x="120" y="144" width="700" height="56" rx="9" fill="#a5d6a7"/>
  <text x="140" y="168" font-size="14" font-weight="700" fill="#14521d">2. 절대적 안전 (Absolute)</text>
  <text x="140" y="188" font-size="12" fill="#14521d">객체가 복합 연산까지 전부 보장 (이상적, 자바엔 거의 없음)</text>

  <!-- 3 상대적 -->
  <rect x="120" y="208" width="700" height="56" rx="9" fill="#fdf3df"/>
  <text x="140" y="232" font-size="14" font-weight="700" fill="#5a3d0a">3. 상대적 안전 (Relative)</text>
  <text x="140" y="252" font-size="12" fill="#5a3d0a">단건은 객체가 · 복합은 호출자가.  예: Vector, Hashtable</text>

  <!-- 4 호환 -->
  <rect x="120" y="272" width="700" height="56" rx="9" fill="#f2d4d4"/>
  <text x="140" y="296" font-size="14" font-weight="700" fill="#7a1f1f">4. 스레드 호환 (Compatible)</text>
  <text x="140" y="316" font-size="12" fill="#7a1f1f">단건조차 호출자가 (모든 접근을 락으로).  예: ArrayList, HashMap</text>

  <!-- 5 대립 -->
  <rect x="120" y="336" width="700" height="56" rx="9" fill="#c0504d"/>
  <text x="140" y="360" font-size="14" font-weight="700" fill="#0d0d0d">5. 스레드 대립 (Opposing)</text>
  <text x="140" y="380" font-size="12" fill="#0d0d0d">호출자가 동기화해도 불가능.  예: Thread.suspend() / resume() (폐기됨)</text>

  <!-- 오른쪽 화살표 축 -->
  <line x1="858" y1="92" x2="858" y2="380" stroke="#8a857f" stroke-width="2"/>
  <polygon points="858,386 853,376 863,376" fill="#8a857f"/>
  <text x="876" y="240" font-size="11.5" fill="#8a857f" transform="rotate(90 876 240)">호출자 책임 증가</text>
</svg>
