<svg viewBox="0 0 900 400" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>ABA 문제 — A에서 B로 갔다 A로 돌아오면 CAS가 변화를 못 본다</title>
  <desc>스레드1이 값 A를 읽고 CAS 하려는 사이, 스레드2가 A를 B로 바꿨다가 다시 A로 되돌린다. 스레드1의 CAS 는 여전히 A라서 성공하지만 그 사이 변화를 놓친다. 값에 버전을 붙이면 값이 같아도 버전이 달라 감지할 수 있다.</desc>
  <rect x="0" y="0" width="900" height="400" fill="#0d0d0d"/>

  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e4df">ABA 문제 — 값만 보면 "그대로 A", 사실은 바뀌었다</text>

  <!-- 시간축 -->
  <line x1="60" y1="120" x2="840" y2="120" stroke="#8a857f" stroke-width="1.5"/>
  <text x="850" y="124" font-size="11" fill="#8a857f">시간</text>

  <!-- 값 상태 노드 -->
  <circle cx="140" cy="120" r="26" fill="#dceaf7"/><text x="140" y="126" text-anchor="middle" font-size="15" font-weight="700" fill="#10243a">A</text>
  <circle cx="400" cy="120" r="26" fill="#fdf3df"/><text x="400" y="126" text-anchor="middle" font-size="15" font-weight="700" fill="#5a3d0a">B</text>
  <circle cx="660" cy="120" r="26" fill="#dceaf7"/><text x="660" y="126" text-anchor="middle" font-size="15" font-weight="700" fill="#10243a">A</text>
  <line x1="166" y1="120" x2="374" y2="120" stroke="#d4a853" stroke-width="2"/>
  <line x1="426" y1="120" x2="634" y2="120" stroke="#d4a853" stroke-width="2"/>

  <!-- 스레드2 동작 (위) -->
  <text x="270" y="70" text-anchor="middle" font-size="11.5" fill="#e08a87">스레드2: A→B</text>
  <text x="530" y="70" text-anchor="middle" font-size="11.5" fill="#e08a87">스레드2: B→A (되돌림)</text>

  <!-- 스레드1 동작 (아래) -->
  <rect x="80" y="170" width="160" height="48" rx="8" fill="#dceaf7"/>
  <text x="160" y="190" text-anchor="middle" font-size="11.5" fill="#10243a">스레드1: A 읽음</text>
  <text x="160" y="207" text-anchor="middle" font-size="11" fill="#10243a">"CAS로 바꿔야지" → 멈춤</text>
  <line x1="160" y1="168" x2="150" y2="148" stroke="#8a857f" stroke-width="1.5" stroke-dasharray="3 2"/>

  <rect x="580" y="170" width="200" height="48" rx="8" fill="#f2d4d4"/>
  <text x="680" y="190" text-anchor="middle" font-size="11.5" font-weight="700" fill="#7a1f1f">스레드1 재개: "여전히 A네?"</text>
  <text x="680" y="207" text-anchor="middle" font-size="11" fill="#7a1f1f">CAS 성공 — 변화를 못 봄!</text>
  <line x1="680" y1="168" x2="670" y2="148" stroke="#8a857f" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- 문제 박스 -->
  <rect x="60" y="244" width="780" height="48" rx="9" fill="#0d0d0d" stroke="#c0504d" stroke-width="1.5"/>
  <text x="450" y="266" text-anchor="middle" font-size="12.5" fill="#e8e4df">단순 값(카운터)이면 무해. 하지만 락프리 스택의 노드처럼 "그 사이 무슨 일이 있었나"가 중요하면 → 실제 버그</text>
  <text x="450" y="284" text-anchor="middle" font-size="11.5" fill="#8a857f">(되돌아온 A 노드의 내부 구조는 이미 바뀌어, top 이 사라진 노드를 가리킬 수 있음)</text>

  <!-- 해결 박스 -->
  <rect x="60" y="306" width="780" height="74" rx="12" fill="#e6f7e7"/>
  <text x="80" y="332" font-size="13.5" font-weight="700" fill="#14521d">해결 — 값에 버전(스탬프)을 붙인다: AtomicStampedReference</text>
  <text x="80" y="354" font-size="12" fill="#14521d">값이 A로 같아도 버전이 0→2 로 달라졌으면 CAS 실패 → 변화를 감지. "몇 번째 A인가"까지 본다.</text>
  <text x="80" y="372" font-size="12" fill="#14521d">(A,v0) → (B,v1) → (A,v2):  값은 A로 같지만 v0 ≠ v2 라 스레드1의 CAS 가 실패한다.</text>
</svg>
