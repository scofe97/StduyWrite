<svg viewBox="0 0 900 470" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>객체의 메모리 레이아웃 — 헤더·인스턴스 데이터·패딩</title>
  <desc>자바 힙 위의 객체 하나는 헤더(Mark Word + 클래스 포인터, 배열이면 길이 필드), 인스턴스 데이터(너비순 재배치된 필드), 패딩(8바이트 정렬용)의 세 구획으로 놓인다. 헤더 크기는 32비트·64비트·압축 OOP에 따라 8/16/12바이트로 달라지며, 압축 OOP가 기본 켜짐인 이유는 클래스 포인터를 4바이트로 줄여 모든 객체에서 4바이트씩 아끼기 때문이다.</desc>
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11.5px; fill: rgb(138,133,128); }
      .nm    { font-size: 13px; font-weight: 800; fill: #e8e4df; }
      .mt    { font-size: 10.5px; fill: rgb(138,133,128); }
      .tick  { font-size: 10px; fill: rgb(212,168,83); font-weight: 700; }
      .mono  { font-family: 'JetBrains Mono', monospace; }
      .th    { font-size: 11px; font-weight: 800; fill: #e8e4df; }
      .td    { font-size: 11px; fill: #e8e4df; }
      .tdm   { font-size: 11px; fill: #e8e4df; font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <rect x="0" y="0" width="900" height="470" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">객체의 메모리 레이아웃 — 한 객체는 어떤 모양인가</text>
  <text x="28" y="58" class="sub">자바 힙 위에 헤더 → 인스턴스 데이터 → 패딩 순서로 놓인다 · 끝은 8바이트 배수로 맞춘다</text>

  <!-- ===== 왼쪽: 세 구획 세로 스택 ===== -->
  <rect x="28" y="80" width="430" height="358" rx="10" fill="rgba(96,165,224,0.07)" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="48" y="106" class="nm">객체 (자바 힙)</text>
  <text x="48" y="124" class="mt">위에서 아래로 — 낮은 주소부터 높은 주소까지</text>

  <!-- 헤더 -->
  <rect x="48" y="138" width="390" height="118" rx="8" fill="rgba(255,182,193,0.14)" stroke="#FFB6C1" stroke-width="1.5"/>
  <text x="64" y="160" class="nm" fill="#FFB6C1">① 헤더 (Object Header)</text>
  <rect x="64" y="172" width="358" height="26" rx="5" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="76" y="190" class="td">Mark Word — 해시 · GC 나이 · 락 플래그</text>
  <rect x="64" y="202" width="358" height="22" rx="5" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="76" y="218" class="td">클래스 포인터 — 어느 클래스의 인스턴스인가</text>
  <rect x="64" y="228" width="358" height="22" rx="5" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" stroke-dasharray="4 3"/>
  <text x="76" y="244" class="mt">(배열이면) 길이 필드 — 원소 수가 객체마다 다르므로</text>

  <!-- 인스턴스 데이터 -->
  <rect x="48" y="264" width="390" height="86" rx="8" fill="rgba(96,165,224,0.18)" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="64" y="286" class="nm">② 인스턴스 데이터</text>
  <text x="64" y="307" class="mt">실제 필드들 · 너비순 재배치 (long/double → int →</text>
  <text x="64" y="323" class="mt">short → byte → reference) · 부모 필드가 먼저</text>
  <text x="64" y="342" class="tick">캐시 라인 친화성 + 공간 효율을 동시에 노린 배치</text>

  <!-- 패딩 -->
  <rect x="48" y="358" width="390" height="64" rx="8" fill="rgba(224,224,224,0.10)" stroke="#E0E0E0" stroke-width="1.5"/>
  <text x="64" y="380" class="nm">③ 패딩 (Padding)</text>
  <text x="64" y="401" class="mt">전체 크기를 8바이트 배수로 맞추는 0 바이트.</text>
  <text x="64" y="416" class="mt">헤더+데이터가 이미 8의 배수면 패딩은 0이다.</text>

  <!-- ===== 오른쪽: 헤더 크기 표 ===== -->
  <rect x="474" y="80" width="398" height="358" rx="10" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" stroke-width="1.5"/>
  <text x="494" y="106" class="nm">헤더 크기는 모드에 따라 달라진다 (p.73)</text>

  <!-- 표 헤더 행 -->
  <line x1="494" y1="120" x2="852" y2="120" stroke="rgb(42,37,32)"/>
  <text x="494" y="142" class="th">구성</text>
  <text x="612" y="142" class="th">32비트</text>
  <text x="690" y="142" class="th">64비트</text>
  <text x="772" y="142" class="th">+압축OOP</text>
  <line x1="494" y1="152" x2="852" y2="152" stroke="rgb(212,168,83)" stroke-width="1.2"/>

  <!-- Mark Word -->
  <text x="494" y="178" class="td">Mark Word</text>
  <text x="612" y="178" class="tdm">4B</text>
  <text x="690" y="178" class="tdm">8B</text>
  <text x="772" y="178" class="tdm">8B</text>
  <line x1="494" y1="190" x2="852" y2="190" stroke="rgb(42,37,32)"/>

  <!-- 클래스 포인터 -->
  <text x="494" y="216" class="td">클래스 포인터</text>
  <text x="612" y="216" class="tdm">4B</text>
  <text x="690" y="216" class="tdm">8B</text>
  <text x="772" y="216" class="tdm" fill="#66bb6a">4B</text>
  <line x1="494" y1="228" x2="852" y2="228" stroke="rgb(42,37,32)"/>

  <!-- 헤더 합계 -->
  <rect x="486" y="238" width="374" height="30" rx="5" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)"/>
  <text x="494" y="258" class="th">헤더 합계</text>
  <text x="612" y="258" class="tdm">8B</text>
  <text x="690" y="258" class="tdm">16B</text>
  <text x="772" y="258" class="tdm" fill="#66bb6a">12B</text>

  <!-- 배열 길이 -->
  <text x="494" y="292" class="td">배열 길이 (배열만)</text>
  <text x="612" y="292" class="tdm">+4B</text>
  <text x="690" y="292" class="tdm">+4B</text>
  <text x="772" y="292" class="tdm">+4B</text>
  <line x1="494" y1="304" x2="852" y2="304" stroke="rgb(42,37,32)"/>

  <!-- 압축 OOP 설명 박스 -->
  <rect x="486" y="316" width="374" height="106" rx="8" fill="rgba(102,187,106,0.10)" stroke="#66bb6a"/>
  <text x="502" y="338" class="nm" fill="#66bb6a">압축 OOP가 기본 켜짐인 이유</text>
  <text x="502" y="360" class="mt">클래스 포인터를 8B → 4B로 줄여 모든 객체에서</text>
  <text x="502" y="376" class="mt">4바이트씩 아낀다. 100만 개면 4MB.</text>
  <text x="502" y="396" class="mt">GC가 살아남은 객체를 옮기는 비용까지 줄어든다.</text>
  <text x="502" y="414" class="tick mono">-XX:+UseCompressedOops (기본 on)</text>
</svg>
