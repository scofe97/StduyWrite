<svg viewBox="0 0 900 560" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <title>동시 할당 — TLAB 빠른 길과 CAS 느린 길</title>
  <desc>스레드마다 자바 힙 조각(TLAB)을 미리 받아 그 안에서 동기화 없이 할당하는 게 빠른 길이다. TLAB을 다 썼거나 객체가 너무 크면 공유 영역에서 CAS+재시도로 처리하는 느린 길로 내려간다. TLAB과 CAS는 경쟁 관계가 아니라 빠른 길/느린 길의 2단 계층이다.</desc>
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 800; fill: #e8e4df; }
      .sub   { font-size: 11.5px; fill: rgb(138,133,128); }
      .zlabel{ font-size: 13px; font-weight: 800; fill: #e8e4df; }
      .nm    { font-size: 12px; font-weight: 700; fill: #e8e4df; }
      .mt    { font-size: 10.5px; fill: rgb(138,133,128); }
      .tick  { font-size: 10px; fill: rgb(212,168,83); font-weight: 700; }
      .ok    { font-size: 11px; font-weight: 800; fill: #66bb6a; }
      .fail  { font-size: 11px; font-weight: 800; fill: #f44336; }
      .mono  { font-family: 'JetBrains Mono', monospace; }
    </style>
    <marker id="amber2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="rgb(212,168,83)"/>
    </marker>
    <marker id="green2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#66bb6a"/>
    </marker>
    <marker id="red2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#f44336"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="560" fill="#0d0d0d"/>
  <text x="28" y="38" class="title">동시 할당 — 빠른 길(TLAB)과 느린 길(CAS)의 2단 계층</text>
  <text x="28" y="58" class="sub">대부분의 할당은 스레드 전용 TLAB에서 동기화 0으로 끝난다 · 가장자리(소진·큰 객체)만 공유 영역에서 CAS</text>

  <!-- ===== 빠른 길: TLAB ===== -->
  <rect x="28" y="80" width="844" height="214" rx="10" fill="rgba(102,187,106,0.08)" stroke="#66bb6a" stroke-width="2"/>
  <text x="48" y="106" class="zlabel">⚡ 빠른 길 — TLAB (Thread Local Allocation Buffer) · <tspan class="mono" fill="rgb(212,168,83)">-XX:+UseTLAB</tspan> 기본 켜짐</text>
  <text x="48" y="126" class="mt">스레드마다 자바 힙의 작은 조각을 미리 받아 둔다. 그 안에서의 할당은 스레드 전용이라 동기화가 필요 없다.</text>

  <!-- 자바 힙 박스 + TLAB 조각 3개 -->
  <rect x="48" y="140" width="804" height="138" rx="8" fill="rgba(96,165,224,0.07)" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="64" y="160" class="nm">자바 힙</text>

  <!-- TLAB 1 -->
  <rect x="66" y="172" width="220" height="92" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="176" y="192" class="tick" text-anchor="middle">스레드 A 전용 TLAB</text>
  <rect x="80" y="204" width="120" height="20" fill="rgba(96,165,224,0.30)" stroke="#5b9bd5" stroke-width="0.8"/>
  <rect x="200" y="204" width="72" height="20" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" stroke-width="0.8"/>
  <line x1="200" y1="230" x2="248" y2="230" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#amber2)"/>
  <text x="176" y="256" class="mt" text-anchor="middle">자기 조각 안에서 포인터만 밀기 (락 0)</text>

  <!-- TLAB 2 -->
  <rect x="300" y="172" width="220" height="92" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="410" y="192" class="tick" text-anchor="middle">스레드 B 전용 TLAB</text>
  <rect x="314" y="204" width="150" height="20" fill="rgba(96,165,224,0.30)" stroke="#5b9bd5" stroke-width="0.8"/>
  <rect x="464" y="204" width="42" height="20" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" stroke-width="0.8"/>
  <line x1="464" y1="230" x2="500" y2="230" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#amber2)"/>
  <text x="410" y="256" class="mt" text-anchor="middle">B는 A의 조각을 절대 안 건드린다</text>

  <!-- TLAB 3 -->
  <rect x="534" y="172" width="220" height="92" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="644" y="192" class="tick" text-anchor="middle">스레드 C 전용 TLAB</text>
  <rect x="548" y="204" width="90" height="20" fill="rgba(96,165,224,0.30)" stroke="#5b9bd5" stroke-width="0.8"/>
  <rect x="638" y="204" width="102" height="20" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" stroke-width="0.8"/>
  <line x1="638" y1="230" x2="686" y2="230" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#amber2)"/>
  <text x="644" y="256" class="mt" text-anchor="middle">경쟁자가 없으니 가장 빠르다 (99%)</text>

  <!-- 공유 영역 라벨 (오른쪽 끝) -->
  <text x="768" y="160" class="mt">공유 영역 ↓</text>

  <!-- 내려가는 분기 화살표 -->
  <line x1="450" y1="294" x2="450" y2="324" stroke="rgb(138,133,128)" stroke-width="2" marker-end="url(#amber2)"/>
  <text x="466" y="314" class="mt">TLAB을 다 썼거나, 객체가 조각보다 크면 ↓</text>

  <!-- ===== 느린 길: CAS ===== -->
  <rect x="28" y="332" width="844" height="174" rx="10" fill="rgba(244,67,54,0.06)" stroke="#f44336" stroke-width="2"/>
  <text x="48" y="358" class="zlabel">🐢 느린 길 — 공유 힙에서 CAS + 재시도</text>
  <text x="48" y="378" class="mt">공유 할당 포인터는 모든 스레드가 함께 본다. 두 스레드가 동시에 밀려 하면 CAS가 한쪽만 통과시킨다.</text>

  <!-- 공유 포인터 -->
  <rect x="360" y="396" width="180" height="34" rx="6" fill="rgb(26,26,26)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="450" y="418" class="tick mono" text-anchor="middle">공유 ptr = 100</text>

  <!-- 스레드 X 성공 -->
  <line x1="300" y1="430" x2="402" y2="404" stroke="#66bb6a" stroke-width="2" marker-end="url(#green2)"/>
  <rect x="120" y="436" width="190" height="56" rx="6" fill="rgba(102,187,106,0.12)" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="138" y="458" class="ok">✔ OK — 스레드 X</text>
  <text x="138" y="478" class="mt mono">CAS(100→140) 성공</text>

  <!-- 스레드 Y 재시도 -->
  <line x1="600" y1="430" x2="498" y2="404" stroke="#f44336" stroke-width="2" marker-end="url(#red2)"/>
  <rect x="590" y="436" width="220" height="56" rx="6" fill="rgba(244,67,54,0.10)" stroke="#f44336" stroke-width="1.2"/>
  <text x="608" y="458" class="fail">✘ retry — 스레드 Y</text>
  <text x="608" y="478" class="mt mono">CAS(100→160) 실패 → 다시 읽고 재시도</text>

  <!-- 두 카드 사이 중앙 여백에 두 줄로 -->
  <text x="450" y="458" class="mt" text-anchor="middle">새 TLAB 조각을 받아 가는 일도,</text>
  <text x="450" y="476" class="mt" text-anchor="middle">큰 객체를 직접 두는 일도 이 CAS로</text>

  <!-- ===== 하단: 한 문장 ===== -->
  <rect x="28" y="514" width="844" height="38" rx="10" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="450" y="538" class="nm" text-anchor="middle">🔑 TLAB과 CAS는 경쟁자가 아니라 한 팀 — 빠른 길이 99%를 처리하고, 느린 길이 가장자리만 막는다</text>
</svg>
