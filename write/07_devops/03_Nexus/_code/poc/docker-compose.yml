services:
  nexus:
    image: sonatype/nexus3:3.75.0
    container_name: nexus
    ports:
      - "8081:8081"   # UI + REST API
      - "8082:8082"   # Docker hosted registry
      - "8083:8083"   # Docker group registry
    volumes:
      - nexus-data:/nexus-data
    environment:
      INSTALL4J_ADD_VM_PARAMS: >-
        -Xms1g -Xmx2g
        -XX:MaxDirectMemorySize=2g
        -Djava.util.prefs.userRoot=/nexus-data/javaprefs
    deploy:
      resources:
        limits:
          memory: 3g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/service/rest/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: nexus-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nexus.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      nexus:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.0
    container_name: nexus-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      nexus:
        condition: service_healthy
    profiles:
      - monitoring
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.0
    container_name: nexus-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/nexus-dashboard.json:/var/lib/grafana/dashboards/nexus-dashboard.json:ro
    depends_on:
      - prometheus
    profiles:
      - monitoring
    restart: unless-stopped

volumes:
  nexus-data:
