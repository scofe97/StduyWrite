<svg viewBox="0 0 760 470" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>fork PR 자격증명 탈취와 격리</title>
  <desc>비특권 사용자가 fork에서 테스트를 수정한 PR을 올리면, Multibranch Pipeline이 그 Jenkinsfile을 빌드하면서 sh 스텝에 바인딩된 자격증명을 노출한다. 한 저장소 쓰기 권한이 그 자격증명이 닿는 모든 시스템으로 번진다. 저장소·자격증명 격리와 최소 권한 토큰이 탈취 범위를 그 저장소로 가둔다.</desc>

  <defs>
    <marker id="arF" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#f44336"/>
    </marker>
    <marker id="arN" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(138,133,128)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="470" fill="#0d0d0d"/>
  <text x="30" y="34" fill="#e8e4df" font-size="15">fork PR 한 줄 = Jenkinsfile 수정 = 자격증명 접근</text>

  <!-- 공격 경로 (상단) -->
  <rect x="30" y="56" width="180" height="62" rx="6" fill="rgba(244,67,54,0.10)" stroke="#f44336"/>
  <text x="120" y="80" fill="#f44336" font-size="12.5" text-anchor="middle">① 비특권 사용자</text>
  <text x="120" y="100" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">fork 저장소에서 PR 작성</text>

  <line x1="210" y1="87" x2="290" y2="87" stroke="#f44336" stroke-width="1.5" marker-end="url(#arF)"/>

  <rect x="290" y="56" width="200" height="62" rx="6" fill="rgba(244,67,54,0.10)" stroke="#f44336"/>
  <text x="390" y="80" fill="#f44336" font-size="12.5" text-anchor="middle">② 테스트 코드 수정</text>
  <text x="390" y="100" fill="rgb(138,133,128)" font-size="11" text-anchor="middle"><tspan font-family="'JetBrains Mono',monospace">echo $TOKEN</tspan> 류로 변경</text>

  <line x1="490" y1="87" x2="570" y2="87" stroke="#f44336" stroke-width="1.5" marker-end="url(#arF)"/>

  <rect x="570" y="56" width="160" height="62" rx="6" fill="rgba(244,67,54,0.10)" stroke="#f44336"/>
  <text x="650" y="80" fill="#f44336" font-size="12.5" text-anchor="middle">③ 자격증명 노출</text>
  <text x="650" y="100" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">빌드 로그로 유출</text>

  <!-- 중간 빌드 단계 -->
  <line x1="390" y1="118" x2="390" y2="146" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#arN)"/>
  <rect x="240" y="148" width="300" height="48" rx="6" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="390" y="170" fill="#e8e4df" font-size="12" text-anchor="middle">Multibranch Pipeline 이 PR 빌드</text>
  <text x="390" y="188" fill="rgb(138,133,128)" font-size="11" text-anchor="middle"><tspan font-family="'JetBrains Mono',monospace">sh</tspan> 스텝에 자격증명 바인딩 → 스텝 안에서 읽힘</text>

  <!-- 피해 확산 -->
  <line x1="650" y1="118" x2="650" y2="214" stroke="#f44336" stroke-width="1.5" marker-end="url(#arF)"/>
  <rect x="470" y="216" width="260" height="56" rx="6" fill="rgba(244,67,54,0.10)" stroke="#f44336"/>
  <text x="600" y="240" fill="#f44336" font-size="12" text-anchor="middle">한 저장소 쓰기 권한</text>
  <text x="600" y="259" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">→ 자격증명이 닿는 모든 시스템으로 번짐</text>

  <!-- 격리 (하단) -->
  <line x1="60" y1="300" x2="700" y2="300" stroke="rgb(42,37,32)" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="30" y="324" fill="#66bb6a" font-size="13">격리 — 탈취돼도 범위를 그 저장소로 가둔다</text>

  <rect x="30" y="338" width="220" height="86" rx="6" fill="rgba(102,187,106,0.06)" stroke="#66bb6a"/>
  <text x="46" y="362" fill="#66bb6a" font-size="12">저장소·자격증명 격리</text>
  <text x="46" y="382" fill="rgb(138,133,128)" font-size="11">Org Folder·Multibranch 를</text>
  <text x="46" y="399" fill="rgb(138,133,128)" font-size="11">저장소별로 분리, 자격증명도</text>
  <text x="46" y="416" fill="rgb(138,133,128)" font-size="11">저장소별 독립</text>

  <rect x="270" y="338" width="220" height="86" rx="6" fill="rgba(102,187,106,0.06)" stroke="#66bb6a"/>
  <text x="286" y="362" fill="#66bb6a" font-size="12">최소 권한 토큰</text>
  <text x="286" y="382" fill="rgb(138,133,128)" font-size="11">fine-grained PAT —</text>
  <text x="286" y="399" fill="rgb(138,133,128)" font-size="11">권한 범위가 좁아</text>
  <text x="286" y="416" fill="rgb(138,133,128)" font-size="11">탈취돼도 피해 국한</text>

  <rect x="510" y="338" width="220" height="86" rx="6" fill="rgba(102,187,106,0.06)" stroke="#66bb6a"/>
  <text x="526" y="362" fill="#66bb6a" font-size="12">GitHub App Credentials</text>
  <text x="526" y="382" fill="rgb(138,133,128)" font-size="11">repository access·default</text>
  <text x="526" y="399" fill="rgb(138,133,128)" font-size="11">permissions strategy 로</text>
  <text x="526" y="416" fill="rgb(138,133,128)" font-size="11">세밀한 접근 제어</text>

  <!-- 범례 -->
  <rect x="30" y="442" width="13" height="13" rx="2" fill="rgba(244,67,54,0.10)" stroke="#f44336"/>
  <text x="50" y="453" fill="rgb(138,133,128)" font-size="11">공격 경로</text>
  <rect x="160" y="442" width="13" height="13" rx="2" fill="rgba(102,187,106,0.06)" stroke="#66bb6a"/>
  <text x="180" y="453" fill="rgb(138,133,128)" font-size="11">격리 방어</text>
</svg>
