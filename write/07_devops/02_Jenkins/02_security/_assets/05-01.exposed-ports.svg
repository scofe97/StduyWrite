<svg viewBox="0 0 760 400" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Jenkins 노출 포트·서비스 맵</title>
  <desc>Jenkins 컨트롤러가 여는 포트들. 웹 UI 8080은 기본 활성으로 리버스 프록시로 보호한다. TCP agent 50000은 대부분 패키지에서 비활성이지만 Docker는 노출한다. SSH CLI는 기본 비활성이다. UDP/mDNS는 2.220에서 제거됐다. WebSocket 대안은 HTTP 포트 위로 에이전트를 연결해 별도 포트를 열지 않는다.</desc>

  <defs>
    <marker id="arP" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(138,133,128)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="400" fill="#0d0d0d"/>
  <text x="30" y="34" fill="#e8e4df" font-size="15">Jenkins 컨트롤러 노출 표면 — 안 쓰는 포트는 닫는다</text>

  <!-- 컨트롤러 중심 -->
  <rect x="300" y="170" width="160" height="60" rx="6" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)"/>
  <text x="380" y="195" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">Jenkins 컨트롤러</text>
  <text x="380" y="215" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">Configure Global Security</text>

  <!-- 포트 1: 웹 8080 (활성) -->
  <line x1="300" y1="185" x2="220" y2="100" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#arP)"/>
  <rect x="30" y="72" width="190" height="58" rx="6" fill="rgba(102,187,106,0.06)" stroke="#66bb6a"/>
  <text x="46" y="94" fill="#66bb6a" font-size="12"><tspan font-family="'JetBrains Mono',monospace">:8080</tspan> 웹 UI ● 활성</text>
  <text x="46" y="114" fill="rgb(138,133,128)" font-size="11">리버스 프록시·TLS 로 보호</text>

  <!-- 포트 2: TCP agent 50000 (Docker 노출 주의) -->
  <line x1="300" y1="200" x2="220" y2="200" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#arP)"/>
  <rect x="30" y="170" width="190" height="60" rx="6" fill="rgba(244,67,54,0.05)" stroke="rgb(212,168,83)"/>
  <text x="46" y="192" fill="rgb(212,168,83)" font-size="12"><tspan font-family="'JetBrains Mono',monospace">:50000</tspan> TCP agent</text>
  <text x="46" y="210" fill="rgb(138,133,128)" font-size="11">패키지 비활성 · Docker 노출!</text>
  <text x="46" y="225" fill="rgb(138,133,128)" font-size="10">random / fixed / disabled</text>

  <!-- 포트 3: SSH (비활성) -->
  <line x1="300" y1="215" x2="220" y2="300" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#arP)"/>
  <rect x="30" y="272" width="190" height="58" rx="6" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="46" y="294" fill="#e8e4df" font-size="12">SSH CLI ✕ 비활성</text>
  <text x="46" y="314" fill="rgb(138,133,128)" font-size="11">플러그인 별도 설치 시만</text>

  <!-- 우측: 제거됨 / 대안 -->
  <line x1="460" y1="185" x2="540" y2="120" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#arP)"/>
  <rect x="540" y="92" width="190" height="58" rx="6" fill="rgba(244,67,54,0.10)" stroke="#f44336"/>
  <text x="556" y="114" fill="#f44336" font-size="12">UDP/mDNS 탐색 ✕ 제거</text>
  <text x="556" y="134" fill="rgb(138,133,128)" font-size="11">2.220 에서 보안상 제거</text>

  <line x1="460" y1="215" x2="540" y2="280" stroke="#66bb6a" stroke-width="1.5" marker-end="url(#arP)"/>
  <rect x="540" y="252" width="190" height="78" rx="6" fill="rgba(102,187,106,0.06)" stroke="#66bb6a"/>
  <text x="556" y="274" fill="#66bb6a" font-size="12">WebSocket 대안 ●</text>
  <text x="556" y="294" fill="rgb(138,133,128)" font-size="11">2.217+ — HTTP 포트 위로</text>
  <text x="556" y="311" fill="rgb(138,133,128)" font-size="11">에이전트 연결, 별도 포트 불필요</text>

  <!-- 범례 -->
  <rect x="30" y="360" width="13" height="13" rx="2" fill="rgba(102,187,106,0.06)" stroke="#66bb6a"/>
  <text x="50" y="371" fill="rgb(138,133,128)" font-size="11">활성·권장</text>
  <rect x="150" y="360" width="13" height="13" rx="2" fill="rgba(244,67,54,0.05)" stroke="rgb(212,168,83)"/>
  <text x="170" y="371" fill="rgb(138,133,128)" font-size="11">배포별 확인 필요</text>
  <rect x="310" y="360" width="13" height="13" rx="2" fill="rgba(244,67,54,0.10)" stroke="#f44336"/>
  <text x="330" y="371" fill="rgb(138,133,128)" font-size="11">비활성·제거</text>
</svg>
