<svg viewBox="0 0 760 410" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Jenkins CSP 두 계층 — 워크스페이스·아티팩트 vs UI</title>
  <desc>Jenkins의 CSP는 두 계층이다. 계층 1은 빌드 산출물·워크스페이스 HTML을 대상으로 기본 활성이며, 기본 헤더가 JavaScript를 전면 차단한다. 계층 2는 Jenkins UI 자체를 대상으로 2.539부터 도입됐고 기본 비활성이라 위반 리포트만 수집한다. 둘은 슬러그도 기본 상태도 다르다.</desc>

  <rect x="0" y="0" width="760" height="410" fill="#0d0d0d"/>
  <text x="30" y="34" fill="#e8e4df" font-size="15">Jenkins CSP 는 두 계층 — 대상·기본 상태가 다르다</text>

  <!-- 계층 1: 워크스페이스·아티팩트 (활성) -->
  <rect x="30" y="56" width="340" height="300" rx="6" fill="rgba(102,187,106,0.06)" stroke="#66bb6a"/>
  <text x="50" y="82" fill="#66bb6a" font-size="14">① 워크스페이스·아티팩트 CSP</text>
  <text x="50" y="104" fill="rgb(138,133,128)" font-size="11">슬러그: configuring-content-security-policy</text>

  <rect x="50" y="118" width="300" height="30" rx="4" fill="rgba(102,187,106,0.12)" stroke="#66bb6a"/>
  <text x="200" y="138" fill="#66bb6a" font-size="12" text-anchor="middle">기본 상태: 활성 ●</text>

  <text x="50" y="172" fill="#e8e4df" font-size="12">대상</text>
  <text x="50" y="192" fill="rgb(138,133,128)" font-size="11">빌드 산출물·워크스페이스 HTML·아티팩트</text>

  <text x="50" y="222" fill="#e8e4df" font-size="12">기본 헤더</text>
  <rect x="50" y="232" width="300" height="58" rx="4" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="62" y="252" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10">sandbox allow-same-origin;</text>
  <text x="62" y="268" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10">default-src 'none'; img-src 'self';</text>
  <text x="62" y="284" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10">style-src 'self';</text>

  <text x="50" y="314" fill="#f44336" font-size="12">JavaScript 전면 차단 ✕</text>
  <text x="50" y="336" fill="rgb(138,133,128)" font-size="11">조정: <tspan font-family="'JetBrains Mono',monospace" font-size="10">hudson.model.DirectoryBrowserSupport.CSP</tspan></text>

  <!-- 계층 2: UI (비활성) -->
  <rect x="390" y="56" width="340" height="300" rx="6" fill="rgba(244,67,54,0.05)" stroke="rgb(138,133,128)"/>
  <text x="410" y="82" fill="#e8e4df" font-size="14">② UI CSP (Jenkins 2.539+)</text>
  <text x="410" y="104" fill="rgb(138,133,128)" font-size="11">슬러그: csp</text>

  <rect x="410" y="118" width="300" height="30" rx="4" fill="rgba(244,67,54,0.10)" stroke="#f44336"/>
  <text x="560" y="138" fill="#f44336" font-size="12" text-anchor="middle">기본 상태: 비활성 ✕</text>

  <text x="410" y="172" fill="#e8e4df" font-size="12">대상</text>
  <text x="410" y="192" fill="rgb(138,133,128)" font-size="11">Jenkins UI 페이지 자체</text>

  <text x="410" y="222" fill="#e8e4df" font-size="12">기본 동작</text>
  <rect x="410" y="232" width="300" height="58" rx="4" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="422" y="254" fill="rgb(138,133,128)" font-size="11">강제하지 않고 위반 리포트만 수집</text>
  <text x="422" y="274" fill="rgb(138,133,128)" font-size="11">→ 관리자가 비호환 플러그인 사전 파악</text>

  <text x="410" y="314" fill="#e8e4df" font-size="12">활성화 (확인 후 단계적)</text>
  <text x="410" y="336" fill="rgb(138,133,128)" font-size="11">Manage Jenkins → Security 체크박스 / JCasC</text>

  <!-- 범례 -->
  <rect x="30" y="378" width="13" height="13" rx="2" fill="rgba(102,187,106,0.12)" stroke="#66bb6a"/>
  <text x="50" y="389" fill="rgb(138,133,128)" font-size="11">기본 활성</text>
  <rect x="150" y="378" width="13" height="13" rx="2" fill="rgba(244,67,54,0.10)" stroke="#f44336"/>
  <text x="170" y="389" fill="rgb(138,133,128)" font-size="11">기본 비활성 (리포트만)</text>
</svg>
