<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>05-04b — 젠킨스 큐 내부 흐름과 실행 순서</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #e8e4df; font-family: 'Pretendard', -apple-system, system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .fixed-header { flex-shrink: 0; max-width: 1060px; width: 100%; margin: 0 auto; padding: 24px 24px 0; }
    .scroll-content { flex: 1; overflow-y: auto; max-width: 1060px; width: 100%; margin: 0 auto; padding: 0 24px 32px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: rgb(138, 133, 128); font-size: 13px; margin-bottom: 20px; }

    .scenario-selector { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .scenario-pill { background: rgb(26, 26, 26); border: 1px solid rgb(42, 37, 32); border-radius: 20px; color: rgb(138, 133, 128); padding: 6px 16px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .scenario-pill:hover { border-color: rgb(72, 67, 62); }
    .scenario-pill.active { background: rgba(212, 168, 83, 0.15); border-color: rgb(212, 168, 83); color: rgb(212, 168, 83); }

    .pipeline { display: flex; align-items: center; justify-content: center; padding: 16px 0; overflow-x: auto; }
    .pipeline-step { display: flex; flex-direction: column; align-items: center; cursor: pointer; min-width: 52px; }
    .step-circle { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgb(26, 26, 26); border: 2px solid rgb(42, 37, 32); color: rgb(138, 133, 128); font-size: 13px; font-weight: 600; transition: all 0.3s; }
    .step-label { margin-top: 5px; font-size: 10px; color: rgb(138, 133, 128); white-space: nowrap; transition: color 0.3s; }
    .pipeline-step.active .step-circle { background: rgba(212, 168, 83, 0.2); border-color: rgb(212, 168, 83); color: rgb(212, 168, 83); box-shadow: 0 0 8px rgba(212, 168, 83, 0.4); animation: node-glow 2s ease-in-out infinite; }
    .pipeline-step.active .step-label { color: rgb(212, 168, 83); }
    .pipeline-step.completed .step-circle { background: rgba(212, 168, 83, 0.1); border-color: rgb(212, 168, 83); color: rgb(212, 168, 83); }
    .pipeline-step.completed .step-label { color: rgb(212, 168, 83); }
    .pipeline-connector { width: 28px; height: 2px; background: rgb(42, 37, 32); margin-bottom: 20px; transition: background 0.5s; }
    .pipeline-connector.filled { background: rgb(212, 168, 83); }

    .panel { background: #0d0d0d; border: 1px solid rgb(42, 37, 32); border-radius: 8px; padding: 20px; margin-bottom: 14px; }

    .start-overlay { text-align: center; padding: 32px; }
    .btn-start { background: rgba(212, 168, 83, 0.15); border: 1px solid rgb(212, 168, 83); border-radius: 8px; color: rgb(212, 168, 83); padding: 12px 32px; font-size: 16px; cursor: pointer; transition: all 0.2s; }
    .btn-start:hover { background: rgba(212, 168, 83, 0.25); }
    .start-hint { color: rgb(138, 133, 128); font-size: 13px; margin-top: 8px; }

    .controls { display: flex; align-items: center; gap: 16px; padding: 10px 0 0; border-top: 1px solid rgb(42, 37, 32); margin-top: 12px; }
    .controls-nav { display: flex; gap: 8px; }
    .btn-ctrl { background: rgb(26, 26, 26); border: 1px solid rgb(42, 37, 32); border-radius: 6px; color: #e8e4df; padding: 5px 12px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .btn-ctrl:hover { border-color: rgb(212, 168, 83); color: rgb(212, 168, 83); }
    .btn-play { min-width: 72px; }
    .speed-group { display: flex; gap: 4px; margin-left: auto; }
    .speed-btn { background: transparent; border: 1px solid transparent; border-radius: 4px; color: rgb(138, 133, 128); padding: 4px 10px; font-size: 12px; cursor: pointer; }
    .speed-btn.active { border-color: rgb(42, 37, 32); color: #e8e4df; }
    .step-counter { color: rgb(138, 133, 128); font-size: 13px; font-variant-numeric: tabular-nums; min-width: 48px; text-align: right; }

    .narration-step-title { font-size: 11px; font-weight: 600; color: rgb(212, 168, 83); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .narration-body { line-height: 1.7; font-size: 14px; }
    .hl { color: rgb(212, 168, 83); font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.9em; }
    .ok { color: #66bb6a; }
    .warn { color: rgb(212, 168, 83); }
    .fail { color: #f44336; }

    .content-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 14px; }
    @media (max-width: 768px) { .content-grid { grid-template-columns: 1fr; } }

    /* Queue 시각화 */
    .viz-area { min-height: 180px; }
    .viz-title { font-size: 11px; font-weight: 600; color: rgb(138, 133, 128); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
    .queue-items { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .q-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 6px; border: 1px solid rgb(42, 37, 32); background: rgb(18, 18, 18); transition: all 0.3s; font-size: 13px; }
    .q-item .q-id { font-family: 'JetBrains Mono', monospace; color: rgb(138, 133, 128); min-width: 36px; }
    .q-item .q-name { flex: 1; }
    .q-item .q-state { font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 2px 8px; border-radius: 4px; }
    .q-item.waiting { border-color: rgb(62, 57, 42); }
    .q-item.waiting .q-state { background: rgba(212, 168, 83, 0.15); color: rgb(212, 168, 83); }
    .q-item.buildable { border-color: rgb(32, 52, 82); }
    .q-item.buildable .q-state { background: rgba(66, 165, 245, 0.15); color: #42a5f5; }
    .q-item.blocked { border-color: rgb(72, 32, 32); }
    .q-item.blocked .q-state { background: rgba(244, 67, 54, 0.15); color: #f44336; }
    .q-item.left { border-color: rgb(32, 62, 42); }
    .q-item.left .q-state { background: rgba(102, 187, 106, 0.15); color: #66bb6a; }
    .q-item.running { border-color: rgb(32, 62, 42); animation: claude-pulse 2s ease-in-out infinite; }
    .q-item.running .q-state { background: rgba(102, 187, 106, 0.25); color: #66bb6a; }
    .q-item.done { border-color: rgb(42, 37, 32); opacity: 0.5; }
    .q-item.done .q-state { background: rgb(26, 26, 26); color: rgb(138, 133, 128); }

    .executor-pool { margin-top: 8px; }
    .exec-slots { display: flex; gap: 6px; flex-wrap: wrap; }
    .exec-slot { width: 80px; height: 40px; border: 1px solid rgb(42, 37, 32); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: rgb(138, 133, 128); background: rgb(18, 18, 18); transition: all 0.3s; }
    .exec-slot.busy { border-color: rgb(32, 62, 42); background: rgba(102, 187, 106, 0.1); color: #66bb6a; font-weight: 600; }
    .exec-slot.busy.pulse { animation: claude-pulse 2s ease-in-out infinite; }

    /* DB 패널 */
    .db-panel { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; line-height: 1.5; }
    .db-table { width: 100%; border-collapse: collapse; }
    .db-table td { padding: 5px 8px; border-bottom: 1px solid rgb(32, 28, 24); }
    .db-table tr:last-child td { border-bottom: none; }
    .db-key { color: rgb(138, 133, 128); white-space: nowrap; width: 1%; padding-right: 12px; vertical-align: top; }
    .db-val { color: #e8e4df; word-break: break-all; }
    .db-section-title { font-size: 11px; font-weight: 600; color: rgb(138, 133, 128); text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 8px 3px; border-bottom: 1px solid rgb(42, 37, 32); }
    .db-note { color: rgb(138, 133, 128); font-style: italic; font-size: 11px; padding: 6px 8px 0; }
    .changed { color: rgb(212, 168, 83); font-weight: 600; text-shadow: 0 0 6px rgba(212, 168, 83, 0.3); }

    @keyframes node-glow {
      0%   { box-shadow: 0 0 4px rgba(212, 168, 83, 0.2); }
      50%  { box-shadow: 0 0 12px rgba(212, 168, 83, 0.6); }
      100% { box-shadow: 0 0 4px rgba(212, 168, 83, 0.2); }
    }
    @keyframes claude-pulse {
      0%   { box-shadow: inset 0 0 8px rgba(217, 119, 87, 0.4); }
      50%  { box-shadow: inset 0 0 14px rgba(217, 119, 87, 0.6); }
      100% { box-shadow: inset 0 0 8px rgba(217, 119, 87, 0.4); }
    }
    @keyframes glow-success {
      0%   { box-shadow: 0 0 8px rgba(102, 187, 106, 0.7); }
      100% { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="fixed-header">
    <h1>05-04b — 젠킨스 큐 내부 흐름과 실행 순서</h1>
    <p class="subtitle">Queue.maintain() 루프, WaitingItem/BuildableItem/LeftItem 전이, executor 매칭 시각화</p>

    <div class="scenario-selector">
      <button class="scenario-pill active" onclick="switchScenario(0)">케이스 1: 4 Job, 10 Executor (동시)</button>
      <button class="scenario-pill" onclick="switchScenario(1)">케이스 2: 4 Job, 2 Executor (부분 대기)</button>
      <button class="scenario-pill" onclick="switchScenario(2)">케이스 3: 같은 Job x4, 순차</button>
    </div>

    <div class="pipeline" id="pipeline"></div>

    <div class="start-overlay" id="startOverlay">
      <button class="btn-start" onclick="startSimulation()">시뮬레이션 시작 ▶</button>
      <p class="start-hint">Jenkins 큐 내부 흐름을 단계별로 추적합니다</p>
    </div>

    <div class="controls" id="controlBar" style="display: none;">
      <div class="controls-nav">
        <button class="btn-ctrl" onclick="prevStep()">◀ 이전</button>
        <button class="btn-ctrl btn-play" onclick="togglePlay()" id="playBtn">▶ 재생</button>
        <button class="btn-ctrl" onclick="nextStep()">다음 ▶</button>
      </div>
      <div class="speed-group">
        <button class="speed-btn" onclick="setSpeed(0.5)">0.5x</button>
        <button class="speed-btn active" onclick="setSpeed(1)">1x</button>
        <button class="speed-btn" onclick="setSpeed(2)">2x</button>
      </div>
      <span class="step-counter" id="stepCounter">0 / 0</span>
    </div>
  </div>

  <div class="scroll-content" id="scrollContent" style="display: none;">
    <div class="content-grid">
      <div>
        <div class="panel" id="narration"></div>
        <div class="panel viz-area" id="vizArea"></div>
      </div>
      <div class="panel db-panel" id="dbPanel"></div>
    </div>
  </div>

  <script>
    let currentStep = -1;
    let currentScenario = 0;
    let isPlaying = false;
    let playSpeed = 1;
    let timer = null;

    const JOBS = [
      { id: 215, name: 'API-NORMAL', short: 'NORMAL' },
      { id: 216, name: 'API-NORMAL-2', short: 'NORM-2' },
      { id: 217, name: 'API-FAIL', short: 'FAIL' },
      { id: 218, name: 'API-SLEEP10', short: 'SLP10' }
    ];

    function db(rows, opts) {
      let html = '<table class="db-table">';
      if (opts && opts.section) {
        html += '<tr><td colspan="2" class="db-section-title">' + opts.section + '</td></tr>';
      }
      rows.forEach(r => {
        html += '<tr><td class="db-key">' + r[0] + '</td><td class="db-val">' + r[1] + '</td></tr>';
      });
      html += '</table>';
      if (opts && opts.note) {
        html += '<div class="db-note">' + opts.note + '</div>';
      }
      return html;
    }

    function dbMulti(sections) {
      return sections.map(s => db(s.rows, s)).join('');
    }

    function qItem(id, name, stateClass, stateLabel, extra) {
      return '<div class="q-item ' + stateClass + '">'
        + '<span class="q-id">#' + id + '</span>'
        + '<span class="q-name">' + name + '</span>'
        + '<span class="q-state">' + stateLabel + '</span>'
        + (extra ? '<span style="font-size:11px;color:rgb(138,133,128);margin-left:4px">' + extra + '</span>' : '')
        + '</div>';
    }

    function execSlots(count, busyList) {
      let html = '<div class="executor-pool"><div class="viz-title">Executor Pool (slave1, ' + count + ' slots)</div><div class="exec-slots">';
      for (let i = 0; i < Math.min(count, 10); i++) {
        const job = busyList.find(b => b.slot === i);
        if (job) {
          html += '<div class="exec-slot busy' + (job.pulse ? ' pulse' : '') + '">' + job.name + '</div>';
        } else {
          html += '<div class="exec-slot">idle</div>';
        }
      }
      if (count > 10) html += '<div class="exec-slot" style="border:none;color:rgb(100,95,90)">...' + (count - 10) + ' more</div>';
      html += '</div></div>';
      return html;
    }

    // ========== 케이스 1: 4 Job, 10 Executor ==========
    const scenario1 = {
      title: '케이스 1: 4 Job, 10 Executor (동시 실행)',
      nodes: [
        {
          label: 'POST',
          narration: '<span class="hl">curl POST /build</span>가 4회 연속 호출된다. 각 요청은 약 1초 간격이다 (04:24:07 → 04:24:09). HTTP 핸들러가 요청을 받고 <span class="hl">201 Created</span>와 <span class="hl">Location</span> 헤더를 즉시 반환한다.',
          action: function() {
            document.getElementById('vizArea').innerHTML =
              '<div class="viz-title">HTTP 요청 (T=0s)</div>'
              + '<div class="queue-items">'
              + '<div class="q-item" style="border-color:rgb(62,57,42)"><span class="q-id">curl</span><span class="q-name">POST /job/SBH/job/API-NORMAL/build</span><span class="q-state" style="background:rgba(102,187,106,0.15);color:#66bb6a">201</span></div>'
              + '<div class="q-item" style="border-color:rgb(62,57,42)"><span class="q-id">curl</span><span class="q-name">POST /job/SBH/job/API-NORMAL-2/build</span><span class="q-state" style="background:rgba(102,187,106,0.15);color:#66bb6a">201</span></div>'
              + '<div class="q-item" style="border-color:rgb(62,57,42)"><span class="q-id">curl</span><span class="q-name">POST /job/SBH/job/API-FAIL/build</span><span class="q-state" style="background:rgba(102,187,106,0.15);color:#66bb6a">201</span></div>'
              + '<div class="q-item" style="border-color:rgb(62,57,42)"><span class="q-id">curl</span><span class="q-name">POST /job/SBH/job/API-SLEEP10/build</span><span class="q-state" style="background:rgba(102,187,106,0.15);color:#66bb6a">201</span></div>'
              + '</div>'
              + execSlots(10, []);
          },
          db: function() {
            return dbMulti([
              { section: 'HTTP 응답', rows: [
                ['API-NORMAL', '<span class="changed">Location: queue/item/215/</span>'],
                ['API-NORMAL-2', '<span class="changed">Location: queue/item/216/</span>'],
                ['API-FAIL', '<span class="changed">Location: queue/item/217/</span>'],
                ['API-SLEEP10', '<span class="changed">Location: queue/item/218/</span>']
              ], note: 'queue ID는 전역 AtomicLong에서 순차 할당된다.'}
            ]);
          }
        },
        {
          label: 'schedule2',
          narration: '<span class="hl">Queue.schedule2()</span>가 4번 호출된다. 각 호출마다 <span class="warn">WaitingItem</span>이 생성되고 전역 queue ID가 순차 할당된다. Quiet Period 타이머가 시작된다.',
          action: function() {
            document.getElementById('vizArea').innerHTML =
              '<div class="viz-title">Jenkins Queue (T=0~2s)</div>'
              + '<div class="queue-items">'
              + qItem(215, 'API-NORMAL', 'waiting', 'WaitingItem')
              + qItem(216, 'API-NORMAL-2', 'waiting', 'WaitingItem')
              + qItem(217, 'API-FAIL', 'waiting', 'WaitingItem')
              + qItem(218, 'API-SLEEP10', 'waiting', 'WaitingItem')
              + '</div>'
              + execSlots(10, []);
          },
          db: function() {
            return dbMulti([
              { section: 'Queue.items (WaitingItem)', rows: [
                ['#215 state', '<span class="changed">WaitingItem</span>'],
                ['#215 why', 'In the quiet period'],
                ['#216 state', '<span class="changed">WaitingItem</span>'],
                ['#217 state', '<span class="changed">WaitingItem</span>'],
                ['#218 state', '<span class="changed">WaitingItem</span>']
              ], note: 'Quiet Period 동안 대기한다. 기본 5초 또는 delay=0sec.'}
            ]);
          }
        },
        {
          label: 'maintain①',
          narration: '<span class="hl">Queue.maintain()</span> 루프가 실행된다. 첫 번째 단계로 <span class="warn">Quiet Period이 만료된 WaitingItem</span>을 검사한다. 4개 모두 만료되었으므로 <span class="hl">BuildableItem</span>으로 전환한다.',
          action: function() {
            document.getElementById('vizArea').innerHTML =
              '<div class="viz-title">Jenkins Queue — maintain() ① WaitingItem 검사 (T=5s)</div>'
              + '<div class="queue-items">'
              + qItem(215, 'API-NORMAL', 'buildable', 'BuildableItem')
              + qItem(216, 'API-NORMAL-2', 'buildable', 'BuildableItem')
              + qItem(217, 'API-FAIL', 'buildable', 'BuildableItem')
              + qItem(218, 'API-SLEEP10', 'buildable', 'BuildableItem')
              + '</div>'
              + execSlots(10, []);
          },
          db: function() {
            return dbMulti([
              { section: 'Queue.items (BuildableItem)', rows: [
                ['#215 state', '<span class="changed">BuildableItem</span>'],
                ['#215 why', '<span class="changed">Waiting for next available executor</span>'],
                ['#216 state', '<span class="changed">BuildableItem</span>'],
                ['#217 state', '<span class="changed">BuildableItem</span>'],
                ['#218 state', '<span class="changed">BuildableItem</span>']
              ], note: 'maintain() ① 완료. 4개 모두 BuildableItem으로 전환.'}
            ]);
          }
        },
        {
          label: 'maintain②',
          narration: '<span class="hl">maintain()</span>의 두 번째 단계: <span class="fail">BlockedItem</span> 검사. 서로 다른 Job이므로 <span class="hl">disableConcurrentBuilds</span> 차단이 없다. BlockedItem은 0개이므로 이 단계는 건너뛴다.',
          action: function() {
            document.getElementById('vizArea').innerHTML =
              '<div class="viz-title">Jenkins Queue — maintain() ② BlockedItem 검사 (T=5s)</div>'
              + '<div class="queue-items">'
              + qItem(215, 'API-NORMAL', 'buildable', 'BuildableItem')
              + qItem(216, 'API-NORMAL-2', 'buildable', 'BuildableItem')
              + qItem(217, 'API-FAIL', 'buildable', 'BuildableItem')
              + qItem(218, 'API-SLEEP10', 'buildable', 'BuildableItem')
              + '</div>'
              + '<div style="color:rgb(138,133,128);font-size:12px;margin-top:8px;font-style:italic">BlockedItem: 0개 — 서로 다른 Job이므로 차단 조건 없음</div>'
              + execSlots(10, []);
          },
          db: function() {
            return dbMulti([
              { section: 'BlockedItem 검사', rows: [
                ['blocked count', '0'],
                ['이유', '4개 Job이 모두 다른 Job이므로 disableConcurrentBuilds 무관']
              ], note: 'maintain() ②: 차단 없음. 다음 단계로.'}
            ]);
          }
        },
        {
          label: 'LoadBalancer',
          narration: '<span class="hl">maintain()</span>의 세 번째 단계: BuildableItem 4개를 <span class="hl">LoadBalancer.map()</span>에 전달한다. <span class="hl">ConsistentHashLoadBalancer</span>가 label 기반으로 노드를 매칭한다. <span class="ok">slave1에 빈 executor가 10개</span>이므로 4개 모두 매핑된다.',
          action: function() {
            document.getElementById('vizArea').innerHTML =
              '<div class="viz-title">Jenkins Queue — maintain() ③ LoadBalancer.map() (T=5s)</div>'
              + '<div class="queue-items">'
              + qItem(215, 'API-NORMAL', 'left', 'LeftItem', '→ exec[0]')
              + qItem(216, 'API-NORMAL-2', 'left', 'LeftItem', '→ exec[1]')
              + qItem(217, 'API-FAIL', 'left', 'LeftItem', '→ exec[2]')
              + qItem(218, 'API-SLEEP10', 'left', 'LeftItem', '→ exec[3]')
              + '</div>'
              + execSlots(10, [
                {slot:0, name:'NORMAL', pulse:false},
                {slot:1, name:'NORM-2', pulse:false},
                {slot:2, name:'FAIL', pulse:false},
                {slot:3, name:'SLP10', pulse:false}
              ]);
          },
          db: function() {
            return dbMulti([
              { section: 'LoadBalancer 결과', rows: [
                ['#215 → node', '<span class="changed">slave1</span>'],
                ['#215 → executor', '<span class="changed">[0]</span>'],
                ['#216 → executor', '<span class="changed">[1]</span>'],
                ['#217 → executor', '<span class="changed">[2]</span>'],
                ['#218 → executor', '<span class="changed">[3]</span>']
              ]},
              { section: 'Executor Pool', rows: [
                ['busyExecutors', '<span class="changed">4</span>'],
                ['totalExecutors', '10'],
                ['idle slots', '6']
              ], note: '4개 동시 매핑. queue ID 순서가 아닌 LoadBalancer 해시 기반.'}
            ]);
          }
        },
        {
          label: 'Build 시작',

              { section: '시나리오 비교', rows: [
                ['케이스 1 (10 exec, 다른 Job)', '~15초, 동시 실행'],
                ['케이스 2 (2 exec, 다른 Job)', '~45초, 2배치'],
                ['케이스 3 (10 exec, 같은 Job)', '<span class="warn">~45초, 순차 실행</span>']
              ]},
              { section: '핵심', rows: [
                ['순서 보장', 'disableConcurrentBuilds + 같은 Job일 때만'],
                ['차단 메커니즘', 'BlockedItem (executor 부족 아님)'],
                ['why 메시지', '"Build #N is already in progress"']
              ]}
            ]);
          }
        }
      ]
    };

    const scenarios = { 0: scenario1, 1: scenario2, 2: scenario3 };

    function renderPipeline() {
      const pipeline = document.getElementById('pipeline');
      const nodes = scenarios[currentScenario].nodes;
      pipeline.innerHTML = '';
      nodes.forEach((node, i) => {
        if (i > 0) {
          const conn = document.createElement('div');
          conn.className = 'pipeline-connector' + (i <= currentStep ? ' filled' : '');
          pipeline.appendChild(conn);
        }
        const el = document.createElement('div');
        el.className = 'pipeline-step'
          + (i === currentStep ? ' active' : '')
          + (i < currentStep ? ' completed' : '');
        el.onclick = () => goToStep(i);
        el.innerHTML = '<div class="step-circle">' + (i + 1) + '</div>'
          + '<div class="step-label">' + node.label + '</div>';
        pipeline.appendChild(el);
      });
    }

    function goToStep(n) {
      const nodes = scenarios[currentScenario].nodes;
      if (n < 0 || n >= nodes.length) return;
      currentStep = n;
      const node = nodes[n];
      node.action();
      updateNarration(node.narration);
      if (typeof node.db === 'function') {
        document.getElementById('dbPanel').innerHTML = node.db();
      }
      document.getElementById('stepCounter').textContent = (currentStep + 1) + ' / ' + nodes.length;
      renderPipeline();
    }

    function nextStep() { goToStep(currentStep + 1); }
    function prevStep() { goToStep(currentStep - 1); }

    function switchScenario(index) {
      currentScenario = index;
      currentStep = -1;
      stopPlay();
      document.querySelectorAll('.scenario-pill').forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });
      document.getElementById('startOverlay').style.display = 'block';
      document.getElementById('controlBar').style.display = 'none';
      document.getElementById('scrollContent').style.display = 'none';
      renderPipeline();
      document.getElementById('stepCounter').textContent = '0 / ' + scenarios[index].nodes.length;
    }

    function startSimulation() {
      document.getElementById('startOverlay').style.display = 'none';
      document.getElementById('controlBar').style.display = 'flex';
      document.getElementById('scrollContent').style.display = 'block';
      goToStep(0);
    }

    function togglePlay() {
      if (isPlaying) { stopPlay(); return; }
      isPlaying = true;
      document.getElementById('playBtn').textContent = '⏸ 정지';
      timer = setInterval(function() {
        var nodes = scenarios[currentScenario].nodes;
        if (currentStep >= nodes.length - 1) { stopPlay(); return; }
        nextStep();
      }, 3000 / playSpeed);
    }

    function stopPlay() {
      isPlaying = false;
      if (timer) { clearInterval(timer); timer = null; }
      document.getElementById('playBtn').textContent = '▶ 재생';
    }

    function setSpeed(speed) {
      playSpeed = speed;
      document.querySelectorAll('.speed-btn').forEach(function(el) {
        el.classList.toggle('active', parseFloat(el.textContent) === speed);
      });
      if (isPlaying) { stopPlay(); togglePlay(); }
    }

    function updateNarration(html) {
      var nodes = scenarios[currentScenario].nodes;
      document.getElementById('narration').innerHTML =
        '<div class="narration-step-title">Step ' + (currentStep + 1)
        + ': ' + nodes[currentStep].label + '</div>'
        + '<div class="narration-body">' + html + '</div>';
    }

    document.addEventListener('DOMContentLoaded', function() {
      renderPipeline();
    });
  </script>
</body>
</html>
