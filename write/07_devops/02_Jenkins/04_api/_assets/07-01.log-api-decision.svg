<svg viewBox="0 0 780 470" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Jenkins 로그 조회 네 갈래의 목적별 선택과 Blue Ocean 폐기 영향</title>
  <desc>Jenkins 로그 조회 API는 목적에 따라 네 갈래로 갈린다. 끝난 빌드의 전체 원문은 consoleText, 실행 중 실시간 tail은 progressiveText, 특정 stage나 flow node 로그는 wfapi/log를 쓴다. 이 셋은 코어와 활발히 유지되는 플러그인 위에 있어 신규 구현에서 1차 경로다. step 단위 로그는 Blue Ocean의 steps/{stepId}/log만 제공하지만 2026년 7월 폐기 예정이라, 신규가 아닌 기존 화면 유지보수에만 한정한다.</desc>

  <rect x="0" y="0" width="780" height="470" fill="#0d0d0d"/>
  <text x="30" y="34" fill="#e8e4df" font-size="16">로그는 목적이 경로를 정한다 — 네 갈래</text>
  <text x="30" y="56" fill="rgb(138,133,128)" font-size="11">세 갈래는 유지되는 계층(신규 OK), 한 갈래는 폐기 예정(기존 화면만)</text>

  <!-- 1: 전체 원문 -->
  <rect x="30" y="80" width="355" height="116" rx="6" fill="rgba(102,187,106,0.06)" stroke="#66bb6a"/>
  <text x="48" y="106" fill="#66bb6a" font-size="13">① 끝난 빌드 전체 원문</text>
  <rect x="48" y="118" width="319" height="26" rx="4" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="60" y="136" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="11">/{build}/consoleText</text>
  <text x="48" y="164" fill="rgb(138,133,128)" font-size="11">전체 로그 한 번에 — 아카이브·적재</text>
  <text x="48" y="184" fill="#66bb6a" font-size="11">코어 · 신규 OK ✓</text>

  <!-- 2: 실시간 tail -->
  <rect x="397" y="80" width="353" height="116" rx="6" fill="rgba(102,187,106,0.06)" stroke="#66bb6a"/>
  <text x="415" y="106" fill="#66bb6a" font-size="13">② 실행 중 실시간 tail</text>
  <rect x="415" y="118" width="317" height="26" rx="4" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="427" y="136" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10">/logText/progressiveText?start=n</text>
  <text x="415" y="164" fill="rgb(138,133,128)" font-size="11">증분 로그 — 실행 중 따라가기</text>
  <text x="415" y="184" fill="#66bb6a" font-size="11">코어 · 신규 OK ✓</text>

  <!-- 3: stage/node 로그 -->
  <rect x="30" y="212" width="355" height="116" rx="6" fill="rgba(212,168,83,0.07)" stroke="rgb(212,168,83)"/>
  <text x="48" y="238" fill="rgb(212,168,83)" font-size="13">③ 특정 stage / flow node 로그</text>
  <rect x="48" y="250" width="319" height="26" rx="4" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="60" y="268" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10">execution/node/{id}/wfapi/log</text>
  <text x="48" y="296" fill="rgb(138,133,128)" font-size="11">실패 지점 축소 — stage 내부 추적</text>
  <text x="48" y="316" fill="rgb(212,168,83)" font-size="11">wfapi · 활발히 유지 · 신규 OK ✓</text>

  <!-- 4: step 로그 (폐기) -->
  <rect x="397" y="212" width="353" height="116" rx="6" fill="rgba(244,67,54,0.05)" stroke="#f44336"/>
  <text x="415" y="238" fill="#f44336" font-size="13">④ step 단위 로그</text>
  <rect x="415" y="250" width="317" height="26" rx="4" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="427" y="268" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10">/blue/rest/.../steps/{stepId}/log</text>
  <text x="415" y="296" fill="rgb(138,133,128)" font-size="11">step 세밀함 — Blue Ocean만 제공</text>
  <text x="415" y="316" fill="#f44336" font-size="11">2026-07 폐기 예정 · 기존 화면만 ⚠</text>

  <!-- 하단 결론 -->
  <rect x="30" y="350" width="720" height="44" rx="6" fill="rgba(102,187,106,0.08)" stroke="#66bb6a"/>
  <text x="48" y="372" fill="#66bb6a" font-size="12">신규 구현: ① consoleText + ② progressiveText로 전체 로그, ③ wfapi/log로 stage·node drill-down</text>
  <text x="48" y="390" fill="rgb(138,133,128)" font-size="11">④ step 로그가 꼭 필요한 기존 화면만 Blue Ocean 유지 — 폐기 시점에 걷어낼 부채로 인지</text>

  <!-- 인코딩 주석 -->
  <text x="30" y="426" fill="rgb(138,133,128)" font-size="11">※ 2.462부터 ①②④ 로그 모두 UTF-8 표준화 — 한글 깨짐 위험 감소</text>
  <text x="30" y="450" fill="rgb(138,133,128)" font-size="11">※ ④의 UI 대안은 Pipeline Graph View / Pipeline: Stage View (백엔드 로그 경로와는 분리해 판단)</text>
</svg>
