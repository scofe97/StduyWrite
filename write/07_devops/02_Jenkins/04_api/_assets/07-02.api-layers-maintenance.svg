<svg viewBox="0 0 780 470" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Jenkins 상태 추적 세 계층 — 유지보수 상태와 대체 관계</title>
  <desc>Jenkins에서 파이프라인 상태를 추적하는 REST 계층은 셋이다. 코어 빌드 API는 Jenkins 코어에 포함돼 항상 유지되고 building·result 같은 기본 메타데이터를 준다. wfapi(Pipeline: REST API 플러그인)는 활발히 유지보수되며 stage 구조·승인 대기·node 로그를 제공한다. Blue Ocean REST는 2026년 7월 폐기 예정이라 동결 상태이고 step 단위 드릴다운만 더 풍부하다. 신규 구현은 코어 API와 wfapi로 가고, step이 꼭 필요한 기존 화면에만 Blue Ocean을 한정한다.</desc>

  <rect x="0" y="0" width="780" height="470" fill="#0d0d0d"/>
  <text x="30" y="34" fill="#e8e4df" font-size="16">Jenkins 상태 추적 세 계층 — 유지보수 상태로 갈린다</text>
  <text x="30" y="56" fill="rgb(138,133,128)" font-size="11">신규 의존은 유지되는 계층으로, 동결된 계층은 기존 화면에만 한정</text>

  <!-- 계층 1: 코어 빌드 API (항상 유지) -->
  <rect x="30" y="78" width="232" height="328" rx="6" fill="rgba(102,187,106,0.06)" stroke="#66bb6a"/>
  <text x="48" y="104" fill="#66bb6a" font-size="14">① 코어 빌드 API</text>
  <text x="48" y="124" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10">/{build}/api/json</text>

  <rect x="48" y="138" width="196" height="28" rx="4" fill="rgba(102,187,106,0.12)" stroke="#66bb6a"/>
  <text x="146" y="157" fill="#66bb6a" font-size="12" text-anchor="middle">Jenkins 코어 — 항상 유지 ●</text>

  <text x="48" y="194" fill="#e8e4df" font-size="12">강점</text>
  <text x="48" y="214" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10">building, result, 기본 메타</text>
  <text x="48" y="246" fill="#e8e4df" font-size="12">맡는 일</text>
  <text x="48" y="266" fill="rgb(138,133,128)" font-size="11">빌드 전체 생명주기</text>
  <text x="48" y="284" fill="rgb(138,133,128)" font-size="11">실행 중 여부·최종 결과</text>

  <text x="48" y="328" fill="#e8e4df" font-size="12">의존 플러그인</text>
  <text x="48" y="348" fill="rgb(138,133,128)" font-size="11">없음 (코어)</text>
  <rect x="48" y="364" width="196" height="28" rx="4" fill="rgba(102,187,106,0.10)" stroke="#66bb6a"/>
  <text x="146" y="383" fill="#66bb6a" font-size="11" text-anchor="middle">신규 구현 우선 ✓</text>

  <!-- 계층 2: wfapi (활발히 유지) -->
  <rect x="274" y="78" width="232" height="328" rx="6" fill="rgba(212,168,83,0.07)" stroke="rgb(212,168,83)"/>
  <text x="292" y="104" fill="rgb(212,168,83)" font-size="14">② wfapi</text>
  <text x="292" y="124" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10">/{build}/wfapi/describe</text>

  <rect x="292" y="138" width="196" height="28" rx="4" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="390" y="157" fill="rgb(212,168,83)" font-size="12" text-anchor="middle">활발히 유지보수 ●</text>

  <text x="292" y="194" fill="#e8e4df" font-size="12">강점</text>
  <text x="292" y="214" fill="rgb(138,133,128)" font-size="11">stage 구조·승인 대기</text>
  <text x="292" y="232" fill="rgb(138,133,128)" font-size="11">node 단위 drill-down</text>
  <text x="292" y="264" fill="#e8e4df" font-size="12">맡는 일</text>
  <text x="292" y="284" fill="rgb(138,133,128)" font-size="11">파이프라인 내부 진행 상태</text>
  <text x="292" y="302" fill="rgb(138,133,128)" font-size="11">최소 단위 = flow node</text>

  <text x="292" y="328" fill="#e8e4df" font-size="12">의존 플러그인</text>
  <text x="292" y="348" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10">pipeline-rest-api</text>
  <rect x="292" y="364" width="196" height="28" rx="4" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)"/>
  <text x="390" y="383" fill="rgb(212,168,83)" font-size="11" text-anchor="middle">신규 의존 OK ✓</text>

  <!-- 계층 3: Blue Ocean REST (폐기 예정) -->
  <rect x="518" y="78" width="232" height="328" rx="6" fill="rgba(244,67,54,0.05)" stroke="#f44336"/>
  <text x="536" y="104" fill="#f44336" font-size="14">③ Blue Ocean REST</text>
  <text x="536" y="124" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10">/blue/rest/...</text>

  <rect x="536" y="138" width="196" height="28" rx="4" fill="rgba(244,67,54,0.10)" stroke="#f44336"/>
  <text x="634" y="157" fill="#f44336" font-size="12" text-anchor="middle">2026-07 폐기 예정 ✕</text>

  <text x="536" y="194" fill="#e8e4df" font-size="12">강점</text>
  <text x="536" y="214" fill="rgb(138,133,128)" font-size="11">step 단위 드릴다운</text>
  <text x="536" y="232" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10">steps/{stepId}/log</text>
  <text x="536" y="264" fill="#e8e4df" font-size="12">폐기 이유</text>
  <text x="536" y="284" fill="rgb(138,133,128)" font-size="11">코드베이스 동결</text>
  <text x="536" y="302" fill="rgb(138,133,128)" font-size="11">더 현대적 대안 등장</text>

  <text x="536" y="328" fill="#e8e4df" font-size="12">의존 플러그인</text>
  <text x="536" y="348" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10">blueocean</text>
  <rect x="536" y="364" width="196" height="28" rx="4" fill="rgba(244,67,54,0.08)" stroke="#f44336"/>
  <text x="634" y="383" fill="#f44336" font-size="11" text-anchor="middle">기존 step 화면에만 한정 ⚠</text>

  <!-- 하단: 대체 흐름 라벨 -->
  <text x="30" y="434" fill="rgb(138,133,128)" font-size="11">대부분 대체: <tspan fill="rgb(212,168,83)">③ → ②</tspan></text>
  <text x="30" y="454" fill="rgb(138,133,128)" font-size="11">대체 없음: <tspan fill="#f44336">③의 step 계층</tspan> — UI 대안은 Pipeline Graph View / Pipeline: Stage View</text>
</svg>
