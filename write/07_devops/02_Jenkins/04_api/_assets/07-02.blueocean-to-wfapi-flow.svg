<svg viewBox="0 0 780 500" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Blue Ocean 폐기 흐름과 UI 대안이 wfapi 위에 서는 계층</title>
  <desc>Blue Ocean은 한 플러그인이 UI 시각화와 REST 데이터를 둘 다 제공했다. 2026년 7월 폐기되면서 대안이 두 축으로 갈린다. UI 축은 공식이 짚은 Pipeline Graph View와 Pipeline: Stage View 두 플러그인이다. 그런데 Stage View는 stage 데이터를 wfapi(pipeline-rest-api)에서 받으므로, 공식 UI 대안 자체가 wfapi 위에 서 있다. 따라서 stage 단위 데이터 조회의 사실상 표준은 wfapi다. 다만 공식이 wfapi로 갈아타라고 명령한 것은 아니고, 공식 대안이 wfapi를 백엔드로 쓴다는 구조적 사실이다.</desc>

  <rect x="0" y="0" width="780" height="500" fill="#0d0d0d"/>
  <text x="30" y="34" fill="#e8e4df" font-size="16">Blue Ocean 폐기 → 대안은 두 축, 그런데 둘 다 wfapi 위에</text>
  <text x="30" y="56" fill="rgb(138,133,128)" font-size="11">UI 대안은 공식 명시 · stage 데이터 조회 표준은 wfapi(구조적 사실)</text>

  <!-- 상단: Blue Ocean 폐기 -->
  <rect x="30" y="76" width="720" height="64" rx="6" fill="rgba(244,67,54,0.06)" stroke="#f44336"/>
  <text x="48" y="100" fill="#f44336" font-size="14">Blue Ocean — UI 시각화 + REST 데이터를 한 플러그인이 제공</text>
  <text x="48" y="124" fill="rgb(138,133,128)" font-size="11">2026-07 폐기 예정 · 이후 보안·기능 갱신 없음 · 이유: 코드베이스 동결, 더 현대적 대안 등장</text>

  <!-- 분기 화살표 -->
  <line x1="240" y1="140" x2="240" y2="168" stroke="rgb(138,133,128)"/>
  <line x1="540" y1="140" x2="540" y2="168" stroke="rgb(138,133,128)"/>
  <text x="240" y="160" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">UI 축</text>
  <text x="540" y="160" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">데이터 축</text>

  <!-- 좌: UI 대안 -->
  <rect x="30" y="172" width="380" height="150" rx="6" fill="rgba(102,187,106,0.06)" stroke="#66bb6a"/>
  <text x="48" y="196" fill="#66bb6a" font-size="13">공식 UI 대안 (명시)</text>
  <rect x="48" y="208" width="344" height="40" rx="4" fill="rgba(102,187,106,0.10)" stroke="#66bb6a"/>
  <text x="60" y="226" fill="#e8e4df" font-size="12">Pipeline Graph View</text>
  <text x="60" y="242" fill="rgb(138,133,128)" font-size="10">중첩 그래프 · 핵심 기능 · 자체 REST(OpenAPI)</text>
  <rect x="48" y="256" width="344" height="40" rx="4" fill="rgba(102,187,106,0.10)" stroke="#66bb6a"/>
  <text x="60" y="274" fill="#e8e4df" font-size="12">Pipeline: Stage View</text>
  <text x="60" y="290" fill="rgb(138,133,128)" font-size="10">빌드 행 × stage 열 · 소요시간·로그·input</text>
  <text x="48" y="314" fill="#f44336" font-size="10">단서: 둘 다 완전한 대체는 아님</text>

  <!-- 우: 데이터 축 wfapi -->
  <rect x="430" y="172" width="320" height="150" rx="6" fill="rgba(212,168,83,0.07)" stroke="rgb(212,168,83)"/>
  <text x="448" y="196" fill="rgb(212,168,83)" font-size="13">stage 데이터 = wfapi</text>
  <text x="448" y="220" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10">pipeline-rest-api</text>
  <text x="448" y="240" fill="rgb(138,133,128)" font-size="11">활발히 유지 · Blue Ocean 없이 동작</text>
  <text x="448" y="262" fill="#e8e4df" font-size="11">stage view를 구동하는 REST 속성</text>
  <text x="448" y="282" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10">RunExt · StageNodeExt · FlowNodeExt</text>
  <text x="448" y="312" fill="rgb(212,168,83)" font-size="11">stage 단위 데이터 조회의 사실상 표준</text>

  <!-- Stage View → wfapi 의존 화살표 -->
  <path d="M 220 296 Q 330 350 448 270" fill="none" stroke="rgb(212,168,83)" stroke-dasharray="5 3"/>
  <text x="334" y="356" fill="rgb(212,168,83)" font-size="10" text-anchor="middle">Stage View가 wfapi를 백엔드로 소비</text>

  <!-- 하단: 구분 박스 -->
  <rect x="30" y="376" width="720" height="48" rx="6" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="48" y="398" fill="#e8e4df" font-size="12">구분: 공식이 "wfapi로 갈아타라"고 명령한 적은 없음</text>
  <text x="48" y="416" fill="rgb(138,133,128)" font-size="11">→ "공식 UI 대안이 wfapi 위에 서 있다"는 구조적 사실까지만 말한다 (명령 아님, 구조임)</text>

  <!-- 결론 -->
  <rect x="30" y="438" width="720" height="44" rx="6" fill="rgba(102,187,106,0.08)" stroke="#66bb6a"/>
  <text x="48" y="460" fill="#66bb6a" font-size="12">TPS 같은 외부 시스템이 stage 상태를 직접 조회하면, UI 대신 토대인 wfapi를 호출</text>
  <text x="48" y="476" fill="rgb(138,133,128)" font-size="11">엔드포인트 상세 → 07-03 · 로그 모델·구현 판단 → 07-04</text>
</svg>
