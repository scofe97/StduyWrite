services:
  jenkins-controller:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins-controller
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - ./jenkins-config/casc.yaml:/var/jenkins_home/casc.yaml
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false -Xmx1g -Xms512m
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1536m
          cpus: '1.5'
    networks:
      - jenkins-net

  jenkins-agent:
    image: jenkins/ssh-agent:jdk17
    container_name: jenkins-agent
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JENKINS_AGENT_SSH_PUBKEY=${AGENT_SSH_PUBKEY:-ssh-rsa PLACEHOLDER_KEY}
    deploy:
      resources:
        limits:
          memory: 1024m
          cpus: '1.0'
    networks:
      - jenkins-net

  docker-registry:
    image: registry:2
    container_name: docker-registry
    ports:
      - "5000:5000"
    volumes:
      - registry-data:/var/lib/registry
    networks:
      - jenkins-net

volumes:
  jenkins-data:
  registry-data:

networks:
  jenkins-net:
    driver: bridge
