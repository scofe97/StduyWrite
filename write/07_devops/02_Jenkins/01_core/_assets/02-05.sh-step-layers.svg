<svg viewBox="0 0 760 430" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>sh step 의 층 구조 — 순수 셸과 무엇이 다른가</title>
  <desc>sh step 은 명령을 셸에서 실행하기까지 여러 층을 두른다. 위에서부터 Groovy 파이프라인(실행 전 문자열 보간), sh step 래퍼(종료 코드 해석·출력 캡처·로그·워크스페이스), 셸 프로세스, OS 명령 실행 순이다. 셸 프로세스와 OS 실행 층은 터미널에서 직접 명령을 치는 것과 동일하고, 위 두 층이 sh step 고유의 추가 동작이다.</desc>

  <defs>
    <marker id="dn" markerWidth="9" markerHeight="9" refX="3" refY="7" orient="auto">
      <path d="M0,0 L6,0 L3,7 Z" fill="rgb(138,133,128)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="430" fill="#0d0d0d"/>

  <text x="30" y="32" fill="#e8e4df" font-size="15">sh 'cat ...' 는 명령 레벨에선 터미널과 같고, 위 두 층이 다르다</text>

  <!-- 층 1: Groovy 파이프라인 (sh step 고유) -->
  <rect x="180" y="52" width="400" height="62" rx="5" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)"/>
  <text x="200" y="76" fill="rgb(212,168,83)" font-size="13">① Groovy 파이프라인</text>
  <text x="200" y="98" fill="rgb(138,133,128)" font-size="11">실행 전 문자열 보간 — <tspan font-family="'JetBrains Mono',monospace">sh "...${VAR}..."</tspan> 가 여기서 완성</text>

  <line x1="380" y1="114" x2="380" y2="138" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#dn)"/>

  <!-- 층 2: sh step 래퍼 (sh step 고유) -->
  <rect x="150" y="140" width="460" height="74" rx="5" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)"/>
  <text x="170" y="164" fill="rgb(212,168,83)" font-size="13">② sh step 래퍼</text>
  <text x="170" y="186" fill="rgb(138,133,128)" font-size="11">종료 코드 → 빌드 성공/실패 판정 · <tspan font-family="'JetBrains Mono',monospace">returnStdout/Status</tspan> 캡처</text>
  <text x="170" y="204" fill="rgb(138,133,128)" font-size="11">콘솔 로그 수집 · 워크스페이스 디렉토리 · 에이전트 컨텍스트</text>

  <line x1="380" y1="214" x2="380" y2="238" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#dn)"/>

  <!-- 경계선: 여기부터 터미널과 동일 -->
  <line x1="60" y1="238" x2="700" y2="238" stroke="rgb(42,37,32)" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="700" y="234" fill="rgb(138,133,128)" font-size="11" text-anchor="end">↓ 여기부터 터미널과 동일</text>

  <!-- 층 3: 셸 프로세스 (터미널과 동일) -->
  <rect x="120" y="244" width="520" height="74" rx="5" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="140" y="268" fill="#e8e4df" font-size="13">③ 셸 프로세스 <tspan font-family="'JetBrains Mono',monospace" font-size="12">/bin/sh -c</tspan></text>
  <text x="140" y="290" fill="rgb(138,133,128)" font-size="11"><tspan font-family="'JetBrains Mono',monospace">set -euo pipefail</tspan> · 변수 확장 · <tspan font-family="'JetBrains Mono',monospace">cd</tspan> 실패 처리</text>
  <text x="140" y="308" fill="rgb(138,133,128)" font-size="11">지금까지 배운 셸 위생이 모두 이 층에서 작동</text>

  <line x1="380" y1="318" x2="380" y2="342" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#dn)"/>

  <!-- 층 4: OS 명령 (터미널과 동일) -->
  <rect x="120" y="344" width="520" height="56" rx="5" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="140" y="368" fill="#e8e4df" font-size="13">④ OS 명령 실행</text>
  <text x="140" y="388" fill="rgb(138,133,128)" font-size="11"><tspan font-family="'JetBrains Mono',monospace">cat</tspan> · <tspan font-family="'JetBrains Mono',monospace">curl</tspan> · <tspan font-family="'JetBrains Mono',monospace">rm</tspan> — 터미널과 같은 명령, 같은 종료 코드</text>

  <!-- 우측 라벨: 고유 vs 동일 -->
  <rect x="624" y="52" width="14" height="162" rx="3" fill="none" stroke="rgb(212,168,83)" stroke-dasharray="3 3"/>
  <text x="648" y="138" fill="rgb(212,168,83)" font-size="11" transform="rotate(90 648 138)" text-anchor="middle">sh step 고유</text>
  <rect x="654" y="244" width="14" height="156" rx="3" fill="none" stroke="rgb(138,133,128)" stroke-dasharray="3 3"/>
  <text x="678" y="322" fill="rgb(138,133,128)" font-size="11" transform="rotate(90 678 322)" text-anchor="middle">터미널과 동일</text>
</svg>
