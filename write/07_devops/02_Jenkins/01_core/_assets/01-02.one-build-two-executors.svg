<svg viewBox="0 0 840 470" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>빌드 실행 상태 패널에서 읽는 flyweight 와 heavyweight 의 차이</title>
  <desc>Jenkins "빌드 실행 상태" 패널은 두 종류의 executor 를 다르게 보여준다. 왼쪽 Built-In Node 영역의 항목은 빌드 번호만 달릴 뿐 슬롯 번호도 스테이지 꼬리표도 없다. 이것이 flyweight executor 로, 정규 슬롯을 소비하지 않는 OneOffExecutor 위에서 스크립트 진행을 관장하므로 Built-In Node 가 0 executor 로 설정돼 있어도 여기 뜬다. 오른쪽 slave1 영역의 항목은 1 부터 9 까지 슬롯 번호가 매겨져 있고 각 항목에 Build in user image 나 Sonar test 같은 현재 스테이지 이름이 꼬리표로 붙는다. 이것이 heavyweight executor 로, agent 의 정규 executor 슬롯 하나를 잡고 실제 작업을 수행한다. 따라서 패널에서 슬롯 번호와 스테이지 꼬리표의 유무로 두 실행기를 구분해 읽을 수 있다.</desc>

  <rect x="0" y="0" width="840" height="470" fill="#0d0d0d"/>

  <text x="24" y="34" fill="#e8e4df" font-size="15">"빌드 실행 상태" 패널 — 슬롯 번호·스테이지 꼬리표 유무로 두 실행기를 구분한다</text>

  <!-- ===== 왼쪽: Built-In Node (flyweight) ===== -->
  <rect x="24" y="56" width="372" height="384" rx="8" fill="#0d0d0d" stroke="rgb(212,168,83)"/>
  <text x="42" y="84" fill="rgb(212,168,83)" font-size="14">🖥 Built-In Node</text>
  <text x="42" y="104" fill="rgb(138,133,128)" font-size="11">flyweight · <tspan font-family="'JetBrains Mono',monospace">OneOffExecutor</tspan> (정규 슬롯 아님)</text>

  <!-- 항목 1 -->
  <rect x="42" y="120" width="336" height="48" rx="4" fill="rgba(212,168,83,0.10)" stroke="rgb(42,37,32)"/>
  <text x="56" y="140" fill="#e8e4df" font-size="12">SBH » SBH-LOAD100-094</text>
  <rect x="56" y="148" width="120" height="6" rx="3" fill="#e57373"/>
  <text x="344" y="144" fill="#dceaf7" font-size="12" text-anchor="end"><tspan font-family="'JetBrains Mono',monospace">#7</tspan></text>

  <!-- 항목 2 -->
  <rect x="42" y="176" width="336" height="48" rx="4" fill="rgba(212,168,83,0.10)" stroke="rgb(42,37,32)"/>
  <text x="56" y="196" fill="#e8e4df" font-size="12">SBH » SBH-LOAD100-100</text>
  <rect x="56" y="204" width="120" height="6" rx="3" fill="#5b9bd5"/>
  <text x="344" y="200" fill="#dceaf7" font-size="12" text-anchor="end"><tspan font-family="'JetBrains Mono',monospace">#7</tspan></text>

  <!-- 특징 설명 -->
  <text x="42" y="262" fill="rgb(212,168,83)" font-size="12">읽는 법</text>
  <text x="42" y="286" fill="rgb(138,133,128)" font-size="11">· 슬롯 번호 <tspan fill="#e8e4df">없음</tspan> (정규 executor 아님)</text>
  <text x="42" y="308" fill="rgb(138,133,128)" font-size="11">· 스테이지 꼬리표 <tspan fill="#e8e4df">없음</tspan> (<tspan font-family="'JetBrains Mono',monospace">#7</tspan> 만)</text>
  <text x="42" y="330" fill="rgb(138,133,128)" font-size="11">· 빌드 시작부터 끝까지 한 자리 점유</text>
  <text x="42" y="352" fill="rgb(138,133,128)" font-size="11">· Built-In Node 0 executor 여도 표시됨</text>
  <text x="42" y="392" fill="#e8e4df" font-size="11">역할: 스크립트 해석·진행 관장</text>
  <text x="42" y="414" fill="rgb(138,133,128)" font-size="11">(<tspan font-family="'JetBrains Mono',monospace">node</tspan>/<tspan font-family="'JetBrains Mono',monospace">agent</tspan> 블록 진입 시 heavyweight 요청)</text>

  <!-- ===== 오른쪽: slave1 (heavyweight) ===== -->
  <rect x="444" y="56" width="372" height="384" rx="8" fill="#0d0d0d" stroke="#66bb6a"/>
  <text x="462" y="84" fill="#cdeccf" font-size="14">🖥 slave1</text>
  <text x="462" y="104" fill="rgb(138,133,128)" font-size="11">heavyweight · 정규 executor 슬롯 1~9</text>

  <!-- 슬롯 1 -->
  <text x="462" y="142" fill="#66bb6a" font-size="12" font-family="'JetBrains Mono',monospace">1</text>
  <rect x="480" y="120" width="320" height="48" rx="4" fill="rgba(102,187,106,0.10)" stroke="rgb(42,37,32)"/>
  <text x="494" y="140" fill="#e8e4df" font-size="12">SBH » SBH-LOAD100-089</text>
  <text x="494" y="159" fill="rgb(138,133,128)" font-size="10"><tspan font-family="'JetBrains Mono',monospace" fill="#cdeccf">#2</tspan> (Build in user image)</text>

  <!-- 슬롯 5 -->
  <text x="462" y="198" fill="#66bb6a" font-size="12" font-family="'JetBrains Mono',monospace">5</text>
  <rect x="480" y="176" width="320" height="48" rx="4" fill="rgba(102,187,106,0.10)" stroke="rgb(42,37,32)"/>
  <text x="494" y="196" fill="#e8e4df" font-size="12">SBH » SBH-LOAD100-096</text>
  <text x="494" y="215" fill="rgb(138,133,128)" font-size="10"><tspan font-family="'JetBrains Mono',monospace" fill="#cdeccf">#7</tspan> (Sonar test)</text>

  <!-- 슬롯 9 (… 표시) -->
  <text x="462" y="246" fill="rgb(138,133,128)" font-size="12" font-family="'JetBrains Mono',monospace">…</text>

  <!-- 특징 설명 -->
  <text x="462" y="262" fill="#66bb6a" font-size="12">읽는 법</text>
  <text x="462" y="286" fill="rgb(138,133,128)" font-size="11">· 슬롯 번호 <tspan fill="#e8e4df">1~9</tspan> (정규 executor 9개)</text>
  <text x="462" y="308" fill="rgb(138,133,128)" font-size="11">· 스테이지 꼬리표 <tspan fill="#e8e4df">있음</tspan> (<tspan font-family="'JetBrains Mono',monospace">(Build…)</tspan>)</text>
  <text x="462" y="330" fill="rgb(138,133,128)" font-size="11">· 스테이지 실행 동안만 슬롯 점유</text>
  <text x="462" y="352" fill="rgb(138,133,128)" font-size="11">· 슬롯이 다 차면 다음 빌드는 큐 대기</text>
  <text x="462" y="392" fill="#e8e4df" font-size="11">역할: 체크아웃·셸·빌드·테스트 실제 수행</text>
  <text x="462" y="414" fill="rgb(138,133,128)" font-size="11">(꼬리표 = 지금 그 슬롯이 도는 스테이지)</text>

  <!-- 하단 캡션 -->
  <text x="24" y="456" fill="rgb(138,133,128)" font-size="11">두 패널의 빌드 번호가 같으면 한 빌드의 flyweight + heavyweight 다 — 중복 실행이 아니다.</text>
</svg>
