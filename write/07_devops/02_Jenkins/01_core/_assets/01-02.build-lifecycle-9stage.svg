<svg viewBox="0 0 920 360" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>빌드 한 건의 9단계 라이프사이클 — 트리거에서 결과 반환까지</title>
  <desc>빌드 요청 한 건은 아홉 단계를 거친다. Controller 영역에서 ① 트리거 수신(webhook·cron·수동), ② Queue 진입(queueId 발급·대기), ③ Agent 매칭(Label 조건 탐색), ④ Run 생성(buildNumber 확정), ④-a Queue 이탈(LeftItem 전환·executable 연결)이 일어난다. 그 뒤 onStarted Hook 이 발동하는데, Pipeline 은 이 시점에 flyweight 로 시작한다. Agent 영역으로 넘어가 ⑤ Executor 점유(node 블록 진입 시 currentExecutable 채워짐), ⑥ 빌드 실행(checkout 후 steps)이 돌고, ⑦ 결과 반환(로그·아티팩트를 Controller 저장)에 이어 onFinalized Hook 이 발동한다. ③ 매칭 실패 시 ② Queue 로 되돌아간다. 색은 단계 성격을 구분한다 — 트리거는 파랑, Queue·매칭은 주황, Run 생성·Queue 이탈은 노랑, Hook 은 빨강, Executor·실행은 초록, 결과 반환은 보라다.</desc>

  <defs>
    <marker id="a9" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="rgb(138,133,128)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="360" fill="#0d0d0d"/>

  <!-- Controller 영역 프레임 -->
  <rect x="20" y="56" width="540" height="120" rx="8" fill="#0d0d0d" stroke="rgb(42,37,32)" stroke-dasharray="5 4"/>
  <text x="34" y="48" fill="rgb(138,133,128)" font-size="13">Controller</text>
  <!-- Agent 영역 프레임 -->
  <rect x="588" y="56" width="252" height="120" rx="8" fill="#0d0d0d" stroke="rgb(42,37,32)" stroke-dasharray="5 4"/>
  <text x="602" y="48" fill="rgb(138,133,128)" font-size="13">Agent</text>

  <!-- 색 정의: trigger 파랑 / queue·match 주황 / run·left 노랑 / hook 빨강 / agent 초록 / result 보라 -->
  <!-- 위 줄: ① ② ③ ④ ④-a -->
  <g font-size="11">
    <rect x="34" y="74" width="92" height="84" rx="5" fill="rgba(91,155,213,0.16)" stroke="#5b9bd5"/>
    <text x="46" y="96" fill="#dceaf7" font-size="12">① 트리거</text>
    <text x="46" y="114" fill="rgb(138,133,128)">webhook</text>
    <text x="46" y="130" fill="rgb(138,133,128)">/ cron</text>
    <text x="46" y="146" fill="rgb(138,133,128)">/ 수동</text>

    <rect x="140" y="74" width="92" height="84" rx="5" fill="rgba(239,140,0,0.16)" stroke="#ef8c00"/>
    <text x="152" y="96" fill="#fbe3c4" font-size="12">② Queue</text>
    <text x="152" y="114" fill="rgb(138,133,128)"><tspan font-family="'JetBrains Mono',monospace">queueId</tspan></text>
    <text x="152" y="130" fill="rgb(138,133,128)">발급 · 대기</text>

    <rect x="246" y="74" width="92" height="84" rx="5" fill="rgba(239,140,0,0.16)" stroke="#ef8c00"/>
    <text x="258" y="96" fill="#fbe3c4" font-size="12">③ 매칭</text>
    <text x="258" y="114" fill="rgb(138,133,128)">Label 조건</text>
    <text x="258" y="130" fill="rgb(138,133,128)">탐색</text>

    <rect x="352" y="74" width="92" height="84" rx="5" fill="rgba(249,168,37,0.16)" stroke="#f9a825"/>
    <text x="364" y="96" fill="#fbeecb" font-size="12">④ Run 생성</text>
    <text x="364" y="114" fill="rgb(138,133,128)"><tspan font-family="'JetBrains Mono',monospace">buildNumber</tspan></text>
    <text x="364" y="130" fill="rgb(138,133,128)">확정</text>

    <rect x="458" y="74" width="92" height="84" rx="5" fill="rgba(249,168,37,0.16)" stroke="#f9a825"/>
    <text x="470" y="96" fill="#fbeecb" font-size="12">④-a 이탈</text>
    <text x="470" y="114" fill="rgb(138,133,128)">LeftItem</text>
    <text x="470" y="130" fill="rgb(138,133,128)">executable</text>
    <text x="470" y="146" fill="rgb(138,133,128)">연결</text>
  </g>

  <!-- onStarted Hook (Controller~Agent 사이) -->
  <rect x="560" y="196" width="280" height="56" rx="5" fill="rgba(198,40,40,0.18)" stroke="#e57373"/>
  <text x="574" y="218" fill="#f3cccc" font-size="12">🔔 onStarted</text>
  <text x="574" y="238" fill="rgb(138,133,128)" font-size="11">Pipeline: flyweight (정규 슬롯 미점유)</text>

  <!-- Agent 영역: ⑤ ⑥ -->
  <g font-size="11">
    <rect x="602" y="74" width="108" height="84" rx="5" fill="rgba(102,187,106,0.16)" stroke="#66bb6a"/>
    <text x="614" y="96" fill="#cdeccf" font-size="12">⑤ Executor</text>
    <text x="614" y="114" fill="rgb(138,133,128)"><tspan font-family="'JetBrains Mono',monospace">node {}</tspan> 진입</text>
    <text x="614" y="130" fill="rgb(138,133,128)"><tspan font-family="'JetBrains Mono',monospace">currentExec</tspan></text>
    <text x="614" y="146" fill="rgb(138,133,128)">-utable 채움</text>

    <rect x="718" y="74" width="108" height="84" rx="5" fill="rgba(102,187,106,0.16)" stroke="#66bb6a"/>
    <text x="730" y="96" fill="#cdeccf" font-size="12">⑥ 빌드 실행</text>
    <text x="730" y="114" fill="rgb(138,133,128)">checkout</text>
    <text x="730" y="130" fill="rgb(138,133,128)">→ steps</text>
  </g>

  <!-- 결과 반환 + onFinalized (하단) -->
  <rect x="34" y="196" width="200" height="56" rx="5" fill="rgba(123,31,162,0.20)" stroke="#ba68c8"/>
  <text x="46" y="218" fill="#e6cdef" font-size="12">⑦ 결과 반환</text>
  <text x="46" y="238" fill="rgb(138,133,128)" font-size="11">로그·아티팩트 → Controller 저장</text>

  <rect x="262" y="196" width="218" height="56" rx="5" fill="rgba(198,40,40,0.18)" stroke="#e57373"/>
  <text x="274" y="218" fill="#f3cccc" font-size="12">🔔 onFinalized</text>
  <text x="274" y="238" fill="rgb(138,133,128)" font-size="11">result 확정 · executor 해제 완료</text>

  <!-- 화살표: 위 줄 순방향 -->
  <g stroke="rgb(138,133,128)" stroke-width="1.4" fill="none">
    <line x1="126" y1="116" x2="140" y2="116" marker-end="url(#a9)"/>
    <line x1="232" y1="116" x2="246" y2="116" marker-end="url(#a9)"/>
    <line x1="338" y1="116" x2="352" y2="116" marker-end="url(#a9)"/>
    <line x1="444" y1="116" x2="458" y2="116" marker-end="url(#a9)"/>
    <line x1="710" y1="116" x2="718" y2="116" marker-end="url(#a9)"/>
  </g>

  <!-- ④-a → onStarted → ⑤ (꺾임) -->
  <path d="M504,158 L504,224 L560,224" stroke="rgb(138,133,128)" stroke-width="1.4" fill="none" marker-end="url(#a9)"/>
  <path d="M714,196 L714,176 L656,176 L656,158" stroke="rgb(138,133,128)" stroke-width="1.4" stroke-dasharray="4 3" fill="none" marker-end="url(#a9)"/>
  <text x="724" y="190" fill="rgb(138,133,128)" font-size="10">과도 구간</text>

  <!-- ⑥ → ⑦ → onFinalized -->
  <path d="M772,158 L772,300 L134,300 L134,252" stroke="rgb(138,133,128)" stroke-width="1.4" fill="none" marker-end="url(#a9)"/>
  <line x1="234" y1="224" x2="262" y2="224" stroke="rgb(138,133,128)" stroke-width="1.4" marker-end="url(#a9)"/>

  <!-- ③ 매칭 실패 → ② 되돌아감 -->
  <path d="M292,74 L292,66 L186,66 L186,74" stroke="rgb(239,140,0)" stroke-width="1.2" stroke-dasharray="3 3" fill="none" marker-end="url(#a9)"/>
  <text x="239" y="62" fill="rgb(239,140,0)" font-size="10" text-anchor="middle">매칭 실패</text>

  <text x="20" y="340" fill="rgb(138,133,128)" font-size="11">색 = 단계 성격: 파랑 트리거 · 주황 Queue/매칭 · 노랑 Run 생성/이탈 · 빨강 Hook · 초록 Agent 실행 · 보라 결과 반환</text>
</svg>
