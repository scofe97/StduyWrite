<svg viewBox="0 0 980 220" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Queue 내부 상태 전이 — WaitingItem 에서 Executor 점유까지</title>
  <desc>Jenkins 큐는 보통 세 상태를 거친다. WaitingItem 은 트리거 직후 진입한 상태로 quiet period 나 초기 대기가 여기 해당한다. maintain() 루프가 돌면 BuildableItem 으로 넘어가 label·resource·executor 가용성을 검토하는데, 조건이 미충족이면 BuildableItem 에 머무르며 자기 자신으로 되돌아간다. 매칭에 성공하면 Run 이 생성되어 buildNumber 가 확정되고, 이어 LeftItem 으로 전환되어 queue 에서 제거되며 executable 이 연결된다. onStarted 이후 또는 근접 시점에 Executor 가 점유되어 currentExecutable 이 반영된다. 색은 단계 성격을 구분한다 — 주황은 큐 대기 상태(WaitingItem·BuildableItem), 노랑은 Run 생성과 Queue 이탈(LeftItem·Run 생성), 초록은 Executor 점유다.</desc>

  <defs>
    <marker id="q9" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="rgb(138,133,128)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="220" fill="#0d0d0d"/>

  <!-- WaitingItem (주황) -->
  <rect x="20" y="74" width="170" height="78" rx="5" fill="rgba(239,140,0,0.16)" stroke="#ef8c00"/>
  <text x="36" y="96" fill="#fbe3c4" font-size="13">WaitingItem</text>
  <text x="36" y="116" fill="rgb(138,133,128)" font-size="11">트리거 직후 진입</text>
  <text x="36" y="134" fill="rgb(138,133,128)" font-size="11">quiet period / 초기 대기</text>

  <!-- BuildableItem (주황) -->
  <rect x="272" y="74" width="218" height="78" rx="5" fill="rgba(239,140,0,0.16)" stroke="#ef8c00"/>
  <text x="288" y="96" fill="#fbe3c4" font-size="13">BuildableItem</text>
  <text x="288" y="116" fill="rgb(138,133,128)" font-size="11">실행 가능 후보</text>
  <text x="288" y="134" fill="rgb(138,133,128)" font-size="11"><tspan font-family="'JetBrains Mono',monospace">label·resource·executor</tspan> 검토</text>

  <!-- Run 생성 (노랑) -->
  <rect x="572" y="74" width="158" height="78" rx="5" fill="rgba(249,168,37,0.16)" stroke="#f9a825"/>
  <text x="588" y="96" fill="#fbeecb" font-size="13">Run 생성</text>
  <text x="588" y="116" fill="rgb(138,133,128)" font-size="11"><tspan font-family="'JetBrains Mono',monospace">buildNumber</tspan></text>
  <text x="588" y="134" fill="rgb(138,133,128)" font-size="11">확정</text>

  <!-- LeftItem (노랑) -->
  <rect x="572" y="20" width="208" height="44" rx="5" fill="rgba(249,168,37,0.16)" stroke="#f9a825"/>
  <text x="588" y="40" fill="#fbeecb" font-size="13">LeftItem</text>
  <text x="588" y="56" fill="rgb(138,133,128)" font-size="11">queue 제거 · executable 연결</text>

  <!-- Executor 점유 (초록) -->
  <rect x="812" y="74" width="156" height="78" rx="5" fill="rgba(102,187,106,0.16)" stroke="#66bb6a"/>
  <text x="828" y="96" fill="#cdeccf" font-size="13">Executor 점유</text>
  <text x="828" y="116" fill="rgb(138,133,128)" font-size="11"><tspan font-family="'JetBrains Mono',monospace">currentExecutable</tspan></text>
  <text x="828" y="134" fill="rgb(138,133,128)" font-size="11">반영</text>

  <!-- 화살표 -->
  <!-- WI → BI : maintain() 루프 -->
  <line x1="190" y1="113" x2="272" y2="113" stroke="rgb(138,133,128)" stroke-width="1.4" marker-end="url(#q9)"/>
  <text x="231" y="105" fill="rgb(138,133,128)" font-size="10" text-anchor="middle"><tspan font-family="'JetBrains Mono',monospace">maintain()</tspan> 루프</text>

  <!-- BI self-loop : 조건 미충족 -->
  <path d="M330,152 L330,182 L432,182 L432,152" stroke="rgb(239,140,0)" stroke-width="1.2" stroke-dasharray="3 3" fill="none" marker-end="url(#q9)"/>
  <text x="381" y="200" fill="rgb(239,140,0)" font-size="10" text-anchor="middle">조건 미충족</text>

  <!-- BI → RC : 매칭 성공 -->
  <line x1="490" y1="113" x2="572" y2="113" stroke="rgb(138,133,128)" stroke-width="1.4" marker-end="url(#q9)"/>
  <text x="531" y="105" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">매칭 성공</text>

  <!-- RC → LI -->
  <line x1="651" y1="74" x2="651" y2="64" stroke="rgb(138,133,128)" stroke-width="1.4" marker-end="url(#q9)"/>

  <!-- LI → EA : onStarted 이후 / 근접 시점 -->
  <path d="M780,42 L890,42 L890,74" stroke="rgb(138,133,128)" stroke-width="1.4" fill="none" marker-end="url(#q9)"/>
  <text x="835" y="34" fill="rgb(138,133,128)" font-size="10" text-anchor="middle"><tspan font-family="'JetBrains Mono',monospace">onStarted</tspan> 이후 / 근접 시점</text>

  <text x="20" y="212" fill="rgb(138,133,128)" font-size="11">색 = 단계 성격: 주황 큐 대기(Waiting·Buildable) · 노랑 Run 생성/Queue 이탈(LeftItem) · 초록 Executor 점유</text>
</svg>
