<svg viewBox="0 0 1180 340" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>단계별로 어떤 값이 생기는가 — queueId·buildNumber·currentExecutable 발급 타임라인</title>
  <desc>빌드 요청이 들어온 뒤 각 단계에서 새 값이 만들어진다. 왼쪽에서 오른쪽으로 ① 트리거 수신에서 BUILD_CAUSE 가 결정되고 webhook payload 를 받는다. ② Queue 진입에서 queueId 가 즉시 발급되고 inQueueSince·why 가 기록된다. ③ Agent 매칭에서 assignedLabel 을 평가하고 Node 후보를 찾는데, executable 이 비어 있으면 ② 로 되돌아간다. ④-a Run 생성에서 buildNumber 가 확정되고 executable.number 가 채워진다. ④-b Queue 이탈에서 LeftItem 으로 전환되며 큐 대기가 끝난다. 이어 onStarted Hook 이 발동하는데, run.number 는 있지만 Pipeline 은 flyweight 라 getExecutor() 가 null 이고 Freestyle 은 executor 스레드 내 호출이라 값이 존재한다. 그 사이 과도 구간을 지나 ④-c Executor 점유에서 node 블록 진입 시 currentExecutable 과 EXECUTOR_NUMBER·NODE_NAME 이 채워진다. ⑤ 빌드 실행에서 BUILD_URL·WORKSPACE·GIT_COMMIT 이 주입되고, ⑥ 결과 반환에서 result·duration·artifact fingerprint 가 생긴다. 마지막 onFinalized Hook 에서 result 가 확정되고 executor 가 해제된다. 색은 단계 성격을 구분한다 — 파랑 트리거, 주황 Queue·매칭, 노랑 Run 생성·이탈, 빨강 Hook, 초록 Executor·실행, 보라 결과 반환이다.</desc>

  <defs>
    <marker id="tl9" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="rgb(138,133,128)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1180" height="340" fill="#0d0d0d"/>

  <!-- 메인 가로 행: 7 단계 박스 (width 150, gap 14) y=120 -->
  <!-- ① trigger 파랑 -->
  <rect x="20" y="120" width="150" height="92" rx="5" fill="rgba(91,155,213,0.16)" stroke="#5b9bd5"/>
  <text x="34" y="142" fill="#dceaf7" font-size="13">① 트리거 수신</text>
  <text x="34" y="164" fill="rgb(138,133,128)" font-size="11"><tspan font-family="'JetBrains Mono',monospace">BUILD_CAUSE</tspan></text>
  <text x="34" y="182" fill="rgb(138,133,128)" font-size="11">결정</text>
  <text x="34" y="200" fill="rgb(138,133,128)" font-size="11">webhook 수신</text>

  <!-- ② queue 주황 -->
  <rect x="184" y="120" width="150" height="92" rx="5" fill="rgba(239,140,0,0.16)" stroke="#ef8c00"/>
  <text x="198" y="142" fill="#fbe3c4" font-size="13">② Queue 진입</text>
  <text x="198" y="164" fill="rgb(138,133,128)" font-size="11"><tspan font-family="'JetBrains Mono',monospace">queueId</tspan> 즉시</text>
  <text x="198" y="182" fill="rgb(138,133,128)" font-size="11">발급</text>
  <text x="198" y="200" fill="rgb(138,133,128)" font-size="11"><tspan font-family="'JetBrains Mono',monospace">inQueueSince</tspan></text>

  <!-- ③ match 주황 -->
  <rect x="348" y="120" width="150" height="92" rx="5" fill="rgba(239,140,0,0.16)" stroke="#ef8c00"/>
  <text x="362" y="142" fill="#fbe3c4" font-size="13">③ Agent 매칭</text>
  <text x="362" y="164" fill="rgb(138,133,128)" font-size="11"><tspan font-family="'JetBrains Mono',monospace">assignedLabel</tspan></text>
  <text x="362" y="182" fill="rgb(138,133,128)" font-size="11">평가</text>
  <text x="362" y="200" fill="rgb(138,133,128)" font-size="11">Node 후보 탐색</text>

  <!-- ④-a run 노랑 -->
  <rect x="512" y="120" width="150" height="92" rx="5" fill="rgba(249,168,37,0.16)" stroke="#f9a825"/>
  <text x="526" y="142" fill="#fbeecb" font-size="13">④-a Run 생성</text>
  <text x="526" y="164" fill="rgb(138,133,128)" font-size="11"><tspan font-family="'JetBrains Mono',monospace">buildNumber</tspan></text>
  <text x="526" y="182" fill="rgb(138,133,128)" font-size="11">확정</text>
  <text x="526" y="200" fill="rgb(138,133,128)" font-size="11"><tspan font-family="'JetBrains Mono',monospace">executable.no</tspan></text>

  <!-- ④-b left 노랑 -->
  <rect x="676" y="120" width="150" height="92" rx="5" fill="rgba(249,168,37,0.16)" stroke="#f9a825"/>
  <text x="690" y="142" fill="#fbeecb" font-size="13">④-b Queue 이탈</text>
  <text x="690" y="164" fill="rgb(138,133,128)" font-size="11"><tspan font-family="'JetBrains Mono',monospace">LeftItem</tspan></text>
  <text x="690" y="182" fill="rgb(138,133,128)" font-size="11">전환</text>
  <text x="690" y="200" fill="rgb(138,133,128)" font-size="11">queue 대기 종료</text>

  <!-- ④-c executor 초록 -->
  <rect x="840" y="120" width="150" height="92" rx="5" fill="rgba(102,187,106,0.16)" stroke="#66bb6a"/>
  <text x="854" y="142" fill="#cdeccf" font-size="13">④-c Executor</text>
  <text x="854" y="164" fill="rgb(138,133,128)" font-size="11"><tspan font-family="'JetBrains Mono',monospace">node {}</tspan> 진입</text>
  <text x="854" y="182" fill="rgb(138,133,128)" font-size="11"><tspan font-family="'JetBrains Mono',monospace">currentExec</tspan></text>
  <text x="854" y="200" fill="rgb(138,133,128)" font-size="11"><tspan font-family="'JetBrains Mono',monospace">NODE_NAME</tspan></text>

  <!-- ⑤ build 초록 -->
  <rect x="1004" y="120" width="156" height="92" rx="5" fill="rgba(102,187,106,0.16)" stroke="#66bb6a"/>
  <text x="1018" y="142" fill="#cdeccf" font-size="13">⑤ 빌드 실행</text>
  <text x="1018" y="164" fill="rgb(138,133,128)" font-size="11"><tspan font-family="'JetBrains Mono',monospace">BUILD_URL</tspan></text>
  <text x="1018" y="182" fill="rgb(138,133,128)" font-size="11"><tspan font-family="'JetBrains Mono',monospace">WORKSPACE</tspan></text>
  <text x="1018" y="200" fill="rgb(138,133,128)" font-size="11"><tspan font-family="'JetBrains Mono',monospace">GIT_COMMIT</tspan></text>

  <!-- onStarted Hook 빨강 (위, ④-b 와 ④-c 사이 상단) -->
  <rect x="540" y="22" width="446" height="60" rx="5" fill="rgba(198,40,40,0.18)" stroke="#e57373"/>
  <text x="556" y="44" fill="#f3cccc" font-size="13">🔔 onStarted <tspan fill="rgb(138,133,128)" font-size="11"><tspan font-family="'JetBrains Mono',monospace">run.number</tspan> ✓</tspan></text>
  <text x="556" y="62" fill="rgb(138,133,128)" font-size="11">Pipeline: flyweight → <tspan font-family="'JetBrains Mono',monospace">getExecutor()</tspan>=null (Freestyle 은 값 존재)</text>

  <!-- onFinalized Hook 빨강 (오른쪽 하단) + ⑥ 결과 반환 보라 -->
  <rect x="1004" y="240" width="156" height="60" rx="5" fill="rgba(123,31,162,0.20)" stroke="#ba68c8"/>
  <text x="1018" y="262" fill="#e6cdef" font-size="13">⑥ 결과 반환</text>
  <text x="1018" y="282" fill="rgb(138,133,128)" font-size="11"><tspan font-family="'JetBrains Mono',monospace">result</tspan> · fingerprint</text>

  <rect x="640" y="240" width="346" height="60" rx="5" fill="rgba(198,40,40,0.18)" stroke="#e57373"/>
  <text x="656" y="262" fill="#f3cccc" font-size="13">🔔 onFinalized</text>
  <text x="656" y="282" fill="rgb(138,133,128)" font-size="11"><tspan font-family="'JetBrains Mono',monospace">result</tspan> 확정 · executor 해제 완료</text>

  <!-- 가로 화살표 (메인 행) -->
  <g stroke="rgb(138,133,128)" stroke-width="1.4" fill="none">
    <line x1="170" y1="166" x2="184" y2="166" marker-end="url(#tl9)"/>
    <line x1="498" y1="166" x2="512" y2="166" marker-end="url(#tl9)"/>
    <line x1="662" y1="166" x2="676" y2="166" marker-end="url(#tl9)"/>
    <line x1="990" y1="166" x2="1004" y2="166" marker-end="url(#tl9)"/>
  </g>
  <!-- ② → ③ : Location 헤더 -->
  <line x1="334" y1="166" x2="348" y2="166" stroke="rgb(138,133,128)" stroke-width="1.4" marker-end="url(#tl9)"/>

  <!-- ④-b → onStarted (위로) → ④-c (점선 과도 구간) -->
  <path d="M751,120 L751,82" stroke="rgb(138,133,128)" stroke-width="1.4" fill="none" marker-end="url(#tl9)"/>
  <path d="M880,82 L880,100 L915,100 L915,120" stroke="rgb(138,133,128)" stroke-width="1.4" stroke-dasharray="4 3" fill="none" marker-end="url(#tl9)"/>
  <text x="924" y="104" fill="rgb(138,133,128)" font-size="10">과도 구간 (K8s: +Pod)</text>

  <!-- ⑤ → ⑥ 결과 반환 (아래로) → onFinalized -->
  <path d="M1082,212 L1082,240" stroke="rgb(138,133,128)" stroke-width="1.4" fill="none" marker-end="url(#tl9)"/>
  <line x1="1004" y1="270" x2="986" y2="270" stroke="rgb(138,133,128)" stroke-width="1.4" marker-end="url(#tl9)"/>

  <!-- ③ → ② 되돌아감 (executable 비어있음) 아래로 우회 -->
  <path d="M423,212 L423,228 L259,228 L259,212" stroke="rgb(239,140,0)" stroke-width="1.2" stroke-dasharray="3 3" fill="none" marker-end="url(#tl9)"/>
  <text x="341" y="244" fill="rgb(239,140,0)" font-size="10" text-anchor="middle">executable 비어있음 → ② 로</text>

  <text x="20" y="326" fill="rgb(138,133,128)" font-size="11">색 = 단계 성격: 파랑 트리거 · 주황 Queue/매칭 · 노랑 Run 생성/이탈 · 빨강 Hook · 초록 Executor/실행 · 보라 결과 반환</text>
</svg>
