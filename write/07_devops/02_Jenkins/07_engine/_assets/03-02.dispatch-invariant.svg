<svg viewBox="0 0 940 560" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>배정 두 단계와 직렬화 불변식</title>
  <desc>canTake 거부권 사슬과 CONSISTENT_HASH 배정의 파이프라인, 그리고 같은 직렬화 불변식을 메모리 락과 DB 락으로 구현한 Jenkins와 TPS의 대조.</desc>
  <defs>
    <marker id="arrow5" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="940" height="560" fill="#0d0d0d"/>
  <text x="24" y="34" fill="#e8e4df" font-size="13">배정 두 단계, 그리고 직렬화 불변식의 두 구현</text>

  <!-- 파이프라인 -->
  <rect x="24" y="88" width="130" height="70" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="89" y="116" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">buildables</text>
  <text x="89" y="140" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">후보 작업</text>

  <rect x="190" y="60" width="320" height="130" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="350" y="86" fill="#e8e4df" font-size="12" text-anchor="middle">1단계 — canTake 거부권 사슬</text>
  <text x="210" y="112" fill="#e8e4df" font-size="11">① node.canTake — label·자격</text>
  <text x="210" y="134" fill="#e8e4df" font-size="11">② QueueTaskDispatcher — 플러그인 거부권</text>
  <text x="210" y="156" fill="#e8e4df" font-size="11">③ isAcceptingTasks — 운영 상태</text>
  <text x="210" y="180" fill="rgb(138,133,128)" font-size="10.5">거부 사유는 CauseOfBlockage 로 UI 에 노출</text>

  <rect x="546" y="60" width="240" height="130" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="666" y="86" fill="#e8e4df" font-size="12" text-anchor="middle">2단계 — CONSISTENT_HASH</text>
  <text x="666" y="112" fill="#e8e4df" font-size="11" text-anchor="middle">작업 이름을 키로 해시 링</text>
  <text x="666" y="134" fill="#e8e4df" font-size="11" text-anchor="middle">같은 Job → 같은 노드 선호</text>
  <text x="666" y="162" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">워크스페이스·캐시 재사용</text>

  <rect x="822" y="88" width="94" height="70" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="869" y="116" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">pendings</text>
  <text x="869" y="140" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">배정 확정</text>

  <line x1="154" y1="123" x2="186" y2="123" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arrow5)"/>
  <line x1="510" y1="123" x2="542" y2="123" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arrow5)"/>
  <line x1="786" y1="123" x2="818" y2="123" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arrow5)"/>

  <!-- maintain 스트립 -->
  <rect x="190" y="210" width="596" height="40" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="488" y="235" fill="#e8e4df" font-size="11.5" text-anchor="middle">이 전부가 maintain() 안 — 단일 ReentrantLock 을 쥔 채로 진행</text>

  <!-- 대조 패널 -->
  <rect x="24" y="280" width="436" height="180" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="242" y="308" fill="#e8e4df" font-size="13" text-anchor="middle">Jenkins — 단일 JVM</text>
  <text x="242" y="336" fill="#e8e4df" font-size="11" text-anchor="middle">결정자 직렬화 = 메모리 락 (비용 ≈ 0)</text>
  <text x="242" y="362" fill="rgb(212,168,83)" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">ReentrantLock + maintain()</text>
  <text x="242" y="394" fill="#e8e4df" font-size="11" text-anchor="middle">적재 한도 없음 — 큐는 거절 없이 쌓인다</text>
  <text x="242" y="420" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">backpressure 는 엔진이 주지 않는 기능</text>

  <rect x="480" y="280" width="436" height="180" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="698" y="308" fill="#e8e4df" font-size="13" text-anchor="middle">TPS executor — 다중 인스턴스</text>
  <text x="698" y="336" fill="#e8e4df" font-size="11" text-anchor="middle">결정자 직렬화 = DB 비관 락 (값을 치름)</text>
  <text x="698" y="362" fill="rgb(212,168,83)" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">SELECT … FOR UPDATE</text>
  <text x="698" y="394" fill="#e8e4df" font-size="11" text-anchor="middle">적재량 quota 게이트 — 트리거 전 보류 판단</text>
  <text x="698" y="420" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">/queue · /computer 폴링이 판단 입력</text>

  <!-- 결론 바 -->
  <rect x="24" y="484" width="892" height="52" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="470" y="515" fill="#e8e4df" font-size="12" text-anchor="middle">같은 불변식 — "배정 결정은 직렬화한다" — 단일 JVM 은 메모리 락으로, 분산은 DB 락으로 산다</text>
</svg>
