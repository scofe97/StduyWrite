<svg viewBox="0 0 920 460" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Script Console — 안방의 규칙</title>
  <desc>REST가 바깥 문이라면 콘솔은 컨트롤러 JVM 안방. SYSTEM 권한과 직접 변이의 대가로 save, withLock 규칙을 지켜야 하고, setSorter가 유일한 우선순위 제어 지점.</desc>
  <defs>
    <marker id="arrow9" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="920" height="460" fill="#0d0d0d"/>
  <text x="24" y="34" fill="#e8e4df" font-size="13">바깥 문과 안방 — 같은 객체, 다른 검문</text>

  <!-- REST 패널 -->
  <rect x="24" y="56" width="420" height="150" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="234" y="82" fill="#e8e4df" font-size="12" text-anchor="middle">REST — 바깥 문 (04_api)</text>
  <text x="234" y="110" fill="#e8e4df" font-size="11" text-anchor="middle">Stapler 라우팅 + 권한 검사 통과</text>
  <text x="234" y="134" fill="#e8e4df" font-size="11" text-anchor="middle">큐 조회는 Snapshot 복사본 (락 없음)</text>
  <text x="234" y="162" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">접근 로그가 남는다 — 추적 가능</text>

  <!-- 콘솔 패널 -->
  <rect x="476" y="56" width="420" height="150" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="686" y="82" fill="#e8e4df" font-size="12" text-anchor="middle">Script Console — 안방</text>
  <text x="686" y="110" fill="#e8e4df" font-size="11" text-anchor="middle">컨트롤러 JVM 안 · SYSTEM 신분</text>
  <text x="686" y="134" fill="#e8e4df" font-size="11" text-anchor="middle">변이 중인 실물 객체를 직접 조작</text>
  <text x="686" y="162" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">ACL·Stapler 길목 미적용 — 감사 빈약</text>

  <text x="460" y="138" fill="rgb(212,168,83)" font-size="11" text-anchor="middle">vs</text>

  <!-- 규칙 3개 -->
  <text x="24" y="248" fill="#e8e4df" font-size="13">안방의 규칙 셋</text>

  <rect x="24" y="268" width="280" height="100" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="164" y="294" fill="#e8e4df" font-size="11.5" text-anchor="middle">① 트랜잭션 없음</text>
  <text x="164" y="318" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10.5" text-anchor="middle">save() 가 영속화의 전부</text>
  <text x="164" y="344" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">빠뜨리면 재기동과 함께 증발</text>

  <rect x="320" y="268" width="280" height="100" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="460" y="294" fill="#e8e4df" font-size="11.5" text-anchor="middle">② 복합 조작은 락으로</text>
  <text x="460" y="318" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10.5" text-anchor="middle">Queue.withLock { … }</text>
  <text x="460" y="344" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">조회·변경 사이 maintain() 차단</text>

  <rect x="616" y="268" width="280" height="100" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="756" y="294" fill="#e8e4df" font-size="11.5" text-anchor="middle">③ 우선순위 제어 지점</text>
  <text x="756" y="318" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10.5" text-anchor="middle">Queue.setSorter(QueueSorter)</text>
  <text x="756" y="344" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">REST 에도 레시피 모음에도 없음</text>

  <!-- 결론 -->
  <rect x="24" y="396" width="872" height="44" fill="none" stroke="rgb(42,37,32)" stroke-dasharray="6 4"/>
  <text x="460" y="423" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">FIFO 는 sorter 가 없을 때의 기본값 — maintain() 이 배정 직전에 설치된 sorter 로 buildable 을 정렬한다</text>
</svg>
