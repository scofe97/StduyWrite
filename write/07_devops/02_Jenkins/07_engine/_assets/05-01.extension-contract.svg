<svg viewBox="0 0 920 470" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>확장 3단 계약과 Describable·Descriptor 이중성</title>
  <desc>ExtensionPoint 정의, @Extension 등록, ExtensionList 발견의 3단 계약과, 인스턴스 데이터·싱글턴 메타데이터의 분리.</desc>
  <defs>
    <marker id="arrow7" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="920" height="470" fill="#0d0d0d"/>
  <text x="24" y="34" fill="#e8e4df" font-size="13">3단 계약 — 정의자·구현자·소비자는 서로를 모른다</text>

  <!-- 3단 계약 -->
  <rect x="24" y="56" width="270" height="96" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="159" y="82" fill="#e8e4df" font-size="11.5" text-anchor="middle">① 정의 — 꽂을 자리 선언</text>
  <text x="159" y="106" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10.5" text-anchor="middle">interface Checker</text>
  <text x="159" y="126" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10.5" text-anchor="middle">extends ExtensionPoint</text>

  <rect x="330" y="56" width="270" height="96" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="465" y="82" fill="#e8e4df" font-size="11.5" text-anchor="middle">② 등록 — 어노테이션이 전부</text>
  <text x="465" y="106" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10.5" text-anchor="middle">@Extension class MyChecker</text>
  <text x="465" y="126" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">빌드 시점 인덱스 — 기동 스캔 없음</text>

  <rect x="636" y="56" width="260" height="96" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="766" y="82" fill="#e8e4df" font-size="11.5" text-anchor="middle">③ 발견 — 목록만 받는다</text>
  <text x="766" y="106" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10.5" text-anchor="middle">ExtensionList.lookup()</text>
  <text x="766" y="126" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">QueueTaskDispatcher.all() 의 정체</text>

  <line x1="294" y1="104" x2="326" y2="104" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arrow7)"/>
  <line x1="600" y1="104" x2="632" y2="104" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arrow7)"/>

  <!-- 이중성 -->
  <text x="24" y="208" fill="#e8e4df" font-size="13">이중성 — 설정값은 N개, 메타데이터는 1개</text>

  <rect x="24" y="228" width="420" height="150" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="234" y="254" fill="#e8e4df" font-size="11.5" text-anchor="middle">Describable 인스턴스 — 사용처마다 하나</text>
  <rect x="48" y="272" width="170" height="50" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="133" y="292" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">Job A 의 스텝</text>
  <text x="133" y="312" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">name="배포"</text>
  <rect x="250" y="272" width="170" height="50" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="335" y="292" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">Job B 의 스텝</text>
  <text x="335" y="312" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">name="검증"</text>
  <text x="234" y="356" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">@DataBoundConstructor 로 폼 값이 인스턴스로</text>

  <rect x="480" y="228" width="416" height="150" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="688" y="254" fill="#e8e4df" font-size="11.5" text-anchor="middle">Descriptor 싱글턴 — 클래스당 하나</text>
  <text x="688" y="284" fill="#e8e4df" font-size="11" text-anchor="middle">표시 이름 · doCheckXxx 폼 검증(웹 메서드)</text>
  <text x="688" y="310" fill="#e8e4df" font-size="11" text-anchor="middle">전역 설정 — configure() + bindJSON</text>
  <text x="688" y="340" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10.5" text-anchor="middle">save() → JENKINS_HOME/*.xml</text>

  <line x1="444" y1="303" x2="476" y2="303" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arrow7)"/>
  <text x="460" y="291" fill="rgb(138,133,128)" font-size="9.5" text-anchor="middle">getDescriptor</text>

  <!-- 결론 -->
  <rect x="24" y="404" width="872" height="44" fill="none" stroke="rgb(42,37,32)" stroke-dasharray="6 4"/>
  <text x="460" y="431" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">화면은 Descriptor 목록으로 "고를 것들"을 그리고, 실행은 Describable 인스턴스의 값으로 돈다</text>
</svg>
