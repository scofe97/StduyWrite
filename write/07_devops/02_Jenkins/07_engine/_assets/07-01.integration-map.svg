<svg viewBox="0 0 920 470" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>통합 지형도 — 네 방향의 트래픽</title>
  <desc>정방향 호출이 프록시의 X-Forwarded 계약을 지나고, 역방향 webhook은 HMAC 서명으로, 관측은 Prometheus scrape로 흐르는 통합 구조.</desc>
  <defs>
    <marker id="arrowA" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="920" height="470" fill="#0d0d0d"/>
  <text x="24" y="34" fill="#e8e4df" font-size="13">통합 지형도 — 호출 한 발의 양옆까지</text>

  <!-- 호출자 -->
  <rect x="24" y="70" width="200" height="110" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="124" y="96" fill="#e8e4df" font-size="11.5" text-anchor="middle">외부 시스템 (호출자)</text>
  <text x="124" y="120" fill="#e8e4df" font-size="10.5" text-anchor="middle">SDK 또는 직접 REST</text>
  <text x="124" y="140" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">판단축: API 폭 · 의존성</text>
  <text x="124" y="158" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">수명 · 처리 일관성</text>

  <!-- 프록시 -->
  <rect x="300" y="70" width="280" height="110" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="440" y="96" fill="#e8e4df" font-size="11.5" text-anchor="middle">Reverse Proxy — 헤더 계약</text>
  <text x="440" y="122" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">X-Forwarded-Host · Port</text>
  <text x="440" y="142" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">X-Forwarded-Proto</text>
  <text x="440" y="166" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">어기면 Location 이 내부 주소로 깨진다</text>

  <!-- Jenkins -->
  <rect x="656" y="70" width="240" height="110" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="776" y="96" fill="#e8e4df" font-size="11.5" text-anchor="middle">Jenkins</text>
  <text x="776" y="120" fill="#e8e4df" font-size="10.5" text-anchor="middle">Jenkins URL 설정 = 접근 URL</text>
  <text x="776" y="142" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">어긋나면 reverse proxy</text>
  <text x="776" y="160" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">broken 경고</text>

  <line x1="224" y1="125" x2="296" y2="125" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arrowA)"/>
  <text x="260" y="113" fill="rgb(138,133,128)" font-size="9.5" text-anchor="middle">토큰 인증</text>
  <line x1="580" y1="125" x2="652" y2="125" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arrowA)"/>

  <!-- 역방향 -->
  <rect x="24" y="230" width="420" height="100" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="234" y="256" fill="#e8e4df" font-size="11.5" text-anchor="middle">역방향 — webhook 의 신뢰</text>
  <text x="234" y="282" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">HMAC 본문 서명 (X-Hub-Signature-256)</text>
  <text x="234" y="308" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">같은 비밀로 재서명 비교 — 상수 시간 비교까지 한 세트</text>

  <!-- 관측 -->
  <rect x="476" y="230" width="420" height="100" fill="rgb(26,26,26)" stroke="#66bb6a"/>
  <text x="686" y="256" fill="#e8e4df" font-size="11.5" text-anchor="middle">관측 — Prometheus scrape</text>
  <text x="686" y="282" fill="#66bb6a" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">/prometheus/  ← trailing slash 필수</text>
  <text x="686" y="308" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">큐 길이·executor 사용률 시계열 — 추세와 경보용</text>

  <!-- 게이트 연결 -->
  <rect x="24" y="356" width="872" height="44" fill="none" stroke="rgb(42,37,32)" stroke-dasharray="6 4"/>
  <text x="460" y="383" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">03-02 적재량 게이트의 입력 — 즉시 판단은 REST 폴링으로, 추세·경보는 scrape 시계열로 (용도가 다른 두 채널)</text>

  <!-- 결론 -->
  <rect x="24" y="412" width="872" height="40" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="460" y="437" fill="#e8e4df" font-size="11.5" text-anchor="middle">통합의 사고는 호출 내용보다 양옆 — 의존성 수명과 프록시 계약 — 에서 먼저 터진다</text>
</svg>
