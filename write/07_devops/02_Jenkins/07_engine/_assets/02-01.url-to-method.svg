<svg viewBox="0 0 920 470" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>URL 토큰이 코드에 닿기까지</title>
  <desc>POST /job/foo/build의 토큰 세 개가 Hudson.getJob, doBuild, Queue.schedule2로 풀리고 201 또는 405 응답이 만들어지는 경로.</desc>
  <defs>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="920" height="470" fill="#0d0d0d"/>
  <text x="24" y="34" fill="#e8e4df" font-size="13">POST /job/foo/build — 토큰 세 개가 코드에 닿기까지</text>

  <!-- URL 토큰 행 -->
  <rect x="24" y="60" width="70" height="44" fill="none" stroke="rgb(42,37,32)" stroke-dasharray="4 3"/>
  <text x="59" y="88" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="12" text-anchor="middle">POST</text>
  <text x="103" y="88" fill="rgb(138,133,128)" font-size="12" text-anchor="middle">/</text>
  <rect x="112" y="60" width="146" height="44" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="185" y="88" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="13" text-anchor="middle">job</text>
  <text x="266" y="88" fill="rgb(138,133,128)" font-size="12" text-anchor="middle">/</text>
  <rect x="274" y="60" width="146" height="44" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="347" y="88" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="13" text-anchor="middle">foo</text>
  <text x="428" y="88" fill="rgb(138,133,128)" font-size="12" text-anchor="middle">/</text>
  <rect x="436" y="60" width="146" height="44" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="509" y="88" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="13" text-anchor="middle">build</text>

  <!-- 토큰 두 개 묶음 표시 -->
  <line x1="112" y1="118" x2="420" y2="118" stroke="rgb(42,37,32)" stroke-width="1.5"/>
  <line x1="112" y1="112" x2="112" y2="118" stroke="rgb(42,37,32)" stroke-width="1.5"/>
  <line x1="420" y1="112" x2="420" y2="118" stroke="rgb(42,37,32)" stroke-width="1.5"/>
  <text x="266" y="140" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">getXxx(String) 규칙 — 토큰 두 개를 한 호출로</text>
  <line x1="240" y1="150" x2="170" y2="186" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <text x="600" y="140" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">doXxx 웹 메서드 규칙</text>
  <line x1="540" y1="150" x2="480" y2="186" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- 객체 행 -->
  <rect x="24" y="190" width="270" height="100" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="159" y="216" fill="#e8e4df" font-size="12" text-anchor="middle">Hudson — 루트의 런타임 클래스</text>
  <text x="159" y="242" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">getJob("foo") → getItem</text>
  <text x="159" y="274" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">Jenkins 로 선언, Hudson 으로 동작</text>

  <rect x="330" y="190" width="260" height="100" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="460" y="216" fill="#e8e4df" font-size="12" text-anchor="middle">Job — doBuild()</text>
  <text x="460" y="242" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">ParameterizedJobMixIn</text>
  <text x="460" y="274" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">delay 비면 quiet period 주입</text>

  <rect x="630" y="190" width="266" height="100" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="763" y="216" fill="#e8e4df" font-size="12" text-anchor="middle">Queue — schedule2()</text>
  <text x="763" y="242" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">WaitingItem(id)</text>
  <text x="763" y="274" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">queueId 가 태어나는 곳</text>

  <line x1="294" y1="240" x2="326" y2="240" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="590" y1="240" x2="626" y2="240" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- 응답 행 -->
  <line x1="460" y1="290" x2="460" y2="336" stroke="#f44336" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="478" y="316" fill="rgb(138,133,128)" font-size="10.5">GET</text>
  <rect x="330" y="340" width="260" height="92" fill="rgb(26,26,26)" stroke="#f44336"/>
  <text x="460" y="366" fill="#e8e4df" font-size="12" text-anchor="middle">GET 으로 오면 — 거부</text>
  <text x="460" y="392" fill="#f44336" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">405 + Allow: POST</text>
  <text x="460" y="418" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">requirePOST.jelly 안내 페이지</text>

  <line x1="763" y1="290" x2="763" y2="336" stroke="#66bb6a" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="781" y="316" fill="rgb(138,133,128)" font-size="10.5">POST</text>
  <rect x="630" y="340" width="266" height="92" fill="rgb(26,26,26)" stroke="#66bb6a"/>
  <text x="763" y="366" fill="#e8e4df" font-size="12" text-anchor="middle">POST 통과 — 큐 적재 성공</text>
  <text x="763" y="392" fill="#66bb6a" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">201 + Location: /queue/item/N/</text>
  <text x="763" y="418" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">sendRedirect(SC_CREATED, item.getUrl())</text>
</svg>
