<svg viewBox="0 0 940 480" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>엔진 묶음 전체 지도</title>
  <desc>내부동작·확장·제어·통합 네 축에 배치된 10편과 환경 토대, 이력서 우선 동선.</desc>
  <defs>
    <marker id="arrow0" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="940" height="480" fill="#0d0d0d"/>
  <text x="24" y="34" fill="#e8e4df" font-size="13">엔진 묶음 지도 — 네 축과 열 편, 이력서 동선은 ① 축</text>

  <!-- 축 ① 내부동작 -->
  <rect x="24" y="56" width="300" height="300" fill="none" stroke="rgb(42,37,32)" stroke-dasharray="6 4"/>
  <text x="40" y="80" fill="rgb(212,168,83)" font-size="11">① 내부 동작 (P1 — 이력서 직결)</text>
  <rect x="44" y="96" width="260" height="42" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="174" y="122" fill="#e8e4df" font-size="11" text-anchor="middle">02-01 · 02-02 — Stapler 라우팅</text>
  <rect x="44" y="148" width="260" height="42" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="174" y="174" fill="#e8e4df" font-size="11" text-anchor="middle">03-01 — 큐 라이프사이클 소스</text>
  <rect x="44" y="200" width="260" height="42" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="174" y="226" fill="#e8e4df" font-size="11" text-anchor="middle">03-02 — 배정 알고리즘 · TPS 대조</text>
  <rect x="44" y="252" width="260" height="42" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="174" y="278" fill="#e8e4df" font-size="11" text-anchor="middle">04-01 — CPS 영속화와 재개</text>
  <text x="174" y="330" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">REST 호출의 안쪽 — 04_api 다음 층</text>

  <!-- 축 ② 확장 -->
  <rect x="348" y="56" width="180" height="300" fill="none" stroke="rgb(42,37,32)" stroke-dasharray="6 4"/>
  <text x="364" y="80" fill="rgb(138,133,128)" font-size="11">② 확장</text>
  <rect x="364" y="96" width="148" height="58" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="438" y="120" fill="#e8e4df" font-size="11" text-anchor="middle">05-01 — 계약</text>
  <text x="438" y="140" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">Extension·Descriptor</text>
  <rect x="364" y="168" width="148" height="58" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="438" y="192" fill="#e8e4df" font-size="11" text-anchor="middle">05-02 — 제작</text>
  <text x="438" y="212" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">Maven HPI 한 바퀴</text>

  <!-- 축 ③ 제어 -->
  <rect x="552" y="56" width="180" height="300" fill="none" stroke="rgb(42,37,32)" stroke-dasharray="6 4"/>
  <text x="568" y="80" fill="rgb(138,133,128)" font-size="11">③ 제어</text>
  <rect x="568" y="96" width="148" height="58" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="642" y="120" fill="#e8e4df" font-size="11" text-anchor="middle">06-01 — 콘솔</text>
  <text x="642" y="140" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">엔진 규칙 · setSorter</text>

  <!-- 축 ④ 통합 -->
  <rect x="756" y="56" width="160" height="300" fill="none" stroke="rgb(42,37,32)" stroke-dasharray="6 4"/>
  <text x="772" y="80" fill="rgb(138,133,128)" font-size="11">④ 통합</text>
  <rect x="772" y="96" width="128" height="58" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="836" y="120" fill="#e8e4df" font-size="11" text-anchor="middle">07-01 — SDK</text>
  <text x="836" y="140" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">프록시 · 메트릭</text>

  <!-- 동선 화살표 -->
  <line x1="174" y1="138" x2="174" y2="144" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arrow0)"/>
  <line x1="174" y1="190" x2="174" y2="196" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arrow0)"/>
  <line x1="174" y1="242" x2="174" y2="248" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arrow0)"/>

  <!-- 환경 토대 -->
  <rect x="24" y="380" width="892" height="44" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="470" y="407" fill="#e8e4df" font-size="12" text-anchor="middle">토대 — 01-01 로컬 Docker + 소스 디버깅 환경 (모든 실습의 전제, 경로 A :5005 · 경로 B :8000)</text>

  <!-- 점검 -->
  <rect x="24" y="436" width="892" height="32" fill="none" stroke="rgb(42,37,32)" stroke-dasharray="4 3"/>
  <text x="470" y="457" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">입구·출구 — 00-01 점검 9문 (진입 전 한 번, 완주 후 한 번)</text>
</svg>
