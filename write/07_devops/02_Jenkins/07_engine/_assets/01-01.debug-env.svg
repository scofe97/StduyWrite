<svg viewBox="0 0 880 510" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>경로 A 디버깅 환경 한 장 요약</title>
  <desc>호스트의 IDE와 클론 소스가 Docker 컨테이너의 Jenkins JVM에 JDWP 5005로 attach하는 구조. 소스 태그와 컨테이너 버전 일치가 핵심.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="510" fill="#0d0d0d"/>
  <text x="24" y="34" fill="#e8e4df" font-size="13">경로 A — 운영과 같은 바이너리에 디버거만 붙인다</text>

  <!-- 호스트 프레임 -->
  <rect x="24" y="56" width="380" height="320" fill="none" stroke="rgb(42,37,32)" stroke-dasharray="6 4"/>
  <text x="40" y="80" fill="rgb(138,133,128)" font-size="11">호스트 (macOS)</text>

  <!-- IDE 박스 -->
  <rect x="48" y="100" width="332" height="110" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="214" y="128" fill="#e8e4df" font-size="12" text-anchor="middle">IntelliJ IDEA — Remote JVM Debug</text>
  <text x="214" y="152" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">localhost:5005</text>
  <text x="214" y="186" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">브레이크포인트는 아래 소스 줄에 건다</text>

  <!-- IDE가 소스를 연다 -->
  <line x1="214" y1="230" x2="214" y2="212" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 소스 박스 -->
  <rect x="48" y="230" width="332" height="120" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="214" y="258" fill="#e8e4df" font-size="12" text-anchor="middle">jenkins-core 소스 클론 (~/jenkins-src)</text>
  <text x="214" y="284" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">git checkout jenkins-2.462.3</text>
  <text x="214" y="316" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">grep·코드 읽기의 작업장 — 컨테이너엔 소스 없음</text>

  <!-- 컨테이너 프레임 -->
  <rect x="470" y="56" width="386" height="320" fill="none" stroke="rgb(42,37,32)" stroke-dasharray="6 4"/>
  <text x="486" y="80" fill="rgb(138,133,128)" font-size="11">Docker — jenkins-engine</text>
  <text x="840" y="80" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="end">:8080 · :50000 · :5005</text>

  <!-- JVM 박스 (강조) -->
  <rect x="494" y="100" width="338" height="140" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="663" y="128" fill="#e8e4df" font-size="12" text-anchor="middle">Jenkins JVM — 운영과 같은 WAR</text>
  <text x="663" y="154" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">jenkins/jenkins:2.462.3-lts-jdk17</text>
  <text x="663" y="178" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">-agentlib:jdwp=…address=*:5005</text>
  <text x="663" y="216" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">suspend=n — 디버거 없이도 먼저 기동</text>

  <!-- HOME 박스 -->
  <rect x="494" y="260" width="338" height="90" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="663" y="290" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="12" text-anchor="middle">/var/jenkins_home</text>
  <text x="663" y="320" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">named volume — 재생성에도 상태 보존</text>

  <!-- attach 화살표 -->
  <line x1="380" y1="155" x2="490" y2="155" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="435" y="143" fill="rgb(212,168,83)" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">JDWP :5005</text>

  <!-- 핵심 스트립 -->
  <rect x="24" y="396" width="832" height="44" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="440" y="423" fill="#e8e4df" font-size="12" text-anchor="middle">소스 태그 = 컨테이너 버전 — 어긋나면 브레이크포인트가 엉뚱한 줄에 선다</text>

  <!-- 경로 B 노트 -->
  <rect x="24" y="452" width="832" height="40" fill="none" stroke="rgb(42,37,32)" stroke-dasharray="6 4"/>
  <text x="440" y="477" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">경로 B — mvnDebug hpi:run (:8000) · 내가 만든 플러그인 디버깅 · 05-02 에서 사용</text>
</svg>
