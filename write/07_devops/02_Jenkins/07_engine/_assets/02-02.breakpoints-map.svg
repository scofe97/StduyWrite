<svg viewBox="0 0 900 480" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>브레이크포인트 세 곳과 관찰값 지도</title>
  <desc>한 요청의 호출 스택 위에 service, invoke, doBuild 브레이크포인트가 놓이고 각 자리에서 관찰할 값을 정리한 지도.</desc>
  <rect x="0" y="0" width="900" height="480" fill="#0d0d0d"/>
  <text x="24" y="34" fill="#e8e4df" font-size="13">한 요청의 호출 스택 — 브레이크포인트 세 곳과 관찰값</text>

  <!-- 스택 프레임 -->
  <rect x="24" y="56" width="380" height="330" fill="none" stroke="rgb(42,37,32)" stroke-dasharray="6 4"/>
  <text x="40" y="80" fill="rgb(138,133,128)" font-size="11">호출 스택 (아래가 진입, 위가 종착)</text>

  <!-- doBuild (top) -->
  <rect x="48" y="96" width="332" height="80" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <circle cx="66" cy="120" r="5" fill="rgb(212,168,83)"/>
  <text x="84" y="124" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11">ParameterizedJobMixIn#doBuild</text>
  <text x="84" y="152" fill="rgb(138,133,128)" font-size="10.5">실습 3 — 종착 액션 메서드</text>

  <!-- 디스패치 프레임들 -->
  <rect x="48" y="186" width="332" height="40" fill="none" stroke="rgb(42,37,32)" stroke-dasharray="4 3"/>
  <text x="214" y="211" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">… Stapler 디스패치 프레임들 …</text>

  <!-- invoke -->
  <rect x="48" y="236" width="332" height="80" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <circle cx="66" cy="260" r="5" fill="rgb(212,168,83)"/>
  <text x="84" y="264" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11">Stapler#invoke(req,rsp,root,url)</text>
  <text x="84" y="292" fill="rgb(138,133,128)" font-size="10.5">실습 2 — 그래프 순회 시작</text>

  <!-- service (bottom) -->
  <rect x="48" y="326" width="332" height="50" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <circle cx="66" cy="346" r="5" fill="rgb(212,168,83)"/>
  <text x="84" y="350" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11">Stapler#service</text>
  <text x="84" y="368" fill="rgb(138,133,128)" font-size="10.5">실습 1 — 단일 관문</text>

  <!-- 연결선 -->
  <line x1="380" y1="136" x2="460" y2="136" stroke="rgb(42,37,32)" stroke-width="1.5"/>
  <line x1="380" y1="276" x2="460" y2="276" stroke="rgb(42,37,32)" stroke-width="1.5"/>
  <line x1="380" y1="351" x2="460" y2="351" stroke="rgb(42,37,32)" stroke-width="1.5"/>

  <!-- 관찰 컬럼 -->
  <rect x="460" y="96" width="416" height="80" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="480" y="124" fill="#e8e4df" font-size="11.5">관찰 — delay 가 quiet period(5초)로 채워짐</text>
  <text x="480" y="152" fill="#66bb6a" font-family="'JetBrains Mono',monospace" font-size="11">201 · Location: /queue/item/24/</text>

  <rect x="460" y="236" width="416" height="80" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="480" y="264" fill="#e8e4df" font-size="11.5">관찰 — 루트 객체의 런타임 클래스</text>
  <text x="480" y="292" fill="rgb(212,168,83)" font-family="'JetBrains Mono',monospace" font-size="11">root = hudson.model.Hudson</text>

  <rect x="460" y="326" width="416" height="50" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="480" y="346" fill="#e8e4df" font-size="11.5">관찰 — UI·REST 가 같은 메서드에서 정지</text>
  <text x="480" y="366" fill="rgb(138,133,128)" font-size="10.5">API 전용 경로는 따로 없다</text>

  <!-- 실습 4 대조 -->
  <rect x="24" y="406" width="852" height="56" fill="none" stroke="#f44336" stroke-dasharray="6 4"/>
  <text x="40" y="430" fill="#e8e4df" font-size="11.5">실습 4 — 같은 URL 을 GET 으로 보내는 대조 실험</text>
  <text x="40" y="452" fill="#f44336" font-family="'JetBrains Mono',monospace" font-size="11">405 Method Not Allowed · Allow: POST</text>
</svg>
