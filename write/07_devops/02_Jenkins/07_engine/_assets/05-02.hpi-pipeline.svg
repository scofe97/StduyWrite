<svg viewBox="0 0 920 450" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>플러그인 제작 한 바퀴</title>
  <desc>아키타입 생성, 골격 3파일, hpi:run 개발 루프와 mvnDebug, 패키징과 본 컨테이너 설치까지의 파이프라인.</desc>
  <defs>
    <marker id="arrow8" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="920" height="450" fill="#0d0d0d"/>
  <text x="24" y="34" fill="#e8e4df" font-size="13">제작 한 바퀴 — 골격에서 본 컨테이너 설치까지</text>

  <!-- 생성 -->
  <rect x="24" y="60" width="250" height="80" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="149" y="86" fill="#e8e4df" font-size="11.5" text-anchor="middle">아키타입 생성</text>
  <text x="149" y="110" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">io.jenkins.archetypes:</text>
  <text x="149" y="126" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">hello-world-plugin</text>

  <!-- 골격 -->
  <rect x="312" y="60" width="280" height="80" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="452" y="84" fill="#e8e4df" font-size="11.5" text-anchor="middle">골격 3파일 = 05-01 계약</text>
  <text x="452" y="106" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="9.5" text-anchor="middle">HelloWorldBuilder · DescriptorImpl</text>
  <text x="452" y="124" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="9.5" text-anchor="middle">config.jelly</text>

  <!-- 패키징 -->
  <rect x="630" y="60" width="266" height="80" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="763" y="86" fill="#e8e4df" font-size="11.5" text-anchor="middle">패키징</text>
  <text x="763" y="110" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">mvn package</text>
  <text x="763" y="128" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">target/engine-hello.hpi</text>

  <line x1="274" y1="100" x2="308" y2="100" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arrow8)"/>
  <line x1="592" y1="100" x2="626" y2="100" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arrow8)"/>

  <!-- 개발 루프 -->
  <rect x="312" y="180" width="280" height="110" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="452" y="206" fill="#e8e4df" font-size="11.5" text-anchor="middle">개발 루프 — 임시 Jenkins</text>
  <text x="452" y="230" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">mvn hpi:run -Dport=8081</text>
  <text x="452" y="250" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">URL 에 /jenkins/ 컨텍스트가 붙음</text>
  <text x="452" y="272" fill="rgb(212,168,83)" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">mvnDebug → :8000 (경로 B)</text>
  <line x1="452" y1="144" x2="452" y2="176" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arrow8)"/>
  <text x="478" y="164" fill="rgb(138,133,128)" font-size="9.5">코드 수정 ↔ 재실행 반복</text>

  <!-- 설치 -->
  <rect x="630" y="180" width="266" height="110" fill="rgb(26,26,26)" stroke="#66bb6a"/>
  <text x="763" y="206" fill="#e8e4df" font-size="11.5" text-anchor="middle">본 컨테이너 설치</text>
  <text x="763" y="230" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="9.5" text-anchor="middle">docker cp → plugins/ + 재시작</text>
  <text x="763" y="250" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">또는 UI 업로드 — 결국 같은 자리</text>
  <text x="763" y="272" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">설치 = 디렉토리에 파일 추가</text>
  <line x1="763" y1="144" x2="763" y2="176" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arrow8)"/>

  <!-- 클래스로더 노트 -->
  <rect x="24" y="330" width="872" height="56" fill="none" stroke="rgb(42,37,32)" stroke-dasharray="6 4"/>
  <text x="460" y="354" fill="#e8e4df" font-size="11" text-anchor="middle">로드 후 — 플러그인마다 자기 클래스로더, 부모는 코어 + 선언한 의존 플러그인 (계층 위임)</text>
  <text x="460" y="374" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">OSGi 식 버전 협상·서비스 레지스트리 없음 — 단순한 대신 진단이 쉽다</text>

  <!-- 두 포트 결론 -->
  <rect x="24" y="398" width="872" height="36" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="460" y="421" fill="#e8e4df" font-size="11" text-anchor="middle">디버그 대상이 내 코드면 :8000 (경로 B), 코어면 :5005 (경로 A) — 01-01 의 표가 여기서 완성된다</text>
</svg>
