<svg viewBox="0 0 940 530" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Queue.java 한 장 요약</title>
  <desc>보관함 다섯 개의 전이 흐름, 변이를 직렬화하는 단일 락과 조회용 스냅숏의 비대칭, queueId와 buildNumber의 탄생 지점.</desc>
  <defs>
    <marker id="arrow4" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="940" height="530" fill="#0d0d0d"/>
  <text x="24" y="34" fill="#e8e4df" font-size="13">Queue.java 한 장 — 보관함 다섯, 락 하나, 스냅숏 하나</text>

  <!-- 파일 프레임 -->
  <rect x="24" y="56" width="892" height="330" fill="none" stroke="rgb(42,37,32)" stroke-dasharray="6 4"/>
  <text x="40" y="80" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10">hudson/model/Queue.java</text>
  <text x="210" y="80" fill="rgb(138,133,128)" font-size="10">— master 기준 약 3,300줄</text>

  <!-- 다섯 번째 보관함 콜아웃 -->
  <text x="595" y="102" fill="rgb(212,168,83)" font-size="10.5" text-anchor="middle">REST 시야에 잘 안 잡히는 다섯 번째 보관함</text>

  <!-- 보관함 행 -->
  <rect x="48" y="110" width="160" height="70" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="128" y="136" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">waitingList</text>
  <text x="128" y="160" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">quiet period 대기</text>

  <rect x="300" y="110" width="150" height="70" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="375" y="136" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">buildables</text>
  <text x="375" y="160" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">실행기 대기</text>

  <rect x="520" y="110" width="150" height="70" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="595" y="136" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">pendings</text>
  <text x="595" y="160" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">배정됨 · 시작 전</text>

  <rect x="740" y="110" width="150" height="70" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="815" y="136" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">LeftItem</text>
  <text x="815" y="160" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">취소 또는 실행 시작</text>

  <line x1="208" y1="145" x2="296" y2="145" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arrow4)"/>
  <text x="252" y="133" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">만기</text>
  <line x1="450" y1="145" x2="516" y2="145" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arrow4)"/>
  <text x="483" y="133" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="9.5" text-anchor="middle">makePending</text>
  <line x1="670" y1="145" x2="736" y2="145" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arrow4)"/>
  <text x="703" y="133" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">실행 시작</text>

  <!-- blocked 우회 -->
  <rect x="174" y="220" width="200" height="64" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="274" y="246" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">blockedProjects</text>
  <text x="274" y="268" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">막힘 — 동시 빌드 비활성 등</text>
  <line x1="128" y1="180" x2="216" y2="218" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <text x="146" y="208" fill="rgb(138,133,128)" font-size="10">막힘</text>
  <line x1="340" y1="220" x2="362" y2="184" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <text x="372" y="212" fill="rgb(138,133,128)" font-size="10">해소</text>

  <!-- 락 / 스냅숏 -->
  <rect x="48" y="300" width="400" height="78" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="248" y="324" fill="#e8e4df" font-size="12" text-anchor="middle">변이 — ReentrantLock 하나로 직렬화</text>
  <text x="248" y="348" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">schedule2 · maintain() · cancel</text>
  <text x="248" y="370" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">결정자는 한 시점에 하나</text>

  <rect x="480" y="300" width="416" height="78" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="688" y="324" fill="#e8e4df" font-size="12" text-anchor="middle">조회 — volatile Snapshot 복사본 (락 없음)</text>
  <text x="688" y="348" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">/queue/api/json</text>
  <text x="688" y="370" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">폴링이 큐 전이를 막지 않는다</text>

  <!-- 두 식별자 탄생 -->
  <line x1="248" y1="386" x2="248" y2="406" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <line x1="688" y1="386" x2="688" y2="406" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arrow4)"/>

  <rect x="48" y="410" width="400" height="84" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="248" y="436" fill="#e8e4df" font-size="12" text-anchor="middle">queueId 탄생 — 정문에서</text>
  <text x="248" y="460" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">schedule2() → WaitingItem(id)</text>
  <text x="248" y="482" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">Location 헤더로 호출자에게 전달</text>

  <rect x="480" y="410" width="416" height="84" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="688" y="436" fill="#e8e4df" font-size="12" text-anchor="middle">buildNumber 탄생 — Run 생성자에서</text>
  <text x="688" y="460" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">this.number = assignBuildNumber()</text>
  <text x="688" y="482" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">LeftItem.executable 로 큐와 연결</text>
</svg>
