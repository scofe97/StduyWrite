<svg viewBox="0 0 920 470" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>CPS 영속화와 재개 흐름</title>
  <desc>Groovy 스크립트가 CPS 변환으로 힙 객체 그래프가 되고, program.dat와 pickle로 직렬화되었다가 재기동 후 rehydrate로 재개되는 흐름.</desc>
  <defs>
    <marker id="arrow6" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="920" height="470" fill="#0d0d0d"/>
  <text x="24" y="34" fill="#e8e4df" font-size="13">실행 상태의 이사 — 콜 스택에서 힙으로, 힙에서 디스크로</text>

  <!-- 대비: 콜 스택 -->
  <rect x="24" y="56" width="250" height="70" fill="none" stroke="#f44336" stroke-dasharray="6 4"/>
  <text x="149" y="84" fill="#e8e4df" font-size="11.5" text-anchor="middle">freestyle — 스레드 콜 스택</text>
  <text x="149" y="108" fill="#f44336" font-size="10.5" text-anchor="middle">직렬화 불가 → 재기동에 죽음</text>

  <!-- 변환 행 -->
  <rect x="24" y="160" width="200" height="76" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="124" y="188" fill="#e8e4df" font-size="11.5" text-anchor="middle">Pipeline Groovy</text>
  <text x="124" y="212" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">스크립트 원문</text>

  <rect x="262" y="160" width="180" height="76" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="352" y="188" fill="#e8e4df" font-size="11.5" text-anchor="middle">CPS 변환 (컴파일)</text>
  <text x="352" y="212" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">다음 할 일을 객체로</text>

  <rect x="480" y="160" width="220" height="76" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="590" y="188" fill="#e8e4df" font-size="11.5" text-anchor="middle">힙의 continuation 그래프</text>
  <text x="590" y="212" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">CPS VM thread 가 해석</text>

  <rect x="738" y="160" width="158" height="76" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="817" y="188" fill="#e8e4df" font-size="11.5" text-anchor="middle">직렬화 가능</text>
  <text x="817" y="212" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">내구성의 토대</text>

  <line x1="224" y1="198" x2="258" y2="198" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arrow6)"/>
  <line x1="442" y1="198" x2="476" y2="198" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arrow6)"/>
  <line x1="700" y1="198" x2="734" y2="198" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arrow6)"/>

  <!-- 디스크 행 -->
  <line x1="590" y1="236" x2="590" y2="266" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arrow6)"/>
  <rect x="200" y="270" width="240" height="84" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="320" y="296" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">program.dat</text>
  <text x="320" y="318" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">프로그램 상태 — 미래의 기록</text>
  <text x="320" y="338" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">(workflow/ 는 과거의 기록)</text>

  <rect x="480" y="270" width="240" height="84" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="600" y="296" fill="#e8e4df" font-size="11.5" text-anchor="middle">pickle 치환</text>
  <text x="600" y="318" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">라이브 자원은 보관증으로</text>
  <text x="600" y="338" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">executor 점유 · 워크스페이스</text>

  <!-- 재개 행 -->
  <rect x="24" y="390" width="872" height="56" fill="rgb(26,26,26)" stroke="#66bb6a"/>
  <text x="460" y="414" fill="#e8e4df" font-size="11.5" text-anchor="middle">재기동 → 역직렬화 + pickle 병렬 rehydrate → 전부 성공 시 StepExecution.onResume → 재개</text>
  <text x="460" y="436" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">보관소(노드)가 사라졌으면 rehydrate 실패 — 내구성은 "자원을 되찾을 수 있는 한"의 약속</text>
</svg>
