<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>04-06 — 오버레이/네이티브 라우팅/BGP+ECMP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100vh; }
    body { background: #0d0d0d; color: #e8e4df; font-family: 'Pretendard', -apple-system, system-ui, sans-serif; display: flex; flex-direction: column; overflow: hidden; }
    .container { max-width: 1080px; width: 100%; margin: 0 auto; padding: 20px 24px; display: flex; flex-direction: column; height: 100%; }
    .fixed-header { flex-shrink: 0; }
    .scroll-content { flex: 1; overflow-y: auto; padding-top: 12px; }

    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: rgb(138, 133, 128); font-size: 13px; margin-bottom: 16px; }

    .scenario-selector { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .scenario-pill { background: rgb(26, 26, 26); border: 1px solid rgb(42, 37, 32); border-radius: 20px; color: rgb(138, 133, 128); padding: 6px 16px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .scenario-pill.active { background: rgba(212, 168, 83, 0.15); border-color: rgb(212, 168, 83); color: rgb(212, 168, 83); }
    .scenario-pill:hover { color: #e8e4df; }

    .pipeline { display: flex; align-items: center; justify-content: flex-start; padding: 16px 0; overflow-x: auto; gap: 0; }
    .pipeline-step { display: flex; flex-direction: column; align-items: center; cursor: pointer; min-width: 64px; }
    .step-circle { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgb(26, 26, 26); border: 2px solid rgb(42, 37, 32); color: rgb(138, 133, 128); font-size: 13px; font-weight: 600; transition: all 0.3s; }
    .step-label { margin-top: 6px; font-size: 10px; color: rgb(138, 133, 128); white-space: nowrap; transition: color 0.3s; text-align: center; }
    .pipeline-step.active .step-circle { background: rgba(212, 168, 83, 0.2); border-color: rgb(212, 168, 83); color: rgb(212, 168, 83); box-shadow: 0 0 8px rgba(212, 168, 83, 0.4); animation: node-glow 2s ease-in-out infinite; }
    .pipeline-step.active .step-label { color: rgb(212, 168, 83); }
    .pipeline-step.completed .step-circle { background: rgba(212, 168, 83, 0.1); border-color: rgb(212, 168, 83); color: rgb(212, 168, 83); }
    .pipeline-step.completed .step-label { color: rgb(212, 168, 83); }
    .pipeline-connector { width: 24px; height: 2px; background: rgb(42, 37, 32); margin-bottom: 22px; transition: background 0.5s; flex-shrink: 0; }
    .pipeline-connector.filled { background: rgb(212, 168, 83); }

    .panel { background: #0d0d0d; border: 1px solid rgb(42, 37, 32); border-radius: 8px; padding: 18px; margin-bottom: 14px; }

    .start-overlay { text-align: center; padding: 32px; }
    .btn-start { background: rgba(212, 168, 83, 0.15); border: 1px solid rgb(212, 168, 83); border-radius: 8px; color: rgb(212, 168, 83); padding: 12px 32px; font-size: 16px; cursor: pointer; transition: all 0.2s; }
    .btn-start:hover { background: rgba(212, 168, 83, 0.25); }
    .start-hint { color: rgb(138, 133, 128); font-size: 13px; margin-top: 8px; }

    .controls { display: flex; align-items: center; gap: 16px; padding: 8px 0; border-top: 1px solid rgb(42, 37, 32); margin-top: 8px; }
    .controls-nav { display: flex; gap: 8px; }
    .btn-ctrl { background: rgb(26, 26, 26); border: 1px solid rgb(42, 37, 32); border-radius: 6px; color: #e8e4df; padding: 6px 14px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .btn-ctrl:hover { border-color: rgb(212, 168, 83); color: rgb(212, 168, 83); }
    .btn-play { min-width: 80px; }
    .speed-group { display: flex; gap: 4px; margin-left: auto; }
    .speed-btn { background: transparent; border: 1px solid transparent; border-radius: 4px; color: rgb(138, 133, 128); padding: 4px 10px; font-size: 12px; cursor: pointer; }
    .speed-btn.active { border-color: rgb(42, 37, 32); color: #e8e4df; }
    .step-counter { color: rgb(138, 133, 128); font-size: 13px; font-variant-numeric: tabular-nums; min-width: 56px; text-align: right; }

    /* 토폴로지 */
    .topology { display: flex; gap: 16px; padding: 16px; background: rgb(20, 20, 20); border: 1px solid rgb(42, 37, 32); border-radius: 8px; margin-bottom: 14px; min-height: 280px; flex-wrap: wrap; }
    .col { flex: 1; min-width: 280px; display: flex; flex-direction: column; gap: 10px; }
    .box { border: 1px solid rgb(60, 55, 48); border-radius: 8px; padding: 12px; background: rgb(15, 15, 15); }
    .box-title { font-size: 11px; color: rgb(138, 133, 128); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 600; }
    .iface-row { display: flex; gap: 8px; margin: 6px 0; align-items: center; flex-wrap: wrap; }
    .iface { background: rgb(26, 26, 26); border: 1px solid rgb(42, 37, 32); border-radius: 6px; padding: 6px 10px; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; color: #e8e4df; transition: all 0.4s; }
    .iface.active { background: rgba(212, 168, 83, 0.2); border-color: rgb(212, 168, 83); color: rgb(212, 168, 83); box-shadow: 0 0 10px rgba(212, 168, 83, 0.5); }
    .iface.passed { background: rgba(212, 168, 83, 0.08); border-color: rgba(212, 168, 83, 0.4); color: rgba(212, 168, 83, 0.8); }
    .iface.encap { background: rgba(168, 102, 246, 0.18); border-color: rgb(168, 102, 246); color: rgb(206, 147, 216); }

    .pod-layer { border: 1px dashed rgb(80, 100, 130); border-radius: 6px; padding: 8px 10px; background: rgba(30, 50, 80, 0.15); }
    .root-layer { border: 1px dashed rgb(150, 110, 60); border-radius: 6px; padding: 8px 10px; background: rgba(70, 50, 30, 0.15); }
    .ext-layer { border: 1px dashed rgb(120, 70, 70); border-radius: 6px; padding: 8px 10px; background: rgba(60, 30, 30, 0.15); }
    .layer-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; font-weight: 600; }
    .label-pod { color: rgb(120, 150, 180); }
    .label-root { color: rgb(220, 170, 100); }
    .label-ext { color: rgb(200, 130, 130); }

    .narration-step-title { font-size: 11px; font-weight: 600; color: rgb(212, 168, 83); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .narration-body { font-size: 14px; line-height: 1.6; color: #e8e4df; }
    .hl { color: rgb(212, 168, 83); font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.9em; }
    .ok { color: #66bb6a; }
    .warn { color: rgb(212, 168, 83); }
    .fail { color: #f44336; }
    .bf { color: #ce93d8; font-weight: 600; }

    .db-panel { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; line-height: 1.5; }
    .db-table { width: 100%; border-collapse: collapse; }
    .db-table td { padding: 6px 10px; border-bottom: 1px solid rgb(32, 28, 24); }
    .db-table tr:last-child td { border-bottom: none; }
    .db-key { color: rgb(138, 133, 128); white-space: nowrap; width: 1%; padding-right: 16px; vertical-align: top; }
    .db-val { color: #e8e4df; word-break: break-all; }
    .db-section-title { font-size: 11px; font-weight: 600; color: rgb(138, 133, 128); text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 10px 4px; border-bottom: 1px solid rgb(42, 37, 32); }
    .db-note { color: rgb(138, 133, 128); font-style: italic; font-size: 12px; padding: 8px 10px 0; }
    .changed { color: rgb(212, 168, 83); font-weight: 600; text-shadow: 0 0 6px rgba(212, 168, 83, 0.3); }

    @keyframes node-glow {
      0%   { box-shadow: 0 0 4px rgba(212, 168, 83, 0.2); }
      50%  { box-shadow: 0 0 12px rgba(212, 168, 83, 0.6); }
      100% { box-shadow: 0 0 4px rgba(212, 168, 83, 0.2); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="fixed-header">
      <h1>오버레이 / 네이티브 라우팅 / BGP+ECMP</h1>
      <p class="subtitle">04-06 인터랙티브 시각화 — 노드 사이 Pod 트래픽이 어떤 underlay 메커니즘을 타는지 비교한다</p>

      <div class="scenario-selector">
        <button class="scenario-pill active" onclick="switchScenario(0)">케이스 1: VXLAN 오버레이</button>
        <button class="scenario-pill" onclick="switchScenario(1)">케이스 2: 네이티브 라우팅</button>
        <button class="scenario-pill" onclick="switchScenario(2)">케이스 3: BGP + ECMP LB</button>
      </div>

      <div class="pipeline" id="pipeline"></div>

      <div class="controls" id="controlBar">
        <div class="controls-nav">
          <button class="btn-ctrl" onclick="prevStep()">◀ 이전</button>
          <button class="btn-ctrl btn-play" onclick="togglePlay()" id="playBtn">▶ 재생</button>
          <button class="btn-ctrl" onclick="nextStep()">다음 ▶</button>
        </div>
        <div class="speed-group">
          <button class="speed-btn" onclick="setSpeed(0.5)">0.5x</button>
          <button class="speed-btn active" onclick="setSpeed(1)">1x</button>
          <button class="speed-btn" onclick="setSpeed(2)">2x</button>
        </div>
        <span class="step-counter" id="stepCounter">0 / 0</span>
      </div>
    </div>

    <div class="scroll-content" id="scrollContent">
      <div class="start-overlay" id="startOverlay">
        <button class="btn-start" onclick="startSimulation()">시뮬레이션 시작 ▶</button>
        <p class="start-hint">시나리오를 선택하고 패킷이 어떤 형태로 underlay를 통과하는지 따라간다</p>
      </div>
      <div id="contentPanel" style="display: none;">
        <div class="topology" id="topology"></div>
        <div class="panel" id="narration"></div>
        <div class="panel db-panel" id="dbPanel"></div>
      </div>
    </div>
  </div>

  <script>
    let currentStep = -1;
    let currentScenario = 0;
    let isPlaying = false;
    let playSpeed = 1;
    let timer = null;

    function topoOverlay(active, passed, encap) {
      encap = encap || [];
      const cls = (id) => {
        if (encap.includes(id)) return 'iface encap';
        if (active.includes(id)) return 'iface active';
        if (passed.includes(id)) return 'iface passed';
        return 'iface';
      };
      return `
        <div class="col">
          <div class="box">
            <div class="box-title">Node A · 10.244.0.0/24</div>
            <div class="pod-layer">
              <div class="layer-label label-pod">Pod A</div>
              <div class="iface-row">
                <span class="${cls('a-pod')}">eth0 10.244.0.5</span>
              </div>
            </div>
            <div class="root-layer">
              <div class="layer-label label-root">root netns</div>
              <div class="iface-row">
                <span class="${cls('a-veth')}">veth-A</span>
                <span class="${cls('a-bridge')}">cni0 bridge</span>
              </div>
              <div class="iface-row">
                <span class="${cls('a-vxlan')}">flannel.1 / cilium_vxlan<br>(VXLAN encap)</span>
              </div>
              <div class="iface-row">
                <span class="${cls('a-eth')}">eth0 172.18.0.2</span>
              </div>
            </div>
          </div>
        </div>
        <div class="col">
          <div class="box">
            <div class="box-title">underlay (UDP 4789)</div>
            <div class="iface-row">
              <span class="${cls('underlay')}">VXLAN 패킷<br>outer src/dst = 노드 IP<br>VNI 표시</span>
            </div>
          </div>
          <div class="box">
            <div class="box-title">Node B · 10.244.1.0/24</div>
            <div class="root-layer">
              <div class="layer-label label-root">root netns</div>
              <div class="iface-row">
                <span class="${cls('b-eth')}">eth0 172.18.0.3</span>
              </div>
              <div class="iface-row">
                <span class="${cls('b-vxlan')}">cilium_vxlan<br>(decap)</span>
              </div>
              <div class="iface-row">
                <span class="${cls('b-bridge')}">cni0 bridge</span>
                <span class="${cls('b-veth')}">veth-B</span>
              </div>
            </div>
            <div class="pod-layer">
              <div class="layer-label label-pod">Pod B</div>
              <div class="iface-row">
                <span class="${cls('b-pod')}">eth0 10.244.1.7</span>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function topoNative(active, passed) {
      const cls = (id) => {
        if (active.includes(id)) return 'iface active';
        if (passed.includes(id)) return 'iface passed';
        return 'iface';
      };
      return `
        <div class="col">
          <div class="box">
            <div class="box-title">Node A</div>
            <div class="pod-layer">
              <div class="layer-label label-pod">Pod A</div>
              <div class="iface-row"><span class="${cls('a-pod')}">eth0 10.244.0.5</span></div>
            </div>
            <div class="root-layer">
              <div class="layer-label label-root">root netns (캡슐화 없음)</div>
              <div class="iface-row">
                <span class="${cls('a-veth')}">veth-A</span>
                <span class="${cls('a-route')}">route table<br>10.244.1.0/24 via 172.18.0.3</span>
              </div>
              <div class="iface-row"><span class="${cls('a-eth')}">eth0 (Pod IP 그대로)</span></div>
            </div>
          </div>
        </div>
        <div class="col">
          <div class="box">
            <div class="box-title">underlay router</div>
            <div class="iface-row">
              <span class="${cls('router')}">BGP 학습 prefix<br>10.244.0.0/24 → A<br>10.244.1.0/24 → B<br>10.244.2.0/24 → C</span>
            </div>
            <div class="iface-row">
              <span class="${cls('underlay')}">캡슐화 없는 Pod 패킷<br>src=10.244.0.5 dst=10.244.1.7</span>
            </div>
          </div>
          <div class="box">
            <div class="box-title">Node B</div>
            <div class="root-layer">
              <div class="layer-label label-root">root netns</div>
              <div class="iface-row"><span class="${cls('b-eth')}">eth0</span></div>
              <div class="iface-row"><span class="${cls('b-route')}">route 10.244.1.0/24 dev cni0</span></div>
              <div class="iface-row"><span class="${cls('b-bridge')}">cni0 bridge</span></div>
            </div>
            <div class="pod-layer">
              <div class="layer-label label-pod">Pod B</div>
              <div class="iface-row"><span class="${cls('b-pod')}">eth0 10.244.1.7</span></div>
            </div>
          </div>
        </div>
      `;
    }

    function topoBGP(active, passed) {
      const cls = (id) => {
        if (active.includes(id)) return 'iface active';
        if (passed.includes(id)) return 'iface passed';
        return 'iface';
      };
      return `
        <div class="col">
          <div class="box">
            <div class="box-title">External</div>
            <div class="ext-layer">
              <div class="layer-label label-ext">Client</div>
              <div class="iface-row"><span class="${cls('ext')}">curl 172.16.200.1<br>(LB VIP)</span></div>
            </div>
          </div>
          <div class="box">
            <div class="box-title">Underlay Router (OPNsense / FRR)</div>
            <div class="iface-row">
              <span class="${cls('router')}">routing table<br>172.16.200.1/32 ECMP next-hops:<br>192.168.200.31<br>192.168.200.32<br>192.168.200.33</span>
            </div>
          </div>
        </div>
        <div class="col">
          <div class="box">
            <div class="box-title">Cluster (3 BGP-speaking 노드)</div>
            <div class="iface-row">
              <span class="${cls('n1')}">Node 1 192.168.200.31<br>광고: 172.16.200.1/32</span>
            </div>
            <div class="iface-row">
              <span class="${cls('n2')}">Node 2 192.168.200.32<br>광고: 172.16.200.1/32</span>
            </div>
            <div class="iface-row">
              <span class="${cls('n3')}">Node 3 192.168.200.33<br>광고: 172.16.200.1/32</span>
            </div>
          </div>
          <div class="box">
            <div class="box-title">Service backend</div>
            <div class="pod-layer">
              <div class="layer-label label-pod">payment Service endpoints</div>
              <div class="iface-row">
                <span class="${cls('pod1')}">Pod 1 (Node 1)</span>
                <span class="${cls('pod2')}">Pod 2 (Node 2)</span>
                <span class="${cls('pod3')}">Pod 3 (Node 3)</span>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function db(rows, opts) {
      let html = '<table class="db-table">';
      if (opts && opts.section) html += '<tr><td colspan="2" class="db-section-title">' + opts.section + '</td></tr>';
      rows.forEach(r => { html += '<tr><td class="db-key">' + r[0] + '</td><td class="db-val">' + r[1] + '</td></tr>'; });
      html += '</table>';
      if (opts && opts.note) html += '<div class="db-note">' + opts.note + '</div>';
      return html;
    }
    function dbMulti(sections) { return sections.map(s => db(s.rows, s)).join(''); }

    const scenarios = {
      // ============ 케이스 1: VXLAN 오버레이 ============
      0: {
        title: '케이스 1: VXLAN 오버레이',
        nodes: [
          {
            label: 'Pod A 송신',
            topo: () => topoOverlay(['a-pod'], []),
            narration: 'Pod A가 dst=10.244.1.7로 패킷을 보낸다. 이 IP는 underlay에는 알려지지 않은 Pod CIDR이다.',
            db: () => db([
              ['src', '10.244.0.5'],
              ['dst', '10.244.1.7'],
              ['underlay 인지?', '아니오 — Pod CIDR은 underlay 외부']
            ])
          },
          {
            label: 'veth + bridge',
            topo: () => topoOverlay(['a-veth', 'a-bridge'], ['a-pod']),
            narration: '노드 root 네임스페이스의 veth와 bridge를 거쳐 라우팅 결정 직전까지 도달한다.',
            db: () => db([
              ['inner src', '10.244.0.5'],
              ['inner dst', '10.244.1.7'],
              ['MTU', '1450 (50바이트 여유)']
            ])
          },
          {
            label: 'VXLAN encap',
            topo: () => topoOverlay(['a-vxlan'], ['a-pod', 'a-veth', 'a-bridge'], ['a-vxlan']),
            narration: '<span class="hl">flannel.1</span> 또는 <span class="hl">cilium_vxlan</span> 인터페이스가 outer 헤더를 붙인다. 안쪽 Pod 패킷은 그대로 두고 바깥에 노드 IP로 감싼다.',
            db: () => dbMulti([
              { section: 'Outer 헤더', rows: [
                ['src', '<span class="changed">172.18.0.2 (Node A)</span>'],
                ['dst', '<span class="changed">172.18.0.3 (Node B)</span>'],
                ['proto', 'UDP 4789 (VXLAN)'],
                ['VNI', '1']
              ]},
              { section: 'Inner 패킷', rows: [
                ['src', '10.244.0.5 (Pod A — 그대로 보존)'],
                ['dst', '10.244.1.7 (Pod B)']
              ]}
            ])
          },
          {
            label: 'underlay 운반',
            topo: () => topoOverlay(['underlay', 'a-eth'], ['a-pod', 'a-veth', 'a-bridge', 'a-vxlan']),
            narration: '캡슐화된 패킷은 평범한 UDP 트래픽처럼 underlay를 흐른다. underlay는 안쪽 Pod IP를 보지 않는다.',
            db: () => db([
              ['underlay 보는 것', 'UDP 4789 src=NodeA dst=NodeB'],
              ['전송 단위', '50바이트 추가된 1500바이트 패킷']
            ])
          },
          {
            label: 'Node B decap',
            topo: () => topoOverlay(['b-eth', 'b-vxlan'], ['a-pod', 'a-veth', 'a-bridge', 'a-vxlan', 'underlay'], ['b-vxlan']),
            narration: 'Node B의 동일 인터페이스가 outer 헤더를 떼어내고 inner 패킷을 꺼낸다.',
            db: () => db([
              ['decap', 'outer UDP+VXLAN 제거'],
              ['남은 패킷', 'Pod A → Pod B 원본']
            ])
          },
          {
            label: 'Pod B 도착',
            topo: () => topoOverlay(['b-pod'], ['a-pod', 'a-veth', 'a-bridge', 'a-vxlan', 'underlay', 'b-eth', 'b-vxlan', 'b-bridge', 'b-veth']),
            narration: 'bridge → veth → Pod B 순으로 도달. <span class="bf">underlay에 무엇을 알리지 않아도 노드 사이 통신이 성립한다는 것이 오버레이의 강점</span>.',
            db: () => db([
              ['수신 패킷', 'Pod 원본 그대로'],
              ['CPU 비용', 'encap+decap (Cilium은 datapath에서 hardware offload 가능)'],
              ['MTU 비용', '50바이트 손실']
            ], { note: 'underlay 통제권이 없는 환경에서 가장 흔한 선택' })
          }
        ]
      },

      // ============ 케이스 2: 네이티브 라우팅 ============
      1: {
        title: '케이스 2: 네이티브 라우팅',
        nodes: [
          {
            label: 'Pod A 송신',
            topo: () => topoNative(['a-pod'], []),

          },
          {
            label: 'route lookup',
            topo: () => topoNative(['a-veth', 'a-route'], ['a-pod']),
            narration: '노드 라우팅 테이블이 dst 10.244.1.0/24의 next-hop을 Node B의 IP로 알고 있어 그쪽으로 보낸다. 캡슐화는 없다.',
            db: () => db([

            db: () => dbMulti([
              { section: 'underlay 패킷', rows: [
                ['src', '10.244.0.5 (그대로)'],
                ['dst', '10.244.1.7 (그대로)'],
                ['outer 헤더', '<span class="ok">없음</span>']
              ]},
              { section: 'router 라우팅', rows: [
                ['matched', '10.244.1.0/24 via 172.18.0.3'],
                ['source', 'BGP 학습 또는 클라우드 routing table']

            ])
          },
          {
            label: 'Node B route',
            topo: () => topoNative(['b-eth', 'b-route', 'b-bridge'], ['a-pod', 'a-veth', 'a-route', 'router', 'a-eth', 'underlay']),
            narration: 'Node B는 자기 라우팅 테이블에서 10.244.1.0/24가 cni0 dev로 가도록 잡아 둔 항목으로 매칭해 bridge로 보낸다.',
            db: () => db([
              ['Node B route', '10.244.1.0/24 dev cni0 scope link'],
              ['encap', '없음 — 그대로 전달']
            ])
          },
          {
            label: 'Pod B 도착',
            topo: () => topoNative(['b-pod'], ['a-pod', 'a-veth', 'a-route', 'router', 'a-eth', 'underlay', 'b-eth', 'b-route', 'b-bridge']),
            narration: 'Pod B가 패킷을 수신한다. <span class="bf">MTU 손실 없음, encap CPU 없음</span>. 다만 underlay에 Pod CIDR 광고가 필요하다는 전제가 깔려야 한다.',
            db: () => db([
              ['MTU', '1500 (그대로)'],
              ['CPU', 'encap/decap 없음'],
              ['전제', '<span class="warn">underlay가 Pod CIDR을 학습할 수 있어야 함</span>'],

            ])
          }
        ]
      },

      // ============ 케이스 3: BGP + ECMP LB ============
      2: {
        title: '케이스 3: BGP + ECMP LoadBalancer',
        nodes: [
          {
            label: 'BGP 광고',
            topo: () => topoBGP(['n1', 'n2', 'n3', 'router'], []),
            narration: '노드 1·2·3이 모두 같은 LoadBalancer VIP <span class="hl">172.16.200.1/32</span>을 BGP로 외부 라우터에 광고한다.',
            db: () => dbMulti([
              { section: 'BGP 광고', rows: [
                ['VIP', '172.16.200.1/32'],
                ['next-hops', '192.168.200.31, .32, .33'],
                ['ASN', '65001 (cluster) → 65000 (router)']

              { section: 'router 동작', rows: [

              ['ingress to', 'Node 2 192.168.200.32'],

            db: () => db([
              ['선택된 backend', '<span class="changed">Pod 2 (Node 2 로컬)</span>'],
              ['관련 컴포넌트', '<span class="bf">Cilium BGP · ECMP · Service dataplane</span>'],
              ['페일오버', '노드 죽으면 BGP 컨버전스 후 다른 노드로 자동 분산']
            ], { note: 'BGP+ECMP는 클라우드 LB 없는 사내 환경의 표준 패턴' })
          }
        ]
      }
    };

    function renderPipeline() {
      const pipeline = document.getElementById('pipeline');
      const nodes = scenarios[currentScenario].nodes;
      pipeline.innerHTML = '';
      nodes.forEach((node, i) => {
        if (i > 0) {
          const conn = document.createElement('div');
          conn.className = 'pipeline-connector' + (i <= currentStep ? ' filled' : '');
          pipeline.appendChild(conn);
        }
        const el = document.createElement('div');
        el.className = 'pipeline-step' + (i === currentStep ? ' active' : '') + (i < currentStep ? ' completed' : '');
        el.onclick = () => goToStep(i);
        el.innerHTML = '<div class="step-circle">' + (i + 1) + '</div><div class="step-label">' + node.label + '</div>';
        pipeline.appendChild(el);
      });
    }

    function goToStep(n) {
      const nodes = scenarios[currentScenario].nodes;
      if (n < 0 || n >= nodes.length) return;
      currentStep = n;
      const node = nodes[n];
      document.getElementById('topology').innerHTML = node.topo();
      document.getElementById('narration').innerHTML
        = '<div class="narration-step-title">Step ' + (n + 1) + ': ' + node.label + '</div>'
        + '<div class="narration-body">' + node.narration + '</div>';
      document.getElementById('dbPanel').innerHTML = typeof node.db === 'function' ? node.db() : (node.db || '');
      document.getElementById('stepCounter').textContent = (n + 1) + ' / ' + nodes.length;
      renderPipeline();
    }

    function nextStep() { goToStep(currentStep + 1); }
    function prevStep() { goToStep(currentStep - 1); }

    function switchScenario(index) {
      currentScenario = index;
      currentStep = -1;
      stopPlay();
      document.querySelectorAll('.scenario-pill').forEach((el, i) => el.classList.toggle('active', i === index));
      renderPipeline();
      document.getElementById('stepCounter').textContent = '0 / ' + scenarios[index].nodes.length;
      if (document.getElementById('startOverlay').style.display !== 'none') return;
      goToStep(0);
    }

    function startSimulation() {
      document.getElementById('startOverlay').style.display = 'none';
      document.getElementById('contentPanel').style.display = 'block';
      goToStep(0);
    }

    function togglePlay() {
      if (document.getElementById('startOverlay').style.display !== 'none') startSimulation();
      if (isPlaying) { stopPlay(); return; }
      if (currentStep === -1) goToStep(0);
      isPlaying = true;
      document.getElementById('playBtn').textContent = '⏸ 정지';
      timer = setInterval(() => {
        const nodes = scenarios[currentScenario].nodes;
        if (currentStep >= nodes.length - 1) { stopPlay(); return; }
        nextStep();
      }, 3000 / playSpeed);
    }

    function stopPlay() {
      isPlaying = false;
      if (timer) { clearInterval(timer); timer = null; }
      document.getElementById('playBtn').textContent = '▶ 재생';
    }

    function setSpeed(speed) {
      playSpeed = speed;
      document.querySelectorAll('.speed-btn').forEach(el => el.classList.toggle('active', parseFloat(el.textContent) === speed));
      if (isPlaying) { stopPlay(); togglePlay(); }
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderPipeline();
      document.getElementById('stepCounter').textContent = '0 / ' + scenarios[0].nodes.length;
    });
  </script>
</body>
</html>
