<svg viewBox="0 0 860 470" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>sigstore 서명·검증 흐름과 admission control</title>
  <desc>위: sigstore 세 구성 요소. cosign 이 이미지·SBOM·attestation 을 서명하고, fulcio 가 OIDC 신원(Google·GitHub) 기반으로 단기 인증서를 keyless 로 발급하며, rekor 가 서명 작업을 불변 로그에 기록한다. 가운데: 이미지에 SBOM·attestation 을 붙이고 서명해 레지스트리에 저장하고, 배포 시 cosign verify 로 서명·provenance 를 검증한다. 아래: admission controller(Kyverno·OPA Gatekeeper)가 배포 직전에 스캔 여부·신뢰 레지스트리·서명·승인·root 실행을 점검해 앞 단계 우회를 막는 마지막 관문이 된다.</desc>

  <rect x="0" y="0" width="860" height="470" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">sigstore 서명·검증 — 진위를 증명하는 쪽</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">서명된 이미지가 있어도 서명을 확인하지 않으면 의미가 없다</text>

  <!-- sigstore 3 구성 요소 -->
  <rect x="32" y="84" width="256" height="92" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="8"/>
  <text x="160" y="108" fill="rgb(212,168,83)" font-family="'JetBrains Mono', monospace" font-size="14" text-anchor="middle">cosign</text>
  <text x="160" y="132" fill="#e8e4df" font-size="11" text-anchor="middle">이미지·SBOM·attestation</text>
  <text x="160" y="150" fill="#e8e4df" font-size="11" text-anchor="middle">서명·검증</text>
  <text x="160" y="168" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">sign / verify / attach</text>

  <rect x="304" y="84" width="256" height="92" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="432" y="108" fill="rgb(212,168,83)" font-family="'JetBrains Mono', monospace" font-size="14" text-anchor="middle">fulcio</text>
  <text x="432" y="132" fill="#e8e4df" font-size="11" text-anchor="middle">단기 인증서 발급 CA</text>
  <text x="432" y="150" fill="#66bb6a" font-size="11" text-anchor="middle">keyless — OIDC 기반</text>
  <text x="432" y="168" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">Google·GitHub 계정 → 키 관리 불필요</text>

  <rect x="576" y="84" width="252" height="92" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="702" y="108" fill="rgb(212,168,83)" font-family="'JetBrains Mono', monospace" font-size="14" text-anchor="middle">rekor</text>
  <text x="702" y="132" fill="#e8e4df" font-size="11" text-anchor="middle">서명 작업을</text>
  <text x="702" y="150" fill="#e8e4df" font-size="11" text-anchor="middle">불변(immutable) 로그에 기록</text>
  <text x="702" y="168" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">투명성 보장</text>

  <!-- 서명 → 검증 흐름 -->
  <defs>
    <marker id="ss" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <rect x="32" y="200" width="248" height="84" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="156" y="224" fill="#e8e4df" font-size="13" text-anchor="middle">① 붙이고 서명</text>
  <text x="156" y="246" fill="rgb(138,133,128)" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="middle">cosign attach sbom</text>
  <text x="156" y="262" fill="rgb(138,133,128)" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="middle">cosign attach attestation</text>
  <text x="156" y="278" fill="rgb(138,133,128)" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="middle">cosign sign</text>

  <rect x="306" y="200" width="248" height="84" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="430" y="224" fill="#e8e4df" font-size="13" text-anchor="middle">② 레지스트리 저장</text>
  <text x="430" y="248" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">서명·attestation 이</text>
  <text x="430" y="266" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">이미지 매니페스트의 일부</text>

  <rect x="580" y="200" width="248" height="84" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="6"/>
  <text x="704" y="224" fill="#e8e4df" font-size="13" text-anchor="middle">③ 배포 시 검증</text>
  <text x="704" y="246" fill="rgb(138,133,128)" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="middle">cosign verify</text>
  <text x="704" y="262" fill="rgb(138,133,128)" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="middle">verify-attestation</text>
  <text x="704" y="278" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">slsa-verifier (provenance)</text>

  <line x1="280" y1="242" x2="306" y2="242" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ss)"/>
  <line x1="554" y1="242" x2="580" y2="242" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ss)"/>

  <!-- admission control -->
  <text x="32" y="312" fill="#e8e4df" font-size="16">admission control — 배포 직전의 마지막 관문</text>
  <rect x="32" y="324" width="796" height="86" fill="#66bb6a" fill-opacity="0.10" stroke="#66bb6a" rx="6"/>
  <text x="48" y="346" fill="#e8e4df" font-size="12">Kyverno · OPA Gatekeeper — 정책 실패 시 컨테이너가 돌지 않음</text>
  <text x="48" y="370" fill="rgb(138,133,128)" font-size="11">점검: 스캔됐는가 · 신뢰 레지스트리인가 · 신뢰 서명인가 · 승인됐는가 · root 로 도는가</text>
  <text x="48" y="394" fill="rgb(138,133,128)" font-size="11">앞 단계(CI 스캔 등)를 우회하지 못하게 막는 마지막 관문 — 스캔 안 된 이미지 배포 지시를 차단</text>

  <!-- 결론 -->
  <text x="32" y="442" fill="rgb(138,133,128)" font-size="12">build attestation(in-toto): 소스·커밋·빌드환경·툴체인·누가·언제 → 빌드 과정 변조 여부까지 증명</text>
  <text x="32" y="462" fill="rgb(138,133,128)" font-size="12">SBOM·attestation 첨부는 선택이나 좋은 관행 — 더 높은 SLSA 등급에 기여</text>
</svg>
