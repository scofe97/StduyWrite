<svg viewBox="0 0 860 500" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>이미지 스캐닝과 shift-left CI/CD 파이프라인</title>
  <desc>위: 같은 이미지에서 수백 개 컨테이너 인스턴스가 뜨므로, 인스턴스마다 스캔하면 같은 의존성을 수백 번 보게 된다. 컨테이너를 불변으로 다루면 이미지 하나만 스캔해 모든 인스턴스의 취약점을 커버할 수 있다. 단 런타임에 코드를 내려받으면 재현·SBOM·provenance 가 깨져 이 전제가 무너진다. 가운데: shift-left 파이프라인 — 개발자 스캔, 빌드 시 스캔(심각도 초과 시 빌드 실패), 레지스트리 정기 스캔(SBOM 으로 가속), 그리고 배포 직전 admission control 이 스캔 통과·서명을 강제해 우회를 막는다. 아래: NVD 만 의존, 출처 노후화, won't-fix, 서브패키지, 패키지명 차이, VEX 미반영이 스캐너마다 결과를 다르게 만드는 원인이다.</desc>

  <rect x="0" y="0" width="860" height="500" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">이미지 스캐닝과 shift-left 파이프라인</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">컨테이너가 아니라 이미지를 스캔한다 — 단, 컨테이너가 불변일 때만 성립한다</text>

  <!-- 이미지 1 → 인스턴스 N -->
  <defs>
    <marker id="sp" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <rect x="32" y="84" width="160" height="92" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="8"/>
  <text x="112" y="112" fill="rgb(212,168,83)" font-size="14" text-anchor="middle">이미지 1개</text>
  <text x="112" y="136" fill="#e8e4df" font-size="11" text-anchor="middle">여기만 스캔</text>
  <text x="112" y="158" fill="#66bb6a" font-size="11" text-anchor="middle">한 번 = 전부 커버</text>

  <rect x="280" y="84" width="120" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="340" y="109" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">인스턴스 1</text>
  <rect x="280" y="132" width="120" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="340" y="157" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">인스턴스 2 …</text>
  <rect x="420" y="108" width="120" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="480" y="133" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">인스턴스 N (수백)</text>

  <line x1="192" y1="118" x2="280" y2="104" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#sp)"/>
  <line x1="192" y1="130" x2="280" y2="150" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#sp)"/>
  <line x1="192" y1="140" x2="420" y2="128" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#sp)"/>

  <rect x="572" y="84" width="256" height="92" fill="#f44336" fill-opacity="0.10" stroke="#f44336" rx="8"/>
  <text x="700" y="108" fill="#e8e4df" font-size="12" text-anchor="middle">전제: 컨테이너 불변(immutable)</text>
  <text x="700" y="130" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">런타임 다운로드 시 깨짐:</text>
  <text x="700" y="148" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">재현 불가 · SBOM 무의미</text>
  <text x="700" y="166" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">provenance 무력화 → drift 방지</text>

  <!-- shift-left 파이프라인 -->
  <text x="32" y="212" fill="#e8e4df" font-size="16">shift-left — 왼쪽에서 일찍 막을수록 싸고 빠르다</text>

  <rect x="32" y="226" width="172" height="70" fill="#66bb6a" fill-opacity="0.10" stroke="#66bb6a" rx="6"/>
  <text x="118" y="250" fill="rgb(212,168,83)" font-size="12" text-anchor="middle">① 개발자 스캔</text>
  <text x="118" y="272" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">로컬 빌드 스캔</text>
  <text x="118" y="288" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">push 전 수정</text>

  <rect x="220" y="226" width="172" height="70" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="6"/>
  <text x="306" y="250" fill="rgb(212,168,83)" font-size="12" text-anchor="middle">② 빌드 시 스캔</text>
  <text x="306" y="272" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">심각도 초과 시</text>
  <text x="306" y="288" fill="#f44336" font-size="10" text-anchor="middle">빌드 실패 → 배포 차단</text>

  <rect x="408" y="226" width="172" height="70" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="494" y="250" fill="rgb(212,168,83)" font-size="12" text-anchor="middle">③ 레지스트리 스캔</text>
  <text x="494" y="272" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">24h 마다 재스캔</text>
  <text x="494" y="288" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">SBOM 으로 가속</text>

  <rect x="596" y="226" width="232" height="70" fill="#66bb6a" fill-opacity="0.10" stroke="#66bb6a" rx="6"/>
  <text x="712" y="250" fill="rgb(212,168,83)" font-size="12" text-anchor="middle">④ admission control</text>
  <text x="712" y="272" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">Kyverno · OPA Gatekeeper</text>
  <text x="712" y="288" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">스캔 통과·서명 강제 → 우회 차단</text>

  <line x1="204" y1="261" x2="220" y2="261" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#sp)"/>
  <line x1="392" y1="261" x2="408" y2="261" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#sp)"/>
  <line x1="580" y1="261" x2="596" y2="261" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#sp)"/>

  <!-- 결과 차이 원인 -->
  <text x="32" y="332" fill="#e8e4df" font-size="16">스캐너마다 결과가 다른 이유</text>
  <text x="32" y="352" fill="rgb(138,133,128)" font-size="12">"정답인 결과 집합"은 없다 — 출처·정책·메타데이터 해석이 도구마다 다르다</text>

  <rect x="32" y="366" width="256" height="48" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="160" y="388" fill="#e8e4df" font-size="12" text-anchor="middle">NVD 만 의존</text>
  <text x="160" y="406" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">배포판 권고 없으면 거짓 양성↑</text>

  <rect x="302" y="366" width="256" height="48" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="430" y="388" fill="#e8e4df" font-size="12" text-anchor="middle">출처 노후화 · won't-fix</text>
  <text x="430" y="406" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">Alpine aports 전환 · 안 고침 표시 정책</text>

  <rect x="572" y="366" width="256" height="48" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="700" y="388" fill="#e8e4df" font-size="12" text-anchor="middle">서브패키지 · 패키지명</text>
  <text x="700" y="406" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">거짓 양성 / 거짓 음성</text>

  <!-- 결론 -->
  <text x="32" y="446" fill="rgb(138,133,128)" font-size="12">VEX 입력 → 악용 불가 CVE 걸러 거짓 양성↓ · 정적 링크(scratch)는 syft·.note.go.buildinfo 로 분석</text>
  <text x="32" y="466" fill="rgb(138,133,128)" font-size="12">악용 평균 5일(2023) vs 패치 주기 30~45일 → shift-left·자동 재빌드(Dependabot)로 간극 단축</text>
  <text x="32" y="486" fill="#f44336" font-size="12">제로데이(70%)는 DB 대조로 못 잡음 → 런타임 비정상 행위 탐지가 최선의 방어(Ch 15)</text>
</svg>
