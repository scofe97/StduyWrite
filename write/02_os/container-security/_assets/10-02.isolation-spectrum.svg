<svg viewBox="0 0 860 500" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>격리 스펙트럼 — 커널을 얼마나 떼어 놓느냐</title>
  <desc>격리 방식은 커널을 얼마나 떼어 놓느냐로 갈린다. 왼쪽부터 오른쪽으로 격리가 강해지고 성능 비용도 커진다. 일반 컨테이너는 호스트 커널을 공유해 가장 가볍지만 커널 취약점(Dirty COW)에 노출된다. gVisor 는 Sentry 가 syscall 을 가로채 사용자 공간에서 재구현하고 Gofer 가 파일 접근을 맡아, 사용자 공간 게스트 커널로 동작한다 — 컨테이너와 VM 사이다. Kata 와 마이크로VM(Firecracker·Cloud Hypervisor·Edera·Apple)은 컨테이너마다 자기 커널을 가진 가벼운 VM 안에 넣어, 컨테이너 탈출이 가상화 탈출을 통해서만 가능하다. unikernel 은 앱과 필요한 OS 부분만 합친 전용 이미지로 공격 표면을 최소화한다. VM 격리는 강하지만 공유 커널이 없어 eBPF 도구가 가시성을 잃고 성능 페널티가 따른다.</desc>

  <rect x="0" y="0" width="860" height="500" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">격리 스펙트럼 — 커널을 얼마나 떼어 놓느냐</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">왼쪽 → 오른쪽: 격리 강해짐 · 성능 비용 커짐 · 공유 커널 멀어짐</text>

  <!-- 화살표 축 -->
  <defs>
    <marker id="ax" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="rgb(138,133,128)"/>
    </marker>
  </defs>
  <line x1="32" y1="86" x2="828" y2="86" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ax)"/>
  <text x="40" y="80" fill="#66bb6a" font-size="11">가벼움 · 격리 약함</text>
  <text x="700" y="80" fill="#f44336" font-size="11">무거움 · 격리 강함</text>

  <!-- 1) 일반 컨테이너 -->
  <rect x="32" y="100" width="190" height="160" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="127" y="124" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">일반 컨테이너</text>
  <text x="127" y="146" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">+ seccomp·AppArmor</text>
  <text x="127" y="162" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">·SELinux (10-01)</text>
  <rect x="48" y="176" width="158" height="34" fill="rgb(42,37,32)" rx="4"/>
  <text x="127" y="198" fill="#e8e4df" font-size="11" text-anchor="middle">호스트 커널 공유</text>
  <rect x="48" y="216" width="158" height="32" fill="#f44336" fill-opacity="0.12" stroke="#f44336" rx="4"/>
  <text x="127" y="236" fill="#f44336" font-size="10" text-anchor="middle">커널 취약점 노출(Dirty COW)</text>

  <!-- 2) gVisor -->
  <rect x="238" y="100" width="190" height="160" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="8"/>
  <text x="333" y="124" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">gVisor</text>
  <text x="333" y="146" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">컨테이너 ~ VM 사이</text>
  <rect x="254" y="158" width="158" height="34" fill="rgb(42,37,32)" rx="4"/>
  <text x="333" y="180" fill="#e8e4df" font-size="10" text-anchor="middle">Sentry: syscall 가로채</text>
  <rect x="254" y="198" width="158" height="28" fill="rgb(42,37,32)" rx="4"/>
  <text x="333" y="217" fill="#e8e4df" font-size="10" text-anchor="middle">Gofer: 파일 접근</text>
  <text x="333" y="246" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">사용자 공간 게스트 커널</text>

  <!-- 3) Kata / 마이크로VM -->
  <rect x="444" y="100" width="190" height="160" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="539" y="124" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">Kata · 마이크로VM</text>
  <text x="539" y="146" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">컨테이너마다 자기 커널</text>
  <rect x="460" y="156" width="158" height="50" fill="rgb(42,37,32)" rx="4"/>
  <text x="539" y="176" fill="#e8e4df" font-size="9" text-anchor="middle">Firecracker · Cloud Hypervisor</text>
  <text x="539" y="194" fill="#e8e4df" font-size="9" text-anchor="middle">Edera · Apple (~100ms)</text>
  <rect x="460" y="212" width="158" height="34" fill="#66bb6a" fill-opacity="0.12" stroke="#66bb6a" rx="4"/>
  <text x="539" y="233" fill="#66bb6a" font-size="9" text-anchor="middle">탈출 = 가상화 탈출 통해서만</text>

  <!-- 4) unikernel -->
  <rect x="650" y="100" width="178" height="160" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="739" y="124" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">unikernel</text>
  <text x="739" y="146" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">컨테이너 아님 · 다른 격리</text>
  <rect x="666" y="158" width="146" height="48" fill="rgb(42,37,32)" rx="4"/>
  <text x="739" y="178" fill="#e8e4df" font-size="10" text-anchor="middle">앱 + 필요한 OS 만</text>
  <text x="739" y="196" fill="#e8e4df" font-size="10" text-anchor="middle">전용 이미지 컴파일</text>
  <text x="739" y="226" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">Nabla(7 syscall) · Unikraft</text>
  <text x="739" y="244" fill="#66bb6a" font-size="9" text-anchor="middle">공격 표면 최소</text>

  <!-- device model 절약 -->
  <line x1="32" y1="284" x2="828" y2="284" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="32" y="312" fill="#e8e4df" font-size="15">마이크로VM 이 빠른 비결 · VM 격리의 트레이드오프</text>

  <rect x="32" y="326" width="388" height="68" fill="#66bb6a" fill-opacity="0.10" stroke="#66bb6a" rx="6"/>
  <text x="226" y="350" fill="#e8e4df" font-size="12" text-anchor="middle">왜 빠른가 — 최소 device model</text>
  <text x="226" y="372" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">장치 열거가 부팅의 최대 병목</text>
  <text x="226" y="388" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">컨테이너는 장치 거의 불필요 → 덜어냄</text>

  <rect x="440" y="326" width="388" height="68" fill="#f44336" fill-opacity="0.10" stroke="#f44336" rx="6"/>
  <text x="634" y="350" fill="#e8e4df" font-size="12" text-anchor="middle">VM 격리의 단점</text>
  <text x="634" y="372" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">비공유 커널 → eBPF 도구 가시성 상실</text>
  <text x="634" y="388" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">사이드카 모델에 가까워짐 · 성능 페널티</text>

  <!-- 선택 -->
  <text x="32" y="424" fill="rgb(138,133,128)" font-size="12">gVisor 는 syscall 접근 방식만 바꿈 — namespace·cgroup·root 변경은 여전히 컨테이너 격리에 사용</text>
  <text x="32" y="446" fill="rgb(138,133,128)" font-size="12">선택 기준: 위험 프로파일 + 퍼블릭 클라우드·관리형 솔루션 제공 여부 (신뢰 워크로드엔 추가 격리가 불필요한 비용)</text>
  <text x="32" y="468" fill="#66bb6a" font-size="12">런타임 보안 도구(Ch 15)는 정적 프로파일의 대안이거나, 함께 묶어 심층 방어(defense in depth)</text>
  <text x="32" y="490" fill="rgb(138,133,128)" font-size="12">단, 어떤 격리든 사용자가 쉽게 무너뜨릴 수 있는 길이 있음 → Chapter 11</text>
</svg>
