<svg viewBox="0 0 860 500" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Falco vs Tetragon — 비교 위치와 동기적 차단</title>
  <desc>위 왼쪽: Falco 는 이벤트를 커널에서 수집하지만 rule 비교를 사용자 공간에서 한다. 위반을 발견해도 사용자 공간 컴포넌트가 책임 프로세스를 죽이길 기다려야 해, 그 사이 정책 밖 행동이 완료돼 데이터가 유출될 수 있다. 위 오른쪽: Tetragon 은 LSM API 함수에 attach 한 eBPF 프로그램이 커널 안에서 정책과 대조하고, 조건이 맞으면 사용자 공간 전환 없이 동기적으로 SIGKILL 을 보내 정책 밖 행동이 완료되기 전에 막는다. 주목할 이벤트만 사용자 공간에 올려 성능도 낫다. 가운데: 차단할지 경고만 할지의 결정. 자동 종료는 서비스 영향·거짓 양성·오케스트레이터 재생성 악순환을 부르고, 활동 유형마다 결과가 다르다. 네트워크 패킷 드롭은 안전하지만 파일 접근 차단은 앱 크래시를 부를 수 있어, 대부분은 로깅하고 가장 민감한 파일만 차단한다. 아래: 의심 컨테이너는 종료 대신 quarantine 으로 보존하고, eBPF 동적 로드로 패치 전 취약점을 완화한다.</desc>

  <rect x="0" y="0" width="860" height="500" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">Falco vs Tetragon — 동기적 차단의 차이</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">예방이 치료보다 낫다 — 정책 밖 행동이 완료되기 전에 막느냐</text>

  <!-- Falco -->
  <rect x="32" y="84" width="388" height="150" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="226" y="108" fill="rgb(212,168,83)" font-size="15" text-anchor="middle">Falco — 사용자 공간 비교</text>

  <rect x="56" y="122" width="340" height="34" fill="rgb(42,37,32)" rx="4"/>
  <text x="226" y="144" fill="#e8e4df" font-size="11" text-anchor="middle">커널: 이벤트 수집</text>

  <defs>
    <marker id="fe" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <line x1="226" y1="156" x2="226" y2="170" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#fe)"/>

  <rect x="56" y="172" width="340" height="34" fill="rgb(42,37,32)" rx="4"/>
  <text x="226" y="194" fill="#e8e4df" font-size="11" text-anchor="middle">사용자 공간: rule 비교 → kill</text>

  <rect x="56" y="212" width="340" height="14" fill="#f44336" fill-opacity="0.15" rx="2"/>
  <text x="226" y="223" fill="#f44336" font-size="9" text-anchor="middle">늦은 종료 — 그 사이 유출 가능 · 차단 능력 없음</text>

  <!-- Tetragon -->
  <rect x="440" y="84" width="388" height="150" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="8"/>
  <text x="634" y="108" fill="rgb(212,168,83)" font-size="15" text-anchor="middle">Tetragon — 커널 안 비교</text>

  <rect x="464" y="122" width="340" height="34" fill="rgb(42,37,32)" rx="4"/>
  <text x="634" y="144" fill="#e8e4df" font-size="11" text-anchor="middle">커널: LSM attach + 정책 대조</text>

  <line x1="634" y1="156" x2="634" y2="170" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#fe)"/>

  <rect x="464" y="172" width="340" height="34" fill="#66bb6a" fill-opacity="0.15" stroke="#66bb6a" rx="4"/>
  <text x="634" y="194" fill="#66bb6a" font-size="11" text-anchor="middle">동기 SIGKILL — 전환 없이 즉시 차단</text>

  <rect x="464" y="212" width="340" height="14" fill="#66bb6a" fill-opacity="0.15" rx="2"/>
  <text x="634" y="223" fill="#66bb6a" font-size="9" text-anchor="middle">행동 완료 전 차단 · 주목 이벤트만 user space → 성능↑</text>

  <!-- 차단 vs 경고 -->
  <text x="32" y="262" fill="#e8e4df" font-size="15">차단 vs 경고 — 활동 유형마다 다른 대응</text>

  <rect x="32" y="274" width="388" height="78" fill="#66bb6a" fill-opacity="0.10" stroke="#66bb6a" rx="6"/>
  <text x="226" y="298" fill="#e8e4df" font-size="12" text-anchor="middle">네트워크 패킷 드롭 — 안전</text>
  <text x="226" y="320" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">수신 SW 가 패킷을 못 볼 뿐</text>
  <text x="226" y="338" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">→ 적극 차단 가능</text>

  <rect x="440" y="274" width="388" height="78" fill="#f44336" fill-opacity="0.10" stroke="#f44336" rx="6"/>
  <text x="634" y="298" fill="#e8e4df" font-size="12" text-anchor="middle">파일 접근 차단 — 크래시 위험</text>
  <text x="634" y="320" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">에러 미처리 앱은 크래시 가능</text>
  <text x="634" y="338" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">→ 대부분 로깅, 민감 파일만 차단</text>

  <text x="32" y="372" fill="rgb(138,133,128)" font-size="10">악순환 주의: 자동 종료 → 오케스트레이터 재생성 → 같은 공격 반복 (K8s replica count)</text>

  <!-- quarantine + 취약점 완화 -->
  <line x1="32" y1="386" x2="828" y2="386" stroke="rgb(42,37,32)" stroke-width="1"/>

  <rect x="32" y="398" width="388" height="82" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="226" y="422" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">quarantine — 종료 대신 보존</text>
  <text x="226" y="444" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">Docker: pause + commit + 볼륨 스냅샷</text>
  <text x="226" y="462" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">K8s: 네트워크 격리·kubectl debug·checkpoint·taint</text>

  <rect x="440" y="398" width="388" height="82" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="6"/>
  <text x="634" y="422" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">취약점 완화 — 패치 전 방어</text>
  <text x="634" y="444" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">eBPF 동적 로드 → 배포 전체에 즉시·투명 적용</text>
  <text x="634" y="462" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">xz 백도어: sshd 의 취약 liblzma mmap 을 잡음</text>
</svg>
