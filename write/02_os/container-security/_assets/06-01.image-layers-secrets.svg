<svg viewBox="0 0 820 440" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>이미지 레이어와 시크릿 — 삭제해도 레이어에 남는다</title>
  <desc>왼쪽: Dockerfile 의 각 명령이 레이어를 쌓는다. 레이어 A 가 password.txt 를 만들고 레이어 B 가 지우면, 최종 실행 시점에는 파일이 안 보인다. 오른쪽: 그러나 모든 레이어가 따로 저장되므로 docker save 로 tar 를 풀면 레이어 A 에서 password.txt 가 그대로 나오고, config 의 history 에도 echo 명령이 드러난다. 아래: BuildKit 시크릿 마운트는 시크릿을 그 빌드 단계에만 메모리로 마운트해 레이어에 남기지 않는다.</desc>

  <rect x="0" y="0" width="820" height="440" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">이미지 레이어 — 삭제해도 시크릿은 남는다</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">모든 레이어가 따로 저장 → 다음 레이어가 지워도 이전 레이어에 그대로</text>

  <!-- 왼쪽: 레이어 스택 -->
  <text x="32" y="92" fill="#e8e4df" font-size="14">레이어 스택 (Dockerfile)</text>

  <rect x="32" y="104" width="340" height="40" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="4"/>
  <text x="48" y="124" fill="rgb(138,133,128)" font-family="'JetBrains Mono', monospace" font-size="11">FROM alpine</text>
  <text x="356" y="124" fill="rgb(138,133,128)" font-size="10" text-anchor="end">base</text>

  <rect x="32" y="150" width="340" height="48" fill="#f44336" fill-opacity="0.18" stroke="#f44336" rx="4"/>
  <text x="48" y="172" fill="#e8e4df" font-family="'JetBrains Mono', monospace" font-size="11">RUN echo "top-secret" &gt; /password.txt</text>
  <text x="48" y="190" fill="#f44336" font-size="10">레이어 A — password.txt 생성 (시크릿 박힘)</text>

  <rect x="32" y="204" width="340" height="48" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="4"/>
  <text x="48" y="226" fill="rgb(138,133,128)" font-family="'JetBrains Mono', monospace" font-size="11">RUN rm /password.txt</text>
  <text x="48" y="244" fill="rgb(138,133,128)" font-size="10">레이어 B — 삭제 (실행 시점엔 안 보임)</text>

  <!-- 화살표 -->
  <defs>
    <marker id="ls" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <line x1="372" y1="174" x2="448" y2="174" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ls)"/>
  <text x="410" y="164" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">docker save</text>

  <!-- 오른쪽: 풀면 드러남 -->
  <rect x="448" y="104" width="340" height="148" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="618" y="128" fill="#e8e4df" font-size="13" text-anchor="middle">tar 로 풀면 레이어 A 가 그대로</text>
  <rect x="464" y="140" width="308" height="44" fill="#f44336" fill-opacity="0.18" stroke="#f44336" rx="3"/>
  <text x="618" y="160" fill="#e8e4df" font-family="'JetBrains Mono', monospace" font-size="11" text-anchor="middle">$ tar -xvf blobs/.../9e7*</text>
  <text x="618" y="178" fill="#f44336" font-family="'JetBrains Mono', monospace" font-size="11" text-anchor="middle">→ etc/  password.txt</text>
  <text x="464" y="208" fill="rgb(138,133,128)" font-size="11">config 의 history 에도 echo 명령 노출</text>
  <text x="464" y="230" fill="rgb(138,133,128)" font-size="11">한 번이라도 존재한 파일은 누구나 꺼냄</text>

  <!-- 구분선 -->
  <line x1="32" y1="276" x2="788" y2="276" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 해법: BuildKit 시크릿 마운트 -->
  <text x="32" y="304" fill="#e8e4df" font-size="15">해법 — BuildKit 시크릿 마운트</text>
  <rect x="32" y="316" width="756" height="60" fill="#66bb6a" fill-opacity="0.10" stroke="#66bb6a" rx="6"/>
  <text x="48" y="340" fill="#e8e4df" font-family="'JetBrains Mono', monospace" font-size="11">RUN --mount=type=secret,id=API_TOKEN  sh -c '... $(cat /run/secrets/API_TOKEN) ...'</text>
  <text x="48" y="364" fill="rgb(138,133,128)" font-size="11">그 빌드 단계에만 메모리로 임시 마운트 → 레이어에 남지 않음 (파일로 영속화하는 안티패턴 주의)</text>

  <!-- 결론 -->
  <text x="32" y="404" fill="rgb(138,133,128)" font-size="12">이미지 접근자 누구에게도 못 보일 것은 어떤 레이어에도 넣지 말 것</text>
  <text x="32" y="426" fill="rgb(138,133,128)" font-size="12">시크릿이 발견되면: 빌드 수정만으로 부족 → 시크릿을 회전(rotate)해 옛 이미지서 무용화</text>
</svg>
