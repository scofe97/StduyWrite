<svg viewBox="0 0 860 520" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>컨테이너를 이루는 리눅스 구성물 — namespace 8종 + chroot + cgroup</title>
  <desc>컨테이너는 세 가지 리눅스 메커니즘의 결합이다. namespace 8종(UTS·PID·mount·network·user·IPC·cgroup·time)이 프로세스가 볼 수 있는 것을 격리하고, root 디렉토리 변경(chroot/pivot_root)이 볼 수 있는 파일을 제한하며, cgroup 이 쓸 수 있는 자원을 제어한다. PID·mount·cgroup namespace 는 단독으로는 부족하고 독립 /proc·/sys/fs/cgroup 마운트와 root 변경의 결합이 필요하다.</desc>

  <rect x="0" y="0" width="860" height="520" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">컨테이너 = namespace + root 변경 + cgroup</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">세 가지 리눅스 커널 메커니즘의 결합. 결과는 "컨테이너화된 프로세스"</text>

  <!-- namespace 8종 -->
  <text x="32" y="94" fill="#e8e4df" font-size="15">① namespace — 프로세스가 볼 수 있는 것을 격리 (각 유형마다 정확히 하나)</text>

  <!-- 4 + 4 그리드 -->
  <rect x="32" y="108" width="190" height="48" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="4"/>
  <text x="127" y="130" fill="#e8e4df" font-family="'JetBrains Mono', monospace" font-size="12" text-anchor="middle">UTS</text>
  <text x="127" y="148" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">hostname·도메인</text>

  <rect x="232" y="108" width="190" height="48" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="4"/>
  <text x="327" y="130" fill="#e8e4df" font-family="'JetBrains Mono', monospace" font-size="12" text-anchor="middle">PID</text>
  <text x="327" y="148" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">프로세스 ID (+fork)</text>

  <rect x="432" y="108" width="190" height="48" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="4"/>
  <text x="527" y="130" fill="#e8e4df" font-family="'JetBrains Mono', monospace" font-size="12" text-anchor="middle">mount</text>
  <text x="527" y="148" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">마운트 지점</text>

  <rect x="632" y="108" width="196" height="48" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="4"/>
  <text x="730" y="130" fill="#e8e4df" font-family="'JetBrains Mono', monospace" font-size="12" text-anchor="middle">network</text>
  <text x="730" y="148" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">인터페이스·라우팅</text>

  <rect x="32" y="164" width="190" height="48" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="4"/>
  <text x="127" y="186" fill="#e8e4df" font-family="'JetBrains Mono', monospace" font-size="12" text-anchor="middle">user</text>
  <text x="127" y="204" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">UID·GID (보안 핵심)</text>

  <rect x="232" y="164" width="190" height="48" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="4"/>
  <text x="327" y="186" fill="#e8e4df" font-family="'JetBrains Mono', monospace" font-size="12" text-anchor="middle">IPC</text>
  <text x="327" y="204" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">공유 메모리·큐</text>

  <rect x="432" y="164" width="190" height="48" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="4"/>
  <text x="527" y="186" fill="#e8e4df" font-family="'JetBrains Mono', monospace" font-size="12" text-anchor="middle">cgroup</text>
  <text x="527" y="204" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">cgroup 시야</text>

  <rect x="632" y="164" width="196" height="48" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" stroke-dasharray="4 3" rx="4"/>
  <text x="730" y="186" fill="rgb(138,133,128)" font-family="'JetBrains Mono', monospace" font-size="12" text-anchor="middle">time</text>
  <text x="730" y="204" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">컨테이너 거의 안 씀</text>

  <!-- ② root 변경 -->
  <text x="32" y="248" fill="#e8e4df" font-size="15">② root 디렉토리 변경 — 볼 수 있는 파일을 제한</text>
  <rect x="32" y="262" width="388" height="78" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="226" y="286" fill="#e8e4df" font-family="'JetBrains Mono', monospace" font-size="13" text-anchor="middle">chroot / pivot_root</text>
  <text x="226" y="308" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">컨테이너 이미지 = 새 root 파일시스템</text>
  <text x="226" y="326" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">pivot_root: 옛 root 마운트 해제(보안 우위)</text>

  <!-- ③ cgroup -->
  <text x="440" y="248" fill="#e8e4df" font-size="15">③ cgroup — 쓸 수 있는 자원 제어</text>
  <rect x="440" y="262" width="388" height="78" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="634" y="286" fill="#e8e4df" font-family="'JetBrains Mono', monospace" font-size="13" text-anchor="middle">memory.max · pids.max ...</text>
  <text x="634" y="308" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">앞 장(Ch 3)에서 다룸</text>
  <text x="634" y="326" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">자원 고갈·fork bomb 방어</text>

  <!-- 결합 강조 -->
  <rect x="32" y="356" width="796" height="60" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="2" rx="6"/>
  <text x="430" y="380" fill="#e8e4df" font-size="14" text-anchor="middle">결합이 핵심 — PID·mount·cgroup namespace 는 단독으로 부족</text>
  <text x="430" y="402" fill="rgb(138,133,128)" font-family="'JetBrains Mono', monospace" font-size="12" text-anchor="middle">새 namespace + root 변경 + 독립 /proc·/sys/fs/cgroup 마운트 → 비로소 컨테이너처럼</text>

  <!-- 경고 -->
  <text x="32" y="448" fill="rgb(138,133,128)" font-size="12">개념은 단순하나 상호작용은 복잡 — 컨테이너 탈출(CVE-2019-5736)은 namespace·capability·파일시스템의 미묘한 틈에서</text>
  <text x="32" y="474" fill="rgb(138,133,128)" font-size="12">결론: 컨테이너는 호스트 커널을 공유하는 리눅스 프로세스 (다음: user namespace·호스트 관점 → 04-02)</text>
</svg>
