<svg viewBox="0 0 860 460" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>VMM 세 유형과 x86 권한 링</title>
  <desc>위: VMM 세 유형 비교. Type 1 하이퍼바이저는 베어메탈 위에서 직접(Ring 0), Type 2 는 호스트 OS 의 user space, KVM 은 호스트 커널 안에서 돈다. 아래: x86 권한 링. 일반 시스템은 커널이 Ring 0·user space 가 Ring 3, 하이퍼바이저 환경은 VMM 이 Ring 0·게스트 커널이 Ring 1, 하드웨어 가상화(VT-x)는 하이퍼바이저가 Ring -1(VMX root)에서 돌아 게스트 커널이 Ring 0 처럼 돈다.</desc>

  <rect x="0" y="0" width="860" height="460" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">VMM 세 유형과 x86 권한 링</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">근본 차이: VM 은 커널 포함 OS 전체를, 컨테이너는 호스트 커널을 공유</text>

  <!-- ===== VMM 세 유형 ===== -->
  <!-- Type 1 -->
  <rect x="32" y="84" width="256" height="150" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="160" y="108" fill="rgb(212,168,83)" font-size="14" text-anchor="middle">Type 1 — 하이퍼바이저</text>
  <rect x="48" y="120" width="224" height="26" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="3"/>
  <text x="160" y="138" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">게스트 앱 / 게스트 OS (Ring 1)</text>
  <rect x="48" y="150" width="224" height="26" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="3"/>
  <text x="160" y="168" fill="#e8e4df" font-size="11" text-anchor="middle">하이퍼바이저 (Ring 0)</text>
  <rect x="48" y="180" width="224" height="26" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="3"/>
  <text x="160" y="198" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">물리 하드웨어 (베어메탈)</text>
  <text x="160" y="224" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">Hyper-V · Xen · ESXi</text>

  <!-- Type 2 -->
  <rect x="304" y="84" width="256" height="150" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="432" y="108" fill="rgb(212,168,83)" font-size="14" text-anchor="middle">Type 2 — 호스티드</text>
  <rect x="320" y="120" width="224" height="22" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="3"/>
  <text x="432" y="135" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">게스트 OS</text>
  <rect x="320" y="146" width="224" height="22" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="3"/>
  <text x="432" y="161" fill="#e8e4df" font-size="11" text-anchor="middle">VMM (user space)</text>
  <rect x="320" y="172" width="224" height="22" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="3"/>
  <text x="432" y="187" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">호스트 OS 커널</text>
  <rect x="320" y="198" width="224" height="18" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="3"/>
  <text x="432" y="211" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">하드웨어 · QEMU·VirtualBox</text>

  <!-- KVM -->
  <rect x="576" y="84" width="252" height="150" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="702" y="108" fill="rgb(212,168,83)" font-size="14" text-anchor="middle">KVM — 회색지대</text>
  <rect x="592" y="120" width="220" height="22" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="3"/>
  <text x="702" y="135" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">게스트 OS</text>
  <rect x="592" y="146" width="220" height="48" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="3"/>
  <text x="702" y="166" fill="#e8e4df" font-size="11" text-anchor="middle">호스트 커널 + KVM 모듈</text>
  <text x="702" y="184" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">(QEMU 와 함께, HW 가속)</text>
  <rect x="592" y="198" width="220" height="18" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="3"/>
  <text x="702" y="211" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">하드웨어</text>
  <text x="702" y="228" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">게스트는 호스트 커널서 직접</text>

  <!-- 구분선 -->
  <line x1="32" y1="256" x2="828" y2="256" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- ===== 권한 링 ===== -->
  <text x="32" y="284" fill="#e8e4df" font-size="16">x86 권한 링 — 낮을수록 높은 권한</text>

  <!-- 일반 -->
  <rect x="32" y="300" width="256" height="120" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="160" y="322" fill="#e8e4df" font-size="13" text-anchor="middle">일반 (VM 없음)</text>
  <text x="48" y="348" fill="rgb(212,168,83)" font-family="'JetBrains Mono', monospace" font-size="12">Ring 0</text>
  <text x="130" y="348" fill="#e8e4df" font-size="12">커널</text>
  <text x="48" y="372" fill="rgb(138,133,128)" font-family="'JetBrains Mono', monospace" font-size="12">Ring 3</text>
  <text x="130" y="372" fill="rgb(138,133,128)" font-size="12">user space (앱)</text>
  <text x="160" y="402" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">02-01 의 권한 모델</text>

  <!-- 하이퍼바이저 -->
  <rect x="304" y="300" width="256" height="120" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="432" y="322" fill="#e8e4df" font-size="13" text-anchor="middle">하이퍼바이저 환경</text>
  <text x="320" y="348" fill="rgb(212,168,83)" font-family="'JetBrains Mono', monospace" font-size="12">Ring 0</text>
  <text x="402" y="348" fill="#e8e4df" font-size="12">VMM</text>
  <text x="320" y="372" fill="#e8e4df" font-family="'JetBrains Mono', monospace" font-size="12">Ring 1</text>
  <text x="402" y="372" fill="#e8e4df" font-size="12">게스트 커널</text>
  <text x="320" y="396" fill="rgb(138,133,128)" font-family="'JetBrains Mono', monospace" font-size="12">Ring 3</text>
  <text x="402" y="396" fill="rgb(138,133,128)" font-size="12">user space</text>

  <!-- 하드웨어 가상화 -->
  <rect x="576" y="300" width="252" height="120" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="6"/>
  <text x="702" y="322" fill="#e8e4df" font-size="13" text-anchor="middle">하드웨어 가상화 (VT-x)</text>
  <text x="592" y="348" fill="rgb(212,168,83)" font-family="'JetBrains Mono', monospace" font-size="12">Ring -1</text>
  <text x="690" y="348" fill="#e8e4df" font-size="12">하이퍼바이저</text>
  <text x="592" y="366" fill="rgb(138,133,128)" font-size="10">(VMX root mode)</text>
  <text x="592" y="390" fill="#e8e4df" font-family="'JetBrains Mono', monospace" font-size="12">Ring 0</text>
  <text x="690" y="390" fill="#e8e4df" font-size="12">게스트 커널</text>
  <text x="702" y="412" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">게스트가 호스트처럼 Ring 0</text>
</svg>
