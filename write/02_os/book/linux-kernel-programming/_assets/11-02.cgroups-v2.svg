<svg viewBox="0 0 680 580" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>cgroups v2 — 컨트롤러·단일 계층·systemd slice/scope·namespace</title>
  <desc>cgroups는 CPU·메모리·I/O 등 자원의 bandwidth를 그룹 단위로 할당·제한하는 커널 기능이다. CFS가 진짜로 공정하지 않은 문제(한 유저가 스레드를 남발하면 독점)를 푼다. cgroups v2는 모든 컨트롤러를 단일 계층에 마운트하며 /sys/fs/cgroup의 cgroup2 의사 파일시스템으로 노출한다. 컨트롤러(cpu·memory·io·pids 등)는 cgroup.subtree_control에 +name/-name을 써서 자식에 활성/비활성한다(top-down constraint). systemd가 부팅 시 slice(유저·앱 묶음)와 scope(터미널 세션 등)로 cgroup을 자동 구성한다. 컨테이너는 cgroups+namespace의 결합이다.</desc>
  <rect x="0" y="0" width="680" height="580" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">cgroups v2 — 자원 bandwidth 제어</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">CPU·메모리·I/O 등을 그룹 단위로 할당·제한하는 커널 기능입니다</text>

  <!-- 왜 -->
  <rect x="20" y="74" width="642" height="62" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="38" y="96" fill="rgb(212,168,83)" font-size="13" font-weight="bold">왜? — CFS 는 진짜로 공정하지 않다</text>
  <text x="38" y="116" fill="#e8e4df" font-size="11">한 유저가 스레드·메모리를 남발하면 CPU·자원을 독점 — CFS 만으로 fair 하지 않음</text>
  <text x="38" y="130" fill="rgb(138,133,128)" font-size="10">→ controller(자원)별로 bandwidth 를 throttle. 2.6.24(2007) Google/IBM 기여</text>

  <!-- 컨트롤러 -->
  <rect x="20" y="148" width="320" height="148" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="170" fill="#e8e4df" font-size="13" font-weight="bold">controller (resource limiter)</text>
  <text x="38" y="188" fill="rgb(138,133,128)" font-size="10">/sys/fs/cgroup/cgroup.controllers 로 확인</text>

  <rect x="38" y="198" width="92" height="26" fill="rgba(102,187,106,0.13)" stroke="#66bb6a"/><text x="84" y="215" fill="#66bb6a" font-size="10" text-anchor="middle">cpu</text>
  <rect x="134" y="198" width="92" height="26" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/><text x="180" y="215" fill="#e8e4df" font-size="10" text-anchor="middle">cpuset</text>
  <rect x="230" y="198" width="92" height="26" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/><text x="276" y="215" fill="#e8e4df" font-size="10" text-anchor="middle">memory</text>
  <rect x="38" y="228" width="92" height="26" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/><text x="84" y="245" fill="#e8e4df" font-size="10" text-anchor="middle">io</text>
  <rect x="134" y="228" width="92" height="26" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/><text x="180" y="245" fill="#e8e4df" font-size="10" text-anchor="middle">pids</text>
  <rect x="230" y="228" width="92" height="26" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/><text x="276" y="245" fill="#e8e4df" font-size="10" text-anchor="middle">hugetlb</text>

  <text x="38" y="274" fill="#e8e4df" font-size="10">활성: echo "+cpu +io" &gt; cgroup.subtree_control</text>
  <text x="38" y="290" fill="rgb(138,133,128)" font-size="10">비활성: -name · 목록에 있어도 기본은 비활성</text>

  <!-- 단일 계층 + top-down -->
  <rect x="350" y="148" width="312" height="148" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="2"/>
  <text x="368" y="170" fill="#66bb6a" font-size="13" font-weight="bold">단일 계층 + top-down constraint</text>
  <text x="368" y="190" fill="rgb(138,133,128)" font-size="10">v2 는 모든 컨트롤러가 하나의 트리에 마운트</text>
  <text x="368" y="206" fill="rgb(138,133,128)" font-size="10">(v1 은 여러 계층 — v2 가 권장)</text>

  <rect x="368" y="216" width="276" height="24" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/>
  <text x="382" y="233" fill="#e8e4df" font-size="10">cgroup2 fs @ /sys/fs/cgroup</text>
  <text x="368" y="258" fill="#e8e4df" font-size="11">자원은 위→아래로 분배 — 부모가 가진 것만</text>
  <text x="368" y="274" fill="rgb(138,133,128)" font-size="10">자식에 분배 가능 · 자식이 켜면 부모는 못 끔</text>
  <text x="368" y="290" fill="rgb(138,133,128)" font-size="9">cgroup.events: populated 1 이면 살아있는 프로세스 존재</text>

  <!-- systemd slice/scope -->
  <rect x="20" y="308" width="642" height="130" fill="rgba(173,216,230,0.10)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="38" y="330" fill="#9cc3df" font-size="13" font-weight="bold">systemd — 부팅 시 cgroup 자동 구성</text>
  <text x="38" y="350" fill="#e8e4df" font-size="11">systemd 가 cgroup2 fs 를 마운트하고 모든 프로세스를 적절한 slice·scope 에 배치</text>

  <rect x="38" y="362" width="300" height="50" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/>
  <text x="52" y="382" fill="#e8e4df" font-size="11">slice — 유저·앱 묶음</text>
  <text x="52" y="398" fill="rgb(138,133,128)" font-size="10">user-1000.slice · system.slice · -.slice(root)</text>

  <rect x="346" y="362" width="298" height="50" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/>
  <text x="360" y="382" fill="#e8e4df" font-size="11">scope — slice 내 추가 분할</text>
  <text x="360" y="398" fill="rgb(138,133,128)" font-size="10">session-N.scope(터미널) · init.scope(PID 1)</text>

  <text x="38" y="430" fill="rgb(138,133,128)" font-size="10">시각화: systemd-cgls · systemctl · systemd-cgtop · ps -o cgroup · cgroupsv2_explore</text>

  <!-- namespace + 컨테이너 -->
  <rect x="20" y="450" width="642" height="122" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="472" fill="#e8e4df" font-size="13" font-weight="bold">namespace — 컨테이너의 다른 한 축</text>
  <text x="38" y="492" fill="#e8e4df" font-size="11">컨테이너 = cgroups(자원 제한) + namespace(자원 격리). struct nsproxy</text>

  <rect x="38" y="504" width="120" height="24" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/><text x="98" y="521" fill="#e8e4df" font-size="10" text-anchor="middle">Mount · PID</text>
  <rect x="162" y="504" width="120" height="24" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/><text x="222" y="521" fill="#e8e4df" font-size="10" text-anchor="middle">Network · UTS</text>
  <rect x="286" y="504" width="120" height="24" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/><text x="346" y="521" fill="#e8e4df" font-size="10" text-anchor="middle">IPC · User</text>

  <text x="38" y="548" fill="rgb(138,133,128)" font-size="10">각 namespace 의 프로세스는 자기만의 PID 1·hostname·mount·네트워크를 봄</text>
  <text x="38" y="564" fill="rgb(138,133,128)" font-size="10">clone() 의 CLONE_NEW* 플래그로 새 namespace 생성 · setns·unshare</text>
</svg>
