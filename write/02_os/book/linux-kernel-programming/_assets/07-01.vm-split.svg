<svg viewBox="0 0 680 560" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>VM split과 64비트 가상 주소 비트맵</title>
  <desc>유저와 커널 VAS는 같은 주소 공간을 User:Kernel 비율로 나눠 공유한다(VM split). 32비트는 보통 3:1GB, x86_64는 48비트 주소로 128TB:128TB. 64비트 주소는 절대값이 아니라 비트맵 — 48비트 주소 사용 시 상위 16비트가 커널은 1, 유저는 0이라 0xffff.../0x0000...로 구분된다. 중간은 거대한 non-canonical hole.</desc>
  <rect x="0" y="0" width="680" height="560" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">VM split과 64비트 가상 주소 비트맵</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">유저·커널 VAS는 같은 주소 공간을 비율로 나눠 공유합니다 — 이것이 VM split</text>

  <!-- 32비트 VM split -->
  <text x="20" y="86" fill="#9cc3df" font-size="13" font-weight="bold">32비트 (3:1 GB split) — 총 4GB</text>
  <rect x="20" y="98" width="450" height="38" fill="rgba(173,216,230,0.12)" stroke="#7fa8c9"/>
  <text x="245" y="122" fill="#e8e4df" font-size="12" text-anchor="middle">유저 VAS · 3GB · 0x0 ~ 0xbfffffff</text>
  <rect x="470" y="98" width="192" height="38" fill="rgba(102,187,106,0.13)" stroke="#66bb6a"/>
  <text x="566" y="122" fill="#e8e4df" font-size="11" text-anchor="middle">커널 VAS · 1GB</text>
  <text x="470" y="150" fill="rgb(212,168,83)" font-family="'JetBrains Mono',monospace" font-size="10">↑ PAGE_OFFSET = 0xc0000000</text>

  <!-- 64비트 VM split -->
  <text x="20" y="184" fill="#9cc3df" font-size="13" font-weight="bold">x86_64 (48비트 주소) — 총 16EB, 대부분 hole</text>
  <rect x="20" y="196" width="180" height="38" fill="rgba(173,216,230,0.12)" stroke="#7fa8c9"/>
  <text x="110" y="220" fill="#e8e4df" font-size="11" text-anchor="middle">유저 VAS · 128TB</text>
  <rect x="204" y="196" width="280" height="38" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" stroke-dasharray="6 4"/>
  <text x="344" y="216" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">non-canonical hole</text>
  <text x="344" y="230" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">99.998% 미사용 (sparse)</text>
  <rect x="488" y="196" width="174" height="38" fill="rgba(102,187,106,0.13)" stroke="#66bb6a"/>
  <text x="575" y="220" fill="#e8e4df" font-size="11" text-anchor="middle">커널 VAS · 128TB</text>
  <text x="20" y="252" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10">유저: 0x0 ~ 0x00007fffffffffff (canonical 하위 절반)</text>
  <text x="20" y="268" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10">커널: 0xffff800000000000 ~ 0xffffffffffffffff (canonical 상위 절반)</text>

  <!-- 가상 주소 비트맵 -->
  <text x="20" y="300" fill="rgb(212,168,83)" font-size="13" font-weight="bold">64비트 가상 주소 = 비트맵 (절대값 아님)</text>
  <text x="20" y="320" fill="rgb(138,133,128)" font-size="11">48비트 주소: bit 0~47 사용, 상위 16비트는 부호 확장처럼 처리</text>

  <rect x="20" y="332" width="120" height="40" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="80" y="352" fill="rgb(212,168,83)" font-size="11" text-anchor="middle">상위 16비트</text>
  <text x="80" y="367" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">커널=1 / 유저=0</text>
  <rect x="144" y="332" width="380" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="334" y="352" fill="#e8e4df" font-size="11" text-anchor="middle">PGD · PUD · PMD · PTE (각 9비트, 4-level paging)</text>
  <text x="334" y="367" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">페이징 테이블 인덱스</text>
  <rect x="528" y="332" width="134" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="595" y="352" fill="#e8e4df" font-size="11" text-anchor="middle">offset</text>
  <text x="595" y="367" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">12비트 (4KB 페이지)</text>

  <rect x="20" y="382" width="642" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="402" fill="#e8e4df" font-size="11">상위 16비트만 보면 KVA/UVA 구분 가능:</text>
  <text x="38" y="416" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10">KVA = 0xffff XXXX XXXX XXXX · UVA = 0x0000 XXXX XXXX XXXX</text>

  <!-- MMU 주소 변환 -->
  <text x="20" y="448" fill="#66bb6a" font-size="13" font-weight="bold">MMU 주소 변환 (가상 → 물리)</text>
  <defs>
    <marker id="ar7" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect x="20" y="460" width="120" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="80" y="484" fill="#e8e4df" font-size="11" text-anchor="middle">가상 주소 접근</text>
  <line x1="140" y1="480" x2="178" y2="480" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ar7)"/>
  <rect x="182" y="460" width="150" height="40" fill="rgba(102,187,106,0.13)" stroke="#66bb6a"/>
  <text x="257" y="480" fill="#66bb6a" font-size="11" text-anchor="middle">캐시·TLB 히트?</text>
  <text x="257" y="494" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">빠른 경로</text>
  <line x1="332" y1="480" x2="370" y2="480" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ar7)"/>
  <rect x="374" y="460" width="150" height="40" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="449" y="480" fill="rgb(212,168,83)" font-size="11" text-anchor="middle">MMU 페이징 walk</text>
  <text x="449" y="494" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">miss 시 (느림)</text>
  <line x1="524" y1="480" x2="562" y2="480" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ar7)"/>
  <rect x="566" y="460" width="96" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="614" y="484" fill="#e8e4df" font-size="11" text-anchor="middle">물리 주소</text>

  <text x="20" y="524" fill="rgb(138,133,128)" font-size="11">MMU 는 CR3(x86)/TTBR(ARM) 의 베이스 물리 주소에서 PGD→PUD→PMD→PTE 를 walk</text>
  <text x="20" y="542" fill="rgb(138,133,128)" font-size="11">변환 실패: 잘못된 주소(버그→fault) 또는 demand paging(합법, 페이지 프레임 할당)</text>
</svg>
