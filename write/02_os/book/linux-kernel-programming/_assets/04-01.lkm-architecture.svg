<svg viewBox="0 0 660 520" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>유저/커널 공간과 LKM 빌드·적재 흐름</title>
  <desc>모던 CPU는 두 특권 레벨로 VAS를 유저 공간(비특권)과 커널 공간(특권)으로 나눈다. 유저 앱은 시스템 콜로만 커널에 진입한다. LKM은 커널 소스 밖에서 .ko로 빌드돼 insmod로 커널 VAS에 적재되며, 커널 특권으로 실행된다. Linux 커널은 monolithic이면서 modular하다.</desc>
  <rect x="0" y="0" width="660" height="520" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">유저/커널 공간과 LKM 빌드·적재</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">모던 CPU의 두 특권 레벨이 가상 주소 공간(VAS)을 둘로 가릅니다</text>

  <!-- 유저 공간 -->
  <rect x="20" y="74" width="620" height="96" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" stroke-width="2"/>
  <text x="38" y="98" fill="#e8e4df" font-size="13" font-weight="bold">유저 공간 — 비특권 (user mode)</text>
  <text x="38" y="116" fill="rgb(138,133,128)" font-size="11">모든 앱(프로세스·스레드)이 여기서 실행 — 브라우저·에디터·셸·systemd</text>
  <rect x="38" y="126" width="180" height="34" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/>
  <text x="128" y="148" fill="#e8e4df" font-size="11" text-anchor="middle">앱 (프로세스/스레드)</text>
  <rect x="230" y="126" width="180" height="34" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/>
  <text x="320" y="148" fill="#e8e4df" font-size="11" text-anchor="middle">glibc (표준 C 라이브러리)</text>
  <rect x="422" y="126" width="180" height="34" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/>
  <text x="512" y="148" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">라이브러리는 유저 모드만</text>

  <!-- 시스템 콜 경계 -->
  <rect x="20" y="180" width="620" height="34" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="330" y="202" fill="rgb(212,168,83)" font-size="12" font-weight="bold" text-anchor="middle">시스템 콜 인터페이스 — 커널로 들어가는 유일한 합법 진입점</text>

  <!-- 커널 공간 -->
  <rect x="20" y="224" width="620" height="150" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="2"/>
  <text x="38" y="248" fill="#66bb6a" font-size="13" font-weight="bold">커널 공간 — 특권 (kernel mode) · monolithic</text>
  <text x="38" y="266" fill="rgb(138,133,128)" font-size="11">모든 컴포넌트가 커널 VAS를 공유 — 커널 특권으로 무엇이든 가능</text>

  <rect x="38" y="278" width="140" height="38" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="108" y="301" fill="#e8e4df" font-size="11" text-anchor="middle">코어 커널·스케줄러</text>
  <rect x="190" y="278" width="120" height="38" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="250" y="301" fill="#e8e4df" font-size="11" text-anchor="middle">메모리 관리(MM)</text>
  <rect x="322" y="278" width="90" height="38" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="367" y="301" fill="#e8e4df" font-size="11" text-anchor="middle">VFS</text>
  <rect x="424" y="278" width="100" height="38" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="474" y="301" fill="#e8e4df" font-size="11" text-anchor="middle">네트워크 스택</text>
  <rect x="536" y="278" width="86" height="38" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="579" y="301" fill="#e8e4df" font-size="11" text-anchor="middle">블록 I/O</text>

  <!-- 적재된 LKM (강조) -->
  <rect x="38" y="324" width="584" height="38" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="56" y="347" fill="rgb(212,168,83)" font-size="12">적재된 커널 모듈 (LKM) — 커널 코드로서 커널 특권으로 실행 · modular</text>

  <!-- LKM 빌드·적재 흐름 -->
  <text x="20" y="404" fill="rgb(138,133,128)" font-size="12">LKM 흐름 — 커널 소스 밖(out-of-tree)에서 빌드해 런타임에 적재·제거</text>

  <defs>
    <marker id="ar4" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <rect x="20" y="418" width="150" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="95" y="440" fill="#e8e4df" font-size="11" text-anchor="middle">소스 + Makefile</text>
  <text x="95" y="460" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">.c .h Makefile</text>

  <line x1="170" y1="446" x2="212" y2="446" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ar4)"/>
  <text x="191" y="438" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">make</text>

  <rect x="216" y="418" width="150" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="291" y="440" fill="#e8e4df" font-size="11" text-anchor="middle">커널 모듈 객체</text>
  <text x="291" y="460" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">module.ko</text>

  <line x1="366" y1="446" x2="408" y2="446" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ar4)"/>
  <text x="387" y="438" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">insmod</text>

  <rect x="412" y="418" width="210" height="56" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="517" y="440" fill="rgb(212,168,83)" font-size="11" text-anchor="middle">커널 메모리(VAS)에 적재</text>
  <text x="517" y="460" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">rmmod 로 제거 · root 권한 필요</text>

  <text x="20" y="500" fill="rgb(138,133,128)" font-size="11">특권은 하드웨어 기능 — root 여부(소프트웨어)와 다릅니다. 커널 특권 ≈ 무엇이든 가능</text>
</svg>
