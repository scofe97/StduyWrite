<svg viewBox="0 0 640 470" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Linux Kernel Programming 2판 — 3섹션·13챕터 로드맵</title>
  <desc>섹션 1 기초(Ch 1-5), 섹션 2 커널 내부 핵심(Ch 6-11), 섹션 3 고급 동기화(Ch 12-13)로 쌓이는 학습 구조. 6.1 LTS 커널 기준.</desc>
  <rect x="0" y="0" width="640" height="470" fill="#0d0d0d"/>

  <!-- 제목 -->
  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">Linux Kernel Programming (2판) — 학습 로드맵</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">기준 커널: 6.1 LTS · LKM 프레임워크 중심 · 실습 모듈 약 40개</text>

  <!-- 섹션 3 (고급) — 맨 위 = 가장 깊음 -->
  <rect x="20" y="78" width="600" height="78" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="40" y="104" fill="rgb(212,168,83)" font-size="14" font-weight="bold">섹션 3 · 고급 — 커널 동기화</text>
  <text x="40" y="126" fill="#e8e4df" font-size="12">임계 영역·데이터 레이스·데드락·mutex·spinlock·atomic·RCU·lockdep</text>
  <rect x="478" y="92" width="58" height="24" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="507" y="108" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">Ch 12</text>
  <rect x="544" y="92" width="58" height="24" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="573" y="108" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">Ch 13</text>
  <text x="40" y="146" fill="rgb(138,133,128)" font-size="11">전문 커널 설계·코드의 필수기</text>

  <!-- 섹션 2 (핵심) -->
  <rect x="20" y="172" width="600" height="118" fill="rgba(102,187,106,0.13)" stroke="#66bb6a" stroke-width="2"/>
  <text x="40" y="198" fill="#66bb6a" font-size="14" font-weight="bold">섹션 2 · 핵심 — 커널 내부</text>
  <text x="40" y="220" fill="#e8e4df" font-size="12">프로세스/스레드 · task 구조 · 메모리 관리(3편) · CPU 스케줄러(2편)</text>
  <rect x="40" y="234" width="180" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="130" y="252" fill="#e8e4df" font-size="11" text-anchor="middle">프로세스·스레드</text>
  <text x="130" y="268" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">Ch 6</text>
  <rect x="232" y="234" width="180" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="322" y="252" fill="#e8e4df" font-size="11" text-anchor="middle">메모리 관리</text>
  <text x="322" y="268" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">Ch 7-9</text>
  <rect x="424" y="234" width="176" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="512" y="252" fill="#e8e4df" font-size="11" text-anchor="middle">CPU 스케줄러</text>
  <text x="512" y="268" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">Ch 10-11</text>

  <!-- 섹션 1 (기초) -->
  <rect x="20" y="306" width="600" height="118" fill="rgba(173,216,230,0.12)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="40" y="332" fill="#9cc3df" font-size="14" font-weight="bold">섹션 1 · 기초 — 워크스페이스·빌드·첫 모듈</text>
  <text x="40" y="354" fill="#e8e4df" font-size="12">VM 환경 · 커널 소스 빌드 · 첫 LKM 작성</text>
  <rect x="40" y="368" width="130" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="105" y="386" fill="#e8e4df" font-size="11" text-anchor="middle">워크스페이스</text>
  <text x="105" y="402" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">Ch 1 + 온라인</text>
  <rect x="182" y="368" width="190" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="277" y="386" fill="#e8e4df" font-size="11" text-anchor="middle">커널 소스 빌드</text>
  <text x="277" y="402" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">Ch 2-3</text>
  <rect x="384" y="368" width="216" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="492" y="386" fill="#e8e4df" font-size="11" text-anchor="middle">첫 커널 모듈 (LKM)</text>
  <text x="492" y="402" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">Ch 4-5</text>

  <!-- 방향 라벨 -->
  <text x="320" y="450" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">아래(기초)에서 위(고급)로 — 뒤로 갈수록 추상이 깊어집니다</text>
</svg>
