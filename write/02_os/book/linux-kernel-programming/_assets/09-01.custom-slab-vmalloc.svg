<svg viewBox="0 0 680 560" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>custom slab cache와 vmalloc — 3단계 수명주기와 가상 연속 할당</title>
  <desc>자주 할당·해제하는 객체는 custom slab cache로 성능을 올린다. 3단계: kmem_cache_create(생성, init/probe), kmem_cache_alloc/free(사용), kmem_cache_destroy(파괴, exit/remove). 생성자(ctor)로 할당 즉시 초기화 가능. 실제 객체 크기는 요청보다 큼(metadata·best-fit). vmalloc은 가상 연속(물리 비연속 가능) 메모리를 vmalloc region에서 할당하며, slab의 4MB 한계를 넘는 큰 버퍼에 쓴다. kvmalloc은 kmalloc 시도 후 실패 시 vmalloc으로 폴백한다.</desc>
  <rect x="0" y="0" width="680" height="560" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">custom slab cache 와 vmalloc</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">자주 쓰는 객체는 전용 캐시로, 큰 가상 버퍼는 vmalloc 으로 할당합니다</text>

  <!-- custom slab 3단계 -->
  <rect x="20" y="74" width="642" height="172" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="2"/>
  <text x="38" y="96" fill="#66bb6a" font-size="13" font-weight="bold">custom slab cache — 3단계 수명주기</text>

  <rect x="38" y="108" width="196" height="60" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="52" y="128" fill="rgb(212,168,83)" font-size="12">① 생성 (init/probe)</text>
  <text x="52" y="145" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="9">kmem_cache_create()</text>
  <text x="52" y="160" fill="rgb(138,133,128)" font-size="9">name·size·align·flags·ctor</text>

  <rect x="242" y="108" width="196" height="60" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="256" y="128" fill="#e8e4df" font-size="12">② 사용</text>
  <text x="256" y="145" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="9">kmem_cache_alloc()</text>
  <text x="256" y="160" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="9">kmem_cache_free()</text>

  <rect x="446" y="108" width="198" height="60" fill="rgba(244,67,54,0.10)" stroke="#f44336"/>
  <text x="460" y="128" fill="#f47f72" font-size="12">③ 파괴 (exit/remove)</text>
  <text x="460" y="145" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="9">kmem_cache_destroy()</text>
  <text x="460" y="160" fill="rgb(138,133,128)" font-size="9">반드시 마지막에</text>

  <text x="38" y="190" fill="#e8e4df" font-size="11">생성자(ctor): 새 객체 할당 즉시 자동 호출 → 초기화. 새 페이지 할당 때마다 실행</text>
  <text x="38" y="210" fill="rgb(138,133,128)" font-size="11">⚠ 실제 객체 크기 &gt; 요청 (metadata + best-fit). 328B 요청 → 448B 할당(27% 낭비)</text>
  <text x="38" y="230" fill="rgb(138,133,128)" font-size="10">검증: /sys/kernel/slab/&lt;name&gt;/{object_size,slab_size} · kmem_cache_size() · vmstat -m</text>

  <!-- vmalloc -->
  <rect x="20" y="258" width="320" height="156" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="280" fill="#e8e4df" font-size="13" font-weight="bold">vmalloc — 가상 연속 할당</text>
  <text x="38" y="300" fill="rgb(138,133,128)" font-size="10">vmalloc region (VMALLOC_START..END)</text>

  <rect x="38" y="310" width="284" height="28" fill="rgba(173,216,230,0.12)" stroke="#7fa8c9"/>
  <text x="180" y="328" fill="#9cc3df" font-size="11" text-anchor="middle">가상 연속 (물리 비연속 가능)</text>

  <text x="38" y="356" fill="#e8e4df" font-size="10">page-aligned · 큰 버퍼용 (slab 4MB 한계 초과)</text>
  <text x="38" y="372" fill="rgb(138,133,128)" font-size="10">vzalloc(0초기화)·vfree() · 프로세스 컨텍스트만</text>
  <text x="38" y="388" fill="rgb(138,133,128)" font-size="10">virt_to_phys() 불가(direct-map 아님)</text>
  <text x="38" y="404" fill="rgb(138,133,128)" font-size="10">단 물리 프레임은 즉시 할당(demand 아님)</text>

  <!-- kvmalloc -->
  <rect x="350" y="258" width="312" height="156" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="368" y="280" fill="rgb(212,168,83)" font-size="13" font-weight="bold">kvmalloc — 크기 불확실 시</text>
  <text x="368" y="300" fill="rgb(138,133,128)" font-size="10">kmalloc 시도 → 실패 시 vmalloc 폴백</text>

  <rect x="368" y="310" width="130" height="30" fill="rgba(102,187,106,0.13)" stroke="#66bb6a"/>
  <text x="433" y="329" fill="#66bb6a" font-size="10" text-anchor="middle">① kmalloc 시도</text>
  <defs>
    <marker id="ar91" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <line x1="498" y1="325" x2="524" y2="325" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ar91)"/>
  <rect x="528" y="310" width="116" height="30" fill="rgba(173,216,230,0.12)" stroke="#7fa8c9"/>
  <text x="586" y="329" fill="#9cc3df" font-size="10" text-anchor="middle">② vmalloc 폴백</text>

  <text x="368" y="360" fill="#e8e4df" font-size="10">물리 연속 빠르게 못 얻으면 가상 연속으로</text>
  <text x="368" y="376" fill="rgb(138,133,128)" font-size="10">kvzalloc·kvmalloc_array(IoF 검사)·kvfree()</text>
  <text x="368" y="392" fill="rgb(138,133,128)" font-size="10">무한 retry 안 함(__GFP_NORETRY) → 빠름</text>
  <text x="368" y="408" fill="rgb(138,133,128)" font-size="10">vmalloc 시엔 GFP_KERNEL 만 가능</text>

  <!-- kmalloc vs vmalloc 비교 -->
  <rect x="20" y="426" width="642" height="114" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="448" fill="#e8e4df" font-size="13" font-weight="bold">kmalloc vs vmalloc 비교</text>

  <line x1="350" y1="458" x2="350" y2="528" stroke="rgb(42,37,32)"/>
  <text x="38" y="472" fill="#66bb6a" font-size="11" font-weight="bold">kmalloc / kzalloc</text>
  <text x="38" y="490" fill="rgb(138,133,128)" font-size="10">물리 연속 · cacheline 정렬 · 빠름</text>
  <text x="38" y="506" fill="rgb(138,133,128)" font-size="10">작은 할당(&lt;1페이지) · 최대 4MB</text>
  <text x="38" y="522" fill="rgb(138,133,128)" font-size="10">atomic/인터럽트 컨텍스트 가능</text>

  <text x="366" y="472" fill="#9cc3df" font-size="11" font-weight="bold">vmalloc / vzalloc</text>
  <text x="366" y="490" fill="rgb(138,133,128)" font-size="10">가상 연속 · page 정렬 · 느림</text>
  <text x="366" y="506" fill="rgb(138,133,128)" font-size="10">큰 버퍼(4MB 초과·TB급 가능)</text>
  <text x="366" y="522" fill="rgb(138,133,128)" font-size="10">프로세스 컨텍스트만(sleep 가능)</text>
</svg>
