<svg viewBox="0 0 680 580" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>CPU affinity와 스케줄링 정책 설정 — per-thread 마스크·sched_set_fifo</title>
  <desc>CPU affinity mask는 스레드가 실행될 수 있는 코어를 나타내는 per-thread 비트마스크다(task_struct의 cpus_ptr). 기본은 모든 비트 set(어느 코어든 실행). 유저 공간은 sched_getaffinity/sched_setaffinity 시스템콜과 taskset 유틸로 질의·설정한다. 설정에는 CAP_SYS_NICE가 필요하다. 정책·우선순위 설정은 유저 공간에서 sched_getattr/sched_setattr(chrt)로, 커널 안에서는 5.9부터 sched_set_fifo(prio 50)·sched_set_fifo_low(prio 1)·sched_set_normal(nice)만 쓴다. threaded IRQ 핸들러가 sched_set_fifo로 prio 50 FIFO kthread를 만드는 실제 예다.</desc>
  <rect x="0" y="0" width="680" height="580" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">CPU affinity 와 스케줄링 정책 설정</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">affinity mask 와 정책·우선순위는 모두 per-thread 속성입니다</text>

  <!-- affinity mask -->
  <rect x="20" y="74" width="642" height="150" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="38" y="96" fill="rgb(212,168,83)" font-size="13" font-weight="bold">CPU affinity mask — 실행 가능한 코어의 비트마스크</text>
  <text x="38" y="114" fill="rgb(138,133,128)" font-size="10">task_struct.cpus_ptr · 기본은 모든 비트 set(어느 코어든)</text>

  <text x="38" y="138" fill="rgb(138,133,128)" font-size="10">코어 #</text>
  <rect x="100" y="126" width="40" height="20" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/><text x="120" y="140" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">7</text>
  <rect x="140" y="126" width="40" height="20" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/><text x="160" y="140" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">6</text>
  <rect x="180" y="126" width="40" height="20" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/><text x="200" y="140" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">5</text>
  <rect x="220" y="126" width="40" height="20" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/><text x="240" y="140" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">4</text>
  <rect x="260" y="126" width="40" height="20" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/><text x="280" y="140" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">3</text>
  <rect x="300" y="126" width="40" height="20" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/><text x="320" y="140" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">2</text>
  <rect x="340" y="126" width="40" height="20" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/><text x="360" y="140" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">1</text>
  <rect x="380" y="126" width="40" height="20" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/><text x="400" y="140" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">0</text>

  <text x="38" y="166" fill="rgb(138,133,128)" font-size="10">비트</text>
  <rect x="100" y="154" width="40" height="20" fill="rgba(244,67,54,0.15)" stroke="#f44336"/><text x="120" y="168" fill="#f47f72" font-size="10" text-anchor="middle">0</text>
  <rect x="140" y="154" width="40" height="20" fill="rgba(244,67,54,0.15)" stroke="#f44336"/><text x="160" y="168" fill="#f47f72" font-size="10" text-anchor="middle">0</text>
  <rect x="180" y="154" width="40" height="20" fill="rgba(102,187,106,0.20)" stroke="#66bb6a"/><text x="200" y="168" fill="#66bb6a" font-size="10" text-anchor="middle">1</text>
  <rect x="220" y="154" width="40" height="20" fill="rgba(102,187,106,0.20)" stroke="#66bb6a"/><text x="240" y="168" fill="#66bb6a" font-size="10" text-anchor="middle">1</text>
  <rect x="260" y="154" width="40" height="20" fill="rgba(102,187,106,0.20)" stroke="#66bb6a"/><text x="280" y="168" fill="#66bb6a" font-size="10" text-anchor="middle">1</text>
  <rect x="300" y="154" width="40" height="20" fill="rgba(102,187,106,0.20)" stroke="#66bb6a"/><text x="320" y="168" fill="#66bb6a" font-size="10" text-anchor="middle">1</text>
  <rect x="340" y="154" width="40" height="20" fill="rgba(102,187,106,0.20)" stroke="#66bb6a"/><text x="360" y="168" fill="#66bb6a" font-size="10" text-anchor="middle">1</text>
  <rect x="380" y="154" width="40" height="20" fill="rgba(102,187,106,0.20)" stroke="#66bb6a"/><text x="400" y="168" fill="#66bb6a" font-size="10" text-anchor="middle">1</text>
  <text x="436" y="168" fill="rgb(212,168,83)" font-size="11">= 0x3f → 코어 0~5 만 실행 가능</text>

  <text x="38" y="194" fill="#e8e4df" font-size="11">이점: 캐시 무효화·bouncing 감소 · 코어 간 마이그레이션 비용 제거 · CPU 예약</text>
  <text x="38" y="214" fill="rgb(138,133,128)" font-size="10">단 권고는 건드리지 않기 — 스케줄러가 CPU topology 를 알고 best load-balance</text>

  <!-- affinity 질의/설정 -->
  <rect x="20" y="236" width="320" height="120" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="258" fill="#e8e4df" font-size="13" font-weight="bold">affinity 질의·설정 (유저 공간)</text>
  <text x="38" y="278" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10">sched_getaffinity()</text>
  <text x="38" y="294" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10">sched_setaffinity()</text>
  <text x="38" y="312" fill="rgb(138,133,128)" font-size="10">cpu_set_t 마스크 · CPU_ZERO/CPU_SET 매크로</text>
  <text x="38" y="328" fill="#e8e4df" font-size="11">taskset -p PID / taskset 03 cmd</text>
  <text x="38" y="346" fill="#f47f72" font-size="10">설정엔 소유·root·CAP_SYS_NICE 필요 (질의는 자유)</text>

  <!-- kthread affinity -->
  <rect x="350" y="236" width="312" height="120" fill="rgba(244,67,54,0.10)" stroke="#f44336" stroke-width="2"/>
  <text x="368" y="258" fill="#f44336" font-size="13" font-weight="bold">⚠ kthread affinity 설정 (해킹)</text>
  <text x="368" y="278" fill="rgb(138,133,128)" font-size="10">sched_setaffinity 가 커널 내 미export</text>
  <text x="368" y="296" fill="#e8e4df" font-size="11">5.7 부터 kallsyms_lookup_name 도 미export</text>
  <text x="368" y="314" fill="rgb(138,133,128)" font-size="10">→ /proc/kallsyms 로 주소 조회(root)</text>
  <text x="368" y="330" fill="rgb(138,133,128)" font-size="10">→ 모듈 파라미터로 넘겨 함수 포인터로 호출</text>
  <text x="368" y="348" fill="#f47f72" font-size="10">프로덕션 금지 · per-CPU 데모용</text>

  <!-- 정책/우선순위 커널 설정 -->
  <rect x="20" y="368" width="642" height="204" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="2"/>
  <text x="38" y="390" fill="#66bb6a" font-size="13" font-weight="bold">정책·우선순위 설정 — 커널 안에서는 단 3개 (5.9+)</text>
  <text x="38" y="410" fill="rgb(138,133,128)" font-size="10">유저 공간은 sched_getattr/sched_setattr(chrt). 커널은 priority 노출을 없애고 3개만 남김</text>

  <rect x="38" y="422" width="606" height="32" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="52" y="442" fill="rgb(212,168,83)" font-family="'JetBrains Mono',monospace" font-size="11">sched_set_fifo(p)</text>
  <text x="280" y="442" fill="rgb(138,133,128)" font-size="10">→ SCHED_FIFO · prio 50 (MAX_RT_PRIO/2)</text>

  <rect x="38" y="458" width="606" height="32" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="52" y="478" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11">sched_set_fifo_low(p)</text>
  <text x="280" y="478" fill="rgb(138,133,128)" font-size="10">→ SCHED_FIFO · prio 1 (NORMAL 보다 높음)</text>

  <rect x="38" y="494" width="606" height="32" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="52" y="514" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="11">sched_set_normal(p, nice)</text>
  <text x="280" y="514" fill="rgb(138,133,128)" font-size="10">→ SCHED_NORMAL · nice 값 설정</text>

  <text x="38" y="546" fill="#e8e4df" font-size="11">왜? 랜덤 FIFO 우선순위 남발 방지 — 커널은 mechanism, 정책은 admin/user 몫</text>
  <text x="38" y="564" fill="rgb(138,133,128)" font-size="10">실제 예: threaded IRQ 핸들러 irq_thread() 가 sched_set_fifo(current) 호출. GPL export</text>
</svg>
