<svg viewBox="0 0 680 580" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>reader-writer spinlock과 CPU 캐싱·false sharing</title>
  <desc>reader-writer spinlock(rwlock_t)은 read-mostly 상황에서 여러 reader가 동시에 read_lock으로 락 없이 읽게 하고, writer만 write_lock으로 배타 접근한다. 단점은 writer starvation(reader가 계속 오면 writer 굶음)과 cache 효과다. CPU는 RAM을 바이트가 아니라 cacheline(보통 64바이트) 단위로 읽는다. 멀티코어가 같은 데이터를 수정하면 cache coherency를 위해 invalidate+flush가 반복되어 cache bouncing(ping-pong)이 일어난다. false sharing은 인접 변수가 같은 cacheline에 있어 서로 다른 코어가 각각 수정해도 cache가 bounce하는 문제로, padding으로 분리해 해결한다. 커널은 rwlock을 RCU로 대체하는 추세다.</desc>
  <rect x="0" y="0" width="680" height="580" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">reader-writer spinlock 과 캐시 효과</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">read-mostly 에 유용하나 writer starvation·cache bouncing 단점이 있습니다</text>

  <!-- rwlock -->
  <rect x="20" y="74" width="320" height="148" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="2"/>
  <text x="38" y="96" fill="#66bb6a" font-size="13" font-weight="bold">reader-writer spinlock</text>
  <text x="38" y="116" fill="rgb(138,133,128)" font-size="10">rwlock_t · read_lock / write_lock</text>

  <rect x="38" y="126" width="284" height="40" fill="rgba(102,187,106,0.13)" stroke="#66bb6a"/>
  <text x="52" y="146" fill="#66bb6a" font-size="11">read_lock — reader 들 동시 접근(락 없음)</text>
  <text x="52" y="162" fill="rgb(138,133,128)" font-size="10">writer 없으면 즉시 허용 · read-mostly 적합</text>

  <rect x="38" y="172" width="284" height="40" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="52" y="192" fill="rgb(212,168,83)" font-size="11">write_lock — 배타 접근</text>
  <text x="52" y="208" fill="rgb(138,133,128)" font-size="10">모든 reader unlock 대기 후 획득</text>

  <!-- 단점 -->
  <rect x="350" y="74" width="312" height="148" fill="rgba(244,67,54,0.10)" stroke="#f44336" stroke-width="2"/>
  <text x="368" y="96" fill="#f44336" font-size="13" font-weight="bold">⚠ 단점</text>
  <text x="368" y="116" fill="#e8e4df" font-size="11">writer starvation — reader 가 계속 오면</text>
  <text x="368" y="132" fill="rgb(138,133,128)" font-size="10">writer 가 무한정 굶을 수 있음</text>
  <text x="368" y="152" fill="#e8e4df" font-size="11">cache 효과(false sharing) — 아래 참조</text>
  <text x="368" y="172" fill="rgb(138,133,128)" font-size="10">"reader 가 짧으면 그냥 spinlock 이 낫다"</text>
  <text x="368" y="190" fill="#66bb6a" font-size="10">커널은 rwlock → RCU 로 대체하는 추세</text>
  <text x="368" y="210" fill="rgb(138,133,128)" font-size="9">rwsem·완료(completion)·seqlock 도 관련</text>

  <!-- CPU 캐싱 -->
  <rect x="20" y="240" width="642" height="120" fill="rgba(173,216,230,0.10)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="38" y="262" fill="#9cc3df" font-size="13" font-weight="bold">CPU 캐싱 기초 — cacheline 단위</text>
  <text x="38" y="282" fill="#e8e4df" font-size="11">CPU 는 RAM 을 바이트가 아니라 cacheline(보통 64바이트) 단위로 atomic 하게 읽음</text>

  <rect x="38" y="294" width="120" height="26" fill="rgba(102,187,106,0.13)" stroke="#66bb6a"/><text x="98" y="311" fill="#66bb6a" font-size="10" text-anchor="middle">L1 (1~수 ns)</text>
  <rect x="162" y="294" width="120" height="26" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/><text x="222" y="311" fill="rgb(212,168,83)" font-size="10" text-anchor="middle">L2</text>
  <rect x="286" y="294" width="120" height="26" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/><text x="346" y="311" fill="#e8e4df" font-size="10" text-anchor="middle">L3 (공유·LLC)</text>
  <rect x="410" y="294" width="120" height="26" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/><text x="470" y="311" fill="#e8e4df" font-size="10" text-anchor="middle">RAM (50~100ns)</text>

  <text x="38" y="338" fill="rgb(138,133,128)" font-size="10">cache hit/miss · locality of reference(공간·시간) 활용 · getconf 로 CACHE_LINESIZE 확인</text>
  <text x="38" y="354" fill="rgb(138,133,128)" font-size="10">read-ahead / write-behind 정책</text>

  <!-- cache coherency + false sharing -->
  <rect x="20" y="378" width="320" height="104" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="400" fill="#e8e4df" font-size="13" font-weight="bold">cache coherency</text>
  <text x="38" y="420" fill="rgb(138,133,128)" font-size="10">코어가 자기 캐시에서 데이터 수정 →</text>
  <text x="38" y="436" fill="rgb(138,133,128)" font-size="10">다른 코어/RAM 과 sync 필요</text>
  <text x="38" y="454" fill="#f47f72" font-size="11">cache bouncing(ping-pong)</text>
  <text x="38" y="470" fill="rgb(138,133,128)" font-size="9">MESI/MOESI HW 프로토콜 · 전력 많이 씀</text>

  <rect x="350" y="378" width="312" height="104" fill="rgba(244,67,54,0.10)" stroke="#f44336" stroke-width="2"/>
  <text x="368" y="400" fill="#f44336" font-size="13" font-weight="bold">⚠ false sharing</text>
  <text x="368" y="420" fill="#e8e4df" font-size="11">인접 변수가 같은 cacheline 에 있음</text>
  <text x="368" y="436" fill="rgb(138,133,128)" font-size="10">서로 다른 코어가 각각 다른 변수 수정해도</text>
  <text x="368" y="452" fill="rgb(138,133,128)" font-size="10">cache 가 bounce — data race 아닌 성능 문제!</text>
  <text x="368" y="470" fill="#66bb6a" font-size="10">해결: padding 으로 cacheline 분리</text>

  <!-- 요약 -->
  <rect x="20" y="500" width="642" height="72" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="38" y="522" fill="rgb(212,168,83)" font-size="13" font-weight="bold">핵심</text>
  <text x="38" y="542" fill="#e8e4df" font-size="11">large NUMA 에서 같은 데이터를 여러 코어가 수정하면, 안전해도(atomic) cache coherence 로 큰 성능 손실</text>
  <text x="38" y="560" fill="rgb(138,133,128)" font-size="10">→ lock-free(per-CPU·RCU)가 해법 (다음 노트 13-03) · perf·eBPF 로 cache miss 진단</text>
</svg>
