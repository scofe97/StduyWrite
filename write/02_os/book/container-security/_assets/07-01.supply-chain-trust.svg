<svg viewBox="0 0 860 480" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>공급망 신뢰 사슬과 약점</title>
  <desc>소스 코드 → 빌드 → 이미지 저장 → 배포로 이어지는 공급망의 각 단계에 약점이 있다. 각 단계의 방어: 소스는 접근 통제, 빌드는 신뢰 base image·Dockerfile 모범 관행·하드닝된 임시 빌드 머신, 산출물은 SBOM·provenance 기록. SLSA 프레임워크가 레벨 1~3 으로 무결성·추적성·출처의 신뢰 수준을 정의한다. SBOM 은 무엇이 들어갔는지를, provenance 는 어떻게 누가 빌드했는지를 기록하며, 의존성 혼동·패키지 환각 같은 위협에 맞선다.</desc>

  <rect x="0" y="0" width="860" height="480" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">공급망 신뢰 사슬 — 안전하게 만드는 쪽</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">배포·실행하는 SW 가 신뢰하는 소스·빌드 시스템에서 온 기대한 그것인가</text>

  <!-- 사슬 단계 -->
  <defs>
    <marker id="sc" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <!-- 소스 -->
  <rect x="32" y="84" width="184" height="120" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="124" y="108" fill="rgb(212,168,83)" font-size="14" text-anchor="middle">① 소스 코드</text>
  <text x="124" y="132" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">앱 코드 · Dockerfile</text>
  <text x="124" y="150" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">의존성 명세</text>
  <rect x="48" y="162" width="152" height="30" fill="#66bb6a" fill-opacity="0.12" stroke="#66bb6a" rx="3"/>
  <text x="124" y="182" fill="#e8e4df" font-size="11" text-anchor="middle">방어: 접근 통제</text>

  <!-- 빌드 -->
  <rect x="248" y="84" width="184" height="120" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="8"/>
  <text x="340" y="108" fill="rgb(212,168,83)" font-size="14" text-anchor="middle">② 빌드</text>
  <text x="340" y="132" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">Dockerfile → 이미지</text>
  <rect x="264" y="142" width="152" height="50" fill="#66bb6a" fill-opacity="0.12" stroke="#66bb6a" rx="3"/>
  <text x="340" y="160" fill="#e8e4df" font-size="10" text-anchor="middle">신뢰 base·모범관행</text>
  <text x="340" y="178" fill="#e8e4df" font-size="10" text-anchor="middle">하드닝·임시 빌드머신</text>

  <!-- 이미지 저장 -->
  <rect x="464" y="84" width="184" height="120" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="556" y="108" fill="rgb(212,168,83)" font-size="14" text-anchor="middle">③ 이미지 저장</text>
  <text x="556" y="132" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">레지스트리(digest)</text>
  <rect x="480" y="142" width="152" height="50" fill="#66bb6a" fill-opacity="0.12" stroke="#66bb6a" rx="3"/>
  <text x="556" y="160" fill="#e8e4df" font-size="10" text-anchor="middle">SBOM · provenance</text>
  <text x="556" y="178" fill="#e8e4df" font-size="10" text-anchor="middle">(서명·검증 → 07-02)</text>

  <!-- 배포 -->
  <rect x="680" y="84" width="148" height="120" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="754" y="108" fill="rgb(212,168,83)" font-size="14" text-anchor="middle">④ 배포</text>
  <text x="754" y="132" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">pull · 실행</text>
  <rect x="696" y="142" width="116" height="50" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" stroke-dasharray="4 3" rx="3"/>
  <text x="754" y="166" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">검증·admission</text>
  <text x="754" y="182" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">→ 07-02</text>

  <line x1="216" y1="144" x2="248" y2="144" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#sc)"/>
  <line x1="432" y1="144" x2="464" y2="144" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#sc)"/>
  <line x1="648" y1="144" x2="680" y2="144" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#sc)"/>

  <!-- 구분선 -->
  <line x1="32" y1="226" x2="828" y2="226" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- SLSA + SBOM/provenance -->
  <text x="32" y="254" fill="#e8e4df" font-size="16">SLSA — 무결성·추적성·출처의 신뢰 수준 (OpenSSF)</text>

  <rect x="32" y="270" width="388" height="78" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="226" y="294" fill="#e8e4df" font-size="13" text-anchor="middle">SBOM — 무엇이 들어갔는가</text>
  <text x="226" y="316" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">구성 요소·버전의 기계 판독 목록</text>
  <text x="226" y="336" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">SPDX · CycloneDX 포맷</text>

  <rect x="440" y="270" width="388" height="78" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="634" y="294" fill="#e8e4df" font-size="13" text-anchor="middle">provenance — 어떻게·누가 빌드</text>
  <text x="634" y="316" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">레벨 1: 서명 안 된 빌드 설정</text>
  <text x="634" y="336" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">레벨 3: 서명·검증 가능한 provenance</text>

  <!-- 두 위협 -->
  <text x="32" y="380" fill="#e8e4df" font-size="14">SBOM 이 맞서는 두 위협</text>
  <rect x="32" y="392" width="388" height="60" fill="#f44336" fill-opacity="0.10" stroke="#f44336" rx="6"/>
  <text x="226" y="414" fill="#e8e4df" font-size="12" text-anchor="middle">의존성 혼동</text>
  <text x="226" y="436" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">엉뚱한 버전·위치 → 버전·레지스트리 명시</text>

  <rect x="440" y="392" width="388" height="60" fill="#f44336" fill-opacity="0.10" stroke="#f44336" rx="6"/>
  <text x="634" y="414" fill="#e8e4df" font-size="12" text-anchor="middle">패키지 환각 (AI 생성 코드)</text>
  <text x="634" y="436" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">없는 패키지명을 악성으로 채워 둠</text>
</svg>
