<svg viewBox="0 0 860 500" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>격리를 무너뜨리는 설정과 정당한 공유</title>
  <desc>위: 취약점 없이 설정만으로 격리를 무너뜨리는 네 가지. --privileged 는 root 의 거의 모든 capability(CAP_SYS_ADMIN·CAP_NET_ADMIN·CAP_BPF)를 풀어 namespace 조작·마운트·eBPF 로드를 연다. 민감 디렉토리 마운트(/etc·/bin·/var/log)는 호스트 파일·로그·실행 파일 변조를 허용한다. Docker socket 마운트는 root 데몬에 지시를 보낼 수 있어 호스트 root 와 동등하다. --pid=host 같은 namespace 공유는 다른 컨테이너의 프로세스를 보고 죽일 수 있게 한다. 아래: 같은 namespace 공유 메커니즘이 정당한 목적으로도 쓰인다. 사이드카는 앱의 namespace 에 의도적으로 접근해 서비스 메시 mTLS·관측성·보안을 떼어 맡고, debug container 는 kubectl debug 로 진단한다 — 둘 다 강력한 만큼 통제·감사가 필요하다. 핵심: 모든 설정은 정당한 이유로 존재하므로, 사용을 최소화하고 언제 쓰이는지 탐지한다.</desc>

  <rect x="0" y="0" width="860" height="500" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">위험한 설정 vs 정당한 공유</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">취약점 없이 설정만으로 격리가 무너진다 — 같은 메커니즘이 좋은 목적으로도 쓰인다</text>

  <!-- 네 위험 설정 -->
  <text x="32" y="92" fill="#f44336" font-size="16">격리를 무너뜨리는 네 설정</text>

  <rect x="32" y="104" width="194" height="96" fill="#f44336" fill-opacity="0.10" stroke="#f44336" rx="8"/>
  <text x="129" y="128" fill="rgb(212,168,83)" font-family="'JetBrains Mono', monospace" font-size="12" text-anchor="middle">--privileged</text>
  <text x="129" y="150" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">root 의 거의 모든 capability</text>
  <text x="129" y="168" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">CAP_SYS_ADMIN·NET_ADMIN</text>
  <text x="129" y="186" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">CAP_BPF → 마운트·eBPF</text>

  <rect x="234" y="104" width="194" height="96" fill="#f44336" fill-opacity="0.10" stroke="#f44336" rx="8"/>
  <text x="331" y="128" fill="rgb(212,168,83)" font-family="'JetBrains Mono', monospace" font-size="12" text-anchor="middle">-v /etc:/...</text>
  <text x="331" y="150" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">민감 디렉토리 마운트</text>
  <text x="331" y="168" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">/etc·/bin·/var/log</text>
  <text x="331" y="186" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">shadow·실행파일·로그 변조</text>

  <rect x="436" y="104" width="194" height="96" fill="#f44336" fill-opacity="0.10" stroke="#f44336" rx="8"/>
  <text x="533" y="128" fill="rgb(212,168,83)" font-family="'JetBrains Mono', monospace" font-size="11" text-anchor="middle">docker.sock</text>
  <text x="533" y="150" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">root 데몬에 지시 가능</text>
  <text x="533" y="168" fill="#f44336" font-size="10" text-anchor="middle">= 호스트 root 와 동등</text>
  <text x="533" y="186" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">CI(Jenkins) 무른 배</text>

  <rect x="638" y="104" width="190" height="96" fill="#f44336" fill-opacity="0.10" stroke="#f44336" rx="8"/>
  <text x="733" y="128" fill="rgb(212,168,83)" font-family="'JetBrains Mono', monospace" font-size="11" text-anchor="middle">--pid=host</text>
  <text x="733" y="150" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">namespace 공유</text>
  <text x="733" y="168" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">다른 컨테이너 프로세스</text>
  <text x="733" y="186" fill="#f44336" font-size="10" text-anchor="middle">관찰 + kill 가능</text>

  <!-- 구분선 -->
  <line x1="32" y1="222" x2="828" y2="222" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 정당한 공유 -->
  <text x="32" y="250" fill="#66bb6a" font-size="16">같은 공유 메커니즘 — 정당한 두 패턴</text>

  <rect x="32" y="264" width="500" height="130" fill="#66bb6a" fill-opacity="0.10" stroke="#66bb6a" rx="8"/>
  <text x="48" y="288" fill="#e8e4df" font-size="14">사이드카 — 앱 namespace 에 의도적 접근, 기능을 떼어 맡음</text>
  <rect x="48" y="300" width="148" height="42" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="4"/>
  <text x="122" y="318" fill="#e8e4df" font-size="11" text-anchor="middle">서비스 메시</text>
  <text x="122" y="334" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">mTLS (Ch 12)</text>
  <rect x="204" y="300" width="148" height="42" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="4"/>
  <text x="278" y="318" fill="#e8e4df" font-size="11" text-anchor="middle">관측성</text>
  <text x="278" y="334" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">Prometheus·OTel</text>
  <rect x="360" y="300" width="156" height="42" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="4"/>
  <text x="438" y="318" fill="#e8e4df" font-size="11" text-anchor="middle">보안</text>
  <text x="438" y="334" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">실행·연결 단속</text>
  <text x="48" y="364" fill="rgb(138,133,128)" font-size="10">K8s 일급 시민(pod 다중 컨테이너·MutatingAdmissionWebhook). 어떤 언어로든 가능</text>
  <text x="48" y="382" fill="rgb(138,133,128)" font-size="10">한계: 자원↑·강결합·시작 순서 → sidecarless(eBPF 커널 계측, Ch 15)로 이동</text>

  <rect x="548" y="264" width="280" height="130" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="8"/>
  <text x="688" y="288" fill="#e8e4df" font-size="14" text-anchor="middle">debug container</text>
  <text x="688" y="312" fill="rgb(138,133,128)" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="middle">kubectl debug</text>
  <text x="688" y="332" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">실행 중 pod 에 붙는</text>
  <text x="688" y="350" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">ephemeral 진단 컨테이너</text>
  <text x="688" y="374" fill="#f44336" font-size="10" text-anchor="middle">임의 코드 실행 → 고위험</text>
  <text x="688" y="390" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">신뢰 사용자·감사·자동 정리</text>

  <!-- 결론 -->
  <text x="32" y="426" fill="rgb(138,133,128)" font-size="12">최소 권한: --cap-drop=all 후 필요한 것만 --cap-add (capable 로 필요 capability 추적)</text>
  <text x="32" y="448" fill="#f44336" font-size="12">멀티테넌트 주의: --privileged 컨테이너는 같은 호스트의 다른 모든 컨테이너에 접근(K8s namespace 무관)</text>
  <text x="32" y="470" fill="#66bb6a" font-size="12">핵심: 모든 설정은 정당한 이유로 존재 → 사용 최소화 + 언제 쓰이는지 탐지하는 도구를 둔다</text>
</svg>
