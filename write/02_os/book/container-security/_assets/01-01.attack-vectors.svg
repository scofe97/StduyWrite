<svg viewBox="0 0 860 540" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>컨테이너 생애주기별 공격 벡터</title>
  <desc>코드 작성 → 이미지 빌드 → 레지스트리 → 실행으로 이어지는 컨테이너 생애주기의 각 단계에 놓인 공격 벡터와 대응 장. 코드 단계는 취약한 앱 코드·의존성(Ch8), 빌드 단계는 잘못 설정된 이미지(Ch6)와 공급망 공격(Ch7), 레지스트리, 실행 단계는 잘못 설정된 컨테이너(Ch11)·취약한 호스트(Ch4)·안전하지 않은 네트워킹(Ch12)·노출된 시크릿(Ch14)·런타임 익스플로잇(Ch4/10/15).</desc>

  <rect x="0" y="0" width="860" height="540" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">컨테이너 생애주기별 공격 벡터</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">단계마다 위협이 있고, 사슬처럼 엮여 보안 경계를 차례로 뚫는다</text>

  <!-- 생애주기 4단계 띠 -->
  <defs>
    <marker id="av" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <!-- 단계 헤더 박스 -->
  <rect x="32" y="84" width="180" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="122" y="109" fill="#e8e4df" font-size="15" text-anchor="middle">① 코드</text>
  <rect x="240" y="84" width="180" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="330" y="109" fill="#e8e4df" font-size="15" text-anchor="middle">② 빌드</text>
  <rect x="448" y="84" width="180" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="538" y="109" fill="#e8e4df" font-size="15" text-anchor="middle">③ 레지스트리</text>
  <rect x="656" y="84" width="172" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="742" y="109" fill="#e8e4df" font-size="15" text-anchor="middle">④ 실행</text>

  <line x1="212" y1="104" x2="240" y2="104" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#av)"/>
  <line x1="420" y1="104" x2="448" y2="104" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#av)"/>
  <line x1="628" y1="104" x2="656" y2="104" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#av)"/>

  <!-- ① 코드 벡터 -->
  <rect x="32" y="140" width="180" height="66" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="4"/>
  <text x="122" y="166" fill="#e8e4df" font-size="13" text-anchor="middle">취약한 앱 코드·의존성</text>
  <text x="122" y="190" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">알려진 취약점 → 스캔</text>
  <text x="122" y="200" fill="rgb(212,168,83)" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="middle">Ch 8</text>

  <!-- ② 빌드 벡터 2개 -->
  <rect x="240" y="140" width="180" height="66" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="4"/>
  <text x="330" y="162" fill="#e8e4df" font-size="13" text-anchor="middle">잘못 설정된 이미지</text>
  <text x="330" y="184" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">root 실행 등 과한 권한</text>
  <text x="330" y="200" fill="rgb(212,168,83)" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="middle">Ch 6</text>

  <rect x="240" y="216" width="388" height="58" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="4"/>
  <text x="434" y="240" fill="#e8e4df" font-size="13" text-anchor="middle">공급망·빌드 머신 공격 (빌드~배포 전 구간)</text>
  <text x="434" y="260" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">소스 변조·이미지 교체·엉뚱한 pull → 임의 코드 실행 · Ch 7</text>

  <!-- ④ 실행 벡터 묶음 -->
  <rect x="656" y="140" width="172" height="50" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="4"/>
  <text x="742" y="160" fill="#e8e4df" font-size="12" text-anchor="middle">잘못 설정된 컨테이너</text>
  <text x="742" y="180" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">계획 밖 권한 · Ch 11</text>

  <rect x="656" y="196" width="172" height="50" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="4"/>
  <text x="742" y="216" fill="#e8e4df" font-size="12" text-anchor="middle">취약한 호스트</text>
  <text x="742" y="236" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">공격 표면 축소 · Ch 4</text>

  <rect x="656" y="252" width="172" height="50" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="4"/>
  <text x="742" y="272" fill="#e8e4df" font-size="12" text-anchor="middle">안전하지 않은 네트워킹</text>
  <text x="742" y="292" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">네트워크 정책 · Ch 12</text>

  <rect x="656" y="308" width="172" height="50" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="4"/>
  <text x="742" y="328" fill="#e8e4df" font-size="12" text-anchor="middle">노출된 시크릿</text>
  <text x="742" y="348" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">자격 전달 방식 · Ch 14</text>

  <rect x="656" y="364" width="172" height="50" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="4"/>
  <text x="742" y="384" fill="#e8e4df" font-size="12" text-anchor="middle">런타임 익스플로잇</text>
  <text x="742" y="404" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">탈출·권한상승 · Ch4/10/15</text>

  <!-- 구분선 -->
  <line x1="32" y1="300" x2="628" y2="300" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 공격 사슬 -->
  <text x="32" y="328" fill="#e8e4df" font-size="16">공격 사슬 — 약한 경계를 차례로 넘는다</text>

  <rect x="32" y="346" width="138" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="101" y="370" fill="#e8e4df" font-size="12" text-anchor="middle">컨테이너 내</text>
  <text x="101" y="388" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">원격 코드 실행</text>

  <rect x="194" y="346" width="138" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="263" y="370" fill="#e8e4df" font-size="12" text-anchor="middle">컨테이너 탈출</text>
  <text x="263" y="388" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">→ 호스트</text>

  <rect x="356" y="346" width="138" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="425" y="370" fill="#e8e4df" font-size="12" text-anchor="middle">호스트 root</text>
  <text x="425" y="388" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">권한 상승</text>

  <rect x="518" y="346" width="138" height="56" fill="#f44336" fill-opacity="0.18" stroke="#f44336" rx="6"/>
  <text x="587" y="370" fill="#e8e4df" font-size="12" text-anchor="middle">전체 장악</text>
  <text x="587" y="388" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">FAIL · 닿는 모든 것</text>

  <line x1="170" y1="374" x2="194" y2="374" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#av)"/>
  <line x1="332" y1="374" x2="356" y2="374" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#av)"/>
  <line x1="494" y1="374" x2="518" y2="374" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#av)"/>

  <!-- 결론 -->
  <text x="32" y="438" fill="rgb(138,133,128)" font-size="13">컨테이너는 보안 경계가 맞다 — 단지 약한 경계다. 그래서 경계를 여러 겹 쌓는다.</text>
  <text x="32" y="462" fill="rgb(138,133,128)" font-size="13">공격자와 목표(고객 데이터) 사이 경계가 많을수록 도달이 어려워진다.</text>
  <text x="32" y="490" fill="rgb(138,133,128)" font-size="12">방어 원칙: 최소 권한 · 심층 방어 · 공격 표면 축소 · 폭발 반경 제한 · 직무 분리</text>
</svg>
