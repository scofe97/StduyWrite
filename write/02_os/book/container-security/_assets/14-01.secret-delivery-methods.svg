<svg viewBox="0 0 860 500" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>컨테이너에 시크릿을 전달하는 방법과 적합성</title>
  <desc>위: 컨테이너에 시크릿을 넣는 다섯 방법을 적합성 순으로 늘어놓는다. 이미지에 파일로 포함하거나 이미지 환경변수로 정의하는 빌드 시점 두 방법은 소스 접근자가 보고 재빌드 없이는 못 바꿔 부적합하다. 실행 시점 환경변수는 크래시 덤프·docker inspect·/proc/pid/environ 으로 노출되고 생성 시 한 번만 설정돼 회전에 불리하다. 네트워크 전달은 가능하나 보안 연결에 또 자격증명이 필요한 부트스트랩 문제가 있다. 파일을 메모리 임시 디렉토리(tmpfs)로 마운트하는 것이 최선으로, 디스크에 평문이 안 남고 재시작 없이 inotify 로 회전할 수 있다. 가운데: Kubernetes Secrets 생태계. 네이티브 Secrets 는 etcd 에 저장하고, Secrets Store CSI Driver 는 런타임에 외부 KMS 에서 끌어와 etcd 를 거치지 않으며, External Secrets Operator 는 외부 관리자에서 네이티브 Secrets 로 동기화한다. 아래: 어떤 방법이든 호스트 root 는 마운트 파일과 /proc/pid/environ 으로 시크릿을 다 볼 수 있다 — 그래서 컨테이너 안 root 실행이 위험하다.</desc>

  <rect x="0" y="0" width="860" height="500" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">시크릿 전달 방법과 적합성</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">빌드 시점에 굽지 말 것 · 환경변수는 새 나감 · 파일(tmpfs)이 최선</text>

  <!-- 다섯 방법 스펙트럼 -->
  <rect x="32" y="84" width="252" height="92" fill="#f44336" fill-opacity="0.10" stroke="#f44336" rx="8"/>
  <text x="158" y="108" fill="#e8e4df" font-size="13" text-anchor="middle">① 이미지 파일 · ② 이미지 env</text>
  <text x="158" y="128" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">빌드 시점 — 부적합</text>
  <text x="158" y="146" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">소스 접근자가 봄</text>
  <text x="158" y="164" fill="#f44336" font-size="10" text-anchor="middle">재빌드 없이 못 바꿈 (스캐너가 잡음)</text>

  <rect x="304" y="84" width="252" height="92" fill="#f44336" fill-opacity="0.10" stroke="#f44336" rx="8"/>
  <text x="430" y="108" fill="#e8e4df" font-size="13" text-anchor="middle">④ 실행 시점 env (-e)</text>
  <text x="430" y="128" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">권장 안 함</text>
  <text x="430" y="146" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">크래시 덤프·inspect·/proc 노출</text>
  <text x="430" y="164" fill="#f44336" font-size="10" text-anchor="middle">생성 시 1회 설정 → 회전 불리</text>

  <rect x="576" y="84" width="252" height="92" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="8"/>
  <text x="702" y="108" fill="#e8e4df" font-size="13" text-anchor="middle">③ 네트워크</text>
  <text x="702" y="128" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">Vault·Secrets Manager API</text>
  <text x="702" y="146" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">가능하나 부트스트랩 문제</text>
  <text x="702" y="164" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">(보안 연결에 또 자격증명)</text>

  <rect x="32" y="184" width="796" height="64" fill="#66bb6a" fill-opacity="0.12" stroke="#66bb6a" rx="8"/>
  <text x="430" y="208" fill="#e8e4df" font-size="14" text-anchor="middle">⑤ 파일 — 메모리 임시 디렉토리(tmpfs) 마운트 · 최선</text>
  <text x="430" y="230" fill="#66bb6a" font-size="11" text-anchor="middle">디스크에 평문 안 남음 · 재시작 없이 호스트에서 갱신 · inotify 로 변경 감지 → 회전</text>

  <!-- K8s Secrets 생태계 -->
  <line x1="32" y1="272" x2="828" y2="272" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="32" y="300" fill="#e8e4df" font-size="15">Kubernetes Secrets 생태계</text>

  <rect x="32" y="314" width="256" height="92" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="160" y="338" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">네이티브 Secrets</text>
  <text x="160" y="360" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">독립 리소스 · 파일/env 지원</text>
  <text x="160" y="378" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">RBAC write-only · 전송 암호화</text>
  <text x="160" y="396" fill="#f44336" font-size="10" text-anchor="middle">etcd 에 base64 저장(암호화 켜야)</text>

  <rect x="304" y="314" width="256" height="92" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="6"/>
  <text x="432" y="338" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">Secrets Store CSI Driver</text>
  <text x="432" y="360" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">런타임에 외부 KMS→파일 마운트</text>
  <text x="432" y="378" fill="#66bb6a" font-size="10" text-anchor="middle">etcd 미저장 · env 노출 안 됨</text>
  <text x="432" y="396" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">앱 수정·재시작 필요</text>

  <rect x="576" y="314" width="252" height="92" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="702" y="338" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">External Secrets Operator</text>
  <text x="702" y="360" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">외부 관리자 → 네이티브 Secrets</text>
  <text x="702" y="378" fill="#66bb6a" font-size="10" text-anchor="middle">앱 수정 불필요(env/파일 그대로)</text>
  <text x="702" y="396" fill="#f44336" font-size="10" text-anchor="middle">네이티브라 etcd 저장됨</text>

  <!-- root 한계 -->
  <rect x="32" y="420" width="796" height="60" fill="#f44336" fill-opacity="0.10" stroke="#f44336" rx="8"/>
  <text x="430" y="444" fill="#e8e4df" font-size="14" text-anchor="middle">호스트 root 는 결국 다 본다 — 파일·환경변수 모두</text>
  <text x="430" y="466" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">sudo cat $DIR/secret · cat /proc/&lt;pid&gt;/environ → 컨테이너 안 root = 호스트 root 라 root 실행이 위험(11장)</text>
</svg>
