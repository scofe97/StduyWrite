<svg viewBox="0 0 860 540" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>OWASP Top 10 컨테이너 관점 매핑</title>
  <desc>OWASP Top 10 열 가지 위험을 컨테이너 특화 완화책과 그것을 다룬 장에 연결한다. 취약한 접근 통제는 root 금지·capability 제한·RBAC·rootless(11·15장), 암호화 실패는 강한 암호화·시크릿 최소화·트래픽 암호화(13·14장), 인젝션은 컨테이너 특화가 약해 앱 코드가 본령(8장 스캔만 보조), 안전하지 않은 설계는 마이크로서비스로 위협 모델을 쪼개 추론(13장), 보안 오설정은 CIS Benchmarks·CSPM·네트워크 정책(6·12·14장), 취약·노후 컴포넌트는 이미지 스캔·최소 base·런타임 완화(8·15장), 인증 실패는 시크릿·Service Mesh(13·14장), SW·데이터 무결성은 서명·SBOM·CI/CD(7장), 로깅·모니터링은 중앙 로깅·런타임 차단(15장), SSRF 는 컨테이너에서 순위가 올라가며 네트워크 정책·런타임 모니터링으로 완화(12·15장)한다. 아래: 컨테이너 완화책은 공격의 폭발 반경을 줄이는 데 강하지만 앱 수준 결함을 대신 막지 못하므로, 보안은 앱 코드와 인프라 양쪽에 새겨야 한다.</desc>

  <rect x="0" y="0" width="860" height="540" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">OWASP Top 10 — 컨테이너 관점 매핑</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">열 위험을 컨테이너 특화 완화책과 다룬 장에 연결 — 책 전체의 OWASP 축 리뷰</text>

  <!-- 10개 카테고리 그리드 (2열 x 5행) -->
  <!-- 행 1 -->
  <rect x="32" y="82" width="398" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="44" y="102" fill="rgb(212,168,83)" font-size="12">1 취약한 접근 통제</text>
  <text x="44" y="120" fill="rgb(138,133,128)" font-size="10">root 금지·capability·RBAC·rootless</text>
  <text x="418" y="120" fill="#66bb6a" font-size="10" text-anchor="end">11·15장</text>

  <rect x="438" y="82" width="390" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="450" y="102" fill="rgb(212,168,83)" font-size="12">2 암호화 실패</text>
  <text x="450" y="120" fill="rgb(138,133,128)" font-size="10">강한 암호화·시크릿 최소·트래픽 암호화·키 스캔</text>
  <text x="816" y="120" fill="#66bb6a" font-size="10" text-anchor="end">13·14장</text>

  <!-- 행 2 -->
  <rect x="32" y="144" width="398" height="56" fill="rgb(42,37,32)" rx="6"/>
  <text x="44" y="164" fill="rgb(212,168,83)" font-size="12">3 인젝션</text>
  <text x="44" y="182" fill="rgb(138,133,128)" font-size="10">앱 코드 본령 · 스캔만 보조</text>
  <text x="418" y="182" fill="rgb(138,133,128)" font-size="10" text-anchor="end">8장</text>

  <rect x="438" y="144" width="390" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="450" y="164" fill="rgb(212,168,83)" font-size="12">4 안전하지 않은 설계</text>
  <text x="450" y="182" fill="rgb(138,133,128)" font-size="10">마이크로서비스로 위협 모델 분할·zero-trust</text>
  <text x="816" y="182" fill="#66bb6a" font-size="10" text-anchor="end">13장</text>

  <!-- 행 3 -->
  <rect x="32" y="206" width="398" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="44" y="226" fill="rgb(212,168,83)" font-size="12">5 보안 오설정</text>
  <text x="44" y="244" fill="rgb(138,133,128)" font-size="10">CIS Benchmarks·CSPM·네트워크 정책</text>
  <text x="418" y="244" fill="#66bb6a" font-size="10" text-anchor="end">6·12·14장</text>

  <rect x="438" y="206" width="390" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="450" y="226" fill="rgb(212,168,83)" font-size="12">6 취약·노후 컴포넌트</text>
  <text x="450" y="244" fill="rgb(138,133,128)" font-size="10">이미지 스캔·최소 base·런타임 완화</text>
  <text x="816" y="244" fill="#66bb6a" font-size="10" text-anchor="end">8·15장</text>

  <!-- 행 4 -->
  <rect x="32" y="268" width="398" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="44" y="288" fill="rgb(212,168,83)" font-size="12">7 인증·식별 실패</text>
  <text x="44" y="306" fill="rgb(138,133,128)" font-size="10">시크릿·런타임 전달·Service Mesh</text>
  <text x="418" y="306" fill="#66bb6a" font-size="10" text-anchor="end">13·14장</text>

  <rect x="438" y="268" width="390" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="450" y="288" fill="rgb(212,168,83)" font-size="12">8 SW·데이터 무결성</text>
  <text x="450" y="306" fill="rgb(138,133,128)" font-size="10">서명·SBOM·CI/CD (역직렬화는 앱 본령)</text>
  <text x="816" y="306" fill="#66bb6a" font-size="10" text-anchor="end">7장</text>

  <!-- 행 5 -->
  <rect x="32" y="330" width="398" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="44" y="350" fill="rgb(212,168,83)" font-size="12">9 로깅·모니터링 실패</text>
  <text x="44" y="368" fill="rgb(138,133,128)" font-size="10">중앙 로깅(Fluentd·ELK·SIEM)·런타임 차단</text>
  <text x="418" y="368" fill="#66bb6a" font-size="10" text-anchor="end">15장</text>

  <rect x="438" y="330" width="390" height="56" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="6"/>
  <text x="450" y="350" fill="rgb(212,168,83)" font-size="12">10 SSRF — 컨테이너에서 순위↑</text>
  <text x="450" y="368" fill="rgb(138,133,128)" font-size="10">내부 API(K8s·메타데이터·DB) 표적 · 네트워크 정책</text>
  <text x="816" y="368" fill="#66bb6a" font-size="10" text-anchor="end">12·15장</text>

  <!-- 균형 -->
  <line x1="32" y1="406" x2="828" y2="406" stroke="rgb(42,37,32)" stroke-width="1"/>

  <rect x="32" y="420" width="388" height="68" fill="#66bb6a" fill-opacity="0.10" stroke="#66bb6a" rx="8"/>
  <text x="226" y="444" fill="#e8e4df" font-size="13" text-anchor="middle">컨테이너 완화책의 강점</text>
  <text x="226" y="466" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">공격의 폭발 반경(blast radius)을 줄임</text>
  <text x="226" y="482" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">격리·최소 권한·세그멘테이션·런타임 차단</text>

  <rect x="440" y="420" width="388" height="68" fill="#f44336" fill-opacity="0.10" stroke="#f44336" rx="8"/>
  <text x="634" y="444" fill="#e8e4df" font-size="13" text-anchor="middle">컨테이너가 대신 못 막는 것</text>
  <text x="634" y="466" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">앱 수준 결함 — 인젝션·권한 로직·역직렬화</text>
  <text x="634" y="482" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">앱 코드 본령(OWASP 권고)</text>

  <text x="430" y="512" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">보안은 앱 코드 와 인프라 양쪽에 새겨야 한다</text>
  <text x="430" y="532" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">IBM 2025: 침해 식별 평균 181일 + 봉쇄 60일 → 관측·경고·런타임 예방으로 단축</text>
</svg>
