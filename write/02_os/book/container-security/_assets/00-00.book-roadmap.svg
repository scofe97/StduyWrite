<svg viewBox="0 0 860 560" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Container Security 2판 — 16챕터 5그룹 학습 로드맵</title>
  <desc>토대(1-2), 해부(3-5), 이미지·공급망(6-9), 격리 강화(10-11), 통신·런타임(12-16) 다섯 그룹으로 묶인 16개 챕터의 학습 흐름. 모든 챕터는 control groups·namespaces·root 디렉토리 변경이라는 리눅스 커널 기초 위에 선다.</desc>

  <rect x="0" y="0" width="860" height="560" fill="#0d0d0d"/>

  <!-- 제목 -->
  <text x="32" y="44" fill="#e8e4df" font-size="22">Container Security (2판) — 학습 로드맵</text>
  <text x="32" y="70" fill="rgb(138,133,128)" font-size="13">16개 챕터 · 5개 그룹 · O'Reilly, Liz Rice</text>

  <!-- 기초 토대 바 (모든 챕터가 그 위에 섬) -->
  <rect x="32" y="486" width="796" height="52" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="2" rx="6"/>
  <text x="430" y="509" fill="#e8e4df" font-size="14" text-anchor="middle">리눅스 커널 기초 — 모든 컨테이너가 이 위에 선다</text>
  <text x="430" y="529" fill="rgb(212,168,83)" font-family="'JetBrains Mono', monospace" font-size="12" text-anchor="middle">control groups · namespaces · changing root directory</text>

  <!-- 그룹 1: 토대 -->
  <rect x="32" y="96" width="150" height="362" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="107" y="122" fill="rgb(212,168,83)" font-size="15" text-anchor="middle">① 토대</text>
  <rect x="48" y="138" width="118" height="56" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="4"/>
  <text x="107" y="160" fill="#e8e4df" font-size="12" text-anchor="middle">Ch1 위협 모델</text>
  <text x="107" y="178" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">공격 벡터</text>
  <rect x="48" y="204" width="118" height="56" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="4"/>
  <text x="107" y="226" fill="#e8e4df" font-size="12" text-anchor="middle">Ch2 커널 기초</text>
  <text x="107" y="244" fill="rgb(138,133,128)" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="middle">syscall · cap</text>

  <!-- 그룹 2: 해부 -->
  <rect x="194" y="96" width="150" height="362" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="269" y="122" fill="rgb(212,168,83)" font-size="15" text-anchor="middle">② 해부</text>
  <rect x="210" y="138" width="118" height="40" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="4"/>
  <text x="269" y="163" fill="#e8e4df" font-size="12" text-anchor="middle">Ch3 구성 (1)</text>
  <rect x="210" y="188" width="118" height="40" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="4"/>
  <text x="269" y="213" fill="#e8e4df" font-size="12" text-anchor="middle">Ch4 구성 (2)</text>
  <rect x="210" y="238" width="118" height="40" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="4"/>
  <text x="269" y="263" fill="#e8e4df" font-size="12" text-anchor="middle">Ch5 VM 비교</text>

  <!-- 그룹 3: 이미지·공급망 -->
  <rect x="356" y="96" width="150" height="362" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="431" y="122" fill="rgb(212,168,83)" font-size="14" text-anchor="middle">③ 이미지·공급망</text>
  <rect x="372" y="138" width="118" height="40" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="4"/>
  <text x="431" y="163" fill="#e8e4df" font-size="12" text-anchor="middle">Ch6 이미지</text>
  <rect x="372" y="188" width="118" height="40" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="4"/>
  <text x="431" y="213" fill="#e8e4df" font-size="12" text-anchor="middle">Ch7 공급망</text>
  <rect x="372" y="238" width="118" height="40" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="4"/>
  <text x="431" y="263" fill="#e8e4df" font-size="12" text-anchor="middle">Ch8 취약점</text>
  <rect x="372" y="288" width="118" height="40" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="4"/>
  <text x="431" y="313" fill="#e8e4df" font-size="12" text-anchor="middle">Ch9 GitOps</text>

  <!-- 그룹 4: 격리 강화 -->
  <rect x="518" y="96" width="150" height="362" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="593" y="122" fill="rgb(212,168,83)" font-size="15" text-anchor="middle">④ 격리 강화</text>
  <rect x="534" y="138" width="118" height="56" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="4"/>
  <text x="593" y="160" fill="#e8e4df" font-size="12" text-anchor="middle">Ch10 하드닝</text>
  <text x="593" y="178" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">선택적 강화</text>
  <rect x="534" y="204" width="118" height="56" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="4"/>
  <text x="593" y="226" fill="#e8e4df" font-size="12" text-anchor="middle">Ch11 오설정</text>
  <text x="593" y="244" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">격리 붕괴</text>

  <!-- 그룹 5: 통신·런타임 -->
  <rect x="680" y="96" width="148" height="362" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="754" y="122" fill="rgb(212,168,83)" font-size="14" text-anchor="middle">⑤ 통신·런타임</text>
  <rect x="696" y="138" width="116" height="38" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="4"/>
  <text x="754" y="162" fill="#e8e4df" font-size="12" text-anchor="middle">Ch12 통신</text>
  <rect x="696" y="186" width="116" height="38" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="4"/>
  <text x="754" y="210" fill="#e8e4df" font-size="12" text-anchor="middle">Ch13 키·인증서</text>
  <rect x="696" y="234" width="116" height="38" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="4"/>
  <text x="754" y="258" fill="#e8e4df" font-size="12" text-anchor="middle">Ch14 자격증명</text>
  <rect x="696" y="282" width="116" height="38" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="4"/>
  <text x="754" y="306" fill="#e8e4df" font-size="12" text-anchor="middle">Ch15 런타임 도구</text>
  <rect x="696" y="330" width="116" height="38" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="4"/>
  <text x="754" y="354" fill="#e8e4df" font-size="12" text-anchor="middle">Ch16 OWASP 10</text>

  <!-- 그룹 간 진행 화살표 -->
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <line x1="182" y1="410" x2="194" y2="410" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="344" y1="410" x2="356" y2="410" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="506" y1="410" x2="518" y2="410" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="668" y1="410" x2="680" y2="410" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 그룹 한 줄 요약 (하단, 각 그룹 박스 안 빈 영역) -->
  <text x="107" y="430" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">무엇을 막을까</text>
  <text x="269" y="430" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">정체와 한계</text>
  <text x="431" y="430" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">무엇을 돌릴까</text>
  <text x="593" y="430" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">단단히·점검</text>
  <text x="754" y="430" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">움직임 방어</text>
</svg>
