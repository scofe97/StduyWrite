<svg viewBox="0 0 860 470" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>컨테이너 이미지 구조와 OCI 런타임 흐름</title>
  <desc>위: 이미지는 두 부분 — root 파일시스템과 설정 — 으로 이뤄진다. Dockerfile 의 FROM·COPY·RUN 은 파일시스템을, USER·ENV·PORT 는 설정을 바꾸고, 설정은 런타임에 docker run 플래그나 K8s YAML 로 덮어쓸 수 있다. 아래: OCI 이미지는 index.json 매니페스트 + blobs(레이어)로 저장되고 digest 로 식별된다. runc 는 이를 직접 쓰지 않고 runtime bundle(rootfs + config.json)로 풀어 쓰며, config.json 은 마운트·namespace 등 04장의 격리 메커니즘을 지시한다.</desc>

  <rect x="0" y="0" width="860" height="470" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">컨테이너 이미지 = root 파일시스템 + 설정</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">Dockerfile 명령이 둘 중 하나에 작용 · 설정은 런타임에 덮어쓰기 가능</text>

  <!-- 두 부분 -->
  <rect x="32" y="84" width="388" height="92" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="6"/>
  <text x="226" y="108" fill="rgb(212,168,83)" font-size="14" text-anchor="middle">① root 파일시스템</text>
  <text x="226" y="132" fill="#e8e4df" font-family="'JetBrains Mono', monospace" font-size="12" text-anchor="middle">bin etc lib usr var ...</text>
  <text x="226" y="156" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">FROM · ADD · COPY · RUN 이 바꿈</text>

  <rect x="440" y="84" width="388" height="92" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="634" y="108" fill="rgb(212,168,83)" font-size="14" text-anchor="middle">② 설정 (configuration)</text>
  <text x="634" y="132" fill="#e8e4df" font-family="'JetBrains Mono', monospace" font-size="12" text-anchor="middle">USER · ENV · PORT ...</text>
  <text x="634" y="156" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">런타임에 덮어쓰기: docker run / K8s YAML</text>

  <!-- 구분선 -->
  <line x1="32" y1="196" x2="828" y2="196" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- OCI 흐름 -->
  <text x="32" y="224" fill="#e8e4df" font-size="16">OCI 저장 포맷 → runc 런타임 bundle</text>

  <defs>
    <marker id="oc" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <!-- OCI 이미지 -->
  <rect x="32" y="240" width="248" height="150" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="156" y="264" fill="#e8e4df" font-size="13" text-anchor="middle">OCI 이미지 (레지스트리)</text>
  <rect x="48" y="276" width="216" height="30" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="3"/>
  <text x="156" y="296" fill="#e8e4df" font-family="'JetBrains Mono', monospace" font-size="11" text-anchor="middle">index.json (매니페스트)</text>
  <rect x="48" y="312" width="216" height="46" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="3"/>
  <text x="156" y="331" fill="#e8e4df" font-family="'JetBrains Mono', monospace" font-size="11" text-anchor="middle">blobs/ (레이어들)</text>
  <text x="156" y="349" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">내용 해시 = digest 로 식별</text>
  <text x="156" y="378" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">oci-layout</text>

  <!-- 풀기 -->
  <line x1="280" y1="315" x2="340" y2="315" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#oc)"/>
  <text x="310" y="305" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">umoci</text>
  <text x="310" y="335" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">unpack</text>

  <!-- runtime bundle -->
  <rect x="352" y="240" width="248" height="150" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="6"/>
  <text x="476" y="264" fill="#e8e4df" font-size="13" text-anchor="middle">runtime bundle</text>
  <rect x="368" y="276" width="216" height="30" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="3"/>
  <text x="476" y="296" fill="#e8e4df" font-family="'JetBrains Mono', monospace" font-size="11" text-anchor="middle">rootfs/</text>
  <rect x="368" y="312" width="216" height="46" fill="#0d0d0d" stroke="rgb(42,37,32)" rx="3"/>
  <text x="476" y="331" fill="#e8e4df" font-family="'JetBrains Mono', monospace" font-size="11" text-anchor="middle">config.json</text>
  <text x="476" y="349" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">마운트 · namespace 목록</text>
  <text x="476" y="378" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">runc 의 컨테이너 생성 지시</text>

  <!-- runc 실행 -->
  <line x1="600" y1="315" x2="660" y2="315" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#oc)"/>
  <text x="630" y="305" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">runc</text>

  <rect x="672" y="276" width="156" height="78" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="750" y="306" fill="#e8e4df" font-size="13" text-anchor="middle">컨테이너</text>
  <text x="750" y="328" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">04장의 격리</text>
  <text x="750" y="344" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">메커니즘 적용</text>

  <!-- 결론 -->
  <text x="32" y="418" fill="rgb(138,133,128)" font-size="12">OCI Distribution Spec: 이미지 외에 Helm 차트·OPA 정책·SBOM 등 컨테이너 인접 아티팩트도 저장</text>
  <text x="32" y="442" fill="rgb(138,133,128)" font-size="12">config.json 의 namespace·마운트 = 이미지 설정이 04장의 격리를 그대로 지시</text>
</svg>
