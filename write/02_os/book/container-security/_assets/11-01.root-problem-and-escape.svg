<svg viewBox="0 0 860 500" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>컨테이너 root 문제와 회피 경로</title>
  <desc>위: 기본 root 실행의 위험. 이미지가 USER 를 지정하지 않으면 컨테이너는 root 로 돌고, user namespace 가 없으면 그 root 가 곧 호스트 root 다. 공격자가 root 컨테이너를 탈출하면 호스트 전체와 다른 모든 컨테이너에 접근한다. 가운데: 세 회피 경로. UID override(--user·USER·config.json)는 비root UID 를 지정하지만 setuid entry point 가 이를 덮을 수 있다. no-new-privileges(K8s allowPrivilegeEscalation false)는 그 setuid 권한 상승을 막는다. rootless containers 는 user namespace 로 호스트 비root UID 를 컨테이너 안 root 로 매핑해, 탈출해도 호스트 root 를 얻지 못한다. 아래: 컨테이너 안 root 가 정당히 필요한 경우(저포트 바인딩·SW 설치·eBPF/커널 모듈)와 그 대안(setcap·sysctl·비특권 이미지·멀티스테이지 빌드).</desc>

  <rect x="0" y="0" width="860" height="500" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">root 문제와 회피 — 가장 안전하지 않은 기본값</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">USER 미지정 → 컨테이너 root → (user ns 없으면) 호스트 root</text>

  <!-- 위험: container root = host root -->
  <rect x="32" y="84" width="796" height="76" fill="#f44336" fill-opacity="0.10" stroke="#f44336" rx="8"/>
  <text x="48" y="110" fill="#e8e4df" font-size="14">기본 root 실행 = 호스트 root (권한 상승)</text>
  <text x="48" y="134" fill="rgb(138,133,128)" font-size="11">비root 사용자가 docker 로 띄워도 컨테이너 안은 root, 호스트에서도 root (ps -fC sleep → UID=root)</text>
  <text x="48" y="152" fill="#f44336" font-size="11">root 컨테이너 탈출 시 → 호스트 전체 + 다른 모든 컨테이너 장악. 방어선이 단 하나</text>

  <!-- 세 회피 경로 -->
  <text x="32" y="190" fill="#e8e4df" font-size="16">세 회피 경로 — 컨테이너 root ≠ 호스트 root</text>

  <defs>
    <marker id="rp" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <rect x="32" y="204" width="256" height="110" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="160" y="228" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">① UID override</text>
  <text x="160" y="250" fill="rgb(138,133,128)" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="middle">--user 5000 · USER</text>
  <text x="160" y="268" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">비root UID 지정</text>
  <rect x="48" y="278" width="224" height="28" fill="#f44336" fill-opacity="0.12" stroke="#f44336" rx="4"/>
  <text x="160" y="297" fill="#f44336" font-size="10" text-anchor="middle">setuid entry point 가 덮을 수 있음</text>

  <rect x="304" y="204" width="256" height="110" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="8"/>
  <text x="432" y="228" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">② no-new-privileges</text>
  <text x="432" y="250" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">setuid 권한 상승 차단</text>
  <text x="432" y="268" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">bash -p 같은 우회를 막음</text>
  <rect x="320" y="278" width="224" height="28" fill="#66bb6a" fill-opacity="0.12" stroke="#66bb6a" rx="4"/>
  <text x="432" y="297" fill="#66bb6a" font-size="9" text-anchor="middle">K8s: allowPrivilegeEscalation: false</text>

  <rect x="576" y="204" width="252" height="110" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="702" y="228" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">③ rootless containers</text>
  <text x="702" y="250" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">user namespace(04-02)</text>
  <text x="702" y="268" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">호스트 비root UID → 안의 root</text>
  <rect x="592" y="278" width="220" height="28" fill="#66bb6a" fill-opacity="0.12" stroke="#66bb6a" rx="4"/>
  <text x="702" y="297" fill="#66bb6a" font-size="9" text-anchor="middle">탈출해도 호스트 root 안 얻음</text>

  <line x1="288" y1="259" x2="304" y2="259" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#rp)"/>

  <!-- capability namespace 화 주의 -->
  <rect x="304" y="320" width="524" height="30" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="4"/>
  <text x="320" y="340" fill="rgb(138,133,128)" font-size="10">rootless 주의: user ns 는 capability 도 격리 → 더한 capability 가 namespace 밖에선 안 통함(저포트 바인딩 등)</text>

  <!-- 정당한 root 필요 + 대안 -->
  <line x1="32" y1="368" x2="828" y2="368" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="32" y="394" fill="#e8e4df" font-size="15">컨테이너 안 root 가 정당히 필요한 경우 → 대안</text>

  <rect x="32" y="406" width="256" height="72" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="160" y="428" fill="#e8e4df" font-size="12" text-anchor="middle">저포트 바인딩 (Nginx 80)</text>
  <text x="160" y="450" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">setcap · sysctl(port_start=0)</text>
  <text x="160" y="468" fill="#66bb6a" font-size="10" text-anchor="middle">비특권 이미지(8080)</text>

  <rect x="302" y="406" width="256" height="72" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="430" y="428" fill="#e8e4df" font-size="12" text-anchor="middle">SW 설치 (apt·yum)</text>
  <text x="430" y="450" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">빌드 시만 + USER 로 전환</text>
  <text x="430" y="468" fill="#f44336" font-size="10" text-anchor="middle">런타임 설치 비권장(비불변)</text>

  <rect x="572" y="406" width="256" height="72" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="700" y="428" fill="#e8e4df" font-size="12" text-anchor="middle">eBPF · 커널 모듈</text>
  <text x="700" y="450" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">CAP_BPF · CAP_SYS_MODULE</text>
  <text x="700" y="468" fill="#66bb6a" font-size="10" text-anchor="middle">eBPF 는 검증으로 안전 보장</text>
</svg>
