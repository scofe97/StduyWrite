<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 440" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>passive vs active benchmarking — 결과만 보기 vs 과정을 분석하기</title>
  <desc>passive benchmarking은 돌리고 완료까지 무시해 결과가 버그·교란에 좌우되는 안티 방법론. active benchmarking은 도는 동안 관측 도구로 분석해 무엇을 진짜 테스트하는지·한계 요인을 확인한다.</desc>
  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect width="780" height="440" fill="#0d0d0d"/>
  <text x="30" y="40" fill="#e8e4df" font-size="20" font-weight="700">passive vs active benchmarking</text>
  <text x="30" y="64" fill="rgb(138,133,128)" font-size="13">결과만 보기 vs 도는 동안 과정을 분석하기</text>

  <!-- passive -->
  <rect x="40" y="90" width="340" height="150" rx="8" fill="none" stroke="#f44336" stroke-width="1.3"/>
  <text x="210" y="114" fill="#f44336" font-size="13" font-weight="700" text-anchor="middle">passive (안티 방법론)</text>
  <rect x="60" y="128" width="140" height="30" rx="4" fill="none" stroke="rgb(42,37,32)" stroke-width="1.1"/>
  <text x="130" y="148" fill="#e8e4df" font-size="11" text-anchor="middle">벤치마크 실행</text>
  <line x1="200" y1="143" x2="218" y2="143" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#a1)"/>
  <rect x="220" y="128" width="140" height="30" rx="4" fill="none" stroke="rgb(42,37,32)" stroke-width="1.1"/>
  <text x="290" y="148" fill="#e8e4df" font-size="11" text-anchor="middle">완료까지 무시</text>
  <text x="210" y="180" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">결과만 수집 → 슬라이드 → 경영진</text>
  <text x="210" y="204" fill="#f44336" font-size="10" text-anchor="middle">버그·단일 스레드·무관 컴포넌트·교란에 좌우</text>
  <text x="210" y="222" fill="#f44336" font-size="10" text-anchor="middle">완전히 틀린 것을 벤치마크할 수 있음</text>

  <!-- active -->
  <rect x="400" y="90" width="340" height="150" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.4"/>
  <text x="570" y="114" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">active</text>
  <rect x="420" y="128" width="130" height="30" rx="4" fill="none" stroke="rgb(212,168,83)" stroke-width="1.1"/>
  <text x="485" y="148" fill="#e8e4df" font-size="11" text-anchor="middle">벤치마크 실행</text>
  <line x1="550" y1="143" x2="568" y2="143" stroke="rgb(212,168,83)" stroke-width="1.2" marker-end="url(#a1)"/>
  <rect x="570" y="128" width="150" height="30" rx="4" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="645" y="148" fill="#e8e4df" font-size="11" text-anchor="middle">도는 동안 분석</text>
  <text x="570" y="180" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">관측 도구로 시스템을 분석</text>
  <text x="570" y="204" fill="#66bb6a" font-size="10" text-anchor="middle">무엇을 진짜 테스트하는지 확인</text>
  <text x="570" y="222" fill="#66bb6a" font-size="10" text-anchor="middle">진짜 한계 요인 식별</text>

  <!-- bonnie example -->
  <text x="40" y="278" fill="rgb(212,168,83)" font-size="13" font-weight="700">사례 — bonnie++ "하드 드라이브 성능" 첫 테스트</text>
  <rect x="40" y="292" width="340" height="56" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="210" y="316" fill="#e8e4df" font-size="12" text-anchor="middle">passive 결과: "디스크 739 KB/s"</text>
  <text x="210" y="336" fill="#f44336" font-size="11" text-anchor="middle">→ 틀린 결론</text>

  <rect x="400" y="292" width="340" height="56" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="570" y="312" fill="#e8e4df" font-size="12" text-anchor="middle">active 분석(iostat·bpftrace·cachestat):</text>
  <text x="570" y="332" fill="#66bb6a" font-size="11" text-anchor="middle">실은 1바이트 파일시스템 쓰기(캐시 버퍼링), 디스크 I/O 0</text>

  <!-- conclusion -->
  <rect x="40" y="364" width="700" height="58" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="60" y="390" fill="#e8e4df" font-size="13" font-weight="600">active benchmarking이 16가지 실패를 막는 핵심</text>
  <text x="60" y="412" fill="rgb(138,133,128)" font-size="12">CPU 프로파일링(숨은 throttle)·USE(한계 발견 보장)·sanity check·체크리스트("왜 2배 안 됐나?")로 검증.</text>
</svg>
