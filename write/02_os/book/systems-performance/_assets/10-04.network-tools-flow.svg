<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>네트워크 관측 도구 — 소켓에서 패킷까지</title>
  <desc>소켓 통계(ss)에서 인터페이스·스택 통계(ip·nstat·sar·nicstat·ethtool), BPF 트레이싱(tcplife·tcptop·tcpretrans·bpftrace), 패킷 캡처(tcpdump·Wireshark)로 깊어지는 도구 흐름.</desc>
  <defs>
    <marker id="t1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect width="760" height="470" fill="#0d0d0d"/>
  <text x="30" y="40" fill="#e8e4df" font-size="20" font-weight="700">네트워크 관측 도구 흐름</text>
  <text x="30" y="64" fill="rgb(138,133,128)" font-size="13">소켓 → 인터페이스·스택 → BPF 트레이싱 → 패킷 캡처</text>

  <rect x="40" y="90" width="680" height="56" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="60" y="114" fill="rgb(212,168,83)" font-size="13" font-weight="700">① ss — 소켓 통계의 출발점</text>
  <text x="60" y="135" fill="#e8e4df" font-size="12">상태·주소·rtt·cwnd · limited 플래그(app/rwnd/sndbuf) · netlink로 효율 조회</text>

  <rect x="40" y="158" width="680" height="56" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="60" y="182" fill="rgb(212,168,83)" font-size="13" font-weight="700">② ip · nstat · sar · nicstat · ethtool — 인터페이스·스택</text>
  <text x="60" y="203" fill="#e8e4df" font-size="12">ip(에러·라우팅) · nstat(SNMP 재전송율) · sar(시계열) · nicstat(USE 사용률·포화) · ethtool(드라이버)</text>

  <rect x="40" y="226" width="680" height="56" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="60" y="250" fill="rgb(212,168,83)" font-size="13" font-weight="700">③ tcplife · tcptop · tcpretrans — BPF 연결 트레이싱</text>
  <text x="60" y="271" fill="#e8e4df" font-size="12">tcplife(수명·상태변화, 상시 가능) · tcptop(누가 많이) · tcpretrans(재전송+TCP 상태)</text>

  <rect x="40" y="294" width="680" height="56" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="60" y="318" fill="rgb(212,168,83)" font-size="13" font-weight="700">④ bpftrace — 커스텀 추적</text>
  <text x="60" y="339" fill="#e8e4df" font-size="12">소켓 층(책임 프로세스 on-CPU) · TCP/패킷 층 · 안정적 tracepoint 우선, kprobe는 보조</text>

  <rect x="40" y="362" width="680" height="60" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="60" y="386" fill="rgb(212,168,83)" font-size="13" font-weight="700">⑤ tcpdump · Wireshark — 패킷 캡처 (마지막 수단)</text>
  <text x="60" y="407" fill="#e8e4df" font-size="12">패킷 단위 헤더·데이터 · 커널 BPF 필터로 효율화 · 비싸서 짧게만 · Wireshark로 그래픽 검사</text>

  <line x1="730" y1="146" x2="730" y2="156" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#t1)"/>
  <line x1="730" y1="214" x2="730" y2="224" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#t1)"/>
  <line x1="730" y1="282" x2="730" y2="292" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#t1)"/>
  <line x1="730" y1="350" x2="730" y2="360" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#t1)"/>

  <text x="40" y="446" fill="rgb(138,133,128)" font-size="11">전통 통계가 *무엇이* 막히는지 거르면, BPF가 *어떤* 연결·재전송인지 커널 안에서 집계하고, 패킷 캡처는 *마지막* 정밀 검사다.</text>
</svg>
