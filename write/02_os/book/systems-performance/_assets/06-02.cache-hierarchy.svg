<svg viewBox="0 0 860 480" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>CPU 캐시 계층과 접근 지연</title>
  <desc>CPU 캐시는 여러 레벨로 크기와 지연의 최적 구성을 만든다. CPU에 가까울수록 작고 빠르다. CPU 레지스터에서 시작해 L1 명령 캐시와 데이터 캐시, TLB, L2 캐시, 선택적 L3 캐시(LLC), 그리고 메인 메모리(DRAM)로 갈수록 커지고 느려진다. L1 접근은 몇 CPU 사이클, L2는 약 십여 사이클, 메인 메모리는 약 60ns로 4GHz에서 약 240사이클이며 MMU 변환 지연도 더해진다. 보통 L1과 L2는 코어당이고 L3는 코어가 공유한다. 오른쪽: 캐시 일관성은 한 CPU가 메모리를 수정하면 다른 캐시의 사본을 stale로 표시한다. LLC 접근 페널티는 hit unshared 약 40사이클, 다른 코어 shared 약 65사이클, 다른 코어 modified 약 75사이클이다.</desc>

  <rect x="0" y="0" width="860" height="480" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">CPU 캐시 계층과 접근 지연</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">CPU에 가까울수록 작고 빠름 — 크기·지연의 최적 구성</text>

  <!-- 캐시 계층 (피라미드형) -->
  <rect x="280" y="90" width="120" height="36" fill="rgba(212,168,83,0.8)" stroke="rgb(212,168,83)" rx="4"/>
  <text x="340" y="113" fill="#0d0d0d" font-size="12" text-anchor="middle">레지스터</text>
  <text x="540" y="113" fill="rgb(138,133,128)" font-size="11">가장 빠름 (가장 작음)</text>

  <rect x="250" y="132" width="180" height="36" fill="rgba(212,168,83,0.65)" stroke="rgb(212,168,83)" rx="4"/>
  <text x="340" y="155" fill="#0d0d0d" font-size="12" text-anchor="middle">L1 I$ / D$ + TLB</text>
  <text x="540" y="155" fill="#66bb6a" font-size="11">몇 CPU 사이클 (코어당)</text>

  <rect x="220" y="174" width="240" height="36" fill="rgba(212,168,83,0.5)" stroke="rgb(212,168,83)" rx="4"/>
  <text x="340" y="197" fill="#0d0d0d" font-size="12" text-anchor="middle">L2 캐시 (E$)</text>
  <text x="540" y="197" fill="#66bb6a" font-size="11">약 십여 사이클 (코어당)</text>

  <rect x="190" y="216" width="300" height="36" fill="rgba(212,168,83,0.35)" stroke="rgb(212,168,83)" rx="4"/>
  <text x="340" y="239" fill="#0d0d0d" font-size="12" text-anchor="middle">L3 캐시 (LLC, 선택)</text>
  <text x="540" y="239" fill="rgb(138,133,128)" font-size="11">코어 공유 · last-level cache</text>

  <rect x="160" y="258" width="360" height="42" fill="rgb(42,37,32)" stroke="rgb(42,37,32)" rx="4"/>
  <text x="340" y="284" fill="#e8e4df" font-size="13" text-anchor="middle">메인 메모리 (DRAM)</text>
  <text x="540" y="284" fill="#f44336" font-size="11">~60ns (4GHz ~240사이클) + MMU</text>

  <text x="60" y="200" fill="rgb(138,133,128)" font-size="11" transform="rotate(-90 60 200)">작고 빠름 ← → 크고 느림</text>

  <!-- 캐시 일관성 -->
  <line x1="32" y1="324" x2="828" y2="324" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="32" y="350" fill="rgb(212,168,83)" font-size="14">캐시 일관성 (cache coherency) — LLC 접근 페널티</text>

  <text x="32" y="374" fill="rgb(138,133,128)" font-size="11">한 CPU가 메모리 수정 시 다른 캐시 사본을 stale로 표시 → 늘 올바른 상태에 접근</text>

  <rect x="32" y="386" width="256" height="56" fill="#66bb6a" fill-opacity="0.10" stroke="#66bb6a" rx="6"/>
  <text x="160" y="410" fill="#e8e4df" font-size="12" text-anchor="middle">LLC hit, unshared</text>
  <text x="160" y="430" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">~40 사이클</text>

  <rect x="300" y="386" width="256" height="56" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="6"/>
  <text x="428" y="410" fill="#e8e4df" font-size="12" text-anchor="middle">LLC hit, 다른 코어 shared</text>
  <text x="428" y="430" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">~65 사이클</text>

  <rect x="568" y="386" width="260" height="56" fill="#f44336" fill-opacity="0.10" stroke="#f44336" rx="6"/>
  <text x="698" y="410" fill="#e8e4df" font-size="12" text-anchor="middle">LLC hit, 다른 코어 modified</text>
  <text x="698" y="430" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">~75 사이클</text>
</svg>
