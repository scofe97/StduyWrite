<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>perf 명령 파이프라인 — 카운트에서 시각화까지</title>
  <desc>stat으로 빈도를 먼저 확인하고, record로 이벤트를 perf.data에 기록한 뒤, report로 계층 요약하거나 script로 개별 샘플을 나열해 플레임 그래프·FlameScope로 시각화하는 파이프라인.</desc>
  <defs>
    <marker id="c1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect width="780" height="420" fill="#0d0d0d"/>
  <text x="30" y="40" fill="#e8e4df" font-size="20" font-weight="700">perf 명령 파이프라인</text>
  <text x="30" y="64" fill="rgb(138,133,128)" font-size="13">빈도 확인 → 기록 → 요약 또는 샘플 나열 → 시각화</text>

  <!-- stat -->
  <rect x="40" y="100" width="150" height="64" rx="8" fill="none" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="115" y="124" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">① stat</text>
  <text x="115" y="144" fill="#e8e4df" font-size="11" text-anchor="middle">빈도 확인</text>
  <text x="115" y="159" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">record 전 점검·IPC</text>

  <!-- record -->
  <rect x="230" y="100" width="150" height="64" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.4"/>
  <text x="305" y="124" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">② record</text>
  <text x="305" y="144" fill="#e8e4df" font-size="11" text-anchor="middle">perf.data 기록</text>
  <text x="305" y="159" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">-F 99 -a -g</text>

  <!-- report -->
  <rect x="420" y="80" width="150" height="56" rx="8" fill="none" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="495" y="103" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">③a report</text>
  <text x="495" y="123" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">계층 요약(caller 순)</text>

  <!-- script -->
  <rect x="420" y="150" width="150" height="56" rx="8" fill="none" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="495" y="173" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">③b script</text>
  <text x="495" y="193" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">개별 샘플 나열</text>

  <!-- flame graph -->
  <rect x="610" y="150" width="150" height="56" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="685" y="173" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">④ 시각화</text>
  <text x="685" y="193" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">플레임 그래프·FlameScope</text>

  <!-- arrows -->
  <line x1="190" y1="132" x2="228" y2="132" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#c1)"/>
  <line x1="380" y1="124" x2="418" y2="108" stroke="rgb(212,168,83)" stroke-width="1.3" marker-end="url(#c1)"/>
  <line x1="380" y1="140" x2="418" y2="172" stroke="rgb(212,168,83)" stroke-width="1.3" marker-end="url(#c1)"/>
  <line x1="570" y1="178" x2="608" y2="178" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#c1)"/>

  <!-- notes -->
  <rect x="40" y="240" width="720" height="74" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="60" y="266" fill="#e8e4df" font-size="13" font-weight="600">report vs script — 요약 vs 개별 샘플</text>
  <text x="60" y="288" fill="rgb(138,133,128)" font-size="12">report: 스택을 계층으로 병합(caller 순서, 시간 패턴 소실). script: 각 샘플 출력(시간 패턴 보임).</text>
  <text x="60" y="306" fill="rgb(138,133,128)" font-size="12">script 출력에 --header·-F로 메타데이터·필드 지정 → 플레임 그래프의 입력.</text>

  <rect x="40" y="326" width="720" height="74" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="60" y="352" fill="#e8e4df" font-size="13" font-weight="600">trace·기타 — 파일 없는 라이브와 멀티툴 능력</text>
  <text x="60" y="374" fill="rgb(138,133,128)" font-size="12">trace: 라이브(strace 저오버헤드 대체). c2c·lock·kvm·mem·sched, Intel PT(명령어 단위 추적).</text>
  <text x="60" y="392" fill="rgb(138,133,128)" font-size="12">stat·trace는 perf.data 없이 동작 — 카운트·라이브 출력 전용.</text>
</svg>
