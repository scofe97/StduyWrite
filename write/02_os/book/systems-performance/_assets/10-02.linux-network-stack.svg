<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Linux 네트워크 스택 — 큐·버퍼·세그먼테이션 오프로드</title>
  <desc>애플리케이션에서 소켓 버퍼·TCP·IP·qdisc·드라이버 ring buffer·NIC로 내려가는 송신 경로와, TCP 연결 백로그 두 큐(SYN·listen), GSO/TSO 세그먼테이션 오프로드, NAPI·CPU 스케일링의 위치.</desc>
  <defs>
    <marker id="s1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect width="720" height="520" fill="#0d0d0d"/>
  <text x="30" y="40" fill="#e8e4df" font-size="20" font-weight="700">Linux 네트워크 스택 (송신 경로)</text>
  <text x="30" y="64" fill="rgb(138,133,128)" font-size="13">버퍼·큐·오프로드가 작은 패킷의 스택 오버헤드를 줄인다</text>

  <rect x="200" y="88" width="320" height="42" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="360" y="108" fill="#e8e4df" font-size="13" font-weight="600" text-anchor="middle">애플리케이션</text>
  <text x="360" y="124" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">send / recv · 소켓 API</text>

  <rect x="200" y="146" width="320" height="44" rx="6" fill="none" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="360" y="167" fill="#e8e4df" font-size="13" font-weight="600" text-anchor="middle">소켓 송수신 버퍼</text>
  <text x="360" y="183" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">크면 처리량↑·연결당 메모리↑ (동적 auto-tune)</text>

  <rect x="200" y="206" width="320" height="56" rx="6" fill="none" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="360" y="227" fill="#e8e4df" font-size="13" font-weight="600" text-anchor="middle">TCP</text>
  <text x="360" y="244" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">슬라이딩 윈도 · 혼잡 제어 · GSO(64KB 슈퍼패킷)</text>
  <text x="360" y="257" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">연결 큐: SYN 백로그 + listen 백로그</text>

  <rect x="200" y="278" width="320" height="38" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="360" y="302" fill="#e8e4df" font-size="13" text-anchor="middle">IP</text>

  <rect x="200" y="332" width="320" height="44" rx="6" fill="none" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="360" y="353" fill="#e8e4df" font-size="13" font-weight="600" text-anchor="middle">큐잉 규율 (qdisc)</text>
  <text x="360" y="369" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">fq_codel(버퍼블로트 완화) · pacing · TSQ · BQL</text>

  <rect x="200" y="392" width="320" height="44" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="360" y="413" fill="#e8e4df" font-size="13" text-anchor="middle">드라이버 ring buffer</text>
  <text x="360" y="429" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">NAPI: 저부하 인터럽트 / 고부하 폴링</text>

  <rect x="200" y="452" width="320" height="44" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="360" y="473" fill="#e8e4df" font-size="13" font-weight="600" text-anchor="middle">NIC</text>
  <text x="360" y="489" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">TSO 최종 분할 · DMA · 물리 전송</text>

  <!-- arrows -->
  <line x1="360" y1="130" x2="360" y2="144" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#s1)"/>
  <line x1="360" y1="190" x2="360" y2="204" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#s1)"/>
  <line x1="360" y1="262" x2="360" y2="276" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#s1)"/>
  <line x1="360" y1="316" x2="360" y2="330" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#s1)"/>
  <line x1="360" y1="376" x2="360" y2="390" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#s1)"/>
  <line x1="360" y1="436" x2="360" y2="450" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#s1)"/>

  <!-- side labels -->
  <text x="545" y="232" fill="rgb(138,133,128)" font-size="11">ss · tcplife</text>
  <text x="545" y="246" fill="rgb(138,133,128)" font-size="10">소켓·연결</text>
  <text x="545" y="475" fill="rgb(138,133,128)" font-size="11">RSS/RPS/RFS</text>
  <text x="545" y="489" fill="rgb(138,133,128)" font-size="10">CPU 스케일링</text>
  <text x="35" y="232" fill="rgb(138,133,128)" font-size="11">멀티스레드</text>
  <text x="35" y="246" fill="rgb(138,133,128)" font-size="10">여러 CPU 처리</text>
</svg>
