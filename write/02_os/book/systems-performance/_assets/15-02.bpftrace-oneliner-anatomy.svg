<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>bpftrace 원라이너 해부 — 프로브·필터·맵·hist</title>
  <desc>TCP 수신 크기 히스토그램 원라이너를 분해해, kretprobe(프로브)·retval 필터·@recv_bytes 맵·comm 키·hist 함수가 각각 무엇을 하는지 보이는 그림.</desc>
  <defs>
    <marker id="b1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect width="780" height="420" fill="#0d0d0d"/>
  <text x="30" y="40" fill="#e8e4df" font-size="20" font-weight="700">bpftrace 원라이너 해부</text>
  <text x="30" y="64" fill="rgb(138,133,128)" font-size="13">간결한 한 줄이 프로브·필터·맵·hist를 조합한다 — 추적의 awk</text>

  <!-- the one-liner -->
  <rect x="40" y="90" width="700" height="50" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="60" y="120" fill="#e8e4df" font-size="13" font-family="monospace">kr:tcp_recvmsg /retval &gt;= 0/ { @recv_bytes[comm] = hist(retval); }</text>

  <!-- breakdown -->
  <rect x="40" y="170" width="160" height="80" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="120" y="192" fill="rgb(212,168,83)" font-size="12" font-weight="700" text-anchor="middle">kr:tcp_recvmsg</text>
  <text x="120" y="212" fill="#e8e4df" font-size="11" text-anchor="middle">프로브</text>
  <text x="120" y="230" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">kretprobe(반환 계측)</text>

  <rect x="215" y="170" width="150" height="80" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="290" y="192" fill="rgb(212,168,83)" font-size="12" font-weight="700" text-anchor="middle">/retval &gt;= 0/</text>
  <text x="290" y="212" fill="#e8e4df" font-size="11" text-anchor="middle">필터</text>
  <text x="290" y="230" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">음수 에러 제외</text>

  <rect x="380" y="170" width="160" height="80" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="460" y="192" fill="rgb(212,168,83)" font-size="12" font-weight="700" text-anchor="middle">@recv_bytes[comm]</text>
  <text x="460" y="212" fill="#e8e4df" font-size="11" text-anchor="middle">맵 + 키</text>
  <text x="460" y="230" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">프로세스명별 저장</text>

  <rect x="555" y="170" width="185" height="80" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="647" y="192" fill="rgb(212,168,83)" font-size="12" font-weight="700" text-anchor="middle">hist(retval)</text>
  <text x="647" y="212" fill="#e8e4df" font-size="11" text-anchor="middle">맵 함수</text>
  <text x="647" y="230" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">2의 거듭제곱 히스토그램</text>

  <line x1="120" y1="140" x2="120" y2="168" stroke="rgb(212,168,83)" stroke-width="1.3" marker-end="url(#b1)"/>
  <line x1="290" y1="140" x2="290" y2="168" stroke="rgb(212,168,83)" stroke-width="1.3" marker-end="url(#b1)"/>
  <line x1="460" y1="140" x2="460" y2="168" stroke="rgb(212,168,83)" stroke-width="1.3" marker-end="url(#b1)"/>
  <line x1="647" y1="140" x2="647" y2="168" stroke="rgb(212,168,83)" stroke-width="1.3" marker-end="url(#b1)"/>

  <!-- output note -->
  <rect x="40" y="276" width="700" height="64" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="60" y="302" fill="#e8e4df" font-size="13" font-weight="600">Ctrl-C(SIGINT) 시 BPF 맵 자동 출력</text>
  <text x="60" y="324" fill="rgb(138,133,128)" font-size="12">@recv_bytes[nodejs]: [32,64) 158 |@@@...| — 프로세스별 수신 크기 히스토그램이 종료 시 자동 출력.</text>

  <rect x="40" y="354" width="700" height="58" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="60" y="380" fill="#e8e4df" font-size="13" font-weight="600">반복 패턴 — @[키] = count() / @ = hist(값) / printf</text>
  <text x="60" y="402" fill="rgb(138,133,128)" font-size="12">시작/종료 프로브(@ts[tid]=nsecs + nsecs-@ts[tid])로 지연을 재는 게 핵심 패턴. BCC 같은 도구는 228줄.</text>
</svg>
