<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>벤치마킹 유형 스펙트럼 — 인공에서 현실로</title>
  <desc>마이크로벤치마크(인공·단순·분석 쉬움)에서 시뮬레이션(매크로), 리플레이, 운영 워크로드(현실·복잡)까지의 스펙트럼. 인공일수록 분석이 쉽고 현실적일수록 관련성이 높다.</desc>
  <defs>
    <marker id="s1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect width="780" height="420" fill="#0d0d0d"/>
  <text x="30" y="40" fill="#e8e4df" font-size="20" font-weight="700">벤치마킹 유형 스펙트럼</text>
  <text x="30" y="64" fill="rgb(138,133,128)" font-size="13">인공적(분석 쉬움) ←——————→ 현실적(관련성 높음)</text>

  <!-- spectrum arrow -->
  <line x1="60" y1="110" x2="720" y2="110" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#s1)"/>
  <text x="70" y="100" fill="rgb(138,133,128)" font-size="11">인공적</text>
  <text x="660" y="100" fill="rgb(138,133,128)" font-size="11">현실적</text>

  <!-- micro -->
  <rect x="50" y="130" width="150" height="100" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="125" y="152" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">마이크로</text>
  <text x="125" y="174" fill="#e8e4df" font-size="11" text-anchor="middle">단일 연산 유형</text>
  <text x="125" y="192" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">fio·iperf·SysBench</text>
  <text x="125" y="210" fill="#66bb6a" font-size="10" text-anchor="middle">단순·반복·root-cause↑</text>
  <text x="125" y="224" fill="#f44336" font-size="10" text-anchor="middle">현실과 멂</text>

  <!-- simulation -->
  <rect x="220" y="130" width="170" height="100" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="305" y="152" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">시뮬레이션 (매크로)</text>
  <text x="305" y="174" fill="#e8e4df" font-size="11" text-anchor="middle">고객 워크로드 흉내</text>
  <text x="305" y="192" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">wrk·siege·hey</text>
  <text x="305" y="210" fill="#66bb6a" font-size="10" text-anchor="middle">복잡 상호작용 포함</text>
  <text x="305" y="224" fill="#f44336" font-size="10" text-anchor="middle">변동 무시·갱신 필요</text>

  <!-- replay -->
  <rect x="410" y="130" width="150" height="100" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="485" y="152" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">리플레이</text>
  <text x="485" y="174" fill="#e8e4df" font-size="11" text-anchor="middle">트레이스 재생</text>
  <text x="485" y="192" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">캡처된 연산</text>
  <text x="485" y="210" fill="#f44336" font-size="10" text-anchor="middle">서버 바뀌면 부자연</text>
  <text x="485" y="224" fill="#f44336" font-size="10" text-anchor="middle">틀린 수준 함정</text>

  <!-- production -->
  <rect x="580" y="130" width="150" height="100" rx="8" fill="none" stroke="rgb(138,133,128)" stroke-width="1.3"/>
  <text x="655" y="152" fill="#e8e4df" font-size="13" font-weight="700" text-anchor="middle">운영 워크로드</text>
  <text x="655" y="174" fill="#e8e4df" font-size="11" text-anchor="middle">실제 부하</text>
  <text x="655" y="200" fill="#66bb6a" font-size="10" text-anchor="middle">가장 현실적</text>
  <text x="655" y="216" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">(기준점)</text>

  <!-- industry standard note -->
  <rect x="50" y="260" width="680" height="64" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="70" y="286" fill="#e8e4df" font-size="13" font-weight="600">산업 표준 — 마이크로 + 시뮬레이션을 정해진 가이드라인으로 (공정·비교 가능)</text>
  <text x="70" y="308" fill="rgb(138,133,128)" font-size="12">TPC(DB 중심, 가격/성능 포함, benchmark special 금지) · SPEC(컴퓨트·클라우드·파일, 튜닝·컴포넌트 공개)</text>

  <rect x="50" y="342" width="680" height="60" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="70" y="368" fill="#e8e4df" font-size="13" font-weight="600">절충 — 인공일수록 분석 쉽고, 현실적일수록 관련성 높다</text>
  <text x="70" y="390" fill="rgb(138,133,128)" font-size="12">어느 유형이든 "내 운영 워크로드에 가장 닮은 것"을 워크로드 특성화로 고른다.</text>
</svg>
