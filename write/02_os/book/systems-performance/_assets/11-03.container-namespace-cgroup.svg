<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 440" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>컨테이너 = namespace(격리) + cgroup(제한)</title>
  <desc>하나의 호스트 커널 위에서 namespace가 시스템 뷰를 필터링해 격리하고 cgroup이 자원 사용을 제한해 컨테이너를 만드는 구조. 커널에는 컨테이너 개념이 없다.</desc>
  <rect width="780" height="440" fill="#0d0d0d"/>
  <text x="30" y="40" fill="#e8e4df" font-size="20" font-weight="700">컨테이너 = namespace + cgroup</text>
  <text x="30" y="64" fill="rgb(138,133,128)" font-size="13">커널엔 "컨테이너" 개념이 없다 — 유저 공간이 둘을 조합해 만든다</text>

  <!-- containers -->
  <g>
    <rect x="40" y="90" width="160" height="110" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
    <text x="120" y="112" fill="#e8e4df" font-size="13" font-weight="600" text-anchor="middle">컨테이너 A</text>
    <text x="120" y="134" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">PID 1, 2, 3...</text>
    <text x="120" y="156" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">자기 프로세스·</text>
    <text x="120" y="170" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">FS·네트워크만 봄</text>
    <text x="120" y="190" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">앱이 메모리 전부 사용</text>
  </g>
  <g>
    <rect x="220" y="90" width="160" height="110" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
    <text x="300" y="112" fill="#e8e4df" font-size="13" font-weight="600" text-anchor="middle">컨테이너 B</text>
    <text x="300" y="134" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">PID 1, 2...</text>
    <text x="300" y="170" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">(다른 namespace)</text>
  </g>
  <g>
    <rect x="400" y="90" width="160" height="110" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
    <text x="480" y="112" fill="#e8e4df" font-size="13" font-weight="600" text-anchor="middle">컨테이너 C</text>
    <text x="480" y="134" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">PID 1, 2...</text>
  </g>

  <!-- shared kernel -->
  <rect x="40" y="220" width="700" height="56" rx="8" fill="none" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="390" y="244" fill="rgb(212,168,83)" font-size="14" font-weight="700" text-anchor="middle">하나의 호스트 커널 (단일 커널!)</text>
  <text x="390" y="264" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">모든 컨테이너 프로세스가 호스트에서 직접 보임 → 호스트 관측성 높음</text>

  <rect x="40" y="296" width="700" height="28" rx="6" fill="none" stroke="rgb(138,133,128)" stroke-width="1.1"/>
  <text x="390" y="315" fill="#e8e4df" font-size="12" text-anchor="middle">하드웨어 (CPU·메모리·디스크·네트워크 공유)</text>

  <!-- two mechanisms -->
  <rect x="600" y="90" width="140" height="52" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="670" y="110" fill="rgb(212,168,83)" font-size="12" font-weight="600" text-anchor="middle">namespace</text>
  <text x="670" y="127" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">뷰 필터 = 격리</text>

  <rect x="600" y="148" width="140" height="52" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="670" y="168" fill="rgb(212,168,83)" font-size="12" font-weight="600" text-anchor="middle">cgroup</text>
  <text x="670" y="185" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">자원 사용 = 제한</text>

  <!-- note -->
  <rect x="40" y="344" width="700" height="80" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="60" y="370" fill="#e8e4df" font-size="13" font-weight="600">단일 커널의 양날</text>
  <text x="60" y="392" fill="#66bb6a" font-size="12">장점: 빠른 부팅(ms) · 메모리 효율 · 통합 캐시 · 세밀한 공유(cgroup) · 호스트 관측성↑</text>
  <text x="60" y="412" fill="#f44336" font-size="12">단점: 커널 경합↑ · 게스트 관측성↓(커널 분석 불가) · 커널 패닉 전파 · 다른 커널 불가</text>
</svg>
