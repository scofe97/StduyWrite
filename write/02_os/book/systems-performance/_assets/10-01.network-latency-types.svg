<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 440" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>네트워크 지연 여섯 가지 — 어디서·무엇을 재는가</title>
  <desc>클라이언트가 서버에 연결할 때의 지연을 이름 해석·연결(핸드셰이크)·첫 바이트(TTFB)·연결 수명으로 나눈 타임라인. ping·RTT는 네트워크만, TTFB는 서버 think time까지 포함한다.</desc>
  <defs>
    <marker id="n1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect width="780" height="440" fill="#0d0d0d"/>
  <text x="30" y="40" fill="#e8e4df" font-size="20" font-weight="700">네트워크 지연 — 여섯 가지로 나눠 본다</text>
  <text x="30" y="64" fill="rgb(138,133,128)" font-size="13">각 지연이 다른 구간을 잰다 — 여러 개를 재 진짜 원천을 좁힌다</text>

  <!-- timeline -->
  <line x1="60" y1="150" x2="740" y2="150" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <line x1="90" y1="120" x2="90" y2="330" stroke="rgb(42,37,32)" stroke-width="1"/>
  <line x1="230" y1="120" x2="230" y2="330" stroke="rgb(42,37,32)" stroke-width="1"/>
  <line x1="470" y1="120" x2="470" y2="330" stroke="rgb(42,37,32)" stroke-width="1"/>
  <line x1="600" y1="120" x2="600" y2="330" stroke="rgb(42,37,32)" stroke-width="1"/>
  <line x1="710" y1="120" x2="710" y2="330" stroke="rgb(42,37,32)" stroke-width="1"/>

  <text x="90" y="112" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">이름 해석 시작</text>
  <text x="230" y="112" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">SYN 전송</text>
  <text x="470" y="112" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">연결 수립</text>
  <text x="600" y="112" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">첫 바이트 수신</text>
  <text x="710" y="112" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">연결 종료</text>

  <!-- bars -->
  <rect x="90" y="165" width="140" height="26" rx="4" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <text x="160" y="182" fill="#e8e4df" font-size="11" text-anchor="middle">이름 해석(DNS)</text>

  <rect x="230" y="200" width="240" height="26" rx="4" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="350" y="217" fill="#e8e4df" font-size="11" text-anchor="middle">연결 지연(TCP 핸드셰이크)</text>

  <rect x="470" y="235" width="130" height="26" rx="4" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="535" y="252" fill="#e8e4df" font-size="11" text-anchor="middle">첫 바이트(TTFB)</text>
  <text x="535" y="277" fill="#66bb6a" font-size="10" text-anchor="middle">+ 서버 think time</text>

  <line x1="92" y1="300" x2="708" y2="300" stroke="rgb(212,168,83)" stroke-width="1.2" marker-start="url(#n1)" marker-end="url(#n1)"/>
  <text x="400" y="316" fill="rgb(212,168,83)" font-size="11" text-anchor="middle">연결 수명 (수립~종료, keep-alive로 연장)</text>

  <!-- side -->
  <text x="230" y="252" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">ping·RTT</text>
  <text x="230" y="266" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">= 네트워크만</text>

  <!-- note -->
  <rect x="60" y="360" width="680" height="62" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="80" y="385" fill="#e8e4df" font-size="13" font-weight="600">"느림"이 네트워크 탓인가, 서버 탓인가?</text>
  <text x="80" y="406" fill="rgb(138,133,128)" font-size="12">ping·연결 지연은 네트워크만 잰다. 첫 바이트(TTFB)는 서버 think time(과부하·CPU 스케줄링)까지 포함한다.</text>
  <text x="80" y="421" fill="rgb(138,133,128)" font-size="12">둘의 차이로 원천을 가린다 — 연결 지연이 크면 SYN 드롭·재전송(과부하 백로그)을 의심한다.</text>
</svg>
