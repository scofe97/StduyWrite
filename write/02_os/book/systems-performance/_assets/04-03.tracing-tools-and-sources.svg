<svg viewBox="0 0 860 460" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>트레이싱 도구와 이벤트 소스 — 분업과 연결</title>
  <desc>위: Linux 트레이싱 도구는 아래의 이벤트 소스(tracepoints·kprobes·uprobes·USDT·PMC·software events)를 공통으로 쓴다. perf는 공식 프로파일러로 CPU 프로파일링과 PMC 분석에 탁월하고 다른 이벤트도 계측한다. Ftrace는 공식 내장 트레이서로 커널 코드 경로 분석과 의존성 없는 자원 제약 시스템에 적합하다. BPF의 BCC와 bpftrace는 차세대 고급 트레이싱을 떠받치며, BCC는 강력한 도구를, bpftrace는 커스텀 one-liner와 짧은 프로그램용 고수준 언어를 준다. 가운데: 저자는 Netflix에서 perf로 CPU 분석, Ftrace로 커널 코드 파기, BCC와 bpftrace로 나머지 전부(메모리·파일시스템·디스크·네트워킹·앱 추적)를 한다. 아래: 모든 도구는 같은 이벤트 소스 위에 서며, perf_event_open(2)와 tracefs로 접근한다.</desc>

  <rect x="0" y="0" width="860" height="460" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">트레이싱 도구와 이벤트 소스</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">도구는 같은 소스 위에 선다 — Netflix 분업 예</text>

  <!-- 트레이싱 도구 -->
  <rect x="32" y="84" width="256" height="120" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="8"/>
  <text x="160" y="108" fill="rgb(212,168,83)" font-size="14" text-anchor="middle">perf</text>
  <text x="160" y="132" fill="#e8e4df" font-size="11" text-anchor="middle">공식 프로파일러</text>
  <text x="160" y="154" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">CPU 프로파일링·PMC 분석</text>
  <text x="160" y="174" fill="#66bb6a" font-size="11" text-anchor="middle">Netflix: CPU 분석</text>
  <text x="160" y="194" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">→ 13장</text>

  <rect x="302" y="84" width="256" height="120" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="8"/>
  <text x="430" y="108" fill="rgb(212,168,83)" font-size="14" text-anchor="middle">Ftrace</text>
  <text x="430" y="132" fill="#e8e4df" font-size="11" text-anchor="middle">공식 내장 트레이서</text>
  <text x="430" y="154" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">커널 코드 경로·의존성 없음</text>
  <text x="430" y="174" fill="#66bb6a" font-size="11" text-anchor="middle">Netflix: 커널 코드 파기</text>
  <text x="430" y="194" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">→ 14장</text>

  <rect x="572" y="84" width="256" height="120" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="8"/>
  <text x="700" y="108" fill="rgb(212,168,83)" font-size="14" text-anchor="middle">BPF — BCC · bpftrace</text>
  <text x="700" y="132" fill="#e8e4df" font-size="11" text-anchor="middle">차세대 고급 트레이싱</text>
  <text x="700" y="154" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">BCC=도구 · bpftrace=언어</text>
  <text x="700" y="174" fill="#66bb6a" font-size="11" text-anchor="middle">Netflix: 나머지 전부</text>
  <text x="700" y="194" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">→ 15장</text>

  <defs>
    <marker id="t1" markerWidth="9" markerHeight="9" refX="3" refY="7" orient="auto"><path d="M0,0 L6,0 L3,7 Z" fill="rgb(138,133,128)"/></marker>
  </defs>
  <line x1="160" y1="204" x2="160" y2="248" stroke="rgb(138,133,128)" stroke-width="2" marker-end="url(#t1)"/>
  <line x1="430" y1="204" x2="430" y2="248" stroke="rgb(138,133,128)" stroke-width="2" marker-end="url(#t1)"/>
  <line x1="700" y1="204" x2="700" y2="248" stroke="rgb(138,133,128)" stroke-width="2" marker-end="url(#t1)"/>

  <!-- 이벤트 소스 -->
  <rect x="32" y="252" width="796" height="120" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="430" y="276" fill="#e8e4df" font-size="14" text-anchor="middle">공통 이벤트 소스 (04-02)</text>

  <rect x="56" y="292" width="170" height="30" fill="rgb(42,37,32)" rx="4"/><text x="141" y="312" fill="#e8e4df" font-size="10" text-anchor="middle">tracepoints (정적·커널)</text>
  <rect x="240" y="292" width="170" height="30" fill="rgb(42,37,32)" rx="4"/><text x="325" y="312" fill="#e8e4df" font-size="10" text-anchor="middle">kprobes (동적·커널)</text>
  <rect x="424" y="292" width="170" height="30" fill="rgb(42,37,32)" rx="4"/><text x="509" y="312" fill="#e8e4df" font-size="10" text-anchor="middle">uprobes (동적·유저)</text>
  <rect x="608" y="292" width="170" height="30" fill="rgb(42,37,32)" rx="4"/><text x="693" y="312" fill="#e8e4df" font-size="10" text-anchor="middle">USDT (정적·유저)</text>

  <rect x="148" y="328" width="170" height="30" fill="rgb(42,37,32)" rx="4"/><text x="233" y="348" fill="#e8e4df" font-size="10" text-anchor="middle">PMC (하드웨어)</text>
  <rect x="332" y="328" width="200" height="30" fill="rgb(42,37,32)" rx="4"/><text x="432" y="348" fill="#e8e4df" font-size="10" text-anchor="middle">software events (page fault 등)</text>
  <rect x="546" y="328" width="170" height="30" fill="rgb(42,37,32)" rx="4"/><text x="631" y="348" fill="#e8e4df" font-size="10" text-anchor="middle">함수 프로파일링</text>

  <!-- 결론 -->
  <rect x="32" y="386" width="796" height="44" fill="#66bb6a" fill-opacity="0.10" stroke="#66bb6a" rx="8"/>
  <text x="430" y="414" fill="#e8e4df" font-size="12" text-anchor="middle">perf_event_open(2)·tracefs로 접근 — 사용·이득 먼저(6~12장), 트레이서 상세 나중(13~15장)</text>
</svg>
