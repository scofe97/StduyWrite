<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 440" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Ftrace 개요 — 프로파일러·트레이서·프론트엔드</title>
  <desc>tracefs(/sys) 토대 위에서 이벤트 소스가 프로파일러(요약: function·kprobe·uprobe·hist)와 트레이서(상세: function·function_graph·tracepoint·hwlat)로 흐르고, 프론트엔드(trace-cmd·perf-tools)가 이를 감싸는 구조.</desc>
  <defs>
    <marker id="f1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect width="780" height="440" fill="#0d0d0d"/>
  <text x="30" y="40" fill="#e8e4df" font-size="20" font-weight="700">Ftrace 개요</text>
  <text x="30" y="64" fill="rgb(138,133,128)" font-size="13">의존성 거의 없는 멀티툴 — 프로파일러(요약) + 트레이서(상세)</text>

  <!-- frontends -->
  <rect x="40" y="88" width="700" height="48" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="60" y="110" fill="rgb(212,168,83)" font-size="13" font-weight="700">프론트엔드</text>
  <text x="60" y="128" fill="#e8e4df" font-size="12">trace-cmd · KernelShark · perf ftrace · perf-tools (셸 스크립트로 /sys 자동화)</text>

  <!-- profilers -->
  <rect x="40" y="156" width="340" height="120" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.4"/>
  <text x="210" y="180" fill="rgb(212,168,83)" font-size="14" font-weight="700" text-anchor="middle">프로파일러 (요약)</text>
  <text x="60" y="206" fill="#e8e4df" font-size="12">• function — 커널 함수 통계(카운트·시간·평균)</text>
  <text x="60" y="228" fill="#e8e4df" font-size="12">• kprobe·uprobe 프로파일러 — 프로브 카운트</text>
  <text x="60" y="250" fill="#e8e4df" font-size="12">• hist triggers — 커스텀 히스토그램</text>
  <text x="60" y="270" fill="#66bb6a" font-size="11">저오버헤드 출발점 (무엇이 자주·느린지)</text>

  <!-- tracers -->
  <rect x="400" y="156" width="340" height="120" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.4"/>
  <text x="570" y="180" fill="rgb(212,168,83)" font-size="14" font-weight="700" text-anchor="middle">트레이서 (이벤트별 상세)</text>
  <text x="420" y="206" fill="#e8e4df" font-size="12">• function · function_graph (자식 흐름)</text>
  <text x="420" y="228" fill="#e8e4df" font-size="12">• tracepoint · kprobe · uprobe (정적·동적)</text>
  <text x="420" y="250" fill="#e8e4df" font-size="12">• hwlat (외부 교란) · synthetic events (지연)</text>
  <text x="420" y="270" fill="rgb(138,133,128)" font-size="11">상세하나 오버헤드 큼 (드문 이벤트에)</text>

  <!-- tracefs base -->
  <rect x="40" y="296" width="700" height="50" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.4"/>
  <text x="390" y="318" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">tracefs (/sys/kernel/tracing)</text>
  <text x="390" y="336" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">echo·cat으로 제어·출력 파일 직접 조작 — 셸만으로 추적</text>

  <!-- arrows -->
  <line x1="210" y1="296" x2="210" y2="278" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#f1)"/>
  <line x1="570" y1="296" x2="570" y2="278" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#f1)"/>
  <line x1="210" y1="156" x2="210" y2="138" stroke="rgb(212,168,83)" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#f1)"/>
  <line x1="570" y1="156" x2="570" y2="138" stroke="rgb(212,168,83)" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#f1)"/>

  <!-- note -->
  <rect x="40" y="362" width="700" height="58" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="60" y="388" fill="#e8e4df" font-size="13" font-weight="600">분석 순서 — 프로파일러로 훑고 트레이서로 좁힌다</text>
  <text x="60" y="410" fill="rgb(138,133,128)" font-size="12">function 프로파일러(저오버헤드)로 자주·느린 함수를 찾고, 그 함수만 이벤트별 트레이서로 상세 분석.</text>
</svg>
