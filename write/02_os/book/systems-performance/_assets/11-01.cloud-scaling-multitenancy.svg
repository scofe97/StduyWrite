<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 440" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>클라우드 — 수평 확장과 멀티테넌시</title>
  <desc>로드밸런서·웹·앱·DB 층이 작은 인스턴스 여럿으로 병렬 구성되는 수평 확장과, 한 물리 호스트에 여러 테넌트가 공존하며 noisy neighbor가 자원을 경합하는 멀티테넌시.</desc>
  <defs>
    <marker id="c1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect width="780" height="440" fill="#0d0d0d"/>
  <text x="30" y="40" fill="#e8e4df" font-size="20" font-weight="700">수평 확장과 멀티테넌시</text>
  <text x="30" y="64" fill="rgb(138,133,128)" font-size="13">작은 인스턴스 여럿을 병렬로 — 공유가 효율을 주지만 경합을 부른다</text>

  <!-- horizontal scaling -->
  <text x="40" y="98" fill="rgb(212,168,83)" font-size="13" font-weight="700">수평 확장 (층마다 인스턴스 병렬)</text>
  <g>
    <rect x="40" y="110" width="100" height="30" rx="5" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
    <text x="90" y="130" fill="#e8e4df" font-size="11" text-anchor="middle">로드밸런서</text>
  </g>
  <g>
    <rect x="40" y="158" width="46" height="28" rx="4" fill="none" stroke="rgb(42,37,32)" stroke-width="1.1"/>
    <rect x="92" y="158" width="46" height="28" rx="4" fill="none" stroke="rgb(42,37,32)" stroke-width="1.1"/>
    <rect x="144" y="158" width="46" height="28" rx="4" fill="none" stroke="rgb(42,37,32)" stroke-width="1.1"/>
    <text x="115" y="176" fill="#e8e4df" font-size="10" text-anchor="middle">웹 ×N</text>
  </g>
  <g>
    <rect x="40" y="204" width="46" height="28" rx="4" fill="none" stroke="rgb(42,37,32)" stroke-width="1.1"/>
    <rect x="92" y="204" width="46" height="28" rx="4" fill="none" stroke="rgb(42,37,32)" stroke-width="1.1"/>
    <rect x="144" y="204" width="46" height="28" rx="4" fill="none" stroke="rgb(42,37,32)" stroke-width="1.1"/>
    <text x="115" y="222" fill="#e8e4df" font-size="10" text-anchor="middle">앱 ×N</text>
  </g>
  <g>
    <rect x="40" y="250" width="70" height="28" rx="4" fill="none" stroke="rgb(42,37,32)" stroke-width="1.1"/>
    <rect x="116" y="250" width="70" height="28" rx="4" fill="none" stroke="rgb(42,37,32)" stroke-width="1.1"/>
    <text x="113" y="268" fill="#e8e4df" font-size="10" text-anchor="middle">DB 샤드</text>
  </g>
  <line x1="90" y1="140" x2="90" y2="156" stroke="rgb(212,168,83)" stroke-width="1.2" marker-end="url(#c1)"/>
  <line x1="115" y1="186" x2="115" y2="202" stroke="rgb(212,168,83)" stroke-width="1.2" marker-end="url(#c1)"/>
  <line x1="115" y1="232" x2="115" y2="248" stroke="rgb(212,168,83)" stroke-width="1.2" marker-end="url(#c1)"/>
  <text x="40" y="300" fill="rgb(138,133,128)" font-size="11">부하 증가 → 인스턴스 추가(자동 스케일링)</text>

  <!-- multitenancy -->
  <text x="430" y="98" fill="rgb(212,168,83)" font-size="13" font-weight="700">멀티테넌시 (한 호스트 공유)</text>
  <rect x="430" y="110" width="320" height="170" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="590" y="130" fill="#e8e4df" font-size="12" text-anchor="middle">물리 호스트 (공유 자원)</text>

  <rect x="448" y="146" width="90" height="58" rx="5" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="493" y="170" fill="#e8e4df" font-size="11" text-anchor="middle">테넌트 A</text>
  <text x="493" y="188" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">(내 인스턴스)</text>

  <rect x="548" y="146" width="90" height="58" rx="5" fill="none" stroke="#f44336" stroke-width="1.3"/>
  <text x="593" y="170" fill="#f44336" font-size="11" text-anchor="middle">테넌트 B</text>
  <text x="593" y="188" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">noisy neighbor</text>

  <rect x="648" y="146" width="86" height="58" rx="5" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="691" y="170" fill="#e8e4df" font-size="11" text-anchor="middle">테넌트 C</text>

  <rect x="448" y="216" width="286" height="50" rx="5" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <text x="591" y="236" fill="#e8e4df" font-size="11" text-anchor="middle">공유 물리 자원 (CPU·메모리·디스크·네트워크)</text>
  <text x="591" y="255" fill="#f44336" font-size="10" text-anchor="middle">B의 공격적 사용 → A의 I/O 지연↑ (경합)</text>

  <!-- bottom note -->
  <rect x="40" y="330" width="710" height="90" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="60" y="357" fill="#e8e4df" font-size="13" font-weight="600">클라우드 성능의 두 축</text>
  <text x="60" y="379" fill="rgb(138,133,128)" font-size="12">① 자원 제어 — 테넌트별 한계·우선순위로 noisy neighbor를 통제(성능 격리)</text>
  <text x="60" y="399" fill="rgb(138,133,128)" font-size="12">② 관측성 — 경합을 볼 수 있어야 한계를 튜닝하고 테넌트 균형을 잡는다 (가상화 유형마다 다름)</text>
  <text x="60" y="415" fill="rgb(138,133,128)" font-size="11">"공유가 효율을 주지만 경합을 부른다" — 두 축이 그 균형을 맞춘다.</text>
</svg>
