<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>파일 시스템 I/O 스택 — read() 한 줄의 여정</title>
  <desc>애플리케이션의 read/write가 시스템 콜·VFS·개별 파일 시스템·페이지 캐시를 거쳐, 캐시 적중이면 여기서 반환하고 미스면 블록 디바이스·디스크 드라이버를 지나 물리 I/O가 되는 층 구조.</desc>
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect width="720" height="500" fill="#0d0d0d"/>
  <text x="30" y="40" fill="#e8e4df" font-size="20" font-weight="700">파일 시스템 I/O 스택</text>
  <text x="30" y="64" fill="rgb(138,133,128)" font-size="13">read() 한 줄이 어느 층까지 내려가는지는 캐시 적중 여부가 가른다</text>

  <!-- layers -->
  <g>
    <rect x="190" y="90" width="340" height="44" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
    <text x="360" y="112" fill="#e8e4df" font-size="14" font-weight="600" text-anchor="middle">애플리케이션 · 라이브러리</text>
    <text x="360" y="128" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">read / write / mmap · stdio 버퍼링</text>

    <rect x="190" y="148" width="340" height="38" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
    <text x="360" y="172" fill="#e8e4df" font-size="13" text-anchor="middle">시스템 콜 인터페이스</text>

    <rect x="190" y="200" width="340" height="42" rx="6" fill="none" stroke="rgb(212,168,83)" stroke-width="1.3"/>
    <text x="360" y="220" fill="#e8e4df" font-size="13" font-weight="600" text-anchor="middle">VFS</text>
    <text x="360" y="236" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">파일 시스템 유형을 묶는 공통 인터페이스</text>

    <rect x="190" y="256" width="340" height="42" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
    <text x="360" y="276" fill="#e8e4df" font-size="13" text-anchor="middle">개별 파일 시스템 (ext4 · XFS · ZFS)</text>
    <text x="360" y="291" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">캐시 조회 · 블록 매핑</text>

    <rect x="190" y="312" width="340" height="44" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
    <text x="360" y="333" fill="#e8e4df" font-size="13" font-weight="600" text-anchor="middle">페이지 캐시</text>
    <text x="360" y="349" fill="#66bb6a" font-size="11" text-anchor="middle">적중이면 여기서 반환 — 아래로 안 내려감</text>

    <rect x="190" y="370" width="340" height="38" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
    <text x="360" y="394" fill="#e8e4df" font-size="13" text-anchor="middle">블록 디바이스 인터페이스 (I/O 스케줄러·큐)</text>

    <rect x="190" y="422" width="340" height="42" rx="6" fill="none" stroke="rgb(138,133,128)" stroke-width="1.3"/>
    <text x="360" y="442" fill="#e8e4df" font-size="13" text-anchor="middle">디스크 드라이버 · 장치</text>
    <text x="360" y="457" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">물리 I/O</text>
  </g>

  <!-- down arrows -->
  <line x1="360" y1="134" x2="360" y2="146" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#arr2)"/>
  <line x1="360" y1="186" x2="360" y2="198" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#arr2)"/>
  <line x1="360" y1="242" x2="360" y2="254" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#arr2)"/>
  <line x1="360" y1="298" x2="360" y2="310" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#arr2)"/>
  <line x1="360" y1="356" x2="360" y2="368" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#arr2)"/>
  <line x1="360" y1="408" x2="360" y2="420" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#arr2)"/>

  <!-- hit branch -->
  <path d="M190,334 C90,334 90,112 188,112" fill="none" stroke="#66bb6a" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr2)"/>
  <text x="60" y="225" fill="#66bb6a" font-size="12" font-weight="600" transform="rotate(-90 60 225)">캐시 적중 → 즉시 반환</text>

  <!-- side labels -->
  <text x="560" y="118" fill="rgb(138,133,128)" font-size="12">syscall 층</text>
  <text x="560" y="134" fill="rgb(138,133,128)" font-size="10">strace 측정</text>
  <text x="560" y="278" fill="rgb(138,133,128)" font-size="12">파일 시스템 층</text>
  <text x="560" y="294" fill="rgb(138,133,128)" font-size="10">ext4slower 측정</text>
  <text x="560" y="440" fill="rgb(138,133,128)" font-size="12">블록 층</text>
  <text x="560" y="456" fill="rgb(138,133,128)" font-size="10">biolatency (9장)</text>
</svg>
