<svg viewBox="0 0 860 480" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>트레이싱 소스 2×2 — 정적/동적 × 커널/유저</title>
  <desc>Linux 트레이싱 소스 넷은 두 축으로 나뉜다. 가로축은 위치 — 왼쪽이 커널, 오른쪽이 유저 공간이다. 세로축은 계측 시점 — 위가 정적(소스에 하드코딩, 안정 API), 아래가 동적(실행 중 끼움, 불안정 API)이다. 커널·정적은 tracepoints로 안정 API이고 이벤트가 1000여 개이며 커널 유지보수가 필요하다. 유저·정적은 USDT로 앱이 코드에 박은 안정·문서화된 probe다(Java JDK·PostgreSQL·libc). 커널·동적은 kprobes로 어떤 커널 함수든 추적하는 불안정 API이며 이벤트가 5만 개 이상이다. 유저·동적은 uprobes로 앱·라이브러리 함수를 추적하나 커널로 trap해 오버헤드가 가장 크다. 안정 API(정적)는 견고한 도구를 만들 수 있고, 동적은 거의 무한한 커버리지를 주는 최후의 수단이다.</desc>

  <rect x="0" y="0" width="860" height="480" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">트레이싱 소스 2×2</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">계측 시점(정적 ↕ 동적) × 위치(커널 ↔ 유저)</text>

  <text x="270" y="92" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">커널</text>
  <text x="620" y="92" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">유저 공간</text>

  <!-- 정적 행 -->
  <rect x="32" y="104" width="476" height="160" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="8"/>
  <rect x="516" y="104" width="312" height="160" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="8"/>
  <text x="48" y="128" fill="rgb(212,168,83)" font-size="12">정적 — 소스에 하드코딩 · 안정 API</text>

  <text x="270" y="160" fill="#e8e4df" font-size="15" text-anchor="middle">tracepoints</text>
  <text x="270" y="186" fill="#66bb6a" font-size="11" text-anchor="middle">안정 API · 견고한 도구</text>
  <text x="270" y="208" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">~1,000+ · 커널 유지보수 필요</text>
  <text x="270" y="232" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">syscall·스케줄러·디스크 I/O</text>

  <text x="672" y="160" fill="#e8e4df" font-size="15" text-anchor="middle">USDT</text>
  <text x="672" y="186" fill="#66bb6a" font-size="11" text-anchor="middle">안정·문서화된 probe</text>
  <text x="672" y="208" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">앱이 코드에 박음</text>
  <text x="672" y="232" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">Java JDK·PostgreSQL·libc</text>

  <!-- 동적 행 -->
  <rect x="32" y="276" width="476" height="160" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <rect x="516" y="276" width="312" height="160" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="48" y="300" fill="rgb(212,168,83)" font-size="12">동적 — 실행 중 끼움 · 불안정 API</text>

  <text x="270" y="332" fill="#e8e4df" font-size="15" text-anchor="middle">kprobes</text>
  <text x="270" y="358" fill="#f44336" font-size="11" text-anchor="middle">불안정 API · 최후의 수단</text>
  <text x="270" y="380" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">~50,000+ · 어떤 커널 함수든</text>
  <text x="270" y="404" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">최소 76ns · kretprobe 212ns</text>

  <text x="672" y="332" fill="#e8e4df" font-size="15" text-anchor="middle">uprobes</text>
  <text x="672" y="358" fill="#f44336" font-size="11" text-anchor="middle">불안정 API · 커널로 trap</text>
  <text x="672" y="380" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">앱·라이브러리 함수</text>
  <text x="672" y="404" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">최소 1,287ns — 오버헤드 가장 큼</text>

  <text x="430" y="464" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">정적=안정·견고 / 동적=거의 무한한 커버리지 · perf_event_open(2)로 접근</text>
</svg>
