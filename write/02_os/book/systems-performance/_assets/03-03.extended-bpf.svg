<svg viewBox="0 0 860 460" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Extended BPF 구성 — 이벤트 소스에서 출력까지</title>
  <desc>Extended BPF의 동작 흐름. 왼쪽: BPF 프로그램은 이벤트 소스에 붙어 실행된다 — 소켓 이벤트, tracepoint, USDT probe, kprobe, uprobe, perf_event다. 가운데: BPF 바이트코드는 먼저 검증기(verifier)를 통과해야 한다. 검증기는 BPF 프로그램이 커널을 깨거나 오염시키지 않음을 보장하고, 데이터 타입·구조 이해를 위해 BTF(BPF Type Format)를 쓰기도 한다. 통과한 프로그램은 커널 모드에서 실행되며 명령 집합·저장 객체(map)·helper 함수로 이뤄진다. 오른쪽: 출력은 두 경로다. per-event 데이터는 perf ring buffer로 효율적으로 내보내고, 통계는 map으로 낸다. BPF는 기존 커널 이벤트 소스에 프로그래머빌리티를 줘 효율적·안전·고급 트레이싱 도구(BCC·bpftrace)를 떠받친다.</desc>

  <rect x="0" y="0" width="860" height="460" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">Extended BPF 구성</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">이벤트 소스 → 검증기 → 커널 모드 실행 → 출력 (BCC·bpftrace 프런트엔드)</text>

  <defs>
    <marker id="b1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/></marker>
  </defs>

  <!-- 이벤트 소스 -->
  <text x="130" y="100" fill="rgb(212,168,83)" font-size="14" text-anchor="middle">이벤트 소스</text>
  <rect x="32" y="114" width="196" height="220" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <rect x="48" y="130" width="164" height="28" fill="rgb(42,37,32)" rx="4"/><text x="130" y="149" fill="#e8e4df" font-size="11" text-anchor="middle">소켓 이벤트</text>
  <rect x="48" y="164" width="164" height="28" fill="rgb(42,37,32)" rx="4"/><text x="130" y="183" fill="#e8e4df" font-size="11" text-anchor="middle">tracepoint (정적)</text>
  <rect x="48" y="198" width="164" height="28" fill="rgb(42,37,32)" rx="4"/><text x="130" y="217" fill="#e8e4df" font-size="11" text-anchor="middle">USDT probe (유저 정적)</text>
  <rect x="48" y="232" width="164" height="28" fill="rgb(42,37,32)" rx="4"/><text x="130" y="251" fill="#e8e4df" font-size="11" text-anchor="middle">kprobe (커널 동적)</text>
  <rect x="48" y="266" width="164" height="28" fill="rgb(42,37,32)" rx="4"/><text x="130" y="285" fill="#e8e4df" font-size="11" text-anchor="middle">uprobe (유저 동적)</text>
  <rect x="48" y="300" width="164" height="28" fill="rgb(42,37,32)" rx="4"/><text x="130" y="319" fill="#e8e4df" font-size="11" text-anchor="middle">perf_event</text>

  <line x1="228" y1="224" x2="268" y2="224" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#b1)"/>

  <!-- 검증기 + 실행 -->
  <rect x="272" y="114" width="280" height="220" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="8"/>
  <text x="412" y="138" fill="rgb(212,168,83)" font-size="14" text-anchor="middle">BPF 커널 모드</text>

  <rect x="292" y="152" width="240" height="56" fill="rgb(26,26,26)" stroke="#f44336" rx="6"/>
  <text x="412" y="174" fill="#f44336" font-size="12" text-anchor="middle">검증기 (verifier)</text>
  <text x="412" y="194" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">커널 안 깸·안 오염 보장 · BTF</text>

  <line x1="412" y1="208" x2="412" y2="224" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#b1)" transform="rotate(90 412 216)"/>

  <rect x="292" y="232" width="240" height="86" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="412" y="256" fill="#e8e4df" font-size="12" text-anchor="middle">실행 — 가상 머신</text>
  <text x="412" y="278" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">명령 집합 · map(저장) · helper 함수</text>
  <text x="412" y="300" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">예: I/O 시작·끝 타임스탬프 → 히스토그램</text>

  <line x1="552" y1="224" x2="592" y2="224" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#b1)"/>

  <!-- 출력 -->
  <text x="722" y="100" fill="rgb(212,168,83)" font-size="14" text-anchor="middle">출력</text>
  <rect x="596" y="150" width="232" height="70" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="712" y="178" fill="#e8e4df" font-size="12" text-anchor="middle">perf ring buffer</text>
  <text x="712" y="200" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">per-event 데이터 (효율적)</text>

  <rect x="596" y="232" width="232" height="70" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="712" y="260" fill="#e8e4df" font-size="12" text-anchor="middle">map</text>
  <text x="712" y="282" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">통계 (statistics)</text>

  <!-- 결론 -->
  <rect x="32" y="356" width="796" height="44" fill="#66bb6a" fill-opacity="0.10" stroke="#66bb6a" rx="8"/>
  <text x="430" y="384" fill="#e8e4df" font-size="12" text-anchor="middle">기존 이벤트 소스에 프로그래머빌리티를 줘 효율적·안전·고급 트레이싱을 가능케</text>

  <text x="32" y="430" fill="rgb(138,133,128)" font-size="11">2013 재작성(Starovoitov·Borkmann) → 범용 커널 안 실행 엔진 · 프런트엔드 BCC·bpftrace(15장)</text>
</svg>
