<svg viewBox="0 0 860 520" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>관측 vs 실험 — 두 손, 그리고 관측의 세 갈래</title>
  <desc>위: 성능 도구는 두 손이다. 왼손 관측(observability)은 시스템을 건드리지 않고 관찰하며, 프로덕션에서 먼저 시도해 안전하다. 오른손 실험(experimentation)은 합성 워크로드를 걸어 측정하는 벤치마킹으로, 자원 경합으로 프로덕션을 교란할 수 있어 유휴 테스트 환경에 적합하다. 한 손만 쓰는 것은 문제를 한 손으로 푸는 것과 같다. 아래: 관측은 세 갈래다. 카운터는 하드코딩된 정수로 상태를 기록하고 통계·메트릭·알림으로 위계가 올라가며 방향만 가리킨다. 프로파일링은 표본을 떠서 거친 그림을 그리고 플레임 그래프로 시각화한다. 트레이싱은 이벤트 기반 기록으로 정적 계측(tracepoint·USDT)과 동적 계측(kprobes), BPF(BCC·bpftrace)를 쓴다. 메트릭이 방향만 줄 때 프로파일링·트레이싱이 왜인지를 판다.</desc>

  <rect x="0" y="0" width="860" height="520" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">관측 vs 실험 — 두 손</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">한 손만 쓰는 건 문제를 한 손으로 푸는 것 — 프로덕션은 관측 먼저</text>

  <!-- 관측 -->
  <rect x="32" y="82" width="388" height="92" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="8"/>
  <text x="226" y="106" fill="rgb(212,168,83)" font-size="15" text-anchor="middle">관측 (observability)</text>
  <text x="226" y="130" fill="#e8e4df" font-size="11" text-anchor="middle">건드리지 않고 관찰 — 카운터·프로파일링·트레이싱</text>
  <text x="226" y="152" fill="#66bb6a" font-size="11" text-anchor="middle">프로덕션에서 먼저 시도 (안전)</text>

  <!-- 실험 -->
  <rect x="440" y="82" width="388" height="92" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="634" y="106" fill="rgb(212,168,83)" font-size="15" text-anchor="middle">실험 (experimentation)</text>
  <text x="634" y="130" fill="#e8e4df" font-size="11" text-anchor="middle">합성 워크로드를 걸어 측정 — 벤치마킹</text>
  <text x="634" y="152" fill="#f44336" font-size="11" text-anchor="middle">교란 위험 — 유휴 테스트 환경에 적합</text>

  <!-- 관측의 세 갈래 -->
  <text x="32" y="206" fill="#e8e4df" font-size="15">관측의 세 갈래</text>

  <!-- 카운터 -->
  <rect x="32" y="220" width="256" height="252" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="160" y="244" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">카운터 (counters)</text>
  <text x="160" y="266" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">하드코딩된 정수 — 상태·활동</text>

  <rect x="52" y="280" width="216" height="26" fill="rgb(42,37,32)" rx="4"/>
  <text x="160" y="297" fill="#e8e4df" font-size="10" text-anchor="middle">카운터</text>
  <rect x="52" y="312" width="216" height="26" fill="rgb(42,37,32)" rx="4"/>
  <text x="160" y="329" fill="#e8e4df" font-size="10" text-anchor="middle">→ 통계 (statistics)</text>
  <rect x="52" y="344" width="216" height="26" fill="rgb(42,37,32)" rx="4"/>
  <text x="160" y="361" fill="#e8e4df" font-size="10" text-anchor="middle">→ 메트릭 (metric)</text>
  <rect x="52" y="376" width="216" height="26" fill="rgb(42,37,32)" rx="4"/>
  <text x="160" y="393" fill="#e8e4df" font-size="10" text-anchor="middle">→ 알림 (alert)</text>
  <text x="160" y="430" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">방향만 가리킴</text>
  <text x="160" y="448" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">(예: vmstat·Grafana)</text>

  <!-- 프로파일링 -->
  <rect x="300" y="220" width="256" height="252" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="428" y="244" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">프로파일링 (profiling)</text>
  <text x="428" y="266" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">표본(sample)으로 거친 그림</text>

  <text x="428" y="296" fill="#e8e4df" font-size="11" text-anchor="middle">on-CPU 코드 경로 표집</text>

  <!-- 미니 플레임그래프 -->
  <rect x="328" y="404" width="200" height="14" fill="rgb(42,37,32)"/>
  <rect x="340" y="388" width="120" height="14" fill="rgba(212,168,83,0.4)"/>
  <rect x="352" y="372" width="70" height="14" fill="rgba(212,168,83,0.6)"/>
  <text x="428" y="436" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">플레임 그래프</text>
  <text x="428" y="454" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">너비=CPU시간 · 높이=스택</text>

  <!-- 트레이싱 -->
  <rect x="568" y="220" width="260" height="252" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="698" y="244" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">트레이싱 (tracing)</text>
  <text x="698" y="266" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">이벤트 기반 기록</text>

  <rect x="588" y="282" width="220" height="40" fill="rgb(42,37,32)" rx="4"/>
  <text x="698" y="300" fill="#e8e4df" font-size="10" text-anchor="middle">정적 계측 — 소스에 하드코딩</text>
  <text x="698" y="315" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">tracepoint(커널)·USDT(유저)</text>

  <rect x="588" y="328" width="220" height="40" fill="rgb(42,37,32)" rx="4"/>
  <text x="698" y="346" fill="#e8e4df" font-size="10" text-anchor="middle">동적 계측 — 실행 중 끼움</text>
  <text x="698" y="361" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">kprobes · 손전등 비유</text>

  <rect x="588" y="374" width="220" height="40" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="4"/>
  <text x="698" y="392" fill="rgb(212,168,83)" font-size="10" text-anchor="middle">BPF — 커널 안 프로그래머빌리티</text>
  <text x="698" y="407" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">BCC · bpftrace</text>
  <text x="698" y="448" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">왜(why)인지를 판다</text>

  <text x="32" y="500" fill="rgb(138,133,128)" font-size="11">메트릭이 방향만 줄 때 → 프로파일링·트레이싱으로 깊이 판다</text>
</svg>
