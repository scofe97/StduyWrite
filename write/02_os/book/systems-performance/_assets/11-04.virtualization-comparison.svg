<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>가상화 세 기술 비교 — 관측성이 선택을 가른다</title>
  <desc>하드웨어 가상화(KVM)·OS 가상화(컨테이너)·경량 가상화(Firecracker)의 구조와 관측성 대비. 컨테이너는 호스트 운영자에, VM은 엔드유저에 관측이 유리하다.</desc>
  <rect width="800" height="460" fill="#0d0d0d"/>
  <text x="30" y="40" fill="#e8e4df" font-size="20" font-weight="700">가상화 세 기술 비교</text>
  <text x="30" y="64" fill="rgb(138,133,128)" font-size="13">관측성이 선택을 가른다 — 마이크로벤치마크가 놓치는 진짜 성능 요소</text>

  <!-- HW virt -->
  <text x="40" y="100" fill="rgb(212,168,83)" font-size="13" font-weight="700">하드웨어 가상화 (KVM)</text>
  <rect x="40" y="110" width="230" height="34" rx="5" fill="none" stroke="rgb(42,37,32)" stroke-width="1.1"/>
  <text x="155" y="127" fill="#e8e4df" font-size="11" text-anchor="middle">게스트 앱 + 게스트 커널</text>
  <text x="155" y="139" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">커널마다 메모리 소비</text>
  <rect x="40" y="150" width="230" height="28" rx="5" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="155" y="169" fill="#e8e4df" font-size="11" text-anchor="middle">하이퍼바이저 (전체 머신)</text>

  <!-- OS virt -->
  <text x="290" y="100" fill="rgb(212,168,83)" font-size="13" font-weight="700">OS 가상화 (컨테이너)</text>
  <rect x="290" y="110" width="230" height="34" rx="5" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="405" y="127" fill="#e8e4df" font-size="11" text-anchor="middle">게스트 앱만 (커널 없음)</text>
  <text x="405" y="139" fill="#66bb6a" font-size="9" text-anchor="middle">메모리 유연·통합 캐시</text>
  <rect x="290" y="150" width="230" height="28" rx="5" fill="none" stroke="rgb(42,37,32)" stroke-width="1.1"/>
  <text x="405" y="169" fill="#e8e4df" font-size="11" text-anchor="middle">공유 호스트 커널</text>

  <!-- lightweight -->
  <text x="540" y="100" fill="rgb(212,168,83)" font-size="13" font-weight="700">경량 (Firecracker)</text>
  <rect x="540" y="110" width="230" height="34" rx="5" fill="none" stroke="rgb(42,37,32)" stroke-width="1.1"/>
  <text x="655" y="127" fill="#e8e4df" font-size="11" text-anchor="middle">게스트 앱 + 게스트 커널</text>
  <text x="655" y="139" fill="#66bb6a" font-size="9" text-anchor="middle">부팅 ~100ms · 메모리 &lt;5MB</text>
  <rect x="540" y="150" width="230" height="28" rx="5" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="655" y="169" fill="#e8e4df" font-size="11" text-anchor="middle">경량 VMM (5만 줄)</text>

  <!-- comparison table -->
  <text x="40" y="212" fill="#e8e4df" font-size="13" font-weight="600">핵심 속성 대비</text>
  <line x1="40" y1="222" x2="770" y2="222" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="44" y="242" fill="rgb(138,133,128)" font-size="11">메모리 할당</text>
  <text x="155" y="242" fill="#e8e4df" font-size="11" text-anchor="middle">고정</text>
  <text x="405" y="242" fill="#66bb6a" font-size="11" text-anchor="middle">유연 (유휴→캐시)</text>
  <text x="655" y="242" fill="#e8e4df" font-size="11" text-anchor="middle">고정</text>

  <text x="44" y="266" fill="rgb(138,133,128)" font-size="11">CPU 할당</text>
  <text x="155" y="266" fill="#e8e4df" font-size="11" text-anchor="middle">vCPU 고정</text>
  <text x="405" y="266" fill="#66bb6a" font-size="11" text-anchor="middle">유연 (shares+bw)</text>
  <text x="655" y="266" fill="#e8e4df" font-size="11" text-anchor="middle">vCPU 고정</text>

  <text x="44" y="290" fill="rgb(138,133,128)" font-size="11">호스트 관측</text>
  <text x="155" y="290" fill="#e8e4df" font-size="11" text-anchor="middle">중간</text>
  <text x="405" y="290" fill="#66bb6a" font-size="11" text-anchor="middle">높음 (다 봄)</text>
  <text x="655" y="290" fill="#e8e4df" font-size="11" text-anchor="middle">중간</text>

  <text x="44" y="314" fill="rgb(138,133,128)" font-size="11">게스트 관측</text>
  <text x="155" y="314" fill="#66bb6a" font-size="11" text-anchor="middle">높음 (전체 커널)</text>
  <text x="405" y="314" fill="#e8e4df" font-size="11" text-anchor="middle">중간 (호스트 새어듦)</text>
  <text x="655" y="314" fill="#66bb6a" font-size="11" text-anchor="middle">높음 (전체 커널)</text>

  <text x="44" y="338" fill="rgb(138,133,128)" font-size="11">다른 OS 게스트</text>
  <text x="155" y="338" fill="#e8e4df" font-size="11" text-anchor="middle">가능</text>
  <text x="405" y="338" fill="#e8e4df" font-size="11" text-anchor="middle">보통 불가</text>
  <text x="655" y="338" fill="#e8e4df" font-size="11" text-anchor="middle">가능</text>
  <line x1="40" y1="350" x2="770" y2="350" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- conclusion -->
  <rect x="40" y="366" width="730" height="74" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="60" y="392" fill="#e8e4df" font-size="13" font-weight="600">관측 유리: 컨테이너 → 호스트 운영자 / VM → 엔드유저</text>
  <text x="60" y="414" fill="rgb(138,133,128)" font-size="12">관측은 불필요한 일을 식별·제거해, 사소한 하이퍼바이저 차이보다 큰 성능 이득을 준다.</text>
  <text x="60" y="431" fill="rgb(138,133,128)" font-size="12">선택은 "누가 분석하는가"에 달렸다 — 호스트 운영자면 컨테이너, 엔드유저면 VM.</text>
</svg>
