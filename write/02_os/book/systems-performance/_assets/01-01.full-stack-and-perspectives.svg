<svg viewBox="0 0 860 500" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>풀 스택과 두 분석 관점</title>
  <desc>왼쪽: 시스템 성능이 보는 풀 스택은 애플리케이션부터 metal(하드웨어)까지다. 위에서 아래로 애플리케이션, 시스템 라이브러리, 운영체제 커널, 그리고 하드웨어(metal)로 쌓이며, 데이터 경로 위의 모든 것이 성능에 영향을 준다. 오른쪽: 두 분석 관점이 이 스택을 반대 방향에서 접근한다. 워크로드 분석은 애플리케이션 개발자가 워크로드(요청) 쪽 위에서 아래로 보고, 자원 분석은 시스템 관리자가 자원(CPU·디스크·네트워크) 쪽 아래에서 위로 본다. 까다로운 문제는 두 관점 모두에서 봐야 한다.</desc>

  <rect x="0" y="0" width="860" height="500" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">풀 스택과 두 분석 관점</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">시스템 성능은 애플리케이션부터 metal 까지 — 두 관점이 반대 방향에서 접근</text>

  <!-- 왼쪽: 풀 스택 -->
  <text x="32" y="100" fill="rgb(212,168,83)" font-size="15">풀 스택 (full stack)</text>

  <rect x="32" y="114" width="340" height="58" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="6"/>
  <text x="202" y="140" fill="#e8e4df" font-size="13" text-anchor="middle">애플리케이션</text>
  <text x="202" y="160" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">DB · 앱 · 웹 서버 · 컴파일러</text>

  <rect x="32" y="178" width="340" height="48" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="202" y="207" fill="#e8e4df" font-size="13" text-anchor="middle">시스템 라이브러리</text>

  <rect x="32" y="232" width="340" height="48" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="202" y="261" fill="#e8e4df" font-size="13" text-anchor="middle">운영체제 커널 (OS kernel)</text>

  <rect x="32" y="286" width="340" height="58" fill="rgb(42,37,32)" rx="6"/>
  <text x="202" y="312" fill="#e8e4df" font-size="13" text-anchor="middle">하드웨어 (metal)</text>
  <text x="202" y="332" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">CPU · 메모리 · 디스크 · 네트워크</text>

  <text x="32" y="372" fill="rgb(138,133,128)" font-size="11">데이터 경로 위의 모든 것이 성능에 영향 — 통째로 빠뜨리는 영역이 없게</text>

  <!-- 오른쪽: 두 관점 -->
  <text x="440" y="100" fill="rgb(212,168,83)" font-size="15">두 분석 관점</text>

  <!-- 워크로드 분석: 위→아래 -->
  <rect x="440" y="114" width="388" height="100" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="456" y="138" fill="#e8e4df" font-size="13">워크로드 분석 (workload analysis)</text>
  <text x="456" y="160" fill="rgb(138,133,128)" font-size="11">애플리케이션 개발자 — 워크로드(요청) 담당</text>
  <text x="456" y="184" fill="rgb(138,133,128)" font-size="11">워크로드에서 아래로 ↓</text>

  <defs>
    <marker id="dn" markerWidth="9" markerHeight="9" refX="3" refY="7" orient="auto">
      <path d="M0,0 L6,0 L3,7 Z" fill="rgb(212,168,83)"/>
    </marker>
    <marker id="up" markerWidth="9" markerHeight="9" refX="3" refY="2" orient="auto">
      <path d="M3,0 L6,7 L0,7 Z" fill="#66bb6a"/>
    </marker>
  </defs>
  <line x1="800" y1="150" x2="800" y2="196" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#dn)"/>

  <!-- 자원 분석: 아래→위 -->
  <rect x="440" y="226" width="388" height="100" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="456" y="250" fill="#e8e4df" font-size="13">자원 분석 (resource analysis)</text>
  <text x="456" y="272" fill="rgb(138,133,128)" font-size="11">시스템 관리자 — 시스템 자원 담당</text>
  <text x="456" y="296" fill="rgb(138,133,128)" font-size="11">자원에서 위로 ↑</text>
  <line x1="800" y1="308" x2="800" y2="262" stroke="#66bb6a" stroke-width="2" marker-end="url(#up)"/>

  <rect x="440" y="356" width="388" height="48" fill="#66bb6a" fill-opacity="0.10" stroke="#66bb6a" rx="8"/>
  <text x="634" y="385" fill="#e8e4df" font-size="12" text-anchor="middle">까다로운 문제는 두 관점 모두에서</text>
</svg>
