<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 430" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>벤치마킹 실패 — casual benchmarking과 벤치마크 역설</title>
  <desc>A를 재려다 B를 측정하고 C라 결론짓는 casual benchmarking의 어긋남과, 여러 벤치마크를 모두 이겨야 할 때 50/50이면 보통 진다는 벤치마크 역설.</desc>
  <defs>
    <marker id="b1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f44336"/>
    </marker>
  </defs>
  <rect width="780" height="430" fill="#0d0d0d"/>
  <text x="30" y="40" fill="#e8e4df" font-size="20" font-weight="700">벤치마킹 실패</text>
  <text x="30" y="64" fill="rgb(138,133,128)" font-size="13">벤치마크를 믿지 말고 분석하라 — "무엇을 측정하는지"가 유일한 방어선</text>

  <!-- casual benchmarking -->
  <text x="40" y="100" fill="rgb(212,168,83)" font-size="13" font-weight="700">casual benchmarking — 의도와 측정과 결론의 어긋남</text>
  <rect x="40" y="114" width="200" height="56" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="140" y="138" fill="#e8e4df" font-size="12" text-anchor="middle">A를 벤치마크하려 함</text>
  <text x="140" y="158" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">예: 디스크 성능</text>

  <rect x="290" y="114" width="200" height="56" rx="6" fill="none" stroke="#f44336" stroke-width="1.3"/>
  <text x="390" y="138" fill="#f44336" font-size="12" text-anchor="middle">실제 B를 측정</text>
  <text x="390" y="158" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">파일시스템 캐시</text>

  <rect x="540" y="114" width="200" height="56" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="640" y="138" fill="#e8e4df" font-size="12" text-anchor="middle">C라 결론</text>
  <text x="640" y="158" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">"디스크가 빠르다"(틀림)</text>

  <line x1="240" y1="142" x2="288" y2="142" stroke="#f44336" stroke-width="1.4" marker-end="url(#b1)"/>
  <line x1="490" y1="142" x2="538" y2="142" stroke="#f44336" stroke-width="1.4" marker-end="url(#b1)"/>
  <text x="40" y="194" fill="rgb(138,133,128)" font-size="11">캐시·버퍼링이 디스크 I/O를 메모리 I/O로 대체 → 자릿수가 다른 오해</text>

  <!-- benchmark paradox -->
  <text x="40" y="234" fill="rgb(212,168,83)" font-size="13" font-weight="700">벤치마크 역설 — 50/50이면 보통 진다</text>
  <text x="40" y="256" fill="rgb(138,133,128)" font-size="12">고객은 여러 벤치마크를 모두 이기길 원한다. 각 50%면:</text>

  <g>
    <rect x="60" y="272" width="80" height="34" rx="5" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
    <text x="100" y="294" fill="#e8e4df" font-size="12" text-anchor="middle">50%</text>
    <text x="160" y="294" fill="rgb(138,133,128)" font-size="14" text-anchor="middle">×</text>
    <rect x="180" y="272" width="80" height="34" rx="5" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
    <text x="220" y="294" fill="#e8e4df" font-size="12" text-anchor="middle">50%</text>
    <text x="280" y="294" fill="rgb(138,133,128)" font-size="14" text-anchor="middle">×</text>
    <rect x="300" y="272" width="80" height="34" rx="5" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
    <text x="340" y="294" fill="#e8e4df" font-size="12" text-anchor="middle">50%</text>
    <text x="400" y="294" fill="rgb(138,133,128)" font-size="14" text-anchor="middle">=</text>
    <rect x="420" y="272" width="110" height="34" rx="5" fill="none" stroke="#f44336" stroke-width="1.3"/>
    <text x="475" y="294" fill="#f44336" font-size="13" font-weight="600" text-anchor="middle">12.5%</text>
  </g>
  <text x="60" y="328" fill="rgb(138,133,128)" font-size="11">벤치마크가 많을수록(모두 이겨야) 확률은 더 나빠진다.</text>

  <!-- defense -->
  <rect x="40" y="348" width="700" height="68" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="60" y="374" fill="#e8e4df" font-size="13" font-weight="600">방어선 — 모든 숫자에 한계 요인과 분석을 동반하라</text>
  <text x="60" y="396" fill="rgb(138,133,128)" font-size="12">"일주일 미만 연구한 결과는 아마 틀렸다." 16가지 실패 모두 active benchmarking + sanity check로 막는다.</text>
  <text x="60" y="412" fill="rgb(138,133,128)" font-size="11">벤더 결과는 의심하되 상한(넘지 못할 값)으로는 쓸 수 있다.</text>
</svg>
