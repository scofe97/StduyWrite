<svg viewBox="0 0 640 470" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>커널 빌드 7단계와 Kconfig·Kbuild 흐름</title>
  <desc>빌드는 소스 얻기부터 GRUB 설정까지 7단계. 이 노트는 1-3단계. Kconfig 메뉴 선택이 .config로 모이고, Makefile의 obj-$(CONFIG_FOO)가 그 값에 따라 내장(y)·모듈(m)·미빌드로 갈린다.</desc>
  <rect x="0" y="0" width="640" height="470" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">커널 빌드 7단계 — 이 노트는 ①~③</text>

  <!-- 7단계 가로 바 -->
  <!-- 강조: 1-3 (골든), 흐림: 4-7 (회색) -->
  <rect x="20" y="56" width="92" height="48" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="66" y="78" fill="rgb(212,168,83)" font-family="'JetBrains Mono',monospace" font-size="13" text-anchor="middle">①</text>
  <text x="66" y="96" fill="#e8e4df" font-size="11" text-anchor="middle">소스 얻기</text>

  <rect x="118" y="56" width="92" height="48" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="164" y="78" fill="rgb(212,168,83)" font-family="'JetBrains Mono',monospace" font-size="13" text-anchor="middle">②</text>
  <text x="164" y="96" fill="#e8e4df" font-size="11" text-anchor="middle">추출</text>

  <rect x="216" y="56" width="92" height="48" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="262" y="78" fill="rgb(212,168,83)" font-family="'JetBrains Mono',monospace" font-size="13" text-anchor="middle">③</text>
  <text x="262" y="96" fill="#e8e4df" font-size="11" text-anchor="middle">설정</text>

  <rect x="314" y="56" width="74" height="48" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="351" y="78" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="13" text-anchor="middle">④</text>
  <text x="351" y="96" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">빌드</text>

  <rect x="394" y="56" width="74" height="48" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="431" y="78" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="13" text-anchor="middle">⑤</text>
  <text x="431" y="96" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">모듈 설치</text>

  <rect x="474" y="56" width="74" height="48" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="511" y="78" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="13" text-anchor="middle">⑥</text>
  <text x="511" y="96" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">GRUB</text>

  <rect x="554" y="56" width="66" height="48" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="587" y="78" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="13" text-anchor="middle">⑦</text>
  <text x="587" y="96" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">메뉴</text>

  <text x="20" y="124" fill="rgb(138,133,128)" font-size="11">①~③ = 이 노트 (Ch 2) · ④~⑦ = 다음 노트 (Ch 3)</text>

  <!-- Kconfig/Kbuild 흐름 -->
  <text x="20" y="156" fill="rgb(138,133,128)" font-size="12">설정(③)이 어떻게 빌드를 제어하는가 — Kconfig → .config → Kbuild</text>

  <!-- Kconfig 파일 -->
  <rect x="20" y="170" width="160" height="60" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="100" y="194" fill="#e8e4df" font-size="12" text-anchor="middle">Kconfig.* 파일</text>
  <text x="100" y="214" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">CONFIG_FOO 정의·메뉴</text>

  <!-- 화살표 1 -->
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <line x1="180" y1="200" x2="236" y2="200" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>
  <text x="208" y="190" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">menuconfig</text>

  <!-- .config (강조) -->
  <rect x="240" y="170" width="160" height="60" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="320" y="194" fill="rgb(212,168,83)" font-family="'JetBrains Mono',monospace" font-size="14" text-anchor="middle">.config</text>
  <text x="320" y="214" fill="#e8e4df" font-size="11" text-anchor="middle">최종 설정 (제품의 핵심)</text>

  <!-- 화살표 2 -->
  <line x1="400" y1="200" x2="456" y2="200" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Makefile -->
  <rect x="460" y="170" width="160" height="60" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="540" y="194" fill="#e8e4df" font-size="12" text-anchor="middle">Kbuild Makefile</text>
  <text x="540" y="214" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">obj-$(CONFIG_FOO)</text>

  <!-- CONFIG 값 → 3갈래 -->
  <text x="20" y="262" fill="rgb(138,133,128)" font-size="12">CONFIG_FOO 값에 따라 빌드 결과가 셋으로 갈린다</text>

  <rect x="20" y="274" width="195" height="64" fill="rgba(102,187,106,0.13)" stroke="#66bb6a"/>
  <text x="117" y="298" fill="#66bb6a" font-family="'JetBrains Mono',monospace" font-size="14" text-anchor="middle">y</text>
  <text x="117" y="318" fill="#e8e4df" font-size="11" text-anchor="middle">커널 이미지에 내장</text>
  <text x="117" y="333" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">obj-y += FOO.o</text>

  <rect x="223" y="274" width="195" height="64" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="320" y="298" fill="rgb(212,168,83)" font-family="'JetBrains Mono',monospace" font-size="14" text-anchor="middle">m</text>
  <text x="320" y="318" fill="#e8e4df" font-size="11" text-anchor="middle">별도 모듈 (.ko)</text>
  <text x="320" y="333" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">obj-m += FOO.o</text>

  <rect x="426" y="274" width="194" height="64" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="523" y="298" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="14" text-anchor="middle">n / null</text>
  <text x="523" y="318" fill="#e8e4df" font-size="11" text-anchor="middle">빌드 안 함</text>
  <text x="523" y="333" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">(주석 처리)</text>

  <!-- 시작점 3접근 -->
  <text x="20" y="370" fill="rgb(138,133,128)" font-size="12">.config 시작점 — 세 가지 접근</text>

  <rect x="20" y="382" width="195" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="117" y="404" fill="#e8e4df" font-size="11" text-anchor="middle">배포판 설정 기반</text>
  <text x="117" y="424" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">make defconfig</text>

  <rect x="223" y="382" width="195" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="320" y="404" fill="#e8e4df" font-size="11" text-anchor="middle">현재 시스템 기반</text>
  <text x="320" y="424" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">localmodconfig</text>

  <rect x="426" y="382" width="194" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="523" y="404" fill="#e8e4df" font-size="11" text-anchor="middle">임베디드 (DT)</text>
  <text x="523" y="424" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10" text-anchor="middle">&lt;board&gt;_defconfig</text>

  <text x="20" y="458" fill="rgb(138,133,128)" font-size="11">설정은 변경이 없어도 최소 한 번 반드시 — 자동 생성 헤더가 빠지면 뒤에서 깨집니다</text>
</svg>
