<svg viewBox="0 0 680 560" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>페이지 할당자(BSA) — buddy system freelist와 분할·병합</title>
  <desc>페이지 할당자(BSA)는 리눅스의 1차 물리 메모리 (de)할당 엔진이다. freelist는 order 0~MAX_ORDER-1(보통 0~10)의 이중 연결 리스트 배열이며, order N 리스트는 2^N 페이지짜리 물리 연속 청크를 담는다. 할당 시 적합한 order가 비면 상위 order 청크를 둘로 쪼개(buddy block) 절반은 주고 절반은 하위 order에 넣는다. free 시 buddy를 찾아 병합해 메모리를 defrag한다. 최대 할당은 2^(MAX_ORDER-1) 페이지 = 4MB. 약점은 내부 단편화(132KB 요청에 256KB 할당).</desc>
  <rect x="0" y="0" width="680" height="560" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">페이지 할당자 (BSA / buddy system)</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">리눅스의 1차 물리 메모리 (de)할당 엔진 — 모든 RAM 할당은 결국 여기를 거칩니다</text>

  <!-- freelist 구조 -->
  <rect x="20" y="74" width="320" height="226" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="38" y="96" fill="rgb(212,168,83)" font-size="13" font-weight="bold">freelist — order별 이중 연결 리스트</text>
  <text x="38" y="114" fill="rgb(138,133,128)" font-size="10">order N 리스트 = 2^N 페이지짜리 물리 연속 청크</text>

  <rect x="38" y="124" width="120" height="26" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="50" y="141" fill="#e8e4df" font-size="11">order 0</text>
  <text x="150" y="141" fill="rgb(138,133,128)" font-size="10" text-anchor="end">1 page · 4KB</text>
  <rect x="38" y="152" width="140" height="26" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="50" y="169" fill="#e8e4df" font-size="11">order 1</text>
  <text x="170" y="169" fill="rgb(138,133,128)" font-size="10" text-anchor="end">2 pages · 8KB</text>
  <rect x="38" y="180" width="160" height="26" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="50" y="197" fill="#e8e4df" font-size="11">order 2</text>
  <text x="190" y="197" fill="rgb(138,133,128)" font-size="10" text-anchor="end">4 pages · 16KB</text>
  <text x="50" y="224" fill="rgb(138,133,128)" font-size="13">⋮</text>
  <rect x="38" y="232" width="284" height="26" fill="rgba(102,187,106,0.13)" stroke="#66bb6a"/>
  <text x="50" y="249" fill="#66bb6a" font-size="11">order 10</text>
  <text x="314" y="249" fill="rgb(138,133,128)" font-size="10" text-anchor="end">1024 pages · 4MB (최대)</text>

  <text x="38" y="278" fill="rgb(138,133,128)" font-size="10">각 청크는 그 자체로 물리 연속 보장 · 노드:존마다 freelist 따로</text>
  <text x="38" y="293" fill="rgb(138,133,128)" font-size="10">현황 요약: /proc/buddyinfo</text>

  <!-- 분할/병합 -->
  <rect x="350" y="74" width="312" height="226" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="368" y="96" fill="#e8e4df" font-size="13" font-weight="bold">할당 — 분할(split)과 buddy</text>
  <text x="368" y="116" fill="rgb(138,133,128)" font-size="10">128KB 요청 → order 5 비면 order 6 청크를 쪼갬</text>

  <rect x="400" y="128" width="220" height="30" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="510" y="148" fill="rgb(212,168,83)" font-size="11" text-anchor="middle">order 6 · 256KB 청크</text>

  <defs>
    <marker id="ar81" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <line x1="510" y1="158" x2="510" y2="178" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ar81)"/>
  <text x="524" y="173" fill="rgb(138,133,128)" font-size="9">split</text>

  <rect x="400" y="182" width="105" height="30" fill="rgba(102,187,106,0.13)" stroke="#66bb6a"/>
  <text x="452" y="202" fill="#66bb6a" font-size="10" text-anchor="middle">128KB 요청자</text>
  <rect x="515" y="182" width="105" height="30" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/>
  <text x="567" y="202" fill="#e8e4df" font-size="10" text-anchor="middle">128KB → order 5</text>
  <text x="510" y="228" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">둘은 buddy block (같은 크기·물리 인접)</text>

  <text x="368" y="252" fill="#e8e4df" font-size="11" font-weight="bold">해제 — 병합(coalesce)</text>
  <text x="368" y="270" fill="rgb(138,133,128)" font-size="10">free 시 buddy 를 찾아 합침 → 상위 order 로 복귀</text>
  <text x="368" y="286" fill="#66bb6a" font-size="10">메모리 defrag 효과 (외부 단편화 완화)</text>

  <!-- 내부 단편화 경고 -->
  <rect x="20" y="312" width="642" height="78" fill="rgba(244,67,54,0.10)" stroke="#f44336" stroke-width="2"/>
  <text x="38" y="334" fill="#f44336" font-size="13" font-weight="bold">⚠ 핵심 약점 — 내부 단편화(wastage)</text>
  <text x="38" y="354" fill="#e8e4df" font-size="11">132KB 요청 → order 7(256KB) 할당 → 124KB 낭비 (거의 50%!). order 는 2의 거듭제곱뿐이라</text>
  <text x="38" y="372" fill="rgb(138,133,128)" font-size="11">2의 거듭제곱이 아닌 크기는 큰 낭비. 완화책: alloc_pages_exact() / free_pages_exact()</text>

  <!-- GFP 플래그 -->
  <rect x="20" y="402" width="642" height="138" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="424" fill="#e8e4df" font-size="13" font-weight="bold">GFP 플래그 — 할당 동작 제어 (모든 API 의 첫 인자)</text>

  <rect x="38" y="436" width="300" height="44" fill="rgba(102,187,106,0.13)" stroke="#66bb6a"/>
  <text x="52" y="456" fill="#66bb6a" font-size="12">GFP_KERNEL</text>
  <text x="52" y="472" fill="rgb(138,133,128)" font-size="10">프로세스 컨텍스트 · sleep 가능 시 (일반 케이스)</text>

  <rect x="350" y="436" width="312" height="44" fill="rgba(244,67,54,0.10)" stroke="#f44336"/>
  <text x="364" y="456" fill="#f47f72" font-size="12">GFP_ATOMIC</text>
  <text x="364" y="472" fill="rgb(138,133,128)" font-size="10">인터럽트·atomic 컨텍스트 · spinlock 보유 시 (sleep 불가)</text>

  <text x="38" y="500" fill="rgb(138,133,128)" font-size="11">황금률: sleep 안전하면 GFP_KERNEL, 불가능하면 GFP_ATOMIC. atomic 에서 sleep = 버그(머신 멈춤)</text>
  <text x="38" y="518" fill="rgb(138,133,128)" font-size="10">__GFP_ZERO 를 OR 하면 0 초기화 메모리. GFP_KERNEL = __GFP_RECLAIM | __GFP_IO | __GFP_FS</text>
  <text x="38" y="534" fill="rgb(138,133,128)" font-size="10">API: __get_free_page[s]() · get_zeroed_page() · alloc_page[s]() (struct page 반환 → page_address())</text>
</svg>
