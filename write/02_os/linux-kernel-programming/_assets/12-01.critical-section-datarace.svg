<svg viewBox="0 0 680 580" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>임계 구역·atomicity·data race — 두 조건·동시성 원인·deadlock</title>
  <desc>임계 구역(critical section)은 두 조건을 모두 만족하는 코드 경로다 — ① 병렬 실행 가능, ② 공유 쓰기 데이터에 접근(읽기/쓰기). 따라서 배타적으로(한 번에 한 스레드만, serialized), 때로 atomic(중단 없이 완료)하게 실행되어야 한다. 보호하지 않으면 data race(결과가 timing에 따라 달라짐)가 발생한다. atomicity는 단일 머신 명령이나 워드 크기 정렬 데이터의 읽기/쓰기만 보장된다(i++도 위험). 락은 한 스레드만 winner로 진입시키고 나머지는 unlock을 기다리게 해 직렬화한다. 동시성 우려 원인은 SMP·선점 커널·blocking I/O·하드웨어 인터럽트다. deadlock은 lock-ordering 등 가이드라인으로 막는다.</desc>
  <rect x="0" y="0" width="680" height="580" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">임계 구역과 data race</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">공유 쓰기 데이터를 병렬 접근하면 data race — 락으로 직렬화해 보호합니다</text>

  <!-- 임계 구역 두 조건 -->
  <rect x="20" y="74" width="320" height="130" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="38" y="96" fill="rgb(212,168,83)" font-size="13" font-weight="bold">임계 구역 — 두 조건 모두 충족</text>

  <rect x="38" y="108" width="284" height="34" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="52" y="126" fill="#e8e4df" font-size="11">① 병렬 실행 가능</text>
  <text x="52" y="139" fill="rgb(138,133,128)" font-size="9">동시에 여러 스레드가 이 코드를 돌 수 있음</text>

  <rect x="38" y="148" width="284" height="34" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="52" y="166" fill="#e8e4df" font-size="11">② 공유 쓰기 데이터 접근(읽기/쓰기)</text>
  <text x="52" y="179" fill="rgb(138,133,128)" font-size="9">global·static·HW 레지스터 등 shared state</text>

  <text x="38" y="198" fill="#f47f72" font-size="10">→ 배타적(serialized) · 때로 atomic 실행 필요</text>

  <!-- 실행 요구 -->
  <rect x="350" y="74" width="312" height="130" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="368" y="96" fill="#e8e4df" font-size="13" font-weight="bold">임계 구역의 실행 요구</text>

  <rect x="368" y="108" width="276" height="40" fill="rgba(102,187,106,0.13)" stroke="#66bb6a"/>
  <text x="382" y="128" fill="#66bb6a" font-size="11">(항상) 배타적 — alone, serialized</text>
  <text x="382" y="142" fill="rgb(138,133,128)" font-size="9">한 번에 정확히 한 스레드만</text>

  <rect x="368" y="152" width="276" height="40" fill="rgba(244,67,54,0.10)" stroke="#f44336"/>
  <text x="382" y="172" fill="#f47f72" font-size="11">(atomic 컨텍스트면) atomic</text>
  <text x="382" y="186" fill="rgb(138,133,128)" font-size="9">indivisible · 중단 없이 완료 (인터럽트 등)</text>

  <!-- atomicity + i++ -->
  <rect x="20" y="216" width="642" height="78" fill="rgba(244,67,54,0.10)" stroke="#f44336" stroke-width="2"/>
  <text x="38" y="238" fill="#f44336" font-size="13" font-weight="bold">⚠ atomicity — i++ 도 위험</text>
  <text x="38" y="258" fill="#e8e4df" font-size="11">atomic 보장은 단일 머신 명령, 또는 워드 크기 정렬 데이터의 읽기/쓰기뿐</text>
  <text x="38" y="276" fill="rgb(138,133,128)" font-size="11">i++ = load·증가·store 3 명령일 수 있음 → 가정 금지, 기본은 unsafe 로 보고 보호</text>

  <!-- 락 동작 -->
  <rect x="20" y="306" width="320" height="120" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="2"/>
  <text x="38" y="328" fill="#66bb6a" font-size="13" font-weight="bold">락 — 직렬화로 보호</text>
  <text x="38" y="348" fill="#e8e4df" font-size="11">LOCK 시도하는 n 스레드 중 정확히 1 winner</text>
  <text x="38" y="366" fill="rgb(138,133,128)" font-size="10">winner 가 임계 구역 실행 · 나머지 n-1 은 wait</text>
  <text x="38" y="384" fill="rgb(138,133,128)" font-size="10">winner 가 UNLOCK 하면 다음 winner 경쟁</text>
  <text x="38" y="404" fill="#f47f72" font-size="10">병렬성 상실(bottleneck) → 락 최소화 설계</text>
  <text x="38" y="420" fill="rgb(138,133,128)" font-size="9">읽기도 보호 필요(torn/dirty read) · 같은 락으로 보호</text>

  <!-- 동시성 원인 -->
  <rect x="350" y="306" width="312" height="120" fill="rgba(173,216,230,0.10)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="368" y="328" fill="#9cc3df" font-size="13" font-weight="bold">동시성 우려 4 원인</text>
  <rect x="368" y="338" width="134" height="26" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/><text x="435" y="355" fill="#e8e4df" font-size="10" text-anchor="middle">SMP 멀티코어</text>
  <rect x="510" y="338" width="134" height="26" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/><text x="577" y="355" fill="#e8e4df" font-size="10" text-anchor="middle">선점 커널</text>
  <rect x="368" y="368" width="134" height="26" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/><text x="435" y="385" fill="#e8e4df" font-size="10" text-anchor="middle">blocking I/O</text>
  <rect x="510" y="368" width="134" height="26" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/><text x="577" y="385" fill="#e8e4df" font-size="10" text-anchor="middle">HW 인터럽트</text>
  <text x="368" y="410" fill="rgb(138,133,128)" font-size="9">UP 시스템도 선점·인터럽트로 data race 발생 가능</text>
  <text x="368" y="422" fill="rgb(138,133,128)" font-size="9">data race(LKMM 정의) 검출: KCSAN</text>

  <!-- deadlock 가이드라인 -->
  <rect x="20" y="438" width="642" height="134" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="460" fill="#e8e4df" font-size="13" font-weight="bold">deadlock 가이드라인</text>
  <text x="38" y="480" fill="#e8e4df" font-size="11">self-deadlock: 이미 쥔 락 재획득 시도 (recursive locking 금지)</text>
  <text x="38" y="498" fill="#e8e4df" font-size="11">AB-BA: A→B 와 B→A 순으로 락 획득 → 서로 영원히 대기 (circular)</text>
  <text x="38" y="516" fill="#66bb6a" font-size="11">핵심 규칙: lock-ordering 문서화·준수 · 쥔 락만 해제 · starvation 방지</text>
  <text x="38" y="534" fill="rgb(138,133,128)" font-size="10">granularity 적절히(너무 길면 latency, 너무 많으면 복잡) · lock data, not code</text>
  <text x="38" y="552" fill="rgb(138,133,128)" font-size="10">해제 순서는 무관 · livelock(NAPI 등)도 deadlock 만큼 치명 · lockdep 이 거의 다 잡음</text>
  <text x="38" y="566" fill="rgb(138,133,128)" font-size="9">긴 atomic 임계 구역 검출: criticalstat (eBPF)</text>
</svg>
