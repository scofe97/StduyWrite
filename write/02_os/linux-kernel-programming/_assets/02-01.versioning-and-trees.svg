<svg viewBox="0 0 640 430" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>커널 버전 명명법과 소스 트리 종류</title>
  <desc>버전 6.1.25-z를 major.minor.patchlevel-EXTRAVERSION으로 분해. 소스 트리는 -next에서 LTS/SLTS로 갈수록 안정적이고 수명이 길다. 6.1 LTS는 2026년 12월, SLTS는 2033년 8월까지.</desc>
  <rect x="0" y="0" width="640" height="430" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">커널 버전 체계와 소스 트리 종류</text>

  <!-- 버전 분해 -->
  <text x="20" y="62" fill="rgb(138,133,128)" font-size="12">버전 명명법 — major#.minor#[.patchlevel][-EXTRAVERSION]</text>

  <rect x="20" y="74" width="120" height="56" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="80" y="100" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="20" text-anchor="middle">6</text>
  <text x="80" y="122" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">major (w)</text>

  <rect x="148" y="74" width="120" height="56" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="208" y="100" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="20" text-anchor="middle">1</text>
  <text x="208" y="122" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">minor (x)</text>

  <rect x="276" y="74" width="120" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="336" y="100" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="20" text-anchor="middle">25</text>
  <text x="336" y="122" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">patchlevel (y)</text>

  <rect x="404" y="74" width="216" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="512" y="100" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="15" text-anchor="middle">-40-generic</text>
  <text x="512" y="122" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">EXTRAVERSION (z) · 배포판용</text>

  <!-- 소스 트리 안정성 사다리 -->
  <text x="20" y="166" fill="rgb(138,133,128)" font-size="12">소스 트리 — 위로 갈수록 안정적이고 수명이 길다</text>

  <!-- -next (불안정) -->
  <rect x="20" y="178" width="600" height="38" fill="rgba(244,67,54,0.12)" stroke="#f44336"/>
  <text x="38" y="202" fill="#e8e4df" font-size="12">-next 트리 — 최첨단. 새 패치 테스트·리뷰</text>
  <text x="602" y="202" fill="rgb(138,133,128)" font-size="11" text-anchor="end">업스트림 기여자</text>

  <rect x="20" y="220" width="600" height="38" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="244" fill="#e8e4df" font-size="12">-rc (mainline, prepatch) — 릴리스 후보</text>
  <text x="602" y="244" fill="rgb(138,133,128)" font-size="11" text-anchor="end">테스트</text>

  <rect x="20" y="262" width="600" height="38" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="286" fill="#e8e4df" font-size="12">stable (vanilla) — 배포판·프로젝트 베이스</text>
  <text x="602" y="286" fill="rgb(138,133,128)" font-size="11" text-anchor="end">일반 사용</text>

  <!-- LTS (강조) -->
  <rect x="20" y="304" width="600" height="44" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="38" y="326" fill="rgb(212,168,83)" font-size="13" font-weight="bold">LTS — 6.1 (이 책의 기준)</text>
  <text x="38" y="343" fill="#e8e4df" font-size="11">23번째 LTS · 버그·보안 백포트</text>
  <text x="602" y="332" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="13" text-anchor="end">~ 2026.12</text>

  <!-- SLTS (가장 김) -->
  <rect x="20" y="352" width="600" height="44" fill="rgba(102,187,106,0.13)" stroke="#66bb6a" stroke-width="2"/>
  <text x="38" y="374" fill="#66bb6a" font-size="13" font-weight="bold">SLTS — CIP 6.1 (Super LTS)</text>
  <text x="38" y="391" fill="#e8e4df" font-size="11">산업·민간 인프라용 · 10년 유지</text>
  <text x="602" y="380" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="13" text-anchor="end">~ 2033.08</text>

  <text x="20" y="420" fill="rgb(138,133,128)" font-size="11">메인테이너 권고: "최신 stable 업데이트를 쓰라" — 가장 안정적이고 안전한 커널</text>
</svg>
