<svg viewBox="0 0 680 580" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>CPU 스케줄링 기초 — KSE·상태 머신·POSIX 정책·우선순위</title>
  <desc>리눅스의 KSE(Kernel Schedulable Entity)는 프로세스가 아니라 스레드다. 스케줄링은 스레드 단위로 수행되며, runnable 스레드만 runqueue에 올라 CPU를 경쟁한다. 프로세스 상태 머신: R(runnable), S(interruptible sleep), D(uninterruptible sleep), T(stopped), Z(zombie), X(dead). POSIX 정책 5종은 SCHED_OTHER(기본·CFS·nice -20~+19), SCHED_FIFO/SCHED_RR(soft real-time 1~99), SCHED_BATCH, SCHED_IDLE. 우선순위 스케일은 비실시간(nice 0, RT prio 0)과 실시간(RT prio 1~99)으로 나뉜다. 흐름은 perf sched·gnome-system-monitor·ftrace로 시각화한다.</desc>
  <rect x="0" y="0" width="680" height="580" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">CPU 스케줄링 기초</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">리눅스의 스케줄 단위(KSE)는 프로세스가 아니라 스레드입니다</text>

  <!-- KSE -->
  <rect x="20" y="74" width="320" height="96" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="38" y="96" fill="rgb(212,168,83)" font-size="13" font-weight="bold">KSE — 스케줄 단위는 스레드</text>
  <text x="38" y="116" fill="#e8e4df" font-size="11">P1(1스레드)+P2(2)+P3(5)+kthread(3) = 11 스레드</text>
  <text x="38" y="134" fill="rgb(138,133,128)" font-size="10">→ 11 스레드가 CPU 경쟁 (3 프로세스 아님)</text>
  <text x="38" y="152" fill="rgb(138,133,128)" font-size="10">runnable 스레드만 runqueue 에 · CPU 코어당 1 runqueue</text>

  <!-- 상태 머신 -->
  <rect x="350" y="74" width="312" height="96" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="368" y="96" fill="#e8e4df" font-size="13" font-weight="bold">프로세스 상태 머신</text>
  <text x="368" y="116" fill="#66bb6a" font-size="11">R</text>
  <text x="384" y="116" fill="rgb(138,133,128)" font-size="10">runnable (ready/running, TASK_RUNNING)</text>
  <text x="368" y="132" fill="rgb(212,168,83)" font-size="11">S</text>
  <text x="384" y="132" fill="rgb(138,133,128)" font-size="10">interruptible sleep · D uninterruptible</text>
  <text x="368" y="148" fill="#9cc3df" font-size="11">T</text>
  <text x="384" y="148" fill="rgb(138,133,128)" font-size="10">stopped · Z zombie(defunct) · X dead</text>
  <text x="368" y="164" fill="rgb(138,133,128)" font-size="9">sleep 스레드는 wait queue 에, wakeup 시 runqueue 로</text>

  <!-- POSIX 정책 5종 -->
  <rect x="20" y="186" width="642" height="200" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="2"/>
  <text x="38" y="208" fill="#66bb6a" font-size="13" font-weight="bold">POSIX 스케줄링 정책 5종 — 모든 스레드는 정확히 하나에 속함</text>

  <rect x="38" y="220" width="606" height="32" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="52" y="240" fill="rgb(212,168,83)" font-size="11">SCHED_OTHER (=NORMAL) — 기본 · CFS · 비실시간 · 공정성·throughput · nice -20~+19</text>

  <rect x="38" y="258" width="300" height="32" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="52" y="278" fill="#e8e4df" font-size="11">SCHED_FIFO — soft RT · 무한 timeslice</text>
  <rect x="346" y="258" width="298" height="32" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="360" y="278" fill="#e8e4df" font-size="11">SCHED_RR — soft RT · 유한 timeslice · round robin</text>

  <rect x="38" y="296" width="300" height="32" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/>
  <text x="52" y="316" fill="#e8e4df" font-size="11">SCHED_BATCH — 비대화형 배치 · 적은 선점</text>
  <rect x="346" y="296" width="298" height="32" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/>
  <text x="360" y="316" fill="#e8e4df" font-size="11">SCHED_IDLE — 최저 · swapper · 아무도 안 쓸 때만</text>

  <text x="38" y="350" fill="#e8e4df" font-size="11">RT 양보 조건(FIFO/RR): I/O 블록 · stop/die · 상위 RT 선점 · (RR만) timeslice 만료</text>
  <text x="38" y="370" fill="rgb(138,133,128)" font-size="10">리눅스는 GPOS — soft RT 만. RTL 패치로 hard RT(RTOS) 전환 가능. HW 인터럽트는 RT 스레드도 선점</text>

  <!-- 우선순위 스케일 + 시각화 -->
  <rect x="20" y="402" width="320" height="168" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="424" fill="#e8e4df" font-size="13" font-weight="bold">우선순위 스케일</text>

  <rect x="38" y="436" width="284" height="40" fill="rgba(102,187,106,0.13)" stroke="#66bb6a"/>
  <text x="52" y="454" fill="#66bb6a" font-size="11">비실시간 (SCHED_OTHER)</text>
  <text x="52" y="470" fill="rgb(138,133,128)" font-size="10">RT prio 0 · nice -20(최고)~0~+19(최저)</text>

  <rect x="38" y="482" width="284" height="40" fill="rgba(244,67,54,0.10)" stroke="#f44336"/>
  <text x="52" y="500" fill="#f47f72" font-size="11">실시간 (FIFO/RR)</text>
  <text x="52" y="516" fill="rgb(138,133,128)" font-size="10">RT prio 1(최저)~99(최고)</text>

  <text x="38" y="544" fill="rgb(138,133,128)" font-size="10">정책·우선순위는 task_struct 멤버 · per-thread</text>
  <text x="38" y="560" fill="rgb(138,133,128)" font-size="10">prio·static_prio·normal_prio·rt_priority</text>

  <!-- 시각화 -->
  <rect x="350" y="402" width="312" height="168" fill="rgba(173,216,230,0.10)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="368" y="424" fill="#9cc3df" font-size="13" font-weight="bold">흐름 시각화 도구</text>

  <text x="368" y="446" fill="#e8e4df" font-size="11">perf sched record → map / timechart</text>
  <text x="368" y="462" fill="rgb(138,133,128)" font-size="10">코어별 어느 스레드가 도는지 텍스트·SVG 로</text>

  <text x="368" y="484" fill="#e8e4df" font-size="11">gnome-system-monitor — GUI 코어별 사용률</text>
  <text x="368" y="500" fill="rgb(138,133,128)" font-size="10">taskset -c N 으로 코어 고정 후 관찰</text>

  <text x="368" y="522" fill="#e8e4df" font-size="11">ftrace · trace-cmd · LTTng</text>
  <text x="368" y="538" fill="rgb(138,133,128)" font-size="10">KernelShark · TraceCompass GUI 로 시각화</text>
  <text x="368" y="558" fill="rgb(138,133,128)" font-size="10">perf 는 커널과 강결합 — 커스텀 커널은 직접 빌드</text>
</svg>
