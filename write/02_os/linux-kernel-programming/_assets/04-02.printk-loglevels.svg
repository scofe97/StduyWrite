<svg viewBox="0 0 680 540" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>printk 출력 경로와 8개 로그 레벨</title>
  <desc>printk는 항상 RAM의 커널 로그 링 버퍼에 쓰고, 보통 비휘발 로그 파일에도 쓰며, 콘솔 로그 레벨보다 낮은(긴급한) 메시지는 콘솔 디바이스에도 보낸다. 로그 레벨은 0(EMERG)부터 7(DEBUG)까지 8단계. /proc/sys/kernel/printk의 첫 값(콘솔 로그 레벨, 기본 4)보다 작은 레벨이 콘솔로 간다.</desc>
  <rect x="0" y="0" width="680" height="540" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">printk 출력 경로와 8개 로그 레벨</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">로그 레벨은 우선순위가 아니라 필터 기준입니다 — 숫자가 작을수록 긴급</text>

  <!-- printk 호출 -->
  <rect x="20" y="74" width="180" height="44" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="110" y="93" fill="rgb(212,168,83)" font-family="'JetBrains Mono',monospace" font-size="13" text-anchor="middle">printk()</text>
  <text x="110" y="110" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">pr_*() / dev_*()</text>

  <defs>
    <marker id="arP" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <!-- 3 출력 경로 -->
  <line x1="200" y1="96" x2="244" y2="96" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#arP)"/>

  <rect x="248" y="74" width="200" height="44" fill="rgba(102,187,106,0.13)" stroke="#66bb6a"/>
  <text x="348" y="93" fill="#66bb6a" font-size="11" text-anchor="middle">① 커널 로그 링 버퍼 (항상)</text>
  <text x="348" y="110" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">RAM · 휘발 · dmesg 로 조회</text>

  <rect x="248" y="124" width="200" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="348" y="142" fill="#e8e4df" font-size="11" text-anchor="middle">② 비휘발 로그 파일 (보통)</text>
  <text x="348" y="158" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">journalctl · /var/log</text>

  <rect x="248" y="170" width="200" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="348" y="188" fill="#e8e4df" font-size="11" text-anchor="middle">③ 콘솔 디바이스 (조건부)</text>
  <text x="348" y="204" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">콘솔 로그 레벨보다 낮으면</text>

  <!-- 콘솔 필터 설명 -->
  <rect x="468" y="74" width="194" height="136" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="484" y="94" fill="#e8e4df" font-size="11" font-weight="bold">콘솔 필터</text>
  <text x="484" y="114" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="10">/proc/sys/kernel/printk</text>
  <text x="484" y="132" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="13">4  4  1  7</text>
  <text x="484" y="150" fill="rgb(138,133,128)" font-size="10">첫 값 = 콘솔 로그 레벨</text>
  <text x="484" y="166" fill="rgb(138,133,128)" font-size="10">이보다 작은 레벨만 콘솔로</text>
  <text x="484" y="186" fill="rgb(212,168,83)" font-size="10">8 로 올리면 모두 콘솔에</text>
  <text x="484" y="202" fill="rgb(138,133,128)" font-size="10">(printf 처럼 동작)</text>

  <!-- 8 로그 레벨 -->
  <text x="20" y="244" fill="rgb(138,133,128)" font-size="12">8개 로그 레벨 — pr_*() 매크로로 간결하게</text>

  <!-- 레벨 0-7, 콘솔 레벨 4 기준으로 0~3은 콘솔로 -->
  <rect x="20" y="256" width="642" height="34" fill="rgba(244,67,54,0.12)" stroke="#f44336"/>
  <text x="38" y="278" fill="#f44336" font-family="'JetBrains Mono',monospace" font-size="12">[0] KERN_EMERG</text>
  <text x="220" y="278" fill="#e8e4df" font-size="11">pr_emerg() · system is unusable · 항상 콘솔</text>

  <rect x="20" y="292" width="642" height="30" fill="rgba(244,67,54,0.08)" stroke="rgb(42,37,32)"/>
  <text x="38" y="312" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="12">[1] KERN_ALERT</text>
  <text x="220" y="312" fill="rgb(138,133,128)" font-size="11">pr_alert() · action must be taken immediately</text>

  <rect x="20" y="324" width="642" height="30" fill="rgba(244,67,54,0.08)" stroke="rgb(42,37,32)"/>
  <text x="38" y="344" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="12">[2] KERN_CRIT</text>
  <text x="220" y="344" fill="rgb(138,133,128)" font-size="11">pr_crit() · critical conditions</text>

  <rect x="20" y="356" width="642" height="30" fill="rgba(244,67,54,0.08)" stroke="rgb(42,37,32)"/>
  <text x="38" y="376" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="12">[3] KERN_ERR</text>
  <text x="220" y="376" fill="rgb(138,133,128)" font-size="11">pr_err() · error conditions</text>

  <!-- 콘솔 경계선 (레벨 4 기준) -->
  <line x1="20" y1="390" x2="662" y2="390" stroke="rgb(212,168,83)" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="662" y="403" fill="rgb(212,168,83)" font-size="10" text-anchor="end">↑ 콘솔 로그 레벨 4 — 위(0~3)만 콘솔로</text>

  <rect x="20" y="410" width="642" height="30" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="430" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="12">[4] KERN_WARNING</text>
  <text x="220" y="430" fill="rgb(138,133,128)" font-size="11">pr_warn() · 로그 레벨 미지정 시 기본값</text>

  <rect x="20" y="442" width="642" height="30" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="462" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="12">[5] KERN_NOTICE</text>
  <text x="220" y="462" fill="rgb(138,133,128)" font-size="11">pr_notice() · normal but significant</text>

  <rect x="20" y="474" width="642" height="30" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="494" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="12">[6] KERN_INFO</text>
  <text x="220" y="494" fill="rgb(138,133,128)" font-size="11">pr_info() · informational</text>

  <rect x="20" y="506" width="642" height="30" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="526" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="12">[7] KERN_DEBUG</text>
  <text x="220" y="526" fill="rgb(138,133,128)" font-size="11">pr_debug() · DEBUG 정의 또는 dynamic debug 필요</text>
</svg>
