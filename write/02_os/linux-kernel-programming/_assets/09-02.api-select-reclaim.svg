<svg viewBox="0 0 680 580" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>메모리 API 선택과 memory reclaim — 계층·watermark·kswapd·MGLRU·DAMON</title>
  <desc>커널 메모리 API는 amount와 type으로 고른다. 1차 선택은 slab(kmalloc/kzalloc, 1페이지 미만), 드라이버 probe면 devm_, 큰 가상 버퍼면 vmalloc, 불확실하면 kvmalloc, 자주 쓰는 객체면 custom slab. memory reclaim은 kswapd 커널 스레드가 node:zone별 watermark(min/low/high)를 보고 수행한다. free가 high~low면 gentle, low~min이면 aggressive, min 미만이면 신규 요청 거부. MGLRU는 세대별 LRU 리스트로 finer granularity 회수, DAMON은 데이터 접근 패턴을 sampling으로 모니터링한다.</desc>
  <rect x="0" y="0" width="680" height="580" fill="#0d0d0d"/>

  <text x="20" y="34" fill="#e8e4df" font-size="17" font-weight="bold">API 선택과 memory reclaim</text>
  <text x="20" y="56" fill="rgb(138,133,128)" font-size="12">amount·type 으로 API 를 고르고, kswapd 가 watermark 로 메모리를 회수합니다</text>

  <!-- API 선택 -->
  <rect x="20" y="74" width="642" height="186" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="38" y="96" fill="rgb(212,168,83)" font-size="13" font-weight="bold">어느 API 를 언제 — type 별 선택</text>

  <rect x="38" y="108" width="300" height="32" fill="rgba(102,187,106,0.13)" stroke="#66bb6a"/>
  <text x="52" y="128" fill="#66bb6a" font-size="11">작은(&lt;1페이지) 물리 연속 → slab</text>
  <rect x="346" y="108" width="298" height="32" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="360" y="128" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10">kmalloc · kzalloc · kcalloc</text>

  <rect x="38" y="146" width="300" height="32" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="52" y="166" fill="#e8e4df" font-size="11">드라이버 probe/init (자동 해제)</text>
  <rect x="346" y="146" width="298" height="32" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/>
  <text x="360" y="166" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10">devm_kmalloc · devm_kzalloc</text>

  <rect x="38" y="184" width="300" height="32" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="52" y="204" fill="#e8e4df" font-size="11">큰 가상 버퍼(4MB 초과)</text>
  <rect x="346" y="184" width="298" height="32" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/>
  <text x="360" y="204" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10">vmalloc · vzalloc</text>

  <rect x="38" y="222" width="300" height="30" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="52" y="241" fill="#e8e4df" font-size="11">크기 불확실 / 자주 쓰는 객체</text>
  <rect x="346" y="222" width="298" height="30" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/>
  <text x="360" y="241" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="10">kvmalloc / kmem_cache_*</text>

  <!-- reclaim watermark -->
  <rect x="20" y="272" width="320" height="186" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="38" y="294" fill="#e8e4df" font-size="13" font-weight="bold">reclaim — kswapd 와 watermark</text>
  <text x="38" y="312" fill="rgb(138,133,128)" font-size="10">node:zone 별 free 페이지를 watermark 와 비교</text>

  <rect x="38" y="322" width="284" height="26" fill="rgba(102,187,106,0.13)" stroke="#66bb6a"/>
  <text x="52" y="339" fill="#66bb6a" font-size="10">free &gt; high — 여유 (정상)</text>
  <rect x="38" y="350" width="284" height="26" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="52" y="367" fill="rgb(212,168,83)" font-size="10">high..low — gentle 회수·swap</text>
  <rect x="38" y="378" width="284" height="26" fill="rgba(212,168,83,0.25)" stroke="rgb(212,168,83)"/>
  <text x="52" y="395" fill="rgb(212,168,83)" font-size="10">low..min — aggressive 회수·swap</text>
  <rect x="38" y="406" width="284" height="26" fill="rgba(244,67,54,0.15)" stroke="#f44336"/>
  <text x="52" y="423" fill="#f47f72" font-size="10">free &lt; min — 신규 요청 거부 → OOM 임박</text>

  <text x="38" y="448" fill="rgb(138,133,128)" font-size="10">/proc/zoneinfo · 캐시가 첫 회수 대상</text>

  <!-- MGLRU + DAMON -->
  <rect x="350" y="272" width="312" height="186" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="2"/>
  <text x="368" y="294" fill="#66bb6a" font-size="13" font-weight="bold">신규 회수 기술</text>

  <rect x="368" y="306" width="276" height="68" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/>
  <text x="382" y="326" fill="#e8e4df" font-size="11">MGLRU (6.1) — 다세대 LRU</text>
  <text x="382" y="343" fill="rgb(138,133,128)" font-size="10">active/inactive 2개 → 세대별 N개 리스트</text>
  <text x="382" y="357" fill="rgb(138,133,128)" font-size="10">page age 로 정렬 · 오래된 세대부터 회수</text>
  <text x="382" y="370" fill="rgb(138,133,128)" font-size="9">rmap 대신 PTE 스캔 · kswapd CPU 51% 절감</text>

  <rect x="368" y="380" width="276" height="68" fill="rgb(13,13,13)" stroke="rgb(42,37,32)"/>
  <text x="382" y="400" fill="#e8e4df" font-size="11">DAMON (5.15) — 데이터 접근 모니터</text>
  <text x="382" y="417" fill="rgb(138,133,128)" font-size="10">프로세스 접근 패턴을 sampling 으로 추적</text>
  <text x="382" y="431" fill="rgb(138,133,128)" font-size="10">hotspot 영역 세분화 · madvise 로 최적화</text>
  <text x="382" y="444" fill="rgb(138,133,128)" font-size="9">damo 프론트엔드 · text/heap/stack 만 모니터</text>

  <!-- memory pyramid -->
  <rect x="20" y="470" width="642" height="100" fill="rgba(173,216,230,0.10)" stroke="#7fa8c9" stroke-width="2"/>
  <text x="38" y="492" fill="#9cc3df" font-size="13" font-weight="bold">메모리 피라미드 — 작고 빠름 → 크고 느림</text>
  <rect x="38" y="504" width="120" height="26" fill="rgba(102,187,106,0.13)" stroke="#66bb6a"/>
  <text x="98" y="521" fill="#66bb6a" font-size="10" text-anchor="middle">CPU 캐시 L1/L2/L3</text>
  <rect x="166" y="504" width="120" height="26" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="226" y="521" fill="rgb(212,168,83)" font-size="10" text-anchor="middle">RAM</text>
  <rect x="294" y="504" width="160" height="26" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="374" y="521" fill="#e8e4df" font-size="10" text-anchor="middle">swap (디스크/SSD)</text>
  <text x="38" y="552" fill="rgb(138,133,128)" font-size="10">RAM 부족 시 user 페이지를 swap 으로 (커널 페이지는 non-swappable)</text>
  <text x="38" y="566" fill="rgb(138,133,128)" font-size="10">전부 소진되면 → OOM killer (다음 노트 09-03)</text>
</svg>
