<svg viewBox="0 0 860 440" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>메모리 누수 vs 메모리 증가</title>
  <desc>끝없이 메모리가 느는 문제는 두 원인으로 나뉜다. 왼쪽 메모리 누수는 SW 버그로, 메모리가 더 이상 미사용인데 절대 해제되지 않는다. 코드 수정이나 패치, 업그레이드로 고친다. 오른쪽 메모리 증가는 SW가 정상적으로 메모리를 소비하지만 시스템이 바라는 것보다 훨씬 높은 속도로 소비하는 것이다. 설정 변경이나 개발자가 소비 방식을 바꿔 고친다. 메모리 증가는 누수로 오인되곤 하는데, 첫 질문은 원래 그러는 건가다. 메모리 사용과 설정, 할당자 동작을 확인하면 캐시 warmup일 수 있다. 아래: BCC memleak 도구는 할당을 추적해 간격 동안 미해제된 것을 call path와 함께 보여 주지만, 누수인지 정상 증가인지는 사용자가 코드 경로를 분석해 판단한다.</desc>

  <rect x="0" y="0" width="860" height="440" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">메모리 누수 vs 메모리 증가</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">끝없는 메모리 증가의 두 원인 — 첫 질문은 "원래 그러는 건가?"</text>

  <!-- 메모리 누수 -->
  <rect x="32" y="84" width="388" height="160" fill="#f44336" fill-opacity="0.10" stroke="#f44336" rx="8"/>
  <text x="226" y="110" fill="#f44336" font-size="15" text-anchor="middle">메모리 누수 (memory leak)</text>
  <text x="226" y="134" fill="#e8e4df" font-size="12" text-anchor="middle">SW 버그</text>
  <text x="226" y="160" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">메모리가 미사용인데 절대 미해제</text>
  <text x="226" y="186" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">→ 코드 수정·패치·업그레이드</text>
  <!-- 미니 그래프: 계단식 증가 -->
  <line x1="64" y1="226" x2="384" y2="226" stroke="rgb(138,133,128)" stroke-width="1"/>
  <polyline points="64,222 130,222 130,212 200,212 200,200 270,200 270,186 340,186 340,172 384,172" fill="none" stroke="#f44336" stroke-width="2"/>

  <!-- 메모리 증가 -->
  <rect x="440" y="84" width="388" height="160" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="8"/>
  <text x="634" y="110" fill="rgb(212,168,83)" font-size="15" text-anchor="middle">메모리 증가 (memory growth)</text>
  <text x="634" y="134" fill="#e8e4df" font-size="12" text-anchor="middle">정상 소비, 과한 속도</text>
  <text x="634" y="160" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">SW가 정상이나 바라는 것보다 빠르게</text>
  <text x="634" y="186" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">→ 설정 변경·소비 방식 변경</text>
  <!-- 미니 그래프: 캐시 warmup 후 평탄 -->
  <line x1="472" y1="226" x2="792" y2="226" stroke="rgb(138,133,128)" stroke-width="1"/>
  <path d="M 472 224 Q 560 180 650 174 L 792 173" fill="none" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="730" y="166" fill="rgb(138,133,128)" font-size="9">캐시 warmup 후 평탄</text>

  <!-- 판별 -->
  <line x1="32" y1="262" x2="828" y2="262" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="32" y="288" fill="rgb(212,168,83)" font-size="14">판별 — "원래 그러는 건가?"</text>

  <rect x="32" y="302" width="388" height="76" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="226" y="326" fill="#e8e4df" font-size="12" text-anchor="middle">확인할 것</text>
  <text x="226" y="348" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">메모리 사용·설정·할당자 동작</text>
  <text x="226" y="366" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">→ 캐시 warmup일 수 있음</text>

  <rect x="440" y="302" width="388" height="76" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="634" y="326" fill="#e8e4df" font-size="12" text-anchor="middle">BCC memleak</text>
  <text x="634" y="348" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">미해제 할당을 call path와 함께</text>
  <text x="634" y="366" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">누수/증가 판단은 사용자 몫</text>

  <rect x="32" y="390" width="796" height="36" fill="#66bb6a" fill-opacity="0.10" stroke="#66bb6a" rx="8"/>
  <text x="430" y="413" fill="#e8e4df" font-size="12" text-anchor="middle">성능 모니터링(프로세스별 시간 추적)으로 누수의 존재·속도를 식별</text>
</svg>
