<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>논리 I/O와 물리 I/O — 캐시·되쓰기가 만드는 차이</title>
  <desc>애플리케이션이 거는 논리 I/O가 페이지 캐시·미리읽기·되쓰기를 거쳐, 캐시 미스로 남은 부분만 물리 I/O로 디스크에 내려가는 흐름. 캐시 적중은 디스크를 건너뛴다.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="rgb(212,168,83)"/>
    </marker>
    <marker id="arrM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="rgb(138,133,128)"/>
    </marker>
  </defs>
  <rect width="760" height="440" fill="#0d0d0d"/>
  <text x="30" y="40" fill="#e8e4df" font-size="20" font-weight="700">논리 I/O vs 물리 I/O</text>
  <text x="30" y="64" fill="rgb(138,133,128)" font-size="13">애플리케이션이 거는 요청과 디스크에 실제로 닿는 요청은 캐시·되쓰기만큼 다르다</text>

  <!-- Application -->
  <rect x="40" y="95" width="180" height="60" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="130" y="122" fill="#e8e4df" font-size="15" font-weight="600" text-anchor="middle">애플리케이션</text>
  <text x="130" y="142" fill="rgb(138,133,128)" font-size="12" text-anchor="middle">read / write 요청</text>

  <!-- logical io label -->
  <text x="250" y="118" fill="rgb(212,168,83)" font-size="12" font-weight="600">논리 I/O</text>
  <line x1="220" y1="125" x2="320" y2="125" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- File system + cache -->
  <rect x="320" y="80" width="280" height="200" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.5"/>
  <text x="460" y="104" fill="#e8e4df" font-size="14" font-weight="600" text-anchor="middle">파일 시스템</text>

  <rect x="345" y="120" width="230" height="46" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="460" y="140" fill="#e8e4df" font-size="13" font-weight="600" text-anchor="middle">페이지 캐시</text>
  <text x="460" y="158" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">적중이면 여기서 반환 (디스크 X)</text>

  <rect x="345" y="178" width="110" height="42" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="400" y="199" fill="#e8e4df" font-size="12" text-anchor="middle">미리읽기</text>
  <text x="400" y="214" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">순차 예측</text>

  <rect x="465" y="178" width="110" height="42" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="520" y="199" fill="#e8e4df" font-size="12" text-anchor="middle">되쓰기</text>
  <text x="520" y="214" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">비동기 반영</text>

  <text x="460" y="252" fill="#66bb6a" font-size="12" text-anchor="middle" font-weight="600">캐시 적중 → 메모리 속도로 즉시 반환</text>

  <!-- physical io -->
  <text x="640" y="200" fill="rgb(138,133,128)" font-size="12" font-weight="600">물리 I/O</text>
  <text x="640" y="216" fill="rgb(138,133,128)" font-size="10">(미스만)</text>
  <line x1="600" y1="225" x2="690" y2="225" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#arrM)"/>

  <!-- Disk -->
  <rect x="660" y="245" width="80" height="60" rx="8" fill="none" stroke="rgb(138,133,128)" stroke-width="1.5"/>
  <text x="700" y="272" fill="#e8e4df" font-size="14" font-weight="600" text-anchor="middle">디스크</text>
  <text x="700" y="291" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">물리 I/O</text>
  <line x1="520" y1="220" x2="520" y2="290" stroke="rgb(138,133,128)" stroke-width="1.3" stroke-dasharray="4 3"/>
  <line x1="520" y1="290" x2="655" y2="290" stroke="rgb(138,133,128)" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrM)"/>

  <!-- bottom note -->
  <rect x="40" y="345" width="680" height="70" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="60" y="372" fill="#e8e4df" font-size="13" font-weight="600">애플리케이션이 보는 지연 = 파일 시스템 지연</text>
  <text x="60" y="394" fill="rgb(138,133,128)" font-size="12">디스크가 한가해도 동기 쓰기 한 건이 멈추고, 디스크가 100% 바빠도 비동기 I/O면 안 기다린다.</text>
  <text x="60" y="410" fill="rgb(138,133,128)" font-size="12">그래서 분석 1순위는 "디스크가 바쁜가"가 아니라 "파일 시스템에서 얼마나 기다렸나"이다.</text>
</svg>
