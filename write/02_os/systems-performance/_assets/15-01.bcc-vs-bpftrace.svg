<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 430" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>BCC vs bpftrace — 두 BPF 프론트엔드</title>
  <desc>extended BPF 위에 선 두 프론트엔드 비교. BCC는 복잡·강력한 도구(C 프로그래밍 같음, 228줄), bpftrace는 일회성·짧은 도구(셸 스크립팅 같음, 28줄)로, 커널에서 집계해 저오버헤드를 낸다.</desc>
  <rect width="780" height="430" fill="#0d0d0d"/>
  <text x="30" y="40" fill="#e8e4df" font-size="20" font-weight="700">BCC vs bpftrace</text>
  <text x="30" y="64" fill="rgb(138,133,128)" font-size="13">프로그래밍 가능한 트레이서 — 커널에서 집계해 저오버헤드</text>

  <!-- BCC -->
  <rect x="40" y="90" width="340" height="160" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.4"/>
  <text x="210" y="114" fill="rgb(212,168,83)" font-size="14" font-weight="700" text-anchor="middle">BCC (BPF Compiler Collection)</text>
  <text x="60" y="140" fill="#e8e4df" font-size="12">• 복잡한 도구 (옵션 -h·-P PID·인자)</text>
  <text x="60" y="162" fill="#e8e4df" font-size="12">• 유저: Python·C++ / 커널: C</text>
  <text x="60" y="184" fill="#e8e4df" font-size="12">• 라이브러리 지원 · 80개+ 도구</text>
  <text x="60" y="206" fill="rgb(138,133,128)" font-size="11">평균 228줄 · 개발 어려움</text>
  <text x="60" y="232" fill="#66bb6a" font-size="11">≈ C 프로그래밍 (미리 만든 도구 실행)</text>

  <!-- bpftrace -->
  <rect x="400" y="90" width="340" height="160" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.4"/>
  <text x="570" y="114" fill="rgb(212,168,83)" font-size="14" font-weight="700" text-anchor="middle">bpftrace</text>
  <text x="420" y="140" fill="#e8e4df" font-size="12">• 단순 (옵션 없거나 인자 0~1개)</text>
  <text x="420" y="162" fill="#e8e4df" font-size="12">• bpftrace 언어 (awk·C 영감)</text>
  <text x="420" y="184" fill="#e8e4df" font-size="12">• count·hist 등 요약 · 120개+ 도구</text>
  <text x="420" y="206" fill="rgb(138,133,128)" font-size="11">평균 28줄 · 개발 쉬움</text>
  <text x="420" y="232" fill="#66bb6a" font-size="11">≈ 셸 스크립팅 (일회성 커스텀)</text>

  <!-- BPF base -->
  <rect x="40" y="270" width="700" height="50" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.4"/>
  <text x="390" y="292" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">extended BPF (커널 실행 환경)</text>
  <text x="390" y="310" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">이벤트에서 프로그램 실행 — 필터·집계·지연 계산을 커널 컨텍스트에서</text>

  <!-- note -->
  <rect x="40" y="336" width="700" height="80" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="60" y="362" fill="#e8e4df" font-size="13" font-weight="600">선택 — 먼저 bpftrace로 빠르게, 필요하면 BCC로 포팅</text>
  <text x="60" y="384" fill="rgb(138,133,128)" font-size="12">BCC는 커스텀·복잡 도구(C 제어, 개발 10배), bpftrace는 일회성·짧은 도구. 둘 다 커널 집계로 저오버헤드.</text>
  <text x="60" y="404" fill="rgb(138,133,128)" font-size="12">다른 트레이서가 이벤트를 전부 덤프해 후처리하는 것과 달리, BPF는 커널에서 처리 — 운영 환경에 실용적.</text>
</svg>
