<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 440" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>I/O 시간 용어 — 커널 기준과 디스크 기준</title>
  <desc>한 I/O의 시간을 커널 블록 I/O 층(대기·서비스·요청)과 디스크 층(대기·서비스·요청)에서 각각 어떻게 나누는지. 같은 "I/O 지연"도 측정 위치에 따라 다른 구간을 가리킨다.</desc>
  <defs>
    <marker id="t1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect width="780" height="440" fill="#0d0d0d"/>
  <text x="30" y="40" fill="#e8e4df" font-size="20" font-weight="700">I/O 시간 용어 — 어디서 재느냐가 다 다르다</text>
  <text x="30" y="64" fill="rgb(138,133,128)" font-size="13">같은 I/O라도 커널 블록 층 기준과 디스크 기준이 가리키는 구간이 다르다</text>

  <!-- timeline base -->
  <line x1="60" y1="150" x2="740" y2="150" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <!-- event markers -->
  <line x1="90" y1="120" x2="90" y2="335" stroke="rgb(42,37,32)" stroke-width="1"/>
  <line x1="300" y1="120" x2="300" y2="335" stroke="rgb(42,37,32)" stroke-width="1"/>
  <line x1="470" y1="120" x2="470" y2="335" stroke="rgb(42,37,32)" stroke-width="1"/>
  <line x1="710" y1="120" x2="710" y2="335" stroke="rgb(42,37,32)" stroke-width="1"/>

  <text x="90" y="112" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">I/O 생성·</text>
  <text x="90" y="126" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">커널 큐 삽입</text>
  <text x="300" y="112" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">디스크 발행</text>
  <text x="470" y="112" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">온디스크 큐</text>
  <text x="470" y="126" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">처리 시작</text>
  <text x="710" y="112" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">완료 인터럽트</text>

  <!-- kernel bars -->
  <text x="60" y="180" fill="rgb(212,168,83)" font-size="12" font-weight="700">커널</text>
  <rect x="90" y="190" width="210" height="26" rx="4" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <text x="195" y="207" fill="#e8e4df" font-size="11" text-anchor="middle">블록 I/O 대기</text>
  <rect x="300" y="190" width="410" height="26" rx="4" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="505" y="207" fill="#e8e4df" font-size="11" text-anchor="middle">블록 I/O 서비스 ( = 디스크 요청 시간)</text>
  <line x1="92" y1="228" x2="708" y2="228" stroke="rgb(212,168,83)" stroke-width="1.2" marker-start="url(#t1)" marker-end="url(#t1)"/>
  <text x="400" y="244" fill="rgb(212,168,83)" font-size="11" text-anchor="middle">블록 I/O 요청 시간 (생성~완료 전체)</text>

  <!-- disk bars -->
  <text x="60" y="290" fill="rgb(212,168,83)" font-size="12" font-weight="700">디스크</text>
  <rect x="300" y="300" width="170" height="26" rx="4" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <text x="385" y="317" fill="#e8e4df" font-size="11" text-anchor="middle">디스크 대기(DWT)</text>
  <rect x="470" y="300" width="240" height="26" rx="4" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="590" y="317" fill="#e8e4df" font-size="11" text-anchor="middle">디스크 서비스(DST)</text>
  <line x1="302" y1="338" x2="708" y2="338" stroke="rgb(212,168,83)" stroke-width="1.2" marker-start="url(#t1)" marker-end="url(#t1)"/>
  <text x="505" y="354" fill="rgb(212,168,83)" font-size="11" text-anchor="middle">디스크 요청 시간 ( = 디스크 I/O 지연)</text>

  <!-- note -->
  <rect x="60" y="380" width="680" height="46" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="80" y="403" fill="#e8e4df" font-size="12" font-weight="600">캐시 적중이면 DST가 매우 짧아진다 — 한 디스크가 적중(&lt;100μs)·미스(ms+) 두 지연을 섞어 돌려준다.</text>
  <text x="80" y="420" fill="rgb(138,133,128)" font-size="11">서비스 시간은 커널 통계로 직접 안 보임 → 이벤트 트레이싱(biolatency)으로 발행·완료 타임스탬프를 잰다.</text>
</svg>
