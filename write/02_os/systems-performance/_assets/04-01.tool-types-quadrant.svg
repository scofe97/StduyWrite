<svg viewBox="0 0 860 480" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>관측 도구 유형 — 두 축과 네 사분면</title>
  <desc>관측 도구는 두 축으로 분류된다. 가로축은 범위 — 왼쪽이 시스템 전체(system-wide), 오른쪽이 프로세스별(per-process)이다. 세로축은 데이터 방식 — 위가 카운터 기반(고정 카운터, 사실상 무료), 아래가 이벤트 기반(프로파일링·트레이싱, 필요할 때만)이다. 시스템 전체 카운터는 vmstat·mpstat·iostat·nstat·sar, 프로세스별 카운터는 ps·top·pmap이다. 시스템 전체 이벤트는 프로파일링의 perf·profile, 트레이싱의 tcpdump·biosnoop·execsnoop·Ftrace·BCC·bpftrace다. 프로세스별 이벤트는 프로파일링의 gprof·cachegrind·JFR, 트레이싱의 strace·gdb다. 일부 도구는 여러 사분면에 걸치며, top은 시스템 전체 요약도 갖고 시스템 전체 이벤트 도구는 특정 프로세스 필터를 가질 때가 많다.</desc>

  <rect x="0" y="0" width="860" height="480" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">관측 도구 유형 — 두 축</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">범위(system-wide ↔ per-process) × 방식(카운터 ↕ 이벤트)</text>

  <!-- 축 라벨 -->
  <text x="270" y="92" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">system-wide</text>
  <text x="620" y="92" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">per-process</text>

  <!-- 카운터 행 -->
  <rect x="32" y="104" width="476" height="150" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="8"/>
  <rect x="516" y="104" width="312" height="150" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="8"/>
  <text x="48" y="128" fill="rgb(212,168,83)" font-size="12">카운터 (고정) — 사실상 무료</text>
  <text x="270" y="166" fill="#e8e4df" font-size="13" text-anchor="middle">vmstat · mpstat · iostat</text>
  <text x="270" y="190" fill="#e8e4df" font-size="13" text-anchor="middle">nstat · sar</text>
  <text x="270" y="226" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">기본 활성 · 읽기 비용만</text>
  <text x="672" y="178" fill="#e8e4df" font-size="13" text-anchor="middle">ps · top · pmap</text>
  <text x="672" y="214" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">/proc에서 읽음</text>

  <!-- 이벤트 행 -->
  <rect x="32" y="266" width="476" height="180" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <rect x="516" y="266" width="312" height="180" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="48" y="290" fill="rgb(212,168,83)" font-size="12">이벤트 — 필요할 때만</text>

  <text x="270" y="318" fill="#66bb6a" font-size="11" text-anchor="middle">— 프로파일링(표본) —</text>
  <text x="270" y="340" fill="#e8e4df" font-size="12" text-anchor="middle">perf · profile · VTune</text>
  <text x="270" y="376" fill="#f44336" font-size="11" text-anchor="middle">— 트레이싱(전부) —</text>
  <text x="270" y="398" fill="#e8e4df" font-size="12" text-anchor="middle">tcpdump · biosnoop · execsnoop</text>
  <text x="270" y="420" fill="#e8e4df" font-size="12" text-anchor="middle">Ftrace · BCC · bpftrace</text>

  <text x="672" y="318" fill="#66bb6a" font-size="11" text-anchor="middle">— 프로파일링 —</text>
  <text x="672" y="340" fill="#e8e4df" font-size="12" text-anchor="middle">gprof · cachegrind · JFR</text>
  <text x="672" y="376" fill="#f44336" font-size="11" text-anchor="middle">— 트레이싱 —</text>
  <text x="672" y="398" fill="#e8e4df" font-size="12" text-anchor="middle">strace · gdb</text>
  <text x="672" y="424" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">멈췄다 시작 — 오버헤드 큼</text>
</svg>
