<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>파일 시스템 분석 방법론 흐름 — 큰 그림에서 검증까지</title>
  <desc>모니터링·정적 튜닝으로 큰 그림을 잡고, 지연 분석·워크로드 특성화로 원인을 좁히고, 캐시 튜닝·워크로드 분리로 고치고, 마이크로벤치마킹으로 검증하는 네 단계 흐름.</desc>
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect width="760" height="420" fill="#0d0d0d"/>
  <text x="30" y="40" fill="#e8e4df" font-size="20" font-weight="700">파일 시스템 분석 방법론 흐름</text>
  <text x="30" y="64" fill="rgb(138,133,128)" font-size="13">방법론은 "순서"다 — 큰 그림 → 원인 좁히기 → 고치기 → 검증</text>

  <!-- stage 1 -->
  <rect x="30" y="95" width="160" height="120" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="110" y="118" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">① 큰 그림</text>
  <text x="110" y="148" fill="#e8e4df" font-size="12" text-anchor="middle">성능 모니터링</text>
  <text x="110" y="172" fill="#e8e4df" font-size="12" text-anchor="middle">정적 성능 튜닝</text>
  <text x="110" y="200" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">추세·설정 점검</text>

  <!-- stage 2 -->
  <rect x="220" y="95" width="160" height="120" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.4"/>
  <text x="300" y="118" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">② 원인 좁히기</text>
  <text x="300" y="148" fill="#e8e4df" font-size="12" text-anchor="middle">지연 분석 (1순위)</text>
  <text x="300" y="172" fill="#e8e4df" font-size="12" text-anchor="middle">워크로드 특성화</text>
  <text x="300" y="200" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">어디서·어떤 부하인가</text>

  <!-- stage 3 -->
  <rect x="410" y="95" width="160" height="120" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="490" y="118" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">③ 고치기</text>
  <text x="490" y="148" fill="#e8e4df" font-size="12" text-anchor="middle">캐시 튜닝</text>
  <text x="490" y="172" fill="#e8e4df" font-size="12" text-anchor="middle">워크로드 분리</text>
  <text x="490" y="200" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">적중률·경합 개선</text>

  <!-- stage 4 -->
  <rect x="600" y="95" width="130" height="120" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="665" y="118" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">④ 검증</text>
  <text x="665" y="150" fill="#e8e4df" font-size="12" text-anchor="middle">마이크로</text>
  <text x="665" y="168" fill="#e8e4df" font-size="12" text-anchor="middle">벤치마킹</text>
  <text x="665" y="200" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">한 요소만 분리</text>

  <!-- arrows -->
  <line x1="190" y1="155" x2="218" y2="155" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arr3)"/>
  <line x1="380" y1="155" x2="408" y2="155" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arr3)"/>
  <line x1="570" y1="155" x2="598" y2="155" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arr3)"/>

  <!-- caution box -->
  <rect x="30" y="255" width="700" height="60" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="50" y="282" fill="#e8e4df" font-size="13" font-weight="600">함정 — 디스크가 바빠 보인다고 바로 디스크 탓 금지</text>
  <text x="50" y="304" fill="rgb(138,133,128)" font-size="12">그 I/O가 미리읽기·되쓰기가 만든 무해한 것일 수 있다. 지연 분석으로 애플리케이션 체감부터 확인한다.</text>

  <!-- precondition -->
  <rect x="30" y="335" width="700" height="60" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="50" y="362" fill="#e8e4df" font-size="13" font-weight="600">③ 고치기의 전제 = ② 워크로드를 알아야 한다</text>
  <text x="50" y="384" fill="rgb(138,133,128)" font-size="12">캐시 튜닝은 워킹셋이 캐시에 맞을 때만, 워크로드 분리는 무엇이 경합하는지 알 때만 효과가 있다.</text>
</svg>
