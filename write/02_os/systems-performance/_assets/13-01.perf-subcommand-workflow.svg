<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>perf 서브커맨드 워크플로 — 카운트·기록·요약</title>
  <desc>perf_events 서브시스템 위에서 stat은 이벤트를 카운트하고, record는 perf.data에 기록한 뒤 report로 요약하거나 script로 샘플을 나열하며, trace는 파일 없이 라이브 출력하는 흐름.</desc>
  <defs>
    <marker id="p1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect width="780" height="420" fill="#0d0d0d"/>
  <text x="30" y="40" fill="#e8e4df" font-size="20" font-weight="700">perf 서브커맨드 워크플로</text>
  <text x="30" y="64" fill="rgb(138,133,128)" font-size="13">perf_events의 프론트엔드 — 프로파일링·트레이싱·스크립팅 멀티툴</text>

  <!-- perf_events base -->
  <rect x="40" y="350" width="700" height="50" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.4"/>
  <text x="390" y="372" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">perf_events 서브시스템</text>
  <text x="390" y="390" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">PMC · tracepoint · kprobe · uprobe · USDT (이벤트 소스, 13-02)</text>

  <!-- stat -->
  <rect x="40" y="100" width="160" height="70" rx="8" fill="none" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="120" y="124" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">perf stat</text>
  <text x="120" y="145" fill="#e8e4df" font-size="11" text-anchor="middle">이벤트 카운트</text>
  <text x="120" y="162" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">효율적(PMC 레지스터)</text>

  <!-- record -->
  <rect x="230" y="100" width="160" height="70" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.4"/>
  <text x="310" y="124" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">perf record</text>
  <text x="310" y="145" fill="#e8e4df" font-size="11" text-anchor="middle">perf.data에 기록</text>
  <text x="310" y="162" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">CPU 프로파일링·스택</text>

  <!-- trace -->
  <rect x="420" y="100" width="160" height="70" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="500" y="124" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">perf trace</text>
  <text x="500" y="145" fill="#e8e4df" font-size="11" text-anchor="middle">라이브(파일 없이)</text>
  <text x="500" y="162" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">strace 저오버헤드 대체</text>

  <!-- probe -->
  <rect x="610" y="100" width="130" height="70" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="675" y="124" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">perf probe</text>
  <text x="675" y="145" fill="#e8e4df" font-size="11" text-anchor="middle">동적 프로브 정의</text>
  <text x="675" y="162" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">kprobe·uprobe·USDT</text>

  <!-- perf.data + report/script -->
  <rect x="230" y="210" width="160" height="44" rx="6" fill="none" stroke="rgb(138,133,128)" stroke-width="1.3"/>
  <text x="310" y="237" fill="#e8e4df" font-size="13" text-anchor="middle">perf.data</text>

  <rect x="160" y="280" width="140" height="50" rx="6" fill="none" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="230" y="302" fill="rgb(212,168,83)" font-size="12" font-weight="600" text-anchor="middle">perf report</text>
  <text x="230" y="320" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">요약(TUI·STDIO)</text>

  <rect x="320" y="280" width="160" height="50" rx="6" fill="none" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="400" y="302" fill="rgb(212,168,83)" font-size="12" font-weight="600" text-anchor="middle">perf script</text>
  <text x="400" y="320" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">샘플 나열 → 플레임 그래프</text>

  <!-- arrows -->
  <line x1="120" y1="170" x2="120" y2="348" stroke="rgb(212,168,83)" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#p1)"/>
  <line x1="310" y1="170" x2="310" y2="208" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#p1)"/>
  <line x1="500" y1="170" x2="500" y2="348" stroke="rgb(212,168,83)" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#p1)"/>
  <line x1="675" y1="170" x2="675" y2="348" stroke="rgb(212,168,83)" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#p1)"/>
  <line x1="290" y1="254" x2="240" y2="278" stroke="rgb(212,168,83)" stroke-width="1.3" marker-end="url(#p1)"/>
  <line x1="340" y1="254" x2="390" y2="278" stroke="rgb(212,168,83)" stroke-width="1.3" marker-end="url(#p1)"/>

  <text x="600" y="240" fill="rgb(138,133,128)" font-size="11">stat·trace는 파일 없이</text>
  <text x="600" y="256" fill="rgb(138,133,128)" font-size="11">probe는 이벤트 초기화</text>
</svg>
