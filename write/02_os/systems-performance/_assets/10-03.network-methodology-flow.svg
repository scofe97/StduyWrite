<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 430" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>네트워크 분석 흐름 — 면죄에서 실험·튜닝까지</title>
  <desc>네트워크는 의심받는 자원이라 USE·정적 튜닝으로 내 호스트를 먼저 확인하고, 워크로드 특성화·지연/TCP 분석으로 원인을 좁히고, iperf 실험으로 네트워크를 면죄한 뒤 튜닝하는 흐름.</desc>
  <defs>
    <marker id="m1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect width="780" height="430" fill="#0d0d0d"/>
  <text x="30" y="40" fill="#e8e4df" font-size="20" font-weight="700">네트워크 분석 흐름</text>
  <text x="30" y="64" fill="rgb(138,133,128)" font-size="13">"모르면 의심받는" 네트워크 — 증거로 면죄하고 분석을 진전시킨다</text>

  <rect x="30" y="95" width="170" height="115" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.4"/>
  <text x="115" y="118" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">① 내 호스트 확인</text>
  <text x="115" y="146" fill="#e8e4df" font-size="12" text-anchor="middle">USE (방향별</text>
  <text x="115" y="162" fill="#e8e4df" font-size="12" text-anchor="middle">사용률·포화·에러)</text>
  <text x="115" y="184" fill="#e8e4df" font-size="12" text-anchor="middle">정적 튜닝</text>
  <text x="115" y="200" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">설정·MTU·라우팅</text>

  <rect x="220" y="95" width="170" height="115" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="305" y="118" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">② 원인 좁히기</text>
  <text x="305" y="146" fill="#e8e4df" font-size="12" text-anchor="middle">워크로드 특성화</text>
  <text x="305" y="168" fill="#e8e4df" font-size="12" text-anchor="middle">지연 분석</text>
  <text x="305" y="190" fill="#e8e4df" font-size="12" text-anchor="middle">TCP 분석</text>
  <text x="305" y="206" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">버퍼·백로그·재전송</text>

  <rect x="410" y="95" width="170" height="115" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="495" y="118" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">③ 실험·면죄</text>
  <text x="495" y="146" fill="#e8e4df" font-size="12" text-anchor="middle">iperf (처리량)</text>
  <text x="495" y="168" fill="#e8e4df" font-size="12" text-anchor="middle">ping·traceroute</text>
  <text x="495" y="190" fill="#e8e4df" font-size="12" text-anchor="middle">tc netem (주입)</text>
  <text x="495" y="206" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">앱 디버깅 前</text>

  <rect x="600" y="95" width="150" height="115" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="675" y="118" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">④ 튜닝</text>
  <text x="675" y="146" fill="#e8e4df" font-size="12" text-anchor="middle">sysctl (전역)</text>
  <text x="675" y="168" fill="#e8e4df" font-size="12" text-anchor="middle">setsockopt</text>
  <text x="675" y="184" fill="#e8e4df" font-size="12" text-anchor="middle">(소켓별)</text>
  <text x="675" y="204" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">버퍼·혼잡제어·qdisc</text>

  <line x1="200" y1="152" x2="218" y2="152" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#m1)"/>
  <line x1="390" y1="152" x2="408" y2="152" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#m1)"/>
  <line x1="580" y1="152" x2="598" y2="152" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#m1)"/>

  <rect x="30" y="250" width="720" height="60" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="50" y="277" fill="#e8e4df" font-size="13" font-weight="600">네트워크 면죄 — 증거로 "내 네트워크 탓이 아니다"를 보인다</text>
  <text x="50" y="299" fill="rgb(138,133,128)" font-size="12">USE·정적 튜닝으로 내 호스트 인터페이스·설정을 먼저 확인하고, iperf로 end-to-end 처리량을 검증한다.</text>

  <rect x="30" y="330" width="720" height="60" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="50" y="357" fill="#e8e4df" font-size="13" font-weight="600">튜닝보다 워크로드 이해가 먼저</text>
  <text x="50" y="379" fill="rgb(138,133,128)" font-size="12">기본값은 대개 잘 튜닝돼 있다. 불필요한 일을 없애는 게 튜너블 조정보다 큰 이득이다.</text>
</svg>
