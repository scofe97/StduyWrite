<svg viewBox="0 0 860 480" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>동시성 vs 병렬성과 동기화 프리미티브</title>
  <desc>위: 동시성과 병렬성의 차이. 동시성은 여러 프로그램을 적재해 실행을 시작하는 능력으로 런타임이 겹치지만 같은 순간 한 CPU에서 도는 것은 아니다. 병렬성은 여러 CPU에서 동시에 실행하는 것으로, 멀티프로세스나 멀티스레드로 얻으며 스레드가 더 효율적이다. 아래: 동기화 프리미티브는 같은 주소 공간을 공유하는 스레드의 메모리 접근을 관리해 무결성을 지키며, 신호등처럼 흐름을 멈춰 대기 지연을 일으킨다. mutex는 보유자만 동작하고 나머지는 블록돼 off-CPU 대기한다. spin lock은 나머지가 on-CPU 타이트 루프로 spin해 저지연이나 CPU를 낭비한다. RW lock은 다수 reader 또는 단일 writer만 허용한다. 세마포어는 카운팅이나 바이너리다. mutex는 fastpath·midpath(optimistic spinning)·slowpath 세 경로의 하이브리드로 구현되고, RCU는 락 없이 읽기를 허용한다.</desc>

  <rect x="0" y="0" width="860" height="480" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">동시성 vs 병렬성 · 동기화 프리미티브</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">병렬성엔 여러 OS 스레드 필요 · 동기화는 흐름을 멈춰 지연을 만든다</text>

  <!-- 동시성 -->
  <rect x="32" y="84" width="388" height="120" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="226" y="108" fill="rgb(212,168,83)" font-size="14" text-anchor="middle">동시성 (concurrency)</text>
  <text x="226" y="130" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">여러 프로그램 적재·실행 시작</text>
  <rect x="56" y="146" width="150" height="16" fill="rgba(212,168,83,0.5)"/><text x="60" y="159" fill="#0d0d0d" font-size="9">프로그램 A</text>
  <rect x="130" y="166" width="150" height="16" fill="rgba(212,168,83,0.35)"/><text x="134" y="179" fill="#0d0d0d" font-size="9">프로그램 B</text>
  <text x="226" y="198" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">런타임 겹침 · 한 CPU (같은 순간 동시는 아님)</text>

  <!-- 병렬성 -->
  <rect x="440" y="84" width="388" height="120" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="8"/>
  <text x="634" y="108" fill="rgb(212,168,83)" font-size="14" text-anchor="middle">병렬성 (parallelism)</text>
  <text x="634" y="130" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">여러 CPU에서 동시에 실행</text>
  <rect x="464" y="146" width="160" height="16" fill="rgba(212,168,83,0.6)"/><text x="468" y="159" fill="#0d0d0d" font-size="9">스레드 A (CPU 0)</text>
  <rect x="464" y="166" width="160" height="16" fill="rgba(212,168,83,0.6)"/><text x="468" y="179" fill="#0d0d0d" font-size="9">스레드 B (CPU 1)</text>
  <text x="634" y="198" fill="#66bb6a" font-size="10" text-anchor="middle">멀티스레드가 더 효율적</text>

  <!-- 동기화 프리미티브 -->
  <text x="32" y="240" fill="rgb(212,168,83)" font-size="14">동기화 프리미티브 — 신호등처럼 대기를 만든다</text>

  <rect x="32" y="254" width="195" height="90" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="129" y="276" fill="#e8e4df" font-size="12" text-anchor="middle">mutex</text>
  <text x="129" y="298" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">보유자만 동작</text>
  <text x="129" y="316" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">나머지 블록</text>
  <text x="129" y="334" fill="#f44336" font-size="10" text-anchor="middle">off-CPU 대기</text>

  <rect x="239" y="254" width="195" height="90" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="336" y="276" fill="#e8e4df" font-size="12" text-anchor="middle">spin lock</text>
  <text x="336" y="298" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">나머지 on-CPU spin</text>
  <text x="336" y="316" fill="#66bb6a" font-size="10" text-anchor="middle">저지연</text>
  <text x="336" y="334" fill="#f44336" font-size="10" text-anchor="middle">CPU 낭비</text>

  <rect x="446" y="254" width="195" height="90" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="543" y="276" fill="#e8e4df" font-size="12" text-anchor="middle">RW lock</text>
  <text x="543" y="298" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">다수 reader</text>
  <text x="543" y="316" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">또는 단일 writer</text>
  <text x="543" y="334" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">(reader 없이)</text>

  <rect x="653" y="254" width="175" height="90" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="740" y="276" fill="#e8e4df" font-size="12" text-anchor="middle">semaphore</text>
  <text x="740" y="298" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">카운팅(N 병렬)</text>
  <text x="740" y="316" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">또는 바이너리</text>
  <text x="740" y="334" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">(=mutex 효과)</text>

  <!-- mutex 세 경로 + RCU -->
  <rect x="32" y="358" width="500" height="92" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="6"/>
  <text x="282" y="380" fill="rgb(212,168,83)" font-size="12" text-anchor="middle">Linux mutex — 하이브리드 세 경로</text>
  <text x="48" y="402" fill="#e8e4df" font-size="10">fastpath: cmpxchg로 미보유 시 획득</text>
  <text x="48" y="422" fill="#e8e4df" font-size="10">midpath: optimistic spinning (보유자가 돌 때 spin)</text>
  <text x="48" y="442" fill="#e8e4df" font-size="10">slowpath: 블록·디스케줄</text>

  <rect x="544" y="358" width="284" height="92" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="6"/>
  <text x="686" y="380" fill="#66bb6a" font-size="12" text-anchor="middle">RCU (read-copy-update)</text>
  <text x="686" y="404" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">락 없이 읽기 허용</text>
  <text x="686" y="424" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">쓰기는 사본 갱신, 읽기는 원본</text>
  <text x="686" y="442" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">reader 없어지면 원본↔사본 교체</text>
</svg>
