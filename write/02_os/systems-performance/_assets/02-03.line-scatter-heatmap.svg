<svg viewBox="0 0 860 440" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>라인 차트·산점도·히트맵 — 같은 디스크 I/O 데이터의 세 시각화</title>
  <desc>같은 디스크 I/O 지연 데이터를 세 방식으로 그린다. 왼쪽 라인 차트는 시간 추이로, 평균 읽기 지연이 약 4ms로 일정해 보이지만 분포 디테일은 요약돼 가려진다. 가운데 산점도는 모든 I/O를 점으로 찍어(x=완료시각·y=지연) 10·20·50ms를 넘는 이상치를 그대로 드러내지만, 서브밀리초 점이 x축 근처에 겹쳐 분해능 한계가 있고 데이터가 많으면 페인트 벽이 된다. 오른쪽 히트맵은 x·y 범위를 버킷으로 양자화해 큰 픽셀을 색으로 칠해, 산점도의 확장성과 밀도 한계를 동시에 풀고 이중모드 분포를 또렷이 보여 준다. 한 시스템도 수천 시스템도 같은 방식으로 표시된다.</desc>

  <rect x="0" y="0" width="860" height="440" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">세 시각화 — 같은 디스크 I/O 지연 데이터</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">라인은 추이를, 산점도는 모든 점을, 히트맵은 산점도 한계를 푼다</text>

  <!-- 라인 차트 -->
  <rect x="32" y="84" width="248" height="220" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="156" y="108" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">라인 차트</text>
  <line x1="56" y1="280" x2="256" y2="280" stroke="rgb(138,133,128)" stroke-width="1"/>
  <line x1="56" y1="130" x2="56" y2="280" stroke="rgb(138,133,128)" stroke-width="1"/>
  <polyline points="60,240 90,238 120,242 150,239 180,241 210,238 240,240" fill="none" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="156" y="262" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">평균 ~4ms 일정해 보임</text>
  <text x="156" y="298" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">분포 디테일은 가려짐</text>

  <!-- 산점도 -->
  <rect x="306" y="84" width="248" height="220" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="430" y="108" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">산점도</text>
  <line x1="330" y1="280" x2="530" y2="280" stroke="rgb(138,133,128)" stroke-width="1"/>
  <line x1="330" y1="130" x2="330" y2="280" stroke="rgb(138,133,128)" stroke-width="1"/>
  <!-- 서브밀리초 무리 (x축 근처) -->
  <circle cx="345" cy="274" r="1.5" fill="rgb(138,133,128)"/><circle cx="360" cy="276" r="1.5" fill="rgb(138,133,128)"/><circle cx="375" cy="273" r="1.5" fill="rgb(138,133,128)"/><circle cx="395" cy="275" r="1.5" fill="rgb(138,133,128)"/><circle cx="415" cy="274" r="1.5" fill="rgb(138,133,128)"/><circle cx="440" cy="276" r="1.5" fill="rgb(138,133,128)"/><circle cx="465" cy="273" r="1.5" fill="rgb(138,133,128)"/><circle cx="490" cy="275" r="1.5" fill="rgb(138,133,128)"/><circle cx="510" cy="274" r="1.5" fill="rgb(138,133,128)"/>
  <!-- 이상치 -->
  <circle cx="370" cy="200" r="2.5" fill="#f44336"/><circle cx="420" cy="165" r="2.5" fill="#f44336"/><circle cx="470" cy="180" r="2.5" fill="#f44336"/><circle cx="400" cy="145" r="2.5" fill="#f44336"/>
  <text x="430" y="298" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">이상치 드러남 · 겹침 한계</text>

  <!-- 히트맵 -->
  <rect x="580" y="84" width="248" height="220" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="704" y="108" fill="rgb(212,168,83)" font-size="13" text-anchor="middle">히트맵</text>
  <line x1="604" y1="280" x2="804" y2="280" stroke="rgb(138,133,128)" stroke-width="1"/>
  <line x1="604" y1="130" x2="604" y2="280" stroke="rgb(138,133,128)" stroke-width="1"/>
  <!-- 하단 봉우리 (적중, 진한 색) -->
  <rect x="610" y="262" width="22" height="16" fill="rgba(212,168,83,0.8)"/><rect x="634" y="262" width="22" height="16" fill="rgba(212,168,83,0.7)"/><rect x="658" y="262" width="22" height="16" fill="rgba(212,168,83,0.8)"/><rect x="682" y="262" width="22" height="16" fill="rgba(212,168,83,0.6)"/><rect x="706" y="262" width="22" height="16" fill="rgba(212,168,83,0.8)"/><rect x="730" y="262" width="22" height="16" fill="rgba(212,168,83,0.7)"/><rect x="754" y="262" width="22" height="16" fill="rgba(212,168,83,0.8)"/><rect x="778" y="262" width="22" height="16" fill="rgba(212,168,83,0.6)"/>
  <!-- 중간 봉우리 (미스) -->
  <rect x="610" y="210" width="22" height="16" fill="rgba(212,168,83,0.4)"/><rect x="634" y="210" width="22" height="16" fill="rgba(212,168,83,0.5)"/><rect x="658" y="210" width="22" height="16" fill="rgba(212,168,83,0.4)"/><rect x="682" y="210" width="22" height="16" fill="rgba(212,168,83,0.5)"/><rect x="706" y="210" width="22" height="16" fill="rgba(212,168,83,0.4)"/><rect x="730" y="210" width="22" height="16" fill="rgba(212,168,83,0.5)"/><rect x="754" y="210" width="22" height="16" fill="rgba(212,168,83,0.4)"/><rect x="778" y="210" width="22" height="16" fill="rgba(212,168,83,0.5)"/>
  <!-- 이상치 (옅은 단일) -->
  <rect x="658" y="160" width="22" height="16" fill="rgba(212,168,83,0.15)" stroke="#f44336"/>
  <text x="704" y="298" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">이중모드 또렷 · 확장 가능</text>

  <!-- 결론 -->
  <rect x="32" y="330" width="796" height="44" fill="#66bb6a" fill-opacity="0.10" stroke="#66bb6a" rx="8"/>
  <text x="430" y="358" fill="#e8e4df" font-size="12" text-anchor="middle">평균만 보면 위험 — 분포(이중모드·이상치)는 산점도·히트맵으로 드러난다</text>

  <text x="32" y="404" fill="rgb(138,133,128)" font-size="11">히트맵(column quantization): x·y를 버킷으로 양자화 → 한 시스템도 수천 시스템도 같게 표시</text>
</svg>
