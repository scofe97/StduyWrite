<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Linux 블록 I/O 스택 — 병합·스케줄러·blk-mq</title>
  <desc>VFS·파일 시스템 아래 블록 층에서 I/O가 병합되고, 다중 큐(blk-mq) 스케줄러로 재정렬돼 장치 큐를 거쳐 디스크 드라이버·장치로 내려가는 구조. classic 단일 큐와 blk-mq CPU별 큐의 대비.</desc>
  <defs>
    <marker id="b1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect width="720" height="500" fill="#0d0d0d"/>
  <text x="30" y="40" fill="#e8e4df" font-size="20" font-weight="700">Linux 블록 I/O 스택</text>
  <text x="30" y="64" fill="rgb(138,133,128)" font-size="13">병합으로 묶고, blk-mq로 CPU별 큐에 병렬 스케줄링한다</text>

  <rect x="200" y="88" width="320" height="40" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="360" y="113" fill="#e8e4df" font-size="13" text-anchor="middle">파일 시스템 · VFS · 페이지 캐시 (8장)</text>

  <rect x="200" y="144" width="320" height="44" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="360" y="165" fill="#e8e4df" font-size="13" font-weight="600" text-anchor="middle">블록 I/O 인터페이스</text>
  <text x="360" y="181" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">iostat·정적/동적 계측 지점</text>

  <rect x="200" y="204" width="320" height="44" rx="6" fill="none" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="360" y="225" fill="#e8e4df" font-size="13" font-weight="600" text-anchor="middle">I/O 병합 (front / back merge)</text>
  <text x="360" y="241" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">작은 I/O를 묶어 오버헤드↓ (rqm/s)</text>

  <!-- schedulers -->
  <rect x="200" y="264" width="320" height="80" rx="6" fill="none" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="360" y="286" fill="#e8e4df" font-size="13" font-weight="600" text-anchor="middle">I/O 스케줄러 (재정렬)</text>
  <rect x="216" y="298" width="135" height="34" rx="4" fill="none" stroke="rgb(138,133,128)" stroke-width="1"/>
  <text x="283" y="314" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">classic: 단일 큐</text>
  <text x="283" y="328" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">단일 락 → 병목</text>
  <rect x="369" y="298" width="135" height="34" rx="4" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.1"/>
  <text x="436" y="314" fill="#e8e4df" font-size="11" text-anchor="middle">blk-mq: CPU별 큐</text>
  <text x="436" y="328" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">병렬·기본(5.0+)</text>

  <rect x="200" y="360" width="320" height="38" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="360" y="384" fill="#e8e4df" font-size="13" text-anchor="middle">블록 디바이스 큐</text>

  <rect x="200" y="414" width="320" height="42" rx="6" fill="none" stroke="rgb(138,133,128)" stroke-width="1.3"/>
  <text x="360" y="434" fill="#e8e4df" font-size="13" text-anchor="middle">디스크 드라이버 · 장치 (HDD / SSD / NVMe)</text>
  <text x="360" y="449" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">물리 I/O</text>

  <!-- arrows -->
  <line x1="360" y1="128" x2="360" y2="142" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#b1)"/>
  <line x1="360" y1="188" x2="360" y2="202" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#b1)"/>
  <line x1="360" y1="248" x2="360" y2="262" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#b1)"/>
  <line x1="360" y1="344" x2="360" y2="358" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#b1)"/>
  <line x1="360" y1="398" x2="360" y2="412" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#b1)"/>

  <!-- side labels -->
  <text x="545" y="170" fill="rgb(138,133,128)" font-size="11">blktrace</text>
  <text x="545" y="184" fill="rgb(138,133,128)" font-size="10">Q·I·D·C</text>
  <text x="545" y="436" fill="rgb(138,133,128)" font-size="11">biolatency</text>
  <text x="545" y="450" fill="rgb(138,133,128)" font-size="10">D2C (발행~완료)</text>
</svg>
