<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>연습 풀이 개념 맵 — 장별 핵심 개념</title>
  <desc>부록 D 선별 풀이가 묻는 장별 핵심 개념을 정리한 맵. 2장 지연·3장 CPU를 떠나는 이유·7장 paging vs swapping·8장 논리vs물리 I/O·9장 동기 I/O 영향·11장 게스트 관측성.</desc>
  <rect width="800" height="430" fill="#0d0d0d"/>
  <text x="30" y="40" fill="#e8e4df" font-size="20" font-weight="700">연습 풀이 — 장별 핵심 개념</text>
  <text x="30" y="64" fill="rgb(138,133,128)" font-size="13">선별 풀이가 묻는 핵심 개념 (전체가 아닌 발췌)</text>

  <!-- 2 -->
  <rect x="40" y="90" width="230" height="92" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="155" y="113" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">2장 방법론</text>
  <text x="60" y="138" fill="#e8e4df" font-size="12">지연 = 기다린 시간</text>
  <text x="60" y="160" fill="rgb(138,133,128)" font-size="11">(문맥 의존)</text>

  <!-- 3 -->
  <rect x="285" y="90" width="230" height="92" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="400" y="113" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">3장 운영체제</text>
  <text x="305" y="138" fill="#e8e4df" font-size="12">CPU를 떠나는 7가지</text>
  <text x="305" y="160" fill="rgb(138,133,128)" font-size="11">I/O·락·yield·선점·인터럽트…</text>

  <!-- 7 -->
  <rect x="530" y="90" width="230" height="92" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="645" y="113" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">7장 메모리</text>
  <text x="550" y="138" fill="#e8e4df" font-size="12">paging ≠ swapping</text>
  <text x="550" y="160" fill="rgb(138,133,128)" font-size="11">포화 = 크기 너머 수요</text>

  <!-- 8 -->
  <rect x="40" y="200" width="230" height="92" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="155" y="223" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">8장 파일 시스템</text>
  <text x="60" y="248" fill="#e8e4df" font-size="12">논리(FS) vs 물리(디스크) I/O</text>
  <text x="60" y="270" fill="rgb(138,133,128)" font-size="11">COW: 랜덤 쓰기→순차</text>

  <!-- 9 -->
  <rect x="285" y="200" width="230" height="92" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="400" y="223" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">9장 디스크</text>
  <text x="305" y="248" fill="#e8e4df" font-size="12">과부하: 높은 사용률·큐잉</text>
  <text x="305" y="270" fill="rgb(138,133,128)" font-size="11">동기 I/O·critical 경로만 직접 타격</text>

  <!-- 11 -->
  <rect x="530" y="200" width="230" height="92" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="645" y="223" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">11장 클라우드</text>
  <text x="550" y="248" fill="#e8e4df" font-size="12">고수준 메트릭은 봄</text>
  <text x="550" y="270" fill="rgb(138,133,128)" font-size="11">다른 테넌트 PID·이름은 차단</text>

  <!-- note -->
  <rect x="40" y="312" width="720" height="100" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="60" y="338" fill="#e8e4df" font-size="13" font-weight="600">원서 연습문제의 모범 답안 (본문 학습 점검과 별개)</text>
  <text x="60" y="360" fill="rgb(138,133,128)" font-size="12">본문 노트의 학습 점검이 "우리 노트"의 자가질문이라면, 이 부록은 "원서 연습문제"의 답을 핵심 위주로 모은 것.</text>
  <text x="60" y="380" fill="rgb(138,133,128)" font-size="12">발췌(selected)라 모든 장이 있지는 않음 — 없는 장의 개념은 해당 본문 노트의 학습 점검을 참조.</text>
  <text x="60" y="400" fill="#66bb6a" font-size="12">각 개념은 본문 노트(02-01·07-01·08-01·09-01·11-03)와 교차참조된다.</text>
</svg>
