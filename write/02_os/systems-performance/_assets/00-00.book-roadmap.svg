<svg viewBox="0 0 860 560" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Systems Performance 2판 — 16장 4그룹 로드맵</title>
  <desc>이 책의 16개 장은 네 그룹으로 묶인다. 필수 배경(1~4장)은 서론·방법론·운영체제 커널 내부·관측 도구로, 나머지 전부의 토대이며 먼저 읽는다. 분석 대상별(5~12장)은 애플리케이션·CPU·메모리·파일시스템·디스크·네트워크·클라우드(하이퍼바이저와 컨테이너)·벤치마킹으로, 대상마다 한 장씩이며 필요할 때 참조한다. 고급 추적(13~15장)은 perf·Ftrace·BPF(BCC와 bpftrace)로, 추적·프로파일링 심화이며 선택 읽기다. 종합(16장)은 Netflix 실전 케이스 스터디로, 도구를 한데 모아 푼다. 성능 분석이 처음이면 16장을 먼저 읽어도 좋다. 아래 띠: 많은 장이 두 부분으로 나뉘는데, 앞부분의 용어·개념·방법론은 오래 가는 기술이고 뒷부분의 아키텍처·도구·튜너블은 낡아도 예시로 남는다.</desc>

  <rect x="0" y="0" width="860" height="560" fill="#0d0d0d"/>

  <text x="32" y="40" fill="#e8e4df" font-size="20">Systems Performance 2판 — 16장 4그룹 로드맵</text>
  <text x="32" y="62" fill="rgb(138,133,128)" font-size="13">필수 배경 → 분석 대상별 → 고급 추적 → 종합 — 방법론 먼저, 도구는 예시</text>

  <!-- 그룹 1: 필수 배경 -->
  <rect x="32" y="84" width="796" height="92" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="8"/>
  <text x="48" y="108" fill="rgb(212,168,83)" font-size="14">필수 배경 (1~4장) — 먼저 읽는 토대</text>

  <rect x="48" y="120" width="184" height="44" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="5"/>
  <text x="58" y="139" fill="#e8e4df" font-size="11">1 Introduction</text>
  <text x="58" y="156" fill="rgb(138,133,128)" font-size="10">성능 분석 입문</text>

  <rect x="240" y="120" width="184" height="44" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="5"/>
  <text x="250" y="139" fill="#e8e4df" font-size="11">2 Methodologies</text>
  <text x="250" y="156" fill="rgb(138,133,128)" font-size="10">방법론·모델·통계</text>

  <rect x="432" y="120" width="184" height="44" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="5"/>
  <text x="442" y="139" fill="#e8e4df" font-size="11">3 Operating Systems</text>
  <text x="442" y="156" fill="rgb(138,133,128)" font-size="10">커널 내부 요약</text>

  <rect x="624" y="120" width="188" height="44" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="5"/>
  <text x="634" y="139" fill="#e8e4df" font-size="11">4 Observability Tools</text>
  <text x="634" y="156" fill="rgb(138,133,128)" font-size="10">관측 도구·프레임워크</text>

  <!-- 그룹 2: 분석 대상별 -->
  <rect x="32" y="186" width="796" height="148" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="48" y="210" fill="rgb(212,168,83)" font-size="14">분석 대상별 (5~12장) — 필요할 때 참조</text>

  <rect x="48" y="222" width="184" height="40" fill="rgb(42,37,32)" rx="5"/>
  <text x="58" y="240" fill="#e8e4df" font-size="11">5 Applications</text>
  <text x="58" y="255" fill="rgb(138,133,128)" font-size="9">앱을 OS 관점에서</text>

  <rect x="240" y="222" width="184" height="40" fill="rgb(42,37,32)" rx="5"/>
  <text x="250" y="240" fill="#e8e4df" font-size="11">6 CPUs</text>
  <text x="250" y="255" fill="rgb(138,133,128)" font-size="9">코어·캐시·스케줄링</text>

  <rect x="432" y="222" width="184" height="40" fill="rgb(42,37,32)" rx="5"/>
  <text x="442" y="240" fill="#e8e4df" font-size="11">7 Memory</text>
  <text x="442" y="255" fill="rgb(138,133,128)" font-size="9">가상메모리·할당자</text>

  <rect x="624" y="222" width="188" height="40" fill="rgb(42,37,32)" rx="5"/>
  <text x="634" y="240" fill="#e8e4df" font-size="11">8 File Systems</text>
  <text x="634" y="255" fill="rgb(138,133,128)" font-size="9">FS I/O·캐시</text>

  <rect x="48" y="270" width="184" height="40" fill="rgb(42,37,32)" rx="5"/>
  <text x="58" y="288" fill="#e8e4df" font-size="11">9 Disks</text>
  <text x="58" y="303" fill="rgb(138,133,128)" font-size="9">스토리지·RAID·I/O</text>

  <rect x="240" y="270" width="184" height="40" fill="rgb(42,37,32)" rx="5"/>
  <text x="250" y="288" fill="#e8e4df" font-size="11">10 Network</text>
  <text x="250" y="303" fill="rgb(138,133,128)" font-size="9">프로토콜·소켓</text>

  <rect x="432" y="270" width="184" height="40" fill="rgb(42,37,32)" rx="5"/>
  <text x="442" y="288" fill="#e8e4df" font-size="11">11 Cloud Computing</text>
  <text x="442" y="303" fill="rgb(138,133,128)" font-size="9">하이퍼바이저·컨테이너</text>

  <rect x="624" y="270" width="188" height="40" fill="rgb(42,37,32)" rx="5"/>
  <text x="634" y="288" fill="#e8e4df" font-size="11">12 Benchmarking</text>
  <text x="634" y="303" fill="rgb(138,133,128)" font-size="9">정확한 측정·해석</text>

  <!-- 그룹 3: 고급 추적 -->
  <rect x="32" y="344" width="540" height="92" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="48" y="368" fill="rgb(212,168,83)" font-size="14">고급 추적 (13~15장) — 선택 심화</text>

  <rect x="48" y="380" width="160" height="44" fill="rgb(42,37,32)" rx="5"/>
  <text x="58" y="399" fill="#e8e4df" font-size="11">13 perf</text>
  <text x="58" y="416" fill="rgb(138,133,128)" font-size="9">표준 프로파일러</text>

  <rect x="216" y="380" width="160" height="44" fill="rgb(42,37,32)" rx="5"/>
  <text x="226" y="399" fill="#e8e4df" font-size="11">14 Ftrace</text>
  <text x="226" y="416" fill="rgb(138,133,128)" font-size="9">커널 코드 추적</text>

  <rect x="384" y="380" width="172" height="44" fill="rgb(42,37,32)" rx="5"/>
  <text x="394" y="399" fill="#e8e4df" font-size="11">15 BPF</text>
  <text x="394" y="416" fill="rgb(138,133,128)" font-size="9">BCC·bpftrace (2판 신설)</text>

  <!-- 그룹 4: 종합 -->
  <rect x="584" y="344" width="244" height="92" fill="#66bb6a" fill-opacity="0.10" stroke="#66bb6a" rx="8"/>
  <text x="600" y="368" fill="#66bb6a" font-size="14">종합 (16장)</text>
  <text x="600" y="394" fill="#e8e4df" font-size="11">16 Case Study</text>
  <text x="600" y="412" fill="rgb(138,133,128)" font-size="10">Netflix 실전 — 처음이면</text>
  <text x="600" y="426" fill="rgb(138,133,128)" font-size="10">먼저 읽어도 좋음</text>

  <!-- durable vs faster-changing 띠 -->
  <line x1="32" y1="456" x2="828" y2="456" stroke="rgb(42,37,32)" stroke-width="1"/>

  <rect x="32" y="470" width="388" height="74" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" rx="8"/>
  <text x="226" y="494" fill="#e8e4df" font-size="13" text-anchor="middle">장의 앞부분 — 오래 가는 기술</text>
  <text x="226" y="516" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">용어·개념·방법론</text>
  <text x="226" y="534" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">수년 뒤에도 유효</text>

  <rect x="440" y="470" width="388" height="74" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" rx="8"/>
  <text x="634" y="494" fill="#e8e4df" font-size="13" text-anchor="middle">장의 뒷부분 — 빨리 바뀌는 예시</text>
  <text x="634" y="516" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">아키텍처·도구·튜너블</text>
  <text x="634" y="534" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">낡아도 구현 예시로 남음</text>
</svg>
