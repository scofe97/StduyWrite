<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 430" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Ftrace 프론트엔드 — tracefs를 감싸는 도구 계층</title>
  <desc>tracefs(/sys) 직접 조작 위에 trace-cmd(서브커맨드·바이너리)·perf ftrace(perf 서브커맨드)·perf-tools(셸 스크립트 도구)가 얹히고, KernelShark가 trace.dat을 시각화하는 계층 구조.</desc>
  <defs>
    <marker id="t1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <rect width="780" height="430" fill="#0d0d0d"/>
  <text x="30" y="40" fill="#e8e4df" font-size="20" font-weight="700">Ftrace 프론트엔드</text>
  <text x="30" y="64" fill="rgb(138,133,128)" font-size="13">tracefs /sys 조작을 감싸 더 안전·간결하게</text>

  <!-- frontend layer -->
  <rect x="40" y="90" width="220" height="90" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="150" y="113" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">trace-cmd</text>
  <text x="150" y="135" fill="#e8e4df" font-size="11" text-anchor="middle">서브커맨드·바이너리(trace.dat)</text>
  <text x="150" y="153" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">function/function_graph 지원↑</text>
  <text x="150" y="170" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">네트워크 클라이언트/서버</text>

  <rect x="280" y="90" width="220" height="90" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="390" y="113" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">perf ftrace</text>
  <text x="390" y="135" fill="#e8e4df" font-size="11" text-anchor="middle">perf 서브커맨드</text>
  <text x="390" y="153" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">-T function · -G function_graph</text>
  <text x="390" y="170" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">단순 래퍼(perf.data 미사용)</text>

  <rect x="520" y="90" width="220" height="90" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="630" y="113" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">perf-tools</text>
  <text x="630" y="135" fill="#e8e4df" font-size="11" text-anchor="middle">셸 스크립트 도구 모음</text>
  <text x="630" y="153" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">단일: execsnoop·iolatency</text>
  <text x="630" y="170" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">다목적: funccount·funcgraph</text>

  <!-- kernelshark -->
  <rect x="40" y="200" width="220" height="50" rx="8" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <text x="150" y="222" fill="#e8e4df" font-size="12" font-weight="600" text-anchor="middle">KernelShark</text>
  <text x="150" y="240" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">trace.dat 시각화(스레드 상호작용)</text>

  <!-- tracefs base -->
  <rect x="40" y="280" width="700" height="50" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.4"/>
  <text x="390" y="302" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">tracefs (/sys) — echo·cat 직접 조작</text>
  <text x="390" y="320" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">function·tracepoint·kprobe·uprobe·function_graph·hwlat·hist triggers</text>

  <!-- arrows -->
  <line x1="150" y1="280" x2="150" y2="252" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#t1)"/>
  <line x1="390" y1="280" x2="390" y2="182" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#t1)"/>
  <line x1="630" y1="280" x2="630" y2="182" stroke="rgb(212,168,83)" stroke-width="1.4" marker-end="url(#t1)"/>
  <line x1="150" y1="200" x2="150" y2="182" stroke="rgb(138,133,128)" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#t1)"/>

  <!-- note -->
  <rect x="40" y="346" width="700" height="70" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="60" y="372" fill="#e8e4df" font-size="13" font-weight="600">perf-tools vs BPF — 언제 무엇을</text>
  <text x="60" y="394" fill="rgb(138,133,128)" font-size="12">BPF가 더 강력·유연하나, perf-tools는 funccount(효율)·funcgraph(BCC에 없음)·의존성 적음(임베디드)에서 유용.</text>
  <text x="60" y="412" fill="rgb(138,133,128)" font-size="12">둘은 경쟁이자 상호 검증 — "트레이서 둘이면 하나가 깨졌음을 안다." (13·14·15장은 보완 관계)</text>
</svg>
