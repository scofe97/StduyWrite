<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>01-04 — 리밸런스 프로토콜</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100vh; }
    body {
      background: #0d0d0d;
      color: #e8e4df;
      font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .container { max-width: 1080px; width: 100%; margin: 0 auto; padding: 20px 24px; display: flex; flex-direction: column; height: 100%; }
    .fixed-header { flex-shrink: 0; }
    .scroll-content { flex: 1; overflow-y: auto; padding-top: 12px; }

    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: rgb(138, 133, 128); font-size: 13px; margin-bottom: 16px; }

    .scenario-selector { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .scenario-pill { background: rgb(26, 26, 26); border: 1px solid rgb(42, 37, 32); border-radius: 20px; color: rgb(138, 133, 128); padding: 6px 16px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .scenario-pill.active { background: rgba(212, 168, 83, 0.15); border-color: rgb(212, 168, 83); color: rgb(212, 168, 83); }
    .scenario-pill:hover { color: #e8e4df; }

    .pipeline { display: flex; align-items: center; justify-content: flex-start; padding: 16px 0; overflow-x: auto; gap: 0; }
    .pipeline-step { display: flex; flex-direction: column; align-items: center; cursor: pointer; min-width: 76px; }
    .step-circle { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgb(26, 26, 26); border: 2px solid rgb(42, 37, 32); color: rgb(138, 133, 128); font-size: 13px; font-weight: 600; transition: all 0.3s; }
    .step-label { margin-top: 6px; font-size: 10px; color: rgb(138, 133, 128); white-space: nowrap; transition: color 0.3s; text-align: center; }
    .pipeline-step.active .step-circle { background: rgba(212, 168, 83, 0.2); border-color: rgb(212, 168, 83); color: rgb(212, 168, 83); box-shadow: 0 0 8px rgba(212, 168, 83, 0.4); animation: node-glow 2s ease-in-out infinite; }
    .pipeline-step.active .step-label { color: rgb(212, 168, 83); }
    .pipeline-step.completed .step-circle { background: rgba(212, 168, 83, 0.1); border-color: rgb(212, 168, 83); color: rgb(212, 168, 83); }
    .pipeline-step.completed .step-label { color: rgb(212, 168, 83); }
    .pipeline-connector { width: 20px; height: 2px; background: rgb(42, 37, 32); margin-bottom: 22px; transition: background 0.5s; flex-shrink: 0; }
    .pipeline-connector.filled { background: rgb(212, 168, 83); }

    .panel { background: #0d0d0d; border: 1px solid rgb(42, 37, 32); border-radius: 8px; padding: 18px; margin-bottom: 14px; }

    .start-overlay { text-align: center; padding: 32px; }
    .btn-start { background: rgba(212, 168, 83, 0.15); border: 1px solid rgb(212, 168, 83); border-radius: 8px; color: rgb(212, 168, 83); padding: 12px 32px; font-size: 16px; cursor: pointer; transition: all 0.2s; }
    .btn-start:hover { background: rgba(212, 168, 83, 0.25); }
    .start-hint { color: rgb(138, 133, 128); font-size: 13px; margin-top: 8px; }

    .controls { display: flex; align-items: center; gap: 16px; padding: 8px 0; border-top: 1px solid rgb(42, 37, 32); margin-top: 8px; }
    .controls-nav { display: flex; gap: 8px; }
    .btn-ctrl { background: rgb(26, 26, 26); border: 1px solid rgb(42, 37, 32); border-radius: 6px; color: #e8e4df; padding: 6px 14px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .btn-ctrl:hover { border-color: rgb(212, 168, 83); color: rgb(212, 168, 83); }
    .btn-play { min-width: 80px; }
    .speed-group { display: flex; gap: 4px; margin-left: auto; }
    .speed-btn { background: transparent; border: 1px solid transparent; border-radius: 4px; color: rgb(138, 133, 128); padding: 4px 10px; font-size: 12px; cursor: pointer; }
    .speed-btn.active { border-color: rgb(42, 37, 32); color: #e8e4df; }
    .step-counter { color: rgb(138, 133, 128); font-size: 13px; font-variant-numeric: tabular-nums; min-width: 48px; text-align: right; }

    .narration-step-title { font-size: 11px; font-weight: 600; color: rgb(212, 168, 83); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
    .narration-body { font-size: 14px; line-height: 1.7; }
    .hl { color: rgb(212, 168, 83); font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.9em; }
    .ok { color: #66bb6a; }
    .warn { color: rgb(212, 168, 83); }
    .fail { color: #f44336; }
    .bf { color: #ce93d8; font-weight: 600; }
    .time-tag { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: rgb(138, 133, 128); border: 1px solid rgb(42, 37, 32); border-radius: 4px; padding: 1px 6px; margin-right: 6px; }

    .db-panel { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; line-height: 1.6; }
    .db-table { width: 100%; border-collapse: collapse; }
    .db-table td { padding: 6px 10px; border-bottom: 1px solid rgb(32, 28, 24); }
    .db-table tr:last-child td { border-bottom: none; }
    .db-key { color: rgb(138, 133, 128); white-space: nowrap; width: 1%; padding-right: 16px; vertical-align: top; }
    .db-val { color: #e8e4df; word-break: break-all; }
    .db-section-title { font-size: 11px; font-weight: 600; color: rgb(138, 133, 128); text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 10px 4px; border-bottom: 1px solid rgb(42, 37, 32); }
    .db-note { color: rgb(138, 133, 128); font-style: italic; font-size: 12px; padding: 8px 10px 0; }
    .changed { color: rgb(212, 168, 83); font-weight: 600; text-shadow: 0 0 6px rgba(212, 168, 83, 0.3); }
    .run-val { color: #66bb6a; font-weight: 600; }
    .stop-val { color: #f44336; font-weight: 600; }

    .panel-label { font-size: 11px; font-weight: 600; color: rgb(138, 133, 128); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }

    @keyframes node-glow {
      0%   { box-shadow: 0 0 4px rgba(212, 168, 83, 0.2); }
      50%  { box-shadow: 0 0 12px rgba(212, 168, 83, 0.6); }
      100% { box-shadow: 0 0 4px rgba(212, 168, 83, 0.2); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="fixed-header">
      <h1>01-04 — 리밸런스 프로토콜</h1>
      <p class="subtitle">Consumer 멤버가 바뀔 때 파티션을 누가 갖느냐가 재계산되며, 무엇이 멈추고 무엇이 다시 시작되는지 단계별 추적</p>

      <div class="scenario-selector">
        <button class="scenario-pill active" onclick="switchScenario(0)">케이스 1: Eager Stop-the-World</button>
        <button class="scenario-pill" onclick="switchScenario(1)">케이스 2: Cooperative Sticky 점진</button>
        <button class="scenario-pill" onclick="switchScenario(2)">케이스 3: Static Membership 재시작</button>
      </div>

      <div class="pipeline" id="pipeline"></div>

      <div class="controls" id="controlBar" style="display: none;">
        <div class="controls-nav">
          <button class="btn-ctrl" onclick="prevStep()">◀ 이전</button>
          <button class="btn-ctrl btn-play" onclick="togglePlay()" id="playBtn">▶ 재생</button>
          <button class="btn-ctrl" onclick="nextStep()">다음 ▶</button>
        </div>
        <div class="speed-group">
          <button class="speed-btn" onclick="setSpeed(0.5)">0.5x</button>
          <button class="speed-btn active" onclick="setSpeed(1)">1x</button>
          <button class="speed-btn" onclick="setSpeed(2)">2x</button>
        </div>
        <span class="step-counter" id="stepCounter">0 / 0</span>
      </div>
    </div>

    <div class="scroll-content">
      <div class="start-overlay" id="startOverlay">
        <button class="btn-start" onclick="startSimulation()">시뮬레이션 시작 ▶</button>
        <p class="start-hint">파티션 소유권이 어떻게 재계산되고, 그동안 어떤 파티션이 멈추는지 단계별로 따라갑니다</p>
      </div>

      <div id="contentPanel" style="display: none;">
        <div class="panel narration" id="narration"></div>
        <div class="panel">
          <div class="panel-label">파티션 소유 현황 · 처리 상태</div>
          <div class="db-panel" id="dbState"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentStep = -1;
    let currentScenario = 0;
    let isPlaying = false;
    let playSpeed = 1;
    let timer = null;

    function db(rows, opts) {
      let html = '<table class="db-table">';
      if (opts && opts.section) {
        html += '<tr><td colspan="2" class="db-section-title">' + opts.section + '</td></tr>';
      }
      rows.forEach(r => {
        html += '<tr><td class="db-key">' + r[0] + '</td><td class="db-val">' + r[1] + '</td></tr>';
      });
      html += '</table>';
      if (opts && opts.note) {
        html += '<div class="db-note">' + opts.note + '</div>';
      }
      return html;
    }

    // 모든 사실은 01-04.리밸런스 프로토콜.md 본문에서만 (원문 1:1)
    const scenarios = {
      // 케이스 1 — Eager Stop-the-World (§1.1)
      0: {
        title: '케이스 1: Eager Stop-the-World',
        nodes: [
          { label: '초기 할당', narration:
              '<span class="time-tag">T=0s</span>리밸런스 전 상태입니다. Consumer 1이 P0,P1을, Consumer 2가 P2,P3을 처리 중입니다. 네 파티션 모두 정상 소비됩니다.',
            db: () => db([['Consumer 1', '<span class="run-val">P0, P1 처리 중</span>'], ['Consumer 2', '<span class="run-val">P2, P3 처리 중</span>'], ['처리 중단 파티션', '없음']]) },
          { label: 'C3 합류', narration:
              '<span class="time-tag">T=1s</span><span class="warn">Consumer 3이 그룹에 합류</span>하여 리밸런스가 시작됩니다. 초기 Eager Protocol은 모든 Consumer가 모든 파티션을 해제한 뒤 재할당하는 방식입니다.',
            db: () => db([['Consumer 1', 'P0, P1 (해제 예정)'], ['Consumer 2', 'P2, P3 (해제 예정)'], ['Consumer 3', '<span class="changed">합류 → 리밸런스 트리거</span>']]) },
          { label: '전체 해제', narration:
              '<span class="time-tag">T=1s</span><span class="fail">1단계: 모든 Consumer가 파티션을 해제합니다.</span> Consumer 1도 2도 보유 파티션이 없어집니다. 이 순간 <span class="bf">모든 파티션의 처리가 멈춥니다(Stop-the-World)</span>.',
            db: () => db([['Consumer 1', '<span class="stop-val">(없음) — P0,P1 중단!</span>'], ['Consumer 2', '<span class="stop-val">(없음) — P2,P3 중단!</span>'], ['처리 중단 파티션', '<span class="stop-val">P0, P1, P2, P3 (전부)</span>']], { note: '한 명이 합류했을 뿐인데 모든 파티션이 멈춥니다.' }) },
          { label: 'Join/Sync', narration:
              '<span class="time-tag">T=2s</span>2단계: <span class="hl">JoinGroup / SyncGroup</span> 프로토콜이 실행되어 새 할당을 계산합니다. 이 동안에도 처리는 여전히 멈춰 있습니다.',
            db: () => db([['리밸런스 단계', '<span class="changed">JoinGroup → SyncGroup</span>'], ['처리 상태', '<span class="stop-val">전체 중단 지속</span>'], ['처리 중단 파티션', '<span class="stop-val">P0, P1, P2, P3</span>']]) },
          { label: '재할당', narration:
              '<span class="time-tag">T=3s</span>3단계: 새 할당이 끝나 처리가 재개됩니다. <span class="ok">Consumer 1→P0,P1 / Consumer 2→P2 / Consumer 3→P3</span>. 그런데 <span class="bf">P0,P1은 또 Consumer 1에 돌아왔습니다.</span>',
            db: () => db([['Consumer 1', '<span class="run-val">P0, P1 (다시 같은 곳)</span>'], ['Consumer 2', '<span class="run-val">P2</span>'], ['Consumer 3', '<span class="run-val">P3</span>']], { note: 'P0,P1이 같은 Consumer 1에 재할당됐는데도 상태를 이미 해제해서 처음부터 재구축해야 합니다.' }) },
          { label: '두 비용', narration:
              '<span class="time-tag">T=3s</span>Eager의 두 핵심 비용입니다. <span class="fail">① 불필요한 상태 재구축</span>: P0,P1은 Consumer 1에 다시 왔지만 State Store·로컬 캐시를 처음부터 다시 만들어야 합니다. <span class="fail">② 전체 처리 중단</span>: 리밸런스 내내 모든 파티션이 멈췄습니다.',
            db: () => db([['비용 ①', '<span class="stop-val">불필요한 상태 재구축 (P0,P1)</span>'], ['비용 ②', '<span class="stop-val">전체 파티션 처리 중단</span>'], ['적합 환경', '레거시 호환']], { note: '비교 요약 → 처리 중단 범위: 모든 파티션 / 리밸런스 횟수: 1회 / 상태 재구축: 불필요한 재구축 발생' }) }
        ]
      },
      // 케이스 2 — Cooperative Sticky 점진 (§2)
      1: {
        title: '케이스 2: Cooperative Sticky 점진',
        nodes: [
          { label: '초기 할당', narration:
              '<span class="time-tag">T=0s</span>리밸런스 전 상태입니다. Consumer 1이 P0,P1,P2를, Consumer 2가 P3,P4를 처리 중입니다. Cooperative Sticky는 필요한 파티션만 해제하는 점진적(Incremental) 리밸런스를 구현합니다.',
            db: () => db([['Consumer 1', '<span class="run-val">P0, P1, P2 처리 중</span>'], ['Consumer 2', '<span class="run-val">P3, P4 처리 중</span>'], ['처리 중단 파티션', '없음']]) },
          { label: 'C3 합류', narration:
              '<span class="time-tag">T=1s</span><span class="warn">Consumer 3이 합류</span>하여 리밸런스가 시작됩니다. Eager와 달리 전체를 해제하지 않습니다.',
            db: () => db([['Consumer 1', 'P0, P1, P2 (유지 중)'], ['Consumer 2', 'P3, P4 (유지 중)'], ['Consumer 3', '<span class="changed">합류 → 리밸런스 시작</span>']]) },
          { label: '1차 보고', narration:
              '<span class="time-tag">T=1s</span>1차 리밸런스: Coordinator가 "각자 현재 할당을 보고하라" 하고, Consumer 1은 "P0,P1,P2 보유", Consumer 2는 "P3,P4 보유"라고 알립니다. 아직 아무것도 멈추지 않았습니다.',
            db: () => db([['Consumer 1 보고', 'P0, P1, P2'], ['Consumer 2 보고', 'P3, P4'], ['처리 상태', '<span class="run-val">전부 계속 처리 중</span>']]) },
          { label: 'P2만 해제', narration:
              '<span class="time-tag">T=2s</span>Group Leader가 "<span class="hl">P2만 Consumer 1에서 해제</span>"하라고 결정합니다. <span class="ok">P0,P1,P3,P4는 단 한 번도 중단되지 않고 계속 처리</span>됩니다. Consumer 3은 잠시 대기합니다.',
            db: () => db([['Consumer 1', '<span class="run-val">P0, P1 계속 처리</span>'], ['Consumer 2', '<span class="run-val">P3, P4 계속 처리</span>'], ['Consumer 3', '대기'], ['중단 파티션', '<span class="changed">P2 (잠시만)</span>']], { note: '이동 대상인 P2만 잠깐 멈춥니다. 나머지는 영향 없음.' }) },
          { label: '2차 할당', narration:
              '<span class="time-tag">T=3s</span>2차 리밸런스: Group Leader가 해제된 <span class="hl">P2를 Consumer 3에 할당</span>합니다. <span class="ok">Consumer 1,2의 처리는 내내 중단되지 않았습니다.</span>',
            db: () => db([['Consumer 1', '<span class="run-val">P0, P1 (중단 없음)</span>'], ['Consumer 2', '<span class="run-val">P3, P4 (중단 없음)</span>'], ['Consumer 3', '<span class="run-val">P2 (새로 할당)</span>']], { note: 'P2만 잠시 해제됐다가 Consumer 3에 갔습니다.' }) },
          { label: '점진 완료', narration:
              '<span class="time-tag">T=3s</span>총 두 번의 리밸런스였지만 <span class="bf">해제된 P2에만 처리 공백</span>이 생기고 다른 모든 파티션은 영향이 없었습니다. Eager는 한 번이지만 그 한 번에 전부 멈춰 결과적으로 더 비쌉니다. 그래서 프로덕션 권장입니다.',
            db: () => db([['중단된 파티션', '<span class="changed">P2 한 개뿐</span>'], ['리밸런스 횟수', '2회 (해제 → 재할당)'], ['적합 환경', '<span class="run-val">프로덕션 권장</span>']], { note: '비교 요약 → 처리 중단 범위: 이동 대상 파티션만 / 리밸런스 횟수: 2회 / 상태 재구축: 최소화' }) }
        ]
      },
      // 케이스 3 — Static Membership 재시작 (§3.1·3.3)
      2: {
        title: '케이스 3: Static Membership 재시작',
        nodes: [
          { label: '고정 ID', narration:
              '<span class="time-tag">T=0s</span>가장 흔한 리밸런스 원인은 Consumer 인스턴스 재시작(배포·설정 변경)입니다. <span class="hl">group.instance.id="host-1"</span>로 고정 ID를 부여하면 재시작 시 리밸런스를 회피할 수 있습니다.',
            db: () => db([['host-1', '<span class="run-val">P0, P1 처리 중</span>'], ['group.instance.id', 'host-1 (고정)'], ['session.timeout.ms', '30000 (30초)']]) },
          { label: 'host-1 종료', narration:
              '<span class="time-tag">T=1s</span>host-1이 종료됩니다. static member는 <span class="bf">LeaveGroup 요청을 보내지 않습니다.</span> 일반 멤버라면 여기서 즉시 리밸런스가 트리거되지만, static은 다릅니다.',
            db: () => db([['host-1', '<span class="stop-val">종료 (LeaveGroup 안 보냄)</span>'], ['P0, P1', '<span class="stop-val">잠시 미처리</span>'], ['리밸런스', '아직 보류']], { note: '함정 ②: 종료~재시작 사이 P0,P1은 누구에게도 재할당되지 않아 그만큼 lag이 쌓입니다.' }) },
          { label: '보류', narration:
              '<span class="time-tag">T=1s</span>Coordinator는 "host-1이 <span class="hl">session.timeout.ms(30초)</span> 내 돌아올 것"으로 기대하고 <span class="warn">리밸런스를 보류</span>합니다. 불필요한 리밸런스를 피하는 핵심 동작입니다.',
            db: () => db([['Coordinator', '<span class="changed">host-1 복귀 대기 (30초)</span>'], ['리밸런스', '보류 중'], ['P0, P1 소유', 'host-1 (예약 유지)']]) },
          { label: 'host-1 재시작', narration:
              '<span class="time-tag">T=16s</span>15초 후 host-1이 재시작되어 <span class="hl">JoinGroup(group.instance.id="host-1")</span>을 보냅니다. timeout 30초 안에 돌아왔습니다.',
            db: () => db([['host-1', '<span class="changed">재시작 → JoinGroup</span>'], ['경과 시간', '15초 (< 30초)'], ['Coordinator 판단', 'host-1 돌아옴']]) },
          { label: '동일 할당', narration:
              '<span class="time-tag">T=16s</span>Coordinator가 <span class="ok">이전과 동일한 P0,P1을 그대로 할당</span>합니다. <span class="bf">리밸런스 없음, 상태 재구축 없음</span>으로 즉시 처리를 재개합니다.',
            db: () => db([['host-1', '<span class="run-val">P0, P1 (동일 할당)</span>'], ['리밸런스', '<span class="run-val">0회</span>'], ['상태 재구축', '<span class="run-val">불필요</span>']], { note: '함정 ①: 같은 host-1 ID로 두 인스턴스가 참여하면 두 번째는 "이미 존재하는 ID" 에러를 받습니다. 배포 시 옛 인스턴스가 완전히 죽은 뒤 띄워야 합니다.' }) },
          { label: '회피 정리', narration:
              '<span class="time-tag">T=16s</span>동일 인스턴스가 빠르게 복귀하는 시나리오(롤링 배포·설정 변경 재시작)에서 리밸런스를 0회로 만든 것이 가치입니다. 단 스케일 아웃/인처럼 인스턴스 수 자체가 변하면 부적합합니다.',
            db: () => db([['적합', '롤링 배포 / 설정 변경 재시작'], ['부적합', '스케일 아웃·인'], ['균형점', 'session.timeout.ms — 단순 재시작엔 안 나되 진짜 다운엔 재할당']], { note: '비교 요약 → 처리 중단 범위: 재시작 인스턴스 파티션만(보류 동안) / 리밸런스 횟수: 0회 / 상태 재구축: 없음' }) }
        ]
      }
    };

    function renderPipeline() {
      const pipeline = document.getElementById('pipeline');
      const nodes = scenarios[currentScenario].nodes;
      pipeline.innerHTML = '';
      nodes.forEach((node, i) => {
        if (i > 0) {
          const conn = document.createElement('div');
          conn.className = 'pipeline-connector' + (i <= currentStep ? ' filled' : '');
          pipeline.appendChild(conn);
        }
        const el = document.createElement('div');
        el.className = 'pipeline-step'
          + (i === currentStep ? ' active' : '')
          + (i < currentStep ? ' completed' : '');
        el.onclick = () => goToStep(i);
        el.innerHTML = '<div class="step-circle">' + (i + 1) + '</div>'
          + '<div class="step-label">' + node.label + '</div>';
        pipeline.appendChild(el);
      });
    }

    function updateDb(node) {
      document.getElementById('dbState').innerHTML =
        typeof node.db === 'function' ? node.db() : (node.db || '');
    }

    function goToStep(n) {
      const nodes = scenarios[currentScenario].nodes;
      if (n < 0 || n >= nodes.length) return;
      currentStep = n;
      updateNarration(nodes[n].narration);
      updateDb(nodes[n]);
      document.getElementById('stepCounter').textContent = (currentStep + 1) + ' / ' + nodes.length;
      renderPipeline();
    }

    function nextStep() { goToStep(currentStep + 1); }
    function prevStep() { goToStep(currentStep - 1); }

    function switchScenario(index) {
      currentScenario = index;
      currentStep = -1;
      stopPlay();
      document.querySelectorAll('.scenario-pill').forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });
      renderPipeline();
      if (document.getElementById('contentPanel').style.display !== 'none') {
        goToStep(0);
      } else {
        document.getElementById('stepCounter').textContent = '0 / ' + scenarios[index].nodes.length;
      }
    }

    function startSimulation() {
      document.getElementById('startOverlay').style.display = 'none';
      document.getElementById('contentPanel').style.display = 'block';
      document.getElementById('controlBar').style.display = 'flex';
      goToStep(0);
    }

    function togglePlay() {
      if (isPlaying) { stopPlay(); return; }
      if (currentStep === -1) goToStep(0);
      isPlaying = true;
      document.getElementById('playBtn').textContent = '⏸ 정지';
      timer = setInterval(() => {
        const nodes = scenarios[currentScenario].nodes;
        if (currentStep >= nodes.length - 1) { stopPlay(); return; }
        nextStep();
      }, 3000 / playSpeed);
    }

    function stopPlay() {
      isPlaying = false;
      if (timer) { clearInterval(timer); timer = null; }
      document.getElementById('playBtn').textContent = '▶ 재생';
    }

    function setSpeed(speed) {
      playSpeed = speed;
      document.querySelectorAll('.speed-btn').forEach(el => {
        el.classList.toggle('active', parseFloat(el.textContent) === speed);
      });
      if (isPlaying) { stopPlay(); togglePlay(); }
    }

    function updateNarration(html) {
      const nodes = scenarios[currentScenario].nodes;
      document.getElementById('narration').innerHTML
        = '<div class="narration-step-title">Step ' + (currentStep + 1)
        + ': ' + nodes[currentStep].label + '</div>'
        + '<div class="narration-body">' + html + '</div>';
    }

    document.addEventListener('DOMContentLoaded', () => { renderPipeline(); });
  </script>
</body>
</html>
