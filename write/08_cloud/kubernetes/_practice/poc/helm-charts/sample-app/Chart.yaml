apiVersion: v2
name: sample-app
description: A sample Helm chart for Kubernetes learning
type: application

# Chart 버전 (Helm chart 자체의 버전)
version: 0.1.0

# 애플리케이션 버전 (배포되는 앱의 버전)
appVersion: "1.0.0"

# 유지 관리자 정보 (선택 사항)
maintainers:
  - name: Kubernetes PoC
    email: example@example.com

# 키워드 (선택 사항)
keywords:
  - kubernetes
  - learning
  - sample
  - nginx

# 홈페이지 (선택 사항)
# home: https://github.com/example/sample-app

# 소스 코드 (선택 사항)
# sources:
#   - https://github.com/example/sample-app

# 의존성 (다른 차트를 서브차트로 포함 시)
# dependencies:
#   - name: redis
#     version: "17.x.x"
#     repository: "https://charts.bitnami.com/bitnami"
#     condition: redis.enabled
