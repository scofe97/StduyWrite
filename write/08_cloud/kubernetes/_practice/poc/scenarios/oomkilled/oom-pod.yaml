# OOMKilled 재현 — 메모리 limit(64Mi)보다 많이 쓰는 컨테이너
#
# 적용:   kubectl apply -f oom-pod.yaml
# 관찰:   kubectl get pod oom-demo -n ch06-hpa -w
#         → Running → OOMKilled → CrashLoopBackOff 반복
# 진단:   kubectl describe pod oom-demo -n ch06-hpa | grep -A3 "Last State"
#         → Reason: OOMKilled, Exit Code: 137 (128 + SIGKILL 9)
# 정리:   kubectl delete -f oom-pod.yaml
#
# 학습: 05-12.OOMKilled 사례 분석 / 05-10.자원 관리
apiVersion: v1
kind: Pod
metadata:
  name: oom-demo
  namespace: ch06-hpa
  labels:
    scenario: oomkilled
spec:
  restartPolicy: Always
  containers:
    - name: memory-hog
      image: polinux/stress:latest
      # limit 64Mi 인데 150M 을 할당 → cgroup memory.max 초과 → 커널 OOM Killer
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "150M", "--vm-hang", "1"]
      resources:
        requests:
          memory: "32Mi"
        limits:
          memory: "64Mi"
