<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullstack Docker Compose</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        h1 { text-align: center; margin-bottom: 30px; }
        .service {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .service h3 { margin-top: 0; }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #45a049; }
        #result { margin-top: 20px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fullstack Docker Compose</h1>

        <div class="service">
            <h3>Frontend (Nginx)</h3>
            <p>현재 페이지를 제공하는 웹 서버</p>
        </div>

        <div class="service">
            <h3>Backend (Go API)</h3>
            <p>REST API 서버</p>
            <button onclick="testAPI('/api/health')">Health Check</button>
            <button onclick="testAPI('/api/hello')">Hello API</button>
        </div>

        <div class="service">
            <h3>Database (PostgreSQL)</h3>
            <p>Port: 5432</p>
        </div>

        <div class="service">
            <h3>Cache (Redis)</h3>
            <p>Port: 6379</p>
        </div>

        <div id="result"></div>
    </div>

    <script>
        async function testAPI(endpoint) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Loading...';

            try {
                const response = await fetch(endpoint);
                const data = await response.json();
                resultDiv.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                resultDiv.innerHTML = '<p style="color: #ff6b6b;">Error: ' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
