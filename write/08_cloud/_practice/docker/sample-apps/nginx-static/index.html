<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker PoC - Static Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 30px;
        }
        p {
            font-size: 1.2em;
            line-height: 1.6;
        }
        .info {
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐳 Docker PoC</h1>
        <p>Docker 실습용 정적 웹사이트입니다.</p>
        <div class="info">
            <h2>실습 정보</h2>
            <p><strong>이미지:</strong> nginx:alpine</p>
            <p><strong>포트:</strong> 80</p>
            <p><strong>용도:</strong> 정적 파일 서빙 데모</p>
        </div>
    </div>
</body>
</html>
