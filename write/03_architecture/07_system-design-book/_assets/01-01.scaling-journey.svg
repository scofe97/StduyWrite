<svg viewBox="0 0 900 620" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>0부터 수백만 사용자까지 — 점진 확장 여정과 최종 아키텍처</title>
  <desc>단일 서버에서 시작해 DB 분리, 로드밸런서, DB 복제, 캐시, CDN, 무상태 웹 계층, 멀티 데이터센터, 메시지 큐, 로깅·자동화, DB 샤딩까지 11단계로 확장하는 과정과, 그 결과로 만들어지는 최종 아키텍처를 한 장에 정리한 종합도.</desc>

  <rect x="0" y="0" width="900" height="620" fill="#0d0d0d"/>

  <!-- 제목 -->
  <text x="30" y="40" fill="rgb(212,168,83)" font-size="20" font-weight="bold">확장 여정 — 0부터 수백만 사용자까지</text>
  <text x="30" y="62" fill="rgb(138,133,128)" font-size="12">병목이 생길 때마다 한 계층씩 추가한다. 순서가 곧 우선순위다.</text>

  <!-- ===== 좌측: 11단계 타임라인 ===== -->
  <text x="30" y="98" fill="#e8e4df" font-size="14" font-weight="bold">점진 확장 11단계</text>
  <line x1="44" y1="112" x2="44" y2="588" stroke="rgb(42,37,32)" stroke-width="2"/>

  <!-- 각 단계: 점 + 라벨 -->
  <!-- 1 -->
  <circle cx="44" cy="128" r="5" fill="rgb(212,168,83)"/>
  <text x="60" y="124" fill="#e8e4df" font-size="12.5">1. 단일 서버</text>
  <text x="60" y="140" fill="rgb(138,133,128)" font-size="10.5">웹·DB·캐시가 한 서버에</text>
  <!-- 2 -->
  <circle cx="44" cy="170" r="5" fill="rgb(212,168,83)"/>
  <text x="60" y="166" fill="#e8e4df" font-size="12.5">2. 웹/DB 계층 분리</text>
  <text x="60" y="182" fill="rgb(138,133,128)" font-size="10.5">독립적으로 확장하려고</text>
  <!-- 3 -->
  <circle cx="44" cy="212" r="5" fill="rgb(212,168,83)"/>
  <text x="60" y="208" fill="#e8e4df" font-size="12.5">3. 로드밸런서 + 웹 다중화</text>
  <text x="60" y="224" fill="rgb(138,133,128)" font-size="10.5">웹 계층 장애 대비·부하 분산</text>
  <!-- 4 -->
  <circle cx="44" cy="254" r="5" fill="rgb(212,168,83)"/>
  <text x="60" y="250" fill="#e8e4df" font-size="12.5">4. DB 복제 (master/slave)</text>
  <text x="60" y="266" fill="rgb(138,133,128)" font-size="10.5">읽기 분산·DB 장애 대비</text>
  <!-- 5 -->
  <circle cx="44" cy="296" r="5" fill="rgb(212,168,83)"/>
  <text x="60" y="292" fill="#e8e4df" font-size="12.5">5. 캐시 계층</text>
  <text x="60" y="308" fill="rgb(138,133,128)" font-size="10.5">반복 읽기를 메모리로, DB 부하↓</text>
  <!-- 6 -->
  <circle cx="44" cy="338" r="5" fill="rgb(212,168,83)"/>
  <text x="60" y="334" fill="#e8e4df" font-size="12.5">6. CDN</text>
  <text x="60" y="350" fill="rgb(138,133,128)" font-size="10.5">정적 자산을 사용자 가까이에서</text>
  <!-- 7 -->
  <circle cx="44" cy="380" r="5" fill="rgb(212,168,83)"/>
  <text x="60" y="376" fill="#e8e4df" font-size="12.5">7. 무상태 웹 계층</text>
  <text x="60" y="392" fill="rgb(138,133,128)" font-size="10.5">세션을 공유 저장소로 → 자유로운 확장</text>
  <!-- 8 -->
  <circle cx="44" cy="422" r="5" fill="rgb(212,168,83)"/>
  <text x="60" y="418" fill="#e8e4df" font-size="12.5">8. 멀티 데이터센터</text>
  <text x="60" y="434" fill="rgb(138,133,128)" font-size="10.5">geoDNS 라우팅 + DC 장애 시 우회</text>
  <!-- 9 -->
  <circle cx="44" cy="464" r="5" fill="rgb(212,168,83)"/>
  <text x="60" y="460" fill="#e8e4df" font-size="12.5">9. 메시지 큐</text>
  <text x="60" y="476" fill="rgb(138,133,128)" font-size="10.5">컴포넌트 비동기 결합·독립 확장</text>
  <!-- 10 -->
  <circle cx="44" cy="506" r="5" fill="rgb(212,168,83)"/>
  <text x="60" y="502" fill="#e8e4df" font-size="12.5">10. 로깅·메트릭·자동화</text>
  <text x="60" y="518" fill="rgb(138,133,128)" font-size="10.5">규모가 커지면 관찰·자동화는 필수</text>
  <!-- 11 -->
  <circle cx="44" cy="548" r="6" fill="#66bb6a"/>
  <text x="60" y="544" fill="#e8e4df" font-size="12.5" font-weight="bold">11. DB 샤딩</text>
  <text x="60" y="560" fill="rgb(138,133,128)" font-size="10.5">데이터 계층을 수평 분할 → 수백만 명</text>

  <!-- ===== 우측: 최종 아키텍처 ===== -->
  <text x="470" y="98" fill="#e8e4df" font-size="14" font-weight="bold">최종 아키텍처</text>
  <rect x="470" y="110" width="400" height="478" fill="none" stroke="rgb(42,37,32)" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- User -->
  <rect x="610" y="128" width="120" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="670" y="153" fill="#e8e4df" font-size="12.5" text-anchor="middle">User (웹·모바일)</text>

  <!-- DNS / CDN 좌우 -->
  <rect x="490" y="128" width="100" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="540" y="153" fill="#e8e4df" font-size="12" text-anchor="middle">DNS</text>
  <rect x="750" y="128" width="100" height="40" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="800" y="153" fill="#e8e4df" font-size="12" text-anchor="middle">CDN</text>
  <line x1="610" y1="148" x2="592" y2="148" stroke="rgb(138,133,128)" stroke-width="1.5"/>
  <line x1="730" y1="148" x2="748" y2="148" stroke="rgb(138,133,128)" stroke-width="1.5"/>

  <!-- Load balancer -->
  <rect x="600" y="200" width="140" height="38" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="670" y="224" fill="#e8e4df" font-size="12.5" text-anchor="middle">Load Balancer</text>
  <line x1="670" y1="168" x2="670" y2="200" stroke="rgb(138,133,128)" stroke-width="1.5"/>

  <!-- Web tier (stateless, auto scale) -->
  <rect x="580" y="268" width="180" height="46" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="670" y="290" fill="#e8e4df" font-size="12.5" text-anchor="middle">Web tier (무상태)</text>
  <text x="670" y="306" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">Auto Scale</text>
  <line x1="670" y1="238" x2="670" y2="268" stroke="rgb(138,133,128)" stroke-width="1.5"/>

  <!-- 하단 4개: DB샤드 / 캐시 / MQ→Worker / NoSQL -->
  <!-- DB 샤드 -->
  <rect x="490" y="360" width="120" height="56" fill="rgb(26,26,26)" stroke="#66bb6a"/>
  <text x="550" y="384" fill="#e8e4df" font-size="12" text-anchor="middle">DB 샤드</text>
  <text x="550" y="402" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">shard 0..N</text>
  <!-- 캐시 -->
  <rect x="628" y="360" width="84" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="670" y="392" fill="#e8e4df" font-size="12" text-anchor="middle">Cache</text>
  <!-- NoSQL -->
  <rect x="730" y="360" width="120" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="790" y="384" fill="#e8e4df" font-size="12" text-anchor="middle">NoSQL</text>
  <text x="790" y="402" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">세션·대용량</text>

  <line x1="620" y1="314" x2="550" y2="360" stroke="rgb(138,133,128)" stroke-width="1.5"/>
  <line x1="670" y1="314" x2="670" y2="360" stroke="rgb(138,133,128)" stroke-width="1.5"/>
  <line x1="720" y1="314" x2="790" y2="360" stroke="rgb(138,133,128)" stroke-width="1.5"/>

  <!-- MQ → Worker -->
  <rect x="560" y="450" width="130" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="625" y="475" fill="#e8e4df" font-size="12" text-anchor="middle">Message Queue</text>
  <rect x="710" y="450" width="120" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="770" y="475" fill="#e8e4df" font-size="12" text-anchor="middle">Worker</text>
  <line x1="690" y1="470" x2="710" y2="470" stroke="rgb(138,133,128)" stroke-width="1.5"/>
  <line x1="625" y1="416" x2="625" y2="450" stroke="rgb(138,133,128)" stroke-width="1.5"/>

  <!-- 관찰 도구 -->
  <rect x="500" y="524" width="340" height="40" fill="rgba(212,168,83,0.08)" stroke="rgb(42,37,32)"/>
  <text x="670" y="549" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">Logging · Metrics · Monitoring · Automation</text>

  <!-- 하단 한 줄 결론 -->
  <text x="30" y="608" fill="rgb(212,168,83)" font-size="11.5">핵심: 웹 계층은 무상태로, 모든 계층에 이중화를, 데이터는 최대한 캐시·CDN으로, 데이터 계층은 샤딩으로 확장한다.</text>
</svg>
