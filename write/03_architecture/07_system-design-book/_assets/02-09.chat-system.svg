<svg viewBox="0 0 900 640" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>채팅 시스템 — WebSocket·아키텍처·1:1 메시지 흐름·온라인 상태</title>
  <desc>polling·long polling·WebSocket 통신 프로토콜 비교, 무상태·상태유지·외부연동 아키텍처, 1:1 메시지가 채팅 서버를 거쳐 동기 큐와 KV 저장소로 가는 흐름, heartbeat 기반 온라인 상태 관리를 한 장에 정리한 종합도.</desc>

  <rect x="0" y="0" width="900" height="640" fill="#0d0d0d"/>

  <text x="30" y="40" fill="rgb(212,168,83)" font-size="20" font-weight="bold">채팅 시스템 (Chat System)</text>
  <text x="30" y="62" fill="rgb(138,133,128)" font-size="12">실시간 양방향 통신이 핵심. 5천만 DAU·1:1·소그룹(100명)·온라인 상태 지원.</text>

  <!-- 통신 프로토콜 비교 -->
  <text x="30" y="92" fill="#e8e4df" font-size="14" font-weight="bold">통신 프로토콜</text>
  <rect x="30" y="104" width="270" height="120" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="46" y="126" fill="#e8e4df" font-size="12" font-weight="bold">polling</text>
  <text x="46" y="146" fill="#e8e4df" font-size="10">주기적으로 "새 메시지?" 질문</text>
  <text x="46" y="164" fill="#f44336" font-size="10">− 대부분 빈 응답 → 자원 낭비</text>

  <rect x="315" y="104" width="270" height="120" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="331" y="126" fill="#e8e4df" font-size="12" font-weight="bold">long polling</text>
  <text x="331" y="146" fill="#e8e4df" font-size="10">새 메시지·타임아웃까지 연결 유지</text>
  <text x="331" y="164" fill="#f44336" font-size="10">− 송수신 서버 불일치 · 단절 감지 약함</text>

  <rect x="600" y="104" width="270" height="120" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)"/>
  <text x="616" y="126" fill="rgb(212,168,83)" font-size="12" font-weight="bold">WebSocket (채택)</text>
  <text x="616" y="146" fill="#e8e4df" font-size="10">양방향 · 영속 연결 (HTTP 업그레이드)</text>
  <text x="616" y="164" fill="#66bb6a" font-size="10">+ 서버→클라 푸시 · 방화벽 통과(80/443)</text>
  <text x="616" y="184" fill="rgb(138,133,128)" font-size="10">송신·수신 모두 ws 로 단순화</text>
  <text x="616" y="204" fill="rgb(138,133,128)" font-size="10">→ 연결 관리가 서버 핵심 과제</text>

  <!-- 아키텍처 3분류 -->
  <text x="30" y="252" fill="#e8e4df" font-size="14" font-weight="bold">아키텍처 3분류</text>
  <rect x="30" y="264" width="270" height="96" fill="rgba(102,187,106,0.06)" stroke="rgb(42,37,32)"/>
  <text x="46" y="286" fill="#66bb6a" font-size="11.5" font-weight="bold">무상태 (stateless)</text>
  <text x="46" y="306" fill="#e8e4df" font-size="10">로그인·가입·프로필·그룹관리</text>
  <text x="46" y="324" fill="#e8e4df" font-size="10">service discovery(Zookeeper)가</text>
  <text x="46" y="340" fill="#e8e4df" font-size="10">최적 채팅 서버를 골라줌</text>

  <rect x="315" y="264" width="270" height="96" fill="rgba(212,168,83,0.08)" stroke="rgb(42,37,32)"/>
  <text x="331" y="286" fill="rgb(212,168,83)" font-size="11.5" font-weight="bold">상태유지 (stateful)</text>
  <text x="331" y="306" fill="#e8e4df" font-size="10">채팅 서비스만 stateful</text>
  <text x="331" y="324" fill="#e8e4df" font-size="10">(클라가 ws 영속 연결 유지)</text>
  <text x="331" y="340" fill="#e8e4df" font-size="10">presence 서버 = 온라인 상태</text>

  <rect x="600" y="264" width="270" height="96" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="616" y="286" fill="#e8e4df" font-size="11.5" font-weight="bold">외부 연동 + 저장</text>
  <text x="616" y="306" fill="#e8e4df" font-size="10">푸시 알림(앱 미실행 시 알림)</text>
  <text x="616" y="324" fill="#e8e4df" font-size="10">KV 저장소 = 채팅 이력(HBase·</text>
  <text x="616" y="340" fill="#e8e4df" font-size="10">Cassandra). 1:1 read:write ≈ 1:1</text>

  <!-- 1:1 메시지 흐름 -->
  <text x="30" y="388" fill="#e8e4df" font-size="14" font-weight="bold">1:1 메시지 흐름</text>
  <rect x="30" y="400" width="840" height="78" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>

  <defs>
    <marker id="ca" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(138,133,128)"/>
    </marker>
  </defs>

  <rect x="46" y="422" width="96" height="36" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="94" y="444" fill="#e8e4df" font-size="10" text-anchor="middle">① User A 송신</text>
  <rect x="172" y="422" width="110" height="36" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="227" y="440" fill="#e8e4df" font-size="10" text-anchor="middle">Chat server 1</text>
  <text x="227" y="453" fill="rgb(138,133,128)" font-size="8" text-anchor="middle">② ID 생성기</text>
  <rect x="312" y="422" width="120" height="36" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="372" y="444" fill="#e8e4df" font-size="10" text-anchor="middle">③ 메시지 동기 큐</text>
  <rect x="462" y="422" width="90" height="36" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="507" y="444" fill="#e8e4df" font-size="10" text-anchor="middle">④ KV 저장</text>
  <rect x="582" y="422" width="130" height="36" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="647" y="440" fill="#e8e4df" font-size="10" text-anchor="middle">Chat server 2</text>
  <text x="647" y="453" fill="rgb(138,133,128)" font-size="8" text-anchor="middle">⑤ online·offline 분기</text>
  <rect x="742" y="422" width="110" height="36" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="797" y="444" fill="#e8e4df" font-size="10" text-anchor="middle">⑥ User B 수신</text>

  <line x1="142" y1="440" x2="172" y2="440" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#ca)"/>
  <line x1="282" y1="440" x2="312" y2="440" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#ca)"/>
  <line x1="432" y1="440" x2="462" y2="440" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#ca)"/>
  <line x1="552" y1="440" x2="582" y2="440" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#ca)"/>
  <line x1="712" y1="440" x2="742" y2="440" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#ca)"/>

  <!-- 온라인 상태 + 다중기기 -->
  <text x="30" y="510" fill="#e8e4df" font-size="14" font-weight="bold">온라인 상태 · 다중 기기</text>
  <rect x="30" y="522" width="410" height="100" fill="rgba(212,168,83,0.06)" stroke="rgb(42,37,32)"/>
  <text x="46" y="544" fill="rgb(212,168,83)" font-size="11.5" font-weight="bold">heartbeat 로 단절 처리</text>
  <text x="46" y="564" fill="#e8e4df" font-size="10">클라가 5초마다 heartbeat 전송. x초(예 30초)</text>
  <text x="46" y="580" fill="#e8e4df" font-size="10">안 오면 offline. 잦은 재연결로 깜빡임 방지.</text>
  <text x="46" y="602" fill="#e8e4df" font-size="10">친구 통지: pub-sub(친구쌍마다 채널) — 소그룹용.</text>

  <rect x="460" y="522" width="410" height="100" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="476" y="544" fill="rgb(212,168,83)" font-size="11.5" font-weight="bold">다중 기기 동기화</text>
  <text x="476" y="564" fill="#e8e4df" font-size="10">기기마다 cur_max_message_id 유지.</text>
  <text x="476" y="580" fill="#e8e4df" font-size="10">수신자 ID 일치 + 메시지 ID &gt; cur_max → 새 메시지.</text>
  <text x="476" y="602" fill="#e8e4df" font-size="10">그룹: 동기 큐 = 수신자별 inbox(WeChat 500명 제한).</text>
</svg>
