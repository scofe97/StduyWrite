<svg viewBox="0 0 900 640" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>YouTube — 업로드·스트리밍 흐름과 트랜스코딩 DAG 아키텍처</title>
  <desc>비디오 업로드가 원본 저장소·트랜스코딩·CDN 을 거치는 흐름, CDN 으로 스트리밍하는 흐름, 전처리기·DAG 스케줄러·리소스 매니저·태스크 워커로 이뤄진 트랜스코딩 DAG 아키텍처, GOP 병렬 업로드·메시지 큐·비용 절감 같은 최적화를 한 장에 정리한 종합도.</desc>

  <rect x="0" y="0" width="900" height="640" fill="#0d0d0d"/>

  <text x="30" y="40" fill="rgb(212,168,83)" font-size="20" font-weight="bold">YouTube (비디오 스트리밍)</text>
  <text x="30" y="62" fill="rgb(138,133,128)" font-size="12">CDN + 블롭 스토리지를 빌려 쓴다. 핵심은 트랜스코딩과 CDN 비용 절감. CDN 만 일 $150k.</text>

  <defs>
    <marker id="ya" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(138,133,128)"/>
    </marker>
  </defs>

  <!-- 업로드 흐름 -->
  <text x="30" y="92" fill="#e8e4df" font-size="14" font-weight="bold">업로드 흐름</text>
  <rect x="30" y="104" width="840" height="64" fill="rgba(102,187,106,0.06)" stroke="rgb(42,37,32)"/>
  <rect x="46" y="122" width="120" height="32" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="106" y="142" fill="#e8e4df" font-size="10" text-anchor="middle">원본 저장소(blob)</text>
  <rect x="206" y="122" width="120" height="32" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="266" y="142" fill="#e8e4df" font-size="10" text-anchor="middle">트랜스코딩 서버</text>
  <rect x="366" y="122" width="120" height="32" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="426" y="142" fill="#e8e4df" font-size="10" text-anchor="middle">트랜스코딩 저장소</text>
  <rect x="526" y="122" width="80" height="32" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="566" y="142" fill="#e8e4df" font-size="10" text-anchor="middle">CDN</text>
  <rect x="646" y="122" width="120" height="32" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="706" y="138" fill="#e8e4df" font-size="9.5" text-anchor="middle">완료 큐 → 핸들러</text>
  <text x="706" y="150" fill="rgb(138,133,128)" font-size="8" text-anchor="middle">메타DB·캐시 갱신</text>
  <line x1="166" y1="138" x2="206" y2="138" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#ya)"/>
  <line x1="326" y1="138" x2="366" y2="138" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#ya)"/>
  <line x1="486" y1="138" x2="526" y2="138" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#ya)"/>
  <line x1="326" y1="130" x2="646" y2="130" stroke="rgb(138,133,128)" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#ya)"/>
  <text x="500" y="124" fill="rgb(138,133,128)" font-size="8">완료 이벤트(병렬)</text>

  <!-- 스트리밍 흐름 -->
  <text x="30" y="194" fill="#e8e4df" font-size="14" font-weight="bold">스트리밍 흐름</text>
  <text x="46" y="218" fill="#e8e4df" font-size="10.5">클라이언트는 가장 가까운 CDN 엣지에서 영상을 받는다. 스트리밍 프로토콜(MPEG-DASH·Apple HLS)로</text>
  <text x="46" y="234" fill="#e8e4df" font-size="10.5">조금씩 받아 바로 재생. 다운로드(전체 복사)와 달리 스트리밍은 연속 수신 — 네트워크에 맞춰 화질 전환.</text>

  <!-- 트랜스코딩 DAG -->
  <text x="30" y="268" fill="#e8e4df" font-size="14" font-weight="bold">트랜스코딩 DAG 아키텍처</text>
  <rect x="30" y="280" width="840" height="80" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <rect x="46" y="304" width="110" height="34" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="101" y="320" fill="#e8e4df" font-size="10" text-anchor="middle">전처리기</text>
  <text x="101" y="332" fill="rgb(138,133,128)" font-size="8" text-anchor="middle">GOP 분할·DAG 생성</text>
  <rect x="196" y="304" width="110" height="34" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="251" y="320" fill="#e8e4df" font-size="10" text-anchor="middle">DAG 스케줄러</text>
  <text x="251" y="332" fill="rgb(138,133,128)" font-size="8" text-anchor="middle">단계별 태스크 분할</text>
  <rect x="346" y="304" width="120" height="34" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="406" y="320" fill="#e8e4df" font-size="10" text-anchor="middle">리소스 매니저</text>
  <text x="406" y="332" fill="rgb(138,133,128)" font-size="8" text-anchor="middle">3큐 + 스케줄러</text>
  <rect x="506" y="304" width="120" height="34" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="566" y="320" fill="#e8e4df" font-size="10" text-anchor="middle">태스크 워커</text>
  <text x="566" y="332" fill="rgb(138,133,128)" font-size="8" text-anchor="middle">인코딩·썸네일·워터마크</text>
  <rect x="666" y="304" width="100" height="34" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="716" y="324" fill="#e8e4df" font-size="10" text-anchor="middle">인코딩 결과</text>
  <line x1="156" y1="321" x2="196" y2="321" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#ya)"/>
  <line x1="306" y1="321" x2="346" y2="321" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#ya)"/>
  <line x1="466" y1="321" x2="506" y2="321" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#ya)"/>
  <line x1="626" y1="321" x2="666" y2="321" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#ya)"/>
  <text x="46" y="354" fill="rgb(138,133,128)" font-size="9">DAG 모델로 영상을 비디오·오디오·메타데이터로 나눠 단계별 병렬 처리(인코딩·썸네일·워터마크).</text>

  <!-- 최적화 -->
  <text x="30" y="394" fill="#e8e4df" font-size="14" font-weight="bold">시스템 최적화</text>
  <rect x="30" y="406" width="410" height="100" fill="rgba(212,168,83,0.06)" stroke="rgb(42,37,32)"/>
  <text x="46" y="428" fill="rgb(212,168,83)" font-size="11.5" font-weight="bold">속도·안전</text>
  <text x="46" y="448" fill="#e8e4df" font-size="10">· GOP 단위 분할 → 병렬·재개 가능 업로드</text>
  <text x="46" y="466" fill="#e8e4df" font-size="10">· 업로드 센터를 사용자 가까이(CDN 활용)</text>
  <text x="46" y="484" fill="#e8e4df" font-size="10">· 메시지 큐로 모듈 분리 → 병렬성↑</text>
  <text x="46" y="500" fill="#e8e4df" font-size="10">· pre-signed URL · DRM·AES·워터마크</text>

  <rect x="460" y="406" width="410" height="100" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="476" y="428" fill="rgb(212,168,83)" font-size="11.5" font-weight="bold">비용 절감 (long-tail)</text>
  <text x="476" y="448" fill="#e8e4df" font-size="10">인기 영상만 CDN, 나머지는 고용량 서버</text>
  <text x="476" y="466" fill="#e8e4df" font-size="10">· 비인기 영상은 인코딩 버전 줄이고 on-demand</text>
  <text x="476" y="484" fill="#e8e4df" font-size="10">· 지역 한정 인기 영상은 그 지역에만 분배</text>
  <text x="476" y="502" fill="#e8e4df" font-size="10">· 자체 CDN + ISP 제휴(Netflix Open Connect)</text>

  <!-- 에러 처리 -->
  <text x="30" y="540" fill="#e8e4df" font-size="14" font-weight="bold">에러 처리</text>
  <rect x="30" y="552" width="840" height="70" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="46" y="574" fill="#66bb6a" font-size="10.5">복구 가능(recoverable): 세그먼트 트랜스코딩 실패 등 → 몇 차례 재시도, 안 되면 적절한 에러 코드 반환.</text>
  <text x="46" y="594" fill="#f44336" font-size="10.5">복구 불가(non-recoverable): 잘못된 영상 포맷 등 → 관련 태스크 중단 후 에러 코드 반환.</text>
  <text x="46" y="614" fill="rgb(138,133,128)" font-size="9.5">컴포넌트별 playbook: API 서버는 무상태라 다른 서버로, 메타DB master 죽으면 slave 승격.</text>
</svg>
