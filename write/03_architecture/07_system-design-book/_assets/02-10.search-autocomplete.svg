<svg viewBox="0 0 900 620" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>검색어 자동완성 — 트라이 구조·조회 흐름·데이터 수집</title>
  <desc>접두사로 인기 검색어 top k 를 반환하는 자동완성 시스템. 노드마다 top k 를 캐시한 트라이 구조로 O(1) 조회를 달성하고, 트라이 캐시·DB 를 거치는 조회 흐름과 analytics log·aggregator·worker 로 트라이를 주간 갱신하는 데이터 수집 파이프라인을 한 장에 정리한 종합도.</desc>

  <rect x="0" y="0" width="900" height="620" fill="#0d0d0d"/>

  <text x="30" y="40" fill="rgb(212,168,83)" font-size="20" font-weight="bold">검색어 자동완성 (Search Autocomplete)</text>
  <text x="30" y="62" fill="rgb(138,133,128)" font-size="12">접두사 입력마다 인기 top 5 반환. 100ms 안에 응답해야 하므로 트라이 + 노드별 top k 캐시.</text>

  <!-- 트라이 -->
  <text x="30" y="92" fill="#e8e4df" font-size="14" font-weight="bold">트라이 (prefix tree) + 노드별 top k 캐시</text>

  <defs>
    <marker id="ta" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="rgb(138,133,128)"/>
    </marker>
  </defs>

  <!-- root -->
  <rect x="220" y="104" width="50" height="30" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="245" y="124" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">root</text>
  <!-- b node (with top k cache) -->
  <rect x="160" y="156" width="50" height="30" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="185" y="176" fill="#e8e4df" font-size="11" text-anchor="middle">b</text>
  <rect x="20" y="152" width="130" height="38" fill="none" stroke="rgb(42,37,32)" stroke-dasharray="3 3"/>
  <text x="28" y="168" fill="rgb(138,133,128)" font-size="8.5">[best:35, bet:29,</text>
  <text x="28" y="182" fill="rgb(138,133,128)" font-size="8.5"> bee:20, be:15]</text>
  <line x1="150" y1="171" x2="160" y2="171" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#ta)"/>

  <rect x="160" y="208" width="50" height="30" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="185" y="228" fill="#e8e4df" font-size="10" text-anchor="middle">be:15</text>
  <rect x="130" y="260" width="60" height="30" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="160" y="280" fill="#e8e4df" font-size="10" text-anchor="middle">bee:20</text>
  <rect x="206" y="260" width="60" height="30" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="236" y="280" fill="#e8e4df" font-size="10" text-anchor="middle">bet:29</text>
  <rect x="130" y="312" width="64" height="30" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="162" y="332" fill="#e8e4df" font-size="10" text-anchor="middle">best:35</text>

  <line x1="225" y1="134" x2="190" y2="156" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#ta)"/>
  <line x1="185" y1="186" x2="185" y2="208" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#ta)"/>
  <line x1="180" y1="238" x2="162" y2="260" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#ta)"/>
  <line x1="195" y1="238" x2="232" y2="260" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#ta)"/>
  <line x1="160" y1="290" x2="162" y2="312" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#ta)"/>

  <!-- 알고리즘 설명 -->
  <rect x="300" y="104" width="280" height="120" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="316" y="126" fill="#e8e4df" font-size="11.5" font-weight="bold">기본 top k 알고리즘</text>
  <text x="316" y="146" fill="#e8e4df" font-size="10">① 접두사 노드 찾기 O(p)</text>
  <text x="316" y="164" fill="#e8e4df" font-size="10">② 하위 트리 순회 O(c)</text>
  <text x="316" y="182" fill="#e8e4df" font-size="10">③ 자식 정렬 후 top k O(c log c)</text>
  <text x="316" y="204" fill="#f44336" font-size="10">→ 최악엔 전체 순회라 느림</text>

  <rect x="300" y="234" width="280" height="108" fill="rgba(102,187,106,0.06)" stroke="rgb(42,37,32)"/>
  <text x="316" y="256" fill="#66bb6a" font-size="11.5" font-weight="bold">두 가지 최적화 → O(1)</text>
  <text x="316" y="276" fill="#e8e4df" font-size="10">· 접두사 길이 제한(예 50) → O(p)를 O(1)로</text>
  <text x="316" y="294" fill="#e8e4df" font-size="10">· 노드마다 top k 미리 캐시 → 정렬 불필요</text>
  <text x="316" y="316" fill="rgb(138,133,128)" font-size="10">공간을 내주고 속도를 얻는다(trade space</text>
  <text x="316" y="330" fill="rgb(138,133,128)" font-size="10">for time). 응답 속도가 더 중요.</text>

  <!-- 조회 흐름 -->
  <rect x="600" y="104" width="280" height="238" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="616" y="126" fill="#e8e4df" font-size="11.5" font-weight="bold">조회 흐름 (query service)</text>
  <rect x="700" y="140" width="120" height="30" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="760" y="160" fill="#e8e4df" font-size="10" text-anchor="middle">Load Balancer</text>
  <rect x="700" y="184" width="120" height="30" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="760" y="204" fill="#e8e4df" font-size="10" text-anchor="middle">API servers</text>
  <rect x="700" y="228" width="120" height="30" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="760" y="248" fill="#e8e4df" font-size="10" text-anchor="middle">Trie Cache</text>
  <rect x="700" y="272" width="120" height="30" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="760" y="292" fill="#e8e4df" font-size="10" text-anchor="middle">Trie DB</text>
  <line x1="760" y1="170" x2="760" y2="184" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#ta)"/>
  <line x1="760" y1="214" x2="760" y2="228" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#ta)"/>
  <line x1="760" y1="258" x2="760" y2="272" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#ta)"/>
  <text x="616" y="320" fill="rgb(138,133,128)" font-size="9.5">+ AJAX · 브라우저 캐시(1시간) · 데이터 샘플링</text>

  <!-- 데이터 수집 -->
  <text x="30" y="372" fill="#e8e4df" font-size="14" font-weight="bold">데이터 수집 파이프라인 (주간 갱신)</text>
  <rect x="30" y="384" width="840" height="78" fill="rgba(212,168,83,0.06)" stroke="rgb(42,37,32)"/>

  <rect x="46" y="408" width="120" height="34" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="106" y="429" fill="#e8e4df" font-size="10" text-anchor="middle">Analytics Log</text>
  <rect x="206" y="408" width="120" height="34" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="266" y="429" fill="#e8e4df" font-size="10" text-anchor="middle">Aggregators</text>
  <rect x="366" y="408" width="130" height="34" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="431" y="429" fill="#e8e4df" font-size="10" text-anchor="middle">Aggregated Data</text>
  <rect x="536" y="408" width="110" height="34" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="591" y="429" fill="#e8e4df" font-size="10" text-anchor="middle">Workers</text>
  <rect x="686" y="408" width="90" height="34" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="731" y="429" fill="#e8e4df" font-size="10" text-anchor="middle">Trie DB</text>
  <rect x="796" y="408" width="58" height="34" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="825" y="429" fill="#e8e4df" font-size="10" text-anchor="middle">Cache</text>

  <line x1="166" y1="425" x2="206" y2="425" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#ta)"/>
  <line x1="326" y1="425" x2="366" y2="425" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#ta)"/>
  <line x1="496" y1="425" x2="536" y2="425" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#ta)"/>
  <line x1="646" y1="425" x2="686" y2="425" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#ta)"/>
  <line x1="776" y1="425" x2="796" y2="425" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#ta)"/>

  <text x="30" y="490" fill="#e8e4df" font-size="14" font-weight="bold">트라이 운영 · 확장</text>
  <rect x="30" y="502" width="840" height="100" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="46" y="524" fill="rgb(212,168,83)" font-size="11.5" font-weight="bold">운영(create·update·delete)</text>
  <text x="46" y="544" fill="#e8e4df" font-size="10">갱신은 주간 통째 교체(권장) 또는 노드 직접 수정(조상까지 갱신, 느림). 필터 레이어로 유해어 제거.</text>
  <text x="46" y="568" fill="rgb(212,168,83)" font-size="11.5" font-weight="bold">저장소 확장</text>
  <text x="46" y="588" fill="#e8e4df" font-size="10">첫 글자 샤딩은 불균형('c' > 'x'). shard map manager 가 이력 기반으로 샤드를 균등 배분.</text>
</svg>
