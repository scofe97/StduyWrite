<svg viewBox="0 0 900 560" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>분산 유일 ID 생성기 — 4가지 접근과 스노우플레이크 64비트 레이아웃</title>
  <desc>멀티마스터 복제, UUID, 티켓 서버, 트위터 스노우플레이크 네 접근의 장단점을 비교하고, 스노우플레이크 64비트 ID의 비트 레이아웃(부호 1비트, 타임스탬프 41비트, 데이터센터 5비트, 머신 5비트, 시퀀스 12비트)을 한 장에 정리한 종합도.</desc>

  <rect x="0" y="0" width="900" height="560" fill="#0d0d0d"/>

  <text x="30" y="40" fill="rgb(212,168,83)" font-size="20" font-weight="bold">분산 유일 ID 생성기</text>
  <text x="30" y="62" fill="rgb(138,133,128)" font-size="12">auto_increment 는 분산 환경에서 안 된다. 64비트·시간순 정렬·초당 1만개 이상이 목표.</text>

  <text x="30" y="92" fill="#e8e4df" font-size="14" font-weight="bold">4가지 접근 비교</text>

  <!-- 4 cards -->
  <rect x="30" y="106" width="200" height="150" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="46" y="130" fill="#e8e4df" font-size="13" font-weight="bold">① 멀티마스터 복제</text>
  <text x="46" y="152" fill="#e8e4df" font-size="10.5">서버 k대면 ID 를 k씩 증가</text>
  <text x="46" y="172" fill="#66bb6a" font-size="10.5">+ DB 수에 맞춰 확장</text>
  <text x="46" y="192" fill="#f44336" font-size="10.5">− 멀티 DC 확장 어려움</text>
  <text x="46" y="210" fill="#f44336" font-size="10.5">− 시간순 정렬 안 됨</text>
  <text x="46" y="230" fill="#f44336" font-size="10.5">− 서버 추가·제거에 취약</text>

  <rect x="244" y="106" width="200" height="150" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="260" y="130" fill="#e8e4df" font-size="13" font-weight="bold">② UUID</text>
  <text x="260" y="152" fill="#e8e4df" font-size="10.5">128비트, 서버 독립 생성</text>
  <text x="260" y="172" fill="#66bb6a" font-size="10.5">+ 단순 · 조정 불필요</text>
  <text x="260" y="190" fill="#66bb6a" font-size="10.5">+ 확장 쉬움</text>
  <text x="260" y="210" fill="#f44336" font-size="10.5">− 128비트 (요구는 64)</text>
  <text x="260" y="228" fill="#f44336" font-size="10.5">− 시간순 X · 숫자 아닐 수</text>

  <rect x="458" y="106" width="200" height="150" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="474" y="130" fill="#e8e4df" font-size="13" font-weight="bold">③ 티켓 서버</text>
  <text x="474" y="152" fill="#e8e4df" font-size="10.5">중앙 DB auto_increment</text>
  <text x="474" y="172" fill="#66bb6a" font-size="10.5">+ 숫자 ID · 구현 쉬움</text>
  <text x="474" y="190" fill="#66bb6a" font-size="10.5">+ 중소 규모에 적합</text>
  <text x="474" y="210" fill="#f44336" font-size="10.5">− 단일 장애점 (SPOF)</text>
  <text x="474" y="228" fill="rgb(138,133,128)" font-size="10.5">Flickr 사용</text>

  <rect x="672" y="106" width="198" height="150" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)"/>
  <text x="688" y="130" fill="rgb(212,168,83)" font-size="13" font-weight="bold">④ 스노우플레이크</text>
  <text x="688" y="152" fill="#e8e4df" font-size="10.5">64비트를 구획으로 분할</text>
  <text x="688" y="172" fill="#66bb6a" font-size="10.5">+ 64비트 · 시간순 정렬</text>
  <text x="688" y="190" fill="#66bb6a" font-size="10.5">+ 조정 불필요 · 확장</text>
  <text x="688" y="210" fill="#66bb6a" font-size="10.5">+ 모든 요구 충족 → 채택</text>
  <text x="688" y="228" fill="rgb(138,133,128)" font-size="10.5">Twitter 설계</text>

  <!-- 스노우플레이크 비트 레이아웃 -->
  <text x="30" y="304" fill="#e8e4df" font-size="14" font-weight="bold">스노우플레이크 64비트 레이아웃</text>

  <!-- 비트 바 -->
  <!-- sign 1bit -->
  <rect x="30" y="320" width="40" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="50" y="346" fill="#e8e4df" font-size="13" text-anchor="middle" font-family="'JetBrains Mono',monospace">0</text>
  <text x="50" y="392" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">1비트</text>
  <text x="50" y="408" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">부호</text>

  <!-- timestamp 41bit -->
  <rect x="70" y="320" width="380" height="56" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="260" y="346" fill="#e8e4df" font-size="13" text-anchor="middle">timestamp</text>
  <text x="260" y="392" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">41비트</text>
  <text x="260" y="408" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">ms 단위 · 시간순 정렬의 핵심 · 약 69년</text>

  <!-- datacenter 5bit -->
  <rect x="450" y="320" width="100" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="500" y="346" fill="#e8e4df" font-size="12" text-anchor="middle">DC ID</text>
  <text x="500" y="392" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">5비트</text>
  <text x="500" y="408" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">32 DC</text>

  <!-- machine 5bit -->
  <rect x="550" y="320" width="100" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="600" y="346" fill="#e8e4df" font-size="12" text-anchor="middle">머신 ID</text>
  <text x="600" y="392" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">5비트</text>
  <text x="600" y="408" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">DC당 32대</text>

  <!-- sequence 12bit -->
  <rect x="650" y="320" width="220" height="56" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="760" y="346" fill="#e8e4df" font-size="12" text-anchor="middle">sequence</text>
  <text x="760" y="392" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">12비트</text>
  <text x="760" y="408" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">같은 ms 내 0~4095 · ms마다 리셋</text>

  <!-- 설명 박스 -->
  <rect x="30" y="430" width="840" height="100" fill="rgba(212,168,83,0.06)" stroke="rgb(42,37,32)"/>
  <text x="46" y="454" fill="#e8e4df" font-size="11.5">· DC ID·머신 ID 는 시작 시 고정 (변경하면 ID 충돌 위험). timestamp·sequence 는 실행 중 생성.</text>
  <text x="46" y="478" fill="#e8e4df" font-size="11.5">· timestamp 가 상위 비트라 ID 가 시간순으로 정렬된다 — 정렬 가능 요구를 비트 배치로 만족.</text>
  <text x="46" y="502" fill="#e8e4df" font-size="11.5">· 한 머신이 같은 ms 안에 최대 4096개(2^12) 생성. 41비트 timestamp 는 약 69년 뒤 오버플로.</text>
  <text x="46" y="522" fill="rgb(212,168,83)" font-size="11">핵심: 분할 정복(divide and conquer) — ID 를 직접 만들지 않고 구획으로 나눠 조립한다.</text>
</svg>
