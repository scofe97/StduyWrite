<svg viewBox="0 0 900 640" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Google Drive — 아키텍처·블록 서버·동기화·저장공간 절약</title>
  <desc>파일을 블록으로 쪼개 압축·암호화해 클라우드 저장소에 올리는 블록 서버, delta sync 로 변경 블록만 전송하는 최적화, 메타데이터 DB·알림 서비스·오프라인 백업 큐로 이뤄진 아키텍처, first-win 동기화 충돌 해결, 중복 제거·버전 제한·콜드 스토리지 같은 저장공간 절약을 한 장에 정리한 종합도.</desc>

  <rect x="0" y="0" width="900" height="640" fill="#0d0d0d"/>

  <text x="30" y="40" fill="rgb(212,168,83)" font-size="20" font-weight="bold">Google Drive (파일 동기화·저장)</text>
  <text x="30" y="62" fill="rgb(138,133,128)" font-size="12">강한 일관성·빠른 동기화·낮은 대역폭이 핵심. 파일은 블록으로 쪼개 변경분만 전송한다.</text>

  <!-- 아키텍처 -->
  <text x="30" y="92" fill="#e8e4df" font-size="14" font-weight="bold">고수준 아키텍처</text>
  <rect x="30" y="104" width="840" height="120" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>

  <defs>
    <marker id="ga" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(138,133,128)"/>
    </marker>
  </defs>

  <rect x="380" y="118" width="110" height="30" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="435" y="138" fill="#e8e4df" font-size="10" text-anchor="middle">User (웹·모바일)</text>
  <rect x="380" y="162" width="110" height="30" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="435" y="182" fill="#e8e4df" font-size="10" text-anchor="middle">API 서버 (무상태)</text>
  <line x1="435" y1="148" x2="435" y2="162" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#ga)"/>

  <rect x="46" y="118" width="110" height="30" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="101" y="138" fill="#e8e4df" font-size="10" text-anchor="middle">블록 서버</text>
  <rect x="46" y="162" width="110" height="30" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="101" y="182" fill="#e8e4df" font-size="10" text-anchor="middle">클라우드 저장소(S3)</text>
  <rect x="46" y="200" width="110" height="20" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="101" y="214" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">콜드 스토리지</text>
  <line x1="101" y1="148" x2="101" y2="162" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#ga)"/>
  <line x1="380" y1="133" x2="156" y2="133" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#ga)"/>

  <rect x="200" y="162" width="100" height="30" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="250" y="182" fill="#e8e4df" font-size="10" text-anchor="middle">메타DB·캐시</text>
  <line x1="410" y1="192" x2="300" y2="180" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#ga)"/>

  <rect x="560" y="118" width="120" height="30" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="620" y="138" fill="#e8e4df" font-size="10" text-anchor="middle">알림 서비스</text>
  <text x="620" y="160" fill="rgb(138,133,128)" font-size="8.5" text-anchor="middle">long polling</text>
  <rect x="560" y="172" width="120" height="30" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="620" y="192" fill="#e8e4df" font-size="10" text-anchor="middle">오프라인 백업 큐</text>
  <line x1="490" y1="133" x2="560" y2="133" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#ga)"/>
  <line x1="620" y1="148" x2="620" y2="172" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#ga)"/>
  <text x="700" y="138" fill="rgb(138,133,128)" font-size="9">파일 변경 시 다른 기기에 통지</text>

  <!-- 블록 서버 delta sync -->
  <text x="30" y="258" fill="#e8e4df" font-size="14" font-weight="bold">블록 서버 — delta sync</text>
  <rect x="30" y="270" width="410" height="116" fill="rgba(212,168,83,0.06)" stroke="rgb(42,37,32)"/>
  <text x="46" y="292" fill="#e8e4df" font-size="11">파일 → 블록(최대 4MB) 분할 → 압축 → 암호화 → 업로드</text>
  <rect x="46" y="304" width="60" height="24" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="76" y="320" fill="#e8e4df" font-size="9" text-anchor="middle">분할</text>
  <rect x="120" y="304" width="60" height="24" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="150" y="320" fill="#e8e4df" font-size="9" text-anchor="middle">압축</text>
  <rect x="194" y="304" width="60" height="24" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="224" y="320" fill="#e8e4df" font-size="9" text-anchor="middle">암호화</text>
  <rect x="268" y="304" width="80" height="24" fill="rgba(102,187,106,0.15)" stroke="#66bb6a"/>
  <text x="308" y="320" fill="#e8e4df" font-size="9" text-anchor="middle">클라우드</text>
  <line x1="106" y1="316" x2="120" y2="316" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#ga)"/>
  <line x1="180" y1="316" x2="194" y2="316" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#ga)"/>
  <line x1="254" y1="316" x2="268" y2="316" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#ga)"/>
  <text x="46" y="352" fill="#66bb6a" font-size="10.5">delta sync: 수정된 블록만 전송(전체 X) → 대역폭 절약</text>
  <text x="46" y="372" fill="rgb(138,133,128)" font-size="10">예: 10블록 중 2·5번만 바뀌면 그 둘만 업로드.</text>

  <!-- 동기화 충돌 + 일관성 -->
  <rect x="460" y="270" width="410" height="116" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="476" y="292" fill="rgb(212,168,83)" font-size="11.5" font-weight="bold">동기화 충돌 · 강한 일관성</text>
  <text x="476" y="314" fill="#e8e4df" font-size="10">두 사용자 동시 수정 → first-win: 먼저 처리된 쪽이</text>
  <text x="476" y="330" fill="#e8e4df" font-size="10">이기고, 나중 쪽은 충돌 사본을 받아 병합·덮어쓰기 선택.</text>
  <text x="476" y="354" fill="#e8e4df" font-size="10">기본 강한 일관성: 캐시 복제본과 master 일치,</text>
  <text x="476" y="370" fill="#e8e4df" font-size="10">DB 쓰기 시 캐시 무효화. ACID 지원 RDBMS 선택.</text>

  <!-- 업로드/다운로드 흐름 -->
  <text x="30" y="420" fill="#e8e4df" font-size="14" font-weight="bold">업로드·다운로드 흐름</text>
  <rect x="30" y="432" width="410" height="92" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="46" y="454" fill="rgb(212,168,83)" font-size="11" font-weight="bold">업로드(병렬 2갈래)</text>
  <text x="46" y="474" fill="#e8e4df" font-size="10">① 메타데이터 추가(status: pending → uploaded)</text>
  <text x="46" y="490" fill="#e8e4df" font-size="10">② 블록 서버로 파일 업로드 → 클라우드</text>
  <text x="46" y="510" fill="rgb(138,133,128)" font-size="10">완료 시 알림 서비스가 다른 기기에 통지.</text>

  <rect x="460" y="432" width="410" height="92" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="476" y="454" fill="rgb(212,168,83)" font-size="11" font-weight="bold">다운로드</text>
  <text x="476" y="474" fill="#e8e4df" font-size="10">알림 받으면 → 메타데이터 조회 → 블록 다운로드</text>
  <text x="476" y="490" fill="#e8e4df" font-size="10">→ 블록을 순서대로 합쳐 파일 재구성.</text>
  <text x="476" y="510" fill="rgb(138,133,128)" font-size="10">오프라인이면 백업 큐에 저장, 온라인 시 동기화.</text>

  <!-- 저장공간 절약 + 장애 -->
  <text x="30" y="558" fill="#e8e4df" font-size="14" font-weight="bold">저장공간 절약 · 장애 처리</text>
  <rect x="30" y="570" width="840" height="56" fill="rgba(212,168,83,0.06)" stroke="rgb(42,37,32)"/>
  <text x="46" y="592" fill="#e8e4df" font-size="10.5">절약: 중복 블록 제거(같은 해시) · 버전 수 제한(가장 오래된 것 교체) · 비활성 데이터는 콜드 스토리지(S3 Glacier)</text>
  <text x="46" y="614" fill="#e8e4df" font-size="10.5">장애: LB heartbeat 이중화 · 블록 서버 죽으면 다른 서버가 이어받기 · S3 다중 리전 복제 · 메타DB master 죽으면 slave 승격</text>
</svg>
