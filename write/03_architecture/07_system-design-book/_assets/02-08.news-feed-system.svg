<svg viewBox="0 0 900 620" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>뉴스 피드 시스템 — fanout 모델과 하이브리드 전략</title>
  <desc>게시물을 친구 피드에 뿌리는 fanout on write(push)와 fanout on read(pull)의 트레이드오프, 일반 사용자는 push·셀럽은 pull 로 결합하는 하이브리드 전략, 피드 발행과 피드 조회 흐름, 5계층 캐시 아키텍처를 한 장에 정리한 종합도.</desc>

  <rect x="0" y="0" width="900" height="620" fill="#0d0d0d"/>

  <text x="30" y="40" fill="rgb(212,168,83)" font-size="20" font-weight="bold">뉴스 피드 시스템 (News Feed)</text>
  <text x="30" y="62" fill="rgb(138,133,128)" font-size="12">피드 발행(쓰기)과 피드 조회(읽기) 두 흐름. fanout 모델 선택이 핵심.</text>

  <!-- fanout 비교 -->
  <text x="30" y="92" fill="#e8e4df" font-size="14" font-weight="bold">fanout 모델 비교</text>
  <rect x="30" y="104" width="410" height="150" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="46" y="128" fill="#e8e4df" font-size="13" font-weight="bold">fanout on write (push)</text>
  <text x="46" y="150" fill="#e8e4df" font-size="10.5">쓰기 시점에 피드 미리 계산 → 친구 캐시에 즉시 전달</text>
  <text x="46" y="172" fill="#66bb6a" font-size="10.5">+ 실시간 · 조회 빠름(미리 계산됨)</text>
  <text x="46" y="192" fill="#f44336" font-size="10.5">− 친구 많으면 hotkey 문제(느림)</text>
  <text x="46" y="210" fill="#f44336" font-size="10.5">− 비활성 사용자에 자원 낭비</text>
  <text x="46" y="234" fill="rgb(138,133,128)" font-size="10">→ 대다수 일반 사용자에 적용</text>

  <rect x="460" y="104" width="410" height="150" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="476" y="128" fill="#e8e4df" font-size="13" font-weight="bold">fanout on read (pull)</text>
  <text x="476" y="150" fill="#e8e4df" font-size="10.5">조회 시점에 피드 생성 → on-demand 로 끌어옴</text>
  <text x="476" y="172" fill="#66bb6a" font-size="10.5">+ 비활성 사용자에 자원 안 씀</text>
  <text x="476" y="192" fill="#66bb6a" font-size="10.5">+ hotkey 문제 없음(푸시 안 함)</text>
  <text x="476" y="210" fill="#f44336" font-size="10.5">− 조회 느림(미리 계산 안 됨)</text>
  <text x="476" y="234" fill="rgb(138,133,128)" font-size="10">→ 셀럽·팔로워 많은 사용자에 적용</text>

  <!-- 하이브리드 -->
  <rect x="30" y="266" width="840" height="44" fill="rgba(212,168,83,0.1)" stroke="rgb(212,168,83)"/>
  <text x="46" y="284" fill="rgb(212,168,83)" font-size="12" font-weight="bold">하이브리드: 일반 사용자 = push · 셀럽 = pull</text>
  <text x="46" y="302" fill="#e8e4df" font-size="10.5">조회 속도가 중요하니 대다수는 push, 시스템 과부하를 막으려 셀럽은 pull. 안정 해시로 hotkey 완화.</text>

  <!-- feed publishing 흐름 -->
  <text x="30" y="342" fill="#e8e4df" font-size="14" font-weight="bold">피드 발행 흐름 (fanout service)</text>
  <rect x="30" y="354" width="840" height="78" fill="rgba(102,187,106,0.06)" stroke="rgb(42,37,32)"/>

  <defs>
    <marker id="fa" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(138,133,128)"/>
    </marker>
  </defs>

  <rect x="46" y="376" width="120" height="38" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="106" y="394" fill="#e8e4df" font-size="10" text-anchor="middle">Fanout Service</text>
  <text x="106" y="408" fill="rgb(138,133,128)" font-size="8" text-anchor="middle">① 친구 ID 조회(Graph DB)</text>
  <rect x="206" y="376" width="120" height="38" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="266" y="394" fill="#e8e4df" font-size="10" text-anchor="middle">친구 데이터·필터</text>
  <text x="266" y="408" fill="rgb(138,133,128)" font-size="8" text-anchor="middle">② mute·숨김 제외</text>
  <rect x="366" y="376" width="120" height="38" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="426" y="394" fill="#e8e4df" font-size="10" text-anchor="middle">Message Queue</text>
  <text x="426" y="408" fill="rgb(138,133,128)" font-size="8" text-anchor="middle">③ 친구목록+post ID</text>
  <rect x="526" y="376" width="120" height="38" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="586" y="394" fill="#e8e4df" font-size="10" text-anchor="middle">Fanout Workers</text>
  <text x="586" y="408" fill="rgb(138,133,128)" font-size="8" text-anchor="middle">④ 큐에서 꺼냄</text>
  <rect x="686" y="376" width="168" height="38" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="770" y="394" fill="#e8e4df" font-size="10" text-anchor="middle">News Feed Cache</text>
  <text x="770" y="408" fill="rgb(138,133,128)" font-size="8" text-anchor="middle">⑤ post_id,user_id 매핑(ID만)</text>

  <line x1="166" y1="395" x2="206" y2="395" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#fa)"/>
  <line x1="326" y1="395" x2="366" y2="395" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#fa)"/>
  <line x1="486" y1="395" x2="526" y2="395" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#fa)"/>
  <line x1="646" y1="395" x2="686" y2="395" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#fa)"/>

  <!-- feed retrieval 흐름 -->
  <text x="30" y="464" fill="#e8e4df" font-size="14" font-weight="bold">피드 조회 흐름 (read)</text>
  <text x="46" y="490" fill="#e8e4df" font-size="10.5">News Feed Service 가 News Feed Cache 에서 피드 ID 목록을 받고, User Cache·Post Cache 에서</text>
  <text x="46" y="506" fill="#e8e4df" font-size="10.5">사용자·게시물 객체를 채워(hydrate) 완성된 피드를 JSON 으로 반환. 미디어는 CDN 에서.</text>

  <!-- 5계층 캐시 -->
  <text x="460" y="464" fill="#e8e4df" font-size="14" font-weight="bold">5계층 캐시</text>
  <rect x="460" y="476" width="410" height="120" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="476" y="498" fill="#e8e4df" font-size="10.5"><tspan fill="rgb(212,168,83)">News Feed</tspan> — 피드 ID 목록</text>
  <text x="476" y="517" fill="#e8e4df" font-size="10.5"><tspan fill="rgb(212,168,83)">Content</tspan> — 게시물 데이터(인기글은 hot cache)</text>
  <text x="476" y="536" fill="#e8e4df" font-size="10.5"><tspan fill="rgb(212,168,83)">Social Graph</tspan> — 팔로워·팔로잉 관계</text>
  <text x="476" y="555" fill="#e8e4df" font-size="10.5"><tspan fill="rgb(212,168,83)">Action</tspan> — 좋아요·답글 등 행동</text>
  <text x="476" y="574" fill="#e8e4df" font-size="10.5"><tspan fill="rgb(212,168,83)">Counters</tspan> — 좋아요·답글·팔로워 카운터</text>

  <text x="30" y="613" fill="rgb(212,168,83)" font-size="11">핵심: 피드 캐시엔 ID만 저장(메모리 절약), 조회 때 객체를 채운다. 캐시가 성능의 전부.</text>
</svg>
