<svg viewBox="0 0 900 480" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>시스템 설계 면접 4단계 프레임워크 — 단계·시간 배분·산출물</title>
  <desc>시스템 설계 면접을 푸는 네 단계. 문제 이해와 범위 설정, 고수준 설계와 합의, 심층 설계, 마무리 순으로 진행하며, 45분 기준 각 단계의 권장 시간 배분과 핵심 활동, 산출물을 한 장에 정리한 종합도.</desc>

  <rect x="0" y="0" width="900" height="480" fill="#0d0d0d"/>

  <text x="30" y="40" fill="rgb(212,168,83)" font-size="20" font-weight="bold">시스템 설계 면접 4단계 프레임워크</text>
  <text x="30" y="62" fill="rgb(138,133,128)" font-size="12">정답을 빨리 내는 게 아니라, 모호한 문제를 함께 풀어가는 과정을 보여줍니다 (45분 기준)</text>

  <!-- 진행 화살표 베이스라인 -->
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>

  <!-- 4개 단계 박스: x = 30,245,460,675, 폭 195, 간격 20 -->
  <!-- Step 1 -->
  <rect x="30" y="92" width="195" height="300" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" stroke-width="1.5"/>
  <rect x="30" y="92" width="195" height="44" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="46" y="114" fill="rgb(212,168,83)" font-size="13" font-weight="bold">Step 1</text>
  <text x="46" y="130" fill="#e8e4df" font-size="12">문제 이해·범위 설정</text>
  <text x="209" y="114" fill="rgb(138,133,128)" font-size="11" text-anchor="end" font-family="'JetBrains Mono',monospace">3-10분</text>

  <text x="46" y="164" fill="#e8e4df" font-size="11.5" font-weight="bold">핵심 활동</text>
  <text x="46" y="186" fill="rgb(138,133,128)" font-size="11">· 바로 답하지 않기</text>
  <text x="46" y="206" fill="rgb(138,133,128)" font-size="11">· 질문으로 요구사항</text>
  <text x="46" y="222" fill="rgb(138,133,128)" font-size="11">  명확화</text>
  <text x="46" y="242" fill="rgb(138,133,128)" font-size="11">· 가정을 적어두기</text>

  <text x="46" y="284" fill="#e8e4df" font-size="11.5" font-weight="bold">산출물</text>
  <text x="46" y="306" fill="#66bb6a" font-size="11">요구사항 정리</text>
  <text x="46" y="324" fill="#66bb6a" font-size="11">(기능·규모·제약)</text>
  <text x="46" y="360" fill="rgb(212,168,83)" font-size="10.5">"빨리 답하는 Jimmy</text>
  <text x="46" y="376" fill="rgb(212,168,83)" font-size="10.5"> 가 되지 말 것"</text>

  <!-- Step 2 -->
  <rect x="245" y="92" width="195" height="300" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" stroke-width="1.5"/>
  <rect x="245" y="92" width="195" height="44" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="261" y="114" fill="rgb(212,168,83)" font-size="13" font-weight="bold">Step 2</text>
  <text x="261" y="130" fill="#e8e4df" font-size="12">고수준 설계·합의</text>
  <text x="424" y="114" fill="rgb(138,133,128)" font-size="11" text-anchor="end" font-family="'JetBrains Mono',monospace">10-15분</text>

  <text x="261" y="164" fill="#e8e4df" font-size="11.5" font-weight="bold">핵심 활동</text>
  <text x="261" y="186" fill="rgb(138,133,128)" font-size="11">· 박스 다이어그램</text>
  <text x="261" y="206" fill="rgb(138,133,128)" font-size="11">· 면접관 피드백 받기</text>
  <text x="261" y="226" fill="rgb(138,133,128)" font-size="11">· 어림셈으로 검증</text>
  <text x="261" y="246" fill="rgb(138,133,128)" font-size="11">· 구체적 use case</text>

  <text x="261" y="284" fill="#e8e4df" font-size="11.5" font-weight="bold">산출물</text>
  <text x="261" y="306" fill="#66bb6a" font-size="11">합의된 청사진</text>
  <text x="261" y="324" fill="#66bb6a" font-size="11">(주요 컴포넌트)</text>
  <text x="261" y="360" fill="rgb(212,168,83)" font-size="10.5">API·스키마는 문제</text>
  <text x="261" y="376" fill="rgb(212,168,83)" font-size="10.5"> 성격 따라 선택</text>

  <!-- Step 3 -->
  <rect x="460" y="92" width="195" height="300" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" stroke-width="1.5"/>
  <rect x="460" y="92" width="195" height="44" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="476" y="114" fill="rgb(212,168,83)" font-size="13" font-weight="bold">Step 3</text>
  <text x="476" y="130" fill="#e8e4df" font-size="12">심층 설계</text>
  <text x="639" y="114" fill="rgb(138,133,128)" font-size="11" text-anchor="end" font-family="'JetBrains Mono',monospace">10-25분</text>

  <text x="476" y="164" fill="#e8e4df" font-size="11.5" font-weight="bold">핵심 활동</text>
  <text x="476" y="186" fill="rgb(138,133,128)" font-size="11">· 핵심 컴포넌트</text>
  <text x="476" y="202" fill="rgb(138,133,128)" font-size="11">  우선순위로 깊이</text>
  <text x="476" y="222" fill="rgb(138,133,128)" font-size="11">· 병목·트레이드오프</text>
  <text x="476" y="242" fill="rgb(138,133,128)" font-size="11">· 시간 관리</text>

  <text x="476" y="284" fill="#e8e4df" font-size="11.5" font-weight="bold">산출물</text>
  <text x="476" y="306" fill="#66bb6a" font-size="11">상세 설계</text>
  <text x="476" y="324" fill="#66bb6a" font-size="11">(선택 컴포넌트)</text>
  <text x="476" y="360" fill="rgb(212,168,83)" font-size="10.5">사소한 디테일에</text>
  <text x="476" y="376" fill="rgb(212,168,83)" font-size="10.5"> 매몰되지 말 것</text>

  <!-- Step 4 -->
  <rect x="675" y="92" width="195" height="300" fill="rgb(26,26,26)" stroke="rgb(42,37,32)" stroke-width="1.5"/>
  <rect x="675" y="92" width="195" height="44" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="691" y="114" fill="rgb(212,168,83)" font-size="13" font-weight="bold">Step 4</text>
  <text x="691" y="130" fill="#e8e4df" font-size="12">마무리</text>
  <text x="854" y="114" fill="rgb(138,133,128)" font-size="11" text-anchor="end" font-family="'JetBrains Mono',monospace">3-5분</text>

  <text x="691" y="164" fill="#e8e4df" font-size="11.5" font-weight="bold">핵심 활동</text>
  <text x="691" y="186" fill="rgb(138,133,128)" font-size="11">· 병목 짚고 개선안</text>
  <text x="691" y="206" fill="rgb(138,133,128)" font-size="11">· 설계 요약(recap)</text>
  <text x="691" y="226" fill="rgb(138,133,128)" font-size="11">· 장애·운영 논의</text>
  <text x="691" y="246" fill="rgb(138,133,128)" font-size="11">· 다음 확장 곡선</text>

  <text x="691" y="284" fill="#e8e4df" font-size="11.5" font-weight="bold">산출물</text>
  <text x="691" y="306" fill="#66bb6a" font-size="11">개선 방향·한계</text>
  <text x="691" y="324" fill="#66bb6a" font-size="11">정리</text>
  <text x="691" y="360" fill="rgb(212,168,83)" font-size="10.5">"완벽하다"고 하지</text>
  <text x="691" y="376" fill="rgb(212,168,83)" font-size="10.5"> 말 것</text>

  <!-- 진행 화살표 -->
  <line x1="225" y1="114" x2="245" y2="114" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="440" y1="114" x2="460" y2="114" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="655" y1="114" x2="675" y2="114" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#ar)"/>

  <!-- 하단 결론 -->
  <text x="30" y="438" fill="rgb(212,168,83)" font-size="11.5">핵심: 항상 질문으로 명확화하고, 소통하며, 트레이드오프를 의식합니다. 과잉 설계는 가장 큰 감점 요인입니다.</text>
  <text x="30" y="462" fill="rgb(138,133,128)" font-size="11">red flag: 요구사항 확인 없이 바로 설계 · 한 컴포넌트에 초반부터 매몰 · 침묵 속 사고 · 완벽 주장</text>
</svg>
