<svg viewBox="0 0 900 640" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>웹 크롤러 — 컴포넌트 워크플로우와 URL Frontier 2계층</title>
  <desc>seed URL 에서 시작해 URL Frontier, HTML Downloader, Content Parser, Content Seen, Link Extractor, URL Filter, URL Seen 으로 순환하는 크롤러 파이프라인과, 우선순위를 관리하는 프론트 큐와 예의(politeness)를 관리하는 백 큐로 이뤄진 URL Frontier 2계층 구조를 한 장에 정리한 종합도.</desc>

  <rect x="0" y="0" width="900" height="640" fill="#0d0d0d"/>

  <text x="30" y="40" fill="rgb(212,168,83)" font-size="20" font-weight="bold">웹 크롤러 (Web Crawler)</text>
  <text x="30" y="62" fill="rgb(138,133,128)" font-size="12">URL 다운로드 → 링크 추출 → 새 URL 추가 반복. BFS(FIFO 큐) 기반. 확장성·예의·견고성이 관건.</text>

  <defs>
    <marker id="wa" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(138,133,128)"/>
    </marker>
  </defs>

  <!-- 워크플로우 파이프라인 -->
  <text x="30" y="92" fill="#e8e4df" font-size="14" font-weight="bold">크롤러 워크플로우</text>

  <!-- 상단 행: seed → frontier → downloader → parser → content seen -->
  <rect x="30" y="104" width="92" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="76" y="128" fill="#e8e4df" font-size="10.5" text-anchor="middle">seed URLs</text>
  <rect x="156" y="104" width="100" height="40" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="206" y="122" fill="#e8e4df" font-size="10.5" text-anchor="middle">URL Frontier</text>
  <text x="206" y="136" fill="rgb(138,133,128)" font-size="8.5" text-anchor="middle">다운로드 대기 큐</text>
  <rect x="290" y="104" width="110" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="345" y="122" fill="#e8e4df" font-size="10.5" text-anchor="middle">HTML Downloader</text>
  <text x="345" y="136" fill="rgb(138,133,128)" font-size="8.5" text-anchor="middle">DNS Resolver 사용</text>
  <rect x="434" y="104" width="100" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="484" y="128" fill="#e8e4df" font-size="10.5" text-anchor="middle">Content Parser</text>
  <rect x="568" y="104" width="100" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="618" y="122" fill="#e8e4df" font-size="10.5" text-anchor="middle">Content Seen?</text>
  <text x="618" y="136" fill="rgb(138,133,128)" font-size="8.5" text-anchor="middle">중복 29% 제거</text>

  <line x1="122" y1="124" x2="156" y2="124" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#wa)"/>
  <line x1="256" y1="124" x2="290" y2="124" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#wa)"/>
  <line x1="400" y1="124" x2="434" y2="124" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#wa)"/>
  <line x1="534" y1="124" x2="568" y2="124" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#wa)"/>

  <!-- content storage -->
  <rect x="700" y="104" width="100" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="750" y="128" fill="#e8e4df" font-size="10.5" text-anchor="middle">Content Storage</text>
  <line x1="668" y1="124" x2="700" y2="124" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#wa)"/>

  <!-- 하단 행: content seen → link extractor → url filter → url seen → (frontier 순환) -->
  <rect x="568" y="172" width="100" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="618" y="196" fill="#e8e4df" font-size="10.5" text-anchor="middle">Link Extractor</text>
  <rect x="434" y="172" width="100" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="484" y="196" fill="#e8e4df" font-size="10.5" text-anchor="middle">URL Filter</text>
  <rect x="290" y="172" width="110" height="40" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="345" y="190" fill="#e8e4df" font-size="10.5" text-anchor="middle">URL Seen?</text>
  <text x="345" y="204" fill="rgb(138,133,128)" font-size="8.5" text-anchor="middle">bloom filter</text>

  <line x1="618" y1="144" x2="618" y2="172" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#wa)"/>
  <line x1="568" y1="192" x2="534" y2="192" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#wa)"/>
  <line x1="434" y1="192" x2="400" y2="192" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#wa)"/>
  <!-- url seen → frontier 순환 -->
  <line x1="290" y1="192" x2="206" y2="192" stroke="rgb(138,133,128)" stroke-width="1.5"/>
  <line x1="206" y1="192" x2="206" y2="144" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#wa)"/>
  <text x="240" y="186" fill="rgb(212,168,83)" font-size="9">새 URL 순환</text>

  <!-- URL Frontier 2계층 -->
  <text x="30" y="256" fill="#e8e4df" font-size="14" font-weight="bold">URL Frontier 2계층</text>

  <!-- 프론트 큐: priority -->
  <rect x="30" y="268" width="400" height="160" fill="rgba(212,168,83,0.06)" stroke="rgb(42,37,32)"/>
  <text x="46" y="290" fill="rgb(212,168,83)" font-size="12" font-weight="bold">프론트 큐 — 우선순위(priority)</text>
  <text x="46" y="312" fill="#e8e4df" font-size="10.5">Prioritizer 가 PageRank·트래픽·갱신빈도로</text>
  <text x="46" y="328" fill="#e8e4df" font-size="10.5">URL 우선순위 계산 → 큐 f1..fn 에 배치</text>

  <rect x="60" y="344" width="40" height="50" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="80" y="373" fill="#e8e4df" font-size="10" text-anchor="middle">f1</text>
  <rect x="120" y="344" width="40" height="50" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="140" y="373" fill="#e8e4df" font-size="10" text-anchor="middle">f2</text>
  <text x="190" y="373" fill="rgb(138,133,128)" font-size="14">...</text>
  <rect x="230" y="344" width="40" height="50" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="250" y="373" fill="#e8e4df" font-size="10" text-anchor="middle">fn</text>
  <text x="46" y="416" fill="rgb(138,133,128)" font-size="10">Front queue selector: 높은 우선순위 큐를 더 자주 선택</text>

  <!-- 백 큐: politeness -->
  <rect x="460" y="268" width="410" height="160" fill="rgba(102,187,106,0.06)" stroke="rgb(42,37,32)"/>
  <text x="476" y="290" fill="#66bb6a" font-size="12" font-weight="bold">백 큐 — 예의(politeness)</text>
  <text x="476" y="312" fill="#e8e4df" font-size="10.5">Mapping table 로 호스트 1개 = 큐 1개 매핑.</text>
  <text x="476" y="328" fill="#e8e4df" font-size="10.5">큐 b1..bn 은 같은 호스트 URL 만 담는다.</text>

  <rect x="490" y="344" width="40" height="50" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="510" y="373" fill="#e8e4df" font-size="10" text-anchor="middle">b1</text>
  <rect x="550" y="344" width="40" height="50" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="570" y="373" fill="#e8e4df" font-size="10" text-anchor="middle">b2</text>
  <text x="620" y="373" fill="rgb(138,133,128)" font-size="14">...</text>
  <rect x="660" y="344" width="40" height="50" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="680" y="373" fill="#e8e4df" font-size="10" text-anchor="middle">bn</text>
  <text x="476" y="416" fill="rgb(138,133,128)" font-size="10">워커 스레드는 한 호스트에서 1개씩 다운로드 + 지연</text>

  <!-- 추가 고려 -->
  <text x="30" y="464" fill="#e8e4df" font-size="14" font-weight="bold">성능·견고성·함정</text>
  <rect x="30" y="476" width="840" height="142" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="46" y="500" fill="rgb(212,168,83)" font-size="11.5" font-weight="bold">성능 최적화</text>
  <text x="46" y="520" fill="#e8e4df" font-size="10.5">분산 크롤(여러 서버) · DNS 캐시(10~200ms 병목) · 지역성 · 짧은 타임아웃</text>
  <text x="46" y="544" fill="rgb(212,168,83)" font-size="11.5" font-weight="bold">견고성</text>
  <text x="46" y="564" fill="#e8e4df" font-size="10.5">안정 해시로 부하 분산 · 크롤 상태 저장(재시작) · 예외 처리 · robots.txt 준수</text>
  <text x="46" y="588" fill="rgb(212,168,83)" font-size="11.5" font-weight="bold">피할 콘텐츠</text>
  <text x="46" y="608" fill="#e8e4df" font-size="10.5">중복(해시/체크섬) · 스파이더 트랩(무한 루프 → URL 길이 제한) · 데이터 노이즈(광고·스팸)</text>
</svg>
