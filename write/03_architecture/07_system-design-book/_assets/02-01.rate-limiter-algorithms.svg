<svg viewBox="0 0 900 600" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>처리율 제한기 — 5가지 알고리즘과 분산 환경 아키텍처</title>
  <desc>토큰 버킷, 누출 버킷, 고정 윈도우 카운터, 슬라이딩 윈도우 로그, 슬라이딩 윈도우 카운터 다섯 알고리즘의 핵심 동작과 장단점을 카드로 비교하고, Redis 중앙 저장소를 쓰는 분산 환경 아키텍처를 한 장에 정리한 종합도.</desc>

  <rect x="0" y="0" width="900" height="600" fill="#0d0d0d"/>

  <text x="30" y="40" fill="rgb(212,168,83)" font-size="20" font-weight="bold">처리율 제한기 (Rate Limiter)</text>
  <text x="30" y="62" fill="rgb(138,133,128)" font-size="12">한도 초과 요청은 429(Too Many Requests)로 거절한다. 알고리즘 선택이 핵심.</text>

  <text x="30" y="92" fill="#e8e4df" font-size="14" font-weight="bold">5가지 알고리즘 비교</text>

  <!-- 카드 그리드: 5장 (폭 270, 위 3 + 아래 2) -->
  <!-- card1 token bucket -->
  <rect x="30" y="106" width="270" height="138" fill="rgb(26,26,26)" stroke="rgb(212,168,83)"/>
  <text x="46" y="130" fill="rgb(212,168,83)" font-size="13" font-weight="bold">① 토큰 버킷</text>
  <text x="46" y="152" fill="#e8e4df" font-size="11">버킷에 토큰을 주기적으로 채우고,</text>
  <text x="46" y="168" fill="#e8e4df" font-size="11">요청당 1개 소비. 없으면 거절.</text>
  <text x="46" y="192" fill="#66bb6a" font-size="10.5">+ 구현 쉬움 · 메모리 효율 · 버스트 허용</text>
  <text x="46" y="210" fill="#f44336" font-size="10.5">− 버킷 크기·리필률 튜닝 까다로움</text>
  <text x="46" y="232" fill="rgb(138,133,128)" font-size="10">Amazon · Stripe 사용</text>

  <!-- card2 leaking bucket -->
  <rect x="315" y="106" width="270" height="138" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="331" y="130" fill="#e8e4df" font-size="13" font-weight="bold">② 누출 버킷</text>
  <text x="331" y="152" fill="#e8e4df" font-size="11">FIFO 큐에 담고 고정 속도로 처리.</text>
  <text x="331" y="168" fill="#e8e4df" font-size="11">큐가 차면 요청 버림.</text>
  <text x="331" y="192" fill="#66bb6a" font-size="10.5">+ 메모리 효율 · 안정적 처리율</text>
  <text x="331" y="210" fill="#f44336" font-size="10.5">− 버스트가 큐를 옛 요청으로 채움</text>
  <text x="331" y="232" fill="rgb(138,133,128)" font-size="10">Shopify 사용</text>

  <!-- card3 fixed window -->
  <rect x="600" y="106" width="270" height="138" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="616" y="130" fill="#e8e4df" font-size="13" font-weight="bold">③ 고정 윈도우 카운터</text>
  <text x="616" y="152" fill="#e8e4df" font-size="11">시간을 고정 창으로 나눠 창마다</text>
  <text x="616" y="168" fill="#e8e4df" font-size="11">카운터. 한도 넘으면 거절.</text>
  <text x="616" y="192" fill="#66bb6a" font-size="10.5">+ 메모리 효율 · 이해 쉬움</text>
  <text x="616" y="210" fill="#f44336" font-size="10.5">− 창 경계 버스트로 한도 2배 통과</text>

  <!-- card4 sliding log -->
  <rect x="172" y="256" width="270" height="138" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="188" y="280" fill="#e8e4df" font-size="13" font-weight="bold">④ 슬라이딩 윈도우 로그</text>
  <text x="188" y="302" fill="#e8e4df" font-size="11">요청 타임스탬프를 로그로 보관,</text>
  <text x="188" y="318" fill="#e8e4df" font-size="11">만료분 제거 후 로그 크기로 판정.</text>
  <text x="188" y="342" fill="#66bb6a" font-size="10.5">+ 정확 (어떤 창에서도 한도 준수)</text>
  <text x="188" y="360" fill="#f44336" font-size="10.5">− 메모리 많이 씀 (거절돼도 저장)</text>
  <text x="188" y="382" fill="rgb(138,133,128)" font-size="10">Redis sorted set 사용</text>

  <!-- card5 sliding counter -->
  <rect x="458" y="256" width="270" height="138" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="474" y="280" fill="#e8e4df" font-size="13" font-weight="bold">⑤ 슬라이딩 윈도우 카운터</text>
  <text x="474" y="302" fill="#e8e4df" font-size="11">고정 창 + 로그의 혼합. 이전 창을</text>
  <text x="474" y="318" fill="#e8e4df" font-size="11">겹친 비율로 가중해 추정.</text>
  <text x="474" y="342" fill="#66bb6a" font-size="10.5">+ 버스트 완화 · 메모리 효율</text>
  <text x="474" y="360" fill="#f44336" font-size="10.5">− 근사값 (Cloudflare 오차 0.003%)</text>

  <!-- 분산 아키텍처 -->
  <text x="30" y="430" fill="#e8e4df" font-size="14" font-weight="bold">분산 환경 아키텍처</text>
  <rect x="30" y="442" width="840" height="118" fill="rgba(212,168,83,0.06)" stroke="rgb(42,37,32)"/>

  <defs>
    <marker id="ra2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(138,133,128)"/>
    </marker>
  </defs>

  <rect x="56" y="478" width="110" height="44" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="111" y="504" fill="#e8e4df" font-size="12" text-anchor="middle">Client</text>

  <rect x="240" y="478" width="160" height="44" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="320" y="498" fill="#e8e4df" font-size="12" text-anchor="middle">Rate Limiter</text>
  <text x="320" y="514" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">middleware (무상태)</text>

  <rect x="470" y="478" width="130" height="44" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="535" y="504" fill="#e8e4df" font-size="12" text-anchor="middle">API Servers</text>

  <rect x="670" y="478" width="160" height="44" fill="rgb(26,26,26)" stroke="#f44336"/>
  <text x="750" y="498" fill="#e8e4df" font-size="12" text-anchor="middle">Redis (중앙 카운터)</text>
  <text x="750" y="514" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">INCR · EXPIRE</text>

  <line x1="166" y1="500" x2="240" y2="500" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ra2)"/>
  <line x1="400" y1="494" x2="470" y2="494" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ra2)"/>
  <line x1="400" y1="510" x2="670" y2="510" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ra2)"/>
  <text x="430" y="488" fill="#66bb6a" font-size="9.5">통과</text>
  <text x="610" y="540" fill="rgb(138,133,128)" font-size="9.5" text-anchor="middle">카운터 조회·증가</text>

  <text x="30" y="588" fill="rgb(212,168,83)" font-size="11">분산 함정: ① 경쟁 조건 → Lua script·sorted set ② 동기화 → sticky session 대신 중앙 Redis</text>
</svg>
