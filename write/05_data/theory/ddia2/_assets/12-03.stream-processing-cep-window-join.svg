<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 660" font-family="Pretendard, sans-serif">
  <rect width="680" height="660" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">스트림 처리 — CEP·윈도우·조인</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">CEP · 스트림 분석 · 구체화 뷰 · 윈도우 유형 · 스트림 조인 3종</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 처리 유형 3가지 -->
  <text x="32" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">스트림 처리 활용 유형</text>

  <rect x="32" y="124" width="188" height="80" rx="5" fill="#141414" stroke="#f47f72"/>
  <text x="126" y="144" fill="#f47f72" font-size="11" font-weight="700" text-anchor="middle">CEP</text>
  <text x="48" y="162" fill="#e8e4df" font-size="9.5">이벤트 시퀀스 패턴 탐지</text>
  <text x="48" y="178" fill="#e8e4df" font-size="9.5">쿼리 저장 / 데이터 흘려보냄</text>
  <text x="48" y="194" fill="rgb(138,133,128)" font-size="9">사기 탐지·알고리즘 트레이딩</text>

  <rect x="246" y="124" width="188" height="80" rx="5" fill="#141414" stroke="#7fa8c9"/>
  <text x="340" y="144" fill="#7fa8c9" font-size="11" font-weight="700" text-anchor="middle">스트림 분석</text>
  <text x="262" y="162" fill="#e8e4df" font-size="9.5">시간 윈도우 통계·집계</text>
  <text x="262" y="178" fill="#e8e4df" font-size="9.5">HyperLogLog 등 확률적 근사</text>
  <text x="262" y="194" fill="rgb(138,133,128)" font-size="9">초당 요청 수·롤링 평균</text>

  <rect x="460" y="124" width="188" height="80" rx="5" fill="#141414" stroke="#66bb6a"/>
  <text x="554" y="144" fill="#66bb6a" font-size="11" font-weight="700" text-anchor="middle">구체화 뷰 유지</text>
  <text x="476" y="162" fill="#e8e4df" font-size="9.5">파생 시스템 실시간 동기화</text>
  <text x="476" y="178" fill="#e8e4df" font-size="9.5">처음부터 현재까지 전체 이력</text>
  <text x="476" y="194" fill="rgb(138,133,128)" font-size="9">IVM: 변경분만 증분 재계산</text>

  <!-- 윈도우 유형 -->
  <text x="32" y="232" fill="rgb(212,168,83)" font-size="14" font-weight="700">윈도우 유형</text>

  <!-- 텀블링 -->
  <rect x="32" y="244" width="140" height="80" rx="5" fill="#101620" stroke="#7fa8c9"/>
  <text x="102" y="264" fill="#7fa8c9" font-size="10.5" font-weight="700" text-anchor="middle">텀블링</text>
  <text x="102" y="282" fill="#e8e4df" font-size="9" text-anchor="middle">고정 길이, 비중첩</text>
  <text x="102" y="298" fill="#e8e4df" font-size="9" text-anchor="middle">이벤트 = 정확히 1개 창</text>
  <text x="102" y="314" fill="rgb(138,133,128)" font-size="8.5" text-anchor="middle">1분 요청 카운트</text>

  <!-- 호핑 -->
  <rect x="184" y="244" width="140" height="80" rx="5" fill="#101620" stroke="#7fa8c9"/>
  <text x="254" y="264" fill="#7fa8c9" font-size="10.5" font-weight="700" text-anchor="middle">호핑</text>
  <text x="254" y="282" fill="#e8e4df" font-size="9" text-anchor="middle">고정 길이, 중첩</text>
  <text x="254" y="298" fill="#e8e4df" font-size="9" text-anchor="middle">평활화(smoothing)</text>
  <text x="254" y="314" fill="rgb(138,133,128)" font-size="8.5" text-anchor="middle">5분 창 / 1분 hop</text>

  <!-- 슬라이딩 -->
  <rect x="336" y="244" width="140" height="80" rx="5" fill="#101620" stroke="rgb(212,168,83)"/>
  <text x="406" y="264" fill="rgb(212,168,83)" font-size="10.5" font-weight="700" text-anchor="middle">슬라이딩</text>
  <text x="406" y="282" fill="#e8e4df" font-size="9" text-anchor="middle">고정 경계 없음</text>
  <text x="406" y="298" fill="#e8e4df" font-size="9" text-anchor="middle">시간 범위 내 이벤트</text>
  <text x="406" y="314" fill="rgb(138,133,128)" font-size="8.5" text-anchor="middle">30분 내 클릭 묶기</text>

  <!-- 세션 -->
  <rect x="488" y="244" width="140" height="80" rx="5" fill="#101620" stroke="#66bb6a"/>
  <text x="558" y="264" fill="#66bb6a" font-size="10.5" font-weight="700" text-anchor="middle">세션</text>
  <text x="558" y="282" fill="#e8e4df" font-size="9" text-anchor="middle">가변 길이</text>
  <text x="558" y="298" fill="#e8e4df" font-size="9" text-anchor="middle">비활동으로 종료</text>
  <text x="558" y="314" fill="rgb(138,133,128)" font-size="8.5" text-anchor="middle">웹 세션 분석</text>

  <!-- 스트림 조인 3종 -->
  <text x="32" y="358" fill="rgb(212,168,83)" font-size="14" font-weight="700">스트림 조인 3종</text>

  <!-- 스트림-스트림 -->
  <rect x="32" y="370" width="190" height="108" rx="5" fill="#141414" stroke="#f47f72"/>
  <text x="127" y="390" fill="#f47f72" font-size="10.5" font-weight="700" text-anchor="middle">스트림-스트림</text>
  <text x="127" y="408" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">(윈도우 조인)</text>
  <text x="48" y="426" fill="#e8e4df" font-size="9.5">양쪽 모두 활동 이벤트</text>
  <text x="48" y="442" fill="#e8e4df" font-size="9.5">윈도우 내 매칭 이벤트 탐색</text>
  <text x="48" y="458" fill="#e8e4df" font-size="9.5">상태 = 윈도우 내 이벤트 버퍼</text>
  <text x="48" y="472" fill="rgb(138,133,128)" font-size="9">검색 클릭률 계산</text>

  <!-- 스트림-테이블 -->
  <rect x="245" y="370" width="190" height="108" rx="5" fill="#141414" stroke="#7fa8c9"/>
  <text x="340" y="390" fill="#7fa8c9" font-size="10.5" font-weight="700" text-anchor="middle">스트림-테이블</text>
  <text x="340" y="408" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">(스트림 강화)</text>
  <text x="261" y="426" fill="#e8e4df" font-size="9.5">이벤트 + DB 변경로그</text>
  <text x="261" y="442" fill="#e8e4df" font-size="9.5">DB 복사본을 로컬 해시 조인</text>
  <text x="261" y="458" fill="#e8e4df" font-size="9.5">CDC로 로컬 복사본 갱신</text>
  <text x="261" y="472" fill="rgb(138,133,128)" font-size="9">활동 이벤트에 프로필 추가</text>

  <!-- 테이블-테이블 -->
  <rect x="458" y="370" width="190" height="108" rx="5" fill="#141414" stroke="#66bb6a"/>
  <text x="553" y="390" fill="#66bb6a" font-size="10.5" font-weight="700" text-anchor="middle">테이블-테이블</text>
  <text x="553" y="408" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">(구체화 뷰 유지)</text>
  <text x="474" y="426" fill="#e8e4df" font-size="9.5">양쪽 모두 DB 변경로그</text>
  <text x="474" y="442" fill="#e8e4df" font-size="9.5">조인 결과 뷰를 지속 갱신</text>
  <text x="474" y="458" fill="#e8e4df" font-size="9.5">무한 길이 윈도우 사용</text>
  <text x="474" y="472" fill="rgb(138,133,128)" font-size="9">소셜 타임라인 캐시</text>

  <!-- 조인 시간 의존성 -->
  <text x="32" y="510" fill="rgb(212,168,83)" font-size="14" font-weight="700">조인의 시간 의존성</text>
  <rect x="32" y="522" width="616" height="60" rx="6" fill="#1a1410" stroke="rgb(42,37,32)"/>
  <text x="48" y="542" fill="#e8e4df" font-size="10.5">상태가 시간에 따라 변하면 "어느 시점의 상태"를 조인에 사용할지가 결과를 결정합니다.</text>
  <text x="48" y="560" fill="#e8e4df" font-size="10.5">세금율 변경 시 판매 이벤트는 판매 시점의 세금율로 조인해야 합니다.</text>
  <text x="48" y="576" fill="rgb(138,133,128)" font-size="9.5">SCD 패턴: 조인 레코드 버전에 고유 ID 부여 → 결정론적 재처리 가능. 단, 로그 컴팩션 불가.</text>

  <!-- IVM 요약 -->
  <rect x="32" y="598" width="616" height="44" rx="6" fill="#141414" stroke="#66bb6a"/>
  <text x="48" y="618" fill="#66bb6a" font-size="10.5" font-weight="700">증분 뷰 유지(IVM): SQL 쿼리를 증분 연산자로 컴파일 — 변경된 데이터만 재계산</text>
  <text x="48" y="634" fill="rgb(138,133,128)" font-size="9.5">Materialize, RisingWave, ClickHouse, Feldera — 스트림 이벤트를 실시간 구체화 뷰로</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
