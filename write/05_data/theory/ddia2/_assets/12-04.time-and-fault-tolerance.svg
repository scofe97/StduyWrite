<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 660" font-family="Pretendard, sans-serif">
  <rect width="680" height="660" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">시간 추론과 내결함성·12장 종합</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">이벤트 시간 vs 처리 시간 · 지각 이벤트 · exactly-once 4전략 · 12장 종합</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 이벤트 시간 vs 처리 시간 -->
  <text x="32" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">이벤트 시간 vs 처리 시간</text>

  <rect x="32" y="124" width="290" height="88" rx="6" fill="#141414" stroke="#f47f72"/>
  <text x="177" y="144" fill="#f47f72" font-size="11" font-weight="700" text-anchor="middle">처리 시간 (Processing Time)</text>
  <text x="48" y="164" fill="#e8e4df" font-size="9.5">프로세서가 이벤트를 처리하는 시각</text>
  <text x="48" y="180" fill="#e8e4df" font-size="9.5">구현 단순 — 지연 발생 시 결과 왜곡</text>
  <text x="48" y="196" fill="#f47f72" font-size="9.5">재시작 후 스파이크: 실제 요청량은 일정한데</text>
  <text x="48" y="208" fill="#f47f72" font-size="9">처리 시간 윈도우가 인위적 급등을 만들어냄</text>

  <rect x="358" y="124" width="290" height="88" rx="6" fill="#141414" stroke="#66bb6a"/>
  <text x="503" y="144" fill="#66bb6a" font-size="11" font-weight="700" text-anchor="middle">이벤트 시간 (Event Time)</text>
  <text x="374" y="164" fill="#e8e4df" font-size="9.5">이벤트 페이로드의 타임스탬프</text>
  <text x="374" y="180" fill="#e8e4df" font-size="9.5">결정론적 재처리 가능 (배치처럼)</text>
  <text x="374" y="196" fill="rgb(138,133,128)" font-size="9.5">지각·순서 역전 이벤트 처리 필요</text>
  <text x="374" y="212" fill="rgb(138,133,128)" font-size="9">기기 클럭 신뢰 불가 — 3타임스탬프 보정</text>

  <!-- 지각 이벤트 처리 -->
  <text x="32" y="240" fill="rgb(212,168,83)" font-size="14" font-weight="700">지각 이벤트(Straggler) 처리 전략</text>

  <rect x="32" y="252" width="290" height="68" rx="5" fill="#101620" stroke="rgb(212,168,83)"/>
  <text x="177" y="272" fill="rgb(212,168,83)" font-size="11" font-weight="700" text-anchor="middle">전략 1 — 무시 및 드롭</text>
  <text x="48" y="292" fill="#e8e4df" font-size="9.5">임계값 이후 도착 이벤트는 버립니다.</text>
  <text x="48" y="308" fill="rgb(138,133,128)" font-size="9">드롭 비율 모니터링 필수. 일부 손실이 허용될 때 적합합니다.</text>

  <rect x="358" y="252" width="290" height="68" rx="5" fill="#101620" stroke="rgb(212,168,83)"/>
  <text x="503" y="272" fill="rgb(212,168,83)" font-size="11" font-weight="700" text-anchor="middle">전략 2 — 수정값 발행</text>
  <text x="374" y="292" fill="#e8e4df" font-size="9.5">지각 이벤트 포함 윈도우 재계산 후 수정값 방출.</text>
  <text x="374" y="308" fill="rgb(138,133,128)" font-size="9">구독자가 수정값 처리 로직을 갖춰야 합니다.</text>

  <!-- Exactly-once 4전략 -->
  <text x="32" y="352" fill="rgb(212,168,83)" font-size="14" font-weight="700">Exactly-Once 4전략</text>

  <rect x="32" y="364" width="140" height="96" rx="5" fill="#141414" stroke="#7fa8c9"/>
  <text x="102" y="384" fill="#7fa8c9" font-size="10.5" font-weight="700" text-anchor="middle">마이크로배치</text>
  <text x="102" y="402" fill="#e8e4df" font-size="9" text-anchor="middle">~1초 블록 단위</text>
  <text x="102" y="418" fill="#e8e4df" font-size="9" text-anchor="middle">블록 완료 후</text>
  <text x="102" y="434" fill="#e8e4df" font-size="9" text-anchor="middle">출력 가시화</text>
  <text x="102" y="452" fill="rgb(138,133,128)" font-size="8.5" text-anchor="middle">Spark Streaming</text>

  <rect x="184" y="364" width="140" height="96" rx="5" fill="#141414" stroke="#7fa8c9"/>
  <text x="254" y="384" fill="#7fa8c9" font-size="10.5" font-weight="700" text-anchor="middle">체크포인트</text>
  <text x="254" y="402" fill="#e8e4df" font-size="9" text-anchor="middle">상태 주기적 스냅샷</text>
  <text x="254" y="418" fill="#e8e4df" font-size="9" text-anchor="middle">장애 시 최근</text>
  <text x="254" y="434" fill="#e8e4df" font-size="9" text-anchor="middle">체크포인트부터</text>
  <text x="254" y="452" fill="rgb(138,133,128)" font-size="8.5" text-anchor="middle">Flink</text>

  <rect x="336" y="364" width="140" height="96" rx="5" fill="#141414" stroke="rgb(212,168,83)"/>
  <text x="406" y="384" fill="rgb(212,168,83)" font-size="10.5" font-weight="700" text-anchor="middle">원자적 커밋</text>
  <text x="406" y="402" fill="#e8e4df" font-size="9" text-anchor="middle">출력+상태+오프셋</text>
  <text x="406" y="418" fill="#e8e4df" font-size="9" text-anchor="middle">단일 트랜잭션</text>
  <text x="406" y="434" fill="#e8e4df" font-size="9" text-anchor="middle">프레임워크 내부</text>
  <text x="406" y="452" fill="rgb(138,133,128)" font-size="8.5" text-anchor="middle">Kafka 트랜잭셔널</text>

  <rect x="488" y="364" width="140" height="96" rx="5" fill="#141414" stroke="#66bb6a"/>
  <text x="558" y="384" fill="#66bb6a" font-size="10.5" font-weight="700" text-anchor="middle">멱등성</text>
  <text x="558" y="402" fill="#e8e4df" font-size="9" text-anchor="middle">동일 연산 N번</text>
  <text x="558" y="418" fill="#e8e4df" font-size="9" text-anchor="middle">= 1번과 동일</text>
  <text x="558" y="434" fill="#e8e4df" font-size="9" text-anchor="middle">오프셋을 값에 포함</text>
  <text x="558" y="452" fill="rgb(138,133,128)" font-size="8.5" text-anchor="middle">Storm Trident</text>

  <!-- 12장 종합 -->
  <text x="32" y="492" fill="rgb(212,168,83)" font-size="14" font-weight="700">12장 종합 — 스트림과 배치의 연속성</text>

  <rect x="32" y="504" width="616" height="132" rx="6" fill="#1a1410" stroke="rgb(42,37,32)"/>

  <text x="48" y="524" fill="#e8e4df" font-size="10.5" font-weight="700">브로커</text>
  <text x="48" y="540" fill="rgb(138,133,128)" font-size="9.5">AMQP/JMS(파괴적·메시지 단위) vs 로그 기반(비파괴적·오프셋·재처리 가능)</text>

  <text x="48" y="560" fill="#e8e4df" font-size="10.5" font-weight="700">스트림 출처</text>
  <text x="48" y="576" fill="rgb(138,133,128)" font-size="9.5">사용자 이벤트 · 센서 · DB 변경로그(CDC/이벤트 소싱) — DB 쓰기 자체가 스트림</text>

  <text x="48" y="596" fill="#e8e4df" font-size="10.5" font-weight="700">처리 활용</text>
  <text x="48" y="612" fill="rgb(138,133,128)" font-size="9.5">CEP(패턴) · 분석(집계) · 구체화 뷰 유지(파생 시스템) · 스트림 조인 3종</text>

  <text x="48" y="628" fill="#66bb6a" font-size="10" font-weight="700">배치는 스트림의 특수 케이스 (Flink 철학) — 유한 입력 = 스트림 종료 신호를 받은 스트림</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
