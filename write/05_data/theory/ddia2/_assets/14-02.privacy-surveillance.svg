<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 580" font-family="Pretendard, sans-serif">
  <rect width="680" height="580" fill="#0d0d0d"/>

  <!-- Title -->
  <text x="340" y="38" text-anchor="middle" fill="#e8e4df" font-size="21" font-weight="700">프라이버시와 감시·동의의 한계</text>
  <text x="340" y="58" text-anchor="middle" fill="rgb(138,133,128)" font-size="13">추적 → 감시 · 동의의 비대칭 · 프라이버시 = 결정권</text>
  <line x1="40" y1="70" x2="640" y2="70" stroke="rgb(42,37,32)" stroke-width="1"/>

  <defs>
    <marker id="p1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgb(138,133,128)"/>
    </marker>
    <marker id="p1r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f47f72"/>
    </marker>
  </defs>

  <!-- Section A: tracking becomes surveillance -->
  <text x="50" y="92" fill="rgb(212,168,83)" font-size="12" font-weight="700">① 추적이 감시로 바뀌는 지점 — 누구의 이해인가</text>

  <rect x="50" y="100" width="270" height="56" rx="6" fill="#1a1410" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="185" y="119" text-anchor="middle" fill="#66bb6a" font-size="11" font-weight="700">서비스 (사용자 = 고객)</text>
  <text x="65" y="137" fill="rgb(138,133,128)" font-size="10">사용자가 명시적으로 입력한 데이터</text>
  <text x="65" y="151" fill="rgb(138,133,128)" font-size="10">검색 클릭률 → 랭킹 개선 (사용자 이득)</text>

  <rect x="370" y="100" width="270" height="56" rx="6" fill="#141414" stroke="#f47f72" stroke-width="1.2"/>
  <text x="505" y="119" text-anchor="middle" fill="#f47f72" font-size="11" font-weight="700">감시 (광고주 = 고객)</text>
  <text x="385" y="137" fill="rgb(138,133,128)" font-size="10">부수효과로 행동 추적·프로파일링</text>
  <text x="385" y="151" fill="rgb(138,133,128)" font-size="10">서비스가 자기 이해를 가짐 → 충돌</text>

  <line x1="320" y1="128" x2="368" y2="128" stroke="#f47f72" stroke-width="1.5" marker-end="url(#p1r)"/>

  <line x1="40" y1="168" x2="640" y2="168" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- Section B: data → surveillance thought experiment -->
  <text x="50" y="190" fill="rgb(212,168,83)" font-size="12" font-weight="700">② 사고 실험 — "데이터"를 "감시"로 치환</text>

  <rect x="50" y="200" width="590" height="58" rx="6" fill="#141414" stroke="rgb(138,133,128)" stroke-width="1"/>
  <text x="65" y="222" fill="rgb(138,133,128)" font-size="11">"감시 기반 조직에서 실시간 감시 스트림을 수집해 감시 웨어하우스에 저장하고,</text>
  <text x="65" y="240" fill="rgb(138,133,128)" font-size="11"> 감시 과학자가 고급 분석으로 새 통찰을 도출한다"</text>
  <text x="65" y="254" fill="#f47f72" font-size="10">→ 역사상 가장 거대한 대중 감시 인프라. 모든 거주 공간에 인터넷 마이크 하나 이상</text>

  <line x1="40" y1="270" x2="640" y2="270" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- Section C: consent asymmetry -->
  <text x="50" y="292" fill="rgb(212,168,83)" font-size="12" font-weight="700">③ 동의가 자유롭지 않은 세 가지 이유</text>

  <rect x="50" y="302" width="185" height="78" rx="5" fill="#141414" stroke="#f47f72" stroke-width="1"/>
  <text x="142" y="320" text-anchor="middle" fill="#f47f72" font-size="11" font-weight="700">① 필요성 불분명</text>
  <text x="65" y="338" fill="rgb(138,133,128)" font-size="10">광고용 프로필 구축이</text>
  <text x="65" y="353" fill="rgb(138,133,128)" font-size="10">사용자 이해에 부합?</text>
  <text x="65" y="370" fill="rgb(138,133,128)" font-size="10">"광고가 비용 대니까"</text>

  <rect x="247" y="302" width="185" height="78" rx="5" fill="#141414" stroke="#f47f72" stroke-width="1"/>
  <text x="339" y="320" text-anchor="middle" fill="#f47f72" font-size="11" font-weight="700">② 이해 불가능</text>
  <text x="262" y="338" fill="rgb(138,133,128)" font-size="10">정책은 밝히기보다 가림</text>
  <text x="262" y="353" fill="rgb(138,133,128)" font-size="10">파생 데이터셋은</text>
  <text x="262" y="370" fill="rgb(138,133,128)" font-size="10">이해 자체가 불가능</text>

  <rect x="444" y="302" width="186" height="78" rx="5" fill="#141414" stroke="#f47f72" stroke-width="1"/>
  <text x="537" y="320" text-anchor="middle" fill="#f47f72" font-size="11" font-weight="700">③ 일방적 관계</text>
  <text x="459" y="338" fill="rgb(138,133,128)" font-size="10">협상 여지 없음</text>
  <text x="459" y="353" fill="rgb(138,133,128)" font-size="10">약관은 서비스가 정함</text>
  <text x="459" y="370" fill="rgb(138,133,128)" font-size="10">필수 서비스 = 거부 불가</text>

  <text x="340" y="398" text-anchor="middle" fill="#7fa8c9" font-size="10">GDPR: 동의는 "자유롭게·구체적·정보에 입각·명확" + 불이익 없이 철회 가능해야 — 미리 체크된 박스는 동의 아님</text>

  <line x1="40" y1="410" x2="640" y2="410" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- Section D: privacy = decision right -->
  <text x="50" y="432" fill="rgb(212,168,83)" font-size="12" font-weight="700">④ 프라이버시 = 결정권 (비밀 유지 아님)</text>

  <rect x="50" y="442" width="270" height="84" rx="6" fill="#1a1410" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="185" y="461" text-anchor="middle" fill="#66bb6a" font-size="11" font-weight="700">개인이 결정권 보유</text>
  <text x="65" y="479" fill="rgb(138,133,128)" font-size="10">무엇을·누구에게·어떤 목적으로</text>
  <text x="65" y="495" fill="rgb(138,133,128)" font-size="10">드러낼지 스스로 선택</text>
  <text x="65" y="511" fill="#66bb6a" font-size="10">비밀↔투명 스펙트럼에서 위치 선택</text>

  <rect x="370" y="442" width="270" height="84" rx="6" fill="#141414" stroke="#f47f72" stroke-width="1.2"/>
  <text x="505" y="461" text-anchor="middle" fill="#f47f72" font-size="11" font-weight="700">기업으로 결정권 이전</text>
  <text x="385" y="479" fill="rgb(138,133,128)" font-size="10">"데이터 믿고 맡기세요"</text>
  <text x="385" y="495" fill="rgb(138,133,128)" font-size="10">기업이 이윤 위해 권리 행사</text>
  <text x="385" y="511" fill="#f47f72" font-size="10">역사상 전례 없는 대규모 이전</text>

  <line x1="320" y1="484" x2="368" y2="484" stroke="#f47f72" stroke-width="1.5" marker-end="url(#p1r)"/>

  <!-- Footer -->
  <line x1="40" y1="542" x2="640" y2="542" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="340" y="562" text-anchor="middle" fill="rgb(138,133,128)" font-size="10">DDIA 2nd Ed. Ch.14 — Privacy · Surveillance · Consent · 14-02</text>
</svg>
