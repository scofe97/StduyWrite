<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 580" font-family="Pretendard, sans-serif">
  <rect width="680" height="580" fill="#0d0d0d"/>

  <!-- Title -->
  <text x="340" y="38" text-anchor="middle" fill="#e8e4df" font-size="21" font-weight="700">예측 분석의 윤리</text>
  <text x="340" y="58" text-anchor="middle" fill="rgb(138,133,128)" font-size="13">편향 증폭 · 책임 · 자기강화 피드백 루프</text>
  <line x1="40" y1="70" x2="640" y2="70" stroke="rgb(42,37,32)" stroke-width="1"/>

  <defs>
    <marker id="e1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgb(138,133,128)"/>
    </marker>
    <marker id="e1r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f47f72"/>
    </marker>
  </defs>

  <!-- Section A: bias amplification pipeline -->
  <text x="50" y="92" fill="rgb(212,168,83)" font-size="12" font-weight="700">① 편향된 입력 → 학습 → 증폭된 출력</text>

  <rect x="50" y="100" width="120" height="40" rx="5" fill="#1a1410" stroke="#f47f72" stroke-width="1.2"/>
  <text x="110" y="118" text-anchor="middle" fill="#f47f72" font-size="11">차별적 과거 데이터</text>
  <text x="110" y="132" text-anchor="middle" fill="rgb(138,133,128)" font-size="9">우편번호·IP = 인종 대리</text>

  <line x1="170" y1="120" x2="200" y2="120" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#e1)"/>

  <rect x="200" y="100" width="120" height="40" rx="5" fill="#141414" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="260" y="118" text-anchor="middle" fill="#e8e4df" font-size="11">규칙을 데이터에서</text>
  <text x="260" y="132" text-anchor="middle" fill="rgb(138,133,128)" font-size="9">추론 (불투명)</text>

  <line x1="320" y1="120" x2="350" y2="120" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#e1)"/>

  <rect x="350" y="100" width="130" height="40" rx="5" fill="#141414" stroke="#f47f72" stroke-width="1.5"/>
  <text x="415" y="118" text-anchor="middle" fill="#f47f72" font-size="11" font-weight="700">편향 증폭된 출력</text>
  <text x="415" y="132" text-anchor="middle" fill="rgb(138,133,128)" font-size="9">"머신러닝 = 편향 세탁"</text>

  <line x1="480" y1="120" x2="510" y2="120" stroke="#f47f72" stroke-width="1.5" marker-end="url(#e1r)"/>

  <rect x="510" y="100" width="125" height="40" rx="5" fill="#141414" stroke="#f47f72" stroke-width="1"/>
  <text x="572" y="118" text-anchor="middle" fill="#f47f72" font-size="11">알고리즘 감옥</text>
  <text x="572" y="132" text-anchor="middle" fill="rgb(138,133,128)" font-size="9">사회 참여 배제·무항소</text>

  <text x="340" y="158" text-anchor="middle" fill="#66bb6a" font-size="10">교정: 도덕적 상상력은 사람만 제공 — 데이터·모델은 도구이지 주인이 아님</text>

  <line x1="40" y1="168" x2="640" y2="168" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- Section B: 신용점수 vs 예측분석 -->
  <text x="50" y="190" fill="rgb(212,168,83)" font-size="12" font-weight="700">② 책임과 설명 가능성 — 신용 점수 vs 예측 분석</text>

  <rect x="50" y="200" width="270" height="86" rx="6" fill="#1a1410" stroke="#7fa8c9" stroke-width="1.2"/>
  <text x="185" y="219" text-anchor="middle" fill="#9cc3df" font-size="12" font-weight="700">신용 점수</text>
  <text x="65" y="237" fill="rgb(138,133,128)" font-size="11">"당신이 과거에 어떻게 행동했나"</text>
  <text x="65" y="254" fill="rgb(138,133,128)" font-size="11">개인의 실제 이력 = 관련 사실</text>
  <text x="65" y="271" fill="#7fa8c9" font-size="11">기록 오류 정정 가능</text>

  <rect x="370" y="200" width="270" height="86" rx="6" fill="#141414" stroke="#f47f72" stroke-width="1.2"/>
  <text x="505" y="219" text-anchor="middle" fill="#f47f72" font-size="12" font-weight="700">예측 분석</text>
  <text x="385" y="237" fill="rgb(138,133,128)" font-size="11">"비슷한 사람이 어떻게 행동했나"</text>
  <text x="385" y="254" fill="rgb(138,133,128)" font-size="11">고정관념화·불투명·확률적</text>
  <text x="385" y="271" fill="#f47f72" font-size="11">잘못된 분류 시 구제 거의 불가</text>

  <line x1="40" y1="300" x2="640" y2="300" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- Section C: feedback loop -->
  <text x="50" y="322" fill="rgb(212,168,83)" font-size="12" font-weight="700">③ 자기강화 피드백 루프 (신용 점수 → 고용 예시)</text>

  <rect x="80" y="338" width="130" height="40" rx="5" fill="#141414" stroke="#f47f72" stroke-width="1"/>
  <text x="145" y="362" text-anchor="middle" fill="#f47f72" font-size="11">재정 곤란 → 점수 하락</text>

  <line x1="210" y1="358" x2="270" y2="358" stroke="#f47f72" stroke-width="1.5" marker-end="url(#e1r)"/>

  <rect x="270" y="338" width="130" height="40" rx="5" fill="#141414" stroke="#f47f72" stroke-width="1"/>
  <text x="335" y="362" text-anchor="middle" fill="#f47f72" font-size="11">고용 거절</text>

  <line x1="400" y1="358" x2="460" y2="358" stroke="#f47f72" stroke-width="1.5" marker-end="url(#e1r)"/>

  <rect x="460" y="338" width="130" height="40" rx="5" fill="#141414" stroke="#f47f72" stroke-width="1"/>
  <text x="525" y="362" text-anchor="middle" fill="#f47f72" font-size="11">빈곤 심화</text>

  <path d="M525,378 L525,398 L145,398 L145,380" fill="none" stroke="#f47f72" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#e1r)"/>
  <text x="335" y="414" text-anchor="middle" fill="rgb(138,133,128)" font-size="10">하향 나선 — 수학적 엄밀함의 위장 뒤 독성 가정</text>

  <line x1="40" y1="428" x2="640" y2="428" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- Section D: systems thinking -->
  <text x="50" y="450" fill="rgb(212,168,83)" font-size="12" font-weight="700">④ 시스템 사고 — 전체 시스템으로 결과 예측</text>

  <rect x="50" y="460" width="270" height="76" rx="6" fill="#141414" stroke="rgb(138,133,128)" stroke-width="1"/>
  <text x="185" y="479" text-anchor="middle" fill="#e8e4df" font-size="11" font-weight="700">전산화된 부분만 본다</text>
  <text x="65" y="497" fill="rgb(138,133,128)" font-size="10">알고리즘 출력만 평가</text>
  <text x="65" y="513" fill="rgb(138,133,128)" font-size="10">사람의 반응 누락</text>
  <text x="65" y="528" fill="#f47f72" font-size="10">의도하지 않은 결과 발생</text>

  <rect x="370" y="460" width="270" height="76" rx="6" fill="#141414" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="505" y="479" text-anchor="middle" fill="#66bb6a" font-size="11" font-weight="700">사람까지 포함한 전체 시스템</text>
  <text x="385" y="497" fill="rgb(138,133,128)" font-size="10">사람의 행동까지 모델링</text>
  <text x="385" y="513" fill="rgb(138,133,128)" font-size="10">격차 강화 vs 불의 대응 판별</text>
  <text x="385" y="528" fill="#66bb6a" font-size="10">루프를 사전 예측·차단</text>

  <text x="340" y="478" text-anchor="middle" fill="rgb(212,168,83)" font-size="12" font-weight="700">→</text>

  <!-- Footer -->
  <line x1="40" y1="552" x2="640" y2="552" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="340" y="572" text-anchor="middle" fill="rgb(138,133,128)" font-size="10">DDIA 2nd Ed. Ch.14 — Predictive Analytics · Bias · Accountability · Feedback Loops · 14-01</text>
</svg>
