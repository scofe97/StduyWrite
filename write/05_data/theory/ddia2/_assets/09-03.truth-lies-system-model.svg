<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 660" font-family="Pretendard, sans-serif">
  <rect width="680" height="660" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">진실·거짓·시스템 모델</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">쿼럼 결정 · 펜싱 토큰 · 비잔틴 장애 · 안전성 vs 활동성</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 쿼럼 원칙 -->
  <text x="32" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">노드는 자신을 신뢰할 수 없다 — 쿼럼 결정</text>
  <rect x="32" y="124" width="616" height="64" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="48" y="146" fill="#e8e4df" font-size="10.5">GC 포즈로 1분 멈춘 노드가 깨어나면 자신이 여전히 리더라 믿습니다 — 나머지는 이미 새 리더를 선출했습니다</text>
  <text x="48" y="164" fill="rgb(212,168,83)" font-size="10.5">다수결이 한 노드를 죽었다고 선언하면 그것이 진실 · 당사자 노드는 스스로 물러나야 합니다</text>
  <text x="48" y="178" fill="rgb(138,133,128)" font-size="9.5">과반수 쿼럼: 3노드→1개, 5노드→2개 장애 허용 · 동시에 두 과반수가 존재할 수 없어 스플릿 브레인 방지</text>

  <!-- 펜싱 토큰 -->
  <text x="32" y="218" fill="rgb(212,168,83)" font-size="14" font-weight="700">펜싱 토큰 — 좀비와 지연 요청 모두 방어</text>

  <!-- 락 서비스 -->
  <rect x="32" y="230" width="120" height="40" rx="4" fill="rgb(212,168,83)" fill-opacity="0.15" stroke="rgb(212,168,83)"/>
  <text x="92" y="250" fill="rgb(212,168,83)" font-size="10" font-weight="700" text-anchor="middle">락 서비스</text>
  <text x="92" y="264" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">단조 증가 토큰 발급</text>

  <!-- 클라이언트 1 -->
  <rect x="200" y="230" width="120" height="40" rx="4" fill="#141414" stroke="#7fa8c9"/>
  <text x="260" y="250" fill="#7fa8c9" font-size="10" text-anchor="middle">클라이언트 1</text>
  <text x="260" y="264" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">토큰 33 획득 → 중단</text>

  <!-- 클라이언트 2 -->
  <rect x="200" y="284" width="120" height="40" rx="4" fill="#141414" stroke="#66bb6a"/>
  <text x="260" y="304" fill="#66bb6a" font-size="10" text-anchor="middle">클라이언트 2</text>
  <text x="260" y="318" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">토큰 34 획득 → 쓰기 성공</text>

  <!-- 저장소 -->
  <rect x="380" y="230" width="120" height="94" rx="4" fill="#141414" stroke="#7fa8c9"/>
  <text x="440" y="254" fill="#7fa8c9" font-size="10" font-weight="700" text-anchor="middle">저장소</text>
  <text x="440" y="272" fill="#e8e4df" font-size="9" text-anchor="middle">최신 토큰 기억</text>
  <text x="440" y="288" fill="#66bb6a" font-size="9" text-anchor="middle">토큰 34 쓰기 수락</text>
  <text x="440" y="304" fill="#f47f72" font-size="9" text-anchor="middle">토큰 33 쓰기 거부</text>

  <line x1="152" y1="250" x2="194" y2="250" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="320" y1="304" x2="374" y2="280" stroke="#66bb6a" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="320" y1="250" x2="374" y2="270" stroke="#f47f72" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#ar)"/>

  <text x="540" y="264" fill="#66bb6a" font-size="9">수락</text>
  <text x="540" y="284" fill="#f47f72" font-size="9">거부</text>

  <!-- 시스템 모델 -->
  <text x="32" y="362" fill="rgb(212,168,83)" font-size="14" font-weight="700">시스템 모델 — 타이밍 가정</text>
  <rect x="32" y="374" width="186" height="80" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="48" y="394" fill="rgb(138,133,128)" font-size="10" font-weight="700">동기 모델</text>
  <text x="48" y="412" fill="#e8e4df" font-size="9.5">지연·포즈·드리프트 상한 보장</text>
  <text x="48" y="428" fill="#f47f72" font-size="9">현실과 다름 — 무한 지연 발생</text>

  <rect x="246" y="374" width="186" height="80" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="262" y="394" fill="#7fa8c9" font-size="10" font-weight="700">부분 동기 모델 (현실적)</text>
  <text x="262" y="412" fill="#e8e4df" font-size="9.5">대부분 동기 · 때때로 상한 초과</text>
  <text x="262" y="428" fill="#66bb6a" font-size="9">실제 시스템에 가장 적합한 모델</text>

  <rect x="460" y="374" width="188" height="80" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="476" y="394" fill="rgb(138,133,128)" font-size="10" font-weight="700">비동기 모델</text>
  <text x="476" y="412" fill="#e8e4df" font-size="9.5">타이밍 가정 없음 · 시계 없음</text>
  <text x="476" y="428" fill="rgb(138,133,128)" font-size="9">장애 탐지 불가 — 매우 제한적</text>

  <!-- 안전성 vs 활동성 -->
  <text x="32" y="486" fill="rgb(212,168,83)" font-size="14" font-weight="700">안전성(Safety) vs 활동성(Liveness)</text>
  <rect x="32" y="498" width="296" height="84" rx="6" fill="#141414" stroke="#f47f72"/>
  <text x="48" y="518" fill="#f47f72" font-size="11" font-weight="700">안전성 — "나쁜 일이 절대 일어나지 않는다"</text>
  <text x="48" y="536" fill="#e8e4df" font-size="10">위반 시 특정 시점 지목 가능</text>
  <text x="48" y="552" fill="#e8e4df" font-size="10">한번 위반하면 되돌릴 수 없음</text>
  <text x="48" y="568" fill="rgb(138,133,128)" font-size="9.5">예: 펜싱 토큰 유일성, 단조 시퀀스</text>

  <rect x="352" y="498" width="296" height="84" rx="6" fill="#141414" stroke="#66bb6a"/>
  <text x="368" y="518" fill="#66bb6a" font-size="11" font-weight="700">활동성 — "좋은 일이 결국 일어난다"</text>
  <text x="368" y="536" fill="#e8e4df" font-size="10">지금 성립 안 해도 미래에 성립 가능</text>
  <text x="368" y="552" fill="#e8e4df" font-size="10">정의에 "eventually"가 자주 등장</text>
  <text x="368" y="568" fill="rgb(138,133,128)" font-size="9.5">예: 요청 가용성, 최종 일관성</text>

  <!-- 원칙 -->
  <rect x="32" y="598" width="616" height="48" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="48" y="618" fill="rgb(212,168,83)" font-size="10.5" font-weight="700">설계 원칙: 안전성은 항상 보장 · 활동성은 "과반수 노드 생존 + 네트워크 결국 복구"에 조건 부여</text>
  <text x="48" y="636" fill="rgb(138,133,128)" font-size="9.5">부분 동기 + 크래시-복구 모델이 실제 시스템 모델링에 가장 적합합니다</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
