<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 640" font-family="Pretendard, sans-serif">
  <rect width="680" height="640" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">다차원·전문·벡터 인덱스 + 4장 종합</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">여러 조건 동시 검색 · 키워드 · 의미 검색</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 다차원 -->
  <text x="32" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">다차원 인덱스</text>
  <rect x="32" y="124" width="300" height="86" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="48" y="146" fill="#e8e4df" font-size="11">concatenated(연결) 인덱스: (성,이름)</text>
  <text x="48" y="164" fill="rgb(138,133,128)" font-size="10.5">→ 위도·경도 동시 범위 쿼리엔 부족</text>
  <text x="48" y="186" fill="#66bb6a" font-size="11">R-tree·Bkd-tree·공간 채움 곡선</text>
  <text x="48" y="204" fill="rgb(138,133,128)" font-size="10">(date,temp) 같은 2D도 동시 좁힘</text>

  <!-- 전문 검색 -->
  <text x="348" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">전문 검색(full-text)</text>
  <rect x="348" y="124" width="300" height="86" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="364" y="146" fill="#e8e4df" font-size="11">inverted index: 단어 → 문서ID 리스트</text>
  <text x="364" y="164" fill="#e8e4df" font-size="10.5">(postings list, sparse bitmap 가능)</text>
  <text x="364" y="186" fill="#66bb6a" font-size="11">"x AND y" = 두 bitmap AND</text>
  <text x="364" y="204" fill="rgb(138,133,128)" font-size="10">Lucene: SSTable식 정렬 파일·편집거리(Levenshtein)</text>

  <!-- 벡터 임베딩 -->
  <text x="32" y="244" fill="rgb(212,168,83)" font-size="14" font-weight="700">벡터 임베딩 — 의미 검색(semantic search)</text>
  <rect x="32" y="256" width="616" height="80" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="48" y="278" fill="#e8e4df" font-size="11">임베딩 모델(LLM)이 문서를 부동소수 벡터로 변환 → 의미가 가까우면 벡터도 가까움</text>
  <text x="48" y="298" fill="#e8e4df" font-size="11">"구독 취소" ≈ "계정 닫기"(다른 단어, 가까운 의미) · 거리: cosine 유사도·유클리드</text>
  <text x="48" y="318" fill="rgb(138,133,128)" font-size="10.5">RAG(검색 증강 생성)의 핵심 · 멀티모달(텍스트·이미지) 모델로 발전</text>

  <!-- 벡터 인덱스 3종 -->
  <text x="32" y="362" fill="rgb(212,168,83)" font-size="14" font-weight="700">벡터 인덱스 3종 (R-tree는 고차원에 부적합)</text>
  <rect x="32" y="374" width="200" height="92" rx="6" fill="#141414" stroke="#7fa8c9"/>
  <text x="48" y="396" fill="#7fa8c9" font-size="12" font-weight="700">flat</text>
  <text x="48" y="416" fill="#e8e4df" font-size="10.5">벡터 그대로 저장</text>
  <text x="48" y="434" fill="#e8e4df" font-size="10.5">모든 벡터와 거리 측정</text>
  <text x="48" y="452" fill="#66bb6a" font-size="10">정확하지만 느림</text>

  <rect x="240" y="374" width="200" height="92" rx="6" fill="#141414" stroke="rgb(212,168,83)"/>
  <text x="256" y="396" fill="rgb(212,168,83)" font-size="12" font-weight="700">IVF</text>
  <text x="256" y="416" fill="#e8e4df" font-size="10.5">벡터 공간을 centroid로 분할</text>
  <text x="256" y="434" fill="#e8e4df" font-size="10.5">probe 수만큼 파티션 확인</text>
  <text x="256" y="452" fill="rgb(138,133,128)" font-size="10">빠르나 근사</text>

  <rect x="448" y="374" width="200" height="92" rx="6" fill="#141414" stroke="#66bb6a"/>
  <text x="464" y="396" fill="#66bb6a" font-size="12" font-weight="700">HNSW</text>
  <text x="464" y="416" fill="#e8e4df" font-size="10.5">다층 근접 그래프</text>
  <text x="464" y="434" fill="#e8e4df" font-size="10.5">상위층→하위층 따라 탐색</text>
  <text x="464" y="452" fill="rgb(138,133,128)" font-size="10">근사 · Faiss·pgvector</text>

  <!-- 4장 종합 -->
  <text x="32" y="498" fill="rgb(212,168,83)" font-size="14" font-weight="700">4장 종합</text>
  <rect x="32" y="510" width="300" height="100" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="48" y="532" fill="#7fa8c9" font-size="12" font-weight="700">OLTP 저장 두 학파</text>
  <text x="48" y="552" fill="#e8e4df" font-size="10.5">· log-structured(LSM): 쓰기 처리량↑</text>
  <text x="48" y="570" fill="#e8e4df" font-size="10.5">· update-in-place(B-tree): 읽기↑</text>
  <text x="48" y="592" fill="rgb(138,133,128)" font-size="10">둘 다 키→레코드 정렬 매핑·범위 쿼리</text>

  <rect x="348" y="510" width="300" height="100" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="364" y="532" fill="rgb(212,168,83)" font-size="12" font-weight="700">OLAP + 고급 인덱스</text>
  <text x="364" y="552" fill="#e8e4df" font-size="10.5">· 컬럼 지향+압축+벡터화/JIT</text>
  <text x="364" y="570" fill="#e8e4df" font-size="10.5">· 다차원(R-tree)·전문(inverted)</text>
  <text x="364" y="588" fill="#e8e4df" font-size="10.5">· 벡터(의미 검색)</text>
  <text x="364" y="604" fill="rgb(138,133,128)" font-size="9.5">내부를 알면 워크로드에 맞는 도구 선택·튜닝 가능</text>

  <line x1="32" y1="624" x2="648" y2="624" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="32" y="638" fill="rgb(138,133,128)" font-size="10.5">벡터 처리(SIMD 배치)와 임베딩 벡터(다차원 공간 위치)는 다른 의미 — 혼동 주의</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
