<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 660" font-family="Pretendard, sans-serif">
  <rect width="680" height="660" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">분산 시스템 검증과 9장 종합</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">모델 체커 · 결함 주입 · DST · 결정론 · 9장 종합 표</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 3가지 검증 접근법 -->
  <text x="32" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">분산 시스템 검증 세 가지 접근법</text>

  <rect x="32" y="124" width="190" height="120" rx="6" fill="#141414" stroke="#7fa8c9"/>
  <text x="48" y="144" fill="#7fa8c9" font-size="11" font-weight="700">모델 체커</text>
  <text x="48" y="162" fill="#e8e4df" font-size="10">TLA+, Gallina, FizzBee</text>
  <text x="48" y="178" fill="#e8e4df" font-size="10">알고리즘 명세의 모든 상태 탐색</text>
  <text x="48" y="194" fill="#66bb6a" font-size="9.5">모든 상태 체계적 탐색</text>
  <text x="48" y="210" fill="#f47f72" font-size="9.5">실제 코드 검사 아님</text>
  <text x="48" y="226" fill="rgb(138,133,128)" font-size="9">CockroachDB, TiDB, Kafka 적용</text>

  <rect x="244" y="124" width="190" height="120" rx="6" fill="#141414" stroke="rgb(212,168,83)"/>
  <text x="260" y="144" fill="rgb(212,168,83)" font-size="11" font-weight="700">결함 주입</text>
  <text x="260" y="162" fill="#e8e4df" font-size="10">Chaos Monkey, Jepsen</text>
  <text x="260" y="178" fill="#e8e4df" font-size="10">실제 환경에 실제 장애 주입</text>
  <text x="260" y="194" fill="#66bb6a" font-size="9.5">실제 코드를 실제 장애로 테스트</text>
  <text x="260" y="210" fill="#f47f72" font-size="9.5">재현성 낮음</text>
  <text x="260" y="226" fill="rgb(138,133,128)" font-size="9">Jepsen이 많은 시스템 버그 발견</text>

  <rect x="456" y="124" width="192" height="120" rx="6" fill="#101620" stroke="#66bb6a"/>
  <text x="472" y="144" fill="#66bb6a" font-size="11" font-weight="700">결정론적 시뮬레이션(DST)</text>
  <text x="472" y="162" fill="#e8e4df" font-size="10">FoundationDB, TigerBeetle</text>
  <text x="472" y="178" fill="#e8e4df" font-size="10">네트워크·I/O·시계 모두 모의 제어</text>
  <text x="472" y="194" fill="#66bb6a" font-size="9.5">재현 가능 · 수백만 시나리오 탐색</text>
  <text x="472" y="210" fill="#f47f72" font-size="9.5">코드 수정 필요할 수 있음</text>
  <text x="472" y="226" fill="rgb(138,133,128)" font-size="9">MadSim(Rust), Antithesis(하이퍼바이저)</text>

  <!-- DST 3가지 전략 -->
  <text x="32" y="276" fill="rgb(212,168,83)" font-size="13" font-weight="700">DST 구현 전략</text>
  <rect x="32" y="288" width="190" height="56" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="48" y="308" fill="#e8e4df" font-size="10" font-weight="700">애플리케이션 수준</text>
  <text x="48" y="326" fill="rgb(138,133,128)" font-size="9">처음부터 결정론적으로 설계</text>
  <text x="48" y="340" fill="rgb(138,133,128)" font-size="9">FoundationDB Flow, TigerBeetle</text>

  <rect x="244" y="288" width="190" height="56" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="260" y="308" fill="#e8e4df" font-size="10" font-weight="700">런타임 수준</text>
  <text x="260" y="326" fill="rgb(138,133,128)" font-size="9">비동기 런타임 패치</text>
  <text x="260" y="340" fill="rgb(138,133,128)" font-size="9">FrostDB(Go), MadSim(Rust Tokio)</text>

  <rect x="456" y="288" width="192" height="56" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="472" y="308" fill="#e8e4df" font-size="10" font-weight="700">머신 수준</text>
  <text x="472" y="326" fill="rgb(138,133,128)" font-size="9">커스텀 하이퍼바이저 전체 제어</text>
  <text x="472" y="340" fill="rgb(138,133,128)" font-size="9">Antithesis — 코드 수정 불필요</text>

  <!-- 결정론의 힘 -->
  <text x="32" y="376" fill="rgb(212,168,83)" font-size="13" font-weight="700">결정론이 단순화하는 것들</text>
  <rect x="32" y="388" width="616" height="60" rx="6" fill="#1a1410" stroke="#7fa8c9"/>
  <text x="48" y="408" fill="#7fa8c9" font-size="10.5">이벤트 소싱: 이벤트 로그 결정론적 재생 → 파생 뷰 재구성</text>
  <text x="48" y="424" fill="#7fa8c9" font-size="10.5">Durable Execution: 워크플로우 정의 결정론적 → 실행 내구성 보장</text>
  <text x="48" y="438" fill="#7fa8c9" font-size="10.5">상태 머신 복제: 같은 결정론적 트랜잭션 시퀀스 → 복제본 간 일관성</text>

  <!-- 9장 종합 표 -->
  <text x="32" y="482" fill="rgb(212,168,83)" font-size="13" font-weight="700">9장 종합 — 분산 시스템 세 가지 불신뢰 요소</text>
  <rect x="32" y="494" width="616" height="24" rx="4" fill="#1a1410"/>
  <text x="48" y="510" fill="rgb(212,168,83)" font-size="9.5" font-weight="700">요소</text>
  <text x="180" y="510" fill="rgb(212,168,83)" font-size="9.5" font-weight="700">원인</text>
  <text x="380" y="510" fill="rgb(212,168,83)" font-size="9.5" font-weight="700">결과</text>

  <rect x="32" y="518" width="616" height="20" rx="2" fill="#141414"/>
  <text x="48" y="532" fill="#e8e4df" font-size="9">패킷 유실·지연</text>
  <text x="180" y="532" fill="#e8e4df" font-size="9">비동기 패킷망 · 큐잉</text>
  <text x="380" y="532" fill="#f47f72" font-size="9">요청 성공 여부 불명</text>

  <rect x="32" y="538" width="616" height="20" rx="2" fill="#1a1410"/>
  <text x="48" y="552" fill="#e8e4df" font-size="9">프로세스 일시 중단</text>
  <text x="180" y="552" fill="#e8e4df" font-size="9">GC · VM 중단 · 스케줄링</text>
  <text x="380" y="552" fill="#f47f72" font-size="9">노드가 얼마나 멈췄는지 모름</text>

  <rect x="32" y="558" width="616" height="20" rx="2" fill="#141414"/>
  <text x="48" y="572" fill="#e8e4df" font-size="9">클럭 스큐·점프</text>
  <text x="180" y="572" fill="#e8e4df" font-size="9">쿼츠 드리프트 · NTP 한계</text>
  <text x="380" y="572" fill="#f47f72" font-size="9">이벤트 순서 판단 오류</text>

  <!-- 핵심 원칙 -->
  <rect x="32" y="598" width="616" height="50" rx="6" fill="#141414" stroke="rgb(212,168,83)"/>
  <text x="48" y="618" fill="rgb(212,168,83)" font-size="10.5" font-weight="700">장애 탐지: 동적 타임아웃 · 결정: 쿼럼 + 펜싱 토큰 · 시간: 논리 시계 사용</text>
  <text x="48" y="636" fill="rgb(138,133,128)" font-size="9.5">가능하면 단일 노드로 해결 · 내결함성·지리적 분산·무중단이 필요할 때만 분산 시스템을 씁니다</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
