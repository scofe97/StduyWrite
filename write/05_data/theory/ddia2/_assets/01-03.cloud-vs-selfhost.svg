<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 600" font-family="Pretendard, sans-serif">
  <rect width="680" height="600" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">클라우드 vs 셀프 호스팅</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">build냐 buy냐 — 누가 만들고 누가 운영하는가</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 스펙트럼 -->
  <text x="32" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">아웃소싱 스펙트럼</text>
  <rect x="32" y="124" width="180" height="74" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="122" y="148" fill="#e8e4df" font-size="12.5" text-anchor="middle" font-weight="700">맞춤 제작</text>
  <text x="122" y="166" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">bespoke · 직접 작성·운영</text>
  <text x="122" y="188" fill="#66bb6a" font-size="10.5" text-anchor="middle">통제·투자 최대</text>

  <rect x="250" y="124" width="180" height="74" rx="6" fill="#141414" stroke="#9cc3df"/>
  <text x="340" y="148" fill="#e8e4df" font-size="12.5" text-anchor="middle" font-weight="700">기성품 셀프 호스팅</text>
  <text x="340" y="166" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">MySQL 내려받아 설치</text>
  <text x="340" y="188" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">on-prem 또는 IaaS VM</text>

  <rect x="468" y="124" width="180" height="74" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="558" y="148" fill="#e8e4df" font-size="12.5" text-anchor="middle" font-weight="700">SaaS / 클라우드</text>
  <text x="558" y="166" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">벤더가 구현·운영, API만</text>
  <text x="558" y="188" fill="#f47f72" font-size="10.5" text-anchor="middle">통제·투자 최소</text>

  <line x1="212" y1="161" x2="248" y2="161" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="430" y1="161" x2="466" y2="161" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 장단점 -->
  <text x="32" y="234" fill="rgb(212,168,83)" font-size="14" font-weight="700">클라우드 트레이드오프</text>
  <rect x="32" y="246" width="300" height="120" rx="6" fill="#141414" stroke="#66bb6a"/>
  <text x="48" y="270" fill="#66bb6a" font-size="12.5" font-weight="700">장점</text>
  <text x="48" y="292" fill="#e8e4df" font-size="11.5">· 빠른 시작, 운영 위탁</text>
  <text x="48" y="312" fill="#e8e4df" font-size="11.5">· 부하 변동에 탄력적 확장</text>
  <text x="48" y="332" fill="#e8e4df" font-size="11.5">· 안 쓰는 자원 반납(비용 절감)</text>
  <text x="48" y="354" fill="#e8e4df" font-size="11.5">· 벤더의 운영 전문성</text>

  <rect x="348" y="246" width="300" height="120" rx="6" fill="#141414" stroke="#f47f72"/>
  <text x="364" y="270" fill="#f47f72" font-size="12.5" font-weight="700">단점</text>
  <text x="364" y="292" fill="#e8e4df" font-size="11.5">· 통제권 없음(기능·장애·디버깅)</text>
  <text x="364" y="312" fill="#e8e4df" font-size="11.5">· vendor lock-in(표준 API 부재)</text>
  <text x="364" y="332" fill="#e8e4df" font-size="11.5">· 지정학·제재 위험</text>
  <text x="364" y="354" fill="#e8e4df" font-size="11.5">· 데이터 보안·규제 준수 신뢰</text>

  <!-- cloud native: 저장·연산 분리 -->
  <text x="32" y="402" fill="rgb(212,168,83)" font-size="14" font-weight="700">cloud native 핵심 — 저장과 연산의 분리</text>

  <rect x="32" y="416" width="180" height="64" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="122" y="442" fill="#e8e4df" font-size="12" text-anchor="middle" font-weight="700">오브젝트 스토어</text>
  <text x="122" y="462" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">S3 · 저장만, 머신 숨김</text>

  <rect x="250" y="416" width="180" height="64" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="340" y="442" fill="#e8e4df" font-size="12" text-anchor="middle" font-weight="700">연산 노드(분리)</text>
  <text x="340" y="462" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">독립 확장 · 분석 코드</text>

  <rect x="468" y="416" width="180" height="64" rx="6" fill="#141414" stroke="#9cc3df"/>
  <text x="558" y="442" fill="#e8e4df" font-size="12" text-anchor="middle" font-weight="700">로컬 디스크</text>
  <text x="558" y="462" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">휘발성 캐시로 취급</text>

  <line x1="212" y1="448" x2="248" y2="448" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="230" y="438" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">네트워크</text>

  <line x1="32" y1="506" x2="648" y2="506" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="32" y="532" fill="rgb(138,133,128)" font-size="12">전통 구조: 한 머신이 저장(디스크)+연산(CPU/RAM) 동시. cloud native: 둘을 분리(disaggregate)</text>
  <text x="32" y="554" fill="rgb(138,133,128)" font-size="12">멀티테넌시 — 여러 고객이 같은 하드웨어 공유 → 활용률↑, 단 격리(보안·성능) 엔지니어링 필요</text>
  <text x="32" y="576" fill="rgb(138,133,128)" font-size="12">운영의 역할: 머신 관리 → 서비스 선택·통합·이전. 용량 계획 → 재무 계획(DevOps/SRE)</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
