<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 640" font-family="Pretendard, sans-serif">
  <rect width="680" height="640" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">스트림 전송 — 메시지 브로커와 로그 기반 브로커</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">이벤트 · 프로듀서/컨슈머 · AMQP vs 로그 기반 · 파티션·오프셋 · DLQ</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- AMQP/JMS vs 로그 기반 비교 -->
  <text x="32" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">브로커 유형 비교</text>

  <!-- AMQP 박스 -->
  <rect x="32" y="124" width="290" height="130" rx="6" fill="#141414" stroke="#f47f72"/>
  <text x="177" y="146" fill="#f47f72" font-size="12" font-weight="700" text-anchor="middle">AMQP/JMS (RabbitMQ 등)</text>
  <text x="48" y="166" fill="#e8e4df" font-size="10">소비 후 즉시 삭제 (파괴적 소비)</text>
  <text x="48" y="184" fill="#e8e4df" font-size="10">메시지 단위 ACK + 재전달</text>
  <text x="48" y="202" fill="#e8e4df" font-size="10">재처리 불가 (소비 = 삭제)</text>
  <text x="48" y="220" fill="rgb(138,133,128)" font-size="9.5">적합: 처리 비용 높고 순서 덜 중요한 태스크 큐</text>
  <text x="48" y="238" fill="rgb(138,133,128)" font-size="9.5">DLQ: 반복 실패 메시지 격리</text>

  <!-- 로그 기반 박스 -->
  <rect x="358" y="124" width="290" height="130" rx="6" fill="#141414" stroke="#66bb6a"/>
  <text x="503" y="146" fill="#66bb6a" font-size="12" font-weight="700" text-anchor="middle">로그 기반 (Kafka, Kinesis)</text>
  <text x="374" y="166" fill="#e8e4df" font-size="10">소비해도 메시지 유지 (비파괴적)</text>
  <text x="374" y="184" fill="#e8e4df" font-size="10">오프셋으로 위치 추적 + 재처리 가능</text>
  <text x="374" y="202" fill="#e8e4df" font-size="10">파티션 내 순서 보장</text>
  <text x="374" y="220" fill="rgb(138,133,128)" font-size="9.5">적합: 높은 처리량, 팬아웃, 재처리 필요</text>
  <text x="374" y="238" fill="rgb(138,133,128)" font-size="9.5">계층화 스토리지: 오래된 메시지를 S3/Iceberg로</text>

  <!-- 파티션·오프셋 구조 -->
  <text x="32" y="286" fill="rgb(212,168,83)" font-size="14" font-weight="700">Kafka 파티션·오프셋 구조</text>

  <!-- 파티션 0 -->
  <rect x="32" y="298" width="616" height="36" rx="4" fill="#1a1410" stroke="rgb(42,37,32)"/>
  <text x="48" y="314" fill="rgb(138,133,128)" font-size="10">Partition 0</text>
  <!-- 오프셋 셀 -->
  <rect x="120" y="302" width="56" height="28" rx="3" fill="#141414" stroke="#7fa8c9"/>
  <text x="148" y="320" fill="#7fa8c9" font-size="10" text-anchor="middle">offset 0</text>
  <rect x="184" y="302" width="56" height="28" rx="3" fill="#141414" stroke="#7fa8c9"/>
  <text x="212" y="320" fill="#7fa8c9" font-size="10" text-anchor="middle">offset 1</text>
  <rect x="248" y="302" width="56" height="28" rx="3" fill="#141414" stroke="#7fa8c9"/>
  <text x="276" y="320" fill="#7fa8c9" font-size="10" text-anchor="middle">offset 2</text>
  <rect x="312" y="302" width="56" height="28" rx="3" fill="#141414" stroke="#66bb6a"/>
  <text x="340" y="320" fill="#66bb6a" font-size="10" text-anchor="middle">offset 3</text>
  <rect x="376" y="302" width="56" height="28" rx="3" fill="#141414" stroke="#66bb6a"/>
  <text x="404" y="320" fill="#66bb6a" font-size="10" text-anchor="middle">offset 4</text>
  <rect x="440" y="302" width="56" height="28" rx="3" fill="#101620" stroke="rgb(42,37,32)"/>
  <text x="468" y="320" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">offset 5...</text>
  <text x="510" y="320" fill="rgb(138,133,128)" font-size="9">← append only</text>

  <!-- 컨슈머 오프셋 마커 -->
  <line x1="340" y1="334" x2="340" y2="358" stroke="rgb(212,168,83)" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="340" y="372" fill="rgb(212,168,83)" font-size="9.5" text-anchor="middle">컨슈머 A 오프셋=3</text>

  <!-- 팬아웃 vs 로드밸런싱 -->
  <text x="32" y="408" fill="rgb(212,168,83)" font-size="14" font-weight="700">소비 패턴</text>

  <rect x="32" y="420" width="290" height="76" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="177" y="440" fill="#7fa8c9" font-size="11" font-weight="700" text-anchor="middle">로드 밸런싱</text>
  <text x="48" y="460" fill="#e8e4df" font-size="9.5">메시지 → 컨슈머 그룹 내 1개에 전달</text>
  <text x="48" y="476" fill="#e8e4df" font-size="9.5">파티션 단위 할당으로 병렬 처리</text>
  <text x="48" y="490" fill="rgb(138,133,128)" font-size="9">처리 비용이 높을 때 소비자 추가로 확장</text>

  <rect x="358" y="420" width="290" height="76" rx="6" fill="#101620" stroke="#66bb6a"/>
  <text x="503" y="440" fill="#66bb6a" font-size="11" font-weight="700" text-anchor="middle">팬아웃(Fan-out)</text>
  <text x="374" y="460" fill="#e8e4df" font-size="9.5">메시지 → 모든 컨슈머 그룹에 전달</text>
  <text x="374" y="476" fill="#e8e4df" font-size="9.5">각 그룹이 독립적으로 같은 로그를 읽음</text>
  <text x="374" y="490" fill="rgb(138,133,128)" font-size="9">같은 데이터를 서로 다른 목적으로 처리할 때</text>

  <!-- 재처리 능력 -->
  <text x="32" y="530" fill="rgb(212,168,83)" font-size="14" font-weight="700">로그 기반의 재처리 능력</text>
  <rect x="32" y="542" width="616" height="68" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="48" y="562" fill="#e8e4df" font-size="10.5">오프셋을 과거 시점으로 되감으면 동일 이벤트를 다시 처리할 수 있습니다.</text>
  <text x="48" y="580" fill="#e8e4df" font-size="10.5">버그 수정 후 재처리, 새 처리 로직 실험, 파생 시스템 재구축에 활용합니다.</text>
  <text x="48" y="598" fill="rgb(138,133,128)" font-size="9.5">이는 배치 처리의 불변 입력 원칙과 동일합니다 — 재처리가 원본을 훼손하지 않습니다.</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
