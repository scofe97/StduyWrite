<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Arial, sans-serif" font-size="13">

  <!-- Background -->
  <rect width="900" height="560" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">합의와 코디네이션 서비스</text>

  <!-- ===== LEFT PANEL: Consensus Algorithm (Raft) ===== -->
  <rect x="20" y="50" width="380" height="230" fill="#EBF5FB" rx="6" stroke="#5DADE2" stroke-width="1.5"/>
  <text x="210" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#1A5276">합의 알고리즘 — 에포크 기반 Raft</text>

  <!-- Round 1: Leader Election -->
  <rect x="40" y="85" width="340" height="80" fill="#D6EAF8" rx="4" stroke="#85C1E9" stroke-width="1"/>
  <text x="210" y="103" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A5276">Round 1 — 리더 선출 (투표)</text>

  <!-- Nodes for election -->
  <!-- Candidate -->
  <circle cx="100" cy="140" r="22" fill="#F9E79F" stroke="#F1C40F" stroke-width="2"/>
  <text x="100" y="136" text-anchor="middle" font-size="10" fill="#7D6608">Candidate</text>
  <text x="100" y="149" text-anchor="middle" font-size="10" fill="#7D6608">term=5</text>

  <!-- Follower 1 -->
  <circle cx="210" cy="140" r="22" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.5"/>
  <text x="210" y="136" text-anchor="middle" font-size="10" fill="#145A32">Follower</text>
  <text x="210" y="149" text-anchor="middle" font-size="10" fill="#145A32">✓ vote</text>

  <!-- Follower 2 -->
  <circle cx="320" cy="140" r="22" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.5"/>
  <text x="320" y="136" text-anchor="middle" font-size="10" fill="#145A32">Follower</text>
  <text x="320" y="149" text-anchor="middle" font-size="10" fill="#145A32">✓ vote</text>

  <!-- Vote arrows -->
  <line x1="122" y1="135" x2="188" y2="135" stroke="#E67E22" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="232" y1="140" x2="298" y2="140" stroke="#E67E22" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="155" y="128" text-anchor="middle" font-size="9" fill="#E67E22">RequestVote</text>

  <!-- Round 2: Log Replication -->
  <rect x="40" y="175" width="340" height="90" fill="#D6EAF8" rx="4" stroke="#85C1E9" stroke-width="1"/>
  <text x="210" y="193" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A5276">Round 2 — 로그 항목 추가 (쿼럼)</text>

  <!-- Leader -->
  <rect x="55" y="205" width="60" height="48" fill="#F9E79F" stroke="#F1C40F" stroke-width="2" rx="3"/>
  <text x="85" y="222" text-anchor="middle" font-size="10" font-weight="bold" fill="#7D6608">Leader</text>
  <text x="85" y="235" text-anchor="middle" font-size="9" fill="#7D6608">term=5</text>
  <text x="85" y="248" text-anchor="middle" font-size="9" fill="#7D6608">[cmd]→log</text>

  <!-- Follower replicas -->
  <rect x="175" y="205" width="50" height="48" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.5" rx="3"/>
  <text x="200" y="222" text-anchor="middle" font-size="10" fill="#145A32">Replica</text>
  <text x="200" y="238" text-anchor="middle" font-size="9" fill="#145A32">✓ ack</text>
  <text x="200" y="251" text-anchor="middle" font-size="9" fill="#145A32">[cmd]</text>

  <rect x="285" y="205" width="50" height="48" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.5" rx="3"/>
  <text x="310" y="222" text-anchor="middle" font-size="10" fill="#145A32">Replica</text>
  <text x="310" y="238" text-anchor="middle" font-size="9" fill="#145A32">✓ ack</text>
  <text x="310" y="251" text-anchor="middle" font-size="9" fill="#145A32">[cmd]</text>

  <line x1="115" y1="229" x2="170" y2="229" stroke="#2980B9" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="225" y1="229" x2="280" y2="229" stroke="#2980B9" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="148" y="222" text-anchor="middle" font-size="9" fill="#2980B9">AppendEntries</text>
  <text x="253" y="222" text-anchor="middle" font-size="9" fill="#2980B9">replicate</text>

  <!-- ===== RIGHT PANEL: Coordination Services ===== -->
  <rect x="420" y="50" width="460" height="230" fill="#F9F0FF" rx="6" stroke="#A569BD" stroke-width="1.5"/>
  <text x="650" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#6C3483">코디네이션 서비스 — ZooKeeper / etcd</text>

  <!-- Feature boxes -->
  <!-- Lock & Lease -->
  <rect x="440" y="85" width="190" height="55" fill="#E8DAEF" rx="4" stroke="#A569BD" stroke-width="1"/>
  <text x="535" y="103" text-anchor="middle" font-size="11" font-weight="bold" fill="#6C3483">락 / 리스</text>
  <text x="535" y="118" text-anchor="middle" font-size="10" fill="#4A235A">CAS로 구현 (fault-tolerant)</text>
  <text x="535" y="132" text-anchor="middle" font-size="10" fill="#4A235A">펜싱 토큰 = zxid / revision</text>

  <!-- Failure Detection -->
  <rect x="645" y="85" width="215" height="55" fill="#E8DAEF" rx="4" stroke="#A569BD" stroke-width="1"/>
  <text x="752" y="103" text-anchor="middle" font-size="11" font-weight="bold" fill="#6C3483">장애 탐지</text>
  <text x="752" y="118" text-anchor="middle" font-size="10" fill="#4A235A">장기 세션 + 하트비트</text>
  <text x="752" y="132" text-anchor="middle" font-size="10" fill="#4A235A">에페머럴 노드 자동 삭제</text>

  <!-- Change Notification -->
  <rect x="440" y="150" width="190" height="55" fill="#E8DAEF" rx="4" stroke="#A569BD" stroke-width="1"/>
  <text x="535" y="168" text-anchor="middle" font-size="11" font-weight="bold" fill="#6C3483">변경 알림</text>
  <text x="535" y="183" text-anchor="middle" font-size="10" fill="#4A235A">Watch API</text>
  <text x="535" y="197" text-anchor="middle" font-size="10" fill="#4A235A">키 변경 시 클라이언트 통지</text>

  <!-- Use Cases -->
  <rect x="645" y="150" width="215" height="55" fill="#E8DAEF" rx="4" stroke="#A569BD" stroke-width="1"/>
  <text x="752" y="168" text-anchor="middle" font-size="11" font-weight="bold" fill="#6C3483">사용 사례</text>
  <text x="752" y="183" text-anchor="middle" font-size="10" fill="#4A235A">리더 선출 · 샤드 할당</text>
  <text x="752" y="197" text-anchor="middle" font-size="10" fill="#4A235A">설정 관리 · 서비스 디스커버리</text>

  <!-- Observer note -->
  <rect x="440" y="215" width="420" height="55" fill="#D7BDE2" rx="4" stroke="#A569BD" stroke-width="1"/>
  <text x="650" y="233" text-anchor="middle" font-size="11" font-weight="bold" fill="#4A235A">ZooKeeper Observer (읽기 전용 복제본)</text>
  <text x="650" y="249" text-anchor="middle" font-size="10" fill="#4A235A">투표 미참여 → 선형화 보장 X, 하지만 읽기 가용성 확장 O</text>
  <text x="650" y="262" text-anchor="middle" font-size="10" fill="#4A235A">쿼럼 크기를 늘리지 않고 지리적 리드 확산 가능</text>

  <!-- ===== BOTTOM PANEL: Equivalences ===== -->
  <rect x="20" y="295" width="860" height="120" fill="#FDFEFE" rx="6" stroke="#85929E" stroke-width="1.5"/>
  <text x="450" y="315" text-anchor="middle" font-size="13" font-weight="bold" fill="#1A1A2E">동치 문제들 (상호 변환 가능)</text>

  <!-- Boxes for equivalences -->
  <rect x="35" y="325" width="150" height="75" fill="#D6EAF8" rx="4" stroke="#5DADE2" stroke-width="1"/>
  <text x="110" y="343" text-anchor="middle" font-size="11" font-weight="bold" fill="#1A5276">단일 값 합의</text>
  <text x="110" y="358" text-anchor="middle" font-size="10" fill="#1A5276">agreement</text>
  <text x="110" y="372" text-anchor="middle" font-size="10" fill="#1A5276">integrity · validity</text>
  <text x="110" y="386" text-anchor="middle" font-size="10" fill="#1A5276">termination</text>

  <!-- arrow -->
  <line x1="185" y1="362" x2="215" y2="362" stroke="#5DADE2" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="215" y1="362" x2="185" y2="362" stroke="#5DADE2" stroke-width="1.5" marker-end="url(#arr2)"/>

  <rect x="215" y="325" width="145" height="75" fill="#D5F5E3" rx="4" stroke="#27AE60" stroke-width="1"/>
  <text x="287" y="343" text-anchor="middle" font-size="11" font-weight="bold" fill="#145A32">Total Order</text>
  <text x="287" y="358" text-anchor="middle" font-size="11" font-weight="bold" fill="#145A32">Broadcast</text>
  <text x="287" y="374" text-anchor="middle" font-size="10" fill="#145A32">(공유 로그)</text>
  <text x="287" y="388" text-anchor="middle" font-size="10" fill="#145A32">= 상태 머신 복제</text>

  <!-- arrow -->
  <line x1="360" y1="362" x2="390" y2="362" stroke="#27AE60" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="390" y1="362" x2="360" y2="362" stroke="#27AE60" stroke-width="1.5" marker-end="url(#arr2)"/>

  <rect x="390" y="325" width="145" height="75" fill="#FDEBD0" rx="4" stroke="#E67E22" stroke-width="1"/>
  <text x="462" y="343" text-anchor="middle" font-size="11" font-weight="bold" fill="#784212">선형화</text>
  <text x="462" y="358" text-anchor="middle" font-size="11" font-weight="bold" fill="#784212">CAS / fetch-and-add</text>
  <text x="462" y="374" text-anchor="middle" font-size="10" fill="#784212">레지스터 1개 기준</text>
  <text x="462" y="388" text-anchor="middle" font-size="10" fill="#784212">2노드 한정 동치</text>

  <!-- arrow -->
  <line x1="535" y1="362" x2="565" y2="362" stroke="#E67E22" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="565" y1="362" x2="535" y2="362" stroke="#E67E22" stroke-width="1.5" marker-end="url(#arr2)"/>

  <rect x="565" y="325" width="145" height="75" fill="#FDEDEC" rx="4" stroke="#E74C3C" stroke-width="1"/>
  <text x="637" y="343" text-anchor="middle" font-size="11" font-weight="bold" fill="#7B241C">원자 커밋</text>
  <text x="637" y="358" text-anchor="middle" font-size="11" font-weight="bold" fill="#7B241C">(2PC)</text>
  <text x="637" y="374" text-anchor="middle" font-size="10" fill="#7B241C">abort 규칙 다름</text>
  <text x="637" y="388" text-anchor="middle" font-size="10" fill="#7B241C">코디네이터 SPOF</text>

  <!-- FLP box -->
  <rect x="725" y="325" width="145" height="75" fill="#F8F9F9" rx="4" stroke="#85929E" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="797" y="343" text-anchor="middle" font-size="11" font-weight="bold" fill="#424949">FLP 불가능성</text>
  <text x="797" y="358" text-anchor="middle" font-size="10" fill="#424949">비동기 모델에서</text>
  <text x="797" y="372" text-anchor="middle" font-size="10" fill="#424949">종료 보장 불가</text>
  <text x="797" y="386" text-anchor="middle" font-size="10" fill="#424949">→ 타임아웃으로 해결</text>

  <!-- ===== BOTTOM: Cost section ===== -->
  <rect x="20" y="430" width="860" height="115" fill="#FEF9E7" rx="6" stroke="#F1C40F" stroke-width="1.5"/>
  <text x="450" y="450" text-anchor="middle" font-size="13" font-weight="bold" fill="#7D6608">합의의 비용과 한계</text>

  <!-- Cost items -->
  <rect x="35" y="460" width="185" height="70" fill="#FEF5E4" rx="4" stroke="#F39C12" stroke-width="1"/>
  <text x="127" y="478" text-anchor="middle" font-size="11" font-weight="bold" fill="#7D6608">엄격한 과반수</text>
  <text x="127" y="494" text-anchor="middle" font-size="10" fill="#7D6608">3노드 → 1개 장애 허용</text>
  <text x="127" y="508" text-anchor="middle" font-size="10" fill="#7D6608">5노드 → 2개 장애 허용</text>
  <text x="127" y="522" text-anchor="middle" font-size="10" fill="#7D6608">노드 추가 ≠ 처리량 증가</text>

  <rect x="235" y="460" width="185" height="70" fill="#FEF5E4" rx="4" stroke="#F39C12" stroke-width="1"/>
  <text x="327" y="478" text-anchor="middle" font-size="11" font-weight="bold" fill="#7D6608">타임아웃 튜닝 어려움</text>
  <text x="327" y="494" text-anchor="middle" font-size="10" fill="#7D6608">너무 크면 복구 지연</text>
  <text x="327" y="508" text-anchor="middle" font-size="10" fill="#7D6608">너무 작으면 잦은 재선출</text>
  <text x="327" y="522" text-anchor="middle" font-size="10" fill="#7D6608">pre-vote로 완화 (Raft)</text>

  <rect x="435" y="460" width="185" height="70" fill="#FEF5E4" rx="4" stroke="#F39C12" stroke-width="1"/>
  <text x="527" y="478" text-anchor="middle" font-size="11" font-weight="bold" fill="#7D6608">지리 분산 문제</text>
  <text x="527" y="494" text-anchor="middle" font-size="10" fill="#7D6608">리더 ↔ 팔로워 왕복 지연</text>
  <text x="527" y="508" text-anchor="middle" font-size="10" fill="#7D6608">데이터센터 간 쿼럼 비용</text>
  <text x="527" y="522" text-anchor="middle" font-size="10" fill="#7D6608">다중 리더 복제와 트레이드오프</text>

  <rect x="635" y="460" width="235" height="70" fill="#FEF5E4" rx="4" stroke="#F39C12" stroke-width="1"/>
  <text x="752" y="478" text-anchor="middle" font-size="11" font-weight="bold" fill="#7D6608">대안적 접근</text>
  <text x="752" y="494" text-anchor="middle" font-size="10" fill="#7D6608">EPaxos: 리더 없는 프로토콜</text>
  <text x="752" y="508" text-anchor="middle" font-size="10" fill="#7D6608">BFT: 악의적 노드 허용 (비용 큼)</text>
  <text x="752" y="522" text-anchor="middle" font-size="10" fill="#7D6608">서비스 디스커버리 → DNS 적합</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5DADE2"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#5DADE2"/>
    </marker>
  </defs>

</svg>
