<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="13">

  <!-- Background -->
  <rect width="760" height="480" fill="#F8F9FA" rx="8"/>

  <!-- Title -->
  <text x="380" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#1A1A2E">선형성의 비용과 CAP / PACELC</text>

  <!-- ===== LEFT PANEL: CAP triangle ===== -->
  <rect x="20" y="50" width="340" height="200" rx="6" fill="#FFFFFF" stroke="#CED4DA" stroke-width="1"/>
  <text x="190" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#343A40">CAP 정리 (역사적 관심사)</text>

  <!-- Triangle -->
  <polygon points="190,88 80,220 300,220" fill="#E9ECEF" stroke="#ADB5BD" stroke-width="1.5"/>

  <!-- Vertices -->
  <circle cx="190" cy="88" r="20" fill="#74C0FC" stroke="#339AF0" stroke-width="1.5"/>
  <text x="190" y="93" text-anchor="middle" font-size="12" font-weight="bold" fill="#003B6D">C</text>
  <text x="190" y="70" text-anchor="middle" font-size="11" fill="#1971C2">일관성</text>
  <text x="190" y="82" text-anchor="middle" font-size="10" fill="#1971C2">(선형성)</text>

  <circle cx="80" cy="220" r="20" fill="#8CE99A" stroke="#40C057" stroke-width="1.5"/>
  <text x="80" y="225" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B4332">A</text>
  <text x="56" y="248" text-anchor="middle" font-size="11" fill="#2F9E44">가용성</text>

  <circle cx="300" cy="220" r="20" fill="#FFA94D" stroke="#F76707" stroke-width="1.5"/>
  <text x="300" y="225" text-anchor="middle" font-size="12" font-weight="bold" fill="#7A2800">P</text>
  <text x="324" y="248" text-anchor="middle" font-size="11" fill="#D9480F">파티션 내성</text>

  <!-- Edge labels -->
  <text x="118" y="165" text-anchor="middle" font-size="10" fill="#6C757D">CA</text>
  <text x="262" y="165" text-anchor="middle" font-size="10" fill="#6C757D">CP</text>
  <text x="192" y="238" text-anchor="middle" font-size="10" fill="#6C757D">AP</text>

  <!-- Annotation -->
  <text x="190" y="268" text-anchor="middle" font-size="11" fill="#868E96">파티션(P)은 선택지가 아님 — 언젠가 반드시 발생합니다</text>

  <!-- ===== RIGHT PANEL: PACELC ===== -->
  <rect x="380" y="50" width="360" height="200" rx="6" fill="#FFFFFF" stroke="#CED4DA" stroke-width="1"/>
  <text x="560" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#343A40">PACELC (실용적 확장)</text>

  <!-- Partition branch -->
  <rect x="400" y="85" width="100" height="36" rx="4" fill="#FFE8CC" stroke="#F76707" stroke-width="1"/>
  <text x="450" y="107" text-anchor="middle" font-size="12" font-weight="bold" fill="#7A2800">P(파티션)</text>

  <!-- AP arrow -->
  <line x1="400" y1="103" x2="340" y2="103" stroke="#ADB5BD" stroke-width="1" marker-end="url(#arr)"/>
  <!-- Hmm, let me keep within bounds -->
  <line x1="450" y1="121" x2="420" y2="148" stroke="#40C057" stroke-width="1.5"/>
  <rect x="390" y="148" width="60" height="28" rx="4" fill="#D3F9D8" stroke="#40C057" stroke-width="1"/>
  <text x="420" y="166" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B4332">A 선택</text>

  <line x1="450" y1="121" x2="490" y2="148" stroke="#339AF0" stroke-width="1.5"/>
  <rect x="460" y="148" width="60" height="28" rx="4" fill="#D0EBFF" stroke="#339AF0" stroke-width="1"/>
  <text x="490" y="166" text-anchor="middle" font-size="11" font-weight="bold" fill="#003B6D">C 선택</text>

  <!-- Else branch -->
  <rect x="570" y="85" width="150" height="36" rx="4" fill="#E8F4FD" stroke="#339AF0" stroke-width="1"/>
  <text x="645" y="107" text-anchor="middle" font-size="12" font-weight="bold" fill="#003B6D">E(정상 운영)</text>

  <line x1="645" y1="121" x2="615" y2="148" stroke="#DA77F2" stroke-width="1.5"/>
  <rect x="580" y="148" width="60" height="28" rx="4" fill="#F3D9FA" stroke="#DA77F2" stroke-width="1"/>
  <text x="610" y="166" text-anchor="middle" font-size="11" font-weight="bold" fill="#5F3272">L 선택</text>
  <text x="610" y="180" text-anchor="middle" font-size="10" fill="#7048A8">지연 감소</text>

  <line x1="645" y1="121" x2="675" y2="148" stroke="#339AF0" stroke-width="1.5"/>
  <rect x="650" y="148" width="60" height="28" rx="4" fill="#D0EBFF" stroke="#339AF0" stroke-width="1"/>
  <text x="680" y="166" text-anchor="middle" font-size="11" font-weight="bold" fill="#003B6D">C 선택</text>
  <text x="680" y="180" text-anchor="middle" font-size="10" fill="#1971C2">일관성 보장</text>

  <text x="560" y="210" text-anchor="middle" font-size="10.5" fill="#868E96">정상 상황에서도 지연(L) vs 일관성(C) 트레이드오프가 존재합니다</text>

  <!-- ===== BOTTOM: Network partition + CPU cache ===== -->
  <!-- Network Partition example -->
  <rect x="20" y="270" width="340" height="190" rx="6" fill="#FFFFFF" stroke="#CED4DA" stroke-width="1"/>
  <text x="190" y="292" text-anchor="middle" font-size="13" font-weight="bold" fill="#343A40">파티션 발생 시 선택</text>

  <!-- Region A (leader) -->
  <rect x="35" y="304" width="130" height="50" rx="4" fill="#D0EBFF" stroke="#339AF0" stroke-width="1.5"/>
  <text x="100" y="323" text-anchor="middle" font-size="11" font-weight="bold" fill="#1971C2">리전 A (리더)</text>
  <text x="100" y="340" text-anchor="middle" font-size="10" fill="#343A40">읽기·쓰기 가능</text>

  <!-- Region B (follower) -->
  <rect x="195" y="304" width="130" height="50" rx="4" fill="#FFE3E3" stroke="#FA5252" stroke-width="1.5"/>
  <text x="260" y="323" text-anchor="middle" font-size="11" font-weight="bold" fill="#C92A2A">리전 B (팔로워)</text>
  <text x="260" y="340" text-anchor="middle" font-size="10" fill="#343A40">단절 → 선택 필요</text>

  <!-- Partition line -->
  <line x1="167" y1="295" x2="192" y2="295" stroke="#FA5252" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="167" y1="365" x2="192" y2="365" stroke="#FA5252" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="180" y="286" text-anchor="middle" font-size="10" fill="#FA5252">파티션</text>

  <!-- CP / AP boxes -->
  <rect x="35" y="368" width="130" height="36" rx="4" fill="#D3F9D8" stroke="#40C057" stroke-width="1.5"/>
  <text x="100" y="383" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B4332">CP 선택</text>
  <text x="100" y="397" text-anchor="middle" font-size="10" fill="#343A40">리전 B 읽기 차단</text>

  <rect x="195" y="368" width="130" height="36" rx="4" fill="#FFE8CC" stroke="#F76707" stroke-width="1.5"/>
  <text x="260" y="383" text-anchor="middle" font-size="11" font-weight="bold" fill="#7A2800">AP 선택</text>
  <text x="260" y="397" text-anchor="middle" font-size="10" fill="#343A40">리전 B 스테일 허용</text>

  <text x="190" y="432" text-anchor="middle" font-size="10.5" fill="#868E96">두 전략 모두 파티션 자체는 피할 수 없습니다</text>
  <text x="190" y="448" text-anchor="middle" font-size="10.5" fill="#868E96">선형성 포기의 주 이유 = 성능(지연), 장애 내성이 아닙니다</text>

  <!-- ===== BOTTOM RIGHT: Attiya-Welch bound ===== -->
  <rect x="380" y="270" width="360" height="190" rx="6" fill="#FFFFFF" stroke="#CED4DA" stroke-width="1"/>
  <text x="560" y="292" text-anchor="middle" font-size="13" font-weight="bold" fill="#343A40">선형성의 성능 하한 (Attiya·Welch)</text>

  <!-- Formula box -->
  <rect x="400" y="304" width="320" height="44" rx="4" fill="#FFF9DB" stroke="#F59F00" stroke-width="1.5"/>
  <text x="560" y="322" text-anchor="middle" font-size="12" font-weight="bold" fill="#7A4A00">응답 시간 ≥ 네트워크 지연 불확실성</text>
  <text x="560" y="340" text-anchor="middle" font-size="11" fill="#7A4A00">더 빠른 알고리즘은 존재하지 않습니다</text>

  <!-- CPU cache comparison -->
  <rect x="400" y="358" width="150" height="70" rx="4" fill="#F3F0FF" stroke="#845EF7" stroke-width="1"/>
  <text x="475" y="375" text-anchor="middle" font-size="11" font-weight="bold" fill="#4A0E8F">멀티코어 CPU</text>
  <text x="475" y="391" text-anchor="middle" font-size="10" fill="#343A40">캐시·스토어 버퍼로</text>
  <text x="475" y="405" text-anchor="middle" font-size="10" fill="#343A40">비선형화 → 성능</text>
  <text x="475" y="419" text-anchor="middle" font-size="10" fill="#845EF7">메모리 배리어로 극복</text>

  <rect x="570" y="358" width="150" height="70" rx="4" fill="#E6FCF5" stroke="#0CA678" stroke-width="1"/>
  <text x="645" y="375" text-anchor="middle" font-size="11" font-weight="bold" fill="#0B4B35">분산 DB</text>
  <text x="645" y="391" text-anchor="middle" font-size="10" fill="#343A40">복제 지연으로</text>
  <text x="645" y="405" text-anchor="middle" font-size="10" fill="#343A40">비선형화 → 성능</text>
  <text x="645" y="419" text-anchor="middle" font-size="10" fill="#0CA678">약한 일관성 모델 선택</text>

  <text x="560" y="450" text-anchor="middle" font-size="10.5" fill="#868E96">두 경우 모두 포기 이유는 CAP이 아닌 성능입니다</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#ADB5BD"/>
    </marker>
  </defs>

</svg>
