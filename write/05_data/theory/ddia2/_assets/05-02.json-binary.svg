<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 600" font-family="Pretendard, sans-serif">
  <rect width="680" height="600" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">JSON·XML·이진 변형</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">텍스트 형식은 널리 쓰이나 결함이 있고, 이진 변형은 약간만 작다</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 텍스트 형식 문제 -->
  <text x="32" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">텍스트 형식(JSON·XML·CSV)의 문제</text>
  <rect x="32" y="124" width="616" height="110" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="48" y="146" fill="#e8e4df" font-size="11">· 숫자 모호성: XML·CSV는 숫자/문자열 구분 못 함 · JSON은 정수/부동소수 구분 안 함</text>
  <text x="48" y="166" fill="#f47f72" font-size="11">· 2^53 초과 정수는 부동소수로 부정확(X의 64비트 post ID → JSON에 숫자·문자열 둘 다)</text>
  <text x="48" y="186" fill="#e8e4df" font-size="11">· 이진 문자열 미지원 → Base64로 우회(크기 1/3 증가)</text>
  <text x="48" y="206" fill="#e8e4df" font-size="11">· XML/JSON Schema는 강력하나 복잡 · CSV는 스키마 없고 모호(쉼표·줄바꿈)</text>
  <text x="48" y="226" fill="#66bb6a" font-size="11">그래도 조직 간 데이터 교환엔 충분 — 합의가 효율보다 중요</text>

  <!-- JSON Schema -->
  <text x="32" y="268" fill="rgb(212,168,83)" font-size="14" font-weight="700">JSON Schema</text>
  <rect x="32" y="280" width="300" height="92" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="48" y="302" fill="#e8e4df" font-size="11">기본 타입 + 검증(port 1~65535 등)</text>
  <text x="48" y="322" fill="#e8e4df" font-size="11">open(기본) vs closed content model</text>
  <text x="48" y="342" fill="rgb(138,133,128)" font-size="10.5">additionalProperties=true → "금지된 것"의 정의</text>
  <text x="48" y="360" fill="rgb(138,133,128)" font-size="10.5">if/else·remote 참조 → 강력하나 진화 어려움</text>

  <!-- 이진 변형 -->
  <text x="348" y="268" fill="rgb(212,168,83)" font-size="14" font-weight="700">이진 변형(MessagePack 등)</text>
  <rect x="348" y="280" width="300" height="92" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="364" y="302" fill="#e8e4df" font-size="11">JSON: MessagePack·CBOR·BSON</text>
  <text x="364" y="322" fill="#e8e4df" font-size="11">스키마 없어 필드명을 데이터에 포함</text>
  <text x="364" y="342" fill="rgb(138,133,128)" font-size="10.5">{userName,favoriteNumber,interests} 다 들어감</text>
  <text x="364" y="360" fill="#f47f72" font-size="10.5">66바이트 vs JSON 81바이트 — 약간만 작음</text>

  <!-- 크기 비교 -->
  <text x="32" y="404" fill="rgb(212,168,83)" font-size="14" font-weight="700">같은 레코드 크기 비교 (이 장 전체)</text>
  <rect x="32" y="416" width="616" height="120" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="48" y="440" fill="#e8e4df" font-size="11">JSON(공백 제거)</text>
  <rect x="200" y="430" width="240" height="14" rx="2" fill="#7fa8c9"/>
  <text x="448" y="441" fill="rgb(138,133,128)" font-size="10">81 byte</text>
  <text x="48" y="466" fill="#e8e4df" font-size="11">MessagePack</text>
  <rect x="200" y="456" width="195" height="14" rx="2" fill="#9cc3df"/>
  <text x="403" y="467" fill="rgb(138,133,128)" font-size="10">66 byte (필드명 포함)</text>
  <text x="48" y="492" fill="#e8e4df" font-size="11">Protocol Buffers</text>
  <rect x="200" y="482" width="98" height="14" rx="2" fill="rgb(212,168,83)"/>
  <text x="306" y="493" fill="rgb(138,133,128)" font-size="10">33 byte (field tag)</text>
  <text x="48" y="518" fill="#e8e4df" font-size="11">Avro</text>
  <rect x="200" y="508" width="95" height="14" rx="2" fill="#66bb6a"/>
  <text x="303" y="519" fill="rgb(138,133,128)" font-size="10">32 byte (스키마로 필드명 제거 → 최소)</text>

  <text x="32" y="566" fill="rgb(138,133,128)" font-size="11.5">JSON 이진 변형은 필드명을 못 빼 약간만 작음 → 다음 절의 스키마 기반(protobuf·Avro)이 절반으로</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
