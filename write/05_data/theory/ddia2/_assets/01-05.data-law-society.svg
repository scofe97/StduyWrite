<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 640" font-family="Pretendard, sans-serif">
  <rect width="680" height="640" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">데이터 시스템·법·사회 + 1장 종합</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">기술 결정은 비즈니스만이 아니라 사용자 권리·법에도 묶인다</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 법·규제가 설계에 미치는 충돌 -->
  <text x="32" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">법이 설계 밑바닥에 미치는 충돌</text>

  <rect x="32" y="124" width="290" height="78" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="48" y="148" fill="#7fa8c9" font-size="12.5" font-weight="700">잊힐 권리 (GDPR)</text>
  <text x="48" y="170" fill="#e8e4df" font-size="11.5">요청 시 개인 데이터 삭제 의무</text>
  <text x="48" y="190" fill="#e8e4df" font-size="11.5">파생 데이터(ML 학습)도 삭제?</text>

  <text x="335" y="168" fill="#f47f72" font-size="20" text-anchor="middle" font-weight="700">⚔</text>
  <text x="335" y="186" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">충돌</text>

  <rect x="358" y="124" width="290" height="78" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="374" y="148" fill="rgb(212,168,83)" font-size="12.5" font-weight="700">불변 로그 (append-only)</text>
  <text x="374" y="170" fill="#e8e4df" font-size="11.5">많은 데이터 시스템의 설계 기반</text>
  <text x="374" y="190" fill="#e8e4df" font-size="11.5">중간 데이터 삭제가 원리상 어려움</text>

  <!-- 데이터 최소화 -->
  <text x="32" y="238" fill="rgb(212,168,83)" font-size="14" font-weight="700">데이터 최소화 (Datensparsamkeit)</text>
  <rect x="32" y="250" width="616" height="74" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="48" y="274" fill="#e8e4df" font-size="12">저장 비용 = S3 요금만이 아님 → 유출·평판·법적 벌금 위험 포함</text>
  <text x="48" y="296" fill="#e8e4df" font-size="12">범죄화된 행동(낙태·성적지향) 노출 데이터는 사용자에게 실제 안전 위험</text>
  <text x="48" y="316" fill="#66bb6a" font-size="11.5">→ 안 쓸 데이터는 아예 저장하지 않는다 (목적 명시·최소 보관, "big data"와 대조)</text>

  <!-- 1장 종합: 5개 트레이드오프 축 -->
  <text x="32" y="360" fill="rgb(212,168,83)" font-size="15" font-weight="700">1장 종합 — 데이터 시스템 아키텍처 5개 트레이드오프 축</text>

  <rect x="32" y="374" width="616" height="40" rx="6" fill="#141414" stroke="#9cc3df"/>
  <text x="48" y="399" fill="#9cc3df" font-size="12.5" font-weight="700">① 운영(OLTP) vs 분석(OLAP)</text>
  <text x="320" y="399" fill="#e8e4df" font-size="11.5">접근 패턴·사용자가 다름 · 웨어하우스/레이크 · ETL</text>

  <rect x="32" y="420" width="616" height="40" rx="6" fill="#141414" stroke="#9cc3df"/>
  <text x="48" y="445" fill="#9cc3df" font-size="12.5" font-weight="700">② 기록 시스템 vs 파생 데이터</text>
  <text x="320" y="445" fill="#e8e4df" font-size="11.5">권위 있는 정본 vs 재생성 가능한 중복 · 도구는 중립</text>

  <rect x="32" y="466" width="616" height="40" rx="6" fill="#141414" stroke="#9cc3df"/>
  <text x="48" y="491" fill="#9cc3df" font-size="12.5" font-weight="700">③ 클라우드 vs 셀프 호스팅</text>
  <text x="320" y="491" fill="#e8e4df" font-size="11.5">위탁·탄력 vs 통제·lock-in · 저장/연산 분리</text>

  <rect x="32" y="512" width="616" height="40" rx="6" fill="#141414" stroke="#9cc3df"/>
  <text x="48" y="537" fill="#9cc3df" font-size="12.5" font-weight="700">④ 분산 vs 단일 노드</text>
  <text x="320" y="537" fill="#e8e4df" font-size="11.5">내결함성·확장 vs 부분 실패 비용 · 서두르지 말 것</text>

  <rect x="32" y="558" width="616" height="40" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="48" y="583" fill="rgb(212,168,83)" font-size="12.5" font-weight="700">⑤ 비즈니스 vs 사용자 권리</text>
  <text x="320" y="583" fill="#e8e4df" font-size="11.5">법·규제(GDPR·CCPA)가 설계를 결정 · 데이터 최소화</text>

  <text x="32" y="624" fill="rgb(138,133,128)" font-size="12.5">"해결책은 없고 트레이드오프만 있다" — 각 축은 정답이 아니라 상황에 맞는 균형의 문제</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
