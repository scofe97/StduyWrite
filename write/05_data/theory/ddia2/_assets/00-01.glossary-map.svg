<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 600" font-family="Pretendard, sans-serif">
  <rect width="680" height="600" fill="#0d0d0d"/>

  <!-- Title -->
  <text x="340" y="38" text-anchor="middle" fill="#e8e4df" font-size="21" font-weight="700">DDIA 2판 용어 군집 지도</text>
  <text x="340" y="58" text-anchor="middle" fill="rgb(138,133,128)" font-size="13">핵심 용어 50선을 6개 개념 군으로</text>
  <line x1="40" y1="70" x2="640" y2="70" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- Cluster 1: 저장·인덱스 -->
  <rect x="40" y="90" width="290" height="138" rx="8" fill="#1a1410" stroke="rgb(212,168,83)" stroke-width="1.4"/>
  <text x="185" y="112" text-anchor="middle" fill="rgb(212,168,83)" font-size="13" font-weight="700">① 저장·인덱스 (3·4장)</text>
  <text x="55" y="133" fill="rgb(138,133,128)" font-size="10.5">log · index · secondary index · hash</text>
  <text x="55" y="151" fill="rgb(138,133,128)" font-size="10.5">cache · materialize · denormalize</text>
  <text x="55" y="169" fill="rgb(138,133,128)" font-size="10.5">OLTP · OLAP · full-text search</text>
  <text x="55" y="187" fill="rgb(138,133,128)" font-size="10.5">locality · primary key · schema</text>
  <text x="55" y="205" fill="rgb(138,133,128)" font-size="10.5">data warehouse · ETL · graph</text>
  <text x="55" y="222" fill="#66bb6a" font-size="10">읽기 가속 = 파생 데이터의 핵심</text>

  <!-- Cluster 2: 데이터 모델·일반 -->
  <rect x="350" y="90" width="290" height="138" rx="8" fill="#141414" stroke="#7fa8c9" stroke-width="1.4"/>
  <text x="495" y="112" text-anchor="middle" fill="#9cc3df" font-size="13" font-weight="700">② 데이터 모델·일반</text>
  <text x="365" y="133" fill="rgb(138,133,128)" font-size="10.5">normalized · denormalize · join</text>
  <text x="365" y="151" fill="rgb(138,133,128)" font-size="10.5">declarative · deterministic</text>
  <text x="365" y="169" fill="rgb(138,133,128)" font-size="10.5">system of record · derived data</text>
  <text x="365" y="187" fill="rgb(138,133,128)" font-size="10.5">node · percentile · skew</text>
  <text x="365" y="205" fill="rgb(138,133,128)" font-size="10.5">shared-nothing · backpressure</text>
  <text x="365" y="222" fill="#7fa8c9" font-size="10">기록 시스템 → 파생 데이터 도출</text>

  <!-- Cluster 3: 복제·일관성 -->
  <rect x="40" y="244" width="290" height="138" rx="8" fill="#141414" stroke="rgb(212,168,83)" stroke-width="1.4"/>
  <text x="185" y="266" text-anchor="middle" fill="rgb(212,168,83)" font-size="13" font-weight="700">③ 복제·일관성 (6·7장)</text>
  <text x="55" y="287" fill="rgb(138,133,128)" font-size="10.5">replication · leader · follower</text>
  <text x="55" y="305" fill="rgb(138,133,128)" font-size="10.5">failover · split brain · quorum</text>
  <text x="55" y="323" fill="rgb(138,133,128)" font-size="10.5">linearizable · sharding · rebalance</text>
  <text x="55" y="341" fill="rgb(138,133,128)" font-size="10.5">replication log · durable</text>
  <text x="55" y="359" fill="rgb(138,133,128)" font-size="10.5">causality · total order</text>
  <text x="55" y="376" fill="#66bb6a" font-size="10">단일 리더 = 쓰기 순서 결정 지점</text>

  <!-- Cluster 4: 트랜잭션·격리 -->
  <rect x="350" y="244" width="290" height="138" rx="8" fill="#1a1410" stroke="#7fa8c9" stroke-width="1.4"/>
  <text x="495" y="266" text-anchor="middle" fill="#9cc3df" font-size="13" font-weight="700">④ 트랜잭션·격리 (8장)</text>
  <text x="365" y="287" fill="rgb(138,133,128)" font-size="10.5">transaction · atomic · isolation</text>
  <text x="365" y="305" fill="rgb(138,133,128)" font-size="10.5">serializable · lock · 2PL</text>
  <text x="365" y="323" fill="rgb(138,133,128)" font-size="10.5">2PC · stored procedure</text>
  <text x="365" y="341" fill="rgb(138,133,128)" font-size="10.5">idempotent · durable</text>
  <text x="365" y="359" fill="rgb(138,133,128)" font-size="10.5">read/write/clock skew</text>
  <text x="365" y="376" fill="#7fa8c9" font-size="10">원자성+격리+지속성 = 정확성 도구</text>

  <!-- Cluster 5: 분산·합의 -->
  <rect x="40" y="398" width="290" height="138" rx="8" fill="#141414" stroke="rgb(212,168,83)" stroke-width="1.4"/>
  <text x="185" y="420" text-anchor="middle" fill="rgb(212,168,83)" font-size="13" font-weight="700">⑤ 분산·합의 (9·10장)</text>
  <text x="55" y="441" fill="rgb(138,133,128)" font-size="10.5">distributed · node · Byzantine</text>
  <text x="55" y="459" fill="rgb(138,133,128)" font-size="10.5">consensus · timeout · CAP theorem</text>
  <text x="55" y="477" fill="rgb(138,133,128)" font-size="10.5">bounded · unbounded</text>
  <text x="55" y="495" fill="rgb(138,133,128)" font-size="10.5">fault-tolerant · synchronous</text>
  <text x="55" y="513" fill="rgb(138,133,128)" font-size="10.5">asynchronous · causality</text>
  <text x="55" y="530" fill="#f47f72" font-size="10">부분 실패 = 분산의 본질적 어려움</text>

  <!-- Cluster 6: 배치·스트림 -->
  <rect x="350" y="398" width="290" height="138" rx="8" fill="#1a1410" stroke="#66bb6a" stroke-width="1.4"/>
  <text x="495" y="420" text-anchor="middle" fill="#66bb6a" font-size="13" font-weight="700">⑥ 배치·스트림 (11·12·13장)</text>
  <text x="365" y="441" fill="rgb(138,133,128)" font-size="10.5">batch process · stream process</text>
  <text x="365" y="459" fill="rgb(138,133,128)" font-size="10.5">log (event log) · idempotent</text>
  <text x="365" y="477" fill="rgb(138,133,128)" font-size="10.5">deterministic · derived data</text>
  <text x="365" y="495" fill="rgb(138,133,128)" font-size="10.5">backpressure · materialize</text>
  <text x="365" y="513" fill="rgb(138,133,128)" font-size="10.5">total order · bounded/unbounded</text>
  <text x="365" y="530" fill="#66bb6a" font-size="10">배치 = 유한, 스트림 = 무한 입력</text>

  <!-- Footer -->
  <line x1="40" y1="556" x2="640" y2="556" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="340" y="576" text-anchor="middle" fill="rgb(138,133,128)" font-size="11">같은 용어가 여러 군에 등장 — durable·idempotent·deterministic·causality는 군을 잇는 축</text>
  <text x="340" y="594" text-anchor="middle" fill="rgb(138,133,128)" font-size="10">DDIA 2nd Ed. — Glossary Concept Map · 00-01</text>
</svg>
