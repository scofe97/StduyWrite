<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 580" font-family="Pretendard, sans-serif">
  <rect width="680" height="580" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">인코딩과 호환성 기초</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">롤링 업그레이드로 옛·새 코드가 공존 → 양방향 호환성 필요</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- encoding/decoding -->
  <text x="32" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">인코딩과 디코딩</text>
  <rect x="32" y="124" width="200" height="56" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="132" y="146" fill="#e8e4df" font-size="11.5" text-anchor="middle" font-weight="700">인메모리 객체</text>
  <text x="132" y="164" fill="rgb(138,133,128)" font-size="9.5" text-anchor="middle">객체·리스트·트리(포인터)</text>
  <line x1="232" y1="142" x2="290" y2="142" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="261" y="135" fill="rgb(212,168,83)" font-size="9" text-anchor="middle">인코딩(직렬화)</text>
  <line x1="290" y1="162" x2="232" y2="162" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#arb)"/>
  <text x="261" y="178" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">디코딩(파싱)</text>
  <rect x="294" y="124" width="200" height="56" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="394" y="146" fill="#e8e4df" font-size="11.5" text-anchor="middle" font-weight="700">바이트 시퀀스</text>
  <text x="394" y="164" fill="rgb(138,133,128)" font-size="9.5" text-anchor="middle">파일·네트워크(자족적)</text>

  <!-- 호환성 두 방향 -->
  <text x="32" y="216" fill="rgb(212,168,83)" font-size="14" font-weight="700">호환성 두 방향</text>
  <rect x="32" y="228" width="300" height="86" rx="6" fill="#141414" stroke="#66bb6a"/>
  <text x="48" y="250" fill="#66bb6a" font-size="12.5" font-weight="700">backward(하위) 호환</text>
  <text x="48" y="272" fill="#e8e4df" font-size="11">새 코드가 옛 코드의 데이터를 읽음</text>
  <text x="48" y="294" fill="rgb(138,133,128)" font-size="10.5">보통 쉬움(옛 형식을 알고 명시 처리)</text>

  <rect x="348" y="228" width="300" height="86" rx="6" fill="#141414" stroke="#f47f72"/>
  <text x="364" y="250" fill="#f47f72" font-size="12.5" font-weight="700">forward(상위) 호환</text>
  <text x="364" y="272" fill="#e8e4df" font-size="11">옛 코드가 새 코드의 데이터를 읽음</text>
  <text x="364" y="294" fill="rgb(138,133,128)" font-size="10.5">까다로움(옛 코드가 새 추가를 무시·보존해야)</text>

  <!-- forward 함정 -->
  <text x="32" y="350" fill="rgb(212,168,83)" font-size="14" font-weight="700">forward 호환의 함정 — 미지 필드 보존</text>
  <rect x="32" y="362" width="616" height="76" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="48" y="384" fill="#e8e4df" font-size="11">새 코드가 새 필드(photoURL) 포함 레코드 작성 → 옛 코드가 읽고 갱신·재작성</text>
  <text x="48" y="404" fill="#f47f72" font-size="11">⚠ 옛 코드가 모르는 필드를 모델 객체에 보존 안 하면 photoURL 손실</text>
  <text x="48" y="424" fill="#66bb6a" font-size="11">→ 미지 필드를 명시적으로 보존하는 인코딩 필요</text>

  <!-- 코드가 점진 배포 -->
  <text x="32" y="464" fill="rgb(212,168,83)" font-size="14" font-weight="700">왜 공존하나 + language-specific 포맷 회피</text>
  <rect x="32" y="476" width="300" height="74" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="48" y="498" fill="#e8e4df" font-size="11">서버: 롤링 업그레이드(노드별 점진 배포)</text>
  <text x="48" y="516" fill="#e8e4df" font-size="11">클라: 사용자가 업데이트를 미룸</text>
  <text x="48" y="536" fill="rgb(138,133,128)" font-size="10">→ 옛·새 코드·데이터가 동시 존재</text>

  <rect x="348" y="476" width="300" height="74" rx="6" fill="#141414" stroke="#f47f72"/>
  <text x="364" y="498" fill="#f47f72" font-size="11">언어 내장 인코딩(pickle·Serializable)</text>
  <text x="364" y="516" fill="#e8e4df" font-size="10.5">언어 종속·보안 위험·버전·효율 뒷전</text>
  <text x="364" y="536" fill="rgb(138,133,128)" font-size="10">→ 일시적 용도 외엔 피할 것</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
    <marker id="arb" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
