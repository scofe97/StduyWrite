<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 660" font-family="Pretendard, sans-serif">
  <rect width="680" height="660" fill="#0d0d0d"/>
  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">데이터플로우 엔진과 배치 활용</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">Spark/Flink 장점 · SQL/DataFrame · ETL · ML · 파생 데이터 서빙</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <text x="32" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">MapReduce vs 데이터플로우 엔진</text>
  <rect x="32" y="124" width="296" height="108" rx="6" fill="#141414" stroke="#f47f72"/>
  <text x="180" y="144" fill="#f47f72" font-size="11" font-weight="700" text-anchor="middle">MapReduce 단점</text>
  <text x="48" y="164" fill="#e8e4df" font-size="10.5">· 매 단계마다 DFS에 기록</text>
  <text x="48" y="182" fill="#e8e4df" font-size="10.5">· 파이프라이닝 불가</text>
  <text x="48" y="200" fill="#e8e4df" font-size="10.5">· 매 태스크마다 JVM 재시작</text>
  <text x="48" y="218" fill="rgb(138,133,128)" font-size="10">2004년 Google 논문 이후 현재 Google 내부 폐기됨</text>

  <rect x="352" y="124" width="296" height="108" rx="6" fill="#141414" stroke="#66bb6a"/>
  <text x="500" y="144" fill="#66bb6a" font-size="11" font-weight="700" text-anchor="middle">Spark / Flink 장점</text>
  <text x="368" y="164" fill="#e8e4df" font-size="10.5">· 필요한 곳에만 정렬</text>
  <text x="368" y="182" fill="#e8e4df" font-size="10.5">· 연속 연산자 단일 태스크 결합</text>
  <text x="368" y="200" fill="#e8e4df" font-size="10.5">· 중간 상태 메모리/로컬 디스크</text>
  <text x="368" y="218" fill="rgb(138,133,128)" font-size="10">Spark=RDD 리니지 / Flink=체크포인팅</text>

  <text x="32" y="260" fill="rgb(212,168,83)" font-size="14" font-weight="700">SQL과 DataFrame</text>
  <rect x="32" y="272" width="296" height="80" rx="6" fill="#1a1410" stroke="#7fa8c9"/>
  <text x="180" y="292" fill="#7fa8c9" font-size="11" font-weight="700" text-anchor="middle">SQL (배치 공통 언어)</text>
  <text x="48" y="312" fill="#e8e4df" font-size="10.5">코드 감소 + 인터랙티브 쿼리</text>
  <text x="48" y="330" fill="#e8e4df" font-size="10.5">비용 기반 최적화기: 조인 순서 자동 선택</text>
  <text x="48" y="344" fill="rgb(138,133,128)" font-size="10">Hive / Trino / Spark SQL / Flink SQL</text>

  <rect x="352" y="272" width="296" height="80" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="500" y="292" fill="rgb(212,168,83)" font-size="11" font-weight="700" text-anchor="middle">DataFrame API</text>
  <text x="368" y="312" fill="#e8e4df" font-size="10.5">Pandas와 유사하지만 분산 실행</text>
  <text x="368" y="330" fill="#e8e4df" font-size="10.5">Spark: 지연 실행 + 쿼리 최적화</text>
  <text x="368" y="344" fill="rgb(138,133,128)" font-size="10">인덱스/순서 없음 — Pandas 마이그레이션 주의</text>

  <text x="32" y="384" fill="rgb(212,168,83)" font-size="14" font-weight="700">배치 사용 사례</text>
  <rect x="32" y="396" width="140" height="96" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="102" y="416" fill="#e8e4df" font-size="10.5" font-weight="700" text-anchor="middle">ETL</text>
  <text x="48" y="436" fill="rgb(138,133,128)" font-size="9.5">병렬 변환</text>
  <text x="48" y="452" fill="rgb(138,133,128)" font-size="9.5">워크플로우 스케줄러</text>
  <text x="48" y="468" fill="rgb(138,133,128)" font-size="9.5">재실행 용이</text>
  <text x="48" y="484" fill="rgb(138,133,128)" font-size="9.5">Data Mesh/Contract</text>

  <rect x="184" y="396" width="140" height="96" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="254" y="416" fill="#e8e4df" font-size="10.5" font-weight="700" text-anchor="middle">분석 (Analytics)</text>
  <text x="200" y="436" fill="rgb(138,133,128)" font-size="9.5">사전 집계(OLAP 큐브)</text>
  <text x="200" y="452" fill="rgb(138,133,128)" font-size="9.5">애드혹 쿼리</text>
  <text x="200" y="468" fill="rgb(138,133,128)" font-size="9.5">Tableau/Looker 연동</text>
  <text x="200" y="484" fill="rgb(138,133,128)" font-size="9.5">Lakehouse 아키텍처</text>

  <rect x="336" y="396" width="140" height="96" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="406" y="416" fill="#e8e4df" font-size="10.5" font-weight="700" text-anchor="middle">머신러닝</text>
  <text x="352" y="436" fill="rgb(138,133,128)" font-size="9.5">피처 엔지니어링</text>
  <text x="352" y="452" fill="rgb(138,133,128)" font-size="9.5">모델 학습</text>
  <text x="352" y="468" fill="rgb(138,133,128)" font-size="9.5">배치 추론</text>
  <text x="352" y="484" fill="rgb(138,133,128)" font-size="9.5">Ray / Kubeflow / Flyte</text>

  <rect x="488" y="396" width="160" height="96" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="568" y="416" fill="#e8e4df" font-size="10.5" font-weight="700" text-anchor="middle">파생 데이터 서빙</text>
  <text x="504" y="436" fill="rgb(138,133,128)" font-size="9.5">Kafka 토픽으로 푸시</text>
  <text x="504" y="452" fill="rgb(138,133,128)" font-size="9.5">Elasticsearch/Pinot 수집</text>
  <text x="504" y="468" fill="rgb(138,133,128)" font-size="9.5">RocksDB SST bulk import</text>
  <text x="504" y="484" fill="rgb(138,133,128)" font-size="9.5">레코드별 직접 쓰기 금지</text>

  <text x="32" y="524" fill="rgb(212,168,83)" font-size="14" font-weight="700">파생 데이터 서빙 — Kafka 패턴</text>
  <rect x="32" y="536" width="616" height="64" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="48" y="556" fill="#e8e4df" font-size="10.5">배치 잡 완료 → Kafka 토픽 기록 → Elasticsearch/Pinot/Druid/ClickHouse 수집</text>
  <text x="48" y="574" fill="#e8e4df" font-size="10.5">장점: 순차 쓰기 최적화 · 속도 제한 가능 · 복수 소비자 · DMZ 보안 경계</text>
  <text x="48" y="590" fill="rgb(138,133,128)" font-size="10">all-or-nothing 보장: 잡 완료 알림 + 소비자 측 uncommitted 상태 유지 필요</text>

  <rect x="32" y="612" width="616" height="36" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="340" y="628" fill="#e8e4df" font-size="10.5" text-anchor="middle">배치 황금 규칙: 입력 불변 · 출력 재생성 · 부작용 최소화 → 인간 결함 내성</text>
  <text x="340" y="644" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">다음: 스트림 처리 — 입력이 무한하며 잡이 완료되지 않는 처리 패러다임 (12장)</text>
</svg>
