<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 620" font-family="Pretendard, sans-serif">
  <rect width="680" height="620" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">유지보수성 + 2장 종합</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">비용 대부분은 초기 개발이 아니라 지속적 유지보수 · 세 원칙</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 세 원칙 -->
  <rect x="32" y="104" width="198" height="150" rx="6" fill="#141414" stroke="rgb(212,168,83)"/>
  <text x="48" y="128" fill="rgb(212,168,83)" font-size="14" font-weight="700">운영성</text>
  <text x="48" y="146" fill="rgb(138,133,128)" font-size="10.5">Operability</text>
  <text x="48" y="170" fill="#e8e4df" font-size="11">조직이 시스템을</text>
  <text x="48" y="188" fill="#e8e4df" font-size="11">원활히 운영하게</text>
  <text x="48" y="212" fill="#e8e4df" font-size="10.5">모니터링·관측성</text>
  <text x="48" y="230" fill="#e8e4df" font-size="10.5">개별 머신 비의존</text>
  <text x="48" y="248" fill="rgb(138,133,128)" font-size="10">예측 가능·자동화 균형</text>

  <rect x="241" y="104" width="198" height="150" rx="6" fill="#141414" stroke="#7fa8c9"/>
  <text x="257" y="128" fill="#7fa8c9" font-size="14" font-weight="700">단순성</text>
  <text x="257" y="146" fill="rgb(138,133,128)" font-size="10.5">Simplicity</text>
  <text x="257" y="170" fill="#e8e4df" font-size="11">새 엔지니어가</text>
  <text x="257" y="188" fill="#e8e4df" font-size="11">이해하기 쉽게</text>
  <text x="257" y="212" fill="#e8e4df" font-size="10.5">복잡성 관리(추상화)</text>
  <text x="257" y="230" fill="#e8e4df" font-size="10.5">big ball of mud 회피</text>
  <text x="257" y="248" fill="rgb(138,133,128)" font-size="10">본질 vs 우발 복잡도</text>

  <rect x="450" y="104" width="198" height="150" rx="6" fill="#141414" stroke="#66bb6a"/>
  <text x="466" y="128" fill="#66bb6a" font-size="14" font-weight="700">발전성</text>
  <text x="466" y="146" fill="rgb(138,133,128)" font-size="10.5">Evolvability</text>
  <text x="466" y="170" fill="#e8e4df" font-size="11">변화에 맞춰</text>
  <text x="466" y="188" fill="#e8e4df" font-size="11">쉽게 수정·확장</text>
  <text x="466" y="212" fill="#e8e4df" font-size="10.5">느슨한 결합·단순함</text>
  <text x="466" y="230" fill="#e8e4df" font-size="10.5">비가역성 최소화</text>
  <text x="466" y="248" fill="rgb(138,133,128)" font-size="10">TDD·리팩토링</text>

  <!-- 본질 vs 우발 복잡도 -->
  <text x="32" y="288" fill="rgb(212,168,83)" font-size="14" font-weight="700">복잡성 관리 — 추상화가 핵심 도구</text>
  <rect x="32" y="300" width="300" height="96" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="48" y="322" fill="#e8e4df" font-size="11">· 본질(essential): 문제 도메인에 내재</text>
  <text x="48" y="342" fill="#e8e4df" font-size="11">· 우발(accidental): 도구 한계 탓</text>
  <text x="48" y="362" fill="rgb(138,133,128)" font-size="10.5">단, 경계는 도구가 진화하며 이동(구분도 불완전)</text>
  <text x="48" y="384" fill="#66bb6a" font-size="11">좋은 추상화 = 구현 감추고 재사용 가능</text>

  <rect x="348" y="300" width="300" height="96" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="364" y="322" fill="#e8e4df" font-size="11">고급 언어 → 기계어·레지스터 감춤</text>
  <text x="364" y="342" fill="#e8e4df" font-size="11">SQL → 디스크 구조·동시성·크래시 감춤</text>
  <text x="364" y="364" fill="rgb(138,133,128)" font-size="10.5">이 책은 범용 추상화(트랜잭션·인덱스·로그)</text>
  <text x="364" y="384" fill="rgb(138,133,128)" font-size="10.5">DDD·디자인 패턴은 그 위에 얹음</text>

  <!-- 비가역성 -->
  <text x="32" y="430" fill="#f47f72" font-size="14" font-weight="700">발전성의 적 — 비가역성(irreversibility)</text>
  <rect x="32" y="442" width="616" height="50" rx="6" fill="#141414" stroke="#f47f72"/>
  <text x="48" y="464" fill="#e8e4df" font-size="11.5">DB 이전 시 되돌릴 수 없으면 위험이 훨씬 큼 → 비가역 작업은 신중히, 최소화가 유연성</text>
  <text x="48" y="484" fill="rgb(138,133,128)" font-size="10.5">느슨한 결합·단순한 시스템이 강결합·복잡한 것보다 수정하기 쉬움</text>

  <!-- 2장 종합 -->
  <text x="32" y="522" fill="rgb(212,168,83)" font-size="14" font-weight="700">2장 종합 — 비기능 요구사항 4가지</text>
  <rect x="32" y="534" width="150" height="40" rx="5" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="107" y="558" fill="#e8e4df" font-size="12" text-anchor="middle" font-weight="700">성능</text>
  <rect x="190" y="534" width="150" height="40" rx="5" fill="#1a1410" stroke="#7fa8c9"/>
  <text x="265" y="558" fill="#e8e4df" font-size="12" text-anchor="middle" font-weight="700">신뢰성</text>
  <rect x="348" y="534" width="150" height="40" rx="5" fill="#1a1410" stroke="#66bb6a"/>
  <text x="423" y="558" fill="#e8e4df" font-size="12" text-anchor="middle" font-weight="700">확장성</text>
  <rect x="506" y="534" width="142" height="40" rx="5" fill="#1a1410" stroke="#e8b34a"/>
  <text x="577" y="558" fill="#e8e4df" font-size="12" text-anchor="middle" font-weight="700">유지보수성</text>

  <text x="32" y="600" fill="rgb(138,133,128)" font-size="12">정답은 없음 — 잘 이해된 빌딩 블록(유용한 추상화)으로 짓는 것이 공통 해법</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
