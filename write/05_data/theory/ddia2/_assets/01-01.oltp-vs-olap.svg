<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 620" font-family="Pretendard, sans-serif">
  <rect width="680" height="620" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">운영(OLTP) vs 분석(OLAP) 시스템</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">데이터가 만들어지는 곳과 분석되는 곳을 나누는 이유</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 두 컬럼 비교 -->
  <rect x="32" y="100" width="300" height="236" rx="6" fill="#141414" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="48" y="126" fill="rgb(212,168,83)" font-size="15" font-weight="700">운영 OLTP</text>
  <text x="48" y="148" fill="rgb(138,133,128)" font-size="11.5">online transaction processing</text>
  <text x="48" y="176" fill="#e8e4df" font-size="12.5">· 읽기: 키로 개별 레코드(point query)</text>
  <text x="48" y="200" fill="#e8e4df" font-size="12.5">· 쓰기: 개별 레코드 CRUD</text>
  <text x="48" y="224" fill="#e8e4df" font-size="12.5">· 질의: 앱에 박힌 고정 쿼리</text>
  <text x="48" y="248" fill="#e8e4df" font-size="12.5">· 작은 쿼리가 다수</text>
  <text x="48" y="272" fill="#e8e4df" font-size="12.5">· 데이터: 현재 시점 최신 상태</text>
  <text x="48" y="296" fill="#7fa8c9" font-size="12.5">· 규모: GB ~ TB</text>
  <text x="48" y="324" fill="rgb(138,133,128)" font-size="11.5">사용자: 웹/모바일 최종 사용자</text>

  <rect x="348" y="100" width="300" height="236" rx="6" fill="#141414" stroke="#7fa8c9" stroke-width="1.5"/>
  <text x="364" y="126" fill="#7fa8c9" font-size="15" font-weight="700">분석 OLAP</text>
  <text x="364" y="148" fill="rgb(138,133,128)" font-size="11.5">online analytical processing</text>
  <text x="364" y="176" fill="#e8e4df" font-size="12.5">· 읽기: 대량 레코드 집계(sum·count)</text>
  <text x="364" y="200" fill="#e8e4df" font-size="12.5">· 쓰기: 대량 적재(ETL)·이벤트 스트림</text>
  <text x="364" y="224" fill="#e8e4df" font-size="12.5">· 질의: 분석가의 임의 ad-hoc</text>
  <text x="364" y="248" fill="#e8e4df" font-size="12.5">· 복잡한 쿼리가 소수</text>
  <text x="364" y="272" fill="#e8e4df" font-size="12.5">· 데이터: 시간에 걸친 이벤트 이력</text>
  <text x="364" y="296" fill="#7fa8c9" font-size="12.5">· 규모: TB ~ PB</text>
  <text x="364" y="324" fill="rgb(138,133,128)" font-size="11.5">사용자: 내부 분석가(의사결정 지원)</text>

  <!-- 데이터 흐름 -->
  <text x="32" y="376" fill="rgb(212,168,83)" font-size="15" font-weight="700">데이터 흐름 — 운영에서 분석으로</text>

  <rect x="32" y="392" width="150" height="56" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="107" y="416" fill="#e8e4df" font-size="12.5" text-anchor="middle" font-weight="700">운영 DB 다수</text>
  <text x="107" y="434" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">시스템마다 1개</text>

  <text x="200" y="424" fill="rgb(212,168,83)" font-size="13" text-anchor="middle" font-weight="700">ETL</text>
  <text x="200" y="440" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">추출·변환·적재</text>
  <line x1="186" y1="420" x2="232" y2="420" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="250" y="392" width="180" height="56" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="340" y="414" fill="#e8e4df" font-size="12.5" text-anchor="middle" font-weight="700">데이터 웨어하우스</text>
  <text x="340" y="432" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">관계형·SQL·정제된 스키마</text>

  <rect x="250" y="460" width="180" height="50" rx="6" fill="#101620" stroke="#9cc3df"/>
  <text x="340" y="480" fill="#e8e4df" font-size="12.5" text-anchor="middle" font-weight="700">데이터 레이크</text>
  <text x="340" y="498" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">원본 파일 그대로(sushi 원칙)</text>
  <line x1="200" y1="452" x2="200" y2="485" stroke="rgb(138,133,128)" stroke-width="1.5"/>
  <line x1="200" y1="485" x2="246" y2="485" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="452" y="392" width="196" height="118" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="468" y="416" fill="#bfe3c0" font-size="12.5" font-weight="700">소비자</text>
  <text x="468" y="438" fill="#e8e4df" font-size="11.5">· 비즈니스 분석가(BI)</text>
  <text x="468" y="460" fill="#e8e4df" font-size="11.5">· 데이터 과학자(ML)</text>
  <text x="468" y="484" fill="rgb(138,133,128)" font-size="10.5">Tableau·Looker·Power BI</text>
  <text x="468" y="502" fill="rgb(138,133,128)" font-size="10.5">Pandas·R·Spark</text>
  <line x1="430" y1="420" x2="448" y2="420" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="430" y1="485" x2="448" y2="454" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar)"/>

  <line x1="32" y1="540" x2="648" y2="540" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="32" y="566" fill="rgb(138,133,128)" font-size="12">분석가는 운영 DB를 직접 안 건드림 — 데이터 사일로·부적합 스키마·비싼 쿼리·보안 격리 때문</text>
  <text x="32" y="588" fill="rgb(138,133,128)" font-size="12">HTAP은 둘을 한 시스템에 담으려 하지만, 내부는 보통 OLTP+분석이 인터페이스 뒤에 결합된 형태</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
