<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 660" font-family="Pretendard, sans-serif">
  <rect width="680" height="660" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">데이터베이스와 스트림</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">듀얼 라이트 문제 · CDC · 아웃박스 패턴 · 이벤트 소싱 · 불변성</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 듀얼 라이트 레이스 컨디션 -->
  <text x="32" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">듀얼 라이트 레이스 컨디션</text>
  <rect x="32" y="124" width="616" height="80" rx="6" fill="#1a1410" stroke="#f47f72"/>
  <text x="48" y="146" fill="#f47f72" font-size="10.5" font-weight="700">클라이언트1: X=A 설정 / 클라이언트2: X=B 설정 (동시 요청)</text>
  <text x="48" y="164" fill="#e8e4df" font-size="10">DB 도착 순서: A → B (최종값 B)   |   검색 인덱스 도착 순서: B → A (최종값 A)</text>
  <text x="48" y="182" fill="#f47f72" font-size="10">결과: DB=B, 검색 인덱스=A — 오류 없이 영구 불일치!</text>
  <text x="48" y="198" fill="rgb(138,133,128)" font-size="9.5">단일 리더가 없으면 쓰기 순서가 시스템마다 달라집니다. 버전 벡터 없이는 감지조차 어렵습니다.</text>

  <!-- CDC 구조 -->
  <text x="32" y="232" fill="rgb(212,168,83)" font-size="14" font-weight="700">CDC — 데이터베이스를 유일한 리더로</text>

  <!-- DB -->
  <rect x="32" y="244" width="120" height="56" rx="6" fill="#141414" stroke="#7fa8c9"/>
  <text x="92" y="268" fill="#7fa8c9" font-size="11" font-weight="700" text-anchor="middle">DB (리더)</text>
  <text x="92" y="288" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">복제 로그 생성</text>

  <!-- 화살표: DB → Kafka -->
  <line x1="152" y1="272" x2="210" y2="272" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="181" y="266" fill="rgb(138,133,128)" font-size="8.5" text-anchor="middle">CDC</text>

  <!-- Kafka -->
  <rect x="210" y="244" width="120" height="56" rx="6" fill="#141414" stroke="rgb(212,168,83)"/>
  <text x="270" y="268" fill="rgb(212,168,83)" font-size="11" font-weight="700" text-anchor="middle">Kafka</text>
  <text x="270" y="288" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">변경 이벤트 스트림</text>

  <!-- 팬아웃 화살표들 -->
  <line x1="330" y1="272" x2="388" y2="244" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="330" y1="272" x2="388" y2="272" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="330" y1="272" x2="388" y2="300" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 파생 시스템들 -->
  <rect x="388" y="228" width="120" height="32" rx="4" fill="#141414" stroke="#66bb6a"/>
  <text x="448" y="248" fill="#66bb6a" font-size="10" text-anchor="middle">검색 인덱스</text>
  <rect x="388" y="268" width="120" height="32" rx="4" fill="#141414" stroke="#66bb6a"/>
  <text x="448" y="288" fill="#66bb6a" font-size="10" text-anchor="middle">캐시</text>
  <rect x="388" y="308" width="120" height="32" rx="4" fill="#141414" stroke="#66bb6a"/>
  <text x="448" y="328" fill="#66bb6a" font-size="10" text-anchor="middle">분석 DW</text>

  <text x="532" y="260" fill="#66bb6a" font-size="9.5">동일 순서로</text>
  <text x="532" y="276" fill="#66bb6a" font-size="9.5">변경 적용</text>
  <text x="532" y="292" fill="rgb(138,133,128)" font-size="9">→ 일관성 보장</text>

  <!-- 로그 컴팩션 -->
  <text x="32" y="370" fill="rgb(212,168,83)" font-size="14" font-weight="700">로그 컴팩션 — 스냅샷 없이 현재 상태 복구</text>
  <rect x="32" y="382" width="616" height="60" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="48" y="402" fill="#e8e4df" font-size="10.5">같은 키의 이전 이벤트를 삭제하고 최신 이벤트만 유지합니다.</text>
  <text x="48" y="420" fill="#e8e4df" font-size="10.5">컴팩션된 로그를 offset 0부터 재생하면 전체 DB 현재 상태를 복구할 수 있습니다.</text>
  <text x="48" y="436" fill="rgb(138,133,128)" font-size="9.5">Kafka가 지원. 별도 스냅샷 없이 새 파생 시스템을 언제든 추가 가능합니다.</text>

  <!-- CDC vs 이벤트 소싱 -->
  <text x="32" y="472" fill="rgb(212,168,83)" font-size="14" font-weight="700">CDC vs 이벤트 소싱</text>

  <rect x="32" y="484" width="290" height="88" rx="6" fill="#141414" stroke="#7fa8c9"/>
  <text x="177" y="504" fill="#7fa8c9" font-size="11" font-weight="700" text-anchor="middle">CDC</text>
  <text x="48" y="522" fill="#e8e4df" font-size="9.5">저수준: "X 행이 B로 변경됨"</text>
  <text x="48" y="538" fill="#e8e4df" font-size="9.5">기존 뮤터블 DB에 침습 최소</text>
  <text x="48" y="554" fill="#e8e4df" font-size="9.5">로그 컴팩션 가능</text>
  <text x="48" y="566" fill="rgb(138,133,128)" font-size="9">아웃박스 패턴으로 스키마 캡슐화</text>

  <rect x="358" y="484" width="290" height="88" rx="6" fill="#141414" stroke="rgb(212,168,83)"/>
  <text x="503" y="504" fill="rgb(212,168,83)" font-size="11" font-weight="700" text-anchor="middle">이벤트 소싱</text>
  <text x="374" y="522" fill="#e8e4df" font-size="9.5">앱 수준: "사용자가 Y를 주문함"</text>
  <text x="374" y="538" fill="#e8e4df" font-size="9.5">설계부터 이벤트 중심으로</text>
  <text x="374" y="554" fill="#e8e4df" font-size="9.5">전체 이력 필요 — 컴팩션 어려움</text>
  <text x="374" y="566" fill="rgb(138,133,128)" font-size="9">크립토 슈레딩으로 삭제 권리 대응</text>

  <!-- 불변성 핵심 -->
  <rect x="32" y="586" width="616" height="48" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="48" y="607" fill="#e8e4df" font-size="10.5">상태 = 이벤트 스트림의 적분. 변경 스트림 = 상태의 미분.</text>
  <text x="48" y="625" fill="rgb(138,133,128)" font-size="9.5">불변 로그로부터 여러 읽기 최적화 뷰를 파생할 수 있으며, 새 뷰를 병렬로 구축 후 교체 가능합니다.</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
