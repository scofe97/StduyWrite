<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 640" font-family="Pretendard, sans-serif">
  <rect width="680" height="640" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">분산 vs 단일 노드</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">왜 여러 머신으로 가는가 — 그리고 굳이 안 가도 되는 때</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 분산을 쓰는 이유 -->
  <text x="32" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">분산을 쓰는 이유 (9가지)</text>
  <rect x="32" y="124" width="616" height="128" rx="6" fill="#141414" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="48" y="148" fill="#e8e4df" font-size="12">· 본질적 분산 — 여러 기기·사용자가 네트워크로 통신</text>
  <text x="48" y="170" fill="#e8e4df" font-size="12">· 서비스 간 요청 — 데이터는 한 서비스, 처리는 다른 서비스</text>
  <text x="48" y="192" fill="#e8e4df" font-size="12">· 내결함성·고가용 — 한 머신 죽어도 다른 머신이 인계</text>
  <text x="48" y="214" fill="#e8e4df" font-size="12">· 확장성 — 한 머신 한계 넘는 부하를 여러 머신에 분산</text>
  <text x="48" y="236" fill="#e8e4df" font-size="12">· 지연 — 사용자 가까운 지역 서버로 응답</text>
  <text x="356" y="148" fill="#e8e4df" font-size="12">· 탄력성 — 바쁠 때 키우고 한가할 때 줄임</text>
  <text x="356" y="170" fill="#e8e4df" font-size="12">· 특화 하드웨어 — 디스크/CPU/GPU를 워크로드별로</text>
  <text x="356" y="192" fill="#e8e4df" font-size="12">· 법적 준수 — 데이터 거주(residency) 법</text>
  <text x="356" y="214" fill="#e8e4df" font-size="12">· 지속 가능성 — 재생에너지 풍부한 때·곳에서 실행</text>

  <!-- 문제점 -->
  <text x="32" y="284" fill="#f47f72" font-size="14" font-weight="700">분산의 대가 (문제점)</text>
  <rect x="32" y="296" width="300" height="118" rx="6" fill="#141414" stroke="#f47f72"/>
  <text x="48" y="320" fill="#e8e4df" font-size="11.5">· 부분 실패 — 요청이 타임아웃, 도착 여부 모름</text>
  <text x="48" y="342" fill="#e8e4df" font-size="11.5">· 네트워크 호출은 함수 호출보다 훨씬 느림</text>
  <text x="48" y="364" fill="#e8e4df" font-size="11.5">· 진단 어려움 → 관측성(트레이싱)</text>
  <text x="48" y="386" fill="#e8e4df" font-size="11.5">· 서비스별 DB → 일관성은 앱의 문제</text>

  <!-- 단일 노드 재부상 -->
  <text x="356" y="284" fill="#66bb6a" font-size="14" font-weight="700">단일 노드의 재부상</text>
  <rect x="356" y="296" width="292" height="118" rx="6" fill="#141414" stroke="#66bb6a"/>
  <text x="372" y="320" fill="#e8e4df" font-size="11.5">· CPU·메모리·디스크가 커지고 빨라짐</text>
  <text x="372" y="342" fill="#e8e4df" font-size="11.5">· DuckDB·SQLite·KùzuDB</text>
  <text x="372" y="364" fill="#e8e4df" font-size="11.5">· 단일 스레드가 100코어 클러스터를</text>
  <text x="372" y="382" fill="#e8e4df" font-size="11.5">  이기기도 함 (COST 논문)</text>
  <text x="372" y="404" fill="rgb(138,133,128)" font-size="11">→ 가능하면 분산을 서두르지 말 것</text>

  <!-- HPC 대비 -->
  <text x="32" y="446" fill="rgb(212,168,83)" font-size="14" font-weight="700">클라우드 vs 슈퍼컴퓨팅(HPC)</text>
  <rect x="32" y="458" width="300" height="130" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="48" y="482" fill="#7fa8c9" font-size="12.5" font-weight="700">클라우드</text>
  <text x="48" y="504" fill="#e8e4df" font-size="11.5">· 온라인 서비스, 고가용 지속</text>
  <text x="48" y="526" fill="#e8e4df" font-size="11.5">· 부분 실패 견디며 계속 운영</text>
  <text x="48" y="548" fill="#e8e4df" font-size="11.5">· 상호 불신 조직 공유 → 강한 보안</text>
  <text x="48" y="570" fill="#e8e4df" font-size="11.5">· IP·이더넷, 여러 지역 분산</text>

  <rect x="348" y="458" width="300" height="130" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="364" y="482" fill="rgb(212,168,83)" font-size="12.5" font-weight="700">슈퍼컴퓨팅(HPC)</text>
  <text x="364" y="504" fill="#e8e4df" font-size="11.5">· 과학 계산(기상·분자) 배치 잡</text>
  <text x="364" y="526" fill="#e8e4df" font-size="11.5">· 체크포인트 → 노드 죽으면 전체 정지·재시작</text>
  <text x="364" y="548" fill="#e8e4df" font-size="11.5">· 공유 메모리·RDMA, 높은 신뢰 가정</text>
  <text x="364" y="570" fill="#e8e4df" font-size="11.5">· 특수 토폴로지, 노드 한곳에 모임</text>

  <line x1="32" y1="608" x2="648" y2="608" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="32" y="630" fill="rgb(138,133,128)" font-size="12">마이크로서비스 = 사람 문제의 기술 해법(팀 독립). 서버리스(FaaS) = 코드 실행의 미터링 과금</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
