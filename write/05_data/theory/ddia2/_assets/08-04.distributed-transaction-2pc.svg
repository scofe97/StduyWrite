<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 660" font-family="Pretendard, sans-serif">
  <rect width="680" height="660" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">분산 트랜잭션과 2PC</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">2PC 흐름 · 코디네이터 장애 · XA 한계 · Exactly-once · 8장 종합</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 2PC 흐름 -->
  <text x="32" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">2PC — 2단계 커밋 프로토콜</text>
  <rect x="32" y="124" width="616" height="88" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>

  <!-- 코디네이터 -->
  <rect x="48" y="136" width="120" height="28" rx="4" fill="rgb(212,168,83)" fill-opacity="0.15" stroke="rgb(212,168,83)"/>
  <text x="108" y="154" fill="rgb(212,168,83)" font-size="10" font-weight="700" text-anchor="middle">코디네이터</text>

  <!-- 참여자 1 -->
  <rect x="280" y="136" width="100" height="28" rx="4" fill="#141414" stroke="#7fa8c9"/>
  <text x="330" y="154" fill="#7fa8c9" font-size="10" text-anchor="middle">참여자 A</text>

  <!-- 참여자 2 -->
  <rect x="396" y="136" width="100" height="28" rx="4" fill="#141414" stroke="#7fa8c9"/>
  <text x="446" y="154" fill="#7fa8c9" font-size="10" text-anchor="middle">참여자 B</text>

  <!-- 참여자 3 -->
  <rect x="512" y="136" width="116" height="28" rx="4" fill="#141414" stroke="#7fa8c9"/>
  <text x="570" y="154" fill="#7fa8c9" font-size="10" text-anchor="middle">참여자 C</text>

  <!-- 화살표 → prepare -->
  <line x1="168" y1="150" x2="274" y2="150" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#ar)"/>
  <text x="221" y="145" fill="rgb(138,133,128)" font-size="8.5" text-anchor="middle">① prepare?</text>
  <text x="221" y="162" fill="#66bb6a" font-size="8.5" text-anchor="middle">② YES(약속)</text>

  <text x="48" y="186" fill="#e8e4df" font-size="10">1단계: prepare — 모든 참여자에 "커밋 가능?" 질의 · 참여자 YES 응답 = 커밋 불가역 약속</text>
  <text x="48" y="202" fill="#f47f72" font-size="10">커밋 포인트: 코디네이터가 결정을 자신 로그에 씀 → 이후 코디네이터 죽어도 커밋 강행</text>

  <!-- 의심 상태 -->
  <text x="32" y="248" fill="rgb(212,168,83)" font-size="14" font-weight="700">코디네이터 장애 — 의심 상태(In Doubt)</text>
  <rect x="32" y="260" width="616" height="68" rx="6" fill="#141414" stroke="#f47f72"/>
  <text x="48" y="282" fill="#f47f72" font-size="11" font-weight="700">참여자가 YES 응답 후 코디네이터가 죽으면 → 커밋? 중단? 알 수 없음</text>
  <text x="48" y="300" fill="#e8e4df" font-size="10.5">의심 상태 트랜잭션은 코디네이터 복구 전까지 잠금을 유지합니다 → 전체 시스템 블록 가능</text>
  <text x="48" y="318" fill="rgb(138,133,128)" font-size="9.5">3PC는 이론적 해법이지만 네트워크 분단 하에서 여전히 블록 → 실용 DB에서 채택 안 함</text>

  <!-- XA 한계 -->
  <text x="32" y="364" fill="rgb(212,168,83)" font-size="14" font-weight="700">XA 트랜잭션 — 이기종 분산 트랜잭션</text>

  <rect x="32" y="376" width="296" height="88" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="48" y="396" fill="#7fa8c9" font-size="11" font-weight="700">XA 구조</text>
  <text x="48" y="414" fill="#e8e4df" font-size="10">C API 표준 · PostgreSQL, MySQL, ActiveMQ 지원</text>
  <text x="48" y="430" fill="#e8e4df" font-size="10">코디네이터 = 앱 서버 내 라이브러리</text>
  <text x="48" y="446" fill="#e8e4df" font-size="10">코디네이터 로그 = 앱 서버 로컬 디스크</text>
  <text x="48" y="458" fill="rgb(138,133,128)" font-size="9">Java: JTA(Java Transaction API)</text>

  <rect x="344" y="376" width="304" height="88" rx="6" fill="#1a1410" stroke="#f47f72"/>
  <text x="360" y="396" fill="#f47f72" font-size="11" font-weight="700">XA 근본 문제</text>
  <text x="360" y="414" fill="#e8e4df" font-size="10">앱 서버 = 코디네이터 = 단일 장애 지점</text>
  <text x="360" y="430" fill="#e8e4df" font-size="10">이기종 최소 공통 분모 → 교착 감지·SSI 불가</text>
  <text x="360" y="446" fill="#e8e4df" font-size="10">의심 상태 잠금 → 수동 관리자 해결 필요</text>
  <text x="360" y="458" fill="#f47f72" font-size="9">휴리스틱 결정 = 원자성 의도적 파괴 (최후 수단)</text>

  <!-- Exactly-once -->
  <text x="32" y="508" fill="rgb(212,168,83)" font-size="14" font-weight="700">Exactly-once — 멱등성 패턴 (XA 없이)</text>
  <rect x="32" y="520" width="616" height="72" rx="6" fill="#141414" stroke="#66bb6a"/>
  <text x="48" y="542" fill="#66bb6a" font-size="11" font-weight="700">메시지 ID를 DB에 기록해 중복 처리 차단</text>
  <text x="48" y="560" fill="#e8e4df" font-size="10.5">① 트랜잭션 시작 · ② 메시지 ID 존재 확인 · ③ 없으면 ID삽입+처리결과를 같은 트랜잭션에 기록</text>
  <text x="48" y="578" fill="#e8e4df" font-size="10.5">④ 커밋 후 ack · 크래시 재시도 시 ID 이미 존재 → 건너뜀 — DB 내부 트랜잭션만으로 exactly-once</text>

  <!-- 8장 종합 이상 현상 표 -->
  <text x="32" y="618" fill="rgb(212,168,83)" font-size="13" font-weight="700">8장 종합 — 격리 수준별 이상 현상 방지</text>
  <rect x="32" y="628" width="616" height="22" rx="4" fill="#1a1410"/>
  <text x="48" y="643" fill="rgb(212,168,83)" font-size="9.5" font-weight="700">격리 수준</text>
  <text x="178" y="643" fill="rgb(212,168,83)" font-size="9.5" font-weight="700">더티읽기</text>
  <text x="248" y="643" fill="rgb(212,168,83)" font-size="9.5" font-weight="700">읽기스큐</text>
  <text x="316" y="643" fill="rgb(212,168,83)" font-size="9.5" font-weight="700">갱신손실</text>
  <text x="394" y="643" fill="rgb(212,168,83)" font-size="9.5" font-weight="700">쓰기스큐</text>
  <text x="472" y="643" fill="rgb(212,168,83)" font-size="9.5" font-weight="700">팬텀</text>
  <text x="540" y="643" fill="rgb(212,168,83)" font-size="9.5" font-weight="700">직렬화</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
