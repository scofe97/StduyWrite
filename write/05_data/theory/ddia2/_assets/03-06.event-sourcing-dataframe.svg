<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 620" font-family="Pretendard, sans-serif">
  <rect width="680" height="620" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">이벤트 소싱·CQRS + DataFrame</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">쓰기 최적화(불변 로그) vs 읽기 최적화(구체화 뷰)를 분리</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 이벤트 소싱 흐름 -->
  <text x="32" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">이벤트 소싱 — 불변 이벤트 로그가 진실의 원천</text>

  <rect x="32" y="128" width="140" height="50" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="102" y="148" fill="#e8e4df" font-size="11" text-anchor="middle">커맨드(요청)</text>
  <text x="102" y="166" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">검증 → 유효하면 사실</text>

  <rect x="200" y="128" width="160" height="50" rx="6" fill="#141414" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="280" y="148" fill="rgb(212,168,83)" font-size="11" text-anchor="middle" font-weight="700">이벤트 로그(append-only)</text>
  <text x="280" y="166" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">불변 · 과거형 명명 · 순서 중요</text>
  <line x1="172" y1="153" x2="196" y2="153" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="400" y="110" width="248" height="28" rx="4" fill="#101620" stroke="#7fa8c9"/>
  <text x="524" y="129" fill="#e8e4df" font-size="10" text-anchor="middle">구체화 뷰 ① 예약 상태</text>
  <rect x="400" y="142" width="248" height="28" rx="4" fill="#101620" stroke="#7fa8c9"/>
  <text x="524" y="161" fill="#e8e4df" font-size="10" text-anchor="middle">구체화 뷰 ② 대시보드 차트</text>
  <rect x="400" y="174" width="248" height="28" rx="4" fill="#101620" stroke="#7fa8c9"/>
  <text x="524" y="193" fill="#e8e4df" font-size="10" text-anchor="middle">구체화 뷰 ③ 배지 인쇄 파일</text>
  <line x1="360" y1="150" x2="396" y2="124" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="360" y1="155" x2="396" y2="156" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="360" y1="160" x2="396" y2="188" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="378" y="210" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">CQRS: 읽기 모델 파생</text>

  <!-- 장단점 -->
  <text x="32" y="244" fill="#66bb6a" font-size="13" font-weight="700">장점</text>
  <rect x="32" y="256" width="300" height="120" rx="6" fill="#141414" stroke="#66bb6a"/>
  <text x="48" y="278" fill="#e8e4df" font-size="10.5">· 의도 전달("예약 취소됨" 명확)</text>
  <text x="48" y="298" fill="#e8e4df" font-size="10.5">· 뷰는 재현 가능 — 삭제 후 재계산</text>
  <text x="48" y="318" fill="#e8e4df" font-size="10.5">· 여러 뷰·어느 모델이든·비정규화 가능</text>
  <text x="48" y="338" fill="#e8e4df" font-size="10.5">· 비가역 작업↓(삭제 이벤트로 되돌림)</text>
  <text x="48" y="358" fill="#e8e4df" font-size="10.5">· 감사 로그 · 높은 쓰기 처리량(순차)</text>

  <text x="348" y="244" fill="#f47f72" font-size="13" font-weight="700">단점</text>
  <rect x="348" y="256" width="300" height="120" rx="6" fill="#141414" stroke="#f47f72"/>
  <text x="364" y="278" fill="#e8e4df" font-size="10.5">· 외부 정보는 결정적이어야</text>
  <text x="364" y="296" fill="#e8e4df" font-size="10.5">  (환율은 이벤트에 포함 or 시점 조회)</text>
  <text x="364" y="316" fill="#e8e4df" font-size="10.5">· 불변 vs GDPR 삭제권(crypto-shredding)</text>
  <text x="364" y="336" fill="#e8e4df" font-size="10.5">· 외부 부작용 재처리 주의(확인 이메일)</text>
  <text x="364" y="358" fill="rgb(138,133,128)" font-size="10">핵심 요건: 모든 뷰가 같은 순서로 처리</text>

  <text x="32" y="398" fill="rgb(138,133,128)" font-size="11" font-style="italic">fact 테이블과 닮음(과거 이벤트 모음) — 단, fact는 같은 컬럼·순서 무관, 이벤트는 다양·순서 중요</text>

  <!-- DataFrame -->
  <text x="32" y="432" fill="rgb(212,168,83)" font-size="14" font-weight="700">DataFrame · 행렬 · 배열 (분석·ML)</text>
  <rect x="32" y="444" width="290" height="130" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="48" y="466" fill="#e8e4df" font-size="10.5">R·Pandas·Spark — 관계형 테이블 유사</text>
  <text x="48" y="486" fill="#e8e4df" font-size="10.5">단, 선언형 SQL 아닌 명령 연쇄로 wrangle</text>
  <text x="48" y="506" fill="#e8e4df" font-size="10.5">관계형 → 행렬/다차원 배열로 변환</text>
  <text x="48" y="524" fill="#e8e4df" font-size="10.5">희소 행렬(수천 컬럼) — NumPy로 처리</text>
  <text x="48" y="544" fill="#66bb6a" font-size="10.5">선형대수 → ML 알고리즘 기반</text>
  <text x="48" y="564" fill="rgb(138,133,128)" font-size="9.5">one-hot 인코딩으로 범주→숫자</text>

  <rect x="338" y="444" width="310" height="130" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="354" y="466" fill="rgb(212,168,83)" font-size="12" font-weight="700">3장 종합</text>
  <text x="354" y="488" fill="#e8e4df" font-size="10.5">관계형 — 웨어하우스·분석에 여전히 지배적</text>
  <text x="354" y="506" fill="#e8e4df" font-size="10.5">문서 — 자족적 1:N, 관계 드묾</text>
  <text x="354" y="524" fill="#e8e4df" font-size="10.5">그래프 — 무엇이든 연결, 재귀 탐색</text>
  <text x="354" y="542" fill="#e8e4df" font-size="10.5">DataFrame — 관계형↔행렬 다리(ML)</text>
  <text x="354" y="562" fill="rgb(138,133,128)" font-size="9.5">대개 스키마 비강제 — 암묵(read) vs 명시(write)</text>

  <line x1="32" y1="592" x2="648" y2="592" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="32" y="610" fill="rgb(138,133,128)" font-size="11.5">한 모델을 다른 모델로 흉내낼 수 있으나 어색 — 전문 DB + 이웃 niche 흡수 추세</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
