<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 620" font-family="Pretendard, sans-serif">
  <rect width="680" height="620" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">신뢰성 — 결함(fault) vs 장애(failure)</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">잘못돼도 계속 올바르게 동작 · 같은 것이 층위만 다름</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- fault vs failure -->
  <rect x="32" y="104" width="290" height="96" rx="6" fill="#141414" stroke="rgb(212,168,83)"/>
  <text x="48" y="128" fill="rgb(212,168,83)" font-size="14" font-weight="700">결함 (fault)</text>
  <text x="48" y="150" fill="#e8e4df" font-size="11.5">한 부분이 올바르게 동작 멈춤</text>
  <text x="48" y="170" fill="#e8e4df" font-size="11.5">예: 디스크 1개 고장, 머신 1대 크래시</text>
  <text x="48" y="190" fill="rgb(138,133,128)" font-size="10.5">→ 더 큰 시스템 관점에선 견딜 수 있음</text>

  <rect x="358" y="104" width="290" height="96" rx="6" fill="#141414" stroke="#f47f72"/>
  <text x="374" y="128" fill="#f47f72" font-size="14" font-weight="700">장애 (failure)</text>
  <text x="374" y="150" fill="#e8e4df" font-size="11.5">시스템 전체가 서비스 제공 멈춤</text>
  <text x="374" y="170" fill="#e8e4df" font-size="11.5">= SLO를 못 지킴</text>
  <text x="374" y="190" fill="rgb(138,133,128)" font-size="10.5">결함이 격리 안 되면 장애로 확대</text>

  <line x1="322" y1="152" x2="356" y2="152" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="339" y="144" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">확대</text>

  <text x="32" y="226" fill="#66bb6a" font-size="13" font-weight="700">내결함성(fault-tolerant) = 결함이 나도 서비스 지속 · SPOF = 격리 못 하는 단일 지점</text>

  <!-- 하드웨어 결함 -->
  <text x="32" y="262" fill="rgb(212,168,83)" font-size="14" font-weight="700">하드웨어 결함 — 독립적, 대개</text>
  <rect x="32" y="274" width="300" height="130" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="48" y="296" fill="#e8e4df" font-size="11">· HDD 연 2~5% 고장 (1만 개면 하루 1개)</text>
  <text x="48" y="316" fill="#e8e4df" font-size="11">· SSD 연 0.5~1% · 비정정 오류 연 1회</text>
  <text x="48" y="336" fill="#e8e4df" font-size="11">· 1/1000 머신 CPU 코어 오답 계산</text>
  <text x="48" y="356" fill="#e8e4df" font-size="11">· RAM 비트 뒤집힘(우주선·결함), ECC도</text>
  <text x="48" y="376" fill="#e8e4df" font-size="11">· 데이터센터 정전·화재·지진</text>
  <text x="48" y="396" fill="#66bb6a" font-size="10.5">대응: 중복(RAID·이중전원) + 분산(여러 AZ)</text>

  <!-- 소프트웨어 결함 -->
  <text x="348" y="262" fill="#f47f72" font-size="14" font-weight="700">소프트웨어 결함 — 강한 상관</text>
  <rect x="348" y="274" width="300" height="130" rx="6" fill="#141414" stroke="#f47f72"/>
  <text x="364" y="296" fill="#e8e4df" font-size="11">· 같은 SW = 같은 버그 → 모든 노드 동시</text>
  <text x="364" y="316" fill="#e8e4df" font-size="11">· 윤초 버그, 32768시간 후 SSD 일괄 고장</text>
  <text x="364" y="336" fill="#e8e4df" font-size="11">· 폭주 프로세스(메모리·CPU·스레드 고갈)</text>
  <text x="364" y="356" fill="#e8e4df" font-size="11">· 의존 서비스 느려짐 · 연쇄 실패</text>
  <text x="364" y="376" fill="#e8e4df" font-size="11">· 휴면 버그 — 환경 가정이 깨질 때 발현</text>
  <text x="364" y="396" fill="rgb(138,133,128)" font-size="10.5">대응: 빠른 해결책 없음, 작은 것들 누적</text>

  <!-- 사람 + 카오스 -->
  <text x="32" y="432" fill="rgb(212,168,83)" font-size="14" font-weight="700">사람과 신뢰성</text>
  <rect x="32" y="444" width="300" height="118" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="48" y="466" fill="#e8e4df" font-size="11">설정 변경이 장애 1순위(HW는 10~25%만)</text>
  <text x="48" y="486" fill="#e8e4df" font-size="11">"인적 오류"는 원인 아닌 증상</text>
  <text x="48" y="506" fill="#e8e4df" font-size="11">→ 사회기술 시스템의 문제</text>
  <text x="48" y="528" fill="#66bb6a" font-size="11" font-weight="700">무비난 포스트모템</text>
  <text x="48" y="548" fill="rgb(138,133,128)" font-size="10.5">처벌 없이 전말 공유 → 조직이 학습</text>

  <text x="348" y="432" fill="#66bb6a" font-size="14" font-weight="700">카오스 엔지니어링</text>
  <rect x="348" y="444" width="300" height="118" rx="6" fill="#101620" stroke="#66bb6a"/>
  <text x="364" y="466" fill="#e8e4df" font-size="11">결함을 일부러 주입(fault injection)</text>
  <text x="364" y="486" fill="#e8e4df" font-size="11">예: 무작위로 프로세스 죽이기</text>
  <text x="364" y="506" fill="#e8e4df" font-size="11">→ 내결함 기계가 늘 시험됨</text>
  <text x="364" y="528" fill="#e8e4df" font-size="11">치명 버그 다수는 부실한 에러 처리</text>
  <text x="364" y="548" fill="rgb(138,133,128)" font-size="10.5">예방이 나은 경우(보안)는 예외 — 되돌릴 수 없음</text>

  <line x1="32" y1="582" x2="648" y2="582" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="32" y="604" fill="rgb(138,133,128)" font-size="12">신뢰성은 핵심 시설만이 아님 — Post Office Horizon: SW 버그로 수백 명 억울한 유죄</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
