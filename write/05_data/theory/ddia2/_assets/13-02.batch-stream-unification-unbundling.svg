<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 580" font-family="Pretendard, sans-serif">
  <rect width="680" height="580" fill="#0d0d0d"/>

  <!-- Title -->
  <text x="340" y="38" text-anchor="middle" fill="#e8e4df" font-size="21" font-weight="700">배치·스트림 통합과 DB 언번들링</text>
  <text x="340" y="58" text-anchor="middle" fill="rgb(138,133,128)" font-size="13">람다 → 카파 → 언번들드 데이터베이스</text>
  <line x1="40" y1="70" x2="640" y2="70" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- Section A: Lambda vs Kappa -->
  <text x="50" y="94" fill="rgb(212,168,83)" font-size="12" font-weight="700">① 람다 아키텍처 vs 카파 아키텍처</text>

  <!-- Lambda -->
  <rect x="50" y="103" width="270" height="118" rx="6" fill="#1a1410" stroke="#f47f72" stroke-width="1.5"/>
  <text x="185" y="122" text-anchor="middle" fill="#f47f72" font-size="12" font-weight="700">람다 아키텍처 (Lambda)</text>

  <rect x="65" y="130" width="110" height="28" rx="4" fill="#141414" stroke="rgb(138,133,128)" stroke-width="1"/>
  <text x="120" y="148" text-anchor="middle" fill="#e8e4df" font-size="10">배치 레이어 (정확)</text>

  <rect x="195" y="130" width="110" height="28" rx="4" fill="#141414" stroke="rgb(138,133,128)" stroke-width="1"/>
  <text x="250" y="148" text-anchor="middle" fill="#e8e4df" font-size="10">스트림 레이어 (빠름)</text>

  <defs>
    <marker id="ar2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="rgb(138,133,128)"/>
    </marker>
  </defs>
  <line x1="120" y1="158" x2="170" y2="172" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#ar2)"/>
  <line x1="250" y1="158" x2="200" y2="172" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#ar2)"/>

  <rect x="130" y="172" width="110" height="28" rx="4" fill="#141414" stroke="rgb(212,168,83)" stroke-width="1"/>
  <text x="185" y="190" text-anchor="middle" fill="rgb(212,168,83)" font-size="10">서빙 레이어 (병합)</text>

  <text x="185" y="214" text-anchor="middle" fill="#f47f72" font-size="10">❌ 동일 로직을 두 번 구현·유지</text>

  <!-- Kappa -->
  <rect x="360" y="103" width="270" height="118" rx="6" fill="#141414" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="495" y="122" text-anchor="middle" fill="#66bb6a" font-size="12" font-weight="700">카파 아키텍처 (Kappa)</text>

  <rect x="380" y="132" width="230" height="28" rx="4" fill="#1a1a14" stroke="#66bb6a" stroke-width="1"/>
  <text x="495" y="150" text-anchor="middle" fill="#e8e4df" font-size="10">스트림 처리 엔진 (단일)</text>

  <text x="495" y="178" text-anchor="middle" fill="rgb(138,133,128)" font-size="10">히스토리 재처리 = 과거 이벤트를 재주입</text>

  <text x="495" y="196" text-anchor="middle" fill="#66bb6a" font-size="10">✓ 단일 코드 경로 · 이벤트 재재생 · exactly-once</text>
  <text x="495" y="212" text-anchor="middle" fill="#66bb6a" font-size="10">✓ 이벤트 시간 기반 윈도우로 재처리 일관성</text>

  <!-- divider -->
  <line x1="40" y1="235" x2="640" y2="235" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- Section B: Reprocessing for evolution -->
  <text x="50" y="256" fill="rgb(212,168,83)" font-size="12" font-weight="700">② 재처리를 통한 점진적 진화</text>

  <!-- Old view -->
  <rect x="60" y="266" width="120" height="40" rx="5" fill="#1a1410" stroke="rgb(138,133,128)" stroke-width="1"/>
  <text x="120" y="284" text-anchor="middle" fill="#e8e4df" font-size="11">구 파생 뷰</text>
  <text x="120" y="299" text-anchor="middle" fill="rgb(138,133,128)" font-size="10">(구 스키마)</text>

  <!-- Event log source -->
  <rect x="270" y="255" width="140" height="62" rx="6" fill="#141414" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="340" y="276" text-anchor="middle" fill="rgb(212,168,83)" font-size="11" font-weight="700">이벤트 로그</text>
  <text x="340" y="292" text-anchor="middle" fill="rgb(138,133,128)" font-size="10">(변경 불가 히스토리)</text>
  <text x="340" y="308" text-anchor="middle" fill="rgb(138,133,128)" font-size="10">재처리 가능</text>

  <!-- New view -->
  <rect x="500" y="266" width="120" height="40" rx="5" fill="#141414" stroke="#66bb6a" stroke-width="1"/>
  <text x="560" y="284" text-anchor="middle" fill="#66bb6a" font-size="11">신 파생 뷰</text>
  <text x="560" y="299" text-anchor="middle" fill="rgb(138,133,128)" font-size="10">(신 스키마)</text>

  <line x1="410" y1="280" x2="498" y2="280" stroke="#66bb6a" stroke-width="1.5" marker-end="url(#ar2)"/>
  <line x1="270" y1="286" x2="182" y2="286" stroke="rgb(138,133,128)" stroke-width="1" marker-end="url(#ar2)"/>

  <text x="340" y="340" text-anchor="middle" fill="rgb(138,133,128)" font-size="11">트래픽을 점진적으로 신 뷰로 이동 → 검증 후 구 뷰 제거 → 언제든 롤백 가능</text>

  <!-- divider -->
  <line x1="40" y1="352" x2="640" y2="352" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- Section C: Unbundling -->
  <text x="50" y="373" fill="rgb(212,168,83)" font-size="12" font-weight="700">③ DB 언번들링 — 통합 제품 vs 조합</text>

  <!-- Integrated DB -->
  <rect x="50" y="382" width="260" height="130" rx="6" fill="#1a1410" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <text x="180" y="401" text-anchor="middle" fill="#e8e4df" font-size="12" font-weight="700">통합 데이터베이스</text>
  <text x="65" y="420" fill="rgb(138,133,128)" font-size="11">• 보조 인덱스 (내장)</text>
  <text x="65" y="436" fill="rgb(138,133,128)" font-size="11">• 구체화 뷰 (내장)</text>
  <text x="65" y="452" fill="rgb(138,133,128)" font-size="11">• 복제 로그 (내장)</text>
  <text x="65" y="468" fill="rgb(138,133,128)" font-size="11">• 전문 검색 (내장)</text>
  <text x="180" y="500" text-anchor="middle" fill="rgb(138,133,128)" font-size="10">특정 워크로드에 최적 · 운영 단순</text>

  <!-- Unbundled -->
  <rect x="370" y="382" width="260" height="130" rx="6" fill="#141414" stroke="#7fa8c9" stroke-width="1.2"/>
  <text x="500" y="401" text-anchor="middle" fill="#e8e4df" font-size="12" font-weight="700">언번들드 데이터베이스</text>
  <text x="385" y="420" fill="#9cc3df" font-size="11">• 검색: Elasticsearch</text>
  <text x="385" y="436" fill="#9cc3df" font-size="11">• 스트림: Kafka CDC</text>
  <text x="385" y="452" fill="#9cc3df" font-size="11">• 분석: DWH + OLAP</text>
  <text x="385" y="468" fill="#9cc3df" font-size="11">• 캐시: Redis / 구체화 뷰</text>
  <text x="500" y="500" text-anchor="middle" fill="rgb(138,133,128)" font-size="10">넓은 워크로드 처리 · 운영 복잡도 상승</text>

  <!-- vs -->
  <text x="340" y="452" text-anchor="middle" fill="rgb(212,168,83)" font-size="14" font-weight="700">vs</text>

  <!-- Footer -->
  <line x1="40" y1="524" x2="640" y2="524" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="340" y="544" text-anchor="middle" fill="rgb(138,133,128)" font-size="11">단일 도구가 모든 요구를 충족하면 그것을 쓰는 편이 낫다</text>
  <text x="340" y="562" text-anchor="middle" fill="rgb(138,133,128)" font-size="10">DDIA 2nd Ed. Ch.13 — Batch/Stream Unification · Unbundling · 13-02</text>
</svg>
