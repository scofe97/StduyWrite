<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 600" font-family="Pretendard, sans-serif">
  <rect width="680" height="600" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">관계형 vs 문서 모델</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">1:N 트리 데이터는 문서, 다대다·참조는 관계형 — 관계 유형이 가른다</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 관계형 (좌) -->
  <text x="32" y="112" fill="#7fa8c9" font-size="14" font-weight="700">관계형 — 여러 테이블 + 조인</text>
  <rect x="32" y="124" width="300" height="158" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <rect x="48" y="140" width="120" height="30" rx="4" fill="#0d0d0d" stroke="#9cc3df"/>
  <text x="108" y="160" fill="#e8e4df" font-size="11" text-anchor="middle">users</text>
  <rect x="48" y="180" width="84" height="26" rx="3" fill="#0d0d0d" stroke="rgb(212,168,83)"/>
  <text x="90" y="198" fill="#e8e4df" font-size="10" text-anchor="middle">positions</text>
  <rect x="140" y="180" width="84" height="26" rx="3" fill="#0d0d0d" stroke="rgb(212,168,83)"/>
  <text x="182" y="198" fill="#e8e4df" font-size="10" text-anchor="middle">education</text>
  <rect x="232" y="180" width="84" height="26" rx="3" fill="#0d0d0d" stroke="rgb(212,168,83)"/>
  <text x="274" y="198" fill="#e8e4df" font-size="9.5" text-anchor="middle">contact_info</text>
  <line x1="90" y1="170" x2="90" y2="178" stroke="rgb(138,133,128)" stroke-width="1"/>
  <line x1="108" y1="170" x2="182" y2="178" stroke="rgb(138,133,128)" stroke-width="1"/>
  <line x1="120" y1="170" x2="274" y2="178" stroke="rgb(138,133,128)" stroke-width="1"/>
  <text x="48" y="232" fill="rgb(138,133,128)" font-size="10.5">FK로 분할(shredding) → 조회 시 다중 조인</text>
  <text x="48" y="252" fill="rgb(138,133,128)" font-size="10.5">중첩 항목을 ID로 직접 참조 가능</text>
  <text x="48" y="272" fill="#66bb6a" font-size="10.5">다대일·다대다에 강함</text>

  <!-- 문서 (우) -->
  <text x="348" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">문서 — 자족적 JSON 트리</text>
  <rect x="348" y="124" width="300" height="158" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="364" y="146" fill="#e8e4df" font-size="10.5" font-family="monospace">{ user_id, first_name,</text>
  <text x="364" y="164" fill="#e8e4df" font-size="10.5" font-family="monospace">  positions: [ ... ],</text>
  <text x="364" y="182" fill="#e8e4df" font-size="10.5" font-family="monospace">  education: [ ... ],</text>
  <text x="364" y="200" fill="#e8e4df" font-size="10.5" font-family="monospace">  contact_info: { ... } }</text>
  <text x="364" y="232" fill="rgb(138,133,128)" font-size="10.5">한 곳에 모여(locality) 조회 빠르고 단순</text>
  <text x="364" y="252" fill="rgb(138,133,128)" font-size="10.5">1:N 트리 구조를 명시적으로 표현</text>
  <text x="364" y="272" fill="#f47f72" font-size="10.5">중첩 항목 직접 참조 불가 · 다대다 약함</text>

  <!-- 임피던스 불일치 / ORM -->
  <text x="32" y="312" fill="rgb(212,168,83)" font-size="14" font-weight="700">임피던스 불일치와 ORM</text>
  <rect x="32" y="324" width="616" height="92" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="48" y="346" fill="#e8e4df" font-size="11.5">객체(앱) ↔ 테이블·행·열(DB) 사이 어색한 번역 계층 = 임피던스 불일치(전자공학 차용)</text>
  <text x="48" y="368" fill="#e8e4df" font-size="11.5">ORM(Hibernate·ActiveRecord)은 보일러플레이트를 줄이지만 두 모델을 완전히 숨기진 못함</text>
  <text x="48" y="390" fill="#f47f72" font-size="11.5">⚠ N+1 쿼리 — 댓글 N개 + 작성자 조회 N번 = N+1회. 조인 fetch로 회피</text>
  <text x="48" y="408" fill="#66bb6a" font-size="10.5">장점: 보일러플레이트 감소·캐싱·스키마 마이그레이션 보조</text>

  <!-- 선언형 쿼리 -->
  <text x="32" y="448" fill="rgb(212,168,83)" font-size="14" font-weight="700">선언형 쿼리 언어 (SQL·Cypher·SPARQL·Datalog)</text>
  <rect x="32" y="460" width="300" height="76" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="48" y="482" fill="#e8e4df" font-size="11">원하는 데이터 패턴만 명시(무엇)</text>
  <text x="48" y="502" fill="#e8e4df" font-size="11">옵티마이저가 인덱스·조인·순서 결정(어떻게)</text>
  <text x="48" y="524" fill="#66bb6a" font-size="10.5">간결·병렬화 가능·쿼리 변경 없이 성능 개선</text>

  <rect x="348" y="460" width="300" height="76" rx="6" fill="#141414" stroke="#f47f72"/>
  <text x="364" y="482" fill="#e8e4df" font-size="11">명령형(Python·Java)</text>
  <text x="364" y="502" fill="#e8e4df" font-size="11">연산 순서를 직접 작성(알고리즘)</text>
  <text x="364" y="524" fill="#f47f72" font-size="10.5">병렬 실행을 직접 구현해야 함</text>

  <line x1="32" y1="556" x2="648" y2="556" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="32" y="578" fill="rgb(138,133,128)" font-size="12">1:N(one-to-few) 트리 → 문서. 다수 항목(유명인 댓글 수천 개)이면 임베딩 부담 → 관계형</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
