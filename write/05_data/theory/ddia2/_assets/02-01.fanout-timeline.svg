<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 600" font-family="Pretendard, sans-serif">
  <rect width="680" height="600" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">사례 연구 — 소셜 홈 타임라인</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">읽기 시점 조인(폴링) vs 쓰기 시점 fan-out(구체화 뷰)</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 방식 A: 읽기 시점 -->
  <text x="32" y="112" fill="#f47f72" font-size="14" font-weight="700">A. 읽기 시점 조인 — 폴링</text>
  <rect x="32" y="124" width="300" height="150" rx="6" fill="#141414" stroke="#f47f72"/>
  <text x="48" y="148" fill="#e8e4df" font-size="11.5">클라이언트가 5초마다 SQL 조인 반복</text>
  <text x="48" y="170" fill="#e8e4df" font-size="11.5">follows ⋈ posts ⋈ users, 최신 1000개</text>
  <text x="48" y="196" fill="#e8e4df" font-size="11.5">동시 온라인 1000만 → 200만 쿼리/초</text>
  <text x="48" y="218" fill="#e8e4df" font-size="11.5">× 팔로잉 200명</text>
  <text x="48" y="244" fill="#f47f72" font-size="13" font-weight="700">= 4억 조회/초 (읽기 폭발)</text>
  <text x="48" y="264" fill="rgb(138,133,128)" font-size="10.5">읽기 비쌈 · 수만 팔로잉 사용자는 더 심함</text>

  <!-- 방식 B: 쓰기 시점 -->
  <text x="348" y="112" fill="#66bb6a" font-size="14" font-weight="700">B. 쓰기 시점 fan-out — 구체화</text>
  <rect x="348" y="124" width="300" height="150" rx="6" fill="#141414" stroke="#66bb6a"/>
  <text x="364" y="148" fill="#e8e4df" font-size="11.5">게시 시 팔로워별 타임라인에 미리 삽입</text>
  <text x="364" y="170" fill="#e8e4df" font-size="11.5">"우편함 배달" — 읽기는 캐시에서 즉시</text>
  <text x="364" y="196" fill="#e8e4df" font-size="11.5">5800 게시/초 × fan-out 200</text>
  <text x="364" y="218" fill="#e8e4df" font-size="11.5">= 100만 타임라인 쓰기/초</text>
  <text x="364" y="244" fill="#66bb6a" font-size="13" font-weight="700">읽기 4억 → 쓰기 100만 (절감)</text>
  <text x="364" y="264" fill="rgb(138,133,128)" font-size="10.5">읽기 빠름 · 쓰기에 더 일함(파생 데이터)</text>

  <!-- fan-out 그림 -->
  <text x="32" y="304" fill="rgb(212,168,83)" font-size="14" font-weight="700">fan-out — 한 게시가 N 팔로워 타임라인으로</text>

  <rect x="40" y="328" width="120" height="48" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="100" y="357" fill="#e8e4df" font-size="12.5" text-anchor="middle" font-weight="700">사용자 게시</text>

  <rect x="280" y="316" width="150" height="34" rx="5" fill="#101620" stroke="#7fa8c9"/>
  <text x="355" y="338" fill="#e8e4df" font-size="11.5" text-anchor="middle">팔로워 ① 타임라인</text>
  <rect x="280" y="356" width="150" height="34" rx="5" fill="#101620" stroke="#7fa8c9"/>
  <text x="355" y="378" fill="#e8e4df" font-size="11.5" text-anchor="middle">팔로워 ② 타임라인</text>
  <rect x="280" y="396" width="150" height="34" rx="5" fill="#101620" stroke="#7fa8c9"/>
  <text x="355" y="418" fill="#e8e4df" font-size="11.5" text-anchor="middle">팔로워 ⋯ 타임라인</text>

  <line x1="160" y1="350" x2="276" y2="333" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="160" y1="352" x2="276" y2="373" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="160" y1="354" x2="276" y2="413" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="220" y="335" fill="rgb(212,168,83)" font-size="11" text-anchor="middle">fan-out</text>

  <rect x="470" y="356" width="178" height="58" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="486" y="378" fill="#e8e4df" font-size="11">스파이크는 큐에 적재 가능</text>
  <text x="486" y="398" fill="rgb(138,133,128)" font-size="10.5">→ 배달은 약간 지연돼도 OK</text>
  <line x1="430" y1="385" x2="466" y2="385" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- 극단 케이스 -->
  <line x1="32" y1="446" x2="648" y2="446" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="32" y="470" fill="rgb(212,168,83)" font-size="14" font-weight="700">극단 케이스 — 두 가지</text>
  <text x="32" y="494" fill="#e8e4df" font-size="12">· 과도한 팔로잉 사용자 → 쓰기 폭주, 다 안 읽으니 일부 쓰기 드롭 OK(샘플만)</text>
  <text x="32" y="518" fill="#e8e4df" font-size="12">· 유명인(팔로워 수백만) → 드롭 불가. 따로 저장 후 읽을 때 병합(hybrid)</text>
  <text x="32" y="546" fill="rgb(138,133,128)" font-size="12">구체화 뷰 = 읽기 가속 위해 쓰기에 더 일하는 파생 데이터(systems of record와 대비)</text>
  <text x="32" y="572" fill="rgb(138,133,128)" font-size="12">throughput: 게시·쓰기/초 · response time: 타임라인 로드·배달 지연</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
