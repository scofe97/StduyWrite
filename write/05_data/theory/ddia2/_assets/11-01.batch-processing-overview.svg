<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 620" font-family="Pretendard, sans-serif">
  <rect width="680" height="620" fill="#0d0d0d"/>
  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">배치 처리 개요와 Unix 도구</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">온라인/배치/스트림 구분 · Unix 파이프라인 · 정렬 vs 인메모리 집계</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <text x="32" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">처리 시스템 세 종류</text>
  <rect x="32" y="124" width="185" height="100" rx="6" fill="#141414" stroke="#7fa8c9"/>
  <text x="125" y="146" fill="#7fa8c9" font-size="11" font-weight="700" text-anchor="middle">온라인 시스템</text>
  <text x="48" y="166" fill="#e8e4df" font-size="10.5">요청 → 응답</text>
  <text x="48" y="184" fill="#e8e4df" font-size="10.5">지표: 응답 시간</text>
  <text x="48" y="202" fill="rgb(138,133,128)" font-size="10">DB, 캐시, 검색</text>

  <rect x="231" y="124" width="185" height="100" rx="6" fill="#141414" stroke="rgb(212,168,83)"/>
  <text x="324" y="146" fill="rgb(212,168,83)" font-size="11" font-weight="700" text-anchor="middle">배치 처리</text>
  <text x="247" y="166" fill="#e8e4df" font-size="10.5">읽기 전용 입력 → 출력 재생성</text>
  <text x="247" y="184" fill="#e8e4df" font-size="10.5">지표: 처리량(throughput)</text>
  <text x="247" y="202" fill="rgb(138,133,128)" font-size="10">Spark, Flink, MapReduce</text>

  <rect x="430" y="124" width="218" height="100" rx="6" fill="#141414" stroke="#66bb6a"/>
  <text x="539" y="146" fill="#66bb6a" font-size="11" font-weight="700" text-anchor="middle">스트림 처리</text>
  <text x="446" y="166" fill="#e8e4df" font-size="10.5">무한 입력 스트림 처리</text>
  <text x="446" y="184" fill="#e8e4df" font-size="10.5">잡이 완료되지 않음</text>
  <text x="446" y="202" fill="rgb(138,133,128)" font-size="10">Kafka Streams, Flink (12장)</text>

  <text x="32" y="252" fill="rgb(212,168,83)" font-size="14" font-weight="700">배치 잡의 핵심 속성</text>
  <rect x="32" y="264" width="616" height="56" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <rect x="48" y="276" width="140" height="32" rx="4" fill="#141414" stroke="#66bb6a"/>
  <text x="118" y="296" fill="#66bb6a" font-size="10" text-anchor="middle">입력 불변</text>
  <rect x="202" y="276" width="140" height="32" rx="4" fill="#141414" stroke="#7fa8c9"/>
  <text x="272" y="296" fill="#7fa8c9" font-size="10" text-anchor="middle">출력 재생성</text>
  <rect x="356" y="276" width="140" height="32" rx="4" fill="#141414" stroke="rgb(212,168,83)"/>
  <text x="426" y="296" fill="rgb(212,168,83)" font-size="10" text-anchor="middle">롤백 후 재실행</text>
  <rect x="510" y="276" width="122" height="32" rx="4" fill="#141414" stroke="#66bb6a"/>
  <text x="571" y="296" fill="#66bb6a" font-size="10" text-anchor="middle">인간 결함 내성</text>

  <text x="32" y="352" fill="rgb(212,168,83)" font-size="14" font-weight="700">Unix 파이프라인 — 상위 5개 URL 추출</text>
  <rect x="32" y="364" width="616" height="100" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="48" y="386" fill="rgb(138,133,128)" font-size="10.5">cat access.log  |  awk '{print $7}'  |  sort  |  uniq -c  |  sort -r -n  |  head -n 5</text>
  <rect x="48" y="396" width="88" height="20" rx="3" fill="#1a1410" stroke="rgb(42,37,32)"/>
  <text x="92" y="410" fill="#e8e4df" font-size="9" text-anchor="middle">레코드 읽기</text>
  <rect x="148" y="396" width="88" height="20" rx="3" fill="#1a1410" stroke="rgb(42,37,32)"/>
  <text x="192" y="410" fill="#e8e4df" font-size="9" text-anchor="middle">키 추출(URL)</text>
  <rect x="248" y="396" width="72" height="20" rx="3" fill="#1a1410" stroke="rgb(42,37,32)"/>
  <text x="284" y="410" fill="#e8e4df" font-size="9" text-anchor="middle">정렬</text>
  <rect x="332" y="396" width="88" height="20" rx="3" fill="#1a1410" stroke="rgb(42,37,32)"/>
  <text x="376" y="410" fill="#e8e4df" font-size="9" text-anchor="middle">카운트 집계</text>
  <rect x="432" y="396" width="88" height="20" rx="3" fill="#1a1410" stroke="rgb(42,37,32)"/>
  <text x="476" y="410" fill="#e8e4df" font-size="9" text-anchor="middle">빈도순 재정렬</text>
  <rect x="532" y="396" width="100" height="20" rx="3" fill="#1a1410" stroke="rgb(42,37,32)"/>
  <text x="582" y="410" fill="#e8e4df" font-size="9" text-anchor="middle">상위 5개 출력</text>
  <text x="48" y="448" fill="rgb(138,133,128)" font-size="10">GNU sort: 자동 디스크 스필 + 멀티코어 병렬 정렬. 병목은 입력 파일 읽기 속도입니다.</text>

  <text x="32" y="492" fill="rgb(212,168,83)" font-size="14" font-weight="700">정렬 방식 vs 인메모리 해시</text>
  <rect x="32" y="504" width="296" height="76" rx="6" fill="#141414" stroke="#7fa8c9"/>
  <text x="180" y="524" fill="#7fa8c9" font-size="11" font-weight="700" text-anchor="middle">인메모리 해시 집계</text>
  <text x="48" y="544" fill="#e8e4df" font-size="10.5">워킹셋이 메모리에 들어올 때 유리</text>
  <text x="48" y="562" fill="rgb(138,133,128)" font-size="10">워킹셋 = 고유 키 수 (로그 줄 수 아님)</text>

  <rect x="352" y="504" width="296" height="76" rx="6" fill="#141414" stroke="rgb(212,168,83)"/>
  <text x="500" y="524" fill="rgb(212,168,83)" font-size="11" font-weight="700" text-anchor="middle">정렬 기반 집계</text>
  <text x="368" y="544" fill="#e8e4df" font-size="10.5">워킹셋이 메모리를 초과할 때 유리</text>
  <text x="368" y="562" fill="rgb(138,133,128)" font-size="10">세그먼트 파일 + Mergesort, 순차 I/O</text>

  <rect x="32" y="592" width="616" height="22" rx="6" fill="#1a1410" stroke="rgb(42,37,32)"/>
  <text x="340" y="607" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">단일 머신 한계 → 분산 배치 처리 필요: DFS + 잡 오케스트레이터 + 처리 프레임워크</text>
</svg>
