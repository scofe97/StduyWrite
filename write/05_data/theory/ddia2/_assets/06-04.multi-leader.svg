<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 640" font-family="Pretendard, sans-serif">
  <rect width="680" height="640" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">다중 리더 복제</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">리전마다 리더 · 비동기 양방향 · 토폴로지 선택 · sync engine</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 멀티리전 -->
  <text x="32" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">멀티리전 — 단일 리더 대비</text>

  <rect x="32" y="124" width="180" height="44" rx="5" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="122" y="146" fill="rgb(212,168,83)" font-size="11" font-weight="700" text-anchor="middle">리전 A 리더</text>
  <text x="122" y="161" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">로컬 쓰기 처리</text>

  <line x1="212" y1="146" x2="296" y2="146" stroke="#7fa8c9" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ab)"/>
  <line x1="296" y1="158" x2="212" y2="158" stroke="#7fa8c9" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ab)"/>
  <text x="254" y="138" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">비동기 양방향</text>

  <rect x="300" y="124" width="180" height="44" rx="5" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="390" y="146" fill="rgb(212,168,83)" font-size="11" font-weight="700" text-anchor="middle">리전 B 리더</text>
  <text x="390" y="161" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">로컬 쓰기 처리</text>

  <rect x="500" y="124" width="148" height="44" rx="5" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="574" y="143" fill="#e8e4df" font-size="9.5" text-anchor="middle">리전 내부는</text>
  <text x="574" y="158" fill="#e8e4df" font-size="9.5" text-anchor="middle">leader-follower</text>

  <rect x="32" y="180" width="616" height="92" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="48" y="202" fill="#66bb6a" font-size="10.5">+ 성능: 쓰기를 로컬 리전에서 처리(인터리전 지연 숨김)</text>
  <text x="48" y="220" fill="#66bb6a" font-size="10.5">+ 리전 장애 내성: 각 리전 독립 동작, 복귀 시 따라잡음</text>
  <text x="48" y="238" fill="#66bb6a" font-size="10.5">+ 네트워크 문제 내성: 인터리전 링크 끊겨도 로컬 진행</text>
  <text x="48" y="258" fill="#f47f72" font-size="10.5">− 일관성 약함: 잔액 음수·username 유일성 같은 제약 보장 못 함 → 충돌 불가피</text>

  <!-- 토폴로지 -->
  <text x="32" y="306" fill="rgb(212,168,83)" font-size="14" font-weight="700">복제 토폴로지 3가지</text>

  <rect x="32" y="318" width="196" height="120" rx="6" fill="#141414" stroke="#f47f72"/>
  <text x="130" y="340" fill="#e8e4df" font-size="12" font-weight="700" text-anchor="middle">circular(원형)</text>
  <circle cx="80" cy="375" r="9" fill="none" stroke="#7fa8c9" stroke-width="1.5"/>
  <circle cx="130" cy="362" r="9" fill="none" stroke="#7fa8c9" stroke-width="1.5"/>
  <circle cx="180" cy="375" r="9" fill="none" stroke="#7fa8c9" stroke-width="1.5"/>
  <circle cx="130" cy="400" r="9" fill="none" stroke="#7fa8c9" stroke-width="1.5"/>
  <line x1="88" y1="370" x2="122" y2="364" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <line x1="138" y1="364" x2="172" y2="370" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <line x1="178" y1="383" x2="138" y2="398" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <line x1="122" y1="398" x2="82" y2="383" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <text x="130" y="428" fill="#f47f72" font-size="9" text-anchor="middle">한 노드 죽으면 흐름 끊김</text>

  <rect x="242" y="318" width="196" height="120" rx="6" fill="#141414" stroke="#f47f72"/>
  <text x="340" y="340" fill="#e8e4df" font-size="12" font-weight="700" text-anchor="middle">star(성형)</text>
  <circle cx="340" cy="380" r="9" fill="none" stroke="rgb(212,168,83)" stroke-width="1.8"/>
  <circle cx="290" cy="360" r="8" fill="none" stroke="#7fa8c9" stroke-width="1.5"/>
  <circle cx="390" cy="360" r="8" fill="none" stroke="#7fa8c9" stroke-width="1.5"/>
  <circle cx="290" cy="405" r="8" fill="none" stroke="#7fa8c9" stroke-width="1.5"/>
  <circle cx="390" cy="405" r="8" fill="none" stroke="#7fa8c9" stroke-width="1.5"/>
  <line x1="332" y1="375" x2="297" y2="364" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <line x1="348" y1="375" x2="383" y2="364" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <line x1="332" y1="385" x2="297" y2="400" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <line x1="348" y1="385" x2="383" y2="400" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <text x="340" y="428" fill="#f47f72" font-size="9" text-anchor="middle">루트 죽으면 흐름 끊김</text>

  <rect x="452" y="318" width="196" height="120" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="550" y="340" fill="rgb(212,168,83)" font-size="12" font-weight="700" text-anchor="middle">all-to-all(전체)</text>
  <circle cx="510" cy="362" r="9" fill="none" stroke="#7fa8c9" stroke-width="1.5"/>
  <circle cx="590" cy="362" r="9" fill="none" stroke="#7fa8c9" stroke-width="1.5"/>
  <circle cx="510" cy="402" r="9" fill="none" stroke="#7fa8c9" stroke-width="1.5"/>
  <circle cx="590" cy="402" r="9" fill="none" stroke="#7fa8c9" stroke-width="1.5"/>
  <line x1="519" y1="362" x2="581" y2="362" stroke="rgb(138,133,128)" stroke-width="1"/>
  <line x1="510" y1="371" x2="510" y2="393" stroke="rgb(138,133,128)" stroke-width="1"/>
  <line x1="590" y1="371" x2="590" y2="393" stroke="rgb(138,133,128)" stroke-width="1"/>
  <line x1="519" y1="402" x2="581" y2="402" stroke="rgb(138,133,128)" stroke-width="1"/>
  <line x1="517" y1="369" x2="583" y2="395" stroke="rgb(138,133,128)" stroke-width="1"/>
  <line x1="583" y1="369" x2="517" y2="395" stroke="rgb(138,133,128)" stroke-width="1"/>
  <text x="550" y="428" fill="#66bb6a" font-size="9" text-anchor="middle">내고장 좋음·순서 역전 위험</text>

  <text x="32" y="460" fill="rgb(138,133,128)" font-size="10">all-to-all은 메시지 추월로 insert보다 update가 먼저 도착할 수 있음(인과 문제) → version vector로 순서 보정</text>

  <!-- sync engine -->
  <text x="32" y="494" fill="rgb(212,168,83)" font-size="14" font-weight="700">sync engine · local-first</text>
  <rect x="32" y="506" width="616" height="110" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="48" y="528" fill="#e8e4df" font-size="11">오프라인 작동 앱(캘린더)·실시간 협업(Google Docs·Figma) = 다중 리더의 극단</text>
  <text x="48" y="546" fill="#e8e4df" font-size="10.5">각 기기·브라우저 탭 = 리더(로컬 쓰기) · 비동기 sync로 다른 레플리카에 전파</text>
  <text x="48" y="566" fill="#66bb6a" font-size="10.5">sync engine 장점: 즉각 UI 응답 · 오프라인 작동 · 단순한 프로그래밍 모델 · 실시간 반영</text>
  <text x="48" y="584" fill="#f47f72" font-size="10.5">한계: 필요 데이터를 미리 다 받아야 해 대용량엔 부적합</text>
  <text x="48" y="604" fill="rgb(138,133,128)" font-size="9.5">offline-first=오프라인 편집 · local-first=개발사 서비스 종료에도 작동(개방 sync 프로토콜) · Git이 예</text>

  <defs>
    <marker id="ab" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="#7fa8c9" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
