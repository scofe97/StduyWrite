<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 680" font-family="Pretendard, sans-serif">
  <rect width="680" height="680" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">리더리스 복제 + 6장 종합</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">아무 레플리카나 쓰기 수용 · quorum w+r&gt;n · 6장 정리</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- quorum -->
  <text x="32" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">quorum 읽기·쓰기 (Dynamo-style)</text>
  <rect x="32" y="124" width="616" height="100" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="48" y="148" fill="#e8e4df" font-size="13" font-weight="700">n 레플리카 · 쓰기 w개 확인 · 읽기 r개 질의 · w + r &gt; n 이면 최신 읽기 보장</text>
  <text x="48" y="170" fill="#e8e4df" font-size="10.5">읽기·쓰기 집합이 한 노드 이상 겹침 → 그 노드가 최신 값 보유 (예: n=3,w=2,r=2 → 1노드 장애 견딤)</text>
  <text x="48" y="190" fill="#66bb6a" font-size="10.5">w&lt;n: 노드 죽어도 쓰기 가능 · r&lt;n: 노드 죽어도 읽기 가능 · 보통 과반(n/2 초과) 선택</text>
  <text x="48" y="210" fill="#f47f72" font-size="10">단, 엣지 케이스(복원·rebalancing·동시 읽쓰·부분 실패·시계)로 절대 보장은 아님</text>

  <!-- 따라잡기 -->
  <text x="32" y="262" fill="rgb(212,168,83)" font-size="14" font-weight="700">놓친 쓰기 따라잡기 — 3기법</text>

  <rect x="32" y="274" width="196" height="86" rx="6" fill="#141414" stroke="#66bb6a"/>
  <text x="48" y="296" fill="#66bb6a" font-size="11" font-weight="700">read repair</text>
  <text x="48" y="314" fill="#e8e4df" font-size="10">읽기 시 stale 응답 감지</text>
  <text x="48" y="330" fill="#e8e4df" font-size="10">→ 최신 값을 되써줌</text>
  <text x="48" y="348" fill="rgb(138,133,128)" font-size="9">자주 읽는 값에 적합</text>

  <rect x="242" y="274" width="196" height="86" rx="6" fill="#141414" stroke="#7fa8c9"/>
  <text x="258" y="296" fill="#7fa8c9" font-size="11" font-weight="700">hinted handoff</text>
  <text x="258" y="314" fill="#e8e4df" font-size="10">대신 hint로 쓰기 보관</text>
  <text x="258" y="330" fill="#e8e4df" font-size="10">→ 복귀 시 전달·삭제</text>
  <text x="258" y="348" fill="rgb(138,133,128)" font-size="9">안 읽히는 값도 커버</text>

  <rect x="452" y="274" width="196" height="86" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="468" y="296" fill="#e8e4df" font-size="11" font-weight="700">anti-entropy</text>
  <text x="468" y="314" fill="#e8e4df" font-size="10">백그라운드 차이 탐지</text>
  <text x="468" y="330" fill="#e8e4df" font-size="10">→ 누락 데이터 복사</text>
  <text x="468" y="348" fill="rgb(138,133,128)" font-size="9">순서 없음·지연 큼</text>

  <!-- 동시 쓰기 감지 -->
  <text x="32" y="398" fill="rgb(212,168,83)" font-size="14" font-weight="700">동시 쓰기 감지 — happens-before · version vector</text>
  <rect x="32" y="410" width="616" height="80" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="48" y="432" fill="#e8e4df" font-size="11">happens-before: A가 B의 토대면 A→B(인과) · 어느 쪽도 아니면 동시(concurrent)</text>
  <text x="48" y="452" fill="#e8e4df" font-size="10.5">버전 번호로 감지: 이전 읽기 버전 포함해 쓰기 → 그 이하 덮어쓰고 더 높은 건 sibling 보존</text>
  <text x="48" y="472" fill="#66bb6a" font-size="10.5">version vector = 레플리카·키별 버전 번호 모음(다중 레플리카 대응) · Riak causal context</text>

  <!-- 6장 종합 -->
  <text x="32" y="524" fill="rgb(212,168,83)" font-size="14" font-weight="700">6장 종합 — 세 복제 방식</text>

  <rect x="32" y="536" width="196" height="92" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="48" y="558" fill="rgb(212,168,83)" font-size="12" font-weight="700">단일 리더</text>
  <text x="48" y="578" fill="#e8e4df" font-size="10">한 리더가 쓰기, 팔로워에</text>
  <text x="48" y="594" fill="#e8e4df" font-size="10">change stream 전달</text>
  <text x="48" y="612" fill="#66bb6a" font-size="9.5">이해 쉬움·강한 일관성</text>

  <rect x="242" y="536" width="196" height="92" rx="6" fill="#141414" stroke="#7fa8c9"/>
  <text x="258" y="558" fill="#7fa8c9" font-size="12" font-weight="700">다중 리더</text>
  <text x="258" y="578" fill="#e8e4df" font-size="10">여러 리더가 쓰기 수용,</text>
  <text x="258" y="594" fill="#e8e4df" font-size="10">서로·팔로워에 전달</text>
  <text x="258" y="612" fill="#66bb6a" font-size="9.5">장애·지연에 견고·충돌 해소</text>

  <rect x="452" y="536" width="196" height="92" rx="6" fill="#141414" stroke="#9cc3df"/>
  <text x="468" y="558" fill="#9cc3df" font-size="12" font-weight="700">리더리스</text>
  <text x="468" y="578" fill="#e8e4df" font-size="10">여러 노드에 쓰고 읽어</text>
  <text x="468" y="594" fill="#e8e4df" font-size="10">stale 감지·보정</text>
  <text x="468" y="612" fill="#66bb6a" font-size="9.5">failover 없음·약한 일관성</text>

  <text x="32" y="652" fill="rgb(138,133,128)" font-size="10">복제 목적: 고가용성·내구성·단절 작동·지연·확장성 · 다음 장(7장)은 샤딩으로 데이터 분할</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
