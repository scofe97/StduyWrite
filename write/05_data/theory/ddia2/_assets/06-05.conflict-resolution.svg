<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 660" font-family="Pretendard, sans-serif">
  <rect width="680" height="660" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">쓰기 충돌 해소</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">동시 쓰기가 충돌 · 회피→LWW→수동→자동(CRDT/OT) 순으로 본다</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 충돌 발생 -->
  <text x="32" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">충돌이란 — 동시(concurrent) 쓰기</text>
  <rect x="32" y="124" width="616" height="56" rx="6" fill="#141414" stroke="#f47f72"/>
  <text x="48" y="146" fill="#e8e4df" font-size="11">사용자1: 제목 A→B · 사용자2: 제목 A→C (각자 로컬 리더에 적용) → 비동기 복제 시 충돌</text>
  <text x="48" y="166" fill="rgb(138,133,128)" font-size="10">동시 = 쓸 때 서로를 몰랐음(물리적 동시 아님) · 단일 리더엔 없는 문제</text>

  <!-- 해소 단계 -->
  <text x="32" y="218" fill="rgb(212,168,83)" font-size="14" font-weight="700">해소 전략 — 단계별</text>

  <rect x="32" y="230" width="300" height="92" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="48" y="252" fill="rgb(212,168,83)" font-size="12" font-weight="700">① 충돌 회피(avoidance)</text>
  <text x="48" y="270" fill="#e8e4df" font-size="10.5">한 레코드 쓰기를 항상 같은 리더로</text>
  <text x="48" y="288" fill="#66bb6a" font-size="10.5">+ 충돌 자체가 안 생김(가장 단순)</text>
  <text x="48" y="306" fill="#f47f72" font-size="10">− 리더 변경(리전 이동) 중엔 깨짐</text>

  <rect x="348" y="230" width="300" height="92" rx="6" fill="#141414" stroke="#f47f72"/>
  <text x="364" y="252" fill="#f47f72" font-size="12" font-weight="700">② LWW(last write wins)</text>
  <text x="364" y="270" fill="#e8e4df" font-size="10.5">타임스탬프 최대값 채택, 나머지 폐기</text>
  <text x="364" y="288" fill="#f47f72" font-size="10.5">− 동시 쓰기는 "최신"이 무정의(랜덤)</text>
  <text x="364" y="306" fill="#f47f72" font-size="10">− 데이터 손실 · 시계 동기화 민감</text>

  <rect x="32" y="332" width="300" height="92" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="48" y="354" fill="#7fa8c9" font-size="12" font-weight="700">③ 수동 해소(siblings)</text>
  <text x="48" y="372" fill="#e8e4df" font-size="10.5">동시 값을 모두 보존(B와 C)</text>
  <text x="48" y="390" fill="#e8e4df" font-size="10.5">읽을 때 반환 → 앱·사용자가 병합</text>
  <text x="48" y="408" fill="#f47f72" font-size="10">− API 복잡 · 장바구니 삭제 항목 부활</text>

  <rect x="348" y="332" width="300" height="92" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="364" y="354" fill="rgb(212,168,83)" font-size="12" font-weight="700">④ 자동 해소(수렴)</text>
  <text x="364" y="372" fill="#e8e4df" font-size="10.5">모든 레플리카가 같은 상태로 수렴</text>
  <text x="364" y="390" fill="#66bb6a" font-size="10.5">+ 의도 보존 · 데이터 손실 최소</text>
  <text x="364" y="408" fill="rgb(138,133,128)" font-size="10">strong eventual consistency</text>

  <!-- CRDT vs OT -->
  <text x="32" y="456" fill="rgb(212,168,83)" font-size="14" font-weight="700">자동 해소 두 계열 — CRDT vs OT (ice → nice!)</text>

  <rect x="32" y="468" width="300" height="108" rx="6" fill="#101620" stroke="#9cc3df"/>
  <text x="48" y="490" fill="#9cc3df" font-size="12" font-weight="700">OT(operational transformation)</text>
  <text x="48" y="510" fill="#e8e4df" font-size="10.5">삽입·삭제 인덱스 기록 → 교환</text>
  <text x="48" y="528" fill="#e8e4df" font-size="10.5">동시 연산 반영해 인덱스 변환</text>
  <text x="48" y="546" fill="#e8e4df" font-size="10">! at 3 → 4로 변환(n 삽입 보정)</text>
  <text x="48" y="566" fill="rgb(138,133,128)" font-size="9.5">Google Docs · ShareDB</text>

  <rect x="348" y="468" width="300" height="108" rx="6" fill="#141414" stroke="rgb(212,168,83)"/>
  <text x="364" y="490" fill="rgb(212,168,83)" font-size="12" font-weight="700">CRDT(conflict-free replicated datatype)</text>
  <text x="364" y="510" fill="#e8e4df" font-size="10.5">각 글자에 불변 ID 부여</text>
  <text x="364" y="528" fill="#e8e4df" font-size="10.5">인덱스 대신 ID로 위치 결정</text>
  <text x="364" y="546" fill="#e8e4df" font-size="10">변환 없이 수렴 · 동시 삽입은 ID로 정렬</text>
  <text x="364" y="566" fill="rgb(138,133,128)" font-size="9.5">Riak·Cosmos DB · Automerge·Yjs</text>

  <!-- 충돌 유형 -->
  <text x="32" y="608" fill="rgb(212,168,83)" font-size="14" font-weight="700">충돌 유형 — 미묘한 충돌</text>
  <rect x="32" y="620" width="616" height="32" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="48" y="640" fill="#e8e4df" font-size="10.5">명백(같은 필드 다른 값) 외에, 회의실 중복 예약처럼 사전 확인해도 동시 삽입으로 생기는 충돌도 있음</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
