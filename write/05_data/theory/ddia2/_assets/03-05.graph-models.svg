<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 640" font-family="Pretendard, sans-serif">
  <rect width="680" height="640" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">그래프 데이터 모델</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">다대다가 복잡할 때 — 정점(vertex) + 간선(edge)으로 모델링</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 그래프 예시 -->
  <text x="32" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">속성 그래프 — Lucy 예시</text>
  <circle cx="90" cy="160" r="26" fill="#1a1410" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="90" y="164" fill="#e8e4df" font-size="11" text-anchor="middle">Lucy</text>
  <circle cx="230" cy="160" r="26" fill="#101620" stroke="#7fa8c9" stroke-width="1.5"/>
  <text x="230" y="164" fill="#e8e4df" font-size="10" text-anchor="middle">Idaho</text>
  <circle cx="370" cy="160" r="26" fill="#101620" stroke="#7fa8c9" stroke-width="1.5"/>
  <text x="370" y="158" fill="#e8e4df" font-size="9" text-anchor="middle">United</text>
  <text x="370" y="169" fill="#e8e4df" font-size="9" text-anchor="middle">States</text>
  <line x1="116" y1="160" x2="202" y2="160" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="159" y="152" fill="rgb(212,168,83)" font-size="9" text-anchor="middle">BORN_IN</text>
  <line x1="256" y1="160" x2="342" y2="160" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="299" y="152" fill="rgb(212,168,83)" font-size="9" text-anchor="middle">WITHIN</text>

  <rect x="430" y="130" width="218" height="62" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="446" y="150" fill="#e8e4df" font-size="10.5">정점: id·label·속성·입출 간선</text>
  <text x="446" y="168" fill="#e8e4df" font-size="10.5">간선: id·꼬리·머리·label·속성</text>
  <text x="446" y="186" fill="#66bb6a" font-size="10">아무 정점이나 연결 — 스키마 제약 없음</text>

  <!-- 두 모델 -->
  <text x="32" y="224" fill="rgb(212,168,83)" font-size="14" font-weight="700">두 모델 (거의 동등)</text>
  <rect x="32" y="236" width="300" height="74" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="48" y="258" fill="rgb(212,168,83)" font-size="12" font-weight="700">속성 그래프(property graph)</text>
  <text x="48" y="278" fill="#e8e4df" font-size="10.5">Neo4j·Memgraph·KùzuDB</text>
  <text x="48" y="296" fill="rgb(138,133,128)" font-size="10">정점·간선 양쪽에 key-value 속성</text>

  <rect x="348" y="236" width="300" height="74" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="364" y="258" fill="#7fa8c9" font-size="12" font-weight="700">트리플 스토어(triple store)</text>
  <text x="364" y="278" fill="#e8e4df" font-size="10.5">(주어, 술어, 목적어) · Datomic·RDF</text>
  <text x="364" y="296" fill="rgb(138,133,128)" font-size="10">(lucy, bornIn, idaho) — 같은 발상</text>

  <!-- 쿼리 언어 비교 -->
  <text x="32" y="338" fill="rgb(212,168,83)" font-size="14" font-weight="700">쿼리 언어 — "미국 출생 → 유럽 거주" 찾기</text>
  <rect x="32" y="350" width="200" height="78" rx="6" fill="#141414" stroke="#66bb6a"/>
  <text x="48" y="370" fill="#66bb6a" font-size="12" font-weight="700">Cypher (4줄)</text>
  <text x="48" y="390" fill="#e8e4df" font-size="10">MATCH (p)-[:BORN_IN]-&gt;()</text>
  <text x="48" y="406" fill="#e8e4df" font-size="10">  -[:WITHIN*0..]-&gt;(US)</text>
  <text x="48" y="422" fill="rgb(138,133,128)" font-size="9.5">*0.. = WITHIN 0회 이상(정규식 *처럼)</text>

  <rect x="240" y="350" width="200" height="78" rx="6" fill="#141414" stroke="#9cc3df"/>
  <text x="256" y="370" fill="#9cc3df" font-size="12" font-weight="700">SPARQL</text>
  <text x="256" y="390" fill="#e8e4df" font-size="10">?p :bornIn /:within* /</text>
  <text x="256" y="406" fill="#e8e4df" font-size="10">   :name "United States".</text>
  <text x="256" y="422" fill="rgb(138,133,128)" font-size="9.5">Cypher가 SPARQL 패턴 차용</text>

  <rect x="448" y="350" width="200" height="78" rx="6" fill="#141414" stroke="#7fa8c9"/>
  <text x="464" y="370" fill="#7fa8c9" font-size="12" font-weight="700">SQL 재귀 CTE (31줄)</text>
  <text x="464" y="390" fill="#e8e4df" font-size="10">WITH RECURSIVE in_usa AS</text>
  <text x="464" y="406" fill="#e8e4df" font-size="10">  (... UNION ...)</text>
  <text x="464" y="422" fill="#f47f72" font-size="9.5">간선마다 edges 조인 — 매우 장황</text>

  <!-- Datalog / GraphQL -->
  <rect x="32" y="442" width="300" height="74" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="48" y="464" fill="rgb(212,168,83)" font-size="12" font-weight="700">Datalog (규칙 단위)</text>
  <text x="48" y="484" fill="#e8e4df" font-size="10.5">파생 규칙을 쌓음 · 규칙이 자기 호출(재귀)</text>
  <text x="48" y="502" fill="rgb(138,133,128)" font-size="10">Prolog 부분집합 · 복잡 쿼리에 강력</text>

  <rect x="348" y="442" width="300" height="74" rx="6" fill="#141414" stroke="#f47f72"/>
  <text x="364" y="464" fill="#f47f72" font-size="12" font-weight="700">GraphQL (의도적 제한)</text>
  <text x="364" y="484" fill="#e8e4df" font-size="10.5">OLTP·UI용 · 클라가 JSON 구조 요청</text>
  <text x="364" y="502" fill="rgb(138,133,128)" font-size="10">재귀·임의 검색 불가(DoS 방지) · 어느 DB든 구현</text>

  <line x1="32" y1="536" x2="648" y2="536" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="32" y="558" fill="rgb(138,133,128)" font-size="12">4줄 Cypher = 31줄 SQL → 모델·쿼리 언어 선택이 큰 차이를 만듦</text>
  <text x="32" y="578" fill="rgb(138,133,128)" font-size="12">그래프는 진화에 좋음 — 새 정점·간선 유형을 쉽게 추가(식품 알레르기 등)</text>
  <text x="32" y="598" fill="rgb(138,133,128)" font-size="12">GQL ISO 표준(2024, Cypher 기반) — 그래프 DB 통일 기대</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
