<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 600" font-family="Pretendard, sans-serif">
  <rect width="680" height="600" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">확장성 — 세 가지 아키텍처</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">부하 증가에 대처 · "X는 확장된다"는 말은 무의미, 차원으로 본다</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- shared-memory -->
  <text x="32" y="112" fill="rgb(212,168,83)" font-size="13" font-weight="700">shared-memory (수직 확장)</text>
  <rect x="32" y="124" width="190" height="160" rx="6" fill="#141414" stroke="rgb(212,168,83)"/>
  <rect x="52" y="148" width="150" height="116" rx="5" fill="#1a1410" stroke="rgb(212,168,83)" stroke-dasharray="3 2"/>
  <text x="127" y="168" fill="#e8e4df" font-size="11" text-anchor="middle">한 머신(scale up)</text>
  <rect x="66" y="178" width="56" height="30" rx="3" fill="#0d0d0d" stroke="#7fa8c9"/>
  <text x="94" y="198" fill="#e8e4df" font-size="10" text-anchor="middle">CPU·CPU</text>
  <rect x="132" y="178" width="56" height="30" rx="3" fill="#0d0d0d" stroke="#7fa8c9"/>
  <text x="160" y="198" fill="#e8e4df" font-size="10" text-anchor="middle">RAM 공유</text>
  <rect x="66" y="216" width="122" height="30" rx="3" fill="#0d0d0d" stroke="#9cc3df"/>
  <text x="127" y="236" fill="#e8e4df" font-size="10" text-anchor="middle">디스크</text>
  <text x="127" y="277" fill="#f47f72" font-size="10" text-anchor="middle">비용 &gt; 선형, 병목</text>

  <!-- shared-disk -->
  <text x="245" y="112" fill="rgb(212,168,83)" font-size="13" font-weight="700">shared-disk</text>
  <rect x="245" y="124" width="190" height="160" rx="6" fill="#141414" stroke="#9cc3df"/>
  <rect x="260" y="148" width="48" height="30" rx="3" fill="#0d0d0d" stroke="#7fa8c9"/>
  <text x="284" y="167" fill="#e8e4df" font-size="9.5" text-anchor="middle">노드1</text>
  <rect x="316" y="148" width="48" height="30" rx="3" fill="#0d0d0d" stroke="#7fa8c9"/>
  <text x="340" y="167" fill="#e8e4df" font-size="9.5" text-anchor="middle">노드2</text>
  <rect x="372" y="148" width="48" height="30" rx="3" fill="#0d0d0d" stroke="#7fa8c9"/>
  <text x="396" y="167" fill="#e8e4df" font-size="9.5" text-anchor="middle">노드3</text>
  <rect x="280" y="222" width="120" height="34" rx="4" fill="#101620" stroke="#9cc3df"/>
  <text x="340" y="243" fill="#e8e4df" font-size="10" text-anchor="middle">공유 디스크(NAS/SAN)</text>
  <line x1="284" y1="178" x2="330" y2="220" stroke="rgb(138,133,128)" stroke-width="1"/>
  <line x1="340" y1="178" x2="340" y2="220" stroke="rgb(138,133,128)" stroke-width="1"/>
  <line x1="396" y1="178" x2="350" y2="220" stroke="rgb(138,133,128)" stroke-width="1"/>
  <text x="340" y="277" fill="#f47f72" font-size="10" text-anchor="middle">경합·락 오버헤드로 한계</text>

  <!-- shared-nothing -->
  <text x="458" y="112" fill="#66bb6a" font-size="13" font-weight="700">shared-nothing (수평)</text>
  <rect x="458" y="124" width="190" height="160" rx="6" fill="#141414" stroke="#66bb6a"/>
  <rect x="474" y="150" width="50" height="60" rx="4" fill="#0d0d0d" stroke="#66bb6a"/>
  <text x="499" y="172" fill="#e8e4df" font-size="9.5" text-anchor="middle">CPU</text>
  <text x="499" y="186" fill="#e8e4df" font-size="9.5" text-anchor="middle">RAM</text>
  <text x="499" y="200" fill="#e8e4df" font-size="9.5" text-anchor="middle">디스크</text>
  <rect x="540" y="150" width="50" height="60" rx="4" fill="#0d0d0d" stroke="#66bb6a"/>
  <text x="565" y="172" fill="#e8e4df" font-size="9.5" text-anchor="middle">CPU</text>
  <text x="565" y="186" fill="#e8e4df" font-size="9.5" text-anchor="middle">RAM</text>
  <text x="565" y="200" fill="#e8e4df" font-size="9.5" text-anchor="middle">디스크</text>
  <rect x="606" y="150" width="32" height="60" rx="4" fill="#0d0d0d" stroke="#66bb6a"/>
  <text x="622" y="183" fill="#e8e4df" font-size="9.5" text-anchor="middle">⋯</text>
  <text x="553" y="232" fill="rgb(138,133,128)" font-size="9.5" text-anchor="middle">조율은 네트워크·SW로</text>
  <text x="553" y="250" fill="#66bb6a" font-size="9.5" text-anchor="middle">선형 확장·다중 DC 내결함</text>
  <text x="553" y="268" fill="#f47f72" font-size="9.5" text-anchor="middle">샤딩·분산 복잡성 필요</text>

  <!-- 부하·선형 확장성 -->
  <text x="32" y="316" fill="rgb(212,168,83)" font-size="14" font-weight="700">부하 이해 + 선형 확장성</text>
  <rect x="32" y="328" width="300" height="120" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="48" y="350" fill="#e8e4df" font-size="11">먼저 현재 부하를 명확히 (처리량 등)</text>
  <text x="48" y="370" fill="#e8e4df" font-size="11">읽기/쓰기 비율 · 캐시 적중률 · 사용자당 항목</text>
  <text x="48" y="392" fill="#e8e4df" font-size="11">부하 2배 → 자원 2배로 성능 유지 시</text>
  <text x="48" y="410" fill="#66bb6a" font-size="11.5" font-weight="700">= 선형 확장성 (좋음)</text>
  <text x="48" y="432" fill="rgb(138,133,128)" font-size="10.5">대개 비용은 선형보다 빠르게 증가</text>

  <!-- 원칙 -->
  <text x="348" y="316" fill="rgb(212,168,83)" font-size="14" font-weight="700">확장성 원칙</text>
  <rect x="348" y="328" width="300" height="120" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="364" y="350" fill="#e8e4df" font-size="11">· 만능 확장 소스 없음(magic sauce 없음)</text>
  <text x="364" y="370" fill="#e8e4df" font-size="11">· 부하 10배마다 아키텍처 재고</text>
  <text x="364" y="390" fill="#e8e4df" font-size="11">· 독립적으로 동작하는 작은 부분으로 분해</text>
  <text x="364" y="410" fill="#e8e4df" font-size="11">· 필요 이상 복잡하게 만들지 않기</text>
  <text x="364" y="430" fill="rgb(138,133,128)" font-size="10.5">5개 서비스가 50개보다 단순 · 실용적 혼합</text>

  <line x1="32" y1="466" x2="648" y2="466" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="32" y="490" fill="rgb(138,133,128)" font-size="12">스타트업 초기엔 단순·유연이 우선 — 가상의 미래 규모 걱정은 조숙한 최적화</text>
  <text x="32" y="514" fill="rgb(138,133,128)" font-size="12">초당 10만 요청×1kB 시스템 ≠ 분당 3요청×2GB 시스템 (같은 100MB/s여도 설계 판이함)</text>
  <text x="32" y="538" fill="rgb(138,133,128)" font-size="12">cloud native: 저장/연산 분리 — 다수 연산 노드가 전용 API 저장 서비스 공유(shared-disk 유사·한계 회피)</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
