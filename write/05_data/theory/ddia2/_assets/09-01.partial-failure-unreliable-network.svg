<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 640" font-family="Pretendard, sans-serif">
  <rect width="680" height="640" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">부분 실패와 비신뢰 네트워크</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">부분 실패 · 비동기 패킷망 · 타임아웃 한계 · 큐잉 지연</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 단일 컴퓨터 vs 분산 시스템 -->
  <text x="32" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">단일 컴퓨터 vs 분산 시스템</text>
  <rect x="32" y="124" width="296" height="72" rx="6" fill="#141414" stroke="#66bb6a"/>
  <text x="48" y="144" fill="#66bb6a" font-size="11" font-weight="700">단일 컴퓨터 — 결정론적 장애</text>
  <text x="48" y="162" fill="#e8e4df" font-size="10.5">결함 발생 → 전체 중단 (커널 패닉)</text>
  <text x="48" y="178" fill="#e8e4df" font-size="10.5">부분 실패 없음 · 잘못된 결과보다 멈춤 선호</text>

  <rect x="352" y="124" width="296" height="72" rx="6" fill="#141414" stroke="#f47f72"/>
  <text x="368" y="144" fill="#f47f72" font-size="11" font-weight="700">분산 시스템 — 비결정론적 부분 실패</text>
  <text x="368" y="162" fill="#e8e4df" font-size="10.5">일부 노드 정상 + 일부 노드 고장 공존</text>
  <text x="368" y="178" fill="#e8e4df" font-size="10.5">요청 성공 여부조차 알 수 없음</text>

  <!-- 6가지 장애 시나리오 -->
  <text x="32" y="224" fill="rgb(212,168,83)" font-size="14" font-weight="700">요청/응답에서 발생 가능한 6가지 장애</text>
  <rect x="32" y="236" width="616" height="132" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>

  <rect x="48" y="252" width="180" height="24" rx="3" fill="#141414" stroke="#f47f72"/>
  <text x="138" y="268" fill="#f47f72" font-size="9.5" text-anchor="middle">① 요청 패킷 유실</text>
  <rect x="244" y="252" width="180" height="24" rx="3" fill="#141414" stroke="#7fa8c9"/>
  <text x="334" y="268" fill="#7fa8c9" font-size="9.5" text-anchor="middle">② 요청 큐 대기 중</text>
  <rect x="440" y="252" width="180" height="24" rx="3" fill="#141414" stroke="#f47f72"/>
  <text x="530" y="268" fill="#f47f72" font-size="9.5" text-anchor="middle">③ 원격 노드 크래시</text>

  <rect x="48" y="288" width="180" height="24" rx="3" fill="#141414" stroke="#7fa8c9"/>
  <text x="138" y="304" fill="#7fa8c9" font-size="9.5" text-anchor="middle">④ 노드 일시 중단(GC 등)</text>
  <rect x="244" y="288" width="180" height="24" rx="3" fill="#141414" stroke="#f47f72"/>
  <text x="334" y="304" fill="#f47f72" font-size="9.5" text-anchor="middle">⑤ 응답 패킷 유실</text>
  <rect x="440" y="288" width="180" height="24" rx="3" fill="#141414" stroke="#7fa8c9"/>
  <text x="530" y="304" fill="#7fa8c9" font-size="9.5" text-anchor="middle">⑥ 응답 지연 도달</text>

  <text x="48" y="342" fill="#e8e4df" font-size="10.5">송신자는 이 6가지를 구분할 수 없습니다 — 응답이 없다는 사실만 알 수 있습니다</text>
  <text x="48" y="358" fill="rgb(138,133,128)" font-size="9.5">TCP ACK = OS 커널이 수신했다는 의미 · 애플리케이션 처리 완료와 다릅니다</text>

  <!-- 타임아웃 트레이드오프 -->
  <text x="32" y="400" fill="rgb(212,168,83)" font-size="14" font-weight="700">타임아웃 — 유일한 장애 탐지 수단이지만 완벽하지 않음</text>
  <rect x="32" y="412" width="296" height="76" rx="6" fill="#141414" stroke="#66bb6a"/>
  <text x="48" y="432" fill="#66bb6a" font-size="11" font-weight="700">긴 타임아웃</text>
  <text x="48" y="450" fill="#e8e4df" font-size="10">탐지 지연 · 사용자 대기 증가</text>
  <text x="48" y="466" fill="#66bb6a" font-size="10">오탐 적음 · 연쇄 장애 위험 낮음</text>

  <rect x="352" y="412" width="296" height="76" rx="6" fill="#141414" stroke="#f47f72"/>
  <text x="368" y="432" fill="#f47f72" font-size="11" font-weight="700">짧은 타임아웃</text>
  <text x="368" y="450" fill="#e8e4df" font-size="10">빠른 탐지 · 빠른 페일오버</text>
  <text x="368" y="466" fill="#f47f72" font-size="10">일시 부하를 죽음으로 오탐 → 연쇄 장애</text>

  <rect x="32" y="500" width="616" height="32" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="48" y="520" fill="#7fa8c9" font-size="10.5">Phi Accrual 탐지기: 관측된 응답 시간 분포에 따라 타임아웃을 동적 조정 — 고정 타임아웃보다 효과적</text>

  <!-- 큐잉 지연 -->
  <text x="32" y="562" fill="rgb(212,168,83)" font-size="13" font-weight="700">네트워크 지연 변동성의 원인 — 큐잉</text>
  <rect x="32" y="574" width="616" height="52" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="48" y="594" fill="#e8e4df" font-size="10">스위치 큐 → OS 수신 큐 → VM 스케줄링 정지 → TCP 혼잡제어 큐 — 4단계 큐가 중첩됩니다</text>
  <text x="48" y="612" fill="rgb(138,133,128)" font-size="9.5">지연 변동성은 자연 법칙이 아닌 비용/편익 트레이드오프 결과 · 정적 대역폭 할당 시 보장 가능하지만 활용률 저하</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
