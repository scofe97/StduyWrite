<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 640" font-family="Pretendard, sans-serif">
  <rect width="680" height="640" fill="#0d0d0d"/>

  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">LSM 저장 엔진</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">메모리 정렬맵 → 불변 SSTable → 백그라운드 병합·압축</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 쓰기 경로 -->
  <text x="32" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">쓰기 경로</text>
  <rect x="32" y="124" width="150" height="56" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="107" y="146" fill="#e8e4df" font-size="11.5" text-anchor="middle" font-weight="700">memtable</text>
  <text x="107" y="164" fill="rgb(138,133,128)" font-size="9.5" text-anchor="middle">인메모리 정렬맵(트리)</text>
  <line x1="182" y1="152" x2="226" y2="152" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="204" y="144" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">임계 초과</text>
  <rect x="230" y="124" width="170" height="56" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="315" y="146" fill="#e8e4df" font-size="11.5" text-anchor="middle" font-weight="700">SSTable 세그먼트</text>
  <text x="315" y="164" fill="rgb(138,133,128)" font-size="9.5" text-anchor="middle">키 정렬·불변·sparse 인덱스</text>
  <rect x="430" y="124" width="218" height="56" rx="6" fill="#141414" stroke="#f47f72"/>
  <text x="446" y="146" fill="#e8e4df" font-size="11">WAL(별도 로그)에 즉시 추가</text>
  <text x="446" y="164" fill="rgb(138,133,128)" font-size="9.5">크래시 시 memtable 복원용</text>

  <!-- SSTable 구조 -->
  <text x="32" y="210" fill="rgb(212,168,83)" font-size="14" font-weight="700">SSTable + sparse 인덱스</text>
  <rect x="32" y="222" width="380" height="70" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="48" y="244" fill="#e8e4df" font-size="11" font-family="monospace">[handbag ...][handiwork...][handsome ...]</text>
  <text x="48" y="266" fill="rgb(138,133,128)" font-size="10.5">sparse 인덱스: 블록 첫 키만(handbag, handsome)</text>
  <text x="48" y="284" fill="#66bb6a" font-size="10.5">handiwork 검색 → 정렬 덕에 두 키 사이 블록만 스캔 + 블록 압축</text>

  <rect x="430" y="222" width="218" height="70" rx="6" fill="#101620" stroke="#7fa8c9"/>
  <text x="446" y="244" fill="#7fa8c9" font-size="11.5" font-weight="700">Bloom 필터</text>
  <text x="446" y="264" fill="#e8e4df" font-size="10.5">키 부재 여부 빠른 근사 판정</text>
  <text x="446" y="282" fill="rgb(138,133,128)" font-size="9.5">0 있으면 확실히 없음 · 거짓양성 OK · 10비트/키→1%</text>

  <!-- compaction -->
  <text x="32" y="322" fill="rgb(212,168,83)" font-size="14" font-weight="700">병합·압축(compaction) — mergesort처럼</text>
  <rect x="32" y="334" width="180" height="40" rx="5" fill="#141414" stroke="rgb(212,168,83)"/>
  <text x="122" y="358" fill="#e8e4df" font-size="11" text-anchor="middle">세그먼트 여럿(키 정렬)</text>
  <line x1="212" y1="354" x2="256" y2="354" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="260" y="334" width="200" height="40" rx="5" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="360" y="358" fill="#e8e4df" font-size="11" text-anchor="middle">병합 세그먼트(최신값만)</text>
  <text x="476" y="350" fill="rgb(138,133,128)" font-size="10">tombstone = 삭제 마커</text>
  <text x="476" y="366" fill="rgb(138,133,128)" font-size="10">병합 시 옛 값 폐기</text>

  <!-- 읽기 경로 -->
  <text x="32" y="404" fill="rgb(212,168,83)" font-size="14" font-weight="700">읽기: memtable → 최신 세그먼트 → 오래된 순</text>
  <rect x="32" y="416" width="616" height="36" rx="5" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="48" y="439" fill="#e8e4df" font-size="11">Bloom으로 없는 SSTable 건너뜀 · 모든 세그먼트에 없으면 DB에 없음 · 오래된 키일수록 느림</text>

  <!-- compaction 전략 -->
  <text x="32" y="480" fill="rgb(212,168,83)" font-size="14" font-weight="700">compaction 전략 두 가지</text>
  <rect x="32" y="492" width="300" height="86" rx="6" fill="#141414" stroke="#66bb6a"/>
  <text x="48" y="514" fill="#66bb6a" font-size="12" font-weight="700">size-tiered</text>
  <text x="48" y="534" fill="#e8e4df" font-size="10.5">작은 SSTable을 큰 것으로 누적 병합</text>
  <text x="48" y="552" fill="#e8e4df" font-size="10.5">높은 쓰기 처리량에 유리</text>
  <text x="48" y="570" fill="rgb(138,133,128)" font-size="10">임시 디스크 많이 씀</text>

  <rect x="348" y="492" width="300" height="86" rx="6" fill="#141414" stroke="#7fa8c9"/>
  <text x="364" y="514" fill="#7fa8c9" font-size="12" font-weight="700">leveled</text>
  <text x="364" y="534" fill="#e8e4df" font-size="10.5">고정 크기 SSTable을 레벨(L0·L1...)로</text>
  <text x="364" y="552" fill="#e8e4df" font-size="10.5">읽기에 유리 · 디스크 적게 씀</text>
  <text x="364" y="570" fill="rgb(138,133,128)" font-size="10">읽기 많으면 leveled, 쓰기 많으면 size-tiered</text>

  <line x1="32" y1="596" x2="648" y2="596" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="32" y="618" fill="rgb(138,133,128)" font-size="11.5">LSM-tree(1996) — RocksDB·Cassandra·HBase·ScyllaDB가 Bigtable에서 영감. 불변 파일 = 크래시 복구·스냅샷 쉬움</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7" fill="none" stroke="rgb(138,133,128)" stroke-width="1.2"/>
    </marker>
  </defs>
</svg>
