<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 600" font-family="Pretendard, sans-serif">
  <rect width="680" height="600" fill="#0d0d0d"/>

  <!-- title -->
  <text x="32" y="46" fill="#e8e4df" font-size="22" font-weight="700">Designing Data-Intensive Applications, 2판</text>
  <text x="32" y="72" fill="rgb(138,133,128)" font-size="13">Kleppmann &amp; Riccomini · O'Reilly · 1판 2017 → 2판 전면 개정</text>
  <line x1="32" y1="88" x2="648" y2="88" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 핵심 철학 -->
  <text x="32" y="120" fill="rgb(212,168,83)" font-size="15" font-weight="700">핵심 철학 — 제품이 아니라 원리</text>
  <rect x="32" y="132" width="616" height="86" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="48" y="158" fill="#e8e4df" font-size="13">"어떤 DB를 써야 하나?" → 짧은 답: It depends. 긴 답: 이 책.</text>
  <text x="48" y="182" fill="rgb(138,133,128)" font-size="12.5">· 특정 도구 튜토리얼이 아니라 데이터 시스템 전체 지형을 비교</text>
  <text x="48" y="202" fill="rgb(138,133,128)" font-size="12.5">· 기술은 빠르게 변해도 그 밑의 원리는 오래간다 — 학문 정밀성 + 산업 실용성</text>

  <!-- 대상 독자 -->
  <text x="32" y="252" fill="rgb(212,168,83)" font-size="15" font-weight="700">누가 읽는가</text>
  <rect x="32" y="264" width="300" height="118" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="48" y="288" fill="#e8e4df" font-size="12.5">· 백엔드 엔지니어 · 아키텍트</text>
  <text x="48" y="310" fill="#e8e4df" font-size="12.5">· 데이터 · 클라우드 엔지니어</text>
  <text x="48" y="332" fill="#e8e4df" font-size="12.5">· 시스템 디자인 면접 준비</text>
  <text x="48" y="354" fill="#e8e4df" font-size="12.5">· 버즈워드 너머 정확한 이해</text>
  <text x="48" y="374" fill="rgb(138,133,128)" font-size="11">전제: 웹앱 + 관계형 DB·SQL + TCP/HTTP</text>

  <!-- 2판 신규 -->
  <text x="348" y="252" fill="rgb(212,168,83)" font-size="15" font-weight="700">2판에서 바뀐 것</text>
  <rect x="348" y="264" width="300" height="118" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="364" y="288" fill="#7fa8c9" font-size="12.5">+ AI/ML: 벡터 인덱스 · DataFrame</text>
  <text x="364" y="310" fill="#7fa8c9" font-size="12.5">+ 클라우드 네이티브: 오브젝트 스토어</text>
  <text x="364" y="332" fill="#7fa8c9" font-size="12.5">+ sync engine · durable execution</text>
  <text x="364" y="354" fill="#7fa8c9" font-size="12.5">+ GraphQL · 형식 검증 · GDPR</text>
  <text x="364" y="374" fill="#f47f72" font-size="11">− MapReduce 폐기 → 배치 장 재작성</text>

  <!-- 구조 변화 띠 -->
  <text x="32" y="418" fill="rgb(212,168,83)" font-size="15" font-weight="700">규모</text>
  <rect x="32" y="430" width="198" height="64" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="131" y="458" fill="#e8e4df" font-size="20" font-weight="700" text-anchor="middle">~60쪽</text>
  <text x="131" y="480" fill="rgb(138,133,128)" font-size="11.5" text-anchor="middle">1판보다 증가</text>

  <rect x="242" y="430" width="198" height="64" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="341" y="458" fill="#e8e4df" font-size="20" font-weight="700" text-anchor="middle">10장</text>
  <text x="341" y="480" fill="rgb(138,133,128)" font-size="11.5" text-anchor="middle">일관성·합의 거의 재작성</text>

  <rect x="452" y="430" width="196" height="64" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="550" y="458" fill="#e8e4df" font-size="20" font-weight="700" text-anchor="middle">2인</text>
  <text x="550" y="480" fill="rgb(138,133,128)" font-size="11.5" text-anchor="middle">Riccomini 공저 합류</text>

  <!-- 참조 -->
  <line x1="32" y1="524" x2="648" y2="524" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="32" y="552" fill="rgb(138,133,128)" font-size="12">참조 모음: github.com/ept/ddia2-references — 장말 참조 대부분 온라인 무료</text>
  <text x="32" y="576" fill="rgb(138,133,128)" font-size="12">장말 논문은 제목으로 Google Scholar 검색 → 무료 PDF</text>
</svg>
