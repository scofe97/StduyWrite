<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 600" font-family="Pretendard, sans-serif">
  <rect width="680" height="600" fill="#0d0d0d"/>

  <!-- Title -->
  <text x="340" y="38" text-anchor="middle" fill="#e8e4df" font-size="21" font-weight="700">데이터의 권력·산업혁명의 교훈·책 종합</text>
  <text x="340" y="58" text-anchor="middle" fill="rgb(138,133,128)" font-size="13">독성 자산 · 정보화 시대의 공해 · 데이터 최소화 · DDIA 전체</text>
  <line x1="40" y1="70" x2="640" y2="70" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- Section A: data as asset / power / toxic -->
  <text x="50" y="92" fill="rgb(212,168,83)" font-size="12" font-weight="700">① 데이터 = 자산이자 권력이자 독성 물질</text>

  <rect x="50" y="100" width="185" height="62" rx="5" fill="#1a1410" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="142" y="119" text-anchor="middle" fill="rgb(212,168,83)" font-size="11" font-weight="700">자산 / 노동</text>
  <text x="65" y="137" fill="rgb(138,133,128)" font-size="10">사용자 활동 = 노동</text>
  <text x="65" y="152" fill="rgb(138,133,128)" font-size="10">데이터 브로커가 매매</text>

  <rect x="247" y="100" width="185" height="62" rx="5" fill="#141414" stroke="#7fa8c9" stroke-width="1.2"/>
  <text x="339" y="119" text-anchor="middle" fill="#9cc3df" font-size="11" font-weight="700">권력</text>
  <text x="262" y="137" fill="rgb(138,133,128)" font-size="10">"지식은 권력"</text>
  <text x="262" y="152" fill="rgb(138,133,128)" font-size="10">감시하되 감시 안 당함</text>

  <rect x="444" y="100" width="186" height="62" rx="5" fill="#141414" stroke="#f47f72" stroke-width="1.2"/>
  <text x="537" y="119" text-anchor="middle" fill="#f47f72" font-size="11" font-weight="700">독성 자산 (새 우라늄)</text>
  <text x="459" y="137" fill="rgb(138,133,128)" font-size="10">유출·도난·정부 강제</text>
  <text x="459" y="152" fill="rgb(138,133,128)" font-size="10">모든 미래 정권 고려</text>

  <line x1="40" y1="174" x2="640" y2="174" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- Section B: industrial revolution analogy -->
  <text x="50" y="196" fill="rgb(212,168,83)" font-size="12" font-weight="700">② 산업혁명의 교훈 — 데이터는 정보화 시대의 공해</text>

  <rect x="50" y="206" width="270" height="72" rx="6" fill="#1a1410" stroke="rgb(138,133,128)" stroke-width="1"/>
  <text x="185" y="225" text-anchor="middle" fill="#e8e4df" font-size="11" font-weight="700">산업혁명</text>
  <text x="65" y="243" fill="rgb(138,133,128)" font-size="10">성장 + 오염·아동노동·착취</text>
  <text x="65" y="259" fill="rgb(138,133,128)" font-size="10">환경 규제·안전법으로 길들임</text>
  <text x="65" y="273" fill="#66bb6a" font-size="10">비용 올랐지만 사회 전체 이득</text>

  <rect x="370" y="206" width="270" height="72" rx="6" fill="#141414" stroke="#7fa8c9" stroke-width="1.2"/>
  <text x="505" y="225" text-anchor="middle" fill="#9cc3df" font-size="11" font-weight="700">정보화 시대</text>
  <text x="385" y="243" fill="rgb(138,133,128)" font-size="10">데이터 = 공해, 곪으며 남음</text>
  <text x="385" y="259" fill="rgb(138,133,128)" font-size="10">프라이버시 보호 = 환경 과제</text>
  <text x="385" y="273" fill="#7fa8c9" font-size="10">후손이 우리를 평가할 것</text>

  <text x="340" y="248" text-anchor="middle" fill="rgb(212,168,83)" font-size="12" font-weight="700">≈</text>

  <line x1="40" y1="290" x2="640" y2="290" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- Section C: data minimization -->
  <text x="50" y="312" fill="rgb(212,168,83)" font-size="12" font-weight="700">③ 데이터 최소화 vs 빅데이터 철학</text>

  <rect x="50" y="322" width="270" height="66" rx="6" fill="#141414" stroke="#f47f72" stroke-width="1"/>
  <text x="185" y="341" text-anchor="middle" fill="#f47f72" font-size="11" font-weight="700">빅데이터 철학</text>
  <text x="65" y="359" fill="rgb(138,133,128)" font-size="10">수집 최대화·데이터 결합</text>
  <text x="65" y="375" fill="rgb(138,133,128)" font-size="10">예견 못 한 목적의 탐색</text>

  <rect x="370" y="322" width="270" height="66" rx="6" fill="#1a1410" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="505" y="341" text-anchor="middle" fill="#66bb6a" font-size="11" font-weight="700">데이터 최소화 (GDPR)</text>
  <text x="385" y="359" fill="rgb(138,133,128)" font-size="10">구체적·명시적 목적·필요 최소</text>
  <text x="385" y="375" fill="#66bb6a" font-size="10">없는 데이터는 유출·강제 불가</text>

  <text x="340" y="360" text-anchor="middle" fill="rgb(212,168,83)" font-size="12" font-weight="700">vs</text>

  <line x1="40" y1="400" x2="640" y2="400" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- Section D: book summary arc -->
  <text x="50" y="422" fill="rgb(212,168,83)" font-size="12" font-weight="700">④ DDIA 전체 종합 — 14장에서 1장까지</text>

  <rect x="50" y="432" width="590" height="110" rx="6" fill="#141414" stroke="rgb(138,133,128)" stroke-width="1"/>
  <text x="65" y="452" fill="rgb(138,133,128)" font-size="10">1~2장: 트레이드오프·비기능 요구 (성능·신뢰성·확장성·유지보수성)</text>
  <text x="65" y="470" fill="rgb(138,133,128)" font-size="10">3~5장: 데이터 모델·저장 엔진·인코딩과 진화</text>
  <text x="65" y="488" fill="rgb(138,133,128)" font-size="10">6~10장: 복제·샤딩·트랜잭션·분산 시스템의 문제·일관성과 합의</text>
  <text x="65" y="506" fill="rgb(138,133,128)" font-size="10">11~13장: 배치·스트림 처리·스트리밍 시스템의 철학</text>
  <text x="65" y="526" fill="#d4a853" font-size="10">14장: 옳은 일 하기 — 차별·착취·감시·프라이버시의 윤리적 책임</text>
  <text x="65" y="539" fill="#66bb6a" font-size="9.5">목표: 사람을 인간으로서 존중하는 세상을 향해 일할 책임</text>

  <!-- Footer -->
  <line x1="40" y1="556" x2="640" y2="556" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="340" y="576" text-anchor="middle" fill="rgb(138,133,128)" font-size="11">신뢰성·확장성·유지보수성 → 마지막에 사람에 대한 책임으로 회귀</text>
  <text x="340" y="594" text-anchor="middle" fill="rgb(138,133,128)" font-size="10">DDIA 2nd Ed. Ch.14 — Data as Power · Industrial Revolution · Book Summary · 14-03</text>
</svg>
