<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 640" font-family="Pretendard, sans-serif">
  <rect width="680" height="640" fill="#0d0d0d"/>
  <text x="32" y="44" fill="#e8e4df" font-size="21" font-weight="700">분산 파일시스템과 오브젝트 스토어</text>
  <text x="32" y="68" fill="rgb(138,133,128)" font-size="13">DFS 구조 · 블록 복제 · S3 특성 · DFS vs 오브젝트 스토어</text>
  <line x1="32" y1="84" x2="648" y2="84" stroke="rgb(42,37,32)" stroke-width="1"/>

  <text x="32" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700">분산 파일시스템 계층</text>
  <rect x="32" y="124" width="296" height="132" rx="6" fill="#141414" stroke="#7fa8c9"/>
  <rect x="48" y="136" width="264" height="22" rx="3" fill="#1a1410" stroke="rgb(42,37,32)"/>
  <text x="180" y="151" fill="#e8e4df" font-size="10" text-anchor="middle">VFS / DFS 프로토콜 (S3 API 표준)</text>
  <rect x="48" y="164" width="264" height="22" rx="3" fill="#1a1410" stroke="rgb(42,37,32)"/>
  <text x="180" y="179" fill="#e8e4df" font-size="10" text-anchor="middle">파일시스템 (메타데이터: NameNode / FoundationDB)</text>
  <rect x="48" y="192" width="264" height="22" rx="3" fill="#1a1410" stroke="rgb(42,37,32)"/>
  <text x="180" y="207" fill="#e8e4df" font-size="10" text-anchor="middle">페이지 캐시 (DataNode OS + 클라이언트 캐시)</text>
  <rect x="48" y="220" width="264" height="22" rx="3" fill="#1a1410" stroke="rgb(42,37,32)"/>
  <text x="180" y="235" fill="#e8e4df" font-size="10" text-anchor="middle">블록 레이어 (HDFS=128MB / JuiceFS=4MB)</text>

  <rect x="352" y="124" width="296" height="132" rx="6" fill="#141414" stroke="rgb(212,168,83)"/>
  <text x="500" y="146" fill="rgb(212,168,83)" font-size="11" font-weight="700" text-anchor="middle">블록 크기 비교</text>
  <text x="368" y="168" fill="#e8e4df" font-size="10.5">ext4 로컬 파일시스템: 4 KB</text>
  <text x="368" y="186" fill="#e8e4df" font-size="10.5">JuiceFS / S3: 4 MB</text>
  <text x="368" y="204" fill="#e8e4df" font-size="10.5">HDFS: 128 MB</text>
  <text x="368" y="230" fill="rgb(138,133,128)" font-size="10">클수록: 메타데이터 감소 · 탐색 오버헤드 비례 감소</text>
  <text x="368" y="246" fill="rgb(138,133,128)" font-size="10">DFS는 partial write 낭비 없음 (OS 위에서 구현)</text>

  <text x="32" y="284" fill="rgb(212,168,83)" font-size="14" font-weight="700">복제 vs 이레이저 코딩</text>
  <rect x="32" y="296" width="296" height="72" rx="6" fill="#141414" stroke="#66bb6a"/>
  <text x="180" y="316" fill="#66bb6a" font-size="11" font-weight="700" text-anchor="middle">단순 복제</text>
  <text x="48" y="336" fill="#e8e4df" font-size="10.5">n 복사본 유지. 로컬리티 스케줄링 가능.</text>
  <text x="48" y="354" fill="rgb(138,133,128)" font-size="10">저장 오버헤드 n배. 읽기 속도 유리.</text>

  <rect x="352" y="296" width="296" height="72" rx="6" fill="#141414" stroke="#7fa8c9"/>
  <text x="500" y="316" fill="#7fa8c9" font-size="11" font-weight="700" text-anchor="middle">이레이저 코딩 (Reed-Solomon)</text>
  <text x="368" y="336" fill="#e8e4df" font-size="10.5">복구 코드 추가. 저장 효율적.</text>
  <text x="368" y="354" fill="rgb(138,133,128)" font-size="10">복구 시 계산 비용. 로컬리티 불가.</text>

  <text x="32" y="400" fill="rgb(212,168,83)" font-size="14" font-weight="700">오브젝트 스토어 특성 (S3)</text>
  <rect x="32" y="412" width="616" height="80" rx="6" fill="#1a1410" stroke="rgb(212,168,83)"/>
  <text x="48" y="432" fill="#e8e4df" font-size="10.5">URL 구조: s3://bucket/path/key — 디렉토리 개념 없음, 슬래시는 키의 일부입니다.</text>
  <text x="48" y="450" fill="#e8e4df" font-size="10.5">불변 객체: 수정 시 전체 put 재작성. 원자적 rename 불가(복사+삭제).</text>
  <text x="48" y="468" fill="#e8e4df" font-size="10.5">빈 디렉토리 불가: 관례적으로 0바이트 객체 생성. prefix list = 재귀 ls -R 동작.</text>
  <text x="48" y="484" fill="rgb(138,133,128)" font-size="10">S3 Express One Zone: ms 단위 지연, KV 스토어 유사 가격 모델로 소규모 쓰기 지원.</text>

  <text x="32" y="524" fill="rgb(212,168,83)" font-size="14" font-weight="700">DFS vs 오브젝트 스토어</text>
  <rect x="32" y="536" width="616" height="80" rx="6" fill="#141414" stroke="rgb(42,37,32)"/>
  <text x="48" y="556" fill="#7fa8c9" font-size="10" font-weight="700">DFS (HDFS)</text>
  <text x="160" y="556" fill="#e8e4df" font-size="10">원자 rename · POSIX 가능 · co-location 스케줄링 가능 · 복잡한 운영</text>
  <line x1="32" y1="566" x2="648" y2="566" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="48" y="584" fill="rgb(212,168,83)" font-size="10" font-weight="700">오브젝트 스토어 (S3)</text>
  <text x="184" y="584" fill="#e8e4df" font-size="10">rename 비원자 · 저장-연산 분리 · 독립 스케일 · S3 API 호환 생태계</text>
  <line x1="32" y1="596" x2="648" y2="596" stroke="rgb(42,37,32)" stroke-width="1"/>
  <text x="48" y="612" fill="rgb(138,133,128)" font-size="10">현대 데이터센터 네트워크 속도로 저장-연산 분리가 현실적. MinIO/Ceph는 양쪽 API 제공.</text>
</svg>
