<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 420" width="100%" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Java 객체와 관계형 테이블 매핑</title>
  <desc>영속 엔티티로 표시한 Java 클래스는 Spring Data JDBC가 관계형 테이블로 자동 매핑한다. 클래스·필드명은 소문자로, 카멜 케이스는 밑줄로 이어진다. Book 레코드는 book 테이블이 된다.</desc>
  <rect width="840" height="420" fill="#0d0d0d"/>
  <text x="30" y="38" fill="#e8e4df" font-size="17" font-weight="700">Java 객체와 관계형 테이블 매핑</text>
  <text x="30" y="60" fill="rgb(138,133,128)" font-size="12">원서 그림 5.5의 매핑 개념을 다크 테마로 재구성했습니다 (Spring Data JDBC 자동 매핑)</text>

  <!-- Java record (left) -->
  <rect x="40" y="92" width="320" height="296" rx="8" fill="rgba(100,150,220,0.10)" stroke="rgb(120,160,220)" stroke-width="1.5"/>
  <text x="60" y="120" fill="#e8e4df" font-size="13.5" font-weight="700">Java 영속 엔티티</text>
  <text x="60" y="148" fill="rgb(138,133,128)" font-size="12" font-family="'JetBrains Mono', monospace">record Book {</text>
  <text x="76" y="172" fill="rgb(138,133,128)" font-size="11.5" font-family="'JetBrains Mono', monospace">@Id Long id</text>
  <text x="76" y="196" fill="rgb(138,133,128)" font-size="11.5" font-family="'JetBrains Mono', monospace">String isbn</text>
  <text x="76" y="220" fill="rgb(138,133,128)" font-size="11.5" font-family="'JetBrains Mono', monospace">String title</text>
  <text x="76" y="244" fill="rgb(138,133,128)" font-size="11.5" font-family="'JetBrains Mono', monospace">String author</text>
  <text x="76" y="268" fill="rgb(138,133,128)" font-size="11.5" font-family="'JetBrains Mono', monospace">Double price</text>
  <text x="76" y="292" fill="rgb(138,133,128)" font-size="11.5" font-family="'JetBrains Mono', monospace">Instant createdDate</text>
  <text x="76" y="316" fill="rgb(138,133,128)" font-size="11.5" font-family="'JetBrains Mono', monospace">Instant lastModifiedDate</text>
  <text x="76" y="340" fill="rgb(138,133,128)" font-size="11.5" font-family="'JetBrains Mono', monospace">@Version int version</text>
  <text x="60" y="364" fill="rgb(138,133,128)" font-size="12" font-family="'JetBrains Mono', monospace">}</text>

  <!-- arrow -->
  <line x1="372" y1="240" x2="468" y2="240" stroke="rgb(212,168,83)" stroke-width="2"/>
  <polygon points="468,240 456,234 456,246" fill="rgb(212,168,83)"/>
  <text x="420" y="228" fill="rgb(212,168,83)" font-size="11" font-weight="600" text-anchor="middle">자동 매핑</text>
  <text x="420" y="260" fill="rgb(138,133,128)" font-size="9.5" text-anchor="middle">카멜→밑줄</text>

  <!-- DB table (right) -->
  <rect x="480" y="92" width="320" height="296" rx="8" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="500" y="120" fill="rgb(212,168,83)" font-size="13.5" font-weight="700">관계형 테이블</text>
  <text x="500" y="148" fill="rgb(138,133,128)" font-size="12" font-family="'JetBrains Mono', monospace">TABLE book (</text>
  <text x="516" y="172" fill="rgb(138,133,128)" font-size="11.5" font-family="'JetBrains Mono', monospace">id BIGSERIAL PK</text>
  <text x="516" y="196" fill="rgb(138,133,128)" font-size="11.5" font-family="'JetBrains Mono', monospace">isbn varchar UNIQUE</text>
  <text x="516" y="220" fill="rgb(138,133,128)" font-size="11.5" font-family="'JetBrains Mono', monospace">title varchar</text>
  <text x="516" y="244" fill="rgb(138,133,128)" font-size="11.5" font-family="'JetBrains Mono', monospace">author varchar</text>
  <text x="516" y="268" fill="rgb(138,133,128)" font-size="11.5" font-family="'JetBrains Mono', monospace">price float8</text>
  <text x="516" y="292" fill="rgb(138,133,128)" font-size="11.5" font-family="'JetBrains Mono', monospace">created_date timestamp</text>
  <text x="516" y="316" fill="rgb(138,133,128)" font-size="11.5" font-family="'JetBrains Mono', monospace">last_modified_date ts</text>
  <text x="516" y="340" fill="rgb(138,133,128)" font-size="11.5" font-family="'JetBrains Mono', monospace">version integer</text>
  <text x="500" y="364" fill="rgb(138,133,128)" font-size="12" font-family="'JetBrains Mono', monospace">)</text>
</svg>
