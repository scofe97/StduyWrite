<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 440" width="100%" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>배포 파이프라인 커밋 스테이지 — 패키징과 게시</title>
  <desc>개발자가 push하면 커밋 스테이지가 체크아웃·코드 스캔·빌드·테스트를 거치고, 이미지로 패키징·스캔·게시한다. 게시된 릴리스 후보는 컨테이너 레지스트리에 push된다.</desc>
  <rect width="840" height="440" fill="#0d0d0d"/>
  <text x="30" y="38" fill="#e8e4df" font-size="17" font-weight="700">배포 파이프라인 — 커밋 스테이지 (part 2)</text>
  <text x="30" y="60" fill="rgb(138,133,128)" font-size="12">원서 그림 6.15를 다크 테마로 재현하고 라벨을 한글로 옮겼습니다</text>

  <!-- developer push -->
  <text x="90" y="92" fill="#e8e4df" font-size="12" font-weight="600">개발자</text>
  <line x1="90" y1="98" x2="90" y2="128" stroke="rgb(138,133,128)" stroke-width="1.4"/>
  <polygon points="90,128 85,119 95,119" fill="rgb(138,133,128)"/>
  <text x="100" y="118" fill="rgb(138,133,128)" font-size="10">Push</text>

  <!-- pipeline boundary -->
  <rect x="30" y="132" width="780" height="208" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgb(42,37,32)" stroke-width="1.4" stroke-dasharray="6,4"/>

  <!-- row 1 -->
  <rect x="50" y="152" width="160" height="56" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="130" y="178" fill="#e8e4df" font-size="11.5" text-anchor="middle">소스 코드</text>
  <text x="130" y="194" fill="#e8e4df" font-size="11.5" text-anchor="middle">체크아웃</text>

  <rect x="240" y="152" width="160" height="56" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="320" y="178" fill="#e8e4df" font-size="11.5" text-anchor="middle">코드 취약점</text>
  <text x="320" y="194" fill="#e8e4df" font-size="11.5" text-anchor="middle">스캔</text>

  <rect x="430" y="152" width="160" height="56" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="510" y="184" fill="#e8e4df" font-size="11.5" text-anchor="middle">빌드</text>

  <rect x="620" y="152" width="160" height="56" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="700" y="178" fill="#e8e4df" font-size="11.5" text-anchor="middle">단위 테스트</text>
  <text x="700" y="194" fill="#e8e4df" font-size="11.5" text-anchor="middle">통합 테스트</text>

  <!-- row1 arrows -->
  <polygon points="240,180 230,175 230,185" fill="rgb(138,133,128)"/>
  <line x1="210" y1="180" x2="240" y2="180" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <polygon points="430,180 420,175 420,185" fill="rgb(138,133,128)"/>
  <line x1="400" y1="180" x2="430" y2="180" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <polygon points="620,180 610,175 610,185" fill="rgb(138,133,128)"/>
  <line x1="590" y1="180" x2="620" y2="180" stroke="rgb(138,133,128)" stroke-width="1.2"/>

  <!-- connector to row 2 -->
  <line x1="780" y1="208" x2="795" y2="208" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <line x1="795" y1="208" x2="795" y2="252" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <line x1="795" y1="252" x2="40" y2="252" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <line x1="40" y1="252" x2="40" y2="268" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <polygon points="50,268 40,268 45,278" fill="rgb(138,133,128)"/>

  <!-- row 2 (green = new steps) -->
  <rect x="50" y="268" width="180" height="56" rx="6" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="1.4"/>
  <text x="140" y="294" fill="#66bb6a" font-size="11.5" text-anchor="middle">이미지로</text>
  <text x="140" y="310" fill="#66bb6a" font-size="11.5" text-anchor="middle">패키징</text>

  <rect x="260" y="268" width="180" height="56" rx="6" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="1.4"/>
  <text x="350" y="294" fill="#66bb6a" font-size="11.5" text-anchor="middle">OCI 이미지</text>
  <text x="350" y="310" fill="#66bb6a" font-size="11.5" text-anchor="middle">취약점 스캔</text>

  <rect x="470" y="268" width="180" height="56" rx="6" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="1.4"/>
  <text x="560" y="294" fill="#66bb6a" font-size="11.5" text-anchor="middle">이미지</text>
  <text x="560" y="310" fill="#66bb6a" font-size="11.5" text-anchor="middle">게시</text>

  <!-- row2 arrows -->
  <polygon points="260,296 250,291 250,301" fill="rgb(138,133,128)"/>
  <line x1="230" y1="296" x2="260" y2="296" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <polygon points="470,296 460,291 460,301" fill="rgb(138,133,128)"/>
  <line x1="440" y1="296" x2="470" y2="296" stroke="rgb(138,133,128)" stroke-width="1.2"/>

  <!-- push to registry -->
  <line x1="560" y1="324" x2="560" y2="368" stroke="rgb(138,133,128)" stroke-width="1.4"/>
  <polygon points="560,368 555,359 565,359" fill="rgb(138,133,128)"/>
  <text x="572" y="350" fill="rgb(138,133,128)" font-size="10">Push</text>

  <!-- registry cylinder -->
  <ellipse cx="560" cy="378" rx="55" ry="12" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <path d="M 505 378 L 505 410 A 55 12 0 0 0 615 410 L 615 378" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="560" y="402" fill="rgb(212,168,83)" font-size="11" font-weight="600" text-anchor="middle">컨테이너 레지스트리</text>
</svg>
