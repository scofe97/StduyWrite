<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 520" width="100%" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>외부화 설정 관리 핵심 요약</title>
  <desc>릴리스는 불변 빌드와 설정의 조합이다. 외부화 설정의 세 전략은 앱 묶음 파일·환경변수·설정 서비스다. 같은 키는 우선순위 높은 출처가 이긴다. Config Server는 application·profile·label로 설정을 식별한다.</desc>
  <rect width="840" height="520" fill="#0d0d0d"/>
  <text x="30" y="40" fill="#e8e4df" font-size="19" font-weight="700">외부화 설정 관리</text>
  <text x="30" y="62" fill="rgb(138,133,128)" font-size="12">같은 빌드, 다른 설정 — 배포 간 바뀌는 모든 것을 코드 밖으로</text>

  <!-- release = build + config -->
  <rect x="40" y="86" width="220" height="58" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="150" y="112" fill="rgb(212,168,83)" font-size="14" font-weight="700" text-anchor="middle">릴리스</text>
  <text x="150" y="132" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">배포 가능한 산출물</text>

  <text x="278" y="122" fill="#e8e4df" font-size="22" font-weight="700" text-anchor="middle">=</text>

  <rect x="300" y="86" width="220" height="58" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.4"/>
  <text x="410" y="112" fill="#e8e4df" font-size="14" font-weight="700" text-anchor="middle">불변 빌드</text>
  <text x="410" y="132" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">한 번 만들면 안 바뀜</text>

  <text x="538" y="122" fill="#e8e4df" font-size="22" font-weight="700" text-anchor="middle">+</text>

  <rect x="560" y="86" width="240" height="58" rx="8" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="680" y="112" fill="#66bb6a" font-size="14" font-weight="700" text-anchor="middle">설정</text>
  <text x="680" y="132" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">환경마다 바뀌는 값</text>

  <!-- 3 strategies -->
  <text x="40" y="178" fill="#e8e4df" font-size="14" font-weight="700">외부화 설정 세 전략</text>
  <rect x="40" y="190" width="246" height="72" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="163" y="216" fill="rgb(212,168,83)" font-size="12.5" font-weight="600" text-anchor="middle">① 앱 묶음 파일</text>
  <text x="163" y="238" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">프로파일 특정 파일</text>
  <text x="163" y="254" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">application-prod.yml</text>

  <rect x="297" y="190" width="246" height="72" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="420" y="216" fill="rgb(212,168,83)" font-size="12.5" font-weight="600" text-anchor="middle">② 환경변수</text>
  <text x="420" y="238" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">relaxed binding</text>
  <text x="420" y="254" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">POLAR_GREETING → polar.greeting</text>

  <rect x="554" y="190" width="246" height="72" rx="8" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="1.4"/>
  <text x="677" y="216" fill="#66bb6a" font-size="12.5" font-weight="600" text-anchor="middle">③ 설정 서비스</text>
  <text x="677" y="238" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">Spring Cloud Config</text>
  <text x="677" y="254" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">중앙 집중 · Git 백엔드</text>

  <!-- precedence -->
  <text x="40" y="296" fill="#e8e4df" font-size="14" font-weight="700">우선순위 (높은 출처가 이김)</text>
  <rect x="40" y="308" width="760" height="44" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="56" y="335" fill="rgb(138,133,128)" font-size="12">CLI 인자  ›  JVM 시스템 프로퍼티  ›  OS 환경변수  ›  프로파일 특정 파일  ›  일반 파일/기본값</text>

  <!-- config server identify -->
  <text x="40" y="386" fill="#e8e4df" font-size="14" font-weight="700">Config Server — 설정 식별 3파라미터</text>
  <rect x="40" y="398" width="246" height="50" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="163" y="420" fill="rgb(212,168,83)" font-size="12.5" font-weight="600" text-anchor="middle">application</text>
  <text x="163" y="438" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">어느 앱</text>

  <rect x="297" y="398" width="246" height="50" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="420" y="420" fill="rgb(212,168,83)" font-size="12.5" font-weight="600" text-anchor="middle">profile</text>
  <text x="420" y="438" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">어느 환경·기능</text>

  <rect x="554" y="398" width="246" height="50" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="677" y="420" fill="rgb(212,168,83)" font-size="12.5" font-weight="600" text-anchor="middle">label</text>
  <text x="677" y="438" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">어느 Git 브랜치·버전</text>

  <!-- resilience note -->
  <rect x="40" y="462" width="760" height="44" rx="8" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="1.3"/>
  <text x="56" y="489" fill="#66bb6a" font-size="12" font-weight="600">단일 장애점 완화: 복제 · clone-on-start · force-pull · timeout · 런타임 갱신(/actuator/refresh)</text>
</svg>
