<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 360" width="100%" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>컨테이너 이미지의 읽기 전용 레이어</title>
  <desc>컨테이너 이미지는 순서 있는 읽기 전용 레이어로 구성된다. 맨 아래가 베이스 이미지(Ubuntu)이고, 그 위로 JRE 설치, java version 실행 같은 변경이 쌓인다.</desc>
  <rect width="840" height="360" fill="#0d0d0d"/>
  <text x="30" y="38" fill="#e8e4df" font-size="17" font-weight="700">컨테이너 이미지의 읽기 전용 레이어</text>
  <text x="30" y="60" fill="rgb(138,133,128)" font-size="12">원서 그림 6.2를 다크 테마로 재현하고 라벨을 한글로 옮겼습니다</text>

  <!-- read-only label -->
  <text x="40" y="180" fill="rgb(212,168,83)" font-size="13" font-weight="700">읽기 전용</text>
  <text x="40" y="198" fill="rgb(212,168,83)" font-size="13" font-weight="700">레이어</text>
  <line x1="120" y1="186" x2="240" y2="186" stroke="rgb(138,133,128)" stroke-width="1.2" stroke-dasharray="5,3"/>

  <!-- image container box -->
  <rect x="250" y="84" width="500" height="232" rx="8" fill="rgba(100,150,220,0.08)" stroke="rgb(120,160,220)" stroke-width="1.5"/>

  <!-- layer 3 (top) -->
  <rect x="280" y="100" width="440" height="56" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <circle cx="316" cy="128" r="15" fill="#1a1a1a" stroke="rgb(138,133,128)" stroke-width="1"/>
  <text x="316" y="133" fill="#e8e4df" font-size="13" font-weight="700" text-anchor="middle">3</text>
  <text x="360" y="133" fill="#e8e4df" font-size="13">java version 실행</text>
  <text x="690" y="133" fill="rgb(212,168,83)" font-size="14">🔒</text>

  <!-- layer 2 -->
  <rect x="280" y="170" width="440" height="56" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <circle cx="316" cy="198" r="15" fill="#1a1a1a" stroke="rgb(138,133,128)" stroke-width="1"/>
  <text x="316" y="203" fill="#e8e4df" font-size="13" font-weight="700" text-anchor="middle">2</text>
  <text x="360" y="203" fill="#e8e4df" font-size="13">JRE 설치</text>
  <text x="690" y="203" fill="rgb(212,168,83)" font-size="14">🔒</text>

  <!-- layer 1 (base) -->
  <rect x="280" y="240" width="440" height="56" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <circle cx="316" cy="268" r="15" fill="#1a1a1a" stroke="rgb(138,133,128)" stroke-width="1"/>
  <text x="316" y="273" fill="#e8e4df" font-size="13" font-weight="700" text-anchor="middle">1</text>
  <text x="360" y="273" fill="#e8e4df" font-size="13">Ubuntu (베이스 이미지)</text>
  <text x="690" y="273" fill="rgb(212,168,83)" font-size="14">🔒</text>

  <text x="500" y="340" fill="rgb(138,133,128)" font-size="12" font-weight="600" text-anchor="middle">Docker 이미지</text>
</svg>
