<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 380" width="100%" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>실행 중 컨테이너의 쓰기 가능한 레이어</title>
  <desc>실행 중인 컨테이너는 이미지 레이어 위에 추가 레이어를 갖는다. 그 레이어만 쓰기 가능하고 휘발성이다. 이미지의 읽기 전용 레이어 위에 실행 컨텍스트 레이어가 얹힌다.</desc>
  <rect width="840" height="380" fill="#0d0d0d"/>
  <text x="30" y="38" fill="#e8e4df" font-size="17" font-weight="700">실행 중 컨테이너의 추가 레이어</text>
  <text x="30" y="60" fill="rgb(138,133,128)" font-size="12">원서 그림 6.3을 다크 테마로 재현하고 라벨을 한글로 옮겼습니다</text>

  <!-- IMAGE (left) -->
  <rect x="60" y="120" width="300" height="200" rx="8" fill="rgba(100,150,220,0.08)" stroke="rgb(120,160,220)" stroke-width="1.4"/>
  <rect x="80" y="134" width="260" height="50" rx="5" fill="rgba(255,255,255,0.03)" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="98" y="164" fill="#e8e4df" font-size="12">3  java version 실행</text>
  <text x="316" y="164" fill="rgb(212,168,83)" font-size="13">🔒</text>
  <rect x="80" y="190" width="260" height="50" rx="5" fill="rgba(255,255,255,0.03)" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="98" y="220" fill="#e8e4df" font-size="12">2  JRE 설치</text>
  <text x="316" y="220" fill="rgb(212,168,83)" font-size="13">🔒</text>
  <rect x="80" y="246" width="260" height="50" rx="5" fill="rgba(255,255,255,0.03)" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="98" y="276" fill="#e8e4df" font-size="12">1  Ubuntu</text>
  <text x="316" y="276" fill="rgb(212,168,83)" font-size="13">🔒</text>
  <text x="210" y="340" fill="rgb(138,133,128)" font-size="12" font-weight="600" text-anchor="middle">Docker 이미지</text>

  <!-- Run arrow -->
  <line x1="370" y1="220" x2="460" y2="220" stroke="rgb(138,133,128)" stroke-width="1.5"/>
  <polygon points="460,220 450,215 450,225" fill="rgb(138,133,128)"/>
  <text x="415" y="210" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">Run</text>

  <!-- CONTAINER (right) -->
  <rect x="470" y="78" width="300" height="242" rx="8" fill="rgba(100,150,220,0.08)" stroke="rgb(120,160,220)" stroke-width="1.4"/>
  <!-- writable layer (top, green) -->
  <rect x="490" y="92" width="260" height="44" rx="5" fill="rgba(102,187,106,0.18)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="508" y="119" fill="#66bb6a" font-size="12" font-weight="600">4  실행 컨텍스트</text>
  <text x="726" y="119" fill="#66bb6a" font-size="13">🔓</text>
  <rect x="490" y="142" width="260" height="44" rx="5" fill="rgba(255,255,255,0.03)" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="508" y="169" fill="#e8e4df" font-size="12">3  java version 실행</text>
  <text x="726" y="169" fill="rgb(212,168,83)" font-size="13">🔒</text>
  <rect x="490" y="192" width="260" height="44" rx="5" fill="rgba(255,255,255,0.03)" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="508" y="219" fill="#e8e4df" font-size="12">2  JRE 설치</text>
  <text x="726" y="219" fill="rgb(212,168,83)" font-size="13">🔒</text>
  <rect x="490" y="242" width="260" height="44" rx="5" fill="rgba(255,255,255,0.03)" stroke="rgb(42,37,32)" stroke-width="1.2"/>
  <text x="508" y="269" fill="#e8e4df" font-size="12">1  Ubuntu</text>
  <text x="726" y="269" fill="rgb(212,168,83)" font-size="13">🔒</text>
  <text x="620" y="340" fill="rgb(138,133,128)" font-size="12" font-weight="600" text-anchor="middle">Docker 컨테이너</text>

  <!-- writable note -->
  <text x="620" y="68" fill="#66bb6a" font-size="11" text-anchor="middle">쓰기 가능 · 휘발성 (지우면 사라짐)</text>
</svg>
