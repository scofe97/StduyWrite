<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 500" width="100%" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>중앙 집중 설정 서버 — 다환경 다앱에 설정 제공</title>
  <desc>중앙 집중 설정 서버는 여러 앱의 외부 프로퍼티를 한곳에서 관리한다. 앱들이 설정을 요청하면 서버가 응답하고, 서버는 Config 데이터 저장소에서 데이터를 읽는다. 단일 장애점 완화를 위해 복제한다.</desc>
  <rect width="840" height="500" fill="#0d0d0d"/>
  <text x="30" y="38" fill="#e8e4df" font-size="18" font-weight="700">중앙 집중 설정 서버</text>
  <text x="30" y="60" fill="rgb(138,133,128)" font-size="12">원서 그림 4.7을 다크 테마로 재현하고 라벨을 한글로 옮겼습니다</text>

  <!-- three apps -->
  <rect x="50" y="84" width="180" height="56" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="140" y="110" fill="#e8e4df" font-size="13" font-weight="600" text-anchor="middle">Application A</text>
  <text x="140" y="128" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">인스턴스 여럿</text>
  <rect x="330" y="84" width="180" height="56" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="420" y="110" fill="#e8e4df" font-size="13" font-weight="600" text-anchor="middle">Application B</text>
  <text x="420" y="128" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">인스턴스 여럿</text>
  <rect x="610" y="84" width="180" height="56" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="700" y="110" fill="#e8e4df" font-size="13" font-weight="600" text-anchor="middle">Application C</text>
  <text x="700" y="128" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">인스턴스 여럿</text>

  <!-- asks / returns arrows -->
  <line x1="140" y1="140" x2="370" y2="248" stroke="rgb(138,133,128)" stroke-width="1.3"/>
  <polygon points="370,248 360,244 363,255" fill="rgb(138,133,128)"/>
  <text x="200" y="196" fill="rgb(138,133,128)" font-size="10">설정 요청</text>
  <line x1="380" y1="248" x2="150" y2="142" stroke="rgb(138,133,128)" stroke-width="1.1" stroke-dasharray="5,3"/>
  <polygon points="150,142 161,145 156,135" fill="rgb(138,133,128)"/>
  <text x="262" y="214" fill="rgb(138,133,128)" font-size="10">설정 반환</text>

  <line x1="420" y1="140" x2="420" y2="248" stroke="rgb(138,133,128)" stroke-width="1.3"/>
  <polygon points="420,248 415,239 425,239" fill="rgb(138,133,128)"/>
  <text x="330" y="180" fill="rgb(138,133,128)" font-size="10">설정 요청</text>
  <line x1="445" y1="248" x2="445" y2="142" stroke="rgb(138,133,128)" stroke-width="1.1" stroke-dasharray="5,3"/>
  <polygon points="445,142 440,151 450,151" fill="rgb(138,133,128)"/>
  <text x="452" y="200" fill="rgb(138,133,128)" font-size="10">설정 반환</text>

  <line x1="700" y1="140" x2="470" y2="248" stroke="rgb(138,133,128)" stroke-width="1.3"/>
  <polygon points="470,248 480,244 477,255" fill="rgb(138,133,128)"/>
  <text x="600" y="180" fill="rgb(138,133,128)" font-size="10">설정 요청</text>
  <line x1="460" y1="248" x2="690" y2="142" stroke="rgb(138,133,128)" stroke-width="1.1" stroke-dasharray="5,3"/>
  <polygon points="690,142 679,145 684,135" fill="rgb(138,133,128)"/>
  <text x="560" y="214" fill="rgb(138,133,128)" font-size="10">설정 반환</text>

  <!-- config server -->
  <rect x="330" y="250" width="180" height="64" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="420" y="278" fill="rgb(212,168,83)" font-size="14" font-weight="700" text-anchor="middle">Configuration</text>
  <text x="420" y="298" fill="rgb(212,168,83)" font-size="14" font-weight="700" text-anchor="middle">server</text>

  <!-- replicate note -->
  <text x="50" y="276" fill="#e8e4df" font-size="12" font-weight="600">단일 장애점 위험을</text>
  <text x="50" y="294" fill="#e8e4df" font-size="12" font-weight="600">복제로 완화</text>
  <text x="50" y="312" fill="rgb(138,133,128)" font-size="10.5">(최소 2 복제본)</text>

  <!-- same app note -->
  <text x="600" y="276" fill="#e8e4df" font-size="12" font-weight="600">같은 앱의 모든 인스턴스가</text>
  <text x="600" y="294" fill="#e8e4df" font-size="12" font-weight="600">중앙 서버에서 설정을</text>
  <text x="600" y="312" fill="#e8e4df" font-size="12" font-weight="600">받는다</text>

  <!-- server to store -->
  <line x1="408" y1="314" x2="408" y2="392" stroke="rgb(138,133,128)" stroke-width="1.3"/>
  <polygon points="408,392 403,383 413,383" fill="rgb(138,133,128)"/>
  <text x="318" y="356" fill="rgb(138,133,128)" font-size="10">config 데이터 요청</text>
  <line x1="432" y1="392" x2="432" y2="316" stroke="rgb(138,133,128)" stroke-width="1.1" stroke-dasharray="5,3"/>
  <polygon points="432,316 427,325 437,325" fill="rgb(138,133,128)"/>
  <text x="440" y="356" fill="rgb(138,133,128)" font-size="10">config 데이터 반환</text>

  <!-- config data store (cylinder) -->
  <ellipse cx="420" cy="404" rx="70" ry="14" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <path d="M 350 404 L 350 444 A 70 14 0 0 0 490 444 L 490 404" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="420" y="432" fill="rgb(212,168,83)" font-size="12" font-weight="600" text-anchor="middle">Config 데이터 저장소</text>

  <!-- store note -->
  <text x="50" y="420" fill="#e8e4df" font-size="12" font-weight="600">모든 앱의 설정을</text>
  <text x="50" y="438" fill="#e8e4df" font-size="12" font-weight="600">저장 (예: Git)</text>
  <text x="50" y="456" fill="rgb(138,133,128)" font-size="10.5">영속·버전·감사·접근제어</text>
</svg>
