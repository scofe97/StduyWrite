<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 420" width="100%" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Spring Data 상호작용 구조 — 드라이버·엔티티·리포지토리</title>
  <desc>드라이버가 앱과 DB의 연결을 구성한다. 엔티티는 도메인 객체를 표현하며 리포지토리로 저장·조회된다. 서비스는 리포지토리로 데이터에 접근한다.</desc>
  <rect width="840" height="420" fill="#0d0d0d"/>
  <text x="30" y="38" fill="#e8e4df" font-size="17" font-weight="700">Spring Data 상호작용 구조</text>
  <text x="30" y="60" fill="rgb(138,133,128)" font-size="12">원서 그림 5.3을 다크 테마로 재현하고 라벨을 한글로 옮겼습니다</text>

  <!-- outer app boundary -->
  <rect x="30" y="84" width="640" height="300" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgb(42,37,32)" stroke-width="1.4"/>
  <text x="350" y="368" fill="rgb(138,133,128)" font-size="12" font-weight="600" text-anchor="middle">Spring Boot 애플리케이션</text>

  <!-- Service -->
  <rect x="56" y="120" width="140" height="64" rx="6" fill="rgba(100,150,220,0.15)" stroke="rgb(120,160,220)" stroke-width="1.4"/>
  <text x="126" y="158" fill="#e8e4df" font-size="13" font-weight="700" text-anchor="middle">Service</text>

  <!-- Spring Data inner box -->
  <rect x="280" y="100" width="360" height="104" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="460" y="194" fill="#e8e4df" font-size="12" font-weight="600" text-anchor="middle">Spring Data</text>

  <!-- Repository -->
  <rect x="300" y="120" width="130" height="56" rx="6" fill="rgba(100,150,220,0.15)" stroke="rgb(120,160,220)" stroke-width="1.4"/>
  <text x="365" y="153" fill="#e8e4df" font-size="13" font-weight="700" text-anchor="middle">Repository</text>

  <!-- Entity -->
  <rect x="490" y="120" width="130" height="56" rx="6" fill="rgba(100,150,220,0.15)" stroke="rgb(120,160,220)" stroke-width="1.4"/>
  <text x="555" y="153" fill="#e8e4df" font-size="13" font-weight="700" text-anchor="middle">Entity</text>

  <!-- Database driver -->
  <rect x="300" y="280" width="160" height="64" rx="6" fill="rgba(100,150,220,0.15)" stroke="rgb(120,160,220)" stroke-width="1.4"/>
  <text x="380" y="310" fill="#e8e4df" font-size="12.5" font-weight="700" text-anchor="middle">Database</text>
  <text x="380" y="328" fill="#e8e4df" font-size="12.5" font-weight="700" text-anchor="middle">driver</text>

  <!-- Database cylinder (outside app) -->
  <ellipse cx="745" cy="300" rx="48" ry="13" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="1.4"/>
  <path d="M 697 300 L 697 340 A 48 13 0 0 0 793 340 L 793 300" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="1.4"/>
  <text x="745" y="326" fill="rgb(212,168,83)" font-size="12" font-weight="600" text-anchor="middle">Database</text>

  <!-- Service -> Repository -->
  <line x1="196" y1="148" x2="300" y2="148" stroke="rgb(138,133,128)" stroke-width="1.4"/>
  <polygon points="300,148 290,143 290,153" fill="rgb(138,133,128)"/>
  <text x="200" y="138" fill="rgb(138,133,128)" font-size="10">데이터 접근 위임</text>

  <!-- Repository -> Entity -->
  <line x1="430" y1="148" x2="490" y2="148" stroke="rgb(138,133,128)" stroke-width="1.4"/>
  <polygon points="490,148 480,143 480,153" fill="rgb(138,133,128)"/>
  <text x="436" y="138" fill="rgb(138,133,128)" font-size="10">연산 관리</text>

  <!-- Spring Data -> Driver -->
  <line x1="380" y1="204" x2="380" y2="280" stroke="rgb(138,133,128)" stroke-width="1.4"/>
  <polygon points="380,280 375,270 385,270" fill="rgb(138,133,128)"/>
  <text x="392" y="246" fill="rgb(138,133,128)" font-size="10">DB 연결 획득</text>

  <!-- Driver -> Database -->
  <line x1="460" y1="312" x2="697" y2="312" stroke="rgb(138,133,128)" stroke-width="1.4"/>
  <polygon points="697,312 687,307 687,317" fill="rgb(138,133,128)"/>
  <text x="500" y="302" fill="rgb(138,133,128)" font-size="10">연동 정의</text>
</svg>
