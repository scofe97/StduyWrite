<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 440" width="100%" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>앱 서비스와 데이터 서비스의 자원 사용</title>
  <desc>클라우드 인프라 기본 구성 요소는 컴퓨팅·네트워크·스토리지다. 애플리케이션 서비스는 stateless라 컴퓨팅과 네트워크만 쓴다. 데이터 서비스는 stateful이라 스토리지도 쓴다.</desc>
  <rect width="840" height="440" fill="#0d0d0d"/>
  <text x="420" y="40" fill="#e8e4df" font-size="17" font-weight="700" text-anchor="middle">클라우드 인프라 기본 구성 요소</text>
  <text x="420" y="62" fill="rgb(138,133,128)" font-size="12" text-anchor="middle">원서 그림 5.1을 다크 테마로 재현하고 라벨을 한글로 옮겼습니다</text>

  <!-- building blocks (top) -->
  <rect x="60" y="86" width="200" height="64" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="160" y="124" fill="rgb(212,168,83)" font-size="14" font-weight="700" text-anchor="middle">컴퓨팅</text>
  <rect x="320" y="86" width="200" height="64" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="420" y="124" fill="rgb(212,168,83)" font-size="14" font-weight="700" text-anchor="middle">네트워크</text>
  <rect x="580" y="86" width="200" height="64" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="680" y="124" fill="rgb(212,168,83)" font-size="14" font-weight="700" text-anchor="middle">스토리지</text>

  <!-- services (bottom) -->
  <rect x="150" y="320" width="220" height="64" rx="6" fill="rgba(100,150,220,0.15)" stroke="rgb(120,160,220)" stroke-width="1.5"/>
  <text x="260" y="350" fill="#e8e4df" font-size="13.5" font-weight="700" text-anchor="middle">애플리케이션 서비스</text>
  <text x="260" y="370" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">stateless</text>
  <rect x="470" y="320" width="220" height="64" rx="6" fill="rgba(100,150,220,0.15)" stroke="rgb(120,160,220)" stroke-width="1.5"/>
  <text x="580" y="350" fill="#e8e4df" font-size="13.5" font-weight="700" text-anchor="middle">데이터 서비스</text>
  <text x="580" y="370" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">stateful</text>

  <!-- app service uses compute + network -->
  <line x1="240" y1="320" x2="165" y2="152" stroke="rgb(138,133,128)" stroke-width="1.3"/>
  <polygon points="165,152 163,162 173,158" fill="rgb(138,133,128)"/>
  <line x1="280" y1="320" x2="400" y2="152" stroke="rgb(138,133,128)" stroke-width="1.3"/>
  <polygon points="400,152 392,158 402,162" fill="rgb(138,133,128)"/>

  <!-- data service uses network + storage -->
  <line x1="560" y1="320" x2="440" y2="152" stroke="rgb(138,133,128)" stroke-width="1.3"/>
  <polygon points="440,152 438,162 448,158" fill="rgb(138,133,128)"/>
  <line x1="600" y1="320" x2="675" y2="152" stroke="rgb(138,133,128)" stroke-width="1.3"/>
  <polygon points="675,152 667,158 677,162" fill="rgb(138,133,128)"/>

  <!-- uses labels -->
  <text x="186" y="244" fill="rgb(138,133,128)" font-size="11">사용</text>
  <text x="338" y="244" fill="rgb(138,133,128)" font-size="11">사용</text>
  <text x="486" y="244" fill="rgb(138,133,128)" font-size="11">사용</text>
  <text x="642" y="244" fill="rgb(138,133,128)" font-size="11">사용</text>

  <!-- note -->
  <text x="420" y="420" fill="rgb(138,133,128)" font-size="11.5" text-anchor="middle">앱 서비스는 컴퓨팅·네트워크만, 데이터 서비스는 상태 영속화를 위해 스토리지까지 쓴다.</text>
</svg>
