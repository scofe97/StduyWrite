<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 380" width="100%" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Spring 프로퍼티 우선순위 — 외부화 설정 덮어쓰기</title>
  <desc>Spring Boot는 우선순위 리스트에 따라 모든 출처를 평가하고, 각 프로퍼티는 가장 높은 우선순위 출처의 값으로 결정된다. CLI 인자가 가장 높고 기본 프로퍼티가 가장 낮다.</desc>
  <rect width="840" height="380" fill="#0d0d0d"/>
  <text x="30" y="38" fill="#e8e4df" font-size="18" font-weight="700">프로퍼티 우선순위 — 같은 키는 높은 출처가 이김</text>
  <text x="30" y="60" fill="rgb(138,133,128)" font-size="12">원서 그림 4.6의 우선순위 흐름을 다크 테마로 재구성했습니다 (같은 빌드, 다른 설정)</text>

  <text x="60" y="96" fill="rgb(212,168,83)" font-size="12" font-weight="700">높음 (먼저 적용)</text>
  <text x="600" y="96" fill="rgb(138,133,128)" font-size="12">낮음 (기본값)</text>

  <!-- precedence ladder -->
  <rect x="40" y="108" width="760" height="40" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.4"/>
  <text x="56" y="133" fill="rgb(212,168,83)" font-size="13" font-weight="600">1. 커맨드라인 인자</text>
  <text x="420" y="133" fill="rgb(138,133,128)" font-size="11">--polar.greeting=... · 프로덕션에서 가장 높은 출처</text>

  <rect x="40" y="156" width="760" height="40" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="56" y="181" fill="#e8e4df" font-size="13" font-weight="600">2. JVM 시스템 프로퍼티</text>
  <text x="420" y="181" fill="rgb(138,133,128)" font-size="11">-Dpolar.greeting=... · CLI 인자보다 낮음</text>

  <rect x="40" y="204" width="760" height="40" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="56" y="229" fill="#e8e4df" font-size="13" font-weight="600">3. OS 환경변수</text>
  <text x="420" y="229" fill="rgb(138,133,128)" font-size="11">POLAR_GREETING=... · relaxed binding · 15-Factor 권장</text>

  <rect x="40" y="252" width="760" height="40" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="56" y="277" fill="#e8e4df" font-size="13" font-weight="600">4. 프로파일 특정 파일</text>
  <text x="420" y="277" fill="rgb(138,133,128)" font-size="11">application-prod.yml · JAR 바깥이 JAR 안보다 높음</text>

  <rect x="40" y="300" width="760" height="40" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="56" y="325" fill="#e8e4df" font-size="13" font-weight="600">5. 일반 프로퍼티 파일 / 기본값</text>
  <text x="420" y="325" fill="rgb(138,133,128)" font-size="11">application.yml · setDefaultProperties</text>

  <!-- arrow -->
  <line x1="20" y1="112" x2="20" y2="336" stroke="rgb(212,168,83)" stroke-width="2"/>
  <polygon points="20,336 15,326 25,326" fill="rgb(212,168,83)"/>

  <text x="40" y="364" fill="rgb(138,133,128)" font-size="11">Environment가 모든 출처를 평가 → 각 프로퍼티는 가장 높은 출처 값으로 확정. 같은 빌드(JAR)를 안 바꾸고 설정만 덮어씀.</text>
</svg>
