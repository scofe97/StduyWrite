<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 360" width="100%" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Spring 프로퍼티 접근 세 가지 방법</title>
  <desc>Spring 앱 프로퍼티에 접근하는 방법은 Environment 인터페이스 주입, @Value 주입, @ConfigurationProperties 빈 세 가지다. Spring 팀은 타입 안전성 때문에 @ConfigurationProperties를 권장한다.</desc>
  <rect width="840" height="360" fill="#0d0d0d"/>
  <text x="30" y="38" fill="#e8e4df" font-size="18" font-weight="700">Spring 프로퍼티에 접근하는 세 가지 방법</text>
  <text x="30" y="60" fill="rgb(138,133,128)" font-size="12">원서 그림 4.3을 다크 테마로 재현하고 라벨을 한글로 옮겼습니다</text>

  <!-- top question -->
  <rect x="280" y="82" width="280" height="56" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="420" y="108" fill="rgb(212,168,83)" font-size="14" font-weight="700" text-anchor="middle">Spring 앱 프로퍼티에</text>
  <text x="420" y="128" fill="rgb(212,168,83)" font-size="14" font-weight="700" text-anchor="middle">어떻게 접근할까?</text>

  <!-- three branches -->
  <line x1="420" y1="138" x2="155" y2="196" stroke="rgb(138,133,128)" stroke-width="1.4"/>
  <polygon points="155,196 164,191 160,202" fill="rgb(138,133,128)"/>
  <line x1="420" y1="138" x2="420" y2="196" stroke="rgb(138,133,128)" stroke-width="1.4"/>
  <polygon points="420,196 415,187 425,187" fill="rgb(138,133,128)"/>
  <line x1="420" y1="138" x2="685" y2="196" stroke="rgb(138,133,128)" stroke-width="1.4"/>
  <polygon points="685,196 676,191 680,202" fill="rgb(138,133,128)"/>

  <!-- option 1: Environment -->
  <rect x="40" y="200" width="230" height="118" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.4"/>
  <text x="155" y="226" fill="#e8e4df" font-size="14" font-weight="700" text-anchor="middle">Environment</text>
  <text x="155" y="252" fill="rgb(138,133,128)" font-size="11.5" text-anchor="middle">Environment 인터페이스로</text>
  <text x="155" y="269" fill="rgb(138,133,128)" font-size="11.5" text-anchor="middle">프로퍼티에 접근</text>
  <text x="155" y="294" fill="rgb(138,133,128)" font-size="10.5" font-family="'JetBrains Mono', monospace" text-anchor="middle">getProperty("key")</text>

  <!-- option 2: @Value -->
  <rect x="290" y="200" width="230" height="118" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-width="1.4"/>
  <text x="405" y="226" fill="#e8e4df" font-size="14" font-weight="700" text-anchor="middle">@Value</text>
  <text x="405" y="252" fill="rgb(138,133,128)" font-size="11.5" text-anchor="middle">@Value 애너테이션으로</text>
  <text x="405" y="269" fill="rgb(138,133,128)" font-size="11.5" text-anchor="middle">프로퍼티 값 주입</text>
  <text x="405" y="294" fill="rgb(138,133,128)" font-size="10.5" font-family="'JetBrains Mono', monospace" text-anchor="middle">@Value("${key}")</text>

  <!-- option 3: @ConfigurationProperties (recommended) -->
  <rect x="540" y="200" width="260" height="118" rx="8" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="670" y="224" fill="#66bb6a" font-size="13.5" font-weight="700" text-anchor="middle">@ConfigurationProperties</text>
  <text x="670" y="248" fill="rgb(138,133,128)" font-size="11.5" text-anchor="middle">해당 애너테이션 붙인 클래스·</text>
  <text x="670" y="265" fill="rgb(138,133,128)" font-size="11.5" text-anchor="middle">레코드로 프로퍼티 접근</text>
  <text x="670" y="290" fill="#66bb6a" font-size="10.5" text-anchor="middle">Spring 팀 권장 (타입 안전·메타데이터)</text>
</svg>
