<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 470" width="100%" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Spring Environment 추상화 — 프로퍼티와 프로파일</title>
  <desc>Spring Environment 추상화는 프로파일과 프로퍼티 두 갈래로 나뉜다. 프로퍼티는 프로퍼티 파일·환경변수·JVM 시스템 프로퍼티·커맨드라인 인자 등 여러 출처에서 통합 접근된다.</desc>
  <rect width="840" height="470" fill="#0d0d0d"/>
  <text x="30" y="38" fill="#e8e4df" font-size="18" font-weight="700">Spring Environment 추상화</text>
  <text x="30" y="60" fill="rgb(138,133,128)" font-size="12">원서 그림 4.2를 다크 테마로 재현하고 라벨을 한글로 옮겼습니다</text>

  <!-- Environment (top) -->
  <rect x="300" y="84" width="240" height="60" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="420" y="112" fill="rgb(212,168,83)" font-size="15" font-weight="700" text-anchor="middle">Environment</text>
  <text x="420" y="132" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">프로퍼티·프로파일 통합 접근</text>

  <!-- two branches -->
  <line x1="420" y1="144" x2="210" y2="196" stroke="rgb(138,133,128)" stroke-width="1.4"/>
  <polygon points="210,196 219,191 215,202" fill="rgb(138,133,128)"/>
  <line x1="420" y1="144" x2="630" y2="196" stroke="rgb(138,133,128)" stroke-width="1.4"/>
  <polygon points="630,196 621,191 625,202" fill="rgb(138,133,128)"/>

  <!-- Profiles (left) -->
  <rect x="90" y="200" width="240" height="80" rx="8" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="210" y="228" fill="#66bb6a" font-size="14" font-weight="700" text-anchor="middle">Profiles</text>
  <text x="210" y="252" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">빈·설정을 묶어 조건부로 활성화</text>
  <text x="210" y="270" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">(기능 이름으로 명명 권장)</text>

  <!-- Properties (right) -->
  <rect x="510" y="200" width="240" height="80" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="630" y="228" fill="rgb(212,168,83)" font-size="14" font-weight="700" text-anchor="middle">Properties</text>
  <text x="630" y="252" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">키-값 설정 데이터</text>
  <text x="630" y="270" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">여러 출처에서 통합 접근</text>

  <!-- properties -> 5 sources -->
  <line x1="630" y1="280" x2="630" y2="316" stroke="rgb(138,133,128)" stroke-width="1.4"/>
  <polygon points="630,316 625,307 635,307" fill="rgb(138,133,128)"/>
  <text x="648" y="302" fill="rgb(138,133,128)" font-size="10">출처</text>

  <!-- 5 source boxes -->
  <rect x="40" y="328" width="148" height="56" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="114" y="354" fill="#e8e4df" font-size="11.5" font-weight="600" text-anchor="middle">프로퍼티 파일</text>
  <text x="114" y="372" fill="rgb(138,133,128)" font-size="9.5" text-anchor="middle">application.yml</text>

  <rect x="200" y="328" width="148" height="56" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="274" y="354" fill="#e8e4df" font-size="11.5" font-weight="600" text-anchor="middle">환경변수</text>
  <text x="274" y="372" fill="rgb(138,133,128)" font-size="9.5" text-anchor="middle">OS 레벨</text>

  <rect x="360" y="328" width="148" height="56" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="434" y="354" fill="#e8e4df" font-size="11.5" font-weight="600" text-anchor="middle">JVM 시스템</text>
  <text x="434" y="372" fill="rgb(138,133,128)" font-size="9.5" text-anchor="middle">-D 프로퍼티</text>

  <rect x="520" y="328" width="148" height="56" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="594" y="354" fill="#e8e4df" font-size="11.5" font-weight="600" text-anchor="middle">커맨드라인</text>
  <text x="594" y="372" fill="rgb(138,133,128)" font-size="9.5" text-anchor="middle">--key=val 인자</text>

  <rect x="680" y="328" width="120" height="56" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.3"/>
  <text x="740" y="354" fill="#e8e4df" font-size="11.5" font-weight="600" text-anchor="middle">그 외</text>
  <text x="740" y="372" fill="rgb(138,133,128)" font-size="9.5" text-anchor="middle">설정 서비스 등</text>

  <text x="40" y="424" fill="rgb(138,133,128)" font-size="11.5">Environment는 출처가 어디든 같은 방식으로 프로퍼티와 프로파일에 접근하게 해 준다. 출처는 우선순위로 평가된다(그림 4.6).</text>
</svg>
