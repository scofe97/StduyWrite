<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 420" width="100%" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Docker 네트워크와 내장 DNS</title>
  <desc>같은 Docker 네트워크의 두 컨테이너는 내장 DNS로 IP가 아니라 컨테이너 이름으로 서로를 찾는다. Catalog Service는 jdbc:postgresql://polar-postgres:5432로 PostgreSQL에 접근한다. 외부에는 포트 매핑으로 노출한다.</desc>
  <rect width="840" height="420" fill="#0d0d0d"/>
  <text x="30" y="38" fill="#e8e4df" font-size="17" font-weight="700">Docker 네트워크와 내장 DNS</text>
  <text x="30" y="60" fill="rgb(138,133,128)" font-size="12">원서 그림 6.10을 다크 테마로 재현하고 라벨을 한글로 옮겼습니다</text>

  <!-- docker network box -->
  <rect x="120" y="84" width="700" height="180" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgb(42,37,32)" stroke-width="1.4"/>
  <text x="470" y="106" fill="rgb(138,133,128)" font-size="12" text-anchor="middle">Docker 네트워크</text>

  <!-- external port (left, outside) -->
  <rect x="20" y="150" width="46" height="56" rx="5" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="43" y="183" fill="rgb(212,168,83)" font-size="12" font-weight="700" text-anchor="middle">9001</text>

  <!-- port mapping arrow -->
  <line x1="66" y1="178" x2="148" y2="178" stroke="rgb(138,133,128)" stroke-width="1.4"/>
  <polygon points="148,178 139,173 139,183" fill="rgb(138,133,128)"/>
  <polygon points="66,178 75,173 75,183" fill="rgb(138,133,128)"/>
  <text x="107" y="170" fill="rgb(138,133,128)" font-size="9.5" text-anchor="middle">포트 매핑</text>

  <!-- catalog-service container -->
  <rect x="150" y="124" width="200" height="120" rx="6" fill="rgba(100,150,220,0.15)" stroke="rgb(120,160,220)" stroke-width="1.4"/>
  <text x="250" y="146" fill="#e8e4df" font-size="12" font-weight="600" text-anchor="middle">Container</text>
  <rect x="166" y="158" width="46" height="56" rx="5" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="189" y="191" fill="rgb(212,168,83)" font-size="12" font-weight="700" text-anchor="middle">9001</text>
  <text x="250" y="232" fill="rgb(138,133,128)" font-size="11" font-style="italic" text-anchor="middle">catalog-service</text>

  <!-- DNS arrow with URL -->
  <line x1="350" y1="184" x2="600" y2="184" stroke="rgb(138,133,128)" stroke-width="1.4"/>
  <polygon points="600,184 591,179 591,189" fill="rgb(138,133,128)"/>
  <text x="475" y="176" fill="#66bb6a" font-size="10.5" font-family="'JetBrains Mono', monospace" text-anchor="middle">jdbc:postgresql://polar-postgres:5432</text>

  <!-- polar-postgres container -->
  <rect x="602" y="124" width="200" height="120" rx="6" fill="rgba(100,150,220,0.15)" stroke="rgb(120,160,220)" stroke-width="1.4"/>
  <text x="702" y="146" fill="#e8e4df" font-size="12" font-weight="600" text-anchor="middle">Container</text>
  <rect x="618" y="158" width="46" height="56" rx="5" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="641" y="191" fill="rgb(212,168,83)" font-size="12" font-weight="700" text-anchor="middle">5432</text>
  <text x="702" y="232" fill="rgb(138,133,128)" font-size="11" font-style="italic" text-anchor="middle">polar-postgres</text>

  <!-- notes -->
  <text x="250" y="300" fill="#e8e4df" font-size="11" font-weight="600" text-anchor="middle">웹 앱 컨테이너가</text>
  <text x="250" y="318" fill="#e8e4df" font-size="11" font-weight="600" text-anchor="middle">9001 포트를 듣는다</text>

  <text x="470" y="300" fill="#e8e4df" font-size="11" font-weight="600" text-anchor="middle">두 컨테이너가 같은 네트워크에 있어</text>
  <text x="470" y="318" fill="#e8e4df" font-size="11" font-weight="600" text-anchor="middle">IP 대신 컨테이너 이름으로 통신한다</text>

  <text x="702" y="300" fill="#e8e4df" font-size="11" font-weight="600" text-anchor="middle">PostgreSQL 서버가</text>
  <text x="702" y="318" fill="#e8e4df" font-size="11" font-weight="600" text-anchor="middle">5432 포트를 듣는다</text>

  <text x="30" y="392" fill="rgb(138,133,128)" font-size="11.5">localhost는 컨테이너 내부를 가리킨다. 같은 네트워크면 내장 DNS가 컨테이너 이름을 IP로 해석해 준다.</text>
</svg>
