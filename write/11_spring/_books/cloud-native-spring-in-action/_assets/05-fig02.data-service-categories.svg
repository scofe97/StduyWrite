<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 460" width="100%" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>데이터 서비스 분류 — 직접 관리 vs 클라우드 제공자</title>
  <desc>데이터 서비스는 책임 주체로 나뉜다. 직접 관리하면 컨테이너나 가상 머신에 배포한다. 클라우드 제공자가 관리하면 표준 서비스와 클라우드 전용 서비스를 쓸 수 있다.</desc>
  <rect width="840" height="460" fill="#0d0d0d"/>
  <text x="30" y="38" fill="#e8e4df" font-size="17" font-weight="700">데이터 서비스 분류 — 누가 관리하느냐</text>
  <text x="30" y="60" fill="rgb(138,133,128)" font-size="12">원서 그림 5.2를 다크 테마로 재현하고 라벨을 한글로 옮겼습니다</text>

  <!-- root -->
  <rect x="30" y="180" width="200" height="96" rx="8" fill="rgba(100,150,220,0.15)" stroke="rgb(120,160,220)" stroke-width="1.5"/>
  <text x="130" y="214" fill="#e8e4df" font-size="14" font-weight="700" text-anchor="middle">데이터 서비스</text>
  <text x="130" y="240" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">컴퓨팅·네트워크·스토리지를</text>
  <text x="130" y="256" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">쓰는 stateful 서비스</text>

  <!-- branch labels -->
  <line x1="230" y1="210" x2="320" y2="140" stroke="rgb(138,133,128)" stroke-width="1.3"/>
  <polygon points="320,140 311,142 316,150" fill="rgb(138,133,128)"/>
  <text x="246" y="160" fill="rgb(138,133,128)" font-size="10">유형 1</text>
  <line x1="230" y1="246" x2="320" y2="316" stroke="rgb(138,133,128)" stroke-width="1.3"/>
  <polygon points="320,316 311,308 316,316" fill="rgb(138,133,128)"/>
  <text x="246" y="300" fill="rgb(138,133,128)" font-size="10">유형 2</text>

  <!-- managed by you -->
  <rect x="320" y="104" width="220" height="92" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="430" y="130" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">직접 관리</text>
  <text x="430" y="153" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">스토리지·확장성·복원력·성능을</text>
  <text x="430" y="169" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">직접 책임. 예: PostgreSQL·Redis·</text>
  <text x="430" y="185" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">RabbitMQ·Mongo·Cassandra</text>

  <!-- managed by provider -->
  <rect x="320" y="280" width="220" height="92" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="430" y="306" fill="rgb(212,168,83)" font-size="13" font-weight="700" text-anchor="middle">클라우드 제공자 관리</text>
  <text x="430" y="329" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">제공자가 모든 관심사 처리.</text>
  <text x="430" y="345" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">예: Amazon DynamoDB·</text>
  <text x="430" y="361" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">BigQuery·Cosmos DB·Azure DB</text>

  <!-- deployed to (from managed by you) -->
  <line x1="540" y1="135" x2="600" y2="135" stroke="rgb(138,133,128)" stroke-width="1.3"/>
  <polygon points="600,135 591,131 591,140" fill="rgb(138,133,128)"/>
  <text x="544" y="126" fill="rgb(138,133,128)" font-size="9.5">배포 대상</text>
  <line x1="540" y1="170" x2="600" y2="316" stroke="rgb(138,133,128)" stroke-width="1.3"/>
  <polygon points="600,316 591,310 595,318" fill="rgb(138,133,128)"/>
  <text x="548" y="248" fill="rgb(138,133,128)" font-size="9.5">배포 대상</text>

  <!-- containers -->
  <rect x="600" y="104" width="210" height="92" rx="8" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="705" y="130" fill="#66bb6a" font-size="13" font-weight="700" text-anchor="middle">컨테이너</text>
  <text x="705" y="153" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">앱에서 배운 방식 재활용.</text>
  <text x="705" y="169" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">쿠버네티스 같은 통합</text>
  <text x="705" y="185" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">인터페이스로 관리·확장</text>

  <!-- virtual machines -->
  <rect x="600" y="280" width="210" height="92" rx="8" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="705" y="306" fill="#66bb6a" font-size="13" font-weight="700" text-anchor="middle">가상 머신</text>
  <text x="705" y="329" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">전통적 방식.</text>
  <text x="705" y="345" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">복제·스토리지를</text>
  <text x="705" y="361" fill="rgb(138,133,128)" font-size="10.5" text-anchor="middle">직접 명시 관리</text>

  <text x="30" y="430" fill="rgb(138,133,128)" font-size="11.5">직접 관리는 통제권이 크고 복잡도가 늘며, 제공자 관리는 부담이 적고 클라우드 전용 서비스까지 쓸 수 있다.</text>
</svg>
