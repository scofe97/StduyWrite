<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 420" width="100%" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Dockerfile에서 이미지, 컨테이너로</title>
  <desc>Dockerfile의 각 명령이 이미지의 순서 있는 레이어가 된다. 첫 명령이 가장 낮은 레이어를 만든다. 이미지를 실행하면 쓰기 가능한 실행 컨텍스트 레이어가 얹힌 컨테이너가 된다.</desc>
  <rect width="840" height="420" fill="#0d0d0d"/>
  <text x="30" y="38" fill="#e8e4df" font-size="17" font-weight="700">Dockerfile → 이미지 → 컨테이너</text>
  <text x="30" y="60" fill="rgb(138,133,128)" font-size="12">원서 그림 6.4를 다크 테마로 재현하고 라벨을 한글로 옮겼습니다 (첫 명령이 가장 낮은 레이어)</text>

  <!-- Dockerfile (left) -->
  <rect x="30" y="92" width="240" height="240" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgb(42,37,32)" stroke-width="1.4"/>
  <text x="50" y="124" fill="rgb(212,168,83)" font-size="12" font-weight="700" font-family="'JetBrains Mono', monospace">1</text>
  <text x="50" y="148" fill="rgb(138,133,128)" font-size="11" font-family="'JetBrains Mono', monospace">FROM ubuntu:22.04</text>
  <text x="50" y="184" fill="rgb(212,168,83)" font-size="12" font-weight="700" font-family="'JetBrains Mono', monospace">2</text>
  <text x="50" y="208" fill="rgb(138,133,128)" font-size="11" font-family="'JetBrains Mono', monospace">RUN apt-get update</text>
  <text x="66" y="226" fill="rgb(138,133,128)" font-size="11" font-family="'JetBrains Mono', monospace">install default-jre</text>
  <text x="50" y="262" fill="rgb(212,168,83)" font-size="12" font-weight="700" font-family="'JetBrains Mono', monospace">3</text>
  <text x="50" y="286" fill="rgb(138,133,128)" font-size="10.5" font-family="'JetBrains Mono', monospace">ENTRYPOINT</text>
  <text x="66" y="304" fill="rgb(138,133,128)" font-size="10.5" font-family="'JetBrains Mono', monospace">["java","--version"]</text>
  <text x="150" y="356" fill="rgb(138,133,128)" font-size="11.5" font-weight="600" text-anchor="middle">Dockerfile</text>

  <!-- Build arrow -->
  <line x1="270" y1="212" x2="320" y2="212" stroke="rgb(138,133,128)" stroke-width="1.4"/>
  <polygon points="320,212 311,207 311,217" fill="rgb(138,133,128)"/>
  <text x="295" y="202" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">Build</text>

  <!-- Image (middle) -->
  <rect x="326" y="120" width="200" height="184" rx="8" fill="rgba(100,150,220,0.08)" stroke="rgb(120,160,220)" stroke-width="1.3"/>
  <rect x="342" y="132" width="168" height="44" rx="5" fill="rgba(255,255,255,0.03)" stroke="rgb(42,37,32)" stroke-width="1.1"/>
  <text x="356" y="159" fill="#e8e4df" font-size="11">3  java version</text>
  <rect x="342" y="182" width="168" height="44" rx="5" fill="rgba(255,255,255,0.03)" stroke="rgb(42,37,32)" stroke-width="1.1"/>
  <text x="356" y="209" fill="#e8e4df" font-size="11">2  JRE 설치</text>
  <rect x="342" y="232" width="168" height="44" rx="5" fill="rgba(255,255,255,0.03)" stroke="rgb(42,37,32)" stroke-width="1.1"/>
  <text x="356" y="259" fill="#e8e4df" font-size="11">1  Ubuntu</text>
  <text x="426" y="328" fill="rgb(138,133,128)" font-size="11.5" font-weight="600" text-anchor="middle">Docker 이미지</text>

  <!-- Run arrow -->
  <line x1="526" y1="212" x2="576" y2="212" stroke="rgb(138,133,128)" stroke-width="1.4"/>
  <polygon points="576,212 567,207 567,217" fill="rgb(138,133,128)"/>
  <text x="551" y="202" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">Run</text>

  <!-- Container (right) -->
  <rect x="582" y="96" width="200" height="208" rx="8" fill="rgba(100,150,220,0.08)" stroke="rgb(120,160,220)" stroke-width="1.3"/>
  <rect x="598" y="108" width="168" height="40" rx="5" fill="rgba(102,187,106,0.18)" stroke="#66bb6a" stroke-width="1.3"/>
  <text x="612" y="133" fill="#66bb6a" font-size="11" font-weight="600">4  실행 컨텍스트</text>
  <rect x="598" y="154" width="168" height="40" rx="5" fill="rgba(255,255,255,0.03)" stroke="rgb(42,37,32)" stroke-width="1.1"/>
  <text x="612" y="179" fill="#e8e4df" font-size="11">3  java version</text>
  <rect x="598" y="200" width="168" height="40" rx="5" fill="rgba(255,255,255,0.03)" stroke="rgb(42,37,32)" stroke-width="1.1"/>
  <text x="612" y="225" fill="#e8e4df" font-size="11">2  JRE 설치</text>
  <rect x="598" y="246" width="168" height="40" rx="5" fill="rgba(255,255,255,0.03)" stroke="rgb(42,37,32)" stroke-width="1.1"/>
  <text x="612" y="271" fill="#e8e4df" font-size="11">1  Ubuntu</text>
  <text x="682" y="328" fill="rgb(138,133,128)" font-size="11.5" font-weight="600" text-anchor="middle">Docker 컨테이너</text>

  <text x="30" y="392" fill="rgb(138,133,128)" font-size="11.5">Dockerfile의 각 명령 → 이미지의 순서 있는 레이어. 실행하면 맨 위에 쓰기 가능한 휘발성 레이어가 얹힘.</text>
</svg>
