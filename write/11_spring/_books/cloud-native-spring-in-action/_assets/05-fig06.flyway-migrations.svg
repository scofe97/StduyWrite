<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 360" width="100%" role="img" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>Flyway 마이그레이션 — Git 커밋 비유</title>
  <desc>Flyway 마이그레이션은 DB 변경을 나타내며 Git 저장소의 커밋처럼 시간 순으로 정확히 한 번 적용된다. flyway_schema_history 테이블이 모든 적용 이력을 담는 로그가 된다.</desc>
  <rect width="840" height="360" fill="#0d0d0d"/>
  <text x="30" y="38" fill="#e8e4df" font-size="17" font-weight="700">Flyway 마이그레이션 = DB의 커밋</text>
  <text x="30" y="60" fill="rgb(138,133,128)" font-size="12">원서 그림 5.6을 다크 테마로 재현하고 라벨을 한글로 옮겼습니다</text>

  <!-- timeline axis -->
  <line x1="40" y1="200" x2="800" y2="200" stroke="rgb(138,133,128)" stroke-width="1.6"/>
  <polygon points="800,200 788,194 788,206" fill="rgb(138,133,128)"/>
  <text x="44" y="222" fill="rgb(138,133,128)" font-size="12">시간</text>

  <!-- V1 (above) -->
  <line x1="160" y1="200" x2="160" y2="148" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <rect x="70" y="100" width="180" height="48" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="1.4"/>
  <text x="160" y="130" fill="rgb(212,168,83)" font-size="12.5" font-weight="600" text-anchor="middle">V1 스키마 초기화</text>

  <!-- V2 (below) -->
  <line x1="320" y1="200" x2="320" y2="252" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <rect x="230" y="252" width="180" height="48" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.4"/>
  <text x="320" y="282" fill="#e8e4df" font-size="12.5" font-weight="600" text-anchor="middle">V2 컬럼 추가</text>

  <!-- V3 (above) -->
  <line x1="490" y1="200" x2="490" y2="148" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <rect x="400" y="100" width="180" height="48" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.4"/>
  <text x="490" y="130" fill="#e8e4df" font-size="12.5" font-weight="600" text-anchor="middle">V3 테이블 생성</text>

  <!-- V4 (below) -->
  <line x1="660" y1="200" x2="660" y2="252" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <rect x="570" y="252" width="180" height="48" rx="6" fill="none" stroke="rgb(42,37,32)" stroke-width="1.4"/>
  <text x="660" y="282" fill="#e8e4df" font-size="12.5" font-weight="600" text-anchor="middle">V4 인덱스 정의</text>

  <!-- dots on timeline -->
  <circle cx="160" cy="200" r="4" fill="rgb(212,168,83)"/>
  <circle cx="320" cy="200" r="4" fill="rgb(138,133,128)"/>
  <circle cx="490" cy="200" r="4" fill="rgb(138,133,128)"/>
  <circle cx="660" cy="200" r="4" fill="rgb(138,133,128)"/>

  <!-- note -->
  <text x="40" y="334" fill="rgb(138,133,128)" font-size="11.5">각 마이그레이션은 고유 버전으로 순서대로 한 번 적용된다. flyway_schema_history 테이블이 적용 이력을 담은 로그다.</text>
</svg>
