<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif" role="img" aria-label="블로킹 모델과 리액티브 모델의 스레드 차이">
  <rect x="0" y="0" width="720" height="340" fill="#0d0d0d"/>
  <text x="24" y="32" fill="#e8e4df" font-size="15" font-weight="bold">블로킹 vs 리액티브 — 스레드 관점</text>

  <!-- blocking -->
  <text x="24" y="62" fill="rgb(212,168,83)" font-size="12" font-weight="bold">비리액티브(블로킹): 요청당 스레드 1개, I/O마다 대기</text>
  <text x="40" y="86" fill="rgb(138,133,128)" font-size="10">Thread A 타임라인 →</text>
  <rect x="40" y="96" width="80" height="26" rx="3" fill="rgba(102,187,106,0.15)" stroke="#66bb6a" stroke-width="1"/>
  <text x="80" y="113" fill="#e8e4df" font-size="9" text-anchor="middle">step1</text>
  <rect x="124" y="96" width="90" height="26" rx="3" fill="rgba(244,67,54,0.18)" stroke="#f44336" stroke-width="1"/>
  <text x="169" y="113" fill="#e8e4df" font-size="9" text-anchor="middle">대기(I/O)</text>
  <rect x="218" y="96" width="80" height="26" rx="3" fill="rgba(102,187,106,0.15)" stroke="#66bb6a" stroke-width="1"/>
  <text x="258" y="113" fill="#e8e4df" font-size="9" text-anchor="middle">step2</text>
  <rect x="302" y="96" width="90" height="26" rx="3" fill="rgba(244,67,54,0.18)" stroke="#f44336" stroke-width="1"/>
  <text x="347" y="113" fill="#e8e4df" font-size="9" text-anchor="middle">대기(I/O)</text>
  <rect x="396" y="96" width="80" height="26" rx="3" fill="rgba(102,187,106,0.15)" stroke="#66bb6a" stroke-width="1"/>
  <text x="436" y="113" fill="#e8e4df" font-size="9" text-anchor="middle">step3</text>
  <text x="490" y="113" fill="#f44336" font-size="10">스레드가 노는 시간 = 자원 낭비</text>

  <!-- reactive -->
  <text x="24" y="174" fill="#5b9bd5" font-size="12" font-weight="bold">리액티브(논블로킹): 태스크 백로그, 빈 스레드가 아무 태스크나</text>
  <text x="40" y="198" fill="rgb(138,133,128)" font-size="10">태스크 의존 그래프 (독립 태스크는 동시 실행)</text>

  <rect x="40" y="212" width="120" height="30" rx="4" fill="rgb(91,155,213)" stroke="#5b9bd5" stroke-width="1.3"/>
  <text x="100" y="232" fill="#0d0d0d" font-size="10" font-weight="bold" text-anchor="middle">Task A: 합산</text>

  <rect x="220" y="190" width="150" height="30" rx="4" fill="rgba(91,155,213,0.15)" stroke="#5b9bd5" stroke-width="1"/>
  <text x="295" y="210" fill="#e8e4df" font-size="10" text-anchor="middle">Task C: 내부 부채</text>
  <rect x="220" y="236" width="150" height="30" rx="4" fill="rgba(91,155,213,0.15)" stroke="#5b9bd5" stroke-width="1"/>
  <text x="295" y="256" fill="#e8e4df" font-size="10" text-anchor="middle">Task B: 외부 부채</text>
  <text x="220" y="288" fill="#66bb6a" font-size="10">C·D는 서로 무관 → 동시 실행 가능</text>

  <rect x="430" y="236" width="150" height="30" rx="4" fill="rgba(91,155,213,0.15)" stroke="#5b9bd5" stroke-width="1"/>
  <text x="505" y="256" fill="#e8e4df" font-size="10" text-anchor="middle">Task D: 사용자 정보</text>

  <line x1="160" y1="222" x2="216" y2="205" stroke="#5b9bd5" stroke-width="1.3" marker-end="url(#r11)"/>
  <line x1="160" y1="230" x2="216" y2="248" stroke="#5b9bd5" stroke-width="1.3" marker-end="url(#r11)"/>
  <line x1="370" y1="251" x2="426" y2="251" stroke="#5b9bd5" stroke-width="1.3" marker-end="url(#r11)"/>
  <text x="170" y="200" fill="rgb(138,133,128)" font-size="9">subscribe</text>

  <text x="24" y="320" fill="rgb(138,133,128)" font-size="10">producer(Mono/Flux) ← subscriber 로 의존을 선언. 스레드는 막히면 다른 태스크로 이동해 idle 제거</text>

  <defs>
    <marker id="r11" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b9bd5"/></marker>
  </defs>
</svg>
