<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif" role="img" aria-label="REST 서비스는 두 앱 사이의 통신 방법">
  <rect x="0" y="0" width="720" height="300" fill="#0d0d0d"/>
  <text x="24" y="32" fill="#e8e4df" font-size="15" font-weight="bold">REST — 두 앱 사이의 HTTP 통신</text>

  <!-- web client -->
  <rect x="40" y="70" width="150" height="56" rx="6" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="115" y="95" fill="#e8e4df" font-size="12" font-weight="bold" text-anchor="middle">웹 클라이언트</text>
  <text x="115" y="113" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">브라우저 SPA</text>

  <!-- mobile -->
  <rect x="40" y="170" width="150" height="56" rx="6" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="115" y="195" fill="#e8e4df" font-size="12" font-weight="bold" text-anchor="middle">모바일 앱</text>
  <text x="115" y="213" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">iOS / Android</text>

  <!-- backend -->
  <rect x="430" y="120" width="160" height="56" rx="6" fill="rgb(91,155,213)" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="510" y="145" fill="#0d0d0d" font-size="12" font-weight="bold" text-anchor="middle">백엔드 서버</text>
  <text x="510" y="163" fill="#0d0d0d" font-size="10" text-anchor="middle">REST 엔드포인트 노출</text>

  <!-- another backend -->
  <rect x="430" y="220" width="160" height="44" rx="6" fill="rgba(102,187,106,0.12)" stroke="#66bb6a" stroke-width="1.3"/>
  <text x="510" y="247" fill="#e8e4df" font-size="11" font-weight="bold" text-anchor="middle">다른 백엔드 서비스</text>

  <!-- arrows -->
  <line x1="190" y1="98" x2="425" y2="140" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#a10)"/>
  <line x1="190" y1="198" x2="425" y2="155" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#a10)"/>
  <line x1="510" y1="176" x2="510" y2="216" stroke="#66bb6a" stroke-width="1.5" marker-end="url(#a10b)"/>
  <text x="300" y="108" fill="rgb(138,133,128)" font-size="10">HTTP 요청·응답</text>
  <text x="520" y="200" fill="rgb(138,133,128)" font-size="10">REST 호출</text>

  <defs>
    <marker id="a10" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
    <marker id="a10b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#66bb6a"/>
    </marker>
  </defs>
</svg>
