<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif" role="img" aria-label="서블릿 컨테이너 HTTP 번역">
  <rect x="0" y="0" width="720" height="220" fill="#0d0d0d"/>
  <text x="24" y="32" fill="#e8e4df" font-size="15" font-weight="bold">Tomcat이 HTTP ↔ 자바 객체를 번역합니다</text>

  <rect x="36" y="70" width="120" height="80" rx="6" fill="#0d0d0d" stroke="rgb(138,133,128)" stroke-width="1.5"/>
  <text x="96" y="106" fill="#e8e4df" font-size="12" text-anchor="middle">브라우저</text>
  <text x="96" y="126" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">클라이언트</text>

  <line x1="156" y1="100" x2="280" y2="100" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar7)"/>
  <text x="218" y="92" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">HTTP REQUEST</text>
  <line x1="280" y1="128" x2="156" y2="128" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar7)"/>
  <text x="218" y="146" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">HTTP RESPONSE</text>

  <rect x="280" y="64" width="150" height="92" rx="6" fill="rgb(102,187,106)" stroke="#66bb6a" stroke-width="2"/>
  <text x="355" y="104" fill="#0d0d0d" font-size="12" font-weight="bold" text-anchor="middle">Tomcat</text>
  <text x="355" y="124" fill="#0d0d0d" font-size="10" text-anchor="middle">서블릿 컨테이너</text>

  <line x1="430" y1="100" x2="540" y2="100" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#ar7g)"/>
  <text x="485" y="92" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">자바 객체</text>
  <line x1="540" y1="128" x2="430" y2="128" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#ar7g)"/>

  <rect x="540" y="64" width="150" height="92" rx="6" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="615" y="104" fill="#e8e4df" font-size="12" font-weight="bold" text-anchor="middle">Spring 앱</text>
  <text x="615" y="124" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">HTTP 몰라도 됨</text>

  <text x="36" y="196" fill="rgb(138,133,128)" font-size="11">앱은 통신 계층을 신경 쓰지 않고 자바 객체·메서드만 다룹니다</text>

  <defs>
    <marker id="ar7" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="rgb(138,133,128)"/></marker>
    <marker id="ar7g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="rgb(212,168,83)"/></marker>
  </defs>
</svg>
