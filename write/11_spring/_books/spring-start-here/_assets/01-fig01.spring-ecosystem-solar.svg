<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif" role="img" aria-label="Spring 생태계 솔라시스템 도식">
  <rect x="0" y="0" width="760" height="420" fill="#0d0d0d"/>
  <text x="24" y="36" fill="#e8e4df" font-size="16" font-weight="bold">Spring 생태계 — Core를 중심으로</text>
  <text x="24" y="58" fill="rgb(138,133,128)" font-size="12">Core가 별, 나머지 기능이 그 둘레를 도는 행성입니다</text>

  <!-- 궤도 -->
  <ellipse cx="380" cy="250" rx="300" ry="120" fill="none" stroke="rgb(42,37,32)" stroke-width="1"/>
  <ellipse cx="380" cy="250" rx="190" ry="76" fill="none" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 중심: Spring Core -->
  <circle cx="380" cy="250" r="62" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="380" y="245" fill="#e8e4df" font-size="15" font-weight="bold" text-anchor="middle">Spring Core</text>
  <text x="380" y="266" fill="rgb(212,168,83)" font-size="11" text-anchor="middle">IoC · AOP · SpEL</text>

  <!-- 행성: 모듈 -->
  <g>
    <circle cx="380" cy="130" r="46" fill="rgba(102,187,106,0.12)" stroke="#66bb6a" stroke-width="1.5"/>
    <text x="380" y="128" fill="#e8e4df" font-size="12" font-weight="bold" text-anchor="middle">Spring MVC</text>
    <text x="380" y="146" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">웹 요청 처리</text>
  </g>
  <g>
    <circle cx="600" cy="250" r="50" fill="rgba(102,187,106,0.12)" stroke="#66bb6a" stroke-width="1.5"/>
    <text x="600" y="244" fill="#e8e4df" font-size="12" font-weight="bold" text-anchor="middle">Data Access</text>
    <text x="600" y="262" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">JDBC · ORM · 트랜잭션</text>
  </g>
  <g>
    <circle cx="160" cy="250" r="46" fill="rgba(102,187,106,0.12)" stroke="#66bb6a" stroke-width="1.5"/>
    <text x="160" y="248" fill="#e8e4df" font-size="12" font-weight="bold" text-anchor="middle">Spring Testing</text>
    <text x="160" y="266" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">단위 · 통합 테스트</text>
  </g>

  <!-- 외곽 위성: 독립 프로젝트 -->
  <text x="380" y="388" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">바깥 궤도: 독립 프로젝트</text>
  <text x="380" y="406" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">Spring Boot · Spring Data · Spring Security · Spring Cloud · Spring Batch</text>
</svg>
