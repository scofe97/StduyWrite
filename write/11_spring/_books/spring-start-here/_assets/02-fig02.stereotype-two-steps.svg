<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif" role="img" aria-label="스테레오타입 애너테이션 2단계">
  <rect x="0" y="0" width="760" height="320" fill="#0d0d0d"/>
  <text x="24" y="34" fill="#e8e4df" font-size="15" font-weight="bold">스테레오타입 등록 — 두 단계</text>

  <!-- Step 1 -->
  <text x="300" y="74" fill="rgb(212,168,83)" font-size="13" font-weight="bold">STEP 1</text>
  <rect x="300" y="86" width="280" height="74" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="316" y="112" fill="#66bb6a" font-family="'JetBrains Mono', monospace" font-size="12">@Component</text>
  <text x="316" y="132" fill="#e8e4df" font-family="'JetBrains Mono', monospace" font-size="12">public class Parrot {</text>
  <text x="316" y="150" fill="rgb(138,133,128)" font-family="'JetBrains Mono', monospace" font-size="11">  // ... }</text>
  <text x="50" y="116" fill="rgb(138,133,128)" font-size="11">이 클래스의 인스턴스를</text>
  <text x="50" y="134" fill="rgb(138,133,128)" font-size="11">Context에 올리라고 지시</text>

  <!-- Step 2 -->
  <text x="300" y="208" fill="rgb(212,168,83)" font-size="13" font-weight="bold">STEP 2</text>
  <rect x="300" y="220" width="380" height="78" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="316" y="246" fill="#e8e4df" font-family="'JetBrains Mono', monospace" font-size="12">@Configuration</text>
  <text x="316" y="266" fill="#66bb6a" font-family="'JetBrains Mono', monospace" font-size="12">@ComponentScan(basePackages = "main")</text>
  <text x="316" y="286" fill="#e8e4df" font-family="'JetBrains Mono', monospace" font-size="12">public class ProjectConfig { }</text>
  <text x="50" y="252" fill="rgb(138,133,128)" font-size="11">애너테이션 붙은 클래스를</text>
  <text x="50" y="270" fill="rgb(138,133,128)" font-size="11">어디서 찾을지 알려줌</text>
</svg>
