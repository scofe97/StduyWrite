<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif" role="img" aria-label="Spring Data 계약 계층과 메서드명 기반 쿼리 파생">
  <rect x="0" y="0" width="720" height="360" fill="#0d0d0d"/>
  <text x="24" y="32" fill="#e8e4df" font-size="15" font-weight="bold">계약 계층(인터페이스 분리)과 메서드명 → 쿼리 파생</text>

  <!-- contract chain -->
  <text x="24" y="60" fill="#5b9bd5" font-size="12" font-weight="bold">계약 계층 — 필요한 만큼만 확장</text>
  <rect x="24" y="72" width="150" height="34" rx="4" fill="rgba(138,133,128,0.12)" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <text x="99" y="93" fill="#e8e4df" font-size="10" text-anchor="middle">Repository</text>
  <text x="184" y="93" fill="rgb(138,133,128)" font-size="9">마커 인터페이스(메서드 없음)</text>

  <line x1="99" y1="106" x2="99" y2="116" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#h14)"/>
  <rect x="24" y="118" width="150" height="34" rx="4" fill="rgba(102,187,106,0.12)" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="99" y="139" fill="#e8e4df" font-size="10" text-anchor="middle">CrudRepository</text>
  <text x="184" y="139" fill="rgb(138,133,128)" font-size="9">CRUD 기본 연산 (가장 자주 확장)</text>

  <line x1="99" y1="152" x2="99" y2="162" stroke="#66bb6a" stroke-width="1.2" marker-end="url(#h14g)"/>
  <rect x="24" y="164" width="200" height="34" rx="4" fill="rgba(138,133,128,0.12)" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <text x="124" y="185" fill="#e8e4df" font-size="10" text-anchor="middle">PagingAndSortingRepository</text>
  <text x="234" y="185" fill="rgb(138,133,128)" font-size="9">정렬·페이징 추가</text>

  <line x1="124" y1="198" x2="124" y2="208" stroke="rgb(138,133,128)" stroke-width="1.2" marker-end="url(#h14)"/>
  <rect x="24" y="210" width="95" height="34" rx="4" fill="rgba(91,155,213,0.12)" stroke="#5b9bd5" stroke-width="1.2"/>
  <text x="71" y="231" fill="#e8e4df" font-size="10" text-anchor="middle">JpaRepository</text>
  <rect x="129" y="210" width="110" height="34" rx="4" fill="rgba(91,155,213,0.12)" stroke="#5b9bd5" stroke-width="1.2"/>
  <text x="184" y="231" fill="#e8e4df" font-size="10" text-anchor="middle">MongoRepository</text>
  <text x="24" y="266" fill="rgb(138,133,128)" font-size="9">기술별 모듈이 더 구체적인 계약 제공 (JPA·Mongo 등)</text>

  <!-- query derivation -->
  <text x="400" y="60" fill="rgb(212,168,83)" font-size="12" font-weight="bold">커스텀 연산 — 두 방식</text>
  <rect x="400" y="76" width="296" height="56" rx="5" fill="rgba(138,133,128,0.10)" stroke="rgb(138,133,128)" stroke-width="1"/>
  <text x="412" y="96" fill="#e8e4df" font-size="10" font-weight="bold">① 메서드명 파생</text>
  <text x="412" y="114" fill="#5b9bd5" font-size="9" font-family="monospace">findAccountsByName(String name)</text>
  <text x="412" y="128" fill="rgb(138,133,128)" font-size="9">find→SELECT · By→WHERE name = ?</text>

  <rect x="400" y="144" width="296" height="70" rx="5" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="412" y="164" fill="#e8e4df" font-size="10" font-weight="bold">② @Query 명시 (권장)</text>
  <text x="412" y="182" fill="#66bb6a" font-size="9" font-family="monospace">@Query("SELECT * ... WHERE name=:name")</text>
  <text x="412" y="200" fill="rgb(138,133,128)" font-size="9">변경 쿼리(UPDATE/INSERT/DELETE)는 @Modifying 추가</text>

  <text x="400" y="240" fill="#f44336" font-size="9">메서드명 파생 단점: 긴 이름·리팩터 위험·규칙 학습·기동 지연</text>
  <text x="400" y="258" fill="rgb(138,133,128)" font-size="9">@Id 로 PK 필드 표시 · 제네릭 &lt;엔티티, PK타입&gt;</text>

  <text x="24" y="320" fill="rgb(138,133,128)" font-size="10">인터페이스만 선언하면 Spring Data가 구현 bean을 컨텍스트에 등록 → DI로 주입해 사용</text>

  <defs>
    <marker id="h14" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="rgb(138,133,128)"/></marker>
    <marker id="h14g" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#66bb6a"/></marker>
  </defs>
</svg>
