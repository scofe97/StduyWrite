<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif" role="img" aria-label="앱에서 DBMS까지 연결 스택 — data source와 JDBC 드라이버">
  <rect x="0" y="0" width="720" height="300" fill="#0d0d0d"/>
  <text x="24" y="32" fill="#e8e4df" font-size="15" font-weight="bold">앱에서 DBMS까지 — data source가 연결을 재사용</text>

  <!-- App logic -->
  <rect x="24" y="110" width="120" height="60" rx="6" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="84" y="138" fill="#e8e4df" font-size="11" font-weight="bold" text-anchor="middle">앱 로직</text>
  <text x="84" y="156" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">repository</text>

  <!-- Data source -->
  <rect x="190" y="110" width="130" height="60" rx="6" fill="rgb(102,187,106)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="255" y="135" fill="#0d0d0d" font-size="11" font-weight="bold" text-anchor="middle">Data source</text>
  <text x="255" y="153" fill="#0d0d0d" font-size="9" text-anchor="middle">HikariCP 연결 풀</text>

  <!-- JDBC driver -->
  <rect x="366" y="110" width="130" height="60" rx="6" fill="rgba(91,155,213,0.12)" stroke="#5b9bd5" stroke-width="1.3"/>
  <text x="431" y="135" fill="#e8e4df" font-size="11" font-weight="bold" text-anchor="middle">JDBC 드라이버</text>
  <text x="431" y="153" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">벤더별 런타임 의존성</text>

  <!-- DBMS -->
  <rect x="542" y="110" width="150" height="60" rx="6" fill="rgba(91,155,213,0.12)" stroke="#5b9bd5" stroke-width="1.3"/>
  <text x="617" y="135" fill="#e8e4df" font-size="11" font-weight="bold" text-anchor="middle">DBMS</text>
  <text x="617" y="153" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">MySQL · H2 · Postgres</text>

  <!-- arrows -->
  <line x1="144" y1="140" x2="186" y2="140" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#d12)"/>
  <text x="148" y="132" fill="rgb(138,133,128)" font-size="9">uses</text>
  <line x1="320" y1="140" x2="362" y2="140" stroke="#66bb6a" stroke-width="1.5" marker-end="url(#d12b)"/>
  <text x="324" y="132" fill="rgb(138,133,128)" font-size="9">uses</text>
  <line x1="496" y1="140" x2="538" y2="140" stroke="#5b9bd5" stroke-width="1.5" marker-end="url(#d12c)"/>
  <text x="498" y="132" fill="rgb(138,133,128)" font-size="9">connects</text>

  <!-- captions -->
  <text x="190" y="200" fill="#66bb6a" font-size="10">연결을 재사용 · 필요할 때만 새 연결 요청 · 해제 시 닫음</text>
  <text x="366" y="222" fill="rgb(138,133,128)" font-size="10">JDK는 java.sql 추상화(Connection·Statement·ResultSet)만 제공</text>
  <text x="366" y="240" fill="rgb(138,133,128)" font-size="10">구현은 드라이버가 — H2는 의존성에 포함, MySQL은 별도 추가</text>
  <text x="24" y="222" fill="#f44336" font-size="10">data source 없이 매 연산마다 새 연결 = 네트워크 왕복·재인증 낭비</text>

  <defs>
    <marker id="d12" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="rgb(212,168,83)"/></marker>
    <marker id="d12b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#66bb6a"/></marker>
    <marker id="d12c" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b9bd5"/></marker>
  </defs>
</svg>
