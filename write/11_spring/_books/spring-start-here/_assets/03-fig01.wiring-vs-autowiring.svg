<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 250" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif" role="img" aria-label="wiring과 auto-wiring 두 경로">
  <rect x="0" y="0" width="720" height="250" fill="#0d0d0d"/>
  <text x="24" y="32" fill="#e8e4df" font-size="15" font-weight="bold">두 bean을 잇는 두 경로</text>

  <rect x="40" y="56" width="280" height="150" rx="10" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="60" y="82" fill="rgb(212,168,83)" font-size="13" font-weight="bold">wiring</text>
  <text x="60" y="108" fill="#e8e4df" font-size="11">한 @Bean 메서드가</text>
  <text x="60" y="126" fill="#e8e4df" font-size="11">다른 @Bean 메서드를</text>
  <text x="60" y="144" fill="#e8e4df" font-size="11">직접 호출</text>
  <text x="60" y="178" fill="rgb(138,133,128)" font-family="'JetBrains Mono', monospace" font-size="11">p.setParrot(parrot());</text>

  <rect x="400" y="56" width="280" height="150" rx="10" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="420" y="82" fill="#66bb6a" font-size="13" font-weight="bold">auto-wiring</text>
  <text x="420" y="108" fill="#e8e4df" font-size="11">메서드 파라미터로 받으면</text>
  <text x="420" y="126" fill="#e8e4df" font-size="11">Spring이 타입 맞는 bean을</text>
  <text x="420" y="144" fill="#e8e4df" font-size="11">찾아 주입</text>
  <text x="420" y="178" fill="rgb(138,133,128)" font-family="'JetBrains Mono', monospace" font-size="11">person(Parrot parrot)</text>
</svg>
