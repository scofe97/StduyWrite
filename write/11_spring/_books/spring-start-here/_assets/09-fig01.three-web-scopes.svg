<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif" role="img" aria-label="세 웹 스코프 인스턴스 생성 차이">
  <rect x="0" y="0" width="720" height="320" fill="#0d0d0d"/>
  <text x="24" y="32" fill="#e8e4df" font-size="15" font-weight="bold">스코프별 인스턴스 생성 단위</text>

  <!-- request -->
  <text x="40" y="72" fill="rgb(212,168,83)" font-size="13" font-weight="bold">request</text>
  <text x="40" y="92" fill="rgb(138,133,128)" font-size="10">요청마다 새 인스턴스</text>
  <rect x="40" y="104" width="90" height="36" rx="4" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="85" y="127" fill="#e8e4df" font-size="10" text-anchor="middle">req1 → A</text>
  <rect x="142" y="104" width="90" height="36" rx="4" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="187" y="127" fill="#e8e4df" font-size="10" text-anchor="middle">req2 → B</text>
  <rect x="244" y="104" width="90" height="36" rx="4" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)" stroke-width="1.2"/>
  <text x="289" y="127" fill="#e8e4df" font-size="10" text-anchor="middle">req3 → C</text>

  <!-- session -->
  <text x="400" y="72" fill="#66bb6a" font-size="13" font-weight="bold">session</text>
  <text x="400" y="92" fill="rgb(138,133,128)" font-size="10">세션(클라이언트)마다 1개</text>
  <rect x="400" y="104" width="130" height="36" rx="4" fill="rgba(102,187,106,0.12)" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="465" y="127" fill="#e8e4df" font-size="10" text-anchor="middle">Richard 세션 → X</text>
  <rect x="542" y="104" width="130" height="36" rx="4" fill="rgba(102,187,106,0.12)" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="607" y="127" fill="#e8e4df" font-size="10" text-anchor="middle">Daniella 세션 → Y</text>
  <text x="400" y="162" fill="rgb(138,133,128)" font-size="10">같은 세션의 여러 요청은 같은 인스턴스 공유</text>

  <!-- application -->
  <text x="40" y="210" fill="#5b9bd5" font-size="13" font-weight="bold">application</text>
  <text x="40" y="230" fill="rgb(138,133,128)" font-size="10">앱 전체에 단 1개 — 모든 요청·클라이언트 공유</text>
  <rect x="40" y="242" width="200" height="40" rx="4" fill="rgb(91,155,213)" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="140" y="267" fill="#0d0d0d" font-size="11" font-weight="bold" text-anchor="middle">단일 인스턴스 Z</text>
  <text x="260" y="266" fill="#f44336" font-size="10">동시성 문제 → 실무 비권장(DB 사용)</text>
</svg>
