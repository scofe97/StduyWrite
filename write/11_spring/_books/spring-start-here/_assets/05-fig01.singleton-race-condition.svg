<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif" role="img" aria-label="singleton race condition">
  <rect x="0" y="0" width="720" height="280" fill="#0d0d0d"/>
  <text x="24" y="32" fill="#e8e4df" font-size="15" font-weight="bold">여러 스레드가 한 singleton을 동시 변경 → race condition</text>

  <!-- Context -->
  <rect x="430" y="70" width="260" height="150" rx="12" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="450" y="98" fill="rgb(212,168,83)" font-size="13" font-weight="bold">Spring Context</text>
  <rect x="510" y="120" width="120" height="56" rx="6" fill="rgb(212,168,83)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="570" y="153" fill="#0d0d0d" font-size="12" font-weight="bold" text-anchor="middle">commentRepository</text>
  <text x="450" y="206" fill="#f44336" font-size="11">공유 인스턴스 1개</text>

  <!-- T1, T2 -->
  <text x="40" y="108" fill="#e8e4df" font-size="12" font-weight="bold">T1</text>
  <line x1="60" y1="120" x2="380" y2="120" stroke="rgb(138,133,128)" stroke-width="1.5"/>
  <line x1="220" y1="120" x2="508" y2="144" stroke="#f44336" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arR)"/>
  <text x="40" y="188" fill="#e8e4df" font-size="12" font-weight="bold">T2</text>
  <line x1="60" y1="200" x2="380" y2="200" stroke="rgb(138,133,128)" stroke-width="1.5"/>
  <line x1="220" y1="200" x2="508" y2="158" stroke="#f44336" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arR)"/>
  <text x="40" y="250" fill="#f44336" font-size="11">두 스레드가 같은 인스턴스를 동시에 바꾸면 충돌합니다</text>

  <defs>
    <marker id="arR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#f44336"/></marker>
  </defs>
</svg>
