<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif" role="img" aria-label="Spring Data는 여러 영속 기술 위 공통 추상화 계층">
  <rect x="0" y="0" width="720" height="280" fill="#0d0d0d"/>
  <text x="24" y="32" fill="#e8e4df" font-size="15" font-weight="bold">Spring Data — 여러 영속 기술을 같은 추상화로 묶는 상위 계층</text>

  <!-- app logic -->
  <rect x="60" y="56" width="600" height="46" rx="6" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="360" y="84" fill="#e8e4df" font-size="12" font-weight="bold" text-anchor="middle">Spring 앱 로직 (repository 인터페이스만 선언)</text>

  <!-- spring data layer -->
  <rect x="60" y="116" width="600" height="40" rx="6" fill="rgb(102,187,106)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="360" y="141" fill="#0d0d0d" font-size="12" font-weight="bold" text-anchor="middle">Spring Data — 공통 추상화(계약 인터페이스)</text>

  <!-- persistence techs -->
  <rect x="60" y="174" width="135" height="42" rx="5" fill="rgba(91,155,213,0.12)" stroke="#5b9bd5" stroke-width="1.2"/>
  <text x="127" y="199" fill="#e8e4df" font-size="10" font-weight="bold" text-anchor="middle">Spring Data JDBC</text>
  <rect x="208" y="174" width="135" height="42" rx="5" fill="rgba(91,155,213,0.12)" stroke="#5b9bd5" stroke-width="1.2"/>
  <text x="275" y="199" fill="#e8e4df" font-size="10" font-weight="bold" text-anchor="middle">Spring Data JPA</text>
  <rect x="356" y="174" width="135" height="42" rx="5" fill="rgba(91,155,213,0.12)" stroke="#5b9bd5" stroke-width="1.2"/>
  <text x="423" y="199" fill="#e8e4df" font-size="10" font-weight="bold" text-anchor="middle">Spring Data Mongo</text>
  <rect x="504" y="174" width="156" height="42" rx="5" fill="rgba(91,155,213,0.12)" stroke="#5b9bd5" stroke-width="1.2"/>
  <text x="582" y="199" fill="#e8e4df" font-size="10" font-weight="bold" text-anchor="middle">… 기술별 모듈</text>

  <line x1="360" y1="156" x2="360" y2="170" stroke="#66bb6a" stroke-width="1.4" marker-end="url(#sd14)"/>

  <text x="60" y="244" fill="rgb(138,133,128)" font-size="10">기술마다 API가 다르지만, Spring Data를 쓰면 어느 기술이든 비슷한 방식으로 영속 계층을 작성</text>
  <text x="60" y="262" fill="rgb(138,133,128)" font-size="10">"Spring Data 의존성"은 하나가 아니라 기술별로 따로 — JDBC면 spring-boot-starter-data-jdbc</text>

  <defs>
    <marker id="sd14" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#66bb6a"/></marker>
  </defs>
</svg>
