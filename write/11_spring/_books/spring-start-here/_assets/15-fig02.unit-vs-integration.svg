<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif" role="img" aria-label="단위 테스트와 통합 테스트 비교">
  <rect x="0" y="0" width="720" height="320" fill="#0d0d0d"/>
  <text x="24" y="32" fill="#e8e4df" font-size="15" font-weight="bold">단위 테스트 vs 통합 테스트 — 무엇을 검증하나</text>

  <!-- unit -->
  <rect x="30" y="56" width="320" height="230" rx="6" fill="rgba(102,187,106,0.08)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="190" y="82" fill="#66bb6a" font-size="13" font-weight="bold" text-anchor="middle">단위 테스트 (unit)</text>
  <text x="48" y="108" fill="#e8e4df" font-size="10">한 조각 로직만 격리 검증</text>
  <text x="48" y="130" fill="#e8e4df" font-size="10">모든 의존성을 mock으로 대체</text>
  <text x="48" y="152" fill="#e8e4df" font-size="10">빠르고, 실패 지점을 정확히 가리킴</text>
  <text x="48" y="174" fill="#e8e4df" font-size="10">Spring 컨텍스트 안 띄움</text>
  <rect x="48" y="190" width="284" height="34" rx="4" fill="#cdeccf"/>
  <text x="190" y="212" fill="#14521d" font-size="10" font-weight="bold" text-anchor="middle">@Mock · @InjectMocks · MockitoExtension</text>
  <text x="48" y="248" fill="rgb(138,133,128)" font-size="9">"차 계기판" 비유: 어느 부품이 고장인지 즉시 지목</text>
  <text x="48" y="270" fill="rgb(138,133,128)" font-size="9">컴포넌트 로직 검증의 주력 — 빠른 피드백</text>

  <!-- integration -->
  <rect x="370" y="56" width="326" height="230" rx="6" fill="rgba(91,155,213,0.08)" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="533" y="82" fill="#5b9bd5" font-size="13" font-weight="bold" text-anchor="middle">통합 테스트 (integration)</text>
  <text x="388" y="108" fill="#e8e4df" font-size="10">둘 이상 컴포넌트의 상호작용 검증</text>
  <text x="388" y="130" fill="#e8e4df" font-size="10">일부 의존은 실제 객체로 둠</text>
  <text x="388" y="152" fill="#e8e4df" font-size="10">Spring 컨텍스트를 띄워 bean 구성</text>
  <text x="388" y="174" fill="#e8e4df" font-size="10">프레임워크 기능 연동까지 확인</text>
  <rect x="388" y="190" width="290" height="34" rx="4" fill="#dceaf7"/>
  <text x="533" y="212" fill="#10243a" font-size="10" font-weight="bold" text-anchor="middle">@SpringBootTest · @MockBean · @Autowired</text>
  <text x="388" y="248" fill="rgb(138,133,128)" font-size="9">"연료는 찼는데 연료관이 막힘" — 격리로는 못 잡는 결함</text>
  <text x="388" y="270" fill="rgb(138,133,128)" font-size="9">느림 → 프레임워크 연동 시나리오에만 한정 사용</text>

  <text x="24" y="306" fill="rgb(138,133,128)" font-size="10">실무: 로직 검증은 단위 테스트 주력 · 프레임워크 연동(트랜잭션·보안·캐시) 검증만 통합 테스트 · DB는 H2 인메모리</text>
</svg>
