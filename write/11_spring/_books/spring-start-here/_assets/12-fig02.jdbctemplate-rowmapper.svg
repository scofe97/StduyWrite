<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif" role="img" aria-label="JdbcTemplate의 update와 query+RowMapper 흐름">
  <rect x="0" y="0" width="720" height="320" fill="#0d0d0d"/>
  <text x="24" y="32" fill="#e8e4df" font-size="15" font-weight="bold">JdbcTemplate — 변경은 update(), 조회는 query()+RowMapper</text>

  <!-- update path -->
  <text x="24" y="64" fill="rgb(212,168,83)" font-size="12" font-weight="bold">변경 (INSERT/UPDATE/DELETE)</text>
  <rect x="24" y="76" width="150" height="44" rx="5" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="99" y="98" fill="#e8e4df" font-size="10" text-anchor="middle">jdbc.update(</text>
  <text x="99" y="113" fill="#e8e4df" font-size="10" text-anchor="middle">sql, 파라미터...)</text>
  <line x1="174" y1="98" x2="226" y2="98" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#j12)"/>
  <rect x="230" y="76" width="200" height="44" rx="5" fill="rgba(212,168,83,0.07)" stroke="rgb(212,168,83)" stroke-width="1"/>
  <text x="330" y="94" fill="#e8e4df" font-size="9" text-anchor="middle">연결 획득 · statement 생성</text>
  <text x="330" y="110" fill="#e8e4df" font-size="9" text-anchor="middle">SQLException 처리까지 자동</text>
  <text x="450" y="102" fill="rgb(138,133,128)" font-size="10">? 자리에 파라미터 순서대로 바인딩</text>

  <!-- query path -->
  <text x="24" y="166" fill="#5b9bd5" font-size="12" font-weight="bold">조회 (SELECT)</text>
  <rect x="24" y="178" width="150" height="44" rx="5" fill="rgba(91,155,213,0.12)" stroke="#5b9bd5" stroke-width="1.3"/>
  <text x="99" y="200" fill="#e8e4df" font-size="10" text-anchor="middle">jdbc.query(</text>
  <text x="99" y="215" fill="#e8e4df" font-size="10" text-anchor="middle">sql, rowMapper)</text>

  <line x1="174" y1="200" x2="226" y2="200" stroke="#5b9bd5" stroke-width="1.5" marker-end="url(#j12b)"/>
  <rect x="230" y="178" width="130" height="44" rx="5" fill="rgba(91,155,213,0.07)" stroke="#5b9bd5" stroke-width="1"/>
  <text x="295" y="196" fill="#e8e4df" font-size="9" text-anchor="middle">ResultSet</text>
  <text x="295" y="212" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">DB가 돌려준 행들</text>

  <line x1="360" y1="200" x2="412" y2="200" stroke="#5b9bd5" stroke-width="1.5" marker-end="url(#j12b)"/>
  <rect x="416" y="178" width="140" height="44" rx="5" fill="rgb(91,155,213)" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="486" y="196" fill="#0d0d0d" font-size="10" font-weight="bold" text-anchor="middle">RowMapper</text>
  <text x="486" y="212" fill="#0d0d0d" font-size="9" text-anchor="middle">행 1개 → 객체 1개</text>

  <line x1="556" y1="200" x2="608" y2="200" stroke="#5b9bd5" stroke-width="1.5" marker-end="url(#j12b)"/>
  <rect x="612" y="178" width="96" height="44" rx="5" fill="rgba(102,187,106,0.12)" stroke="#66bb6a" stroke-width="1.3"/>
  <text x="660" y="203" fill="#e8e4df" font-size="10" font-weight="bold" text-anchor="middle">List&lt;T&gt;</text>

  <text x="416" y="248" fill="rgb(138,133,128)" font-size="9">(r, i) → r은 ResultSet, i는 행 번호 · 각 행마다 호출</text>

  <text x="24" y="294" fill="rgb(138,133,128)" font-size="10">공통: data source에서 연결을 받아 쓰고, 보일러플레이트(try-catch·자원 해제)를 JdbcTemplate이 대신함</text>

  <defs>
    <marker id="j12" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="rgb(212,168,83)"/></marker>
    <marker id="j12b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b9bd5"/></marker>
  </defs>
</svg>
