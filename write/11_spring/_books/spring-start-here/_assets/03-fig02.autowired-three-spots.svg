<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif" role="img" aria-label="@Autowired 세 가지 주입 위치">
  <rect x="0" y="0" width="720" height="200" fill="#0d0d0d"/>
  <text x="24" y="32" fill="#e8e4df" font-size="15" font-weight="bold">@Autowired 세 가지 위치</text>

  <rect x="36" y="52" width="200" height="120" rx="8" fill="rgba(138,133,128,0.12)" stroke="rgb(138,133,128)" stroke-width="1.5"/>
  <text x="56" y="78" fill="#e8e4df" font-size="13" font-weight="bold">필드</text>
  <text x="56" y="104" fill="rgb(138,133,128)" font-size="11">예제·PoC·테스트용</text>
  <text x="56" y="126" fill="#f44336" font-size="11">final 불가, 테스트 불편</text>
  <text x="56" y="148" fill="rgb(138,133,128)" font-size="11">→ 운영코드 비권장</text>

  <rect x="260" y="52" width="200" height="120" rx="8" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="280" y="78" fill="rgb(212,168,83)" font-size="13" font-weight="bold">생성자 (권장)</text>
  <text x="280" y="104" fill="#e8e4df" font-size="11">실무 표준</text>
  <text x="280" y="126" fill="#66bb6a" font-size="11">final 가능, 테스트 쉬움</text>
  <text x="280" y="148" fill="rgb(138,133,128)" font-size="11">생성자 1개면 생략 가능</text>

  <rect x="484" y="52" width="200" height="120" rx="8" fill="rgba(138,133,128,0.12)" stroke="rgb(138,133,128)" stroke-width="1.5"/>
  <text x="504" y="78" fill="#e8e4df" font-size="13" font-weight="bold">세터</text>
  <text x="504" y="104" fill="rgb(138,133,128)" font-size="11">가독성 낮음</text>
  <text x="504" y="126" fill="#f44336" font-size="11">final 불가</text>
  <text x="504" y="148" fill="rgb(138,133,128)" font-size="11">→ 거의 안 씀</text>
</svg>
