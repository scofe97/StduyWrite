<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 230" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif" role="img" aria-label="동적 뷰 데이터 흐름">
  <rect x="0" y="0" width="720" height="230" fill="#0d0d0d"/>
  <text x="24" y="32" fill="#e8e4df" font-size="15" font-weight="bold">컨트롤러가 Model에 데이터를 담아 뷰로 보냅니다</text>

  <rect x="40" y="70" width="150" height="60" rx="6" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="115" y="98" fill="rgb(212,168,83)" font-size="12" font-weight="bold" text-anchor="middle">Controller</text>
  <text x="115" y="118" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">addAttribute</text>

  <line x1="190" y1="100" x2="310" y2="100" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#ar8)"/>
  <text x="250" y="92" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">Model (key=value)</text>

  <rect x="310" y="70" width="150" height="60" rx="6" fill="rgba(102,187,106,0.12)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="385" y="98" fill="#66bb6a" font-size="12" font-weight="bold" text-anchor="middle">View (Thymeleaf)</text>
  <text x="385" y="118" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">th:text=${key}</text>

  <line x1="460" y1="100" x2="580" y2="100" stroke="rgb(138,133,128)" stroke-width="1.5" marker-end="url(#ar8b)"/>
  <text x="520" y="92" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">렌더된 HTML</text>

  <rect x="580" y="70" width="110" height="60" rx="6" fill="#0d0d0d" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <text x="635" y="104" fill="#e8e4df" font-size="12" text-anchor="middle">브라우저</text>

  <text x="40" y="180" fill="rgb(138,133,128)" font-size="11">같은 뷰라도 컨트롤러가 보내는 데이터에 따라 다른 화면이 나옵니다</text>

  <defs>
    <marker id="ar8" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="rgb(212,168,83)"/></marker>
    <marker id="ar8b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="rgb(138,133,128)"/></marker>
  </defs>
</svg>
