<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif" role="img" aria-label="테스트 3단(Given/When/Then)과 mock으로 의존성 격리">
  <rect x="0" y="0" width="720" height="320" fill="#0d0d0d"/>
  <text x="24" y="32" fill="#e8e4df" font-size="15" font-weight="bold">테스트 3단 — Given · When · Then, 그리고 mock 격리</text>

  <!-- three parts -->
  <rect x="24" y="56" width="210" height="80" rx="6" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="129" y="80" fill="rgb(212,168,83)" font-size="12" font-weight="bold" text-anchor="middle">① Given (전제)</text>
  <text x="40" y="102" fill="#e8e4df" font-size="9">입력값 정의 + 의존성 제어</text>
  <text x="40" y="118" fill="rgb(138,133,128)" font-size="9">mock(...) / @Mock / given().willReturn()</text>

  <rect x="254" y="56" width="200" height="80" rx="6" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="1.3"/>
  <text x="354" y="80" fill="#66bb6a" font-size="12" font-weight="bold" text-anchor="middle">② When (실행)</text>
  <text x="270" y="102" fill="#e8e4df" font-size="9">테스트 대상 메서드 호출</text>
  <text x="270" y="118" fill="rgb(138,133,128)" font-size="9">transferService.transferMoney(...)</text>

  <rect x="474" y="56" width="222" height="80" rx="6" fill="rgba(91,155,213,0.10)" stroke="#5b9bd5" stroke-width="1.3"/>
  <text x="585" y="80" fill="#5b9bd5" font-size="12" font-weight="bold" text-anchor="middle">③ Then (검증)</text>
  <text x="490" y="102" fill="#e8e4df" font-size="9">기대 동작 단언</text>
  <text x="490" y="118" fill="rgb(138,133,128)" font-size="8">verify() / assertEquals() / assertThrows()</text>

  <line x1="234" y1="96" x2="250" y2="96" stroke="#e8e4df" stroke-width="1.3" marker-end="url(#tt15)"/>
  <line x1="454" y1="96" x2="470" y2="96" stroke="#e8e4df" stroke-width="1.3" marker-end="url(#tt15)"/>

  <!-- mock isolation -->
  <text x="24" y="178" fill="#e8e4df" font-size="12" font-weight="bold">단위 테스트는 의존성을 mock으로 끊어 한 조각만 검증</text>

  <rect x="60" y="196" width="150" height="50" rx="6" fill="rgba(102,187,106,0.12)" stroke="#66bb6a" stroke-width="1.3"/>
  <text x="135" y="220" fill="#e8e4df" font-size="10" font-weight="bold" text-anchor="middle">TransferService</text>
  <text x="135" y="237" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">테스트 대상</text>

  <rect x="430" y="196" width="170" height="50" rx="6" fill="rgba(138,133,128,0.12)" stroke="rgb(138,133,128)" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="515" y="220" fill="#e8e4df" font-size="10" font-weight="bold" text-anchor="middle">AccountRepository</text>
  <text x="515" y="237" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">mock(가짜 객체)</text>

  <line x1="210" y1="221" x2="426" y2="221" stroke="#f44336" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="300" y="214" fill="#f44336" font-size="11" font-weight="bold">✕ 실제 의존 끊음</text>
  <text x="300" y="240" fill="rgb(138,133,128)" font-size="9">findById는 mock이 정해진 값 반환</text>

  <text x="24" y="290" fill="rgb(138,133,128)" font-size="10">@Mock + @InjectMocks + @ExtendWith(MockitoExtension.class) 로 선언형 구성도 가능</text>
  <text x="24" y="308" fill="rgb(138,133,128)" font-size="10">통합 테스트는 일부 의존을 실제 객체로 두어 상호작용을 검증 (mock 강제 아님)</text>

  <defs>
    <marker id="tt15" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e8e4df"/></marker>
  </defs>
</svg>
