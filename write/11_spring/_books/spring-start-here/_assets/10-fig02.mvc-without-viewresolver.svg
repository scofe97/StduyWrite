<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif" role="img" aria-label="REST 엔드포인트에서는 ViewResolver가 사라진 Spring MVC 흐름">
  <rect x="0" y="0" width="720" height="280" fill="#0d0d0d"/>
  <text x="24" y="32" fill="#e8e4df" font-size="15" font-weight="bold">REST에서의 Spring MVC 흐름 — ViewResolver 없음</text>

  <!-- client -->
  <rect x="24" y="100" width="100" height="50" rx="6" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)" stroke-width="1.3"/>
  <text x="74" y="130" fill="#e8e4df" font-size="11" font-weight="bold" text-anchor="middle">클라이언트</text>

  <!-- dispatcher -->
  <rect x="180" y="100" width="120" height="50" rx="6" fill="rgb(91,155,213)" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="240" y="123" fill="#0d0d0d" font-size="11" font-weight="bold" text-anchor="middle">Dispatcher</text>
  <text x="240" y="139" fill="#0d0d0d" font-size="11" font-weight="bold" text-anchor="middle">Servlet</text>

  <!-- controller -->
  <rect x="360" y="100" width="120" height="50" rx="6" fill="rgba(102,187,106,0.12)" stroke="#66bb6a" stroke-width="1.3"/>
  <text x="420" y="123" fill="#e8e4df" font-size="11" font-weight="bold" text-anchor="middle">Controller</text>
  <text x="420" y="139" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">액션이 데이터 반환</text>

  <!-- removed viewresolver -->
  <rect x="540" y="100" width="150" height="50" rx="6" fill="none" stroke="#f44336" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="615" y="123" fill="#f44336" font-size="11" text-anchor="middle">ViewResolver</text>
  <text x="615" y="139" fill="#f44336" font-size="10" text-anchor="middle">REST에서는 사라짐</text>

  <!-- arrows forward -->
  <line x1="124" y1="118" x2="176" y2="118" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#f10)"/>
  <line x1="300" y1="118" x2="356" y2="118" stroke="#5b9bd5" stroke-width="1.5" marker-end="url(#f10b)"/>
  <text x="130" y="110" fill="rgb(138,133,128)" font-size="9">① 요청</text>
  <text x="305" y="110" fill="rgb(138,133,128)" font-size="9">② 매핑</text>

  <!-- return arrow controller -> dispatcher -->
  <line x1="360" y1="135" x2="304" y2="135" stroke="#66bb6a" stroke-width="1.5" marker-end="url(#f10c)"/>
  <!-- dispatcher -> client response -->
  <path d="M200 150 L200 210 L74 210 L74 154" fill="none" stroke="#5b9bd5" stroke-width="1.5" marker-end="url(#f10b)"/>
  <text x="120" y="228" fill="rgb(138,133,128)" font-size="10">③ 반환값을 그대로 HTTP 응답 본문으로 전송 (뷰 렌더링 없음)</text>

  <defs>
    <marker id="f10" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="rgb(212,168,83)"/></marker>
    <marker id="f10b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5b9bd5"/></marker>
    <marker id="f10c" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#66bb6a"/></marker>
  </defs>
</svg>
