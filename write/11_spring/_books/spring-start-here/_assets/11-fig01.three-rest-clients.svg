<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif" role="img" aria-label="REST 엔드포인트 호출 세 가지 방식 비교">
  <rect x="0" y="0" width="720" height="320" fill="#0d0d0d"/>
  <text x="24" y="32" fill="#e8e4df" font-size="15" font-weight="bold">REST 호출 세 방식 — 무엇을 언제 쓰나</text>

  <!-- OpenFeign -->
  <rect x="30" y="60" width="200" height="220" rx="6" fill="rgba(102,187,106,0.10)" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="130" y="86" fill="#66bb6a" font-size="13" font-weight="bold" text-anchor="middle">OpenFeign</text>
  <text x="130" y="106" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">Spring Cloud</text>
  <text x="48" y="138" fill="#e8e4df" font-size="11">신규 앱 권장</text>
  <text x="48" y="160" fill="#e8e4df" font-size="10">인터페이스만 선언</text>
  <text x="48" y="178" fill="#e8e4df" font-size="10">구현은 Spring이 제공</text>
  <text x="48" y="196" fill="#e8e4df" font-size="10">애너테이션 10장과 동일</text>
  <text x="48" y="214" fill="#e8e4df" font-size="10">보일러플레이트 최소</text>
  <rect x="48" y="232" width="164" height="30" rx="4" fill="#cdeccf"/>
  <text x="130" y="252" fill="#14521d" font-size="10" font-weight="bold" text-anchor="middle">비리액티브 = 1순위</text>

  <!-- RestTemplate -->
  <rect x="258" y="60" width="200" height="220" rx="6" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="1.5"/>
  <text x="358" y="86" fill="rgb(212,168,83)" font-size="13" font-weight="bold" text-anchor="middle">RestTemplate</text>
  <text x="358" y="106" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">Spring 3부터</text>
  <text x="276" y="138" fill="#e8e4df" font-size="11">유지보수 모드(5+)</text>
  <text x="276" y="160" fill="#e8e4df" font-size="10">신규 앱에는 비권장</text>
  <text x="276" y="178" fill="#e8e4df" font-size="10">HttpHeaders + HttpEntity</text>
  <text x="276" y="196" fill="#e8e4df" font-size="10">exchange()로 호출</text>
  <text x="276" y="214" fill="#e8e4df" font-size="10">코드가 더 장황</text>
  <rect x="276" y="232" width="164" height="30" rx="4" fill="#f5edda"/>
  <text x="358" y="252" fill="#7a5a14" font-size="10" font-weight="bold" text-anchor="middle">기존 앱에서 여전히 흔함</text>

  <!-- WebClient -->
  <rect x="486" y="60" width="204" height="220" rx="6" fill="rgba(91,155,213,0.10)" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="588" y="86" fill="#5b9bd5" font-size="13" font-weight="bold" text-anchor="middle">WebClient</text>
  <text x="588" y="106" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">WebFlux · 리액티브</text>
  <text x="504" y="138" fill="#e8e4df" font-size="11">리액티브 앱 전용</text>
  <text x="504" y="160" fill="#e8e4df" font-size="10">Mono · Flux 반환</text>
  <text x="504" y="178" fill="#e8e4df" font-size="10">논블로킹 I/O</text>
  <text x="504" y="196" fill="#e8e4df" font-size="10">스레드 idle 줄임</text>
  <text x="504" y="214" fill="#e8e4df" font-size="10">선행 학습 필요</text>
  <rect x="504" y="232" width="168" height="30" rx="4" fill="#dceaf7"/>
  <text x="588" y="252" fill="#10243a" font-size="10" font-weight="bold" text-anchor="middle">리액티브일 때만 선택</text>

  <text x="24" y="304" fill="rgb(138,133,128)" font-size="10">권장: 비리액티브 → OpenFeign · 리액티브 → WebClient · 신규 앱 RestTemplate 회피</text>
</svg>
