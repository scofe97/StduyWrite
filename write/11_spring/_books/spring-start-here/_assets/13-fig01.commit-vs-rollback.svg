<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif" role="img" aria-label="트랜잭션의 commit과 rollback">
  <rect x="0" y="0" width="720" height="320" fill="#0d0d0d"/>
  <text x="24" y="32" fill="#e8e4df" font-size="15" font-weight="bold">트랜잭션 — 모두 성공하면 commit, 하나라도 실패하면 rollback</text>

  <!-- start state -->
  <rect x="24" y="60" width="150" height="40" rx="5" fill="rgba(138,133,128,0.12)" stroke="rgb(138,133,128)" stroke-width="1.2"/>
  <text x="99" y="78" fill="#e8e4df" font-size="10" text-anchor="middle">시작 시점</text>
  <text x="99" y="93" fill="rgb(138,133,128)" font-size="9" text-anchor="middle">John 1000 · Jane 500</text>

  <!-- commit path -->
  <text x="24" y="138" fill="#66bb6a" font-size="12" font-weight="bold">성공 경로 — commit</text>
  <rect x="24" y="150" width="120" height="36" rx="4" fill="rgba(102,187,106,0.12)" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="84" y="172" fill="#e8e4df" font-size="9" text-anchor="middle">출금: John -100</text>
  <line x1="144" y1="168" x2="180" y2="168" stroke="#66bb6a" stroke-width="1.4" marker-end="url(#t13g)"/>
  <rect x="184" y="150" width="120" height="36" rx="4" fill="rgba(102,187,106,0.12)" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="244" y="172" fill="#e8e4df" font-size="9" text-anchor="middle">입금: Jane +100</text>
  <line x1="304" y1="168" x2="340" y2="168" stroke="#66bb6a" stroke-width="1.4" marker-end="url(#t13g)"/>
  <rect x="344" y="148" width="130" height="40" rx="4" fill="#cdeccf"/>
  <text x="409" y="166" fill="#14521d" font-size="10" font-weight="bold" text-anchor="middle">commit</text>
  <text x="409" y="180" fill="#14521d" font-size="9" text-anchor="middle">John 900 · Jane 600</text>
  <text x="490" y="172" fill="#66bb6a" font-size="9">모든 변경을 영속화</text>

  <!-- rollback path -->
  <text x="24" y="234" fill="#f44336" font-size="12" font-weight="bold">실패 경로 — rollback</text>
  <rect x="24" y="246" width="120" height="36" rx="4" fill="rgba(102,187,106,0.12)" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="84" y="268" fill="#e8e4df" font-size="9" text-anchor="middle">출금: John -100</text>
  <line x1="144" y1="264" x2="180" y2="264" stroke="rgb(138,133,128)" stroke-width="1.4" marker-end="url(#t13gr)"/>
  <rect x="184" y="246" width="120" height="36" rx="4" fill="rgba(244,67,54,0.15)" stroke="#f44336" stroke-width="1.2"/>
  <text x="244" y="268" fill="#e8e4df" font-size="9" text-anchor="middle">입금 실패(예외)</text>
  <line x1="304" y1="264" x2="340" y2="264" stroke="#f44336" stroke-width="1.4" marker-end="url(#t13r)"/>
  <rect x="344" y="244" width="130" height="40" rx="4" fill="#f2d4d4"/>
  <text x="409" y="262" fill="#7a1f1f" font-size="10" font-weight="bold" text-anchor="middle">rollback</text>
  <text x="409" y="276" fill="#7a1f1f" font-size="9" text-anchor="middle">John 1000 · Jane 500</text>
  <text x="490" y="268" fill="#f44336" font-size="9">시작 시점으로 복원 (돈 사라지지 않음)</text>

  <defs>
    <marker id="t13g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#66bb6a"/></marker>
    <marker id="t13gr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="rgb(138,133,128)"/></marker>
    <marker id="t13r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#f44336"/></marker>
  </defs>
</svg>
