<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif" role="img" aria-label="빈 Context에서 bean 등록까지">
  <rect x="0" y="0" width="720" height="300" fill="#0d0d0d"/>
  <text x="24" y="34" fill="#e8e4df" font-size="15" font-weight="bold">객체를 만들어도 Context에 올리기 전에는 Spring이 모릅니다</text>

  <!-- 좌: 객체만 생성 -->
  <text x="60" y="78" fill="rgb(138,133,128)" font-size="12">① 객체 생성</text>
  <rect x="48" y="92" width="120" height="56" fill="rgba(138,133,128,0.18)" stroke="rgb(138,133,128)" stroke-width="1.5"/>
  <text x="108" y="116" fill="#e8e4df" font-size="12" text-anchor="middle">Parrot</text>
  <text x="108" y="134" fill="rgb(138,133,128)" font-size="10" text-anchor="middle">new Parrot()</text>
  <text x="108" y="172" fill="#f44336" font-size="11" text-anchor="middle">Context 밖 — 안 보임</text>

  <!-- 화살표 -->
  <line x1="180" y1="120" x2="250" y2="120" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arrB)"/>
  <text x="215" y="110" fill="rgb(212,168,83)" font-size="11" text-anchor="middle">등록</text>

  <!-- 우: Context 안에 bean -->
  <text x="430" y="78" fill="rgb(212,168,83)" font-size="12">② Context에 올림 → bean</text>
  <rect x="290" y="92" width="380" height="160" rx="12" fill="rgba(212,168,83,0.10)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <text x="310" y="116" fill="rgb(212,168,83)" font-size="13" font-weight="bold">Spring Context</text>
  <rect x="330" y="140" width="120" height="52" fill="#0d0d0d" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="390" y="170" fill="#e8e4df" font-size="12" text-anchor="middle">parrot (bean)</text>
  <text x="310" y="232" fill="rgb(138,133,128)" font-size="11">이제 Spring이 보고 관리합니다</text>

  <defs>
    <marker id="arrB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
</svg>
