<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif" role="img" aria-label="IoC 전후 비교 도식">
  <rect x="0" y="0" width="700" height="460" fill="#0d0d0d"/>

  <!-- 상단: Without IoC -->
  <text x="24" y="34" fill="#e8e4df" font-size="15" font-weight="bold">Without IoC</text>
  <rect x="40" y="50" width="380" height="120" fill="none" stroke="rgb(138,133,128)" stroke-width="1.5"/>
  <rect x="64" y="76" width="96" height="44" fill="rgba(138,133,128,0.18)" stroke="rgb(138,133,128)" stroke-width="1"/>
  <text x="112" y="103" fill="#e8e4df" font-size="11" text-anchor="middle">Dependency</text>
  <rect x="188" y="76" width="96" height="44" fill="rgba(138,133,128,0.18)" stroke="rgb(138,133,128)" stroke-width="1"/>
  <text x="236" y="103" fill="#e8e4df" font-size="11" text-anchor="middle">Dependency</text>
  <rect x="312" y="76" width="84" height="44" fill="rgba(138,133,128,0.18)" stroke="rgb(138,133,128)" stroke-width="1"/>
  <text x="354" y="103" fill="#e8e4df" font-size="11" text-anchor="middle">Dependency</text>
  <!-- Application 화살표 -->
  <text x="44" y="200" fill="#e8e4df" font-size="12" font-weight="bold">Application (앱)</text>
  <line x1="60" y1="186" x2="110" y2="122" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arrowA)"/>
  <line x1="80" y1="186" x2="230" y2="122" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arrowA)"/>
  <line x1="100" y1="186" x2="348" y2="122" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arrowA)"/>
  <text x="250" y="160" fill="rgb(212,168,83)" font-size="11">Controls</text>
  <text x="450" y="96" fill="rgb(138,133,128)" font-size="12">앱이 실행되며 필요한</text>
  <text x="450" y="116" fill="rgb(138,133,128)" font-size="12">의존성을 제어(사용)합니다</text>

  <!-- 구분선 -->
  <line x1="24" y1="240" x2="676" y2="240" stroke="rgb(42,37,32)" stroke-width="1"/>

  <!-- 하단: With IoC -->
  <text x="24" y="278" fill="rgb(212,168,83)" font-size="15" font-weight="bold">With IoC</text>
  <rect x="40" y="296" width="380" height="120" fill="rgba(212,168,83,0.12)" stroke="rgb(212,168,83)" stroke-width="2"/>
  <rect x="150" y="332" width="160" height="48" fill="#0d0d0d" stroke="#e8e4df" stroke-width="1.5"/>
  <text x="230" y="361" fill="#e8e4df" font-size="12" text-anchor="middle">Application (앱)</text>
  <line x1="80" y1="396" x2="172" y2="368" stroke="rgb(212,168,83)" stroke-width="1.5" marker-end="url(#arrowA)"/>
  <text x="84" y="408" fill="rgb(212,168,83)" font-size="11">Controls</text>
  <text x="44" y="440" fill="#e8e4df" font-size="12" font-weight="bold">Framework (dependency)</text>
  <text x="450" y="342" fill="rgb(138,133,128)" font-size="12">앱이 프레임워크(의존성)에</text>
  <text x="450" y="362" fill="rgb(138,133,128)" font-size="12">의해 제어되며 실행됩니다</text>

  <defs>
    <marker id="arrowA" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
</svg>
