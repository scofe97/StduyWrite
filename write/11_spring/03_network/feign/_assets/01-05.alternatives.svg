<svg viewBox="0 0 760 400" width="100%" xmlns="http://www.w3.org/2000/svg" role="img"
     font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>선언적 HTTP 클라이언트 — OpenFeign vs @HttpExchange</title>
  <desc>두 선언적 인터페이스를 비교한다. OpenFeign 은 자체 Client 와 Spring Cloud 통합을 가진다. @HttpExchange 는 Spring Framework 6 내장이며 HttpServiceProxyFactory 가 RestClient·WebClient 어댑터로 전송한다. 결정은 프로젝트 맥락으로 갈린다.</desc>

  <rect x="0" y="0" width="760" height="400" fill="#0d0d0d"/>

  <text x="32" y="44" fill="rgb(212,168,83)" font-size="19" font-weight="bold">선언적 HTTP 클라이언트 두 갈래</text>

  <!-- 왼쪽: OpenFeign -->
  <rect x="32" y="76" width="340" height="220" rx="8" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="52" y="106" fill="#e8e4df" font-size="15" font-weight="bold">OpenFeign</text>
  <text x="52" y="128" fill="rgb(138,133,128)" font-size="12">커뮤니티 유지보수 (Netflix → OpenFeign)</text>

  <text x="52" y="160" fill="#e8e4df" font-size="13">· 자체 Client 추상화</text>
  <text x="68" y="180" fill="rgb(138,133,128)" font-size="12">Apache HC · OkHttp 교체 가능</text>
  <text x="52" y="206" fill="#e8e4df" font-size="13">· Spring Cloud 통합이 강점</text>
  <text x="68" y="226" fill="rgb(138,133,128)" font-size="12">LoadBalancer · CircuitBreaker 기성 배선</text>
  <text x="52" y="252" fill="#e8e4df" font-size="13">· 블로킹 모델</text>
  <text x="68" y="272" fill="rgb(138,133,128)" font-size="12">spring-cloud-starter-openfeign 필요</text>

  <!-- 오른쪽: @HttpExchange -->
  <rect x="388" y="76" width="340" height="220" rx="8" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="408" y="106" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="15" font-weight="bold">@HttpExchange</text>
  <text x="408" y="128" fill="rgb(138,133,128)" font-size="12">Spring Framework 6 내장 (별도 starter 없음)</text>

  <text x="408" y="160" fill="#e8e4df" font-size="13">· 전송을 직접 하지 않음</text>
  <text x="424" y="180" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="11">HttpServiceProxyFactory</text>
  <text x="408" y="206" fill="#e8e4df" font-size="13">· 어댑터로 백엔드 결정</text>
  <text x="424" y="226" fill="rgb(138,133,128)" font-size="12">RestClient(동기) · WebClient(리액티브)</text>
  <text x="408" y="252" fill="#e8e4df" font-size="13">· Spring 기존 클라이언트 재사용</text>
  <text x="424" y="272" fill="rgb(138,133,128)" font-size="12">신규 Spring 6+ 프로젝트의 1순위</text>

  <!-- 결정 기준 하단 바 -->
  <rect x="32" y="320" width="696" height="56" rx="6" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="52" y="344" fill="rgb(212,168,83)" font-size="13" font-weight="bold">결정 기준</text>
  <text x="52" y="366" fill="#e8e4df" font-size="12">기존 Feign 자산 · Cloud 기성 통합이 핵심 → OpenFeign / 신규 · 프레임워크 표준 · 리액티브 → @HttpExchange</text>
</svg>
