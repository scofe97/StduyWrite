<svg viewBox="0 0 760 470" width="100%" xmlns="http://www.w3.org/2000/svg" role="img"
     font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>OpenFeign 에러 모델 — 상태 코드 실패 vs 무응답 실패</title>
  <desc>HTTP 응답을 받았는지로 두 경로가 갈린다. 응답을 받으면 ErrorDecoder 가 FeignException 을 만들고, 받지 못하면 errorExecuting 이 RetryableException 을 만들어 Retryer 로 넘긴다. 기본 Retryer 는 NEVER_RETRY 라 즉시 전파된다.</desc>

  <rect x="0" y="0" width="760" height="470" fill="#0d0d0d"/>

  <!-- 제목 -->
  <text x="32" y="44" fill="rgb(212,168,83)" font-size="19" font-weight="bold">Feign 에러 모델 — 분기 기준은 "응답을 받았는가"</text>

  <!-- 시작 노드 -->
  <rect x="290" y="70" width="180" height="46" rx="6" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="380" y="92" fill="#e8e4df" font-size="13" text-anchor="middle">Feign 호출</text>
  <text x="380" y="108" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="11" text-anchor="middle">client.getStore(id)</text>

  <!-- 분기 다이아몬드(사각 회전 대신 라벨 박스) -->
  <rect x="280" y="150" width="200" height="44" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="380" y="178" fill="#e8e4df" font-size="14" text-anchor="middle" font-weight="bold">HTTP 응답을 받았는가</text>

  <!-- 왼쪽 화살표 라벨 -->
  <text x="210" y="232" fill="#66bb6a" font-size="12" text-anchor="middle">예 · 상태 코드 있음</text>
  <!-- 오른쪽 화살표 라벨 -->
  <text x="566" y="232" fill="#f44336" font-size="12" text-anchor="middle">아니오 · IOException</text>

  <!-- 분기선 -->
  <line x1="330" y1="194" x2="200" y2="250" stroke="#66bb6a" stroke-width="2"/>
  <line x1="430" y1="194" x2="566" y2="250" stroke="#f44336" stroke-width="2"/>

  <!-- ===== 왼쪽: 상태-경로 ===== -->
  <rect x="40" y="252" width="320" height="180" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-dasharray="4 4"/>
  <text x="56" y="276" fill="rgb(138,133,128)" font-size="12">상태-경로 (응답 수신)</text>

  <rect x="56" y="290" width="288" height="58" rx="6" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="72" y="314" fill="#e8e4df" font-size="13">ResponseHandler 가 응답 디코딩</text>
  <text x="72" y="334" fill="rgb(138,133,128)" font-size="12">2xx 면 정상 반환, 4xx·5xx 면 아래로</text>

  <rect x="56" y="360" width="288" height="58" rx="6" fill="rgba(244,67,54,0.12)" stroke="#f44336"/>
  <text x="72" y="384" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="12">ErrorDecoder.decode()</text>
  <text x="72" y="404" fill="rgb(138,133,128)" font-size="12">→ FeignException 생성</text>

  <!-- ===== 오른쪽: 무응답-경로 ===== -->
  <rect x="400" y="252" width="320" height="180" rx="8" fill="none" stroke="rgb(42,37,32)" stroke-dasharray="4 4"/>
  <text x="416" y="276" fill="rgb(138,133,128)" font-size="12">무응답-경로 (전송 단계 실패)</text>

  <rect x="416" y="290" width="288" height="58" rx="6" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="432" y="314" fill="#e8e4df" font-size="13">timeout · connection-refused · DNS</text>
  <text x="432" y="334" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="12">errorExecuting → RetryableException</text>

  <rect x="416" y="360" width="288" height="58" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="432" y="384" fill="#e8e4df" font-size="13">Retryer 가 재시도 여부 결정</text>
  <text x="432" y="404" fill="rgb(138,133,128)" font-family="'JetBrains Mono',monospace" font-size="12">기본값 NEVER_RETRY → 즉시 전파</text>

  <!-- 하단 메모 -->
  <text x="32" y="456" fill="rgb(138,133,128)" font-size="12">ErrorDecoder 는 응답이 있을 때만 호출된다 — 무응답 실패는 그 단계에 닿지 못한다.</text>
</svg>
