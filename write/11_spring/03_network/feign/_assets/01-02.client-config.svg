<svg viewBox="0 0 760 440" width="100%" xmlns="http://www.w3.org/2000/svg" role="img"
     font-family="'Pretendard', -apple-system, 'Noto Sans KR', sans-serif">
  <title>@FeignClient 5속성과 설정 우선순위</title>
  <desc>@FeignClient 의 다섯 속성 name, url, configuration, fallback, contextId 의 역할. 그리고 application.yml 의 default 가 클라이언트별 키로 덮이고, 어노테이션 url 이 yml url 을 이기는 우선순위.</desc>

  <rect x="0" y="0" width="760" height="440" fill="#0d0d0d"/>

  <text x="32" y="44" fill="rgb(212,168,83)" font-size="19" font-weight="bold">@FeignClient 5속성과 설정 우선순위</text>

  <!-- 5속성 -->
  <text x="32" y="78" fill="rgb(212,168,83)" font-size="14" font-weight="bold">다섯 속성</text>

  <rect x="32" y="92" width="220" height="46" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="48" y="112" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="12">name</text>
  <text x="48" y="130" fill="rgb(138,133,128)" font-size="11">식별자 · discovery · 설정 키</text>

  <rect x="270" y="92" width="220" height="46" rx="6" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="286" y="112" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="12">url</text>
  <text x="286" y="130" fill="rgb(138,133,128)" font-size="11">절대 URL · discovery 건너뜀</text>

  <rect x="508" y="92" width="220" height="46" rx="6" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="524" y="112" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="12">configuration</text>
  <text x="524" y="130" fill="rgb(138,133,128)" font-size="11">Encoder · Decoder override</text>

  <rect x="32" y="150" width="220" height="46" rx="6" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="48" y="170" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="12">fallback</text>
  <text x="48" y="188" fill="rgb(138,133,128)" font-size="11">서킷 폴백 (배선은 01-04)</text>

  <rect x="270" y="150" width="220" height="46" rx="6" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="286" y="170" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="12">contextId</text>
  <text x="286" y="188" fill="rgb(138,133,128)" font-size="11">같은 name 분할 시 충돌 회피</text>

  <!-- 설정 우선순위 -->
  <text x="32" y="232" fill="rgb(212,168,83)" font-size="14" font-weight="bold">설정 우선순위</text>

  <!-- default → 클라이언트별 -->
  <rect x="32" y="248" width="200" height="64" rx="6" fill="rgb(26,26,26)" stroke="rgb(42,37,32)"/>
  <text x="132" y="274" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="12" text-anchor="middle">config.default</text>
  <text x="132" y="296" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">모든 클라이언트 기본값</text>

  <defs>
    <marker id="a02" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="rgb(212,168,83)"/>
    </marker>
  </defs>
  <line x1="232" y1="280" x2="290" y2="280" stroke="rgb(212,168,83)" stroke-width="2" marker-end="url(#a02)"/>
  <text x="261" y="270" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">덮음</text>

  <rect x="298" y="248" width="200" height="64" rx="6" fill="rgba(212,168,83,0.15)" stroke="rgb(212,168,83)"/>
  <text x="398" y="274" fill="#e8e4df" font-family="'JetBrains Mono',monospace" font-size="12" text-anchor="middle">config.stores</text>
  <text x="398" y="296" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">클라이언트별 override 우선</text>

  <!-- 어노테이션 url 이김 -->
  <rect x="528" y="248" width="200" height="64" rx="6" fill="rgba(244,67,54,0.12)" stroke="#f44336"/>
  <text x="628" y="270" fill="#e8e4df" font-size="12" text-anchor="middle">함정</text>
  <text x="628" y="290" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">어노테이션 url 이</text>
  <text x="628" y="306" fill="rgb(138,133,128)" font-size="11" text-anchor="middle">yml url 을 이긴다</text>

  <!-- loggerLevel -->
  <text x="32" y="350" fill="rgb(212,168,83)" font-size="14" font-weight="bold">loggerLevel 4단계</text>
  <text x="32" y="376" fill="rgb(138,133,128)" font-size="12">none(운영 기본) · basic(패턴 모니터링) · headers(인증 디버깅) · full(로컬 한정)</text>
  <text x="32" y="398" fill="rgb(138,133,128)" font-size="12">full 을 운영에 켜면 PII 가 로그에 흐른다 — 마스킹 인터셉터 검토.</text>

  <text x="32" y="430" fill="rgb(138,133,128)" font-size="12">설정 키 errorDecoder · retryer 의 동작은 01-03 에러 모델에서 다룬다.</text>
</svg>
